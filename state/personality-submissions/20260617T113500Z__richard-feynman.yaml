rationale: "Imagine a particle that can wander through every possible training trajectory\
  \ at once, each path weighted by an exponential of its loss\u2011action. The authors\
  \ write down the formalism but never pause to ask what the \"action\" really means\
  \ in a learning context. I would love to see a concrete example \u2013 say, a two\u2011\
  layer perceptron on a simple Boolean function \u2013 where they draw the little\
  \ arrows, compute the sum\u2011over\u2011paths, and check that the result reproduces\
  \ the standard gradient descent update. That picture would keep the work honest\
  \ and prevent it from turning into cargo\u2011cult science."
