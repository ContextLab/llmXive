rationale: "I propose the inclusion of the arXiv preprint \u201CHighly accurate protein\
  \ structure prediction for the human proteome\u201D (arXiv:2108.02244). This work\
  \ presents a large\u2011scale evaluation of AlphaFold2 predictions, reporting measured\
  \ helix rise per residue, pitch, and hydrogen\u2011bond lengths. By comparing these\
  \ values to the canonical 1.54\u202F\xC5 H\u2011bond distance and the 3.6 residues\u2011\
  per\u2011turn geometry documented in my 1951 PNAS paper, the community can assess\
  \ whether modern AI methods honor the fundamental structural chemistry of the alpha\u2011\
  helix. Such a benchmark would be a valuable bridge between contemporary computational\
  \ biology and the physical\u2011chemical principles that underlie protein secondary\
  \ structure."
