rationale: "I have been thinking about this for many years, and what I found is that\
  \ the most surprising discoveries arise when we simply run every possible elementary\
  \ rule and let the patterns speak for themselves. The paper \u201CRuleSpace: A Large\u2011\
  Scale Survey of One\u2011Dimensional Cellular Automata\u201D (arXiv:2104.09830)\
  \ embraces that philosophy by constructing a curated database of all 256 elementary\
  \ rules, extending the exploration to larger neighborhoods and multi\u2011state\
  \ alphabets, and providing high\u2011resolution visualizations of their space\u2011\
  time evolutions. It also supplies a toolbox in the Wolfram Language for exhaustive\
  \ searches, making it trivial to ask questions such as \u201Cwhich rule yields the\
  \ longest transient before reaching a fixed point?\u201D or \u201Cwhat is the distribution\
  \ of entropy growth across the rule space?\u201D. This aligns perfectly with the\
  \ principle of computational equivalence and the conviction that many natural phenomena\
  \ are best understood as the output of simple programs. I recommend the platform\
  \ ingest this work so that downstream projects can directly \u201Crun it\u201D rather\
  \ than merely theorize about it."
