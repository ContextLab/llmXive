  canonical: EEG preprocessing includes band-pass filter with low-frequency cutoff
  claim_id: c_c5a74ea1
  context: 'Phase 3: User Story 1 - Implementation for User Story 1 - T013.'
  evidence:
    fill:
      channel: paper
      conflicts: []
      quote: "'Optimal' preprocessing differs for ERPs and decoding Previous studies\
        \ using multiverse-like preprocessing have mainly focused on 'optimal' preprocessing\
        \ with respect to ERP characteristics such as amplitude. Since one cannot\
        \ directly distinguish between neural signal and artifacts covarying with\
        \ the experimental condition, focusing on maximizing amplitude (or similar)\
        \ has similar limitations as focusing on decoding performance (accuracy or\
        \ T-sum) alone. Results from multiverse studies need to be enriched with considerations\
        \ about the origin of the signal, the side effects of individual processing\
        \ steps in general, and domain knowledge about the processes under investigation.\
        \ However, multiverse analyses on single outcome metrics are a helpful step\
        \ towards a better understanding of the impact of preprocessing and, among\
        \ other possibilities, facilitate the comparison of different study results.\
        \ The following is a comparison of how different the effects of preprocessing\
        \ can be on ERP-related measures versus decoding performance. For example,\
        \ a study by Delorme38 compared preprocessing pipelines and their influence\
        \ on the number of significant channels between two conditions in three paradigms\
        \ (Go/No-go task, face perception task, & active auditory oddball task with\
        \ button press). Their optimal pipeline was dependent on the software used\
        \ for preprocessing but mainly comprised a HPF and bad channel interpolation.\
        \ Other steps either reduced or increased the number of significant channels\
        \ or did not show any effect. While their study tested a wider range of artifact\
        \ correction techniques, the different directions of effects on the number\
        \ of significant channels in the analyzed experiments make comparison more\
        \ challenging. In our experiments artifact correction rather decreased the\
        \ decoding performance. Both studies however align on the use of HPFs, as\
        \ in all datasets, higher HPFs increased the number of significant channels\
        \ or decoding performance. . A study by Clayson et al.13 employed a multiverse\
        \ to compare the influence of preprocessing on ERP amplitude for two components,\
        \ ERN and error-related positivity (Pe), using the Eriksen flanker task39.\
        \ For ERN, their optimal processing consisted of a 15 Hz LPF and ocular artifact\
        \ correction with ICA. For Pe, however, their optimal processing in terms\
        \ of ERP amplitude included a 30 Hz LPF, a 0.1 Hz HPF, and regression-based\
        \ ocular artifact correction. Our time window for decoding in the ERN experiment\
        \ spanned the time windows of both components. We however defined a stimulus-locked\
        \ rather than a response-locked baseline window40. In our search space, the\
        \ optimal LPF cutoff was at 6 Hz for time-resolved decoding. In contrast,\
        \ for the neural network-based framework, all higher LPF cutoffs (\u2265 20\
        \ Hz) were equally suitable for decoding. We found the optimal HPF cutoff\
        \ to be around 0.5 Hz in both of our decoding frameworks, while Clayson et\
        \ al. did not test beyond 0.1 Hz. Ocular artifact correction played a minor\
        \ role in decoding, but avoiding this step still resulted in higher decoding\
        \ performance in our data. While they found a mastoid reference to be beneficial\
        \ for ERN amplitude compared to an average reference, we did not find a significant\
        \ improvement (Table S3). However, we found that the Cz reference increased\
        \ decoding performance (Figure 5, Table S3). Because Cz is close to FCz, which\
        \ itself shows high ERN amplitude (Fig. 2, Table 1),13,18, subtracting Cz\
        \ from the remaining electrodes likely injects this signal into the other\
        \ channels, again limiting potential downstream interpretability of the model\
        \ weights. \u0160o\u0161ki\u0107 et al.12 analyzed the influence of preprocessing\
        \ on the effect magnitude in an N400 experiment. The largest effect was obtained\
        \ with a HPF between 0.01 Hz and 0.1 Hz"
