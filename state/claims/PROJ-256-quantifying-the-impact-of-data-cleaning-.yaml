  claim_id: c_b4ce860e
  context: Implementation of Bonferroni correction logs a warning and correctly adjusts
    p-values for FWER control.
  evidence:
    fill:
      channel: wikipedia
      conflicts: []
      quote: In statistics, the false discovery rate (FDR) is a method of conceptualizing
        the rate of type I errors in null hypothesis testing when conducting multiple
        comparisons. FDR-controlling procedures are designed to control the FDR, which
        is the expected proportion of "discoveries" (rejected null hypotheses) that
        are false (incorrect rejections of the null). Equivalently, the FDR is the
        expected ratio of the number of false positive classifications (false discoveries)
        to the total number of positive classifications (rejections of the null).
        The total number of rejections of the null include both the number of false
        positives (FP) and true positives (TP). Simply put, FDR = FP / (FP + TP).
        FDR-controlling procedures provide less stringent control of Type I errors
        compared to family-wise error rate (FWER) controlling procedures (such as
        the Bonferroni correction), which control the probability of at least one
        Type I error. Thus, FDR-controlling procedures have greater power, at the
        cost of increased numbers of Type I errors.
      source_id: False discovery rate
      url: https://en.wikipedia.org/wiki/False_discovery_rate
      value: Bonferroni correction
    filled: true
  kind: entity_fact
  raw_text: apply_bonferroni_correction correctly adjusts p-values for FWER control.
  resolved_value: Bonferroni correction
  resolver: fill:wikipedia
