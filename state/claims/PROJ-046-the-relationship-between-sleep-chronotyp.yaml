  evidence:
    fill:
      channel: wikipedia
      conflicts: []
      quote: "The morningness\u2013eveningness questionnaire (MEQ)  is a self-assessment\
        \ questionnaire developed by researchers James A. Horne and Olov \xD6stberg\
        \ in 1976. Its main purpose is to measure whether a person's circadian rhythm\
        \ (biological clock) produces peak alertness in the morning, in the evening,\
        \ or in between. The original study showed that the subjective time of peak\
        \ alertness correlates with the time of peak body temperature; morning types\
        \ (early birds) have an earlier temperature peak than evening types (night\
        \ owls), with intermediate types having temperature peaks between the morning\
        \ and evening chronotype groups. The MEQ is widely used in psychological and\
        \ medical research and has been professionally cited more than 4,000 times."
      source_id: "Morningness\u2013eveningness questionnaire"
      url: "https://en.wikipedia.org/wiki/Morningness\u2013eveningness_questionnaire"
