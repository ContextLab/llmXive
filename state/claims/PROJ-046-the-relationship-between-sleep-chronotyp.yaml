      quote: "Adolescent sleep is typically poor in duration and quality. Sleep duration\
        \ and quality reduce to suboptimal levels, and sleep duration variability\
        \ and latency increases during adolescence. Sleep recommendations suggest\
        \ that adolescents (12-19) should obtain 6\u201312 hours of sleep per night.\
        \ Additionally, there is a shift in the body's circadian rhythm such that\
        \ sleep and wake timings become later during adolescence. Technology, social\
        \ factors, and physical development are thought to contribute to poor sleep\
        \ during this time. Poor sleep duration and quality in adolescents has been\
        \ linked with altered brain functioning and development, poor mental and physical\
        \ health, as well as higher rates of disease and mortality. The concerns surrounding\
        \ poor sleep during adolescence has garnered significant public attention,\
        \ especially concerning policies related to school start times. Many evidences\
        \ suggest that sleep contributes positively to attention, behavior, and academic\
        \ achievement for adolescents."
      source_id: Adolescent sleep
