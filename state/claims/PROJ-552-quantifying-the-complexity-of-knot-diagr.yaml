        rapidly, making tabulation computationally difficult (Hoste 2005, p. 20).
        Tabulation efforts have succeeded in enumerating over 6 billion knots and
        links (Hoste 2005, p. 28). The sequence of the number of prime knots of a
        given crossing number, up to crossing number 16, is 0, 0, 1, 1, 2, 3, 7, 21,
        49, 165, 552, 2176, 9988, 46972, 253293, 1388705... (sequence A002863 in the
        OEIS). While exponential upper and lower bounds for this sequence are known,
