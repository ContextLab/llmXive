      quote: As an example, assume we are interested in the average (or mean) height
        of people worldwide.  We cannot measure all the people in the global population,
        so instead, we sample only a tiny part of it, and measure that.  Assume the
        sample is of size N; that is, we measure the heights of N individuals.  From
        that single sample, only one estimate of the mean can be obtained.  In order
        to reason about the population, we need some sense of the variability of the
        mean that we have computed. The simplest bootstrap method involves taking
        the original data set of heights, and, using a computer, sampling from it
        to form a new sample (called a 'resample' or bootstrap sample) that is also
        of size N.  The bootstrap sample is taken from the original by using sampling
        with replacement (e.g. we might 'resample' 5 times from [1,2,3,4,5] and get
        [2,5,4,4,1]), so, assuming N is sufficiently large, for all practical purposes
        there is virtually zero probability that it will be identical to the original
        "real" sample.  This process is repeated a large number of times (typically
        1,000 or 10,000 times), and for each of these bootstrap samples, we compute
        its mean (each of these is called a "bootstrap estimate").  We now can create
        a histogram of bootstrap means.  This histogram provides an estimate of the
        shape of the distribution of the sample mean from which we can answer questions
        about how much the mean varies across samples.  (The method here, described
        for the mean, can be applied to almost any other statistic or estimator.)
