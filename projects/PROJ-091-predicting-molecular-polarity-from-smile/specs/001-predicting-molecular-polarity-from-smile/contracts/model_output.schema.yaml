$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the model predictions and SHAP analysis results."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      model_type:
        type: "string"
        const: "LightGBM"
      seed:
        type: "integer"
        description: "Random seed used for reproducibility."
      clustering_method:
        type: "string"
        const: "Correlation-Based (|r| > 0.8)"
      features_count:
        type: "integer"
        description: "Number of features (all retained, no pruning)."
  predictions:
    type: "array"
    items:
      type: "object"
      properties:
        mol_id:
          type: "string"
        mu_true:
          type: "number"
        mu_pred:
          type: "number"
        residual:
          type: "number"
        shap_values:
          type: "array"
          description: "SHAP values for each feature."
          items:
            type: "number"
        cluster_shap_values:
          type: "array"
          description: "Aggregated SHAP values for each cluster."
          items:
            type: "number"
      required:
        - mol_id
        - mu_true
        - mu_pred
        - residual
        - shap_values
        - cluster_shap_values
  stability_report:
    type: "object"
    properties:
      bootstrap_resamples:
        type: "integer"
        description: "Number of bootstrap resamples (SHAP-only)."
      jaccard_similarity:
        type: "number"
        minimum: 0
        maximum: 1
        description: "Jaccard similarity of top 10 feature clusters."
      top_10_clusters:
        type: "array"
        items:
          type: "string"
        description: "List of top 10 most stable feature clusters."
      stability_status:
        type: "string"
        enum:
          - "stable"
          - "unstable"
        description: "Status based on Jaccard >= 0.7 threshold."
required:
  - metadata
  - predictions
  - stability_report