$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for model predictions and evaluation metrics"
type: "object"
properties:
  metrics:
    type: "object"
    properties:
      r_squared:
        type: "number"
        description: "Coefficient of determination (R²)"
      rmse:
        type: "number"
        description: "Root Mean Squared Error"
      mae:
        type: "number"
        description: "Mean Absolute Error"
      baseline_r_squared:
        type: "number"
        description: "R² of the null model (predicting mean)"
    required:
      - "r_squared"
      - "rmse"
      - "mae"
      - "baseline_r_squared"
  predictions:
    type: "array"
    items:
      type: "object"
      properties:
        smiles:
          type: "string"
        true_dipole:
          type: "number"
        pred_dipole:
          type: "number"
        error:
          type: "number"
      required:
        - "smiles"
        - "true_dipole"
        - "pred_dipole"
        - "error"
  shap_summary:
    type: "object"
    properties:
      top_features:
        type: "array"
        items:
          type: "object"
          properties:
            feature_name:
              type: "string"
            mean_abs_shap:
              type: "number"
            description:
              type: "string"
          required:
            - "feature_name"
            - "mean_abs_shap"
    required:
      - "top_features"
required:
  - "metrics"
  - "predictions"
  - "shap_summary"
additionalProperties: false
