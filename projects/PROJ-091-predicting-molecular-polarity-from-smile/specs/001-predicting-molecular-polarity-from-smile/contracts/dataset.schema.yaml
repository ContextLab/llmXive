$schema: "http://json-schema.org/draft-07/schema#"
title: "QM9 Dataset Schema"
description: "Schema for the raw and processed QM9 dataset used in molecular polarity prediction."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      source_url:
        type: "string"
        description: "Verified URL of the QM9 dataset source."
        pattern: "^https://huggingface.co/datasets/lisn519010/QM9/resolve/main/data/full-00000-of-00001-e217b6ecfbeb7149.parquet$"
      checksum:
        type: "string"
        description: "SHA256 checksum of the raw file."
      timestamp:
        type: "string"
        format: "date-time"
        description: "Timestamp of download."
  data:
    type: "array"
    items:
      type: "object"
      properties:
        mol_id:
          type: "string"
          description: "Unique identifier for the molecule."
        smiles:
          type: "string"
          description: "Canonical SMILES string."
          pattern: "^[A-Za-z0-9@#$%&*()\\[\\]{}\\-+=~<>\\^/\\\\]+$"
        mu:
          type: "number"
          description: "Dipole moment in Debye."
          minimum: 0
        descriptors:
          type: "array"
          description: "List of 2D topological descriptors (excludes TPSA, 3D). All features retained."
          items:
            type: "number"
          minItems: 200
          maxItems: 300
        cluster_id:
          type: "string"
          description: "ID of the correlation cluster this molecule's descriptors belong to."
        status:
          type: "string"
          enum:
            - "valid"
            - "nan_imputed"
            - "skipped_malformed"
      required:
        - mol_id
        - smiles
        - mu
        - descriptors
        - cluster_id
        - status
required:
  - metadata
  - data