$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: >
  Schema for a single knot record containing core invariants and derived properties.
  Primary source: Knot Atlas (https://katlas.org)
  Validation requirements: FR-002 (data quality), FR-003 (core invariants), FR-012 (hyperbolic filter)

type: object
required:
  - knot_id
  - name
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - alternating
  - source
  - source_timestamp
  - checksum_sha256
  - data_quality_flags
  - missing_invariant_flags
properties:
  knot_id:
    type: string
    description: "Unique identifier for the knot. Format: \"KNOT_CX_YYYY\" where X is crossing number and YYYY is the knot name/number from Knot Atlas (e.g., \"KNOT_3_1\", \"KNOT_4_1\")"
    pattern: "^KNOT_[0-9]+_[A-Za-z0-9_-]+$"
    minLength: 6
  name:
    type: string
    description: "Human‑readable name or Rolfsen notation."
  crossing_number:
    type: integer
    description: "The crossing number of the knot – minimum number of crossings in any regular diagram."
    minimum: 0
  braid_index:
    type: integer
    description: "The braid index of the knot – minimum number of strands in any braid representation."
    minimum: 0
  hyperbolic_volume:
    type: number
    description: "Hyperbolic volume of the knot complement (non-positive for torus/satellite knots). 
The research question is: What is the relationship between knot complexity and the hyperbolic volume of its complement?
The method is: We will compute the hyperbolic volume of knot complements using the SnapPy software package and analyze the resulting data to identify correlations with knot invariants.
References: (cite relevant papers here - not provided in the prompt, so omitted here)."
    minimum: 0
  alternating:
    type: boolean
    description: "True if the knot is alternating."
  source:
    type: object
    description: "Attribution metadata for the record."
    required:
      - database
      - version
      - url
      - accessed_at
    properties:
      database:
        type: string
        description: "Database name (e.g., KnotAtlas, KnotInfo)."
      version:
        type: string
        description: "Version or access date."
      url:
        type: string
        format: uri
        description: "Canonical URL for the record."
      accessed_at:
        type: string
        format: date-time
        description: "Timestamp when data was accessed."
  source_timestamp:
    type: string
    format: date-time
    description: "Timestamp of the source record."
  checksum_sha256:
    type: string
    pattern: "^[a-fA-F-9]{64}$"
    description: "SHA‑256 checksum of the raw source record."
  data_quality_flags:
    type: array
    description: "List of data‑quality flags."
    items:
      type: object
      required:
        - flag_code
        - description
      properties:
        flag_code:
          type: string
        description:
          type: string
        severity:
          type: string
  missing_invariant_flags:
    type: array
    description: "Flags for invariants not computable from available diagram representations."
    items:
      type: object
      required:
        - invariant_name
        - flag_code
        - description
      properties:
        invariant_name:
          type: string
        flag_code:
          type: string
        description:
          type: string
        reason:
          type: string
        severity:
          type: string
additionalProperties: false