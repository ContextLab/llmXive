$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with attributes including crossing number, braid index, alternating classification, and hyperbolic volume"
type: "object"
required:
  - "knot_id"
  - "crossing_number"
  - "braid_index"
  - "data_quality_flags"
  - "missing_invariant_flags"
  - "source_url"
  - "checksum"
  - "timestamp"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier from Knot Atlas (e.g., \"8_19\")"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Minimum number of crossings in any diagram"
    minimum: 1
    maximum: 13
  braid_index:
    type: "integer"
    description: "Minimum number of strands in any braid representation"
    minimum: 1
  hyperbolic_volume:
    type: ["number", "null"]
    description: "Volume of knot complement (hyperbolic knots only); must be > 0 for hyperbolic knots"
  is_alternating:
    type: ["boolean", "null"]
    description: "Whether knot is alternating or non-alternating; may be null if classification ambiguous"
  dt_code:
    type: ["string", "null"]
    description: "Dowker-Thistlethwaite code for diagram representation"
  braid_word:
    type: ["string", "null"]
    description: "Braid word representation"
  data_quality_flags:
    type: "array"
    description: "Flags for data quality issues (null values, format failures, duplicates)"
    items:
      type: "string"
      enum:
        - "null_crossing"
        - "null_braid"
        - "null_volume"
        - "format_invalid"
        - "duplicate_id"
  missing_invariant_flags:
    type: "array"
    description: "Flags for uncomputable invariants (distinct from data_quality_flags per FR-009)"
    items:
      type: "string"
      enum:
        - "no_representation"
        - "algorithm_not_implemented"
  source_url:
    type: "string"
    description: "Source URL for data"
    const: "https://katlas.org"
  checksum:
    type: "string"
    description: "SHA-256 checksum of record"
    pattern: "^[a-f0-9]{64}$"
  timestamp:
    type: "string"
    description: "Data extraction timestamp in ISO 8601 format"
    format: "date-time"
additionalProperties: false