# Knot Record Schema
# Defines the structure for individual knot records in the dataset
# Per Constitution Principle II: All data must conform to documented schemas
# Per FR-003: Core invariants (crossing number, braid index) are tabulated from Knot Atlas
# Per FR-012: Hyperbolic volume > 0 required for inclusion in analysis

$schema: http://json-schema.org/draft-07/schema#
title: KnotRecord
description: >
  Schema for a single knot record containing core invariants and derived properties.
  Primary source: Knot Atlas (https://katlas.org)
  Validation requirements: FR-002 (data quality), FR-003 (core invariants), FR-012 (hyperbolic filter)

type: object
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - is_alternating
  - source

properties:
  # Primary identifier - unique string for each knot
  knot_id:
    type: string
    description: >
      Unique identifier for the knot. Format: "KNOT_CX_YYYY" where X is crossing number
      and YYYY is the knot name/number from Knot Atlas (e.g., "KNOT_3_1", "KNOT_4_1")
    pattern: "^KNOT_[0-9]+_[A-Za-z0-9_-]+$"
    minLength: 6

  # Core invariant: Crossing number (minimum number of crossings in any diagram)
  crossing_number:
    type: integer
    description: >
      The crossing number of the knot - minimum number of crossings in any regular diagram.
      Tabulated from Knot Atlas per FR-003. For this project, range is 3 ≤ crossing_number ≤ 13.
    minimum: 3
    maximum: 13

  # Core invariant: Braid index (minimum number of strands in any braid representation)
  braid_index:
    type: integer
    description: >
      The braid index of the knot - minimum number of strands in any braid representation
      that closes to the knot. Tabulated from Knot Atlas per FR-003.
      Mathematical constraint: braid_index ≤ crossing_number (documented in mathematical_constraints.md)
    minimum: 2
    # Upper bound is crossing_number, but schema uses loose bound for validation flexibility

  # Core invariant: Hyperbolic volume (for hyperbolic knots only)
  hyperbolic_volume:
    type: number
    description: >
      The hyperbolic volume of the knot complement (in units of hyperbolic 3-space).
      For hyperbolic knots, volume > 0. For torus/satellite knots, volume = 0 or null.
      Per FR-012, knots with volume = 0 are excluded from analysis.
      Precision: Values tabulated to at least 6 decimal places from Knot Atlas.
    minimum: 0.0
    multipleOf: 0.000001

  # Classification: Alternating vs non-alternating
  is_alternating:
    type: boolean
    description: >
      True if the knot is alternating (has a diagram where crossings alternate over/under).
      False if non-alternating.
      Per FR-010, ambiguous cases should be flagged or marked as 'unclassifiable'.
    default: false

  # Source attribution for reproducibility
  source:
    type: object
    description: >
      Attribution information for the knot record per Constitution Principle II.
    required:
      - database
      - version
      - url
    properties:
      database:
        type: string
        enum: ["KnotAtlas", "KnotInfo"]
        description: Name of the source database
      version:
        type: string
        description: Version or access date of the database
      url:
        type: string
        format: uri
        description: URL to the specific knot record
      accessed_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp when data was accessed

  # Additional invariants (optional, for extended analysis)
  additional_invariants:
    type: object
    description: >
      Optional additional invariants beyond core set.
      Per Constitution Principle VI, all additional invariants must have documented
      reference to primary mathematical literature in invariant_definitions.md.
    properties:
      arc_index:
        type: integer
        description: >
          Arc index - minimum number of arcs in any arc presentation.
          Reference: See invariant_definitions.md for mathematical definition.
        minimum: 3
      seifert_circle_count:
        type: integer
        description: >
          Number of Seifert circles in the canonical Seifert algorithm output.
          Reference: See invariant_definitions.md for mathematical definition.
        minimum: 1
      bridge_number:
        type: integer
        description: >
          Bridge number - minimum number of local maxima in any diagram.
          Reference: See invariant_definitions.md for mathematical definition.
        minimum: 1

  # Data quality flags (per FR-002, FR-009, FR-010)
  data_quality_flags:
    type: array
    description: >
      List of flags indicating data quality issues.
      Generated by code/data/validator.py per FR-002, FR-009, FR-010.
    items:
      type: object
      required:
        - flag_code
        - description
      properties:
        flag_code:
          type: string
          enum:
            - MISSING_INVARIANT
            - NULL_VALUE
            - FORMAT_FAILURE
            - DUPLICATE_RECORD
            - AMBIGUOUS_CLASSIFICATION
            - VOLUME_ZERO
            - CROSSING_TIE
          description: Standardized flag code
        description:
          type: string
          description: Human-readable description of the issue
        severity:
          type: string
          enum: ["warning", "error", "critical"]
          description: Severity level of the flag

  # Provenance metadata
  metadata:
    type: object
    description: >
      Provenance and processing metadata for reproducibility.
    properties:
      created_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp when record was created
      processed_by:
        type: string
        description: Identifier of the processing script/agent
      checksum_sha256:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: SHA-256 checksum of the record for integrity verification
      version:
        type: string
        default: "1.0"
        description: Schema version for this record

# Additional properties not in schema are not allowed
additionalProperties: false

# Validation examples
examples:
  - knot_id: "KNOT_3_1"
    crossing_number: 3
    braid_index: 2
    hyperbolic_volume: 0.0
    is_alternating: true
    source:
      database: "KnotAtlas"
      version: "2024-01-15"
      url: "https://katlas.org/wiki/3_1"
      accessed_at: "2024-01-20T10:30:00Z"
    metadata:
      created_at: "2024-01-20T10:30:00Z"
      processed_by: "knot_atlas_loader.py"
      version: "1.0"

  - knot_id: "KNOT_5_2"
    crossing_number: 5
    braid_index: 3
    hyperbolic_volume: 2.029883
    is_alternating: true
    source:
      database: "KnotAtlas"
      version: "2024-01-15"
      url: "https://katlas.org/wiki/5_2"
      accessed_at: "2024-01-20T10:30:00Z"
    additional_invariants:
      arc_index: 4
      seifert_circle_count: 3
      bridge_number: 2
    data_quality_flags: []
    metadata:
      created_at: "2024-01-20T10:30:00Z"
      processed_by: "knot_atlas_loader.py"
      checksum_sha256: "a1b2c3d4e5f6789012345678901234567890123456789012345678901234abcd"
      version: "1.0"

# Schema versioning for reproducibility
_schema_metadata:
  version: "1.0.0"
  created_at: "2024-01-15T00:00:00Z"
  last_modified: "2024-01-15T00:00:00Z"
  author: "PROJ-552-knot-complexity-pipeline"
  description: >
    Initial schema version for knot records. Defines core invariants
    (crossing number, braid index, hyperbolic volume) and classification
    (alternating/non-alternating) as required by FR-003 and FR-012.
    Additional invariants (arc index, Seifert circle count, bridge number)
    are optional and per Constitution Principle VI require documentation
    in invariant_definitions.md.