$schema: "http://json-schema.org/draft-07/schema#"
title: "InvariantsDataset"
description: "Schema for the aggregated collection of knot records."
type: "object"
properties:
  records:
    type: "array"
    items:
      $ref: "knot_record.schema.yaml"
    description: "List of knot records."
  metadata:
    type: "object"
    properties:
      total_records:
        type: "integer"
        description: "Total number of records."
      hyperbolic_records:
        type: "integer"
        description: "Number of hyperbolic records."
      alternating_records:
        type: "integer"
        description: "Number of alternating records."
      non_alternating_records:
        type: "integer"
        description: "Number of non-alternating records."
      null_percentages:
        type: "object"
        description: "Null percentage per required field."
        additionalProperties:
          type: "number"
          minimum: 0
          maximum: 100
      duplicate_count:
        type: "integer"
        description: "Number of duplicate records (must be 0)."
      checksum_sha256:
        type: "string"
        description: "SHA-256 checksum of the processed dataset."
      created_at:
        type: "string"
        description: "ISO-8601 timestamp of creation."
        format: "date-time"
    required:
      - total_records
      - hyperbolic_records
      - alternating_records
      - non_alternating_records
      - null_percentages
      - duplicate_count
      - checksum_sha256
      - created_at
required:
  - records
  - metadata
additionalProperties: false
