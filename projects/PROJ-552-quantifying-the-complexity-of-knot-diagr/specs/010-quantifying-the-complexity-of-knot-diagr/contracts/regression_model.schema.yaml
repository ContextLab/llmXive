$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted model with attributes including model type, coefficients, goodness-of-fit metrics"
type: "object"
required:
  - model_id
  - model_type
  - predictors
  - target
  - coefficients
  - r_squared
  - aic
  - bic
  - mae
  - vif_scores
  - residual_outliers
  - alternating_control
  - braid_index_uncertainty
properties:
  model_id:
    type: "string"
  model_type:
    type: "string"
    enum:
      - "linear"
      - "polynomial"
      - "logarithmic"
  predictors:
    type: "array"
    items:
      type: "string"
  target:
    type: "string"
  coefficients:
    type: "object"
    additionalProperties:
      type: "number"
  r_squared:
    type: "number"
    minimum: 0
    maximum: 1
  aic:
    type: "number"
  bic:
    type: "number"
  mae:
    type: "number"
    minimum: 0
  vif_scores:
    type: "object"
    additionalProperties:
      type: "number"
  residual_outliers:
    type: "array"
    items:
      type: "string"
  alternating_control:
    type: "boolean"
  braid_index_uncertainty:
    type: "boolean"
additionalProperties: false