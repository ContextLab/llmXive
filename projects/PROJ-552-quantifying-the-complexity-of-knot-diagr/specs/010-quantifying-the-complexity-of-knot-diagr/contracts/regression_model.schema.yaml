$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Schema for a fitted regression model with orthogonalized predictors."
type: "object"
properties:
  model_type:
    type: "string"
    description: "Type of model (e.g., 'linear', 'polynomial')."
    enum:
      - "linear"
      - "polynomial"
  coefficients:
    type: "object"
    description: "Model coefficients keyed by predictor name (including orthogonalized predictors)."
    additionalProperties:
      type: "number"
  intercept:
    type: "number"
    description: "Model intercept."
  r_squared:
    type: "number"
    description: "R-squared value."
  aic:
    type: "number"
    description: "Akaike Information Criterion."
  bic:
    type: "number"
    description: "Bayesian Information Criterion."
  mae:
    type: "number"
    description: "Mean Absolute Error."
  vif:
    type: "object"
    description: "Variance Inflation Factor for each predictor."
    additionalProperties:
      type: "number"
  residuals:
    type: "array"
    items:
      type: "number"
    description: "List of residuals ordered by knot_id."
  outlier_families:
    type: "array"
    items:
      type: "object"
      properties:
        family_name:
          type: "string"
          description: "Name of the knot family (e.g., 'pretzel')."
        count:
          type: "integer"
          description: "Number of outliers in the family."
        example_knots:
          type: "array"
          items:
            type: "string"
          description: "Example knot IDs in the family."
      required:
        - family_name
        - count
        - example_knots
    description: "List of outlier knot families."
  interpretation_note:
    type: "string"
    description: "Descriptive note on model interpretation (census data caveat, orthogonalization)."
    const: "Coefficients are descriptive associations within the finite census; braid_index ≤ crossing_number constraint acknowledged via orthogonalization. No independent predictive power claimed."
required:
  - model_type
  - coefficients
  - intercept
  - r_squared
  - aic
  - bic
  - mae
  - vif
  - residuals
  - outlier_families
  - interpretation_note
additionalProperties: false