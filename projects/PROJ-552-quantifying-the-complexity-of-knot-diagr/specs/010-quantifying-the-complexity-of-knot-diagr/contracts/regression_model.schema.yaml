$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted model with attributes including model type, coefficients, goodness-of-fit metrics"
type: "object"
properties:
  model_id:
    type: "string"
    description: "Unique identifier"
  model_type:
    type: "string"
    description: "Model type: linear, polynomial, or logarithmic"
    enum:
      - "linear"
      - "polynomial"
      - "logarithmic"
  predictors:
    type: "array"
    description: "Predictor variables (e.g., [\"crossing_number\", \"braid_index\"])"
    items:
      type: "string"
  target:
    type: "string"
    description: "Target variable (e.g., \"hyperbolic_volume\")"
  coefficients:
    type: "object"
    description: "Model coefficients"
    additionalProperties:
      type: "number"
  r_squared:
    type: "number"
    description: "R² goodness-of-fit metric"
    minimum: 0
    maximum: 1
  aic:
    type: "number"
    description: "Akaike Information Criterion"
  bic:
    type: "number"
    description: "Bayesian Information Criterion"
  mae:
    type: "number"
    description: "Mean Absolute Error"
    minimum: 0
  vif_scores:
    type: "object"
    description: "Variance Inflation Factor for each predictor"
    additionalProperties:
      type: "number"
  residual_outliers:
    type: "array"
    description: "Knot IDs with residuals ≥ 2 standard deviations"
    items:
      type: "string"
required:
  - model_id
  - model_type
  - predictors
  - target
  - coefficients
  - r_squared
  - aic
  - bic
  - mae
  - vif_scores
  - residual_outliers
additionalProperties: false