$schema: "http://json-schema.org/draft-07/schema#"
title: Regression Model Schema
description: |
  JSON‑Schema definition for regression model metadata produced by the
  analysis pipeline.  Each model record captures the type of regression,
  its fitted parameters, and a set of goodness‑of‑fit metrics.
type: object
required:
  - model_name
  - model_type
  - coefficients
  - intercept
  - metrics
properties:
  model_name:
    type: string
    description: Unique identifier for the model (e.g., "crossing_vs_braid_linear").
  model_type:
    type: string
    enum:
      - linear
      - polynomial
      - logarithmic
    description: Type of regression fitted.
  degree:
    type: integer
    minimum: 1
    description: |
      Degree of the polynomial model. Present only when model_type is
      "polynomial".
  coefficients:
    type: array
    items:
      type: number
    description: |
      List of fitted coefficients ordered from highest‑degree term to the
      constant term (excluding intercept which is stored separately).
  intercept:
    type: number
    description: Intercept term of the regression.
  metrics:
    type: object
    required:
      - r_squared
      - mae
      - aic
      - bic
    properties:
      r_squared:
        type: number
        minimum: 0
        maximum: 1
        description: Coefficient of determination.
      mae:
        type: number
        minimum: 0
        description: Mean absolute error.
      aic:
        type: number
        description: Akaike information criterion.
      bic:
        type: number
        description: Bayesian information criterion.
  fit_timestamp:
    type: string
    format: date-time
    description: ISO‑8601 timestamp when the model was fitted.
  notes:
    type: string
    description: Optional free‑form notes about the fitting procedure.