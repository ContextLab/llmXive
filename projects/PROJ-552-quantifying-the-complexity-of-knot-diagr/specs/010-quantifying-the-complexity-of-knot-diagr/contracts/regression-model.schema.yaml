# Regression Model Schema
#
# This schema defines the structure and required fields for regression model
# metadata artifacts generated by the analysis pipeline. It follows the JSON
# Schema Draft-07 vocabulary expressed in YAML for readability.
#
# Core fields:
# - model_name: Human‑readable identifier for the model instance.
# - model_type: Type of regression (e.g., "linear", "polynomial", "logarithmic").
# - trained_on: Reference to the dataset used for training (e.g., a dataset
#   version identifier or file path).
# - input_features: List of feature names used as predictors.
# - target_feature: Name of the dependent variable.
# - parameters: Model‑specific parameters (e.g., coefficients, degree).
# - metrics: Goodness‑of‑fit and error metrics.
# - created_at: ISO‑8601 timestamp of model creation.
# - version: Schema version for forward compatibility.
#
# The schema is used by downstream validation scripts (e.g., contract tests)
# to ensure that any generated regression model description conforms to the
# expected structure.
#
$schema: "http://json-schema.org/draft-07/schema#"
title: RegressionModel
type: object
required:
  - model_name
  - model_type
  - trained_on
  - input_features
  - target_feature
  - parameters
  - metrics
  - created_at
  - version
additionalProperties: false
properties:
  model_name:
    type: string
    description: Human‑readable identifier for the regression model instance.
  model_type:
    type: string
    enum:
      - linear
      - polynomial
      - logarithmic
      - exponential
      - custom
    description: Type of regression model.
  trained_on:
    type: string
    description: Identifier or path of the dataset used for training.
  input_features:
    type: array
    items:
      type: string
    minItems: 1
    description: List of predictor feature names.
  target_feature:
    type: string
    description: Name of the dependent variable.
  parameters:
    type: object
    description: Model‑specific parameters (e.g., coefficients, degree).
    additionalProperties: true
  metrics:
    type: object
    required:
      - r_squared
      - aic
      - bic
      - mae
      - rmse
    additionalProperties: false
    properties:
      r_squared:
        type: number
        description: Coefficient of determination.
      aic:
        type: number
        description: Akaike Information Criterion.
      bic:
        type: number
        description: Bayesian Information Criterion.
      mae:
        type: number
        description: Mean Absolute Error.
      rmse:
        type: number
        description: Root Mean Squared Error.
  created_at:
    type: string
    format: date-time
    description: ISO‑8601 timestamp when the model was created.
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: Semantic version of the schema (e.g., "1.0.0").
examples:
  - model_name: "crossing_vs_braid_linear_v1"
    model_type: "linear"
    trained_on: "data/processed/knots_cleaned.csv"
    input_features: ["crossing_number"]
    target_feature: "braid_index"
    parameters:
      intercept: 0.5
      slope: 1.2
    metrics:
      r_squared: 0.87
      aic: 123.45
      bic: 130.67
      mae: 0.34
      rmse: 0.58
    created_at: "2026-06-16T12:00:00Z"
    version: "1.0.0"