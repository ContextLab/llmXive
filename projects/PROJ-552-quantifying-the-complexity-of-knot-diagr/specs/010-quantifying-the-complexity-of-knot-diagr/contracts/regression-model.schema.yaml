$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted model with attributes including model type, coefficients, goodness-of-fit metrics, and training/validation split information"
type: "object"
required:
  - "model_id"
  - "model_type"
  - "predictors"
  - "coefficients"
  - "r_squared"
  - "aic"
  - "bic"
  - "mae"
  - "vif_crossing"
  - "vif_braid"
  - "dataset_checksum"
  - "created_at"
properties:
  model_id:
    type: "string"
    description: "Unique identifier for model"
    pattern: "^[a-z]+_[0-9]{14}$"
  model_type:
    type: "string"
    description: "Type of regression model"
    enum:
      - "linear"
      - "polynomial"
      - "logarithmic"
  predictors:
    type: "array"
    description: "Predictor variables used"
    items:
      type: "string"
      enum:
        - "crossing_number"
        - "braid_index"
    minItems: 1
    maxItems: 2
  coefficients:
    type: "object"
    description: "Model coefficients (structure varies by model type)"
    additionalProperties: true
  r_squared:
    type: "number"
    description: "Coefficient of determination"
    minimum: 0
    maximum: 1
  aic:
    type: "number"
    description: "Akaike Information Criterion"
  bic:
    type: "number"
    description: "Bayesian Information Criterion"
  mae:
    type: "number"
    description: "Mean Absolute Error"
    minimum: 0
  vif_crossing:
    type: "number"
    description: "Variance Inflation Factor for crossing number (expected to be high due to mathematical constraint)"
  vif_braid:
    type: "number"
    description: "Variance Inflation Factor for braid index (expected to be high due to mathematical constraint)"
  residual_families:
    type: "array"
    description: "Families with significant residual deviations (≥2 standard deviations from model predictions)"
    items:
      type: "string"
  dataset_checksum:
    type: "string"
    description: "Checksum of training dataset (links to InvariantsDataset)"
    pattern: "^[a-f0-9]{64}$"
  created_at:
    type: "string"
    description: "Model creation timestamp in ISO 8601 format"
    format: "date-time"
additionalProperties: false