# Regression Model Schema
# Defines the structure for regression analysis outputs in the knot complexity pipeline
# Per Constitution Principle V: All artifacts must be versioned and hashable
# Per Constitution Principle VII: Census data statistics (no p-values for census)

$schema: "http://json-schema.org/draft-07/schema#"
type: object
description: "Schema for regression model analysis results in knot complexity study"

required:
  - model_type
  - input_features
  - target_variable
  - metrics
  - fit_parameters
  - metadata

properties:
  model_type:
    type: string
    description: "Type of regression model fitted"
    enum:
      - linear
      - polynomial
      - logarithmic
    example: "linear"

  input_features:
    type: array
    description: "List of predictor variables used in the model"
    items:
      type: string
    example:
      - crossing_number
      - braid_index

  target_variable:
    type: string
    description: "Dependent variable being predicted"
    example: "hyperbolic_volume"

  fit_parameters:
    type: object
    description: "Model-specific fitted parameters"
    required:
      - coefficients
    properties:
      coefficients:
        type: array
        description: "Fitted coefficient values for each feature"
        items:
          type: number
        example:
          - 0.523
          - 1.847
      intercept:
        type: number
        description: "Model intercept term"
        example: 0.125
      polynomial_degree:
        type: integer
        description: "Degree for polynomial models (null for linear/logarithmic)"
        minimum: 1
        example: 2
      logarithmic_base:
        type: number
        description: "Logarithm base used (e.g., e for natural log)"
        minimum: 1.0
        example: 2.71828

  metrics:
    type: object
    description: "Goodness-of-fit and quality metrics"
    required:
      - r_squared
      - aic
      - bic
      - mae
    properties:
      r_squared:
        type: number
        description: "Coefficient of determination (R²)"
        minimum: 0.0
        maximum: 1.0
        example: 0.847
      adjusted_r_squared:
        type: number
        description: "Adjusted R² accounting for number of predictors"
        example: 0.842
      aic:
        type: number
        description: "Akaike Information Criterion (lower is better)"
        example: 1245.67
      bic:
        type: number
        description: "Bayesian Information Criterion (lower is better)"
        example: 1258.93
      mae:
        type: number
        description: "Mean Absolute Error"
        example: 0.234
      mse:
        type: number
        description: "Mean Squared Error"
        example: 0.089
      rmse:
        type: number
        description: "Root Mean Squared Error"
        example: 0.298

  correlation_analysis:
    type: object
    description: "Pairwise correlation analysis between features and target"
    required:
      - pearson_coefficients
      - spearman_coefficients
    properties:
      pearson_coefficients:
        type: object
        description: "Pearson correlation coefficients (feature -> target)"
        additionalProperties:
          type: number
          minimum: -1.0
          maximum: 1.0
        example:
          crossing_number: 0.892
          braid_index: 0.847
      spearman_coefficients:
        type: object
        description: "Spearman rank correlation coefficients (feature -> target)"
        additionalProperties:
          type: number
          minimum: -1.0
          maximum: 1.0
        example:
          crossing_number: 0.915
          braid_index: 0.863
      note:
        type: string
        description: "Statistical interpretation note per FR-006 and Constitution Principle VII"
        const: "p-values not reported for census data - entire population analyzed"

  effect_sizes:
    type: object
    description: "Effect size measures for group comparisons (alternating vs non-alternating)"
    properties:
      cohen_d:
        type: number
        description: "Cohen's d effect size for mean difference"
        example: 0.85
      cohen_r:
        type: number
        description: "Pearson's r effect size"
        example: 0.42
      variance_ratio:
        type: number
        description: "Ratio of variances between groups"
        example: 1.34

  multicollinearity:
    type: object
    description: "Multicollinearity diagnostics"
    properties:
      vif:
        type: object
        description: "Variance Inflation Factor for each predictor"
        additionalProperties:
          type: number
          minimum: 1.0
        example:
          crossing_number: 4.23
          braid_index: 3.87
      tolerance:
        type: object
        description: "Tolerance (1/VIF) for each predictor"
        additionalProperties:
          type: number
          minimum: 0.0
          maximum: 1.0
        example:
          crossing_number: 0.236
          braid_index: 0.258
      condition_number:
        type: number
        description: "Condition number of design matrix"
        example: 12.45
      note:
        type: string
        description: "Acknowledgment of mathematical constraint per Assumptions"
        const: "Braid index ≤ crossing number constraint acknowledged - multicollinearity expected"

  residual_analysis:
    type: object
    description: "Residual analysis results"
    properties:
      residuals:
        type: array
        description: "Residual values for each observation"
        items:
          type: number
        example:
          - 0.123
          - -0.045
          - 0.234
      residual_std:
        type: number
        description: "Standard deviation of residuals"
        example: 0.156
      outliers:
        type: array
        description: "Knot identifiers with residuals ≥2 standard deviations"
        items:
          type: object
          required:
            - knot_id
            - residual
            - deviation_sigma
          properties:
            knot_id:
              type: string
              description: "Knot identifier from census"
              example: "8_19"
            residual:
              type: number
              description: "Residual value"
            deviation_sigma:
              type: number
              description: "Number of standard deviations from mean"
        example:
          - knot_id: "8_19"
            residual: 0.456
            deviation_sigma: 2.34

  metadata:
    type: object
    description: "Reproducibility and provenance information"
    required:
      - created_at
      - dataset_version
      - random_seed
      - python_version
    properties:
      created_at:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of model creation"
        example: "2026-01-15T14:32:00Z"
      dataset_version:
        type: string
        description: "Version identifier for input dataset"
        example: "v1.0.0"
      dataset_checksum:
        type: string
        description: "SHA-256 checksum of input dataset per FR-007"
        pattern: "^[a-f0-9]{64}$"
        example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
      random_seed:
        type: integer
        description: "Random seed for reproducibility per Constitution Principle I"
        example: 42
      python_version:
        type: string
        description: "Python version used for computation"
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        example: "3.11.0"
      dependencies:
        type: object
        description: "Key dependency versions"
        properties:
          numpy:
            type: string
            example: "1.24.0"
          scipy:
            type: string
            example: "1.10.0"
          statsmodels:
            type: string
            example: "0.14.0"
      code_version:
        type: string
        description: "Git commit hash of analysis code"
        pattern: "^[a-f0-9]{40}$"
        example: "a1b2c3d4e5f6789012345678901234567890abcd"
      content_hash:
        type: string
        description: "SHA-256 hash of model output for Constitution Principle V"
        pattern: "^[a-f0-9]{64}$"
        example: "f2ca1bb6c7e907d06dafe4687e579fce76b37e4e93b7605022da52e6ccc26fd2"

  validation_status:
    type: object
    description: "Model validation and quality checks"
    properties:
      passed:
        type: boolean
        description: "Whether model passed all validation checks"
      checks:
        type: array
        description: "Individual validation check results"
        items:
          type: object
          required:
            - check_name
            - passed
            - message
          properties:
            check_name:
              type: string
              example: "r_squared_threshold"
            passed:
              type: boolean
            message:
              type: string
              example: "R² = 0.847 exceeds threshold of 0.70"
      warnings:
        type: array
        description: "Non-critical warnings"
        items:
          type: string
        example:
          - "High VIF detected for crossing_number - expected due to braid index correlation"

additionalProperties: false

# Version history
# v1.0.0 - Initial schema definition (T005)
# - Defines structure for all regression model outputs
# - Includes metrics, correlations, effect sizes, multicollinearity diagnostics
# - Per Constitution Principle VII: Explicit note that p-values not reported for census data
# - Per Constitution Principle V: Content hash field for artifact tracking