# Dataset Schema for InvariantsDataset Entity
# Per plan.md Project Structure requirement
# Defines the structure of the complete knot invariants dataset
---
$schema: http://json-schema.org/draft-07/schema#
$id: https://llmxive.org/schemas/dataset.schema.yaml
version: "1.0.0"
name: InvariantsDataset
description: >
  Schema for the complete dataset of prime knot invariants.
  Contains all knot records with crossing numbers, braid indices,
  hyperbolic volumes, and alternating/non-alternating classifications
  for prime knots with crossing number ≤ 13.

# Dataset-level metadata
dataset_metadata:
  type: object
  required:
    - dataset_name
    - dataset_version
    - source
    - created_at
    - updated_at
    - record_count
    - crossing_number_range
    - hyperbolic_knot_count
    - null_percentage
    - format_pass_rate
    - duplicate_count
  properties:
    dataset_name:
      type: string
      description: Name of the dataset
      const: "prime_knot_invariants"
    dataset_version:
      type: string
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: Semantic version of the dataset
    source:
      type: string
      description: Primary data source
      const: "Knot Atlas"
    source_url:
      type: string
      format: uri
      description: URL of the source
      const: "https://katlas.org"
    created_at:
      type: string
      format: date-time
      description: ISO 8601 timestamp of dataset creation
    updated_at:
      type: string
      format: date-time
      description: ISO 8601 timestamp of last update
    record_count:
      type: integer
      minimum: 1
      description: Total number of knot records in dataset
    crossing_number_range:
      type: object
      required:
        - min
        - max
      properties:
        min:
          type: integer
          minimum: 1
          description: Minimum crossing number in dataset
        max:
          type: integer
          maximum: 13
          description: Maximum crossing number in dataset (per plan.md)
    hyperbolic_knot_count:
      type: integer
      minimum: 0
      description: Count of knots with hyperbolic volume > 0 (after filtering per FR-012)
    null_percentage:
      type: number
      minimum: 0
      maximum: 100
      description: Measured null percentage for required fields (must be ≤ 5 % per FR‑002)
    format_pass_rate:
      type: number
      minimum: 0
      maximum: 100
      description: Measured format pass rate (must be ≥ 99 % per FR‑002)
    duplicate_count:
      type: integer
      minimum: 0
      description: Measured duplicate record count (must satisfy the no‑duplicate requirement of FR‑002)

    data_quality_summary:
      type: object
      required:
        - null_percentage
        - format_pass_rate
        - duplicate_count
      properties:
        null_percentage:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage of null values in required fields (must be ≤5% per FR-002)
        format_pass_rate:
          type: number
          minimum: 0
          maximum: 100
          description: Percentage of records with valid format (must be ≥99% per FR-002)
        duplicate_count:
          type: integer
          minimum: 0
          description: Number of duplicate records (must be 0 per FR-002)

# Main dataset structure
dataset:
  type: object
  required:
    - metadata
    - records
  properties:
    metadata:
      $ref: '#/dataset_metadata'
    records:
      type: array
      description: Array of knot records
      items:
        $ref: '#/knot_record'

# Individual knot record structure (extends knot-record.schema.yaml)
knot_record:
  type: object
  required:
    - knot_id
    - crossing_number
    - braid_index
    - hyperbolic_volume
    - alternating
    - data_quality_flags
    - missing_invariant_flags
  properties:
    knot_id:
      type: string
      description: Unique identifier for the knot (e.g., "8_19", "11n42")
      pattern: "^\\d+_\\w+$"
      examples:
        - "3_1"
        - "8_19"
        - "11n42"

    crossing_number:
      type: integer
      minimum: 1
      maximum: 13
      description: Minimum number of crossings in any diagram of the knot

    braid_index:
      type: integer
      minimum: 1
      description: Minimum braid index of the knot (must satisfy braid_index ≤ crossing_number)

    hyperbolic_volume:
      type: number
      minimum: 0
      description: Hyperbolic volume of the knot complement; 0 for non‑hyperbolic knots

    alternating:
      type: boolean
      description: True if the knot is alternating, False otherwise

    data_quality_flags:
      $ref: '#/data_quality_flags'

    missing_invariant_flags:
      $ref: '#/missing_invariant_flags'

    source_timestamp:
      type: string
      format: date-time
      description: ISO‑8601 timestamp of the source download

    checksum_sha256:
      type: string
      pattern: "^[a-f0-9]{64}$"
      description: SHA‑256 checksum of the raw JSON entry for this knot

# Data quality flags structure (per FR-002, FR-009, FR-010)
data_quality_flags:
  type: array
  description: Flags indicating data quality issues
  items:
    type: object
    required:
      - flag_type
      - flag_code
      - description
    properties:
      flag_type:
        type: string
        enum:
          - null_value
          - format_error
          - out_of_range
          - duplicate_record
          - ambiguous_classification
          - validation_failure
      flag_code:
        type: string
        description: Unique code for the flag (e.g., "DQ-001")
      description:
        type: string
        description: Human-readable description of the issue
      severity:
        type: string
        enum:
          - low
          - medium
          - high
          - critical
      field_affected:
        type: string
        description: Name of the field with the issue
        nullable: true
      recommended_action:
        type: string
        description: Suggested action to resolve the issue
        nullable: true

# Missing invariant flags structure (per FR-009)
missing_invariant_flags:
  type: array
  description: Flags indicating missing invariant values
  items:
    type: object
    required:
      - invariant_name
      - flag_code
      - description
    properties:
      invariant_name:
        type: string
        enum:
          - crossing_number
          - braid_index
          - hyperbolic_volume
          - alternating
          - arc_index
          - seifert_circle_count
          - bridge_number
      flag_code:
        type: string
        description: Unique code for the flag (e.g., "MI-001")
      description:
        type: string
        description: Human-readable description
      reason:
        type: string
        enum:
          - not_available_in_source
          - computation_failed
          - excluded_by_filter
          - uncomputable
      severity:
        type: string
        enum:
          - low
          - medium
          - high
          - critical

# Tie-breaking rules reference (per SC-007, T030)
tie_breaking_rules:
  type: object
  description: Reference to tie-breaking rule documentation
  properties:
    rules_document:
      type: string
      const: "tie_breaking_rules.md"
    priority_order:
      type: array
      items:
        type: string
      description: Order of preference for resolving ambiguities
      examples:
        - "braid_word"
        - "DT_code"
        - "lexicographic"

# Validation requirements (per FR-002, SC-007)
validation_requirements:
  type: object
  description: Dataset-level validation requirements
  properties:
    null_percentage_threshold:
      type: number
      const: 5
    format_pass_rate_threshold:
      type: number
      const: 99
    duplicate_count_threshold:
      type: integer
      const: 0
    hyperbolic_volume_match_threshold:
      type: number
      const: 90

# Schema dependencies
dependencies:
  - knot-record.schema.yaml
  - regression-model.schema.yaml (for downstream analysis)

# Notes and constraints
notes:
  - "Core invariants (crossing_number, braid_index) are TABULATED from Knot Atlas per FR-003/SC-008"
  - "Additional invariants (arc_index, seifert_circle_count, bridge_number) are COMPUTED in Phase 2+ per SC-010"
  - "Constitution Principle VI applies to computed invariants only"
  - "Dataset filtered to hyperbolic knots (volume > 0) per FR-012"
  - "Ambiguous alternating/non-alternating cases handled per FR-010 and T043a"
  - "Braid index constraint: braid_index ≤ crossing_number (documented in mathematical_constraints.md)"
