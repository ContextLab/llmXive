$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionOutput"
description: "Schema for regression model output and metrics"
type: "object"
required:
  - "model_id"
  - "model_type"
  - "coefficients"
  - "metrics"
  - "vif_scores"
properties:
  model_id:
    type: "string"
    description: "Unique identifier for the model run"
  model_type:
    type: "string"
    description: "Type of regression model"
    enum:
      - "linear"
      - "polynomial"
      - "logarithmic"
      - "ridge"
  coefficients:
    type: "object"
    description: "Map of feature name to coefficient value"
    additionalProperties:
      type: "number"
  metrics:
    type: "object"
    description: "Goodness-of-fit metrics"
    required:
      - "r_squared"
      - "aic"
      - "bic"
      - "mae"
    properties:
      r_squared:
        type: "number"
        description: "Coefficient of determination"
      aic:
        type: "number"
        description: "Akaike Information Criterion"
      bic:
        type: "number"
        description: "Bayesian Information Criterion"
      mae:
        type: "number"
        description: "Mean Absolute Error"
  vif_scores:
    type: "object"
    description: "Variance Inflation Factor for each predictor"
    additionalProperties:
      type: "number"
  residual_outliers:
    type: "array"
    description: "List of knot_ids with residuals ≥ 2 standard deviations"
    items:
      type: "string"
  description:
    type: "string"
    description: "Descriptive note on model interpretation (census data caveat)"
    const: "Coefficients are descriptive associations within the finite census; braid_index ≤ crossing_number constraint acknowledged. Ridge regression used for stability."
additionalProperties: false