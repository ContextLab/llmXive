$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotDataset"
description: "Schema for the validated knot dataset used in the complexity analysis."
type: object
properties:
  knot_id:
    type: string
    description: "Unique identifier for the knot (e.g., '3_1')."
  crossing_number:
    type: integer
    minimum: 0
    description: "Minimum crossing number (c)."
  braid_index:
    type: integer
    minimum: 0
    description: "Minimal braid index (b)."
  hyperbolic_volume:
    type: number
    minimum: 0
    description: "Hyperbolic volume (V); zero for non‑hyperbolic knots."
  alternating:
    type: boolean
    description: "True if the knot is alternating, false otherwise."
  data_quality_flags:
    type: array
    items:
      type: string
    description: "List of data‑quality flags per FR‑002."
  missing_invariant_flags:
    type: array
    items:
      type: string
    description: "List of missing‑invariant flags per FR‑009."
  source_timestamp:
    type: string
    format: date-time
    description: "ISO‑8601 timestamp of the source download."
  checksum_sha256:
    type: string
    description: "SHA‑256 checksum of the raw JSON entry for this knot."
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - alternating
  - source_timestamp
  - checksum_sha256
additionalProperties: false