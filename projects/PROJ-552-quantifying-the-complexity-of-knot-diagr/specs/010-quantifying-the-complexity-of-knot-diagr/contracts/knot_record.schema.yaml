$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with attributes including crossing number, braid index, alternating classification, and hyperbolic volume"
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier (e.g., \"8_19\", \"10_124\")"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Minimum number of crossings in any diagram representation"
    minimum: 1
    maximum: 13
  braid_index:
    type: "integer"
    description: "Minimum number of strands in any braid representation"
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume (0 for torus/satellite knots, > 0 for hyperbolic knots)"
    minimum: 0
  is_alternating:
    type: "boolean"
    description: "True if alternating knot; False if non-alternating"
  dt_code:
    type: ["string", "null"]
    description: "Dowker-Thistlethwaite code (may be null)"
  braid_word:
    type: ["string", "null"]
    description: "Braid word representation (may be null)"
  data_quality_flags:
    type: "array"
    description: "Data quality issues (null values, format failures, duplicates)"
    items:
      type: "string"
      enum:
        - "null_crossing_number"
        - "null_braid_index"
        - "null_hyperbolic_volume"
        - "invalid_dt_code"
        - "invalid_braid_word"
        - "duplicate_knot_id"
  missing_invariant_flags:
    type: "array"
    description: "Invariants not computable from available diagram representations"
    items:
      type: "string"
      enum:
        - "no_representation"
        - "algorithm_not_implemented"
  is_hyperbolic:
    type: "boolean"
    description: "True if hyperbolic_volume > 0 (used for filtering per FR-012)"
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - is_alternating
  - data_quality_flags
  - missing_invariant_flags
  - is_hyperbolic
additionalProperties: false
