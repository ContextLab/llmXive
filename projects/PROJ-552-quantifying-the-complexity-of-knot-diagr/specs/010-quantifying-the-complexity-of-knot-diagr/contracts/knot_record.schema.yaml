$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with attributes including crossing number, braid index, alternating classification, and hyperbolic volume"
type: object
required:
  - knot_id
  - crossing_number
  - braid_index
  - source
  - download_timestamp
properties:
  knot_id:
    type: string
    description: "Unique identifier for the knot (e.g., \"10_123\", \"11n42\")"
    pattern: "^[0-9]+[a-zA-Z]?[0-9]*$"
  crossing_number:
    type: integer
    minimum: 1
    description: "Number of crossings in minimal diagram (tabulated from Knot Atlas)"
  braid_index:
    type: integer
    minimum: 1
    description: "Minimum number of strands for braid representation (tabulated from Knot Atlas)"
  hyperbolic_volume:
    type: ["number", "null"]
    minimum: 0
    description: "Hyperbolic volume of knot complement (NULL for torus/satellite knots)"
  is_alternating:
    type: ["boolean", "null"]
    description: "Alternating classification (NULL if ambiguous)"
  dt_code:
    type: ["string", "null"]
    description: "Dowker-Thistlethwaite code representation"
  braid_word:
    type: ["string", "null"]
    description: "Braid word representation"
  data_quality_flags:
    type: array
    items:
      type: string
    description: "General data quality issues (null values, format failures, duplicates)"
  missing_invariant_flags:
    type: array
    items:
      type: string
    description: "Invariants not computable from available representations"
  source:
    type: string
    description: "Data source identifier (e.g., \"knot_atlas\")"
  download_timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp when data was downloaded"
  checksum:
    type: string
    description: "SHA-256 checksum of raw record"
additionalProperties: false
