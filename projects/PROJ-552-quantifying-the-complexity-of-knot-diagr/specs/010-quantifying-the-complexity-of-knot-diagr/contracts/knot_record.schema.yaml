$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Schema for a single prime knot record with topological and geometric invariants."
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier for the knot (e.g., '10_123')."
  crossing_number:
    type: "integer"
    description: "Number of crossings in minimal diagram."
    minimum: 1
    maximum: 13
  braid_index:
    type: "integer"
    description: "Minimum number of strands in braid representation."
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Volume of hyperbolic complement (null for non-hyperbolic)."
    minimum: 0
  is_alternating:
    type: ["boolean", "null"]
    description: "Classification as alternating or non-alternating (null if ambiguous)."
  data_quality_flags:
    type: "array"
    items:
      type: "string"
    description: "General data quality issues (null values, format failures, duplicates)."
  missing_invariant_flags:
    type: "array"
    items:
      type: "string"
    description: "Invariants not computable from available diagram representations."
required:
  - knot_id
  - crossing_number
  - braid_index
additionalProperties: false
