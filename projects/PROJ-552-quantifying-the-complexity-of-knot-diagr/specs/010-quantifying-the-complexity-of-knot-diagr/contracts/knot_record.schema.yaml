$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Schema for a single prime knot record with invariants"
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier for the knot (e.g., '8_19')"
  crossing_number:
    type: "integer"
    description: "Number of crossings in the minimal diagram"
  braid_index:
    type: "integer"
    description: "Minimum number of strands in a braid representation"
    nullable: true
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume of the knot complement"
    nullable: true
    minimum: 0
  is_alternating:
    type: "boolean"
    description: "Classification as alternating or non-alternating"
    nullable: true
  data_quality_flags:
    type: "array"
    description: "Flags for general data quality issues"
    items:
      type: "string"
  missing_invariant_flags:
    type: "array"
    description: "Flags for invariants not computable from representations"
    items:
      type: "string"
  source:
    type: "string"
    description: "Data source (e.g., 'knot_atlas')"
  checksum:
    type: "string"
    description: "SHA-256 checksum of the raw record"
required:
  - "knot_id"
  - "crossing_number"
  - "source"
  - "checksum"
additionalProperties: false
