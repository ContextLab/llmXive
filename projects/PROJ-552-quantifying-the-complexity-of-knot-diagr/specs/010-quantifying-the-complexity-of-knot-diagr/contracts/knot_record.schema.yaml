$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord Schema"
description: "Schema for individual knot record with invariants and quality flags"
type: object
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - is_alternating
properties:
  knot_id:
    type: string
    description: "Unique identifier (e.g., \"10_123\")"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: integer
    description: "Minimum number of crossings"
    minimum: 1
    maximum: 13
  braid_index:
    type: integer
    description: "Minimum number of strands in braid representation"
    minimum: 1
  hyperbolic_volume:
    type: number
    description: "Hyperbolic volume (0 or undefined for torus/satellite)"
    minimum: 0
  is_alternating:
    type: boolean
    description: "Alternating classification"
  dt_code:
    type:
      - string
      - "null"
    description: "Dowker-Thistlethwaite code"
  braid_word:
    type:
      - string
      - "null"
    description: "Braid word representation"
  data_quality_flags:
    type: array
    items:
      type: string
    description: "General data quality issues (null values, format failures, duplicates)"
  missing_invariant_flags:
    type: array
    items:
      type: string
    description: "Invariants not computable from available representations"
  phase_1_validated:
    type: boolean
    description: "True if crossing number ≤10 (validated completeness)"
  is_hyperbolic:
    type: boolean
    description: "True if hyperbolic volume >0"
    default: false
additionalProperties: false