$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Schema for a single prime knot record from Knot Atlas (SINGLE SOURCE OF TRUTH)"
type: "object"
required:
  - "knot_id"
  - "crossing_number"
  - "braid_index"
  - "hyperbolic_volume"
  - "source"
  - "checksum_sha256"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier for the knot (e.g., '8_18')"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Number of crossings in the minimal diagram"
    minimum: 1
  braid_index:
    type: "integer"
    description: "Minimum number of strands in braid representation"
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Volume of the hyperbolic complement"
    minimum: 0
  alternating:
    type: ["boolean", "null"]
    description: "Whether the knot is alternating. Null if ambiguous."
  source:
    type: "object"
    description: "Metadata about the source record"
    required:
      - "database"
      - "version"
      - "url"
      - "accessed_at"
    properties:
      database:
        type: "string"
        description: "Name of the database"
        const: "Knot Atlas"
      version:
        type: "string"
        description: "Version of the database"
      url:
        type: "string"
        format: "uri"
        description: "Canonical URL for the record"
      accessed_at:
        type: "string"
        format: "date-time"
        description: "ISO-8601 timestamp of download"
      source_timestamp:
        type: ["string", "null"]
        format: "date-time"
        description: "ISO-8601 timestamp of the source record"
      checksum_sha256:
        type: ["string", "null"]
        description: "SHA-256 of the raw source record"
  data_quality_flags:
    type: "array"
    description: "General data quality issues"
    items:
      type: "string"
    default: []
  missing_invariant_flags:
    type: "array"
    description: "Specific missing invariants (Phase 2+)"
    items:
      type: "string"
    default: []
  checksum_sha256:
    type: "string"
    description: "SHA-256 of the processed record"
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false