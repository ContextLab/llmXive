$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Schema for a single prime knot record with invariants."
type: "object"
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - alternating
  - source
properties:
  knot_id:
    type: string
    description: "Unique identifier for the knot. Format: \"3_1\", \"8_19\", etc."
    pattern: "^\\d+_\\w+$"
    minLength: 5
  crossing_number:
    type: integer
    description: "Crossing number (c)."
    minimum: 1
    maximum: 13
  braid_index:
    type: integer
    description: "Braid index (b)."
    minimum: 1
  hyperbolic_volume:
    type: number
    description: "Hyperbolic volume (V); zero for non‑hyperbolic knots."
    minimum: 0
  alternating:
    type: boolean
    description: "True if alternating, false otherwise."
  source:
    type: object
    description: "Source attribution."
    required:
      - database
      - version
      - url
    properties:
      database:
        type: string
        enum: ["KnotAtlas", "KnotInfo"]
      version:
        type: string
      url:
        type: string
        format: uri
additionalProperties: false