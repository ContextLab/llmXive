$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Schema for a single prime knot record with invariants from Knot Atlas"
type: "object"
required:
  - knot_id
  - crossing_number
  - braid_index
  - source
  - checksum
properties:
  knot_id:
    type: "string"
    description: "Unique identifier (e.g., \"10_5\" for crossing number 10, knot 5)"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Minimum number of crossings in any diagram (tabulated)"
    minimum: 1
  braid_index:
    type: "integer"
    description: "Minimum number of strands in any braid representation (tabulated)"
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Volume of knot complement (zero/undefined for torus/satellite knots)"
    minimum: 0
    nullable: true
  is_alternating:
    type: "boolean"
    description: "Alternating vs. non-alternating classification"
    nullable: true
  dt_code:
    type: "string"
    description: "Dowker-Thistlethwaite code representation"
    nullable: true
  braid_word:
    type: "string"
    description: "Braid word representation"
    nullable: true
  data_quality_flags:
    type: "string"
    description: "General data quality issues (null values, format failures, duplicates)"
    nullable: true
  missing_invariant_flags:
    type: "string"
    description: "Specifically when invariants cannot be computed from available representations"
    nullable: true
  source:
    type: "string"
    description: "Data source (e.g., \"knot_atlas\")"
  checksum:
    type: "string"
    description: "SHA-256 hash of record (for reproducibility)"
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false