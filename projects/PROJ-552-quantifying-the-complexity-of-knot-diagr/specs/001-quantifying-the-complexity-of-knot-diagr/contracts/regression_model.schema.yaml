$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted model with attributes for comparison"
type: "object"
properties:
  model_id:
    type: "string"
    description: "Unique identifier"
    pattern: "^model_[0-9a-f]{8}$"
  model_type:
    type: "string"
    description: "Model type classification"
    enum:
      - "linear"
      - "polynomial"
  degree:
    type: "integer"
    description: "Polynomial degree (1 for linear)"
    minimum: 1
    maximum: 5
  coefficients:
    type: "array"
    description: "Model coefficients"
    items:
      type: "number"
    minItems: 2
    maxItems: 6
  r_squared:
    type: "number"
    description: "R² goodness-of-fit"
    minimum: 0
    maximum: 1
  aic:
    type: "number"
    description: "Akaike Information Criterion"
  bic:
    type: "number"
    description: "Bayesian Information Criterion"
  training_size:
    type: "integer"
    description: "Number of training samples"
    minimum: 1
  validation_size:
    type: "integer"
    description: "Number of validation samples"
    minimum: 1
  random_seed:
    type: "integer"
    description: "Seed used for train/validation split"
  split_method:
    type: "string"
    description: "Method used for train/validation split"
    enum:
      - "stratified_by_crossing_number"
      - "random"
  stratification_variable:
    type: ["string", "null"]
    description: "Variable used for stratification"
  composite_score_correlation:
    type: ["object", "null"]
    description: "Correlation metrics for composite complexity score"
    properties:
      arc_index_pearson:
        type: "number"
        description: "Pearson correlation with arc index"
      arc_index_spearman:
        type: "number"
        description: "Spearman correlation with arc index"
      seifert_pearson:
        type: "number"
        description: "Pearson correlation with Seifert circle count"
      seifert_spearman:
        type: "number"
        description: "Spearman correlation with Seifert circle count"
      p_value:
        type: "number"
        description: "P-value for correlation significance"
      effect_size:
        type: "number"
        description: "Cohen's d or r effect size"
      effect_size_type:
        type: "string"
        description: "Type of effect size measure"
        enum:
          - "cohen_d"
          - "pearson_r"
          - "spearman_r"
    required:
      - arc_index_pearson
      - arc_index_spearman
      - seifert_pearson
      - seifert_spearman
      - p_value
      - effect_size
      - effect_size_type
  group_comparison:
    type: ["object", "null"]
    description: "ANOVA results for alternating vs non-alternating groups"
    properties:
      f_statistic:
        type: "number"
        description: "F-statistic from ANOVA"
      p_value:
        type: "number"
        description: "P-value for group difference"
      cohen_d:
        type: "number"
        description: "Effect size (Cohen's d)"
      alternating_mean:
        type: "number"
        description: "Mean for alternating group"
      non_alternating_mean:
        type: "number"
        description: "Mean for non-alternating group"
    required:
      - f_statistic
      - p_value
      - cohen_d
      - alternating_mean
      - non_alternating_mean
required:
  - model_id
  - model_type
  - degree
  - coefficients
  - r_squared
  - aic
  - bic
  - training_size
  - validation_size
  - random_seed
  - split_method
additionalProperties: false
