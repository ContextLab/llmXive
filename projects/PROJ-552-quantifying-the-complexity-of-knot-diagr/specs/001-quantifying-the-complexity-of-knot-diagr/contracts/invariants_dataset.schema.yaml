$schema: http://json-schema.org/draft-07/schema#
title: InvariantsDataset
type: object
description: Aggregated collection of KnotRecord entities with metadata
required:
  - dataset_id
  - created_at
  - random_seed
  - total_knots
  - alternating_count
  - non_alternating_count
  - unclassifiable_count
  - missing_invariant_counts
  - checksums
properties:
  dataset_id:
    type: string
    description: "Unique identifier for this dataset version"
  created_at:
    type: string
    description: "ISO 8601 timestamp of dataset creation"
    format: date-time
  random_seed:
    type: integer
    description: "Random seed used for any stochastic operations"
  total_knots:
    type: integer
    description: "Total number of knots in dataset"
    minimum: 0
  alternating_count:
    type: integer
    description: "Number of alternating knots"
    minimum: 0
  non_alternating_count:
    type: integer
    description: "Number of non-alternating knots"
    minimum: 0
  unclassifiable_count:
    type: integer
    description: "Number of knots with ambiguous classification"
    minimum: 0
  missing_invariant_counts:
    type: object
    description: "Count of records missing each invariant type"
    properties:
      arc_index:
        type: integer
        minimum: 0
      seifert_circle_count:
        type: integer
        minimum: 0
      bridge_number:
        type: integer
        minimum: 0
    additionalProperties: false
  source_urls:
    type: array
    description: "Original data source URLs (may be empty if no verified sources)"
    items:
      type: string
  checksums:
    type: object
    description: "SHA-256 checksums for all data files"
    additionalProperties:
      type: string
      pattern: "^[a-f0-9]{64}$"
additionalProperties: false
