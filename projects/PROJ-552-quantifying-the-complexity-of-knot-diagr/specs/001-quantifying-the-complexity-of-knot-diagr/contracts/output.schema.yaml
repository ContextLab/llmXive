$schema: "http://json-schema.org/draft-07/schema#"
title: "Validation Results Schema"
description: "Schema for validation results including correlation analysis and model metrics"
type: "object"
required:
  - "validation_id"
  - "test_set_knots"
  - "correlation_results"
  - "model_comparison"
  - "validation_timestamp"
  - "validation_seed"
properties:
  validation_id:
    type: "string"
    description: "Unique validation run identifier"
  test_set_knots:
    type: "array"
    description: "Knot IDs in held-out test set (20% stratified split)"
    items:
      type: "string"
  correlation_results:
    type: "object"
    description: "Correlation analysis results for composite complexity score"
    required:
      - "arc_index"
      - "seifert_circle_count"
    properties:
      arc_index:
        type: "object"
        description: "Correlation with arc index"
        required:
          - "pearson"
          - "spearman"
        properties:
          pearson:
            type: "object"
            description: "Pearson correlation coefficient"
            required:
              - "coefficient"
              - "p_value"
            properties:
              coefficient:
                type: "number"
                description: "Pearson correlation coefficient"
              p_value:
                type: "number"
                description: "P-value for Pearson correlation"
                minimum: 0
                maximum: 1
              confidence_interval:
                type: "array"
                description: "95% confidence interval"
                items:
                  type: "number"
                minItems: 2
                maxItems: 2
          spearman:
            type: "object"
            description: "Spearman correlation coefficient"
            required:
              - "coefficient"
              - "p_value"
            properties:
              coefficient:
                type: "number"
                description: "Spearman correlation coefficient"
              p_value:
                type: "number"
                description: "P-value for Spearman correlation"
                minimum: 0
                maximum: 1
              confidence_interval:
                type: "array"
                description: "95% confidence interval"
                items:
                  type: "number"
                minItems: 2
                maxItems: 2
          effect_size:
            type: "object"
            description: "Effect size measures"
            required:
              - "r_squared"
            properties:
              r_squared:
                type: "number"
                description: "Coefficient of determination"
                minimum: 0
                maximum: 1
      seifert_circle_count:
        type: "object"
        description: "Correlation with Seifert circle count"
        required:
          - "pearson"
          - "spearman"
        properties:
          pearson:
            type: "object"
            description: "Pearson correlation coefficient"
            required:
              - "coefficient"
              - "p_value"
            properties:
              coefficient:
                type: "number"
                description: "Pearson correlation coefficient"
              p_value:
                type: "number"
                description: "P-value for Pearson correlation"
                minimum: 0
                maximum: 1
              confidence_interval:
                type: "array"
                description: "95% confidence interval"
                items:
                  type: "number"
                minItems: 2
                maxItems: 2
          spearman:
            type: "object"
            description: "Spearman correlation coefficient"
            required:
              - "coefficient"
              - "p_value"
            properties:
              coefficient:
                type: "number"
                description: "Spearman correlation coefficient"
              p_value:
                type: "number"
                description: "P-value for Spearman correlation"
                minimum: 0
                maximum: 1
              confidence_interval:
                type: "array"
                description: "95% confidence interval"
                items:
                  type: "number"
                minItems: 2
                maxItems: 2
          effect_size:
            type: "object"
            description: "Effect size measures"
            required:
              - "r_squared"
            properties:
              r_squared:
                type: "number"
                description: "Coefficient of determination"
                minimum: 0
                maximum: 1
  model_comparison:
    type: "object"
    description: "Comparison of linear vs. non-linear regression models"
    required:
      - "linear"
      - "polynomial"
    properties:
      linear:
        type: "object"
        description: "Linear regression model metrics"
        required:
          - "r_squared"
          - "aic"
          - "bic"
        properties:
          r_squared:
            type: "number"
            description: "R² goodness-of-fit"
            minimum: 0
            maximum: 1
          aic:
            type: "number"
            description: "Akaike Information Criterion"
          bic:
            type: "number"
            description: "Bayesian Information Criterion"
      polynomial:
        type: "object"
        description: "Polynomial regression model metrics"
        required:
          - "degree"
          - "r_squared"
          - "aic"
          - "bic"
        properties:
          degree:
            type: "integer"
            description: "Polynomial degree"
            minimum: 2
          r_squared:
            type: "number"
            description: "R² goodness-of-fit"
            minimum: 0
            maximum: 1
          aic:
            type: "number"
            description: "Akaike Information Criterion"
          bic:
            type: "number"
            description: "Bayesian Information Criterion"
      anova_results:
        type:
          - "object"
          - "null"
        description: "ANOVA results for alternating vs. non-alternating group differences (exploratory)"
        required:
          - "f_statistic"
          - "p_value"
          - "effect_size"
        properties:
          f_statistic:
            type: "number"
            description: "F-statistic from ANOVA"
          p_value:
            type: "number"
            description: "P-value for ANOVA"
            minimum: 0
            maximum: 1
          effect_size:
            type: "object"
            description: "Cohen's d effect size"
            required:
              - "cohen_d"
            properties:
              cohen_d:
                type: "number"
                description: "Cohen's d effect size"
  validation_timestamp:
    type: "string"
    description: "When validation was performed (ISO 8601 format)"
    format: "date-time"
  validation_seed:
    type: "integer"
    description: "Random seed used for test set split"
    minimum: 0
  dataset_completeness:
    type: "object"
    description: "Dataset completeness metrics (SC-001, SC-006)"
    required:
      - "total_knots"
      - "crossing_number_range"
      - "required_fields_complete"
    properties:
      total_knots:
        type: "integer"
        description: "Total number of knots in dataset"
      crossing_number_range:
        type: "object"
        description: "Range of crossing numbers"
        required:
          - "min"
          - "max"
        properties:
          min:
            type: "integer"
            description: "Minimum crossing number"
            minimum: 1
          max:
            type: "integer"
            description: "Maximum crossing number"
            maximum: 13
      required_fields_complete:
        type: "number"
        description: "Percentage of records with required fields populated"
        minimum: 0
        maximum: 100
