$schema: "http://json-schema.org/draft-07/schema#"
title: "Knot Dataset Schema"
description: "Schema for validating knot dataset records from Knot Atlas download and invariant computation pipeline"
type: "object"
required:
  - "knot_id"
  - "crossing_number"
  - "braid_index"
  - "alternating"
  - "data_source"
  - "checksum"
  - "created_at"
properties:
  knot_id:
    type: "string"
    pattern: "^[0-9]+_[0-9]+$"
    description: "Unique identifier in format {crossing_number}_{index}"
  crossing_number:
    type: "integer"
    minimum: 1
    maximum: 13
    description: "Minimal crossing number in any diagram"
  braid_index:
    type: "integer"
    minimum: 2
    description: "Minimal number of strands in any braid representation"
  alternating:
    type: "boolean"
    description: "Whether knot is alternating classification"
  arc_index:
    type:
      - "integer"
      - "null"
    minimum: 1
    description: "Minimum number of arcs in any arc presentation"
  seifert_circle_count:
    type:
      - "integer"
      - "null"
    minimum: 1
    description: "Number of Seifert circles in minimal crossing diagram"
  bridge_number:
    type:
      - "integer"
      - "null"
    minimum: 1
    description: "Minimum number of bridges in bridge decomposition"
  diagram_representation:
    type:
      - "string"
      - "null"
    enum:
      - "braid_word"
      - "dt_code"
      - "crossing_diagram"
      - "null"
    description: "Type of diagram representation available"
  missing_invariant_flags:
    type: "array"
    items:
      type: "string"
    description: "Flags for missing/computed invariants"
  data_source:
    type: "string"
    description: "Source of data"
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of record"
  created_at:
    type: "string"
    format: "date-time"
    description: "When record was created in ISO 8601 format"
additionalProperties: false
