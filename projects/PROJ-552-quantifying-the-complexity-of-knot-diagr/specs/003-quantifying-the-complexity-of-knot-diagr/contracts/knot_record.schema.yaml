$schema: https://json-schema.org/draft/2020-12/schema
title: KnotRecord Schema
description: Schema for individual prime knot records with computed invariants
type: object
required:
  - knot_id
  - crossing_number
  - braid_index
  - checksum
properties:
  knot_id:
    type: string
    description: "Unique identifier for the knot (e.g., \"10_123\")"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: integer
    description: "Minimal crossing number for the knot"
    minimum: 1
    maximum: 13
  braid_index:
    type: integer
    description: "Minimal braid index for the knot"
    minimum: 1
  arc_index:
    type:
      - integer
      - "null"
    description: "Arc index computed via Birman-Menasco method"
    minimum: 1
  seifert_circle_count:
    type:
      - integer
      - "null"
    description: "Seifert circle count via Seifert's algorithm"
    minimum: 1
  bridge_number:
    type:
      - integer
      - "null"
    description: "Bridge number via Schubert's bridge decomposition"
    minimum: 1
  is_alternating:
    type:
      - boolean
      - "null"
    description: "Alternating classification (True/False/Null for unclassifiable)"
  hyperbolic_volume:
    type:
      - number
      - "null"
    description: "Hyperbolic volume (Null for torus/satellite knots where undefined)"
    minimum: 0
  missing_invariant_flags:
    type: array
    description: "List of flags for uncomputable invariants"
    items:
      type: string
      enum:
        - "braid_word_unavailable"
        - "dt_code_incomplete"
        - "no_diagram_representation"
        - "hyperbolic_volume_undefined"
  diagram_representation:
    type:
      - string
      - "null"
    description: "Preferred representation type for invariant computation"
    enum:
      - "braid_word"
      - "dt_code"
      - "null"
  checksum:
    type: string
    description: "SHA-256 hash for reproducibility verification"
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false
