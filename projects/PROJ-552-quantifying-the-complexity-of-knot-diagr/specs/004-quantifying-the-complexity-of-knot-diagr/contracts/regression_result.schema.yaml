$schema: http://json-schema.org/draft-07/schema#
title: RegressionResult
description: "DEPRECATED: This schema is superseded by regression_output.schema.yaml. Use regression_output.schema.yaml for all new implementations. Maintained for backward compatibility only."
type: object
required:
 - model_id
 - model_type
 - predictors
 - coefficients
 - r_squared
 - fitted_at
properties:
 model_id:
 type: string
 description: "Unique identifier for model instance"
 model_type:
 type: string
 description: "One of: linear, polynomial, logarithmic"
 enum:
 - "linear"
 - "polynomial"
 - "logarithmic"
 predictors:
 type: array
 description: "List of predictor variables used"
 items:
 type: string
 minItems: 1
 coefficients:
 type: object
 description: "Model coefficients with names"
 additionalProperties:
 type: number
 intercept:
 type: number
 description: "Model intercept"
 r_squared:
 type: number
 description: "Coefficient of determination"
 minimum: 0
 maximum: 1
 adjusted_r_squared:
 type: number
 description: "Adjusted R-squared"
 nullable: true
 aic:
 type: number
 description: "Akaike Information Criterion"
 nullable: true
 bic:
 type: number
 description: "Bayesian Information Criterion"
 nullable: true
 mae:
 type: number
 description: "Mean Absolute Error"
 minimum: 0
 nullable: true
 vif_values:
 type: object
 description: "Variance Inflation Factors per predictor (reported with mathematical constraint context)"
 additionalProperties:
 type: number
 nullable: true
 training_sample_size:
 type: integer
 description: "Number of records in training sample"
 minimum: 1
 validation_sample_size:
 type: integer
 description: "Number of records in validation sample"
 minimum: 1
 nullable: true
 random_seed:
 type: integer
 description: "Seed used for sample split"
 nullable: true
 fitted_at:
 type: string
 description: "When model was fitted"
 format: date-time
 pearson_correlation:
 type: number
 description: "Pearson correlation with hyperbolic volume"
 nullable: true
 spearman_correlation:
 type: number
 description: "Spearman correlation with hyperbolic volume"
 nullable: true
 effect_size_r:
 type: number
 description: "Effect size for correlation"
 nullable: true
 p_value:
 type: number
 description: "Statistical significance p-value"
 nullable: true
 residuals_summary:
 type: object
 description: "Summary of residual analysis identifying deviating knot families"
 nullable: true
 properties:
 deviating_families:
 type: array
 description: "List of knot families with significant deviations"
 items:
 type: string
 max_residual:
 type: number
 description: "Maximum absolute residual value"
 min_residual:
 type: number
 description: "Minimum absolute residual value"
additionalProperties: false