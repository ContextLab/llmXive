$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with computed and tabulated invariants"
type: "object"
required:
  - "knot_id"
  - "crossing_number"
  - "braid_index"
  - "data_source"
  - "computed_at"
  - "checksum"
properties:
  knot_id:
    type: "string"
    description: "Primary key (e.g., \"3_1\", \"4_1\", \"13_00001\")"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Tabulated crossing number from Knot Atlas"
    minimum: 1
    maximum: 13
  braid_index:
    type: "integer"
    description: "Braid index (algorithmic or tabulated)"
    minimum: 1
  arc_index:
    type: "integer"
    description: "Computed via Birman-Menasco method"
    minimum: 1
    nullable: true
  seifert_circle_count:
    type: "integer"
    description: "Computed via Seifert algorithm on minimal crossing diagram"
    minimum: 1
    nullable: true
  bridge_number:
    type: "integer"
    description: "Computed via Schubert bridge decomposition"
    minimum: 2
    nullable: true
  is_alternating:
    type: "boolean"
    description: "Alternating classification"
    nullable: true
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume (excluded if 0 or undefined)"
    minimum: 0
    nullable: true
  diagram_representation:
    type: "string"
    description: "Available diagram representation type"
    enum:
      - "braid_word"
      - "dt_code"
      - "both"
      - "none"
    nullable: true
  missing_invariant_flags:
    type: "array"
    description: "Flags for invariants that could not be computed"
    items:
      type: "string"
      enum:
        - "arc_index"
        - "seifert_circles"
        - "bridge_number"
    nullable: true
  data_source:
    type: "string"
    description: "Source of primary data"
    enum:
      - "knot_atlas"
      - "computed"
  computed_at:
    type: "string"
    description: "Timestamp of invariant computation"
    format: "date-time"
  checksum:
    type: "string"
    description: "Content hash for reproducibility (SHA-256)"
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false
