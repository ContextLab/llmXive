$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted statistical model for predicting hyperbolic volume"
type: "object"
properties:
 model_id:
 type: "string"
 description: "Unique identifier for the model"
 pattern: "^regression_(linear|polynomial|logarithmic)_[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
 model_type:
 type: "string"
 description: "Type of regression model"
 enum:
 - "linear"
 - "polynomial"
 - "logarithmic"
 predictors:
 type: "array"
 description: "List of predictor variables"
 items:
 type: "string"
 minItems: 2
 contains:
 const: "crossing_number"
 contains:
 const: "braid_index"
 coefficients:
 type: "object"
 description: "Model coefficients"
 additionalProperties:
 type: "number"
 intercept:
 type: "number"
 description: "Model intercept"
 r_squared:
 type: "number"
 description: "Coefficient of determination"
 minimum: 0.0
 maximum: 1.0
 adjusted_r_squared:
 type: "number"
 description: "Adjusted R² for number of predictors"
 minimum: 0.0
 maximum: 1.0
 aic:
 type: "number"
 description: "Akaike Information Criterion"
 bic:
 type: "number"
 description: "Bayesian Information Criterion"
 mae:
 type: "number"
 description: "Mean Absolute Error"
 minimum: 0.0
 rmse:
 type: "number"
 description: "Root Mean Squared Error"
 minimum: 0.0
 vif_scores:
 type: "object"
 description: "Variance Inflation Factors for predictors"
 additionalProperties:
 type: "number"
 minimum: 1.0
 residual_outliers:
 type: "array"
 description: "Knot IDs that deviate significantly from predictions"
 items:
 type: "string"
 minItems: 0
 training_sample_size:
 type: "integer"
 description: "Number of knots in training sample"
 minimum: 1
 validation_sample_size:
 type: "integer"
 description: "Number of knots in validation sample"
 minimum: 1
 random_seed:
 type: "integer"
 description: "Random seed used for sample split"
 created_at:
 type: "string"
 description: "ISO 8601 timestamp of model creation"
 pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
required:
 - model_id
 - model_type
 - predictors
 - coefficients
 - intercept
 - r_squared
 - adjusted_r_squared
 - aic
 - bic
 - mae
 - rmse
 - vif_scores
 - residual_outliers
 - training_sample_size
 - validation_sample_size
 - random_seed
 - created_at
additionalProperties: false
