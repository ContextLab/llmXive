$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionModel"
description: "Represents fitted regression model with coefficients, metrics, and validation data"
type: "object"
required:
  - "model_id"
  - "model_type"
  - "coefficients"
  - "metrics"
  - "vif_values"
  - "created_at"
properties:
  model_id:
    type: "string"
    description: "Unique identifier for the model"
    pattern: "^model_[a-z]+_[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    example: "model_linear_2026-05-31T14:30:00Z"
  model_type:
    type: "string"
    description: "Type of regression model"
    enum:
      - "linear"
      - "polynomial"
      - "logarithmic"
    example: "linear"
  coefficients:
    type: "object"
    description: "Model coefficients"
    properties:
      intercept:
        type: "number"
        description: "Intercept term"
        example: -1.5
      crossing_number:
        type: "number"
        description: "Coefficient for crossing number predictor"
        example: 0.25
      braid_index:
        type: "number"
        description: "Coefficient for braid index predictor"
        example: 0.15
      crossing_number_squared:
        type: ["number", "null"]
        description: "Coefficient for squared crossing number (polynomial only)"
        example: 0.02
    additionalProperties: true
  metrics:
    type: "object"
    description: "Goodness-of-fit metrics"
    properties:
      r_squared:
        type: "number"
        description: "Coefficient of determination"
        minimum: 0
        maximum: 1
        example: 0.78
      aic:
        type: "number"
        description: "Akaike Information Criterion"
        example: 1250.5
      bic:
        type: "number"
        description: "Bayesian Information Criterion"
        example: 1265.3
      mae:
        type: "number"
        description: "Mean Absolute Error"
        example: 0.45
    required:
      - "r_squared"
      - "aic"
      - "bic"
      - "mae"
  vif_values:
    type: "object"
    description: "Variance Inflation Factors for multicollinearity assessment"
    properties:
      crossing_number:
        type: "number"
        description: "VIF for crossing number predictor"
        example: 4.2
      braid_index:
        type: "number"
        description: "VIF for braid index predictor"
        example: 3.8
    required:
      - "crossing_number"
      - "braid_index"
  validation_data:
    type: "object"
    description: "Validation sample information"
    properties:
      split_ratio:
        type: "number"
        description: "Proportion of data used for validation"
        example: 0.2
      random_seed:
        type: "integer"
        description: "Random seed for reproducibility"
        example: 42
      pearson_correlation:
        type: "number"
        description: "Pearson correlation coefficient"
        minimum: -1
        maximum: 1
        example: 0.85
      spearman_correlation:
        type: "number"
        description: "Spearman correlation coefficient"
        minimum: -1
        maximum: 1
        example: 0.82
      effect_size_r:
        type: "number"
        description: "Effect size for correlation"
        example: 0.72
    required:
      - "split_ratio"
      - "random_seed"
      - "pearson_correlation"
      - "spearman_correlation"
  residuals:
    type: ["array", "null"]
    description: "Residual analysis results identifying knot families with significant deviations"
    items:
      type: "object"
      properties:
        knot_family:
          type: "string"
          description: "Name of knot family (e.g., pretzel, torus)"
          example: "pretzel"
        residual_mean:
          type: "number"
          description: "Mean residual for this family"
          example: 1.25
        residual_std:
          type: "number"
          description: "Standard deviation of residuals"
          example: 0.35
        count:
          type: "integer"
          description: "Number of knots in this family"
          example: 15
      required:
        - "knot_family"
        - "residual_mean"
        - "count"
  created_at:
    type: "string"
    description: "ISO 8601 timestamp of model creation"
    format: "date-time"
    example: "2026-05-31T14:30:00Z"
additionalProperties: false
