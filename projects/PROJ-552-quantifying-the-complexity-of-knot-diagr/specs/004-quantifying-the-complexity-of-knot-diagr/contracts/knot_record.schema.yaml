$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with all associated invariants"
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier (e.g., \"10_123\" for 123rd knot with 10 crossings)"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Tabulated crossing number (minimum crossings in any diagram)"
    minimum: 0
  braid_index:
    type: "integer"
    description: "Minimum number of strands in any braid representation"
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume of knot complement"
    exclusiveMinimum: 0
  is_alternating:
    type: ["boolean", "null"]
    description: "Whether knot is alternating or non-alternating (null = unclassifiable)"
  arc_index:
    type: ["integer", "null"]
    description: "Minimum number of arcs in any grid diagram (computed)"
    minimum: 0
  seifert_circle_count:
    type: ["integer", "null"]
    description: "Number of Seifert circles from Seifert's algorithm (computed)"
    minimum: 1
  bridge_number:
    type: ["integer", "null"]
    description: "Minimum number of bridges in any bridge decomposition (computed)"
    minimum: 1
  dt_code:
    type: ["string", "null"]
    description: "Dowker-Thistlethwaite code representation"
  braid_word:
    type: ["string", "null"]
    description: "Braid word representation"
  missing_invariant_flags:
    type: ["array", "null"]
    description: "Flags for which invariants could not be computed"
    items:
      type: "string"
      enum:
        - "no_representation_available"
        - "algorithm_not_implemented"
  data_source:
    type: "string"
    description: "Source of the knot data"
    const: "knot_atlas"
  data_timestamp:
    type: "string"
    description: "ISO 8601 timestamp of data download"
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - is_alternating
  - data_source
  - data_timestamp
additionalProperties: false
