$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord Schema"
description: "Schema for individual knot records in the knot complexity analysis dataset"
type: "object"
required:
 - "knot_id"
 - "crossing_number"
 - "braid_index"
 - "data_source"
 - "checksum"
properties:
 knot_id:
 type: "string"
 description: "Unique identifier for the knot (e.g., \"3_1\", \"4_1\")"
 pattern: "^[0-9]+_[0-9]+$"
 crossing_number:
 type: "integer"
 minimum: 1
 maximum: 13
 description: "Tabulated crossing number (minimal crossing count)"
 braid_index:
 type: "integer"
 minimum: 1
 description: "Braid index from algorithmic determination or tabulated value"
 arc_index:
 type: ["integer", "null"]
 minimum: 1
 description: "Computed via Birman-Menasco method; null if not computable"
 seifert_circle_count:
 type: ["integer", "null"]
 minimum: 1
 description: "Computed via Seifert's algorithm; null if not computable"
 bridge_number:
 type: ["integer", "null"]
 minimum: 1
 description: "Computed via Schubert's decomposition; null if not computable"
 is_alternating:
 type: ["boolean", "null"]
 description: "Alternating classification; null if ambiguous/missing"
 hyperbolic_volume:
 type: ["number", "null"]
 minimum: 0
 description: "Hyperbolic volume; null for torus/satellite knots (volume zero or undefined)"
 dt_code:
 type: ["string", "null"]
 description: "Dowker-Thistlethwaite code representation"
 braid_word:
 type: ["string", "null"]
 description: "Braid word representation"
 missing_invariant_flags:
 type: "array"
 items:
 type: "string"
 enum:
 - "arc_index"
 - "seifert_circle_count"
 - "bridge_number"
 description: "List of invariants that could not be computed"
 data_source:
 type: "string"
 description: "Source of data (e.g., \"knot_atlas\")"
 checksum:
 type: "string"
 pattern: "^[a-f0-9]{64}$"
 description: "SHA-256 checksum of record data"
additionalProperties: false
