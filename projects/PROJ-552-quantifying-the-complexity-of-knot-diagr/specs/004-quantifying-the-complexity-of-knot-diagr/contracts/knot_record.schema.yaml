$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with computed invariants"
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier for the knot"
  crossing_number:
    type: "integer"
    minimum: 1
    description: "Minimum number of crossings in any diagram"
  braid_index:
    type: "integer"
    minimum: 1
    description: "Minimum number of strands in any braid representation"
  arc_index:
    type: ["integer", "null"]
    description: "Arc index computed via Birman-Menasco method"
  seifert_circle_count:
    type: ["integer", "null"]
    description: "Seifert circle count from Seifert's algorithm"
  bridge_number:
    type: ["integer", "null"]
    description: "Bridge number from Schubert's decomposition"
  is_alternating:
    type: "boolean"
    description: "True if alternating, false if non-alternating"
  hyperbolic_volume:
    type: ["number", "null"]
    description: "Hyperbolic volume (null for torus/satellite knots)"
  dt_code:
    type: ["string", "null"]
    description: "Dowker-Thistlethwaite code"
  braid_word:
    type: ["string", "null"]
    description: "Braid word representation"
  missing_invariant_flags:
    type: "array"
    items:
      type: "string"
    description: "Flags for invariants that could not be computed"
  data_source:
    type: "string"
    description: "Source of the record (e.g., \"knot_info\")"
required:
  - knot_id
  - crossing_number
  - braid_index
  - is_alternating
  - missing_invariant_flags
  - data_source
additionalProperties: false