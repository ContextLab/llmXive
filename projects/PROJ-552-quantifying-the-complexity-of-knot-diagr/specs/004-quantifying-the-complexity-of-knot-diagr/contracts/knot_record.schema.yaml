$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "KnotRecord Schema"
description: "Schema for a single prime knot record with computed and tabulated invariants"
required:
  - "knot_id"
  - "crossing_number"
  - "braid_index"
  - "hyperbolic_volume"
  - "is_alternating"
  - "data_source"
  - "computation_timestamp"
  - "checksum"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier for the knot (e.g., '10_123' for 123rd knot with 10 crossings)"
    pattern: "^[0-9]+_[0-9]+$"
  crossing_number:
    type: "integer"
    description: "Tabulated crossing number"
    minimum: 3
    maximum: 13
  braid_index:
    type: "integer"
    description: "Algorithmically determined braid index"
    minimum: 2
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume (geometric invariant)"
    minimum: 0
  is_alternating:
    type: "boolean"
    description: "Alternating classification (true = alternating, false = non-alternating)"
  arc_index:
    type: "integer"
    description: "Computed arc index via Birman-Menasco method"
    minimum: 2
    nullable: true
  seifert_circle_count:
    type: "integer"
    description: "Computed Seifert circle count via Seifert's algorithm"
    minimum: 1
    nullable: true
  bridge_number:
    type: "integer"
    description: "Computed bridge number via Schubert's bridge decomposition"
    minimum: 2
    nullable: true
  dt_code:
    type: "string"
    description: "Dowker-Thistlethwaite code representation"
    nullable: true
  braid_word:
    type: "string"
    description: "Braid word representation"
    nullable: true
  missing_invariant_flags:
    type: "array"
    description: "Flags for missing computable invariants"
    items:
      type: "string"
      enum:
        - "no_representation_available"
        - "algorithm_not_implemented"
        - "computation_failed"
  data_source:
    type: "string"
    description: "Source of data"
    enum:
      - "knot_atlas"
      - "computed"
      - "knotinfo"
  computation_timestamp:
    type: "string"
    description: "ISO 8601 timestamp when invariants were computed"
    format: "date-time"
  checksum:
    type: "string"
    description: "SHA-256 checksum of the record"
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false
