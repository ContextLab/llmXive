$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with attributes including crossing number, braid index, and computed invariants"
type: object
properties:
 knot_id:
 type: string
 description: "Unique identifier for the knot (e.g., \"3_1\", \"8_19\")"
 pattern: "^[0-9]+_[0-9]+$"
 crossing_number:
 type: integer
 description: "Tabulated crossing number (minimal representation)"
 minimum: 1
 braid_index:
 type: integer
 description: "Computed braid index"
 minimum: 1
 hyperbolic_volume:
 type: ["number", "null"]
 description: "Hyperbolic volume (null for torus/satellite knots with zero or undefined volume)"
 minimum: 0
 alternating_classification:
 type: string
 description: "Classification as alternating, non‑alternating, or unclassifiable"
 enum:
 - "alternating"
 - "non-alternating"
 - "unclassifiable"
 arc_index:
 type: ["integer", "null"]
 description: "Computed via Birman‑Menasco method; null if not computable"
 minimum: 3
 seifert_circle_count:
 type: ["integer", "null"]
 description: "Computed via Seifert's algorithm on minimal crossing diagram; null if not computable"
 minimum: 1
 bridge_number:
 type: ["integer", "null"]
 description: "Computed via Schubert's bridge decomposition; null if not computable"
 minimum: 2
 missing_invariant_flags:
 type: array
 description: "Flags for missing computable invariants"
 items:
 type: string
 enum:
 - "no_representation_available"
 - "algorithm_not_implemented"
 - "computation_failed"
 diagram_representation_type:
 type: ["string", "null"]
 description: "Type of diagram representation available for invariant computation"
 enum:
 - "braid_word"
 - "dt_code"
 - "both"
 source_checksum:
 type: string
 description: "SHA‑256 checksum of source data file"
 pattern: "^[a-f0-9]{64}$"
 computation_timestamp:
 type: string
 description: "ISO 8601 timestamp of invariant computation"
 format: date-time
required:
 - knot_id
 - crossing_number
 - braid_index
 - alternating_classification
 - source_checksum
 - computation_timestamp
additionalProperties: false