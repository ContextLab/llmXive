$schema: http://json-schema.org/draft-07/schema#
title: KnotRecord
description: "Schema for individual knot records with computed invariants (canonical version)"
type: object
required:
 - knot_id
 - crossing_number
 - data_source
 - checksum
 - created_at
 - alternating_classification
properties:
 knot_id:
 type: string
 description: "Unique identifier (e.g., \"3_1\", \"4_1\")"
 pattern: "^[0-9]+_[0-9]+$"
 crossing_number:
 type: integer
 description: "Minimum number of crossings in any diagram"
 minimum: 3
 braid_index:
 type: integer
 description: "Minimum number of strands in braid representation"
 minimum: 1
 nullable: true
 arc_index:
 type: integer
 description: "Computed via Birman-Menasco algorithm"
 nullable: true
 seifert_circle_count:
 type: integer
 description: "Computed via Seifert's algorithm"
 nullable: true
 bridge_number:
 type: integer
 description: "Computed via Schubert's bridge decomposition"
 nullable: true
 alternating_classification:
 type: string
 description: "Alternating classification status"
 enum:
 - "alternating"
 - "non-alternating"
 - "unclassifiable"
 hyperbolic_volume:
 type: number
 description: "Geometric volume (zero/undefined for torus/satellite)"
 nullable: true
 diagram_representation:
 type: string
 description: "DT code or braid word representation"
 nullable: true
 missing_invariant_flags:
 type: array
 description: "List of invariants that could not be computed"
 items:
 type: string
 default: []
 data_source:
 type: string
 description: "Source of data (e.g., \"knot_atlas\")"
 enum:
 - "knot_atlas"
 - "knot_info"
 - "computed"
 checksum:
 type: string
 description: "SHA-256 checksum of raw record"
 pattern: "^[a-f0-9]{64}$"
 created_at:
 type: string
 description: "Record creation timestamp"
 format: date-time
 missing_invariant_flags_reason:
 type: string
 description: "Reason for missing invariant flags if any"
 nullable: true
additionalProperties: false