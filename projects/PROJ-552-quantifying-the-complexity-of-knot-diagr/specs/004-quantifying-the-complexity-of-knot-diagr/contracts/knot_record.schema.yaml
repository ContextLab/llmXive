$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotRecord"
description: "Represents a single prime knot with attributes including computed invariants and classification"
type: "object"
properties:
  knot_id:
    type: "string"
    description: "Unique identifier (e.g., \"3_1\", \"4_1\", \"10_123\")"
  crossing_number:
    type: "integer"
    description: "Minimal crossing number of the knot"
    minimum: 0
  braid_index:
    type: "integer"
    description: "Minimal braid index (algorithmically determined)"
    minimum: 1
  hyperbolic_volume:
    type: "number"
    description: "Hyperbolic volume (filtered for valid values)"
    minimum: 0
  is_alternating:
    type: "string"
    description: "Alternating classification (true/false/unclassifiable)"
    enum:
      - "true"
      - "false"
      - "unclassifiable"
  arc_index:
    type: "integer"
    description: "Arc index (computed via Birman-Menasco)"
    minimum: 1
    nullable: true
  seifert_circle_count:
    type: "integer"
    description: "Seifert circle count (computed via Seifert's algorithm)"
    minimum: 1
    nullable: true
  bridge_number:
    type: "integer"
    description: "Bridge number (computed via Schubert's decomposition)"
    minimum: 1
    nullable: true
  dt_code:
    type: "string"
    description: "Dowker-Thistlethwaite code representation"
    nullable: true
  braid_word:
    type: "string"
    description: "Braid word representation"
    nullable: true
  missing_invariant_flags:
    type: "array"
    description: "Flags for missing computable invariants"
    items:
      type: "string"
    default: []
  data_source:
    type: "string"
    description: "Source of original data (e.g., \"knot_atlas\")"
  download_timestamp:
    type: "string"
    description: "When data was downloaded (ISO 8601 format)"
    format: "date-time"
  checksum_sha256:
    type: "string"
    description: "SHA-256 checksum of source record"
    pattern: "^[a-f0-9]{64}$"
required:
  - knot_id
  - crossing_number
  - braid_index
  - hyperbolic_volume
  - is_alternating
  - data_source
  - download_timestamp
  - checksum_sha256
additionalProperties: false