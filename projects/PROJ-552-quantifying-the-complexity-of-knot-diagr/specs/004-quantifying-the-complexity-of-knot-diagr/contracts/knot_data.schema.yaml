$schema: "http://json-schema.org/draft-07/schema#"
title: "KnotData"
description: "DEPRECATED: This schema is superseded by knot_record.schema.yaml. Use knot_record.schema.yaml for all new implementations. Maintained for backward compatibility only."
type: "object"
required:
 - "knot_id"
 - "crossing_number"
 - "braid_index"
 - "alternating_classification"
 - "source_checksum"
properties:
 knot_id:
   type: "string"
   description: "Unique identifier for the knot (e.g., \"10_123\", \"13_4567\")"
   pattern: "^[0-9]+_[0-9]+$"
 crossing_number:
   type: "integer"
   description: "Minimal crossing count"
   minimum: 1
   maximum: 13
 braid_index:
   type: "integer"
   description: "Minimal braid representation index"
   minimum: 1
 arc_index:
   type: ["integer", "null"]
   description: "Computed arc index (null if not computable)"
   minimum: 1
   nullable: true
 seifert_circle_count:
   type: ["integer", "null"]
   description: "Computed Seifert circle count (null if not computable)"
   minimum: 1
   nullable: true
 bridge_number:
   type: ["integer", "null"]
   description: "Computed bridge number (null if not computable)"
   minimum: 1
   nullable: true
 hyperbolic_volume:
   type: ["number", "null"]
   description: "Geometric volume (null for torus/satellite knots)"
   minimum: 0
   nullable: true
 alternating_classification:
   type: "string"
   description: "Alternating classification (null if ambiguous)"
   enum:
     - "alternating"
     - "non-alternating"
     - "unclassifiable"
 dt_code:
   type: ["string", "null"]
   description: "Dowker‑Thistlethwaite code"
   nullable: true
 braid_word:
   type: ["string", "null"]
   description: "Braid word representation"
   nullable: true
 missing_invariant_flags:
   type: "array"
   description: "Flags for missing invariants"
   items:
     type: "string"
     enum:
       - "no_representation_available"
       - "algorithm_not_implemented"
       - "computation_failed"
   default: []
 data_source:
   type: "string"
   description: "Source of data (e.g., \"KnotInfo\")"
   enum:
     - "KnotInfo"
     - "HTW"
     - "Knot Atlas"
 source_checksum:
   type: "string"
   description: "SHA‑256 checksum of raw record"
   pattern: "^[a-f0-9]{64}$"
additionalProperties: false