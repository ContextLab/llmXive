$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionOutput"
description: "Schema for regression model outputs in the knot complexity analysis. CANONICAL SCHEMA - use for code/models/*.json files. Dataset size reference: the cumulative total of prime knots for crossing number ≤13 per OEIS A002863 (https://oeis.org/A002863)."
type: "object"
required:
 - "model_id"
 - "model_type"
 - "predictors"
 - "coefficients"
 - "r_squared"
 - "vif_scores"
 - "validation_type"
properties:
 model_id:
   type: "string"
   description: "Unique identifier for the model"
 model_type:
   type: "string"
   enum:
   - "linear"
   - "polynomial"
   - "logarithmic"
   - "ridge"
   description: "Type of regression model (polynomial=degree 2, logarithmic=base e)"
 predictors:
   type: "array"
   items:
     type: "string"
   minItems: 1
   description: "List of predictor variables"
 coefficients:
   type: "object"
   description: "Model coefficients (key-value pairs)"
 r_squared:
   type: "number"
   minimum: 0
   maximum: 1
   description: "R² goodness-of-fit metric"
 aic:
   type: "number"
   description: "Akaike Information Criterion"
 bic:
   type: "number"
   description: "Bayesian Information Criterion"
 mae:
   type: "number"
   minimum: 0
   description: "Mean Absolute Error"
 vif_scores:
   type: "object"
   description: "Variance Inflation Factors for each predictor (reported with mathematical constraint context)"
   additionalProperties:
     type: "number"
     minimum: 1
 training_sample_size:
   type: "integer"
   minimum: 1
   description: "Number of knots in training sample"
 validation_sample_size:
   type: "integer"
   minimum: 1
   description: "Number of knots in validation sample"
 random_seed:
   type: "integer"
   description: "Random seed used for sample split"
 validation_type:
   type: "string"
   enum:
   - "hypothesis-generating"
   - "hypothesis-confirming"
   - "full-dataset-correlation"
   description: "Nature of validation (full-dataset-correlation for this project)"
   default: "full-dataset-correlation"
 methodological_note:
   type: "string"
   description: "Note about methodology (e.g., full-dataset correlation analysis, not ML predictive modeling)"
   default: "Full-dataset correlation analysis; not train/validation split"
additionalProperties: false