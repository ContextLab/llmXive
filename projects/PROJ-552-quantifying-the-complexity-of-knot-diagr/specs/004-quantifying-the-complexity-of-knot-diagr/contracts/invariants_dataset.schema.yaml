$schema: "http://json-schema.org/draft-07/schema#"
title: "InvariantsDataset"
description: "Aggregated collection of KnotRecord entities with metadata (DEPRECATED: use invariants-dataset.schema.yaml)"
type: "object"
required:
  - "dataset_id"
  - "total_records"
  - "crossing_number_range"
  - "data_source"
  - "created_at"
  - "checksum"
properties:
  dataset_id:
    type: "string"
    description: "Unique dataset identifier"
  knot_records:
    type: "array"
    description: "Array of knot records"
    items:
      $ref: "#/definitions/KnotRecord"
  total_records:
    type: "integer"
    description: "Total number of knots in dataset"
    minimum: 0
  crossing_number_range:
    type: "object"
    description: "Min and max crossing numbers"
    properties:
      min:
        type: "integer"
        minimum: 0
      max:
        type: "integer"
        minimum: 0
    required:
      - min
      - max
  alternating_count:
    type: "integer"
    description: "Count of alternating knots"
    minimum: 0
  non_alternating_count:
    type: "integer"
    description: "Count of non-alternating knots"
    minimum: 0
  unclassifiable_count:
    type: "integer"
    description: "Count of unclassifiable knots"
    minimum: 0
  hyperbolic_volume_available:
    type: "integer"
    description: "Count with valid hyperbolic volume"
    minimum: 0
  data_source:
    type: "string"
    description: "Primary data source"
    enum:
      - "knot_atlas"
      - "computed"
  created_at:
    type: "string"
    description: "Dataset creation timestamp"
    format: "date-time"
  checksum:
    type: "string"
    description: "SHA-256 of entire dataset"
    pattern: "^[a-f0-9]{64}$"
  derivation_notes:
    type: "string"
    description: "Path to derivation documentation"
    pattern: "^docs/reproducibility/.*\\.md$"
additionalProperties: false
definitions:
  KnotRecord:
    $ref: "../knot-record.schema.yaml"