$schema: "http://json-schema.org/draft-07/schema#"
title: "InvariantsDataset"
description: "Aggregated collection of KnotRecord entities with metadata about data source and computation timestamps"
type: object
properties:
 dataset_id:
 type: string
 description: "Unique identifier for this dataset version"
 pattern: "^dataset_[0-9]+$"
 knot_records:
 type: array
 description: "Collection of individual knot records"
 items:
 $ref: "#/definitions/KnotRecord"
 data_source:
 type: string
 description: "Source of the knot data"
 enum:
 - "knot_atlas"
 - "knot_info"
 - "hoste_thistlethwaite_weeks"
 download_timestamp:
 type: string
 description: "ISO 8601 timestamp of data download"
 format: date-time
 crossing_number_range:
 type: object
 description: "Range of crossing numbers in dataset"
 properties:
 min:
 type: integer
 minimum: 1
 max:
 type: integer
 minimum: 1
 required:
 - min
 - max
 total_knots:
 type: integer
 description: "Total count of all records"
 minimum: 1
 alternating_count:
 type: integer
 description: "Count of alternating knots"
 minimum: 0
 non_alternating_count:
 type: integer
 description: "Count of non-alternating knots"
 minimum: 0
 volume_available_count:
 type: integer
 description: "Count of knots with valid hyperbolic volume"
 minimum: 0
 schema_version:
 type: string
 description: "Data model schema version"
 pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
 validation_scope:
 type: string
 description: "Scope of validation for Phase 1 (crossing number ≤10 validated, ≤13 collected)"
 enum:
 - "phase1_validated_le_10"
 - "full_le_13"
 prime_knot_counts:
 type: object
 description: "Prime knot counts per crossing number from OEIS A002863"
 additionalProperties:
 type: integer
 minimum: 0
definitions:
 KnotRecord:
 type: object
 properties:
 knot_id:
 type: string
 crossing_number:
 type: integer
 braid_index:
 type: integer
 hyperbolic_volume:
 type: ["number", "null"]
 alternating_classification:
 type: string
 enum:
 - "alternating"
 - "non-alternating"
 - "unclassifiable"
 missing_invariant_flags:
 type: array
 items:
 type: string
 required:
 - knot_id
 - crossing_number
 - braid_index
 - alternating_classification
required:
 - dataset_id
 - data_source
 - download_timestamp
 - crossing_number_range
 - total_knots
 - alternating_count
 - non_alternating_count
 - schema_version
 - validation_scope
additionalProperties: false