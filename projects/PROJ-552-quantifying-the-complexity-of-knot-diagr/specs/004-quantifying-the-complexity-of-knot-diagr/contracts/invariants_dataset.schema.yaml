$schema: "http://json-schema.org/draft-07/schema#"
title: "InvariantsDataset"
description: "Aggregated collection of KnotRecord entities with metadata"
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Unique dataset identifier"
  knot_records:
    type: "array"
    description: "Array of knot records"
    items:
      $ref: "#/definitions/KnotRecord"
  total_knots:
    type: "integer"
    description: "Total number of knots in dataset"
    minimum: 0
  crossing_number_range:
    type: "object"
    description: "Min and max crossing numbers"
    properties:
      min:
        type: "integer"
        minimum: 0
      max:
        type: "integer"
        minimum: 0
    required:
      - min
      - max
  alternating_count:
    type: "integer"
    description: "Count of alternating knots"
    minimum: 0
  non_alternating_count:
    type: "integer"
    description: "Count of non-alternating knots"
    minimum: 0
  unclassifiable_count:
    type: "integer"
    description: "Count of unclassifiable knots"
    minimum: 0
  data_source:
    type: "string"
    description: "Primary data source"
  created_timestamp:
    type: "string"
    description: "When dataset was created (ISO 8601 format)"
    format: "date-time"
  checksum_sha256:
    type: "string"
    description: "SHA-256 checksum of dataset file"
    pattern: "^[a-f0-9]{64}$"
definitions:
  KnotRecord:
    type: "object"
    properties:
      knot_id:
        type: "string"
      crossing_number:
        type: "integer"
        minimum: 0
      braid_index:
        type: "integer"
        minimum: 1
      hyperbolic_volume:
        type: "number"
        minimum: 0
      is_alternating:
        type: "string"
        enum:
          - "true"
          - "false"
          - "unclassifiable"
      arc_index:
        type: "integer"
        minimum: 1
        nullable: true
      seifert_circle_count:
        type: "integer"
        minimum: 1
        nullable: true
      bridge_number:
        type: "integer"
        minimum: 1
        nullable: true
      dt_code:
        type: "string"
        nullable: true
      braid_word:
        type: "string"
        nullable: true
      missing_invariant_flags:
        type: "array"
        items:
          type: "string"
        default: []
      data_source:
        type: "string"
      download_timestamp:
        type: "string"
        format: "date-time"
      checksum_sha256:
        type: "string"
        pattern: "^[a-f0-9]{64}$"
    required:
      - knot_id
      - crossing_number
      - braid_index
      - hyperbolic_volume
      - is_alternating
      - data_source
      - download_timestamp
      - checksum_sha256
    additionalProperties: false
required:
  - dataset_id
  - knot_records
  - total_knots
  - crossing_number_range
  - alternating_count
  - non_alternating_count
  - unclassifiable_count
  - data_source
  - created_timestamp
  - checksum_sha256
additionalProperties: false
