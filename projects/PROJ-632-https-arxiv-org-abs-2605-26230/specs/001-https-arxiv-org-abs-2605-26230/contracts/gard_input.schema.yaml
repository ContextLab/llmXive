$schema: "http://json-schema.org/draft-07/schema#"
title: "GARD Input Dataset Schema"
description: "Schema for the input multi-view dataset required for GARD inference. Validates the presence of raw image pixels."
type: "object"
properties:
  dataset_path:
    type: "string"
    description: "Path to the directory containing input images."
    pattern: "^data/.+$"
  images:
    type: "array"
    description: "List of image file paths relative to dataset_path. Must contain raw pixel data."
    items:
      type: "string"
      pattern: "^(view_\\d+\\.png|view_\\d+\\.jpg)$"
    minItems: 1
  metadata:
    type: "object"
    description: "Optional metadata about the scene."
    properties:
      scene_id:
        type: "string"
      resolution:
        type: "object"
        properties:
          width:
            type: "integer"
            maximum: 640
          height:
            type: "integer"
            maximum: 480
        required:
          - width
          - height
required:
  - dataset_path
  - images
additionalProperties: false