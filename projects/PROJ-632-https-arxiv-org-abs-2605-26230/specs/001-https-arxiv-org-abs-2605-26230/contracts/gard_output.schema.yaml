$schema: "http://json-schema.org/draft-07/schema#"
title: "GARD Output Artifacts Schema"
description: "Schema for the generated 3D geometry and restored images."
type: "object"
properties:
  geometry:
    type: "object"
    description: "3D geometry output file."
    properties:
      path:
        type: "string"
        pattern: "^outputs/geometry/.+\\.(ply|obj)$"
      format:
        type: "string"
        enum: ["ply", "obj"]
      valid:
        type: "boolean"
        description: "True if the file is non-empty and loadable."
    required:
      - path
      - format
      - valid
  images:
    type: "object"
    description: "Restored RGB images."
    properties:
      paths:
        type: "array"
        items:
          type: "string"
          pattern: "^outputs/images/restored_\\d+\\.png$"
        minItems: 1
      valid:
        type: "boolean"
        description: "True if all images are non-corrupt."
    required:
      - paths
      - valid
  execution_status:
    type: "object"
    properties:
      exit_code:
        type: "integer"
        enum: [0]
      duration_seconds:
        type: "number"
        description: "Total runtime in seconds."
        maximum: 21600
      memory_peak_gb:
        type: "number"
        description: "Peak memory usage."
        maximum: 7.0
    required:
      - exit_code
      - duration_seconds
      - memory_peak_gb
  scientific_validation:
    type: "object"
    description: "Validation metrics against baseline (Gaussian Blur)."
    properties:
      lpips_vs_input:
        type: "number"
        description: "LPIPS distance between output and input."
      lpips_vs_blur:
        type: "number"
        description: "LPIPS distance between output and blur baseline."
      niqe_score:
        type: "number"
        description: "NIQE score of the output."
      conclusion:
        type: "string"
        enum: ["Success", "Partial Success", "Scientific Null", "Failed"]
        description: "Final validity conclusion."
    required:
      - conclusion
required:
  - geometry
  - images
  - execution_status
  - scientific_validation
additionalProperties: false