$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for the final correlation analysis results."
type: "object"
properties:
  window_length:
    type: "integer"
    description: "Sliding window length in seconds (30, 60, 90)."
  rho:
    type: "number"
    description: "Partial Spearman correlation coefficient."
  p_value_raw:
    type: "number"
    description: "Raw p-value from the correlation test."
  p_value_perm:
    type: "number"
    description: "P-value from the permutation test (5,000 permutations)."
  significant:
    type: "boolean"
    description: "True if p_value_perm < 0.0167 (Bonferroni-corrected alpha)."
  sensitivity_stable:
    type: "boolean"
    description: "True if max absolute difference in p-values across window lengths < 0.05."
  motion_stratum:
    type: "string"
    description: "Motion stratum: 'Low' or 'High'."
    enum:
      - "Low"
      - "High"
  inference_framing:
    type: "string"
    description: "Must be 'associational'."
    enum:
      - "associational"
required:
  - window_length
  - rho
  - p_value_raw
  - p_value_perm
  - significant
  - sensitivity_stable
  - motion_stratum
  - inference_framing
additionalProperties: false
