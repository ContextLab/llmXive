[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .eggs,
    *.egg-info,
    build,
    dist
ignore = E203, E266, W503
per-file-ignores =
    # Allow unused imports in __init__.py for public API exposure
    code/**/__init__.py:F401

[pylint.FORMAT]
max-line-length = 100

[pylint.MESSAGES CONTROL]
disable =
    missing-docstring,
    too-few-public-methods,
    too-many-locals,
    too-many-arguments,
    too-many-statements,
    too-many-instance-attributes,
    import-outside-toplevel,
    cyclic-import,
    duplicate-code,
    invalid-name,
    line-too-long

[pylint.DESIGN]
max-args = 10
max-locals = 20
max-returns = 8
max-branches = 20
max-statements = 100
max-attributes = 15
max-public-methods = 25

[pylint.BASIC]
good-names = i, j, k, df, ts, fd, rs, main
