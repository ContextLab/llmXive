# fMRIPrep Configuration File
# Project: PROJ-383 - Network Module Dynamics in Working Memory
# Purpose: Standardized preprocessing pipeline to ensure reproducibility and
#          satisfy Constitution Principle VI (Transparency and Reproducibility).
#
# This configuration enforces:
# 1. Consistent skull-stripping using the HCP-MMP parcellation template
# 2. Standard spatial normalization to MNI152NLin2009cAsym (2mm)
# 3. Comprehensive motion correction and registration
# 4. Explicit output of confound regressors (FD, motion parameters, derivatives)
#    required for downstream scrubbing and regression (Task T012b).

# --- Core Settings ---
# Do not change these unless the dataset structure changes
subject-labels: ["100307", "100408", "100604", "100703", "100802"]  # Example subset for validation
nprocs: 4  # Adjust based on available CPU cores
omp-nthreads: 4

# --- Spatial Normalization ---
# Use the MNI152NLin2009cAsym template (2mm resolution) as per HCP standards
# This ensures compatibility with the HCP-MMP atlas used in downstream analysis
output-spaces: MNI152NLin2009cAsym
mni-no-atlases: false

# --- Skull Stripping ---
# Use the HCP-MMP derived brain mask for consistent extraction
# This is critical for accurate registration and subsequent connectivity analysis
skull-strip-template: 'MNI152NLin2009cAsym'
skull-strip-t1w: true

# --- Registration ---
# Use boundary-based registration (BBR) for improved alignment
# This is standard for HCP data and improves functional-to-structural alignment
t1w-volume-to-template: true
t1w-registration: true

# --- Confounds and Quality Control ---
# Generate comprehensive confound regressors
# Includes: motion parameters, derivatives, FD, aCompCor components
# These are essential for Task T012b (motion scrubbing and regression)
confounds:
  - motion
  - derivatives
  - global_signal
  - white_matter
  - csf
  - aCompCor
  - fd
  - dvars

# --- Output Options ---
# Generate preprocessed files in BIDS Derivatives format
# Ensures interoperability with downstream analysis scripts
output-derivatives: true
deriv-dir: data/derivatives

# --- Logging and Reproducibility ---
# Log all processing steps for audit trail
# Required for Constitution Principle VI compliance
verbose: true
log-level: INFO
