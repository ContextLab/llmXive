[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-omnidirector"
version = "0.1.0"
description = "OmniDirector: General Multi-Shot Camera Cloning"
requires-python = ">=3.11"
dependencies = [
    "opencv-python",
    "numpy",
    "pandas",
    "scipy",
    "pytest",
    "pyyaml",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
