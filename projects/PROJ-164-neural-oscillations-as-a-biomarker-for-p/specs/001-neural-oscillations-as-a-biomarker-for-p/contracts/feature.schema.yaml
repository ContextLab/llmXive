$schema: "http://json-schema.org/draft-07/schema#"
title: "Feature Vector Schema"
description: "Schema for the extracted EEG features per subject"
type: object
properties:
  subject_id:
    type: string
    description: "Unique identifier for the subject"
  spectral_power:
    type: object
    properties:
      delta:
        type: number
        description: "Power in delta band"
      theta:
        type: number
        description: "Power in theta band"
      alpha:
        type: number
        description: "Power in alpha band"
      beta:
        type: number
        description: "Power in beta band"
      gamma:
        type: number
        description: "Power in gamma band"
    required:
      - delta
      - theta
      - alpha
      - beta
      - gamma
  connectivity:
    type: object
    description: "Map of channel pairs to PLV/wPLI values"
    additionalProperties:
      type: number
  tdcs_response:
    type: number
    description: "Percentage change in motor task score"
  normality_flag:
    type: boolean
    description: "True if data is non-normal (Shapiro-Wilk p < 0.05)"
required:
  - subject_id
  - spectral_power
  - connectivity
  - tdcs_response
  - normality_flag
additionalProperties: false
