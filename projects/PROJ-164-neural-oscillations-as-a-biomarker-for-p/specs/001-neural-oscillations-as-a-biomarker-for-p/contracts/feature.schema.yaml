$schema: "http://json-schema.org/draft-07/schema#"
title: "Feature Vector Schema"
description: "Schema for the feature matrix used in modeling."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the subject."
  power_delta:
    type: "number"
    description: "Spectral power in delta band (1-4 Hz)."
  power_theta:
    type: "number"
    description: "Spectral power in theta band (4-8 Hz)."
  power_alpha:
    type: "number"
    description: "Spectral power in alpha band (8-13 Hz)."
  power_beta:
    type: "number"
    description: "Spectral power in beta band (13-30 Hz)."
  power_gamma:
    type: "number"
    description: "Spectral power in gamma band (30-45 Hz)."
  plv_c3_c4:
    type: "number"
    description: "Phase Locking Value between C3 and C4."
  wpli_c3_c4:
    type: "number"
    description: "Weighted Phase Lag Index between C3 and C4."
  tdcs_response:
    type: "number"
    description: "Percentage change in motor task score."
required:
  - subject_id
  - power_delta
  - power_theta
  - power_alpha
  - power_beta
  - power_gamma
  - plv_c3_c4
  - wpli_c3_c4
  - tdcs_response
