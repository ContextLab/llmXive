$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
type: "object"
properties:
  model_type:
    type: "string"
    enum:
      - "ridge_regression"
    description: "Type of model used"
  cross_validation_folds:
    type: "integer"
    description: "Number of CV folds"
  adjusted_r2:
    type: "number"
    description: "Adjusted R-squared value"
  permutation_p_value:
    type:
      - "number"
      - "null"
    description: "P-value from permutation test. Null if mode == fallback."
  fdr_corrected_p_values:
    type:
      - "array"
      - "null"
    items:
      type: "number"
    description: "FDR corrected p-values for each feature (only in Primary Mode). Null if mode == fallback."
  sensitivity_analysis:
    type: "object"
    properties:
      p_thresholds:
        type: "array"
        items:
          type: "number"
      r2_thresholds:
        type: "array"
        items:
          type: "number"
      stability_variance:
        type: "number"
    description: "Results of sensitivity analysis"
  mode_flag:
    type: "string"
    enum:
      - "primary"
      - "fallback"
    description: "Mode in which the model was run"
  structural_validation_only:
    type: "boolean"
    description: "True if in fallback mode, claims are invalid"
  power_analysis:
    type: "object"
    properties:
      min_detectable_r2:
        type: "number"
      min_p_value:
        type: "number"
    description: "Power analysis results"
required:
  - model_type
  - cross_validation_folds
  - adjusted_r2
  - mode_flag
  - structural_validation_only
  - power_analysis
  - sensitivity_analysis