$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Manifest Schema"
description: "Schema for the raw dataset manifest metadata"
type: object
properties:
  source_url:
    type: string
    description: "The verified URL of the dataset"
  dataset_type:
    type: string
    enum:
      - "EEG"
      - "tDCS"
      - "Paired"
      - "None"
    description: "Type of data contained in the source"
  subject_count:
    type: integer
    minimum: 0
    description: "Number of unique subjects in the dataset"
  checksum:
    type: string
    description: "SHA-256 hash of the raw file"
  ingestion_status:
    type: string
    enum:
      - "success"
      - "failed"
      - "unanswerable"
    description: "Result of the ingestion process"
required:
  - source_url
  - dataset_type
  - subject_count
  - checksum
  - ingestion_status
additionalProperties: false
