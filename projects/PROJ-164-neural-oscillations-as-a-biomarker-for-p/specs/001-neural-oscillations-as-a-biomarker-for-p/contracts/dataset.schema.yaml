$schema: "http://json-schema.org/draft-07/schema#"
title: "Verified Source Manifest Schema"
description: "Schema for the verified_source_manifest.json artifact generated by the ingestion module."
type: "object"
properties:
  search_scope:
    type: "array"
    items:
      type: "string"
    description: "List of repositories searched (e.g., OpenNeuro, PhysioNet, Kaggle)."
  query:
    type: "string"
    description: "The search query used."
  paired_found:
    type: "boolean"
    description: "True if a single-source dataset with both EEG and tDCS scores was found."
  reason:
    type: "string"
    description: "Explanation of the result (e.g., 'No single-source paired dataset found')."
  sources_checked:
    type: "array"
    items:
      type: "object"
      properties:
        name:
          type: "string"
        url:
          type: "string"
          format: "uri"
        status:
          type: "string"
          enum: ["verified", "incomplete", "missing"]
    description: "List of datasets checked and their status."
required:
  - search_scope
  - query
  - paired_found
  - reason
  - sources_checked
