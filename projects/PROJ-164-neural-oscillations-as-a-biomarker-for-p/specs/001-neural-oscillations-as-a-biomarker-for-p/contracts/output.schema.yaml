$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the final validation report including metrics, coefficients, and flags."
type: "object"
properties:
  run_id:
    type: "string"
    description: "UUID for the specific run."
  mode:
    type: "string"
    enum:
      - "primary"
      - "fallback"
    description: "Processing mode."
  adjusted_r2:
    type: "number"
    description: "Adjusted R-squared value from Ridge Regression."
  permutation_p_value:
    type: "number"
    description: "P-value from 1,000 permutation tests."
  coefficients:
    type: "object"
    additionalProperties:
      type: "number"
    description: "Map of feature names to regression weights."
  fdr_corrected_p_values:
    type: "object"
    additionalProperties:
      type: "number"
    description: "Map of feature names to FDR-corrected p-values."
  sensitivity_sweep:
    type: "array"
    items:
      type: "object"
      properties:
        p_threshold:
          type: "number"
        r2_threshold:
          type: "number"
        stability_metric:
          type: "number"
          description: "Variance of significance outcome at this threshold."
      required:
        - "p_threshold"
        - "r2_threshold"
        - "stability_metric"
  flags:
    type: "array"
    items:
      type: "string"
    description: "List of flags (e.g., 'fallback_mode_active', 'primary_question_abandoned')."
required:
  - "run_id"
  - "mode"
  - "adjusted_r2"
  - "permutation_p_value"
  - "coefficients"
  - "fdr_corrected_p_values"
  - "sensitivity_sweep"
  - "flags"
additionalProperties: false
