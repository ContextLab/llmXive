$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Output Schema"
description: "Schema for the final results.json artifact (Primary Mode only)."
type: "object"
properties:
  analysis_mode:
    type: "string"
    enum: ["Primary Mode", "Data Insufficient Mode", "Underpowered"]
  model_type:
    type: "string"
    description: "Type of regression used (e.g., 'Ridge', 'Rank-Ridge')."
  r_squared:
    type: "number"
    description: "Coefficient of determination."
  p_values:
    type: "object"
    description: "Raw p-values for each feature."
  fdr_p_values:
    type: "object"
    description: "FDR-corrected p-values for each feature."
  ks_statistic:
    type: "number"
    description: "Kolmogorov-Smirnov statistic for null distribution uniformity."
  ks_p_value:
    type: "number"
    description: "P-value for the KS test."
  sensitivity_table:
    type: "array"
    items:
      type: "object"
      properties:
        p_threshold:
          type: "number"
        r_squared_threshold:
          type: "number"
        stability:
          type: "boolean"
    description: "Sensitivity analysis results."
  underpowered_flag:
    type: "boolean"
    description: "True if N < required minimum."
  min_n_required:
    type: "integer"
    description: "Minimum sample size required for power."
required:
  - analysis_mode
  - model_type
  - r_squared
  - p_values
  - fdr_p_values
  - ks_statistic
  - ks_p_value
  - sensitivity_table
  - underpowered_flag
  - min_n_required
