$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for the final analysis output of the pipeline."
type: "object"
properties:
  mode:
    type: "string"
    enum:
      - "Primary"
      - "Hypothesis_Unanswerable"
      - "Underpowered"
      - "Generalization_Unanswerable"
    description: "The execution mode of the pipeline."
  reason:
    type: "string"
    description: "Explanation for the selected mode."
  model_metrics:
    type:
      - "object"
      - "null"
    description: "Model performance metrics (R², adjusted R², p‑value, FDR‑corrected p‑values, KS test)."
    properties:
      r_squared:
        type: "number"
      adjusted_r_squared:
        type: "number"
      p_value:
        type: "number"
      fdr_p_values:
        type: "array"
        items:
          type: "number"
      ks_test_result:
        type: "object"
        description: "Kolmogorov‑Smirnov test result on permutation null distribution."
        properties:
          statistic:
            type: "number"
          p_value:
            type: "number"
        required:
          - statistic
          - p_value
        additionalProperties: false
    required:
      - r_squared
      - adjusted_r_squared
      - p_value
      - fdr_p_values
      - ks_test_result
    additionalProperties: false
  power_analysis:
    type: "object"
    properties:
      min_n_required:
        type: "integer"
      actual_n:
        type: "integer"
      status:
        type: "string"
        enum:
          - "Sufficient"
          - "Underpowered"
    required:
      - min_n_required
      - actual_n
      - status
  sensitivity_table:
    type: "array"
    description: "Sensitivity analysis results across thresholds."
    items:
      type: "object"
      properties:
        p_threshold:
          type: "number"
        r_squared_threshold:
          type: "number"
        significance:
          type: "boolean"
        stability:
          type: "string"
      required:
        - p_threshold
        - r_squared_threshold
        - significance
        - stability
required:
  - mode
  - reason
  - power_analysis
additionalProperties: false