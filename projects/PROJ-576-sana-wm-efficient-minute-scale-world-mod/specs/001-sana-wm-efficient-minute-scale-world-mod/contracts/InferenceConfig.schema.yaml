$schema: "http://json-schema.org/draft-07/schema#"
title: "InferenceConfig"
description: "Schema for the input configuration of the SANA-WM inference pipeline."
type: "object"
properties:
  prompt:
    type: "string"
    description: "Text prompt for video generation."
    minLength: 1
  pose_file:
    type: "string"
    description: "Path to the .npy camera pose file."
    pattern: ".*\\.npy$"
  duration:
    type: "number"
    description: "Duration in seconds."
    minimum: 1.0
    maximum: 60.0
  resolution:
    type: "string"
    description: "Target resolution string (e.g., '480p', '720p')."
    enum:
      - "360p"
      - "480p"
      - "720p"
  steps:
    type: "integer"
    description: "Number of diffusion steps."
    minimum: 1
    maximum: 100
  device:
    type: "string"
    description: "Target hardware device."
    enum:
      - "cpu"
      - "cuda"
  seed:
    type: "integer"
    description: "Random seed."
    minimum: 0
required:
  - prompt
  - pose_file
  - duration
  - resolution
  - steps
  - device
  - seed
additionalProperties: false