$schema: "http://json-schema.org/draft-07/schema#"
title: "CameraPose"
description: "Schema for 6-DoF camera pose input files (converted from .npy to JSON for validation)."
type: "object"
properties:
  pose_type:
    type: "string"
    description: "Type of pose file (e.g., 'extrinsic', 'intrinsic', 'combined')."
  shape:
    type: "array"
    description: "Dimensions of the pose matrix array (e.g., [frames, 4, 4])."
    items:
      type: "integer"
  frames:
    type: "integer"
    description: "Number of frames in the trajectory."
    minimum: 1
  file_path:
    type: "string"
    description: "Path to the source .npy file."
    pattern: ".*\\.npy$"
required:
  - pose_type
  - shape
  - frames
  - file_path
additionalProperties: false