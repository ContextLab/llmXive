- artifact: projects/PROJ-576-sana-wm-efficient-minute-scale-world-mod/specs/001-sana-wm-efficient-minute-scale-world-mod/plan.md
  id: scientific_soundness-31232114
  location: plan.md:Mapping to Requirements (SC-002)
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: SC-002 defines 'Camera Adherence' validation as 'visual inspection of the
    generated clips (manual review in PR).' This is a non-scientific validation for
    a 'World Model' claim. Visual inspection is subjective, non-reproducible, and
    cannot quantify '6-DoF trajectory adherence' or distinguish between correct motion
    and hallucinated artifacts that merely 'look smooth.' A valid scientific validation
    requires an objective metric (e.g., re-projecting the input pose to the video
    frames and measuring pixel-space drift, or using a pre-trained pose estimator
    to recover camera motion and comparing it to the ground truth). Relying on human
    review makes the result non-falsifiable and the validation circular (the reviewer
    assumes the model works because the video looks 'okay').
- artifact: projects/PROJ-576-sana-wm-efficient-minute-scale-world-mod/specs/001-sana-wm-efficient-minute-scale-world-mod/plan.md
  id: scientific_soundness-4d0e7ef1
  location: research.md:Technical Feasibility Analysis (3. Camera Trajectory Validation)
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The research plan confirms the reliance on 'Visual inspection (Human-in-the-loop)'
    to verify the core claim of 'precise 6-DoF trajectory adherence.' This is a category
    error in computer vision research. The input is a mathematical trajectory (extrinsic
    matrices); the output is a video. Validating adherence requires a geometric or
    learned metric that maps video back to pose space (e.g., Structure-from-Motion
    or a pose-conditioned discriminator). Human inspection cannot verify the mathematical
    fidelity of the 6-DoF path, only the aesthetic smoothness, which is a different
    property entirely.
- artifact: projects/PROJ-576-sana-wm-efficient-minute-scale-world-mod/specs/001-sana-wm-efficient-minute-scale-world-mod/plan.md
  id: scientific_soundness-3430b7cf
  location: plan.md:Mapping to Requirements (SC-003, SC-004)
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: The plan sets success criteria for RAM (<7GB) and Time (<4h) on a 2 vCPU runner
    for a diffusion transformer. While not circular, the methodology for 'validation'
    here is purely feasibility testing (can it run?) rather than scientific validation
    of the 'efficient minute-scale' claim. The plan admits the full minute-scale generation
    is deferred. The scientific soundness of the *reproduction* is compromised because
    the 'efficiency' claim cannot be tested at the claimed scale (minute-scale) on
    the target hardware, and the reduced scale (4s) may not exhibit the same memory/time
    scaling behaviors as the full task. The validation targets (4s, 480p) are arbitrary
    reductions that do not scientifically validate the 'minute-scale' hypothesis.
