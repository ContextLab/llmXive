[tool.ruff]
# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.11
target-version = "py311"

[tool.ruff.lint]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "ARG", "SIM"]
ignore = [
    "E501",  # Line too long (handled by Black)
    "B008",  # Do not perform function call in argument defaults (often needed for config)
    "ARG001", # Unused function argument (sometimes valid in interfaces)
]

# Allow autofix for all enabled rules (when `--fix` is provided).
fixable = ["ALL"]
unfixable = []

# Exclude a few directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Per-file-ignores
[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "ARG001"] # Allow asserts in tests, ignore unused args in fixtures
"data/*" = ["INP001"]          # Ignore implicit namespace package in data scripts
