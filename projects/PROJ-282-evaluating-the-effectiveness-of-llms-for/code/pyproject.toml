[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-xive-security-eval"
version = "0.1.0"
description = "Evaluating the Effectiveness of LLMs for Identifying Security Vulnerabilities in Open-Source Code"
requires-python = ">=3.11"
dependencies = [
    "transformers",
    "scikit-learn",
    "pandas",
    "tree-sitter",
    "networkx",
    "requests",
    "pyyaml",
    "bitsandbytes",
    "llama-cpp-python",
    "pytest",
    "ruff",
    "black",
    "statsmodels",
]

[tool.setuptools.packages.find]
where = ["code/src"]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "RUF", # ruff-specific rules
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
    "C901", # too complex (complexity handled by logic, not style)
]
exclude = [
    ".git",
    ".tox",
    ".venv",
    "build",
    "dist",
    "data",
    "__pycache__",
]

[tool.ruff.per-file-ignores]
"code/tests/*" = ["S101"] # allow asserts in tests

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code/src"]
addopts = "-v --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
