$schema: "http://json-schema.org/draft-07/schema#"
title: "PredictionResult"
type: object
required:
  - snippet_id
  - model_type
  - predicted_label
  - predicted_category
  - is_correct
  - inference_time_ms
properties:
  snippet_id:
    type: string
    description: "UUID of the CodeSnippet."
  model_type:
    type: string
    enum: ["llm", "bandit", "cppcheck"]
    description: "Origin of the prediction."
  predicted_label:
    type: boolean
    description: "Whether the model predicts a vulnerability (true) or not (false)."
  predicted_category:
    type: string
    description: "CWE identifier or 'none' / 'uncertain'."
  is_correct:
    type: boolean
    description: "Matches ground_truth_label."
  inference_time_ms:
    type: integer
    minimum: 0
    description: "Wall‑clock inference time for this snippet."
  truncated:
    type: boolean
    description: "True if input was truncated to fit model context."
  uncertain_mapped:
    type: boolean
    description: "True if an ambiguous model response was mapped to 'uncertain'."