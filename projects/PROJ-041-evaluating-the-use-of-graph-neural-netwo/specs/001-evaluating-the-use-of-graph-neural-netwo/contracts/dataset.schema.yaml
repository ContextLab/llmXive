$schema: http://json-schema.org/draft-07/schema#
title: NetFlow Dataset Schema
description: Schema for raw NetFlow records used in graph construction.
type: object
properties:
  src_ip:
    type: string
    description: "Source IP address (may be hashed for PII compliance)"
  dst_ip:
    type: string
    description: "Destination IP address (may be hashed for PII compliance)"
  src_port:
    type: integer
    description: "Source port number"
  dst_port:
    type: integer
    description: "Destination port number"
  protocol:
    type: string
    description: "Protocol name (e.g., TCP, UDP, ICMP)"
  start_time:
    type: string
    format: date-time
    description: "Flow start timestamp"
  end_time:
    type: string
    format: date-time
    description: "Flow end timestamp"
  packets:
    type: integer
    minimum: 0
    description: "Number of packets in the flow"
  bytes:
    type: integer
    minimum: 0
    description: "Number of bytes in the flow"
  label:
    type: integer
    enum: [0, 1]
    description: "Ground truth label: 0=Normal, 1=Anomaly"
required:
  - src_ip
  - dst_ip
  - src_port
  - dst_port
  - protocol
  - start_time
  - packets
  - bytes
additionalProperties: true