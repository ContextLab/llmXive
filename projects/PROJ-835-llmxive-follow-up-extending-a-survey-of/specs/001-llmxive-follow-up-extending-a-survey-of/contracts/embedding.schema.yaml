$schema: "http://json-schema.org/draft-07/schema#"
title: "Embedding Output Schema"
description: "Schema for the extracted embedding matrix and associated metadata."
type: object
required:
  - sample_id
  - embedding_vector
  - label
properties:
  sample_id:
    type: string
    description: "Reference to the original audio sample ID."
  embedding_vector:
    type: array
    description: "Fixed-dimensional latent vector (e.g., 512 floats)."
    items:
      type: number
      description: "Float32 value."
    minItems: 1
    uniqueItems: false
  label:
    type: string
    description: "Ground truth label."
    enum:
      - "jailbreak"
      - "benign"
  checksum:
    type: string
    description: "SHA256 checksum of the embedding vector."
additionalProperties: false
