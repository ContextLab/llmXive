$schema: "http://json-schema.org/draft-07/schema#"
title: "Audio Dataset Manifest Schema"
description: "Schema for the raw audio dataset manifest (input to extraction pipeline)."
type: object
required:
  - id
  - audio_path
  - label
properties:
  id:
    type: string
    description: "Unique identifier for the audio sample."
  audio_path:
    type: string
    description: "Path or URL to the audio file."
    pattern: "^(https?://|/|\\.\\./|[a-zA-Z]:\\\\).*"
  label:
    type: string
    description: "Ground truth label."
    enum:
      - "jailbreak"
      - "benign"
  duration_sec:
    type: number
    description: "Duration of the audio in seconds."
    minimum: 0
additionalProperties: false
