[pytest]
addopts = --random-seed=42 -v --tb=short
testpaths = code/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# CPU-only execution flag
markers =
    cpu_only: mark test as requiring only CPU resources
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
# Ensure deterministic behavior
env =
    PYTHONHASHSEED=42