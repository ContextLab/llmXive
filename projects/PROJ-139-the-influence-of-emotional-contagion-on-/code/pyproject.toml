[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-emotional-contagion"
version = "0.1.0"
description = "Research pipeline for emotional contagion in online forums"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "nltk>=3.8.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "scipy>=1.11.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in init files for API exposure
"tests/*" = ["S101"] # Allow assertions in tests

[tool.ruff.isort]
known-first-party = ["code"]
force-sort-within-sections = true
lines-after-imports = 2
