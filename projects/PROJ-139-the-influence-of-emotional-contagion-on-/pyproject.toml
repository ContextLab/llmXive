[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "--random-seed=42 --cpu-only -ra -q"
testpaths = ["code/tests"]
filterwarnings = [
    "ignore::DeprecationWarning"
]
