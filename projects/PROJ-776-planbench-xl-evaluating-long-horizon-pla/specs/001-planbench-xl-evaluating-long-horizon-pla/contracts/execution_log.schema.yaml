$schema: "http://json-schema.org/draft-07/schema#"
title: "PlanBench Execution Log Schema"
description: "Schema for per-task execution logs generated by run_retail_batch.py"
type: "object"
required:
  - task_id
  - model_id
  - condition
  - start_time
  - end_time
  - status
  - steps
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task"
  model_id:
    type: "string"
    description: "The LLM model identifier used"
  condition:
    type: "string"
    enum:
      - default
      - blocker
      - noise
    description: "The experimental condition"
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of task start"
  end_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of task end"
  status:
    type: "string"
    enum:
      - success
      - failed
      - timeout
      - error
    description: "Final status of the task"
  steps:
    type: "array"
    description: "Sequence of tool calls and responses"
    items:
      type: "object"
      required:
        - step_id
        - action
        - tool_name
      properties:
        step_id:
          type: "integer"
          description: "Sequential step number"
        action:
          type: "string"
          description: "Action type (e.g., call_tool, parse_response)"
        tool_name:
          type: "string"
          description: "Name of the tool invoked"
        args:
          type: "object"
          description: "Arguments passed to the tool"
        response:
          type: "string"
          description: "Response from the tool or error message"
        duration_ms:
          type: "integer"
          description: "Duration of the step in milliseconds"
  error_message:
    type: "string"
    description: "Error message if status is failed or error"
    nullable: true
