$schema: "http://json-schema.org/draft-07/schema#"
title: "PlanBench Evaluation Results Schema"
description: "Schema for aggregated evaluation results (eval_results.json)"
type: "object"
required:
  - run_id
  - model_id
  - condition
  - total_tasks
  - successful_tasks
  - accuracy
  - avg_duration_sec
  - timeout_rate
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run"
  model_id:
    type: "string"
    description: "The LLM model identifier used"
  condition:
    type: "string"
    enum:
      - default
      - blocker
      - noise
    description: "The experimental condition"
  total_tasks:
    type: "integer"
    minimum: 1
    description: "Total number of tasks executed"
  successful_tasks:
    type: "integer"
    minimum: 0
    description: "Number of tasks completed successfully"
  accuracy:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Success rate (successful_tasks / total_tasks)"
  avg_duration_sec:
    type: "number"
    minimum: 0.0
    description: "Average duration per task in seconds"
  timeout_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Proportion of tasks that timed out"
  errors:
    type: "object"
    description: "Count of errors by type"
    additionalProperties:
      type: "integer"
      minimum: 0
