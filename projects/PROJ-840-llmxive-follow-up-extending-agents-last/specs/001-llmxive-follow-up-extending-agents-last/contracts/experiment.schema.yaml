$schema: "http://json-schema.org/draft-07/schema#"
title: "Experiment Result Schema"
description: "Schema for experiment run results (step-level)."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  run_id:
    type: "string"
    description: "Unique identifier for the experiment run."
  step_number:
    type: "integer"
    description: "Step index within the task."
  step_passed:
    type: "boolean"
    description: "Whether the step was completed successfully."
  checkpoint_interval:
    type: "integer"
    description: "Checkpoint interval N (0 for baseline)."
  memory_usage_mb:
    type: "number"
    description: "Peak memory usage in MB."
  error_type:
    type:
      - "string"
      - "null"
    description: "Error type if failed."
  condition:
    type: "string"
    enum:
      - "baseline"
      - "intervention"
    description: "Experimental condition."
required:
  - task_id
  - run_id
  - step_number
  - step_passed
  - checkpoint_interval
  - memory_usage_mb
  - condition
additionalProperties: false