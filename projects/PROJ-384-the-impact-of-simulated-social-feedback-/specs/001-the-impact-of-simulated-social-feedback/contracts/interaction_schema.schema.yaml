$schema: "http://json-schema.org/draft-07/schema#"
title: "LOST Interaction Schema"
description: "Schema for the raw LOST dataset interactions before sentiment processing."
type: object
properties:
  user_id:
    type: string
    description: "Unique identifier for the user."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the interaction."
  post_text:
    type: string
    description: "Content of the user's post."
  reply_text:
    type:
      - string
      - "null"
    description: "Content of the reply. Can be null if no reply exists."
  reply_timestamp:
    type:
      - string
      - "null"
    format: date-time
    description: "Timestamp of the reply if available."
required:
  - user_id
  - timestamp
  - post_text
