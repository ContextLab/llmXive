$schema: "http://json-schema.org/draft-07/schema#"
title: "Regression Output Schema"
description: "Schema for the final regression analysis results."
type: object
properties:
  model_summary:
    type: object
    properties:
      r_squared:
        type: number
        description: "R-squared value of the model."
      adj_r_squared:
        type: number
        description: "Adjusted R-squared value."
      f_statistic:
        type: number
        description: "F-statistic of the model."
      p_value_f:
        type: number
        description: "P-value for the F-statistic."
  coefficients:
    type: array
    items:
      type: object
      properties:
        variable:
          type: string
          description: "Name of the predictor variable."
        coefficient:
          type: number
          description: "Beta coefficient."
        std_error:
          type: number
          description: "Standard error of the coefficient."
        t_statistic:
          type: number
          description: "T-statistic."
        p_value:
          type: number
          description: "P-value for the coefficient."
        vif:
          type: number
          description: "Variance Inflation Factor."
    description: "List of regression coefficients and diagnostics. Must include 'mean_post_valence' as a control."
  diagnostics:
    type: object
    properties:
      vif_max:
        type: number
        description: "Maximum VIF value across all predictors."
      residual_normality_p:
        type: number
        description: "P-value for normality test of residuals."
      homoscedasticity_p:
        type: number
        description: "P-value for homoscedasticity test."
      reciprocity_control_note:
        type: string
        description: "Confirmation that 'mean_post_valence' was included as a control to isolate volatility effects."
  sensitivity_analysis:
    type: array
    items:
      type: object
      properties:
        window_size:
          type: integer
          description: "Window size used for volatility calculation."
        volatility_p_value:
          type: number
          description: "P-value of volatility coefficient for this window."
        volatility_coefficient:
          type: number
          description: "Coefficient of volatility for this window."
required:
  - model_summary
  - coefficients
  - diagnostics
