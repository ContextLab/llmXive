[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-traits-sdm"
version = "0.1.0"
description = "Assessing the Predictive Power of Plant Functional Traits for Species Distribution Models"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas>=1.5.0",
    "numpy>=1.21.0",
    "geopandas>=0.11.0",
    "scikit-learn>=1.0.0",
    "statsmodels>=0.13.0",
    "linearmodels>=5.0.0",
    "rasterio>=1.3.0",
    "rasterstats>=0.18.0",
    "pyyaml>=6.0",
    "requests>=2.28.0",
    "tqdm>=4.64.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=22.0.0",
    "ruff>=0.0.200",
    "flake8>=5.0.0",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
