[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "plant-traits-sdm"
version = "0.1.0"
description = "Assessing the Predictive Power of Plant Functional Traits for Species Distribution Models"
requires-python = ">=3.9"
dependencies = [
    "scikit-learn",
    "pandas",
    "geopandas",
    "rasterio",
    "rasterstats",
    "pyyaml",
    "requests",
    "tqdm",
    "numpy",
    "statsmodels",
    "linearmodels",
]

[project.optional-dependencies]
dev = [
    "black>=23.0.0",
    "ruff>=0.1.0",
    "pytest",
    "pytest-cov",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"]  # Allow assertions in tests

[tool.ruff.isort]
known-first-party = ["src"]
known-third-party = [
    "geopandas",
    "numpy",
    "pandas",
    "pytest",
    "requests",
    "rasterio",
    "rasterstats",
    "sklearn",
    "statsmodels",
    "tqdm",
    "yaml",
]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
