[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-traits"
version = "0.1.0"
description = "Assessing the predictive power of plant functional traits for species distribution models"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "geopandas",
    "rasterio",
    "rasterstats",
    "pyyaml",
    "requests",
    "tqdm",
    "statsmodels",
    "linearmodels",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "mypy",
    "pytest",
]

[tool.ruff]
# Target Python version
target-version = "py39"

# Line length for formatting
line-length = 88

# Exclude generated or third-party directories
exclude = [
    ".git",
    ".tox",
    "build",
    "dist",
    "venv",
    ".venv",
    "data",
    "results",
]

[tool.ruff.lint]
# Select specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]

# Ignore specific rules if necessary
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function calls in argument defaults (common in data loaders)
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
known-local-folder = ["tests"]

[tool.black]
target-version = ['py39']
line-length = 88
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.tox
    | build
    | dist
    | venv
    | \.venv
    | data
    | results
)/
'''

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false
strict_optional = false
