$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelResult Schema"
description: "Schema for per‑species model performance metrics (known‑trait LOSO)."
type: "object"
properties:
  species_id:
    type: "string"
    description: "GBIF taxon key of the test species (LOSO)."
  model_type:
    type: "string"
    enum:
      - "climate-only"
      - "climate+traits"
    description: "Configuration of the model."
  auc:
    type: "number"
    description: "Area Under the Curve (AUC) score."
  tss:
    type: "number"
    description: "True Skill Statistic (TSS) score."
  cv_folds:
    type: "integer"
    description: "Number of cross‑validation folds used inside training."
  hyperparams:
    type: "object"
    description: "Dictionary of hyperparameters used (e.g., max_depth, n_estimators)."
  test_species_id:
    type: "string"
    description: "Duplicate of species_id for clarity in LOSO reporting."
required:
  - species_id
  - model_type
  - auc
  - tss
  - cv_folds
  - hyperparams
  - test_species_id
additionalProperties: false