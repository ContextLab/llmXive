$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalSummary Schema"
description: "Schema for aggregate paired t‑test results comparing climate‑only vs. climate + traits models."
type: "object"
properties:
  metric:
    type: "string"
    enum:
      - "AUC"
      - "TSS"
    description: "Metric being compared."
  mean_climate_only:
    type: "number"
    description: "Mean score for the climate‑only model."
  mean_climate_traits:
    type: "number"
    description: "Mean score for the climate + traits model."
  mean_diff:
    type: "number"
    description: "Mean difference (climate + traits − climate‑only)."
  p_value_raw:
    type: "number"
    description: "Raw p‑value from the paired t‑test."
  p_value_corrected:
    type: "number"
    description: "Bonferroni‑corrected p‑value."
  cohens_d:
    type: "number"
    description: "Cohen's d effect size."
  n_species:
    type: "integer"
    description: "Number of species included in the paired comparison."
  vif_warning:
    type: "boolean"
    description: "True if any predictor VIF > 5 across models."
  vif_details:
    type: "object"
    description: "Dictionary of VIF values for each predictor."
required:
  - metric
  - mean_climate_only
  - mean_climate_traits
  - mean_diff
  - p_value_raw
  - p_value_corrected
  - cohens_d
  - n_species
  - vif_warning
  - vif_details
additionalProperties: false