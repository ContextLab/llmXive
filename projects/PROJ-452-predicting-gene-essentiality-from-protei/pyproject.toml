[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-gene-essentiality"
version = "0.1.0"
description = "Predicting gene essentiality from protein interaction network topology"
requires-python = ">=3.11"
dependencies = [
    "networkx",
    "pandas",
    "scipy",
    "statsmodels",
    "requests",
    "pyyaml",
    "numpy",
    "biopython",
    "dendropy"
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black"
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B", "C4", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
