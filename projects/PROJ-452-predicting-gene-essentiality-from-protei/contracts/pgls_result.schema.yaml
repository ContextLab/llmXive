$schema: http://json-schema.org/draft-07/schema#
title: PGLS Result
description: Schema for Phylogenetic Generalized Least Squares comparison results across organisms.
type: object
required:
  - organisms
  - metric
  - pgls_statistic
  - p_value
  - adjusted_p_value
  - phylogeny_source
  - sample_size
properties:
  organisms:
    type: array
    items:
      type: string
    description: List of organisms compared.
  metric:
    type: string
    enum:
      - degree
      - betweenness
      - eigenvector
    description: Centrality metric being compared.
  pgls_statistic:
    type: number
    description: PGLS test statistic (e.g., t-statistic or F-statistic).
  p_value:
    type: number
    description: Raw p-value from the PGLS model.
  adjusted_p_value:
    type: number
    description: Benjamini-Hochberg adjusted p-value.
  phylogeny_source:
    type: string
    description: Source of the phylogenetic tree (e.g., 'OpenTree').
  sample_size:
    type: integer
    minimum: 0
    description: Effective number of taxa in the analysis.
  lambda_estimate:
    type: number
    nullable: true
    description: Estimated Pagel's lambda parameter.
  correlation_coefficients:
    type: object
    description: Map of organism -> correlation coefficient used in PGLS.
    additionalProperties:
      type: number
  warnings:
    type: array
    items:
      type: string
    description: List of warnings (e.g., 'Power insufficient').
  metadata:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      tree_file:
        type: string
        description: Filename of the Newick tree used.
additionalProperties: false
