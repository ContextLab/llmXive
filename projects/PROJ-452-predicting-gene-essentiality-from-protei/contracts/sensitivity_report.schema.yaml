$schema: http://json-schema.org/draft-07/schema#
title: Sensitivity Report
description: Schema for sensitivity analysis results across confidence thresholds.
type: object
required:
  - organism
  - thresholds_analyzed
  - results_by_threshold
  - stability_analysis
  - pass_fail_status
properties:
  organism:
    type: string
  thresholds_analyzed:
    type: array
    items:
      type: integer
    description: List of confidence thresholds tested
  results_by_threshold:
    type: object
    description: Results keyed by threshold value (e.g., "threshold_500")
    additionalProperties:
      type: object
      required:
        - network_stats
        - correlations
      properties:
        network_stats:
          type: object
          properties:
            nodes:
              type: integer
            edges:
              type: integer
            density:
              type: number
        correlations:
          type: object
          additionalProperties:
            type: object
            properties:
              spearman_rho:
                type: number
              spearman_pvalue:
                type: number
  stability_analysis:
    type: object
    required:
      - max_delta_rho
      - threshold_pairs
    properties:
      max_delta_rho:
        type: number
        description: Maximum absolute difference in correlation coefficients across thresholds
      threshold_pairs:
        type: array
        items:
          type: object
          properties:
            pair:
              type: array
              items:
                type: integer
              minItems: 2
              maxItems: 2
            delta_rho:
              type: number
            passed:
              type: boolean
  pass_fail_status:
    type: object
    required:
      - sc_002_pass
      - summary
    properties:
      sc_002_pass:
        type: boolean
        description: True if max delta rho <= 0.1
      summary:
        type: string
        description: Human-readable summary of stability
  metadata:
    type: object
    required:
      - timestamp
    properties:
      timestamp:
        type: string
        format: date-time
      pipeline_version:
        type: string
        nullable: true