$schema: http://json-schema.org/draft-07/schema#
title: Sensitivity Report
description: Schema for sensitivity analysis report across different confidence thresholds.
type: object
required:
  - organism
  - centrality_metric
  - threshold_results
  - stability_flag
  - max_delta_rho
properties:
  organism:
    type: string
    description: Organism identifier.
  centrality_metric:
    type: string
    enum:
      - degree
      - betweenness
      - eigenvector
    description: Centrality metric analyzed.
  threshold_results:
    type: array
    items:
      type: object
      required:
        - threshold
        - spearman_rho
        - p_value
        - sample_size
      properties:
        threshold:
          type: integer
          description: STRING confidence threshold.
        spearman_rho:
          type: number
          description: Correlation coefficient at this threshold.
        p_value:
          type: number
          description: P-value at this threshold.
        sample_size:
          type: integer
          description: Number of genes analyzed.
        delta_rho:
          type: number
          nullable: true
          description: Difference in rho compared to the previous threshold.
  stability_flag:
    type: boolean
    description: True if max |Δρ| ≤ 0.1 (SC-002 pass), False otherwise.
  max_delta_rho:
    type: number
    description: Maximum absolute difference in correlation coefficients across thresholds.
  summary:
    type: string
    description: Human-readable summary of stability.
  metadata:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      thresholds_tested:
        type: array
        items:
          type: integer
additionalProperties: false