$schema: "http://json-schema.org/draft-07/schema#"
title: "Sensitivity Report"
description: "Schema for the sensitivity analysis report on network confidence thresholds."
type: object
required:
  - organism
  - analysis_type
  - thresholds_tested
  - results
  - stability_assessment
  - timestamp
properties:
  organism:
    type: string
    description: "Scientific name of the organism analyzed."
  analysis_type:
    type: string
    const: "confidence_threshold_sensitivity"
  thresholds_tested:
    type: array
    items:
      type: integer
    description: "List of STRING confidence thresholds tested (e.g., [500, 700, 900])."
  centrality_metric:
    type: string
    description: "The centrality metric being evaluated for sensitivity."
  results:
    type: object
    description: "Results keyed by threshold value (as string)."
    additionalProperties:
      type: object
      required:
        - correlation_coefficient
        - p_value
        - sample_size
        - network_edges
        - network_nodes
      properties:
        correlation_coefficient:
          type: number
        p_value:
          type: number
        sample_size:
          type: integer
        network_edges:
          type: integer
        network_nodes:
          type: integer
        sparsity_warning:
          type: boolean
          description: "True if edges < 500."
  stability_assessment:
    type: object
    description: "Summary of stability across thresholds."
    required:
      - max_delta_rho
      - pass_sc_002
      - delta_matrix
    properties:
      max_delta_rho:
        type: number
        description: "Maximum absolute difference in correlation coefficients between any two thresholds."
      pass_sc_002:
        type: boolean
        description: "True if max_delta_rho <= 0.1 (stability requirement)."
      delta_matrix:
        type: array
        description: "Matrix of |Δρ| values between threshold pairs."
        items:
          type: object
          required:
            - threshold_1
            - threshold_2
            - delta_rho
          properties:
            threshold_1:
              type: integer
            threshold_2:
              type: integer
            delta_rho:
              type: number
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of when the analysis was completed."
  summary_markdown:
    type: string
    description: "Optional pre-formatted markdown summary string."