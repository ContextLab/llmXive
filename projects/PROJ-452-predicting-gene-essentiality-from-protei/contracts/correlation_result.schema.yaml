$schema: http://json-schema.org/draft-07/schema#
title: Correlation Result
description: Schema for Spearman correlation results between network centrality metrics and gene essentiality.
type: object
required:
  - organism
  - centrality_metric
  - spearman_rho
  - p_value
  - sample_size
  - confidence_threshold
  - correlation_type
properties:
  organism:
    type: string
    description: Organism identifier (e.g., 'S. cerevisiae').
  centrality_metric:
    type: string
    enum:
      - degree
      - betweenness
      - eigenvector
    description: The centrality metric analyzed.
  spearman_rho:
    type: number
    description: Spearman rank correlation coefficient.
  p_value:
    type: number
    description: Two-tailed p-value for the correlation.
  sample_size:
    type: integer
    minimum: 0
    description: Number of genes in the analysis.
  confidence_threshold:
    type: integer
    description: STRING confidence score threshold used.
  correlation_type:
    type: string
    const: spearman
    description: Type of correlation calculated.
  empirical_p_value:
    type: number
    nullable: true
    description: Empirical p-value from null model (if available).
  null_distribution_summary:
    type: object
    nullable: true
    properties:
      mean:
        type: number
      std:
        type: number
      count:
        type: integer
    description: Summary statistics of the null distribution.
  metadata:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      data_version:
        type: string
      network_edges:
        type: integer
      network_nodes:
        type: integer
additionalProperties: false
