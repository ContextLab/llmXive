$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Result"
description: "Schema for Spearman correlation results between network centrality and gene essentiality."
type: object
required:
  - organism
  - taxonomic_id
  - centrality_metric
  - correlation_coefficient
  - p_value
  - sample_size
  - null_model
  - timestamp
properties:
  organism:
    type: string
    description: "Scientific name of the organism (e.g., 'Saccharomyces cerevisiae')."
  taxonomic_id:
    type: integer
    description: "NCBI Taxonomic ID for the organism."
  centrality_metric:
    type: string
    description: "Name of the centrality metric used (e.g., 'degree', 'betweenness', 'eigenvector')."
    enum:
      - degree
      - betweenness
      - eigenvector
  correlation_coefficient:
    type: number
    description: "Spearman's rank correlation coefficient (rho)."
  p_value:
    type: number
    description: "Two-tailed p-value for the correlation."
  sample_size:
    type: integer
    description: "Number of genes analyzed (intersection of network and essentiality data)."
  confidence_threshold:
    type: integer
    description: "STRING confidence score threshold used for network construction."
  null_model:
    type: object
    description: "Summary of the null model used for empirical p-value calculation."
    required:
      - method
      - iterations
      - empirical_p_value
    properties:
      method:
        type: string
        description: "Method used for null distribution generation (e.g., 'label_permutation', 'graph_rewiring')."
      iterations:
        type: integer
        description: "Number of permutations or rewirings performed."
      empirical_p_value:
        type: number
        description: "Empirical p-value derived from the null distribution."
      null_distribution_summary:
        type: object
        description: "Statistics of the null distribution."
        properties:
          mean:
            type: number
          std:
            type: number
          min:
            type: number
          max:
            type: number
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of when the analysis was completed."
  metadata:
    type: object
    description: "Additional metadata about the run."
    properties:
      string_version:
        type: string
      deg_version:
        type: string
      mapping_coverage_percent:
        type: number
        description: "Percentage of genes successfully mapped between datasets."
