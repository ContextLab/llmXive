# Output Schema Contract for Gene Expression Prediction Pipeline
# Generated based on data-model.md definitions
# This schema defines the structure for all pipeline outputs

$schema: http://json-schema.org/draft-07/schema#
title: PipelineOutputSchema
description: Schema for all pipeline output artifacts

type: object
required:
  - version
  - artifacts

properties:
  version:
    type: string
    description: Schema version identifier
    pattern: '^\d+\.\d+\.\d+$'

  artifacts:
    type: object
    description: Collection of output artifacts by category
    required:
      - processed_data
      - models
      - evaluations
      - interpretations

    properties:
      processed_data:
        type: object
        description: Processed data files
        properties:
          tss_aggregated_features:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
            properties:
              file_path:
                type: string
                description: Relative path to the file
              schema_ref:
                type: string
                description: Reference to the schema used
              checksum:
                type: string
                description: SHA256 checksum of the file
          filtered_expression:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          imputed_expression:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          variable_peaks:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          housekeeping_genes:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          cell_type_specific_genes:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
        
      models:
        type: object
        description: Trained model artifacts
        properties:
          elastic_net_models:
            type: array
            items:
              type: object
              required:
                - cell_line
                - file_path
                - checksum
                - hyperparameters
              properties:
                cell_line:
                  type: string
                file_path:
                  type: string
                checksum:
                  type: string
                hyperparameters:
                  type: object
                  required:
                    - alpha
                    - l1_ratio
                  properties:
                    alpha:
                      type: number
                    l1_ratio:
                      type: number
      
      evaluations:
        type: object
        description: Evaluation metrics and results
        properties:
          cv_scores:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          correlations:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          pvalues_corrected:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          housekeeping_r2:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          external_validation_r2:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
      
      interpretations:
        type: object
        description: Interpretation and feature importance results
        properties:
          feature_importance:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          peak_annotations:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          tss_proximity_stats:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum
          performance_gap:
            type: object
            required:
              - file_path
              - schema_ref
              - checksum

additionalProperties: true