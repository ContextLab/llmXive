$schema: http://json-schema.org/draft-07/schema#
title: "Analysis Output Schema"
description: "Schema for correlation, model, and classifier output files"
type: object
properties:
  correlations:
    type: array
    items:
      type: object
      properties:
        pupil_metric:
          type: string
          description: "Name of the pupil metric (e.g., peak, mean)"
        load_proxy:
          type: string
          description: "Name of the load proxy (e.g., search_time, stimulus_salience, fixation_count)"
        pearson_r:
          type: ["number", "null"]
          description: "Pearson correlation coefficient (null if uncomputable)"
        p_value_raw:
          type: ["number", "null"]
          description: "Raw p-value from t-test (null if uncomputable)"
        p_value_adjusted:
          type: ["number", "null"]
          description: "Holm‑Bonferroni‑adjusted p-value (null if uncomputable)"
        significant:
          type: ["boolean", "null"]
          description: "True if p_value_adjusted < 0.05 (null if uncomputable)"
        status:
          type: "string"
          description: "Either 'COMPLETED' or 'UNFULFILLABLE'"
      required:
        - pupil_metric
        - load_proxy
        - status
  lme_results:
    type: object
    properties:
      predictors:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            estimate:
              type: number
            std_error:
              type: number
            p_value:
              type: number
          required:
            - name
            - estimate
            - std_error
            - p_value
      likelihood_ratio_test:
        type: object
        properties:
          statistic:
            type: number
          p_value:
            type: number
        required:
          - statistic
          - p_value
      model_type:
        type: string
        description: "Either 'Full', 'Reduced (Collinearity Handled)', or 'Reduced (Salience Missing)'"
    required:
      - predictors
      - likelihood_ratio_test
      - model_type
  classifier_results:
    type: array
    items:
      type: object
      properties:
        threshold:
          type: number
          description: "Decision threshold used"
        accuracy:
          type: number
          description: "Classification accuracy"
        precision:
          type: number
          description: "Precision score"
        recall:
          type: number
          description: "Recall score"
        roc_auc:
          type: number
          description: "ROC‑AUC score"
        relative_decrease:
          type: number
          description: "Relative decrease in performance compared to best threshold (percentage)"
        validation_type:
          type: string
          description: "Either 'Independent Load Measure' or 'Search‑Time Median Split'"
        ground_truth_limitation:
          type: ["string", "null"]
          description: "Explicit statement if ground truth is derived from search-time median split. If 'Search-Time Median Split', results are discarded from empirical claims."
      required:
        - threshold
        - accuracy
        - precision
        - recall
        - roc_auc
        - relative_decrease
        - validation_type
  quality_report:
    type: object
    properties:
      total_trials:
        type: integer
      excluded_trials:
        type: integer
      exclusion_reasons:
        type: object
        additionalProperties:
          type: integer
        description: "Count of exclusions per reason (e.g., blink_loss_excessive, non_monotonic_timestamp, insufficient_trials)"
    required:
      - total_trials
      - excluded_trials
      - exclusion_reasons
required:
  - correlations
  - lme_results
  - classifier_results
  - quality_report
additionalProperties: false