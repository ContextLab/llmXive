[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | \.eggs
    | \.gitignore
    | \.flake8
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code"]
skip = [".git", ".venv", "venv", "build", "dist", ".eggs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.pydocstyle]
inherit = false
match = "(?!test_).*\\.py"
match-dir = "(?!tests).*"
ignore = ["D100", "D104", "D203", "D213", "D407"]
convention = "numpy"
