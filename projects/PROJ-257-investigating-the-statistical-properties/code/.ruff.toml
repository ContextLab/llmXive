# Ruff configuration for llmXive project
# Enforces PEP 8 compliance and common best practices

target-version = "py311"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B008", # do not perform function calls in argument defaults (common in data classes)
]

[lint.isort]
known-first-party = ["src", "tests"]
force-single-line = true
