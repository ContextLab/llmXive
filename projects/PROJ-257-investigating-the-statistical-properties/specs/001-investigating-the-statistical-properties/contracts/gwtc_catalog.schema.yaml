$schema: http://json-schema.org/draft-07/schema#
title: GWTC Catalog Schema
description: Schema for the preprocessed observational GWTC catalog
type: object
properties:
  event_id:
    type: string
    description: "Unique event identifier (e.g., GW150914)"
  component_mass_1:
    type: number
    description: "Primary component mass in solar masses"
  component_mass_2:
    type: number
    description: "Secondary component mass in solar masses"
  mass_ratio:
    type: number
    description: "Mass ratio q = m2/m1 (0 < q <= 1)"
  effective_spin:
    type: number
    description: "Effective spin parameter chi_eff"
  posterior_sample_count:
    type: integer
    description: "Number of posterior samples used for this event"
required:
  - event_id
  - component_mass_1
  - component_mass_2
  - mass_ratio
  - effective_spin
additionalProperties: false