$schema: "http://json-schema.org/draft-07/schema#"
title: "GWTC Catalog Schema"
description: "Schema for preprocessed GWTC observational data"
type: "object"
properties:
  event_id:
    type: "string"
    description: "Unique identifier for the merger event"
  component_mass_1:
    type: "number"
    description: "Primary component mass in solar masses"
  component_mass_2:
    type: "number"
    description: "Secondary component mass in solar masses"
  mass_ratio:
    type: "number"
    description: "Mass ratio q = m2/m1 (0 < q <= 1)"
  effective_spin:
    type: "number"
    description: "Effective aligned spin parameter chi_eff"
  posterior_samples:
    type: "array"
    items:
      type: "number"
    description: "List of sampled values for uncertain parameters"
required:
  - event_id
  - component_mass_1
  - component_mass_2
  - mass_ratio
  - effective_spin
additionalProperties: false