$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Catalog Schema"
description: "Schema for synthetic or downloaded simulation data"
type: "object"
properties:
  event_id:
    type: "string"
    description: "Unique identifier for the synthetic event"
  component_mass_1:
    type: "number"
    description: "Primary component mass in solar masses"
  component_mass_2:
    type: "number"
    description: "Secondary component mass in solar masses"
  mass_ratio:
    type: "number"
    description: "Mass ratio q = m2/m1 (0 < q <= 1)"
  effective_spin:
    type: "number"
    description: "Effective aligned spin parameter chi_eff"
  formation_channel:
    type: "string"
    description: "Source of the event (e.g., 'synthetic_powerlaw')"
  generation_method:
    type: "string"
    description: "Description of the generation hypothesis"
required:
  - event_id
  - component_mass_1
  - component_mass_2
  - mass_ratio
  - effective_spin
  - formation_channel
  - generation_method
additionalProperties: false