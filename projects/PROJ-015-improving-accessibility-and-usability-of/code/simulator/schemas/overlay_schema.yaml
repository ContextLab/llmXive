$schema: http://json-schema.org/draft-07/schema#
title: XAIOverlayData
description: >
  Schema defining the structure of XAI overlay data used to visualize
  feature importance and decision rationale on the ExplainableInterface.
  This data is generated by RuleBasedXAIOverlayGenerator and consumed
  by the Streamlit app to render heatmaps.
type: object
required:
  - overlay_id
  - task_id
  - interface_type
  - feature_importance
  - heatmap_data
  - generated_at
properties:
  overlay_id:
    type: string
    description: Unique identifier for this overlay instance (UUID).
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  
  task_id:
    type: string
    description: Identifier of the task this overlay corresponds to.
  
  interface_type:
    type: string
    description: The interface variant this overlay belongs to.
    enum:
      - explainable
  
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of overlay generation.
  
  feature_importance:
    type: array
    description: List of feature-level importance scores.
    items:
      type: object
      required:
        - feature_id
        - importance_score
        - direction
      properties:
        feature_id:
          type: string
          description: Unique identifier for the UI element or data feature.
        importance_score:
          type: number
          minimum: 0
          maximum: 1
          description: Normalized importance score (0-1).
        direction:
          type: string
          description: Effect direction of the feature on the decision.
          enum:
            - positive
            - negative
            - neutral
        label:
          type: string
          description: Human-readable label for the feature.
          nullable: true
  
  heatmap_data:
    type: object
    description: Grid data for rendering the heatmap overlay.
    required:
      - grid_width
      - grid_height
      - values
      - colormap
    properties:
      grid_width:
        type: integer
        minimum: 1
        description: Width of the heatmap grid in cells.
      grid_height:
        type: integer
        minimum: 1
        description: Height of the heatmap grid in cells.
      values:
        type: array
        description: Flattened array of intensity values (row-major order).
        items:
          type: number
          minimum: 0
          maximum: 1
        minItems: 1
      colormap:
        type: string
        description: Matplotlib colormap name to use for rendering.
        default: "viridis"
        enum:
          - viridis
          - plasma
          - inferno
          - magma
          - coolwarm
          - RdYlBu_r
      bounds:
        type: object
        description: Bounding box for overlay placement (optional).
        nullable: true
        properties:
          x:
            type: number
          y:
            type: number
          width:
            type: number
          height:
            type: number
  
  explanation_summary:
    type: string
    description: Natural language summary of the explanation (optional).
    nullable: true