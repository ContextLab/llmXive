$schema: "http://json-schema.org/draft-07/schema#"
title: "Session Data Schema"
description: "Schema for raw session logs generated by the HCI simulator."
type: "object"
required:
  - session_id
  - participant_id
  - interface_type
  - start_time
  - end_time
  - status
properties:
  session_id:
    type: "string"
    description: "Unique identifier for the session."
  participant_id:
    type: "string"
    description: "Foreign key to the participant."
  interface_type:
    type: "string"
    enum:
      - "traditional"
      - "explainable"
    description: "The variant of the interface used."
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of session start."
  end_time:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of session end."
  completion_time_seconds:
    type: "number"
    minimum: 0
    description: "Duration of the task in seconds."
  error_count:
    type: "integer"
    minimum: 0
    description: "Number of errors committed."
  explanation_engagement_time_seconds:
    type: "number"
    minimum: 0
    description: "Time spent interacting with XAI overlays (0 for traditional)."
  sus_score:
    type: ["integer", "null"]
    minimum: 0
    maximum: 100
    description: "System Usability Scale score (0-100)."
  status:
    type: "string"
    enum:
      - "complete"
      - "incomplete"
      - "rejected"
    description: "Validity status of the session."
  dropout_reason:
    type: ["string", "null"]
    description: "Reason for dropout if status is incomplete."
additionalProperties: false
