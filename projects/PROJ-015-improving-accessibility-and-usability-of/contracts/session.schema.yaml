$schema: http://json-schema.org/draft-07/schema#
title: SessionData
type: object
required:
  - participant_id
  - disability_type
  - interface_type
  - sequence
  - start_time
  - end_time
  - error_count
  - explanation_engagement_time_seconds
  - sus_score
  - status
properties:
  participant_id:
    type: string
  disability_type:
    type: string
  interface_type:
    type: string
    enum:
      - traditional
      - explainable
  sequence:
    type: string
    enum:
      - traditional_explainable
      - explainable_traditional
  start_time:
    type: string
    format: date-time
  end_time:
    type: string
    format: date-time
  error_count:
    type: integer
    minimum: 0
  explanation_engagement_time_seconds:
    type: number
    minimum: 0
  sus_score:
    type: integer
    minimum: 0
    maximum: 100
  status:
    type: string
    enum:
      - complete
      - incomplete
  dropout_reason:
    type: string
    nullable: true
