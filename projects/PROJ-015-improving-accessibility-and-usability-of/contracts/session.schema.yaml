$schema: "http://json-schema.org/draft-07/schema#"
title: "Session Data Schema"
description: "Schema for session data collected from the usability study. Used to validate both web app logs and simulator outputs."
type: "object"
required:
  - participant_id
  - disability_type
  - interface_type
  - sequence
  - start_time
  - end_time
  - error_count
  - explanation_engagement_time_seconds
  - sus_score
  - status
  - dropout_reason
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant"
    minLength: 1
  disability_type:
    type: "string"
    description: "Type of disability (e.g., visual, motor, cognitive)"
    enum:
      - "visual"
      - "motor"
      - "cognitive"
      - "auditory"
      - "other"
  interface_type:
    type: "string"
    description: "Type of interface used in this session"
    enum:
      - "traditional"
      - "explainable"
  sequence:
    type: "array"
    description: "Order of interface presentation (e.g., ['traditional', 'explainable'])"
    items:
      type: "string"
      enum:
        - "traditional"
        - "explainable"
    minItems: 2
    maxItems: 2
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of session start"
  end_time:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of session end"
  error_count:
    type: "integer"
    description: "Number of errors committed during the session"
    minimum: 0
  explanation_engagement_time_seconds:
    type: "number"
    description: "Time spent interacting with XAI explanations (in seconds)"
    minimum: 0.0
  sus_score:
    type: "integer"
    description: "System Usability Scale score (0-100)"
    minimum: 0
    maximum: 100
  status:
    type: "string"
    description: "Completion status of the session"
    enum:
      - "complete"
      - "incomplete"
  dropout_reason:
    type:
      - "string"
      - "null"
    description: "Reason for dropout if status is incomplete"
