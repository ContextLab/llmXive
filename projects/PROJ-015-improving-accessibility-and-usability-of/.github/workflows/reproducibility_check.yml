name: Reproducibility Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  execute-notebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert nbformat

      - name: Ensure data directories exist
        run: |
          mkdir -p data/raw
          mkdir -p data/processed
          mkdir -p figures

      - name: Generate simulated data for CI validation
        run: |
          python -m code.simulator.simulator --n 30 --seed 42 --output data/raw/simulated_sessions.json
        # Note: This uses the DeterministicDataSimulator (T031) for CI validation only.
        # Real human data collection is handled by the web app (FR-007).
        # The --simulate flag in the analysis pipeline will trigger this if real data is missing,
        # but only in CI/Dev mode.

      - name: Run Data Cleaning Pipeline
        run: |
          python code/analysis/clean_data.py --input data/raw/simulated_sessions.json --output data/processed/cleaned_sessions.csv

      - name: Run Statistical Analysis
        run: |
          python code/analysis/run_analysis.py --input data/processed/cleaned_sessions.csv --output data/processed/metrics_summary.csv

      - name: Execute Notebook
        run: |
          python code/analysis/run_notebook_validation.py --notebook code/analysis/analysis.ipynb

      - name: Validate Outputs
        run: |
          python code/analysis/validate_notebook_execution.py

      - name: Generate Execution Log
        run: |
          python code/analysis/generate_execution_log.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-artifacts
          path: |
            data/processed/
            figures/
            notebook_execution_log.txt