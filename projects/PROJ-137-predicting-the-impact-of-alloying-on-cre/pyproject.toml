[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-creep-prediction"
version = "0.1.0"
description = "Predicting the impact of alloying on creep resistance via public data"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "scikit-learn",
    "pymatgen",
    "shap",
    "numpy",
    "pyyaml",
    "requests",
    "tqdm",
    "scipy",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
]

[tool.ruff]
# Same as Black
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long, handled by black
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"] # assert allowed in tests

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
