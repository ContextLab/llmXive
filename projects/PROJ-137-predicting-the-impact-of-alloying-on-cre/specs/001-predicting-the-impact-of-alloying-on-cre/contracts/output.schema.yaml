$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelPerformanceReport"
description: "Schema for the model performance comparison report"
type: "object"
properties:
  thermodynamic_model:
    type: "object"
    properties:
      model_type:
        type: "string"
        const: "thermodynamic"
      r2_mean:
        type: "number"
      rmse_mean:
        type: "number"
      r2_std:
        type: "number"
      rmse_std:
        type: "number"
    required:
      - model_type
      - r2_mean
      - rmse_mean
  composition_only_model:
    type: "object"
    properties:
      model_type:
        type: "string"
        const: "composition_only"
      r2_mean:
        type: "number"
      rmse_mean:
        type: "number"
      r2_std:
        type: "number"
      rmse_std:
        type: "number"
    required:
      - model_type
      - r2_mean
      - rmse_mean
  statistical_test:
    type: "object"
    properties:
      method:
        type: "string"
        description: "e.g., 'Permutation Test', 'Bootstrap 95% CI'"
      ci_lower:
        type: "number"
      ci_upper:
        type: "number"
      p_value:
        type: "number"
        nullable: true
      sensitivity_analysis:
        type: "array"
        items:
          type: "object"
          properties:
            cutoff:
              type: "number"
            is_significant:
              type: "boolean"
          required:
            - cutoff
            - is_significant
    required:
      - method
      - ci_lower
      - ci_upper
  shap_top_features:
    type: "array"
    description: "Top 5 features by mean absolute SHAP value"
    items:
      type: "object"
      properties:
        feature_name:
          type: "string"
        mean_abs_shap:
          type: "number"
        direction:
          type: "string"
          description: "e.g., 'positive correlation', '+value'"
      required:
        - feature_name
        - mean_abs_shap
        - direction
  physics_consistency_check:
    type: "object"
    properties:
      passed:
        type: "boolean"
      r2_synthetic:
        type: "number"
      threshold:
        type: "number"
        const: 0.8
      signal_detected:
        type: "boolean"
        description: "True if Thermodynamic model significantly outperforms Composition-Only"
      mdes:
        type: "number"
        description: "Minimum Detectable Effect Size for the given N"
    required:
      - passed
      - r2_synthetic
      - threshold
      - signal_detected
      - mdes
required:
  - thermodynamic_model
  - composition_only_model
  - statistical_test
  - shap_top_features
  - physics_consistency_check
additionalProperties: false
