$schema: "http://json-schema.org/draft-07/schema#"
title: "AlloyCreepDataset"
description: "Schema for the processed alloy creep dataset (CSV/Parquet)"
type: "object"
properties:
  alloy_id:
    type: "string"
    description: "Unique identifier for the alloy sample"
  composition_str:
    type: "string"
    description: "Normalized composition string (e.g., 'Al-5.0Cr-10.0Ni')"
  temperature:
    type: "number"
    description: "Temperature in Kelvin"
  stress:
    type: "number"
    description: "Stress in MPa"
  rupture_time:
    type: "number"
    description: "Time to rupture in hours"
  mixing_enthalpy:
    type: "number"
    description: "Mixing enthalpy in kJ/mol (can be null for composition-only model)"
  radius_mismatch:
    type: "number"
    description: "Atomic radius mismatch (can be null for composition-only model)"
  elemental_fractions:
    type: "object"
    description: "Dictionary of element -> atomic fraction"
    additionalProperties:
      type: "number"
  synthetic_interaction_signal:
    type: "number"
    nullable: true
    description: "Injected signal for synthetic data validation (null for real data)"
required:
  - alloy_id
  - composition_str
  - temperature
  - stress
  - rupture_time
  - elemental_fractions
additionalProperties: false
