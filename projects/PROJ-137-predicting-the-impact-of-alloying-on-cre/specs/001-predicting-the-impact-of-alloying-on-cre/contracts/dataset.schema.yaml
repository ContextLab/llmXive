$schema: "http://json-schema.org/draft-07/schema#"
title: "AlloyCreepDataset"
description: "Schema for the processed alloy creep dataset containing composition and thermodynamic features."
type: "object"
properties:
  alloy_id:
    type: "string"
    description: "Unique identifier for the alloy sample."
  composition_str:
    type: "string"
    description: "Raw composition string (e.g., 'Ni-10Cr-5Al')."
  temperature:
    type: "number"
    description: "Test temperature in Kelvin."
    minimum: 0
  stress:
    type: "number"
    description: "Applied stress in MPa."
    minimum: 0
  rupture_time:
    type: "number"
    description: "Time to rupture in hours."
    minimum: 0
  mixing_enthalpy:
    type: "number"
    description: "Mixing enthalpy in kJ/mol."
    nullable: true
  radius_mismatch:
    type: "number"
    description: "Atomic radius mismatch in percent."
    nullable: true
  avg_atomic_radius:
    type: "number"
    description: "Average atomic radius in pm."
    nullable: true
  thermo_available:
    type: "boolean"
    description: "Flag indicating if thermodynamic data was successfully retrieved."
required:
  - alloy_id
  - composition_str
  - temperature
  - stress
  - rupture_time
  - thermo_available
additionalProperties: true
description: "Any additional properties (e.g., elemental fractions) are allowed."