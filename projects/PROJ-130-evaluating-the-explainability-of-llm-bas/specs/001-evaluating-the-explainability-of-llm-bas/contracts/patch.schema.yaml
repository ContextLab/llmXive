$schema: http://json-schema.org/draft-07/schema#
title: Generated Patch Schema
type: object
properties:
  patch_id:
    type: string
    description: "Unique identifier for generated patch"
  bug_id:
    type: string
    description: "Foreign key to Bug entity"
  diff_content:
    type: string
    description: "Generated diff in unified format"
  generation_timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation"
  model_revision:
    type: string
    description: "CodeLlama-7B-Instruct revision identifier"
  random_seed:
    type: integer
    description: "Random seed used for generation"
  generation_status:
    type: string
    enum:
      - success
      - invalid
      - generation_failed
    description: "Status of patch generation"
required:
  - patch_id
  - bug_id
  - diff_content
  - generation_timestamp
  - model_revision
  - random_seed
  - generation_status
additionalProperties: false
