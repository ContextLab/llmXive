[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-eval-explainability"
version = "0.1.0"
description = "Evaluating the Explainability of LLM-Based Bug Fixes"
requires-python = ">=3.11"
dependencies = [
    "transformers==4.36.0",
    "datasets==2.16.0",
    "captum==0.7.0",
    "scikit-learn==1.4.0",
    "pytest==7.4.0",
    "pandas==2.1.0",
    "numpy==1.26.0",
    "evaluate==0.4.1",
    "sentence-transformers==2.2.2",
    "radon==6.0.1"
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | explanations
    | state
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
]
exclude = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "data",
    "explanations",
    "state",
    "specs"
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.isort]
known-first-party = ["models", "utils"]
force-sort-within-sections = true
