# This file is a legacy fallback; prefer [tool.ruff] in pyproject.toml
# It is included to ensure compatibility with older ruff versions if needed.
line-length = 100
target-version = "py311"
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]
exclude = [
    ".git",
    ".tox",
    ".venv",
    "build",
    "dist",
    "data",
    "artifacts",
]
