[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "bmg-shear-modulus-prediction"
version = "0.1.0"
description = "Predicting the Impact of Composition on the Shear Modulus of Bulk Metallic Glasses"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.8.0",
    "scipy>=1.11.0",
    "pyyaml>=6.0.1",
    "mendeleev>=0.17.0",
    "requests>=2.31.0",
    "pytest>=7.4.0",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data/raw
)/
'''

[tool.ruff]
# Inherits configuration from .ruff.toml, but can override here if needed
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]