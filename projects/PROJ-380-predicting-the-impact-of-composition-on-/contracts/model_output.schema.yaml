$schema: http://json-schema.org/draft-07/schema#
title: ModelOutput
description: >
  Schema for the model performance report generated by the ML pipeline.
  This artifact is produced after training and evaluation (User Story 2).
type: object
required:
  - model_name
  - metrics
  - hyperparameters
  - statistical_test
  - timestamp
properties:
  model_name:
    type: string
    description: Name of the best performing model (e.g., "RandomForest", "GradientBoosting").
    minLength: 1
  
  metrics:
    type: object
    description: Performance metrics calculated on the test set.
    required:
      - R2
      - MAE
      - RMSE
    properties:
      R2:
        type: number
        description: Coefficient of determination.
        minimum: -1.0
      MAE:
        type: number
        description: Mean Absolute Error.
        minimum: 0.0
      RMSE:
        type: number
        description: Root Mean Squared Error.
        minimum: 0.0

  hyperparameters:
    type: object
    description: The final hyperparameters used for the best model.
    additionalProperties: true

  statistical_test:
    type: object
    description: Results of the statistical comparison between models.
    required:
      - method
      - p_value
    properties:
      method:
        type: string
        description: The statistical test used (e.g., "Corrected Resampled t-test", "Wilcoxon Signed-Rank").
        minLength: 1
      p_value:
        type: number
        description: The p-value resulting from the test.
        minimum: 0.0
        maximum: 1.0
      confidence_interval:
        type: array
        description: 95% Confidence Interval for the performance difference.
        items:
          type: number
        minItems: 2
        maxItems: 2
      alternative:
        type: string
        description: The alternative hypothesis used (e.g., "two-sided", "greater").
        enum:
          - two-sided
          - greater
          - less

  validation_strategy:
    type: object
    description: Details about the validation strategy used (e.g., LOFO, GroupKFold).
    required:
      - type
    properties:
      type:
        type: string
        description: Type of validation (e.g., "LOFO", "GroupKFold", "Hybrid").
      n_folds:
        type: integer
        description: Number of folds used.
        minimum: 2
      groups:
        type: array
        description: List of unique groups used in grouping-based validation.
        items:
          type: string

  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the report was generated.

  data_checksum:
    type: string
    description: SHA-256 checksum of the input dataset used for training, for provenance tracking.
    pattern: '^[a-f0-9]{64}$'

  feature_names:
    type: array
    description: List of feature names used in the model.
    items:
      type: string
    uniqueItems: true

additionalProperties: false