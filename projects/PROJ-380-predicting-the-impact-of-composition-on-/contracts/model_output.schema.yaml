$schema: http://json-schema.org/draft-07/schema#
title: ModelPerformance
description: >
  Schema for the model performance report generated by the BMG shear modulus
  prediction pipeline. This schema defines the structure of `artifacts/model_report.json`.
  It captures metrics, hyperparameters, statistical test results, and provenance
  information to ensure reproducibility and compliance with the Constitution Principle V.

type: object
required:
  - metadata
  - metrics
  - hyperparameters
  - statistical_test
  - validation_strategy

properties:
  metadata:
    type: object
    description: Metadata about the run and environment.
    required:
      - timestamp
      - project_id
      - schema_version
      - source_artifacts
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the report was generated.
      project_id:
        type: string
        description: Identifier for the project (e.g., PROJ-380-predicting-the-impact-of-composition-on-).
      schema_version:
        type: string
        description: Version of this schema.
      source_artifacts:
        type: object
        description: Checksums of input data and code artifacts used.
        properties:
          training_data_checksum:
            type: string
            description: SHA-256 checksum of the training dataset.
          test_data_checksum:
            type: string
            description: SHA-256 checksum of the test dataset.
          feature_engineering_script:
            type: string
            description: Checksum of the features.py script.
          model_training_script:
            type: string
            description: Checksum of the train.py script.

  metrics:
    type: object
    description: Performance metrics calculated on the test set.
    required:
      - R2
      - MAE
      - RMSE
    properties:
      R2:
        type: number
        description: Coefficient of determination (R-squared).
      MAE:
        type: number
        description: Mean Absolute Error.
      RMSE:
        type: number
        description: Root Mean Squared Error.
      best_model_name:
        type: string
        description: Name of the model achieving these metrics (e.g., "RandomForest", "GradientBoosting").

  hyperparameters:
    type: object
    description: Final hyperparameters of the best performing model.
    additionalProperties: true
    description: >
      Keys depend on the model type (LinearRegression, RandomForest, GradientBoosting).
      Example keys: 'n_estimators', 'max_depth', 'learning_rate', 'random_state'.

  statistical_test:
    type: object
    description: Results of the statistical comparison between models.
    required:
      - method
      - p_value
      - confidence_level
      - conclusion
    properties:
      method:
        type: string
        enum:
          - corrected_resampled_ttest
          - wilcoxon_signed_rank_test
          - bayes_factor_wilcoxon
        description: The statistical method used for comparison.
      p_value:
        type: number
        description: The calculated p-value.
      confidence_level:
        type: number
        description: Confidence level used (e.g., 0.95).
      confidence_interval:
        type: array
        items:
          type: number
        minItems: 2
        maxItems: 2
        description: 95% Confidence interval for the difference in performance.
      conclusion:
        type: string
        description: Human-readable conclusion of the test (e.g., "Model A is significantly better than Model B").
      comparison_pair:
        type: array
        items:
          type: string
        minItems: 2
        maxItems: 2
        description: Names of the two models being compared.

  validation_strategy:
    type: object
    description: Details of the validation strategy used (LOFO/GroupKFold).
    required:
      - type
      - groups
      - n_splits
    properties:
      type:
        type: string
        enum:
          - hybrid_LOFO_GroupKFold
        description: The type of validation strategy.
      groups:
        type: array
        items:
          type: string
        description: List of alloy families used as groups.
      n_splits:
        type: integer
        description: Number of splits used in the cross-validation.
      lofo_threshold:
        type: integer
        description: Minimum family size to use LOFO instead of GroupKFold.

  feature_importance_summary:
    type: object
    description: Optional summary of feature importance if available.
    properties:
      top_features:
        type: array
        items:
          type: object
          properties:
            feature:
              type: string
            importance:
              type: number
        description: List of top features and their importance scores.