$schema: http://json-schema.org/draft-07/schema#
title: BMGEntry
description: |
  Schema for a single Bulk Metallic Glass (BMG) entry.
  Defines the structure for raw and processed data including
  source metadata, elemental composition (atomic percent),
  and shear modulus measurements.
type: object
required:
  - source
  - composition
  - modulus
properties:
  source:
    type: object
    description: Metadata regarding the origin of this data point.
    required:
      - database
      - material_id
      - reference
    properties:
      database:
        type: string
        description: Name of the source database (e.g., 'Materials Project', 'Synthetic').
        enum:
          - Materials Project
          - Synthetic
      material_id:
        type: string
        description: Unique identifier in the source database (e.g., 'mp-12345').
      reference:
        type: string
        description: Citation or DOI for the data source.
      fetch_date:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the data was retrieved.
      provenance_checksum:
        type: string
        description: SHA-256 checksum of the raw source record.

  composition:
    type: object
    description: Elemental composition of the alloy.
    required:
      - elements
      - atomic_fractions
    properties:
      elements:
        type: array
        items:
          type: string
        description: List of chemical symbols (e.g., ['Zr', 'Ti', 'Cu']).
      atomic_fractions:
        type: array
        items:
          type: number
          minimum: 0
          maximum: 1
        description: Atomic fractions corresponding to the elements list. Sum must be ~1.0.
      weight_fractions:
        type: array
        items:
          type: number
          minimum: 0
        description: Optional weight fractions if original data was in wt%.

  modulus:
    type: object
    description: Shear modulus measurement.
    required:
      - value
      - unit
    properties:
      value:
        type: number
        description: Shear modulus value (GPa).
      unit:
        type: string
        enum:
          - GPa
          - MPa
        default: GPa
      method:
        type: string
        description: Measurement or calculation method (e.g., 'DFT', 'Ultrasound').
      uncertainty:
        type: number
        description: Estimated uncertainty of the measurement.

  descriptors:
    type: object
    description: Optional pre-calculated compositional descriptors.
    properties:
      delta:
        type: number
        description: Atomic size difference (delta).
      delta_hmix:
        type: number
        description: Enthalpy of mixing (kJ/mol).
      vec:
        type: number
        description: Valence electron concentration.
      delta_chi:
        type: number
        description: Electronegativity difference.
      vif:
        type: number
        description: Variance Inflation Factor for this sample's feature set.

  metadata:
    type: object
    description: Internal processing metadata.
    properties:
      cleaned:
        type: boolean
        default: false
      filtered:
        type: boolean
        default: false
      alloy_family:
        type: string
        description: Classified alloy family (e.g., 'Zr-based', 'Pd-based').

additionalProperties: false