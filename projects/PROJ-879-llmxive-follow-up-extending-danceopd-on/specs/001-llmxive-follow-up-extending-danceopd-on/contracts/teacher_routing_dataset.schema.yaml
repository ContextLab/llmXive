$schema: http://json-schema.org/draft-07/schema#
title: TeacherRoutingDataset
description: Schema for the synthetic dataset generated by the DanceOPD teacher model.
type: object
properties:
  id:
    type: string
    description: Unique identifier for the sample.
  prompt_embedding:
    type: array
    description: The embedding vector of the input prompt.
    items:
      type: number
    minItems: 512
    maxItems: 512
  noise_level:
    type: number
    description: The noise level at the current diffusion step.
    minimum: 0.0
    maximum: 1.0
  routing_label:
    type: string
    description: The expert field ID selected by the teacher.
    enum:
      - expert_text_to_image
      - expert_editing
      - expert_inpainting
      - expert_super_resolution
      - expert_fallback
  velocity_vector:
    type: array
    description: The velocity vector output by the selected expert.
    items:
      type: number
    minItems: 64
    maxItems: 64
  source_dataset:
    type: string
    description: Source of the original image.
    enum:
      - imagenet
      - laion
  step_index:
    type: integer
    description: The diffusion step index.
    minimum: 0
required:
  - id
  - prompt_embedding
  - noise_level
  - routing_label
  - velocity_vector
  - source_dataset
  - step_index
additionalProperties: false