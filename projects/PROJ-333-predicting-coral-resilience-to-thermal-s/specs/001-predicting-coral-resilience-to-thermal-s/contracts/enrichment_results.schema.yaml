$schema: "http://json-schema.org/draft-07/schema#"
title: "Enrichment Results Schema"
description: "Schema for the pathway enrichment analysis output from g:Profiler."
type: object
properties:
  term_id:
    type: string
    description: "Unique identifier for the pathway (e.g., GO:0006950)."
  term_name:
    type: string
    description: "Human-readable name of the pathway."
  p_value:
    type: number
    description: "Raw p-value from the enrichment test."
  adjusted_p_value:
    type: number
    description: "Multiple testing corrected p-value."
  genes:
    type: array
    items:
      type: string
    description: "List of gene IDs contributing to this pathway."
  source:
    type: string
    description: "Source database (e.g., GO, KEGG, Reactome)."
required:
  - term_id
  - term_name
  - p_value
  - adjusted_p_value
  - genes
  - source
additionalProperties: false
