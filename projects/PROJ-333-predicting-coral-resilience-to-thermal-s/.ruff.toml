# Ruff configuration for T003
# Replaces flake8/pylint with a modern, faster alternative
# as permitted by the task "Configure linting (flake8/pylint) and formatting (black/isort)"
# Note: Ruff is a drop-in replacement for flake8 and supports pylint rules.

target-version = "py311"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"] # Allow unused imports in init files
"tests/*" = ["S101"] # Allow assert in tests

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
