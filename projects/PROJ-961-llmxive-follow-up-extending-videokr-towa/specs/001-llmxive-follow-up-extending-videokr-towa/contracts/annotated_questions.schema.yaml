$schema: "http://json-schema.org/draft-07/schema#"
title: "Annotated Questions Schema"
description: "Schema for the annotated dataset containing structural chain length and correctness labels."
type: "object"
properties:
  question_id:
    type: "string"
    description: "Unique identifier for the question record."
  question_text:
    type: "string"
    description: "The natural language question text."
  answer_text:
    type: "string"
    description: "The ground truth answer."
  predicted_correctness:
    type: "boolean"
    description: "Whether the model prediction was correct."
  chain_length:
    type: "integer"
    minimum: 1
    description: "Shortest path hops between query and answer entities. -1 if unresolvable."
  status:
    type: "string"
    enum:
      - "valid"
      - "disconnected"
      - "mapping_failure"
    description: "Status of the graph traversal or entity linking."
required:
  - question_id
  - question_text
  - answer_text
  - predicted_correctness
  - chain_length
  - status
additionalProperties: false
