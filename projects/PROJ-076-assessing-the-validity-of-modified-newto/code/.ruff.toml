[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in config)
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"] # Allow imports for public API exposure

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
