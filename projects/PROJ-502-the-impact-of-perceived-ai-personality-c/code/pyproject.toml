[tool.black]
line-length = 88
target-version = ['py38', 'py39', 'py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code"]
known_third_party = ["datasets", "pandas", "numpy", "sklearn", "statsmodels", "torch", "transformers", "seaborn", "matplotlib", "yaml", "pytest"]
