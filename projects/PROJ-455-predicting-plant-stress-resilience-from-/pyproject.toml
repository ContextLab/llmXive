[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-stress-resilience"
version = "0.1.0"
description = "Predicting Plant Stress Resilience from Publicly Available Metabolomic Data"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.0.3",
    "scikit-learn==1.3.0",
    "numpy==1.24.0",
    "requests==2.31.0",
    "biopython==1.81",
    "pyyaml==6.0.1",
    "pytest==7.4.0",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "pytest-cov>=4.1.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code", "tests"]
known_third_party = ["pandas", "numpy", "sklearn", "requests", "Bio", "yaml", "pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "contract: Contract tests",
    "slow: Mark tests that take a long time",
]