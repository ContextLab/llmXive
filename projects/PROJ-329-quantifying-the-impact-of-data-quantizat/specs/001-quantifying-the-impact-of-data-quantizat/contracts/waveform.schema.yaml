$schema: "http://json-schema.org/draft-07/schema#"
title: "SimulatedWaveform"
description: "Schema for ground-truth and quantized gravitational wave signals."
type: "object"
properties:
  waveform_id:
    type: "string"
    description: "Unique UUID for the waveform."
  params:
    type: "object"
    properties:
      mass_1:
        type: "number"
        description: "Primary mass in solar masses (10-50)."
      mass_2:
        type: "number"
        description: "Secondary mass in solar masses (10-50)."
      spin_1z:
        type: "number"
        description: "Primary spin component ([-0.9, 0.9])."
      spin_2z:
        type: "number"
        description: "Secondary spin component ([-0.9, 0.9])."
      luminosity_distance:
        type: "number"
        description: "Luminosity distance in Mpc (100-1000)."
    required: ["mass_1", "mass_2", "luminosity_distance"]
  snr:
    type: "number"
    description: "Injected Signal-to-Noise Ratio."
  bit_depth:
    type: "integer"
    description: "Bit depth of quantization (1, 8, 10, 12, 14, 16)."
  step_size:
    type: "number"
    description: "Amplitude resolution of the quantization."
  data_type:
    type: "string"
    enum: ["float64", "quantized"]
    description: "Type of data stored."
required: ["waveform_id", "params", "snr", "bit_depth", "data_type"]
