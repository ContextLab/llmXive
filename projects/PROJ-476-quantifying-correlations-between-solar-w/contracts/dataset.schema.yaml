$schema: "http://json-schema.org/draft-07/schema#"
title: "Synced Solar Wind and Geomagnetic Dataset"
description: "Schema for the hourly aligned dataset produced by T013."
type: object
required:
  - timestamp
  - proton_density
  - temperature
  - helium_abundance
  - Kp
  - Dst
properties:
  timestamp:
    type: string
    format: date-time
    description: "UTC timestamp at hourly resolution."
  proton_density:
    type: number
    description: "Proton density (N_p) in cm^-3."
  temperature:
    type: number
    description: "Proton temperature (T_p) in Kelvin."
  helium_abundance:
    type: number
    description: "Helium abundance ratio (He2+/H+)."
  Kp:
    type: number
    description: "Planetary K-index."
  Dst:
    type: number
    description: "Disturbance Storm Time index in nT."
additionalProperties: false