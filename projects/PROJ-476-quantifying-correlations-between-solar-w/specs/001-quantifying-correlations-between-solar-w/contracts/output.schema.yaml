$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Result Schema"
description: "Schema for the output of the lagged correlation analysis."
type: "object"
properties:
  composition_param:
    type: "string"
    enum:
      - "proton_density"
      - "temperature"
      - "helium_abundance"
    description: "The solar wind parameter being analyzed."
  geomagnetic_index:
    type: "string"
    enum:
      - "Kp"
      - "Dst"
    description: "The geomagnetic index being analyzed."
  lag_hours:
    type: "integer"
    enum:
      - 0
      - 1
      - 2
      - 3
      - 6
    description: "The time lag in hours."
  pearson_r:
    type: "number"
    description: "Pearson correlation coefficient."
  spearman_rho:
    type: "number"
    description: "Spearman rank correlation coefficient."
  p_raw:
    type: "number"
    description: "Raw p-value adjusted for effective degrees of freedom (EDF) using Thomson's MTM."
  p_holm_bonferroni:
    type: "number"
    description: "Holm-Bonferroni-corrected p-value."
  significant:
    type: "boolean"
    description: "True if p_holm_bonferroni < 0.05."
  effect_size_large:
    type: "boolean"
    description: "True if abs(pearson_r) > 0.5."
required:
  - composition_param
  - geomagnetic_index
  - lag_hours
  - pearson_r
  - spearman_rho
  - p_raw
  - p_holm_bonferroni
  - significant
  - effect_size_large
additionalProperties: false