$schema: http://json-schema.org/draft-07/schema#
title: Skill Schema
description: Schema for a single skill in the llmXive experiment
type: object
required:
  - id
  - code
properties:
  id:
    type: string
    description: Unique identifier for the skill
  code:
    type: string
    description: Python code implementation of the skill
  category:
    type: string
    description: Category or type of the skill
  created_at:
    type: number
    description: Unix timestamp of creation
additionalProperties: true
