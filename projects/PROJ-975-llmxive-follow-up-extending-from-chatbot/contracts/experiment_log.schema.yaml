$schema: http://json-schema.org/draft-07/schema#
title: Experiment Log Schema
description: Schema for the experiment log entries recorded during agent execution.
type: object
required:
  - task_id
  - skill_id
  - success
  - latency
  - tokens
  - retrieval_precision
  - retrieval_diversity
  - pruning_risk_count
  - library_size
  - pruning_enabled
properties:
  task_id:
    type: string
    description: ID of the task being executed.
  skill_id:
    type: string
    description: ID of the primary skill attempted or the top retrieved skill.
  success:
    type: boolean
    description: Whether the task was completed successfully.
  latency:
    type: number
    format: float
    description: Time taken to complete the task in seconds.
  tokens:
    type: integer
    description: Number of tokens consumed during the execution.
  retrieval_precision:
    type: number
    format: float
    description: Jaccard similarity between retrieved skills and ground truth.
  retrieval_diversity:
    type: number
    format: float
    description: Inverse variance of cosine similarities of retrieved skills.
  pruning_risk_count:
    type: integer
    description: Count of pruned skills that had high similarity to ground truth.
  library_size:
    type: integer
    description: The size of the skill library used for this run.
  pruning_enabled:
    type: boolean
    description: Whether the pruning heuristic was active during this run.
additionalProperties: false