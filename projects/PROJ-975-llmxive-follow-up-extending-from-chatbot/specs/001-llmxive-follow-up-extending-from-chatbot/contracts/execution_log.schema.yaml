$schema: "http://json-schema.org/draft-07/schema#"
title: "ExecutionLogSchema"
description: "Schema for a single task execution log entry."
type: "object"
properties:
  log_id:
    type: "string"
    description: "Unique identifier for the log entry."
  task_id:
    type: "string"
    description: "Reference to the task executed."
  library_size:
    type: "integer"
    description: "Number of active skills in the library during this run."
    enum: [10, 30, 50, 100]
  pruning_enabled:
    type: "boolean"
    description: "Whether the pruning heuristic was active."
  success:
    type: "boolean"
    description: "Indicates if the task completed successfully."
  failure_reason:
    type: "string"
    description: "Reason for failure if success is false."
    enum: ["timeout", "missing_skill", "false_prune", "logic_error", ""]
  token_usage:
    type: "integer"
    description: "Total tokens consumed by the LLM."
  latency_ms:
    type: "number"
    description: "Execution time in milliseconds."
  retrieved_skill_ids:
    type: "array"
    items:
      type: "string"
    description: "List of skill IDs retrieved for this task."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the execution."
required:
  - log_id
  - task_id
  - library_size
  - pruning_enabled
  - success
  - failure_reason
  - token_usage
  - latency_ms
  - retrieved_skill_ids
  - timestamp
additionalProperties: false