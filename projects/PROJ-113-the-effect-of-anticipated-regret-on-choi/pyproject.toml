[project]
name = "llmxive-automated-science"
version = "0.1.0"
description = "Automated science pipeline for research projects"
requires-python = ">=3.10"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "statsmodels",
    "pyyaml",
    "requests",
    "datasets",
    "ruff",
    "black",
    "tomli",
    "tomli-w",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.eggs
  | venv
  | \.venv
  | build
  | dist
  | \.mypy_cache
)/
'''