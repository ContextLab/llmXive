target-version = "py310"
line-length = 88
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
    "B008",
]
exclude = [
    ".git",
    "__pycache__",
    ".eggs",
    "*.egg-info",
    "venv",
    ".venv",
    "build",
    "dist",
]
[per-file-ignores]
"__init__.py" = ["F401"]