[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info
per-file-ignores =
    # Allow unused imports in __init__.py for public API exposure
    code/__init__.py:F401
    tests/__init__.py:F401
# Ignore specific common warnings for scientific code where appropriate
# E731: Do not assign a lambda expression, use a def
# W503: Line break occurred before a binary operator (conflicts with black)
ignore = E731

[isort]
profile = black
line_length = 100
known_first_party = config, exceptions, models, ingest, clean, validity, logging_config, linting_config
skip = .git,__pycache__,build,dist,.eggs,*.egg-info
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
