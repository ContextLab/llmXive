- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: constraint_preservation-c423420e
  location: tasks.md:T017
  reviewer: constraint_preservation
  round: 1
  severity: requirement
  text: Task T017 ('auto-trigger pretrain') violates the strict sequential dependency
    and timeout constraints defined in FR-001 (3h limit) and SC-001 (6h total). Auto-triggering
    pretraining within the RL task creates a risk of exceeding the total CI time limit
    if pretraining fails or is slow, effectively weakening the hard time constraint
    of the spec.
- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: constraint_preservation-f641cffb
  location: tasks.md:T016
  reviewer: constraint_preservation
  round: 1
  severity: requirement
  text: Task T016 duplicates memory monitoring logic in `trainer_pretrain.py` and
    `trainer_rl.py`, whereas FR-006 and T004 define a centralized `DatasetSampler`
    with RSS monitoring. This duplication risks inconsistent error handling and violates
    the principle of a single source of truth for resource constraints, potentially
    allowing a trainer to proceed even if the sampler logic is bypassed.
- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
