- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: ordering-92deb6e2
  location: tasks.md:Phase 4
  reviewer: ordering
  round: 1
  severity: requirement
  text: 'User Story 2 (Phase 4) tasks T021-T024 depend on artifacts generated by User
    Story 1 (Phase 3). However, the ''Dependencies & Execution Order'' section states
    US2 ''Can start after Foundational (Phase 2)'', implying parallel execution. This
    creates a semantic violation: T021 (extract metrics from logs) and T022 (load
    policy.pth) cannot execute if US1 (T014/T015) has not completed. The plan must
    enforce US1 completion before US2 tasks begin.'
- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: ordering-59f19c11
  location: tasks.md:T017
  reviewer: ordering
  round: 1
  severity: requirement
  text: 'Task T017 (''auto-trigger pretrain'') creates a hidden cyclic dependency
    and race condition. If T017 is part of the US1 implementation, it implies the
    RL trainer (T015) can run before the Pretrain trainer (T014) finishes. This violates
    the ''Producer before consumer'' rule where `ckpt/backbone.pth` (Producer: T014)
    must exist before `trainer_rl.py` (Consumer: T015) attempts to load it. Auto-triggering
    logic belongs in the orchestration script (T008), not the trainer implementation,
    to maintain clear task boundaries.'
- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: ordering-0224bfe8
  location: tasks.md:Phase 5
  reviewer: ordering
  round: 1
  severity: requirement
  text: User Story 3 (Phase 5) tasks T026-T029 depend on `logs/metrics.json` (produced
    by US2 T021) and `ckpt/` stats (produced by US1 T015). The 'Dependencies' section
    correctly notes US3 depends on US1 and US2, but the task list does not explicitly
    enforce this ordering in the execution flow. If US2 is delayed or fails, US3 tasks
    are blocked. The task order should reflect this strict serial dependency (US1
    -> US2 -> US3) rather than grouping them as independent phases that 'can start
    after Foundational'.
- artifact: projects/PROJ-640-https-arxiv-org-abs-2605-28293/specs/001-https-arxiv-org-abs-2605-28293/tasks.md
  id: ordering-1740a8b6
  location: tasks.md:Phase 2
  reviewer: ordering
  round: 1
  severity: writing
  text: Task T006 and T007 are marked [P] (parallel-safe). While creating schema files
    is generally parallel-safe, T006 defines the input schema for `dataset.py` (T004)
    and T007 defines the output schema for `metrics.json` (T021). If T004 or T021
    are implemented before T006/T007, the implementation lacks the contract definition.
    While not a hard block, the [P] tag is semantically risky if the team assumes
    they can implement T004 before T006 is finalized. Consider removing [P] or clarifying
    that contracts must be reviewed before implementation.
