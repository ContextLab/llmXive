[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-stress"
version = "0.1.0"
description = "Predicting Plant Stress Response from Publicly Available Proteomic Data"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas==2.0.3",
    "scikit-learn==1.3.0",
    "matplotlib==3.7.2",
    "seaborn==0.12.2",
    "rpy2==3.5.13",
    "requests==2.31.0",
    "psutil==5.9.5",
    "imp3==1.2.0",
    "pydantic>=2.0.0",
    "biopython",
    "openpyxl",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.1.0",
    "black>=23.12.1",
    "isort>=5.13.2",
    "pytest>=7.4.4",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.6.0",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | results
    | logs
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".git", ".venv", "data", "results", "logs"]
known_first_party = ["data_ingestion", "modeling", "reporting", "utils"]
known_third_party = ["pandas", "sklearn", "matplotlib", "seaborn", "rpy2", "requests", "psutil", "imp3", "pydantic"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
