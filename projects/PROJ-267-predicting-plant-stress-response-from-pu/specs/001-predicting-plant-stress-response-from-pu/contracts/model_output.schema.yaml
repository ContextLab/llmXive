$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the JSON report containing model performance metrics and feature importance."
type: "object"
properties:
  model_type:
    type: "string"
    enum:
      - "RandomForestRegressor"
      - "SVR"
    description: "Type of model trained."
  validation_strategy:
    type: "string"
    enum:
      - "within_stress_cv"
      - "cross_stress_test"
    description: "Validation strategy used."
  metrics:
    type: "object"
    properties:
      r_squared:
        type: "number"
        description: "R² score of the model."
      rmse:
        type: "number"
        description: "Root Mean Squared Error."
      null_model_r_squared:
        type: "number"
        description: "R² of the null model (mean prediction)."
      r_squared_drop:
        type: "number"
        description: "Difference in R² between within-stress and cross-stress (if applicable)."
    required:
      - "r_squared"
      - "rmse"
  feature_importance:
    type: "array"
    description: "Top 20 proteins by importance."
    items:
      type: "object"
      properties:
        protein_id:
          type: "string"
        importance_score:
          type: "number"
      required:
        - "protein_id"
        - "importance_score"
    maxItems: 20
  runtime_metrics:
    type: "object"
    properties:
      total_time_seconds:
        type: "number"
      peak_memory_mb:
        type: "number"
    required:
      - "total_time_seconds"
      - "peak_memory_mb"
required:
  - "model_type"
  - "validation_strategy"
  - "metrics"
  - "feature_importance"
additionalProperties: false
