$schema: "http://json-schema.org/draft-07/schema#"
title: "Unified Dataset Schema"
description: "Schema for the processed unified matrix containing protein features and gene expression targets."
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the sample."
  stress:
    type: "string"
    enum:
      - "Drought"
      - "Salinity"
      - "Heat"
    description: "Abiotic stress condition applied."
  species:
    type: "string"
    enum:
      - "Arabidopsis"
      - "Rice"
      - "Wheat"
    description: "Plant species."
  target_gene_expression:
    type: "number"
    description: "Normalized gene expression value (target)."
  protein_features:
    type: "array"
    description: "List of normalized protein abundance values."
    items:
      type: "number"
    minItems: 1
required:
  - "sample_id"
  - "stress"
  - "species"
  - "target_gene_expression"
  - "protein_features"
additionalProperties: false
