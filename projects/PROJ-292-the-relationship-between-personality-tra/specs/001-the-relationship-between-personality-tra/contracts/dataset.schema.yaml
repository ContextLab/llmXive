$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Dataset Schema"
description: "Schema for the merged analysis_data.csv containing personality traits and response metrics."
type: "object"
properties:
  participant_id:
    type: "integer"
    description: "Unique identifier for the participant."
  openness:
    type: "number"
    description: "Openness score (0-50 scale)."
    minimum: 0
    maximum: 50
  conscientiousness:
    type: "number"
    description: "Conscientiousness score (0-50 scale)."
    minimum: 0
    maximum: 50
  extraversion:
    type: "number"
    description: "Extraversion score (0-50 scale)."
    minimum: 0
    maximum: 50
  agreeableness:
    type: "number"
    description: "Agreeableness score (0-50 scale)."
    minimum: 0
    maximum: 50
  neuroticism:
    type: "number"
    description: "Neuroticism score (0-50 scale)."
    minimum: 0
    maximum: 50
  receptivity_score:
    type: "number"
    description: "Receptivity to feedback (1-5 Likert scale)."
    minimum: 1
    maximum: 5
  anxiety_level:
    type: "number"
    description: "Anxiety level (1-5 Likert scale)."
    minimum: 1
    maximum: 5
  behavioral_intention:
    type: "number"
    description: "Behavioral intention (1-5 Likert scale)."
    minimum: 1
    maximum: 5
  feedback_text:
    type: "string"
    description: "The AI-generated feedback text."
  feedback_label:
    type: "integer"
    description: "Original classification label (0 or 1)."
required:
  - participant_id
  - openness
  - conscientiousness
  - extraversion
  - agreeableness
  - neuroticism
  - receptivity_score
  - anxiety_level
  - behavioral_intention
  - feedback_text
  - feedback_label
additionalProperties: false
