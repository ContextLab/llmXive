# Environment configuration for glass-forming region prediction pipeline
# Project: PROJ-544-predicting-the-glass-forming-region-of-m
# Generated: 2026-05-14

# Random seeds for reproducibility across all ML operations
random_seeds:
  numpy: 42
  sklearn: 42
  shap: 42
  overall: 42

# Memory limits for model training and data processing
# Set to 16GB to accommodate model and derived data within FR-007 constraints
max_ram_gb: 16

# Logging configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Directory paths (relative to project root)
paths:
  data_raw: data/raw
  data_derived: data/derived
  data_samples: data/samples
  results: results
  logs: logs
  models: models
  figures: figures
  state: state
  contracts: contracts
  code: code
  scripts: scripts

# Feature configuration
features:
  descriptors:
    atomic_size_mismatch: true
    mixing_enthalpy: true
    electronegativity_variance: true
  models:
    random_forest: true
    gradient_boosting: true
  interpretability:
    shap: true
    permutation_importance: true
    vif_filtering: true
