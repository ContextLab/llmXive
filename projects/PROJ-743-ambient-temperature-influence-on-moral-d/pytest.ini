[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -n auto --dist=loadfile
# CPU-only execution: ensure no GPU is used
env =
  CUDA_VISIBLE_DEVICES=
# Stratified sampling configuration for tests
# Use a fixed seed for reproducibility in stratified sampling
# The actual sampling logic is implemented in tests/conftest.py
filterwarnings =
  ignore::DeprecationWarning
  ignore::PendingDeprecationWarning
