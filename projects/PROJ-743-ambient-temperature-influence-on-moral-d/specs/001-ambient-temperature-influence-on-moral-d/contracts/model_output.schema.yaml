$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the statistical model output (LMM/GLMM)."
type: "object"
properties:
  model_type:
    type: "string"
    description: "Type of model used (e.g., 'LMM', 'GLMM')."
  fixed_effects:
    type: "object"
    description: "Dictionary of fixed effect coefficients."
    additionalProperties:
      type: "object"
      properties:
        estimate:
          type: "number"
        std_error:
          type: "number"
        p_value:
          type: "number"
      required:
        - estimate
        - std_error
        - p_value
  random_effects:
    type: "object"
    description: "Dictionary of random effect variances."
    additionalProperties:
      type: "number"
  likelihood_ratio_test:
    type: "object"
    description: "Result of the likelihood ratio test against the null model."
    properties:
      statistic:
        type: "number"
      p_value:
        type: "number"
      df_diff:
        type: "integer"
  convergence_status:
    type: "string"
    description: "Status of model convergence (e.g., 'success', 'warning')."
  diagnostics:
    type: "object"
    description: "Diagnostic test results."
    properties:
      anderson_darling_p_value:
        type: "number"
      normality_assessed:
        type: "boolean"
required:
  - model_type
  - fixed_effects
  - convergence_status
  - likelihood_ratio_test
additionalProperties: false
