$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelOutputSchema"
description: "Schema for the statistical model output."
type: "object"
properties:
  model_type:
    type: "string"
    description: "Type of model used (e.g., LMM)."
  fixed_effects:
    type: "object"
    description: "Fixed effect coefficients."
    additionalProperties:
      type: "object"
      properties:
        coefficient:
          type: "number"
        std_error:
          type: "number"
        p_value:
          type: "number"
      required:
        - coefficient
        - std_error
        - p_value
  random_effects:
    type: "object"
    description: "Random effect variances."
    additionalProperties:
      type: "number"
  convergence_status:
    type: "boolean"
    description: "Whether the model converged."
  likelihood_ratio_test:
    type: "object"
    description: "LRT results."
    properties:
      statistic:
        type: "number"
      p_value:
        type: "number"
    required:
      - statistic
      - p_value
  diagnostics:
    type: "object"
    description: "Model diagnostics."
    properties:
      normality_test_p_value:
        type: "number"
        description: "P-value from Kolmogorov-Smirnov test."
      residual_plot_path:
        type: "string"
        description: "Path to the residual plot image."
    required:
      - normality_test_p_value
      - residual_plot_path
required:
  - model_type
  - fixed_effects
  - random_effects
  - convergence_status
  - likelihood_ratio_test
  - diagnostics
additionalProperties: false
