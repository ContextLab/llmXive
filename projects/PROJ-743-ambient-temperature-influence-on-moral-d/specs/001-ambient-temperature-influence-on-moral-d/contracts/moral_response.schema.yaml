$schema: "http://json-schema.org/draft-07/schema#"
title: "MoralResponseSchema"
description: "Schema for the raw Moral Machine response data."
type: "object"
properties:
  response_id:
    type: "string"
    description: "Unique identifier for the response."
  participant_id:
    type: "string"
    description: "Unique identifier for the participant."
  latitude:
    type: "number"
    description: "Geographic latitude of the response."
    minimum: -90
    maximum: 90
  longitude:
    type: "number"
    description: "Geographic longitude of the response."
    minimum: -180
    maximum: 180
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the response."
  response_time_ms:
    type: "integer"
    description: "Response time in milliseconds."
    minimum: 100
    maximum: 10000
  age:
    type: "integer"
    description: "Age of the participant."
    minimum: 0
  gender:
    type: "string"
    description: "Gender of the participant."
    enum:
      - "male"
      - "female"
      - "other"
      - "prefer_not_to_say"
  dilemma_id:
    type: "string"
    description: "Identifier for the dilemma presented."
  choice:
    type: "string"
    description: "The decision made by the participant."
    enum:
      - "save_many"
      - "save_few"
  cultural_region:
    type: "string"
    description: "Cultural region of the participant."
required:
  - response_id
  - participant_id
  - latitude
  - longitude
  - timestamp
  - response_time_ms
  - dilemma_id
  - choice
  - cultural_region
additionalProperties: false
