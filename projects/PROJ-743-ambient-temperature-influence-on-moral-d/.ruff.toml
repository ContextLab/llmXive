# Standalone ruff configuration file (redundant if pyproject.toml is used,
# but provided for IDEs that prefer a dedicated file).
# This file mirrors the settings in pyproject.toml.

line-length = 88
target-version = "py39"

[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and other useful rules.
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "ARG", "SIM"]
ignore = ["E501", "B008"]

# Allow autofix for all enabled rules.
fixable = ["ALL"]
unfixable = []

# Exclude a few files/directories.
extend-exclude = [
    "__pycache__",
    ".eggs",
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
]

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"