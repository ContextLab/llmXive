$schema: http://json-schema.org/draft-07/schema#
title: ThermalSample
description: Schema for a thermal sample containing graph, conductivity, and metadata.
type: object
required:
  - sample_id
  - atomic_graph
  - conductivity
  - metadata
properties:
  sample_id:
    type: string
    description: Unique identifier for the sample.
  atomic_graph:
    type: object
    description: Embedded AtomicGraph structure.
    properties:
      sample_id:
        type: string
      node_count:
        type: integer
      edge_count:
        type: integer
      cutoff_distance:
        type: number
      nodes:
        type: array
      edges:
        type: array
      metadata:
        type: object
  conductivity:
    type: object
    required:
      - value
      - unit
      - converged
    properties:
      value:
        type: number
        description: Thermal conductivity value.
      unit:
        type: string
        description: Unit of measurement (e.g., "W/mK").
      converged:
        type: boolean
        description: Whether the simulation converged.
      error_estimate:
        type: number
        description: Optional error estimate.
  metadata:
    type: object
    required:
      - simulation_time_ps
      - checksum
    properties:
      simulation_time_ps:
        type: number
        description: Simulation duration in picoseconds.
      checksum:
        type: string
        description: SHA256 checksum of the underlying graph data.
      lmm_version:
        type: string
      excluded:
        type: boolean
        description: Whether this sample was excluded due to outliers.
      exclusion_reason:
        type: string
