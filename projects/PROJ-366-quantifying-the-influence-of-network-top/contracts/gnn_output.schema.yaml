$schema: http://json-schema.org/draft-07/schema#
title: GNNOutput
description: Schema for GNN model training outputs, predictions, and feature importance.
type: object
required:
  - model_id
  - predictions
  - feature_importance
  - metrics
properties:
  model_id:
    type: string
    description: Unique identifier for the trained model.
  predictions:
    type: array
    description: List of prediction results per sample.
    items:
      type: object
      required:
        - sample_id
        - predicted_value
        - true_value
      properties:
        sample_id:
          type: string
        predicted_value:
          type: number
        true_value:
          type: number
        residual:
          type: number
  feature_importance:
    type: object
    required:
      - feature_names
      - importance_scores
      - method
    properties:
      feature_names:
        type: array
        items:
          type: string
      importance_scores:
        type: array
        items:
          type: number
      method:
        type: string
        description: Method used for importance extraction (e.g., "shap", "permutation").
  metrics:
    type: object
    required:
      - mse
      - r2
    properties:
      mse:
        type: number
        description: Mean Squared Error.
      r2:
        type: number
        description: R-squared score.
      mae:
        type: number
        description: Mean Absolute Error.
  training_config:
    type: object
    description: Optional training configuration snapshot.
    properties:
      epochs:
        type: integer
      learning_rate:
        type: number
      batch_size:
        type: integer
      hidden_dims:
        type: array
        items:
          type: integer
