$schema: http://json-schema.org/draft-07/schema#
title: GNNOutput
description: Schema for the output of the GNN model training and inference.
type: object
required:
  - model_id
  - predictions
  - metrics
  - feature_importance
properties:
  model_id:
    type: string
    description: Unique identifier for the trained model.
  predictions:
    type: array
    description: List of predictions made by the model.
    items:
      type: object
      required:
        - sample_id
        - predicted_value
        - true_value
      properties:
        sample_id:
          type: string
        predicted_value:
          type: number
          description: Predicted Static Scattering Potential.
        true_value:
          type: number
          description: Ground truth value.
        error:
          type: number
          description: Absolute error.
  metrics:
    type: object
    description: Model performance metrics.
    required:
      - mae
      - mse
      - r2
    properties:
      mae:
        type: number
        description: Mean Absolute Error.
      mse:
        type: number
        description: Mean Squared Error.
      r2:
        type: number
        description: R-squared score.
  feature_importance:
    type: array
    description: List of feature importance scores.
    items:
      type: object
      required:
        - feature_name
        - importance_score
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
          description: Importance score (e.g., SHAP value).
  metadata:
    type: object
    description: Training metadata.
    properties:
      training_samples:
        type: integer
      epochs:
        type: integer
      final_loss:
        type: number
