$schema: http://json-schema.org/draft-07/schema#
title: AtomicGraph
description: >
  Schema for atomic graph representations of amorphous silicon structures.
  Generated by graph_builder.py from XYZ input files.
type: object
required:
  - graph_id
  - atom_count
  - edges
  - node_features
  - bond_cutoff
  - source_file
  - checksum
properties:
  graph_id:
    type: string
    description: Unique identifier for the graph
    pattern: "^atomic_graph_[0-9a-f]{8}$"
  atom_count:
    type: integer
    minimum: 1
    description: Total number of atoms (nodes) in the graph
  edges:
    type: array
    items:
      type: object
      required:
        - source
        - target
        - distance
      properties:
        source:
          type: integer
          minimum: 0
        target:
          type: integer
          minimum: 0
        distance:
          type: number
          minimum: 0
    description: List of bonds (edges) between atoms within cutoff distance
  node_features:
    type: object
    description: Per-atom features (node attributes)
    additionalProperties:
      type: object
      required:
        - position
        - degree
      properties:
        position:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
          description: [x, y, z] coordinates in Angstroms
        degree:
          type: integer
          minimum: 0
          description: Number of bonds connected to this atom
  bond_cutoff:
    type: number
    minimum: 0
    description: Distance cutoff (Angstroms) used for bond detection
  source_file:
    type: string
    description: Path to the source XYZ file
  checksum:
    type: string
    description: SHA-256 checksum of the graph data for integrity verification
    pattern: "^[0-9a-f]{64}$"
  metadata:
    type: object
    description: Optional additional metadata
    additionalProperties: true
additionalProperties: false
