$schema: http://json-schema.org/draft-07/schema#
title: AtomicGraph
description: |
  Schema for an atomic graph representing an amorphous silicon structure.
  Nodes are atoms, edges are bonds defined by a distance cutoff.
type: object
required:
  - metadata
  - nodes
  - edges
properties:
  metadata:
    type: object
    description: Metadata about the source file and generation parameters.
    required:
      - source_file
      - bond_cutoff
      - atom_type
      - node_count
      - edge_count
    properties:
      source_file:
        type: string
        description: Path to the original XYZ file.
      bond_cutoff:
        type: number
        description: Bond cutoff distance in Angstroms.
      atom_type:
        type: string
        description: Element type (e.g., "Si").
      node_count:
        type: integer
        minimum: 1
      edge_count:
        type: integer
        minimum: 0
      generated_at:
        type: string
        format: date-time
  nodes:
    type: array
    description: List of atom nodes with position and local degree.
    items:
      type: object
      required:
        - index
        - position
        - degree
      properties:
        index:
          type: integer
          description: Unique atom index (0-based).
        position:
          type: array
          description: Cartesian coordinates [x, y, z] in Angstroms.
          items:
            type: number
          minItems: 3
          maxItems: 3
        degree:
          type: integer
          description: Number of bonds connected to this atom.
          minimum: 0
  edges:
    type: array
    description: List of undirected bonds.
    items:
      type: object
      required:
        - source
        - target
        - distance
      properties:
        source:
          type: integer
          description: Index of the source atom.
        target:
          type: integer
          description: Index of the target atom.
        distance:
          type: number
          description: Distance between atoms in Angstroms.
additionalProperties: false
