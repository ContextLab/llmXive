$schema: "http://json-schema.org/draft-07/schema#"
title: "EnterpriseClawBench Raw Dataset"
description: "Schema for raw execution logs from EnterpriseClawBench. Each record represents a single agent session trace. CRITICAL: If status is 'failed', paired_trace_id is REQUIRED."
type: "object"
properties:
  trace_id:
    type: "string"
    description: "Unique identifier for the execution trace."
  task_id:
    type: "string"
    description: "Identifier for the task being performed."
  raw_log_content:
    type: "string"
    description: "The full raw log content of the agent session."
  status:
    type: "string"
    enum:
      - "success"
      - "failed"
    description: "Ground truth label for the trace outcome."
  paired_trace_id:
    type: ["string", "null"]
    description: "Unique identifier for the paired trace (required if status is 'failed'). Must point to a successful trace for the same task."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the session."
required:
  - "trace_id"
  - "task_id"
  - "raw_log_content"
  - "status"
  - "paired_trace_id"
additionalProperties: false