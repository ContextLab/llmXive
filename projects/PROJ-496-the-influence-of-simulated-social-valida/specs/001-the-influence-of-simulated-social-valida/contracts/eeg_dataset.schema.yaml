$schema: "http://json-schema.org/draft-07/schema#"
title: "EEG Dataset Metadata Schema"
description: "Schema defining the metadata structure for EEG datasets used in the social validation study."
type: object
required:
  - dataset_id
  - title
  - source
  - url
  - modalities
  - participants
  - tasks
properties:
  dataset_id:
    type: string
    description: "Unique identifier for the dataset (e.g., ds000001 or a local project ID)."
    pattern: "^ds\\d{6}$|^[A-Z0-9_-]+$"
  
  title:
    type: string
    description: "Human-readable title of the dataset."
    minLength: 1
  
  source:
    type: string
    enum:
      - "OpenNeuro"
      - "PhysioNet"
      - "Local"
      - "Other"
    description: "Origin of the dataset."
  
  url:
    type: string
    format: uri
    description: "Direct link to the dataset repository."
  
  modalities:
    type: array
    items:
      type: string
      enum:
        - "EEG"
        - "MEG"
        - "fMRI"
        - "NIRS"
        - "Behavioral"
    description: "List of data modalities present in the dataset."
    minItems: 1
  
  participants:
    type: object
    required:
      - count
    properties:
      count:
        type: integer
        minimum: 1
        description: "Total number of participants."
      age_range:
        type: object
        properties:
          min:
            type: number
          max:
            type: number
      gender_distribution:
        type: object
        properties:
          male:
            type: integer
          female:
            type: integer
          other:
            type: integer
          unspecified:
            type: integer
  
  tasks:
    type: array
    items:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: "Name of the task (e.g., 'social_feedback', 'oddball')."
        description:
          type: string
        conditions:
          type: array
          items:
            type: string
          description: "List of experimental conditions (e.g., 'positive_feedback', 'negative_feedback')."
  
  feedback_type:
    type: string
    enum:
      - "simulated"
      - "real"
      - "mixed"
      - "unknown"
    description: "Type of social feedback manipulation used in the study."
  
  anxiety_measure:
    type: string
    enum:
      - "LSAS"
      - "SPIN"
      - "SIAS"
      - "BDI"
      - "BAI"
      - "GAD-7"
      - "None"
      - "Unknown"
    description: "Primary anxiety or social anxiety measure administered."
  
  eeg_specs:
    type: object
    description: "Technical specifications of the EEG recording."
    properties:
      sampling_rate:
        type: number
        description: "Sampling rate in Hz."
      channels:
        type: array
        items:
          type: string
        description: "List of channel names."
      reference:
        type: string
        description: "Referencing scheme used (e.g., 'Cz', 'Average')."
      impedance:
        type: string
        description: "Impedance threshold or range."
  
  metadata_version:
    type: string
    default: "1.0.0"
    description: "Version of this schema."
  
  last_updated:
    type: string
    format: date-time
    description: "Timestamp of the last metadata update."
