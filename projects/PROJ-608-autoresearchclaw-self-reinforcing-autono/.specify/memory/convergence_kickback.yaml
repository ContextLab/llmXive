    full CPU loop'. T011 depends on the implementation of T012 (synthetic_generators),
    T013 (runner), T015 (validator), etc. The tasks are listed *before* the implementation
    tasks (T012-T017). The instruction says 'Write these tests FIRST, ensure they
    FAIL'. This is a TDD approach. The *ordering* in the file (Tests before Implementation)
    is correct for TDD workflow. However, the [P] tag on T011 is suspicious. T011
    ('Integration test for full CPU loop') requires the full stack (T012-T017) to
    be implemented to even *run* (and fail). It cannot run in parallel with T012-T017
    because it depends on their output (the code). T011 is a consumer of the implementation
    artifacts. It should NOT be marked [P] relative to the implementation tasks. It
    can only run *after* the implementation tasks are complete (or in a separate CI
    job that waits for them). Marking it [P] implies it has no dependencies on T012-T017,
    which is false.
