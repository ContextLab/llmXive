$schema: "http://json-schema.org/draft-07/schema#"
title: "EvolutionLog Schema"
description: "Schema for the persistent evolution log used by AutoResearchClaw validation."
type: "array"
items:
  type: "object"
  required:
    - "entry_id"
    - "timestamp"
    - "error_type"
    - "error_trace"
    - "context"
    - "lesson_learned"
    - "safeguard_applied"
  properties:
    entry_id:
      type: "string"
      description: "Unique identifier for the log entry."
    timestamp:
      type: "string"
      format: "date-time"
      description: "ISO 8601 timestamp of the error."
    error_type:
      type: "string"
      description: "Categorized error type (e.g., ImportError, OOM, Timeout)."
    error_trace:
      type: "string"
      description: "Full traceback of the error."
    context:
      type: "object"
      description: "Snapshot of system state at the time of error."
      properties:
        topic:
          type: "string"
          description: "The research topic being processed."
        step:
          type: "string"
          description: "The current step in the research loop."
    lesson_learned:
      type: "string"
      description: "Description of the fix or strategy change."
    safeguard_applied:
      type: "string"
      description: "The specific code change or configuration that prevented recurrence."
  additionalProperties: false