$schema: "http://json-schema.org/draft-07/schema#"
title: "CycleState Schema"
description: "Schema for the checkpoint state of a single research cycle."
type: "object"
required:
  - "cycle_id"
  - "topic"
  - "current_step"
  - "artifacts_generated"
  - "memory_snapshot"
properties:
  cycle_id:
    type: "string"
    description: "Unique identifier for the research cycle."
  topic:
    type: "string"
    description: "The research topic being processed."
  current_step:
    type: "string"
    description: "The current step in the research loop (e.g., hypothesis_generation)."
  artifacts_generated:
    type: "array"
    description: "List of file paths generated so far."
    items:
      type: "string"
  memory_snapshot:
    type: "object"
    description: "Memory usage at the time of the checkpoint."
    required:
      - "rss_mb"
      - "action_taken"
      - "threshold_mb"
    properties:
      rss_mb:
        type: "number"
        description: "Resident Set Size in MB."
      action_taken:
        type: "string"
        description: "Action taken due to memory pressure (e.g., sampled_data, aborted)."
      threshold_mb:
        type: "number"
        description: "The memory threshold that triggered the action."
  additionalProperties: false