$schema: "http://json-schema.org/draft-07/schema#"
title: "HITLConfig Schema"
description: "Schema for the Human-in-the-Loop configuration file."
type: "object"
required:
  - "intervention_points"
properties:
  intervention_points:
    type: "array"
    description: "List of intervention points."
    items:
      type: "object"
      required:
        - "step"
        - "trigger"
        - "feedback_file"
      properties:
        step:
          type: "string"
          description: "The step in the research loop where intervention occurs."
        trigger:
          type: "string"
          description: "Condition for triggering (e.g., always, on_error)."
        feedback_file:
          type: "string"
          description: "Path to the JSON file containing user feedback."
      additionalProperties: false
additionalProperties: false