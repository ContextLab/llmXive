[project]
name = "llmxive-impact-visual-attention"
version = "0.1.0"
description = "Impact of Visual Attention Patterns on Susceptibility to Misleading Headlines"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "nltk>=3.8.0",
    "scipy>=1.11.0",
    "pyyaml>=6.0",
    "datasets>=2.14.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \\.eggs
  | \\.git
  | \\.hg
  | \\.mypy_cache
  | \\.nox
  | \\.pants\\.d
  | \\.pytype
  | \\.ruff_cache
  | \\.svn
  | \\.tox
  | \\.venv
  | __pypackages__
  | _build
  | buck-out
  | build
  | dist
  | node_modules
  | venv
  | data
  | state
  | tests
)/
'''