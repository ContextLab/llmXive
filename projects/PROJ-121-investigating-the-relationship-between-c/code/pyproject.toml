[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cosmic-ray-anisotropy"
version = "0.1.0"
description = "Investigating the relationship between cosmic ray anisotropy and solar cycle modulation"
requires-python = ">=3.11"
authors = [
    {name = "llmXive Research Team"}
]
readme = "README.md"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.26.4,<2.0.0",
    "scipy>=1.13.1,<2.0.0",
    "astropy>=6.0.1,<7.0.0",
    "healpy>=1.16.5,<2.0.0",
    "pandas>=2.2.2,<3.0.0",
    "requests>=2.32.3,<3.0.0",
    "tqdm>=4.66.4,<5.0.0",
    "python-dateutil>=2.9.0",
    "pytz>=2024.1",
    "matplotlib>=3.9.0",
    "jinja2>=3.1.4"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.2",
    "pytest-cov>=5.0.0",
    "flake8>=7.1.0",
    "black>=24.4.2",
    "pre-commit>=3.7.1"
]

[project.scripts]
run-pipeline = "src.pipeline:main"
analyze-correlation = "analyze_correlation:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "scripts*"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --cov=src --cov-report=term-missing"

[tool.coverage.run]
source = ["src"]
