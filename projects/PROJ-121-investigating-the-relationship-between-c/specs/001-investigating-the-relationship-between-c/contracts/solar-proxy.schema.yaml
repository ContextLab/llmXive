$schema: "http://json-schema.org/draft-07/schema#"
title: "SolarProxySeries"
description: "Schema for time-ordered solar activity indicators."
type: "object"
properties:
  proxy_name:
    type: "string"
    enum:
      - "sunspot"
      - "solar_wind"
      - "imf_magnitude"
    description: "Solar proxy name."
  date:
    type: "string"
    format: "date-time"
    description: "Observation date (UTC)."
  value:
    type: "number"
    description: "Measured value."
  source:
    type: "string"
    const: "NOAA"
    description: "Data source."
required:
  - "proxy_name"
  - "date"
  - "value"
  - "source"
additionalProperties: false