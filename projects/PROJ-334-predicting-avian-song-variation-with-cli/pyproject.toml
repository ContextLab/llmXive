[tool.black]
line-length = 88
target-version = ['py311']
skip-string-normalization = true
exclude = '''
    (
        /(
            \.eggs
            | \.git
            | \.hg
            | \.mypy_cache
            | \.tox
            | \.venv
            | _build
            | buck-out
            | build
            | dist
        )/
        | /data/
        | /output/
        | /figures/
    )
'''

[tool.flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist,.eggs,*.egg-info,data,output,figures
per-file-ignores = __init__.py:F401