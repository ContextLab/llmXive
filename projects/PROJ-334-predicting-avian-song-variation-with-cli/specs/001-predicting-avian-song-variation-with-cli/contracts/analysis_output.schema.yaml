$schema: http://json-schema.org/draft-07/schema#
title: Model Summary Schema
description: >
  Schema defining the expected columns, types, and constraints for
  the `model_summary.csv` artifact generated by the associational modeling pipeline.
  All headers must include the phrase "Associational Analysis".
type: object
properties:
  columns:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
          description: Column name in the CSV
        type:
          type: string
          enum: [float, int, string, boolean]
          description: Expected data type
        description:
          type: string
          description: Human-readable description of the column
        required:
          type: boolean
          default: true
      required:
        - name
        - type
        - description
required:
  - columns

# Specific column definitions for model_summary.csv
columns:
  - name: "Species (Associational Analysis)"
    type: string
    description: Unique identifier or name of the bird species analyzed.
    required: true

  - name: "Model_Type (Associational Analysis)"
    type: string
    description: Type of model fitted (e.g., 'OLS', 'GLM-Gamma', 'GLM-Poisson').
    required: true

  - name: "R_Squared (Associational Analysis)"
    type: float
    description: Coefficient of determination (R²) for the model fit.
    required: true

  - name: "Adj_R_Squared (Associational Analysis)"
    type: float
    description: Adjusted R-squared value accounting for the number of predictors.
    required: true

  - name: "P_Value_Global (Associational Analysis)"
    type: float
    description: Global p-value for the model significance (F-test or equivalent).
    required: true

  - name: "Confounder_Variance_Explained (Associational Analysis)"
    type: float
    description: Variance explained by confounders vs. climate variables (partial R²).
    required: true

  - name: "R_Squared_Diff (Associational Analysis)"
    type: float
    description: Difference in R² between training and hold-out sets (stability metric).
    required: true

  - name: "Predictor_Count (Associational Analysis)"
    type: int
    description: Number of predictors included in the final model.
    required: true

  - name: "Convergence_Status (Associational Analysis)"
    type: boolean
    description: Whether the model optimizer converged successfully.
    required: true

  - name: "Family_Param (Associational Analysis)"
    type: string
    description: Distribution family and link function used (e.g., 'Gamma-log', 'Gaussian-identity').
    required: false

  - name: "Sensitivity_Threshold (Associational Analysis)"
    type: float
    description: The threshold value used for the sensitivity analysis sweep.
    required: true