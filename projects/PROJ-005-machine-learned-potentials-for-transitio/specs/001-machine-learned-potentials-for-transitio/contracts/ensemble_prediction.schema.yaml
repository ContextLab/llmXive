$schema: "http://json-schema.org/draft-07/schema#"
title: "EnsemblePredictionResult Schema"
description: "Schema for ensemble prediction results including uncertainty."
type: "object"
properties:
  reaction_id:
    type: "string"
    description: "Unique identifier for the reaction."
  mean_energy:
    type: "number"
    description: "Average energy prediction across the ensemble."
  variance:
    type: "number"
    description: "Variance of the ensemble predictions (uncertainty)."
  individual_predictions:
    type: "array"
    description: "List of individual predictions from each model in the ensemble."
    items:
      type: "number"
  error:
    type: "number"
    description: "Error of the mean prediction against DFT."
required:
  - reaction_id
  - mean_energy
  - variance
  - individual_predictions
  - error
additionalProperties: false
