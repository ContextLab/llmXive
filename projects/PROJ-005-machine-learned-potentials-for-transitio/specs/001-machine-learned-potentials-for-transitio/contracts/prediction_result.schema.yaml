$schema: "http://json-schema.org/draft-07/schema#"
title: "PredictionResult Schema"
description: "Schema for single model prediction results."
type: "object"
properties:
  reaction_id:
    type: "string"
    description: "Unique identifier for the reaction."
  energy_ml:
    type: "number"
    description: "Predicted energy by the ML model."
  error:
    type: "number"
    description: "Difference between ML prediction and DFT reference."
  ligand_class:
    type: "string"
    description: "Ligand classification for the reaction."
    enum:
      - "Group13"
      - "Conventional"
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the prediction."
required:
  - reaction_id
  - energy_ml
  - error
  - ligand_class
  - timestamp
additionalProperties: false
