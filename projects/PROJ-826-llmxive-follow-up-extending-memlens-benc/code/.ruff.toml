[lint]
# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "T20", # flake8-print
]

# Configuration
line-length = 88
target-version = "py311"

[lint.isort]
known-first-party = ["stores", "config", "data_loader", "retrieval", "generator", "profiler", "evaluator", "statistics", "run_pipeline"]