$schema: http://json-schema.org/draft-07/schema#
title: MemLens Query Schema
description: Schema for the filtered MemLens dataset used in the evaluation pipeline.
type: object
required:
  - query_id
  - query_text
  - ground_truth
  - task_type
  - session_ids
properties:
  query_id:
    type: string
    description: "Unique identifier for the query."
  query_text:
    type: string
    description: "The natural language question."
  ground_truth:
    type: string
    description: "The correct answer string."
  task_type:
    type: string
    enum:
      - "Multi-Session Reasoning"
      - "Temporal Reasoning"
    description: "Classification of the reasoning task."
  session_ids:
    type: array
    items:
      type: string
    description: "List of session IDs referenced by the query."
  image_paths:
    type: array
    items:
      type: string
    description: "Relative paths to images in the referenced sessions."
  metadata:
    type: object
    description: "Additional metadata from the dataset."
    additionalProperties: true