$schema: http://json-schema.org/draft-07/schema#
title: Structural Alerts Schema
description: Schema for the structural alerts configuration file.
type: object
required:
  - alerts
properties:
  alerts:
    type: array
    items:
      type: object
      required:
        - name
        - smarts
        - weight
      properties:
        name:
          type: string
          description: Human-readable name of the alert (e.g., NitroAromatic).
        smarts:
          type: string
          description: SMARTS pattern string.
        weight:
          type: number
          minimum: 0.0
          description: Weight factor for the alert in the rule-based model.
        description:
          type: string
          description: Optional detailed description of the alert.