$schema: http://json-schema.org/draft-07/schema#
title: Task Execution Artifact
description: Schema for the normalized summary.json file generated after a single task execution.
type: object
required:
  - task_id
  - status
  - start_time
  - end_time
  - duration_seconds
properties:
  task_id:
    type: string
    description: "Unique identifier for the task (e.g., ar_full_300)"
  status:
    type: string
    enum:
      - SUCCESS
      - FAILED
      - TIMEOUT
      - MISSING_API_KEY
      - SANDBOX_ERROR
    description: "Execution outcome status"
  start_time:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of execution start"
  end_time:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of execution end"
  duration_seconds:
    type: number
    description: "Total execution time in seconds"
  trajectory:
    type: array
    items:
      type: object
      properties:
        step:
          type: integer
        action:
          type: string
        observation:
          type: string
        response:
          type: string
    description: "Sequence of actions and observations"
  evaluation_result:
    type: string
    enum:
      - PASS
      - FAIL
      - NULL
    description: "Result from the task's internal evaluator (if available)"
  error_message:
    type: string
    description: "Details if the status is not SUCCESS"
additionalProperties: false