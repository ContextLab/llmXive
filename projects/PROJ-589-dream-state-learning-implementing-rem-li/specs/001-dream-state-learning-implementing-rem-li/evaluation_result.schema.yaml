$schema: http://json-schema.org/draft-07/schema#
title: Evaluation Result Schema
description: Schema for validating evaluation result outputs from Dream-State Learning experiments.
type: object
required:
  - experiment_id
  - seed
  - model_name
  - dataset
  - accuracy
  - loss
  - training_steps
  - wall_clock_hours
  - phase_breakdown
  - entropy_metrics
properties:
  experiment_id:
    type: string
    description: Unique identifier for the experiment run.
    minLength: 1
  seed:
    type: integer
    description: Random seed used for this experiment.
  model_name:
    type: string
    description: Name of the model used.
    minLength: 1
  dataset:
    type: string
    description: Dataset identifier (e.g., glue-mrpc).
    minLength: 1
  accuracy:
    type: number
    description: Final accuracy metric on the evaluation set.
    minimum: 0.0
    maximum: 1.0
  loss:
    type: number
    description: Final loss value on the evaluation set.
    minimum: 0.0
  training_steps:
    type: integer
    description: Total number of training steps performed.
    minimum: 0
  wall_clock_hours:
    type: number
    description: Total wall-clock time in hours.
    minimum: 0.0
  phase_breakdown:
    type: object
    description: Breakdown of steps by phase.
    required:
      - wake_steps
      - dream_steps
    properties:
      wake_steps:
        type: integer
        minimum: 0
      dream_steps:
        type: integer
        minimum: 0
    additionalProperties: false
  entropy_metrics:
    type: object
    description: Statistics of entropy during dream phase.
    required:
      - mean
      - min
      - max
    properties:
      mean:
        type: number
        minimum: 0.0
      min:
        type: number
        minimum: 0.0
      max:
        type: number
        minimum: 0.0
    additionalProperties: false
additionalProperties: false
