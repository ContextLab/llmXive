[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # Pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
]
ignore = [
  "E501", # line-too-long (handled by black)
  "B008", # do-not-perform-argument-lookup-in-default-function-arguments
]
extend-safe-fixes = ["I001", "I002"]

[format]
line-length = 88
indent-width = 4

[target-version]
py = "py310"
