$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Model Output Schema"
description: "Schema for Linear Mixed-Effects Model results, ANOVA F-tests, or Descriptive Mode flag"
type: "object"
properties:
  term:
    type: "string"
    description: "Model term (e.g., method[UMAP]:global_linearity)"
  coef:
    type: "number"
    description: "Estimated coefficient (null if descriptive mode)"
  std_err:
    type: "number"
    minimum: 0.0
    description: "Standard error of the coefficient (null if descriptive mode)"
  t_value:
    type: "number"
    description: "T-statistic (for LMM coefficients, null if descriptive mode)"
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "P-value for the term (null if descriptive mode)"
  f_statistic:
    type: "number"
    description: "F-statistic (for ANOVA test of interaction terms, null if descriptive mode)"
  df_num:
    type: "integer"
    description: "Numerator degrees of freedom (ANOVA, null if descriptive mode)"
  df_denom:
    type: "integer"
    description: "Denominator degrees of freedom (ANOVA, null if descriptive mode)"
  is_significant:
    type: "boolean"
    description: "True if p_value < 0.05 (or adjusted alpha), null if descriptive mode"
  is_descriptive_mode:
    type: "boolean"
    description: "True if the output is from Descriptive Stratified Analysis (no model fitted)"
required:
  - "is_descriptive_mode"
additionalProperties: false