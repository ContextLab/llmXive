$schema: "http://json-schema.org/draft-07/schema#"
title: "EVA-Bench Build Artifacts Schema"
description: "Defines the structure and constraints for the generated PDF and log files."
type: object
properties:
  notation_example_pdf:
    type: object
    description: "The primary generated PDF artifact."
    properties:
      path:
        type: string
        const: "external/dlbook_notation/notation_example.pdf"
      size_bytes:
        type: integer
        minimum: 51200
        maximum: 10485760
        description: "File size must be between 50KB and 10MB."
      content_valid:
        type: boolean
        description: "True if PDF renders without errors and contains text."
      metrics_present:
        type: object
        properties:
          eva_a:
            type: boolean
            description: "True if 'EVA-A' metric definition found in text."
          eva_x:
            type: boolean
            description: "True if 'EVA-X' metric definition found in text."
    required:
      - path
      - size_bytes
      - content_valid
      - metrics_present
  build_log:
    type: object
    description: "The build log output."
    properties:
      path:
        type: string
        const: "external/dlbook_notation/build.log"
      exit_code:
        type: integer
        description: "Exit code of the make.sh script."
      gpu_errors:
        type: integer
        minimum: 0
        maximum: 0
        description: "Must be 0. No GPU/CUDA errors allowed."
      fatal_errors:
        type: integer
        minimum: 0
        maximum: 0
        description: "Must be 0. No fatal build errors allowed."
    required:
      - path
      - exit_code
      - gpu_errors
      - fatal_errors
required:
  - notation_example_pdf
  - build_log
additionalProperties: false
