'|alpha level nominal significance':
  quote: "The error that a practising statistician would consider the more important\
    \ to avoid (which is a subjective judgment) is called the error of the first kind.\
    \ The first demand of the mathematical theory is to deduce such test criteria\
    \ as would ensure that the probability of committing an error of the first kind\
    \ would equal (or approximately equal, or not exceed) a preassigned number \u03B1\
    , such as \u03B1 = 0.05 or 0.01, etc. This number is called the level of significance."
  source_id: P-value
  url: https://en.wikipedia.org/wiki/P-value
  value: '0.05'
'|cell count expected fisher less test than triggered when':
  quote: With large samples, a chi-squared test (or better yet, a G-test) can be used
    in this situation. However, the significance value it provides is only an approximation,
    because the sampling distribution of the test statistic that is calculated is
    only approximately equal to the theoretical chi-squared distribution. The approximation
    is poor when sample sizes are small, or the data are very unequally distributed
    among the cells of the table, resulting in the cell counts predicted on the null
    hypothesis (the "expected values") being low. The usual rule for deciding whether
    the chi-squared approximation is good enough is that the chi-squared test is not
    suitable when the expected values in any of the cells of a contingency table are
    below 5, or below 10 when there is only one degree of freedom (this rule is now
    known to be overly conservative). In fact, for small, sparse, or unbalanced data,
    the exact and asymptotic p-values can be quite different and may lead to opposite
    conclusions concerning the hypothesis of interest. In contrast the Fisher exact
    test is, as its name states, exact as long as the experimental procedure keeps
    the row and column totals fixed, and it can therefore be used regardless of the
    sample characteristics. It becomes difficult to calculate with large samples or
    well-balanced tables, but fortunately these are exactly the conditions where the
    chi-squared test is appropriate.
  source_id: Fisher's exact test
  url: https://en.wikipedia.org/wiki/Fisher's_exact_test
  value: '5'
