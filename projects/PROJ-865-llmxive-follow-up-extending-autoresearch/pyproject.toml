[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-followup"
version = "0.1.0"
description = "Automated science pipeline for llmXive follow-up"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas==2.1.4",
    "numpy==1.26.2",
    "scikit-learn==1.3.2",
    "statsmodels==0.14.1",
    "pydantic==2.5.2",
    "datasets==2.15.0",
    "torch==2.1.1+cpu",
    "transformers==4.36.0",
    "psutil==5.9.6",
    "scipy==1.11.4",
    "ruff==0.1.8",
    "black==23.11.0",
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.venv
    | venv
    | __pycache__
    | data
    | dist
    | build
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "data",
    "dist",
    "build",
]

[tool.ruff.isort]
known-first-party = ["setup", "utils", "data_ingestion", "annotation_distillation", "execution", "analysis"]
force-sort-within-sections = true
