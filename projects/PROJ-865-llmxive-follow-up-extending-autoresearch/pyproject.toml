[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-followup"
version = "0.1.0"
description = "Automated science pipeline for failure mode analysis and rule distillation"
requires-python = ">=3.10"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "statsmodels",
    "pydantic",
    "datasets",
    "torch",
    "transformers",
    "psutil",
    "scipy",
    "pyyaml",
    "jinja2",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
