$schema: "http://json-schema.org/draft-07/schema#"
title: DistilledRule
description: >
  Schema for a single distilled rule generated from failure analysis.
  Rules follow an "If-Condition-Then-Action" structure.
type: object
required:
  - rule_id
  - condition_type
  - condition_pattern
  - action_type
  - action_description
  - source_failures
  - confidence_score
properties:
  rule_id:
    type: string
    description: "Unique identifier for the rule (e.g., 'RULE-001')"
    pattern: "^RULE-\\d{3}$"
  
  condition_type:
    type: string
    description: "Category of the condition (e.g., 'Syntactic', 'Logical', 'Semantic')"
    enum:
      - Syntactic
      - Logical
      - Semantic
      - Missing Context
      - Unstructured
  
  condition_pattern:
    type: string
    description: "Regex or keyword pattern that triggers this rule"
    minLength: 1
  
  action_type:
    type: string
    description: "Type of pivot action to take"
    enum:
      - RetryWithDifferentStrategy
      - SwitchToBaseline
      - RequestHumanReview
      - SkipTask
      - ApplyHeuristic
  
  action_description:
    type: string
    description: "Human-readable description of the action"
    minLength: 1
  
  source_failures:
    type: array
    description: "List of failure IDs that contributed to this rule"
    items:
      type: string
    minItems: 1
  
  confidence_score:
    type: number
    description: "Confidence score between 0.0 and 1.0"
    minimum: 0.0
    maximum: 1.0
  
  metadata:
    type: object
    description: "Optional additional metadata"
    properties:
      distillation_method:
        type: string
        enum:
          - LLM
          - RegexHeuristic
      created_at:
        type: string
        format: date-time
      notes:
        type: string
