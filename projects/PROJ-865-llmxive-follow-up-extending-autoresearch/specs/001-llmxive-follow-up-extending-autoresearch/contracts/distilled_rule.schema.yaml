$schema: http://json-schema.org/draft-07/schema#
title: Distilled Rule Schema
description: >
  Schema for a single distilled rule generated by the AutoResearchClaw pipeline.
  Defines the condition pattern, the pivot action to take, and the confidence score.
type: object
required:
  - rule_id
  - condition_pattern
  - pivot_action
  - confidence
properties:
  rule_id:
    type: string
    description: "Unique identifier for the rule (e.g., 'RULE-0001')."
    pattern: "^RULE-\\d{4}$"
  condition_pattern:
    type: string
    description: "A regex pattern or logical condition string used to match against raw error logs."
    minLength: 1
  pivot_action:
    type: string
    description: "The specific action or strategy the agent should pivot to when the condition matches."
    minLength: 1
  confidence:
    type: number
    description: "A float between 0.0 and 1.0 representing the model's confidence in this rule's validity."
    minimum: 0.0
    maximum: 1.0
additionalProperties: false