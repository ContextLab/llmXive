$schema: http://json-schema.org/draft-07/schema#
title: Distilled Rule Schema
description: >
  Schema for the "If-Condition-Then-Action" rules generated by the 
  annotation and distillation pipeline (Task T013).
type: object
required:
  - rule_id
  - condition
  - action
  - category
  - confidence_score
  - source_cases
properties:
  rule_id:
    type: string
    description: Unique identifier for the rule (e.g., "RULE-001").
    pattern: "^RULE-\\d{3,}$"
  condition:
    type: string
    description: >
      The logical condition pattern to match against error logs.
      Can be a regex string or a natural language description.
    minLength: 1
  action:
    type: string
    description: >
      The deterministic action to take if the condition is met.
      Examples: "Pivot to retrieval", "Retry with context", "Escalate".
    minLength: 1
  category:
    type: string
    description: >
      The structural failure category this rule addresses.
      Must match one of the annotated structural features.
    enum:
      - "Syntactic Error"
      - "Logical Loop"
      - "Semantic Ambiguity"
      - "Missing Context"
      - "Unstructured"
  confidence_score:
    type: number
    description: >
      Confidence score of the rule derivation (0.0 to 1.0).
      For regex fallback, this is typically derived from frequency.
      For LLM distillation, this is the model's confidence.
    minimum: 0.0
    maximum: 1.0
  source_cases:
    type: array
    description: List of task_ids from the failure cases that informed this rule.
    items:
      type: string
    minItems: 1
  created_at:
    type: string
    description: ISO8601 timestamp of rule creation.
    format: date-time
additionalProperties: false
