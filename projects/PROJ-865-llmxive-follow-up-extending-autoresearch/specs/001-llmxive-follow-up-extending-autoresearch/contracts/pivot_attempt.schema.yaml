$schema: "http://json-schema.org/draft-07/schema#"
title: "Pivot Attempt Result"
description: "Schema for a single pivot attempt result in the rule engine vs baseline comparison."
type: "object"
required:
  - "task_id"
  - "method"
  - "time_to_pivot"
  - "success"
  - "failure_type"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  method:
    type: "string"
    description: "The method used (rule_engine or baseline)."
    enum:
      - "rule_engine"
      - "baseline"
  time_to_pivot:
    type: "number"
    description: "Time in seconds to execute the pivot."
    minimum: 0
  success:
    type: "integer"
    description: "Binary indicator of success (1) or failure (0)."
    enum:
      - 0
      - 1
  failure_type:
    type: "string"
    description: "The type of failure that triggered the pivot."
    enum:
      - "Syntactic"
      - "Logical"
      - "Semantic"
      - "Missing Context"
      - "Unstructured"
additionalProperties: false