$schema: http://json-schema.org/draft-07/schema#
title: PivotAttempt
description: "Schema for a single execution attempt of a pivot action."
type: object
properties:
  attempt_id:
    type: string
    description: "Unique identifier for the attempt."
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  case_id:
    type: string
    description: "Reference to the FailureCase."
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  method:
    type: string
    description: "The method used for the pivot."
    enum:
      - "RuleEngine"
      - "Baseline"
  time_to_pivot:
    type: number
    description: "Time taken to pivot in seconds."
    minimum: 0.0
  success:
    type: boolean
    description: "Whether the pivot was successful."
  error_type:
    type: string
    description: "Type of error if the pivot failed."
    enum:
      - "Coverage Gap"
      - "Distillation Error"
      - "None"
  timestamp:
    type: string
    description: "ISO 8601 timestamp of the attempt."
    format: date-time
required:
  - attempt_id
  - case_id
  - method
  - time_to_pivot
  - success
  - error_type
  - timestamp
additionalProperties: false
