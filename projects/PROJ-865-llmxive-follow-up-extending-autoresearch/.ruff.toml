# Standalone ruff configuration for immediate CLI usage
# This mirrors the settings in pyproject.toml for compatibility with older tools
line-length = 88
target-version = "py39"

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "B",
]
ignore = [
    "E501",
    "B008",
    "C901",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
