$schema: "http://json-schema.org/draft-07/schema#"
title: "Supernova Record"
description: "Schema for a single Type Ia Supernova record after ingestion and cleaning."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the supernova."
  ra:
    type: "number"
    description: "Right Ascension in degrees."
    minimum: 0
    maximum: 360
  dec:
    type: "number"
    description: "Declination in degrees."
    minimum: -90
    maximum: 90
  z:
    type: "number"
    description: "Redshift."
    exclusiveMinimum: 0
  mu:
    type: "number"
    description: "Observed distance modulus."
  mu_err:
    type: "number"
    description: "Uncertainty in distance modulus."
    minimum: 0
  mu_th:
    type: "number"
    description: "Theoretical distance modulus calculated from LambdaCDM."
  residual:
    type: "number"
    description: "Difference between observed and theoretical distance modulus."
required:
  - id
  - ra
  - dec
  - z
  - mu
  - mu_err
  - mu_th
  - residual
additionalProperties: false