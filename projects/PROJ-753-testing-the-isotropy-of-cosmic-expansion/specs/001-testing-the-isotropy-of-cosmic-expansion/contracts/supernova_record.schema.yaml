$schema: "http://json-schema.org/draft-07/schema#"
title: "Supernova Record Schema"
description: "Schema for a single Type Ia Supernova record after ingestion and residual calculation."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier from Pantheon+ (e.g., SN2012fr)"
  ra:
    type: "number"
    description: "Right Ascension in degrees (J2000)"
    minimum: 0
    maximum: 360
  dec:
    type: "number"
    description: "Declination in degrees (J2000)"
    minimum: -90
    maximum: 90
  redshift:
    type: "number"
    description: "Redshift (z)"
    minimum: 0
  distance_modulus:
    type: "number"
    description: "Observed distance modulus (mu_obs)"
  uncertainty:
    type: "number"
    description: "Uncertainty in distance modulus (sigma_mu)"
    minimum: 0
  residual:
    type: "number"
    description: "Calculated residual (mu_obs - mu_th)"
  healpix_index:
    type: "integer"
    description: "Pixel index on Nside=16 grid (for mask/visualization)"
    minimum: 0
required:
  - id
  - ra
  - dec
  - redshift
  - distance_modulus
  - uncertainty
  - residual
  - healpix_index
additionalProperties: false