[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "automated-code-review-evaluation"
version = "0.1.0"
description = "Evaluating the effectiveness of automated code review tools"
requires-python = ">=3.9"
dependencies = [
    "requests",
    "pandas",
    "scikit-learn",
    "statsmodels",
    "pygithub",
    "tqdm",
    "sentence-transformers",
    "networkx",
    "pytest",
    "ruff",
    "black"
]

[tool.ruff]
# Linter settings
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
    "C901", # too complex (will be addressed iteratively)
]

[tool.ruff.per-file-ignores]
"code/__init__.py" = ["F401"]
"data/__init__.py" = ["F401"]
"tests/__init__.py" = ["F401"]

[tool.ruff.isort]
known-first-party = ["utils", "setup_directories"]
force-sort-within-sections = true

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
