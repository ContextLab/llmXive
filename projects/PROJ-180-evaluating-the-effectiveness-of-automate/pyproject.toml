[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evaluating-automated-code-review-tools"
version = "0.1.0"
description = "Evaluating the effectiveness of automated code review tools"
requires-python = ">=3.9"
dependencies = [
    "requests>=2.31.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "pygithub>=2.1.0",
    "tqdm>=4.65.0",
    "sentence-transformers>=2.2.0",
    "networkx>=3.1",
    "pytest>=7.4.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.ruff]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = ["E", "F", "I", "W", "N", "B", "UP"]
ignore = [
    "E501", # Line too long (handled by black)
    "F401", # Unused imports (handled by ruff check --fix or manual review)
    "B008", # Do not perform function call in argument defaults (often needed for logging)
]
line-length = 100
target-version = "py39"

[tool.ruff.isort]
known-first-party = ["utils", "scripts"]
force-single-line = true
order-by-type = true

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | results
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]
