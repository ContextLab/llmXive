$schema: "http://json-schema.org/draft-07/schema#"
title: "Tool Issue Schema"
description: "Schema for static analysis tool findings"
type: "object"
properties:
  issue_id:
    type: "string"
    description: "Unique identifier"
  repo_id:
    type: "string"
    description: "Foreign key to Repository"
  tool_name:
    type: "string"
    enum:
      - "SonarQube"
      - "DeepSource"
      - "CodeClimate"
    description: "Tool name"
  issue_type:
    type: "string"
    enum:
      - "bug"
      - "security"
      - "style"
    description: "Issue type"
  severity:
    type: "string"
    enum:
      - "critical"
      - "major"
      - "minor"
      - "info"
    description: "Severity level"
  file_path:
    type: "string"
    description: "Relative file path"
  line_number:
    type: "integer"
    minimum: 1
    description: "Line number"
  description:
    type: "string"
    description: "Issue description"
  raw_report_path:
    type: "string"
    description: "Path to raw JSON report"
required:
  - issue_id
  - repo_id
  - tool_name
  - issue_type
  - severity
  - file_path
  - line_number
  - raw_report_path
additionalProperties: false