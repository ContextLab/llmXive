$schema: http://json-schema.org/draft-07/schema#
title: EstimationResult
description: Schema for the output of the estimation pipeline (T021).
type: object
required:
  - results
properties:
  results:
    type: array
    description: List of estimation results for each replicate and estimator.
    items:
      type: object
      required:
        - replicate_id
        - tau2_level
        - true_effect
        - estimator_name
        - pooled_estimate
        - se_pooled
        - ci_lower
        - ci_upper
        - i_squared
        - coverage_flag
        - reliability_flag
      properties:
        replicate_id:
          type: string
          description: Reference to the simulated replicate.
        tau2_level:
          type: number
          description: The injected tau^2 value.
        true_effect:
          type: number
          description: The injected true effect size.
        estimator_name:
          type: string
          enum:
            - FixedEffects
            - DerSimonianLaird
            - REML
          description: Name of the estimator used.
        pooled_estimate:
          type: number
          description: The calculated pooled effect size.
        se_pooled:
          type: number
          description: Standard error of the pooled estimate.
        ci_lower:
          type: number
          description: Lower bound of the 95% confidence interval.
        ci_upper:
          type: number
          description: Upper bound of the 95% confidence interval.
        i_squared:
          type: number
          minimum: 0
          maximum: 100
          description: The calculated I^2 statistic (percentage).
          # CRITICAL REQUIREMENT: Must include I^2 as a required field.
        coverage_flag:
          type: boolean
          description: True if the true_effect falls within [ci_lower, ci_upper].
        reliability_flag:
          type: boolean
          description: True if the replicate is considered reliable (e.g., N >= 5).
        bias:
          type: number
          description: Calculated bias (pooled_estimate - true_effect).
