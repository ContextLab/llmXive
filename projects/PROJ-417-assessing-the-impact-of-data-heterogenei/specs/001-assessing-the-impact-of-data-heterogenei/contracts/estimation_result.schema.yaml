$schema: http://json-schema.org/draft-07/schema#
title: EstimationResult
description: >
  Schema for the results of applying an estimator to a simulated dataset.
  Includes bias, coverage flags, and heterogeneity statistics.
type: object
required:
  - replicate_id
  - estimator_name
  - pooled_estimate
  - ci_lower
  - ci_upper
  - tau_squared_estimate
  - i_squared
  - true_effect
  - true_tau_squared
  - bias
  - coverage_flag
  - convergence_status
properties:
  replicate_id:
    type: integer
    description: Reference to the simulation replicate_id.
  estimator_name:
    type: string
    description: Name of the estimator used (e.g., "FixedEffects", "DerSimonianLaird", "REML").
  pooled_estimate:
    type: number
    description: The calculated pooled effect size.
  ci_lower:
    type: number
    description: Lower bound of the 95% confidence interval.
  ci_upper:
    type: number
    description: Upper bound of the 95% confidence interval.
  tau_squared_estimate:
    type: number
    description: Estimated between-study variance.
  i_squared:
    type: number
    description: I^2 statistic (percentage of total variation due to heterogeneity).
    minimum: 0
    maximum: 100
  true_effect:
    type: number
    description: The ground truth effect size used in simulation.
  true_tau_squared:
    type: number
    description: The ground truth tau^2 used in simulation.
  bias:
    type: number
    description: Difference between pooled_estimate and true_effect.
  coverage_flag:
    type: boolean
    description: True if the CI [ci_lower, ci_upper] contains true_effect.
  convergence_status:
    type: string
    enum:
      - success
      - failure
      - skipped
    description: Status of the estimation process.
additionalProperties: false
