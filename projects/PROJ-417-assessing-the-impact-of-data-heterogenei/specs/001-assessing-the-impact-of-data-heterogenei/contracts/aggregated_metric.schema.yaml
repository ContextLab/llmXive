$schema: http://json-schema.org/draft-07/schema#
title: AggregatedMetric
description: >
  Schema for aggregated statistical results across multiple replicates
  for a specific heterogeneity level and estimator.
type: object
required:
  - heterogeneity_level
  - true_tau2
  - estimator_name
  - n_replicates
  - mean_bias
  - coverage_rate
  - coverage_p_value
  - mean_i_squared
  - mean_tau2_estimated
  - convergence_rate
  - test_results
properties:
  heterogeneity_level:
    type: number
    description: The nominal tau^2 level for this aggregation.
  true_tau2:
    type: number
    description: The actual ground truth tau^2 used.
  estimator_name:
    type: string
    description: The estimator name.
  n_replicates:
    type: integer
    description: Total number of replicates in this group.
  mean_bias:
    type: number
    description: Mean bias across replicates.
  coverage_rate:
    type: number
    description: Proportion of replicates where CI covered the true effect.
  coverage_p_value:
    type: number
    description: P-value from the exact binomial test against 0.95.
  mean_i_squared:
    type: number
    description: Average I^2 statistic across replicates.
  mean_tau2_estimated:
    type: number
    description: Average estimated tau^2 across replicates.
  convergence_rate:
    type: number
    description: Proportion of replicates where estimation converged.
  test_results:
    type: object
    description: Results of statistical tests (e.g., Shapiro-Wilk, ANOVA/KW).
    properties:
      normality_test:
        type: object
        properties:
          statistic:
            type: number
          p_value:
            type: number
          test_used:
            type: string
      pairwise_comparison:
        type: array
        items:
          type: object
          properties:
            group1:
              type: string
            group2:
              type: string
            p_value:
              type: number
            adjusted_p_value:
              type: number
additionalProperties: false