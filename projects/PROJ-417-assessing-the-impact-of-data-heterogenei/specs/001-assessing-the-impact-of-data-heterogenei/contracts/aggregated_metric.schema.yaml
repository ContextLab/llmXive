$schema: http://json-schema.org/draft-07/schema#
title: AggregatedMetric
description: >
  Schema for aggregated results across multiple replicates for a specific
  heterogeneity level and estimator. Used for final reporting and plotting.
type: object
required:
  - heterogeneity_level
  - estimator_name
  - num_replicates
  - mean_bias
  - mean_i_squared
  - coverage_rate
  - coverage_p_value
  - is_coverage_acceptable
properties:
  heterogeneity_level:
    type: number
    description: The target tau^2 level for this aggregation.
  estimator_name:
    type: string
    enum:
      - FixedEffects
      - DerSimonianLaird
      - REML
    description: Estimator used.
  num_replicates:
    type: integer
    description: Number of replicates included in this aggregation.
  mean_bias:
    type: number
    description: Average bias across replicates.
  std_bias:
    type: number
    description: Standard deviation of bias.
  mean_i_squared:
    type: number
    description: Average I^2 statistic across replicates.
  coverage_rate:
    type: number
    description: Proportion of replicates where true effect was in CI.
  coverage_p_value:
    type: number
    description: P-value from the binomial test against 0.95.
  is_coverage_acceptable:
    type: boolean
    description: True if coverage rate is within acceptable bounds (e.g., 0.935-0.965).
  statistical_test:
    type: string
    description: Name of the statistical test performed (e.g., "Binomial", "Kruskal-Wallis").
  test_statistic:
    type: number
    description: The test statistic value.
  notes:
    type: string
    description: Additional context or warnings.
additionalProperties: false