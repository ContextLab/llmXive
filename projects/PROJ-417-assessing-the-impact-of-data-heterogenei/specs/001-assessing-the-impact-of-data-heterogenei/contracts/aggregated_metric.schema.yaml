$schema: http://json-schema.org/draft-07/schema#
title: AggregatedMetric
description: >
  Schema for aggregated results across multiple replicates for a specific
  heterogeneity level and estimator.
type: object
required:
  - heterogeneity_level
  - estimator_name
  - n_replicates
  - mean_bias
  - coverage_rate
  - mean_i_squared
  - mean_tau_squared_estimate
  - shapiro_p_value
  - binomial_p_value
  - is_coverage_significant
properties:
  heterogeneity_level:
    type: number
    description: The target tau^2 level for this aggregation.
  estimator_name:
    type: string
    description: The estimator used.
  n_replicates:
    type: integer
    description: Number of replicates included in this aggregation.
  mean_bias:
    type: number
    description: Average bias across replicates.
  coverage_rate:
    type: number
    description: Proportion of replicates where the CI covered the true effect.
  mean_i_squared:
    type: number
    description: Average I^2 statistic across replicates.
  mean_tau_squared_estimate:
    type: number
    description: Average estimated tau^2 across replicates.
  shapiro_p_value:
    type: number
    description: P-value from Shapiro-Wilk test for normality of bias distribution.
  binomial_p_value:
    type: number
    description: P-value from exact binomial test for coverage deviation.
  is_coverage_significant:
    type: boolean
    description: True if coverage rate is statistically significantly different from 0.95.
additionalProperties: false