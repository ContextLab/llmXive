$schema: http://json-schema.org/draft-07/schema#
title: AggregatedMetric
description: Schema for aggregated metrics and sensitivity sweep results (T034a).
type: object
required:
  - aggregates
properties:
  aggregates:
    type: array
    description: Aggregated metrics grouped by tau^2 level and estimator.
    items:
      type: object
      required:
        - tau2_level
        - estimator_name
        - n_replicates
        - mean_bias
        - coverage_rate
        - coverage_test_pvalue
        - i_squared_mean
      properties:
        tau2_level:
          type: number
          description: The tau^2 level for this aggregation.
        estimator_name:
          type: string
          enum:
            - FixedEffects
            - DerSimonianLaird
            - REML
          description: Name of the estimator.
        n_replicates:
          type: integer
          minimum: 1
          description: Number of replicates included in this aggregate.
        mean_bias:
          type: number
          description: Mean of the bias across replicates.
        coverage_rate:
          type: number
          minimum: 0
          maximum: 1
          description: Proportion of replicates where the CI covered the true effect.
        coverage_test_pvalue:
          type: number
          description: P-value from the exact binomial test against nominal coverage (0.95).
        i_squared_mean:
          type: number
          description: Mean I^2 statistic across replicates.
        reliability_rate:
          type: number
          description: Proportion of replicates marked as reliable.