$schema: http://json-schema.org/draft-07/schema#
title: SimulatedDataset
description: Schema for the raw output of the simulation engine (T010).
type: object
required:
  - metadata
  - replicates
properties:
  metadata:
    type: object
    required:
      - generated_at
      - tau2_levels
      - replicates_per_level
      - base_data_source
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation.
      tau2_levels:
        type: array
        items:
          type: number
        description: List of injected tau^2 values used in simulation.
      replicates_per_level:
        type: integer
        minimum: 1
        description: Number of replicates generated per tau^2 level.
      base_data_source:
        type: string
        description: Citation or path to the base data used (e.g., 'Cochrane Jackson 2010').
  replicates:
    type: array
    description: List of simulated meta-analysis replicates.
    items:
      type: object
      required:
        - replicate_id
        - tau2_level
        - true_effect
        - studies
      properties:
        replicate_id:
          type: string
          description: Unique identifier for this replicate.
        tau2_level:
          type: number
          description: The injected between-study variance (tau^2) for this replicate.
        true_effect:
          type: number
          description: The injected true effect size (mu) for this replicate.
        studies:
          type: array
          description: List of study results within this replicate.
          items:
            type: object
            required:
              - study_id
              - effect_size
              - variance
              - n_studies
            properties:
              study_id:
                type: string
              effect_size:
                type: number
              variance:
                type: number
              n_studies:
                type: integer
                description: Number of primary studies in this meta-analysis replicate.
                minimum: 1
