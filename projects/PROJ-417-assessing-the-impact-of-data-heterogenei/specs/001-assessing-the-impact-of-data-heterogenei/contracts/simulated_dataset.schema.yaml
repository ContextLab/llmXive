$schema: http://json-schema.org/draft-07/schema#
title: SimulatedDataset
description: >
  Schema for a single simulated meta-analysis dataset generated by the
  simulation engine. Contains the ground truth parameters and the
  generated study-level effect sizes and standard errors.
type: object
required:
  - simulation_id
  - tau2_true
  - true_effect
  - replicates
  - heterogeneity_level
properties:
  simulation_id:
    type: string
    description: Unique identifier for this simulation run.
  heterogeneity_level:
    type: number
    description: The target tau^2 value used for this level (e.g., 0.0, 0.1, 0.5).
  true_effect:
    type: number
    description: The true underlying effect size (mu) used for generation.
  tau2_true:
    type: number
    description: The true between-study variance (tau^2) injected.
  replicates:
    type: array
    description: List of generated study data points for this replicate set.
    items:
      type: object
      required:
        - replicate_id
        - studies
      properties:
        replicate_id:
          type: integer
          description: Index of the replicate (0 to N-1).
        num_studies:
          type: integer
          description: Number of studies in this replicate.
        studies:
          type: array
          description: Individual study results.
          items:
            type: object
            required:
              - study_id
              - effect_size
              - standard_error
              - sample_size
            properties:
              study_id:
                type: integer
              effect_size:
                type: number
                description: Generated effect size (y_i).
              standard_error:
                type: number
                description: Standard error (SE_i) derived from sample size.
              sample_size:
                type: integer
                description: Effective sample size for the study.
  metadata:
    type: object
    description: Optional metadata about the generation process.
    properties:
      seed:
        type: integer
      timestamp:
        type: string
        format: date-time
additionalProperties: false
