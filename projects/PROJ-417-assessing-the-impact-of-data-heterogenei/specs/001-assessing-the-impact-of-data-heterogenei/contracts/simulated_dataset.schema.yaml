$schema: http://json-schema.org/draft-07/schema#
title: SimulatedDataset
description: >
  Schema for a single simulated meta-analysis dataset.
  Represents one replicate of generated studies with a known ground truth.
type: object
required:
  - replicate_id
  - heterogeneity_level
  - true_tau_squared
  - true_mu
  - k_studies
  - studies
properties:
  replicate_id:
    type: integer
    description: Unique identifier for this simulation replicate.
  heterogeneity_level:
    type: number
    description: The target heterogeneity level (tau^2) injected for this replicate.
  true_tau_squared:
    type: number
    description: The actual realized between-study variance (should match heterogeneity_level within MC error).
  true_mu:
    type: number
    description: The true overall effect size injected.
  k_studies:
    type: integer
    description: Number of studies in this replicate.
  studies:
    type: array
    description: List of individual study data points.
    minItems: 1
    items:
      type: object
      required:
        - study_id
        - effect_size
        - standard_error
      properties:
        study_id:
          type: integer
        effect_size:
          type: number
        standard_error:
          type: number
additionalProperties: false
