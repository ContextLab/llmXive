$schema: "http://json-schema.org/draft-07/schema#"
title: Analysis Result Schema
description: Schema for statistical analysis results
type: object
required:
  - test_type
  - p_value
  - effect_size
  - conclusion
properties:
  test_type:
    type: string
    description: Name of the statistical test performed (e.g., 'wilcoxon', 'paired_ttest')
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: P-value from the statistical test
  effect_size:
    type: number
    description: Calculated effect size (Cohen's d or Rank-biserial)
  mean_difference:
    type: number
    description: Mean difference between groups
  confidence_interval:
    type: object
    required:
      - lower
      - upper
    properties:
      lower:
        type: number
      upper:
        type: number
    description: 95% Confidence interval for the mean difference
  sample_size:
    type: integer
    minimum: 1
    description: Number of samples analyzed
  power:
    type: number
    minimum: 0
    maximum: 1
    description: Achieved statistical power
  conclusion:
    type: string
    description: Textual conclusion of the analysis
  warnings:
    type: array
    items:
      type: string
    description: List of warnings (e.g., small sample size)
additionalProperties: false