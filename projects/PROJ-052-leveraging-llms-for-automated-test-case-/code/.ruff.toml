# Ruff configuration for llmXive project
[lint]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "E741"] # Line length handled by black; ambiguous names allowed in tests

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude a few specific files/directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Same as Black
line-length = 88
indent-width = 4

# Assume Python 3.11
target-version = "py311"

[lint.per-file-ignores]
"tests/*" = ["S101", "E712"] # Allow assertions and truth-value checks in tests