$schema: "http://json-schema.org/draft-07/schema#"
title: "BenchmarkDatasetSchema"
description: "Schema for validated benchmark dataset metadata and checksums."
type: "object"
properties:
  name:
    type: "string"
    description: "Name of the benchmark dataset (e.g., MATH500)."
  source_url:
    type: "string"
    format: "uri"
    description: "Verified URL from the project's dataset list."
  version:
    type: "string"
    description: "Version or revision of the dataset."
  split:
    type: "string"
    enum: ["train", "test", "validation"]
    description: "Dataset split used."
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the raw file."
  num_samples:
    type: "integer"
    minimum: 1
    description: "Number of samples in the split."
required:
  - "name"
  - "source_url"
  - "version"
  - "split"
  - "checksum"
  - "num_samples"
additionalProperties: false
