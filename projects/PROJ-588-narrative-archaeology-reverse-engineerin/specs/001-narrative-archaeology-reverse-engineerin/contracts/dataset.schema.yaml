$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the preprocessed fMRI dataset and event annotations."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the subject."
  phase:
    type: "string"
    enum:
      - "early_encoding"
      - "late_encoding"
    description: "Phase of the experiment (proxy for encoding/recognition)."
  roi:
    type: "string"
    enum:
      - "hippocampus"
      - "mPFC"
      - "PCC"
      - "lateral_temporal"
    description: "Region of Interest."
  timepoints:
    type: "array"
    items:
      type: "number"
    description: "BOLD signal values over time."
  event_labels:
    type: "array"
    items:
      type: "string"
    description: "Event labels corresponding to timepoints."
required:
  - "subject_id"
  - "phase"
  - "roi"
  - "timepoints"
  - "event_labels"