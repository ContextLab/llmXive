$schema: "http://json-schema.org/draft-07/schema#"
title: "NarrativeArchaeologyDatasetSchema"
description: "Schema for the preprocessed and segmented fMRI dataset used in the Narrative Archaeology project."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Anonymized subject identifier (e.g., 'sub-01')."
  session_type:
    type: "string"
    enum:
      - "encoding"
      - "recognition"
    description: "The phase of the experiment."
  events:
    type: "array"
    items:
      type: "object"
      properties:
        event_id:
          type: "string"
          description: "Unique identifier for the event."
        event_type:
          type: "string"
          enum:
            - "plot"
            - "character"
            - "theme"
            - "misc"
          description: "Category of the narrative event."
        onset:
          type: "number"
          description: "Start time in seconds relative to scan start."
        duration:
          type: "number"
          description: "Duration of the event in seconds."
        text:
          type: "string"
          description: "The text content of the event."
      required:
        - "event_id"
        - "event_type"
        - "onset"
        - "duration"
        - "text"
  timecourse:
    type: "object"
    description: "Map of ROI names to time series arrays."
    additionalProperties:
      type: "array"
      items:
        type: "number"
      description: "BOLD signal values for the ROI."
required:
  - "subject_id"
  - "session_type"
  - "events"
  - "timecourse"
additionalProperties: false
