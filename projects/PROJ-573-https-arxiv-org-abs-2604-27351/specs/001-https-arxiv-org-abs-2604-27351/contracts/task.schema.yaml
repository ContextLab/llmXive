$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Task Schema"
description: "Schema for validating task definitions"
required:
  - task_id
  - name
  - modalities
  - dataset_ids
  - target_label
  - metric_type
  - primary_metric
  - enabled
properties:
  task_id:
    type: "string"
    description: "Unique task identifier"
    pattern: "^task-[0-9]{3}$"
  name:
    type: "string"
    description: "Human-readable task name"
    minLength: 1
  modalities:
    type: "array"
    description: "List of modalities (2-3 items)"
    items:
      type: "string"
      enum:
        - "time-series"
        - "tabular"
        - "text"
    minItems: 2
    maxItems: 3
  dataset_ids:
    type: "array"
    description: "Linked dataset identifiers"
    items:
      type: "string"
      pattern: "^dataset-[0-9]{3}$"
    minItems: 2
    maxItems: 3
  target_label:
    type: "string"
    description: "Prediction target column name"
    minLength: 1
  metric_type:
    type: "string"
    enum:
      - "classification"
      - "regression"
    description: "Type of evaluation metric"
  primary_metric:
    type: "string"
    enum:
      - "F1"
      - "MAPE"
    description: "Primary evaluation metric"
  enabled:
    type: "boolean"
    description: "Whether task is active"
    default: true
additionalProperties: false
