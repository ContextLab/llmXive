$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Dataset Schema"
description: "Schema for validating dataset metadata and checksums"
required:
  - dataset_id
  - name
  - modality
  - source_url
  - size_mb
  - checksum
  - variables
  - label_column
  - verified
properties:
  dataset_id:
    type: "string"
    description: "Unique identifier for the dataset"
    pattern: "^dataset-[0-9]{3}$"
  name:
    type: "string"
    description: "Human-readable dataset name"
    minLength: 1
  modality:
    type: "string"
    enum:
      - "time-series"
      - "tabular"
      - "text"
    description: "Data modality type"
  source_url:
    type: "string"
    description: "Verified download URL (from verified datasets block)"
    format: "uri"
  size_mb:
    type: "number"
    description: "Dataset size in megabytes"
    minimum: 0
    maximum: 5120
  checksum:
    type: "string"
    description: "SHA-256 checksum of downloaded file"
    pattern: "^[a-f0-9]{64}$"
  variables:
    type: "array"
    description: "List of feature column names"
    items:
      type: "string"
    minItems: 1
  label_column:
    type: "string"
    description: "Ground-truth label column name"
    minLength: 1
  verified:
    type: "boolean"
    description: "Whether source URL was verified by Reference-Validator"
additionalProperties: false
