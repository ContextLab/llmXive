# Ruff configuration for llmXive project
# Line length and target version per task T009 requirements

line-length = 88
target-version = "py311"

[lint]
# Enable pycodestyle (E), Pyflakes (F), and isort (I) rules
select = ["E", "F", "I", "W"]

# Ignore specific rules if necessary (add as project grows)
ignore = []

[lint.isort]
# Configuration for import sorting
known-first-party = ["src", "tests", "research", "setup"]
force-single-line = false
lines-after-imports = 2
