# Ruff configuration for llmXive project
# Line length set to 88 as per specification
# Target version set to Python 3.11

line-length = 88
target-version = "py311"

[lint]
# Enable a set of recommended rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by formatter)
    "B008", # Do not perform function call in argument defaults (common in testing)
]

[lint.isort]
known-first-party = ["src", "tests", "research"]

[format]
# Use double quotes for strings
quote-style = "double"
# Indent with spaces
indent-style = "space"
# Respect magic trailing commas
skip-magic-trailing-comma = false
# Use Unix newlines
line-ending = "auto"
