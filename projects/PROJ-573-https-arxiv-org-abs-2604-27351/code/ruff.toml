# Ruff configuration for llmXive benchmark project
line-length = 88
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black/ruff format)
    "B008", # do not perform function calls in argument defaults (common in CLI/ML)
]

[lint.isort]
known-first-party = ["src", "tests", "research", "setup"]
force-single-line = false
lines-after-imports = 2
