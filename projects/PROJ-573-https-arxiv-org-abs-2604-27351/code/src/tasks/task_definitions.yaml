# Task Definitions for Heterogeneous Scientific Foundation Model Benchmark
# This file defines the tasks to be executed in the benchmark pipeline.
# Each task specifies modalities, datasets, and label columns.

- task_id: T001
  modalities:
    - timeseries
  datasets:
    - UCI_HAR
  label_column: activity_label
  description: "Human Activity Recognition with time-series sensor data"
  
- task_id: T002
  modalities:
    - tabular
  datasets:
    - UCI_Adult
  label_column: income
  description: "Income prediction from census data"
  
- task_id: T003
  modalities:
    - text
  datasets:
    - DROP
  label_column: answer
  description: "Question answering on text passages"
  
- task_id: T004
  modalities:
    - timeseries
    - tabular
  datasets:
    - UCI_HAR
    - UCI_Adult
  label_column: activity_label
  description: "Multi-modal activity recognition with demographic context"
  
- task_id: T005
  modalities:
    - text
    - tabular
  datasets:
    - MUST
    - UCI_Adult
  label_column: sentiment
  description: "Sentiment analysis with structured metadata"
  
- task_id: T006
  modalities:
    - timeseries
    - text
  datasets:
    - UCI_HAR
    - DROP
  label_column: activity_label
  description: "Activity recognition with textual descriptions"
  
- task_id: T007
  modalities:
    - timeseries
    - tabular
