# Default benchmark configuration
# Matches T030 requirements and supports T008 initialization

datasets:
  - name: UCI_HAR
    url: "https://huggingface.co/datasets/UCI_HAR"
    variables: ["accelerometer", "gyroscope", "activity_label"]
  - name: DROP
    url: "https://huggingface.co/datasets/drop"
    variables: ["question", "passage", "answer"]
  
modalities:
  - type: timeseries
    model_id: "time_series_transformer_small"
  - type: tabular
    model_id: "tabpfn_base"
  - type: text
    model_id: "distilbert_base"

seeds: 5
timeout_per_task: 300

# Bootstrap configuration for statistical analysis (FR-007, FR-014)
statistical_analysis:
  method: "bootstrap"
  n_iterations: 1000
  confidence_level: 0.95
  
tasks:
  - "T022"
  - "T026"
  - "T027"
  
# Execution mode default
default_mode: "heterogeneous"
