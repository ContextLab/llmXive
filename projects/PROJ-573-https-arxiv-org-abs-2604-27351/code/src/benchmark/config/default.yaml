# Default benchmark configuration
# This file defines the default parameters for running the benchmark

# Datasets to use in the benchmark
datasets:
  - name: UCI_HAR
    url: "https://huggingface.co/datasets/UCI_HAR"
    modalities:
      - time_series
  - name: DROP
    url: "https://huggingface.co/datasets/drop"
    modalities:
      - text
  - name: MUST
    url: "https://huggingface.co/datasets/must"
    modalities:
      - text

# Modalities to evaluate
modalities:
  - time_series
  - tabular
  - text

# Random seeds for reproducibility
seeds:
  - 42
  - 123
  - 456
  - 789
  - 1011

# Timeout settings (in seconds)
timeout_per_task: 300
total_benchmark_timeout: 14400  # 4 hours

# Model configuration
models:
  time_series:
    model_id: "google/t5-small"
    max_memory_gb: 1.0
  tabular:
    model_id: "TabPFN/tabpfn-v2-cifar10"
    max_memory_gb: 1.0
  text:
    model_id: "distilbert-base-uncased"
    max_memory_gb: 1.0

# Evaluation settings
evaluation:
  metrics:
    - accuracy
    - f1
    - mape
  statistical_tests:
    - paired_ttest
    - wilcoxon
    - bootstrap_ci

# Output settings
output:
  results_dir: "data/results"
  reports_dir: "data/reports"
  log_level: "INFO"

# Running mode
mode: heterogeneous  # Options: heterogeneous, unified