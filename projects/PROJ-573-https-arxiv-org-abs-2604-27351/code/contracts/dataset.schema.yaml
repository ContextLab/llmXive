$schema: http://json-schema.org/draft-07/schema#
title: Dataset Schema
description: Schema for dataset definitions in the benchmark.
type: object
required:
  - name
  - url
  - variables
  - size_mb
  - checksum
properties:
  name:
    type: string
    description: Unique name of the dataset.
  url:
    type: string
    format: uri
    description: URL to download the dataset.
  variables:
    type: array
    items:
      type: string
    description: List of variable names in the dataset.
  size_mb:
    type: number
    minimum: 0
    description: Size of the dataset in megabytes.
  checksum:
    type: string
    description: SHA-256 checksum of the dataset file.
additionalProperties: false
