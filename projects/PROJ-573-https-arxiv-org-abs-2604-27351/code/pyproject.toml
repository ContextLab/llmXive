[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-benchmark"
version = "0.1.0"
description = "Heterogeneous Scientific Foundation Model Collaboration Benchmark"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.11.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "datasets>=2.14.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.7.0",
    "reportlab>=4.0.0",
    "Pillow>=10.0.0",
    "pytest>=7.4.0",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.venv
    | build
    | dist
)/
'''

[tool.setuptools.packages.find]
where = ["code"]
include = ["src*"]
