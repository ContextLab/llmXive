# Ruff configuration for llmXive project
# Targeting Python 3.11 as per project requirements
target-version = "py311"
line-length = 88

[lint]
# Enable a comprehensive set of rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by formatter)
    "B008", # Do not perform function call in argument defaults (common in FastAPI/CLI)
]

[lint.isort]
known-first-party = ["src", "tests", "research"]
force-sort-within-sections = true
