$schema: http://json-schema.org/draft-07/schema#
title: Dataset Contract Schema
description: >
  Schema contract for dataset metadata required by the llmXive benchmark pipeline.
  Validates dataset registration before processing.
type: object
required:
  - name
  - url
  - variables
  - size_mb
  - checksum
properties:
  name:
    type: string
    description: Unique identifier for the dataset (e.g., 'UCI_HAR', 'DROP')
    pattern: '^[A-Za-z0-9_-]+$'
  url:
    type: string
    description: Source URL or HuggingFace dataset ID for retrieval
    format: uri
  variables:
    type: array
    description: List of variable names included in the dataset
    items:
      type: string
    minItems: 1
  size_mb:
    type: number
    description: Size of the dataset in megabytes
    minimum: 0
  checksum:
    type: string
    description: SHA-256 checksum of the downloaded dataset archive
    pattern: '^[a-f0-9]{64}$'
  modalities:
    type: array
    description: (Optional) List of data modalities covered by this dataset
    items:
      type: string
      enum:
        - time-series
        - tabular
        - text
        - image
        - audio
    default: []
  source_type:
    type: string
    description: (Optional) Type of source (e.g., 'huggingface', 'url', 'local')
    enum:
      - huggingface
      - url
      - local
    default: url
  verified_at:
    type: string
    format: date-time
    description: (Optional) Timestamp of the last verification check
  status:
    type: string
    description: (Optional) Current status of the dataset verification
    enum:
      - pending
      - verified
      - failed
    default: pending
additionalProperties: false
