$schema: http://json-schema.org/draft-07/schema#
title: Dataset Schema
description: |
  Schema for dataset metadata contracts in the Heterogeneous Scientific Foundation Model Collaboration Benchmark.
  Used to validate dataset registration and integrity tracking.
type: object
required:
  - name
  - url
  - variables
  - size_mb
  - checksum
properties:
  name:
    type: string
    description: Unique identifier for the dataset (e.g., 'UCI_HAR', 'DROP').
    minLength: 1
  url:
    type: string
    description: Source URL or HuggingFace dataset ID.
    format: uri
  variables:
    type: array
    description: List of variable names present in the dataset.
    items:
      type: string
    minItems: 1
  size_mb:
    type: number
    description: Size of the dataset in megabytes (estimated or actual).
    minimum: 0
  checksum:
    type: string
    description: SHA-256 checksum of the dataset archive or directory to ensure integrity.
    pattern: '^[a-f0-9]{64}$'
  modality:
    type: string
    description: Primary data modality (e.g., 'time-series', 'tabular', 'text').
    enum:
      - time-series
      - tabular
      - text
      - image
      - mixed
    default: tabular
  version:
    type: string
    description: Dataset version string (e.g., '1.0.0').
    default: '1.0.0'
  verification_status:
    type: string
    description: Status of dataset verification against research requirements.
    enum:
      - pending
      - verified
      - failed
      - skipped
    default: pending
  metadata:
    type: object
    description: Additional optional metadata (e.g., license, citation).
    additionalProperties: true
additionalProperties: false