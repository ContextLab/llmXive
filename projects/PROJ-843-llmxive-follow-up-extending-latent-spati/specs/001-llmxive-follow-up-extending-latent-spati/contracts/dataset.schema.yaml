$schema: "http://json-schema.org/draft-07/schema#"
title: "StratifiedDatasetManifest"
description: "Schema for the manifest of stratified video subsets."
type: object
properties:
  dataset_name:
    type: string
    description: "Name of the source dataset (e.g., RealEstate10K)."
  source_url:
    type: string
    format: uri
    description: "Verified URL of the dataset source (Official Google Research)."
  subsets:
    type: array
    items:
      type: object
      properties:
        subset_id:
          type: string
          description: "Unique identifier for the subset (e.g., static_high)."
        motion_level:
          type: string
          enum: ["static", "slow", "fast"]
          description: "Categorization based on motion magnitude (thresholds: <2, 2-10, >10 px/frame)."
        texture_level:
          type: string
          enum: ["high", "low"]
          description: "Categorization based on texture entropy (thresholds: >=50, <50 keypoints)."
        sequence_count:
          type: integer
          minimum: 1
          description: "Number of video sequences in this subset."
        file_paths:
          type: array
          items:
            type: string
          description: "Relative paths to the sequence directories."
      required:
        - subset_id
        - motion_level
        - texture_level
        - sequence_count
        - file_paths
    required:
      - dataset_name
      - source_url
      - subsets
required:
  - dataset_name
  - source_url
  - subsets