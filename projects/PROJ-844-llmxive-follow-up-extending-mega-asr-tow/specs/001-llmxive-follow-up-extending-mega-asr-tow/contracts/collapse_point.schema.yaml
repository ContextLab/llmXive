$schema: http://json-schema.org/draft-07/schema#
title: Collapse Point Schema
description: Schema for the derived collapse intensity point for a specific clip and model.
type: object
properties:
  collapse_id:
    type: string
    description: Unique identifier for the collapse point.
  clip_id:
    type: string
    description: Foreign key to the AudioClip table.
  model_name:
    type: string
    description: Name of the ASR model used.
  collapse_vector_id:
    type: string
    description: Foreign key to the DistortionVector table where collapse occurred.
  rt60_at_collapse:
    type: number
    description: Reverberation time (RT60) in seconds at the collapse point.
  snr_at_collapse:
    type: number
    description: Signal-to-Noise Ratio (SNR) in dB at the collapse point.
  collapse_threshold:
    type: number
    description: The SSS threshold used to define collapse (e.g., 0.5).
  status:
    type: string
    description: Status of the collapse detection.
    enum:
      - "Found"
      - "Max Tested"
      - "None"
required:
  - collapse_id
  - clip_id
  - model_name
  - collapse_vector_id
  - rt60_at_collapse
  - snr_at_collapse
  - collapse_threshold
  - status
additionalProperties: false
