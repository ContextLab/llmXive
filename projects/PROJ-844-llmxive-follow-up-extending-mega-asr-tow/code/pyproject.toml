[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending Mega-ASR for Semantic Collapse Thresholds"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "scikit-learn",
    "transformers",
    "torch",
    "librosa",
    "pandas",
    "numpy",
    "datasets",
    "sentence-transformers",
    "jiwer",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.nox
    | \.pants\.d
    | \.pytype
    | \.ruff_cache
    | \.svn
    | \.tox
    | \.venv
    | __pypackages__
    | _build
    | buck-out
    | build
    | dist
    | node_modules
    | venv
)/
'''

[tool.ruff]
# Inherits from code/ruff.toml if run from root, or defined here for single-file config
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
