[lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # pyflakes
  "I",  # isort
  "C",  # flake8-comprehensions
  "B",  # flake8-bugbear
  "UP", # pyupgrade
  "N",  # pep8-naming
  "S",  # flake8-bandit (security)
]
ignore = [
  "E501", # line too long (handled by black)
  "B008", # do not perform function calls in argument defaults (common in dataclasses/pydantic)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"] # Ignore unused imports in init files

[format]
line-length = 88
indent-width = 4

[target-version]
py39
