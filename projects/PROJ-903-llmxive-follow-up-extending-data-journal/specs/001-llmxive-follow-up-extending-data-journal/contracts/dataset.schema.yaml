$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Metadata Schema"
description: "Schema for input dataset metadata and validation status."
type: object
properties:
  source_url:
    type: string
    description: "Verified URL from which the dataset was loaded."
  checksum:
    type: string
    description: "SHA256 checksum of the raw dataset file."
  row_count:
    type: integer
    minimum: 0
    description: "Total number of rows in the dataset."
  column_count:
    type: integer
    minimum: 0
    description: "Total number of columns in the dataset."
  numeric_columns:
    type: array
    items:
      type: string
    description: "List of column names identified as numeric."
  missing_values:
    type: object
    additionalProperties:
      type: integer
    description: "Map of column name to count of missing values."
  is_valid_for_analysis:
    type: boolean
    description: "True if row_count >= 30 and numeric_columns >= 5."
required:
  - source_url
  - checksum
  - row_count
  - column_count
  - numeric_columns
  - missing_values
  - is_valid_for_analysis
additionalProperties: false
