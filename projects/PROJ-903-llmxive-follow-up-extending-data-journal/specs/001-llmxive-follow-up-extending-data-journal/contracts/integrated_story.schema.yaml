$schema: http://json-schema.org/draft-07/schema#
title: Integrated Story Schema
description: Schema for the final story combining baseline and counterfactuals (US3).
type: object
required:
  - story_id
  - type
  - primary_narrative
  - alternative_perspectives
  - full_text
  - blinded
properties:
  story_id:
    type: string
    description: "Unique identifier for the integrated story."
  type:
    type: string
    const: "integrated"
    description: "Must be 'integrated'."
  primary_narrative:
    type: string
    description: "The baseline narrative text."
  alternative_perspectives:
    type: array
    description: "List of counterfactual insights included."
    items:
      type: object
      required:
        - insight_id
        - claim
        - citation
      properties:
        insight_id:
          type: string
        claim:
          type: string
        citation:
          type: string
          description: "Reference to the data query or metric."
        nuance_flag:
          type: boolean
          description: "True if the claim is marked as associational only."
  full_text:
    type: string
    description: "The complete, cohesive story text."
  blinded:
    type: boolean
    const: true
    description: "Must be true for evaluation."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation."
