$schema: http://json-schema.org/draft-07/schema#
title: Counterfactual Insight Schema
description: Schema for a verified counterfactual insight generated by the Inspector (US2).
type: object
required:
  - insight_id
  - type
  - claim
  - challenge_to
  - supporting_metric
  - data_query
  - validity_status
properties:
  insight_id:
    type: string
    description: "Unique identifier for the insight."
  type:
    type: string
    const: "counterfactual"
    description: "Must be 'counterfactual'."
  claim:
    type: string
    description: "Textual description of the alternative explanation."
  challenge_to:
    type: string
    description: "Reference to the baseline story_id being challenged."
  supporting_metric:
    type: object
    required:
      - correlation
      - p_value
      - variable_pair
      - partial_r
      - partial_p
      - stability_score
    properties:
      correlation:
        type: number
        description: "Pearson r value."
      p_value:
        type: number
        description: "Bonferroni-corrected p-value."
      variable_pair:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: string
        description: "List of two variable names [A, B]."
      partial_r:
        type: number
        description: "Partial correlation controlling for the baseline primary variable."
      partial_p:
        type: number
        description: "P-value for the partial correlation."
      stability_score:
        type: number
        minimum: 0
        maximum: 1
        description: "Ratio of sensitivity configurations where this pair was significant."
  data_query:
    type: string
    description: "Python or SQL snippet used to derive the metric."
  validity_status:
    type: string
    enum:
      - "verified"
      - "failed"
      - "low_power"
      - "confounded"
    description: "Status of the counterfactual verification."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation."