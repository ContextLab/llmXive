$schema: http://json-schema.org/draft-07/schema#
title: Baseline Narrative Schema
description: Schema for the primary narrative generated by the baseline pipeline (US1).
type: object
required:
  - story_id
  - type
  - primary_claim
  - supporting_metric
  - data_query
properties:
  story_id:
    type: string
    description: "Unique identifier for the story instance."
  type:
    type: string
    const: "baseline"
    description: "Must be 'baseline'."
  primary_claim:
    type: string
    description: "Textual summary of the strongest statistical correlation."
  supporting_metric:
    type: object
    required:
      - correlation
      - p_value
      - variable_pair
    properties:
      correlation:
        type: number
        description: "Pearson r value."
      p_value:
        type: number
        description: "Raw p-value."
      variable_pair:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: string
        description: "List of two variable names [A, B]."
  data_query:
    type: string
    description: "Python or SQL snippet used to derive the metric."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation."
