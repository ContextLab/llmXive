access_python: "import os, tempfile, shutil\nfrom beir import util\nfrom beir.datasets.data_loader\
  \ import GenericDataLoader\n\ndatasets = [\"scifact\", \"nfcorpus\", \"trec-covid\"\
  ]\nrecords = []\n\nfor ds in datasets:\n    url = f\"https://public.ukp.informatik.tu-darmstadt.de/thakur/BEIR/datasets/{ds}.zip\"\
  \n    out_dir = tempfile.mkdtemp()\n    data_path = util.download_and_unzip(url,\
  \ out_dir)\n    data_folder = os.path.join(data_path, ds) if os.path.isdir(os.path.join(data_path,\
  \ ds)) else data_path\n    corpus, queries, qrels = GenericDataLoader(data_folder=data_folder).load(split=\"\
  test\")\n    for qid, rels in qrels.items():\n        query_obj = queries[qid]\n\
  \        query_text = query_obj[\"text\"] if isinstance(query_obj, dict) else query_obj\n\
  \        for docid, score in rels.items():\n            doc_obj = corpus[docid]\n\
  \            doc_text = doc_obj[\"text\"] if isinstance(doc_obj, dict) else doc_obj\n\
  \            records.append({\n                \"query_id\": qid,\n            \
  \    \"query_text\": query_text,\n                \"doc_id\": docid,\n         \
  \       \"doc_text\": doc_text,\n                \"relevance_score\": score,\n \
  \               \"split\": \"test\"\n            })\n    shutil.rmtree(out_dir)\n\
  \nprint(f\"RECORDS={len(records)}\")\nif records:\n    print(\"FIELDS=\" + \",\"\
  .join(records[0].keys()))"
