$schema: "http://json-schema.org/draft-07/schema#"
title: "Synthetic Redundancy Dataset Schema"
description: "Schema for the processed dataset containing original BEIR documents and synthetically injected near-duplicates."
type: object
properties:
  document_id:
    type: string
    description: "Unique identifier for the document."
  text:
    type: string
    description: "The full text of the document passage."
  source_dataset:
    type: string
    description: "Original BEIR dataset name (e.g., 'scifact')."
  is_synthetic:
    type: boolean
    description: "True if this document is a synthetic near-duplicate."
  parent_document_id:
    type: string
    description: "ID of the original document if this is a synthetic variant; null otherwise."
  cluster_id:
    type: string
    description: "Cluster ID assigned by MinHash-LSH (null if not clustered yet)."
  relevance_label:
    type: integer
    description: "Ground truth relevance score (0, 1, 2)."
required:
  - document_id
  - text
  - source_dataset
  - is_synthetic
  - relevance_label
additionalProperties: false
