$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Result Schema"
description: "Schema for the output of the adaptive vs static simulation."
type: "object"
required:
  - session_id
  - condition
  - efficiency_score
  - load_score
  - model_stats
properties:
  session_id:
    type: "string"
    description: "Reference to the session."
  condition:
    type: "string"
    enum:
      - "adaptive"
      - "static"
    description: "Condition under which the simulation ran."
  efficiency_score:
    type: "number"
    description: "Computed learning efficiency metric."
  load_score:
    type: "number"
    minimum: 0
    maximum: 100
    description: "Estimated cognitive load during the session."
  model_stats:
    type: "object"
    description: "Statistical summary from the mixed-effects model."
    required:
      - cohen_d
      - ci_lower
      - ci_upper
      - p_value
    properties:
      cohen_d:
        type: "number"
        description: "Effect size (Cohen's d)."
      ci_lower:
        type: "number"
        description: "Lower bound of 95% confidence interval."
      ci_upper:
        type: "number"
        description: "Upper bound of 95% confidence interval."
      p_value:
        type: "number"
        description: "P-value for the condition effect."
      correction_applied:
        type: "string"
        description: "Name of multiple-comparison correction applied (e.g., Bonferroni)."
