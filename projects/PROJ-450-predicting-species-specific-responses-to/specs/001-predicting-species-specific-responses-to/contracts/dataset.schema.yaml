$schema: "http://json-schema.org/draft-07/schema#"
title: "GBIF Occurrence Record Schema"
description: "Schema for the raw occurrence records downloaded from GBIF."
type: object
properties:
  species_name:
    type: string
    description: "Scientific name of the species."
  taxonomic_group:
    type: string
    description: "Broad taxonomic group (e.g., Plant, Bird)."
  decimalLatitude:
    type: number
    description: "Latitude in decimal degrees."
  decimalLongitude:
    type: number
    description: "Longitude in decimal degrees."
  eventDate:
    type: string
    description: "ISO 8601 date string of collection."
  basisOfRecord:
    type: string
    description: "Must be 'PRESERVED_SPECIMEN'."
  coordinateUncertaintyInMeters:
    type: number
    description: "Uncertainty radius in meters."
  gbifID:
    type: string
    description: "Unique GBIF identifier."
required:
  - species_name
  - decimalLatitude
  - decimalLongitude
  - eventDate
  - basisOfRecord
  - gbifID
additionalProperties: true