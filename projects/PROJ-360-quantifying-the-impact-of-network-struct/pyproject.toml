[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantifying-network-structure-thermal"
version = "0.1.0"
description = "Quantifying the Impact of Network Structure on Heat Diffusion in Crystalline Solids"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pymatgen>=2023.1.10",
    "networkx>=3.1",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "requests>=2.31.0",
    "numpy>=1.24.0",
    "statsmodels>=0.14.0",
]

[project.optional-dependencies]
dev = [
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "pylint>=2.17.0",
    "pre-commit>=3.3.0",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["code"]
known_third_party = ["pymatgen", "networkx", "sklearn", "pandas", "requests", "numpy", "statsmodels"]

[tool.pylint.messages_control]
disable = [
    "C0114", # missing-module-docstring
    "C0115", # missing-class-docstring
    "C0116", # missing-function-docstring
    "R0903", # too-few-public-methods
    "W0511", # TODO
]

[tool.pylint.format]
max-line-length = 100
