$schema: "http://json-schema.org/draft-07/schema#"
title: "Task Result Schema"
description: "Schema for the JSON artifact generated for each task in the Pi-Bench evaluation."
type: "object"
required:
  - "task_id"
  - "model_id"
  - "persona_id"
  - "completion_status"
  - "proactivity_score"
  - "novelty_index"
  - "latency_ms"
  - "action_trace"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  model_id:
    type: "string"
    description: "Identifier for the LLM model used."
  persona_id:
    type: "string"
    description: "Identifier for the persona profile."
  completion_status:
    type: "string"
    enum:
      - "success"
      - "failure"
      - "timeout"
      - "environment_failure"
    description: "Status of the task execution."
  proactivity_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Score representing the agent's ability to anticipate unstated needs."
  novelty_index:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Index representing the novelty of the action sequence (1.0 = novel, 0.0 = retrieval)."
  latency_ms:
    type: "integer"
    minimum: 0
    description: "Total latency of the task execution in milliseconds."
  action_trace:
    type: "array"
    description: "Sequence of actions, observations, and thoughts."
    items:
      type: "object"
      required:
        - "step"
        - "action"
        - "observation"
      properties:
        step:
          type: "integer"
          description: "Step number in the trajectory."
        action:
          type: "string"
          description: "Action taken by the agent."
        observation:
          type: "string"
          description: "Observation returned by the environment."
  novelty_check:
    type: "object"
    description: "Details of the novelty check (retrieval vs. planning)."
    properties:
      is_proactive:
        type: "boolean"
        description: "Whether the action is flagged as proactive."
      deviation_score:
        type: "number"
        minimum: 0.0
        maximum: 1.0
        description: "Deviation from the baseline trajectory."
      reason:
        type: "string"
        description: "Explanation for the novelty check result."
  errors:
    type: "array"
    description: "List of errors encountered during execution."
    items:
      type: "object"
      properties:
        error_type:
          type: "string"
          enum:
            - "environment_failure"
            - "timeout"
            - "agent_failure"
        message:
          type: "string"
        excluded_from_metrics:
          type: "boolean"
    default: []
additionalProperties: false