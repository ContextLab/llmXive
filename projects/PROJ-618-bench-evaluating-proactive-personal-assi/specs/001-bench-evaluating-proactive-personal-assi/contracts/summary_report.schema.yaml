$schema: "http://json-schema.org/draft-07/schema#"
title: "Summary Report Schema"
description: "Schema for the aggregated summary report of the Pi-Bench evaluation."
type: "object"
required:
  - "summary_date"
  - "total_tasks"
  - "models"
  - "metrics"
properties:
  summary_date:
    type: "string"
    format: "date"
    description: "Date of the summary report generation."
  total_tasks:
    type: "integer"
    minimum: 0
    description: "Total number of tasks evaluated."
  models:
    type: "array"
    description: "List of models evaluated."
    items:
      type: "string"
  metrics:
    type: "object"
    description: "Aggregated metrics for each model."
    additionalProperties:
      type: "object"
      required:
        - "task_completion_rate"
        - "avg_proactivity_score"
        - "avg_novelty_index"
      properties:
        task_completion_rate:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Rate of successful task completion."
        avg_proactivity_score:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Average proactivity score across tasks."
        avg_novelty_index:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Average novelty index across tasks."
        ci_proactivity_diff:
          type: "array"
          minItems: 2
          maxItems: 2
          description: "95% Confidence Interval for proactivity difference (lower, upper)."
          items:
            type: "number"
  statistical_method:
    type: "string"
    enum:
      - "Bootstrapping (10,000 resamples)"
      - "Descriptive"
    description: "Method used for statistical analysis."
additionalProperties: false