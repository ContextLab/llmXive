[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-eval-code-simplification"
version = "0.1.0"
description = "Evaluating the Effectiveness of Code Simplification on LLM Performance"
requires-python = ">=3.10"
dependencies = [
    "datasets",
    "transformers",
    "llama-cpp-python",
    "scipy",
    "matplotlib",
    "pandas",
    "pytest",
    "ruff==0.1.0",
    "black==23.0.0",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.mypy_cache
    | \.venv
    | venv
    | dist
)/
'''
