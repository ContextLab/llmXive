# Ruff configuration for llmXive project
# This file acts as a fallback if pyproject.toml is not used or for editor-specific overrides.
# Primary configuration is in pyproject.toml under [tool.ruff]

target-version = "py311"
line-length = 88
src = ["code"]

[lint]
select = [
    "E", "W", "F", "I", "C", "B", "UP"
]
ignore = [
    "E501",
    "B008",
    "C901"
]

[lint.per-file-ignores]
"tests/*" = ["S101"]

[lint.isort]
known-first-party = ["code"]
