[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-gatemem-benchmark"
version = "0.1.0"
description = "Benchmarking Memory Governance in Multi-Principal Shared-Memo"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "datasets",
    "transformers",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "pyyaml",
    "pytest",
    "huggingface_hub",
    "torch",
    "sentence-transformers",
    "pydantic",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]
