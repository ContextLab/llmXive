$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Output Schema"
description: "Schema for the evaluation results generated by the gatekeeper pipeline."
type: "object"
properties:
  run_metadata:
    type: "object"
    properties:
      run_id:
        type: "string"
      timestamp:
        type: "string"
        format: date-time
      config_hash:
        type: "string"
        description: "Hash of the configuration used for this run."
    required:
      - run_id
      - timestamp
      - config_hash
  results:
    type: "array"
    items:
      type: "object"
      properties:
        query_id:
          type: "string"
        gatekeeper_decision:
          type: "string"
          enum:
            - ALLOW
            - BLOCK
        reason:
          type: "string"
        llm_output:
          type: "string"
        exact_leak_detected:
          type: "boolean"
        semantic_leak_score:
          type: "number"
          minimum: 0.0
          maximum: 1.0
        semantic_leak_detected:
          type: "boolean"
        utility_score:
          type: "number"
          minimum: 0.0
          maximum: 1.0
        latency_ms:
          type: "number"
          minimum: 0
      required:
        - query_id
        - gatekeeper_decision
        - llm_output
        - exact_leak_detected
        - semantic_leak_score
        - semantic_leak_detected
        - utility_score
        - latency_ms
  aggregated_metrics:
    type: "object"
    properties:
      blocking_efficiency_score:
        type: "number"
        description: "Percentage of exact leak targets blocked (Deterministic)."
      semantic_access_control_score:
        type: "number"
        description: "Percentage of semantic leaks prevented."
      forgetting_score:
        type: "number"
        description: "Percentage of deleted targets suppressed."
      utility_score:
        type: "number"
        description: "Average utility score across all queries."
      baseline_comparison:
        type: "object"
        properties:
          semantic_access_control_delta:
            type: "number"
          forgetting_delta:
            type: "number"
          utility_delta:
            type: "number"
        required:
          - semantic_access_control_delta
          - forgetting_delta
          - utility_delta
    required:
      - blocking_efficiency_score
      - semantic_access_control_score
      - forgetting_score
      - utility_score
      - baseline_comparison
required:
  - run_metadata
  - results
  - aggregated_metrics
additionalProperties: false