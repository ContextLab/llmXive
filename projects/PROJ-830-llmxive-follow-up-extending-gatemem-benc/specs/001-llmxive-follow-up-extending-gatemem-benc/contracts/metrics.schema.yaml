$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Metrics Schema"
description: "Schema for the statistical analysis results."
type: "object"
properties:
  statistical_tests:
    type: "object"
    properties:
      semantic_access_control:
        type: "object"
        properties:
          test_type:
            type: "string"
            enum:
              - permutation_test
              - wilcoxon
          p_value:
            type: "number"
            minimum: 0.0
            maximum: 1.0
          corrected_p_value:
            type: "number"
            description: "P-value after Bonferroni/Holm-Bonferroni correction."
          effect_size:
            type: "number"
            description: "Cohen's d or similar."
          confidence_interval:
            type: "object"
            properties:
              lower:
                type: "number"
              upper:
                type: "number"
            required:
              - lower
              - upper
          significant:
            type: "boolean"
        required:
          - test_type
          - p_value
          - corrected_p_value
          - effect_size
          - significant
      forgetting:
        type: "object"
        properties:
          test_type:
            type: "string"
            enum:
              - permutation_test
              - wilcoxon
          p_value:
            type: "number"
            minimum: 0.0
            maximum: 1.0
          corrected_p_value:
            type: "number"
          effect_size:
            type: "number"
          confidence_interval:
            type: "object"
            properties:
              lower:
                type: "number"
              upper:
                type: "number"
            required:
              - lower
              - upper
          significant:
            type: "boolean"
        required:
          - test_type
          - p_value
          - corrected_p_value
          - effect_size
          - significant
      utility:
        type: "object"
        properties:
          test_type:
            type: "string"
            enum:
              - permutation_test
              - wilcoxon
          p_value:
            type: "number"
            minimum: 0.0
            maximum: 1.0
          corrected_p_value:
            type: "number"
          effect_size:
            type: "number"
          confidence_interval:
            type: "object"
            properties:
              lower:
                type: "number"
              upper:
                type: "number"
            required:
              - lower
              - upper
          significant:
            type: "boolean"
        required:
          - test_type
          - p_value
          - corrected_p_value
          - effect_size
          - significant
    required:
      - semantic_access_control
      - forgetting
      - utility
  sensitivity_analysis:
    type: "object"
    properties:
      thresholds:
        type: "array"
        items:
          type: "number"
      false_positive_rates:
        type: "array"
        items:
          type: "number"
      false_negative_rates:
        type: "array"
        items:
          type: "number"
    required:
      - thresholds
      - false_positive_rates
      - false_negative_rates
  computational_profile:
    type: "object"
    properties:
      total_runtime_seconds:
        type: "number"
        minimum: 0
      peak_memory_mb:
        type: "number"
        minimum: 0
      avg_latency_per_query_ms:
        type: "number"
        minimum: 0
    required:
      - total_runtime_seconds
      - peak_memory_mb
      - avg_latency_per_query_ms
required:
  - statistical_tests
  - sensitivity_analysis
  - computational_profile
additionalProperties: false