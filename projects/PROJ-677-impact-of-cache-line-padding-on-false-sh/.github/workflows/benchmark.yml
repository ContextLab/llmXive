name: Benchmark Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/analysis/requirements.txt || pip install pandas scipy matplotlib pydantic pyyaml

      - name: Set up C++17 environment
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake

      - name: Configure CPU Governor (Performance Mode)
        run: |
          # Attempt to set governor to performance
          # Note: Requires root permissions which Actions provides
          if command -v cpupower &> /dev/null; then
            sudo cpupower frequency-set -g performance
          else
            # Fallback to direct sysfs write if cpupower is unavailable
            for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
              echo performance | sudo tee $cpu > /dev/null 2>&1 || true
            done
          fi
          echo "Current governor settings:"
          cat /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor

      - name: Build Benchmark Executables
        working-directory: code/benchmark
        run: |
          if [ -f "../scripts/build.sh" ]; then
            chmod +x ../scripts/build.sh
            ../scripts/build.sh
          else
            # Fallback manual build if script missing
            g++ -O3 -march=native -std=c++17 main.cpp counter_packed.hpp counter_padded.hpp -o benchmark_main -pthread
            g++ -O3 -march=native -std=c++17 verify_layout.cpp -o verify_layout
          fi

      - name: Verify Memory Layout
        working-directory: code/benchmark
        run: |
          if [ -f "verify_layout" ]; then
            ./verify_layout
          else
            echo "verify_layout binary not found, skipping layout verification"
            exit 0
          fi

      - name: Run Benchmarks
        working-directory: code/scripts
        run: |
          chmod +x run_benchmarks.sh
          ./run_benchmarks.sh
        env:
          # Allow the script to attempt privileged operations if needed, 
          # though usually handled in the setup step or via fallback
          CI: "true"

      - name: Run Analysis
        working-directory: code/analysis
        run: |
          python run_analysis.py

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            data/raw/*.csv
            data/processed/*.csv
            figures/*.png
          retention-days: 30

      - name: Upload Logs and Checksums
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-and-checksums
          path: |
            state/artifacts/checksums.json
            state/logs/*.log
          retention-days: 30