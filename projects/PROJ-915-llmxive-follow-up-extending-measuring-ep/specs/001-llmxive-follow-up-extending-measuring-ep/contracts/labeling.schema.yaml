$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Response Labeling Schema"
description: "Schema for the labeled model responses and associated metadata."
type: "object"
properties:
  prompt_id:
    type: "string"
    description: "Foreign key to the original prompt ID."
  generated_text:
    type: "string"
    description: "The raw text generated by the LLM."
  adherence_label:
    type: "integer"
    description: "Classification label: 0 (Resilient-Correct), 1 (Adherent), 2 (Resilient-Refusal)."
    enum:
      - 0
      - 1
      - 2
  generation_time:
    type: "number"
    description: "Time taken for inference in seconds."
    minimum: 0.0
  is_refusal:
    type: "boolean"
    description: "True if the model refused to answer."
  safety_refusal:
    type: "boolean"
    description: "True if a safety‑filter trigger phrase was detected."
  false_claim:
    type: "string"
    description: "Extracted false claim text used for similarity comparison (may be empty)."
  external_fact:
    type: "string"
    description: "PubMed abstract or other external verification of the correct medical fact."
  sim_false:
    type: "number"
    description: "Cosine similarity between model output and false claim."
    minimum: 0.0
    maximum: 1.0
  sim_correct:
    type: "number"
    description: "Cosine similarity between model output and external fact."
    minimum: 0.0
    maximum: 1.0
  labeling_method:
    type: "string"
    description: "Method used for labeling (e.g., 'semantic_similarity')."
required:
  - prompt_id
  - generated_text
  - adherence_label
  - generation_time
  - is_refusal
  - safety_refusal
  - labeling_method
additionalProperties: false