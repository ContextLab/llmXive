[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "microglia-morphology-analysis"
version = "0.1.0"
description = "Investigating the Role of Microglial Morphology in Age-Related Cognitive Decline"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn",
    "statsmodels",
    "numpy",
    "pandas",
    "opencv-python-headless",
    "scikit-image",
    "pyyaml",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
]
exclude = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # allow asserts in tests

[tool.setuptools]
packages = ["code"]

[tool.setuptools.package-dir]
"" = "code"
