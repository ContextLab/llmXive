[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "microglial-morphology-analysis"
version = "0.1.0"
description = "Investigating the Role of Microglial Morphology in Age-Related Cognitive Decline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn",
    "statsmodels",
    "numpy",
    "pandas",
    "opencv-python-headless",
    "scikit-image",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*", "tests*"]

# Linting: Ruff configuration
[tool.ruff]
target-version = "py311"
line-length = 88
src = ["code", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in pandas/numpy)
    "C901", # too complex (allow for analysis logic)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"] # Allow assertions in tests

# Formatting: Black configuration
[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

# Test configuration: Pytest
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]