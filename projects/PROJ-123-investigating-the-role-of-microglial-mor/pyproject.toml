[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "investigating-the-role-of-microglial-mor"
version = "0.1.0"
description = "Investigating the Role of Microglial Morphology in Age-Related Cognitive Decline"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn",
    "statsmodels",
    "numpy",
    "pandas",
    "opencv-python-headless",
    "scikit-image",
    "pyyaml",
    "ruff",
    "black",
    "scipy",
]

[tool.ruff]
# Target Python version
target-version = "py311"
# Line length matching Black
line-length = 88
# Exclude generated files and virtual environments
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by Black)
]

[tool.ruff.lint.isort]
known-first-party = ["code"]
force-sort-within-sections = true

[tool.black]
# Configuration for Black formatter
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.venv
    | venv
    | __pycache__
    | build
    | dist
    | \.egg-info
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"