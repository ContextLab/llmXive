$schema: http://json-schema.org/draft-07/schema#
title: Morphological Analysis Output Schema
description: |
  Schema for the output of the morphological feature extraction and
  regression analysis pipeline.
type: object
required:
  - metadata
  - morphological_metrics
  - regression_results
properties:
  metadata:
    type: object
    required:
      - generated_at
      - pipeline_version
      - analysis_config
    properties:
      generated_at:
        type: string
        format: date-time
      pipeline_version:
        type: string
      analysis_config:
        type: object
        properties:
          sholl_radii:
            type: array
            items:
              type: number
          vif_threshold:
            type: number
          cv_folds:
            type: integer
  
  morphological_metrics:
    type: array
    description: Extracted morphological features per cell/image
    items:
      type: object
      required:
        - image_id
        - subject_id
        - brain_region
        - branch_points
        - total_length
        - soma_area
        - sholl_intersections
      properties:
        image_id:
          type: string
        subject_id:
          type: string
        brain_region:
          type: string
        branch_points:
          type: integer
          minimum: 0
        total_length:
          type: number
          minimum: 0
          description: Total process length in micrometers
        soma_area:
          type: number
          minimum: 0
          description: Soma area in square micrometers
        sholl_intersections:
          type: object
          description: Map of radius (µm) to intersection count
          additionalProperties:
            type: integer
        complexity_score:
          type: number
          description: Composite complexity metric (if calculated)
        exclusion_reason:
          type: string
          nullable: true
          description: Reason for exclusion if metrics are invalid (e.g., empty field)
  
  regression_results:
    type: object
    description: Results of the multivariate regression analysis
    required:
      - model_summary
      - coefficients
      - interaction_significance
      - validation_metrics
    properties:
      model_summary:
        type: object
        properties:
          r_squared:
            type: number
          adj_r_squared:
            type: number
          f_statistic:
            type: number
          p_value:
            type: number
      coefficients:
        type: array
        items:
          type: object
          required:
            - term
            - estimate
            - std_err
            - p_value
            - significant
          properties:
            term:
              type: string
            estimate:
              type: number
            std_err:
              type: number
            p_value:
              type: number
            significant:
              type: boolean
      interaction_significance:
        type: object
        description: Specific analysis of Pathology*Region interaction
        properties:
          term_name:
            type: string
          p_value:
            type: number
          is_significant:
            type: boolean
            description: True if p < 0.05
      validation_metrics:
        type: object
        properties:
          cv_r2_mean:
            type: number
          cv_r2_std:
            type: number
          sensitivity_analysis_stable:
            type: boolean
            description: True if R² variation < 5% across Sholl steps
      causality_warning:
        type: boolean
        description: Flag indicating if causality disclaimer is attached (FR-007)
additionalProperties: false