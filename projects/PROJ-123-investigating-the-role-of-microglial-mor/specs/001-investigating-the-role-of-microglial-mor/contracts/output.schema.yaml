$schema: http://json-schema.org/draft-07/schema#
title: Regression Analysis Output Schema
description: |
  Schema for the output of the multivariate regression analysis.
  Includes model coefficients, statistical significance, and validation metrics.
  This schema defines the structure of `reports/regression_results.json` and
  intermediate artifacts like `data/intermediates/vif_check.json` and
  `data/intermediates/sensitivity_analysis.json`.
type: object
required:
  - regression_results
  - validation_metrics
properties:
  regression_results:
    type: object
    description: Results from the multiple linear regression model.
    required:
      - coefficients
      - p_values
      - interaction_terms
      - vif_scores
    properties:
      coefficients:
        type: object
        description: Estimated regression coefficients for each predictor and intercept.
        additionalProperties:
          type: number
        example:
          "Intercept": 0.542
          "branch_points": -0.012
          "total_length": 0.003
          "soma_area": 0.001
          "sholl_intersections": -0.005
          "PathologyStatus_EarlyAD": 0.150
          "BrainRegion_Hippocampus": -0.080
      p_values:
        type: object
        description: P-values associated with each coefficient.
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        example:
          "Intercept": 0.001
          "branch_points": 0.032
          "total_length": 0.450
          "soma_area": 0.810
          "sholl_intersections": 0.120
          "PathologyStatus_EarlyAD": 0.008
          "BrainRegion_Hippocampus": 0.045
      interaction_terms:
        type: array
        description: List of interaction term names included in the model.
        items:
          type: string
        example:
          - "PathologyStatus_EarlyAD:BrainRegion_Hippocampus"
      vif_scores:
        type: object
        description: Variance Inflation Factor scores for each predictor.
        additionalProperties:
          type: number
          minimum: 1
        example:
          "branch_points": 1.05
          "total_length": 1.02
          "soma_area": 1.08
          "sholl_intersections": 1.03
  validation_metrics:
    type: object
    description: Metrics evaluating model performance and stability.
    required:
      - r2_mean
      - r2_std
      - sensitivity_variation
    properties:
      r2_mean:
        type: number
        description: Mean R-squared value across cross-validation folds.
        minimum: 0
        maximum: 1
        example: 0.65
      r2_std:
        type: number
        description: Standard deviation of R-squared values across folds.
        minimum: 0
        example: 0.04
      sensitivity_variation:
        type: number
        description: Variation in key p-values across Sholl radius sensitivity sweeps.
        minimum: 0
        example: 0.02
additionalProperties: false