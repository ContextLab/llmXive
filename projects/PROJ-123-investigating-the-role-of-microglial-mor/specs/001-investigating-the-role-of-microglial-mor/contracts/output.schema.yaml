# Output Schema for Regression Analysis Results
# Defines the structure of the regression output and validation metrics
# Version: 1.0.0
# Last Updated: 2024-01-15

$schema: http://json-schema.org/draft-07/schema#
title: RegressionAnalysisOutput
description: |
  Schema for the final regression results and validation metrics.
  This output is generated by the analysis pipeline (US2) and
  consumed by the report generator.

type: object
required:
  - regression_results
  - validation_metrics
  - metadata

properties:
  regression_results:
    type: object
    description: Detailed results from the multiple linear regression
    required:
      - coefficients
      - p_values
      - interaction_terms
      - vif_scores
    properties:
      coefficients:
        type: object
        description: Regression coefficients for each predictor
        additionalProperties:
          type: number

      p_values:
        type: object
        description: P-values for each coefficient
        additionalProperties:
          type: number
          minimum: 0.0
          maximum: 1.0

      interaction_terms:
        type: array
        description: List of interaction term names included in the model
        items:
          type: string
        x-note: |
          Expected to contain 'PathologyStatus:BrainRegion' interaction.

      vif_scores:
        type: object
        description: Variance Inflation Factor scores for predictors
        additionalProperties:
          type: number
          minimum: 1.0

  validation_metrics:
    type: object
    description: Metrics assessing model performance and stability
    required:
      - r2_mean
      - r2_std
      - sensitivity_variation
    properties:
      r2_mean:
        type: number
        description: Mean R² score from k-fold cross-validation
        minimum: 0.0
        maximum: 1.0

      r2_std:
        type: number
        description: Standard deviation of R² scores
        minimum: 0.0

      sensitivity_variation:
        type: object
        description: Variation in p-values across Sholl radius sensitivity sweeps
        required:
          - max_p_value_diff
          - is_stable
        properties:
          max_p_value_diff:
            type: number
            description: Maximum difference in interaction p-value across sweeps
          is_stable:
            type: boolean
            description: True if max_p_value_diff < 0.05 (5% threshold)

  metadata:
    type: object
    description: Run metadata and flags
    required:
      - causality_warning
      - timestamp
    properties:
      causality_warning:
        type: boolean
        description: True if the study is observational (not randomized)
        x-note: |
          If true, a disclaimer is appended to reports:
          "Associational findings only; causality not inferred"

      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of the analysis run

      sholl_radii_tested:
        type: array
        description: List of Sholl radii (µm) tested in sensitivity analysis
        items:
          type: integer
        x-note: Expected to be [2, 5, 10]

  model_info:
    type: object
    description: Information about the fitted model
    properties:
      formula:
        type: string
        description: R-style formula string used for regression
      n_observations:
        type: integer
        description: Number of data points used in the model
      df_residuals:
        type: integer
        description: Degrees of freedom of residuals

additionalProperties: false