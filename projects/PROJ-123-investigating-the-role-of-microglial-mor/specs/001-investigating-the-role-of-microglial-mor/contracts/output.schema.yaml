$schema: http://json-schema.org/draft-07/schema#
$id: https://llmxive.org/schemas/output.schema.yaml
title: Morphological Metrics Output Schema
description: |
  Schema for the structured output of the morphological analysis pipeline.
  Contains quantitative metrics extracted from microglial images.
type: object
required:
  - version
  - analysis_timestamp
  - results
properties:
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: Semantic version of the output schema.
  analysis_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the analysis was run.
  pipeline_info:
    type: object
    description: Information about the pipeline execution.
    properties:
      code_version:
        type: string
      parameters:
        type: object
        description: Key parameters used (e.g., Sholl radii, denoising strength).
  results:
    type: array
    description: List of metric records per image/subject.
    items:
      type: object
      required:
        - image_id
        - subject_id
        - brain_region
        - branch_points
        - total_length_um
        - soma_area_um2
      properties:
        image_id:
          type: string
          description: Reference to the source image.
        subject_id:
          type: string
          description: Reference to the subject.
        brain_region:
          type: string
          description: Brain region of the subject (inherited from metadata).
        cognitive_status:
          type: string
          description: Cognitive status of the subject (inherited from metadata).
        branch_points:
          type: integer
          minimum: 0
          description: Count of branch points in the skeletonized neurites.
        total_length_um:
          type: number
          minimum: 0
          description: Total length of processes in micrometers.
        soma_area_um2:
          type: number
          minimum: 0
          description: Area of the cell soma in square micrometers.
        sholl_intersections:
          type: array
          description: Sholl analysis results (intersections per radius).
          items:
            type: object
            required:
              - radius_um
              - intersection_count
            properties:
              radius_um:
                type: number
                minimum: 0
              intersection_count:
                type: integer
                minimum: 0
        processing_status:
          type: string
          enum:
            - success
            - skipped_empty
            - failed
          description: Status of the processing for this image.
        error_message:
          type: string
          description: Error message if processing_status is 'failed'.
        quality_metrics:
          type: object
          description: Optional quality control metrics (e.g., SNR, contrast).
          properties:
            snr:
              type: number
            contrast_ratio:
              type: number
additionalProperties: false