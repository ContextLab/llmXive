$schema: http://json-schema.org/draft-07/schema#
title: Microglial Morphology Dataset Schema
description: |
  Schema for the raw and processed morphological metrics dataset.
  Defines the structure for microglial cell measurements tagged by brain region
  and pathology status.
  This schema strictly adheres to FR-003, excluding 'fractal_dimension' and 'complexity_index'.
type: object
required:
  - brain_region
  - pathology_status
  - morphological_metrics
  - cognitive_score
properties:
  brain_region:
    type: string
    description: The anatomical region of the brain sample.
    enum:
      - Hippocampus
      - Prefrontal Cortex
  pathology_status:
    type: string
    description: The pathological classification of the subject.
    enum:
      - Normal
      - Early AD
  morphological_metrics:
    type: object
    description: Quantitative metrics derived from image analysis.
    required:
      - branch_points
      - total_length
      - soma_area
      - sholl_intersections
    properties:
      branch_points:
        type: integer
        description: Count of branch points in the microglial skeleton.
        minimum: 0
      total_length:
        type: number
        description: Total length of the microglial processes in micrometers.
        minimum: 0
      soma_area:
        type: number
        description: Area of the microglial cell body in square micrometers.
        minimum: 0
      sholl_intersections:
        type: integer
        description: Number of intersections at a specific Sholl radius.
        minimum: 0
  cognitive_score:
    type: number
    description: Cognitive assessment score, specifically MWM latency in seconds.
    minimum: 0
    maximum: 300
additionalProperties: false