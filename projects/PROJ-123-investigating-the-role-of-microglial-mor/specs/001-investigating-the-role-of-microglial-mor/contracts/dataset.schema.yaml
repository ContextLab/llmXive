# Dataset Schema for Microglial Morphology Analysis
# Defines the structure of the input dataset for regression analysis
# Version: 1.0.0
# Last Updated: 2024-01-15
#
# This schema enforces strict type checking and enumeration constraints
# to ensure data quality for the regression pipeline (US2).

$schema: http://json-schema.org/draft-07/schema#
title: MicrogliaMorphologyDataset
description: |
  Schema for the processed morphological metrics dataset.
  Contains features extracted from microscopy images and associated metadata.

type: object
required:
  - subject_id
  - brain_region
  - pathology_status
  - morphological_metrics
  - cognitive_score

properties:
  subject_id:
    type: string
    description: Unique identifier for the subject/animal
    pattern: "^[A-Z0-9_-]+$"

  brain_region:
    type: string
    description: Anatomical region of the brain slice
    enum:
      - Hippocampus
      - Prefrontal Cortex
    x-note: |
      Only these two regions are supported per the study design.
      Other regions must be excluded during ingestion (T012).

  pathology_status:
    type: string
    description: Pathological classification of the subject
    enum:
      - Normal
      - Early AD
    x-note: |
      'Early AD' is determined dynamically if labels are missing,
      based on amyloid-beta load (T024).

  morphological_metrics:
    type: object
    description: Quantitative measures of microglial morphology
    required:
      - branch_points
      - total_length
      - soma_area
      - sholl_intersections
    properties:
      branch_points:
        type: integer
        minimum: 0
        description: Count of branch points in the skeletonized neurite tree

      total_length:
        type: number
        minimum: 0.0
        description: Total length of neurites in micrometers (µm)

      soma_area:
        type: number
        minimum: 0.0
        description: Area of the cell soma in square micrometers (µm²)

      sholl_intersections:
        type: integer
        minimum: 0
        description: Number of intersections at the standard Sholl radius

      # NOTE: 'fractal_dimension' is explicitly excluded per spec FR-003
      # and the review decision to focus on standard morphometric features.

  cognitive_score:
    type: number
    description: Morris Water Maze (MWM) latency in seconds
    minimum: 0.0
    x-note: |
      Lower latency indicates better cognitive performance.
      Subjects with missing scores are excluded (T012).

  amyloid_beta_load:
    type: number
    minimum: 0.0
    description: Quantified amyloid-beta load (optional, used for dynamic classification)
    x-note: Required for T024 dynamic classification logic if labels are missing.

additionalProperties: false
