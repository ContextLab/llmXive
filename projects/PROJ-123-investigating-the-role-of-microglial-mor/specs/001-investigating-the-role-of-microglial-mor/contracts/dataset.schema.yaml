$schema: http://json-schema.org/draft-07/schema#
title: Microglial Morphology Dataset Schema
description: |
  Schema for the raw and processed dataset used in the investigation of
  microglial morphology in age-related cognitive decline.
  Defines the structure for input microscopy data and associated metadata.
type: object
required:
  - metadata
  - subjects
  - images
properties:
  metadata:
    type: object
    description: Project-level metadata
    required:
      - version
      - created_at
      - pipeline_version
    properties:
      version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        description: Dataset version (SemVer)
      created_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of creation
      pipeline_version:
        type: string
        description: Version of the processing pipeline used
      source:
        type: string
        description: Origin of the data (e.g., public repository, lab acquisition)
  
  subjects:
    type: array
    description: List of subject records
    items:
      type: object
      required:
        - subject_id
        - brain_region
        - cognitive_status
        - amyloid_beta_load
      properties:
        subject_id:
          type: string
          description: Unique identifier for the subject
        brain_region:
          type: string
          enum:
            - Hippocampus
            - Prefrontal_Cortex
            - Amygdala
            - Entorhinal_Cortex
          description: Brain region of origin
        cognitive_status:
          type: string
          enum:
            - Control
            - MCI
            - AD
          description: Cognitive classification
        age:
          type: integer
          minimum: 50
          description: Age of the subject in years
        sex:
          type: string
          enum:
            - M
            - F
          description: Biological sex
        amyloid_beta_load:
          type: number
          minimum: 0
          description: Quantified amyloid-beta load (normalized 0-1)
        pathology_status:
          type: string
          enum:
            - None
            - Low
            - Moderate
            - High
          description: General pathology classification
  
  images:
    type: array
    description: List of image records linked to subjects
    items:
      type: object
      required:
        - image_id
        - subject_id
        - file_path
        - acquisition_params
      properties:
        image_id:
          type: string
          description: Unique identifier for the image
        subject_id:
          type: string
          description: Foreign key to subjects
        file_path:
          type: string
          description: Relative path to the image file
        acquisition_params:
          type: object
          required:
            - magnification
            - resolution_um
            - channel
          properties:
            magnification:
              type: integer
              description: Objective magnification (e.g., 60)
            resolution_um:
              type: number
              description: Pixel resolution in micrometers
            channel:
              type: string
              description: Fluorescence channel used
        metadata_missing:
          type: boolean
          default: false
          description: Flag indicating if critical metadata was missing (FR-001)
additionalProperties: false
