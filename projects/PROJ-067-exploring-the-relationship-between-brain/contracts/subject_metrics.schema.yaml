$schema: http://json-schema.org/draft-07/schema#
title: Subject Metrics Schema
description: |
  Schema for subject-level dynamic connectivity metrics extracted from fMRI data.
  Includes flexibility and stability metrics for DMN, Salience, and Hippocampal-Memory networks.
type: object
required:
  - subject_id
  - dream_recall_frequency
  - networks
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject (e.g., sub-001)
  dream_recall_frequency:
    type: number
    description: Self-reported dream recall frequency (scale 0-7 or similar)
  fd_mm:
    type: number
    description: Mean Framewise Displacement in mm
  networks:
    type: object
    description: Metrics for each network of interest
    required:
      - DMN
      - Salience
      - Hippocampal-Memory
    properties:
      DMN:
        type: object
        required:
          - flexibility
          - stability
        properties:
          flexibility:
            type: number
            description: State transitions per unit time
          stability:
            type: number
            description: Mean Dwell Time (MDT) in windows
      Salience:
        type: object
        required:
          - flexibility
          - stability
        properties:
          flexibility:
            type: number
            description: State transitions per unit time
          stability:
            type: number
            description: Mean Dwell Time (MDT) in windows
      Hippocampal-Memory:
        type: object
        required:
          - flexibility
          - stability
        properties:
          flexibility:
            type: number
            description: State transitions per unit time
          stability:
            type: number
            description: Mean Dwell Time (MDT) in windows
  metadata:
    type: object
    description: Processing metadata
    properties:
      atlas:
        type: string
        description: Atlas used (e.g., Schaefer100)
      window_size:
        type: integer
        description: Sliding window size in timepoints
      step_size:
        type: integer
        description: Step size between windows
      clustering_method:
        type: string
        description: Clustering algorithm used (e.g., Louvain)
additionalProperties: false
