$schema: http://json-schema.org/draft-07/schema#
title: Subject Metrics Schema
description: >
  Schema for the subject-level dynamic connectivity metrics extracted
  from resting-state fMRI data. This file validates the contents of
  `data/metrics/subject_metrics.csv` (and its JSON counterpart if generated).
type: object
required:
  - subject_id
  - dream_recall_frequency
  - dmn_flexibility
  - dmn_stability
  - salience_flexibility
  - salience_stability
  - hippocampal_flexibility
  - hippocampal_stability
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject (e.g., sub-001).
  dream_recall_frequency:
    type: number
    description: >
      Self-reported dream recall frequency (DRF) score.
      Higher values indicate more frequent dream recall.
  dmn_flexibility:
    type: number
    description: >
      Network flexibility (state transitions per unit time) for the
      Default Mode Network (DMN).
  dmn_stability:
    type: number
    description: >
      Network stability (Mean Dwell Time) for the Default Mode Network (DMN).
  salience_flexibility:
    type: number
    description: >
      Network flexibility (state transitions per unit time) for the
      Salience Network.
  salience_stability:
    type: number
    description: >
      Network stability (Mean Dwell Time) for the Salience Network.
  hippocampal_flexibility:
    type: number
    description: >
      Network flexibility (state transitions per unit time) for the
      Hippocampal-Memory network (mapped via T026).
  hippocampal_stability:
    type: number
    description: >
      Network stability (Mean Dwell Time) for the Hippocampal-Memory network.
  processing_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the metrics were calculated.
  fd_value:
    type: number
    description: >
      Framewise Displacement value for the subject. Included for
      reference; subjects with FD > 0.5mm should have been excluded.
  notes:
    type: string
    description: Optional notes regarding data quality or processing anomalies.
additionalProperties: false
