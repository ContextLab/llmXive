$schema: http://json-schema.org/draft-07/schema#
title: Statistical Analysis Results
description: Schema for the final statistical analysis results (results/stats.json)
type: object
required:
  - analysis_metadata
  - correlations
  - permutation_results
  - power_analysis
properties:
  analysis_metadata:
    type: object
    required:
      - atlas_used
      - window_size
      - step_size
      - n_subjects
      - fdr_method
      - permutation_iterations
    properties:
      atlas_used:
        type: string
        description: Name of the atlas used (e.g., Schaefer100)
      window_size:
        type: integer
        description: Sliding window size in time points
      step_size:
        type: integer
        description: Step size for sliding window in time points
      n_subjects:
        type: integer
        description: Number of subjects included in the analysis
      fdr_method:
        type: string
        description: Method used for FDR correction (e.g., 'fdr_bh')
      permutation_iterations:
        type: integer
        description: Number of permutation iterations performed
  correlations:
    type: array
    description: List of correlation results for each network metric
    items:
      type: object
      required:
        - metric_name
        - network
        - rho
        - p_uncorrected
        - p_fdr_corrected
        - permutation_p_value
        - n
      properties:
        metric_name:
          type: string
          description: Name of the metric (e.g., 'flexibility', 'stability')
        network:
          type: string
          description: Network name (e.g., 'DMN', 'Salience', 'Hippocampal-Memory')
        rho:
          type: number
          description: Spearman correlation coefficient
        p_uncorrected:
          type: number
          description: Uncorrected p-value
        p_fdr_corrected:
          type: number
          description: FDR-corrected p-value
        permutation_p_value:
          type: number
          description: P-value from permutation test
        n:
          type: integer
          description: Number of samples used
  permutation_results:
    type: object
    description: Summary of permutation test results
    required:
      - null_distribution_path
      - observed_statistic
      - p_value
    properties:
      null_distribution_path:
        type: string
        description: Relative path to the saved null distribution data
      observed_statistic:
        type: number
        description: The observed correlation statistic
      p_value:
        type: number
        description: The p-value derived from the permutation test
  power_analysis:
    type: object
    description: Post-hoc power analysis results
    required:
      - sample_size
      - detectable_effect_size_80_power
      - alpha_level
    properties:
      sample_size:
        type: integer
        description: Sample size used (N)
      detectable_effect_size_80_power:
        type: number
        description: Minimum detectable effect size (rho) for 80% power
      alpha_level:
        type: number
        description: Alpha level used for power calculation
additionalProperties: false
