$schema: http://json-schema.org/draft-07/schema#
title: Statistical Analysis Results
description: Schema for results/stats.json generated by T039-T044
type: object
additionalProperties:
  type: object
  required:
    - rho
    - p
    - p_fdr
  properties:
    rho:
      type: number
      description: Spearman correlation coefficient
    p:
      type: number
      minimum: 0
      maximum: 1
      description: Uncorrected p-value
    p_fdr:
      type: number
      minimum: 0
      maximum: 1
      description: FDR-corrected p-value (Benjamini-Hochberg)
    fdr_rejected:
      type: boolean
      description: Whether the null hypothesis is rejected at alpha=0.05 after FDR correction
  required:
    - rho
    - p
    - p_fdr
    - fdr_rejected
