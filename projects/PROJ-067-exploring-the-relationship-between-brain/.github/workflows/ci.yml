name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run Pipeline
        id: run_pipeline
        run: |
          cd code
          python main.py
        continue-on-error: false

      - name: Check Pipeline Result
        if: steps.run_pipeline.outcome == 'failure'
        run: |
          echo "Pipeline execution failed. The 4-hour runtime limit was likely exceeded."
          exit 1
        shell: bash

      - name: Verify Output Artifacts
        run: |
          if [ ! -f "data/metrics/subject_metrics.csv" ]; then
            echo "Error: subject_metrics.csv not found"
            exit 1
          fi
          if [ ! -f "results/stats.json" ]; then
            echo "Error: stats.json not found"
            exit 1
          fi
          echo "All required artifacts generated successfully."