[lint]
select = ["E", "W", "F", "I", "N", "B", "C4", "UP", "A", "T20", "RUF"]
ignore = ["E501", "RUF001", "RUF002", "RUF003"]
target-version = "py311"

[lint.isort]
known-first-party = ["code"]

[format]
line-length = 88
indent-style = "space"
quote-style = "double"
skip-magic-trailing-comma = false
