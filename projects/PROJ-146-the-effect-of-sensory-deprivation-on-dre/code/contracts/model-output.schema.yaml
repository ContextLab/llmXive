$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: >
  Schema for statistical model results (Logistic Mixed Effects for Recall,
  Linear Mixed Effects for Bizarreness).
type: object
properties:
  metadata:
    type: object
    properties:
      model_type:
        type: string
        description: "Type of model fitted (e.g., 'GLM_Firth_Logistic', 'LME_Linear')"
      threshold_label:
        type: string
        description: "The specific threshold condition this model applies to"
      fitted_at:
        type: string
        format: date-time
      n_observations:
        type: integer
      n_groups:
        type: integer
        description: "Number of unique participant IDs"
      warning_flags:
        type: array
        items:
          type: string
        description: "Any convergence or sample size warnings"
    required:
      - model_type
      - threshold_label
      - fitted_at
      - n_observations
      - n_groups
  fixed_effects:
    type: object
    description: "Fixed effect estimates for the condition variable"
    properties:
      term:
        type: string
        description: "Name of the predictor (e.g., 'C(condition)[T.strict (complete isolation)]')"
      estimate:
        type: number
        description: "Coefficient (log-odds for logistic, beta for linear)"
      std_err:
        type: number
      z_value:
        type: number
      p_value:
        type: number
      confidence_interval:
        type: object
        properties:
          lower:
            type: number
          upper:
            type: number
        required:
          - lower
          - upper
    required:
      - term
      - estimate
      - std_err
      - p_value
      - confidence_interval
  random_effects:
    type: object
    description: "Variance components for random intercepts"
    properties:
      group_var:
        type: number
        description: "Variance of the random intercept for participant_id"
      residual_var:
        type: number
        description: "Residual variance (for linear models only)"
    required:
      - group_var
  goodness_of_fit:
    type: object
    properties:
      aic:
        type: number
      bic:
        type: number
      log_likelihood:
        type: number
    required:
      - aic
      - bic
      - log_likelihood
required:
  - metadata
  - fixed_effects
  - random_effects
  - goodness_of_fit