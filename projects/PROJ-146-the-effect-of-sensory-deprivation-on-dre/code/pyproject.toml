[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-sensory-deprivation-dreams"
version = "0.1.0"
description = "Simulation study on the effect of sensory deprivation on dream recall and bizarreness"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "statsmodels",
    "scikit-learn",
    "seaborn",
    "pyyaml",
    "pytest",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.ruff]
# Target Python version
target-version = "py311"

# Line length (standard for Python projects)
line-length = 100

# Exclude directories
exclude = [
    ".git",
    ".tox",
    "__pycache__",
    "data",
    "results",
    "build",
    "dist",
]

[tool.ruff.lint]
# Select specific linting rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade (modern Python syntax)
    "N",   # pep8-naming
]

# Ignore specific rules if necessary
ignore = [
    "E501", # Line too long (handled by black/ruff format)
    "B008", # Do not perform function call in argument defaults (common in data classes)
]

[tool.ruff.lint.per-file-ignores]
# Allow specific patterns in test files or data scripts if needed
"tests/*" = ["S101"] # Allow assert in tests

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"
# Indent with spaces
indent-style = "space"
# Skip magic trailing comma
skip-magic-trailing-comma = false
# Line ending
line-ending = "auto"

[tool.black]
# Black configuration (redundant if using ruff format, but kept for compatibility)
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.tox
  | __pycache__
  | data
  | results
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
