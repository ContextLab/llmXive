%YAML 1.1
---
# Model Output Schema for Sensory Deprivation Dream Study
# This schema defines the structure of the JSON output generated by 
# the statistical modeling pipeline (logistic and linear mixed-effects).
#
# Source: T006 Implementation
# Version: 1.0.0

name: "dream_analysis_model_output"
description: "Results from mixed-effects modeling of dream recall and bizarreness."

format:
  type: json
  encoding: utf-8

root_structure:
  type: object
  required_fields:
    - metadata
    - models
    - sensitivity_analysis
    - warnings

properties:
  metadata:
    type: object
    required:
      - analysis_id
      - timestamp
      - dataset_path
      - model_type
      - software_version
    properties:
      analysis_id:
        type: string
        description: "Unique identifier for this analysis run."
      timestamp:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of analysis completion."
      dataset_path:
        type: string
        description: "Relative path to the input dataset."
      model_type:
        type: string
        enum:
          - "logistic_mixed"
          - "linear_mixed"
          - "ordinal_fixed_approx"
        description: "Type of model fitted."
      software_version:
        type: string
        description: "Version of statsmodels/scipy used."
      associational_flag:
        type: boolean
        description: "Always true. Indicates findings are associational, not causal."
        const: true
      simulation_flag:
        type: boolean
        description: "True if input data was synthetic."
  
  models:
    type: object
    description: "Results for the fitted model."
    properties:
      fixed_effects:
        type: object
        description: "Fixed effects estimates."
        properties:
          intercept:
            type: object
            properties:
              estimate:
                type: number
              std_error:
                type: number
              p_value:
                type: number
              z_value:
                type: number
          condition:
            type: array
            description: "Coefficients for condition levels (relative to reference)."
            items:
              type: object
              properties:
                level:
                  type: string
                estimate:
                  type: number
                std_error:
                  type: number
                p_value:
                  type: number
                z_value:
                  type: number
      random_effects:
        type: object
        description: "Random intercept variance components."
        properties:
          participant_id:
            type: object
            properties:
              variance:
                type: number
              std_dev:
                type: number
      model_fit:
        type: object
        properties:
          log_likelihood:
            type: number
          aic:
            type: number
          bic:
            type: number
          pseudo_r2:
            type: number
            description: "Nagelkerke or McFadden R2 for logistic models."
  
  sensitivity_analysis:
    type: object
    description: "Results from threshold sweep and bootstrap validation."
    properties:
      threshold_sweep:
        type: array
        description: "Results for each threshold (strict, moderate, partial)."
        items:
          type: object
          properties:
            threshold_label:
              type: string
            effect_size:
              type: number
            p_value:
              type: number
            ci_lower:
              type: number
            ci_upper:
              type: number
      bootstrap:
        type: object
        properties:
          n_resamples:
            type: integer
          ci_width_variance:
            type: number
          stability_status:
            type: string
            enum:
              - "stable"
              - "unstable"
              - "converged"
        description: "Bootstrap validation metrics."
  
  warnings:
    type: array
    description: "List of warnings generated during analysis."
    items:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          type: string
          enum:
            - "info"
            - "warning"
            - "error"

constraints:
  - rule: "All p-values must be between 0 and 1"
    fields: ["models.fixed_effects.*.p_value", "sensitivity_analysis.threshold_sweep.*.p_value"]
    type: range
    min: 0.0
    max: 1.0
  - rule: "associational_flag must be true"
    field: metadata.associational_flag
    const: true
  - rule: "simulation_flag must be true if input is synthetic"
    condition: "if metadata.dataset_path contains 'synthetic' then metadata.simulation_flag == true"

examples:
  - description: "Example of a logistic mixed-effects model output"
    metadata:
      analysis_id: "run_001"
      timestamp: "2023-10-27T10:00:00Z"
      dataset_path: "data/processed/data_threshold_strict.csv"
      model_type: "logistic_mixed"
      software_version: "1.3.0"
      associational_flag: true
      simulation_flag: true
    models:
      fixed_effects:
        intercept:
          estimate: 0.5
          std_error: 0.1
          p_value: 0.001
          z_value: 5.0
        condition:
          - level: "moderate (partial sensory reduction)"
            estimate: -0.2
            std_error: 0.15
            p_value: 0.15
            z_value: -1.33
      random_effects:
        participant_id:
          variance: 0.3
          std_dev: 0.547
      model_fit:
        log_likelihood: -120.5
        aic: 247.0
        bic: 255.0
        pseudo_r2: 0.05
    sensitivity_analysis:
      threshold_sweep: []
      bootstrap:
        n_resamples: 1000
        ci_width_variance: 0.005
        stability_status: "stable"
    warnings: []