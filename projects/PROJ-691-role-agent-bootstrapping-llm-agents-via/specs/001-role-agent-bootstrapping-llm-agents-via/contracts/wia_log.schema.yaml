$schema: http://json-schema.org/draft-07/schema#
title: WIA_Log Schema
description: Schema for the World-In-Agent execution log entries.
type: array
items:
  type: object
  required:
    - episode_id
    - action
    - predicted_state
    - actual_state
  properties:
    episode_id:
      type: integer
      description: Unique identifier for the episode.
    action:
      type: string
      description: The action taken by the agent.
    predicted_state:
      type: string
      description: The state predicted by the agent role.
    actual_state:
      type: string
      description: The ground truth state from the environment.
    alignment_score:
      type: number
      nullable: true
      description: Optional alignment score if calculated.
    timestamp:
      type: string
      format: date-time
      description: ISO 8601 timestamp of the log entry.
    error:
      type: string
      nullable: true
      description: Error message if the episode failed.
  additionalProperties: false