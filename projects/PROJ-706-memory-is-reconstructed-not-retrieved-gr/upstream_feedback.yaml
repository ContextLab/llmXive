  - id: 384ca4bae8f2
    text: Theorem 1 proof assumes the query x reveals no path info. If x can encode
      the path, passive policies could win. The separation requires stricter query
      space constraints to be logically sound.
    severity: science
  - id: 817ca9208217
    text: Table 1 shows MRAgent has lower Multi-hop F1 (43.69) than Mem0 (45.17) despite
      claiming active reconstruction solves multi-hop issues. The text fails to reconcile
      this contradiction or explain the metric divergence.
    severity: writing
  - id: a7a8c1de84a1
    text: Section 3.1 defines the graph M=(C,V,R) but Section 3.2 introduces Topic
      nodes and edges not present in the formal definition of V or R. The architecture
      description exceeds the formal model.
    severity: writing
  - id: 12fd305b2693
    text: The claim of "substantial" cost reduction is unsupported. Table 2 shows
      MRAgent runtime (586s) exceeds Mem0 (533s). The paper fails to isolate construction
      vs. retrieval token costs to justify the efficiency claim.
    severity: science
  - id: 3818acd09e27
    text: Theorem 1's claim that active retrieval is "strictly more powerful" overreaches.
      The proof relies on a synthetic "Binary-Tree" distribution not shown to exist
      in real benchmarks (LoCoMo/LongMemEval).
    severity: science
  - id: 1ce2fa790f1c
    text: The abstract claims "substantially reducing token and runtime cost," but
      Table 2 shows MRAgent is slower than Mem0. This overstatement contradicts the
      data and must be toned down.
    severity: writing
  - id: 3dad0ac2a7be
    text: The paper lacks explicit IRB or ethical approval statements regarding the
      use of human conversation data in the LoCoMo and LongMemEval benchmarks. Section
      5.1 mentions these datasets but does not clarify if the data was anonymized,
      if consent was obtained for secondary research use, or if the data contains
      PII. A statement confirming compliance with data privacy standards and the removal
      of sensitive personal information is required.
    severity: writing
  - id: 75043a90d906
    text: The 'Impact Statement' (Section 1) dismisses privacy concerns as generic.
      However, MRAgent's active reconstruction may infer sensitive user details (e.g.,
      health, finance) not explicitly queried. The authors must expand this section
      to discuss specific mitigation strategies for privacy leakage and the risks
      of 'over-reconstruction' of sensitive user profiles.
    severity: writing
  - id: b81d2b1cfa18
    text: The system prompt in the Appendix (Section 7) instructs extracting 'personal_sentences'
      and 'personal_information' without mentioning safeguards against sensitive attributes
      (e.g., medical history) or user opt-out mechanisms. The paper should address
      how the system handles sensitive data categories and implements data minimization
      or user-controlled deletion.
    severity: writing
