      the theoretical claim that "active retrieval is strictly more powerful than
      passive retrieval" (Theorem 1, Section 4.3) is not proven for the general case.
      The proof in Appendix C relie
    severity: science
  - id: f0c4fde4a601
    text: "The statistical reporting in Table 1 (Section 5.2) is inconsistent. While\
      \ the LLM-Judge (J) scores include standard deviations (e.g., 75.17 \xB1 0.33),\
      \ the F1 scores are reported as single point estimates without any measure of\
      \ variance or confidence intervals. Given that the experiments are run three\
      \ times (Appendix A.4), F1 standard deviations must be reported to allow for\
      \ statistical significance testing between MRAgent and baselines."
    severity: science
  - id: 946f0586fffc
    text: The claim of 'significant improvements' (Abstract, Section 5.2) lacks statistical
      validation. No hypothesis tests (e.g., paired t-tests, Wilcoxon signed-rank
      tests) or confidence intervals are provided to demonstrate that the observed
      performance gaps (e.g., 23% relative gain) are statistically significant rather
      than due to random variance in the LLM judge or sampling.
    severity: science
  - id: a3dfa645219a
    text: The ablation study (Figure 3, Section 5.4) and multi-turn analysis (Figure
      4, Section 5.5) present performance trends but omit error bars or confidence
      intervals. Without these, it is impossible to determine if the observed differences
      between structural variants (CE vs. CTE vs. CTC) or across reasoning turns are
      statistically distinguishable.
    severity: science
  - id: 8132aaac2d50
    text: The cost analysis in Table 2 (Section 5.3) reports single values for token
      consumption and runtime. Given the iterative nature of the active reconstruction
      process, these metrics likely have high variance depending on the specific query
      complexity and the number of turns taken. Reporting mean and standard deviation
      (or at least min/max) is necessary to validate the claim of 'substantially reducing'
      cost.
    severity: science
