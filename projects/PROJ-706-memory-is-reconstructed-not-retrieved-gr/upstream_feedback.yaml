  action_items:
  - id: 00e52dcdfc76
    text: Table 5 claims MRAgent uses 118k tokens vs A-Mem's 632k including construction.
      However, MRAgent's construction is described as lightweight while baselines
      perform intricate analysis. The paper fails to clarify if baseline construction
      costs are amortized or per-query, making the direct comparison potentially unfair.
    severity: science
  - id: 3570583523bf
    text: Theorem 1 claims active retrieval is strictly more expressive, proven via
      a synthetic "Binary-Tree Needle" task. The paper does not show real-world tasks
      (LoCoMo/LongMemEval) share the specific structural properties (hidden path bits)
      required for this separation, overgeneralizing from a synthetic worst-case.
    severity: science
  - id: d1ef95ac4397
    text: The claim that cues propagate through intermediate representations (Section
      1) cites rugg2025cognitive and frankland2019neurobiological. The text should
      verify these specific sources explicitly support the "intermediate representation"
      mechanism proposed, rather than just general memory theory, to avoid conflation.
    severity: writing
  - id: 9eb0c42935a1
    text: The LaTeX source contains duplicate package imports (e.g., `amsmath`, `booktabs`,
      `graphicx`, `enumitem` listed twice in main.tex lines 14-35). This indicates
      poor dependency hygiene and should be cleaned to ensure reproducibility and
      reduce compilation warnings.
    severity: writing
  - id: 725bcaeae1b2
    text: "The file `Section-7-Appendix.tex` contains a large block of commented-out\
      \ Chinese text (lines 1050-1080) and mixed-language comments (e.g., '\u7626\u4E86\
      \u51E0', '\u6D41\u7A0B'). These artifacts must be removed to ensure the codebase\
      \ is clean, reproducible, and professional."
    severity: writing
  - id: b1ccced81a1a
    text: The `references.bib` file contains duplicate entries for `pan2025secom`
