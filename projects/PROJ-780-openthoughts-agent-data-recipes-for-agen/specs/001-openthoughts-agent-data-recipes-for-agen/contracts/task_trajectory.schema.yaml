$schema: "http://json-schema.org/draft-07/schema#"
title: "TaskTrajectory"
description: "Schema for a single agentic task trajectory."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  input:
    type: "string"
    description: "The input prompt for the task."
    minLength: 1
  output:
    type: "string"
    description: "The final output generated by the agent."
    minLength: 1
  thought_process:
    type: "string"
    description: "The chain of thought or reasoning steps taken by the agent."
    minLength: 1
  timestamp:
    type: "string"
    format: "date-time"
    description: "Timestamp of generation in ISO 8601 format."
required:
  - task_id
  - input
  - output
  - thought_process
  - timestamp
additionalProperties: false
