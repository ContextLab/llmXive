[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Investigation of Logical Dependency vs. Semantic Curvature in Many-Shot ICL"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "networkx>=3.2",
    "llama-cpp-python>=0.2.0",
    "pandas>=2.0",
    "statsmodels>=0.14",
    "sentence-transformers>=2.3",
    "pyyaml>=6.0",
    "huggingface_hub>=0.20",
    "pytest>=7.4",
    "ruff>=0.1",
    "black>=23.0",
    "python-dotenv>=1.0",
    "scikit-learn>=1.3"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "ruff>=0.1",
    "black>=23.0"
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "ARG"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
