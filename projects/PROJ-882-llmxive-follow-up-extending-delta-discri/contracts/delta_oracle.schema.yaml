$schema: http://json-schema.org/draft-07/schema#
title: DelTA Oracle Coefficients
description: Schema for ground-truth DelTA coefficients generated by the Oracle model.
type: array
items:
  type: object
  required:
    - token_id
    - coefficient
    - variance_check
  properties:
    token_id:
      type: integer
      description: The unique identifier for the token in the vocabulary.
    coefficient:
      type: number
      description: The calculated DelTA coefficient for this token.
      minimum: -1000000
      maximum: 1000000
    variance_check:
      type: boolean
      description: Indicates if the variance of the coefficient across runs/samples is > 1e-9.
    example_id:
      type: string
      description: The ID of the GSM8K example this token belongs to.
additionalProperties: false
