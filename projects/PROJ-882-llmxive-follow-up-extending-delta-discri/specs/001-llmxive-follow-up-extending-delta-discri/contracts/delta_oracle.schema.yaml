$schema: "http://json-schema.org/draft-07/schema#"
title: "DelTA Oracle Coefficients"
description: "Schema for the ground-truth DelTA Coefficients generated by the Oracle model (Phi-3-mini)."
type: "object"
properties:
  example_id:
    type: "string"
    description: "Unique identifier for the GSM8K example."
  token_index:
    type: "integer"
    description: "Position of the token in the solution sequence."
  token_text:
    type: "string"
    description: "The actual text of the token."
  delta_coefficient:
    type: "number"
    description: "The discriminative credit assignment score derived from Phi-3-mini gradient backpropagation."
    minimum: -1000000
    maximum: 1000000
  computation_status:
    type: "string"
    enum:
      - "success"
      - "failed"
      - "nan"
    description: "Status of the DelTA computation for this token."
required:
  - example_id
  - token_index
  - token_text
  - delta_coefficient
  - computation_status
additionalProperties: false