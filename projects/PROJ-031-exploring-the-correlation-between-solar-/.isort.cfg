[settings]
profile=black
line_length=88
known_first_party=code,tests,contracts,specs
known_third_party=numpy,pandas,scipy,statsmodels,requests,pyyaml,pytest,asf,sklearn
default_section=THIRDPARTY
skip=.git,__pycache__,build,dist,.eggs,*.egg-info,.venv,venv,env
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments=True
