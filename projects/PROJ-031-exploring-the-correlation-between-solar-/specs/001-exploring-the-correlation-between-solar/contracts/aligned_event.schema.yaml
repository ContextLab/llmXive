$schema: "http://json-schema.org/draft-07/schema#"
title: "AlignedEvent Schema"
description: "Schema for the unified dataset linking solar flares, CMEs, and geomagnetic storms."
type: object
properties:
  storm_id:
    type: string
    description: "Unique identifier for the storm event."
  storm_timestamp:
    type: string
    format: date-time
    description: "Time of Dst minimum."
  storm_dst:
    type: number
    description: "Minimum Dst value in nT."
  flare_timestamp:
    type: ["string", "null"]
    format: date-time
    description: "Time of matching flare (null if no match)."
  flare_log10_flux:
    type: ["number", "null"]
    description: "Log10 transformed peak flux (null if no match)."
  cme_timestamp:
    type: ["string", "null"]
    format: date-time
    description: "Time of matching CME (null if no match)."
  cme_speed:
    type: ["number", "null"]
    description: "CME speed in km/s (null if no match)."
  match_window_days:
    type: integer
    maximum: 3
    description: "Days between storm and solar event."
  flare_missing_flag:
    type: boolean
    description: "True if no flare found in window."
  cme_missing_flag:
    type: boolean
    description: "True if no CME found in window."
  data_quality_score:
    type: integer
    minimum: 0
    maximum: 100
    description: "Composite score of data completeness."
required:
  - storm_id
  - storm_timestamp
  - storm_dst
  - match_window_days
  - flare_missing_flag
  - cme_missing_flag
  - data_quality_score
additionalProperties: false
