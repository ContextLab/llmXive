$schema: "http://json-schema.org/draft-07/schema#"
title: "Metrics Schema"
description: "Schema for statistical results and performance metrics."
type: object
properties:
  correlation_flare_dst:
    type: object
    properties:
      coefficient:
        type: number
      p_value:
        type: number
      corrected_p_value:
        type: number
      correction_method:
        type: string
        enum: ["bonferroni"]
      confidence_interval:
        type: object
        properties:
          lower:
            type: number
          upper:
            type: number
        required:
          - lower
          - upper
    required:
      - coefficient
      - p_value
      - corrected_p_value
      - correction_method
      - confidence_interval
  correlation_cme_dst:
    type: object
    properties:
      coefficient:
        type: number
      p_value:
        type: number
      corrected_p_value:
        type: number
      correction_method:
        type: string
        enum: ["bonferroni"]
      confidence_interval:
        type: object
        properties:
          lower:
            type: number
          upper:
            type: number
        required:
          - lower
          - upper
    required:
      - coefficient
      - p_value
      - corrected_p_value
      - correction_method
      - confidence_interval
  regression_r_squared:
    type: number
    description: "R-squared value from the selected model (joint or univariate)."
  vif_score:
    type: number
    description: "Variance Inflation Factor score."
  model_type:
    type: string
    enum: ["joint_linear", "univariate_flare", "univariate_cme", "ridge"]
    description: "Type of model used based on VIF check."
  power_analysis:
    type: object
    properties:
      sample_size:
        type: integer
      min_detectable_effect:
        type: number
      power_limitation_warning:
        type: boolean
      exploratory_flag:
        type: boolean
        description: "True if N < 30, indicating results are exploratory."
    required:
      - sample_size
      - min_detectable_effect
      - power_limitation_warning
      - exploratory_flag
  threshold_sensitivity:
    type: array
    items:
      type: object
      properties:
        cutoff_kms:
          type: integer
          enum: [900, 1000, 1100]
        true_positive_rate:
          type: number
        bootstrap_ci_lower:
          type: number
          description: "Lower bound of 95% CI from bootstrap resampling."
        bootstrap_ci_upper:
          type: number
          description: "Upper bound of 95% CI from bootstrap resampling."
      required:
        - cutoff_kms
        - true_positive_rate
        - bootstrap_ci_lower
        - bootstrap_ci_upper
  piecewise_r2_improvement:
    type: number
    nullable: true
    description: "Improvement in R-squared if piecewise model was tested."
  performance:
    type: object
    properties:
      execution_time_seconds:
        type: number
      peak_ram_mb:
        type: number
    required:
      - execution_time_seconds
      - peak_ram_mb
  assocational_claim:
    type: boolean
    const: true
    description: "Flag indicating all claims are associational."
required:
  - correlation_flare_dst
  - correlation_cme_dst
  - regression_r_squared
  - vif_score
  - model_type
  - power_analysis
  - threshold_sensitivity
  - performance
  - assocational_claim
additionalProperties: false