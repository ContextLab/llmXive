$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Metrics Schema"
description: "Schema for the output metrics of the correlation and threshold analysis."
type: object
properties:
  correlation_flare_dst:
    type: object
    properties:
      coefficient:
        type: number
        description: "Spearman correlation coefficient."
      p_value:
        type: number
        description: "Raw p-value."
      p_value_adjusted:
        type: number
        description: "Benjamini-Hochberg adjusted p-value."
      significant:
        type: boolean
        description: "True if adjusted p-value <= 0.05."
    required:
      - coefficient
      - p_value
      - p_value_adjusted
      - significant
  correlation_cme_dst:
    type: object
    properties:
      coefficient:
        type: number
        description: "Spearman correlation coefficient."
      p_value:
        type: number
        description: "Raw p-value."
      p_value_adjusted:
        type: number
        description: "Benjamini-Hochberg adjusted p-value."
      significant:
        type: boolean
        description: "True if adjusted p-value <= 0.05."
    required:
      - coefficient
      - p_value
      - p_value_adjusted
      - significant
  regression:
    type: object
    properties:
      r_squared:
        type: number
        description: "Variance explained by the model."
      vif:
        type: number
        description: "Variance Inflation Factor."
      model_type:
        type: string
        enum:
          - "OLS"
          - "Ridge"
          - "Univariate"
        description: "Type of regression model used."
      non_linear_tested:
        type: boolean
        description: "True if piecewise model was tested due to low R²."
      non_linear_improvement:
        type: ["number", "null"]
        description: "R² improvement if non-linear model was used."
    required:
      - r_squared
      - vif
      - model_type
      - non_linear_tested
  threshold_analysis:
    type: object
    properties:
      severe_definition:
        type: string
        description: "Definition used for severe storm (e.g., Dst <= -100)."
      candidate_thresholds:
        type: array
        items:
          type: object
          properties:
            speed_kms:
              type: integer
              description: "CME speed cutoff (900, 1000, or 1100)."
            true_positive_rate:
              type: number
              description: "Detection rate on the hold-out set."
          required:
            - speed_kms
            - true_positive_rate
      best_threshold:
        type: ["integer", "null"]
        description: "Best performing threshold speed."
    required:
      - severe_definition
      - candidate_thresholds
  power_analysis:
    type: object
    properties:
      sample_size:
        type: integer
        description: "Effective sample size used."
      min_detectable_effect:
        type: number
        description: "Minimum detectable effect size given N."
      power_warning:
        type: boolean
        description: "True if N < 30."
    required:
      - sample_size
      - power_warning
  execution_metrics:
    type: object
    properties:
      runtime_seconds:
        type: number
        description: "Total execution time."
      peak_ram_mb:
        type: number
        description: "Peak RAM usage in MB."
    required:
      - runtime_seconds
      - peak_ram_mb
  assumptions:
    type: array
    items:
      type: string
    description: "List of associational framing statements."
required:
  - correlation_flare_dst
  - correlation_cme_dst
  - regression
  - threshold_analysis
  - power_analysis
  - execution_metrics
  - assumptions
