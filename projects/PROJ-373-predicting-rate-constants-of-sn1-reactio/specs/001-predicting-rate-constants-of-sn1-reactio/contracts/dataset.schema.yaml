type: object
required:
  - smiles
  - rate_constant
  - substrate_class
properties:
  smiles:
    type: string
    description: Canonical SMILES string
  rate_constant:
    type: number
    description: Experimental rate constant
  substrate_class:
    type: string
    enum:
      - secondary
      - tertiary
    description: Substrate classification
  gasteiger_charges:
    type: array
    items:
      type: number
    description: Gasteiger partial charges
  topological_indices:
    type: array
    items:
      type: number
    description: Topological indices
  source_id:
    type: string
    description: Source database ID
