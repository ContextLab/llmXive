$schema: "http://json-schema.org/draft-07/schema#"
title: "Regression Result"
description: "Schema for the CSV output containing regression analysis data."
type: "object"
required:
  - "region_count"
  - "method"
  - "mean_geometric_consistency"
  - "std_geometric_consistency"
  - "mean_time_ms"
properties:
  region_count:
    type: "integer"
    description: "Number of regions processed."
  method:
    type: "string"
    description: "Inference method used."
    enum:
      - "parallel"
      - "sequential"
  mean_geometric_consistency:
    type: "number"
    description: "Average Geometric Consistency Score."
    minimum: 0.0
    maximum: 1.0
  std_geometric_consistency:
    type: "number"
    description: "Standard deviation of the Geometric Consistency Score."
    minimum: 0.0
  mean_time_ms:
    type: "number"
    description: "Average inference time in milliseconds."
  bleu4_score:
    type: "number"
    description: "Average BLEU-4 score."
    minimum: 0.0
    maximum: 1.0