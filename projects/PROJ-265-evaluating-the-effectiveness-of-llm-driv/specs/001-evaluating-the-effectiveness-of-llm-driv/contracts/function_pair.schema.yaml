$schema: "http://json-schema.org/draft-07/schema#"
title: "FunctionPair"
description: "Schema for a single original-simplified function pair."
type: "object"
properties:
  pair_id:
    type: "string"
    description: "Unique identifier for the pair."
  original_code:
    type: "string"
    description: "Source code of the original function."
  simplified_code:
    type: "string"
    description: "Source code of the simplified function."
  original_lines:
    type: "integer"
    description: "Line count of original code."
  simplified_lines:
    type: "integer"
    description: "Line count of simplified code."
  stratum:
    type: "string"
    enum:
      - "0-10"
      - "11-50"
      - "51+"
    description: "Stratification group based on line count."
  equivalence_status:
    type: "string"
    enum:
      - "passed"
      - "failed"
      - "unverifiable"
    description: "Result of the functional equivalence check."
  exclusion_reason:
    type: "string"
    description: "Reason for exclusion if status is not 'passed'."
required:
  - pair_id
  - original_code
  - simplified_code
  - original_lines
  - simplified_lines
  - stratum
  - equivalence_status
