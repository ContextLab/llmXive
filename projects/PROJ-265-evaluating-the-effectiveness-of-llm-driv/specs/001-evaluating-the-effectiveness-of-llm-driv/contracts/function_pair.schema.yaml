$schema: "http://json-schema.org/draft-07/schema#"
title: "FunctionPair Schema"
description: "Schema for function pair data (original + simplified code)"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the function pair"
  original_code:
    type: "string"
    description: "Original Python function code"
  simplified_code:
    type: "string"
    description: "Simplified Python function code"
  lines_original:
    type: "integer"
    description: "Line count of original code"
  lines_simplified:
    type: "integer"
    description: "Line count of simplified code"
  equivalence_status:
    type: "string"
    enum:
      - "pass"
      - "fail"
      - "excluded"
    description: "Result of functional equivalence check (test suite)"
  equivalence_details:
    type: "object"
    description: "Details of equivalence check (source of tests, test results)"
    properties:
      test_source:
        type: "string"
        description: "Source of the tests used (e.g., 'extracted', 'generated')"
      tests_run:
        type: "integer"
        description: "Number of tests run"
      tests_passed:
        type: "integer"
        description: "Number of tests passed"
  excluded_reason:
    type:
      - "string"
      - "null"
    description: "Reason for exclusion (if any)"
required:
  - "id"
  - "original_code"
  - "simplified_code"
  - "lines_original"
  - "lines_simplified"
  - "equivalence_status"
additionalProperties: false