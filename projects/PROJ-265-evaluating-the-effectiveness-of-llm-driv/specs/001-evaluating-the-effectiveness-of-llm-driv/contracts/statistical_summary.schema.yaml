$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalSummary"
description: "Schema for aggregated statistical results."
type: "object"
properties:
  test_type:
    type: "string"
    enum:
      - "t-test"
      - "wilcoxon"
    description: "Statistical test used."
  metric:
    type: "string"
    enum:
      - "time"
      - "memory"
    description: "Metric being tested."
  p_value_raw:
    type: "number"
    description: "Raw p-value from the test."
  p_value_adjusted:
    type: "number"
    description: "Bonferroni adjusted p-value."
  significant:
    type: "boolean"
    description: "True if adjusted p-value < 0.05."
  n_pairs:
    type: "integer"
    description: "Number of valid pairs used."
  normality_p:
    type: "number"
    description: "Shapiro-Wilk normality test p-value."
  trimmed_mean_orig_time:
    type: "number"
 description: "Trimmed mean ([deferred] trim) of original execution time."
  trimmed_mean_simp_time:
    type: "number"
 description: "Trimmed mean ([deferred] trim) of simplified execution time."
  std_dev_orig_time:
    type: "number"
    description: "Standard deviation of original execution time."
  std_dev_simp_time:
    type: "number"
    description: "Standard deviation of simplified execution time."
required:
  - test_type
  - metric
  - p_value_raw
  - p_value_adjusted
  - significant
  - n_pairs
  - normality_p
  - trimmed_mean_orig_time
  - trimmed_mean_simp_time
  - std_dev_orig_time
  - std_dev_simp_time
additionalProperties: false