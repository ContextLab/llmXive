$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalSummary Schema"
description: "Schema for statistical summary data"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the summary"
  metric:
    type: "string"
    enum:
      - "execution_time"
      - "memory_usage"
    description: "Which metric is being summarized"
  mean_original:
    type: "number"
    description: "Mean value for original code (averaged across 100 iterations)"
  mean_simplified:
    type: "number"
    description: "Mean value for simplified code (averaged across 100 iterations)"
  mean_delta:
    type: "number"
    description: "Mean difference (original - simplified)"
  std_original:
    type: "number"
    description: "Standard deviation for original (across 100 function means)"
  std_simplified:
    type: "number"
    description: "Standard deviation for simplified (across 100 function means)"
  normality_p_value:
    type: "number"
    description: "Shapiro-Wilk p-value (on 100 function means)"
  test_type:
    type: "string"
    enum:
      - "t-test"
      - "wilcoxon"
    description: "Which statistical test was used"
  raw_p_value:
    type: "number"
    description: "Raw p-value from statistical test"
  corrected_p_value:
    type: "number"
    description: "Bonferroni-corrected p-value"
  significant:
    type: "boolean"
    description: "Whether result is statistically significant (p < 0.05)"
required:
  - "id"
  - "metric"
  - "mean_original"
  - "mean_simplified"
  - "mean_delta"
  - "std_original"
  - "std_simplified"
  - "normality_p_value"
  - "test_type"
  - "raw_p_value"
  - "corrected_p_value"
  - "significant"
additionalProperties: false