%YAML 1.2
---
# Output Schema Definition for Analysis Results
# Defines the structure of generated analysis artifacts (UMAP, Clustering, Statistics)
$schema: http://json-schema.org/draft-07/schema#
title: AnalysisOutput
type: object
description: Schema for all analysis outputs generated by the pipeline

properties:
  umap_embedding:
    type: object
    description: 2D UMAP projection of molecular descriptors
    properties:
      coordinates:
        type: array
        items:
          type: object
          properties:
            inchikey:
              type: string
            x:
              type: number
            y:
              type: number
            resistance_frequency:
              type: number
              nullable: true
        description: List of (x, y) coordinates for each compound
      parameters:
        type: object
        properties:
          n_neighbors:
            type: integer
          min_dist:
            type: number
          metric:
            type: string
        required:
          - n_neighbors
          - min_dist
          - metric

  clustering_results:
    type: object
    description: DBSCAN clustering and enrichment analysis results
    properties:
      clusters:
        type: array
        items:
          type: object
          properties:
            cluster_id:
              type: integer
              description: Cluster identifier (-1 for noise)
            size:
              type: integer
              minimum: 1
            avg_resistance:
              type: number
              minimum: 0.0
              maximum: 1.0
            enrichment_p_value:
              type: number
              minimum: 0.0
              maximum: 1.0
            is_significant:
              type: boolean
              description: True if p < 0.05 after permutation validation
            permutation_p_value:
              type: number
              minimum: 0.0
              maximum: 1.0
              description: P-value from label permutation test
        description: List of cluster statistics
      noise_count:
        type: integer
        minimum: 0
        description: Number of points labeled as noise by DBSCAN
      silhouette_score:
        type: number
        minimum: -1.0
        maximum: 1.0
        nullable: true
        description: Silhouette score for the clustering

  statistical_ranking:
    type: object
    description: Descriptor-level statistical association results
    properties:
      descriptors:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
              description: RDKit descriptor name
            method:
              type: string
              enum:
                - mann_whitney_u
                - spearman
              description: Statistical test used
            statistic:
              type: number
            p_value_raw:
              type: number
              minimum: 0.0
              maximum: 1.0
            p_value_fdr:
              type: number
              minimum: 0.0
              maximum: 1.0
              description: Benjamini-Hochberg adjusted p-value
            cohen_d:
              type: number
              description: Effect size (Cohen's d)
            is_significant:
              type: boolean
              description: True if FDR-adjusted p < 0.05
            bimodal:
              type: boolean
              description: Whether the descriptor distribution is bimodal
        description: Ranked list of descriptors
      ranking_criteria:
        type: string
        description: Sort order used (e.g., "|Cohen's d| desc, FDR p asc")

  sensitivity_analysis:
    type: object
    description: Comparison between binary and continuous models
    properties:
      binary_model_ranking:
        type: array
        items:
          type: string
        description: Top N descriptors from binary model
      continuous_model_ranking:
        type: array
        items:
          type: string
        description: Top N descriptors from continuous model
      concordance:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Spearman correlation between rankings

  bimodality_report:
    type: object
    description: Distribution analysis for resistance labels
    properties:
      method_used:
        type: string
        enum:
          - hartigan_dip
          - gmm_bimodal
          - continuous_fallback
      dip_statistic:
        type: number
        nullable: true
      gmm_components:
        type: integer
        nullable: true
      threshold_low:
        type: number
        nullable: true
        description: Lower quartile threshold for binary label
      threshold_high:
        type: number
        nullable: true
        description: Upper quartile threshold for binary label

required:
  - umap_embedding
  - clustering_results
  - statistical_ranking
additionalProperties: false