[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fracture-toughness-prediction"
version = "0.1.0"
description = "Machine Learning Prediction of Fracture Toughness from Microstructure Images"
requires-python = ">=3.11"
dependencies = [
    "torch",
    "scikit-learn",
    "opencv-python-headless",
    "pandas",
    "numpy",
    "matplotlib",
    "captum",
    "ruff",
    "black"
]

[tool.ruff]
# Target Python version
target-version = "py311"

# Line length for linting (matches black default)
line-length = 88

# Exclude generated directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "data",
    "code/models",
    "code/train",
    "code/explain"
]

[tool.ruff.lint]
# Select specific rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

# Ignore specific rules if needed
ignore = [
    "E501", # Line too long (handled by black)
]

[tool.ruff.lint.isort]
known-first-party = ["code"]

[tool.black]
# Line length
line-length = 88

# Target Python version
target-version = ["py311"]

# Exclude generated directories
exclude = '''
(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | code/models
    | code/train
    | code/explain
)
'''

# Include .py files
include = '\.pyi?$'

# Force exclude .ipynb files if present
force-exclude = ''
(
    ^/\.git
    | ^/\.hg
    | ^/\.mypy_cache
    | ^/\.tox
    | ^/\.venv
    | ^/_build
    | ^/buck-out
    | ^/build
    | ^/dist
    | ^/data
    | ^/code/models
    | ^/code/train
    | ^/code/explain
)
'''
