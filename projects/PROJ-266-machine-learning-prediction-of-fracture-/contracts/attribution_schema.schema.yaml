$schema: "http://json-schema.org/draft-07/schema#"
title: "Fracture Toughness Attribution Schema"
description: |
  JSON Schema for validating attribution outputs (Grad-CAM heatmaps and stability metrics)
  generated by the explainability pipeline. This schema is required for T048 validation.
  It enforces the structure of per-sample attribution records and the aggregate stability report.
type: object
definitions:
  heatmap_record:
    type: object
    description: "Single sample attribution record containing heatmap metadata and stability metrics."
    required:
      - sample_id
      - alloy_family
      - model_name
      - heatmap_path
      - iou_stability
      - mean_iou
      - std_iou
      - min_iou
      - max_iou
      - stability_threshold
      - passed
    properties:
      sample_id:
        type: string
        description: "Unique identifier for the sample (e.g., filename without extension)."
      alloy_family:
        type: string
        enum: ["steel", "aluminum", "titanium"]
        description: "Alloy family of the sample, used for stratified analysis."
      model_name:
        type: string
        description: "Name of the model used for attribution (e.g., 'cnn_3block')."
      heatmap_path:
        type: string
        description: "Relative path to the saved heatmap image (e.g., 'data/explainability/heatmaps/sample_id.png')."
      iou_stability:
        type: array
        items:
          type: number
          minimum: 0.0
          maximum: 1.0
        description: "List of IoU scores between the base heatmap and heatmaps of augmented views."
      mean_iou:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Mean IoU across all augmented views."
      std_iou:
        type: number
        minimum: 0.0
        description: "Standard deviation of IoU scores."
      min_iou:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Minimum IoU score observed."
      max_iou:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Maximum IoU score observed."
      stability_threshold:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Threshold for stability (default 0.5). Mean IoU must exceed this."
      passed:
        type: boolean
        description: "True if mean_iou > stability_threshold, False otherwise."

  aggregate_report:
    type: object
    description: "Aggregate stability report summarizing performance across all samples."
    required:
      - total_samples
      - passed_samples
      - failed_samples
      - overall_mean_iou
      - overall_std_iou
      - threshold
      - timestamp
    properties:
      total_samples:
        type: integer
        minimum: 0
        description: "Total number of samples analyzed."
      passed_samples:
        type: integer
        minimum: 0
        description: "Number of samples that passed the stability threshold."
      failed_samples:
        type: integer
        minimum: 0
        description: "Number of samples that failed the stability threshold."
      overall_mean_iou:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Global mean IoU across all samples."
      overall_std_iou:
        type: number
        minimum: 0.0
        description: "Global standard deviation of IoU across all samples."
      threshold:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "The stability threshold used for evaluation."
      timestamp:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of when the report was generated."

allOf:
  - type: object
    description: "Top-level structure for a single attribution record (used in lists)."
    $ref: "#/definitions/heatmap_record"
  - type: object
    description: "Top-level structure for the aggregate stability report."
    $ref: "#/definitions/aggregate_report"

# Root schema allows either a single record or the aggregate report depending on context,
# but T048 expects the aggregate report structure for the final validation.
oneOf:
  - $ref: "#/definitions/heatmap_record"
  - $ref: "#/definitions/aggregate_report"

# Specific validation for the main output file expected by T048 (stability_report.json)
# This ensures the file contains the aggregate report structure.
if:
  properties:
    total_samples:
      type: integer
  then:
    $ref: "#/definitions/aggregate_report"