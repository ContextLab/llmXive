$schema: http://json-schema.org/draft-07/schema#
title: Simulation Output Schema
description: >
  Defines the structure of output data generated by the latency simulation engine.
  Contains the routing decisions, latency measurements, abandonment events,
  and final alignment scores for each simulated turn.
type: object
required:
  - run_metadata
  - results
properties:
  run_metadata:
    type: object
    description: Metadata about the simulation run.
    required:
      - run_id
      - timestamp
      - config_hash
    properties:
      run_id:
        type: string
        description: Unique identifier for this simulation run.
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the run started.
      config_hash:
        type: string
        description: SHA-256 hash of the input configuration for reproducibility.
      density_level:
        type: integer
        description: The density level used for this specific batch of results.
  results:
    type: array
    description: List of simulation results, one per interaction turn.
    items:
      $ref: '#/definitions/SimulationResult'
definitions:
  SimulationResult:
    type: object
    required:
      - turn_id
      - routing_decision
      - latency_ms
      - generation_time_ms
      - total_time_ms
      - abandoned
      - alignment_score
      - ui_element_count
    properties:
      turn_id:
        type: string
        description: Reference to the input interaction turn ID.
      routing_decision:
        type: object
        description: Decision made by the router.
        required:
          - intent
          - confidence
        properties:
          intent:
            type: string
            enum:
              - High-Confidence
              - Ambiguous
            description: Predicted intent class.
          confidence:
            type: number
            minimum: 0
            maximum: 1
            description: Confidence score of the router prediction.
      latency_ms:
        type: integer
        description: Injected artificial latency in milliseconds.
      generation_time_ms:
        type: number
        description: Time taken by the model to generate the response (real or fallback).
      total_time_ms:
        type: number
        description: Total time = generation_time_ms + latency_ms.
      abandonment:
        type: object
        description: Details if the user abandoned the interaction.
        required:
          - occurred
        properties:
          occurred:
            type: boolean
            description: Whether the user abandoned the interaction.
          patience_threshold_ms:
            type: number
            description: The sampled patience threshold that caused abandonment.
          time_to_abandon_ms:
            type: number
            description: Actual time elapsed before abandonment.
      alignment_score:
        type: object
        description: The calculated alignment score based on the rubric.
        required:
          - score
          - intent_match
          - latency_penalty
          - ui_completeness
        properties:
          score:
            type: number
            minimum: 0
            maximum: 1
            description: Final weighted alignment score.
          intent_match:
            type: number
            minimum: 0
            maximum: 1
            description: Score component for intent matching (0.4 weight).
          latency_penalty:
            type: number
            minimum: 0
            maximum: 1
            description: Score component penalizing high latency (0.3 weight).
          ui_completeness:
            type: number
            minimum: 0
            maximum: 1
            description: Score component for UI element completeness (0.3 weight).
      ui_element_count:
        type: integer
        minimum: 0
        description: Number of UI elements generated in the response.
      fallback_used:
        type: boolean
        description: Whether the rule-based fallback was invoked.
      fallback_match:
        type: boolean
        nullable: true
        description: Whether a matching ontology entry was found (null if fallback not used).