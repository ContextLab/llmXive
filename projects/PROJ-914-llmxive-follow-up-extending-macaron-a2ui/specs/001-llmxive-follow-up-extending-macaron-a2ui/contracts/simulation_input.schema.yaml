$schema: http://json-schema.org/draft-07/schema#
title: Simulation Input Schema
description: >
  Defines the structure of input data for the latency simulation engine.
  This includes the interaction turns to be simulated and the configuration
  parameters for the simulation run.
type: object
required:
  - interaction_turns
  - config
properties:
  interaction_turns:
    type: array
    description: List of interaction turns to simulate.
    items:
      $ref: '#/definitions/InteractionTurn'
  config:
    type: object
    description: Simulation configuration parameters.
    required:
      - density_levels
      - patience_model
      - router_model_path
    properties:
      density_levels:
        type: array
        description: >
          List of information density levels to test (e.g., 1, 3, 5, 10).
          Corresponds to the number of UI elements generated for fallback.
        items:
          type: integer
          minimum: 1
      patience_model:
        type: object
        description: Parameters for the user patience model (exponential decay).
        required:
          - mean_patience_seconds
        properties:
          mean_patience_seconds:
            type: number
            minimum: 0
            description: Mean time in seconds before user abandonment.
      router_model_path:
        type: string
        description: Path to the serialized DistilBERT router model.
      latency_injection:
        type: object
        description: Configuration for artificial latency injection.
        required:
          - base_latency_ms
        properties:
          base_latency_ms:
            type: integer
            minimum: 0
            description: Base latency to add to every response in milliseconds.
          jitter_ms:
            type: integer
            minimum: 0
            default: 0
            description: Random jitter to add to latency.
      output_path:
        type: string
        description: Path where simulation results should be written.
definitions:
  InteractionTurn:
    type: object
    required:
      - turn_id
      - query
      - ground_truth_intent
      - complexity_score
    properties:
      turn_id:
        type: string
        description: Unique identifier for the interaction turn.
      query:
        type: string
        description: The user's input query.
      ground_truth_intent:
        type: string
        enum:
          - High-Confidence
          - Ambiguous
        description: The manually annotated ground truth intent.
      complexity_score:
        type: number
        minimum: 0
        maximum: 1
        description: Normalized complexity score of the query.
      metadata:
        type: object
        description: Optional additional metadata for the turn.
        additionalProperties: true
