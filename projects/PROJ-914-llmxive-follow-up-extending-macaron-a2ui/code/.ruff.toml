[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "PTH", # flake8-use-pathlib
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in pytest fixtures)
]

[lint.per-file-ignores]
"tests/*" = ["ARG"] # Allow unused arguments in tests (pytest fixtures)

[format]
line-length = 88
indent-style = "space"
quote-style = "double"
skip-magic-trailing-comma = false
