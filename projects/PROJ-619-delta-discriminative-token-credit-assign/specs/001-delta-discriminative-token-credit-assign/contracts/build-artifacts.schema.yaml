$schema: "http://json-schema.org/draft-07/schema#"
title: "Build Artifacts Schema"
description: "Schema for validating the generated PDF artifacts from the DelTA build process."
type: object
properties:
  artifacts:
    type: array
    items:
      type: object
      properties:
        filename:
          type: string
          description: "Name of the generated file."
        path:
          type: string
          description: "Relative path to the file."
        size_bytes:
          type: integer
          minimum: 50000
          description: "File size in bytes. Must be greater than 50KB."
        type:
          type: string
          enum:
            - pdf
            - tex
            - log
          description: "File type."
      required:
        - filename
        - path
        - size_bytes
        - type
    description: "List of generated build artifacts."
required:
  - artifacts
additionalProperties: false
