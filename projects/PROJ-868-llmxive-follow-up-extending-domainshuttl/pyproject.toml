[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending DomainShuttle: Freeform Open Domain Subject-driven Text-to-video Generation"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "datasets>=2.14.0",
    "pillow>=9.0.0",
    "tqdm>=4.65.0",
    "opencv-python>=4.8.0",
    "pyyaml>=6.0",
    "pytest>=7.0.0",
    "ruff>=0.1.0",
    "black>=23.0.0"
]

[tool.ruff]
line-length = 100
target-version = "py310"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
]

[tool.black]
line-length = 100
target-version = ["py310"]
include = '\.pyi?$'

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
