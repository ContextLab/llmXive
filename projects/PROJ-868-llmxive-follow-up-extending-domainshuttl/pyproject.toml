[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-domainshuttle"
version = "0.1.0"
description = "Automated science pipeline for DomainShuttle follow-up research"
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "datasets>=2.14.0",
    "pillow>=10.0.0",
    "tqdm>=4.65.0",
    "opencv-python>=4.8.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
  | __pycache__
)/
'''

[tool.ruff]
# Same as Black.
line-length = 88
indent-width = 4
target-version = "py310"

# Assume Python 3.10
[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
    "C901", # too complex (temporary relaxation)
]

# Allow autofix for all enabled rules (if `--fix` is provided).
fixable = ["ALL"]
unfixable = []

# Exclude specific directories
exclude = [
    ".git",
    ".tox",
    ".venv",
    "build",
    "dist",
    "data",
    "__pycache__",
]

[tool.ruff.lint.per-file-ignores]
# Ignore imports in __init__.py for cleaner exports
"__init__.py" = ["F401"]
# Ignore specific test files if needed
"tests/*" = ["S101"] # assert

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"
# Like Black, indent with spaces, rather than tabs.
indent-style = "space"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false
# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning"
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "cpu: marks tests that require CPU optimization checks",
]
