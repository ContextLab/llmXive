$schema: http://json-schema.org/draft-07/schema#
title: Subject
description: >-
  Represents a unique video subject extracted from the WebVid-10M dataset,
  including its complexity metrics and raw embedding path.
type: object
required:
  - subject_id
  - complexity_score
  - raw_embedding_path
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject (e.g., video ID or hash).
    pattern: "^[a-zA-Z0-9_-]+$"
  complexity_score:
    type: number
    description: >-
      Visual complexity score calculated via Sobel edge density.
      Normalized to [0, 1] range.
    minimum: 0.0
    maximum: 1.0
  raw_embedding_path:
    type: string
    description: >-
      Absolute or relative path to the raw high-dimensional embedding
      tensor file (.pt) generated by the DomainShuttle encoder.
    pattern: "^data/processed/embeddings/.*\\.pt$"
additionalProperties: false
