$schema: http://json-schema.org/draft-07/schema#
title: Subject
description: >
  Represents a single subject entity in the DomainShuttle pipeline.
  Contains metadata and references to associated data artifacts.
type: object
required:
  - subject_id
  - category
  - source_dataset
  - reference_image_path
  - complexity_score
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject (e.g., WebVid video ID)
    pattern: "^[a-zA-Z0-9_-]+$"
  category:
    type: string
    description: The category label used for stratified sampling
  source_dataset:
    type: string
    description: Name of the source dataset (e.g., 'webvid-10m')
    enum:
      - webvid-10m
  reference_image_path:
    type: string
    description: Relative path to the reference image file
    pattern: "^data/.*\\.(jpg|jpeg|png|webp)$"
  complexity_score:
    type: number
    description: >
      Visual complexity score calculated via Sobel edge density.
      Range: [0.0, 1.0] after L2 normalization.
    minimum: 0.0
    maximum: 1.0
  embedding_path:
    type: string
    description: Optional relative path to the pre-computed DomainShuttle embedding
    pattern: "^data/.*\\.pt$"
  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of record creation
additionalProperties: false
