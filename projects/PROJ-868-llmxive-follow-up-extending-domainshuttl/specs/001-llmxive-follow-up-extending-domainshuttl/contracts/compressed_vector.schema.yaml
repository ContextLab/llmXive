$schema: http://json-schema.org/draft-07/schema#
title: CompressedVector
description: >-
  Represents a compressed latent vector for a subject, generated by a
  CPU-optimized Autoencoder with a specific target dimension.
type: object
required:
  - subject_id
  - target_dimension
  - reconstruction_loss
  - model_path
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject, linking back to the source subject.
    pattern: "^[a-zA-Z0-9_-]+$"
  target_dimension:
    type: integer
    description: >-
      The dimensionality of the compressed latent space (e.g., 16, 32, 64, 128, 256).
    minimum: 1
  reconstruction_loss:
    type: number
    description: >-
      The final cosine similarity loss (1 - cosine_similarity) achieved during
      training or evaluation for this specific compression.
    minimum: 0.0
  model_path:
    type: string
    description: >-
      Path to the trained Autoencoder checkpoint (.pt) used to generate this
      compressed vector.
    pattern: "^data/processed/compressed_models/.*_ae\\.pt$"
additionalProperties: false
