$schema: http://json-schema.org/draft-07/schema#
title: CompressedVector
description: |
  Represents a compressed latent vector resulting from the autoencoder
  dimensionality sweep. Includes the target dimensionality and the vector data.
type: object
required:
  - subject_id
  - target_dimension
  - vector_data
  - reconstruction_loss
properties:
  subject_id:
    type: string
    description: Reference to the subject this vector belongs to
  target_dimension:
    type: integer
    description: The dimensionality of the compressed space (e.g., 16, 32, 64...)
    enum: [16, 32, 64, 128, 256]
  vector_data:
    type: array
    description: The actual float32 values of the compressed vector
    items:
      type: number
    minItems: 16
  reconstruction_loss:
    type: number
    description: Cosine similarity loss value at the time of encoding
    minimum: 0.0
  model_checkpoint_path:
    type: string
    description: Path to the specific autoencoder checkpoint used
    pattern: "^data/processed/compressed_models/.*\\.pt$"
additionalProperties: false
