$schema: http://json-schema.org/draft-07/schema#
title: CompressedVector
description: >
  Represents a compressed latent vector generated by the CPU-optimized Autoencoder.
  Stores the vector data, dimensionality, and model provenance.
type: object
required:
  - subject_id
  - target_dimension
  - vector_path
  - model_checkpoint_path
  - cosine_similarity_loss
properties:
  subject_id:
    type: string
    description: Reference to the parent subject
  target_dimension:
    type: integer
    description: The latent dimension size (e.g., 16, 32, 64, 128, 256)
    enum:
      - 16
      - 32
      - 64
      - 128
      - 256
  vector_path:
    type: string
    description: Relative path to the .pt file containing the compressed tensor
    pattern: "^data/processed/compressed_vectors/.*\\.pt$"
  model_checkpoint_path:
    type: string
    description: Relative path to the trained Autoencoder checkpoint used
    pattern: "^data/processed/compressed_models/.*\\.pt$"
  cosine_similarity_loss:
    type: number
    description: >
      The final cosine similarity loss achieved during training for this subject.
      Lower is better (closer to 1.0 similarity).
    minimum: 0.0
    maximum: 2.0
  training_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the training run
additionalProperties: false
