$schema: http://json-schema.org/draft-07/schema#
title: FidelityResult
description: >-
  Represents a single data point in the fidelity curve, measuring the
  similarity between a generated video (from a compressed vector) and the
  original subject reference, across a specific style domain.
type: object
required:
  - subject_id
  - dimension
  - style
  - clip_score
  - timestamp
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject being evaluated.
    pattern: "^[a-zA-Z0-9_-]+$"
  dimension:
    type: integer
    description: The dimensionality of the compressed vector used for generation.
    minimum: 1
  style:
    type: string
    description: The style domain used for video generation.
    enum:
      - Anime
      - Photorealistic
      - Sketch
  clip_score:
    type: number
    description: >-
      CLIP Image Similarity score between the generated video frames and
      the reference image.
    minimum: -1.0
    maximum: 1.0
  timestamp:
    type: string
    description: ISO 8601 formatted timestamp of when the result was generated.
    format: date-time
additionalProperties: false