$schema: http://json-schema.org/draft-07/schema#
title: FidelityResult
description: |
  Represents the outcome of the identity fidelity validation.
  Tracks the minimum dimension required to pass the fidelity threshold
  for a specific subject across different style domains.
type: object
required:
  - subject_id
  - min_dimension
  - fidelity_threshold
  - style_domain
  - clip_scores
properties:
  subject_id:
    type: string
    description: Reference to the subject
  min_dimension:
    type: integer
    description: The smallest dimensionality where CLIP score >= fidelity_threshold
    enum: [16, 32, 64, 128, 256, -1]
    note: -1 indicates no dimension passed the threshold
  fidelity_threshold:
    type: number
    description: The threshold value used for this check (from config)
  style_domain:
    type: string
    description: The style domain used for generation (e.g., 'Anime', 'Photorealistic', 'Sketch')
    enum: ['Anime', 'Photorealistic', 'Sketch']
  clip_scores:
    type: object
    description: Map of dimension -> CLIP similarity score
    additionalProperties:
      type: number
      minimum: 0.0
      maximum: 1.0
  generated_video_path:
    type: string
    description: Path to the generated video if available
    pattern: "^data/results/.*\\.mp4$"
  status:
    type: string
    description: Status of the validation run
    enum: ['success', 'timeout', 'failed', 'no_pass']
additionalProperties: false