[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "glass-forming-region-ml"
version = "0.1.0"
description = "Predicting the Glass Forming Region of Metallic Glass Alloys Using Machine Learning"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.3.0",
    "xgboost>=2.0.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "shap>=0.44.0",
    "scipy>=1.11.0",
    "requests>=2.31.0",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
