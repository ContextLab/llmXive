name: Constitution Compliance Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  constitution-check:
    name: Verify Constitution Principles (I-VII)
    runs-on: ubuntu-latest
    
    # Resource constraints per FR-009
    container:
      image: python:3.10-slim
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Check
        id: constitution_check
        run: |
          python code/src/utils/constitution_checker.py
        continue-on-error: false

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constitution-check-results
          path: output/constitution_check_results.json
          retention-days: 30

      - name: Verify check passed
        if: steps.constitution_check.outcome != 'success'
        run: |
          echo "ERROR: Constitution compliance check failed (ERR-950)"
          echo "Please review output/constitution_check_results.json for details."
          exit 1
