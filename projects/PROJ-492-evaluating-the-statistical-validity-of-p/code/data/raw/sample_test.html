<!DOCTYPE html>
<html>
<head>
    <title>A/B Test Summary - Example</title>
</head>
<body>
    <div class="ab-test-summary">
        <h1>Checkout Flow Optimization Test</h1>
        <div class="metrics">
            <div class="metric">
                <label>Baseline Conversion Rate:</label>
                <span class="value">0.052</span>
            </div>
            <div class="metric">
                <label>Treatment Conversion Rate:</label>
                <span class="value">0.068</span>
            </div>
            <div class="metric">
                <label>Sample Size (Control):</label>
                <span class="value">15,000</span>
            </div>
            <div class="metric">
                <label>Sample Size (Variant):</label>
                <span class="value">15,200</span>
            </div>
            <div class="metric">
                <label>P-value:</label>
                <span class="value">0.023</span>
            </div>
            <div class="metric">
                <label>Effect Size (Absolute Lift):</label>
                <span class="value">0.016</span>
            </div>
            <div class="metric">
                <label>Domain:</label>
                <span class="value">ecommerce.example.com</span>
            </div>
            <div class="metric">
                <label>Publication Year:</label>
                <span class="value">2023</span>
            </div>
        </div>
    </div>
</body>
</html>
