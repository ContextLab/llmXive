$schema: http://json-schema.org/draft-07/schema#
title: Audit Record
description: Schema for audit records generated by the consistency validator
type: object
required:
  - summary_id
  - url
  - is_consistent
  - p_value_difference
  - effect_size_difference
properties:
  summary_id:
    type: string
    description: Unique identifier for the audited summary
  url:
    type: string
    format: uri
    description: Source URL of the audited summary
  domain:
    type: string
    description: Domain of the source URL
  is_consistent:
    type: boolean
    description: Whether the summary passed consistency checks
  p_value_difference:
    type: number
    description: Absolute difference between reported and reconstructed p-value
  effect_size_difference:
    type: number
    description: Relative difference in effect size
  sample_size_mismatch:
    type: boolean
    default: false
    description: Whether sample sizes were inconsistent
  data_quality_warning:
    type: string
    description: Warning message for data quality issues (optional)
  reconstruction_method:
    type: string
    enum:
      - z-test
      - t-test
      - fisher
      - welch
      - average_baseline
    description: Method used for statistical reconstruction
  flags:
    type: array
    items:
      type: string
    description: List of inconsistency flags
  audit_notes:
    type: string
    description: Additional notes about the audit (optional)
  timestamp:
    type: string
    format: date-time
    description: When the audit was performed
additionalProperties: false
