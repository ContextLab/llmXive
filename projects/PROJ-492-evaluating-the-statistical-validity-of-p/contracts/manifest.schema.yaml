$schema: http://json-schema.org/draft-07/schema#
title: Manifest Schema
description: Schema for validating the project manifest file containing artifact hashes and metadata.
type: object
required:
  - version
  - generated_at
  - artifacts
properties:
  version:
    type: string
    description: Schema version of the manifest format.
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  generated_at:
    type: string
    description: ISO 8601 timestamp of when the manifest was generated.
    format: date-time
  project_id:
    type: string
    description: Identifier of the project this manifest belongs to.
  artifacts:
    type: object
    description: Map of file paths to their SHA256 checksums.
    additionalProperties:
      type: string
      pattern: "^[a-f0-9]{64}$"
      description: SHA256 hash of the file content (lowercase hex).
  metadata:
    type: object
    description: Optional additional metadata about the manifest generation.
    properties:
      python_version:
        type: string
      platform:
        type: string
      seed:
        type: integer
    additionalProperties: true
additionalProperties: false
