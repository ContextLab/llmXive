$schema: http://json-schema.org/draft-07/schema#
title: ABTestSummary
description: JSON Schema for extracted A/B test summary data
type: object
required:
  - url
  - domain
  - sample_size_a
  - sample_size_b
properties:
  url:
    type: string
    format: uri
    description: Source URL of the A/B test summary
  domain:
    type: string
    pattern: "^[a-z0-9.-]+$"
    description: Domain extracted from URL
  title:
    type: string
    description: Title of the A/B test
  sample_size_a:
    type: integer
    minimum: 1
    description: Sample size for control group
  sample_size_b:
    type: integer
    minimum: 1
    description: Sample size for treatment group
  conversion_rate_a:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Conversion rate for control group
  conversion_rate_b:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Conversion rate for treatment group
  p_value:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Reported p-value from statistical test
  effect_size:
    type: number
    description: Reported effect size (absolute or relative)
  effect_size_type:
    type: string
    enum:
      - absolute
      - relative
      - odds_ratio
      - risk_ratio
    description: Type of effect size metric
  test_type:
    type: string
    enum:
      - binary
      - continuous
    description: Type of outcome variable
  test_statistic:
    type: number
    description: Reported test statistic (z, t, or chi-square)
  confidence_interval_lower:
    type: number
    description: Lower bound of confidence interval
  confidence_interval_upper:
    type: number
    description: Upper bound of confidence interval
  confidence_level:
    type: number
    minimum: 0.0
    maximum: 1.0
    default: 0.95
    description: Confidence level (e.g., 0.95 for 95%)
  extraction_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of extraction
  source:
    type: string
    description: Source identifier or publication name
  publication_year:
    type: integer
    minimum: 1900
    maximum: 2100
    description: Year of publication
  metrics_present:
    type: object
    properties:
      sample_size_a:
        type: boolean
      sample_size_b:
        type: boolean
      conversion_rate_a:
        type: boolean
      conversion_rate_b:
        type: boolean
      p_value:
        type: boolean
      effect_size:
        type: boolean
    description: Flags indicating which metrics were present
  extraction_notes:
    type: string
    description: Notes about extraction process or missing data
  raw_html_hash:
    type: string
    pattern: "^[a-f0-9]{64}$"
    description: SHA256 hash of fetched HTML content
additionalProperties: false
