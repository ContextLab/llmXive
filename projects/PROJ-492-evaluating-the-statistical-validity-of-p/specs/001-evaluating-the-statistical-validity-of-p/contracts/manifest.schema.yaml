$schema: "http://json-schema.org/draft-07/schema#"
title: "Run Manifest"
type: object
required:
  - generated_at
  - artifacts
  - git_commit
  - random_seed
properties:
  generated_at:
    type: string
    format: date-time
    description: "Timestamp when the manifest was created."
  artifacts:
    type: object
    additionalProperties:
      type: string
      pattern: "^[a-f0-9]{64}$"
    description: "Mapping of relative file paths to SHA‑256 hashes."
  git_commit:
    type: string
    description: "Full SHA‑1 of the git commit used for this run."
  random_seed:
    type: integer
    description: "Seed value used for all stochastic operations."
