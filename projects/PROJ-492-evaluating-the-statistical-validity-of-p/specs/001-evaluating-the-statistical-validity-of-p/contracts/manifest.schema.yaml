$schema: "http://json-schema.org/draft-07/schema#"
title: "Manifest"
description: "Schema for run manifest (SC-013)"
type: "object"
required:
  - "run_id"
  - "started_at"
  - "completed_at"
  - "status"
  - "output_files"
  - "checksums"
properties:
  run_id:
    type: "string"
    format: "uuid"
    description: "Unique run identifier"
  started_at:
    type: "string"
    format: "date-time"
    description: "Pipeline start timestamp"
  completed_at:
    type: "string"
    format: "date-time"
    description: "Pipeline completion timestamp"
  status:
    type: "string"
    enum:
      - "success"
      - "partial"
      - "failed"
    description: "Run status"
  output_files:
    type: "array"
    items:
      type: "string"
    description: "List of generated output files"
  checksums:
    type: "object"
    additionalProperties:
      type: "string"
      pattern: "^[a-f0-9]{64}$"
    description: "SHA256 checksums for output files (T076)"
  resource_usage:
    type: "object"
    properties:
      cpu_time_seconds:
        type: "number"
        description: "Total CPU time in seconds"
      memory_peak_mb:
        type: "number"
        description: "Peak memory usage in MB"
      runtime_seconds:
        type: "number"
        description: "Total runtime in seconds"
    description: "Resource usage metrics (SC-008)"
additionalProperties: false
