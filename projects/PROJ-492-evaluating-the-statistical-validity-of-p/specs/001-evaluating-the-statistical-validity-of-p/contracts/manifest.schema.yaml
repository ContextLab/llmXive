$schema: "http://json-schema.org/draft-07/schema#"
title: "Manifest"
type: "object"
required:
  - artifact_path
  - sha256
  - generated_at
properties:
  artifact_path:
    type: "string"
    description: "Relative path to the artefact under the output directory."
  sha256:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA‑256 checksum of the file."
  generated_at:
    type: "string"
    format: "date-time"
    description: "Timestamp when the artefact was written."
