$schema: "http://json-schema.org/draft-07/schema#"
title: "Summary Report"
type: "object"
description: "CSV-compatible schema for summary_report.csv (FR-024, SC-024)"
properties:
  total_summaries:
    type: "integer"
    description: "Total number of summaries processed"
  inconsistent_count:
    type: "integer"
    description: "Number of summaries flagged as inconsistent"
  inconsistent_rate:
    type: "number"
    description: "Raw inconsistency rate (count / total)"
  bias_adjusted_rate:
    type: "number"
    description: "Domain-weighted bias-adjusted rate (FR-027)"
  wilson_ci_lower:
    type: "number"
    description: "Lower bound of 95% Wilson confidence interval"
  wilson_ci_upper:
    type: "number"
    description: "Upper bound of 95% Wilson confidence interval"
required:
  - total_summaries
  - inconsistent_count
  - inconsistent_rate
  - bias_adjusted_rate
  - wilson_ci_lower
  - wilson_ci_upper
additionalProperties: false
