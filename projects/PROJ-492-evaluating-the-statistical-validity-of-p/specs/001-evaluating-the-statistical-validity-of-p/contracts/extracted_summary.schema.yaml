$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Extracted AB Summary Schema"
description: "Schema for A/B test summary extracted from public web pages"
required:
  - "url"
  - "outcome_type"
  - "variant_a_n"
  - "variant_b_n"
  - "reported_effect_size"
  - "extraction_timestamp"
  - "extraction_status"
properties:
  url:
    type: "string"
    description: "Original URL of the A/B test summary"
    format: "uri"
  outcome_type:
    type: "string"
    enum:
      - "binary"
      - "continuous"
    description: "Type of outcome metric"
  variant_a_n:
    type: "integer"
    minimum: 1
    description: "Sample size for variant A"
  variant_b_n:
    type: "integer"
    minimum: 1
    description: "Sample size for variant B"
  variant_a_conversions:
    type: "integer"
    minimum: 0
    description: "Conversion count for variant A (binary outcomes only)"
  variant_b_conversions:
    type: "integer"
    minimum: 0
    description: "Conversion count for variant B (binary outcomes only)"
  variant_a_mean:
    type: "number"
    description: "Mean value for variant A (continuous outcomes only)"
  variant_b_mean:
    type: "number"
    description: "Mean value for variant B (continuous outcomes only)"
  variant_a_std:
    type: "number"
    description: "Standard deviation for variant A (continuous outcomes only)"
  variant_b_std:
    type: "number"
    description: "Standard deviation for variant B (continuous outcomes only)"
  reported_effect_size:
    type: "number"
    description: "Reported effect size (absolute difference, lift %, or mean difference)"
  reported_p:
    type: "number"
    description: "Reported p-value (numeric) or bound (for inequality p-values)"
  reported_ci_lower:
    type: "number"
    description: "Lower bound of reported confidence interval"
  reported_ci_upper:
    type: "number"
    description: "Upper bound of reported confidence interval"
  publication_year:
    type: "integer"
    minimum: 1900
    maximum: 2100
    description: "Year of publication (for subgroup analysis)"
  domain:
    type: "string"
    description: "Source domain (e.g., \"optimizely.com\", \"airbnb.io\")"
  extraction_timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of extraction"
  extraction_status:
    type: "string"
    enum:
      - "success"
      - "partial"
      - "failed"
    description: "Extraction status"
  notes:
    type: "string"
    maxLength: 1000
    description: "Extraction notes (e.g., \"baseline rate missing, used average\")"
