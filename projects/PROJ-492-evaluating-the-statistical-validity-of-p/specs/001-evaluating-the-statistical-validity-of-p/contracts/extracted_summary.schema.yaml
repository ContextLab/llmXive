$schema: "http://json-schema.org/draft-07/schema#"
title: "ExtractedSummary"
description: "Schema for extracted A/B test summary records (FR-002)"
type: "object"
required:
  - "url"
  - "domain"
  - "outcome_type"
  - "variant_a_n"
  - "variant_b_n"
  - "effect_size"
  - "reported_p"
  - "extracted_at"
properties:
  url:
    type: "string"
    format: "uri"
    description: "Source URL (Constitution VII)"
  domain:
    type: "string"
    description: "Extracted domain for bias assessment (FR-027)"
  publication_year:
    type: "integer"
    minimum: 1900
    maximum: 2100
    description: "Year of publication (for FR-032)"
    nullable: true
  outcome_type:
    type: "string"
    enum:
      - "binary"
      - "continuous"
    description: "Binary (conversion rate) or continuous (mean difference)"
  variant_a_n:
    type: "integer"
    minimum: 1
    description: "Sample size, variant A"
  variant_b_n:
    type: "integer"
    minimum: 1
    description: "Sample size, variant B"
  variant_a_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Conversion rate, variant A (if binary)"
    nullable: true
  variant_b_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Conversion rate, variant B (if binary)"
    nullable: true
  effect_size:
    type: "number"
    description: "Reported effect size (difference or lift)"
  reported_p:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Reported p-value (numeric or bound)"
  reported_p_inequality:
    type: "boolean"
    description: "True if p-value was inequality (e.g., p<0.001)"
  confidence_interval:
    type: "array"
    items:
      type: "number"
    minItems: 2
    maxItems: 2
    description: "Reported confidence interval (if available)"
    nullable: true
  notes:
    type: "string"
    maxLength: 200
    description: "Extraction notes / warnings"
  extracted_at:
    type: "string"
    format: "date-time"
    description: "Timestamp of extraction"
additionalProperties: false
