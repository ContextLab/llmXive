$schema: "http://json-schema.org/draft-07/schema#"
title: "Extracted AB Summary"
type: object
required:
  - url
  - source_domain
  - variant_a_n
  - variant_b_n
  - effect_size
  - reported_p
  - outcome_type
properties:
  url:
    type: string
    format: uri
    description: "Original URL of the public A/B test summary."
  source_domain:
    type: string
    description: "Domain extracted from the URL (e.g., example.com)."
  variant_a_n:
    type: integer
    minimum: 0
    description: "Sample size for variant A."
  variant_b_n:
    type: integer
    minimum: 0
    description: "Sample size for variant B."
  effect_size:
    type: number
    description: "Reported effect size (absolute difference or mean difference)."
  reported_p:
    type: string
    description: "Reported p‑value; may be numeric (\"0.043\") or inequality (\"p<0.001\")."
  confidence_interval:
    type: [string, "null"]
    description: "Optional reported confidence interval."
  outcome_type:
    type: string
    enum: ["binary", "continuous"]
    description: "Nature of the outcome metric."
  timestamp:
    type: [string, "null"]
    format: date-time
    description: "Publication timestamp of the summary (optional)."
