$schema: "http://json-schema.org/draft-07/schema#"
title: "Extracted A/B Summary"
type: object
required:
  - url
  - variant_a_n
  - variant_b_n
  - effect_size
  - effect_size_unit
  - reported_p
  - outcome_type
  - source
  - retrieval_ts
properties:
  url:
    type: string
    format: uri
    description: "Original URL of the public A/B test summary."
  variant_a_n:
    type: ["integer", "null"]
    minimum: 0
    description: "Sample size for variant A (null if missing)."
  variant_b_n:
    type: ["integer", "null"]
    minimum: 0
    description: "Sample size for variant B (null if missing)."
  effect_size:
    type: ["number", "null"]
    description: "Reported effect size (raw value)."
  effect_size_unit:
    type: string
    enum: ["abs_diff", "lift_percent", "mean_diff", "odds_ratio", "relative_risk"]
    description: "Unit of the reported effect size."
  reported_p:
    type: string
    description: "Reported p‑value as string (e.g., \"0.032\" or \"p<0.001\")."
  confidence_interval:
    type: ["object", "null"]
    properties:
      lower:
        type: number
      upper:
        type: number
    required: ["lower", "upper"]
    description: "Reported confidence interval (null if not provided)."
  timestamp:
    type: ["string", "null"]
    format: date-time
    description: "Publication timestamp of the summary (optional)."
  outcome_type:
    type: string
    enum: ["binary", "continuous"]
    description: "Type of outcome measured."
  baseline_rate:
    type: ["number", "null"]
    minimum: 0
    maximum: 1
    description: "Baseline conversion rate for lift conversion (optional)."
  source:
    type: string
    description: "Extracted host or organization name."
  retrieval_ts:
    type: string
    format: date-time
    description: "Timestamp when the page was fetched."
