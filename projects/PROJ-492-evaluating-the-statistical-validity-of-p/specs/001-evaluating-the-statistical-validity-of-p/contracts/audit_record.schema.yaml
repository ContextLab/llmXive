$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Audit Record Schema"
description: "Schema for audit result of a single A/B test summary"
required:
  - "url"
  - "reported_effect_size"
  - "reported_sample_size_a"
  - "reported_sample_size_b"
  - "flag_inconsistent"
properties:
  url:
    type: "string"
    description: "Original URL of the A/B test summary"
    format: "uri"
  reported_p:
    type: "number"
    description: "Reported p-value (may be null for inequality)"
  reported_effect_size:
    type: "number"
    description: "Reported effect size"
  reported_sample_size_a:
    type: "integer"
    minimum: 1
    description: "Reported sample size for variant A"
  reported_sample_size_b:
    type: "integer"
    minimum: 1
    description: "Reported sample size for variant B"
  reconstructed_p:
    type: "number"
    description: "Reconstructed p-value from statistical test"
  reconstructed_effect_size:
    type: "number"
    description: "Reconstructed effect size from sample data"
  diff_abs_p:
    type: "number"
    description: "Absolute difference between reported and reconstructed p-value"
  diff_abs_effect:
    type: "number"
    description: "Absolute relative difference between reported and reconstructed effect size"
  flag_inconsistent:
    type: "boolean"
    description: "True if any inconsistency condition met"
  inconsistency_reasons:
    type: "array"
    items:
      type: "string"
    description: "List of reasons (e.g., \"p-value diff >0.05\", \"sample size mismatch\")"
  notes:
    type: "string"
    maxLength: 1000
    description: "Additional audit notes (e.g., \"missing baseline, used average\")"
