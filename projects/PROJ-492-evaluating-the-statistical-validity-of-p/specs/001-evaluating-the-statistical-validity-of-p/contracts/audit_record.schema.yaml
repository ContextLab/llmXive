$schema: "http://json-schema.org/draft-07/schema#"
title: "AuditRecord"
type: "object"
required:
  - summary_url
  - reconstructed_p
  - reconstructed_effect_size
  - diff_abs_p
  - diff_abs_effect
  - diff_abs_n
  - flag_inconsistent
  - category
  - hash
  - processed_at
properties:
  summary_url:
    type: "string"
    format: "uri"
    description: "URL of the audited summary (mirrors ABSummary.url)."
  reconstructed_p:
    type: "number"
    minimum: 0
    maximum: 1
    description: "P‑value computed from raw numbers."
  reconstructed_effect_size:
    type: "number"
    description: "Effect size derived from raw counts/rates."
  diff_abs_p:
    type: "number"
    minimum: 0
    description: "Absolute difference between reported and reconstructed p‑values."
  diff_abs_effect:
    type: "number"
    minimum: 0
    description: "Absolute relative difference between reported and reconstructed effect size."
  diff_abs_n:
    type: "number"
    minimum: 0
    description: "Absolute relative difference between reported and reconstructed sample size (max of two variants)."
  flag_inconsistent:
    type: "boolean"
    description: "True if any FR‑004 rule flags the summary."
  category:
    type: "string"
    enum: ["p_value","effect_size","sample_size","ci_mismatch","missing_metric","size_mismatch","parsing_failure"]
    description: "Primary inconsistency category."
  notes:
    type: "string"
    description: "Optional human‑readable explanation or error message."
  hash:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA‑256 hash of the normalized payload (used for deduplication)."
  processed_at:
    type: "string"
    format: "date-time"
    description: "Timestamp when the audit record was created."
