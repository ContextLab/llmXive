$schema: "http://json-schema.org/draft-07/schema#"
title: "Audit Record"
type: object
required:
  - url
  - reported_p
  - reported_effect_size
  - reported_sample_size_a
  - reported_sample_size_b
  - reconstructed_p
  - reconstructed_effect_size
  - diff_abs_p
  - diff_abs_effect
  - flag_inconsistent
  - notes
properties:
  url:
    type: string
    format: uri
    description: "URL of the audited summary."
  reported_p:
    type: number
    description: "Numeric representation of the reported p‑value (bound applied for inequalities)."
  reported_effect_size:
    type: number
    description: "Reported effect size extracted from the summary."
  reported_sample_size_a:
    type: integer
    minimum: 0
    description: "Sample size for variant A as extracted."
  reported_sample_size_b:
    type: integer
    minimum: 0
    description: "Sample size for variant B as extracted."
  reconstructed_p:
    type: number
    description: "P‑value computed from the reconstructed statistical test."
  reconstructed_effect_size:
    type: number
    description: "Effect size recomputed from raw numbers."
  diff_abs_p:
    type: number
    description: "Absolute difference between reported and reconstructed p‑values."
  diff_abs_effect:
    type: number
    description: "Absolute difference between reported and reconstructed effect sizes."
  flag_inconsistent:
    type: boolean
    description: "True if any FR‑004 inconsistency condition is met."
  notes:
    type: string
    description: "Human‑readable notes, including error codes (e.g., ERR-002)."