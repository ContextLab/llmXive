$schema: "http://json-schema.org/draft-07/schema#"
title: "Audit Record"
type: object
required:
  - url
  - reconstructed_p
  - diff_abs_p
  - reconstructed_effect_size
  - diff_abs_effect
  - reconstructed_n_a
  - reconstructed_n_b
  - diff_abs_n
  - flag_inconsistent
  - category
  - notes
properties:
  url:
    type: string
    format: uri
    description: "URL of the audited A/B test summary."
  reconstructed_p:
    type: number
    minimum: 0
    maximum: 1
    description: "P‑value recomputed from raw numbers."
  diff_abs_p:
    type: number
    description: "Absolute difference between reported and reconstructed p‑values."
  reconstructed_effect_size:
    type: number
    description: "Effect size recomputed (absolute difference)."
  diff_abs_effect:
    type: number
    description: "Relative absolute difference between reported and reconstructed effect size."
  reconstructed_n_a:
    type: integer
    minimum: 0
    description: "Sample size for variant A used in reconstruction."
  reconstructed_n_b:
    type: integer
    minimum: 0
    description: "Sample size for variant B used in reconstruction."
  diff_abs_n:
    type: number
    description: "Relative absolute difference between reported and reconstructed sample sizes."
  flag_inconsistent:
    type: boolean
    description: "True if any FR‑004 sub‑criterion is violated."
  category:
    type: string
    enum: ["p_value_mismatch", "effect_size_mismatch", "sample_size_mismatch", "ci_violation", "missing_metric"]
    description: "Reason for inconsistency flag."
  notes:
    type: string
    description: "Human‑readable explanation of the flag."
