$schema: "http://json-schema.org/draft-07/schema#"
title: "ABSummary Schema"
description: "Schema for extracted A/B test summary records (FR-002)"
type: "object"
required:
  - url
  - variant_a_n
  - variant_b_n
  - variant_a_conversions
  - variant_b_conversions
  - reported_p
  - reported_effect_size
  - outcome_type
  - source_domain
  - extraction_timestamp
properties:
  url:
    type: "string"
    description: "Valid URL pointing to the A/B test summary"
    pattern: "^https?://[^\\s]+$"
  variant_a_n:
    type: "integer"
    minimum: 1
    description: "Sample size for variant A"
  variant_b_n:
    type: "integer"
    minimum: 1
    description: "Sample size for variant B"
  variant_a_conversions:
    type: "integer"
    minimum: 0
    maximum: 999999999
    description: "Number of conversions for variant A"
  variant_b_conversions:
    type: "integer"
    minimum: 0
    maximum: 999999999
    description: "Number of conversions for variant B"
  reported_p:
    type:
      - "number"
      - "null"
    minimum: 0.000001
    maximum: 1
    description: "Reported p-value (0 < p ≤ 1), or null for inequality bounds"
  reported_effect_size:
    type: "number"
    description: "Reported effect size (can be negative)"
  outcome_type:
    type: "string"
    enum:
      - "binary"
      - "continuous"
    description: "Type of outcome metric"
  confidence_interval:
    type:
      - "object"
      - "null"
    description: "Optional confidence interval"
    properties:
      lower:
        type: "number"
      upper:
        type: "number"
    required:
      - lower
      - upper
  source_domain:
    type: "string"
    description: "Domain extracted from URL hostname"
  publication_year:
    type:
      - "integer"
      - "null"
    minimum: 1900
    maximum: 2100
    description: "Publication year (optional, may be null)"
  extraction_timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of extraction"
additionalProperties: false
