name: Audit Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      RAM_LIMIT_GB: 2
      CPU_LIMIT: 2
      TIMEOUT_MINUTES: 360
      SEED: 42

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Validate Constitution Compliance
        run: |
          python -c "from code.src.utils.constitution_checker import main; main()"
        continue-on-error: false

      - name: Schema Validation
        run: |
          python -m scripts.generate_manifest --validate-only
        continue-on-error: false

      - name: Synthetic Validation (Precision/Recall Check)
        run: |
          python -m scripts.run_synthetic_validation
        continue-on-error: false

      - name: Resource Monitor Check
        run: |
          python -m scripts.run_quickstart_venv_check --check-resources
        continue-on-error: false

      - name: Run Main Audit Pipeline
        run: |
          python -m code.src.cli.run_audit
        continue-on-error: false

      - name: Export Consistency Check
        run: |
          python -m scripts.run_validator
        continue-on-error: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            data/manifest.json

      - name: Verify Exit Code
        run: |
          echo "Pipeline completed successfully with exit code 0"
        if: success()