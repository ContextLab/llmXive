name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Resource constraints as per FR-009 and SC-008
    # Note: GitHub Actions runners are shared; we enforce limits in software
    # and configure the job to timeout if it exceeds reasonable duration.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Verify Resource Limits (CPU/RAM)
        # Enforces FR-009: CPU <= 2 vCPU, RAM <= 2GB
        # The resource_monitor module will abort with ERR-301 if limits are breached.
        run: |
          echo "Running resource limit check..."
          python -c "
          import sys
          import os
          # Set environment variables to reflect limits for the monitoring module
          os.environ['MAX_CPU_VCPU'] = '2'
          os.environ['MAX_RAM_GB'] = '2'
          
          # Import and run the resource monitor check
          from code.src.utils.resource_monitor import check_limits
          try:
              check_limits()
              print('Resource limits check passed.')
          except SystemExit as e:
              if e.code != 0:
                  print(f'ERR-301: Resource limits exceeded. Aborting pipeline.')
                  sys.exit(1)
          "

      - name: Run Monte-Carlo Validation
        # Runs T062 validation as part of pipeline start-up (T031)
        run: |
          python code/src/audit/monte_carlo_validation.py

      - name: Run Schema Validation
        # Validates contracts before processing data
        run: |
          python code/src/audit/export_schema_validator.py
          python code/src/audit/manifest_schema_validator.py

      - name: Run Main Audit Pipeline
        # Executes the full pipeline: Ingest -> Fetch -> Extract -> Reconstruct -> Validate -> Report
        run: |
          python code/src/cli/run_audit.py

      - name: Upload Audit Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            output/resource_log.json
          retention-days: 30

      - name: Upload Test Coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14