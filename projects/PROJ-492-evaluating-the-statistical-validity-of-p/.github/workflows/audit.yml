name: Audit Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Enforce resource limits as per FR-009 and SC-008
    # GitHub Actions runners are shared, but we configure the job to respect
    # logical constraints and timeout to prevent runaway processes.
    # Note: Hard CPU/RAM limits are enforced by the runner environment;
    # this workflow ensures the pipeline logic respects these bounds via resource_monitor.
    
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator

      - name: Run Synthetic Validation
        run: |
          python -m code.src.audit.synthetic
          python -m code.src.audit.evaluation

      - name: Run Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-limits

      - name: Run Main Audit Pipeline
        run: |
          python -m code.cli.run_audit

      - name: Verify Manifest and Checksums
        run: |
          python -m code.src.audit.manifest_schema_validator
          python -m code.src.audit.export_validator

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
          retention-days: 7