name: Audit Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: write

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    # Enforce resource limits via GitHub Actions runner configuration
    # The default ubuntu-latest runner provides 2 vCPU and 7GB RAM.
    # We enforce the 2GB RAM and 2 vCPU logical limit via the application layer
    # (src/utils/resource_monitor.py) which will abort if exceeded.
    # We set a timeout to ensure the pipeline does not hang indefinitely.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Run Synthetic Validation
        run: |
          python -m code.src.audit.evaluation

      - name: Run Resource Monitor Check (Startup)
        run: |
          python -m code.src.utils.resource_monitor --check-only

      - name: Run Monte Carlo Startup Validation
        run: |
          python -m code.src.cli.run_monte_carlo_validation

      - name: Run Full Audit Pipeline
        run: |
          python -m code.src.cli.run_audit

      - name: Run Constitution Compliance Check
        run: |
          python -m code.src.utils.constitution_checker

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-artifacts
          path: |
            output/
            data/
            logs/
            data/checksums.txt
            output/manifest.json
            output/resource_log.json