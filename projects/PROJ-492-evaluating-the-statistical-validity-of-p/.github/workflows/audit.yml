name: A/B Test Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: python:3.11-slim
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest

      - name: Restore cached data (optional)
        uses: actions/cache@v4
        with:
          path: data/raw
          key: ${{ runner.os }}-raw-data-${{ hashFiles('input/urls.csv') }}
          restore-keys: |
            ${{ runner.os }}-raw-data-

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Synthetic Validation
        run: |
          python -m code.src.audit.synthetic
          python -m code.src.audit.evaluation
          # Verify precision >= 0.90 and recall >= 0.80 internally or via test runner
          python -m pytest tests/integration/test_synthetic_validation.py -v

      - name: Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-only

      - name: Constitution Compliance Check
        run: |
          python -m code.src.utils.constitution_checker

      - name: Main Pipeline Run
        run: |
          python -m code.src.cli.run_audit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-artifacts
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            logs/
          retention-days: 7