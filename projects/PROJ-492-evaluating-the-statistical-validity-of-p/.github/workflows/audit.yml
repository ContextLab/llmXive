name: A/B Test Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Resource constraints as per FR-009 and SC-008
# Enforcing CPU and RAM limits at the workflow level where possible,
# though specific runner limits are enforced via the resource_monitor module in code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-pipeline:
    runs-on: ubuntu-latest
    
    # GitHub Actions runners typically provide 2 vCPUs and 7GB RAM by default.
    # We enforce the 2GB RAM and 2 vCPU logic via the Python resource_monitor module
    # during execution, and set a strict timeout to prevent runaway processes.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Check (PT005C)
        run: |
          python -m code.src.utils.constitution_checker
        continue-on-error: false

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator
        continue-on-error: false

      - name: Synthetic Dataset Validation (Precision/Recall Check)
        run: |
          python -m code.src.audit.evaluation
        continue-on-error: false

      - name: Resource Monitoring Check
        run: |
          python -m code.src.utils.resource_monitor --check-only
        continue-on-error: false

      - name: Run Main Audit Pipeline
        run: |
          python -m code.src.cli.run_audit
        env:
          # Explicitly set environment variables to hint resource limits if the runner supports it
          # Note: Actual enforcement is done in Python via resource_monitor.py
          PYTHONUNBUFFERED: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            output/resource_log.json
          retention-days: 7

      - name: Verify Resource Limits
        run: |
          python -c "
          import json
          from pathlib import Path
          log_path = Path('output/resource_log.json')
          if not log_path.exists():
              print('ERR-301: Resource log not found')
              exit(1)
          with open(log_path) as f:
              data = json.load(f)
          peak_ram = data.get('peak_memory_mb', 0)
          peak_cpu = data.get('peak_cpu_percent', 0) / 100.0 # Convert to vCPU count approx
          
          # FR-009 Limits: 2GB RAM, 2 vCPU
          if peak_ram > 2048:
              print(f'ERR-301: Peak RAM {peak_ram:.2f}MB exceeds 2GB limit')
              exit(1)
          if peak_cpu > 2.0:
              print(f'ERR-301: Peak CPU {peak_cpu:.2f} vCPUs exceeds 2 vCPU limit')
              exit(1)
          print(f'Resource check passed: RAM={peak_ram:.2f}MB, CPU={peak_cpu:.2f} vCPUs')
          "