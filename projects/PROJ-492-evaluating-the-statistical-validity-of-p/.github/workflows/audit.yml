name: A/B Test Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Resource constraints as per FR-009 and SC-008
# GitHub Actions runners are typically 2 vCPU and 7GB RAM, but we enforce
# logical limits within the job steps and via the resource_monitor module.
# The job timeout ensures the pipeline does not hang indefinitely.

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monte Carlo Validation (Startup Check)
        # T031: Verify statistical functions run within limits and are valid
        run: |
          python code/src/cli/run_monte_carlo_validation.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run Power Analysis
        # T028: Ensure corpus size meets minimum requirements
        run: |
          python code/src/audit/power_analysis.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run Constitution Compliance Check
        # PT005C: Validate all seven Principles (I-VII) before proceeding
        run: |
          python code/src/utils/constitution_checker.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run Resource Monitor Check (Sanity)
        # T098: Verify resource monitoring module works and logs usage
        run: |
          python code/src/utils/resource_monitor.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Run Full Audit Pipeline
        # T032: Orchestrate ingestion -> fetch -> extract -> reconstruct -> validate
        # This step enforces CPU/RAM limits via the internal resource_monitor logic
        # and aborts with ERR-301 if limits are exceeded.
        run: |
          python code/src/cli/run_audit.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Validate Export Consistency
        # T059: Ensure JSON and CSV counts match
        run: |
          python code/src/audit/export_validator.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Validate Manifest Schema
        # T058: Ensure manifest.json is valid
        run: |
          python code/src/audit/manifest_schema_validator.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            output/
            data/
            logs/