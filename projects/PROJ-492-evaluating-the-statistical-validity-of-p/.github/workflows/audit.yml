name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Constitution Compliance
        run: |
          python -m code.src.utils.constitution_checker

      - name: Run Monte Carlo Validation
        run: |
          python -m code.src.audit.monte_carlo_startup_validator

      - name: Run Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-only

      - name: Run Synthetic Validation
        run: |
          python -m code.scripts.run_synthetic_validation

      - name: Run Main Audit Pipeline
        run: |
          python -m code.src.cli.run_audit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results-${{ github.run_id }}
          path: |
            output/
            data/provenance_log.csv
            output/resource_log.json
            output/manifest.json
          retention-days: 7