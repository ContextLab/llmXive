name: Audit Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Schema
        run: |
          python -m code.src.audit.export_schema_validator --check

      - name: Run Synthetic Validation (Precision/Recall Check)
        run: |
          python -m code.src.audit.evaluation --threshold-precision 0.90 --threshold-recall 0.80

      - name: Run Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-limits

      - name: Run Main Audit Pipeline
        env:
          CI_RUN: "true"
        run: |
          python -m code.src.cli.run_audit --input input/urls.csv --output output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-${{ matrix.python-version }}
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt

      - name: Verify Manifest
        run: |
          python -m code.src.audit.manifest_schema_validator --validate output/manifest.json