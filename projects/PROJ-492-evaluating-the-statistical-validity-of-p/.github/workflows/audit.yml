name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    container:
      image: python:3.10-slim
      options: --cpus 2 --memory 2g

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Synthetic Validation
        run: |
          python -m code.src.audit.evaluation

      - name: Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-only

      - name: Main Pipeline Run
        run: |
          python -m code.src.cli.run_audit

      - name: Constitution Compliance Check
        run: |
          python -m code.src.utils.constitution_checker