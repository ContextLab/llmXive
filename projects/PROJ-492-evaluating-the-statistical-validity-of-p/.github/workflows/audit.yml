name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    # Enforce resource limits per FR-009 and SC-008
    # GitHub Actions default runners provide ~2 vCPU and 7GB RAM.
    # We enforce logical CPU limits via environment variables and monitor memory
    # within the pipeline script which will abort if limits are breached.
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Constitution Compliance
        run: |
          python -m code.src.utils.constitution_checker
        continue-on-error: false

      - name: Run Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
        continue-on-error: false

      - name: Run Synthetic Validation (Precision/Recall Check)
        run: |
          python -m code.src.audit.evaluation
        continue-on-error: false

      - name: Run Resource Monitor & Main Pipeline
        # This step invokes the main audit driver which internally checks
        # CPU/Memory usage and aborts with ERR-301 if limits are exceeded.
        # We set a hard timeout at the job level as well.
        run: |
          python -m code.src.cli.run_audit
        env:
          # Logical CPU limit enforcement (optional, depends on runner config)
          PYTHON_MAX_CPU: "2"
        timeout-minutes: 360  # 6 hours max per SC-008

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            state/projects/PROJ-492-evaluating-the-statistical-validity-of-p.yaml