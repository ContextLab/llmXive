name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: Run Audit Pipeline
    runs-on: ubuntu-latest
    
    # Resource constraints as per FR-009 and SC-008
    # GitHub Actions default runner provides 2 vCPU and 7GB RAM.
    # We enforce limits within the workflow steps and via the resource monitor module.
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Check (PT005C)
        run: |
          python -m code.src.utils.constitution_checker

      - name: Schema Validation Step
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Synthetic Validation (Precision/Recall Check)
        run: |
          python -m code.src.audit.monte_carlo_validation
          python -m code.src.audit.evaluation

      - name: Resource Monitor Check (Pre-flight)
        run: |
          # Verify resource limits are respected before main run
          python -m code.src.utils.resource_monitor --check-limits

      - name: Run Main Audit Pipeline
        run: |
          python -m code.cli.run_audit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-output
          path: |
            output/
            data/processed/
            logs/
          retention-days: 7

      - name: Verify Resource Limits Post-Run
        run: |
          python -m code.src.utils.resource_monitor --verify-log