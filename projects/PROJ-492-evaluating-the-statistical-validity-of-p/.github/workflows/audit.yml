name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Resource constraints as per FR-009 and SC-008
    # GitHub Actions runners are typically 2 vCPU and 7GB RAM by default.
    # We enforce a hard 2GB memory limit and 2 vCPU equivalent via time-out and
    # explicit resource monitoring in the pipeline.
    
    timeout-minutes: 120 # Predefined duration limit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure resource monitoring tools are available
          pip install psutil

      - name: Validate Constitution Compliance (Principles I-VII)
        run: |
          python code/src/utils/constitution_checker.py
          if [ $? -ne 0 ]; then
            echo "ERR-950: Constitution compliance check failed. Aborting."
            exit 1
          fi

      - name: Schema Validation
        run: |
          python code/src/audit/export_schema_validator.py
          python code/src/audit/manifest_schema_validator.py

      - name: Synthetic Validation (Precision/Recall Thresholds)
        run: |
          python code/scripts/run_synthetic_validation.py
          # The script itself raises ERR-800 if thresholds are not met

      - name: Resource Monitor Check (CPU/RAM limits)
        run: |
          # This step invokes the resource monitor wrapper to ensure
          # the environment respects the 2GB RAM / 2 vCPU limits defined in FR-009.
          # If the monitor detects a breach during setup, it exits with ERR-301.
          python code/src/utils/resource_monitor.py --check-preconditions

      - name: Run Main Audit Pipeline
        run: |
          # Execute the full audit driver script.
          # This script internally invokes the resource monitor (T063)
          # and will abort with ERR-301 if limits are exceeded during execution.
          python code/src/cli/run_audit.py

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            output/resource_log.json
            output/manifest.json

      - name: Verify Manifest and Checksums
        run: |
          python code/scripts/generate_manifest.py
          # Verify checksums match the manifest
          python code/src/audit/export_validator.py --verify-manifest