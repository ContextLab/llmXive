name: A/B Test Audit Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Enforce Resource Limits (CPU/RAM)
      run: |
        # Verify environment limits (GitHub Actions provides 2 vCPU, 7GB RAM by default)
        # We enforce a strict 2GB RAM limit and 2 vCPU usage via ulimit and taskset
        # Note: ulimit -v limits virtual memory (KB). 2GB = 2097152 KB
        ulimit -v 2097152 || echo "Warning: ulimit not available on this runner"
        
        # Log current limits for debugging
        echo "Current memory limit (KB): $(ulimit -v)"
        echo "Number of CPUs: $(nproc)"

    - name: Run Monte-Carlo Validation (T062)
      run: |
        python -m code.src.audit.monte_carlo_validation

    - name: Run Constitution Compliance Checker (PT005C)
      run: |
        python -m code.src.utils.constitution_checker

    - name: Run Schema Validation
      run: |
        python -m code.src.audit.export_schema_validator
        python -m code.src.audit.manifest_schema_validator

    - name: Run Synthetic Validation (T029)
      run: |
        python -m code.scripts.run_synthetic_validation

    - name: Run Main Audit Pipeline (T032)
      run: |
        python -m code.src.cli.run_audit

    - name: Run Resource Monitor Check (T098)
      run: |
        python -m code.src.utils.resource_monitor --check-limit

    - name: Upload Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: audit-outputs
        path: |
          output/
          data/provenance_log.csv
          data/checksums.txt
        retention-days: 7