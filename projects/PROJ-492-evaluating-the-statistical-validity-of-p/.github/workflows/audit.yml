name: Audit Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  run-audit:
    name: Run Audit Pipeline
    runs-on: ubuntu-latest
    
    # Enforce resource limits as per FR-009 and SC-008
    # GitHub Actions standard runners provide 2 vCPU and 7GB RAM.
    # We enforce the 2GB RAM and 2 vCPU logical limit via the resource_monitor module
    # which will abort with ERR-301 if exceeded.
    # We set a timeout to prevent runaway processes.
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Check (PT005C)
        run: |
          python -c "from code.src.utils.constitution_checker import main; main()"
        continue-on-error: false

      - name: Validate Schemas
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Run Monte-Carlo Validation (T062)
        run: |
          python -m code.src.audit.monte_carlo_validation

      - name: Run Resource Monitor & Main Pipeline
        env:
          # Explicitly set environment variables for resource limits
          # The resource_monitor module reads these or uses defaults
          CPU_LIMIT_VCPU: "2"
          RAM_LIMIT_GB: "2"
        run: |
          python -m code.src.cli.run_audit

      - name: Verify Export Consistency (T059)
        run: |
          python -m code.src.audit.export_validator

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-output
          path: |
            output/
            data/processed/
            data/provenance_log.csv
            data/checksums.txt
            state/