name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    # Resource constraints: CPU ≤ 2 vCPU, RAM ≤ 2 GB
    # Note: GitHub Actions runners provide more resources, but we enforce limits
    # via container resource requests and application-level monitoring.
    # The application (T098) will abort with ERR-301 if limits are exceeded.
    
    container:
      image: python:3.11-slim
      options: >-
        --cpus="2"
        --memory="2g"
        --memory-swap="2g"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Synthetic Validation (Precision/Recall Thresholds)
        run: |
          python -m code.src.audit.evaluation

      - name: Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-only

      - name: Run Main Audit Pipeline
        # Timeout set to 6 hours (SC-008)
        timeout-minutes: 360
        run: |
          python -m code.src.cli.run_audit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
          retention-days: 30

      - name: Verify Manifest
        run: |
          python -m code.src.audit.manifest_schema_validator --verify-output

      - name: Check Exit Status
        run: |
          if [ $? -ne 0 ]; then
            echo "Pipeline failed. Check logs for ERR-### codes."
            exit 1
          fi
          echo "Pipeline completed successfully."