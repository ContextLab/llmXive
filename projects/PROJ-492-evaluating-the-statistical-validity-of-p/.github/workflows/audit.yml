name: A/B Test Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Resource constraints as per FR-009 and SC-008
# GitHub Actions runners provide 2 vCPU and 7GB RAM by default.
# We enforce 2GB RAM limit via resource_monitor.py which aborts if exceeded.
# We enforce 2 vCPU via CPU affinity (optional) and monitoring.
# We enforce a timeout of 6 hours (SC-008) at the job level.

jobs:
  audit-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max runtime

    # Enforce CPU limits by limiting the number of parallel processes if necessary.
    # The runner itself is 2 vCPU. We ensure our scripts respect this.
    # RAM limit (2GB) is enforced at runtime by src/utils/resource_monitor.py.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Check (PT005C)
        # Validates all seven Principles (I-VII) before proceeding
        run: |
          python code/src/utils/constitution_checker.py
          if [ $? -ne 0 ]; then
            echo "ERR-950: Constitution compliance check failed."
            exit 1
          fi

      - name: Schema Validation
        # Validates output schemas against contracts
        run: |
          python code/src/audit/export_schema_validator.py
          python code/src/audit/manifest_schema_validator.py

      - name: Synthetic Validation (Precision/Recall Check)
        # Runs T029/T033 logic to ensure pipeline accuracy
        run: |
          python code/src/audit/evaluation.py --mode synthetic
          # This script asserts precision >= 90% and recall >= 80%
          # If thresholds are not met, it raises ERR-800 and exits non-zero.

      - name: Run Monte-Carlo Validation (T062/T031)
        # Verifies statistical functions run within limits and are accurate
        run: |
          python code/src/audit/monte_carlo_validation.py
          # Aborts with ERR-801 if any test fails the <= 0.005 criterion

      - name: Run Main Audit Pipeline
        # Orchestrates ingestion -> fetch -> extract -> reconstruct -> validate
        run: |
          python code/src/cli/run_audit.py
          # This script invokes resource_monitor.py internally.
          # It will abort with ERR-301 if RAM > 2GB or CPU limits are breached.

      - name: Verify Artifact Consistency
        # Ensures JSON/CSV counts match (T059/T060)
        run: |
          python code/src/audit/export_validator.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/processed/
            data/provenance_log.csv
            output/resource_log.json
            output/manifest.json