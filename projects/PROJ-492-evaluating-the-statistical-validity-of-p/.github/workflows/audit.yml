name: Audit Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Schema Validation
        run: |
          python -m scripts.run_validator_test

      - name: Synthetic Validation
        run: |
          python -m scripts.run_prevalence_validation
          # Verify precision/recall thresholds are met internally

      - name: Resource Monitor Check
        run: |
          python -m scripts.run_quickstart_venv_check
          # This step verifies the environment can handle the load within limits

      - name: Run Main Audit Pipeline
        env:
          CPU_LIMIT: 2
          RAM_LIMIT_GB: 2
          TIMEOUT_MINUTES: 60
        run: |
          python -m scripts.run_validator
          # The pipeline enforces CPU <= 2 vCPU, RAM <= 2 GB, and timeout
          # via src/utils/resource_monitor.py and aborts with ERR-301 if exceeded

      - name: Verify Artifacts
        run: |
          if [ ! -f "output/audit_report.json" ]; then
            echo "ERR-201: Audit report not generated"
            exit 1
          fi
          if [ ! -f "output/manifest.json" ]; then
            echo "ERR-201: Manifest not generated"
            exit 1
          fi
          echo "Pipeline completed successfully with all artifacts generated."