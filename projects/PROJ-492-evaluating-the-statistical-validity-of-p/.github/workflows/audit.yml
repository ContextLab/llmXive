name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Resource constraints per FR-009 and Constitution Principle I
    # GitHub Actions standard runner provides 2 vCPU and 7GB RAM by default.
    # We enforce a 2GB RAM limit in the workflow steps and set a CPU limit via container options.
    container:
      options: --cpus=2 --memory=2048m

    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Constitution Compliance Checker
        run: |
          python -m code.src.utils.constitution_checker
        env:
          PYTHONPATH: ./code

      - name: Run Monte-Carlo Validation (Startup Check)
        run: |
          python -m code.src.audit.monte_carlo_validation
        env:
          PYTHONPATH: ./code
          SEED: 42

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator
        env:
          PYTHONPATH: ./code

      - name: Synthetic Validation (Precision/Recall Check)
        run: |
          python -m code.src.audit.evaluation
        env:
          PYTHONPATH: ./code

      - name: Resource Monitor Check
        run: |
          python -m code.src.utils.resource_monitor --check-only
        env:
          PYTHONPATH: ./code

      - name: Run Main Audit Pipeline
        run: |
          python -m code.src.cli.run_audit
        env:
          PYTHONPATH: ./code
          SEED: 42

      - name: Verify Output Artifacts
        run: |
          if [ ! -f output/audit_report.json ]; then
            echo "ERR-200: audit_report.json not found"
            exit 1
          fi
          if [ ! -f output/summary_report.csv ]; then
            echo "ERR-200: summary_report.csv not found"
            exit 1
          fi
          if [ ! -f output/manifest.json ]; then
            echo "ERR-200: manifest.json not found"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/processed/
            data/provenance_log.csv