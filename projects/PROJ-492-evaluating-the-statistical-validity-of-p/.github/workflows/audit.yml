name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Timeout to respect resource limits (FR-009 / SC-008)
timeout-minutes: 60

jobs:
  audit:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install -e .
          fi

      - name: Run Constitution Compliance Check
        run: |
          python -m code.src.utils.constitution_checker

      - name: Run Monte-Carlo Validation (Startup Check)
        run: |
          python -m code.src.audit.monte_carlo_startup_validator

      - name: Run Resource Monitor Sanity Check
        run: |
          python -m code.src.utils.resource_monitor --sanity-check

      - name: Run Full Audit Pipeline
        env:
          PYTHONUNBUFFERED: 1
        run: |
          python -m code.src.cli.run_audit --input data/input_urls.csv --output output/

      - name: Validate Audit Artifacts
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator
          python -m code.src.audit.export_validator

      - name: Upload Audit Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-${{ matrix.python-version }}
          path: |
            output/
            data/provenance_log.csv
            output/resource_log.json
            output/manifest.json