name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Schema Validation
        run: |
          python -m code.scripts.run_validator_test

      - name: Run Monte Carlo Startup Validation
        run: |
          python -m code.src.audit.monte_carlo_startup_validator

      - name: Run Synthetic Validation (Precision/Recall Check)
        run: |
          python -m code.scripts.run_synthetic_validation

      - name: Run Resource Monitor Check
        run: |
          python -m code.scripts.run_quickstart_venv_check

      - name: Run Main Audit Pipeline
        run: |
          python -m code.src.cli.run_audit

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-artifacts
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt
            output/resource_log.json