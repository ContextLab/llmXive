name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-audit:
    name: Run Audit Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run schema validation
        run: |
          python -m scripts.run_validator --mode schema-check

      - name: Run synthetic validation (precision/recall)
        run: |
          python -m scripts.run_synthetic_validation

      - name: Run resource monitor check
        run: |
          python -m scripts.run_resource_monitor --check-limits

      - name: Run main audit pipeline
        run: |
          python -m src.cli.run_audit --input data/input/urls.csv --output output/

      - name: Verify manifest generation
        run: |
          python -m scripts.generate_manifest --output output/manifest.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-${{ matrix.python-version }}
          path: |
            output/
            data/processed/
            data/provenance_log.csv
          retention-days: 7

      - name: Upload resource logs
        uses: actions/upload-artifact@v4
        with:
          name: resource-logs-${{ matrix.python-version }}
          path: output/resource_log.json
          retention-days: 7

permissions:
  contents: read
  actions: read