name: A/B Test Audit Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Resource constraints as per FR-009 and SC-008
    # GitHub Actions runners are larger, but we enforce limits in software
    # and use a small container if necessary. Here we rely on the resource_monitor
    # module to enforce the 2GB RAM / 2 vCPU logical limit during execution.
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Constitution Compliance
        run: |
          python -c "from code.src.utils.constitution_checker import main; main()"
          if [ $? -ne 0 ]; then
            echo "ERR-950: Constitution compliance check failed."
            exit 1
          fi

      - name: Schema Validation (Pre-run)
        run: |
          python -c "from code.src.audit.export_schema_validator import main; main()"
          if [ $? -ne 0 ]; then
            echo "Schema validation failed."
            exit 1
          fi

      - name: Synthetic Validation (Precision/Recall Check)
        run: |
          # Ensure synthetic data exists and meets thresholds
          python -c "from code.src.audit.evaluation import main; main()"
          if [ $? -ne 0 ]; then
            echo "ERR-800: Synthetic validation thresholds not met."
            exit 1
          fi

      - name: Resource Monitor Check & Main Pipeline Run
        # This step enforces the CPU/RAM limits via the resource_monitor module
        # and runs the full audit pipeline.
        run: |
          # Set timeout for the entire job step (5 hours max to stay within 6h total)
          timeout 18000s python -c "from code.src.utils.resource_monitor import monitored_main; monitored_main()"
          if [ $? -ne 124 ]; then
            # Check if it was a resource limit breach (ERR-301)
            if grep -q "ERR-301" output/resource_log.json 2>/dev/null; then
              echo "ERR-301: Resource limits exceeded (RAM > 2GB or CPU > 2vCPU)."
              exit 1
            fi
          fi
          if [ $? -ne 0 ]; then
            echo "Pipeline execution failed."
            exit 1
          fi

      - name: Post-Run Schema Validation
        run: |
          python -c "from code.src.audit.manifest_schema_validator import main; main()"
          if [ $? -ne 0 ]; then
            echo "Manifest schema validation failed."
            exit 1
          fi

      - name: Export Consistency Check
        run: |
          python -c "from code.src.audit.export_validator import main; main()"
          if [ $? -ne 0 ]; then
            echo "ERR-201: Export consistency check failed."
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/processed/
            data/provenance_log.csv
            data/checksums.txt

      - name: Resource Log Summary
        run: |
          if [ -f output/resource_log.json ]; then
            echo "Peak CPU and RAM usage:"
            cat output/resource_log.json
          fi