name: Audit Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # Enforce resource limits as per FR-009 and SC-008
    # GitHub Actions default runners typically have 2 vCPUs and 7GB RAM.
    # We explicitly limit CPU and RAM usage within the job steps using resource constraints
    # and monitor usage via the resource_monitor module.
    # Note: GitHub does not support hard CPU/RAM cgroups at the job level for ubuntu-latest,
    # so we enforce limits via the application logic (resource_monitor.py) and timeout.
    
    timeout-minutes: 360 # 6 hours max runtime per SC-008

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Schema Validation
        run: |
          python -m code.src.audit.export_schema_validator
          python -m code.src.audit.manifest_schema_validator

      - name: Synthetic Validation (Precision/Recall)
        run: |
          python -m code.src.audit.evaluation
          # This step verifies T029 requirements (precision >= 90%, recall >= 80%)
          # If thresholds are not met, the script exits with ERR-800

      - name: Resource Monitor Check
        run: |
          # This step runs the resource monitor to ensure limits are respected
          # It will abort with ERR-301 if limits are exceeded
          python -m code.src.utils.resource_monitor --check-only

      - name: Run Main Audit Pipeline
        run: |
          # Orchestrates ingestion -> fetch -> extract -> reconstruct -> validate -> write artifacts
          # Includes internal calls to Monte-Carlo validation (T031) and resource monitoring (T063)
          python -m code.src.cli.run_audit

      - name: Verify Manifest Generation
        run: |
          python -m code.scripts.generate_manifest
          # Verifies T056: manifest.json exists with SHA256 hashes

      - name: Export Consistency Check
        run: |
          python -m code.src.audit.export_validator

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            output/
            data/provenance_log.csv
            data/checksums.txt