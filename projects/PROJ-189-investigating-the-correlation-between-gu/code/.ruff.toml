# Explicit ruff configuration file for clarity
target-version = "py311"
line-length = 88
src = ["code", "tests"]

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
    "B008",
    "C901",
]

[lint.per-file-ignores]
"tests/*" = ["S101"]

[lint.isort]
known-first-party = ["utils"]
force-sort-within-sections = true
