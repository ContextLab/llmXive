[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "data",
    "build",
    "dist",
    "*.egg-info"
]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "C", "B"
]
ignore = [
    "E501",
    "W503",
]

[tool.ruff.lint.isort]
known-first-party = ["utils"]
force-sort-within-sections = true
