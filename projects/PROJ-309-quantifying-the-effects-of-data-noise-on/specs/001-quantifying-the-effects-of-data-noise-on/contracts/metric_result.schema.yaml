$schema: "http://json-schema.org/draft-07/schema#"
title: "MetricResult"
description: "Schema for a single computed metric result."
type: "object"
properties:
  trajectory_id:
    type: "string"
    description: "Reference to the trajectory (UUID)."
  metric_name:
    type: "string"
    enum: ["correlation_dimension", "lyapunov_exponent", "fnn_rate"]
    description: "Name of the computed metric."
  value:
    type: "number"
    description: "Computed value."
  error_percent:
    type: "number"
    description: "Absolute error relative to ground truth."
  algorithm_version:
    type: "string"
    description: "Version of the algorithm used."
  replicate_id:
    type: "integer"
    minimum: 1
    description: "Identifier for the specific replicate (1-10)."
required:
  - "trajectory_id"
  - "metric_name"
  - "value"
  - "error_percent"
  - "algorithm_version"
  - "replicate_id"
additionalProperties: false