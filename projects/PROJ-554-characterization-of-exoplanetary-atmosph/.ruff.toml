# Ruff configuration for PROJ-554-characterization-of-exoplanetary-atmosph
# Optimized for scientific Python code with strict type and style checking

target-version = "py310"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ANN", # flake8-annotations (strict mode optional)
    "SIM", # flake8-simplify
    "PTH", # flake8-use-pathlib
]
ignore = [
    "E501", # Line too long (handled by formatter)
    "ANN002", # Missing type annotation for *args
    "ANN003", # Missing type annotation for **kwargs
    "ANN204", # Missing return type annotation for special method __init__
    "SIM105", # Use contextlib.suppress instead of try/except (sometimes less explicit for logs)
]
# Allow automatic fixes for safe issues
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"tests/*" = ["ANN", "S101"] # Allow asserts in tests, skip strict annotations
"code/utils.py" = ["ANN001"] # Utility functions sometimes generic

[lint.isort]
known-first-party = ["code"]
force-single-line = false
lines-after-imports = 2

[lint.flake8-annotations]
allow-star-arg-any = true
suppress-none-returning = true
