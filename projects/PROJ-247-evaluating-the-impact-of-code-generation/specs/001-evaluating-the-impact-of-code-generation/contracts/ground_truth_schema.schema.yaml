$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: "Ground Truth Schema for Classifier Validation"
description: "Schema for manual verification labels."
required:
  - metadata
  - labels
properties:
  metadata:
    type: object
    properties:
      created_at:
        type: string
        format: date-time
      annotator_id:
        type: string
      total_samples:
        type: integer
      checksum:
        type: string
        description: "SHA-256 checksum of this file (recorded in state/)"
  labels:
    type: array
    items:
      type: object
      required:
        - block_id
        - predicted_label
        - ground_truth_label
        - confidence
      properties:
        block_id:
          type: string
        predicted_label:
          type: string
          enum: ["LLM", "Human"]
        ground_truth_label:
          type: string
          enum: ["LLM", "Human"]
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
        match:
          type: boolean
          description: "True if predicted matches ground truth"
      additionalProperties: false
  metrics:
    type: object
    properties:
      precision:
        type: number
        minimum: 0.0
        maximum: 1.0
      recall:
        type: number
        minimum: 0.0
        maximum: 1.0
      f1_score:
        type: number
        minimum: 0.0
        maximum: 1.0
additionalProperties: false
