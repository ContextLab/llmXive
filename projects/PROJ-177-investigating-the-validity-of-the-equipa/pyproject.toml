[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-granular-equipartition"
version = "0.1.0"
description = "Investigating the Validity of the Equipartition Theorem in Driven Granular Systems"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scipy",
    "statsmodels",
    "pyyaml",
    "tqdm",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
]

[tool.setuptools.packages.find]
where = ["code"]

# Linting: Ruff configuration
[tool.ruff]
# Target Python version
target-version = "py311"
# Line length for warnings (Black compatibility)
line-length = 88
# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function call in argument defaults (common in data classes/pytest)
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # Allow assertions in tests

# Formatting: Black configuration
[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

# Test configuration: Pytest
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
]