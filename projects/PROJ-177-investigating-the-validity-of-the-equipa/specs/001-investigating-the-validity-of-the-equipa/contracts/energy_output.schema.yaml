$schema: "http://json-schema.org/draft-07/schema#"
title: "Energy Sample Output Schema"
description: "Schema for the derived energy data generated by the ingestion pipeline."
type: "object"
properties:
  timestamp:
    type: "number"
    description: "Timestamp in seconds."
  particle_id:
    type: "integer"
    description: "Unique identifier for the particle."
  E_trans:
    type: "number"
    description: "Translational kinetic energy in Joules (1/2 mv^2)."
  E_rot:
    type: "number"
    description: "Rotational kinetic energy in Joules (1/2 I omega^2)."
  E_pot:
    type: "number"
    description: "Potential energy in Joules (mgz)."
  E_vib_residual:
    type: "number"
    description: "Diagnostic residual (Total - E_trans - E_rot - E_pot). NOT used for hypothesis testing."
  material:
    type: "string"
    description: "Material type."
  driving_frequency:
    type: "number"
    description: "Driving frequency in Hz."
required:
  - timestamp
  - particle_id
  - E_trans
  - E_rot
  - E_pot
  - E_vib_residual
  - material
  - driving_frequency
additionalProperties: false
