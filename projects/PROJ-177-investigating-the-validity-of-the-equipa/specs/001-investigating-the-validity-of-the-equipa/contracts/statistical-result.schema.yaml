$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalResult"
description: "Output of a specific hypothesis test or regression."
type: "object"
properties:
  test_type:
    type: "string"
    enum:
      - "paired-t-test"
      - "ANOVA"
      - "regression"
      - "KS-test"
    description: "Type of statistical test performed."
  bin_id:
    type: "string"
    description: "Unique identifier for the frequency/material bin."
  statistic_value:
    type: "number"
    description: "The calculated test statistic (t-value, F-value, KS statistic, etc.)."
  raw_p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Uncorrected p-value."
  corrected_p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Corrected p-value (Holm-Bonferroni)."
  degrees_of_freedom:
    type: "integer"
    description: "Degrees of freedom for the test."
  confidence_interval_low:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  confidence_interval_high:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  effect_size:
    type: "number"
    description: "Effect size (e.g., Cohen's d for paired differences)."
required:
  - test_type
  - bin_id
  - statistic_value
  - raw_p_value
  - corrected_p_value
  - degrees_of_freedom
  - confidence_interval_low
  - confidence_interval_high
  - effect_size
additionalProperties: false