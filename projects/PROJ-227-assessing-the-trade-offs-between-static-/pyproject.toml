[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-227-assessing-the-trade-offs-between-static"
version = "0.1.0"
description = "Assessing the Trade-offs Between Static and Dynamic Analysis for LLM-Generated Code"
requires-python = ">=3.11"
dependencies = [
    "datasets==2.14.0",
    "pandas==2.0.3",
    "scipy==1.11.0",
    "pytest==7.4.0",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "psutil==5.9.5"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"
