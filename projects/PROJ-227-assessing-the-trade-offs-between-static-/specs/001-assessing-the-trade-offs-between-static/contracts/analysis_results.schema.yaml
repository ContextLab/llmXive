$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for aggregated analysis logs and metrics."
type: "object"
properties:
  snippet_id:
    type: "string"
    description: "Foreign key to the manifest."
  language:
    type: "string"
    description: "Programming language."
  oracle_type:
    type: "string"
    description: "Type of dynamic oracle used."
    enum:
      - "native_test"
      - "synthetic_test"
      - "unavailable"
  static_status:
    type: "string"
    description: "Status of static analysis."
    enum:
      - "success"
      - "timeout"
      - "tool_failure"
  tool_name:
    type: "string"
    description: "Name of the static analysis tool used."
    enum:
      - "CodeQL"
      - "SonarQube"
      - "PyLint"
      - "ESLint"
      - "codeql"
      - "sonar-scanner"
  static_issues:
    type: "array"
    description: "List of detected issues."
    items:
      type: "object"
      properties:
        line:
          type: "integer"
        type:
          type: "string"
        severity:
          type: "string"
      required:
        - line
        - type
        - severity
  dynamic_status:
    type: "string"
    description: "Status of dynamic analysis."
    enum:
      - "pass"
      - "fail"
      - "timeout"
      - "error"
      - "syntax_error"
  is_correct:
    type: "boolean"
    description: "True if dynamic analysis passed."
required:
  - snippet_id
  - language
  - oracle_type
  - static_status
  - dynamic_status
  - is_correct
additionalProperties: false