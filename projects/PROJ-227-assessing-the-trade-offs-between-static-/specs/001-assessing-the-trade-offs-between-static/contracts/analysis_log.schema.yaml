$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Log Schema"
type: "object"
properties:
  snippet_id:
    type: "string"
    description: "Foreign key to Code Snippet ID"
  tool:
    type: "string"
    description: "Name of the analysis tool (e.g., CodeQL, SonarQube, PyLint, pytest)"
  type:
    type: "string"
    enum:
      - "static"
      - "dynamic"
    description: "Type of analysis (static or dynamic)"
  result:
    type: "string"
    enum:
      - "detected"
      - "clean"
      - "timeout"
      - "tool_failure"
      - "untestable_dynamic"
    description: "Outcome of the analysis"
  details:
    type: "string"
    description: "JSON string with tool-specific output (e.g., vulnerability ID, test failure message)"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO-8601 timestamp of execution"
  cpu_cores:
    type: "number"
    description: "CPU cores used during execution"
  ram_mb:
    type: "number"
    description: "RAM used during execution (MB)"
  duration_seconds:
    type: "number"
    description: "Execution duration in seconds"
required:
  - snippet_id
  - tool
  - type
  - result
  - timestamp
additionalProperties: false
