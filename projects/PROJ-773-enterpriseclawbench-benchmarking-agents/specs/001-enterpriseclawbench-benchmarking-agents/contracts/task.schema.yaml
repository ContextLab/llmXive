$schema: "http://json-schema.org/draft-07/schema#"
title: "EnterpriseClawBench Task"
description: "Schema for a single task generated by the construction pipeline. Validates SC-002."
type: "object"
required:
  - "prompt"
  - "role_class"
  - "skill_subclass"
  - "hard_rules"
  - "semantic_rubric"
properties:
  prompt:
    type: "string"
    description: "The instruction given to the agent."
    minLength: 1
  role_class:
    type: "string"
    description: "High-level role classification (e.g., 'Analyst')."
    minLength: 1
  skill_subclass:
    type: "string"
    description: "Specific skill subclass (e.g., 'Data Cleaning')."
    minLength: 1
  hard_rules:
    type: "array"
    description: "List of hard constraints the agent must follow."
    items:
      type: "string"
    minItems: 0
  semantic_rubric:
    type: "string"
    description: "The evaluation criteria for the agent's output."
    minLength: 1
  metadata:
    type: "object"
    description: "Optional metadata about the source session."
    properties:
      session_id:
        type: "string"
      source_file:
        type: "string"
    additionalProperties: true
