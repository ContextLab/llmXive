$schema: "http://json-schema.org/draft-07/schema#"
title: "EnterpriseClawBench Evaluation Report"
description: "Schema for the evaluation report generated by the judge. Validates SC-003 and SC-004."
type: "object"
required:
  - "artifact_delivery"
  - "visual_quality"
  - "cost"
  - "runtime"
  - "skill_transfer"
  - "total_score"
  - "task_id"
  - "status"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task being evaluated."
  status:
    type: "string"
    enum:
      - "completed"
      - "unscorable"
      - "error"
    description: "Status of the evaluation."
  artifact_delivery:
    type: "number"
    description: "Score for artifact delivery (0-1)."
    minimum: 0
    maximum: 1
  visual_quality:
    type: "number"
    description: "Score for visual quality (0-1)."
    minimum: 0
    maximum: 1
  cost:
    type: "number"
    description: "Estimated cost of the task."
    minimum: 0
  runtime:
    type: "number"
    description: "Estimated runtime in seconds."
    minimum: 0
  skill_transfer:
    type: "number"
    description: "Score for skill transfer (0-1)."
    minimum: 0
    maximum: 1
  total_score:
    type: "number"
    description: "Weighted aggregate score."
    minimum: 0
    maximum: 1
  error_message:
    type: "string"
    description: "Error message if status is 'error' or 'unscorable'."
    nullable: true
