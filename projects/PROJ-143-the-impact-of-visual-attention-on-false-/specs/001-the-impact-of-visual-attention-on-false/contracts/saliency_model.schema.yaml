$schema: "http://json-schema.org/draft-07/schema#"
title: "Saliency Model Schema"
type: "object"
properties:
  model_name:
    type: "string"
    description: "Name of the saliency model"
  weights_path:
    type: "string"
    description: "Path to the pretrained weights"
  benchmark_auc:
    type: "number"
    description: "AUC score on the SALICON benchmark"
required:
  - "model_name"
  - "weights_path"
  - "benchmark_auc"
additionalProperties: false