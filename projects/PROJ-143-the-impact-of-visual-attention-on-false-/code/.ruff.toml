# Ruff configuration file (alternative to pyproject.toml if preferred)
# This file is redundant if configured in pyproject.toml but kept for standalone usage
line-length = 88
target-version = "py39"

[lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501", "B008", "C901"]

[lint.per-file-ignores]
"tests/*" = ["S101", "E731"]
