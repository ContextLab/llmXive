$schema: "http://json-schema.org/draft-07/schema#"
title: "Trace Schema"
description: "Schema for multi-turn revision session traces"
type: object
required:
  - exact_tool_sequence
  - tool_calls
properties:
  exact_tool_sequence:
    type: array
    description: "Ordered list of tool names executed in the session"
    items:
      type: string
    minItems: 1
  tool_calls:
    type: array
    description: "Detailed records of each tool call"
    items:
      type: object
      required:
        - name
        - arguments
      properties:
        name:
          type: string
          description: "Name of the tool called"
        arguments:
          type: object
          description: "Arguments passed to the tool"
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: "Timestamp of the tool call"
  session_id:
    type: string
    description: "Unique identifier for the session"
  timestamp:
    type: string
    format: date-time
    description: "Session start timestamp"
  raw_arg_variance:
    type: number
    description: "Pre-computed argument variance metric"
    minimum: 0
  final_state:
    type: object
    description: "Final slide state after all tool calls"
    additionalProperties: true
additionalProperties: true
