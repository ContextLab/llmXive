# Trace Schema Definition
# Validates the structure of generated synthetic traces
type: object
required:
  - session_id
  - exact_tool_sequence
  - raw_arg_variance
  - final_state
properties:
  session_id:
    type: string
    description: Unique identifier for the session
  exact_tool_sequence:
    type: array
    items:
      type: object
      required:
        - tool_name
        - arguments
      properties:
        tool_name:
          type: string
        arguments:
          type: object
  raw_arg_variance:
    type: number
    minimum: 0.0
    description: Variance of argument embeddings
  final_state:
    type: object
    description: The resulting slide state after the sequence
  metadata:
    type: object
    properties:
      generated_at:
        type: string
      seed:
        type: integer
