# Compressibility Analysis Schema
# Validates statistical artifacts for the paper
type: object
required:
  - regression_coefficients
  - p_values
  - trade_off_curve
properties:
  regression_coefficients:
    type: object
    properties:
      intercept:
        type: number
      structural_metric_coeff:
        type: number
  p_values:
    type: object
    properties:
      structural_metric_p:
        type: number
        minimum: 0.0
        maximum: 1.0
  trade_off_curve:
    type: array
    items:
      type: object
      required:
        - compression_ratio
        - fidelity_loss
      properties:
        compression_ratio:
          type: number
        fidelity_loss:
          type: number
          minimum: 0.0
          maximum: 1.0