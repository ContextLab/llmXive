# Benchmark Results Schema
# Validates the output of the benchmarking pipeline
type: object
required:
  - baseline_results
  - compressed_results
  - comparison
properties:
  baseline_results:
    type: object
    properties:
      edit_accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
      avg_latency_ms:
        type: number
        minimum: 0.0
  compressed_results:
    type: object
    properties:
      edit_accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
      avg_latency_ms:
        type: number
        minimum: 0.0
  comparison:
    type: object
    properties:
      accuracy_delta:
        type: number
      latency_delta_ms:
        type: number
      fidelity_loss:
        type: number
        minimum: 0.0
        maximum: 1.0
