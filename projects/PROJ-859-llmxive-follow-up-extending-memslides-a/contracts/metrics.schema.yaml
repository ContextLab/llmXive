# Metrics Schema Definition
# Validates the structure of extracted metrics
type: object
required:
  - session_id
  - sequence_entropy
  - tool_repetition_frequency
  - argument_semantic_variance
properties:
  session_id:
    type: string
  sequence_entropy:
    type: number
    minimum: 0.0
  tool_repetition_frequency:
    type: number
    minimum: 0.0
    maximum: 1.0
  argument_semantic_variance:
    type: number
    minimum: 0.0
  feature_vector:
    type: array
    items:
      type: number
