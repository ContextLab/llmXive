# Pipeline Configuration for Cognitive Fatigue Prediction
# Generated by T004: Finalized pipeline parameters per FR-001 to FR-006

# Dataset Configuration
# Primary: Sleep-EDF (PhysioNet) for resting-state EEG + fatigue ratings
# Fallback: SHHS if primary fails validation or N < 30
dataset:
  primary_id: "sleep-edf"
  primary_url: "https://physionet.org/content/sleep-edf/"
  fallback_id: "shhs"
  fallback_url: "https://physionet.org/content/shhs/"
  min_participants: 30
  # Specific dataset version to ensure reproducibility
  version: "1.0.0"

# Preprocessing Parameters (FR-002)
# Bandpass filter to remove drift and high-frequency noise
preprocessing:
  filter:
    lowcut: 1.0
    highcut: 40.0
    type: "bandpass"
    order: 4
  artifact:
    # Threshold for peak-to-peak amplitude rejection (FR-002)
    threshold_microvolts: 100
    # Minimum valid segment duration in seconds
    min_segment_duration_seconds: 120
  line_noise:
    # Remove 50Hz (or 60Hz) line noise
    frequency: 50
    notch_width: 2

# Random Seeds for reproducibility across all stochastic operations
random_seed: 42

# Feature Extraction Parameters (FR-003)
features:
  lempel_ziv:
    # Normalization factor for LZ complexity
    normalize: true
  permutation_entropy:
    # Embedding dimension
    dimension: 3
    # Time delay
    delay: 1

# Analysis Parameters (FR-004, FR-005)
analysis:
  correlation:
    # Method: 'pearson' or 'spearman'
    method: "spearman"
  multiple_comparison:
    # Correction method: 'bonferroni' or 'fdr_bh' (Benjamini-Hochberg)
    method: "fdr_bh"
    alpha: 0.05
  sensitivity:
    thresholds: [0.05, 0.01]

# Paths (relative to project root)
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  analysis_output: "data/analysis"
  figures: "figures"
  logs: "logs"

# Logging settings
logging:
  level: "INFO"
  file: "logs/pipeline.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"