# Output Schema for Merged Drugs Dataset
# Defines the expected structure of data/processed/merged_drugs.csv

version: "1.0"
description: "Schema for the merged dataset containing molecular descriptors and degradation data."

fields:
  - name: SMILES
    type: string
    required: true
    description: "Canonical SMILES string of the molecule."
    
  - name: half_life_hours
    type: float
    required: true
    description: "Degradation half-life in hours."
    
  - name: tpsa
    type: float
    required: true
    description: "Topological Polar Surface Area."
    
  - name: rotatable_bonds
    type: integer
    required: true
    description: "Count of rotatable bonds."
    
  - name: molecular_weight
    type: float
    required: true
    description: "Molecular weight (MW)."
    
  - name: aromatic_rings
    type: integer
    required: true
    description: "Count of aromatic rings."
    
  - name: wiener_index
    type: float
    required: true
    description: "Wiener index (topological index)."
    
  - name: zagreb_index
    type: float
    required: true
    description: "Zagreb index (topological index)."
    
  - name: drug_name
    type: string
    required: false
    description: "Name of the drug (if available in source)."
    
constraints:
  no_nulls:
    - SMILES
    - half_life_hours
    - tpsa
    - molecular_weight
    
  validation_rules:
    - "molecular_weight > 0"
    - "half_life_hours > 0"
