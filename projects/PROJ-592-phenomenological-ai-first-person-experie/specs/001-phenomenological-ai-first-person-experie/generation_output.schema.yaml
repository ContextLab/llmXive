$schema: http://json-schema.org/draft-07/schema#
title: Generation Output Schema
description: |
  Schema for individual phenomenological report generation outputs.
  Captures the prompt, strategy, model metadata, and the generated text.
  Designed to support reproducibility and traceability as per FR-007.
type: object
required:
  - id
  - timestamp
  - strategy
  - prompt_id
  - prompt_text
  - generated_text
  - model_id
  - seed
  - parameters
properties:
  id:
    type: string
    description: Unique identifier for this generation sample (UUID).
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of generation.
  strategy:
    type: string
    enum:
      - Direct
      - Hypothetical
      - Comparative
      - Role-play
    description: The prompting strategy used for this sample.
  prompt_id:
    type: string
    description: Reference ID to the base prompt used.
  prompt_text:
    type: string
    description: The full prompt text sent to the model.
  generated_text:
    type: string
    description: The raw text generated by the model.
  model_id:
    type: string
    description: Identifier of the model used (e.g., 'TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF').
  seed:
    type: integer
    description: Random seed used for reproducibility.
  parameters:
    type: object
    description: Generation parameters (temperature, max_tokens, etc.).
    properties:
      temperature:
        type: number
        minimum: 0
        maximum: 2
      max_tokens:
        type: integer
        minimum: 1
      top_p:
        type: number
        minimum: 0
        maximum: 1
      top_k:
        type: integer
        minimum: 1
    required:
      - temperature
      - max_tokens
  metadata:
    type: object
    description: Optional additional metadata (e.g., retry count, timing).
    properties:
      retry_count:
        type: integer
        minimum: 0
      generation_time_seconds:
        type: number
        minimum: 0
additionalProperties: false
