repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=88]

  - repo: local
    hooks:
      - id: check-requirements
        name: Check requirements.txt for xtb
        entry: bash -c 'grep -q "^xtb" code/requirements.txt && echo "ERROR: xtb must not be in requirements.txt (install via conda-forge or system package manager)" && exit 1 || exit 0'
        language: system
        files: ^code/requirements\.txt$
        pass_filenames: false
