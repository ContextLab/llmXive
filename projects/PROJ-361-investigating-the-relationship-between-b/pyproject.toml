[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-proj-361"
version = "0.1.0"
description = "Investigating the relationship between brain network topology and susceptibility to visual illusions"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "bctpy>=0.6.0",
    "networkx>=3.1.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "nibabel>=5.1.0",
    "requests>=2.31.0",
    "tqdm>=4.65.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
