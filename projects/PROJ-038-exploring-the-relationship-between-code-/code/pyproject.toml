[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-code-complexity"
version = "0.1.0"
description = "Research pipeline for exploring code complexity metrics and bug prediction"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.1.0",
    "scikit-learn==1.3.0",
    "scipy==1.11.0",
    "matplotlib==3.8.0",
    "seaborn==0.13.0",
    "tree-sitter==0.20.0",
    "tree-sitter-java==0.20.0",
    "pytest==7.4.0",
    "psutil>=5.9.0",
]

[project.optional-dependencies]
dev = [
    "black",
    "flake8",
    "mypy",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "tests*"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
