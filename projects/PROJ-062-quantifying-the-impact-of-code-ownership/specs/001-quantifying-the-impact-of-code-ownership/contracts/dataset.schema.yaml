$schema: http://json-schema.org/draft-07/schema#
title: Code Ownership Dataset Schema
description: >
  Schema for intermediate ownership and bug data collected from Git repositories.
  Used by US1 (Data Collection) and consumed by US2 (Metric Calculation).
type: object
required:
  - metadata
  - ownership_records
  - bug_records
properties:
  metadata:
    type: object
    required:
      - project_name
      - schema_version
      - generated_at
      - cutoff_timestamp
      - repo_count
    properties:
      project_name:
        type: string
        description: Name of the research project
      schema_version:
        type: string
        description: Version of this schema
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation
      cutoff_timestamp:
        type: integer
        description: Unix timestamp representing time T (analysis cutoff)
      repo_count:
        type: integer
        minimum: 8
        description: Number of repositories processed
  ownership_records:
    type: array
    description: Aggregated ownership data per module per repository
    items:
      type: object
      required:
        - repo_id
        - module_path
        - committers
        - total_commits
        - total_lines
        - first_commit_ts
        - last_commit_ts
      properties:
        repo_id:
          type: string
          description: Unique identifier for the repository
        module_path:
          type: string
          description: Normalized relative path to the module
        committers:
          type: array
          items:
            type: object
            required:
              - email
              - commit_count
            properties:
              email:
                type: string
                format: email
              commit_count:
                type: integer
                minimum: 1
        total_commits:
          type: integer
          minimum: 1
          description: Total commits touching this module in the window
        total_lines:
          type: integer
          minimum: 0
          description: Total lines of code (sum of additions) in the window
        first_commit_ts:
          type: integer
          description: Unix timestamp of first commit in window
        last_commit_ts:
          type: integer
          description: Unix timestamp of last commit in window
        is_deleted:
          type: boolean
          default: false
          description: Flag indicating if module was deleted between T and T+1
  bug_records:
    type: array
    description: Bug metadata linked to repositories
    items:
      type: object
      required:
        - repo_id
        - issue_number
        - created_at
        - state
        - linked_files
      properties:
        repo_id:
          type: string
          description: Unique identifier for the repository
        issue_number:
          type: integer
          minimum: 1
          description: GitHub issue number
        created_at:
          type: string
          format: date-time
          description: ISO 8601 creation timestamp
        state:
          type: string
          enum: [open, closed]
        linked_files:
          type: array
          description: Files mentioned in the issue body (normalized paths)
          items:
            type: string
        closed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when issue was closed, if applicable
