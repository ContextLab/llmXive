# Base Configuration for PROJ-018
# Generated by T007: Configuration Management

project:
  name: "PROJ-018-adoption-of-sustainable-agricultural-pra"
  root: "."

# Random Seeds for Reproducibility
random_seed: 42

# Data Paths
data:
  raw: "data/raw"
  processed: "data/processed"
  metadata: "data/metadata.yaml"

# Results Paths
results:
  path: "results"
  figures: "results/figures"

# Logging
logging:
  file: "modeling_log.yaml"
  level: "INFO"

# Analysis Parameters
analysis:
  power_threshold: 10
  vif_threshold: 5.0
  fdr_q: 0.10
  evalue_gamma_range: [1.5, 2.0, 2.5, 3.0, 4.0, 5.0]

# Feature Engineering
features:
  engagement_proxies:
    - membership
    - extension
    - collective_action
    - knowledge_exchange
  adoption_practices:
    - organic_farming
    - crop_rotation
    - water_conservation
    - integrated_pest_management
