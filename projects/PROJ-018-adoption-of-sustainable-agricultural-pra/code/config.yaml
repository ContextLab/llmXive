# Base configuration for PROJ-018: Adoption of Sustainable Agricultural Practices
# This file defines data paths, random seeds, and global settings.
# Generated by T007 to ensure reproducibility and path consistency.

project_root: "."
data_path: "data"
raw_data_path: "data/raw"
processed_data_path: "data/processed"
results_path: "results"
figures_path: "figures"
modeling_log_path: "modeling_log.yaml"
metadata_path: "data/metadata.yaml"
validity_metrics_path: "results/validity_metrics.yaml"
report_output_path: "results/final_report.pdf"

# Random seeds for reproducibility (Constitution IV)
random_seed: 42
numpy_seed: 42

# Data acquisition settings
data_source: "synthetic_fallback"  # Options: "worldbank", "fao", "synthetic_fallback"
target_countries:
  - "KEN"  # Kenya
  - "TZA"  # Tanzania
  - "UGA"  # Uganda
  - "ETH"  # Ethiopia
  - "MWI"  # Malawi

# Cleaning and processing thresholds
missing_threshold_drop: 0.30  # Drop rows with >30% missing
missing_threshold_impute: 0.50  # Impute columns with <50% missing
min_sample_size: 100

# Modeling settings
model_type: "logistic_regression"
alpha_fdr: 0.10
bootstrap_resamples: 1000
vif_threshold: 5.0

# Feature engineering
engagement_proxy_columns:
  - "membership_in_cooperative"
  - "extension_contact_frequency"
  - "collective_action_participation"
  - "knowledge_exchange_score"

sustainable_practice_columns:
  - "adopted_organic_fertilizer"
  - "adopted_crop_rotation"
  - "adopted_conservation_tillage"
  - "adopted_agroforestry"
  - "adopted_irrigation_efficiency"
