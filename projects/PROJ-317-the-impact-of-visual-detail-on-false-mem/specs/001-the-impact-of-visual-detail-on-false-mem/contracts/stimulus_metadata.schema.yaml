$schema: "http://json-schema.org/draft-07/schema#"
title: "Stimulus Metadata Schema"
description: "Schema for per-image manipulation metadata files (data/stimuli/{id}.yaml)"
type: "object"
required:
  - stimulus_id
  - baseline_path
  - enhanced_path
  - reduced_path
  - manipulation_params
  - complexity_score
  - created_at
  - checksum
properties:
  stimulus_id:
    type: "string"
    description: "Unique hash of the baseline image"
  baseline_path:
    type: "string"
    description: "Relative path to original image"
  enhanced_path:
    type: "string"
    description: "Relative path to enhanced image"
  reduced_path:
    type: "string"
    description: "Relative path to reduced image"
  manipulation_params:
    type: "object"
    required:
      - objects_added
      - objects_removed
      - texture_settings
    properties:
      objects_added:
        type: "array"
        items:
          type: "string"
        description: "List of object labels added"
      objects_removed:
        type: "array"
        items:
          type: "string"
        description: "List of object labels removed/blurred"
      texture_settings:
        type: "object"
        properties:
          blur_radius:
            type: "number"
            description: "Blur radius for reduced detail"
          contrast_boost:
            type: "number"
            description: "Contrast adjustment for enhanced detail"
  complexity_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Calculated complexity score (0.0-1.0)"
  created_at:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of generation"
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the file content"