[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line-too-long (handled by black)
    "B008", # do-not-perform-function-calls-in-argument-defaults (often needed for dataclasses)
]

[format]
line-length = 88
indent-width = 4

[target]
target-version = "py311"
