$schema: http://json-schema.org/draft-07/schema#
title: FilteredSNP
description: Schema for filtered SNPs in regulatory regions
type: object
required:
  - snp_id
  - chrom
  - pos
  - ref
  - alt
  - maf
properties:
  snp_id:
    type: string
    description: dbSNP identifier (e.g., rs12345)
  chrom:
    type: string
    description: Chromosome name (e.g., 1, X, MT)
  pos:
    type: integer
    description: 1-based genomic position
  ref:
    type: string
    description: Reference allele (single nucleotide: A, C, G, or T)
  alt:
    type: string
    description: Alternate allele (single nucleotide: A, C, G, or T)
  maf:
    type: number
    description: Minor allele frequency (0.0 to 1.0)
    minimum: 0.0
    maximum: 1.0
additionalProperties: false