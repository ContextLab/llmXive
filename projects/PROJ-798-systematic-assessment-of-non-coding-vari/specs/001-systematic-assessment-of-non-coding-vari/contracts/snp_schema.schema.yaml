$schema: "http://json-schema.org/draft-07/schema#"
title: "SNP Filtered Schema"
description: "Schema for filtered SNPs located within regulatory regions. Includes LD block and stratum IDs for stratified permutation testing."
type: "object"
properties:
  snp_id:
    type: "string"
    description: "dbSNP rsID identifier."
  chromosome:
    type: "string"
    pattern: "^[0-9XYMT]+$"
    description: "Chromosome name (e.g., chr1)."
  position:
    type: "integer"
    minimum: 1
    description: "1-based genomic position."
  ref_allele:
    type: "string"
    pattern: "^[ACGT]$"
    description: "Reference allele."
  alt_allele:
    type: "string"
    pattern: "^[ACGT]$"
    description: "Alternate allele."
  maf:
    type: "number"
    minimum: 0.01
    maximum: 0.5
    description: "Minor Allele Frequency."
  quality_score:
    type: "number"
    minimum: 0
    description: "Phred-scaled quality score."
  regulatory_type:
    type: "string"
    enum:
      - "promoter"
      - "enhancer"
    description: "Type of regulatory region."
  overlap_region_id:
    type: "string"
    description: "ID of the overlapping regulatory region."
  ld_block_id:
    type: "string"
    description: "Identifier for the Linkage Disequilibrium (LD) block this SNP belongs to. Used for stratified permutation to preserve local correlation structure."
  stratum_id:
    type: "string"
    description: "Composite ID for GC-content and TSS-distance bin. Used for stratified permutation to control for genomic confounders."
required:
  - snp_id
  - chromosome
  - position
  - ref_allele
  - alt_allele
  - maf
  - quality_score
  - regulatory_type
  - overlap_region_id
  - ld_block_id
  - stratum_id
additionalProperties: false