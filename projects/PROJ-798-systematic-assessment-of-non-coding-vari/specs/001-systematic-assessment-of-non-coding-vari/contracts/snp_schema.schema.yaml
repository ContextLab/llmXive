$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
description: "Schema for a single SNP record in the filtered dataset."
properties:
  chrom:
    type: "string"
    description: "Chromosome identifier (e.g., 'chr1', 'chrX')."
  pos:
    type: "integer"
    description: "1-based genomic position."
  ref:
    type: "string"
    pattern: "^[ACGT]$"
    description: "Reference allele."
  alt:
    type: "string"
    pattern: "^[ACGT]$"
    description: "Alternate allele."
  maf:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Minor Allele Frequency."
  rs_id:
    type: "string"
    description: "dbSNP rs identifier."
  regulatory_overlap:
    type: "object"
    properties:
      region_type:
        type: "string"
        enum:
          - "promoter"
          - "enhancer"
        description: "Type of regulatory region the SNP overlaps."
      region_id:
        type: "string"
        description: "Identifier of the overlapping region."
    required:
      - "region_type"
      - "region_id"
required:
  - "chrom"
  - "pos"
  - "ref"
  - "alt"
  - "maf"
  - "rs_id"
  - "regulatory_overlap"
additionalProperties: false