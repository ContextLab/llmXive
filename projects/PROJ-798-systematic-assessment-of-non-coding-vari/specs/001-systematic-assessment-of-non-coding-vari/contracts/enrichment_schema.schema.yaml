$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
description: "Schema for the enrichment result of a TF."
properties:
  tf_id:
    type: "string"
    description: "Identifier of the Transcription Factor."
  n_snps_tested:
    type: "integer"
    description: "Total number of SNPs scored for this TF."
  observed_overlap:
    type: "integer"
    description: "Number of high-impact SNPs overlapping GWAS loci."
  expected_overlap:
    type: "number"
    description: "Expected overlap count under the null hypothesis."
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "P-value from the permutation test."
  fdr_q_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "False Discovery Rate corrected q-value."
  enrichment_ratio:
    type: "number"
    description: "Ratio of observed to expected overlap."
  significant:
    type: "boolean"
    description: "True if fdr_q_value < 0.05."
required:
  - "tf_id"
  - "n_snps_tested"
  - "observed_overlap"
  - "expected_overlap"
  - "p_value"
  - "fdr_q_value"
  - "enrichment_ratio"
  - "significant"
additionalProperties: false