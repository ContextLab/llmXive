# Simulation Configuration for User Story 2
# Defines conditions, sample sizes, and problem IDs for BKT simulation

# Conditions to simulate (matches explanation types from US1)
conditions:
  - neural
  - symbolic
  - neuro_symbolic

# Number of students per condition
sample_size_per_condition: 50

# Problem IDs to simulate (subset of ASSISTments problems)
problem_ids:
  - prob_001
  - prob_002
  - prob_003
  - prob_004
  - prob_005

# Random seed for reproducibility
seed: 42

# BKT parameters (default values, can be overridden by calibration)
bkt_params:
  initial_knowledge: 0.3
  learning_rate: 0.2
  performance: 0.85
  guess: 0.15
  slip: 0.10

# Response time distribution parameters (for T023)
response_time:
  mean_seconds: 3.0
  std_seconds: 1.0
  min_seconds: 0.5

# Comprehension rating parameters (for T023)
comprehension:
  mean_rating: 3.0
  std_rating: 0.8
  min_rating: 1
  max_rating: 5
