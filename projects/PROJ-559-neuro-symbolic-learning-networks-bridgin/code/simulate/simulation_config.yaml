# Simulation Configuration for Neuro-Symbolic Learning Networks
# Generated for Task T021b
# Defines experimental conditions and sample sizes for US2

# Experimental Conditions
# These correspond to the three explanation types generated by US1
conditions:
  - name: neural
    description: "Neural-only explanation (LLM-generated narrative)"
    artifact_pattern: "explanation_neural_{problem_id}.txt"
    generator_module: "generate.neural_explanation"
  - name: symbolic
    description: "Symbolic-only explanation (Rule-based engine trace)"
    artifact_pattern: "explanation_symbolic_{problem_id}.txt"
    generator_module: "generate.symbolic_explanation"
  - name: neuro_symbolic
    description: "Neuro-symbolic hybrid (Neural narrative + Symbolic trace)"
    artifact_pattern: "explanation_neuro_symbolic_{problem_id}.txt"
    generator_module: "generate.neuro_symbolic_explanation"

# Sample Size Configuration
# Sufficient sample size to detect effect sizes with power >= 0.80
# Target: 50 students per condition to allow for mixed-effects modeling
sample_size:
  per_condition: 50
  total_students: 150
  seed: 42

# Simulation Parameters
simulation:
  # Maximum number of problems to simulate per student (from ASSISTments)
  max_problems_per_student: 10
  # BKT Model Parameters (will be overridden by calibration if available)
  bkt_default:
    p_initial: 0.3
    p_learn: 0.4
    p_guess: 0.2
    p_slip: 0.1
  # Response time distribution parameters (seconds)
  rt_params:
    min_seconds: 2.0
    max_seconds: 120.0
    mean_seconds: 25.0
    std_seconds: 15.0
  # Comprehension rating range (Likert 1-5)
  comprehension_range:
    min: 1
    max: 5

# Output Configuration
output:
  logs_directory: "data/derived"
  log_file: "simulation_logs.csv"
  metrics_file: "metrics_summary.csv"
  format: "csv"

# Calibration Check
# This configuration requires valid calibration before simulation proceeds
calibration:
  required: true
  report_path: "data/pilot/calibration_report.json"
  params_path: "code/simulate/bkt_params.yaml"
  thresholds:
    rmse_diff_max: 0.02
    rmse_abs_max: 0.15
- path: code/simulate/config_loader.py
  contents: |
    """
    Configuration loader for simulation tasks.
    Validates calibration status and loads simulation parameters.
    """

    import os
    import yaml
    import json
    import logging
    from typing import Dict, Any, Tuple, Optional

    from simulate.calibration import run_calibration

    logger = logging.getLogger(__name__)

    def load_config(config_path: str = "code/simulate/simulation_config.yaml") -> Dict[str, Any]:
        """Load and parse the simulation configuration YAML."""
        if not os.path.exists(config_path):
            raise FileNotFoundError(f"Configuration file not found: {config_path}")
        
        with open(config_path, "r") as f:
            config = yaml.safe_load(f)
        
        return config

    def validate_calibration(config: Dict[str, Any]) -> Tuple[bool, Optional[str]]:
        """
        Validate that calibration has been performed and meets thresholds.
        Returns (is_valid, error_message).
        """
        if not config.get("calibration", {}).get("required", True):
            return True, None

        report_path = config["calibration"]["report_path"]
        
        if not os.path.exists(report_path):
            # Trigger calibration if report is missing
            logger.warning(f"Calibration report not found at {report_path}. Running calibration...")
            try:
                run_calibration()
            except Exception as e:
                return False, f"Calibration failed: {str(e)}"
        
        # Load and validate report
        if not os.path.exists(report_path):
            return False, "Calibration report still missing after attempt."

        try:
            with open(report_path, "r") as f:
                report = json.load(f)
            
            # Check thresholds
            thresholds = config["calibration"]["thresholds"]
            rmse_diff = report.get("rmse_difference", float('inf'))
            rmse_abs = report.get("absolute_rmse", float('inf'))
            
            if rmse_diff > thresholds["rmse_diff_max"]:
                return False, f"RMSE difference {rmse_diff} exceeds threshold {thresholds['rmse_diff_max']}"
            if rmse_abs > thresholds["rmse_abs_max"]:
                return False, f"Absolute RMSE {rmse_abs} exceeds threshold {thresholds['rmse_abs_max']}"
            
            return True, None
        except json.JSONDecodeError as e:
            return False, f"Invalid calibration report format: {str(e)}"

    def get_simulation_params(config: Dict[str, Any]) -> Dict[str, Any]:
        """Extract simulation-specific parameters from config."""
        return {
            "conditions": config.get("conditions", []),
            "sample_size": config.get("sample_size", {}),
            "simulation": config.get("simulation", {}),
            "output": config.get("output", {})
        }

    def main():
        """CLI entry point to validate config and calibration."""
        logging.basicConfig(level=logging.INFO)
        
        config = load_config()
        is_valid, error = validate_calibration(config)
        
        if not is_valid:
            logger.error(f"Calibration validation failed: {error}")
            return 1
        
        logger.info("Configuration and calibration valid.")
        params = get_simulation_params(config)
        logger.info(f"Loaded {len(params['conditions'])} conditions, "
                    f"{params['sample_size'].get('per_condition', 0)} samples per condition.")
        return 0

    if __name__ == "__main__":
        exit(main())