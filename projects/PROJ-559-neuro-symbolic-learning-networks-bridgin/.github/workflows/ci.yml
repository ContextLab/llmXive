name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Linting (Ruff)
        run: ruff check code/

      - name: Run Formatting Check (Black)
        run: black --check code/

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests with Resource Constraints
        env:
          PYTHONHASHSEED: 0
        run: |
          # Set CPU affinity and memory limits if available
          # GitHub Actions runners are typically 2-core, 7GB RAM
          pytest code/tests/unit/ \
            --cov=code \
            --cov-report=xml \
            --maxfail=1 \
            -v

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-and-format]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Integration Tests
        env:
          # Enforce resource constraints for integration tests
          PYTORCH_CPU_THREADS: 2
          OMP_NUM_THREADS: 2
          HF_DATASETS_OFFLINE: 1
        run: |
          # Run integration tests with a timeout per test
          pytest code/tests/integration/ \
            -v \
            --timeout=300 \
            -x

  analysis-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analysis Scripts (Validation Mode)
        env:
          # Constrain RAM usage via ulimit (if supported) or env vars
          # Note: GitHub Actions runners have ~7GB RAM, we must be careful
          MAX_MEMORY_MB: 4096
          MAX_CPU_CORES: 2
        run: |
          python code/analyze/validate_metrics.py --dry-run

  build-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-format, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Sample Artifacts
        run: |
          python code/download/fetch_assistments.py --limit 5 --output data/sample_assistments.csv
          python code/generate/explanation_generator.py --input data/sample_assistments.csv --output-dir data/generated

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-explanations
          path: data/generated/
          retention-days: 7
