$schema: http://json-schema.org/draft-07/schema#
title: Problem
description: >
  Schema for an educational problem (e.g., from ASSISTments) used in the
  neuro-symbolic evaluation pipeline.
type: object
required:
  - problem_id
  - subject
  - topic
  - question_text
  - problem_type
  - difficulty_estimate
properties:
  problem_id:
    type: string
    description: Unique identifier for the problem.
    minLength: 1
  subject:
    type: string
    description: Subject area (e.g., "math", "physics").
    enum:
      - math
      - physics
      - chemistry
      - biology
      - logic
  topic:
    type: string
    description: Specific topic within the subject (e.g., "algebra", "kinematics").
    minLength: 1
  question_text:
    type: string
    description: The full text of the problem statement.
    minLength: 1
  problem_type:
    type: string
    description: Type of problem (e.g., "multiple_choice", "free_response", "numeric").
    enum:
      - multiple_choice
      - free_response
      - numeric
      - boolean
  difficulty_estimate:
    type: number
    description: Estimated difficulty on a 0.0 to 1.0 scale (0.0 = very easy).
    minimum: 0.0
    maximum: 1.0
  expected_answer:
    type: string
    description: The canonical correct answer (or a JSON stringified representation for complex types).
    minLength: 1
  metadata:
    type: object
    description: Additional optional metadata (e.g., source, tags).
    additionalProperties: true
additionalProperties: false
