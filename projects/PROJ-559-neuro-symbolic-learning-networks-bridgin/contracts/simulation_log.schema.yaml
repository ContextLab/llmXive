$schema: http://json-schema.org/draft-07/schema#
title: SimulationLog
description: >
  Schema for a single student interaction record in the simulation log.
  Captures correctness, response time, comprehension rating, and condition.
type: object
required:
  - log_id
  - student_id
  - problem_id
  - explanation_id
  - condition
  - correct
  - rt_seconds
  - comprehension_rating
  - timestamp
properties:
  log_id:
    type: string
    description: Unique identifier for this log entry.
    minLength: 1
  student_id:
    type: string
    description: Identifier for the simulated (or real) student.
    minLength: 1
  problem_id:
    type: string
    description: Reference to the problem presented.
    minLength: 1
  explanation_id:
    type: string
    description: Reference to the explanation provided to the student.
    minLength: 1
  condition:
    type: string
    description: Experimental condition under which the interaction occurred.
    enum:
      - neural
      - symbolic
      - neuro_symbolic
  correct:
    type: boolean
    description: Whether the student's response was correct.
  rt_seconds:
    type: number
    description: Response time in seconds.
    minimum: 0
    exclusiveMinimum: 0
  comprehension_rating:
    type: integer
    description: Student's self-reported comprehension rating (1-5 Likert).
    minimum: 1
    maximum: 5
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the interaction.
  metadata:
    type: object
    description: Additional optional metadata (e.g., simulated seed, environment).
    additionalProperties: true
additionalProperties: false
