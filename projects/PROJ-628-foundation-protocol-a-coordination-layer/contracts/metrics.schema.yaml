$schema: http://json-schema.org/draft-07/schema#
title: MetricRecord
description: >-
  Schema for experiment metric records generated by the Foundation Protocol
  benchmarking suite. Captures performance, reliability, and efficiency metrics
  across different protocols and seeds.
type: object
required:
  - seed
  - protocol
  - episode_length
  - msg_count
  - bytes_sent
  - recovery_success
  - recovery_latency
  - task_success
properties:
  seed:
    type: integer
    description: >-
      Random seed used for this experiment run to ensure reproducibility.
      Matches the seed used in data generation and simulation execution.
    minimum: 0
  protocol:
    type: string
    description: >-
      The communication protocol used for this run.
      Valid values: "foundation", "native_direct"
    enum:
      - foundation
      - native_direct
  episode_length:
    type: integer
    description: >-
      Number of timesteps in the episode before termination (success, failure,
      or timeout).
    minimum: 1
  msg_count:
    type: integer
    description: >-
      Total number of messages exchanged between agents during the episode.
    minimum: 0
  bytes_sent:
    type: integer
    description: >-
      Total bytes transmitted over the network during the episode. Includes
      payload and protocol overhead.
    minimum: 0
  recovery_success:
    type: boolean
    description: >-
      Whether the system successfully recovered from injected failures (if any).
      True if recovery completed within latency constraints, False otherwise.
  recovery_latency:
    type: number
    description: >-
      Time in seconds taken to recover from a failure event. Only recorded when
      recovery_success is True. Set to 0.0 if no failure occurred or recovery
      failed.
    minimum: 0.0
  task_success:
    type: boolean
    description: >-
      Whether the primary task objective was achieved by the end of the episode.
      True for success, False for failure or timeout.
additionalProperties: false
