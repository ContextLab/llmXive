    severity: writing
  - id: 3029d33b9a40
    text: "The 'intelligence density' argument (Section 1.1, Table 1) assumes increased\
      \ coordination requires a new protocol layer without establishing the causal\
      \ mechanism. The historical progression does not logically entail that agentic\
      \ systems need FP specifically\u2014this premise requires explicit justification\
      \ rather than rhetorical framing."
    severity: science
  - id: 05dc9ddb01a8
    text: The protocol fragmentation claim (Section 1, Table 2) asserts semantic drift
      and integration costs across MCP/A2A/DIDComm without empirical evidence. No
      comparative data or case studies demonstrate actual incompatibility. This central
      premise needs supporting analysis to be logically sound.
    severity: science
  - id: 050cad2ffb65
    text: FP claims to be 'transport-agnostic' (Section 1.3, 2.3) while the reference
      implementation uses a tree topology (Appendix 3.3). The paper states 'tree model
      is not a hard architectural constraint' but provides no evidence that the implementation
      supports alternative topologies without modification. This creates internal
      tension between claimed flexibility and actual design.
    severity: writing
  - id: 6af2e582f05b
    text: The economic primitives section (Section 1.3, Appendix 3.4) asserts verification
      becomes 'scarce' and FP addresses this, but provides no economic model or data
      showing FP's specific primitives solve the problem better than existing solutions
      (e.g., UCP). The causal claim is asserted without demonstration.
    severity: science
  - id: d9ed5fffe2e9
    text: Security claims (Section 2.4, Appendix 3.5) describe standard cryptographic
      practices (signatures, encryption, hash chains) as novel 'protocol-level oversight.'
      The logical leap from 'we use cryptography' to 'this makes safety a protocol
      concern' requires explicit mechanistic explanation of what FP-specific mechanisms
      enable beyond existing practice.
    severity: writing
  - id: e7f74595a205
    text: Claims about protocol effectiveness (e.g., 'FP is designed to make autonomous
      agency composable while keeping accountability non-negotiable' in abstract)
      lack empirical validation. Add limitations section acknowledging untested claims.
    severity: writing
  - id: 452d4b3a92f4
    text: The paper states FP 'unifies heterogeneous entities' and 'supports native
      multi-party organization' but provides no comparative benchmarks against MCP,
      A2A, or DIDComm. Either add evaluation or soften claims to 'proposed' rather
      than 'demonstrated.'
    severity: writing
  - id: 36c5661098ed
    text: "Abstract claims FP enables 'a human\u2013AI society that is open, pluralistic,\
      \ and governable' without evidence this is achievable through protocol design\
      \ alone. This is a societal claim beyond technical scope."
    severity: writing
  - id: e3eb9d715086
    text: Reference implementation appendix describes 'working FP stack' but omits
      implementation details and admits code is 'non-normative.' This creates gap
      between claimed functionality and demonstrated capability.
    severity: writing
  - id: 23b6d4595b4d
    text: The central claims regarding reduced integration overhead and improved governance
      lack empirical support. Include a comparative study measuring token usage, latency,
      or integration time against baselines (e.g., MCP, A2A).
    severity: science
  - id: 57de922f07da
    text: The 'AI company' scenario (Section 3.2) is illustrative, not experimental.
      It does not provide data on failure rates, audit success, or economic settlement
      times. Convert this into a case study with measurable metrics.
    severity: science
  - id: 4c7e9a32e8cd
    text: The reference implementation (Appendix) describes architecture but lacks
      performance benchmarks (throughput, concurrency). Provide quantitative data
      to validate scalability claims.
    severity: science
  - id: fbd93014d82a
    text: The paper makes empirical claims about FP's benefits (e.g., token overhead
      reduction, safety improvements, scalability) without statistical evidence. Future
      empirical evaluation should include sample sizes, confidence intervals, and
      hypothesis tests.
    severity: science
  - id: b8cacd4c7e46
    text: Protocol comparisons in Table 1 (main.tex, lines 163-174) are qualitative.
      If quantitative performance metrics are added, appropriate statistical tests
      and multiple-comparisons corrections should be applied.
    severity: science
