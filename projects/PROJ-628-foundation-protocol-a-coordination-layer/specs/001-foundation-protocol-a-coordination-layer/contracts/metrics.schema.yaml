$schema: "http://json-schema.org/draft-07/schema#"
title: "Foundation Protocol Metrics Schema"
description: "Schema for the aggregated metrics and statistical results."
type: "object"
properties:
  experiment_summary:
    type: "object"
    properties:
      total_seeds:
        type: "integer"
      tasks:
        type: "array"
        items:
          type: "string"
      protocols:
        type: "array"
        items:
          type: "string"
  metrics:
    type: "array"
    items:
      type: "object"
      properties:
        metric_name:
          type: "string"
          enum: ["episode_length", "msg_count", "bytes_sent", "recovery_success", "recovery_latency", "task_success"]
        protocol:
          type: "string"
          enum: ["foundation", "native_direct"]
        mean:
          type: "number"
        std:
          type: "number"
        count:
          type: "integer"
  statistical_tests:
    type: "array"
    items:
      type: "object"
      properties:
        test_name:
          type: "string"
          enum: ["linear_mixed_model", "mcnemar"]
        metric_name:
          type: "string"
        p_value:
          type: "number"
        effect_size:
          type: "number"
          description: "Cohen's d or odds ratio"
        significant:
          type: "boolean"
        corrected_p_value:
          type: "number"
          description: "Bonferroni corrected p-value"
        random_effects:
          type: "object"
          description: "Random effect variances (e.g., agent_type, seed)"
required:
  - experiment_summary
  - metrics
  - statistical_tests
additionalProperties: false