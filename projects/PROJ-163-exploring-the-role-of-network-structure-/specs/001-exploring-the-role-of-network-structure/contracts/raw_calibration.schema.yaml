$schema: "http://json-schema.org/draft-07/schema#"
title: "Raw Calibration Data"
description: "Schema for raw JSON data fetched from IBM Quantum API"
type: object
required:
  - backend_name
  - timestamp
  - coupling_map
  - qubit_properties
properties:
  backend_name:
    type: string
    description: "Name of the quantum backend (e.g., ibmq_manila)"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the calibration snapshot"
  coupling_map:
    type: array
    description: "List of directed edges [source, target] representing qubit connectivity"
    items:
      type: array
      items:
        type: integer
  qubit_properties:
    type: array
    description: "List of qubit property objects"
    items:
      type: object
      required:
        - t1
        - t2
        - readout_error
      properties:
        t1:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
        t2:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
        readout_error:
          type: object
          properties:
            value:
              type: number
            unit:
              type: string
  gate_errors:
    type: array
    description: "List of gate error objects"
    items:
      type: object
      properties:
        gate:
          type: string
        error:
          type: number
        unit:
          type: string
  backend_version:
    type: ["string", "null"]
    description: "Backend version string (used to derive chip_generation)"