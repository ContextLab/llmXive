[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-163"
version = "0.1.0"
description = "Exploring the Role of Network Structure in Superconducting Qubit Coupling"
requires-python = ">=3.11"
dependencies = [
    "qiskit-ibm-runtime",
    "networkx",
    "pandas",
    "scipy",
    "matplotlib",
    "requests",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"
