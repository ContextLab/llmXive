$schema: http://json-schema.org/draft-07/schema#
title: Molecular Flexibility Analysis Output Schema
description: |
  Schema for the output of the molecular flexibility descriptor calculation
  and correlation analysis. Includes variance metrics, outlier flags,
  and correlation results.
type: object
required:
  - smiles
  - bond_variance
  - angle_variance
  - dihedral_variance
  - is_outlier
properties:
  smiles:
    type: string
    description: Canonical SMILES string of the molecule.
  bond_variance:
    type: number
    description: Variance of bond lengths across conformer ensemble (Å²).
    minimum: 0
  angle_variance:
    type: number
    description: Variance of bond angles across conformer ensemble (rad²).
    minimum: 0
  dihedral_variance:
    type: number
    description: Variance of dihedral angles across conformer ensemble (rad²).
    minimum: 0
  is_outlier:
    type: boolean
    description: Flag indicating if the molecule is an outlier based on IQR method.
  logPapp:
    type: ["number", "null"]
    description: Permeability coefficient linked from the source dataset.
  molecule_chembl_id:
    type: ["string", "null"]
    description: ChEMBL Molecule ID linked from the source dataset.
  conformer_count:
    type: integer
    description: Number of conformers generated for this molecule.
    minimum: 1
  processing_status:
    type: string
    enum: [success, failed]
    description: Status of the conformer generation and variance calculation.
additionalProperties: false
# Note: Correlation results (Pearson/Spearman coefficients, p-values)
# are typically stored in a separate analysis_results.yaml or CSV,
# but if included here as a nested object:
# correlation_results:
#   type: object
#   properties:
#     pearson_bond: { type: number }
#     p_value_bond: { type: number }
#     ...
#   required: [pearson_bond, p_value_bond, ...]