$schema: http://json-schema.org/draft-07/schema#
title: Analysis Output Schema
description: |
  Schema for the output of the flexibility and correlation analysis.
  Used by T014 (descriptors), T015 (analysis), and T025 (contract tests).
  This schema defines the structure for `data/processed/analysis_results.csv` and model metrics.
type: object
required:
  - smiles
  - bond_variance
  - angle_variance
  - dihedral_variance
  - is_outlier
  - correlation_pearson
  - correlation_spearman
  - p_value_pearson
  - p_value_spearman
  - model_r2
  - model_adj_r2
  - model_rmse
  - model_p_value
properties:
  smiles:
    type: string
    description: Canonical SMILES string.
  bond_variance:
    type: number
    description: Variance of bond lengths across the conformer ensemble (Å²).
  angle_variance:
    type: number
    description: Variance of bond angles across the conformer ensemble (rad²).
  dihedral_variance:
    type: number
    description: |
      Variance of dihedral angles across the conformer ensemble (rad²).
      This is the primary flexibility descriptor (FR-004, T014a).
  is_outlier:
    type: boolean
    description: Flag for outliers in flexibility metrics (T014b).
  correlation_pearson:
    type: number
    description: Pearson correlation coefficient between dihedral_variance and logPapp.
  correlation_spearman:
    type: number
    description: Spearman rank correlation coefficient between dihedral_variance and logPapp.
  p_value_pearson:
    type: number
    description: P-value for the Pearson correlation.
  p_value_spearman:
    type: number
    description: P-value for the Spearman correlation.
  model_r2:
    type: number
    description: R-squared value of the multivariate linear regression model.
  model_adj_r2:
    type: number
    description: Adjusted R-squared value.
  model_rmse:
    type: number
    description: Root Mean Squared Error of the model.
  model_p_value:
    type: number
    description: P-value for the overall model significance (F-test).
  fdr_q_value:
    type: number
    description: Benjamini-Hochberg adjusted q-value for the correlation (T016).
additionalProperties: false