$schema: http://json-schema.org/draft-07/schema#
title: Caco-2 Permeability Dataset Schema
description: Schema for the preprocessed Caco-2 permeability dataset used in molecular flexibility analysis.
type: object
required:
  - smiles
  - logPapp
  - assay_id
  - molecular_weight
  - logP
  - psa
  - is_outlier
properties:
  smiles:
    type: string
    description: Canonical SMILES string of the molecule.
    minLength: 1
  assay_id:
    type: integer
    description: Unique ChEMBL assay identifier.
  logPapp:
    type: number
    description: Log10 of the apparent permeability coefficient (cm/s).
    minimum: -10.0
    maximum: 10.0
  molecular_weight:
    type: number
    description: Molecular weight in g/mol.
    minimum: 0.0
  logP:
    type: number
    description: Octanol-water partition coefficient (calculated).
  psa:
    type: number
    description: Polar Surface Area (Å²).
    minimum: 0.0
  is_outlier:
    type: boolean
    description: Flag indicating if the record is an outlier based on IQR method.
  bond_variance:
    type: number
    description: Variance of bond lengths across conformers (Å²).
    nullable: true
  angle_variance:
    type: number
    description: Variance of bond angles across conformers (rad²).
    nullable: true
  dihedral_variance:
    type: number
    description: Variance of dihedral angles across conformers (rad²). Primary flexibility metric.
    nullable: true
additionalProperties: false
