[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "molecular-flexibility-caco2"
version = "0.1.0"
description = "Exploring the correlation between molecular flexibility and drug transport across cell membranes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "rdkit",
    "pandas",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "requests",
    "numpy",
    "scipy",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "flake8",
    "black",
    "pre-commit",
    "pytest",
    "pytest-cov",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | \.eggs
    | \.egg-info
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["utils", "data"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
