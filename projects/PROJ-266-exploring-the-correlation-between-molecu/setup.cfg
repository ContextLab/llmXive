[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info
max-complexity = 10
per-file-ignores =
    # Ignore unused imports in __init__.py
    __init__.py:F401

[isort]
profile = black
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
known_first_party = utils, data, tests

[black]
line-length = 88
target-version = py311
exclude = 
    .git
    __pycache__
    build
    dist
    .eggs
    *.egg-info