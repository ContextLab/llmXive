$schema: http://json-schema.org/draft-07/schema#
title: AnalysisResult Schema
description: Schema for statistical analysis outputs.
type: object
properties:
  result_id:
    type: string
    description: Unique result ID.
    pattern: "^[a-z0-9]{8}$"
  test_type:
    type: string
    description: Type of statistical test performed.
    enum:
      - "Levene"
      - "Shapiro-Wilk"
      - "ANOVA"
      - "Welch_ANOVA"
      - "Welch-James"
      - "Permutation"
      - "Tukey_HSD"
      - "Games-Howell"
  statistic:
    type: number
    description: Test statistic value.
  p_value:
    type: number
    description: p-value.
    minimum: 0.0
    maximum: 1.0
  degrees_of_freedom:
    type: string
    description: Degrees of freedom string (e.g., "df1=2, df2=15").
  confidence_interval:
    type: string
    description: Confidence interval string (e.g., "[0.1, 0.9]").
  conclusion:
    type: string
    description: Summary conclusion statement.
  timestamp:
    type: string
    description: Analysis timestamp in ISO 8601 format.
    format: date-time
required:
  - result_id
  - test_type
  - statistic
  - p_value
  - conclusion
  - timestamp
additionalProperties: false
