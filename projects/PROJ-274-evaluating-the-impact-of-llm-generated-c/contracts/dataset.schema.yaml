$schema: http://json-schema.org/draft-07/schema#
title: Participant Logs Schema
description: Schema for validating raw participant logs from the onboarding experiment.
type: object
required:
  - metadata
  - participants
properties:
  metadata:
    type: object
    required:
      - version
      - generated_at
      - total_participants
    properties:
      version:
        type: string
        description: Schema version identifier.
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation.
      total_participants:
        type: integer
        minimum: 0
        description: Total count of participants in the dataset.
  participants:
    type: array
    items:
      type: object
      required:
        - participant_id
        - condition
        - session_start
        - session_end
        - task_completed
      properties:
        participant_id:
          type: string
          pattern: '^P[0-9]{3}$'
          description: Unique participant identifier (e.g., P001).
        condition:
          type: string
          enum:
            - llm_docs
            - human_docs
            - no_docs
          description: Experimental condition assigned.
        session_start:
          type: string
          format: date-time
          description: ISO 8601 timestamp of session start.
        session_end:
          type: string
          format: date-time
          description: ISO 8601 timestamp of session end.
        task_completed:
          type: boolean
          description: Whether the participant completed the onboarding task.
        time_to_complete_seconds:
          type: number
          minimum: 0
          description: Duration in seconds.
        help_requests:
          type: array
          items:
            type: object
            required:
              - timestamp
              - content
            properties:
              timestamp:
                type: string
                format: date-time
              content:
                type: string
          description: List of help requests/clarification questions.
        cognitive_load_proxy:
          type: number
          minimum: 0
          description: Calculated composite score (count * avg_time).
        subjective_helpfulness:
          type: integer
          minimum: 1
          maximum: 5
          description: Likert scale rating (1-5).
        intervention_flag:
          type: boolean
          description: Whether a stop-loss intervention was triggered.
        time_capped:
          type: boolean
          description: Whether time was capped due to intervention.
        final_time:
          type: number
          minimum: 0
          description: Final recorded time (capped or actual).
        repo_id:
          type: string
          description: Identifier of the repository used.
        dropout_reason:
          type: string
          nullable: true
          description: Reason for dropout if applicable.
