[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "C901", # too complex (handled by separate complexity checks if needed)
]

[lint.per-file-ignores]
"tests/*" = ["S101", "B018"] # Allow asserts and unused expressions in tests

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
