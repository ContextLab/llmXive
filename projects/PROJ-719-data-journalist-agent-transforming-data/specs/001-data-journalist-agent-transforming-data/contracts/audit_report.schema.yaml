$schema: http://json-schema.org/draft-07/schema#
title: Audit Report Schema
description: Schema for the audit_report.json artifact summarizing pipeline execution.
type: object
properties:
  execution_summary:
    type: object
    properties:
      status:
        type: string
        enum: ["success", "partial_success", "failed", "NEEDS_CLARIFICATION"]
        description: "Status of the pipeline execution."
      duration_seconds:
        type: number
      scenario_id:
        type: string
    required:
      - status
      - duration_seconds
      - scenario_id
  metrics:
    type: object
    properties:
      claims_total:
        type: integer
      claims_mapped:
        type: integer
      assets_requested:
        type: integer
      assets_generated:
        type: integer
        description: "Count of assets generated natively (not placeholders)."
      assets_placeholder:
        type: integer
        description: "Count of assets generated as placeholders due to API failure."
      gold_standard_recall:
        type: number
        description: "Percentage of Gold Standard claims found in the registry."
      gold_standard_precision:
        type: number
        description: "Percentage of registry claims that match the Gold Standard."
      hallucination_rate:
        type: number
        description: "Percentage of registry claims that are not in the Gold Standard."
    required:
      - claims_total
      - claims_mapped
      - assets_requested
      - assets_generated
      - assets_placeholder
      - gold_standard_recall
      - gold_standard_precision
      - hallucination_rate
  errors:
    type: array
    items:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        agent:
          type: string
        error_type:
          type: string
        message:
          type: string
      required:
        - timestamp
        - agent
        - error_type
        - message
required:
  - execution_summary
  - metrics
  - errors