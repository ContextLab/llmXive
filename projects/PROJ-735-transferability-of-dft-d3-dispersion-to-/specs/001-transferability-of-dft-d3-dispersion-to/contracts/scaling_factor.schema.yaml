$schema: "http://json-schema.org/draft-07/schema#"
title: "Scaling Factor Schema"
description: "Schema for the scaling_factor.txt output containing the fitted scalar and statistics."
type: "object"
properties:
  scaling_factor:
    type: "number"
    description: "The fitted scalar s > 0 applied to the D3 term."
    minimum: 0
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% bootstrap confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% bootstrap confidence interval."
  p_value:
    type: "number"
    description: "P-value for the hypothesis test H0: s = 1.0."
  mae_corrected:
    type: "number"
    description: "Mean Absolute Error after applying the scaling factor."
  mae_original:
    type: "number"
    description: "Mean Absolute Error before scaling."
required:
  - scaling_factor
  - ci_lower
  - ci_upper
  - p_value
  - mae_corrected
  - mae_original
additionalProperties: false