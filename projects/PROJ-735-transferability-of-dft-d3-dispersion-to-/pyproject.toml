[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | \.egg
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["generate_synthetic_data", "setup_directories"]
skip = [".git", ".venv", "build", "dist"]