$schema: "http://json-schema.org/draft-07/schema#"
title: "PullRequest Schema"
description: "Schema for extracted and processed Pull Request data"
type: "object"
required:
  - pr_id
  - repo_name
  - diff_text
  - human_review_comments
  - linked_issue_ids
  - reviewer_count
  - is_llm_generated
  - status
properties:
  pr_id:
    type: "string"
    description: "Unique identifier for the PR (e.g., 'repo_name#12345')"
  repo_name:
    type: "string"
    description: "Repository name (e.g., 'microsoft/vscode')"
  diff_text:
    type: "string"
    description: "The full git diff content"
  human_review_comments:
    type: "array"
    description: "List of human review comments associated with the PR"
    items:
      type: "object"
      required:
        - comment_id
        - body
        - line_start
        - line_end
      properties:
        comment_id:
          type: "string"
        author:
          type: "string"
        body:
          type: "string"
        line_start:
          type: "integer"
          minimum: 1
        line_end:
          type: "integer"
          minimum: 1
        is_bug_report:
          type: "boolean"
  linked_issue_ids:
    type: "array"
    description: "List of linked issue IDs. Empty if none."
    items:
      type: "string"
  reviewer_count:
    type: "integer"
    description: "Count of unique authors in human_review_comments"
    minimum: 0
  is_llm_generated:
    type: "boolean"
    description: "Flag indicating if the code was likely generated by an LLM"
  status:
    type: "string"
    enum:
      - "processed"
      - "timeout"
      - "error"
    description: "Processing status of the PR"
  ground_truth_status:
    type: "string"
    enum:
      - "verified"
      - "unverified"
      - "potential"
    description: "Ground truth classification status"