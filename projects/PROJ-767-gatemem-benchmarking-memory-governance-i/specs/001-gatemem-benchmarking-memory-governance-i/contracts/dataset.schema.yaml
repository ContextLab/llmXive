$schema: "http://json-schema.org/draft-07/schema#"
title: "GateMem Synthetic Memory Dataset Schema"
type: "object"
description: "Schema for the synthetic memory dataset generated by data_gen.py"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for this generation run"
  n_principals:
    type: "integer"
    description: "Number of distinct principals (N)"
  seed:
    type: "integer"
    description: "Random seed used for generation"
  items:
    type: "array"
    description: "List of memory items"
    items:
      type: "object"
      required:
        - id
        - principal_id
        - content
        - template_type
        - position_seed
      properties:
        id:
          type: "string"
          description: "Unique memory item ID"
        principal_id:
          type: "string"
          description: "ID of the principal owning this memory"
        content:
          type: "string"
          description: "The text content of the memory"
        template_type:
          type: "string"
          description: "Category of the fact (e.g., profile, preference)"
          enum:
            - "profile"
            - "preference"
            - "history"
            - "fact"
        position_seed:
          type: "integer"
          description: "Seed used for position rotation to mitigate context bias"
  metadata:
    type: "object"
    description: "Generation metadata"
    properties:
      total_items:
        type: "integer"
        description: "Total count of items (should be N * items_per_principal)"
      generation_timestamp:
        type: "string"
        format: "date-time"
        description: "ISO 8601 timestamp of generation"
required:
  - run_id
  - n_principals
  - seed
  - items
  - metadata