$schema: "http://json-schema.org/draft-07/schema#"
title: "GateMem Task Log Output Schema"
type: "object"
description: "Schema for the raw task execution logs"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task"
  run_id:
    type: "string"
    description: "Reference to the context run"
  task_type:
    type: "string"
    description: "Type of task executed"
    enum:
      - "utility"
      - "access_control"
      - "suppression"
  target_principal:
    type: "string"
    description: "Principal ID targeted by the task"
  target_fact_id:
    type: "string"
    description: "Specific fact ID involved"
  prompt:
    type: "string"
    description: "Exact prompt sent to the model"
  response:
    type: "string"
    description: "Raw model response"
  eval_pass:
    type: "boolean"
    description: "Pass/Fail from rule-based evaluator"
  eval_semantic_score:
    type: "number"
    description: "Cosine similarity score from semantic verification"
    minimum: 0.0
    maximum: 1.0
  oracle_exists:
    type: "boolean"
    description: "True if the target fact exists in the ground-truth context"
  oracle_leak:
    type: "boolean"
    description: "True if the model revealed an existing fact inappropriately"
  overflow_flag:
    type: "boolean"
    description: "True if context window overflow occurred"
required:
  - task_id
  - run_id
  - task_type
  - target_principal
  - target_fact_id
  - prompt
  - response
  - eval_pass
  - eval_semantic_score
  - oracle_exists
  - oracle_leak
  - overflow_flag