$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult"
description: "Schema for statistical model output."
type: "object"
properties:
  analysis_id:
    type: "string"
    description: "Unique identifier for the analysis run."
  model_formula:
    type: "string"
    description: "String representation of the LMM formula."
  predictor:
    type: "string"
    description: "Name of the predictor variable."
  estimate:
    type: "number"
    description: "Fixed effect coefficient."
  std_err:
    type: "number"
    description: "Standard error."
  t_value:
    type: "number"
    description: "T-statistic."
  p_value:
    type: "number"
    description: "Raw p-value."
  p_value_adj:
    type: "number"
    description: "Benjamini-Hochberg adjusted p-value."
  ci_lower:
    type: "number"
    description: "95% CI lower bound."
  ci_upper:
    type: "number"
    description: "95% CI upper bound."
  vif:
    type: "number"
    description: "Variance Inflation Factor."
  effect_size:
    type: "number"
    description: "Effect size (e.g., Cohen's d)."
  significance_flag:
    type: "boolean"
    description: "True if p_value_adj < alpha."
required:
  - analysis_id
  - model_formula
  - predictor
  - estimate
  - std_err
  - t_value
  - p_value
  - p_value_adj
  - ci_lower
  - ci_upper
  - vif
  - effect_size
  - significance_flag
