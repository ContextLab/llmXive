$schema: http://json-schema.org/draft-07/schema#
title: Analysis Results Schema
description: Schema for the output of the statistical analysis pipeline.
type: object
properties:
  model_formula:
    type: string
    description: "The LMM formula string used."
  fixed_effects:
    type: array
    items:
      type: object
      properties:
        term:
          type: string
        estimate:
          type: number
        std_err:
          type: number
        p_value:
          type: number
        adj_p_value:
          type: number
        ci_lower:
          type: number
        ci_upper:
          type: number
      required:
        - term
        - estimate
        - p_value
        - adj_p_value
  random_effects:
    type: array
    items:
      type: object
      properties:
        group:
          type: string
        variance:
          type: number
  vif_scores:
    type: object
    additionalProperties:
      type: number
    description: "Variance Inflation Factors for predictors."
  sensitivity_analysis:
    type: array
    items:
      type: object
      properties:
        alpha:
          type: number
        significant_count:
          type: integer
      required:
        - alpha
        - significant_count
  fwer_estimate:
    type: number
    description: "Estimated Family-Wise Error Rate from permutation test."
  diagnostics:
    type: object
    properties:
      shapiro_wilk_p:
        type: number
      residuals_normal:
        type: boolean
required:
  - model_formula
  - fixed_effects
  - vif_scores
  - sensitivity_analysis
  - fwer_estimate
additionalProperties: false