$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult"
description: "Schema for the output of the linear mixed-effects model and sensitivity analysis."
type: "object"
properties:
  model_id:
    type: "string"
    description: "Identifier for the specific model run."
  predictor:
    type: "string"
    description: "Name of the predictor variable (e.g., 'entropy')."
  estimate:
    type: "number"
    description: "Fixed effect estimate (coefficient)."
  std_error:
    type: "number"
    description: "Standard error of the estimate."
  p_value:
    type: "number"
    description: "Raw p-value."
  p_value_adj:
    type: "number"
    description: "Benjamini-Hochberg adjusted p-value."
  ci_lower:
    type: "number"
    description: "Lower bound of 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of 95% confidence interval."
  vif:
    type: "number"
    description: "Variance Inflation Factor for the predictor."
  effect_size:
    type: "number"
    description: "Cohen's d or similar effect size metric."
  sensitivity_sd:
    type: "number"
    description: "Standard deviation of effect sizes across alpha sweep (FR-005b)."
required:
  - "model_id"
  - "predictor"
  - "estimate"
  - "p_value"
  - "p_value_adj"
  - "vif"
  - "effect_size"
additionalProperties: false
