$schema: "http://json-schema.org/draft-07/schema#"
title: "ParticipantSession"
description: "Schema for a participant's session data including cognitive load metrics."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Anonymized unique ID for the participant."
  session_id:
    type: "string"
    description: "Unique ID for the specific session."
  stimulus_id:
    type: "string"
    description: "ID of the background image shown."
  nasa_tlx_score:
    type: "number"
    description: "NASA-TLX cognitive load score (0-100)."
  reaction_time_ms:
    type: "number"
    description: "Mean reaction time in milliseconds for the post-task."
  baseline_reaction_time_ms:
    type: "number"
    description: "Mean reaction time from the baseline condition."
  task_difficulty:
    type: "integer"
    description: "Self-reported task difficulty (1-7)."
  is_baseline:
    type: "boolean"
    description: "True if this is the baseline control condition."
required:
  - "participant_id"
  - "session_id"
  - "stimulus_id"
  - "nasa_tlx_score"
  - "reaction_time_ms"
  - "baseline_reaction_time_ms"
  - "task_difficulty"
  - "is_baseline"
additionalProperties: false
