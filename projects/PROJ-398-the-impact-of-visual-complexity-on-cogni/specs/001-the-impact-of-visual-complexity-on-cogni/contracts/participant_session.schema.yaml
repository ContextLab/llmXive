$schema: "http://json-schema.org/draft-07/schema#"
title: "ParticipantSession"
description: "Schema for a participant's session data including cognitive load metrics."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Anonymized unique ID for the participant."
  session_id:
    type: "string"
    description: "Unique ID for the specific session."
  stimulus_id:
    type: "string"
    description: "ID of the background image shown."
  nasa_tlx_score:
    type: "number"
    description: "NASA-TLX cognitive load score (0-100)."
  reaction_time_ms:
    type: number
    description: "Mean reaction time in milliseconds."
    minimum: 0
  accuracy_pct:
    type: number
    description: "Accuracy percentage of the reaction-time task."
    minimum: 0
    maximum: 100
  task_condition:
    type: string
    enum: ["1-back", "2-back"]
    description: "Objective task difficulty condition (1-back = low, 2-back = high)."
  baseline_reaction_time_ms:
    type: number
    description: "Baseline reaction time from the control condition."
    minimum: 0
  is_baseline_trial:
    type: boolean
    description: "True if this is the baseline control condition."
required:
  - session_id
  - participant_id
  - clip_id
  - nasa_tlx_score
  - reaction_time_ms
  - accuracy_pct
  - task_condition
  - baseline_reaction_time_ms
  - is_baseline_trial
additionalProperties: false
