$schema: "http://json-schema.org/draft-07/schema#"
title: "ParticipantSession"
description: "Schema for a single participant session in the study."
type: "object"
properties:
  session_id:
    type: "string"
    description: "Unique identifier for the session."
  participant_id:
    type: "string"
    description: "Unique participant identifier."
  stimulus_id:
    type: "string"
    description: "Reference to BackgroundFrame.frame_id."
  task_condition:
    type: "string"
    enum: ["1-back", "2-back"]
    description: "Objective task difficulty condition."
  nasa_tlx_score:
    type: "number"
    description: "Subjective cognitive load score (0-100)."
  reaction_time_ms:
    type: "number"
    description: "Mean reaction time in milliseconds."
  accuracy_pct:
    type: "number"
    description: "Accuracy percentage (0-100)."
  is_missing:
    type: "boolean"
    description: "Flag for missing data."
  excluded:
    type: "boolean"
    description: "Flag for exclusion."
required:
  - session_id
  - participant_id
  - stimulus_id
  - task_condition
  - nasa_tlx_score
  - reaction_time_ms
  - accuracy_pct
  - is_missing
  - excluded
