$schema: http://json-schema.org/draft-07/schema#
title: BackgroundFrame
description: "Represents a single frame from a meeting video with computed visual complexity metrics."
type: object
properties:
  frame_id:
    type: string
    description: "Unique identifier for the frame/image."
  entropy:
    type: number
    description: "Image entropy value (complexity measure)."
  color_variance:
    type: number
    description: "Variance of color channels in the image."
  object_count:
    type: integer
    description: "Number of objects detected by YOLOv8n."
    minimum: 0
  texture_score:
    type: number
    description: "Aggregate magnitude of Gabor filter responses (texture complexity)."
    minimum: 0
  lbp_entropy:
    type: number
    description: "Entropy of the Local Binary Pattern histogram."
    minimum: 0
required:
  - frame_id
  - entropy
  - color_variance
  - object_count
  - texture_score
  - lbp_entropy
additionalProperties: false
