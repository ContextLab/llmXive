$schema: "http://json-schema.org/draft-07/schema#"
title: BackgroundFrame
description: "Represents a single frame from a meeting video with computed visual complexity metrics."
type: object
properties:
  frame_id:
    type: string
    description: "Unique identifier for the frame."
  entropy:
    type: number
    description: "Shannon entropy of the grayscale image histogram."
    minimum: 0
  color_variance:
    type: number
    description: "Standard deviation of RGB channel values."
    minimum: 0
  object_count:
    type: integer
    description: "Number of objects detected by YOLOv8n."
    minimum: 0
required:
  - frame_id
  - entropy
  - color_variance
  - object_count
additionalProperties: false
