$schema: http://json-schema.org/draft-07/schema#
title: Stimulus Metrics Schema
description: Schema for the computed visual complexity metrics of background images.
type: object
properties:
  stimulus_id:
    type: string
    description: "Unique identifier for the stimulus (e.g., img_001)."
  filename:
    type: string
    description: "Relative path to the image file."
  entropy:
    type: number
    description: "Shannon entropy of the grayscale image."
    minimum: 0
  color_variance:
    type: number
    description: "Variance of the HSV saturation channel."
    minimum: 0
  object_count:
    type: integer
    description: "Number of objects detected by YOLOv8n."
  texture_score:
    type: "number"
    description: "Aggregate magnitude of Gabor filter responses."
  lbp_entropy:
    type: "number"
    description: "Entropy of the Local Binary Pattern histogram."
  complexity_score:
    type: ["number", "null"]
    description: "Optional composite complexity score (from PCA)."
  checksum:
    type: string
    description: "SHA-256 checksum of the source image file."
required:
  - stimulus_id
  - filename
  - entropy
  - color_variance
  - object_count
  - texture_score
  - lbp_entropy
  - checksum
