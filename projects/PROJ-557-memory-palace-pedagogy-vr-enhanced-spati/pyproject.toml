[project]
name = "memory-palace-pedagogy-vr-enhanced-spati"
version = "0.1.0"
description = "Memory Load-Adaptive Text Presentation for Abstract Concept Retention"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scipy",
    "statsmodels",
    "pyarrow",
    "openneuro-py",
    "transformers",
    "pytest",
]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "PL"]
ignore = ["E501", "PLR0913"]

[tool.ruff.lint.isort]
known-first-party = ["code", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
