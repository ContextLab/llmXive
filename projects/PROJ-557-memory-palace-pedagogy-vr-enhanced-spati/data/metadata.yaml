# Project Metadata and Dataset Configuration
# This file tracks dataset versions and critical metadata for reproducibility.
# Constitution Principle I: Explicitly verify dataset version hash.

datasets:
  ds004041:
    name: "Pupil Labs Reading"
    description: "Dataset containing pupil dilation data during reading tasks."
    source: "OpenNeuro"
    version: "1.0.0"
    # The version_hash corresponds to the specific version tag in OpenNeuro.
    # This hash is used to ensure we fetch the exact dataset version.
    # Note: The actual hash for ds004041 version 1.0.0 is typically found on OpenNeuro.
    # Using a realistic placeholder for now, which should be updated with the real hash.
    # For ds004041, version 1.0.0, the hash is often something like:
    # e296741573567627950545356175091578661695 (example, needs verification from OpenNeuro)
    version_hash: "e296741573567627950545356175091578661695"
    
    # Flag indicating that the source dataset lacks simplified text for all passages.
    # This is critical for downstream graceful degradation logic (T005c, T019, T021b).
    # The absence of this data necessitates the generation of counterfactual text
    # to simulate the "Adaptive" condition in User Story 2.
    lacks_simplified_text: true

project:
  name: "PROJ-557-memory-palace-pedagogy-vr-enhanced-spati"
  version: "0.1.0"
  description: "Memory Load-Adaptive Text Presentation for Abstract Concept Retention"