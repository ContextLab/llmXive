$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
type: object
description: "Schema for the final statistical results exported to CSV."
required:
  - term
  - estimate
  - std_error
  - p_value
  - ci_lower
  - ci_upper
  - test_type
properties:
  term:
    type: string
    description: "Name of the model term (e.g., 'ProportionHighLoad', 'PassageType', 'ProportionHighLoad:PassageType')."
  estimate:
    type: number
    description: "Beta coefficient (effect size)."
  std_error:
    type: number
    description: "Standard error of the estimates."
  p_value:
    type: number
    description: "P-value from the likelihood-ratio test."
  ci_lower:
    type: number
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: number
    description: "Upper bound of the 95% confidence interval."
  test_type:
    type: string
    enum:
      - "LME_LRT"
      - "Permutation"
    description: "Type of statistical test performed."
  threshold_sd:
    type: number
    description: "CLI threshold used (0.3, 0.5, or 0.7) for sensitivity analysis. Null for primary."