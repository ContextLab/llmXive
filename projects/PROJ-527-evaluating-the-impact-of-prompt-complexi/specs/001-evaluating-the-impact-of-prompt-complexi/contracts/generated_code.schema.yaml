$schema: "http://json-schema.org/draft-07/schema#"
title: "GeneratedCode Schema"
description: "Schema for LLM-generated code and its evaluation metrics"
type: "object"
properties:
  generation_id:
    type: "string"
    description: "Unique identifier for the generation"
  variant_id:
    type: "string"
    description: "Foreign key to PromptVariant"
  code_text:
    type: "string"
    description: "The generated code content"
  execution_status:
    type: "string"
    enum:
      - "success"
      - "syntax_error"
      - "runtime_error"
      - "timeout"
    description: "Result of executing the code against unit tests"
  exception_message:
    type: "string"
    description: "Error message if execution failed"
  pass_count:
    type: "integer"
    description: "Number of unit tests passed"
  fail_count:
    type: "integer"
    description: "Number of unit tests failed"
  lines_of_code:
    type: "integer"
    description: "Number of lines in the generated code"
  cyclomatic_complexity:
    type: "number"
    description: "Cyclomatic complexity metric from static analysis"
  readability_score:
    type: "number"
    description: "Aggregated readability score from ruff/pylint"
required:
  - "generation_id"
  - "variant_id"
  - "code_text"
  - "execution_status"
  - "pass_count"
  - "fail_count"
  - "lines_of_code"
  - "cyclomatic_complexity"
  - "readability_score"
additionalProperties: false