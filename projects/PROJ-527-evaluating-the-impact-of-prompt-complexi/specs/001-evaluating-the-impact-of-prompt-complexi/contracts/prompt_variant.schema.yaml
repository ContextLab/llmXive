$schema: "http://json-schema.org/draft-07/schema#"
title: "PromptVariant Schema"
description: "Schema for a generated prompt variant with complexity metadata"
type: "object"
properties:
  variant_id:
    type: "string"
    description: "Unique identifier for the variant (e.g., 'problem_id_complexity')"
  problem_id:
    type: "string"
    description: "Foreign key to HumanEvalProblem"
  complexity_label:
    type: "string"
    enum:
      - "simple"
      - "moderate"
      - "complex"
      - "very_complex"
      - "degenerate"
    description: "Assigned complexity tier"
  prompt_text:
    type: "string"
    description: "The full text of the prompt sent to the LLM"
  token_count:
    type: "integer"
    description: "Number of tokens in the prompt (using tiktoken cl100k_base)"
  structural_element_count:
    type: "integer"
    description: "Count of structural elements (examples, constraints, instructions)"
  structural_complexity_score:
    type: "number"
    description: "Weighted score based on element types (e.g., examples=1, constraints=2)"
  residualized_structure_score:
    type: "number"
    description: "Residual of structural_count regressed on token_count (for collinearity control)"
required:
  - "variant_id"
  - "problem_id"
  - "complexity_label"
  - "prompt_text"
  - "token_count"
  - "structural_element_count"
  - "structural_complexity_score"
  - "residualized_structure_score"
additionalProperties: false