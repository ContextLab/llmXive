[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-prompt-complexity"
version = "0.1.0"
description = "Evaluating the Impact of Prompt Complexity on LLM Code Generation Performance"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "datasets",
    "tiktoken",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "ruff",
    "requests",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
# Target Python version
target-version = "py311"

# Line length configuration
line-length = 100

# Enable specific linting rules
lint.select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort (import sorting)
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "N",    # pep8-naming
]
lint.ignore = [
    "E501", # Line too long (handled by formatter)
    "B008", # Do not perform function call in argument defaults (common in Pydantic/requests)
]

# Per-file ignores (if needed)
# lint.per-file-ignores = {}

[tool.ruff.lint.isort]
known-first-party = ["models", "data", "prompts", "llm", "utils", "execution", "analysis"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--verbose",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Marks tests that take a long time",
    "us1: User Story 1 tests",
    "us2: User Story 2 tests",
    "us3: User Story 3 tests",
]

[tool.coverage.run]
source = ["code"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]