[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-prompt-complexity"
version = "0.1.0"
description = "Evaluating the Impact of Prompt Complexity on LLM Code Generation Performance"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "tiktoken",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "ruff",
    "requests",
    "pyyaml",
    "numpy",
    "scipy",
    "pydantic"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0"
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    "data",
    "state",
    "venv",
    ".venv"
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
]

[tool.ruff.lint.per-file-ignores]
"code/__init__.py" = ["F401"]
"tests/*" = ["S101"] # allow asserts in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Marks tests that take a long time to run"
]