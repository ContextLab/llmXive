line-length = 100
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "W",  # pycodestyle warnings
    "I",  # isort
    "N",  # pep8-naming
    "UP", # pyupgrade
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "ARG", # flake8-unused-arguments
]
ignore = [
    "E501", # Line too long (handled by black)
]

[lint.isort]
known-first-party = ["code"]
