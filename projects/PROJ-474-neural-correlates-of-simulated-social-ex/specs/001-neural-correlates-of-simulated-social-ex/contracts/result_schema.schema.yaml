$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Result Schema"
description: "Schema for the final statistical output of the connectivity analysis."
type: "object"
properties:
  metric:
    type: "string"
    description: "Name of the metric (e.g., 'mean_absolute_correlation')."
  condition_comparison:
    type: "string"
    description: "Comparison being made (e.g., 'inclusion vs exclusion')."
  p_value:
    type: "number"
    description: "P-value from the permutation test."
  effect_size:
    type: "number"
    description: "Effect size (e.g., Cohen's d)."
  confidence_interval:
    type: "array"
    description: "95% Confidence Interval [lower, upper]."
    items:
      type: "number"
    minItems: 2
    maxItems: 2
  is_associational:
    type: "boolean"
    description: "True if the result is framed as associational."
  edge_p_values:
    type: "object"
    description: "P-values for each DMN edge."
    additionalProperties:
      type: "number"
  edge_p_values_fdr:
    type: "object"
    description: "FDR-corrected p-values for each DMN edge."
    additionalProperties:
      type: "number"
  n_subjects:
    type: "integer"
    description: "Number of subjects included in the analysis."
  motion_threshold:
    type: "number"
    description: "Motion threshold used for exclusion (mm)."
  sensitivity_curve:
    type: "array"
    description: "Optional sensitivity analysis results across thresholds."
    items:
      type: "object"
      properties:
        threshold:
          type: "number"
        p_value:
          type: "number"
      required:
        - "threshold"
        - "p_value"
required:
  - "metric"
  - "condition_comparison"
  - "p_value"
  - "effect_size"
  - "confidence_interval"
  - "is_associational"
  - "edge_p_values"
  - "edge_p_values_fdr"
  - "n_subjects"
  - "motion_threshold"
additionalProperties: false