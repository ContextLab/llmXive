# Project Configuration for Neural Correlates of Simulated Social Exclusion
paths:
  data_raw: data/raw
  data_processed: data/processed
  data_results: data/results
  src: src
  tests: tests

qc:
  motion_threshold_mm: 3.0
  min_subjects: 10

processing:
  atlas: "Harvard-Oxford"
  radius_mm: 50

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
