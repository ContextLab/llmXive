$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Log Schema"
description: "Schema for the execution logs generated by the dual-track and monolithic agents."
type: object
properties:
  log_id:
    type: string
    description: "Unique identifier for the execution log entry."
  task_id:
    type: string
    description: "Reference to the task instance in the filtered dataset."
  architecture:
    type: string
    enum:
      - "dual_track"
      - "monolithic"
    description: "The type of agent architecture used."
  seed_id:
    type: integer
    description: "The random seed used for generation."
  step_index:
    type: integer
    description: "The step number in the generated plan."
  action:
    type: string
    description: "The action generated by the agent."
  initial_violation:
    type: boolean
    description: "True if the Independent Oracle detected a violation in the raw SLM output."
  final_adherence:
    type: boolean
    description: "True if the final output (post-correction) adhered to constraints."
  constraint_triggered:
    type: string
    nullable: true
    description: "The specific constraint that was violated, if any."
  resolution_type:
    type: string
    enum:
      - "none"
      - "forced_revision"
      - "accepted"
    description: "How the system handled the violation."
  status:
    type: string
    enum:
      - "passed"
      - "failed"
      - "implicit_unverified"
      - "parsing_failure"
    description: "Final status of the step."
  cpu_usage:
    type: number
    description: "CPU usage percentage during the step."
  memory_mb:
    type: number
    description: "Memory usage in MB during the step."
required:
  - log_id
  - task_id
  - architecture
  - seed_id
  - step_index
  - action
  - initial_violation
  - final_adherence
  - resolution_type
  - status
  - cpu_usage
  - memory_mb
additionalProperties: false