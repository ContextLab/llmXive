$schema: http://json-schema.org/draft-07/schema#
title: Execution Log Schema
description: Schema for execution logs generated by monolithic and dual-track agents.
type: object
required:
  - task_id
  - constraint_count
  - generated_plan
  - violation_boolean
  - violation_reason
  - final_score
properties:
  task_id:
    type: string
    description: Unique identifier for the task
  constraint_count:
    type: integer
    description: Number of progressive constraints in the task
  generated_plan:
    type: string
    description: The plan generated by the agent
  violation_boolean:
    type: boolean
    description: Whether any constraint violations were detected
  violation_reason:
    type: ["string", "null"]
    description: Reason for violation if any, null otherwise
  final_score:
    type: number
    description: Final score of the execution
additionalProperties: false