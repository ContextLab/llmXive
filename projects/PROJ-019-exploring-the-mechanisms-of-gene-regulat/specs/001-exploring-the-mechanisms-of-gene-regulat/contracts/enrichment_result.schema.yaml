$schema: "http://json-schema.org/draft-07/schema#"
title: "Enrichment Result Schema"
description: "Schema for motif enrichment analysis results"
type: object
properties:
  motif_id:
    type: string
    description: "JASPAR motif ID"
  cell_type:
    type: string
    description: "Target cell type"
    enum:
      - "GM12878"
      - "K562"
      - "HepG2"
      - "H1-hESC"
      - "IMR90"
  observed_count:
    type: integer
    description: "Number of peaks containing the motif"
    minimum: 0
  expected_count:
    type: number
    description: "Expected count based on background model"
    minimum: 0
  p_value:
    type: number
    description: "Fisher's exact test p-value"
    minimum: 0.0
    maximum: 1.0
  q_value:
    type: number
    description: "BH-corrected q-value"
    minimum: 0.0
    maximum: 1.0
  odds_ratio:
    type: number
    description: "Odds ratio of enrichment"
    minimum: 0
  validation_overlap:
    type: number
    description: "Overlap percentage with independent ChIP-seq (if available)"
    minimum: 0.0
    maximum: 100.0
    nullable: true
  validation_status:
    type: string
    description: "Validation status"
    enum:
      - "passed"
      - "failed"
      - "no_data"
      - "pending"
required:
  - motif_id
  - cell_type
  - observed_count
  - p_value
  - q_value
  - odds_ratio
additionalProperties: false
