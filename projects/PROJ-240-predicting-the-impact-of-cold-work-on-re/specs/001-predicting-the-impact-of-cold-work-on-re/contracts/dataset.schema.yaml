$schema: "http://json-schema.org/draft-07/schema#"
title: "AlloyExperimentDataset"
description: "Schema for raw and processed experimental data on aluminum alloy recrystallization."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      source:
        type: "string"
        description: "Source of the data (e.g., 'NIST', 'Simulated', 'User Provided')."
      generated_at:
        type: "string"
        format: "date-time"
        description: "ISO timestamp of generation."
      checksum:
        type: "string"
        description: "SHA256 checksum of the raw data file."
    required:
      - source
      - generated_at
  columns:
    type: "array"
    items:
      type: "string"
    description: "List of column names in the dataset."
  data_sample:
    type: "array"
    items:
      type: "object"
      properties:
        cold_work_pct:
          type: "number"
          minimum: 0
          maximum: 100
          description: "Percentage of cold work deformation."
        mg_wt:
          type: "number"
          minimum: 0
          description: "Magnesium weight percentage."
        si_wt:
          type: "number"
          minimum: 0
          description: "Silicon weight percentage."
        cu_wt:
          type: "number"
          minimum: 0
          description: "Copper weight percentage."
        mn_wt:
          type: "number"
          minimum: 0
          description: "Manganese weight percentage."
        annealing_temp_k:
          type: "number"
          minimum: 273.15
          description: "Annealing temperature in Kelvin."
        time_to_peak:
          type: "number"
          minimum: 0
          description: "Time to peak softening in minutes."
        id:
          type: "string"
          description: "Unique row identifier."
      required:
        - cold_work_pct
        - annealing_temp_k
        - time_to_peak
        - id
required:
  - metadata
  - columns
  - data_sample
