  reviewer: methodology
  round: 1
  severity: methodology
  text: "The plan proposes comparing CPU FPS against a paper claim likely derived\
    \ from GPU hardware using a '\xB120% variance' tolerance. This is a causal validity\
    \ failure: comparing raw FPS across different hardware architectures (CPU vs GPU)\
    \ does not validate the 'Real-Time' claim or the efficiency of the distillation\
    \ method. The methodology must isolate the algorithmic speedup (e.g., comparing\
    \ distilled vs. non-distilled on the *same* CPU) rather than comparing absolute\
    \ throughput across hardware."
- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: methodology-7769fb78
