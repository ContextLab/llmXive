- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: methodology-9db57887
  location: research.md:Flicker Detection (Temporal Stability)
  reviewer: methodology
  round: 1
  severity: methodology
  text: The flicker detection method relies on a 'defined threshold' derived from
    SC-004 but does not specify how this threshold is determined. Setting a static
    threshold for frame-difference (L2 norm) without empirical calibration or a control
    sequence (e.g., a static video processed by the model) risks false positives/negatives.
    The methodology must define a calibration step to establish the noise floor of
    the pipeline before setting the flicker threshold.
- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: methodology-c70e42c9
  location: 'plan.md:Phase 0: Research & Feasibility Verification'
  reviewer: methodology
  round: 1
  severity: methodology
  text: Phase 0 aims to 'identify memory bottlenecks' but does not include a plan
    to measure the *impact* of chunking on temporal consistency. Chunked processing
    in diffusion models often introduces boundary artifacts (flickering at chunk seams).
    The methodology fails to account for this specific confound; if chunking introduces
    flicker, the 'background stability' metric will fail regardless of the model's
    quality. The plan must include a specific test for chunk-boundary artifacts.
