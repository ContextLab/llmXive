- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: scientific_soundness-cb7e433f
  location: research.md:Methodology & Statistical Rigor -> 2. Background Stability
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: 'The plan validates ''background stability'' by computing PSNR/SSIM between
    the input video''s non-masked regions and the output video''s non-masked regions.
    In a diffusion-based editing pipeline, the model is explicitly trained to preserve
    the background. Therefore, the output background is a deterministic function of
    the input background (plus minor noise). Comparing Input-Background to Output-Background
    is a tautological validation: it measures ''how well the model copied the input''
    rather than ''how well the model preserved the background during editing''. If
    the model fails to edit the foreground, the background PSNR will be perfect, falsely
    validating the claim. The validation target must be independent of the input (e.g.,
    comparing against a ground-truth ''clean'' background sequence or a baseline method)
    to be scientifically sound.'
- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: scientific_soundness-d9924ee8
  location: research.md:Methodology & Statistical Rigor -> 3. Flicker Detection
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan defines flicker detection as computing the frame-to-frame difference
    of the *background* pixels. This is circular if the 'background' is defined as
    the non-masked region of the *input* video. If the input video has a static background,
    the difference will be zero regardless of whether the model introduces flicker
    in the *output*. The metric must measure the temporal variance of the *output*
    background pixels against a reference of 'static' (e.g., variance of the mean
    background frame), not against the input frames. Comparing Output-Frame(t) to
    Input-Frame(t) for background regions conflates 'editing accuracy' with 'temporal
    stability'.
- artifact: projects/PROJ-807-liveedit-towards-real-time-diffusion-bas/specs/001-liveedit-towards-real-time-diffusion-bas/plan.md
  id: scientific_soundness-945664e6
  location: research.md:Methodology & Statistical Rigor -> 1. Inference Speed Measurement
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: "The plan compares CPU FPS to a paper claim of 12.66 FPS (likely GPU) using\
    \ a \xB120% tolerance. This is methodologically unsound. CPU and GPU inference\
    \ have fundamentally different computational characteristics (latency vs. throughput,\
    \ memory bandwidth bottlenecks). A 20% variance is arbitrary and scientifically\
    \ meaningless when comparing across hardware architectures. The validation should\
    \ either: (a) compare the CPU result against a *CPU baseline* (e.g., standard\
    \ diffusion without distillation) to prove the *relative* speedup, or (b) explicitly\
    \ state that the 'Real-Time' claim is untestable on this hardware and only the\
    \ *method's feasibility* is being validated. Claiming to validate a specific FPS\
    \ number across hardware is a category error."
