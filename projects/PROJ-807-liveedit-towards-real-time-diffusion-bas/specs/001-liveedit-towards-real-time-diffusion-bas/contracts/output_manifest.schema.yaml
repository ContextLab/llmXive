$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  output_video_path:
    type: string
    description: "Path to the generated edited video"
  input_video_path:
    type: string
    description: "Path to the original input video"
  frame_count:
    type: integer
    description: "Number of frames in the output video"
  resolution:
    type: string
    description: "Resolution of the video (e.g., 720p)"
  processing_chunks:
    type: integer
    description: "Number of chunks processed"
required:
  - output_video_path
  - input_video_path
  - frame_count
  - resolution
  - processing_chunks
additionalProperties: false
