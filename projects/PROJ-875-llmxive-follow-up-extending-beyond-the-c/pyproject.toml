[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "llmXive follow-up: Extending Beyond the Current Observation"
requires-python = ">=3.9"
dependencies = [
    "transformers==4.40.0",
    "bitsandbytes==0.43.1",
    "scikit-learn==1.5.0",
    "sentence-transformers==3.0.1",
    "numpy==1.26.4",
    "pandas==2.2.2",
    "pytest==8.2.0",
    "pyyaml==6.0.1",
    "datasets==2.19.1",
    "sentencepiece==0.2.0",
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Enable rules: E (pycodestyle), F (Pyflakes), W (warning), I (isort), N (pep8-naming)
select = ["E", "F", "W", "I", "N"]
target-version = "py39"
line-length = 88

[tool.ruff.isort]
known-first-party = ["code", "utils"]
force-sort-within-sections = true