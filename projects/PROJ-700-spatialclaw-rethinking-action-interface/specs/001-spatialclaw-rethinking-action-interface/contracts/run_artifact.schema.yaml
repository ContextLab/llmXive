$schema: "http://json-schema.org/draft-07/schema#"
title: "SpatialClaw Run Artifact"
type: "object"
required:
  - "run_id"
  - "dataset_name"
  - "subset_size"
  - "model_config"
  - "samples"
  - "resource_usage"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run"
  dataset_name:
    type: "string"
    description: "Name of the dataset used (e.g., 'BLINK')"
  subset_size:
    type: "integer"
    description: "Number of samples processed"
  model_config:
    type: "object"
    description: "Configuration of the model used"
    properties:
      name:
        type: "string"
      cpu_compatible:
        type: "boolean"
  samples:
    type: "array"
    description: "List of processed samples"
    items:
      type: "object"
      required:
        - "sample_id"
        - "status"
      properties:
        sample_id:
          type: "string"
        input:
          type: "string"
          description: "The question or task"
        intermediate_steps:
          type: "array"
          description: "List of code blocks and VLM responses"
          items:
            type: "object"
            properties:
              step_type:
                type: "string"
                enum: ["code", "response", "error"]
              content:
                type: "string"
        final_answer:
          type: "string"
        status:
          type: "string"
          enum: ["success", "error", "unanswerable"]
        accuracy:
          type: "boolean"
          description: "Whether the answer matches ground truth"
  resource_usage:
    type: "object"
    description: "Resource consumption metrics"
    required:
      - "peak_ram_mb"
      - "cpu_time_sec"
    properties:
      peak_ram_mb:
        type: "number"
        description: "Peak memory usage in MB"
      cpu_time_sec:
        type: "number"
        description: "Total CPU time in seconds"
      gpu_detected:
        type: "boolean"
        description: "Whether GPU was detected (should be false)"
  status:
    type: "string"
    enum: ["completed", "failed", "aborted"]
    description: "Final status of the run"
  error_message:
    type: "string"
    description: "Error message if status is failed or aborted"
