[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in config)
]

[lint.isort]
known-first-party = ["graph_utils", "data_loader", "runner", "inference", "strategies"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
