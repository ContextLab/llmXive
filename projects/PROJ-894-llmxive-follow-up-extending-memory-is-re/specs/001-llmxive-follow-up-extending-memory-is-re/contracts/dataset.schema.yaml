$schema: "http://json-schema.org/draft-07/schema#"
title: "LoCoMo Dataset Schema"
description: "Schema for the raw LoCoMo benchmark dataset."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  question:
    type: "string"
    description: "The reasoning query."
  context:
    type: "string"
    description: "The supporting text or context for the query."
  ground_truth:
    type: "string"
    description: "The expected answer for the query."
required:
  - task_id
  - question
  - context
  - ground_truth
additionalProperties: false
