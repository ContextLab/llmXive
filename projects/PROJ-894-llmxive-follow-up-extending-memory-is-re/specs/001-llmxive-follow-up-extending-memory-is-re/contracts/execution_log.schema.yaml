$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Log Schema"
description: "Schema for the output CSV/JSON of the strategy execution engine. Validates FR-001 through FR-007 and Constitution Principle VI."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the benchmark task."
  strategy:
    type: "string"
    enum:
      - "Full"
      - "Lazy"
      - "Greedy"
    description: "The traversal strategy used."
  accuracy:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Alignment with ground truth (0.0 to 1.0)."
  nodes_visited:
    type: "integer"
    minimum: 0
    description: "Count of nodes traversed during reconstruction."
  inference_time_seconds:
    type: "number"
    minimum: 0.0
    description: "Total execution time in seconds."
  token_count:
    type: "integer"
    minimum: 0
    description: "Total tokens generated/consumed (Constitution Principle VI)."
  status:
    type: "string"
    enum:
      - "completed"
      - "timeout"
      - "error"
      - "unresolved"
      - "degenerate"
      - "invalid_graph"
    description: "Execution outcome status."
  error_message:
    type: "string"
    description: "Error details if status is not completed."
required:
  - task_id
  - strategy
  - accuracy
  - nodes_visited
  - inference_time_seconds
  - token_count
  - status
additionalProperties: false
