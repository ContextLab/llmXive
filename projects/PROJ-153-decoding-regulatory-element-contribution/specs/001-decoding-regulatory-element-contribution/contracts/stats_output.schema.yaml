$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalSummaryOutput"
description: "Schema for the statistical summary report data."
type: object
properties:
  stress_condition:
    type: string
    enum: ["heat_shock", "osmotic", "oxidative"]
    description: "Stress condition analyzed."
  total_peaks:
    type: integer
    description: "Total number of peaks called."
  significant_cres:
    type: integer
    description: "Number of CREs with q-value <= 0.05."
  beta_1_estimate:
    type: number
    description: "LMM fixed effect estimate (raw)."
  beta_1_simex:
    type: number
    description: "SIMEX‑corrected β₁ estimate."
  measurement_error_variance:
    type: number
    description: "Estimated variance of measurement error for ΔPeakSignal."
  beta_1_p_value_raw:
    type: number
    description: "Raw p‑value from LMM."
  beta_1_p_value_adj:
    type: number
    description: "FDR‑adjusted p‑value."
  empirical_p_value:
    type: number
    description: "Empirical p‑value from 10,000 permutations."
  delta_r_squared:
    type: number
    description: "Variance explained by CRE signal (ΔR²)."
  go_enrichment_odds_ratio:
    type: number
    description: "Odds ratio for GO stress‑response enrichment."
  go_enrichment_fdr:
    type: number
    description: "FDR for GO enrichment."
  summit_match_pct_top10:
    type: number
    description: "Percentage of top‑10 CRE summits that match bigWig signal within ±5 bp."
  atc_validation_status:
    type: string
    enum: ["validated", "unvalidated"]
    description: "Status of ATAC validation (validated if ATAC data present and used; unvalidated if ATAC data missing)."
  causal_limitation_note:
    type: string
    description: "Disclaimer that results are associational and not causal."
required:
  - stress_condition
  - total_peaks
  - significant_cres
  - beta_1_estimate
  - beta_1_simex
  - measurement_error_variance
  - beta_1_p_value_adj
  - empirical_p_value
  - delta_r_squared
  - go_enrichment_odds_ratio
  - go_enrichment_fdr
  - summit_match_pct_top10
  - atc_validation_status
  - causal_limitation_note