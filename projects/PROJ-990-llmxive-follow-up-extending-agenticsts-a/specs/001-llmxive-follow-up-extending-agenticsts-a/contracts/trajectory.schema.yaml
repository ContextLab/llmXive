$schema: "http://json-schema.org/draft-07/schema#"
title: "AgenticSTS Trajectory Schema"
description: "Schema for raw and processed game trajectory data."
type: "object"
required:
  - trajectory_id
  - turns
  - outcome
properties:
  trajectory_id:
    type: "string"
    description: "Unique identifier for the trajectory."
  turns:
    type: "array"
    description: "List of turns in the trajectory."
    items:
      type: "object"
      required:
        - turn_number
        - health_ratio
        - enemy_threat_level
        - deck_size
        - legal_moves
      properties:
        turn_number:
          type: "integer"
          minimum: 0
        health_ratio:
          type: "number"
          minimum: 0.0
          maximum: 1.0
        enemy_threat_level:
          type: "number"
          minimum: 0.0
        deck_size:
          type: "integer"
          minimum: 0
        legal_moves:
          type: "array"
          items:
            type: "string"
        move_entropy:
          type: "number"
          description: "Calculated Shannon entropy of legal moves."
          minimum: 0.0
  outcome:
    type: "integer"
    enum:
      - 0
      - 1
    description: "1 for Win, 0 for Loss."
