$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Results Schema"
description: "Schema for data/processed/simulation_results.csv"
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique simulation run ID."
  trajectory_id:
    type: "string"
    description: "Reference to trajectory."
  policy_type:
    type: "string"
    description: "Policy used for simulation."
    enum:
      - "dynamic"
      - "static"
      - "random"
  tokens_used:
    type: "integer"
    description: "Total tokens in prompt."
    minimum: 0
  layers_retrieved:
    type: "integer"
    description: "Count of memory layers used."
    minimum: 1
  win:
    type: "boolean"
    description: "Did the agent win?"
  budget_violations:
    type: "integer"
    description: "Count of skipped turns due to budget."
    minimum: 0
required:
  - run_id
  - trajectory_id
  - policy_type
  - tokens_used
  - layers_retrieved
  - win
  - budget_violations
additionalProperties: false