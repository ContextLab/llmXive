$schema: http://json-schema.org/draft-07/schema#
title: Preprocessed Dataset Schema
description: |
  Schema for the preprocessed dataset derived from the ABCD Study Release 4.0.
  Contains Adverse Childhood Experiences (ACE) scores, demographic data,
  and normalized hippocampal subfield volumes.
type: object
required:
  - properties
  - required
  - type
properties:
  type:
    type: string
    const: object
  required:
    type: array
    items:
      type: string
  properties:
    type: object
    properties:
      ACE:
        description: Adverse Childhood Experiences score.
        type: number
        minimum: 0
      Age:
        description: Age of the participant at baseline (years).
        type: number
        minimum: 9
        maximum: 11
      Sex:
        description: Biological sex of the participant.
        type: string
        enum: [Male, Female]
      Site:
        description: Scanning site identifier.
        type: string
      FamilyID:
        description: Unique identifier for the family unit (to handle clustering).
        type: string
      CA3:
        description: Raw volume of the CA3 hippocampal subfield.
        type: number
        minimum: 0
      DG:
        description: Raw volume of the Dentate Gyrus hippocampal subfield.
        type: number
        minimum: 0
      Subiculum:
        description: Raw volume of the Subiculum hippocampal subfield.
        type: number
        minimum: 0
      ICV:
        description: Intracranial volume used for normalization.
        type: number
        minimum: 0
      Normalized_Volumes:
        description: |
          Object containing ICV-normalized volumes for each subfield.
          Calculated as: RawVolume / ICV.
        type: object
        required:
          - CA3
          - DG
          - Subiculum
        properties:
          CA3:
            description: Normalized CA3 volume.
            type: number
          DG:
            description: Normalized DG volume.
            type: number
          Subiculum:
            description: Normalized Subiculum volume.
            type: number
    required:
      - ACE
      - Age
      - Sex
      - Site
      - FamilyID
      - CA3
      - DG
      - Subiculum
      - ICV
      - Normalized_Volumes