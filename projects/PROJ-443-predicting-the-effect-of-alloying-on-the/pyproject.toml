[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hea-elastic-modulus-prediction"
version = "0.1.0"
description = "Predicting the Effect of Alloying on the Elastic Modulus of High-Entropy Alloys"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "numpy>=1.24",
    "requests>=2.31",
    "pyyaml>=6.0",
    "shap>=0.44",
    "scipy>=1.11",
    "pymatgen>=2023",
    "pytest>=7.4",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.0",
    "black>=23.0",
    "isort>=5.12",
    "pytest-cov>=4.0",
]

[tool.setuptools.packages.find]
where = ["code"]
exclude = ["tests*"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["utils", "models", "features", "data", "pipeline", "report", "eval", "interpret", "setup_project", "setup_environment"]
skip_glob = ["**/__pycache__/**", "**/.venv/**", "**/venv/**"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["code"]
omit = [
    "code/tests/*",
    "code/setup_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
