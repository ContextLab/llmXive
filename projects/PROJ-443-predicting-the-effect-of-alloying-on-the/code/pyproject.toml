[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hea-elastic-modulus"
version = "0.1.0"
description = "Predicting the Effect of Alloying on the Elastic Modulus of High-Entropy Alloys"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "numpy>=1.24",
    "requests>=2.31",
    "pyyaml>=6.0",
    "shap>=0.44",
    "scipy>=1.11",
    "pymatgen>=2023",
    "pytest>=7.4",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip_gitignore = true
known_first_party = ["code"]
known_third_party = ["pandas", "numpy", "sklearn", "requests", "yaml", "shap", "scipy", "pymatgen", "pytest"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]
