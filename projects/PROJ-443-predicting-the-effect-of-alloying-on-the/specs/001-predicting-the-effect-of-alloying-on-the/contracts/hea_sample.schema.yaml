$schema: "http://json-schema.org/draft-07/schema#"
title: "HEA Sample Schema"
description: "Schema for processed HEA sample data including ILR-transformed composition and descriptors."
type: "object"
required:
  - sample_id
  - elements
  - composition_ilr
  - target_residual
  - bulk_modulus_observed
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the HEA sample."
  elements:
    type: "string"
    description: "String representation of constituent elements (e.g., 'CrMnFeCoNi')."
  composition_ilr:
    type: "array"
    description: "Isometric Log-Ratio transformed composition vector."
    items:
      type: "number"
    minItems: 1
  descriptors:
    type: "object"
    description: "Compositional descriptors (e.g., entropy, radius variance). Miedema-derived features excluded if target is residual."
    additionalProperties:
      type: "number"
  bulk_modulus_observed:
    type: "number"
    description: "Observed Bulk Modulus from experimental or DFT data."
  bulk_modulus_miedema:
    type: "number"
    description: "Bulk Modulus calculated via Miedema's model."
  target_residual:
    type: "number"
    description: "Residual Bulk Modulus (B_observed - B_Miedema)."
  metadata:
    type: "object"
    description: "Additional metadata (source, crystal structure)."
    additionalProperties: true
  validation_warnings:
    type: "array"
    description: "List of warnings (e.g., residual correlation > 0.1)."
    items:
      type: "string"
    default: []
examples:
  - sample_id: "CrMnFeCoNi_001"
    elements: "CrMnFeCoNi"
    composition_ilr: [0.1, -0.2, 0.5, -0.1, 0.3]
    descriptors:
      mixing_entropy: 1.61
      radius_variance: 0.02
    bulk_modulus_observed: 180.5
    bulk_modulus_miedema: 175.2
    target_residual: 5.3
    metadata:
      source: "Materials Project"
      structure: "FCC"
    validation_warnings: []
