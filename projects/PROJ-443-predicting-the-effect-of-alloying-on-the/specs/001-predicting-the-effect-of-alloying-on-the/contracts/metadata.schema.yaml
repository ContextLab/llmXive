$schema: "http://json-schema.org/draft-07/schema#"
title: "Source Metadata Schema"
description: "Schema for the provenance metadata of external datasets."
type: "object"
properties:
  source_name:
    type: "string"
    description: "Name of the data source."
  api_version:
    type: "string"
    description: "Version of the API or dataset used."
  query_parameters:
    type: "object"
    description: "Parameters used to fetch the data."
    additionalProperties: true
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the fetch."
  checksum:
    type: "string"
    description: "SHA-256 hash of the raw data file."
  file_path:
    type: "string"
    description: "Relative path to the raw data file."
required:
  - source_name
  - api_version
  - timestamp
  - checksum
  - file_path
additionalProperties: false
