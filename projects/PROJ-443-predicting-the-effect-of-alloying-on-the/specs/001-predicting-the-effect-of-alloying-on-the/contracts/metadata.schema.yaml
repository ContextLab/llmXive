$schema: "http://json-schema.org/draft-07/schema#"
title: "Source Metadata Schema"
description: "Schema for data/source_metadata.yaml."
type: "object"
properties:
  datasets:
    type: "array"
    items:
      type: "object"
      properties:
        dataset_name:
          type: "string"
          description: "Name of the dataset."
        api_version:
          type: "string"
          description: "API version used (e.g. v1)."
        query_parameters:
          type: "string"
          description: "JSON string of query parameters."
        timestamp:
          type: "string"
          format: "date-time"
          description: "Timestamp of retrieval."
        checksum:
          type: "string"
          description: "SHA256 checksum of the file."
        url:
          type: "string"
          format: "uri"
          description: "Source URL."
      required:
        - dataset_name
        - api_version
        - query_parameters
        - timestamp
        - checksum
        - url
required:
  - datasets
