$schema: "http://json-schema.org/draft-07/schema#"
title: "TabularMetadata"
description: "Schema for statistical summaries of tabular features."
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Identifier for the dataset."
  cardinality:
    type: "integer"
    description: "Number of unique values in categorical features."
  missingness_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Proportion of missing values."
  sparsity:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Proportion of zero values."
  variance:
    type: "number"
    minimum: 0.0
    description: "Average variance of numerical features."
  feature_count:
    type: "integer"
    description: "Total number of tabular features."
required:
  - dataset_id
  - cardinality
  - missingness_rate
  - sparsity
  - variance
  - feature_count