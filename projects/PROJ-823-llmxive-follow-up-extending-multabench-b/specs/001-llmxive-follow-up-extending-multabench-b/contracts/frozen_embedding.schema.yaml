$schema: "http://json-schema.org/draft-07/schema#"
title: "FrozenEmbedding"
description: "Schema for frozen embeddings generated by CLIP or Sentence-BERT."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Global unique identifier for the pipeline run."
  dataset_id:
    type: "string"
    description: "Identifier for the source dataset."
  sample_id:
    type: "string"
    description: "Unique identifier for the sample."
  modality:
    type: "string"
    enum:
      - "image"
      - "text"
    description: "Type of unstructured data."
  vector:
    type: "array"
    items:
      type: "number"
    description: "Embedding vector values."
  model_version:
    type: "string"
    description: "Version of the frozen encoder model."
  generated_at:
    type: "string"
    format: "date-time"
    description: "Timestamp of generation."
  seed:
    type: "integer"
    description: "Random seed used for this generation run."
required:
  - run_id
  - dataset_id
  - sample_id
  - modality
  - vector
  - model_version
  - generated_at
  - seed