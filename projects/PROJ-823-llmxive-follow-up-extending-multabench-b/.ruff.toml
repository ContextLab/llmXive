# Standalone ruff configuration file (redundant with pyproject.toml but useful for some editors)
# This file mirrors the settings in [tool.ruff] within pyproject.toml
line-length = 88
target-version = "py311"

[lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501", "B008", "C901"]

[lint.isort]
known-first-party = ["analysis", "config", "data_loader", "embeddings", "models", "pipelines", "utils"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"