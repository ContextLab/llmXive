%YAML 1.2
---
$schema: http://json-schema.org/draft-07/schema#
title: Tabular Metadata Schema
description: >
  Schema defining the structure of tabular metadata statistics computed
  for MulTaBench datasets. This schema is used to validate the output
  of code/analysis/metadata_stats.py and ensure consistency for downstream
  correlation analysis (US3).
type: object
required:
  - dataset_id
  - run_id
  - feature_statistics
  - summary_metrics
properties:
  dataset_id:
    type: string
    description: Unique identifier for the dataset (e.g., 'multabench_dataset_001')
    pattern: '^[a-zA-Z0-9_-]+$'
  
  run_id:
    type: string
    description: >
      Identifier for the pipeline run that generated these statistics.
      Used to link metadata stats with embeddings and conditioned metrics.
    pattern: '^[a-zA-Z0-9_-]+$'
  
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the statistics were computed.
  
  feature_statistics:
    type: array
    description: >
      Per-feature statistical summary. One entry per column in the tabular data.
    items:
      type: object
      required:
        - feature_name
        - feature_type
        - cardinality
        - missingness_ratio
        - variance
      properties:
        feature_name:
          type: string
          description: Name of the tabular feature/column.
        
        feature_type:
          type: string
          enum: [numerical, categorical, boolean, datetime, mixed]
          description: Inferred or declared type of the feature.
        
        cardinality:
          type: integer
          minimum: 1
          description: >
            Number of unique values in the feature.
            For numerical features, this is the count of distinct values.
            For categorical, it is the number of categories.
        
        missingness_ratio:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: >
            Ratio of missing (NaN/null) values in the feature (0.0 to 1.0).
        
        sparsity:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: >
            Ratio of zero values for numerical features, or most frequent category
            dominance for categorical. 0.0 means no zeros/dominance, 1.0 means all zeros.
        
        variance:
          type: number
          minimum: 0.0
          description: >
            Statistical variance of the feature. For categorical features,
            this may be the variance of one-hot encoded representation or a
            placeholder (e.g., 0.0) if not applicable.
        
        mean:
          type: number
          nullable: true
          description: Mean value for numerical features. Null for non-numerical.
        
        std_dev:
          type: number
          nullable: true
          description: Standard deviation for numerical features. Null for non-numerical.
        
        min_value:
          type: number
          nullable: true
          description: Minimum value for numerical features.
        
        max_value:
          type: number
          nullable: true
          description: Maximum value for numerical features.
        
        most_frequent_category:
          type: string
          nullable: true
          description: Most frequent category for categorical features.
        
        zero_variance_flag:
          type: boolean
          description: >
            True if the feature has zero variance (constant value across all rows).
            Such features should be flagged for potential exclusion or imputation.

  summary_metrics:
    type: object
    description: Aggregate statistics across all features in the dataset.
    required:
      - total_features
      - numerical_features_count
      - categorical_features_count
      - avg_missingness_ratio
      - total_zero_variance_features
    properties:
      total_features:
        type: integer
        minimum: 0
        description: Total number of features in the dataset.
      
      numerical_features_count:
        type: integer
        minimum: 0
        description: Count of features classified as numerical.
      
      categorical_features_count:
        type: integer
        minimum: 0
        description: Count of features classified as categorical.
      
      boolean_features_count:
        type: integer
        minimum: 0
        description: Count of features classified as boolean.
      
      avg_missingness_ratio:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Average missingness ratio across all features.
      
      total_zero_variance_features:
        type: integer
        minimum: 0
        description: Count of features with zero variance (constant).
      
      high_sparsity_features:
        type: integer
        minimum: 0
        description: Count of features with sparsity > 0.9.
      
      recommended_features_for_model:
        type: integer
        minimum: 0
        description: >
          Count of features recommended for inclusion in the projection model
          (i.e., non-zero variance, reasonable missingness).

  data_quality_flags:
    type: object
    description: Flags indicating potential data quality issues.
    properties:
      has_zero_variance_features:
        type: boolean
        description: True if any feature has zero variance.
      
      has_high_missingness_features:
        type: boolean
        description: True if any feature has missingness_ratio > 0.5.
      
      has_extreme_sparsity:
        type: boolean
        description: True if any feature has sparsity > 0.95.
      
      recommended_imputation:
        type: string
        enum: [none, mean_impute, median_impute, mode_impute, drop_features]
        description: Recommended imputation strategy based on observed statistics.

additionalProperties: false