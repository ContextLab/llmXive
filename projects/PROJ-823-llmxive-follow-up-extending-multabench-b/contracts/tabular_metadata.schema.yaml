$schema: http://json-schema.org/draft-07/schema#
title: Tabular Metadata Schema
description: >
  Defines the schema for tabular metadata statistics computed for MulTaBench datasets.
  This schema is used to validate outputs from code/analysis/metadata_stats.py (Task T024)
  and serves as input for the projection layer training (Task T025).
type: object
required:
  - run_id
  - dataset_id
  - features
properties:
  run_id:
    type: string
    description: Unique identifier for the pipeline run (e.g., '20231027_001').
    pattern: '^[0-9]{8}_[0-9]{3}$'
  dataset_id:
    type: string
    description: Identifier of the MulTaBench dataset (e.g., 'mimic-iii', 'higgs').
  computed_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the metadata was computed.
  feature_count:
    type: integer
    minimum: 0
    description: Total number of tabular features analyzed.
  row_count:
    type: integer
    minimum: 0
    description: Total number of rows in the dataset used for analysis.
  cardinality:
    type: number
    minimum: 0
    description: Average number of unique values per feature.
  missingness:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Proportion of missing values across all features (0.0 to 1.0).
  sparsity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Proportion of zero values in the feature matrix (for sparse datasets).
  variance:
    type: number
    minimum: 0.0
    description: Average variance across all numerical features.
  feature_details:
    type: array
    description: Detailed statistics per feature.
    items:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: Name of the feature column.
        type:
          type: string
          enum: [numerical, categorical, boolean, datetime, mixed]
          description: Inferred data type of the feature.
        unique_count:
          type: integer
          minimum: 1
          description: Number of unique values for this feature.
        missing_count:
          type: integer
          minimum: 0
          description: Number of missing (NaN/None) values.
        zero_count:
          type: integer
          minimum: 0
          description: Number of zero values (relevant for sparsity).
        mean:
          type: number
          description: Mean value (only for numerical features).
        std:
          type: number
          description: Standard deviation (only for numerical features).
        min:
          type: number
          description: Minimum value (only for numerical features).
        max:
          type: number
          description: Maximum value (only for numerical features).
        top_category:
          type: string
          description: Most frequent category (only for categorical features).
        frequency:
          type: number
          description: Frequency of the top category (0.0 to 1.0).
additionalProperties: false
examples:
  - run_id: "20231027_001"
    dataset_id: "mimic-iii"
    computed_at: "2023-10-27T10:00:00Z"
    feature_count: 15
    row_count: 50000
    cardinality: 12.5
    missingness: 0.05
    sparsity: 0.10
    variance: 2.34
    feature_details:
      - name: "age"
        type: "numerical"
        unique_count: 100
        missing_count: 100
        zero_count: 0
        mean: 65.0
        std: 15.0
        min: 0
        max: 100
      - name: "gender"
        type: "categorical"
        unique_count: 2
        missing_count: 0
        zero_count: 0
        top_category: "M"
        frequency: 0.52