$schema: http://json-schema.org/draft-07/schema#
title: Tabular Metadata Schema
description: >
  Schema defining the structure for tabular metadata statistics generated
  by the MulTaBench extension pipeline. This schema is used to validate
  the output of code/analysis/metadata_stats.py and serves as the contract
  for downstream tasks (T025, T033).

type: object
required:
  - schema_version
  - generated_at
  - run_id
  - datasets
properties:
  schema_version:
    type: string
    description: Version of this schema (e.g., "1.0.0")
    const: "1.0.0"

  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the metadata was generated

  run_id:
    type: string
    description: Unique identifier for the pipeline run that generated this metadata
    pattern: "^[a-zA-Z0-9_-]+$"

  datasets:
    type: array
    description: List of metadata entries for each processed dataset
    items:
      type: object
      required:
        - dataset_id
        - stats
      properties:
        dataset_id:
          type: string
          description: Unique identifier for the dataset
          pattern: "^[a-zA-Z0-9_-]+$"

        stats:
          type: object
          description: Statistical summary of tabular features
          required:
            - cardinality
            - missingness
            - sparsity
            - variance
          properties:
            cardinality:
              type: object
              description: >
                Number of unique values per feature. Keys are feature names,
                values are integers representing unique value counts.
              additionalProperties:
                type: integer
                minimum: 1

            missingness:
              type: object
              description: >
                Proportion of missing values per feature (0.0 to 1.0).
                Keys are feature names, values are floats.
              additionalProperties:
                type: number
                minimum: 0.0
                maximum: 1.0

            sparsity:
              type: object
              description: >
                Proportion of zero values per feature (0.0 to 1.0).
                Keys are feature names, values are floats.
              additionalProperties:
                type: number
                minimum: 0.0
                maximum: 1.0

            variance:
              type: object
              description: >
                Variance of numeric features. Keys are feature names,
                values are floats. Non-numeric features may be excluded or set to null.
              additionalProperties:
                type: number

            feature_count:
              type: integer
              description: Total number of features analyzed
              minimum: 0

            row_count:
              type: integer
              description: Total number of rows analyzed
              minimum: 0

            categorical_features:
              type: array
              description: List of feature names identified as categorical
              items:
                type: string

            numeric_features:
              type: array
              description: List of feature names identified as numeric
              items:
                type: string

examples:
  - schema_version: "1.0.0"
    generated_at: "2023-10-27T10:00:00Z"
    run_id: "baseline_run_20231027_001"
    datasets:
      - dataset_id: "multabench_dataset_A"
        stats:
          cardinality:
            feature_1: 5
            feature_2: 12
          missingness:
            feature_1: 0.02
            feature_2: 0.00
          sparsity:
            feature_1: 0.15
            feature_2: 0.00
          variance:
            feature_1: 2.34
            feature_2: 15.67
          feature_count: 2
          row_count: 1000
          categorical_features: ["feature_1"]
          numeric_features: ["feature_2"]