$schema: http://json-schema.org/draft-07/schema#
title: Frozen Embeddings Schema
description: |
  Schema for frozen embeddings generated by the MulTaBench extension pipeline.
  This schema defines the structure of the Parquet files produced by US1 (T015)
  and used as input for US2 and US3.
  
  Key constraints:
  - No gradient tracking is enabled during generation.
  - Embeddings are generated using CLIP ViT-B/32 (images) and Sentence-BERT (text).
  - All records must include a valid run_id for reproducibility.
type: object
required:
  - run_id
  - dataset_id
  - sample_id
  - modality
  - embedding
  - generated_at
properties:
  run_id:
    type: string
    description: |
      Unique identifier for the generation run. Used to trace back to the 
      specific execution of run_baseline.py or run_baseline_sensitivity.py.
      Format: <timestamp>_<hash> (e.g., 20231027_120000_a1b2c3d4)
    minLength: 10
  dataset_id:
    type: string
    description: |
      Identifier for the source dataset from MulTaBench.
      Matches the 'dataset_id' column in the metadata stats summary.
    minLength: 1
  sample_id:
    type: string
    description: |
      Unique identifier for the specific sample within the dataset.
      Typically the row index or a primary key from the source data.
    minLength: 1
  modality:
    type: string
    enum:
      - image
      - text
    description: |
      The modality of the embedding.
      - 'image': Generated via CLIP ViT-B/32.
      - 'text': Generated via Sentence-BERT.
  embedding:
    type: array
    items:
      type: number
      format: float
    description: |
      The embedding vector as a list of floats.
      - For CLIP ViT-B/32: 512 dimensions.
      - For Sentence-BERT: 768 dimensions (default) or 384 depending on model variant.
      Stored as a list to ensure compatibility with Parquet's list type.
    minItems: 128
  generated_at:
    type: string
    format: date-time
    description: |
      ISO 8601 timestamp of when the embedding was generated.
      Used for artifact lifecycle management and debugging.
  model_version:
    type: string
    description: |
      Version string of the model used (e.g., 'ViT-B/32', 'all-MiniLM-L6-v2').
      Essential for reproducibility.
    default: "unknown"
  device:
    type: string
    enum:
      - cpu
      - cuda
    description: |
      Hardware device used for inference.
      For this project, must be 'cpu' to satisfy CPU-tractability constraints.
    default: "cpu"
  precision:
    type: string
    enum:
      - float32
      - float16
      - bfloat16
    description: |
      Data precision of the embedding values.
      Default is float32 for maximum compatibility.
    default: "float32"
  metadata:
    type: object
    description: |
      Optional dictionary for additional context not captured in top-level fields.
      May include preprocessing flags, token counts (for text), or image dimensions.
    additionalProperties: true
additionalProperties: false
examples:
  - run_id: "20231027_140000_abc123"
    dataset_id: "multibench_coco"
    sample_id: "img_001"
    modality: "image"
    embedding: [0.123, -0.456, 0.789, 0.001, -0.234]
    generated_at: "2023-10-27T14:00:00Z"
    model_version: "ViT-B/32"
    device: "cpu"
    precision: "float32"
    metadata:
      image_size: [224, 224]
      preprocess: "normalize"
  - run_id: "20231027_140000_abc123"
    dataset_id: "multibench_sst2"
    sample_id: "sent_042"
    modality: "text"
    embedding: [0.012, -0.034, 0.567, 0.890, -0.123]
    generated_at: "2023-10-27T14:00:05Z"
    model_version: "all-MiniLM-L6-v2"
    device: "cpu"
    precision: "float32"
    metadata:
      token_count: 12
      truncation: false