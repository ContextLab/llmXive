$schema: http://json-schema.org/draft-07/schema#
title: Frozen Embeddings Schema
description: >
  Schema for frozen embeddings generated by the MulTaBench extension pipeline.
  These embeddings are produced by CLIP ViT-B/32 (images) and Sentence-BERT (text)
  with gradients disabled, intended for downstream projection and analysis.
type: object
required:
  - run_id
  - dataset_id
  - model_name
  - modality
  - embedding_dim
  - created_at
  - records
properties:
  run_id:
    type: string
    description: Unique identifier for the pipeline run (e.g., 'baseline_20231027_123456')
    pattern: '^[a-z0-9_]+$'
  dataset_id:
    type: string
    description: Identifier of the source MulTaBench dataset
  model_name:
    type: string
    description: Name of the model used for embedding generation (e.g., 'clip_vit_b_32', 'sentence_bert_base')
  modality:
    type: string
    enum:
      - image
      - text
    description: Modality of the source data
  embedding_dim:
    type: integer
    minimum: 1
    description: Dimensionality of the embedding vector
  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the embeddings were generated
  total_records:
    type: integer
    minimum: 0
    description: Total number of embedding records in this file
  records:
    type: array
    description: List of embedding records
    items:
      type: object
      required:
        - record_id
        - embedding
      properties:
        record_id:
          type: string
          description: Unique identifier for the source record within the dataset
        embedding:
          type: array
          items:
            type: number
          minItems: 1
          description: The embedding vector as a list of floats
        metadata:
          type: object
          description: Optional metadata associated with the record (e.g., original text length, image dimensions)
          additionalProperties: true
additionalProperties: false