$schema: http://json-schema.org/draft-07/schema#
title: Frozen Embedding Schema
description: >
  Schema for frozen embeddings generated by the CPU-tractable baseline pipeline (US1).
  This schema defines the structure of the Parquet files produced by `run_baseline.py`.
  All embeddings are frozen (no gradient tracking) and generated using CLIP ViT-B/32
  for images and Sentence-BERT for text.
type: object
required:
  - run_id
  - dataset_id
  - sample_id
  - modality
  - embedding_vector
  - model_version
  - timestamp
properties:
  run_id:
    type: string
    description: >
      Unique identifier for the baseline run. Used to correlate embeddings
      with specific pipeline executions and seeds (e.g., "baseline_42_20231027").
    minLength: 1
  dataset_id:
    type: string
    description: >
      Identifier of the source dataset from MulTaBench (e.g., "mimic-iii", "cub-200").
    minLength: 1
  sample_id:
    type: string
    description: >
      Unique identifier for the specific sample within the dataset.
      Must be unique per (dataset_id, sample_id) pair.
    minLength: 1
  modality:
    type: string
    description: >
      The modality of the embedding. Must be one of the supported modalities.
    enum:
      - image
      - text
  embedding_vector:
    type: array
    description: >
      The frozen embedding vector as a list of floats.
      For CLIP ViT-B/32: dimension is 512.
      For Sentence-BERT (all-MiniLM-L6-v2): dimension is 384.
    items:
      type: number
      format: float
    minItems: 384
  model_version:
    type: string
    description: >
      Version string of the model used to generate the embedding.
      Examples: "clip-vit-b-32", "sentence-transformers-all-MiniLM-L6-v2".
    minLength: 1
  timestamp:
    type: string
    format: date-time
    description: >
      ISO 8601 timestamp of when the embedding was generated.
  seed:
    type: integer
    description: >
      Random seed used for the generation run. Defaults to 42.
      Used for deterministic re-computation verification.
    default: 42
  preprocessing_hash:
    type: string
    description: >
      SHA-256 hash of the preprocessing parameters used (e.g., resize size,
      normalization stats) to ensure reproducibility.
    pattern: "^[a-f0-9]{64}$"
additionalProperties: false
examples:
  - run_id: "baseline_42"
    dataset_id: "cub-200"
    sample_id: "001_black_footed_albatross"
    modality: "image"
    embedding_vector: [0.012, -0.045, 0.123, "..."]
    model_version: "clip-vit-b-32"
    timestamp: "2023-10-27T10:00:00Z"
    seed: 42
    preprocessing_hash: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
  - run_id: "baseline_42"
    dataset_id: "mimic-iii"
    sample_id: "subject_12345_admission_1"
    modality: "text"
    embedding_vector: [0.005, 0.021, -0.015, "..."]
    model_version: "sentence-transformers-all-MiniLM-L6-v2"
    timestamp: "2023-10-27T10:00:01Z"
    seed: 42
    preprocessing_hash: "a1b2c3d4e5f6789012345678901234567890123456789012345678901234abcd"