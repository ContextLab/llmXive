  - id: 93edfb9eb2b4
    text: Section 5.1 lists LongBenchV2 as a benchmark but states it is used only
      for downstream evaluation due to lack of retrieval labels. The initial listing
      implies it is a retrieval benchmark, which is factually inaccurate.
    severity: writing
  - id: 80215b60f3c6
    text: The abstract claims "over 5x lower latency" than strongest efficient baselines.
      Table 2 shows MCompassRAG (174ms) is only ~4.1x faster than REFRAG (720ms),
      not 5x. The claim is overstated for the full set of baselines.
    severity: writing
  - id: a80297be3a0c
    text: Section 4 lacks specific architecture details (hidden dims, heads) for the
      student encoder and abstraction Transformer, preventing code reproduction.
    severity: science
  - id: 2f7a43fb72bd
    text: The paper relies on external datasets (e.g., WikiWeb2M, EDR-200, LongBenchV1)
      and models (CEMTM, Qwen3) without providing explicit license terms or version
      hashes in the text or bibliography. Section 5.1 and Appendix A must include
      specific license identifiers (e.g., CC-BY-4.0, Apache 2.0) and commit hashes
      or version numbers for all external data and model weights to ensure reproducibility
      and legal compliance.
    severity: writing
  - id: 3f9dfd983bbd
    text: The metadata bank construction (Section 4.1) and training data synthesis
      (Section 4.3) involve processing large corpora. The paper lacks a statement
      on how missing data or corrupted chunks were handled during the topic modeling
      and query generation phases. A brief description of data cleaning pipelines
      or exclusion criteria for low-quality chunks is required.
    severity: writing
  - id: 28a18972256d
    text: The GitHub link in the Abstract (lines 18-20) and the arXiv URL in the provenance
      section are external dependencies. The paper should verify these links are stable
      and consider archiving the code/data snapshot (e.g., via Zenodo) to prevent
      link rot, ensuring the artifact remains accessible for future review.
    severity: writing
  - id: 9ae4c529bef0
    text: Figure 1 (main-teaser) subfigure (a) and (b) lack axis labels and units.
      Subfigure (b) plots 'Performance' vs 'Latency' but the axes are not explicitly
      labeled with metric names (e.g., 'Avg. F1', 'ms') or units in the image itself,
      relying solely on the caption. This violates print legibility standards.
    severity: writing
  - id: aaee99f3a2b4
    text: Figure 2 (CompassRAG-pipeline_v2) contains no caption text describing the
      specific icons (fire/snowflake) or the flow of data between the 'Metadata Bank'
      and 'Student Retriever'. The visual complexity requires a more descriptive caption
      to be self-contained.
    severity: writing
  - id: 9a22a570f1be
    text: Figure 4 (student_teacher_ie_plots) and Figure 5 (tsne_qualitative_new)
      lack explicit axis labels and legends within the image files. Figure 4's x-axis
      (number of topics) and y-axis (IE) are not labeled on the plot, and Figure 5's
      t-SNE axes are unlabeled. These must be added for standalone readability.
    severity: writing
  - id: 2230bb58075c
    text: Figure 3 (CompassRAG_qualitative_comparison) uses color coding (teal, red)
      to distinguish chunks but lacks a legend or explicit text labels within the
      figure indicating which color corresponds to 'Gold Chunk' vs 'Distractor'. The
      caption explains it, but the figure itself is ambiguous without reading the
      text.
    severity: writing
