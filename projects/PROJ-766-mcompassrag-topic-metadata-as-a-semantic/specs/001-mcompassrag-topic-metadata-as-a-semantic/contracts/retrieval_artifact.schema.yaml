$schema: http://json-schema.org/draft-07/schema#
title: RetrievalArtifact
description: Schema for retrieval results including query ID, retrieved document IDs, similarity scores, and latency metrics.
type: object
properties:
  query_id:
    type: string
    description: Unique identifier for the query.
  retrieved_doc_ids:
    type: array
    items:
      type: string
    description: List of document IDs retrieved for the query.
  similarity_scores:
    type: array
    items:
      type: number
    description: List of similarity scores corresponding to the retrieved documents.
  latency_ms:
    type: number
    description: Time taken to retrieve the documents in milliseconds.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the retrieval.
  retriever_type:
    type: string
    enum:
      - baseline
      - mcompass
    description: Indicates whether this result is from the baseline or MCompass retriever.
required:
  - query_id
  - retrieved_doc_ids
  - similarity_scores
  - latency_ms
  - timestamp
  - retriever_type
additionalProperties: false