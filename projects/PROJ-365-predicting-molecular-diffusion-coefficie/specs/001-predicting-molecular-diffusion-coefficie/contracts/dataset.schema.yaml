$schema: "http://json-schema.org/draft-07/schema#"
title: "Featurized Dataset Record"
description: "Schema for a single record in the processed JSONL dataset."
type: object
required:
  - record_id
  - smiles
  - solvent_type
  - target
  - graph
  - solvent_features
  - status
properties:
  record_id:
    type: string
    description: "Unique hash identifier for the record."
  smiles:
    type: string
    description: "Original SMILES string of the solute."
  solvent_type:
    type: string
    description: "Name of the solvent."
  target:
    type: number
    description: "Normalized diffusion coefficient (log10 scale)."
  graph:
    type: object
    description: "Graph representation of the molecule."
    required:
      - node_features
      - edge_index
      - edge_features
    properties:
      node_features:
        type: array
        items:
          type: array
          items:
            type: number
          minItems: 3
          maxItems: 3
        description: "Atom features: [atomic_num, hybridization, formal_charge]."
      edge_index:
        type: array
        items:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
        description: "Bond connections: [source_idx, target_idx]."
      edge_features:
        type: array
        items:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
        description: "Bond features: [bond_type, is_aromatic]."
  solvent_features:
    type: object
    required:
      - viscosity
      - dielectric
    properties:
      viscosity:
        type: number
        description: "Viscosity in cP."
      dielectric:
        type: number
        description: "Dielectric constant."
  status:
    type: string
    enum:
      - "valid"
      - "excluded"
    description: "Status of the record."
  exclusion_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if status is 'excluded'."
    examples:
      - "MISSING_DATA_EXCLUDED"
      - "INVALID_SMILES"
  additionalProperties: false
