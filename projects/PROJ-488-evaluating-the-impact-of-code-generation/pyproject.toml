[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "code-review-quality"
version = "0.1.0"
description = "Automated code review quality research pipeline"
requires-python = ">=3.11"
dependencies = [
    "datasets>=2.14.0",
    "radon>=6.0.0",
    "pylint>=3.0.0",
    "scipy>=1.11.0",
    "matplotlib>=3.8.0",
    "pandas>=2.1.0",
    "numpy>=1.26.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.1.0",
    "pytest>=7.4.0",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip_gitignore = true
known_first_party = ["code"]
known_third_party = [
    "datasets",
    "radon",
    "pylint",
    "scipy",
    "matplotlib",
    "pandas",
    "numpy",
    "yaml",
    "pytest",
]

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "data",
    "results",
    "state",
]
per-file-ignores = [
    "code/__init__.py:F401",
]
ignore = ["E203", "W503"]
max-complexity = 10
count = true
show-source = true
statistics = true
