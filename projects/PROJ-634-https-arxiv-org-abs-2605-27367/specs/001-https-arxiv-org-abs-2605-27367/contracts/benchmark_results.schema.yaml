$schema: "http://json-schema.org/draft-07/schema#"
title: "SpatialBench Results"
type: "object"
required:
  - "run_metadata"
  - "results"
properties:
  run_metadata:
    type: "object"
    required:
      - "timestamp"
      - "device"
      - "subset_size"
    properties:
      timestamp:
        type: "string"
        format: "date-time"
      device:
        type: "string"
        const: "cpu"
      subset_size:
        type: "integer"
        minimum: 1
      models_tested:
        type: "array"
        items:
          type: "string"
  results:
    type: "array"
    items:
      type: "object"
      required:
        - "scene_id"
        - "domain"
        - "model_name"
        - "metrics"
        - "status"
      properties:
        scene_id:
          type: "string"
        domain:
          type: "string"
          enum: ["DTU", "ScanNet"]
        model_name:
          type: "string"
        status:
          type: "string"
          enum: ["success", "skipped", "error"]
        metrics:
          type: "object"
          required:
            - "abs_rel"
            - "delta1"
            - "delta2"
          properties:
            abs_rel:
              type: "number"
              minimum: 0
            delta1:
              type: "number"
              minimum: 0
              maximum: 1
            delta2:
              type: "number"
              minimum: 0
              maximum: 1
            delta3:
              type: "number"
              minimum: 0
              maximum: 1
              description: "Optional metric. May be omitted if not calculated."
description: "Schema for the benchmark results JSON output, ensuring per‑scene metrics and status are captured. Note: `delta3` is optional."