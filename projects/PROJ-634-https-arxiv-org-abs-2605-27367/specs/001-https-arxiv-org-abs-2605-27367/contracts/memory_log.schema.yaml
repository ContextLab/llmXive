$schema: "http://json-schema.org/draft-07/schema#"
title: "Memory Log"
type: "array"
items:
  type: "object"
  required:
    - "timestamp"
    - "step"
    - "ram_mb"
    - "limit_mb"
  properties:
    timestamp:
      type: "string"
      format: "date-time"
    step:
      type: "string"
    ram_mb:
      type: "number"
      minimum: 0
    limit_mb:
      type: "number"
      minimum: 1024
description: "Schema for the memory log JSON output, tracking RAM usage at each step to ensure compliance with the predefined memory limit."