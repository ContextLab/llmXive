[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-equivalence-principle"
version = "0.1.0"
description = "Testing the Equivalence Principle with Satellite Laser Ranging"
requires-python = ">=3.11"
dependencies = [
    "astropy>=5.3",
    "numpy>=1.24",
    "pandas>=2.0",
    "requests>=2.31",
    "pyyaml>=6.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\\.pyi?$'
extend-exclude = '''
/(
  # Directories to exclude
  \\.git
  | \\.hg
  | \\.mypy_cache
  | \\.tox
  | \\.venv
  | _build
  | buck-out
  | build
  | dist
  | data
  | figures
  | docs
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.isort]
known-first-party = ["code"]
known-third-party = ["astropy", "numpy", "pandas", "pytest", "requests", "yaml"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"code/tests/*" = ["S101"] # Allow asserts in tests