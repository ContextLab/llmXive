$schema: "http://json-schema.org/draft-07/schema#"
title: "NormalPoint"
description: "Schema for a single Satellite Laser Ranging observation."
type: "object"
properties:
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the observation."
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?(Z|[+-][0-9]{2}:[0-9]{2})$"
  range:
    type: "number"
    description: "Range measurement in meters."
    minimum: 0
  satellite_id:
    type: "string"
    description: "Identifier of the satellite (e.g., LAGEOS-1)."
    enum:
      - "LAGEOS-1"
      - "LAGEOS-2"
      - "ETALON-1"
      - "ETALON-2"
      - "STARLETTE"
  station_id:
    type: "string"
    description: "Identifier of the SLR station."
  quality_flag:
    type: "integer"
    description: "Quality flag (0=Good, 1=Outlier, 2=Low Confidence)."
    enum:
      - 0
      - 1
      - 2
  residual:
    type: "number"
    description: "Post-fit residual in meters. (Computed in processed stage)."
    nullable: true
required:
  - timestamp
  - range
  - satellite_id
  - station_id
  - quality_flag
additionalProperties: false
