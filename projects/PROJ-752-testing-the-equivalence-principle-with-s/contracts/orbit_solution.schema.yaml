$schema: http://json-schema.org/draft-07/schema#
title: OrbitSolution
description: >
  Schema defining the structure of the joint orbit determination fit results
  for LAGEOS-1, LAGEOS-2, Etalon-1, Etalon-2, and Starlette.
  This schema captures the estimated state vectors, the differential acceleration
  parameter (ac), the local gravity (g), and the full covariance matrix.
type: object
required:
  - metadata
  - solution_type
  - satellites
  - parameters
  - covariance
  - residuals
  - fit_statistics
properties:
  metadata:
    type: object
    description: Execution and configuration metadata.
    required:
      - timestamp
      - software_version
      - geopotential_model
      - drag_model
      - srp_model
      - convergence_status
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the solution was generated.
      software_version:
        type: string
        description: Version of the estimation pipeline used.
      geopotential_model:
        type: string
        description: Name of the geopotential model used (e.g., GGM05C).
      drag_model:
        type: string
        description: Name of the atmospheric drag model used (e.g., Jacchia).
      srp_model:
        type: string
        description: Name of the Solar Radiation Pressure model used.
      convergence_status:
        type: string
        enum: [CONVERGED, MAX_ITER_REACHED, DIVERGED]
        description: Status of the least-squares solver.
      rms_residual_m:
        type: number
        description: Root Mean Square of residuals in meters.
      chi2:
        type: number
        description: Chi-squared statistic of the fit.
      degrees_of_freedom:
        type: integer
        description: Number of degrees of freedom in the fit.
  solution_type:
    type: string
    enum: [JOINT]
    description: Type of solution. Must be 'JOINT' for this project.
  satellites:
    type: array
    description: List of satellites included in the joint solution.
    items:
      type: object
      required:
        - id
        - name
        - mean_altitude_km
        - data_points_used
      properties:
        id:
          type: string
          description: Satellite identifier (e.g., 'LAGEOS-1', 'ETALON-1').
        name:
          type: string
          description: Full satellite name.
        mean_altitude_km:
          type: number
          description: Mean orbital altitude in kilometers.
        data_points_used:
          type: integer
          description: Number of normal points used in the fit.
  parameters:
    type: object
    description: Estimated parameters from the joint solution.
    required:
      - differential_acceleration_ac
      - local_gravity_g
      - ac_uncertainty
      - g_uncertainty
    properties:
      differential_acceleration_ac:
        type: number
        description: Estimated differential acceleration (ac) in m/s^2.
      local_gravity_g:
        type: number
        description: Estimated local gravity (g) in m/s^2.
      ac_uncertainty:
        type: number
        description: Standard deviation of ac (square root of diagonal covariance element).
      g_uncertainty:
        type: number
        description: Standard deviation of g (square root of diagonal covariance element).
      correlation_ac_g:
        type: number
        description: Correlation coefficient between ac and g estimates.
  covariance:
    type: object
    description: Covariance matrix of the estimated parameters.
    required:
      - matrix
      - parameter_names
    properties:
      matrix:
        type: array
        items:
          type: array
          items:
            type: number
        description: 2x2 covariance matrix [[var_ac, cov_ac_g], [cov_ac_g, var_g]].
      parameter_names:
        type: array
        items:
          type: string
        description: Order of parameters in the matrix: ['ac', 'g'].
  residuals:
    type: object
    description: Summary of post-fit residuals.
    required:
      - total_points
      - mean_residual_m
      - std_residual_m
      - max_residual_m
      - min_residual_m
    properties:
      total_points:
        type: integer
        description: Total number of residuals in the solution.
      mean_residual_m:
        type: number
        description: Mean residual in meters.
      std_residual_m:
        type: number
        description: Standard deviation of residuals in meters.
      max_residual_m:
        type: number
        description: Maximum absolute residual in meters.
      min_residual_m:
        type: number
        description: Minimum absolute residual in meters.
  fit_statistics:
    type: object
    description: Statistical metrics for the fit quality.
    required:
      - reduced_chi2
      - f_test_p_value
    properties:
      reduced_chi2:
        type: number
        description: Reduced chi-squared (chi2 / degrees_of_freedom).
      f_test_p_value:
        type: number
        description: P-value from the F-test comparing Null vs Alternative hypothesis.