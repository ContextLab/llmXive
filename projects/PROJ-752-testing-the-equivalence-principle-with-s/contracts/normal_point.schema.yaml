$schema: http://json-schema.org/draft-07/schema#
title: NormalPoint
description: |
  Schema for Satellite Laser Ranging (SLR) Normal Point observations.
  A normal point represents a 5-second (or configurable) average of
  individual photon returns, including range, range rate, and quality metrics.
type: object
required:
  - satellite_id
  - time_mjd
  - time_utc
  - range_m
  - range_rate_mps
  - rms_mm
  - num_pulses
  - station_id
properties:
  satellite_id:
    type: string
    description: Satellite identifier (e.g., 'LAGEOS-1', 'ETALON-1', 'STARLETTE')
    pattern: "^[A-Z0-9-]+$"
  time_mjd:
    type: number
    description: Modified Julian Date of the normal point center
    minimum: 40000
    maximum: 60000
  time_utc:
    type: string
    format: date-time
    description: ISO 8601 formatted UTC timestamp
  range_m:
    type: number
    description: Slant range in meters (corrected for atmospheric delays)
    minimum: 5000000
    maximum: 50000000
  range_rate_mps:
    type: number
    description: Range rate in meters per second
  rms_mm:
    type: number
    description: Root Mean Square error of the fit in millimeters
    minimum: 0
  num_pulses:
    type: integer
    description: Number of individual pulse returns averaged in this normal point
    minimum: 1
  station_id:
    type: string
    description: ILRS station identifier (e.g., '7110', '7840')
    pattern: "^[0-9]{4}$"
  residuals_mm:
    type: number
    description: Residual from orbit solution in millimeters (optional)
    nullable: true
  quality_flag:
    type: integer
    description: Quality flag (0=good, 1=warning, 2=bad)
    minimum: 0
    maximum: 2
    default: 0
additionalProperties: false