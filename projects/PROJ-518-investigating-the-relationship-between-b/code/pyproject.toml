[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "brain-dynamics-creativity"
version = "0.1.0"
description = "Investigating the Relationship Between Brain Network Dynamics and Creative Problem Solving"
requires-python = ">=3.10"
dependencies = [
    "nilearn==0.10.0",
    "networkx==3.2.1",
    "scikit-learn==1.4.2",
    "numpy==1.26.4",
    "pandas==2.2.2",
    "matplotlib==3.8.4",
    "scipy==1.12.0",
    "brainconn==0.1.0",
    "statsmodels>=0.14.0",
    "black>=24.0.0",
    "flake8>=7.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.black]
line-length = 88
target-version = ["py310"]
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code"]
known_third_party = ["nilearn", "networkx", "sklearn", "numpy", "pandas", "matplotlib", "scipy", "statsmodels"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
