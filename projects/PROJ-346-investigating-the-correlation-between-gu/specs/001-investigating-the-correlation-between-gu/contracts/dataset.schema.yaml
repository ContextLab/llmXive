$schema: "http://json-schema.org/draft-07/schema#"
title: "Microbiome and Cognitive Dataset Schema"
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the sample/participant"
  taxon_name:
    type: "string"
    description: "Taxonomic name of the microbe"
  abundance:
    type: "number"
    description: "Relative abundance or CLR-transformed value"
    minimum: 0
  read_count:
    type: "integer"
    description: "Total sequencing reads"
    minimum: 10000
  cognitive_z_score:
    type: "number"
    description: "Z-scored cognitive flexibility score"
  age:
    type: "integer"
    description: "Participant age"
    minimum: 18
  sex:
    type: "string"
    description: "Sex of participant"
    enum: ["M", "F"]
  bmi:
    type: "number"
    description: "Body Mass Index"
    minimum: 0
required:
  - sample_id
  - taxon_name
  - abundance
  - age
  - sex
  - bmi
additionalProperties: false
