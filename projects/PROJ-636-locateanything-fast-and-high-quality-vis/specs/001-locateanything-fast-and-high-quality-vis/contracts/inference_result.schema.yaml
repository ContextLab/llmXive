$schema: "http://json-schema.org/draft-07/schema#"
title: "InferenceResult"
description: "Schema for the output of a single inference run on an image."
type: "object"
required:
  - image_id
  - prompt
  - predicted_boxes
  - inference_time_ms
  - peak_memory_mb
  - status
  - pbd_serial_overhead_ms
properties:
  image_id:
    type: "string"
    description: "Unique identifier for the image."
  prompt:
    type: "string"
    description: "The text prompt used for grounding."
  predicted_boxes:
    type: "array"
    description: "List of bounding boxes. Each box has x_min, y_min, x_max, y_max (normalized 0-1)."
    items:
      type: "object"
      required:
        - x_min
        - y_min
        - x_max
        - y_max
      properties:
        x_min:
          type: "number"
          description: "Minimum x coordinate (0-1)."
        y_min:
          type: "number"
          description: "Minimum y coordinate (0-1)."
        x_max:
          type: "number"
          description: "Maximum x coordinate (0-1)."
        y_max:
          type: "number"
          description: "Maximum y coordinate (0-1)."
  inference_time_ms:
    type: "number"
    description: "Time taken for the forward pass in milliseconds."
  peak_memory_mb:
    type: "number"
    description: "Peak RAM usage in megabytes during inference."
  status:
    type: "string"
    enum:
      - "success"
      - "error"
    description: "Status of the inference."
  error_message:
    type: "string"
    description: "Error details if status is error."
    nullable: true
  pbd_serial_overhead_ms:
    type: "number"
    description: "Difference between Serial Fallback time and PBD time (Serial Time - PBD Time). Negative if PBD was faster. 0 if Serial Fallback not run."