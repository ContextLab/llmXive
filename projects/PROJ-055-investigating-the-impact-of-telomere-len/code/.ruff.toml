[lint]
select = ["E", "F", "W", "I", "N", "B", "C4", "UP"]
ignore = ["E501", "B008"]
fixable = ["ALL"]
unfixable = []

[format]
quote-style = "double"
indent-style = "space"
line-width = 88
skip-magic-trailing-comma = false
skip-magic-trailing-comma = false

[lint.per-file-ignores]
"code/tests/*" = ["S101"]
