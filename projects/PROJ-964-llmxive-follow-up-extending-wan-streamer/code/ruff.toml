[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "ARG", # flake8-unused-arguments
]
ignore = [
    "E501", # line-too-long (handled by black)
    "B008", # do-not-perform-function-calls-in-argument-defaults (often needed for dataclasses)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"] # allow unused imports in init files for public API exposure

[format]
line-length = 88
indent-width = 4