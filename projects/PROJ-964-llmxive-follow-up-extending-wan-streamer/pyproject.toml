[project]
name = "llmxive-follow-up-extending-wan-streamer"
version = "0.1.0"
description = "llmXive automated science pipeline - Wan-Streamer extension"
requires-python = ">=3.10"
dependencies = [
    "torch",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets",
    "scipy",
    "pyyaml",
    "videomae",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''
