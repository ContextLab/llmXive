[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-wan-streamer-followup"
version = "0.1.0"
description = "Follow-up research project extending Wan-Streamer v0.1 for latency-quality trade-off analysis."
requires-python = ">=3.9"
dependencies = [
    "torch",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets",
    "scipy",
    "pyyaml",
    "videomae",
    "pytest",
    "ruff",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | data
  | state
  | docs
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tool.setuptools]
packages = ["code"]
package-dir = {"" = "code"}
include-package-data = true