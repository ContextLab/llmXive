$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Metrics Schema"
description: "Schema for the results of the hybrid inference simulation. FID is computed over segments (batches), not individual frames."
type: object
properties:
  segment_id:
    type: integer
    description: "Segment ID (window of frames) for which FID was computed."
  latency_ms:
    type: number
    description: "Inference time in milliseconds for the segment."
  fid_score:
    type: number
    description: "Fréchet Inception Distance score computed over the segment."
  proxy_mos:
    type: number
    description: "Proxy Mean Opinion Score."
  skip_action:
    type: boolean
    description: "Whether the segment was skipped."
  randomized_intervention:
    type: boolean
    description: "Whether the skip was forced by randomized intervention."
  fid_stability:
    type: number
    description: "Relative change in FID between skipped and full-solver segments."
required:
  - segment_id
  - latency_ms
  - fid_score
  - proxy_mos
  - skip_action
  - randomized_intervention
  - fid_stability
additionalProperties: false