$schema: "http://json-schema.org/draft-07/schema#"
title: "Extracted Dataset Schema"
description: "Schema for the time-series dataset containing latent deltas and turn-taking labels."
type: object
properties:
  timestamp:
    type: number
    description: "Timestamp in seconds from the start of the clip."
  turn_label:
    type: string
    enum:
      - "interruption"
      - "pause"
      - "normal"
    description: "Label indicating the type of turn-taking event."
  semantic_feature:
    type: array
    items:
      type: number
    description: "Vector of semantic features (e.g., text embedding)."
  prosodic_feature:
    type: array
    items:
      type: number
    description: "Vector of prosodic features (e.g., audio energy, pitch)."
  latent_delta_magnitude:
    type: number
    description: "Euclidean distance of the latent vector between current and previous frame."
  frame_id:
    type: integer
    description: "Unique identifier for the frame."
required:
  - timestamp
  - turn_label
  - semantic_feature
  - prosodic_feature
  - latent_delta_magnitude
  - frame_id
additionalProperties: false
