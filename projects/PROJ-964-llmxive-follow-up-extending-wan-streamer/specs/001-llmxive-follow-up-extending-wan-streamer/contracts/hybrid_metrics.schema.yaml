$schema: "http://json-schema.org/draft-07/schema#"
title: "hybrid_metrics"
description: "Schema for aggregated metrics of the hybrid inference run."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the simulation run."
  baseline_latency_ms:
    type: "number"
    description: "Latency of full flow-matching baseline."
  hybrid_latency_ms:
    type: "number"
    description: "Latency of hybrid pipeline."
  latency_reduction_pct:
    type: "number"
    description: "Percentage reduction in latency."
  baseline_fid:
    type: "number"
    description: "FID of baseline generation."
  hybrid_fid:
    type: "number"
    description: "FID of hybrid generation."
  fid_degradation_pct:
    type: "number"
    description: "Percentage degradation in FID."
  proxy_mos:
    type: "number"
    description: "Proxy Mean Opinion Score."
  tost_p_value:
    type: "number"
    description: "P-value from TOST equivalence test."
  bootstrap_p_value:
    type: "number"
    description: "P-value from stratified bootstrap."
required:
  - run_id
  - baseline_latency_ms
  - hybrid_latency_ms
  - latency_reduction_pct
  - baseline_fid
  - hybrid_fid
  - fid_degradation_pct
  - proxy_mos
  - tost_p_value
  - bootstrap_p_value
additionalProperties: false
