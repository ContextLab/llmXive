$schema: http://json-schema.org/draft-07/schema#
title: "Model Output Schema"
description: "Schema for the output of the GRU estimator during simulation."
type: object
properties:
  frame_id:
    type: integer
    description: "Frame ID."
  predicted_delta:
    type: number
    description: "Predicted latent delta magnitude."
  uncertainty_score:
    type: number
    description: "Model confidence (0.0 to 1.0)."
    minimum: 0.0
    maximum: 1.0
  skip_decision:
    type: boolean
    description: "True if solver step is skipped."
required:
  - frame_id
  - predicted_delta
  - uncertainty_score
  - skip_decision
additionalProperties: false