# Ruff configuration for PROJ-964-llmxive-follow-up-extending-wan-streamer
# Linting rules to enforce code quality, reproducibility, and research integrity

[lint]
# Select specific rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort (import sorting)
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade (modern syntax)
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "T20",    # flake8-print (prevent debug prints)
    "PIE",    # flake8-pie
    "RUF",    # Ruff-specific rules
]

# Ignore specific rules that are too strict for research code or conflict with style
ignore = [
    "E501",   # Line too long (handled by Black)
    "B008",   # Do not perform function call in argument defaults (common in data loading)
    "C408",   # Unnecessary dict call (sometimes clearer than {} in complex logic)
    "UP038",  # Use `X | Y` in `isinstance` call (legacy compatibility sometimes needed)
]

# Allow unused variables starting with underscore (common for unused loop vars)
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9_]+))$"

[lint.isort]
known-first-party = ["code"]
known-third-party = ["torch", "numpy", "pandas", "pytest", "scipy", "sklearn", "datasets", "yaml", "videomae"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
force-to-top = ["torch", "numpy", "pandas"]
lines-after-imports = 2

[lint.per-file-ignores]
# Allow print statements in main scripts for logging, but not in modules
"code/data/*.py" = ["T201"]
"code/models/*.py" = ["T201"]
"code/tasks/*.py" = ["T201"]
# Allow unused imports in __init__ files if re-exporting
"code/__init__.py" = ["F401"]
# Tests can have unused variables for fixtures
"tests/**/*.py" = ["ARG001", "F811"]

[lint.flake8-bugbear]
extend-immutable-calls = ["torch.no_grad", "torch.inference_mode"]

[format]
# Enforce Black-compatible formatting
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
docstring-code-format = true
docstring-code-line-length = 88

[lint.pydocstyle]
convention = "numpy"

[lint.mccabe]
max-complexity = 15  # Slightly higher for complex data processing logic

[lint.flake8-unused-arguments]
ignore-variadic-names = true