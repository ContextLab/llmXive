[flake8]
max-line-length = 88
exclude = venv,env,build,dist,.git,__pycache__
ignore = E203,W503
per-file-ignores =
    __init__.py:F401

[isort]
profile = black
line_length = 88
skip = venv,env,build,dist,.git
known_first_party = code

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
exclude = venv|env|build|dist
