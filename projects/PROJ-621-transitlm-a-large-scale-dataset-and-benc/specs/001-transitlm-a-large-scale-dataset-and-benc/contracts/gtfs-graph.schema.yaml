$schema: "http://json-schema.org/draft-07/schema#"
title: "GTFS Graph Schema"
description: "Schema for the ground-truth GTFS graph used for validation."
type: "object"
properties:
  graph_type:
    type: "string"
    const: "networkx_digraph"
  nodes:
    type: "array"
    items:
      type: "object"
      properties:
        stop_id:
          type: "string"
        stop_name:
          type: "string"
      required:
        - stop_id
        - stop_name
  edges:
    type: "array"
    items:
      type: "object"
      properties:
        from_stop:
          type: "string"
        to_stop:
          type: "string"
        route_id:
          type: "string"
      required:
        - from_stop
        - to_stop
        - route_id
required:
  - graph_type
  - nodes
  - edges
