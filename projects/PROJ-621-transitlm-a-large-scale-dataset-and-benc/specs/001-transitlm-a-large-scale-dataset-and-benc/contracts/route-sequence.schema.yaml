$schema: "http://json-schema.org/draft-07/schema#"
title: "Route Sequence Schema"
description: "Schema for map-free text sequences generated from GTFS."
type: "object"
properties:
  sequence_id:
    type: "string"
    format: "uuid"
  origin_station:
    type: "string"
  destination_station:
    type: "string"
  line_id:
    type: "string"
  sequence_text:
    type: "string"
    description: "Natural language text without coordinates."
  ground_truth_path:
    type: "array"
    items:
      type: "string"
  is_held_out:
    type: "boolean"
required:
  - sequence_id
  - origin_station
  - destination_station
  - sequence_text
  - ground_truth_path
  - is_held_out
