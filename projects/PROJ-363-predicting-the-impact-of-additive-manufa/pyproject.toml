[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-363-additive-manufacturing-porosity"
version = "0.1.0"
description = "Predicting the impact of additive manufacturing parameters on the porosity of 316L Stainless Steel"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "shap>=0.44.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "pyyaml>=6.0",
    "jsonschema>=4.19.0",
    "requests>=2.31.0",
]
optional-dependencies = {dev = ["ruff>=0.1.0", "black>=23.0.0", "pytest>=7.4.0"]}

[tool.ruff]
# Inherits from ruff.toml in the root, but this section ensures
# the project is recognized as a Python package if needed.
src = ["code", "tests"]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | models
    | results
)/
'''
