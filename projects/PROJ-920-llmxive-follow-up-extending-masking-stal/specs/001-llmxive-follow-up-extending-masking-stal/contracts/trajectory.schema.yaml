$schema: "http://json-schema.org/draft-07/schema#"
title: "Trajectory Schema"
description: "Schema for synthetic search trajectories generated by the simulator."
type: object
properties:
  trajectory_id:
    type: string
    description: "Unique identifier for the trajectory."
  turns:
    type: array
    description: "List of turns in the search session."
    items:
      type: object
      properties:
        turn_index:
          type: integer
          description: "Index of the turn (0-based)."
        text:
          type: string
          description: "Text content of the turn."
        entropy:
          type: number
          description: "Shannon entropy of the text block (bits/token)."
        technical_ratio:
          type: number
          description: "Proportion of technical tokens."
        density:
          type: number
          description: "Composite density metric (0.6*entropy + 0.4*ratio)."
      required:
        - turn_index
        - text
        - entropy
        - technical_ratio
        - density
  ground_truth:
    type: object
    properties:
      critical_turn_index:
        type: integer
        description: "Index of the turn containing critical evidence."
      density_level:
        type: string
        enum:
          - low
          - medium
          - high
        description: "Qualitative density label."
      target_success:
        type: boolean
        description: "Theoretical success if horizon is infinite."
    required:
      - critical_turn_index
      - density_level
      - target_success
required:
  - trajectory_id
  - turns
  - ground_truth
additionalProperties: false
