$schema: "http://json-schema.org/draft-07/schema#"
title: "Regression Output Schema"
description: "Schema for the results of the logistic regression analysis."
type: object
properties:
  model_summary:
    type: object
    properties:
      formula:
        type: string
        description: "GLM formula used."
      n_observations:
        type: integer
        description: "Total number of simulation records."
      pseudo_r_squared:
        type: number
        description: "McFadden's R-squared."
    required:
      - formula
      - n_observations
      - pseudo_r_squared
  coefficients:
    type: array
    description: "List of coefficient estimates."
    items:
      type: object
      properties:
        term:
          type: string
        estimate:
          type: number
        std_error:
          type: number
        z_value:
          type: number
        p_value:
          type: number
      required:
        - term
        - estimate
        - std_error
        - z_value
        - p_value
  interaction_significance:
    type: object
    properties:
      p_value:
        type: number
        description: "P-value for the density*horizon interaction term."
      supported_hypothesis:
        type: boolean
        description: "True if p < 0.05."
    required:
      - p_value
      - supported_hypothesis
  plot_path:
    type: string
    description: "Relative path to the generated PNG file."
required:
  - model_summary
  - coefficients
  - interaction_significance
  - plot_path
additionalProperties: false
