$schema: http://json-schema.org/draft-07/schema#
title: Reasoning Evaluation Output Schema
description: Schema for the reasoning evaluation results.
type: object
properties:
  problem_id:
    type: string
    description: Problem identifier
    minLength: 1
  Pass@1:
    type: number
    description: Fraction of correct solutions (k=1)
    minimum: 0.0
    maximum: 1.0
  Pass@5:
    type: number
    description: Fraction of correct solutions (k=5)
    minimum: 0.0
    maximum: 1.0
  Pass@10:
    type: number
    description: Fraction of correct solutions (k=10)
    minimum: 0.0
    maximum: 1.0
  total_problems:
    type: integer
    description: Number of problems evaluated
    minimum: 1
  execution_time:
    type: number
    description: Total time in seconds
    minimum: 0.0
required:
  - problem_id
  - Pass@1
  - Pass@5
  - Pass@10
  - total_problems
  - execution_time
additionalProperties: false