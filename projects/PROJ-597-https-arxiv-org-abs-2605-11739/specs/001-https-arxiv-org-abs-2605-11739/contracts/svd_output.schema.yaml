$schema: http://json-schema.org/draft-07/schema#
title: SVD Output Schema
description: Schema for the singular value decomposition analysis results (Delta W).
type: object
properties:
  layer_id:
    type: integer
    description: Identifier of the model layer
    minimum: 0
  singular_value:
    type: number
    description: Singular value sigma_i of Delta W
    exclusiveMinimum: 0
  index:
    type: integer
    description: Rank index (0-based)
    minimum: 0
  cumulative_energy:
    type: number
    description: Cumulative sum of sigma squared
    minimum: 0.0
    maximum: 1.0
required:
  - layer_id
  - singular_value
  - index
  - cumulative_energy
additionalProperties: false