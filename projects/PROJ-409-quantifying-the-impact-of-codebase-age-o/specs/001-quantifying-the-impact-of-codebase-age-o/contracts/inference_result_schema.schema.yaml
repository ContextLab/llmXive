$schema: "http://json-schema.org/draft-07/schema#"
title: "Snippet Metrics Schema"
description: "Schema for the intermediate snippet metrics CSV file (before aggregation)."
type: "object"
properties:
  snippet_id:
    type: "string"
    description: "Unique identifier for the snippet."
  file_path:
    type: "string"
    description: "Relative path in the repository."
  repo_url:
    type: "string"
    format: "uri"
    description: "Source GitHub URL."
  perplexity:
    type: "number"
    description: "Model perplexity score. NaN if failed."
  syntax_valid:
    type: "boolean"
    description: "Whether the snippet has valid syntax."
  cyclomatic_complexity:
    type: "integer"
    minimum: 1
    description: "Cyclomatic complexity of the snippet."
  token_count:
    type: "integer"
    minimum: 50
    description: "Approximate token count."
  inference_time_ms:
    type: "integer"
    minimum: 0
    description: "Time taken for inference."
  inference_error:
    type: ["string", "null"]
    description: "Error message if inference failed."
  inference_timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of inference."
required:
  - snippet_id
  - file_path
  - repo_url
  - perplexity
  - syntax_valid
  - cyclomatic_complexity
  - token_count
  - inference_timestamp
additionalProperties: false

