$schema: "http://json-schema.org/draft-07/schema#"
title: "Snippet Schema"
description: "Schema for the extracted code snippets CSV file."
type: "object"
properties:
  snippet_id:
    type: "string"
    description: "Unique identifier for the snippet."
  repo_url:
    type: "string"
    format: "uri"
    description: "Source GitHub URL."
  file_path:
    type: "string"
    description: "Relative path in the repository."
  function_name:
    type: "string"
    description: "Name of the extracted function."
  code_content:
    type: "string"
    description: "The source code content."
  token_count:
    type: "integer"
    minimum: 50
    description: "Approximate token count."
  median_commit_age_days:
    type: "number"
    minimum: 0
    description: "Median age of commits in days."
  low_confidence_age:
    type: "boolean"
    description: "Flag for age calculation reliability."
  extraction_timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of extraction."
required:
  - snippet_id
  - repo_url
  - file_path
  - function_name
  - code_content
  - token_count
  - median_commit_age_days
  - low_confidence_age
  - extraction_timestamp
additionalProperties: false
