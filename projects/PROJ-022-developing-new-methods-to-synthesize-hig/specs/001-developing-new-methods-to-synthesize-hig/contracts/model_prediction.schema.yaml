$schema: "http://json-schema.org/draft-07/schema#"
title: ModelPrediction
description: "Schema for a model prediction output."
type: object
properties:
  candidate_smiles:
    type: string
    description: "SMILES string of the candidate."
  predicted_permeability:
    type: number
    description: "Predicted permeability in Barrer."
  predicted_selectivity:
    type: number
    description: "Predicted selectivity."
  confidence_interval_lower:
    type: number
    description: "Lower bound of 95% CI."
  confidence_interval_upper:
    type: number
    description: "Upper bound of 95% CI."
  rank:
    type: integer
    description: "Rank in the screened library."
    minimum: 1
required:
  - candidate_smiles
  - predicted_permeability
  - predicted_selectivity
  - rank