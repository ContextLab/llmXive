$schema: "http://json-schema.org/draft-07/schema#"
title: "BES Circle Packing Output Schema"
type: "object"
description: "Schema for validating the output of the circle_packing BES run."
required:
  - "run_id"
  - "task_name"
  - "candidates"
  - "search_events"
  - "summary"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (UUID)."
  task_name:
    type: "string"
    const: "circle_packing"
    description: "The benchmark task executed."
  candidates:
    type: "array"
    minItems: 3
    description: "List of generated solution candidates."
    items:
      type: "object"
      required:
        - "id"
        - "content"
        - "is_valid"
        - "score"
      properties:
        id:
          type: "string"
          description: "Candidate unique ID."
        content:
          type: "string"
          description: "The generated code or text artifact."
        is_valid:
          type: "boolean"
          description: "True if the solution passes geometric constraints."
        score:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Quantitative validity score."
        constraints_violated:
          type: "array"
          items:
            type: "string"
          description: "List of specific constraint violations (e.g., 'circle_overlap')."
  search_events:
    type: "array"
    description: "Chronological log of search dynamics."
    items:
      type: "object"
      required:
        - "timestamp"
        - "type"
      properties:
        timestamp:
          type: "string"
          format: "date-time"
          description: "ISO 8601 timestamp."
        type:
          type: "string"
          enum:
            - "forward_expansion"
            - "backward_decomposition"
            - "evaluation"
            - "timeout"
          description: "Type of search event."
        details:
          type: "object"
          description: "Event-specific context data."
  summary:
    type: "object"
    required:
      - "total_candidates"
      - "valid_candidates"
      - "backward_decomposition_count"
      - "runtime_seconds"
      - "status"
    properties:
      total_candidates:
        type: "integer"
        minimum: 0
        description: "Total number of candidates generated."
      valid_candidates:
        type: "integer"
        minimum: 0
        description: "Number of candidates that passed validation."
      backward_decomposition_count:
        type: "integer"
        minimum: 0
        description: "Count of backward decomposition events (must be >= 5 for success)."
      runtime_seconds:
        type: "number"
        minimum: 0
        description: "Total execution time in seconds."
      status:
        type: "string"
        enum:
          - "success"
          - "timeout"
          - "error"
        description: "Final status of the run."
