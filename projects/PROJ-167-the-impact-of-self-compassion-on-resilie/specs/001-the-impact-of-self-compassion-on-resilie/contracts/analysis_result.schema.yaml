$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult"
description: "Schema for the output of the ANCOVA analysis for a single outcome variable."
type: object
properties:
  outcome_variable:
    type: string
    description: "Name of the dependent variable (anxiety, rumination, self_efficacy)"
  interaction_coeff:
    type: number
    description: "Coefficient for the interaction term (SCS_z * Feedback)"
  interaction_se:
    type: number
    description: "Robust (HC3) standard error for the interaction term"
  interaction_p:
    type: number
    description: "Raw p-value for the interaction term"
  interaction_p_adj:
    type: number
    description: "Holm-Bonferroni adjusted p-value"
  interaction_ci_lower:
    type: number
    description: "95% Confidence Interval lower bound"
  interaction_ci_upper:
    type: number
    description: "95% Confidence Interval upper bound"
  partial_eta_squared:
    type: number
    description: "Partial eta-squared effect size"
  vif_scs:
    type: number
    description: "Variance Inflation Factor for SCS"
  vif_feedback:
    type: number
    description: "Variance Inflation Factor for Feedback"
  heteroskedastic_flag:
    type: boolean
    description: "True if Breusch-Pagan test p < 0.10"
  bootstrap_ci_lower:
    type: number
    description: "95% Bootstrap CI lower bound"
  bootstrap_ci_upper:
    type: number
    description: "95% Bootstrap CI upper bound"
  homogeneity_flag:
    type: boolean
    description: "True if homogeneity of slopes assumption violated"
  bootstrap_converged:
    type: boolean
    description: "True if bootstrap CI width stabilized"
required:
  - outcome_variable
  - interaction_coeff
  - interaction_se
  - interaction_p
  - interaction_p_adj
  - interaction_ci_lower
  - interaction_ci_upper
  - partial_eta_squared
  - vif_scs
  - vif_feedback
  - heteroskedastic_flag
  - bootstrap_ci_lower
  - bootstrap_ci_upper
  - homogeneity_flag
  - bootstrap_converged
