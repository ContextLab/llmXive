$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for the output of the ANCOVA analysis including interaction terms."
type: object
properties:
  outcome:
    type: string
    description: "Name of the outcome variable (e.g., 'anxiety', 'rumination', 'self_efficacy')"
  model_type:
    type: string
    description: "Type of model used (e.g., 'ANCOVA', 'Stratified')"
  interaction_term:
    type: string
    description: "Name of the interaction term (e.g., 'C(feedback)[T.2]:SCS_z')"
  interaction_coef:
    type: number
    description: "Coefficient of the interaction term"
  interaction_se:
    type: number
    description: "Standard error of the interaction term (HC3 robust)"
  interaction_pval:
    type: number
    description: "P-value of the interaction term"
  interaction_pval_adjusted:
    type: number
    description: "Holm-Bonferroni adjusted p-value"
  interaction_ci_lower:
    type: number
    description: "Lower bound of 95% CI"
  interaction_ci_upper:
    type: number
    description: "Upper bound of 95% CI"
  partial_eta2:
    type: number
    description: "Partial eta-squared effect size"
  vif_values:
    type: object
    description: "Variance Inflation Factors for predictors"
    additionalProperties:
      type: number
  bootstrap_ci_lower:
    type: number
    description: "Lower bound of bootstrap 95% CI"
  bootstrap_ci_upper:
    type: number
    description: "Upper bound of bootstrap 95% CI"
  bootstrap_converged:
    type: boolean
    description: "Whether the bootstrap converged"
  homogeneity_violated:
    type: boolean
    description: "Whether the homogeneity of regression slopes assumption was violated"
  interpretation_caveat:
    type: string
    description: "Caveat text if homogeneity violated or randomization absent"
required:
  - outcome
  - model_type
  - interaction_term
  - interaction_coef
  - interaction_se
  - interaction_pval
  - interaction_pval_adjusted
  - interaction_ci_lower
  - interaction_ci_upper
  - partial_eta2
  - vif_values
  - bootstrap_ci_lower
  - bootstrap_ci_upper
  - bootstrap_converged
  - homogeneity_violated