$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult Contract"
type: object
required:
  - outcome
  - interaction_coefficient
  - std_error
  - p_value
  - ci_lower
  - ci_upper
  - partial_eta_sq
  - robust_se_flag
  - heteroskedasticity_flag
  - bootstrap_ci_lower
  - bootstrap_ci_upper
  - plot_paths
  - report_path
properties:
  outcome:
    type: string
    description: "Name of the dependent variable (e.g., anxiety, rumination, self_efficacy)."
  interaction_coefficient:
    type: number
    description: "Coefficient for the interaction term C(feedback)[T.2]:SCS_z."
  std_error:
    type: number
    description: "Standard error of the interaction coefficient (parametric)."
  p_value:
    type: number
    description: "Two‑tailed p‑value for the interaction term."
  ci_lower:
    type: number
    description: "Lower bound of the 95 % confidence interval (parametric)."
  ci_upper:
    type: number
    description: "Upper bound of the 95 % confidence interval (parametric)."
  partial_eta_sq:
    type: number
    description: "Partial η² effect size for the interaction."
  robust_se_flag:
    type: boolean
    description: "True if HC3 robust SEs were used in reporting."
  heteroskedasticity_flag:
    type: boolean
    description: "True if Breusch‑Pagan test p < 0.10."
  bootstrap_ci_lower:
    type: number
    description: "Lower bound of the bootstrap 95 % confidence interval for the interaction coefficient."
  bootstrap_ci_upper:
    type: number
    description: "Upper bound of the bootstrap 95 % confidence interval for the interaction coefficient."
  plot_paths:
    type: array
    items:
      type: string
    description: "List of file paths (PNG) for simple‑slope plots associated with this outcome."
  report_path:
    type: string
    description: "File path to the generated HTML report (same for all outcomes)."
additionalProperties: false
