$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
type: "object"
properties:
  data_summary:
    type: "object"
    properties:
      initial_n:
        type: "integer"
        description: "Initial number of participants"
      final_n:
        type: "integer"
        description: "Number of participants after listwise deletion"
      exclusions:
        type: "integer"
        description: "Number of excluded participants"
      power_warning:
        type: "boolean"
        description: "True if final_n < 92"
  models:
    type: "object"
    description: "Results for each outcome model"
    properties:
      anxiety:
        $ref: "#/$defs/model_result"
      rumination:
        $ref: "#/$defs/model_result"
      self_efficacy:
        $ref: "#/$defs/model_result"
  robustness:
    type: "object"
    properties:
      self_kindness_subscale:
        type: "object"
        description: "Results using Self-Kindness as moderator"
      vif_values:
        type: "object"
        description: "Variance Inflation Factors for predictors"
      sensitivity_analysis:
        type: "object"
        description: "Significant counts at alpha 0.01, 0.05, 0.10"
  artifacts:
    type: "object"
    properties:
      plots:
        type: "array"
        items:
          type: "string"
          description: "File paths to generated PNG plots"
      report_html:
        type: "string"
        description: "Path to the generated HTML report"
  metadata:
    type: "object"
    properties:
      randomization_status:
        type: "string"
        enum:
          - "confirmed"
          - "unknown"
          - "not_confirmed"
        description: "Status of experimental randomization verification"
      causal_claim:
        type: "string"
        enum:
          - "causal"
          - "associational"
        description: "Whether findings are framed as causal or associational"
  $defs:
    model_result:
      type: "object"
      properties:
        interaction_coefficient:
          type: "number"
          description: "Coefficient for Feedback x SCS interaction"
        interaction_se:
          type: "number"
          description: "Standard error of the interaction"
        interaction_pvalue:
          type: "number"
          description: "Raw p-value"
        interaction_pvalue_adjusted:
          type: "number"
          description: "Holm-Bonferroni adjusted p-value"
        interaction_ci_lower:
          type: "number"
          description: "Lower bound of 95% CI"
        interaction_ci_upper:
          type: "number"
          description: "Upper bound of 95% CI"
        interaction_partial_eta2:
          type: "number"
          description: "Partial eta-squared for interaction"
        bootstrap_ci_lower:
          type: "number"
          description: "Bootstrap 95% CI lower bound"
        bootstrap_ci_upper:
          type: "number"
          description: "Bootstrap 95% CI upper bound"
        heteroskedasticity_flag:
          type: "boolean"
          description: "True if Breusch-Pagan p < 0.10"
      required:
        - interaction_coefficient
        - interaction_pvalue
        - interaction_pvalue_adjusted
required:
  - data_summary
  - models
  - robustness
  - artifacts
  - metadata
description: "Schema for the structured output of the analysis pipeline, including model results, robustness checks, and metadata."
