$schema: "http://json-schema.org/draft-07/schema#"
title: "FeedbackSelfCompassionDataset"
description: "Schema for the raw dataset downloaded from OSF. Verifies required columns for the analysis."
type: object
properties:
  participant_id:
    type: string
    description: "Unique participant identifier"
  scf_total:
    type: number
    description: "Total Self-Compassion Scale score"
  scf_self_judgment:
    type: ["number", "null"]
    description: "Self-Judgment subscale (optional)"
  scf_self_kindness:
    type: ["number", "null"]
    description: "Self-Kindness subscale (optional)"
  stai_pre:
    type: number
    description: "Pre-task State Anxiety Inventory score"
  stai_post:
    type: number
    description: "Post-task State Anxiety Inventory score"
  rrs_pre:
    type: number
    description: "Pre-task Ruminative Responses Scale score"
  rrs_post:
    type: number
    description: "Post-task Ruminative Responses Scale score"
  gse_pre:
    type: number
    description: "Pre-task General Self-Efficacy Scale score"
  gse_post:
    type: number
    description: "Post-task General Self-Efficacy Scale score"
  feedback_cond:
    type: string
    description: "Feedback condition"
    enum:
      - "Positive"
      - "Neutral"
      - "Negative"
  age:
    type: integer
    description: "Participant age"
  gender:
    type: string
    description: "Gender"
  big_five_openness:
    type: ["number", "null"]
    description: "Big Five Openness (optional)"
  big_five_conscientiousness:
    type: ["number", "null"]
    description: "Big Five Conscientiousness (optional)"
  big_five_extraversion:
    type: ["number", "null"]
    description: "Big Five Extraversion (optional)"
  big_five_agreeableness:
    type: ["number", "null"]
    description: "Big Five Agreeableness (optional)"
  big_five_neuroticism:
    type: ["number", "null"]
    description: "Big Five Neuroticism (optional)"
required:
  - participant_id
  - scf_total
  - stai_pre
  - stai_post
  - rrs_pre
  - rrs_post
  - gse_pre
  - gse_post
  - feedback_cond
  - age
  - gender
