$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema for Self-Compassion Feedback Study"
description: "Schema for the raw and processed dataset columns required for the analysis."
type: object
properties:
  participant_id:
    type: string
    description: "Unique participant identifier"
  scf_total:
    type: number
    description: "Total Self-Compassion Scale score"
  scf_self_kindness:
    type: number
    description: "Self-Kindness subscale score"
  stai_pre:
    type: number
    description: "State-Trait Anxiety Inventory pre-feedback score"
  stai_post:
    type: number
    description: "State-Trait Anxiety Inventory post-feedback score"
  rrs_pre:
    type: number
    description: "Ruminative Responses Scale pre-feedback score"
  rrs_post:
    type: number
    description: "Ruminative Responses Scale post-feedback score"
  gse_pre:
    type: number
    description: "General Self-Efficacy Scale pre-feedback score"
  gse_post:
    type: number
    description: "General Self-Efficacy Scale post-feedback score"
  feedback_cond:
    type: string
    enum: ["Positive Feedback", "Neutral", "Negative Feedback"]
    description: "Experimental feedback condition"
  age:
    type: integer
    description: "Participant age"
  gender:
    type: string
    description: "Participant gender"
required:
  - participant_id
  - scf_total
  - scf_self_kindness
  - stai_pre
  - stai_post
  - rrs_pre
  - rrs_post
  - gse_pre
  - gse_post
  - feedback_cond
  - age
  - gender
