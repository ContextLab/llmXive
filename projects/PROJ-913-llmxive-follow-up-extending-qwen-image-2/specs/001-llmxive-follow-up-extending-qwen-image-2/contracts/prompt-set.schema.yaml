$schema: "http://json-schema.org/draft-07/schema#"
title: "PromptSet Schema"
description: "Schema for the curated prompt set used in the generalization gap study."
type: "object"
properties:
  id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the prompt set."
  prompts:
    type: "array"
    items:
      type: "object"
      properties:
        prompt_id:
          type: "string"
          format: "uuid"
        text:
          type: "string"
          description: "The prompt text."
        distribution_type:
          type: "string"
          enum:
            - "in_distribution"
            - "out_of_distribution"
        source:
          type: "string"
          description: "Source dataset name."
        checksum:
          type: "string"
          description: "SHA-256 checksum of the prompt text."
        embedding_similarity:
          type: "number"
          minimum: 0
          maximum: 1
          description: "Cosine similarity to ID centroid (only for OOD)."
      required:
        - prompt_id
        - text
        - distribution_type
        - source
        - checksum
  metadata:
    type: "object"
    properties:
      total_count:
        type: "integer"
        minimum: 0
      leakage_check_passed:
        type: "boolean"
      curation_iterations:
        type: "integer"
        minimum: 0
      timestamp:
        type: "string"
        format: "date-time"
    required:
      - total_count
      - leakage_check_passed
      - timestamp
required:
  - id
  - prompts
  - metadata
additionalProperties: false
