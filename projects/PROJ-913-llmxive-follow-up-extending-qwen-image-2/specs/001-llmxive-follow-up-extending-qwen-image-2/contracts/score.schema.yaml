$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationScore"
description: "Schema for evaluation scores assigned to generated images."
type: "object"
properties:
  score_id:
    type: "string"
    description: "Unique identifier for the score (UUID)."
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  image_id:
    type: "string"
    description: "Reference to the image."
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  metric_name:
    type: "string"
    description: "Name of the evaluation metric."
    enum:
      - "aesthetics"
      - "prompt_adherence"
      - "identity_preservation"
  score_value:
    type: "number"
    description: "Score value (0-1)."
    minimum: 0
    maximum: 1
  reward_model_version:
    type: "string"
    description: "Version of the VLM reward model."
required:
  - score_id
  - image_id
  - metric_name
  - score_value
  - reward_model_version
additionalProperties: false
