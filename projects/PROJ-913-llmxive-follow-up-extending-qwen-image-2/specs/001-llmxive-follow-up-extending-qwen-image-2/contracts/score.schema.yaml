$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationScore"
description: "Schema for VLM-based reward model scores."
type: "object"
properties:
  id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the score record."
  image_id:
    type: "string"
    format: "uuid"
    description: "Foreign key to the generated image."
  metric:
    type: "string"
    enum:
      - "aesthetics"
      - "prompt_adherence"
      - "identity_preservation"
    description: "The metric being scored."
  model:
    type: "string"
    description: "Name of the VLM model used."
  value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "The score value."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of scoring."
required:
  - "id"
  - "image_id"
  - "metric"
  - "model"
  - "value"
  - "timestamp"
additionalProperties: false
