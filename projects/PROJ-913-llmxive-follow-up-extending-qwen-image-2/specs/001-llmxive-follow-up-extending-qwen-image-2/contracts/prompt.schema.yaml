$schema: "http://json-schema.org/draft-07/schema#"
title: "PromptSet"
description: "Schema for the curated prompt sets (ID and OOD)."
type: "object"
properties:
  id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the prompt."
  text:
    type: "string"
    description: "The text of the prompt."
  category:
    type: "string"
    enum:
      - "id"
      - "ood"
    description: "Distribution category."
  embedding:
    type:
      - "array"
      - "null"
    items:
      type: "number"
    description: "Optional embedding vector for validation."
required:
  - "id"
  - "text"
  - "category"
additionalProperties: false
