$schema: "http://json-schema.org/draft-07/schema#"
title: "DatasetManifest"
description: "Schema for the dataset download and checksum manifest."
type: "object"
properties:
  dataset_name:
    type: "string"
    description: "Name of the dataset."
  source_url:
    type: "string"
    format: "uri"
    description: "Verified URL of the dataset."
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the downloaded file."
  status:
    type: "string"
    enum:
      - "downloaded"
      - "verified"
      - "failed"
    description: "Status of the download."
required:
  - "dataset_name"
  - "source_url"
  - "checksum"
  - "status"
additionalProperties: false
