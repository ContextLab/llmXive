$schema: "http://json-schema.org/draft-07/schema#"
title: "Processed Subject Dataset Schema"
description: "Schema for the cleaned subject data containing behavioral and demographic information."
type: object
properties:
  subject_id:
    type: string
    description: "Unique identifier for the subject."
  age:
    type: integer
    description: "Age of the subject in years."
  sex:
    type: string
    description: "Sex of the subject."
    enum:
      - "M"
      - "F"
      - "Other"
  pre_motor_score:
    type: number
    description: "Motor task performance score before consolidation."
  post_motor_score:
    type: number
    description: "Motor task performance score after consolidation."
  improvement_score:
    type: number
    description: "Calculated percentage improvement."
  excluded_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if the subject was dropped."
required:
  - subject_id
  - age
  - sex
  - pre_motor_score
  - post_motor_score
  - improvement_score
additionalProperties: false
