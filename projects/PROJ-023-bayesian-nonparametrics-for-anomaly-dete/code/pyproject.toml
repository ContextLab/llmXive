[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bayesian-nonparametrics-anomaly-detection"
version = "0.1.0"
description = "Bayesian Nonparametrics for Anomaly Detection in Time Series"
requires-python = ">=3.11"
dependencies = [
    "pymc>=5.0.0,<6.0.0",
    "numpyro>=1.3.0,<1.4.0",
    "scikit-learn>=1.3.0,<1.4.0",
    "pandas>=2.0.0,<2.1.0",
    "scipy>=1.11.0,<1.12.0",
    "matplotlib>=3.7.0,<3.8.0",
    "seaborn>=0.12.0,<0.13.0",
    "pyyaml>=6.0.0,<6.1.0",
    "bootstrapped>=0.3.0,<0.4.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git
  | \.venv
  | venv
  | __pycache__
  | data
  | paper
)/
'''

[tool.ruff]
# Ruff configuration is also defined in .ruff.toml for IDE compatibility
# This section mirrors settings for project-level tooling
line-length = 88
target-version = "py311"
extend-exclude = ["data", "paper"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
