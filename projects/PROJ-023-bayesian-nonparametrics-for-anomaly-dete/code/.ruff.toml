# Ruff configuration for llmXive project
# Enforces consistent style, linting, and formatting rules

[lint]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function call in argument defaults (common in PyMC/Numpyro)
]

# Allow autofix for all enabled rules (when `--fix` is provided).
fixable = ["ALL"]
unfixable = []

# Exclude a few specific files or directories.
extend-exclude = [
    "__pycache__",
    ".git",
    ".venv",
    "venv",
    "data", # Exclude generated data files from linting
    "paper", # Exclude markdown/reports
]

# Same as `--force-exclude`.
force-exclude = true

# Assume Python 3.11
target-version = "py311"

[lint.isort]
known-first-party = ["lib", "scripts", "tests", "contracts"]
force-sort-within-sections = true
