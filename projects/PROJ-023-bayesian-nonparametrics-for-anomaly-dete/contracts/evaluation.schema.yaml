# Evaluation Schema for Anomaly Detection Metrics
# Defines the structure of evaluation results and statistical tests

$schema: http://json-schema.org/draft-07/schema#
title: EvaluationResults
description: Schema for evaluation metrics, confidence intervals, and statistical test results

metrics:
  precision:
    type: float
    description: Precision score
    constraints:
      - range: [0.0, 1.0]
    unit: ratio

  recall:
    type: float
    description: Recall score
    constraints:
      - range: [0.0, 1.0]
    unit: ratio

  f1_score:
    type: float
    description: F1 harmonic mean of precision and recall
    constraints:
      - range: [0.0, 1.0]
    unit: ratio

  auc_roc:
    type: float
    description: Area Under the Receiver Operating Characteristic Curve
    constraints:
      - range: [0.0, 1.0]
    unit: ratio

  brier_score:
    type: float
    description: Brier score for probability calibration
    constraints:
      - range: [0.0, 1.0]
    unit: ratio

confidence_intervals:
  type: object
  description: Bootstrap confidence intervals for metrics
  properties:
    metric_name:
      type: string
    lower_bound:
      type: float
    upper_bound:
      type: float
    confidence_level:
      type: float
      default: 0.95
    bootstrap_samples:
      type: integer
      minimum: 1000

statistical_tests:
  type: object
  description: Results of statistical significance tests
  properties:
    test_type:
      type: string
      enum: [wilcoxon_signed_rank, paired_t_test, bonferroni_corrected]
    p_value:
      type: float
      minimum: 0.0
      maximum: 1.0
    adjusted_p_value:
      type: float
      minimum: 0.0
      maximum: 1.0
      description: P-value after Bonferroni or Benjamini-Hochberg correction
    significant_at_alpha:
      type: boolean
      description: Whether the result is significant at alpha=0.05

thresholds:
  type: object
  description: Decision thresholds used for evaluation
  properties:
    specificity_target:
      type: float
      description: Target specificity level
    f1_optimal_threshold:
      type: float
      description: Threshold that maximizes F1 score
    method:
      type: string
      enum: [fixed_sensitivity, f1_optimal, specificity_target]
