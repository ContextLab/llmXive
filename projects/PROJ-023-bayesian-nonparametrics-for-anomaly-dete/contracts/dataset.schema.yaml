# Dataset Schema for Bayesian Nonparametrics Anomaly Detection
# Defines the structure of input time series data
$schema: http://json-schema.org/draft-07/schema#
title: TimeSeriesDataset
description: Schema for raw and processed time series data used in anomaly detection research

columns:
  - name: timestamp
    type: integer
    description: Unix timestamp in milliseconds
    constraints:
      - monotonic_increasing: true
      - no_nulls: true
    unit: ms

  - name: value
    type: float
    description: Observed time series value
    constraints:
      - no_nulls: true
      - range:
          min: -1.0e10
          max: 1.0e10
    unit: dimensionless

  - name: is_anomaly
    type: boolean
    description: Ground truth anomaly flag (only present in processed/ground_truth files)
    constraints:
      - no_nulls: true
      - values: [0, 1]
    unit: binary

metadata:
  required_fields:
    - dataset_name
    - source_url
    - version
    - checksum_sha256
    - num_samples
    - num_features
    - sampling_rate_hz
    - license
