# Prediction Schema for Anomaly Detection Outputs
# Defines the structure of prediction files from all methods

$schema: http://json-schema.org/draft-07/schema#
title: AnomalyPredictions
description: Schema for anomaly detection prediction outputs

columns:
  - name: timestamp
    type: integer
    description: Unix timestamp in milliseconds
    constraints:
      - monotonic_increasing: true
      - no_nulls: true
    unit: ms

  - name: anomaly_score
    type: float
    description: Continuous anomaly score (higher = more anomalous)
    constraints:
      - no_nulls: true
      - range:
          min: 0.0
          max: 1.0
    unit: probability

  - name: is_predicted_anomaly
    type: boolean
    description: Binary anomaly flag after thresholding
    constraints:
      - no_nulls: true
      - values: [0, 1]
    unit: binary

  - name: method_name
    type: string
    description: Name of the detection method (e.g., bayesian_gp, shewhart, cusum, vae)
    constraints:
      - enum: [bayesian_gp, shewhart, cusum, vae]

  - name: threshold_used
    type: float
    description: Threshold value used for binary classification
    constraints:
      - range: [0.0, 1.0]
    unit: probability

metadata:
  required_fields:
    - method_name
    - threshold_used
    - num_predictions
    - num_anomalies_detected
    - execution_time_seconds
    - peak_memory_mb
    - seed_used
    - version