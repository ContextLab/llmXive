[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "political-news-implicit-bias"
version = "0.1.0"
description = "Analysis of self-reported political news exposure on implicit political bias"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.1.4",
    "scikit-learn==1.3.2",
    "statsmodels==0.14.1",
    "seaborn==0.13.2",
    "matplotlib==3.8.2",
    "scipy==1.11.4",
    "jinja2==3.1.2",
    "pyyaml==6.0.1",
    "pytest==7.4.3",
    "python-dotenv==1.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
