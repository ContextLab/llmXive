version: "1.0.0"
description: >
  Schema for the Project Implicit Political IAT dataset.
  Defines required columns, data types, and validation logic
  to ensure data integrity before analysis.
source: "Project Implicit"
last_updated: "2023-10-27"

columns:
  - name: IAT_D_score
    type: float
    description: >
      The D-score measure of implicit bias from the Implicit Association Test.
      Positive values indicate bias toward the first category, negative toward the second.
    validation:
      - min: -4.0
        max: 4.0
        message: "IAT_D_score must be between -4.0 and 4.0."
      - not_null: true
        message: "IAT_D_score cannot be null."

  - name: political_ideology
    type: float
    description: >
      Self-reported political ideology score.
      Typically a continuous scale (e.g., 1-7) where lower values indicate liberal and higher conservative.
    validation:
      - min: 1.0
        max: 7.0
        message: "political_ideology must be between 1.0 and 7.0."
      - not_null: true
        message: "political_ideology cannot be null."

  - name: news_exposure_freq
    type: float
    description: >
      Frequency of exposure to political news.
      Self-reported frequency score (e.g., 1-5 or 1-7 scale).
    validation:
      - min: 1.0
        max: 7.0
        message: "news_exposure_freq must be between 1.0 and 7.0."
      - not_null: true
        message: "news_exposure_freq cannot be null."

optional_columns:
  - name: age
    type: float
    description: "Participant age in years."
  - name: gender
    type: string
    description: "Participant gender."
  - name: education
    type: float
    description: "Education level code."

validation_logic:
  - name: check_core_columns
    description: >
      Ensures that all core columns defined in 'columns' are present in the dataset.
      Raises ValueError if any are missing.
    implementation: >
      required = {col['name'] for col in columns if col.get('not_null')}
      missing = required - set(df.columns)
      if missing:
          raise ValueError(f"Missing required columns: {missing}")
  - name: check_value_ranges
    description: >
      Validates that numeric columns fall within their specified min/max ranges.
      Rows with out-of-range values are flagged or dropped depending on strictness.
    implementation: >
      for col_def in columns:
          col_name = col_def['name']
          if col_name in df.columns:
              min_val = col_def['validation'][0]['min']
              max_val = col_def['validation'][0]['max']
              invalid = df[(df[col_name] < min_val) | (df[col_name] > max_val)]
              if not invalid.empty:
                  # Log warning or raise error based on configuration
                  pass
notes: >
  This schema is used by code/data_loader.py to validate the raw dataset
  immediately after fetching or loading. It ensures that the downstream
  analysis (T013-T018) operates on data with the expected structure.