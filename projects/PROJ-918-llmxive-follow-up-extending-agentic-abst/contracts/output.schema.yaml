$schema: http://json-schema.org/draft-07/schema#
title: Meta-Critic Model Output Schema
description: |
  Schema for model metrics, simulation logs, and evaluation results
  generated by the Meta-Critic pipeline (US2). Enforces structure for
  baseline comparisons, token consumption analysis, and abstention metrics.
type: object
required:
  - model_metrics
  - simulation_logs
  - baseline_comparison
properties:
  model_metrics:
    type: object
    description: Primary performance metrics of the trained Meta-Critic model
    required:
      - model_type
      - training_time_seconds
      - metrics
    properties:
      model_type:
        type: string
        description: Name of the model class (e.g., "XGBClassifier")
      training_time_seconds:
        type: number
        description: Wall-clock time taken for training
      metrics:
        type: object
        required:
          - accuracy
          - precision
          - recall
          - f1_score
          - timely_abstention_recall
        properties:
          accuracy:
            type: number
            minimum: 0
            maximum: 1
          precision:
            type: number
            minimum: 0
            maximum: 1
          recall:
            type: number
            minimum: 0
            maximum: 1
          f1_score:
            type: number
            minimum: 0
            maximum: 1
          timely_abstention_recall:
            type: number
            minimum: 0
            maximum: 1
            description: Recall specifically for correct abstention timing
          token_reduction_percentage:
            type: number
            description: Percentage reduction in token usage vs baseline
          latency_ms:
            type: number
            description: Average inference latency in milliseconds
          cohen_d:
            type: number
            description: Effect size (Cohen's d) for token reduction

  simulation_logs:
    type: array
    description: Per-turn simulation logs for auditability
    items:
      type: object
      required:
        - turn_number
        - feature_vector
        - meta_critic_decision
        - abstention_triggered
        - tokens_used
      properties:
        turn_number:
          type: integer
          minimum: 0
        feature_vector:
          type: array
          items:
            type: number
          description: Numeric feature vector passed to the Meta-Critic
        meta_critic_decision:
          type: string
          enum:
            - continue
            - abstain
            - error
        abstention_triggered:
          type: boolean
          description: Whether the Meta-Critic triggered an abstention
        tokens_used:
          type: integer
          minimum: 0
        latency_ms:
          type: number
        reason_code:
          type: string
          description: Optional code explaining the decision (e.g., "HIGH_TOKEN_COST")

  baseline_comparison:
    type: object
    description: Comparison between Meta-Critic and Full-Context baseline
    required:
      - baseline_tokens
      - meta_critic_tokens
      - token_reduction_pct
      - statistical_significance
    properties:
      baseline_tokens:
        type: integer
        minimum: 0
        description: Total tokens used by the Full-Context baseline
      meta_critic_tokens:
        type: integer
        minimum: 0
        description: Total tokens used by the Meta-Critic agent
      token_reduction_pct:
        type: number
        description: Percentage reduction in token usage
      statistical_significance:
        type: object
        required:
          - p_value
          - test_name
          - rejected_null
        properties:
          p_value:
            type: number
            minimum: 0
            maximum: 1
          test_name:
            type: string
            enum:
              - Mann-Whitney U
              - Kolmogorov-Smirnov
          rejected_null:
            type: boolean
            description: Whether the null hypothesis was rejected (p < 0.05)
      effect_size:
        type: object
        required:
          - cohen_d
        properties:
          cohen_d:
            type: number
            description: Cohen's d effect size for token reduction

  metadata:
    type: object
    description: Run metadata for reproducibility
    required:
      - timestamp
      - seed
      - config_path
    properties:
      timestamp:
        type: string
        format: date-time
      seed:
        type: integer
      config_path:
        type: string
      dataset_version:
        type: string