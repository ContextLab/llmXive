    severity: writing
  - id: e8433b58c407
    text: "The paper claims TRB's success stems from the trust-region mechanism, but\
      \ the comparison with Fixed-\u03B5 blending could better isolate whether annealing\
      \ (vs. mechanism) drives the improvement. Consider adding a control where Fixed-\u03B5\
      \ uses the same annealing schedule without the trust-region constraint."
    severity: science
  - id: 0e2c0c0b51bc
    text: Section 5.3 cites "0.0093 fraction of generated tokens replaced by teacher"
      for SKD without defining how this was measured. This affects reproducibility
      of the SKD baseline comparison.
    severity: writing
  - id: f6c1b25ab83b
    text: Table 1 shows performance differences between TRB and baselines, but no
      statistical significance tests are reported. Given checkpoint selection is based
      on mean scores across benchmarks, variance estimates would strengthen the causal
      claim that TRB genuinely outperforms alternatives.
    severity: science
  - id: 6742c4a8fa13
    text: Main results table lacks variance/error bars. Claiming 'strongest average'
      without statistical significance testing or confidence intervals overstates
      the certainty of the reported differences.
    severity: writing
  - id: a25deb181ad9
    text: Mechanistic claims in Discussion (e.g., 'TRB changes the early states on
      which OPD begins learning') are supported by continuation gain analysis which
      is a proxy probe, not direct evidence of training dynamics. Language should
      be more qualified.
    severity: writing
  - id: 352dd651ff0b
    text: "Warmup horizon sensitivity is not fully addressed. Results shown for K\u2208\
      {15,25,50} but no analysis of whether optimal K generalizes across problem difficulty\
      \ or model scales."
    severity: writing
  - id: a7bdb6374df5
    text: Add a brief 'Safety and Ethics' statement or expand the Limitations section
