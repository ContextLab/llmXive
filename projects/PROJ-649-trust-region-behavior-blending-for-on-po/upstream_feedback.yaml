    severity: writing
  - id: 0f871ef5ee0e
    text: Statistical significance testing is absent for small performance differences
      (0.4-0.9 points in Table 1). Claims like "strongest average" and "outperforms"
      should include variance estimates or confidence intervals to support the conclusion.
    severity: science
  - id: f777ef82d966
    text: Several citations refer to 2025-2026 arXiv papers (Veto, Entropy-Aware OPD,
      TIP, Li 2026, Qwen3) that are difficult to verify. Please confirm these sources
      exist and accurately support the attributed claims, or replace with verified
      alternatives.
    severity: writing
  - id: 47bee7950a45
    text: The claim that "TRB prefixes yield higher success than vanilla-OPD prefixes
      across all tested lengths for both continuation models" (Section 4.3, line 183)
      is strong. Please verify this holds for every length tested in Figure 4, not
      just on average.
    severity: writing
  - id: 757a16c92738
    text: The specific numerical claim "only about a 0.0093 fraction of generated
      tokens are replaced by the teacher" (Section 4.3, line 166) requires implementation
      verification. Please confirm this value matches the actual SKD configuration
      used.
    severity: writing
  - id: 08f17ee53ecf
    text: No code artifacts provided for review. This arXiv-ingested paper lacks implementation
      files, test suites, or dependency specifications. Code quality review cannot
      be performed without access to the actual training/evaluation codebase.
    severity: writing
  - id: 610411823c4e
    text: Reproducibility from scratch cannot be assessed. The paper mentions verl,
