'|analysi sample size':
  quote: 'Assume that we need to estimate the average number of votes for each candidate
    in an election. Assume that a country has 3 towns: Town A has 1 million factory
    workers, Town B has 2 million office workers and Town C has 3 million retirees.
    We can choose to get a random sample of size 60 over the entire population but
    there is some chance that the resulting random sample is poorly balanced across
    these towns and hence is biased, causing a significant error in estimation (when
    the outcome of interest has a different distribution, in terms of the parameter
    of interest, between the towns). Instead, if we choose to take a random sample
    of 10, 20 and 30 from Town A, B and C respectively, then we can produce a smaller
    error in estimation for the same total sample size. This method is generally used
    when a population is not a homogeneous group.'
  source_id: Stratified sampling
  url: https://en.wikipedia.org/wiki/Stratified_sampling
  value: '60'
