$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the performance metrics and model artifacts."
type: "object"
properties:
  experiments:
    type: "array"
    items:
      type: "object"
      properties:
        model_type:
          type: "string"
          enum:
            - "GCN"
            - "RandomForest"
        fold_id:
          type: "integer"
          minimum: 0
          maximum: 4
        metrics:
          type: "object"
          properties:
            mae:
              type: "number"
              description: "Mean Absolute Error."
            rmse:
              type: "number"
              description: "Root Mean Square Error."
            r2:
              type: "number"
              description: "Coefficient of Determination."
          required:
            - mae
            - rmse
            - r2
        statistical_test:
          type: "object"
          properties:
            p_value:
              type: "number"
            cohens_d:
              type: "number"
          required:
            - p_value
            - cohens_d
      required:
        - model_type
        - fold_id
        - metrics
required:
  - experiments
additionalProperties: false
