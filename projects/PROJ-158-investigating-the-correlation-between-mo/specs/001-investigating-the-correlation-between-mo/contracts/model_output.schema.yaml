$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for the metrics and artifacts generated by the training pipeline. Contains GCN results, RF results, and motifs."
type: "object"
properties:
  gcnn_results:
    type: "object"
    description: "Results for the Graph Convolutional Network."
    properties:
      fold_metrics:
        type: "array"
        items:
          type: "object"
          properties:
            fold_id:
              type: "integer"
            mae:
              type: "number"
              description: "Mean Absolute Error."
            rmse:
              type: "number"
              description: "Root Mean Squared Error."
            r2:
              type: "number"
              description: "Coefficient of Determination."
            training_time_seconds:
              type: "number"
          required:
            - fold_id
            - mae
            - rmse
            - r2
      statistical_test:
        type: "object"
        description: "Non-parametric statistical test results against Random Forest (Wilcoxon signed-rank)."
        properties:
          test_method:
            type: "string"
            enum: ["wilcoxon_signed_rank"]
          p_value:
            type: "number"
          statistic:
            type: "number"
            description: "Wilcoxon statistic."
          effect_size:
            type: "number"
            description: "Cliff's Delta or similar effect size."
          significant_at_0_05:
            type: "boolean"
        required:
          - test_method
          - p_value
          - statistic
          - significant_at_0_05
    required:
      - fold_metrics
      - statistical_test
  random_forest_results:
    type: "object"
    description: "Results for the Random Forest baseline."
    properties:
      fold_metrics:
        type: "array"
        items:
          type: "object"
          properties:
            fold_id:
              type: "integer"
            mae:
              type: "number"
            rmse:
              type: "number"
            r2:
              type: "number"
          required:
            - fold_id
            - mae
            - rmse
            - r2
    required:
      - fold_metrics
  motifs:
    type: "array"
    description: "Top 5 recurring motifs (model-attributed features)."
    items:
      type: "object"
      properties:
        subgraph_smiles:
          type: "string"
        frequency:
          type: "integer"
        importance_score:
          type: "number"
        enrichment_p_value:
          type: "number"
          description: "P-value from null hypothesis enrichment test."
        associational_caveat:
          type: "string"
          description: "Explicit statement that this is an association, not causation."
      required:
        - subgraph_smiles
        - frequency
        - importance_score
        - associational_caveat
required:
  - gcnn_results
  - random_forest_results
  - motifs
additionalProperties: false