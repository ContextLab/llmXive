# Ruff Configuration for PROJ-169
line-length = 100
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
]

[lint.isort]
known-first-party = ["data_models", "ingest", "model", "utils", "analysis"]
known-third-party = ["pymatgen", "torch", "numpy", "pandas", "sklearn"]
