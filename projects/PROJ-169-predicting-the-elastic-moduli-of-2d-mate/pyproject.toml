[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "elastic-moduli-2d-surrogate"
version = "0.1.0"
description = "Structure-Only Surrogate Model for predicting elastic moduli of 2D materials"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26.4,<2.0.0",
    "pandas>=2.2.0,<3.0.0",
    "pyarrow>=16.0.0,<17.0.0",
    "scikit-learn>=1.5.0,<2.0.0",
    "pymatgen>=2024.6.10,<2025.0.0",
    "torch>=2.3.0,<3.0.0",
    "torch-geometric>=2.5.0,<3.0.0",
    "shap>=0.45.0,<0.46.0",
    "rich>=13.7.0,<14.0.0",
    "tqdm>=4.66.0,<5.0.0",
    "pyyaml>=6.0.0,<7.0.0",
    "pytest>=8.2.0,<9.0.0",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
