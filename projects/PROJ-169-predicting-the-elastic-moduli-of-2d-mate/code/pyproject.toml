[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "elastic-moduli-2d-surrogate"
version = "0.1.0"
description = "Structure-Only Surrogate Model for Predicting Elastic Moduli of 2D Materials"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0,<2.0.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "pymatgen>=2023.0.0",
    "torch>=2.0.0",
    "torch-geometric>=2.3.0",
    "scikit-learn>=1.2.0",
    "rich>=13.0.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "joblib>=1.3.0",
    "h5py>=3.8.0",
    "pyarrow>=12.0.0",
    "shap>=0.42.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.3.0",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.3.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false
include = '\.pyi?$'
extend-exclude = '''
(
    __pycache__
    | \.git
    | \.mypy_cache
    | \.venv
    | venv
    | build
    | dist
)
'''

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["code", "tests"]
extend-exclude = [
    "__pycache__",
    ".git",
    ".mypy_cache",
    ".venv",
    "venv",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # Line too long (black handles this)
    "B008",   # Do not perform function call in argument defaults (often needed for dataclasses)
]

[tool.ruff.lint.isort]
known-first-party = ["code"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ARG", "E501"]
"code/utils/constants.py" = ["B014"]
"code/utils/config.py" = ["ARG"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["code"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
precision = 2
show_missing = true
skip_covered = true
