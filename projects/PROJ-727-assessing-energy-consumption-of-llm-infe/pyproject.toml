[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-energy-assessment"
version = "0.1.0"
description = "Assessing Energy Consumption of LLM Inference for Code Completion"
requires-python = ">=3.10"
dependencies = [
    "transformers",
    "torch-cpu",
    "codecarbon",
    "pandas",
    "numpy",
    "scipy",
    "statsmodels",
    "matplotlib",
    "seaborn",
    "human-eval",
    "huggingface_hub",
]

[tool.black]
line-length = 88
target-version = ['py310']
skip-string-normalization = false
exclude = "/(\\.git|\\.venv|venv|__pycache__|build|dist)/"