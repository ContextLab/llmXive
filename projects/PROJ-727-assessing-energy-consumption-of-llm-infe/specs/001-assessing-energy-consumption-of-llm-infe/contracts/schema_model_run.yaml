$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: "ModelRun Schema"
description: "Schema for a single inference event record in results.csv"
properties:
  run_id:
    type: string
    description: "Unique identifier for the run (UUID)"
  model_id:
    type: string
    description: "Identifier of the model (e.g., 'gpt2-small', 'starcoder-1b')"
  problem_id:
    type: string
    description: "HumanEval task ID (e.g., 'HumanEval/0')"
  prompt_tokens:
    type: integer
    description: "Number of tokens in the input prompt"
    minimum: 0
  tokens_generated:
    type: integer
    description: "Number of tokens generated by the model"
    minimum: 0
  energy_kwh:
    type: ["number", "null"]
    description: "Total energy consumed in kWh. Null if measurement failed."
  runtime_seconds:
    type: number
    description: "Total runtime in seconds"
    minimum: 0
  pass_fail_status:
    type: integer
    description: "1 if solution passes tests, 0 otherwise"
    enum: [0, 1]
  status:
    type: string
    description: "Execution status"
    enum: ["success", "timeout", "oom", "error"]
required:
  - run_id
  - model_id
  - problem_id
  - prompt_tokens
  - tokens_generated
  - energy_kwh
  - runtime_seconds
  - pass_fail_status
  - status
additionalProperties: false