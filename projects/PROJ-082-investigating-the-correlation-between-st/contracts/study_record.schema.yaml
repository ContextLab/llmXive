$schema: http://json-schema.org/draft-07/schema#
title: Study Record Schema
description: >
  Schema defining the structure of a single study record extracted from
  literature regarding the correlation between structural brain connectivity
  and individual music preferences. This schema is used for validation of
  extracted data before meta-analysis.
type: object
required:
  - study_id
  - author
  - year
  - tract
  - r
  - n
properties:
  study_id:
    type: string
    description: Unique identifier for the study (e.g., "Author_Year_Tract").
    pattern: "^[A-Za-z0-9_]+$"
    
  author:
    type: string
    description: Last name of the first author.
    minLength: 1
    
  year:
    type: integer
    description: Publication year.
    minimum: 1900
    maximum: 2100
    
  tract:
    type: string
    description: >
      Name of the white matter tract investigated. 
      Should be harmonized against the JHU Atlas standard names 
      (see analysis.tract_mapping).
    minLength: 1
    
  r:
    type: number
    description: >
      Pearson correlation coefficient (effect size).
      Must be between -1.0 and 1.0.
    minimum: -1.0
    maximum: 1.0
    
  n:
    type: integer
    description: Sample size (number of participants).
    minimum: 1
    
  p_value:
    type: number
    description: >
      Reported p-value. Optional if r and n are provided, 
      but useful for verification or Fisher's Z conversion if r is missing.
    minimum: 0.0
    maximum: 1.0
    
  qualitative_desc:
    type: string
    description: >
      Qualitative description or narrative finding extracted from the text
      (e.g., "positive correlation", "no significant association").
      Used when quantitative metrics are missing or for narrative synthesis.
    default: ""
    
  notes:
    type: string
    description: Additional notes, limitations, or context extracted from the study.
    default: ""
    
  source_file:
    type: string
    description: Filename of the source document from which this record was extracted.
    
  extraction_confidence:
    type: number
    description: >
      Confidence score of the extraction (0.0 to 1.0). 
      1.0 indicates direct numerical extraction; lower values indicate NLP inference.
    minimum: 0.0
    maximum: 1.0
    default: 1.0
    
  is_narrative_pool:
    type: boolean
    description: >
      Flag indicating if this study is included in the narrative pool 
      (qualitative synthesis) due to lack of quantitative data.
    default: false
    
additionalProperties: false