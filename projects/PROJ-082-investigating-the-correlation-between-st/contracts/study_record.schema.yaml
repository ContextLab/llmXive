$schema: http://json-schema.org/draft-07/schema#
title: Study Record Schema
description: Schema for individual study metadata, tract information, effect sizes, and qualitative descriptors in the meta-analysis pipeline.
type: object
required:
  - study_id
  - author
  - year
  - tract
  - r
  - n
properties:
  study_id:
    type: string
    description: Unique identifier for the study (e.g., 'Author_Year_01').
    pattern: '^[A-Za-z0-9_]+$'
  
  author:
    type: string
    description: Primary author's last name.
    minLength: 1
  
  year:
    type: integer
    description: Publication year.
    minimum: 1900
    maximum: 2100
  
  tract:
    type: string
    description: Name of the brain tract investigated (harmonized name preferred).
    minLength: 1
  
  r:
    type: number
    description: Pearson correlation coefficient reported in the study.
    minimum: -1.0
    maximum: 1.0
  
  n:
    type: integer
    description: Sample size (number of participants).
    minimum: 1
  
  qualitative_desc:
    type: string
    description: Qualitative description or narrative finding extracted from the study text.
    default: ""
  
  p_value:
    type: number
    description: Reported p-value (optional, for conversion tasks).
    minimum: 0.0
    maximum: 1.0
    default: null
  
  notes:
    type: string
    description: Any additional notes or exclusion reasons.
    default: ""
  
  extracted_from:
    type: string
    description: Source file or method of extraction (e.g., 'manual', 'nlp_logic', 'p_value_converter').
    default: "unknown"