%YAML 1.2
---
title: Study Record Schema
description: Schema for individual study records extracted for meta-analysis.
type: object
required:
  - study_id
  - author
  - year
  - tract_name
  - effect_size_r
  - sample_size_n
properties:
  study_id:
    type: string
    description: Unique identifier for the study (e.g., PMID or DOI).
    pattern: "^[A-Za-z0-9._-]+$"
  author:
    type: string
    description: First author's last name.
    minLength: 1
  year:
    type: integer
    description: Publication year.
    minimum: 1900
    maximum: 2100
  tract_name:
    type: string
    description: Name of the brain tract (harmonized via JHU Atlas).
    minLength: 1
  effect_size_r:
    type: number
    description: Pearson correlation coefficient (r).
    minimum: -1.0
    maximum: 1.0
  sample_size_n:
    type: integer
    description: Total sample size of the study.
    minimum: 1
  qualitative_notes:
    type: string
    description: Extracted qualitative descriptors regarding neural circuitry.
    default: ""
  direction:
    type: string
    enum:
      - positive
      - negative
      - null
    description: Direction of the correlation.
  p_value:
    type: number
    description: Reported p-value.
    minimum: 0.0
    maximum: 1.0
    nullable: true
  no_qualitative_data:
    type: boolean
    description: Flag indicating if no specific descriptors were found.
    default: false
  source_file:
    type: string
    description: Original filename where this study was found.
  extraction_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of extraction.
additionalProperties: false
