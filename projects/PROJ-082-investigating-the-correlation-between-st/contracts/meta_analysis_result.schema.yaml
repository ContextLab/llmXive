$schema: http://json-schema.org/draft-07/schema#
title: MetaAnalysisResult
description: >
  Schema for the aggregated results of the meta-analysis pipeline.
  Contains quantitative results, heterogeneity metrics, bias assessment, and narrative summaries.
type: object
required:
  - analysis_id
  - analysis_timestamp
  - synthesis_mode
  - study_count
  - results
properties:
  analysis_id:
    type: string
    description: Unique identifier for this analysis run.
  analysis_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the analysis completion.
  synthesis_mode:
    type: string
    enum:
      - quantitative
      - narrative
      - none
    description: Mode of synthesis based on study count (N >= 10: quantitative, N < 10: narrative).
  study_count:
    type: integer
    description: Total number of eligible studies included in the analysis.
    minimum: 0
  results:
    type: object
    description: Container for specific analysis results based on synthesis_mode.
    properties:
      quantitative:
        type: object
        description: Results when synthesis_mode is 'quantitative'.
        required:
          - pooled_effect_size
          - confidence_interval
          - heterogeneity
          - bias_assessment
        properties:
          pooled_effect_size:
            type: object
            description: Random-effects model results.
            required:
              - weighted_mean_r
              - z_statistic
              - p_value
            properties:
              weighted_mean_r:
                type: number
                description: Weighted mean correlation coefficient.
              z_statistic:
                type: number
                description: Z-statistic for the pooled effect.
              p_value:
                type: number
                description: Two-tailed p-value.
              confidence_interval_95:
                type: array
                description: 95% Confidence Interval [lower, upper].
                items:
                  type: number
                minItems: 2
                maxItems: 2
          heterogeneity:
            type: object
            description: Heterogeneity statistics (I², Q, etc.).
            required:
              - i_squared
              - q_statistic
              - q_p_value
            properties:
              i_squared:
                type: number
                description: I² statistic (percentage of variation due to heterogeneity).
                minimum: 0.0
                maximum: 100.0
              q_statistic:
                type: number
                description: Cochran's Q statistic.
              q_p_value:
                type: number
                description: P-value for Cochran's Q test.
              tau_squared:
                type: number
                description: Estimated between-study variance (tau²).
          bias_assessment:
            type: object
            description: Results of Egger's regression test.
            required:
              - egger_skipped_reason
            properties:
              egger_skipped_reason:
                type: string
                description: Reason for skipping Egger's test (if applicable).
              intercept:
                type: number
                description: Intercept of Egger's regression.
              p_value:
                type: number
                description: P-value of Egger's regression intercept.
          correction:
            type: object
            description: Multiple comparison correction results.
            required:
              - method
              - adjusted_threshold
            properties:
              method:
                type: string
                enum:
                  - bonferroni
                  - none
                description: Correction method applied.
              adjusted_threshold:
                type: number
                description: Adjusted significance threshold.
              limitations:
                type: string
                description: Note about limitations of the correction method.
      narrative:
        type: object
        description: Results when synthesis_mode is 'narrative'.
        required:
          - overview
          - themes
          - limitations
          - metadata
        properties:
          overview:
            type: string
            description: Structured study overview text.
          themes:
            type: string
            description: Structured qualitative themes text.
          limitations:
            type: string
            description: Structured limitations text.
          metadata:
            type: object
            description: JSON metadata block for the narrative.
            required:
              - study_count
              - synthesis_mode
              - timestamp
            properties:
              study_count:
                type: integer
              synthesis_mode:
                type: string
              timestamp:
                type: string
                format: date-time
  input_files:
    type: array
    description: List of input files processed.
    items:
      type: string
  processing_log:
    type: array
    description: List of processing events/warnings.
    items:
      type: string
additionalProperties: false