$schema: http://json-schema.org/draft-07/schema#
title: MetaAnalysisResult
description: Schema for the output of the meta-analysis pipeline, including pooled effects, confidence intervals, heterogeneity, and bias metrics.
type: object
required:
  - synthesis_mode
  - timestamp
  - meta_analysis
properties:
  synthesis_mode:
    type: string
    description: Mode of synthesis used ('quantitative' or 'narrative').
    enum:
      - quantitative
      - narrative
    default: quantitative

  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the analysis was run.

  study_count:
    type: integer
    description: Total number of studies included in the analysis (N).
    minimum: 0

  tract_count:
    type: integer
    description: Number of unique tracts identified (k).
    minimum: 0
    nullable: true

  meta_analysis:
    type: object
    description: Results of the meta-analysis. Null if synthesis_mode is 'narrative' or if N < 10.
    nullable: true
    properties:
      model_type:
        type: string
        description: Type of model used ('random_effects' or 'fixed_effects_fallback').
        enum:
          - random_effects
          - fixed_effects_fallback
        default: random_effects

      reliability:
        type: string
        description: Reliability flag, especially for fallback models.
        enum:
          - reliable
          - unreliable
        default: reliable

      pooled_effect:
        type: object
        description: The pooled effect size (weighted mean r) and its confidence interval.
        required:
          - weighted_mean_r
          - ci_lower
          - ci_upper
        properties:
          weighted_mean_r:
            type: number
            description: The weighted mean correlation coefficient (r).
            minimum: -1
            maximum: 1

          ci_lower:
            type: number
            description: Lower bound of the 95% confidence interval.

          ci_upper:
            type: number
            description: Upper bound of the 95% confidence interval.

          ci_level:
            type: number
            description: Confidence level (e.g., 0.95).
            default: 0.95

      heterogeneity:
        type: object
        description: Heterogeneity statistics.
        required:
          - i_squared
        properties:
          i_squared:
            type: number
            description: I-squared statistic representing the percentage of variation across studies due to heterogeneity rather than chance.
            minimum: 0
            maximum: 100
            multipleOf: 0.01

          q_statistic:
            type: number
            description: Cochran's Q statistic.
            nullable: true

          df:
            type: integer
            description: Degrees of freedom for the Q statistic.
            nullable: true

          p_value_q:
            type: number
            description: P-value for the Q statistic.
            nullable: true

      bias:
        type: object
        description: Publication bias assessment results.
        required:
          - egger_skipped_reason
        properties:
          egger_skipped_reason:
            type: string
            description: Reason if Egger's test was skipped (e.g., N < 10).
            nullable: true

          egger_intercept:
            type: number
            description: Intercept from Egger's linear regression.
            nullable: true

          egger_p_value:
            type: number
            description: P-value from Egger's linear regression.
            nullable: true

      correction:
        type: object
        description: Multiple comparison correction details.
        nullable: true
        properties:
          method:
            type: string
            description: Correction method used (e.g., 'bonferroni').
            enum:
              - bonferroni
              - none
            default: none

          adjusted_threshold:
            type: number
            description: Adjusted significance threshold.
            nullable: true

          limitations_note:
            type: string
            description: Note regarding the conservatism of the correction method.

  narrative_summary:
    type: object
    description: Summary of narrative themes if synthesis_mode is 'narrative'.
    nullable: true
    properties:
      themes:
        type: array
        description: List of identified themes and their counts.
        items:
          type: object
          properties:
            theme_name:
              type: string
            count:
              type: integer

      overview_text:
        type: string
        description: Textual overview of the findings.

      limitations_text:
        type: string
        description: Textual description of limitations.

  errors:
    type: array
    description: List of errors or warnings encountered during processing.
    items:
      type: string