%YAML 1.2
---
title: Meta-Analysis Result Schema
description: Schema for the aggregated results of the meta-analysis pipeline.
type: object
required:
  - analysis_id
  - timestamp
  - synthesis_mode
  - study_count
  - results
properties:
  analysis_id:
    type: string
    description: Unique identifier for this analysis run.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp when analysis was completed.
  synthesis_mode:
    type: string
    enum:
      - quantitative
      - narrative
      - empty
    description: Mode of synthesis based on study count.
  study_count:
    type: integer
    description: Number of eligible studies included in the analysis.
    minimum: 0
  results:
    type: object
    description: Results container based on synthesis mode.
    oneOf:
      - title: Quantitative Results
        required:
          - weighted_mean_r
          - confidence_interval
          - i_squared
          - heterogeneity_p_value
          - egger_test
        properties:
          weighted_mean_r:
            type: number
            description: Pooled effect size (random-effects model).
          confidence_interval:
            type: object
            required:
              - lower
              - upper
            properties:
              lower:
                type: number
              upper:
                type: number
          i_squared:
            type: number
            description: Heterogeneity statistic (I²) with two decimal places.
            minimum: 0.0
            maximum: 100.0
          heterogeneity_p_value:
            type: number
            description: P-value for Q-test of heterogeneity.
          egger_test:
            type: object
            description: Egger's regression test results.
            required:
              - intercept
              - p_value
            properties:
              intercept:
                type: number
              p_value:
                type: number
                description: P-value for Egger's test.
          correction_method:
            type: string
            description: Method used for multiple comparison correction (e.g., Bonferroni).
          adjusted_threshold:
            type: number
            description: Adjusted significance threshold if correction applied.
          limitations:
            type: string
            description: Notes on limitations (e.g., Bonferroni conservatism).
      - title: Narrative Results
        required:
          - narrative_summary
        properties:
          narrative_summary:
            type: object
            required:
              - overview
              - themes
              - limitations
            properties:
              overview:
                type: string
              themes:
                type: array
                items:
                  type: string
              limitations:
                type: string
          egger_skipped_reason:
            type: string
            description: Reason for skipping Egger's test if N < 10.
      - title: Empty Results
        required:
          - message
        properties:
          message:
            type: string
            description: Message indicating no studies were found.
  metadata:
    type: object
    description: Additional metadata about the run.
    properties:
      config_hash:
        type: string
      input_files:
        type: array
        items:
          type: string
additionalProperties: false