$schema: "http://json-schema.org/draft-07/schema#"
title: MetaAnalysisResult
type: object
properties:
  pooled_r:
    type: number
    description: "Weighted mean correlation"
  ci_lower:
    type: number
    description: "95% CI lower bound"
  ci_upper:
    type: number
    description: "95% CI upper bound"
  i_squared:
    type: number
    description: "Heterogeneity statistic (must have at least 2 decimal places)"
  egger_intercept:
    type: number
    description: "Egger's test intercept"
  egger_p:
    type: number
    description: "Egger's test p-value"
  egger_skipped_reason:
    type: string
    description: "Reason for skipping Egger's test (if N<10). Must be 'Skipped: Insufficient studies (N < 10) for Egger's regression.'"
  synthesis_mode:
    type: string
    enum:
      - quantitative
      - narrative
    description: "Mode of synthesis"
  study_count:
    type: integer
    description: "Number of eligible studies"
  tract_count:
    type: integer
    description: "Number of distinct tracts"
  bonferroni_adjusted_alpha:
    type: number
    description: "Adjusted alpha if applied"
  qualitative_summary:
    type: string
    description: "Narrative summary (if synthesis_mode='narrative')"
required:
  - synthesis_mode
  - study_count
  - tract_count
additionalProperties: false
