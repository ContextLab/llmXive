$schema: "http://json-schema.org/draft-07/schema#"
title: "MetaAnalysisResult"
description: "Schema for the aggregated output of the meta-analysis pipeline."
type: "object"
properties:
  synthesis_mode:
    type: "string"
    description: "Mode of synthesis: quantitative or narrative."
    enum: ["quantitative", "narrative"]
  weighted_mean_r:
    type: "number"
    description: "Pooled correlation coefficient (back-transformed)."
    minimum: -1.0
    maximum: 1.0
    nullable: true
  ci_95_lower:
    type: "number"
    description: "Lower bound of 95% CI."
    nullable: true
  ci_95_upper:
    type: "number"
    description: "Upper bound of 95% CI."
    nullable: true
  i_squared:
    type: "number"
    description: "Heterogeneity statistic (I^2)."
    minimum: 0.0
    maximum: 100.0
    nullable: true
  egger_intercept:
    type: "number"
    description: "Intercept from Egger's regression."
    nullable: true
  egger_p_value:
    type: "number"
    description: "P-value from Egger's regression."
    minimum: 0.0
    maximum: 1.0
    nullable: true
  bonferroni_threshold:
    type: "number"
    description: "Adjusted alpha threshold."
    minimum: 0.0
    maximum: 1.0
    nullable: true
  study_count:
    type: "integer"
    description: "Number of unique (Author, Year) pairs."
    minimum: 0
  tract_count:
    type: "integer"
    description: "Number of distinct tracts."
    minimum: 0
  narrative_summary:
    type: "string"
    description: "Text summary of findings (if narrative mode)."
    nullable: true
  power_warning:
    type: "string"
    description: "Warning about low statistical power (e.g., 'Low Power')."
    nullable: true
  warnings:
    type: "array"
    description: "List of warnings."
    items:
      type: "string"
required:
  - "synthesis_mode"
  - "study_count"
  - "tract_count"
  - "warnings"
additionalProperties: false