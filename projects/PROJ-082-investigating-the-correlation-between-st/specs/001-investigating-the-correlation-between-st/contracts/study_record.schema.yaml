$schema: "http://json-schema.org/draft-07/schema#"
title: StudyRecord
type: object
properties:
  author:
    type: string
    description: "First author name"
  year:
    type: integer
    description: "Publication year"
  tract_name:
    type: string
    description: "Name of the brain tract (e.g., 'arcuate fasciculus')"
  metric:
    type: string
    description: "MRI metric (e.g., 'FA', 'MD')"
  r:
    type: number
    minimum: -1.0
    maximum: 1.0
    description: "Correlation coefficient"
  n:
    type: integer
    minimum: 1
    description: "Sample size"
  t_value:
    type: number
    description: "T-statistic (if r not available)"
  qualitative_desc:
    type: string
    description: "Extracted qualitative description (if no r/n)"
  source:
    type: string
    description: "Source of the record (e.g., 'PubMed', 'Synthetic')"
required:
  - author
  - year
  - tract_name
  - metric
  - qualitative_desc
  - source
additionalProperties: false
