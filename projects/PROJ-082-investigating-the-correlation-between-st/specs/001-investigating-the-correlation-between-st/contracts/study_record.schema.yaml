$schema: "http://json-schema.org/draft-07/schema#"
title: "StudyRecord"
description: "Schema for a single literature entry in the meta-analysis pipeline."
type: "object"
properties:
  author:
    type: "string"
    description: "First author's last name."
    minLength: 1
  year:
    type: "integer"
    description: "Publication year."
    minimum: 1900
    maximum: 2100
  tract_name:
    type: "string"
    description: "Name of the white matter tract."
    minLength: 1
  harmonized_tract_id:
    type: "string"
    description: "Standardized ID from JHU Atlas (e.g., 'AF_L')."
    minLength: 1
  metric:
    type: "string"
    description: "dMRI metric used (e.g., FA, MD)."
    enum: ["FA", "MD", "AD", "RD"]
  r:
    type: "number"
    description: "Correlation coefficient."
    minimum: -1.0
    maximum: 1.0
    nullable: true
  n:
    type: "integer"
    description: "Sample size."
    minimum: 1
    nullable: true
  t_value:
    type: "number"
    description: "t-statistic."
    nullable: true
  p_value:
    type: "number"
    description: "p-value."
    minimum: 0.0
    maximum: 1.0
    nullable: true
  direction:
    type: "string"
    description: "Direction of effect."
    enum: ["positive", "negative", "mixed"]
    nullable: true
  notes:
    type: "string"
    description: "Extraction notes."
    nullable: true
required:
  - "author"
  - "year"
  - "tract_name"
  - "harmonized_tract_id"
  - "metric"
additionalProperties: false