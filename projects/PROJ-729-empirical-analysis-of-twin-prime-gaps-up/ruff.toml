# Ruff configuration for PROJ-729
# Complements .pre-commit-config.yaml
target-version = "py311"
line-length = 88

[lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # Pyflakes
  "I",  # isort
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "UP", # pyupgrade
]
ignore = [
  "E501", # Line too long (handled by Black/Ruff-format)
  "B008", # Do not perform function call in argument defaults (common in tests/config)
]

[lint.isort]
known-first-party = ["config", "utils", "generate_primes", "hash_artifacts"]
force-single-line = false
lines-after-imports = 2

[lint.per-file-ignores]
"tests/*" = ["S101"] # Allow assertions in tests
