# Schema definition for twin prime gap data
# Used by validate_schema.py to ensure data integrity
version: "1.0"
name: twin_prime_gaps
description: "Dataset containing twin prime pairs and their normalized gaps"

fields:
  - name: p
    type: integer
    description: "The smaller prime in the twin prime pair (p, p+2)"
    constraints:
      minimum: 3
      unique: false
      nullable: false
    
  - name: p_next
    type: integer
    description: "The larger prime in the twin prime pair (p+2)"
    constraints:
      minimum: 5
      nullable: false
      # p_next should always be p + 2
    
  - name: delta
    type: number
    description: "Gap between the starts of consecutive twin prime pairs: p_n - p_{n-1}"
    constraints:
      minimum: 0
      nullable: false
      # For the first row, delta is 0 (no previous pair)
      # For subsequent rows, delta > 0
    
  - name: normalized_gap
    type: number
    description: "Normalized gap: delta / log(p)"
    constraints:
      minimum: 0
      nullable: false
      # Should be positive for all rows except the first (which is 0)
      
validation_rules:
  - rule: "p_next == p + 2"
    message: "p_next must be exactly p + 2 for twin primes"
  - rule: "delta >= 0"
    message: "Delta must be non-negative"
  - rule: "normalized_gap >= 0"
    message: "Normalized gap must be non-negative"
  - rule: "p is prime"
    message: "p must be a prime number"
  - rule: "p_next is prime"
    message: "p_next must be a prime number"
