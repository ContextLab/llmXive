$schema: http://json-schema.org/draft-07/schema#
title: Twin Prime Gaps Dataset Schema
description: >
  Schema for the empirical twin prime gaps dataset up to 10^9.
  Defines the structure for the CSV output generated by code/generate_primes.py.
  Based on the Cramér probabilistic model and Hardy-Littlewood k-tuple conjecture.
type: object
required:
  - columns
  - rows
properties:
  columns:
    type: array
    description: >
      Ordered list of column definitions.
      Expected order: p, p_next, delta, normalized_gap.
    items:
      type: object
      required:
        - name
        - type
        - description
      properties:
        name:
          type: string
          description: The column name in the CSV file.
        type:
          type: string
          enum:
            - integer
            - float
          description: The data type of the column.
        description:
          type: string
          description: A brief description of the column's meaning.
      additionalProperties: false
    additionalItems: false
  rows:
    type: object
    description: Metadata about the row constraints.
    properties:
      min_count:
        type: integer
        minimum: 1
        description: Minimum expected row count (theoretical lower bound).
      max_count:
        type: integer
        description: Maximum expected row count (theoretical upper bound).
    required:
      - min_count
      - max_count
examples:
  - columns:
      - name: p
        type: integer
        description: The smaller prime of a twin prime pair (p, p+2).
      - name: p_next
        type: integer
        description: The smaller prime of the next consecutive twin prime pair.
      - name: delta
        type: integer
        description: The gap between consecutive twin prime starts: p_next - p.
      - name: normalized_gap
        type: float
        description: The normalized gap: delta / log(p).
    rows:
      min_count: 3000000
      max_count: 4000000
