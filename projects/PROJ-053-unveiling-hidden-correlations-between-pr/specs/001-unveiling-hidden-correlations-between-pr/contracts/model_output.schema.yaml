$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Output Schema"
description: "Schema for GPR model results JSON"
type: "object"
required:
  - "r2_score"
  - "rmse"
  - "rmse_percent_range"
  - "mae"
  - "n_samples"
  - "hyperparameters"
  - "timestamp"
  - "total_runtime_seconds"
properties:
  r2_score:
    type: "number"
    description: "Coefficient of determination"
  rmse:
    type: "number"
    description: "Root Mean Square Error (normalized units)"
  rmse_percent_range:
    type: "number"
    description: "RMSE as a percentage of the observed range"
  mae:
    type: "number"
    description: "Mean Absolute Error"
  n_samples:
    type: "integer"
    description: "Number of training samples"
  hyperparameters:
    type: "object"
    description: "Optimized kernel parameters"
    required:
      - "length_scale"
      - "noise_level"
    properties:
      length_scale:
        type: "number"
        description: "RBF kernel length scale"
      noise_level:
        type: "number"
        description: "Gaussian noise level"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of training"
  total_runtime_seconds:
    type: "number"
    description: "Total pipeline runtime in seconds (SC-005)"
additionalProperties: false