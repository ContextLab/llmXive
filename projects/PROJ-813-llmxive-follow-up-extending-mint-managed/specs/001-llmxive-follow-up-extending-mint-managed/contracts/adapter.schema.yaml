$schema: "http://json-schema.org/draft-07/schema#"
title: "LoRA Adapter Schema"
description: "Defines the structure of a synthetic LoRA adapter entity."
type: "object"
properties:
  id:
    type: "integer"
    description: "Unique identifier for the adapter."
  rank:
    type: "integer"
    description: "Low-rank dimension (1-256)."
    minimum: 1
    maximum: 256
  sparsity:
    type: "number"
    description: "Proportion of zero weights (0.0-1.0)."
    minimum: 0.0
    maximum: 1.0
  vector_type:
    type: "string"
    description: "Type of sparse representation used."
    enum: ["CSR", "CSC", "COO"]
required:
  - id
  - rank
  - sparsity
  - vector_type
additionalProperties: false