$schema: "http://json-schema.org/draft-07/schema#"
title: "Request Trace Schema"
description: "Defines the structure of a single request in the simulation trace."
type: "object"
properties:
  timestamp:
    type: "number"
    description: "Simulated time of request arrival."
  adapter_id:
    type: "integer"
    description: "ID of the requested adapter."
  cluster_id:
    type: "integer"
    description: "Logical cluster ID for grouping requests."
  is_hotspot:
    type: "boolean"
    description: "True if this adapter is part of a frequent access pattern."
required:
  - timestamp
  - adapter_id
  - cluster_id
  - is_hotspot
additionalProperties: false