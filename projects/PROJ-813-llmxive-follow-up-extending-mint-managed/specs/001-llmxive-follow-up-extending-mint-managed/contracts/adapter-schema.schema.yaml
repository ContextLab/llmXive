$schema: http://json-schema.org/draft-07/schema#
title: LoRA Adapter Schema
description: Defines the structure of a single synthesized LoRA adapter record.
type: object
properties:
  id:
    type: string
    description: "Unique identifier for the adapter (e.g., 'adapter_00001')."
  rank:
    type: integer
    description: "The rank of the LoRA adapter. Range: 1 to 256."
    minimum: 1
    maximum: 256
  sparsity:
    type: number
    description: "Ratio of non-zero parameters. Range: 0.0 to 1.0."
    minimum: 0.0
    maximum: 1.0
  non_zero_count:
    type: integer
    description: "Total number of non-zero parameters in the adapter."
    minimum: 0
  generated_at:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation."
required:
  - id
  - rank
  - sparsity
  - non_zero_count
  - generated_at
additionalProperties: false
