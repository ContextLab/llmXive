$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Result Schema"
description: "Defines the aggregated metrics from a simulation run."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run."
  seed:
    type: "integer"
    description: "Random seed used for this replication."
  policy:
    type: "string"
    description: "Scheduling policy used."
    enum: ["FCFS", "Greedy", "Topological Lookahead"]
  total_latency_ms:
    type: "number"
    description: "Total wall-clock time in milliseconds."
  eviction_count:
    type: "integer"
    description: "Total number of cache evictions."
  hit_rate:
    type: "number"
    description: "Cache hit rate (0.0-1.0)."
  p50_latency_ms:
    type: "number"
    description: "Median cold-start latency."
  p95_latency_ms:
    type: "number"
    description: "95th percentile cold-start latency."
  p_value:
    type: ["number", "null"]
    description: "P-value from statistical comparison (if applicable)."
  is_significant:
    type: ["boolean", "null"]
    description: "True if p < 0.05."
  delta_size_bytes:
    type: "number"
    description: "Average size of non-overlapping delta loaded (bytes)."
required:
  - run_id
  - seed
  - policy
  - total_latency_ms
  - eviction_count
  - hit_rate
  - p50_latency_ms
  - p95_latency_ms
  - delta_size_bytes
additionalProperties: false