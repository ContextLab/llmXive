[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-chemo-biomarkers"
version = "0.1.0"
description = "Identifying Predictive Biomarkers of Chemotherapy Response in Public Cancer Datasets"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "rpy2",
    "biopython",
    "requests",
    "scipy",
    "psutil",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
src = ["code/src", "code/tests"]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (black handles this)
    "B008", # Do not perform function call in argument defaults (common in testing/mocks)
]

[tool.ruff.per-file-ignores]
"code/src/__init__.py" = ["F401"]
"code/tests/*" = ["F401", "B018"]

[tool.ruff.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
