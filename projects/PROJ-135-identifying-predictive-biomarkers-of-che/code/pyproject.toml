[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-chemo-biomarker"
version = "0.1.0"
description = "Automated pipeline for identifying predictive biomarkers of chemotherapy response"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "rpy2>=3.5.0",
    "biopython>=1.81",
    "requests>=2.31.0",
    "scipy>=1.11.0",
    "psutil>=5.9.0",
    "pytest>=7.4.0",
    "pyyaml>=6.0",
    "huggingface-hub>=0.19.0",
    "mygene>=3.2.0",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E", "W", "F", "I", "C", "B", "UP", "RUF"
]
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Function call in argument defaults
]

[tool.ruff.isort]
known-first-party = ["src", "tests"]
force-single-line = false
lines-after-imports = 2

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
