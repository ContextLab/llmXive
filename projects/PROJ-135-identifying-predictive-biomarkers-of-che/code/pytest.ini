[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract tests for schema validation
    slow: Mark tests that take longer than expected
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
