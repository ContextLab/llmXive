$schema: http://json-schema.org/draft-07/schema#
title: Meta-Analysis Schema
description: Schema for the meta-analysis results and the final selected gene panel.
type: object
required:
  - metadata
  - gene_panel
  - selection_method
  - statistical_summary
properties:
  metadata:
    type: object
    required:
      - analysis_date
      - tumor_types_included
      - total_discovery_samples
    properties:
      analysis_date:
        type: string
        format: date-time
      tumor_types_included:
        type: array
        items:
          type: string
        description: "List of tumor types included in the meta-analysis"
      total_discovery_samples:
        type: integer
        minimum: 1
      fdr_threshold:
        type: number
        minimum: 0
        maximum: 1
      log2fc_threshold:
        type: number
  selection_method:
    type: string
    enum:
      - intersection
      - union_top_ranked
      - stouffer_meta_analysis
    description: "Method used to select the final gene panel"
  fallback_reason:
    type: string
    nullable: true
    description: "Reason for fallback if intersection was empty (e.g., 'intersection_empty')"
  gene_panel:
    type: array
    description: "Final list of genes in the panel with their meta-analysis statistics"
    items:
      type: object
      required:
        - gene_symbol
        - rank
      properties:
        gene_symbol:
          type: string
        rank:
          type: integer
        p_value_meta:
          type: number
          minimum: 0
          maximum: 1
        combined_log2fc:
          type: number
        fdr_meta:
          type: number
          minimum: 0
          maximum: 1
        presence_count:
          type: integer
          description: "Number of tumor types where this gene was significant"
        effect_direction_consistency:
          type: number
          description: "Fraction of tumor types with consistent effect direction"
  statistical_summary:
    type: object
    required:
      - n_genes_initial
      - n_genes_final
      - intersection_size
    properties:
      n_genes_initial:
        type: integer
        description: "Total unique genes tested across all tumor types"
      n_genes_final:
        type: integer
        description: "Number of genes in the final panel"
      intersection_size:
        type: integer
        description: "Size of the intersection set before fallback"
      stouffer_z_max:
        type: number
        description: "Maximum Z-score from Stouffer's method"
  de_results_by_tumor:
    type: object
    description: "Summary of DE results per tumor type (optional but useful for audit)"
    additionalProperties:
      type: object
      properties:
        n_sig_genes:
          type: integer
        top_gene:
          type: string
        auc_baseline:
          type: number