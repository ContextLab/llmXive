$schema: http://json-schema.org/draft-07/schema#
title: Meta-Analysis Schema
description: Schema for meta-analysis results and gene panel selection.
type: object
required:
  - analysis_metadata
  - differential_expression_results
  - gene_panel_selection
properties:
  analysis_metadata:
    type: object
    required:
      - analysis_id
      - created_at
      - method
    properties:
      analysis_id:
        type: string
        description: Unique meta-analysis identifier
      created_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp
      method:
        type: string
        enum: [Stouffer, Fisher, Intersection, Union]
        description: Meta-analysis method used
      tumor_types_analyzed:
        type: array
        items:
          type: string
        description: List of tumor types included
      total_samples:
        type: integer
        minimum: 1
  differential_expression_results:
    type: array
    description: DE results per tumor type
    items:
      type: object
      required:
        - tumor_type
        - significant_genes
      properties:
        tumor_type:
          type: string
        significant_genes:
          type: array
          items:
            type: object
            required:
              - gene_symbol
              - log2fc
              - p_value
              - adj_p_value
            properties:
              gene_symbol:
                type: string
              log2fc:
                type: number
              p_value:
                type: number
              adj_p_value:
                type: number
              base_mean:
                type: number
        total_significant:
          type: integer
  gene_panel_selection:
    type: object
    required:
      - final_panel
      - selection_method
    properties:
      final_panel:
        type: array
        items:
          type: string
        description: List of final selected gene symbols
      selection_method:
        type: string
        enum: [Intersection, Union, Fallback_TopN]
        description: Method used to select the final panel
      fallback_reason:
        type: string
        enum: [intersection_empty, insufficient_overlap]
        description: Reason if fallback logic was triggered
      panel_size:
        type: integer
        minimum: 1
      stouffer_meta_pvalues:
        type: array
        items:
          type: object
          required:
            - gene_symbol
            - meta_p_value
            - rank
          properties:
            gene_symbol:
              type: string
            meta_p_value:
              type: number
            rank:
              type: integer
      intersection_genes:
        type: array
        items:
          type: string
        description: Genes present in intersection across tumor types
      union_genes:
        type: array
        items:
          type: string
        description: Genes present in union across tumor types
  quality_control:
    type: object
    properties:
      fdr_threshold:
        type: number
      log2fc_threshold:
        type: number
      min_tumor_types_for_intersection:
        type: integer
      batch_correction_applied:
        type: boolean
      batch_correction_method:
        type: string
        enum: [ComBat_seq, Quantile_Matching, None]
