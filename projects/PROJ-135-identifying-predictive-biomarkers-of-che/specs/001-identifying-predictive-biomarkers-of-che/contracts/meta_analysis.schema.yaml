$schema: http://json-schema.org/draft-07/schema#
title: Meta-Analysis Schema
description: |
  Schema for meta-analysis results, including gene panel selection,
  Stouffer's method p-values, and intersection/union logic.
type: object
required:
  - metadata
  - gene_panel
  - meta_analysis_results
properties:
  metadata:
    type: object
    required:
      - analysis_date
      - method
      - tumor_types_included
      - selection_strategy
    properties:
      analysis_date:
        type: string
        format: date-time
      method:
        type: string
        enum: ["intersection", "union", "stouffers"]
        description: Primary selection method used
      tumor_types_included:
        type: array
        items:
          type: string
        description: List of tumor types included in meta-analysis
      selection_strategy:
        type: string
        description: Detailed strategy (e.g., "Intersection of significant genes")
      fallback_reason:
        type: string
        nullable: true
        description: Reason for fallback if union was used (e.g., "intersection_empty")
  gene_panel:
    type: object
    required:
      - genes
      - count
    properties:
      genes:
        type: array
        items:
          type: string
        description: List of HGNC gene symbols in the final panel
      count:
        type: integer
        minimum: 1
        description: Number of genes in the panel
  meta_analysis_results:
    type: array
    description: Detailed results per gene
    items:
      type: object
      required:
        - gene_symbol
        - combined_p_value
        - z_score
        - significant_in_count
      properties:
        gene_symbol:
          type: string
        combined_p_value:
          type: number
          minimum: 0.0
          maximum: 1.0
        z_score:
          type: number
        log2fc_avg:
          type: number
        significant_in_count:
          type: integer
          minimum: 0
          description: Number of tumor types where gene was significant
        tumor_type_pvalues:
          type: object
          description: P-values per tumor type
          additionalProperties:
            type: number
  differential_expression_summary:
    type: object
    description: Summary of DE results per tumor type
    additionalProperties:
      type: object
      properties:
        total_significant_genes:
          type: integer
        fdr_threshold:
          type: number
        log2fc_threshold:
          type: number
