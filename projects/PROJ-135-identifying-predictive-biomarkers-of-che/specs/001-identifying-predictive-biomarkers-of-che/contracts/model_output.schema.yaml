$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: Schema for the output of the predictive modeling pipeline (Elastic-Net models).
type: object
required:
  - metadata
  - model_params
  - performance_metrics
  - feature_coefficients
  - cross_validation_results
properties:
  metadata:
    type: object
    required:
      - tumor_type
      - model_type
      - gene_panel_source
      - training_timestamp
    properties:
      tumor_type:
        type: string
      model_type:
        type: string
        enum:
          - elastic_net_logistic
      gene_panel_source:
        type: string
        description: "Path or ID of the gene panel used (e.g., results/meta_analysis/gene_panel.json)"
      training_timestamp:
        type: string
        format: date-time
      cv_folds:
        type: integer
        minimum: 2
      internal_validation:
        type: boolean
      external_validation:
        type: boolean
  model_params:
    type: object
    required:
      - alpha
      - l1_ratio
      - selected_features
    properties:
      alpha:
        type: number
        minimum: 0
      l1_ratio:
        type: number
        minimum: 0
        maximum: 1
      selected_features:
        type: array
        items:
          type: string
        description: "List of gene symbols included in the final model"
  performance_metrics:
    type: object
    required:
      - auc_roc
      - auc_pr
      - accuracy
      - calibration_slope
    properties:
      auc_roc:
        type: number
        minimum: 0
        maximum: 1
      auc_pr:
        type: number
        minimum: 0
        maximum: 1
      accuracy:
        type: number
        minimum: 0
        maximum: 1
      calibration_slope:
        type: number
      calibration_intercept:
        type: number
      confusion_matrix:
        type: object
        properties:
          tp:
            type: integer
          tn:
            type: integer
          fp:
            type: integer
          fn:
            type: integer
  feature_coefficients:
    type: array
    description: "Coefficients for each gene in the model"
    items:
      type: object
      required:
        - gene_symbol
        - coefficient
      properties:
        gene_symbol:
          type: string
        coefficient:
          type: number
        p_value:
          type: number
          minimum: 0
          maximum: 1
  cross_validation_results:
    type: object
    required:
      - mean_auc
      - std_auc
      - fold_aucs
    properties:
      mean_auc:
        type: number
      std_auc:
        type: number
      fold_aucs:
        type: array
        items:
          type: number
        description: "AUC for each fold in the nested CV"
  validation_details:
    type: object
    description: "Additional details about validation (LOO, external)"
    properties:
      loo_results:
        type: object
        properties:
          n_loops:
            type: integer
          mean_auc:
            type: number
      external_results:
        type: array
        items:
          type: object
          properties:
            dataset_id:
              type: string
            auc:
              type: number
