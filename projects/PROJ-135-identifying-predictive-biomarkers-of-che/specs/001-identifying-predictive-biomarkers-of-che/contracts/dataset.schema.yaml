$schema: http://json-schema.org/draft-07/schema#
title: Chemo Biomarker Dataset Schema
description: |
  Schema for processed cancer datasets used in the biomarker discovery pipeline.
  Covers both TCGA and GEO derived data after harmonization and filtering.
type: object
required:
  - metadata
  - samples
  - features
properties:
  metadata:
    type: object
    required:
      - source
      - tumor_type
      - processing_date
      - version
      - sample_count
      - gene_count
      - response_distribution
    properties:
      source:
        type: string
        description: Source identifier (e.g., 'TCGA-BRCA', 'GSE25055')
      tumor_type:
        type: string
        description: Standardized tumor type code (e.g., 'BRCA', 'LUAD')
      processing_date:
        type: string
        format: date-time
        description: ISO 8601 timestamp of processing
      version:
        type: string
        description: Pipeline version used for processing
      sample_count:
        type: integer
        minimum: 1
        description: Total number of samples in this dataset
      gene_count:
        type: integer
        minimum: 1
        description: Total number of genes (features) after filtering
      response_distribution:
        type: object
        required:
          - responders
          - non_responders
        properties:
          responders:
            type: integer
            minimum: 0
          non_responders:
            type: integer
            minimum: 0
  samples:
    type: array
    description: List of sample metadata
    items:
      type: object
      required:
        - sample_id
        - response_label
      properties:
        sample_id:
          type: string
          description: Unique sample identifier
        response_label:
          type: string
          enum: ["responder", "non_responder"]
          description: Clinical response status (RECIST/CR/PR based)
        platform:
          type: string
          description: Platform used (e.g., 'Illumina HiSeq', 'Affymetrix')
        batch_id:
          type: string
          description: Batch identifier for correction
  features:
    type: array
    description: List of gene features
    items:
      type: object
      required:
        - gene_symbol
        - biotype
      properties:
        gene_symbol:
          type: string
          description: HGNC gene symbol
        biotype:
          type: string
          description: Gene biotype (e.g., 'protein_coding')
  expression_data:
    type: object
    description: |
      Matrix of expression values. Keys are sample_ids, values are objects
      mapping gene_symbols to numeric expression values (VST/normalized).
      Represented as a nested dictionary for JSON compatibility.
    additionalProperties:
      type: object
      additionalProperties:
        type: number
