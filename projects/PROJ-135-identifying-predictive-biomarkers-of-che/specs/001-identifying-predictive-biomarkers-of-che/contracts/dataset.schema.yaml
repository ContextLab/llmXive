$schema: http://json-schema.org/draft-07/schema#
title: Dataset Schema
description: Schema for processed cancer datasets (TCGA/GEO) after harmonization and normalization.
type: object
required:
  - metadata
  - samples
  - features
  - splits
properties:
  metadata:
    type: object
    required:
      - source
      - tumor_type
      - platform
      - processing_date
      - checksum
    properties:
      source:
        type: string
        description: "Data source (e.g., TCGA-BRCA, GEO-GSE25055)"
      tumor_type:
        type: string
        description: "Tumor type code (e.g., BRCA, LUAD)"
      platform:
        type: string
        description: "Assay platform (e.g., RNA-seq, Affymetrix)"
      processing_date:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of processing"
      checksum:
        type: string
        description: "SHA-256 checksum of the raw source file"
      n_samples:
        type: integer
        minimum: 1
      n_genes:
        type: integer
        minimum: 1
      response_distribution:
        type: object
        properties:
          responder:
            type: integer
          non_responder:
            type: integer
          unknown:
            type: integer
  samples:
    type: array
    description: "List of sample identifiers and their clinical labels"
    items:
      type: object
      required:
        - sample_id
        - response_label
      properties:
        sample_id:
          type: string
        response_label:
          type: string
          enum:
            - responder
            - non_responder
            - unknown
        clinical_covariates:
          type: object
          description: "Optional additional clinical data (age, stage, etc.)"
  features:
    type: array
    description: "List of feature (gene) identifiers"
    items:
      type: string
      description: "HGNC symbol or Ensembl ID"
  splits:
    type: object
    description: "Indices or IDs belonging to discovery and training sets"
    required:
      - discovery_set
      - training_set
    properties:
      discovery_set:
        type: array
        items:
          type: string
        description: "Sample IDs in the discovery set"
      training_set:
        type: array
        items:
          type: string
        description: "Sample IDs in the training set"
