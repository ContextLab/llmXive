$schema: "http://json-schema.org/draft-07/schema#"
title: "GTEx Metabolic Phenotype Schema"
description: "Schema for the processed baseline labels CSV file containing metabolic syndrome classification."
type: "object"
properties:
  SampleID:
    type: "string"
    description: "Unique identifier for the sample."
  Age:
    type: "integer"
    description: "Donor age in years."
  Sex:
    type: "string"
    enum:
      - "M"
      - "F"
    description: "Biological sex of the donor."
  Tissue:
    type: "string"
    description: "Source tissue type."
  BMI:
    type: "number"
    description: "Body Mass Index (kg/m^2)."
  FastingGlucose:
    type: "number"
    description: "Fasting glucose level (mg/dL)."
  SystolicBP:
    type: "number"
    description: "Systolic blood pressure (mmHg)."
  DiastolicBP:
    type: "number"
    description: "Diastolic blood pressure (mmHg)."
  Triglycerides:
    type: "number"
    description: "Triglyceride level (mg/dL)."
  HDL:
    type: "number"
    description: "HDL cholesterol level (mg/dL)."
  MetS_Label:
    type: "string"
    enum:
      - "MetS"
      - "Control"
      - "NULL"
    description: "Classification based on ATP-III criteria."
  Criteria_Count:
    type: "integer"
    minimum: 0
    maximum: 5
    description: "Number of ATP-III criteria met."
  Exclusion_Reason:
    type:
      - "string"
      - "null"
    description: "Reason for exclusion if MetS_Label is NULL."
required:
  - SampleID
  - Age
  - Sex
  - Tissue
  - BMI
  - FastingGlucose
  - SystolicBP
  - DiastolicBP
  - Triglycerides
  - HDL
  - MetS_Label
  - Criteria_Count
additionalProperties: false
