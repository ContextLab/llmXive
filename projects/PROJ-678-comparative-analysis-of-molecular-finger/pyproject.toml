[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "comparative-analysis-molecular-fingerprints"
version = "0.1.0"
description = "Comparative Analysis of Molecular Fingerprints for Pesticide Toxicity Prediction"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "rdkit",
    "scikit-learn",
    "pandas",
    "numpy",
    "requests",
    "datasets",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'

[tool.flake8]
max-line-length = 88
extend-ignore = "E203, W503"
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
]
