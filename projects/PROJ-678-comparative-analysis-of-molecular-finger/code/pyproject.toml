[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "comparative-analysis-molecular-fingerprints"
version = "0.1.0"
description = "Comparative Analysis of Molecular Fingerprints for Pesticide Toxicity Prediction"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "rdkit==2024.3.5",
    "scikit-learn==1.5.0",
    "pandas==2.2.2",
    "numpy==1.26.4",
    "requests==2.32.3",
    "datasets==2.20.0",
]

[tool.setuptools]
packages = ["code"]

[tool.black]
line-length = 100
target-version = ['py39']

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "data",
    "build",
    "dist",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"
