[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predicting-molecular-reactivity"
version = "0.1.0"
description = "Predicting Molecular Reactivity Using Graph Neural Networks"
requires-python = ">=3.11"
dependencies = [
    "torch",
    "rdkit",
    "scikit-learn",
    "pandas",
    "datasets",
    "networkx",
    "psutil",
]

[project.optional-dependencies]
dev = [
    "flake8",
    "black",
    "isort",
    "pytest",
    "pytest-cov",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["setup_directories"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
