$schema: "http://json-schema.org/draft-07/schema#"
title: "Processed Graph Dataset Schema"
description: "Schema for the preprocessed molecular graph dataset used in training."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      source:
        type: "string"
        description: "Source dataset identifier (e.g., QM9)"
      checksum:
        type: "string"
        description: "SHA256 checksum of the raw source file"
      created_at:
        type: "string"
        format: "date-time"
      total_molecules:
        type: "integer"
        minimum: 1
      excluded_molecules:
        type: "integer"
        minimum: 0
        description: "Count of molecules dropped due to invalid SMILES"
  graphs:
    type: "array"
    items:
      type: "object"
      properties:
        graph_id:
          type: "string"
          description: "Unique identifier for the molecule"
        smiles:
          type: "string"
          description: "Canonical SMILES string"
        target_gap:
          type: "number"
          description: "HOMO-LUMO gap in eV"
        nodes:
          type: "array"
          items:
            type: "object"
            properties:
              atomic_number:
                type: "integer"
              hybridization:
                type: "integer"
                description: "0=sp, 1=sp2, 2=sp3, 3=other"
              formal_charge:
                type: "integer"
              is_aromatic:
                type: "boolean"
            required:
              - atomic_number
              - hybridization
              - formal_charge
        edges:
          type: "array"
          items:
            type: "object"
            properties:
              source_node:
                type: "integer"
              target_node:
                type: "integer"
              bond_type:
                type: "integer"
                description: "1=single, 2=double, 3=triple, 4=aromatic"
              conjugation:
                type: "boolean"
              is_in_ring:
                type: "boolean"
            required:
              - source_node
              - target_node
              - bond_type
      required:
        - graph_id
        - smiles
        - target_gap
        - nodes
        - edges
required:
  - metadata
  - graphs
