$schema: http://json-schema.org/draft-07/schema#
title: Participant Response
description: Schema for a human participant's trust rating on a text sample.
type: object
required:
  - response_id
  - participant_id
  - text_sample_id
  - trust_rating
  - attention_check_status
  - timestamp
properties:
  response_id:
    type: string
    description: Unique identifier for the response record.
    pattern: "^RESP[0-9]{8}$"
  participant_id:
    type: string
    description: Unique identifier for the human participant.
    type: string
  text_sample_id:
    type: string
    description: Reference to the text sample being rated.
    pattern: "^TS[0-9]{6}$"
  trust_rating:
    type: integer
    description: Likert scale trust rating (1-5).
    minimum: 1
    maximum: 5
  attention_check_status:
    type: string
    description: Status of the attention check for this response.
    enum:
      - passed
      - failed
      - skipped
  timestamp:
    type: string
    description: ISO 8601 timestamp of the response.
    format: date-time
additionalProperties: false
