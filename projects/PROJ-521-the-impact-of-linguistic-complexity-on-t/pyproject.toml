[project]
name = "linguistic-complexity-trust"
version = "0.1.0"
description = "Impact of Linguistic Complexity on Trust in AI-Generated Text"
requires-python = ">=3.11"
dependencies = [
    "transformers",
    "torch",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "numpy",
    "seaborn",
    "textstat",
    "nltk",
    "datasets",
    "requests",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
