$schema: http://json-schema.org/draft-07/schema#
title: ReproResult
description: Schema for the output of the re-implementation phase.
type: object
properties:
  doi:
    type: string
    description: "Digital Object Identifier of the paper."
  reproduced_metrics:
    type: object
    properties:
      mae:
        type: number
        description: "Reproduced Mean Absolute Error."
      r2:
        type: number
        description: "Reproduced R-squared value."
      spearman_rho:
        type: number
        description: "Reproduced Spearman correlation coefficient."
    required:
      - mae
      - r2
      - spearman_rho
  deviations:
    type: object
    properties:
      mae:
        type: number
        description: "Absolute deviation of MAE."
      r2:
        type: number
        description: "Absolute deviation of R2."
      spearman_rho:
        type: number
        description: "Absolute deviation of Spearman rho."
    required:
      - mae
      - r2
      - spearman_rho
  deviation_index:
    type: number
    minimum: 0
    maximum: 1
    description: "Normalized deviation index (S) for ranking. Descriptive metric, not a statistical test."
  metric_std:
    type: object
    description: "Standard deviation of metrics from seed sweep, used for meta-analysis weights."
    properties:
      mae:
        type: number
      r2:
        type: number
      spearman_rho:
        type: number
    required:
      - mae
      - r2
      - spearman_rho
  flags:
    type: array
    items:
      type: string
    description: "List of flags (e.g., missing_seed, covariate_gap)."
  environment_hash:
    type: string
    description: "Hash of the Docker image used."
  seed_used:
    type: integer
    description: "The random seed actually used."
required:
  - doi
  - reproduced_metrics
  - deviations
  - deviation_index
  - metric_std
  - environment_hash
  - seed_used