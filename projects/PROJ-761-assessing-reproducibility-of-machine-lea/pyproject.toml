[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-761-assessing-reproducibility"
version = "0.1.0"
description = "Assessing Reproducibility of Machine-Learned Reaction Yield Models"
requires-python = ">=3.11"
dependencies = [
    "torch==2.2.0+cpu",
    "scikit-learn==1.5.0",
    "rdkit==2024.3.1",
    "statsmodels==0.14.1",
    "pandas==2.2.0",
    "numpy==1.26.0",
    "matplotlib==3.8.0",
    "pyyaml==6.0.1",
    "requests==2.31.0",
]

[project.optional-dependencies]
dev = [
    "black==24.3.0",
    "ruff==0.3.0",
    "pytest==8.1.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "W",  # pycodestyle warnings
    "I",  # isort
]
ignore = []
exclude = [
    ".eggs",
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
]

[tool.ruff.per-file-ignores]
"tests/*" = ["E501"]

[tool.setuptools]
packages = ["code", "tests"]