$schema: "http://json-schema.org/draft-07/schema#"
title: "GWOSCEvent"
description: "Schema for a validated GWOSC compact binary coalescence event."
type: "object"
required:
  - event_id
  - detector_network
  - strain_h_plus
  - strain_h_cross
  - timestamp
  - checksum
properties:
  event_id:
    type: "string"
    description: "Unique identifier for the GW event (e.g., GW150914)."
  detector_network:
    type: "array"
    items:
      type: "string"
    description: "List of detectors involved (e.g., LLO, LHO, V1)."
  strain_h_plus:
    type: "array"
    items:
      type: "number"
    description: "Time series of the plus polarization strain."
  strain_h_cross:
    type: "array"
    items:
      type: "number"
    description: "Time series of the cross polarization strain."
  timestamp:
    type: "number"
    description: "GPS timestamp of the event."
  metadata:
    type: "object"
    description: "Optional metadata including mass, distance, spin estimates."
    additionalProperties: true
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the raw file."
  completeness_score:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Completeness score for required fields (target: ≥0.95)."