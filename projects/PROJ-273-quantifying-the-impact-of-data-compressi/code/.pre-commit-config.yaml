repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        # Note: ruff format is a drop-in replacement for black
        # If black is strictly required by legacy tooling, keep black hook below,
        # but ruff-format is preferred for speed.
        # We include black explicitly here to satisfy the task requirement for "black" tool.
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
