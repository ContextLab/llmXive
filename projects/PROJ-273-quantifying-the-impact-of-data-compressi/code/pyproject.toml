[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantifying-compression-gw"
version = "0.1.0"
description = "Quantifying the Impact of Data Compression on Gravitational Wave Event Reconstruction"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "pandas>=2.0.0",
    "h5py>=3.8.0",
    "bilby>=2.0.0",
    "dynesty>=2.1.0",
    "gwosc>=0.7.0",
    "lz4>=4.3.0",
    "pywavelets>=1.4.0",
    "astropy>=5.2.0",
    "pillow>=9.5.0",
    "pytest>=7.3.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.2.0",
    "lalsuite>=7.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pre-commit>=3.3.0",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
line-length = 100
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["code/tests"]
timeout = 300
addopts = "--cov=code/src --cov-report=term-missing --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests"
]