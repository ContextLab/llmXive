[pytest]
# CI-compatible timeout settings
# Fail tests that take longer than 300 seconds (5 minutes)
timeout = 300
timeout_func_only = true
timeout_method = thread

# Coverage thresholds
# Fail if overall coverage is below 80%
# Fail if any line in src/ is below 70% (optional strictness)
addopts = 
    --cov=src
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=80
    -v
    --strict-markers

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker definitions for parallel execution groups
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract tests
    slow: Mark test as slow (skip by default in CI unless requested)
    parallel_safe: Can be run in parallel with other tests
