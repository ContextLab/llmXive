'|hour run':
  quote: "On the traditional 22.810 km long Nordschleife (\"Northern Loop\") version,\
    \ the competition took usually 44 laps (1003.64 km, since the addition of the\
    \ Hohenrain chicane in 1967 1004.74 km) and lasted initially about 8 hours, since\
    \ 1965 under 7 hours, since 1971 less than 6 hours. While the 1974 event was shortened\
    \ by 25% in the wake of the oil crisis, 1976 saw a new situation with a divided\
    \ World Sportscar Championship calendar: the Group 6 sportscars opened their 1976\
    \ World Sportscar Championship with a 4 April 1976 race for only 300 km without\
    \ driver change. The new Group 5 \"Special Production Cars\" 1976 World Championship\
    \ for Makes season would visit on 30 May, colliding with the 1976 Monaco Grand\
    \ Prix, thus Porsche factory drivers Jacky Ickx and Jochen Mass as well as Hans-Joachim\
    \ Stuck and others were absent from the  Int. XXII ADAC-1000-km-Rennen N\xFCrburgring\
    \ race that was extended by 3 laps to 47, covered 1073.245 km and lasted 6:38\
    \ hours. In turn, the \"Internationales 6-Stunden-Rennen\" in July lasted only\
    \ 4 hours as part of the European Touring Car Championship."
  source_id: "6 Hours of N\xFCrburgring"
  url: "https://en.wikipedia.org/wiki/6_Hours_of_N\xFCrburgring"
  value: '47'
