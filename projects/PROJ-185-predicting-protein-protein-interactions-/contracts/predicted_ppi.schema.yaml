$schema: "http://json-schema.org/draft-07/schema#"
title: Predicted Protein‑Protein Interaction Edge List
description: |
  Schema for the TSV file generated by the pipeline that lists predicted
  protein‑protein interactions. Each row must contain two protein identifiers
  (STRING or UniProt IDs) and a numeric confidence score (e.g., correlation
  coefficient or transformed p‑value). The file is expected to be a plain
  TSV with a header line matching the property names.
type: array
items:
  type: object
  properties:
    protein_a:
      type: string
      description: Identifier of the first protein in the interaction.
    protein_b:
      type: string
      description: Identifier of the second protein in the interaction.
    score:
      type: number
      description: Numeric confidence score for the interaction (higher = more confident).
  required:
    - protein_a
    - protein_b
    - score
  additionalProperties: false
