$schema: "http://json-schema.org/draft-07/schema#"
title: Predicted Protein-Protein Interaction Edge List
type: object
description: |
  Schema for the TSV edge list generated by the pipeline. The file must contain a header
  with three columns: protein_a, protein_b, and correlation. Each subsequent row
  represents a predicted interaction.
properties:
  protein_a:
    type: string
    description: STRING identifier for the first protein.
  protein_b:
    type: string
    description: STRING identifier for the second protein.
  correlation:
    type: number
    description: Correlation score (e.g., Pearson) between the two proteins.
required:
  - protein_a
  - protein_b
  - correlation
additionalProperties: false
