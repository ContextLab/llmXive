$schema: "http://json-schema.org/draft-07/schema#"
title: Evaluation Metrics
type: object
description: Mapping from species identifier to metric results produced by the evaluation step.
patternProperties:
  "^[a-zA-Z0-9_]+$":
    type: object
    description: Metrics for a single species.
    properties:
      auroc:
        type: number
        description: Area Under the ROC curve.
      auprc:
        type: number
        description: Area Under the Precision‑Recall curve.
      baseline_auroc:
        type: number
        description: AUROC for the degree‑preserving random baseline.
      baseline_auprc:
        type: number
        description: AUPRC for the baseline.
      precision_at_1000:
        type: number
        description: Precision among the top 1 000 predicted edges.
    required:
      - auroc
      - auprc
    additionalProperties: false
additionalProperties: false