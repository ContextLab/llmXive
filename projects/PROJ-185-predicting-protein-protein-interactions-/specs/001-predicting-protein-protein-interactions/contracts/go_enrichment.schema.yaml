$schema: "http://json-schema.org/draft-07/schema#"
title: "GO Enrichment Results"
type: object
description: "GO enrichment table for a given species."
required:
  - go_id
  - description
  - raw_p
  - adjusted_p
  - gene_count
properties:
  go_id:
    type: string
    description: "GO term identifier (e.g., GO:0008150)."
  description:
    type: string
    description: "Human‑readable GO term name."
  raw_p:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Unadjusted Fisher exact test p‑value."
  adjusted_p:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Benjamini–Hochberg FDR‑adjusted p‑value."
  gene_count:
    type: integer
    minimum: 1
    description: "Number of genes from the predicted interactome annotated to this GO term."
additionalProperties: false
