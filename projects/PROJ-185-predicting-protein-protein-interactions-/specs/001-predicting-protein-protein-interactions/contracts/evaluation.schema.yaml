$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Metrics"
type: "object"
description: "JSON object containing evaluation metrics for each processed species."
patternProperties:
  "^[A-Za-z_]+$":
    type: "object"
    properties:
      auroc:
        type: "number"
        minimum: 0.0
        maximum: 1.0
      auprc:
        type: "number"
        minimum: 0.0
        maximum: 1.0
      baseline_auroc:
        type: "number"
        minimum: 0.0
        maximum: 1.0
      baseline_auprc:
        type: "number"
        minimum: 0.0
        maximum: 1.0
      baseline_p:
        type: "number"
        minimum: 0.0
        maximum: 1.0
    required: ["auroc", "auprc", "baseline_auroc", "baseline_auprc", "baseline_p"]
    additionalProperties: false
additionalProperties: false
