$schema: "http://json-schema.org/draft-07/schema#"
title: EvaluationMetrics
type: object
description: "Schema for the JSON file summarizing evaluation of co‑expression‑derived PPIs against STRING."
properties:
  species:
    type: string
    description: "Canonical species identifier (e.g., 'Arabidopsis_thaliana')."
  auroc:
    type: number
    format: float
    description: "Area Under the Receiver Operating Characteristic curve computed on raw correlation scores."
  auprc:
    type: number
    format: float
    description: "Area Under the Precision‑Recall Curve computed on raw correlation scores."
  baseline_auroc:
    type: number
    format: float
    description: "AUROC of the degree‑preserving random‑graph baseline."
  baseline_auprc:
    type: number
    format: float
    description: "AUPRC of the random‑graph baseline."
  baseline_p:
    type: number
    format: float
    description: "Two‑sided p‑value comparing observed AUROC/AUPRC to the random baseline (FR‑018)."
  threshold:
    type: number
    format: float
    description: "Correlation threshold used for edge selection (default set to a relatively high value)."
required:
  - species
  - auroc
  - auprc
  - baseline_auroc
  - baseline_auprc
  - baseline_p
  - threshold
additionalProperties: false
example:
  species: "Arabidopsis_thaliana"
  auroc: indicative of strong discriminative performance
  auprc: indicative of reasonable performance
  baseline_auroc: a modest baseline level indicative of limited discrimination.
  baseline_auprc: a modest baseline performance.
  baseline_p: a low baseline probability
  threshold: a relatively high value
