$schema: "http://json-schema.org/draft-07/schema#"
title: "Pipeline Log Entry"
type: "object"
description: "JSON‑Line schema for pipeline logging."
properties:
  timestamp:
    type: "string"
    format: "date-time"
  level:
    type: "string"
    enum: ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"]
  message:
    type: "string"
  schema_version:
    type: "string"
required: ["timestamp", "level", "message", "schema_version"]
additionalProperties: false
