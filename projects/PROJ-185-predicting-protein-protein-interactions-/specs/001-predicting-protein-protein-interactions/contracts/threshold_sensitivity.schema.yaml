$schema: "http://json-schema.org/draft-07/schema#"
title: "Threshold Sensitivity Table"
type: object
description: "AUROC and AUPRC values for each correlation threshold."
required:
  - threshold
  - auroc
  - auprc
properties:
  threshold:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Correlation threshold tested (e.g., 0.75)."
  auroc:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "AUROC at this threshold."
  auprc:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "AUPRC at this threshold."
additionalProperties: false
