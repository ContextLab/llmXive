$schema: "http://json-schema.org/draft-07/schema#"
title: "Threshold Sensitivity Table"
type: "object"
description: "TSV file recording performance metrics for each correlation threshold."
properties:
  header:
    type: "array"
    items:
      type: "string"
    enum:
      - ["threshold", "edge_count", "auroc", "auprc"]
required: ["header"]
additionalProperties: false
