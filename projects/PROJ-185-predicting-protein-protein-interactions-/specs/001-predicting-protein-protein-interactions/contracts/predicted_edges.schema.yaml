$schema: "http://json-schema.org/draft-07/schema#"
title: PredictedEdges
type: object
description: "Schema for predicted protein‑protein interaction edge list produced by the pipeline."
required:
  - protein_id_a
  - protein_id_b
  - correlation
properties:
  protein_id_a:
    type: string
    description: "STRING protein identifier for the first node of the undirected edge."
  protein_id_b:
    type: string
    description: "STRING protein identifier for the second node of the undirected edge."
  correlation:
    type: number
    format: float
    description: "Pearson (or Spearman, if selected) correlation coefficient between the two proteins."
  bootstrap_ci_lower:
    type: number
    format: float
    description: "Lower bound of the bootstrap confidence interval for the correlation (optional, present only if --bootstrap used)."
  bootstrap_ci_upper:
    type: number
    format: float
    description: "Upper bound of the bootstrap confidence interval for the correlation (optional)."
additionalProperties: false
example:
  protein_id_a: "AT1G01010"
  protein_id_b: "AT2G02020"
  correlation: 0.842
  bootstrap_ci_lower: 0.815
  bootstrap_ci_upper: 0.868