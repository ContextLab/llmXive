$schema: "http://json-schema.org/draft-07/schema#"
title: "Predicted PPI Edge List"
type: "object"
description: "Tab‑separated file with a header line. Each row represents an undirected predicted interaction."
properties:
  header:
    type: "array"
    items:
      type: "string"
    enum:
      - ["protein_id_1", "protein_id_2", "correlation"]
required: ["header"]
additionalProperties: false
