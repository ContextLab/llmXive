$schema: "http://json-schema.org/draft-07/schema#"
title: "Predicted PPI Edge List"
type: object
required:
  - protein_a
  - protein_b
  - correlation
properties:
  protein_a:
    type: string
    description: "STRING protein identifier for the first node."
  protein_b:
    type: string
    description: "STRING protein identifier for the second node."
  correlation:
    type: number
    minimum: 0.8
    description: "Pearson correlation coefficient between the two genes."
additionalProperties: false