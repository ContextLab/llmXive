$schema: "http://json-schema.org/draft-07/schema#"
title: Predicted PPI Edge List Schema
type: object
required:
  - protein_a
  - protein_b
  - correlation
properties:
  protein_a:
    type: string
    description: "STRING protein identifier for the first node (e.g., 9606.ENSP00000354547)."
  protein_b:
    type: string
    description: "STRING protein identifier for the second node."
  correlation:
    type: number
    description: "Pearson correlation coefficient between the two genes' expression profiles."
    minimum: -1.0
    maximum: 1.0
additionalProperties: false
