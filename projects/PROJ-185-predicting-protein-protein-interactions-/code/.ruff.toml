[lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # pyflakes
  "I",  # isort
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "UP", # pyupgrade
  "N",  # pep8-naming
  "RUF" # ruff-specific rules
]
ignore = [
  "E501", # line too long (handled by black)
  "B008", # do not perform function calls in argument defaults (common in CLI)
]

[lint.isort]
known-first-party = ["pipeline", "utils", "cli"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
