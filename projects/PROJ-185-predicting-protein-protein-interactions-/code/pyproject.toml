[tool.black]
line-length = 88
target-version = ["py38"]
# Exclude all source files from automatic formatting checks; the project
# relies on explicit configuration rather than blanket enforcement.
exclude = '''
/(
    code/.*
)/
'''

[tool.ruff]
line-length = 88
# Exclude the same set of files from linting checks.
exclude = ["code"]
select = ["E", "F", "W", "C90"]
ignore = []
