$schema: "http://json-schema.org/draft-07/schema#"
title: "SocialMediaDatasetSchema"
description: "Schema for the raw and processed social media dataset used in the anxiety-control study."
type: "object"
properties:
  post_id:
    type: "string"
    description: "Unique identifier for the post."
  text:
    type: "string"
    description: "The raw text content of the post."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the post."
  user_id:
    type: "string"
    description: "Anonymized user identifier."
  anxiety_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Continuous anxiety score derived from NLP model."
  confidence_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Model confidence (max probability) for the prediction."
  control_proxy:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Metadata-based proxy for perceived control."
  filter_flag:
    type: "boolean"
    description: "True if a content filter or edit flag was detected in metadata."
  timestamp_regularity:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Metric of posting consistency (0.0 = irregular, 1.0 = regular)."
required:
  - post_id
  - text
  - timestamp
  - user_id
  - anxiety_score
  - confidence_score
  - control_proxy
