$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResultSchema"
description: "Schema for the final statistical analysis results."
type: "object"
properties:
  correlation_method:
    type: "string"
    enum:
      - "pearson"
      - "spearman"
    description: "The correlation method used based on normality test."
  correlation_coefficient:
    type: "number"
    description: "The calculated correlation coefficient (r)."
  p_value:
    type: "number"
    description: "The p-value of the correlation test."
  is_significant:
    type: "boolean"
    description: "True if p_value < 0.05."
  normality_test_p_value:
    type: "number"
    description: "P-value from the Shapiro-Wilk normality test on marginal distributions of the variables."
  sample_size:
    type: "integer"
    description: "Number of records included in the final analysis."
  confidence_threshold:
    type: "number"
    description: "The confidence threshold used for filtering (e.g., 0.6)."
required:
  - correlation_method
  - correlation_coefficient
  - p_value
  - is_significant
  - normality_test_p_value
  - sample_size
  - confidence_threshold
