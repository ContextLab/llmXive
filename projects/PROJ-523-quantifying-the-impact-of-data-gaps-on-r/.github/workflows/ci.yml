name: CI - Dependency Verification and Package Health

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Verify healpy version
        run: |
          python -c "import healpy; print(f'healpy version: {healpy.__version__}'); assert tuple(map(int, healpy.__version__.split('.')[:2])) >= (1, 15), 'healpy version must be >= 1.15.0'"

      - name: Verify core packages import
        run: |
          python -c "import camb; import numpy; import scipy; import statsmodels; import pyyaml; import astropy; import pytest; print('All core packages imported successfully')"

      - name: Validate project structure
        run: |
          python -c "from pathlib import Path; assert Path('code/config.py').exists(); assert Path('code/data_io.py').exists(); assert Path('contracts').exists(); print('Project structure validated')"