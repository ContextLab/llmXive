name: CI - Verify Dependencies

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  verify-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Verify healpy version
        run: |
          python -c "import healpy; assert tuple(map(int, healpy.__version__.split('.')[:2])) >= (1, 15), f'healpy version {healpy.__version__} is too old (>=1.15.0 required)'; print(f'Success: healpy {healpy.__version__} installed')"

      - name: Verify core package imports
        run: |
          python -c "import camb; import numpy; import scipy; import statsmodels; import yaml; import astropy; print('All core dependencies imported successfully')"

      - name: Run pilot test (optional quick check)
        run: |
          python code/pipeline/pilot_runner.py || echo "Pilot runner not fully implemented yet, but dependencies are verified"