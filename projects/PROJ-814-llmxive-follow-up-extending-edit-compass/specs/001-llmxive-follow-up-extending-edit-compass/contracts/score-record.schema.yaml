$schema: "http://json-schema.org/draft-07/schema#"
title: "ScoreRecord"
description: "Computed metrics for a single EditInstance, ready for regression analysis."
type: object
required:
  - instance_id
  - instruction_description_semantic_similarity_score
  - fidelity_score
  - human_judgment_score
properties:
  instance_id:
    type: string
    description: "Unique identifier matching the original EditInstance."
  instruction_description_semantic_similarity_score:
    type: number
    minimum: 0
    maximum: 1
    description: "Cosine similarity between instruction embedding and VLM-generated edit description embedding (measures semantic alignment)."
  fidelity_score:
    type: number
    minimum: 0
    maximum: 1
    description: "Weighted average of SSIM and (1-LPIPS): 0.5 × SSIM + 0.5 × (1-LPIPS)."
  human_judgment_score:
    type: number
    minimum: 0
    maximum: 1
    description: "Human preference score provided by the Edit-Compass benchmark."
additionalProperties: false