$schema: http://json-schema.org/draft-07/schema#
title: ScoreRecord Schema
description: JSON Schema for validating ScoreRecord data generated by the llmXive pipeline.
type: object
required:
  - instance_id
  - logic_score
  - fidelity_score
  - ssim
  - lpips
  - vllm_description
  - p_value_logic
  - p_value_fidelity
  - beta_logic
  - beta_fidelity
properties:
  instance_id:
    type: string
    description: Unique identifier for the edit instance.
    minLength: 1
  logic_score:
    type: number
    description: Logic consistency score (cosine similarity between instruction and VLM description).
    minimum: -1.0
    maximum: 1.0
  fidelity_score:
    type: number
    description: Fidelity score (weighted combination of SSIM and 1-LPIPS).
    minimum: 0.0
    maximum: 1.0
  ssim:
    type: number
    description: Structural Similarity Index Measure.
    minimum: -1.0
    maximum: 1.0
  lpips:
    type: number
    description: Learned Perceptual Image Patch Similarity.
    minimum: 0.0
    maximum: 1.0
  vllm_description:
    type: string
    description: Text description generated by the VLM for the edited image.
    minLength: 1
  p_value_logic:
    type: number
    description: P-value for the logic score correlation test.
    minimum: 0.0
    maximum: 1.0
  p_value_fidelity:
    type: number
    description: P-value for the fidelity score correlation test.
    minimum: 0.0
    maximum: 1.0
  beta_logic:
    type: number
    description: Standardized regression coefficient (beta) for logic score.
  beta_fidelity:
    type: number
    description: Standardized regression coefficient (beta) for fidelity score.
additionalProperties: false