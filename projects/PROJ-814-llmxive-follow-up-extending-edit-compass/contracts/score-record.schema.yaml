$schema: http://json-schema.org/draft-07/schema#
title: ScoreRecord
description: JSON Schema for validating ScoreRecord instances generated by the scoring pipeline.
type: object
required:
  - instance_id
  - logic_score
  - fidelity_score
  - ssim
  - lpips
  - vllm_description
  - p_value_logic
  - p_value_fidelity
  - beta_logic
  - beta_fidelity
properties:
  instance_id:
    type: string
    description: Unique identifier for the edit instance, derived from the source data.
    minLength: 1
  logic_score:
    type: number
    description: Cosine similarity score between instruction embedding and VLM description embedding.
    minimum: -1.0
    maximum: 1.0
  fidelity_score:
    type: number
    description: Weighted combination of SSIM and (1 - LPIPS), representing image fidelity.
    minimum: 0.0
    maximum: 1.0
  ssim:
    type: number
    description: Structural Similarity Index Measure between source and edited images.
    minimum: 0.0
    maximum: 1.0
  lpips:
    type: number
    description: Learned Perceptual Image Patch Similarity between source and edited images.
    minimum: 0.0
    maximum: 1.0
  vllm_description:
    type: string
    description: Natural language description of the edited image generated by the VLM.
    minLength: 1
  p_value_logic:
    type: number
    description: P-value associated with the logic score correlation test.
    minimum: 0.0
    maximum: 1.0
  p_value_fidelity:
    type: number
    description: P-value associated with the fidelity score correlation test.
    minimum: 0.0
    maximum: 1.0
  beta_logic:
    type: number
    description: Standardized regression coefficient (beta) for the logic score predictor.
  beta_fidelity:
    type: number
    description: Standardized regression coefficient (beta) for the fidelity score predictor.
additionalProperties: false