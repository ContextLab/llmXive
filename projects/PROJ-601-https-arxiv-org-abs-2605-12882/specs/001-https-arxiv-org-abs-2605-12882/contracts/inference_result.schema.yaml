$schema: "http://json-schema.org/draft-07/schema#"
title: "InferenceResult"
description: "Schema for a single prediction record generated by the CiteVQA inference pipeline."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the sample."
  question:
    type: "string"
    description: "The input question string."
  predicted_answer:
    type: "string"
    description: "The text generated by the model."
  predicted_bbox:
    type: "array"
    description: "Predicted bounding box coordinates [x1, y1, x2, y2] normalized to [0, 1]."
    items:
      type: "number"
    minItems: 4
    maxItems: 4
  image_path:
    type: "string"
    description: "Path to the image used."
  inference_time_ms:
    type: "number"
    description: "Time taken for inference in milliseconds."
required:
  - id
  - question
  - predicted_answer
  - predicted_bbox
  - image_path
additionalProperties: true