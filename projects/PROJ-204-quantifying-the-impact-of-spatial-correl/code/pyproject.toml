[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-204"
version = "0.1.0"
description = "Quantifying the impact of spatial correlations on perovskite solar cell efficiency"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24.3",
    "scipy>=1.11.4",
    "scikit-learn>=1.3.2",
    "pandas>=2.1.4",
    "matplotlib>=3.8.2",
    "statsmodels>=0.14.1",
    "pygam>=0.9.1",
    "pyyaml>=6.0.1",
    "pytest>=7.4.3",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
