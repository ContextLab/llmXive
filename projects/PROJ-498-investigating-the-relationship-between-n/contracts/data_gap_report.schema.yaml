$schema: http://json-schema.org/draft-07/schema#
title: Data Gap Report
description: >
  Schema for the data gap report generated when no suitable OpenNeuro dataset
  is found for the task-switching investigation.
type: object
required:
  - dataset_id
  - reason
  - timestamp
properties:
  dataset_id:
    type: string
    description: The ID of the dataset that was searched for or attempted.
  reason:
    type: string
    description: A human-readable explanation of why the dataset was not used or found.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the report was generated.
  fallback_id:
    type: ["string", "null"]
    description: >
      An optional fallback dataset ID if a primary one was not found.
      MUST be set to null if no fallback dataset is identified.
    nullable: true
additionalProperties: false
