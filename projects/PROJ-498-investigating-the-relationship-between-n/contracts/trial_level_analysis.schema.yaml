# Schema for Trial-Level Analysis artifact
# Generated for PROJ-498-investigating-the-relationship-between-n
# Task: T009
$schema: http://json-schema.org/draft-07/schema#
title: Trial Level Analysis Report
description: >-
  Report containing results from Linear Mixed-Effects models and trial-level
  synchrony data as required by FR-005 and Task T035.
type: object
required:
  - dataset_id
  - model_specification
  - fixed_effects
  - random_effects
  - model_fit_statistics
  - framing_note
  - timestamp
properties:
  dataset_id:
    type: string
    description: ID of the OpenNeuro dataset used for analysis.
  model_specification:
    type: object
    description: Specification of the LME model used.
    required:
      - formula
      - dependent_variable
      - independent_variables
      - random_effects_structure
    properties:
      formula:
        type: string
        description: R-style formula string (e.g., 'RT ~ Synchrony + (1|Subject)').
      dependent_variable:
        type: string
        description: Name of the dependent variable (e.g., 'RT').
      independent_variables:
        type: array
        items:
          type: string
        description: List of fixed effect independent variables.
      random_effects_structure:
        type: string
        description: Description of random effects (e.g., '(1|Subject)').
  fixed_effects:
    type: array
    description: Results for fixed effects coefficients.
    items:
      type: object
      required:
        - term
        - estimate
        - std_error
        - t_value
        - p_value
      properties:
        term:
          type: string
        estimate:
          type: number
        std_error:
          type: number
        t_value:
          type: number
        p_value:
          type: number
  random_effects:
    type: array
    description: Variance components for random effects.
    items:
      type: object
      required:
        - group
        - variance
        - std_dev
      properties:
        group:
          type: string
        variance:
          type: number
        std_dev:
          type: number
  model_fit_statistics:
    type: object
    description: Overall model fit statistics.
    required:
      - aic
      - bic
      - log_likelihood
      - num_observations
    properties:
      aic:
        type: number
      bic:
        type: number
      log_likelihood:
        type: number
      num_observations:
        type: integer
  framing_note:
    type: string
    description: >-
      Mandatory framing note indicating the associational nature of the findings.
      Must contain the word 'associational'.
    pattern: .*associational.*
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of report generation.
additionalProperties: false