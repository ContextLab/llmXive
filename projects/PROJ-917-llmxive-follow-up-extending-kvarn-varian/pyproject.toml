[project]
name = "llmxive"
version = "0.1.0"
description = "Automated science pipeline for KVarN follow-up"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "torch",
    "scikit-learn",
    "pandas",
    "pyarrow",
    "pytest",
    "matplotlib",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.nox
  | \.pants.d
  | \.pytype
  | \.ruff_cache
  | \.svn
  | \.tox
  | \.venv
  | __pypackages__
  | _build
  | buck-out
  | build
  | dist
  | node_modules
  | venv
)/
'''