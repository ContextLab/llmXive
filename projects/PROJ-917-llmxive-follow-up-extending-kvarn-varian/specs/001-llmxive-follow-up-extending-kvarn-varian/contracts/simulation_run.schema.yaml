$schema: "http://json-schema.org/draft-07/schema#"
title: "SimulationRun"
description: "Schema for a single instance of the 1,000-step autoregressive simulation."
type: "object"
required:
  - "run_id"
  - "seed"
  - "method"
  - "steps"
  - "accumulated_kl_divergence"
  - "avg_latency_per_token_ms"
  - "kl_history"
  - "fallback_count"
properties:
  run_id:
    type: "string"
    description: "Unique identifier."
  seed:
    type: "integer"
    description: "Random seed used for reproducibility."
  method:
    type: "string"
    enum:
      - "static_prior"
      - "kvarn_baseline"
    description: "Method used for scaling factor prediction."
  steps:
    type: "integer"
    const: 1000
    description: "Total steps in the simulation."
  accumulated_kl_divergence:
    type: "number"
    description: "Sum of KL-divergence over all steps."
  avg_latency_per_token_ms:
    type: "number"
    minimum: 0.0
    description: "Average wall-clock time per token."
  kl_history:
    type: "array"
    items:
      type: "number"
    minItems: 1000
    maxItems: 1000
    description: "List of KL values per step."
  fallback_count:
    type: "integer"
    minimum: 0
    description: "Number of times the system fell back to KVarN."