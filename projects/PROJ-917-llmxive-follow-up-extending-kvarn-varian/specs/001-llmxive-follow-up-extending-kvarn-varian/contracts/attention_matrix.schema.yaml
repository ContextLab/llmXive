$schema: "http://json-schema.org/draft-07/schema#"
title: "AttentionMatrix"
description: "Schema for a synthetic attention matrix and its derived statistics."
type: "object"
required:
  - "id"
  - "dimensions"
  - "sparsity_level"
  - "outlier_magnitude"
  - "mean"
  - "variance"
properties:
  id:
    type: "string"
    description: "Unique identifier (UUID)."
  dimensions:
    type: "object"
    required:
      - "rows"
      - "cols"
    properties:
      rows:
        type: "integer"
        const: 128
      cols:
        type: "integer"
        const: 128
  sparsity_level:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Ratio of zero elements."
  outlier_magnitude:
    type: "number"
    description: "Scaling factor for outlier values."
  mean:
    type: "number"
    description: "Arithmetic mean of non-zero elements."
  variance:
    type: "number"
    minimum: 0.0
    description: "Variance of non-zero elements."
  raw_data:
    type: "string"
    description: "Base64 encoded flattened array (optional)."
    pattern: "^[A-Za-z0-9+/=]+$"