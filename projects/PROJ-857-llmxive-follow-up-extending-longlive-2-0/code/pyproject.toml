[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-simulation"
version = "0.1.0"
description = "LLM-Xive Precision Threshold Simulation"
requires-python = ">=3.9"
dependencies = [
    "torch",
    "transformers",
    "datasets",
    "scikit-learn",
    "numpy",
    "pandas",
    "matplotlib",
    "seaborn",
    "bayesian-optimization",
    "psutil",
    "scipy"
]

[tool.black]
line-length = 100
target-version = ['py39']

[tool.isort]
profile = "black"
line_length = 100

[tool.flake8]
max-line-length = 100
ignore = ["E203", "W503"]
