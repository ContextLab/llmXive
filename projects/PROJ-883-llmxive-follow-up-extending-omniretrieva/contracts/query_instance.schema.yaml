$schema: "http://json-schema.org/draft-07/schema#"
title: QueryInstance
description: >
  Schema for a synthetic query instance generated for the retrieval experiment.
  Includes metadata, the query payload, and the ground-truth execution plan.
type: object
required:
  - query_id
  - source_type
  - complexity_level
  - payload
  - ground_truth_plan
  - generated_at
properties:
  query_id:
    type: string
    description: Unique identifier for the query instance (e.g., UUID or hash).
  source_type:
    type: string
    enum:
      - text
      - relational
      - graph
    description: The data source type this query targets.
  complexity_level:
    type: integer
    minimum: 1
    description: >
      Exact integer plan depth (1, 2, 3, 4+). 
      Must NOT be binary-classified. Used for ANOVA and sensitivity analysis.
  payload:
    type: object
    description: >
      The actual query content. Structure depends on source_type.
      - text: { "keywords": [...], "filters": {...} }
      - relational: { "sql": "SELECT ...", "params": {...} }
      - graph: { "traversal": "...", "constraints": {...} }
    additionalProperties: true
  ground_truth_plan:
    type: array
    description: >
      List of steps representing the optimal execution plan generated by
      the ReferenceEngine (FR-008).
    items:
      type: object
      required:
        - step_id
        - operation
        - cost_estimate
      properties:
        step_id:
          type: integer
        operation:
          type: string
          description: e.g., "scan", "join", "filter", "aggregate"
        cost_estimate:
          type: number
          description: Estimated cost unit (e.g., IO pages, CPU cycles).
        details:
          type: object
          additionalProperties: true
          description: Optional step-specific details.
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of generation.
  metadata:
    type: object
    description: Optional extra metadata (seed, generator version).
    additionalProperties: true
