$schema: "http://json-schema.org/draft-07/schema#"
title: ExecutionMetric
description: >
  Schema for a single execution metric record resulting from running a
  query against a specific executor under CPU constraints.
type: object
required:
  - execution_id
  - query_id
  - source_type
  - complexity_level
  - latency_ms
  - success
  - timestamp
properties:
  execution_id:
    type: string
    description: Unique identifier for this specific execution run.
  query_id:
    type: string
    description: Reference to the query instance executed.
  source_type:
    type: string
    enum:
      - text
      - relational
      - graph
    description: The data source type.
  complexity_level:
    type: integer
    minimum: 1
    description: The exact integer complexity level of the query.
  latency_ms:
    type: number
    minimum: 0
    description: End-to-end latency in milliseconds.
  success:
    type: boolean
    description: True if execution completed without timeout or error.
  error_message:
    type: string
    nullable: true
    description: Error details if success is false.
  timeout_triggered:
    type: boolean
    description: True if the execution was terminated due to CPU time limit.
  translation_error:
    type: integer
    enum:
      - 0
      - 1
    nullable: true
    description: >
      Binary flag: 1 if the executed plan mismatched the ground_truth_plan,
      0 if matched. Null if not yet computed.
  cpu_time_ms:
    type: number
    nullable: true
    description: Actual CPU time consumed (if measurable).
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of execution completion.
  executor_version:
    type: string
    description: Version string of the executor used.
  environment_info:
    type: object
    description: Optional environment details (OS, Python version, CPU cores).
    additionalProperties: true
