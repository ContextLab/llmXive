$schema: "http://json-schema.org/draft-07/schema#"
title: QueryInstance
description: Schema for a synthetic query instance with ground truth.
type: object
required:
  - id
  - query_type
  - query_text
  - complexity_level
  - ground_truth_plan
properties:
  id:
    type: string
    description: Unique identifier for the query.
  query_type:
    type: string
    enum: [text, relational, graph]
    description: Type of the query.
  query_text:
    type: string
    description: The text representation of the query.
  complexity_level:
    type: integer
    minimum: 1
    description: Exact integer plan depth.
  ground_truth_plan:
    type: object
    description: The reference execution plan generated by ReferenceEngine.
    properties:
      query_type:
        type: string
      complexity_level:
        type: integer
      steps:
        type: array
        items:
          type: object
      estimated_cost:
        type: number
