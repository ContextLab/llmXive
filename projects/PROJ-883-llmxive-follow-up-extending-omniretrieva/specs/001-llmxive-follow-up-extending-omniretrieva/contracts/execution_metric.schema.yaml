$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Metric Schema"
description: "Schema for the outcome of a single query execution attempt."
type: "object"
properties:
  query_id:
    type: "string"
    description: "Foreign key referencing the query instance."
  latency_ms:
    type: "number"
    minimum: 0
    description: "End-to-end execution time in milliseconds."
  mismatch_flag:
    type: "boolean"
    description: "True if the SUT selected a mismatched source."
  delta_latency:
    type: "number"
    description: "Latency penalty due to mismatch."
  translation_error:
    type: "boolean"
    description: "True if the generated plan deviates from the ground truth."
  timeout_flag:
    type: "boolean"
    description: "True if the execution exceeded the enforced timeout limit."
  engine_version:
    type: "string"
    description: "Version string of the simulated engine used."
  throttle_config:
    type: "string"
    description: "Description of the CPU throttling configuration applied."
required:
  - query_id
  - latency_ms
  - mismatch_flag
  - delta_latency
  - translation_error
  - timeout_flag
  - engine_version
  - throttle_config
additionalProperties: false