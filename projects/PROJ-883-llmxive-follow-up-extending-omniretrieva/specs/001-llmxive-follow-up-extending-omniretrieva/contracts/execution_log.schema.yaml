$schema: http://json-schema.org/draft-07/schema#
title: Execution Log Schema
description: Schema for the raw execution logs generated by engine_adapter.py, including mismatch flags.
type: object
properties:
  query_id:
    type: string
    description: "Unique identifier for the query instance (UUID)."
  source_type:
    type: string
    enum:
      - text
      - relational
      - graph
    description: "The type of heterogeneous source queried."
  complexity_level:
    type: integer
    minimum: 1
    description: "The plan depth (number of hops/joins) of the query."
  complexity_category:
    type: string
    enum:
      - low
      - high
    description: "Categorical classification: low (depth <= 2) or high (depth >= 3)."
  latency_ms:
    type: number
    minimum: 0
    description: "End-to-end execution time in milliseconds."
  mismatch_flag:
    type: boolean
    description: "True if the SUT selected a source type different from the optimal source."
  delta_latency:
    type: number
    description: "The latency penalty (Latency_Mismatched - Latency_Optimal) if mismatch_flag is true."
  translation_error:
    type: boolean
    description: "True if the generated plan mismatched the ground truth plan."
  timeout_flag:
    type: boolean
    description: "True if the query exceeded the enforced time limit."
  throttle_applied:
    type: boolean
    description: "True if CPU throttling was active during execution."
required:
  - query_id
  - source_type
  - complexity_level
  - complexity_category
  - latency_ms
  - mismatch_flag
  - delta_latency
  - translation_error
  - timeout_flag
  - throttle_applied
additionalProperties: false