$schema: http://json-schema.org/draft-07/schema#
title: QueryInstance
description: >-
  Represents a single synthetic retrieval request with controlled logical depth.
  Used as the primary input for the execution engine.
  Enforces a maximum of 500 queries via generator logic.
type: object
properties:
  query_id:
    type: string
    description: "Unique UUID for the query instance."
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
  logical_plan:
    type: array
    description: "Ordered list of operations (e.g., lookup, join, traverse)."
    items:
      type: string
      enum:
        - lookup
        - join
        - traverse
        - filter
        - aggregate
  source_type:
    type: string
    description: "The target source type for the query."
    enum:
      - text
      - relational
      - graph
  complexity_level:
    type: integer
    description: "Plan depth (number of hops/steps)."
    minimum: 1
  ground_truth_plan:
    type: array
    description: "Deterministic optimal plan for this query (from independent exhaustive solver)."
    items:
      type: string
  complexity_group:
    type: string
    description: "Classification based on depth."
    enum:
      - low
      - high
  max_queries_constraint:
    type: integer
    const: 500
    description: "Hard limit on the total number of queries generated (enforced by generator loop)."
required:
  - query_id
  - logical_plan
  - source_type
  - complexity_level
  - ground_truth_plan
  - complexity_group
  - max_queries_constraint
additionalProperties: false
