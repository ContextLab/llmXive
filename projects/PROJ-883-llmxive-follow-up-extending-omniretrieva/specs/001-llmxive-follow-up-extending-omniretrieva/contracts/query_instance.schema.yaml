$schema: "http://json-schema.org/draft-07/schema#"
title: "Query Instance Schema"
description: "Schema for a single synthetic query instance generated for the structural mismatch cost experiment."
type: "object"
properties:
  query_id:
    type: "string"
    description: "Unique identifier for the query instance (UUID)."
  logical_plan:
    type: "object"
    description: "JSON representation of the query logic structure."
    additionalProperties: true
  source_type:
    type: "string"
    enum:
      - "text"
      - "relational"
      - "graph"
    description: "The heterogeneous source type being queried."
  complexity_level:
    type: "integer"
    minimum: 1
    description: "The plan depth (number of hops/joins) of the query."
  ground_truth_plan:
    type: "object"
    description: "The ideal execution plan generated by the CBO (full lookahead)."
    additionalProperties: true
  sut_plan:
    type: "object"
    description: "The plan generated by the SUT (limited lookahead heuristic)."
    additionalProperties: true
  complexity_group:
    type: "string"
    enum:
      - "low"
      - "high"
    description: "Categorical grouping based on complexity_level (low: <=2, high: >=3)."
required:
  - query_id
  - logical_plan
  - source_type
  - complexity_level
  - ground_truth_plan
  - sut_plan
  - complexity_group
additionalProperties: false