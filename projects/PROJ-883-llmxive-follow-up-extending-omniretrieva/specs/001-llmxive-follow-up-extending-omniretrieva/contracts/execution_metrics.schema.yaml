$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Metrics Schema"
description: "Schema for validating the raw execution metrics generated by the experiment."
type: "object"
properties:
  query_id:
    type: "string"
    description: "Unique identifier for the query instance."
  source_type:
    type: "string"
    enum:
      - "text"
      - "relational"
      - "graph"
    description: "The type of heterogeneous source used."
  complexity_level:
    type: "integer"
    minimum: 1
    description: "Logical depth of the query plan (1-4+)."
  latency_ms:
    type: "number"
    minimum: 0
    description: "End-to-end latency in milliseconds (real measurement + complexity-proportional delay)."
  translation_error:
    type: "boolean"
    description: "True if the generated plan mismatches the ground truth."
  timeout_flag:
    type: "boolean"
    description: "True if the query exceeded the 60-second safety limit."
  cpu_throttled:
    type: "boolean"
    const: true
    description: "Indicates that CPU throttling was enforced."
  cpu_burner_ms:
    type: "number"
    minimum: 0
    description: "Time spent in the deterministic CPU-burner loop (baseline + complexity scaling)."
required:
  - "query_id"
  - "source_type"
  - "complexity_level"
  - "latency_ms"
  - "translation_error"
  - "timeout_flag"
  - "cpu_throttled"
  - "cpu_burner_ms"
additionalProperties: false
