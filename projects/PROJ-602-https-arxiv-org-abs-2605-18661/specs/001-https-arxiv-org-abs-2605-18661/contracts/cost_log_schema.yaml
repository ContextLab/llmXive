$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of the API call"
  service:
    type: string
    description: "Name of the API service (e.g., 'OpenAI', 'Mock')"
  tokens_used:
    type: integer
    minimum: 0
    description: "Number of tokens consumed"
  cost_usd:
    type: number
    minimum: 0.0
    description: "Cost in USD for this call"
required:
  - timestamp
  - service
  - cost_usd
additionalProperties: false
description: "Schema for a single API usage log entry"