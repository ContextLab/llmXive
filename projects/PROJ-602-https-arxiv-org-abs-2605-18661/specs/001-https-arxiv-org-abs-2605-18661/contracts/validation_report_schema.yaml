$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  run_id:
    type: string
    format: uuid
    description: "Unique identifier for the reproduction run"
  artifact_count:
    type: integer
    minimum: 0
    description: "Total number of valid artifacts generated"
  total_cost_usd:
    type: ["number", "null"]
    description: "Total estimated cost in USD, or null if not calculable"
  fabrication_detected:
    type: boolean
    description: "True if any artifact was flagged as potentially fake (score > 0.8)"
  methodological_deviations:
    type: array
    items:
      type: string
    description: "List of deviations from the original paper's methodology (e.g., CPU vs GPU)"
  claim_status:
    type: object
    description: "Status of the paper's specific claims"
    properties:
      cost_claim:
        type: string
        enum:
          - VERIFIED
          - UNVERIFIABLE
          - FAILED
        description: "Status of the '$15 cost' claim"
      novelty_claim:
        type: string
        enum:
          - VERIFIED
          - UNVERIFIABLE
          - FAILED
        description: "Status of the 'novelty' claim"
  conclusion:
    type: string
    enum:
      - PASS
      - FAIL
      - PARTIAL
    description: "Overall conclusion of the reproduction"
required:
  - run_id
  - artifact_count
  - fabrication_detected
  - methodological_deviations
  - claim_status
  - conclusion
additionalProperties: false
description: "Schema for the final REPRODUCTION_REPORT.md"