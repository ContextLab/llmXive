$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  file_path:
    type: string
    description: "Relative path to the artifact from the output directory"
  file_type:
    type: string
    enum:
      - TEXT
      - IMAGE
      - DATA
      - LOG
  size_bytes:
    type: integer
    minimum: 0
    description: "File size in bytes"
  is_valid:
    type: boolean
    description: "True if the file passed format and content checks"
  fabrication_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Heuristic + Semantic score for likelihood of fake/empty content (1.0 = likely fake)"
required:
  - file_path
  - file_type
  - size_bytes
  - is_valid
additionalProperties: false
description: "Schema for a single generated artifact in the reproduction pipeline"