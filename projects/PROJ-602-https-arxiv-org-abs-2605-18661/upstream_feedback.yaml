    severity: writing
  - id: f29d449beaa9
    text: Add a License column to all appendix tables (e.g., tab:appendix_s1) to specify
      usage rights for tools and datasets.
    severity: writing
  - id: ded46566c806
    text: Replace mutable GitHub URLs with archived versions (Zenodo/DOI) or link
      to a stable project index to prevent link rot.
    severity: writing
  - id: 5d2e597c6bb7
    text: Specify dataset/tool versions (e.g., v1.0, commit hash) for all benchmarks
      to enable reproducibility.
    severity: writing
  - id: 5a07f1aa9d36
    text: Referenced figures (e.g., writing_quality_landscape.pdf, review_bias.pdf)
