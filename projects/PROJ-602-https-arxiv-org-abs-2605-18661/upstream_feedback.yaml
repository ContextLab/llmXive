      Either include the assets or remove the references to avoid broken compilation
      and unsupported visual claims.
    severity: writing
  - id: 207641bd0ad2
    text: Stage icons (s1_ideation.png, etc.) are rendered at 0.12\columnwidth in
      \stagecard. This is approximately 1.5cm wide, risking illegibility at print
      scale. Increase width to 0.2\columnwidth or use vector graphics.
    severity: writing
  - id: 09caa5834298
    text: No alt text attributes are provided for \includegraphics commands. Add alt
      text or use the accessibility package to ensure compliance with accessibility
      standards for screen readers.
    severity: writing
  - id: 8988aacccd86
    text: Add explicit dual-use risk assessment for chemistry/biology systems (MOOSE-Chem,
      BioPlanner, CRISPR-GPT). Current discussion in Sec 5.4.6 mentions cross-domain
      risks but lacks concrete safety protocols or biosecurity guardrails for autonomous
      experimentation in sensitive domains.
    severity: science
  - id: add8ea9ea223
    text: Clarify accountability framework for AI-generated research claims. Section
      5.5.5 discusses governance but does not specify who bears responsibility (authors,
      institutions, tool developers) when AI-generated experiments produce erroneous
      or harmful results.
    severity: writing
  - id: 640623b73c11
    text: Add data privacy and consent considerations for research involving human
      subjects or sensitive data. The paper does not address IRB/IACUC requirements
      or data protection when AI systems process research participant information.
    severity: writing
  - id: 883d5824713c
    text: Strengthen discussion of AI-assisted peer review manipulation risks (Sec
      5.3.1). While prompt injection is noted, the paper should explicitly recommend
      disclosure requirements and audit mechanisms for venues using AI in review workflows.
    severity: science
  - id: 646eb4a414c7
    text: "Many quantitative claims lack sample size disclosure (e.g., \u0394=-1.98\
      \ vs -0.63 for idea execution gap [si2025gap], 95.8% misclassification rate\
      \ [llmreviewer2025]). Report N, confidence intervals, or effect sizes where\
      \ available to enable robustness assessment."
    severity: science
  - id: a6bd4cad9619
    text: Survey aggregates findings across heterogeneous benchmarks (SWE-bench, IdeaBench,
      etc.) without discussing benchmark contamination risks or temporal validity.
      Add critical evaluation of whether cited benchmarks have known contamination
      or outdated test sets.
    severity: science
  - id: f028a6f5097a
    text: Alternative explanations for key patterns are underexplored (e.g., AI review
      leniency could reflect selection bias in what papers get reviewed, not just
      LLM weakness). Include discussion of plausible confounding factors for major
      claims.
    severity: science
  - id: 99dc5edab1b5
    text: "Replication concerns not addressed\u2014several cited works (AI Scientist,\
      \ FARS) report single-run outcomes without variance estimates. Flag systems\
