$schema: "http://json-schema.org/draft-07/schema#"
title: "TASTE Domain Config Schema"
description: "Schema for the tool specification of a domain."
type: "object"
required:
  - "name"
  - "tools"
properties:
  name:
    type: "string"
    description: "Name of the domain (e.g., 'airline')."
  tools:
    type: "array"
    description: "List of available tools in this domain."
    items:
      type: "object"
      required:
        - "name"
        - "description"
        - "parameters"
      properties:
        name:
          type: "string"
          description: "Unique tool name."
        description:
          type: "string"
          description: "Human-readable description of the tool."
        parameters:
          type: "object"
          description: "Parameter definitions for the tool."
          additionalProperties:
            type: "object"
            required:
              - "type"
            properties:
              type:
                type: "string"
                description: "Data type (e.g., 'string', 'integer')."
              required:
                type: "boolean"
                default: false
              description:
                type: "string"
  constraints:
    type: "array"
    description: "Domain-specific constraints (e.g., max steps)."
    items:
      type: "string"
  validator_module:
    type: "string"
    description: "Path to the Python module containing the validator logic."
additionalProperties: false
