$schema: "http://json-schema.org/draft-07/schema#"
title: "TASTE Task Schema"
description: "Schema for a single synthesized task in the TASTE pipeline."
type: "object"
required:
  - "id"
  - "scenario"
  - "action_sequence"
  - "validation_status"
  - "domain"
properties:
  id:
    type: "string"
    description: "Unique identifier for the task (UUID)."
  scenario:
    type: "string"
    description: "Natural language description of the user goal."
    minLength: 10
  action_sequence:
    type: "array"
    description: "Ordered list of tool invocations solving the scenario."
    items:
      type: "object"
      required:
        - "name"
        - "parameters"
      properties:
        name:
          type: "string"
          description: "Name of the tool being invoked."
        parameters:
          type: "object"
          description: "Arguments passed to the tool."
          additionalProperties: true
  validation_status:
    type: "string"
    enum:
      - "valid"
      - "invalid"
      - "pending"
    description: "Status of the domain validator check."
  validation_reason:
    type: "string"
    description: "Reason for validation failure, if applicable."
  domain:
    type: "string"
    description: "Domain name (e.g., 'airline')."
    enum:
      - "airline"
      - "retail"
      - "telecom"
  difficulty_score:
    type: "number"
    description: "Optional score from the mock agent evaluation."
    minimum: 0
    maximum: 1
additionalProperties: false
