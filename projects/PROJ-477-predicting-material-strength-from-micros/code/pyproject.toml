[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "material-strength-cnn"
version = "0.1.0"
description = "Predicting Material Strength from Microstructure Images"
requires-python = ">=3.9"
dependencies = [
    "torch",
    "torchvision",
    "scikit-learn",
    "pandas",
    "numpy",
    "matplotlib",
    "opencv-python-headless",
    "huggingface-hub",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.black]
line-length = 88
target-version = ['py39']

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]