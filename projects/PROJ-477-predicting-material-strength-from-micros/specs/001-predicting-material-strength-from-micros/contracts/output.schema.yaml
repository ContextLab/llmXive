$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Output Schema"
description: "Schema for the metrics and results generated by the evaluation pipeline."
type: "object"
properties:
  model_info:
    type: "object"
    properties:
      architecture:
        type: "string"
        description: "Name of the model architecture (e.g., MobileNetV2)."
      checkpoint_path:
        type: "string"
        description: "Relative path to the saved checkpoint."
      seed:
        type: "integer"
        description: "Random seed used for reproducibility."
    required:
      - architecture
      - checkpoint_path
      - seed
  performance_metrics:
    type: "object"
    properties:
      cnn:
        type: "object"
        properties:
          mse:
            type: "number"
            description: "Mean Squared Error."
          r_squared:
            type: "number"
            description: "Coefficient of Determination (R²)."
          rmse:
            type: "number"
            description: "Root Mean Squared Error."
        required:
          - mse
          - r_squared
          - rmse
      baseline:
        type: "object"
        properties:
          mse:
            type: "number"
            description: "MSE of the naive mean predictor."
          r_squared:
            type: "number"
            description: "R² of the naive mean predictor (should be 0.0 or close)."
        required:
          - mse
          - r_squared
    required:
      - cnn
      - baseline
  statistical_test:
    type: "object"
    properties:
      test_type:
        type: "string"
        const: "paired t-test"
      alpha:
        type: "number"
        const: 0.05
      p_value:
        type: "number"
        description: "P-value from the paired t-test on squared errors."
      significant:
        type: "boolean"
        description: "True if p_value < alpha."
      conclusion:
        type: "string"
        description: "Text summary of the result."
    required:
      - test_type
      - alpha
      - p_value
      - significant
      - conclusion
  interpretability:
    type: "object"
    properties:
      method:
        type: "string"
        const: "Grad-CAM"
      sample_heatmaps:
        type: "array"
        items:
          type: "string"
          description: "Paths to generated heatmap images."
      validation_metric:
        type: "object"
        properties:
          type:
            type: "string"
            const: "grain_size_correlation"
          correlation_coefficient:
            type: "number"
            description: "Pearson correlation between activation and grain size."
          p_value:
            type: "number"
            description: "P-value for the correlation."
        required:
          - type
          - correlation_coefficient
          - p_value
    required:
      - method
      - sample_heatmaps
      - validation_metric
  sensitivity_analysis:
    type: "object"
    properties:
      threshold_source:
        type: "string"
        const: "ground_truth_median"
      threshold_sweep:
        type: "array"
        items:
          type: "number"
        description: "List of relative thresholds tested."
      results:
        type: "array"
        items:
          type: "object"
          properties:
            threshold:
              type: "number"
            fpr:
              type: "number"
              description: "False Positive Rate."
            fnr:
              type: "number"
              description: "False Negative Rate."
          required:
            - threshold
            - fpr
            - fnr
    required:
      - threshold_source
      - threshold_sweep
      - results
required:
  - model_info
  - performance_metrics
  - statistical_test
  - interpretability
  - sensitivity_analysis
additionalProperties: false