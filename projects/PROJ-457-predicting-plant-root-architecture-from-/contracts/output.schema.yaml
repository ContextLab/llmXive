$schema: "http://json-schema.org/draft-07/schema#"
title: Final Research Report Schema
description: >
  Schema for the final research report artifact generated by User Story 3.
  Validates structure, metrics, tables, and spec deviations.
type: object
required:
  - report_metadata
  - executive_summary
  - methodology
  - model_results
  - biological_plausibility
  - spec_deviations
  - success_criteria_metrics
  - appendices
properties:
  report_metadata:
    type: object
    required:
      - generated_at
      - project_id
      - version
    properties:
      generated_at:
        type: string
        format: date-time
      project_id:
        type: string
      version:
        type: string
      authors:
        type: array
        items:
          type: string

  executive_summary:
    type: object
    required:
      - main_finding
      - associational_statement
    properties:
      main_finding:
        type: string
      associational_statement:
        type: string
        pattern: "associational"

  methodology:
    type: object
    required:
      - data_sources
      - preprocessing_steps
      - modeling_approach
    properties:
      data_sources:
        type: array
        items:
          type: string
      preprocessing_steps:
        type: array
        items:
          type: string
      modeling_approach:
        type: string

  model_results:
    type: object
    required:
      - lmm_metrics
      - random_forest_metrics
      - comparison
    properties:
      lmm_metrics:
        type: object
        required:
          - adjusted_r_squared
          - rmse
          - p_values
        properties:
          adjusted_r_squared:
            type: number
          rmse:
            type: number
          p_values:
            type: object
            additionalProperties:
              type: number
      random_forest_metrics:
        type: object
        required:
          - r_squared
          - rmse
        properties:
          r_squared:
            type: number
          rmse:
            type: number
      comparison:
        type: object
        required:
          - r_squared_delta
        properties:
          r_squared_delta:
            type: number
            description: LMM R² - RF R²

  biological_plausibility:
    type: object
    required:
      - sensitivity_analysis
      - literature_comparison_table
    properties:
      sensitivity_analysis:
        type: object
        properties:
          percent_deviation:
            type: number
          literature_mean:
            type: number
          observed_coefficient:
            type: number
          confidence_interval:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
          literature_overlap:
            type: boolean
      literature_comparison_table:
        type: array
        items:
          type: object
          required:
            - coefficient_name
            - observed_value
            - literature_range
            - within_range
          properties:
            coefficient_name:
              type: string
            observed_value:
              type: number
            literature_range:
              type: object
              required:
                - min
                - max
              properties:
                min:
                  type: number
                max:
                  type: number
            within_range:
              type: boolean

  spec_deviations:
    type: array
    description: List of specification deviations recorded during execution
    items:
      type: object
      required:
        - fr_id
        - deviation
        - impact
      properties:
        fr_id:
          type: string
        deviation:
          type: string
        impact:
          type: string

  success_criteria_metrics:
    type: object
    required:
      - pn_availability_rate
      - species_exclusion_ratio
    properties:
      pn_availability_rate:
        type: number
        description: Redefined SC-001 metric due to ISRIC exclusion
      species_exclusion_ratio:
        type: number
        description: Ratio of excluded species (n < 20) to total input species
      original_sc001_metric:
        type: string
        description: Note on original metric that was unavailable

  appendices:
    type: object
    required:
      - plots
      - raw_data_summary
    properties:
      plots:
        type: array
        items:
          type: string
          description: Relative path to generated PNG files
      raw_data_summary:
        type: object
        properties:
          total_rows_initial:
            type: integer
          total_rows_final:
            type: integer
          total_species_initial:
            type: integer
          total_species_final:
            type: integer
