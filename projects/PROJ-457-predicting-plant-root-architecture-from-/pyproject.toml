[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predict-root-architecture"
version = "0.1.0"
description = "Predicting Plant Root Architecture from Soil Nutrient Availability"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "scikit-learn",
    "statsmodels",
    "seaborn",
    "matplotlib",
    "pyyaml",
    "geopandas",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code"]
known_third_party = ["pandas", "sklearn", "statsmodels", "seaborn", "matplotlib", "yaml", "geopandas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"