# Project Configuration for Predicting Plant Root Architecture
# This file overrides defaults in code/config.py

# Paths relative to project root
DATA_PATH: "data"
OUTPUT_PATH: "artifacts"
FIGURES_PATH: "artifacts/plots"
REPORTS_PATH: "artifacts/reports"
MODELS_PATH: "artifacts/models"
LOG_PATH: "logs"

# Random seed for reproducibility
SEED: 42

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_LEVEL: "INFO"

# Thresholds and Constants
MIN_ROWS_PER_SPECIES: 20

# Literature ranges for sensitivity analysis (FR-011)
# These are approximate physiological bounds for nutrient coefficients
LITERATURE_RANGES:
  phosphorus:
    min: -0.5
    max: 0.5
    mean: 0.0
  nitrogen:
    min: -0.4
    max: 0.4
    mean: 0.0

# Data source types to exclude (manipulated/controlled conditions)
MANIPULATED_SOURCE_TYPES:
  - "manipulated"
  - "controlled"
  - "nutrient_manipulation"
  - "treatment"
  - "fertilizer_treatment"
  - "added_nutrients"
