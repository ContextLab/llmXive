[project]
name = "llmxive-extended-abot-earth"
version = "0.1.0"
description = "Extended ABot-Earth 0.5: Generative 3D Earth Model"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "onnxruntime",
    "scikit-learn",
    "opencv-python",
    "pandas",
    "numpy",
    "pyyaml",
    "tqdm",
    "matplotlib",
    "seaborn",
    "bayesian_changepoint_detection",
    "statsmodels",
    "open3d",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\\.pyi?$'
exclude = '''
/(
    \\.eggs
  | \\.git
  | \\.hg
  | \\.mypy_cache
  | \\.tox
  | \\.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''