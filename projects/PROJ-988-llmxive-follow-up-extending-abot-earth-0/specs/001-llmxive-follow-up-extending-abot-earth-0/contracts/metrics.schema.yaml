$schema: "http://json-schema.org/draft-07/schema#"
title: "FidelityMetrics Schema"
description: "Schema for the output metrics comparing reconstructed scenes against ground truth LiDAR."
type: object
properties:
  metric_id:
    type: string
    description: "Unique identifier for the metric record."
  reconstruction_id:
    type: string
    description: "Foreign key to the ReconstructedScene."
  scene_id:
    type: string
    description: "Foreign key to the original DegradedScene."
  method:
    type: string
    enum:
      - "baseline"
      - "inpainting"
    description: "Method used to generate the reconstruction."
  p_psnr:
    type: number
    description: "Projected PSNR value."
  p_ssim:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Projected SSIM value."
  chamfer_distance:
    type: number
    description: "Chamfer Distance in meters (normalized)."
  generation_time_sec:
    type: number
    description: "Wall-clock time taken for generation."
  peak_ram_mb:
    type: number
    description: "Peak RAM usage in megabytes during generation."
  status:
    type: string
    enum:
      - "success"
      - "oom"
      - "timeout"
    description: "Execution status of the generation process."
required:
  - metric_id
  - reconstruction_id
  - scene_id
  - method
  - p_psnr
  - p_ssim
  - chamfer_distance
  - generation_time_sec
  - peak_ram_mb
  - status
additionalProperties: false
