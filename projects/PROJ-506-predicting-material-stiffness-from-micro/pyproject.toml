[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-material-stiffness"
version = "0.1.0"
description = "Predicting Material Stiffness from Microstructure Images Using Convolutional Neural Networks"
requires-python = ">=3.10"
dependencies = [
    "torch==2.0.0+cpu",
    "scikit-image==0.21.0",
    "scipy==1.11.0",
    "numpy==1.24.0",
    "pandas==2.0.0",
    "pytest==7.3.0",
    "scikit-learn==1.2.0",
    "pyfftw==0.13.1",
]

[project.optional-dependencies]
dev = [
    "ruff==0.1.6",
    "black==23.12.1",
    "pytest-cov==4.1.0",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"
markers = [
    "unit: Unit tests",
    "contract: Contract tests",
    "integration: Integration tests",
    "slow: Mark tests that take a long time to run"
]
