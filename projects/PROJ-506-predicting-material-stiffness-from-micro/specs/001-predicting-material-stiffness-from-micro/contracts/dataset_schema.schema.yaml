$schema: "http://json-schema.org/draft-07/schema#"
title: "MicrostructureDatasetSchema"
description: "Schema for the synthetic microstructure dataset metadata and image properties."
type: object
properties:
  image_id:
    type: string
    description: "Unique identifier for the image, e.g., 'img_00001'."
  density:
    type: number
    description: "Volume fraction of inclusions (0.0 to 1.0)."
    minimum: 0.0
    maximum: 1.0
  topology_metric:
    type: number
    description: "Quantitative measure of spatial arrangement (e.g., clustering coefficient) used for stratification."
  seed:
    type: integer
    description: "Random seed used for generation."
  generation_timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of generation."
  stiffness_tensor:
    type: array
    description: "Effective elastic stiffness tensor components (flattened) from FFT solver."
    items:
      type: number
    minItems: 6
    maxItems: 6
  is_valid:
    type: boolean
    description: "True if the stiffness tensor is within Voigt-Reuss-Hill bounds (plausibility check)."
required:
  - image_id
  - density
  - topology_metric
  - seed
  - generation_timestamp
  - stiffness_tensor
  - is_valid
additionalProperties: false
