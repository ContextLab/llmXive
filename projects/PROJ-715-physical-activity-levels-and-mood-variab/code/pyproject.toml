[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "physical-activity-mood-variability"
version = "0.1.0"
description = "Analysis of physical activity levels and mood variability in daily life"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "statsmodels",
    "scikit-learn",
    "pyyaml",
    "requests",
    "numpy",
]

[project.optional-dependencies]
dev = [
    "flake8",
    "black",
    "pytest",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip_glob = ["data/*", "venv/*", ".venv/*"]
