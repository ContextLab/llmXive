$schema: http://json-schema.org/draft-07/schema#
title: Model Results Schema
description: >
  Schema for the statistical model results (Linear Mixed-Effects Models).
  Contains fixed effects, diagnostics, and sensitivity analysis summaries.
type: object
required:
  - models
  - metadata
properties:
  metadata:
    type: object
    required:
      - generated_at
      - pipeline_version
      - data_source
      - analysis_type
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the analysis was run
      pipeline_version:
        type: string
        description: Version of the analysis pipeline
      data_source:
        type: string
        description: Source of the data (e.g., OSF DOI)
      analysis_type:
        type: string
        const: "associational"
        description: Explicitly marks findings as associational, not causal
  models:
    type: array
    description: List of fitted model results
    items:
      type: object
      required:
        - model_name
        - outcome_variable
        - predictor_variable
        - fixed_effects
        - random_effects
        - convergence_status
        - diagnostics
      properties:
        model_name:
          type: string
          description: Unique identifier for the model (e.g., "steps_to_mood_std")
        outcome_variable:
          type: string
          description: Name of the dependent variable
        predictor_variable:
          type: string
          description: Name of the primary independent variable (total_steps)
        fixed_effects:
          type: object
          description: Fixed effect coefficients and statistics
          required:
            - total_steps
          properties:
            total_steps:
              type: object
              required:
                - estimate
                - std_error
                - p_value
                - ci_lower
                - ci_upper
              properties:
                estimate:
                  type: number
                  description: Coefficient estimate
                std_error:
                  type: number
                  description: Standard error of the estimate
                p_value:
                  type: number
                  description: P-value for the coefficient
                ci_lower:
                  type: number
                  description: Lower bound of 95% confidence interval
                ci_upper:
                  type: number
                  description: Upper bound of 95% confidence interval
            # Covariates are dynamic keys, but structure is same
        random_effects:
          type: object
          description: Random effects structure (e.g., intercepts)
          properties:
            participant:
              type: object
              properties:
                variance:
                  type: number
                  description: Variance of the random intercept
                std_dev:
                  type: number
                  description: Standard deviation of the random intercept
        convergence_status:
          type: string
          enum:
            - success
            - warning
            - failure
          description: Status of the model optimization
        diagnostics:
          type: object
          description: Model diagnostic test results
          properties:
            shapiro_wilk:
              type: object
              properties:
                statistic:
                  type: number
                p_value:
                  type: number
                passed:
                  type: boolean
            breusch_pagan:
              type: object
              properties:
                statistic:
                  type: number
                p_value:
                  type: number
                passed:
                  type: boolean
  sensitivity_analysis:
    type: object
    description: Results from sensitivity checks (LOPO, weekdays, etc.)
    properties:
      lopo:
        type: object
        description: Leave-One-Participant-Out cross-validation results
        properties:
          coefficient_sign_stability:
            type: number
            description: Percentage of folds where sign matches full model (0-100)
          passes_threshold:
            type: boolean
            description: True if stability >= 90%
      weekdays_only:
        type: object
        description: Model fit on weekdays only
        properties:
          coefficient:
            type: number
          p_value:
            type: number
          direction_matches:
            type: boolean
      single_rating_handling:
        type: object
        description: Bootstrap consistency for single-rating handling
        properties:
          bootstrap_consistency_rate:
            type: number
            description: Percentage of iterations where direction matches (0-100)
          passes_threshold:
            type: boolean
            description: True if consistency >= 80%
additionalProperties: false