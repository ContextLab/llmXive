$schema: http://json-schema.org/draft-07/schema#
title: Evaluation Metrics Artifact
description: Schema for the raw metrics generated by the evaluation pipeline (FR-003, SC-002).
type: object
properties:
  system_name:
    type: string
    description: "Name of the memory system (e.g., VectorStore-MiniLM)"
  module:
    type: string
    enum: ["Representation", "Extraction", "Retrieval", "Maintenance"]
    description: "The specific module being evaluated"
  dataset_subset:
    type: string
    description: "Identifier of the dataset subset used (e.g., MixSub-10%)"
  metric_name:
    type: string
    enum: ["Precision@5", "Precision@10", "Recall@5", "UpdateSuccessRate", "RetrievalCostUnits", "MaintenanceCostUnits"]
    description: "The specific metric being recorded"
  value:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "The numerical value of the metric. Must be between 0.0 and 1.0."
  retrieval_cost_units:
    type: number
    minimum: 0.0
    description: "Approximate computational cost for retrieval (e.g., embedding calls)"
  maintenance_cost_units:
    type: number
    minimum: 0.0
    description: "Approximate computational cost for maintenance (e.g., write operations)"
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of the evaluation run"
  downsampled:
    type: boolean
    description: "True if the memory guard triggered downsampling during this run"
  update_protocol_applied:
    type: boolean
    description: "True if the Maintenance module was tested using the Synthetic Update Protocol"
required:
  - system_name
  - module
  - dataset_subset
  - metric_name
  - value
  - timestamp
  - downsampled
  - update_protocol_applied
additionalProperties: false