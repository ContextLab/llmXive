$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the raw and processed dataset containing RSES, INCOM, and VR condition data. Note: Pre/Post scores are used in ANCOVA."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant."
  pre_self_esteem:
    type: "number"
    description: "Rosenberg Self-Esteem Scale score before exposure. Used as covariate."
  post_self_esteem:
    type: "number"
    description: "Rosenberg Self-Esteem Scale score after exposure. Used as outcome."
  avatar_condition:
    type: "number"
    description: "Exposure condition (0/1 for binary, or continuous intensity)."
  comparison_tendency:
    type: "number"
    description: "Iowa-Netherlands Comparison Orientation Measure (INCOM) score."
  excluded:
    type: "boolean"
    description: "True if the row was excluded due to >20% missingness."
required:
  - participant_id
  - pre_self_esteem
  - post_self_esteem
  - avatar_condition
  - comparison_tendency
additionalProperties: false