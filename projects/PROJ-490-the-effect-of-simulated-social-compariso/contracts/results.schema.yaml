$schema: http://json-schema.org/draft-07/schema#
title: Final Results Schema
description: Schema for the final JSON report containing model diagnostics, bootstrap stability, and sensitivity analysis.
type: object
required:
  - data_path
  - data_source_type
  - model_summary
  - assumption_checks
  - bootstrap_stability
  - sensitivity_findings
properties:
  data_path:
    type: string
    description: Relative path to the data file used for this analysis.
  data_source_type:
    type: string
    enum:
      - real
      - synthetic
    description: Type of data used.
  model_summary:
    type: object
    description: Summary of the fitted ANCOVA model.
    properties:
      r_squared:
        type: number
      adj_r_squared:
        type: number
      f_statistic:
        type: number
      f_p_value:
        type: number
      coefficients:
        type: array
        items:
          $ref: '#/properties/model_summary/properties/coefficient'
  assumption_checks:
    type: object
    description: Results of model assumption validation.
    properties:
      normality:
        type: object
        properties:
          test_name:
            type: string
          statistic:
            type: number
          p_value:
            type: number
          passed:
            type: boolean
      homoscedasticity:
        type: object
        properties:
          test_name:
            type: string
          statistic:
            type: number
          p_value:
            type: number
          passed:
            type: boolean
      collinearity:
        type: object
        properties:
          vif_scores:
            type: object
            additionalProperties:
              type: number
          max_vif:
            type: number
          passed:
            type: boolean
  bootstrap_stability:
    type: object
    description: Bootstrap resampling results for interaction effect stability.
    properties:
      interaction_ci_width_variance:
        type: number
      iterations:
        type: integer
      stable:
        type: boolean
  sensitivity_findings:
    type: object
    description: Results from sensitivity analysis.
    properties:
      parameter_recovery_error:
        type: number
        description: Absolute difference between estimated and true parameters (for synthetic data).
      threshold_stability:
        type: array
        items:
          type: object
          properties:
            threshold:
              type: number
            stability_metric:
              type: number
      error_correction_applied:
        type: boolean
        description: Whether family-wise error correction (Bonferroni/Holm) was applied.
additionalProperties: false
