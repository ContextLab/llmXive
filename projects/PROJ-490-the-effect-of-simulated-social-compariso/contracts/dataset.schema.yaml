# Dataset Schema for Social Comparison Study
# Defines the required structure for input data (real or synthetic)

required_columns:
  - avatar_condition
  - pre_self_esteem
  - post_self_esteem
  - comparison_tendency

column_types:
  avatar_condition: integer
  pre_self_esteem: float
  post_self_esteem: float
  comparison_tendency: float

descriptions:
  avatar_condition: "Binary indicator of the avatar condition (0=control, 1=treatment)"
  pre_self_esteem: "RSES score before the virtual reality intervention"
  post_self_esteem: "RSES score after the virtual reality intervention"
  comparison_tendency: "INCOM score measuring tendency to engage in social comparison"

constraints:
  avatar_condition:
    allowed_values: [0, 1]
  pre_self_esteem:
    min: 0
    max: 40
  post_self_esteem:
    min: 0
    max: 40
  comparison_tendency:
    min: 1
    max: 5
