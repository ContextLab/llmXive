$schema: http://json-schema.org/draft-07/schema#
title: Analysis Output Schema
description: Schema for the primary regression output CSV containing coefficients and statistics.
type: object
required:
  - term
  - coefficient
  - std_error
  - p_value
  - ci_lower
  - ci_upper
properties:
  term:
    type: string
    description: Name of the regression term (e.g., 'Intercept', 'avatar_condition', 'pre_self_esteem').
  coefficient:
    type: number
    description: Estimated regression coefficient.
  std_error:
    type: number
    description: Standard error of the coefficient.
  p_value:
    type: number
    description: P-value for the hypothesis test that the coefficient is zero.
  ci_lower:
    type: number
    description: Lower bound of the 95% confidence interval.
  ci_upper:
    type: number
    description: Upper bound of the 95% confidence interval.
additionalProperties: false
