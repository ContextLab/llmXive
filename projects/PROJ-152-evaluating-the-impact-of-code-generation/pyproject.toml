[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-152"
version = "0.1.0"
description = "Evaluating the Impact of Code Generation Models on Code Security"
requires-python = ">=3.11"
dependencies = [
    "transformers",
    "torch",
    "bitsandbytes",
    "scikit-learn",
    "scipy",
    "statsmodels",
    "pandas",
    "matplotlib",
    "seaborn",
    "bandit",
    "semgrep",
    "codeql",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["code", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
