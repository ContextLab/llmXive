[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-PROJ-900"
version = "0.1.0"
description = "llmXive follow-up: extending ViQ Text-Aligned Visual Quantized Representations"
requires-python = ">=3.11"
dependencies = [
    "torch==2.1.0+cpu",
    "transformers==4.36.0",
    "datasets==2.14.0",
    "scikit-learn==1.3.0",
    "pillow==10.1.0",
    "opencv-python-headless==4.8.0",
]

[project.optional-dependencies]
dev = [
    "ruff==0.1.6",
    "black==23.11.0",
    "pytest==7.4.3",
    "pytest-cov==4.1.0",
]

[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'

[tool.ruff]
line-length = 120
target-version = "py311"
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = [
    "E501",
    "B008",
    "C901",
]
extend-exclude = ["data/", "results/", "__pycache__"]

[tool.ruff.isort]
known-first-party = ["code"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-v --tb=short"
