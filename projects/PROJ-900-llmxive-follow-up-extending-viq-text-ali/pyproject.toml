[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending ViQ Text-Aligned Visual Quantized Representations"
requires-python = ">=3.11"
dependencies = [
    "torch==2.1.0+cpu",
    "transformers==4.36.0",
    "datasets==2.14.0",
    "scikit-learn==1.3.0",
    "pillow==10.1.0",
    "opencv-python-headless==4.8.0",
    "tqdm==4.66.0",
    "scikit-image==0.22.0"
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
