[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-polymer-blends"
version = "0.1.0"
description = "Identifying Structure-Property Relations in Polymer Blends"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.2.3",
    "rdkit==2024.3.5",
    "scikit-learn==1.5.2",
    "xgboost==2.1.1",
    "shap==0.46.0",
    "pyyaml==6.0.2",
    "requests==2.32.3",
    "joblib==1.4.2",
    "psutil==6.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "black>=24.0.0",
    "flake8>=7.0.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]
