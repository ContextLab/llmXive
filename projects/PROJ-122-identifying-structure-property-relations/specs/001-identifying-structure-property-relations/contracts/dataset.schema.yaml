$schema: http://json-schema.org/draft-07/schema#
title: PolymerBlendDataset
type: object
properties:
  blend_id:
    type: string
    description: "Unique identifier for the blend"
  source:
    type: string
    description: "Source of the data (e.g., NIST, PolymerDB)"
  components:
    type: array
    items:
      type: object
      properties:
        smiles:
          type: string
          description: "SMILES string for the component"
        weight_fraction:
          type: number
          description: "Weight fraction of the component (0.0 to 1.0)"
      required:
        - smiles
        - weight_fraction
  Tg_K:
    type: number
    description: "Glass Transition Temperature in Kelvin"
    minimum: 0
  Modulus_GPa:
    type: number
    description: "Young's Modulus in Gigapascals"
    minimum: 0
  is_valid:
    type: boolean
    description: "True if all validation checks passed"
  has_target:
    type: boolean
    description: "True if Tg_measured and Tg_1, Tg_2 exist for residual calculation"
required:
  - blend_id
  - source
  - components
  - Tg_K
  - Modulus_GPa
  - is_valid
  - has_target
additionalProperties: false