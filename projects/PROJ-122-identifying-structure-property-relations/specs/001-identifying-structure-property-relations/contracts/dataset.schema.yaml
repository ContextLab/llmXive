$schema: "http://json-schema.org/draft-07/schema#"
title: "PolymerBlendDataset"
description: "Schema for the harmonized polymer blend dataset."
type: "object"
properties:
  records:
    type: "array"
    items:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Unique identifier for the blend entry."
        components:
          type: "array"
          description: "List of components in the blend."
          items:
            type: "object"
            properties:
              smiles:
                type: "string"
                description: "SMILES string of the component."
              weight_fraction:
                type: "number"
                minimum: 0.0
                maximum: 1.0
                description: "Weight fraction of the component."
            required:
              - smiles
              - weight_fraction
        tg_k:
          type: "number"
          description: "Glass Transition Temperature in Kelvin."
          minimum: 0.0
        youngs_modulus_gpa:
          type: "number"
          description: "Young's Modulus in GPa."
          minimum: 0.0
        source:
          type: "string"
          description: "Source dataset name."
        validation_status:
          type: "string"
          enum:
            - "valid"
            - "invalid_units"
            - "invalid_smiles"
            - "invalid_composition"
          description: "Validation status of the record."
      required:
        - id
        - components
        - tg_k
        - youngs_modulus_gpa
        - source
        - validation_status
required:
  - records
