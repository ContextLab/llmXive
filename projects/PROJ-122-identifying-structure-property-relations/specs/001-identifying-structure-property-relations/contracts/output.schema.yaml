$schema: http://json-schema.org/draft-07/schema#
title: Output Schema for Polymer Blend Structure-Property Analysis
description: |
  Defines the structure of all output artifacts generated by the pipeline,
  including processed datasets, model metrics, feature reports, and validation logs.
  This schema ensures consistency across all downstream analysis and reporting.
type: object
required:
  - metadata
  - artifacts
properties:
  metadata:
    type: object
    description: Metadata about the pipeline execution and schema version.
    required:
      - schema_version
      - generated_at
      - pipeline_version
      - project_id
    properties:
      schema_version:
        type: string
        const: "1.0.0"
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the output was generated.
      pipeline_version:
        type: string
        description: Version of the pipeline that generated this output.
      project_id:
        type: string
        const: "PROJ-122-identifying-structure-property-relations"
      source_files:
        type: array
        items:
          type: string
        description: List of input file paths used to generate this output.

  artifacts:
    type: object
    description: Container for all generated data artifacts.
    properties:
      processed_dataset:
        type: object
        description: The cleaned and harmonized dataset ready for feature engineering.
        required:
          - path
          - row_count
          - checksum
        properties:
          path:
            type: string
            pattern: "^data/processed/.*\\.csv$"
            description: Relative path to the processed CSV file.
          row_count:
            type: integer
            minimum: 0
          checksum:
            type: string
            pattern: "^[a-f0-9]{64}$"
            description: SHA-256 checksum of the file content.
          columns:
            type: array
            items:
              type: string
            description: List of column names in the dataset.

      feature_matrix:
        type: object
        description: The matrix of molecular descriptors and interaction features.
        required:
          - path
          - row_count
          - column_count
          - checksum
        properties:
          path:
            type: string
            pattern: "^data/features/.*\\.csv$"
          row_count:
            type: integer
            minimum: 0
          column_count:
            type: integer
            minimum: 0
          checksum:
            type: string
            pattern: "^[a-f0-9]{64}$"
          feature_names:
            type: array
            items:
              type: string
            description: List of feature names including target variable.

      model_metrics:
        type: object
        description: Performance metrics for all trained models.
        required:
          - models
        properties:
          models:
            type: array
            items:
              type: object
              required:
                - model_name
                - metrics
              properties:
                model_name:
                  type: string
                  description: Name of the model (e.g., 'RandomForest', 'XGBoost', 'LinearBaseline').
                metrics:
                  type: object
                  required:
                    - r2
                    - mae
                    - rmse
                  properties:
                    r2:
                      type: number
                    mae:
                      type: number
                    rmse:
                      type: number
                    cv_score:
                      type: number
                      description: Mean cross-validation score.
                    cv_std:
                      type: number
                comparison:
                  type: object
                  properties:
                    t_statistic:
                      type: number
                    p_value:
                      type: number
                    significant:
                      type: boolean
                    correction_method:
                      type: string

      vif_report:
        type: object
        description: Variance Inflation Factor diagnostics for feature multicollinearity.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^data/features/vif_report\\.json$"
          high_vif_features:
            type: array
            items:
              type: object
              properties:
                feature:
                  type: string
                vif_score:
                  type: number
                  minimum: 5.0

      stability_metrics:
        type: object
        description: Aggregated stability metrics from multiple training runs.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^data/features/stability_metrics\\.json$"
          stable_features:
            type: array
            items:
              type: string
            description: Features appearing in top-ranked list >= 80% of runs.

      data_quality_report:
        type: object
        description: Report on data quality issues found during ingestion.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^data/.*data_quality_report\\.json$"
          total_records:
            type: integer
          excluded_records:
            type: integer
          exclusion_reasons:
            type: object
            properties:
              invalid_smiles:
                type: integer
              invalid_composition:
                type: integer
              invalid_units:
                type: integer

      tolerance_sensitivity_report:
        type: object
        description: Report on weight-fraction tolerance sensitivity analysis.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^data/.*tolerance_sensitivity_report\\.json$"
          thresholds_tested:
            type: array
            items:
              type: number
          results:
            type: array
            items:
              type: object
              properties:
                threshold:
                  type: number
                valid_count:
                  type: integer
                pass_rate:
                  type: number

      baseline_metrics:
        type: object
        description: Baseline metrics for interaction feature comparison.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^data/features/baseline_metrics\\.json$"
          fox_prediction_error:
            type: number
          gordon_taylor_prediction_error:
            type: number

      raw_data_manifest:
        type: object
        description: Manifest of all raw data files with checksums.
        required:
          - path
        properties:
          path:
            type: string
            pattern: "^state/projects/.*\\.yaml$"
          files:
            type: array
            items:
              type: object
              properties:
                filename:
                  type: string
                checksum:
                  type: string
                source:
                  type: string
                timestamp:
                  type: string
                  format: date-time

      figures:
        type: array
        description: List of generated figures.
        items:
          type: object
          properties:
            filename:
              type: string
              pattern: "^figures/.*\\.(png|pdf|svg)$"
            title:
              type: string
            description:
              type: string

    required:
      - processed_dataset
      - feature_matrix
      - model_metrics

additionalProperties: false
