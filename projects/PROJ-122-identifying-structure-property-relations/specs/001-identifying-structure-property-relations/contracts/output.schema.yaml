$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelOutput"
description: "Schema for model training outputs and metrics."
type: "object"
properties:
  model_metrics:
    type: "object"
    properties:
      best_model_name:
        type: "string"
        description: "Name of the best performing model (e.g., 'RandomForest')."
      mae_tg:
        type: "number"
        description: "Mean Absolute Error for Tg on test set."
      mae_modulus:
        type: "number"
        description: "Mean Absolute Error for Modulus on test set."
      baseline_mae_tg:
        type: "number"
        description: "MAE of linear baseline for Tg."
      baseline_mae_modulus:
        type: "number"
        description: "MAE of linear baseline for Modulus."
      p_value_tg:
        type: "number"
        description: "P-value from permutation test or t-test for Tg."
      p_value_modulus:
        type: "number"
        description: "P-value from permutation test or t-test for Modulus."
      vif_sensitivity_delta_mae:
        type: "number"
        description: "Change in MAE after excluding highest VIF feature."
      vif_sensitivity_baseline_mae:
        type: "number"
        description: "Baseline MAE before VIF exclusion."
    required:
      - best_model_name
      - mae_tg
      - mae_modulus
      - baseline_mae_tg
      - baseline_mae_modulus
      - p_value_tg
      - p_value_modulus
      - vif_sensitivity_delta_mae
      - vif_sensitivity_baseline_mae
  feature_importance:
    type: "array"
    description: "Top 10 features by importance."
    items:
      type: "object"
      properties:
        feature_name:
          type: "string"
        importance_score:
          type: "number"
      required:
        - feature_name
        - importance_score
  stability_analysis:
    type: "object"
    properties:
      top_10_frequency:
        type: "array"
        description: "Frequency of each feature appearing in top 10 across 5 runs."
        items:
          type: "object"
          properties:
            feature_name:
              type: "string"
            frequency:
              type: "integer"
              minimum: 0
              maximum: 5
          required:
            - feature_name
            - frequency
    required:
      - top_10_frequency
required:
  - model_metrics
  - feature_importance
  - stability_analysis
