$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelOutput"
description: "Schema for the final model output and metrics."
type: "object"
properties:
  model_name:
    type: "string"
    description: "Name of the best performing model (RF or XGB)."
  metrics:
    type: "object"
    properties:
      mae_tg:
        type: "number"
        description: "Mean Absolute Error for Tg prediction."
      mae_modulus:
        type: "number"
        description: "Mean Absolute Error for Modulus prediction."
      baseline_mae_tg:
        type: "number"
        description: "MAE of the physical mixing rule baseline for Tg."
      baseline_mae_modulus:
        type: "number"
        description: "MAE of the physical mixing rule baseline for Modulus."
      t_test_p_value:
        type: "number"
        description: "P-value from the paired t-test comparing ML vs. Baseline errors."
      t_test_rejected_null:
        type: "boolean"
        description: "Whether the null hypothesis was rejected."
    required:
      - mae_tg
      - mae_modulus
      - baseline_mae_tg
      - baseline_mae_modulus
      - t_test_p_value
      - t_test_rejected_null
  feature_importance:
    type: "array"
    description: "Top 10 features by importance."
    items:
      type: "object"
      properties:
        feature_name:
          type: "string"
        importance_score:
          type: "number"
      required:
        - feature_name
        - importance_score
  vif_analysis:
    type: "object"
    properties:
      flagged_pairs:
        type: "array"
        description: "Pairs of features with VIF > 5.0."
        items:
          type: "string"
      sensitivity_impact:
        type: "object"
        properties:
          excluded_feature:
            type: "string"
          mae_change:
            type: "number"
            description: "Change in MAE after excluding the highest VIF feature."
        required:
          - excluded_feature
          - mae_change
    required:
      - flagged_pairs
      - sensitivity_impact
  stability_analysis:
    type: "object"
    description: "Feature importance stability across 5 independent runs."
    properties:
      top_stable_features:
        type: "array"
        description: "Features appearing in top-10 in >= 80% of runs."
        items:
          type: "string"
      runs_count:
        type: "integer"
        description: "Number of independent runs performed."
    required:
      - top_stable_features
      - runs_count
  data_quality:
    type: "object"
    description: "Data quality metrics."
    properties:
      total_fetched:
        type: "integer"
      valid_records:
        type: "integer"
      quality_rate:
        type: "number"
        description: "Percentage of valid records."
    required:
      - total_fetched
      - valid_records
      - quality_rate
required:
  - model_name
  - metrics
  - feature_importance
  - vif_analysis
  - stability_analysis
  - data_quality
additionalProperties: false