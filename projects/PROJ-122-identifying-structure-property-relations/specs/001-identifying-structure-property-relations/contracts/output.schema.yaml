$schema: "http://json-schema.org/draft-07/schema#"
title: "Polymer Blend Structure-Property Analysis Output Schema"
description: >
  Schema defining the structure of all output artifacts generated by the
  structure-property relationship pipeline. This schema ensures consistency
  across data quality reports, feature matrices, model outputs, and
  interpretability artifacts.
type: object
required:
  - version
  - generated_at
  - artifacts
properties:
  version:
    type: string
    description: "Schema version identifier (e.g., '1.0.0')"
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  generated_at:
    type: string
    description: "ISO 8601 timestamp of artifact generation"
    format: date-time
  project_id:
    type: string
    description: "Project identifier (e.g., 'PROJ-122-identifying-structure-property-relations')"
    pattern: "^PROJ-\\d+-[a-z0-9-]+$"
  artifacts:
    type: object
    description: "Map of artifact names to their definitions"
    additionalProperties:
      $ref: "#/definitions/artifact_definition"

definitions:
  artifact_definition:
    type: object
    required:
      - type
      - path
      - description
    properties:
      type:
        type: string
        description: "Category of the artifact"
        enum:
          - data_quality_report
          - raw_dataset
          - processed_dataset
          - feature_matrix
          - model_checkpoint
          - model_metrics
          - shap_analysis
          - vif_report
          - stability_metrics
          - summary_figure
          - log_file
      path:
        type: string
        description: "Relative path from project root"
        pattern: "^(data/|state/|figures/|code/).*\\.\\w+$"
      description:
        type: string
        description: "Human-readable description of the artifact"
      checksum:
        type: string
        description: "SHA-256 checksum of the file content"
        pattern: "^[a-f0-9]{64}$"
      size_bytes:
        type: integer
        description: "File size in bytes"
        minimum: 0
      source_tasks:
        type: array
        description: "List of task IDs that generated this artifact"
        items:
          type: string
          pattern: "^T\\d{3}$"
      metadata:
        type: object
        description: "Additional metadata specific to the artifact type"
        additionalProperties: true

  # Specific schemas for common artifact types (extensions)
  data_quality_report_schema:
    type: object
    properties:
      total_records:
        type: integer
      valid_records:
        type: integer
      invalid_records:
        type: integer
      validation_failures:
        type: array
        items:
          type: object
          properties:
            row_index:
              type: integer
            field:
              type: string
            reason:
              type: string
      source_distribution:
        type: object
        additionalProperties:
          type: integer

  model_metrics_schema:
    type: object
    required:
      - model_type
      - metrics
    properties:
      model_type:
        type: string
        enum:
          - random_forest
          - xgboost
          - linear_regression
      metrics:
        type: object
        required:
          - mae
          - r2
          - cv_score
        properties:
          mae:
            type: number
            minimum: 0
          r2:
            type: number
            maximum: 1
          cv_score:
            type: number
          p_value:
            type: number
            minimum: 0
            maximum: 1
          baseline_mae:
            type: number
      hyperparameters:
        type: object
        additionalProperties: true
      feature_importance:
        type: array
        items:
          type: object
          properties:
            feature:
              type: string
            importance:
              type: number
      timestamp:
        type: string
        format: date-time

  shap_analysis_schema:
    type: object
    properties:
      top_features:
        type: array
        items:
          type: object
          properties:
            feature:
              type: string
            mean_abs_shap:
              type: number
      shap_summary_plot_path:
        type: string
      force_plot_sample_indices:
        type: array
        items:
          type: integer

  vif_report_schema:
    type: object
    properties:
      features:
        type: array
        items:
          type: object
          properties:
            feature:
              type: string
            vif_score:
              type: number
            flagged:
              type: boolean
      high_vif_threshold:
        type: number
      exclusion_threshold:
        type: number

  stability_metrics_schema:
    type: object
    properties:
      total_runs:
        type: integer
      stable_features:
        type: array
        description: "Features appearing in top-N across >= 80% of runs"
        items:
          type: string
      feature_frequency:
        type: object
        additionalProperties:
          type: number
        description: "Map of feature name to frequency (0.0-1.0)"