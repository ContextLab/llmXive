# Ruff configuration for llmXive project
target-version = "py311"
line-length = 88
indent-width = 4

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
    "ARG",# flake8-unused-arguments
]
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
]

[lint.per-file-ignores]
"tests/*" = ["ARG"] # Allow unused arguments in test fixtures
"code/scripts/*" = ["ARG"] # Allow unused arguments in CLI entry points

[lint.isort]
known-first-party = ["src"]
force-single-line = false
lines-after-imports = 2
