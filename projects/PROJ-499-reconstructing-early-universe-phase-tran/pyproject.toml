[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reconstructing-early-universe-phase-tran"
version = "0.1.0"
description = "Reconstructing Early Universe Phase Transitions from CMB B-Mode Polarization"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "healpy==1.16.5",
    "dynesty==2.1.3",
    "emcee==3.1.6",
    "numpy==1.24.3",
    "scipy==1.11.4",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "astropy==5.3.4",
    "astroquery==0.4.6",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"