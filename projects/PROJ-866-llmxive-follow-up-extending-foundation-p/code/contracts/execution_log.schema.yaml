type: object
required:
  - workflow_id
  - execution_status
  - timestamp
  - is_valid
properties:
  workflow_id:
    type: string
    description: Unique identifier for the workflow
  execution_status:
    type: string
    enum: [success, failed, edge_case, policy_violation]
    description: Final status of the execution
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of execution completion
  is_valid:
    type: boolean
    description: True if the workflow is logically possible to execute; False if impossible even with full context (e.g., circular dependencies, missing mandatory nodes)
  context_reduction_pct:
    type: string
    description: Percentage of context reduced, or '[deferred]' for edge cases
  node_count:
    type: integer
    description: Number of nodes in the workflow
  depth:
    type: integer
    description: Depth of the workflow graph
  complexity:
    type: integer
    description: Complexity score of the workflow
  policy_violations:
    type: array
    items:
      type: string
    description: List of specific policy violation messages
  error_message:
    type: string
    description: Error message if execution failed
  metadata:
    type: object
    description: Additional metadata about the execution
