$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results"
type: "object"
required:
  - safe_threshold
  - confidence_interval
  - curve_data
properties:
  safe_threshold:
    type: "number"
    description: "Maximum context reduction percentage where error <= 1%"
  confidence_interval:
    type: "object"
    properties:
      lower:
        type: "number"
      upper:
        type: "number"
  curve_data:
    type: "array"
    items:
      type: "object"
      properties:
        reduction_pct:
          type: "number"
        error_rate:
          type: "number"