$schema: http://json-schema.org/draft-07/schema#
title: Synthetic Workflow Definition
description: >-
  Schema for defining synthetic workflow DAGs generated by the
  SyntheticWorkflowGenerator. Used to validate the structure of
  workflows before execution and analysis.
type: object
required:
  - workflow_id
  - version
  - generated_at
  - depth
  - complexity
  - nodes
  - edges
  - metadata
properties:
  workflow_id:
    type: string
    description: Unique identifier for the workflow instance.
    pattern: "^wf-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  
  version:
    type: string
    description: Schema version of this workflow definition.
    const: "1.0.0"
  
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of generation.
  
  depth:
    type: integer
    minimum: 1
    maximum: 20
    description: Maximum depth of the DAG (longest path from root to leaf).
  
  complexity:
    type: integer
    minimum: 1
    maximum: 10
    description: Complexity score based on node count and edge density.
  
  nodes:
    type: array
    minItems: 1
    description: List of nodes in the workflow DAG.
    items:
      type: object
      required:
        - node_id
        - node_type
        - token_budget
      properties:
        node_id:
          type: string
          description: Unique identifier for the node.
        node_type:
          type: string
          enum:
            - start
            - agent
            - tool
            - decision
            - end
          description: Type of the node in the workflow.
        token_budget:
          type: integer
          minimum: 0
          description: Estimated token budget for this node's execution.
        metadata:
          type: object
          description: Optional metadata for the node.
          additionalProperties: true
  
  edges:
    type: array
    description: List of directed edges defining the workflow graph.
    items:
      type: object
      required:
        - source
        - target
      properties:
        source:
          type: string
          description: ID of the source node.
        target:
          type: string
          description: ID of the target node.
        condition:
          type: string
          description: Optional condition for decision nodes (e.g., "if_success", "if_failure").
  
  metadata:
    type: object
    required:
      - generator_seed
      - total_nodes
      - total_edges
    properties:
      generator_seed:
        type: integer
        description: Random seed used for deterministic generation.
      total_nodes:
        type: integer
        description: Total number of nodes in the graph.
      total_edges:
        type: integer
        description: Total number of edges in the graph.
      policy_constraints:
        type: array
        description: List of policy constraints associated with this workflow.
        items:
          type: string
      notes:
        type: string
        description: Optional notes about the workflow generation.
additionalProperties: false