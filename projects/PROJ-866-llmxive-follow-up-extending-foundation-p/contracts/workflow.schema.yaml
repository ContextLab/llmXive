$schema: "http://json-schema.org/draft-07/schema#"
title: "Workflow"
type: "object"
required:
  - id
  - nodes
  - edges
properties:
  id:
    type: "string"
    description: "Unique identifier for the workflow"
  depth:
    type: "integer"
    minimum: 1
    maximum: 20
    description: "Maximum depth of the workflow DAG"
  complexity:
    type: "integer"
    minimum: 1
    maximum: 10
    description: "Complexity score of the workflow"
  budget_cap:
    type: "number"
    description: "Maximum allowed token budget"
  nodes:
    type: "array"
    items:
      type: "object"
      required:
        - id
        - type
        - policy
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["start", "process", "end"]
        policy:
          type: "object"
          additionalProperties: true
  edges:
    type: "array"
    items:
      type: "object"
      required:
        - source
        - target
      properties:
        source:
          type: "string"
        target:
          type: "string"
