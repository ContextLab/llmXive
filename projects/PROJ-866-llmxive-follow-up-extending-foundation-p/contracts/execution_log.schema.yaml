$schema: http://json-schema.org/draft-07/schema#
title: Execution Log Schema
description: >
  Schema for recording execution logs generated by FullContextEngine, 
  CompressedContextEngine, and OraclePolicyEngine.
type: object
required:
  - workflow_id
  - execution_id
  - engine_type
  - timestamp
  - status
  - context_reduction_pct
  - token_count
  - steps
  - violations
properties:
  workflow_id:
    type: string
    description: Unique identifier of the executed workflow.
  execution_id:
    type: string
    description: Unique identifier for this specific execution run.
  engine_type:
    type: string
    enum:
      - full_context
      - compressed_context
      - oracle_policy
    description: Type of engine used for execution.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of execution start.
  status:
    type: string
    enum:
      - success
      - partial_failure
      - full_failure
      - edge_case
      - invalid
    description: Overall execution status.
  context_reduction_pct:
    type: number
    minimum: 0
    maximum: 100
    description: Percentage of context removed (0 for full context, >0 for compressed).
    default: 0.0
  token_count:
    type: integer
    minimum: 0
    description: Total number of tokens in the context passed to the engine.
  steps:
    type: array
    description: Ordered list of execution steps.
    items:
      type: object
      required:
        - step_id
        - node_id
        - action
        - status
        - timestamp
      properties:
        step_id:
          type: integer
          description: Sequential step number.
        node_id:
          type: string
          description: ID of the workflow node being executed.
        action:
          type: string
          description: Action performed at this step.
        status:
          type: string
          enum:
            - completed
            - skipped
            - failed
            - policy_violation
          description: Outcome of the step.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of step completion.
        error_message:
          type: string
          description: Error message if step failed.
        policy_rule:
          type: string
          description: Specific policy rule triggered (if applicable).
  violations:
    type: array
    description: List of policy violations detected during execution.
    items:
      type: object
      required:
        - violation_id
        - type
        - description
        - step_id
        - rule_id
      properties:
        violation_id:
          type: string
          description: Unique identifier for the violation.
        type:
          type: string
          enum:
            - policy_violation
            - context_truncation_error
            - data_sovereignty_violation
            - dependency_missing
          description: Category of the violation.
        description:
          type: string
          description: Human-readable description of the violation.
        step_id:
          type: integer
          description: Reference to the step where violation occurred.
        rule_id:
          type: string
          description: ID of the policy rule that was violated.
        severity:
          type: string
          enum:
            - critical
            - warning
            - info
          description: Severity level of the violation.
  metadata:
    type: object
    description: Additional metadata about the execution.
    properties:
      graph_depth:
        type: integer
        minimum: 0
        description: Depth of the workflow graph.
      graph_complexity:
        type: integer
        minimum: 1
        description: Complexity score of the workflow graph.
      compression_strategy:
        type: string
        enum:
          - none
          - bfs
          - dfs
          - random
        description: Strategy used for context compression (if applicable).
      budget_cap:
        type: number
        description: Budget cap applied during execution.
      is_valid:
        type: boolean
        description: Whether the workflow is valid even with full context.
additionalProperties: false