$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Log"
type: "object"
required:
  - workflow_id
  - compression_type
  - max_depth
  - original_node_count
  - compressed_node_count
  - token_count
  - is_valid
  - violations
properties:
  workflow_id:
    type: "string"
  compression_type:
    type: "string"
    enum: ["bfs", "dfs"]
  max_depth:
    type: "integer"
    minimum: 0
  original_node_count:
    type: "integer"
    minimum: 0
  compressed_node_count:
    type: "integer"
    minimum: 0
  token_count:
    type: "integer"
    minimum: 0
  is_valid:
    type: "boolean"
  violations:
    type: "array"
    items:
      type: "object"
      required:
        - type
        - reason
      properties:
        type:
          type: "string"
        reason:
          type: "string"
        details:
          type: "string"
  context_truncated:
    type: "boolean"
  timestamp:
    type: "string"
    format: "date-time"
