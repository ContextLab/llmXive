$schema: "http://json-schema.org/draft-07/schema#"
title: "Processed Dialogue Dataset Schema"
description: "Schema for the processed dialogue dataset containing accommodation metrics, proxy emotion scores, and optional human empathy ratings."
type: object
properties:
  conversation_id:
    type: string
    description: "Unique identifier for the conversation."
  turn_index:
    type: integer
    description: "Index of the turn within the conversation."
  user_turn:
    type: string
    description: "Normalized text of the user's turn."
  ai_response:
    type: string
    description: "Normalized text of the proxy AI response."
  emotion_label:
    type: string
    description: "Emotion label from the source (e.g., \"Joy\")."
  lexical_overlap:
    type: number
    description: "Jaccard similarity of token sets between user and AI."
    minimum: 0.0
    maximum: 1.0
  syntactic_similarity:
    type: number
    description: "Jaccard similarity of POS tag sets."
    minimum: 0.0
    maximum: 1.0
  dependency_similarity:
    type: number
    description: "Jaccard similarity of dependency relation labels."
    minimum: 0.0
    maximum: 1.0
  sentence_length_variance:
    type: number
    description: "Variance of sentence lengths in the AI response."
    minimum: 0.0
  emotion_mapped_score:
    type: integer
    description: "Proxy emotion score derived from emotion label (1‑5)."
    minimum: 1
    maximum: 5
  word_count:
    type: integer
    description: "Total word count of the dialogue pair."
    minimum: 0
  lda_topic_id:
    type: integer
    description: "Dominant LDA cluster ID (k=10)."
    minimum: 0
    maximum: 9
  is_validation_subset:
    type: boolean
    description: "True if record belongs to the n = 30 manual rating set."
  human_empathy_rating:
    type: integer
    description: "Human‑rated empathy score (1‑5) for AI responses (optional, present only for validation subset)."
    minimum: 1
    maximum: 5
required:
  - conversation_id
  - turn_index
  - user_turn
  - ai_response
  - lexical_overlap
  - syntactic_similarity
  - dependency_similarity
  - sentence_length_variance
  - emotion_label
  - emotion_mapped_score
  - word_count
  - lda_topic_id
  - is_validation_subset
additionalProperties: false