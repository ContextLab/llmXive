$schema: "http://json-schema.org/draft-07/schema#"
title: "Final Processed Dataset Schema"
description: "Schema for the final_dataset.csv containing accommodation metrics, proxy emotion scores, and optional human empathy ratings."
type: object
properties:
  conversation_id:
    type: string
    description: "Unique session identifier."
  turn_index:
    type: integer
    description: "Turn sequence number."
  user_turn:
    type: string
    description: "User text, normalized to NFKC."
  ai_response:
    type: string
    description: "AI response text, normalized to NFKC."
  lexical_overlap:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Jaccard similarity of token sets."
  syntactic_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Jaccard similarity of POS tag sets."
  dependency_similarity:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Jaccard similarity of dependency relations."
  sentence_length_variance:
    type: number
    minimum: 0.0
    description: "Variance of sentence lengths."
  emotion_label:
    type: string
    enum:
      - "Joy"
      - "Sadness"
      - "Anger"
      - "Fear"
      - "Surprise"
      - "Disgust"
      - "Neutral"
    description: "Raw emotion label."
  emotion_mapped_score:
    type: integer
    minimum: 1
    maximum: 5
    description: "Proxy emotion score (1‑5) derived from the mapping rule."
  word_count:
    type: integer
    minimum: 0
    description: "Total word count of the dialogue pair."
  lda_topic_id:
    type: integer
    minimum: 0
    maximum: 9
    description: "Dominant LDA cluster ID (k=10)."
  is_validation_subset:
    type: boolean
    description: "Indicator if the record is part of the n = 30 manual rating subset."
  human_empathy_rating:
    type: integer
    minimum: 1
    maximum: 5
    description: "Human‑rated empathy score (1‑5) for AI responses (optional)."
required:
  - conversation_id
  - turn_index
  - user_turn
  - ai_response
  - lexical_overlap
  - syntactic_similarity
  - dependency_similarity
  - sentence_length_variance
  - emotion_label
  - emotion_mapped_score
  - word_count
  - lda_topic_id
  - is_validation_subset
additionalProperties: false