$schema: "http://json-schema.org/draft-07/schema#"
title: "Merged User Dataset Schema"
description: "Schema for the cleaned and merged dataset containing personality traits and music preferences."
type: object
properties:
  user_id:
    type: string
    description: "Hashed unique identifier for the user."
    minLength: 1
  openness:
    type: number
    description: "Big Five Openness score."
    minimum: 0
    maximum: 100
  conscientiousness:
    type: number
    description: "Big Five Conscientiousness score."
    minimum: 0
    maximum: 100
  extraversion:
    type: number
    description: "Big Five Extraversion score."
    minimum: 0
    maximum: 100
  agreeableness:
    type: number
    description: "Big Five Agreeableness score."
    minimum: 0
    maximum: 100
  neuroticism:
    type: number
    description: "Big Five Neuroticism score."
    minimum: 0
    maximum: 100
  age:
    type: integer
    description: "User age in years."
    minimum: 0
  gender:
    type: string
    description: "User gender category."
    enum:
      - "Male"
      - "Female"
      - "Other"
      - "Unknown"
  country:
    type: string
    description: "User country or region."
  genre:
    type: string
    description: "Standardized music genre."
    enum:
      - "Rock"
      - "Pop"
      - "Hip-Hop"
      - "Classical"
      - "Electronic"
      - "Jazz"
      - "Folk"
      - "Country"
      - "Metal"
      - "Other"
  listening_minutes:
    type: integer
    description: "Total minutes listened to this genre."
    minimum: 0
  log_minutes:
    type: number
    description: "Log-transformed listening minutes."
    minimum: 0
  genre_score:
    type: number
    description: "Normalized genre preference score."
required:
  - user_id
  - openness
  - conscientiousness
  - extraversion
  - agreeableness
  - neuroticism
  - age
  - gender
  - country
  - genre
  - listening_minutes
  - log_minutes
  - genre_score
additionalProperties: false