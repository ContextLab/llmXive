$schema: "http://json-schema.org/draft-07/schema#"
title: "Merged Dataset Schema"
description: "Schema for data/processed/merged_data.csv"
type: "object"
properties:
  user_id:
    type: "string"
    description: "Hashed user identifier"
  openness:
    type: "number"
    description: "BFI-2 Openness score"
  conscientiousness:
    type: "number"
    description: "BFI-2 Conscientiousness score"
  extraversion:
    type: "number"
    description: "BFI-2 Extraversion score"
  agreeableness:
    type: "number"
    description: "BFI-2 Agreeableness score"
  neuroticism:
    type: "number"
    description: "BFI-2 Neuroticism score"
  age:
    type: "integer"
    description: "Age in years"
  gender:
    type: "string"
    description: "Gender category"
  country_region:
    type: "string"
    description: "Grouped country/region"
  genre:
    type: "string"
    description: "Standardized genre name"
    enum:
      - "Rock"
      - "Pop"
      - "Hip-Hop"
      - "Classical"
      - "Electronic"
      - "Jazz"
      - "Folk"
      - "Country"
      - "Metal"
      - "Other"
  minutes_listened:
    type: "number"
    description: "Log-transformed listening minutes"
required:
  - user_id
  - openness
  - conscientiousness
  - extraversion
  - agreeableness
  - neuroticism
  - age
  - gender
  - country_region
  - genre
  - minutes_listened
additionalProperties: false