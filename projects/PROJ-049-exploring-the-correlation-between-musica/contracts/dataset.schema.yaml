$schema: http://json-schema.org/draft-07/schema#
title: Music Personality Dataset Schema
description: >
  Schema for the merged dataset containing personality traits, 
  listening habits, and demographic information.
type: object
required:
  - user_id
  - extraversion
  - agreeableness
  - conscientiousness
  - neuroticism
  - openness
  - genre_preferences
  - listening_minutes
  - age
  - gender
  - country
properties:
  user_id:
    type: string
    description: Unique identifier for the user
    minLength: 1
  extraversion:
    type: number
    description: BFI-2 Extraversion score (0-100)
    minimum: 0
    maximum: 100
  agreeableness:
    type: number
    description: BFI-2 Agreeableness score (0-100)
    minimum: 0
    maximum: 100
  conscientiousness:
    type: number
    description: BFI-2 Conscientiousness score (0-100)
    minimum: 0
    maximum: 100
  neuroticism:
    type: number
    description: BFI-2 Neuroticism score (0-100)
    minimum: 0
    maximum: 100
  openness:
    type: number
    description: BFI-2 Openness score (0-100)
    minimum: 0
    maximum: 100
  genre_preferences:
    type: array
    description: List of standardized genre tags associated with the user
    items:
      type: string
      minLength: 1
  listening_minutes:
    type: number
    description: Total listening minutes (log-transformed for analysis)
    minimum: 0
  age:
    type: integer
    description: User age in years
    minimum: 10
    maximum: 100
  gender:
    type: string
    description: Categorical gender identifier
    enum:
      - Male
      - Female
      - Non-binary
      - Prefer not to say
      - Other
  country:
    type: string
    description: ISO 3166-1 alpha-2 country code
    pattern: "^[A-Z]{2}$"
  data_source:
    type: string
    description: Source of the data (e.g., 'real', 'synthetic')
    enum:
      - real
      - synthetic
  generated_at:
    type: string
    format: date-time
    description: Timestamp of data generation
