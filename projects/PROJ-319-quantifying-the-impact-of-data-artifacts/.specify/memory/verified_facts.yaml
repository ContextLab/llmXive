'|conselice definition':
  quote: In 1998, Sidney van den Bergh published a book on galaxy morphology in which
    he interrogated weaknesses in the Hubble sequence as a classification scheme.
    Subsequent work revealed further weaknesses. In 2003, Christopher Conselice formalized
    the CAS parameters, a set of quantitative morphological parameters which could
    be used to approximate the Hubble types of galaxy populations at low redshift.
    In 2004, a paper by Jennifer Lotz found that the Gini coefficient, when used in
    tandem with the second-order moment of the brightest 20% of the galaxy's flux
    (referred to as M20) and the CAS parameters, could distinguish normal galaxies
    from mergers.
  source_id: Galaxy morphological classification
  url: https://en.wikipedia.org/wiki/Galaxy_morphological_classification
  value: CAS parameters
