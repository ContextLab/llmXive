[project]
name = "quantifying-the-impact-of-data-artifacts"
version = "0.1.0"
description = "Automated science pipeline for quantifying data artifact impact on planetary nebula morphology"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scikit-image",
    "astropy",
    "scipy",
    "statsmodels",
    "pandas",
    "matplotlib",
    "pytest",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v"

[tool.ruff]
# Inherits settings from .ruff.toml or uses defaults if not specified here
line-length = 88
target-version = "py311"
