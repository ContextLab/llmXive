[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | state
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code"]
skip = [".git", "__pycache__", ".venv", "venv", "data", "state"]
