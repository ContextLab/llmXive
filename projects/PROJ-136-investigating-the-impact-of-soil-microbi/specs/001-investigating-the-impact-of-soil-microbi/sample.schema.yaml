$schema: "http://json-schema.org/draft-07/schema#"
title: "Soil Microbiome Sample"
description: "Schema for validating soil microbiome sample metadata records."
type: object
required:
  - sample_id
  - plant_species
  - gps_latitude
  - gps_longitude
  - soil_type
  - sequencing_depth
properties:
  sample_id:
    type: string
    description: "Unique identifier for the sample"
    pattern: "^S[0-9]+$"
  plant_species:
    type: string
    description: "Scientific name of the plant species"
  gps_latitude:
    type: number
    minimum: -90
    maximum: 90
    description: "Latitude coordinate (WGS84)"
  gps_longitude:
    type: number
    minimum: -180
    maximum: 180
    description: "Longitude coordinate (WGS84)"
  soil_type:
    type: string
    description: "Classification of soil type (e.g., Loam, Clay, Sand)"
  sequencing_depth:
    type: integer
    minimum: 1
    description: "Number of reads obtained for this sample"
  collection_date:
    type: string
    format: date
    description: "Date of sample collection (YYYY-MM-DD)"
  notes:
    type: string
    description: "Optional notes or comments about the sample"
