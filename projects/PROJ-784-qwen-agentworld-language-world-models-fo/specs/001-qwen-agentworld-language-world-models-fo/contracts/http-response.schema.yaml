$schema: http://json-schema.org/draft-07/schema#
title: HttpResponseSchema
description: Schema for capturing HTTP response details during validation.
type: object
properties:
  request:
    type: object
    properties:
      method:
        type: string
        description: "HTTP Method (GET, POST, etc.)"
      path:
        type: string
        description: "Request path"
    required:
      - method
      - path
  response:
    type: object
    properties:
      status_code:
        type: integer
        description: "HTTP Status Code (e.g., 200, 404)"
      headers:
        type: object
        description: "Response headers"
        additionalProperties:
          type: string
      body_preview:
        type: string
        description: "First 200 characters of the response body"
      body_length:
        type: integer
        description: "Total length of the response body"
    required:
      - status_code
      - headers
      - body_preview
      - body_length
  validation:
    type: object
    properties:
      expected_status:
        type: integer
        description: "Expected status code (e.g., 200)"
      expected_content:
        type: string
        description: "Expected string content (optional)"
      match_result:
        type: boolean
        description: "True if response matches expectations"
    required:
      - match_result
required:
  - request
  - response
  - validation
additionalProperties: false
