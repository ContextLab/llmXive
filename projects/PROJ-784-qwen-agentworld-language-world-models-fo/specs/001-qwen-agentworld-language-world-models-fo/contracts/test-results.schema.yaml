$schema: http://json-schema.org/draft-07/schema#
title: TestResultsSchema
description: Schema for validation results of the Express.js submodule execution.
type: object
properties:
  feature_id:
    type: string
    description: "Identifier for the feature branch (e.g., 001-validate-express-submodule)"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the validation run"
  checks:
    type: array
    description: "List of individual validation checks"
    items:
      type: object
      properties:
        id:
          type: string
          description: "Unique check ID (e.g., FR-001)"
        requirement_ref:
          type: string
          description: "Reference to the Functional Requirement (e.g., FR-001)"
        status:
          type: string
          enum:
            - PASS
            - FAIL
          description: "Result of the check"
        message:
          type: string
          description: "Human-readable result message"
        duration_ms:
          type: number
          description: "Execution time in milliseconds"
      required:
        - id
        - requirement_ref
        - status
        - message
  summary:
    type: object
    description: "Aggregated summary of all checks"
    properties:
      total_checks:
        type: integer
        description: "Total number of checks run"
      passed:
        type: integer
        description: "Number of passed checks"
      failed:
        type: integer
        description: "Number of failed checks"
      exit_code:
        type: integer
        description: "Overall process exit code (0 for success)"
    required:
      - total_checks
      - passed
      - failed
      - exit_code
required:
  - feature_id
  - timestamp
  - checks
  - summary
additionalProperties: false
