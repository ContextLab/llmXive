[flake8]
# Configuration for flake8
# This file is used as a fallback if pyproject.toml is not found or for specific flake8 plugins
max-line-length = 100
ignore = E203, E266, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    .eggs,
    *.egg-info
max-complexity = 15
count = True
statistics = True