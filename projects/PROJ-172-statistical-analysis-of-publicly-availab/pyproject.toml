[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-sports-prediction"
version = "0.1.0"
description = "Statistical Analysis of Publicly Available Sports Data for Predictive Modeling"
requires-python = ">=3.10"
dependencies = [
    "pandas==2.0.3",
    "scikit-learn==1.3.0",
    "xgboost==1.7.6",
    "statsmodels==0.14.0",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "numpy==1.24.3",
    "pytest==7.4.0",
    "ruff==0.1.6",
    "black==23.11.0",
]

[tool.ruff]
# Linting configuration
line-length = 100
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in fastapi/pytest)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in init files

[tool.black]
# Formatting configuration
line-length = 100
target-version = ["py310"]
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
