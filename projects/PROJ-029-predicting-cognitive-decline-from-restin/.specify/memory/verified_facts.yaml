'|hour less runtime than verify':
  quote: The film's storyline draws loose inspiration from multiple real-life geopolitical
    events and conflicts in South Asia, including the 1999 IC-814 hijacking, the 2001
    Indian Parliament attack, the 2008 Mumbai attacks, and developments linked to
    Pakistan's Operation Lyari. Principal photography for Dhurandhar took place from
    July 2024 to October 2025 across multiple locations in India and abroad, including
    the states and union territories of Punjab, Maharashtra, Chandigarh, Ladakh and
    Himachal Pradesh, as well as Thailand. The film features music composed by Shashwat
    Sachdev, cinematography by Vikash Nowlakha, and editing by Shivkumar V. Panicker.
    With a runtime of 214 minutes, Dhurandhar ranks as one of the longest Indian films
    ever produced.
  source_id: Dhurandhar
  url: https://en.wikipedia.org/wiki/Dhurandhar
