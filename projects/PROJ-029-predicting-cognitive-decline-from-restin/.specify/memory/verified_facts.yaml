  quote: Cleopatra premiered at the Rivoli Theatre in New York City on June 12, 1963,
    with an estimated audience of 10,000 spectators congregated outside. Among those
    present at the premiere were Rex Harrison, Walter Wanger, Joseph L. Mankiewicz,
    Darryl F. Zanuck, Jacob Javits, Richard Rodgers, Joan Fontaine, Louis Nizer and
    Beatrice Miller. Burton and Taylor were not in attendance; Taylor was in London
    and Burton was filming Becket (1964). On that night, NBC's The Tonight Show Starring
    Johnny Carson featured a live telecast of the film's world premiere, with Bert
    Parks interviewing Mankiewicz and other celebrities. Top ticket prices at the
    Rivoli were a record $5.50. Soon after the film's premiere, its running time was
    truncated from 244 to 221 minutes. Two weeks after opening in New York, the film's
    release was expanded into 37 cities.
