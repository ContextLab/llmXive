[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-271"
version = "0.1.0"
description = "Evaluating the Effectiveness of LLMs for Detecting Code Smells"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "pandas",
    "radon",
    "pylint",
    "sentence-transformers",
    "llama-cpp-python",
    "scikit-learn",
    "statsmodels",
    "numpy",
    "psutil",
    "flake8",
    "black",
]

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.flake8]
max-line-length = 100
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    ".tox",
    ".mypy_cache",
]
ignore = ["E203", "W503"]
per-file-ignores = {}

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
