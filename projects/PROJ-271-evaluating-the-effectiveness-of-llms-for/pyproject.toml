[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-evaluation"
version = "0.1.0"
description = "Evaluating the Effectiveness of LLMs for Detecting Code Smells"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "pandas",
    "radon",
    "pylint",
    "sentence-transformers",
    "llama-cpp-python",
    "scikit-learn",
    "statsmodels",
    "numpy",
    "psutil",
    "flake8",
    "black"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.flake8]
max-line-length = 88
extend-ignore = "E203, W503"
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "build",
    "dist"
]
per-file-ignores = [
    "tests/*: S101"
]
