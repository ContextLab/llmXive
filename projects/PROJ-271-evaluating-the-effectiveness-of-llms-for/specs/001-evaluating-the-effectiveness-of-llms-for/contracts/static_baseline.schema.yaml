$schema: "http://json-schema.org/draft-07/schema#"
title: "Static Baseline Schema"
description: "Schema for data/processed/static_baseline.csv"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the function"
  source_code:
    type: "string"
    description: "Raw Python source code"
  loc:
    type: "integer"
    description: "Lines of Code"
    minimum: 1
  cyclomatic_complexity:
    type: "integer"
    description: "Cyclomatic complexity metric"
    minimum: 1
  nesting_depth:
    type: "integer"
    description: "Maximum nesting depth"
    minimum: 0
  static_labels:
    type: "array"
    items:
      type: "string"
    description: "List of Pylint error codes (e.g., C0103)"
  normalized_static_labels:
    type: "array"
    items:
      type: "string"
    description: "List of canonical smell names mapped from Pylint codes (e.g., Too Many Arguments)"
required:
  - id
  - source_code
  - loc
  - cyclomatic_complexity
  - static_labels
  - normalized_static_labels
additionalProperties: false