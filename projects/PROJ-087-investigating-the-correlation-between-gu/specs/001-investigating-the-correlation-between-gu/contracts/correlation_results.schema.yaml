$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Results Schema"
description: "Schema for the statistical correlation output (correlation_results.csv)"
type: "object"
properties:
  metric_pair:
    type: "string"
    description: "Identifier for the pair of variables tested (e.g., 'shannon_sleep_efficiency')"
  r:
    type: "number"
    description: "Spearman correlation coefficient"
    minimum: -1
    maximum: 1
  p_value:
    type: "number"
    description: "Unadjusted p-value"
    minimum: 0
    maximum: 1
  p_adjusted:
    type: "number"
    description: "Benjamini-Hochberg adjusted p-value"
    minimum: 0
    maximum: 1
  n:
    type: "integer"
    description: "Number of samples used in the test"
    minimum: 1
  method:
    type: "string"
    description: "Statistical method used (e.g., 'spearman')"
required:
  - metric_pair
  - r
  - p_value
  - p_adjusted
  - n
  - method
additionalProperties: true