[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-gut-microbiome-sleep"
version = "0.1.0"
description = "Investigating the Correlation Between Gut Microbiome Composition and Sleep Quality"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "scikit-bio>=0.5.9",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "seaborn>=0.12",
    "requests>=2.28",
    "pytest>=7.0",
    "pydantic>=2.0",
    "ruff>=0.1.0",
]

[tool.ruff]
# Select specific error codes: E (pycodestyle), F (Pyflakes), W (pycodestyle), I (isort)
select = ["E", "F", "W", "I"]
# Ignore specific rules if necessary (currently none)
ignore = []
# Line length for formatting
line-length = 88
# Target Python version
target-version = "py311"

[tool.ruff.per-file-ignores]
# Allow unused imports in __init__.py files for package namespace exposure
"__init__.py" = ["F401"]

[tool.black]
# Line length setting to match ruff
line-length = 88
# Target Python version
target-version = ["py311"]
# Exclude generated files or specific directories
extend-exclude = '''
(
    \.eggs
    | \.git
    | \.mypy_cache
    | \.ruff_cache
    | \.venv
    | build
    | dist
    | data
)
'''