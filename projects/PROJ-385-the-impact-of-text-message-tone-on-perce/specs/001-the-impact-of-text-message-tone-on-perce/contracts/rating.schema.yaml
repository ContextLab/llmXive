$schema: "http://json-schema.org/draft-07/schema#"
title: Rating Schema
description: |
  Schema for participant ratings of text message stimuli.
  Contains the participant ID, stimulus ID, context provided to the participant,
  and the Likert scale rating for perceived emotional support.
type: object
required:
  - rating_id
  - participant_id
  - stimulus_id
  - context_type
  - support_rating
  - timestamp
properties:
  rating_id:
    type: string
    description: Unique identifier for the rating record
    pattern: "^R[0-9]{6}$"
  participant_id:
    type: string
    description: Prolific-style participant ID
    pattern: "^P-[A-Z0-9]{8}$"
  stimulus_id:
    type: string
    description: Reference to the stimulus being rated
    pattern: "^S[0-9]{3}$"
  context_type:
    type: string
    description: Relationship context presented to the participant
    enum:
      - friend
      - acquaintance
  support_rating:
    type: integer
    description: Perceived emotional support rating on a 1-7 Likert scale
    minimum: 1
    maximum: 7
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the rating was submitted
additionalProperties: false
