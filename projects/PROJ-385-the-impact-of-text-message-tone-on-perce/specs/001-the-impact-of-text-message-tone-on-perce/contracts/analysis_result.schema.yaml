$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for LMM and sensitivity analysis output (FR-003, FR-005)."
type: "object"
required:
  - "model_id"
  - "term"
  - "estimate"
  - "std_err"
  - "p_value"
  - "ci_lower"
  - "ci_upper"
properties:
  model_id:
    type: "string"
    description: "Identifier for the model run (e.g., 'lmm_primary', 'sensitivity_A')."
  term:
    type: "string"
    description: "The fixed effect term (e.g., 'relationship', 'interaction')."
  estimate:
    type: "number"
    description: "Coefficient estimate."
  std_err:
    type: "number"
    description: "Standard error of the estimate."
  p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "P-value for the term."
  ci_lower:
    type: "number"
    description: "Lower bound of the confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the confidence interval."
additionalProperties: false
