$schema: "http://json-schema.org/draft-07/schema#"
title: Stimulus Schema
description: |
  Schema for text message stimuli generated for the emotional support study.
  Each stimulus represents a unique combination of tone cues (emoji, punctuation, length)
  and context.
type: object
required:
  - stimulus_id
  - text_content
  - emoji_level
  - punctuation_type
  - length_category
  - context_type
  - created_at
properties:
  stimulus_id:
    type: string
    description: Unique identifier for the stimulus (e.g., S001, S024)
    pattern: "^S[0-9]{3}$"
  text_content:
    type: string
    description: The actual text message content
    minLength: 1
  emoji_level:
    type: string
    description: Level of emoji usage
    enum:
      - none
      - low
      - high
  punctuation_type:
    type: string
    description: Type of punctuation used
    enum:
      - standard
      - emphatic
  length_category:
    type: string
    description: Length of the message
    enum:
      - short
      - long
  context_type:
    type: string
    description: Relationship context for the message
    enum:
      - friend
      - acquaintance
  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of creation
additionalProperties: false
