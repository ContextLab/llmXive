$schema: http://json-schema.org/draft-07/schema#
title: Stimulus Schema
description: >-
  Defines the structure for text message stimuli used in the emotional support
  perception study. Each stimulus is a unique text variant generated by combining
  base scenarios with tone cues (emoji, punctuation, length).
type: object
required:
  - stimulus_id
  - base_scenario
  - tone_cues
  - cue_intensity
  - text_content
  - generated_at
properties:
  stimulus_id:
    type: string
    description: Unique identifier for the stimulus (e.g., "STIM_0001")
    pattern: "^STIM_\\d{4}$"
  base_scenario:
    type: string
    description: The base scenario identifier (e.g., "SCN_01")
    pattern: "^SCN_\\d{2}$"
  tone_cues:
    type: object
    description: Object containing specific tone modification features
    required:
      - emoji_count
      - punctuation_style
      - length_modifier
    properties:
      emoji_count:
        type: integer
        minimum: 0
        description: Number of emojis appended to the text
      punctuation_style:
        type: string
        enum:
          - standard
          - enthusiastic
          - minimal
        description: Style of punctuation used
      length_modifier:
        type: string
        enum:
          - short
          - medium
          - long
        description: Relative length category of the generated text
  cue_intensity:
    type: string
    enum:
      - low
      - medium
      - high
    description: Calculated intensity level based on tone_cues
  text_content:
    type: string
    description: The full generated text message
    minLength: 1
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of generation
additionalProperties: false
