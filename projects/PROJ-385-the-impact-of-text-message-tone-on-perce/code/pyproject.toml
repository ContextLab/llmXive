[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "text-tone-emotional-support"
version = "0.1.0"
description = "Analysis of text message tone on perceived emotional support"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "numpy",
    "scipy",
    "statsmodels",
    "linearmodels",
    "pyyaml",
    "pytest",
    "jsonschema",
    "ruff",
    "black"
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in pandas/statsmodels)
]

[tool.ruff.per-file-ignores]
"code/0*_generate*.py" = ["E402"]
"tests/*" = ["F401", "E501"]

[tool.ruff.isort]
known-first-party = ["config", "logging_config", "setup_data_dirs", "setup_linting", "validate_schemas"]
force-single-line = true
