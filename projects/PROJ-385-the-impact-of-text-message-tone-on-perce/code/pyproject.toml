[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "ANN", # flake8-annotations (basic)
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in data pipelines)
    "ANN101", # missing type annotation for self in method
    "ANN102", # missing type annotation for cls in classmethod
]

[tool.ruff.isort]
known-first-party = ["config", "logging_config", "setup_data_dirs", "setup_project_structure", "validate_schemas", "verify_logging", "setup_linting", "09_power_analysis", "09_power_curve_plotter", "01_generate_stimuli", "02_simulate_ratings", "03_clean_data", "04_collect_real_data", "04_run_lmm"]
force-sort-within-sections = true

[tool.ruff.per-file-ignores]
"tests/*" = ["ANN"] # Skip annotation checks in tests for now
