$schema: http://json-schema.org/draft-07/schema#
title: Statistical Analysis Result Schema
description: |
  Defines the structure of output metrics generated by the statistical analysis pipeline.
  This schema validates the results of t-tests, ANOVA, chi-squared tests, and regression analyses,
  including p-values, confidence intervals, effect sizes, and Type I error flags.
type: object
required:
  - metric_name
  - p_value
  - confidence_interval
  - effect_size
  - type_i_flag
  - configuration
properties:
  metric_name:
    type: string
    description: Name of the statistical test performed (e.g., 'ttest', 'anova', 'chi_squared', 'regression').
    enum:
      - ttest
      - anova
      - chi_squared
      - regression

  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: The calculated p-value from the statistical test.

  confidence_interval:
    type: object
    description: The 95% confidence interval bounds for the estimated parameter.
    required:
      - lower
      - upper
      - level
    properties:
      lower:
        type: number
        description: Lower bound of the confidence interval.
      upper:
        type: number
        description: Upper bound of the confidence interval.
      level:
        type: number
        default: 0.95
        description: Confidence level (e.g., 0.95 for 95%).

  effect_size:
    type: object
    description: Calculated effect size metric and its bias relative to ground truth.
    required:
      - value
      - bias
    properties:
      value:
        type: number
        description: The estimated effect size (e.g., Cohen's d, Eta-squared, Cramér's V, regression coefficient).
      bias:
        type: number
        description: The difference between the estimated effect size and the true ground truth effect size.

  type_i_flag:
    type: boolean
    description: |
      Indicates whether a Type I error occurred (false positive).
      True if the null hypothesis was rejected (p_value < alpha) when the ground truth indicates the null hypothesis is true.
      False otherwise.

  configuration:
    type: object
    description: Metadata about the data configuration used for this result.
    required:
      - dataset_id
      - error_type
      - error_rate
      - seed
    properties:
      dataset_id:
        type: string
        description: Unique identifier for the dataset used.
      error_type:
        type: string
        description: Type of error injected (e.g., 'replacement', 'misclassification', 'mcar').
      error_rate:
        type: number
        minimum: 0
        maximum: 1
        description: The rate of error injection applied to the dataset.
      seed:
        type: integer
        description: The random seed used for reproducibility.

  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp when the result was generated.

additionalProperties: false