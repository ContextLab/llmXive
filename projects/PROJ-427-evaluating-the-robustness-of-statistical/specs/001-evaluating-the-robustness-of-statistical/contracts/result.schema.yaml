$schema: "http://json-schema.org/draft-07/schema#"
title: "Inference Result Schema"
description: "Schema for the output of a single statistical test run."
type: "object"
required:
  - "dataset_id"
  - "config_id"
  - "test_type"
  - "p_value"
  - "ci_lower"
  - "ci_upper"
  - "effect_size_estimate"
  - "type_i_event"
  - "ci_covered"
properties:
  dataset_id:
    type: "string"
    description: "Reference to the dataset used."
  config_id:
    type: "string"
    description: "Reference to the error configuration used."
  test_type:
    type: "string"
    enum:
      - "t-test"
      - "anova"
      - "chi-squared"
      - "linear_regression"
    description: "Type of statistical test performed."
  p_value:
    type: "number"
    description: "P-value from the test."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  effect_size_estimate:
    type: "number"
    description: "Estimated effect size (e.g., Cohen's d, beta)."
  type_i_event:
    type: "boolean"
    description: "True if null hypothesis was rejected (p < 0.05) when Null is True."
  ci_covered:
    type: "boolean"
    description: "True if the CI contains the true parameter value."
  iteration:
    type: "integer"
    description: "Simulation iteration number."
additionalProperties: false
