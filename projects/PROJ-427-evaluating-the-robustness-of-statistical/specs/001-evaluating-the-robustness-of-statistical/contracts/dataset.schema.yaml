$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for raw and synthetic datasets used in the robustness evaluation."
type: "object"
required:
  - "id"
  - "source_url"
  - "type"
  - "checksum"
  - "parameters"
properties:
  id:
    type: "string"
    description: "Unique identifier for the dataset."
  source_url:
    type: "string"
    format: "uri"
    description: "Verified URL from which the dataset was downloaded."
  type:
    type: "string"
    enum:
      - "numerical"
      - "categorical"
      - "mixed"
    description: "Primary data type of the dataset."
  checksum:
    type: "string"
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the raw file."
  parameters:
    type: "object"
    description: "Ground truth parameters (for synthetic) or sample stats (for real)."
    properties:
      mean:
        type: "number"
        description: "Population mean (synthetic) or sample mean (real)."
      variance:
        type: "number"
        description: "Population variance (synthetic) or sample variance (real)."
      effect_size:
        type: "number"
        description: "True effect size (synthetic only)."
      sample_size:
        type: "integer"
        description: "Number of observations."
    required:
      - "sample_size"
    additionalProperties: true
additionalProperties: false
