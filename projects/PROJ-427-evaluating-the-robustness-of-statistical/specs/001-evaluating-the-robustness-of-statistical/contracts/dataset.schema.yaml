$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for raw and processed datasets used in the robustness evaluation."
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Unique identifier for the dataset."
  source_url:
    type: "string"
    format: "uri"
    description: "Verified URL where the dataset was downloaded from."
  variable_list:
    type: "array"
    items:
      type: "object"
      properties:
        name:
          type: "string"
        type:
          type: "string"
          enum:
            - "numerical"
            - "categorical"
      required:
        - "name"
        - "type"
  original_checksum:
    type: "string"
    description: "SHA256 checksum of the original raw file."
  error_injection_params:
    type: "object"
    properties:
      error_type:
        type: "string"
        enum:
          - "replacement"
          - "misclassification"
          - "mcar"
      rate:
        type: "number"
        minimum: 0
        maximum: 1
      seed:
        type: "integer"
    required:
      - "error_type"
      - "rate"
      - "seed"
required:
  - "dataset_id"
  - "source_url"
  - "variable_list"
  - "original_checksum"
