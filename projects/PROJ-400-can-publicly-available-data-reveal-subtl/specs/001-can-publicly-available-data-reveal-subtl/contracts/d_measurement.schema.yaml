$schema: "http://json-schema.org/draft-07/schema#"
title: "DMeasurement"
description: "Schema for a single published measurement of the T-violation D-coefficient."
type: "object"
properties:
  nucleus:
    type: "string"
    description: "Name of the nucleus (e.g., '6He', '19Ne')."
  mass_number:
    type: "integer"
    description: "Mass number of the nucleus."
  value:
    type: "number"
    description: "The reported D-coefficient value."
  uncertainty:
    type: "number"
    description: "The reported standard error of the measurement."
  source_experiment:
    type: "string"
    description: "Name of the experiment that produced the measurement."
  reference_id:
    type: "string"
    description: "Citation, DOI, or unique identifier for the source."
  retrieval_status:
    type: "string"
    enum:
      - "success"
      - "failed"
      - "range_inferred"
      - "static_fallback"
    description: "Status of the data retrieval process. 'static_fallback' indicates the value was loaded from the hardcoded reference."
required:
  - nucleus
  - value
  - uncertainty
  - source_experiment
  - reference_id
additionalProperties: false