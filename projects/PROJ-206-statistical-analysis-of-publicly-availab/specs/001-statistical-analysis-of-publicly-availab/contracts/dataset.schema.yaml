%YAML 1.2
---
# Dataset Schema for Poll Aggregation Pipeline
# Defines the structure for raw and cleaned poll data
# Used for validation in src/data/harmonize.py

$schema: http://json-schema.org/draft-07/schema#
title: Poll Dataset Schema
description: Schema for the cleaned poll dataset used in statistical analysis

type: object
properties:
  metadata:
    type: object
    required:
      - poll_id
      - pollster
      - start_date
      - end_date
      - population
      - method
      - candidate_votes
    properties:
      poll_id:
        type: string
        description: "Data source (e.g., FiveThirtyEight)"
      ingestion_date:
        type: string
        format: date-time
        description: "Timestamp of data ingestion"
      version:
        type: string
        description: "Schema version"
      total_records:
        type: integer
        minimum: 0
        description: "Total number of records"
    required:
      - source
      - ingestion_date
      - version
      - total_records

  columns:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        dtype:
          type: string
          enum: [date, string, float, integer]
        description:
          type: string
        required:
          type: boolean
      required:
        - name
        - dtype
        - description
        - required

  constraints:
    type: object
    properties:
      unique_keys:
        type: array
        items:
          type: array
          items:
            type: string
        description: "Combinations of columns that must be unique"
      date_range:
        type: object
        properties:
          min:
            type: string
            format: date
          max:
            type: string
            format: date
      sample_size_min:
        type: integer
        minimum: 1
      vote_share_range:
        type: object
        properties:
          min:
            type: number
            minimum: 0
            maximum: 100
          max:
            type: number
            minimum: 0
            maximum: 100
    required:
      - unique_keys

# Specific column definitions for the cleaned dataset
expected_columns:
  - name: date
    dtype: date
    description: "Date of the poll (ISO 8601)"
    required: true
  - name: pollster
    dtype: string
    description: "Name of the polling organization"
    required: true
  - name: candidate
    dtype: string
    description: "Candidate name"
    required: true
  - name: vote_share
    dtype: float
    description: "Percentage of vote share (0-100)"
    required: true
  - name: sample_size
    dtype: integer
    description: "Number of respondents"
    required: true
  - name: election_cycle
    dtype: string
    description: "Election year or cycle identifier"
    required: true
  - name: historical_rmse
    dtype: float
    description: "Historical RMSE weight for this pollster"
    required: false
  - name: weight
    dtype: float
    description: "Calculated weight for aggregation"
    required: false

required:
  - metadata
  - columns
  - constraints
