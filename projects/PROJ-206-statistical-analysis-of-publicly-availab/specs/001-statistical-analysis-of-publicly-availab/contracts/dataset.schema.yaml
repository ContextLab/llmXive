$schema: http://json-schema.org/draft-07/schema#
title: HarmonizedPollDataSchema
description: >
  Schema for the cleaned and harmonized poll dataset.
  Validates structure after the download and harmonization steps.
type: object
properties:
  metadata:
    type: object
    properties:
      source:
        type: string
        description: "Primary data source (e.g., 'fivethirtyeight')"
      generated_at:
        type: string
        format: date-time
        description: "Timestamp of data generation"
      row_count:
        type: integer
        minimum: 1
        description: "Total number of poll records"
  data:
    type: array
    items:
      type: object
      required:
        - date
        - pollster
        - vote_share
        - sample_size
        - historical_rmse
      properties:
        date:
          type: string
          format: date
          description: "ISO 8601 date of the poll"
        pollster:
          type: string
          description: "Name of the polling organization"
        vote_share:
          type: number
          minimum: 0
          maximum: 100
          description: "Vote share percentage for the leading candidate"
        sample_size:
          type: integer
          minimum: 1
          description: "Number of respondents"
        historical_rmse:
          type: number
          minimum: 0
          description: "Historical RMSE for this pollster (or median default)"
        weight:
          type: number
          minimum: 0
          maximum: 1
          description: "Normalized weight for aggregation"
        source:
          type: string
          enum:
            - "fivethirtyeight"
          description: "Data source (RCP excluded from scope)"
      additionalProperties: false
additionalProperties: false
required:
  - metadata
  - data