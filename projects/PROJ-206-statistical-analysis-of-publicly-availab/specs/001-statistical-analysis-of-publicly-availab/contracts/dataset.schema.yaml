%YAML 1.2
---
# Dataset Schema for Poll Aggregation Pipeline
# Defines the structure for raw and cleaned poll data
# Used for validation in src/data/harmonize.py

$schema: http://json-schema.org/draft-07/schema#
title: Poll Dataset Schema
description: >
  Schema for the harmonized poll dataset produced by src/data/harmonize.py.
  Defines the structure of data/processed/poll_data_cleaned.csv.
type: object
required:
  - columns
  - column_types
  - constraints
properties:
  columns:
    type: array
    description: Ordered list of column names in the final dataset.
    items:
      type: string
    example:
      - date
      - pollster
      - candidate
      - vote_share
      - sample_size
      - mode
      - historical_rmse
  column_types:
    type: object
    description: Mapping of column name to expected data type.
    properties:
      date:
        type: string
        format: date
        description: ISO 8601 date string (YYYY-MM-DD).
      pollster:
        type: string
        description: Name of the polling organization.
      candidate:
        type: string
        description: Candidate name (e.g., 'Democrat', 'Republican', 'Other').
      vote_share:
        type: number
        description: Percentage of vote share (0.0 to 100.0).
      sample_size:
        type: integer
        description: Number of respondents.
      mode:
        type: string
        description: Polling mode (e.g., 'Live Phone', 'Online').
      historical_rmse:
        type: number
        description: Historical RMSE weight for this pollster (non-negative).
    required:
      - date
      - pollster
      - candidate
      - vote_share
      - sample_size
      - historical_rmse
  constraints:
    type: object
    description: Business logic constraints enforced during validation.
    properties:
      unique_pollster_date:
        type: boolean
        description: True if (pollster, date) must be unique.
        default: true
      vote_share_range:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: number
        description: Allowed range [min, max] for vote_share.
        example: [0.0, 100.0]
      sample_size_positive:
        type: boolean
        description: True if sample_size must be > 0.
        default: true
      rmse_non_negative:
        type: boolean
        description: True if historical_rmse must be >= 0.
        default: true
  metadata:
    type: object
    description: Provenance and generation metadata.
    properties:
      poll_id:
        type: string
        description: Original data source (e.g., 'FiveThirtyEight').
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation.
      version:
        type: string
        description: Schema version.
        default: "1.0.0"
additionalProperties: false
