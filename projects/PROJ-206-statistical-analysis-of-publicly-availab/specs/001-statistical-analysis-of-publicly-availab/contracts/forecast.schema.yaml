%YAML 1.2
---
# Forecast Schema for Poll Aggregation Pipeline
# Defines the structure for output forecasts (Frequentist and Bayesian)
# Used for validation in src/models/frequentist.py and src/models/bayesian.py

$schema: http://json-schema.org/draft-07/schema#
title: Forecast Output Schema
description: >
  Schema for the forecast outputs produced by src/models/frequentist.py
  and src/models/bayesian.py. Defines the structure of data/processed/frequentist_forecasts.csv
  and data/processed/bayesian_forecasts.csv.
type: object
required:
  - columns
  - column_types
  - constraints
properties:
  columns:
    type: array
    description: Ordered list of column names in the forecast dataset.
    items:
      type: string
    example:
      - date
      - candidate
      - simple_avg_forecast
      - weighted_avg_forecast
      - bayesian_median
      - bayesian_ci_lower
      - bayesian_ci_upper
      - model_type
  column_types:
    type: object
    description: Mapping of column name to expected data type.
    properties:
      date:
        type: string
        format: date
        description: ISO 8601 date string (YYYY-MM-DD) for the forecast bin.
      candidate:
        type: string
        description: Candidate name (e.g., 'Democrat', 'Republican').
      simple_avg_forecast:
        type: number
        description: Arithmetic mean vote share (0.0 to 100.0).
      weighted_avg_forecast:
        type: number
        description: Inverse-RMSE weighted mean vote share (0.0 to 100.0).
      bayesian_median:
        type: number
        description: Posterior median vote share.
      bayesian_ci_lower:
        type: number
        description: Lower bound of the 95% credible interval.
      bayesian_ci_upper:
        type: number
        description: Upper bound of the 95% credible interval.
      model_type:
        type: string
        description: Type of model used (e.g., 'frequentist', 'bayesian').
    required:
      - date
      - candidate
      - model_type
  constraints:
    type: object
    description: Business logic constraints enforced during validation.
    properties:
      forecast_range:
        type: array
        minItems: 2
        maxItems: 2
        items:
          type: number
        description: Allowed range [min, max] for all forecast values.
        example: [0.0, 100.0]
      ci_ordering:
        type: boolean
        description: True if bayesian_ci_lower <= bayesian_median <= bayesian_ci_upper.
        default: true
      unique_date_candidate_model:
        type: boolean
        description: True if (date, candidate, model_type) must be unique.
        default: true
  metadata:
    type: object
    description: Provenance and generation metadata.
    properties:
      model_version:
        type: string
        description: Version of the model code used.
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation.
      seed:
        type: integer
        description: Random seed used for reproducibility.
      version:
        type: string
        description: Schema version.
        default: "1.0.0"
additionalProperties: false
