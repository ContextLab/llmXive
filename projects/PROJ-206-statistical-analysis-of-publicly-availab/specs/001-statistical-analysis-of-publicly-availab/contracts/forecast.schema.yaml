%YAML 1.2
---
# Forecast Schema for Poll Aggregation Pipeline
# Defines the structure for output forecasts (Frequentist and Bayesian)
# Used for validation in src/models/frequentist.py and src/models/bayesian.py

$schema: http://json-schema.org/draft-07/schema#
title: Forecast Dataset Schema
description: Schema for forecast outputs including point estimates and uncertainty intervals

type: object
properties:
  metadata:
    type: object
    required:
      - date
      - candidate
      - simple_avg_forecast
      - weighted_avg_forecast
    properties:
      date:
        type: string
        format: date
        description: Forecast date (weekly bin)
      candidate:
        type: string
      simple_avg_forecast:
        type: number
        description: Simple unweighted average forecast
      weighted_avg_forecast:
        type: number
        description: Accuracy-weighted average forecast
      ci_lower_95:
        type: number
        description: Lower bound of 95% confidence interval
      ci_upper_95:
        type: number
        description: Upper bound of 95% confidence interval
      n_polls:
        type: integer
        minimum: 1
        description: Number of polls used in aggregation

  bayesian_forecast:
    type: object
    required:
      - date
      - candidate
      - posterior_mean
      - ci_lower_95
      - ci_upper_95
      - r_hat
    properties:
      date:
        type: string
        format: date
      candidate:
        type: string
      posterior_mean:
        type: number
      posterior_median:
        type: number
      ci_lower_95:
        type: number
      ci_upper_95:
        type: number
      r_hat:
        type: number
        maximum: 1.05
        description: Convergence diagnostic (R-hat)
      effective_sample_size:
        type: integer
      predicted_winner:
        type: string
      win_probability:
        type: number
        minimum: 0
        maximum: 1

  evaluation_metrics:
    type: object
    required:
      - method
      - rmse
      - mae
    properties:
      model_type:
        type: string
        enum: [frequentist_simple, frequentist_weighted, bayesian_random_walk]
        description: "Type of model used"
      generation_date:
        type: string
        format: date-time
        description: "Timestamp of forecast generation"
      version:
        type: string
        description: "Schema version"
      election_target:
        type: string
        description: "Target election date or cycle"
    required:
      - model_type
      - generation_date
      - version
      - election_target

  columns:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        dtype:
          type: string
          enum: [date, string, float, integer]
        description:
          type: string
        required:
          type: boolean
      required:
        - name
        - dtype
        - description
        - required

  forecast_types:
    type: object
    properties:
      simple_avg_forecast:
        type: object
        properties:
          description:
            type: string
          columns:
            type: array
            items:
              type: string
      weighted_avg_forecast:
        type: object
        properties:
          description:
            type: string
          columns:
            type: array
            items:
              type: string
      bayesian_forecast:
        type: object
        properties:
          description:
            type: string
          columns:
            type: array
            items:
              type: string
          requires_mcmc:
            type: boolean
    required:
      - simple_avg_forecast

  constraints:
    type: object
    properties:
      date_granularity:
        type: string
        enum: [daily, weekly, monthly]
        description: "Time binning for forecasts"
      vote_share_range:
        type: object
        properties:
          min:
            type: number
            minimum: 0
            maximum: 100
          max:
            type: number
            minimum: 0
            maximum: 100
      credible_interval_level:
        type: number
        minimum: 0
        maximum: 1
        description: "Confidence level for intervals (e.g., 0.95)"
    required:
      - date_granularity

# Specific column definitions for forecast outputs
expected_columns:
  - name: date
    dtype: date
    description: "Forecast date (binned)"
    required: true
  - name: candidate
    dtype: string
    description: "Candidate name"
    required: true
  - name: simple_avg_forecast
    dtype: float
    description: "Simple unweighted average forecast"
    required: false
  - name: weighted_avg_forecast
    dtype: float
    description: "Accuracy-weighted average forecast"
    required: false
  - name: lower_95_ci
    dtype: float
    description: "Lower bound of 95% credible/confidence interval"
    required: false
  - name: upper_95_ci
    dtype: float
    description: "Upper bound of 95% credible/confidence interval"
    required: false
  - name: std_dev
    dtype: float
    description: "Standard deviation of the forecast"
    required: false
  - name: n_polls
    dtype: integer
    description: "Number of polls included in this bin"
    required: false

required:
  - metadata
  - columns
  - constraints