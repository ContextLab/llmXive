$schema: "http://json-schema.org/draft-07/schema#"
title: "Merged Dataset Schema"
description: "Schema for data/processed/merged_data.csv"
type: object
properties:
  user_id:
    type: string
    description: "Unique anonymized user identifier"
  week_number:
    type: integer
    description: "Sequential week number (1, 2, ...)"
    minimum: 1
  adherence_flag:
    type: integer
    description: "Binary adherence (1=active, 0=inactive)"
    enum: [0, 1]
  streak_length:
    type: integer
    description: "Current consecutive weeks of adherence"
    minimum: 0
  dropout_status:
    type: integer
    description: "0=active, 1=dropout (3 weeks), 2=censored"
    enum: [0, 1, 2]
  conscientiousness_score:
    type: number
    description: "Big Five Conscientiousness score (0-100)"
    minimum: 0.0
    maximum: 100.0
  gamified_status:
    type: integer
    description: "Binary gamification status (1=gamified, 0=non-gamified)"
    enum: [0, 1]
required:
  - user_id
  - week_number
  - adherence_flag
  - streak_length
  - dropout_status
  - conscientiousness_score
  - gamified_status
additionalProperties: false
