$schema: "http://json-schema.org/draft-07/schema#"
title: "HabitTrackingDataset"
description: "Schema for the aggregated weekly habit tracking dataset used in analysis."
type: object
properties:
  user_id:
    type: string
    description: "Unique anonymized user identifier."
  gamification_status:
    type: integer
    enum: [0, 1]
    description: "Binary flag: 1 if user uses gamified app, 0 otherwise."
  conscientiousness_score:
    type: number
    minimum: 0
    maximum: 100
    description: "Standardized score for Conscientiousness trait."
  achievement_score:
    type: number
    minimum: 0
    maximum: 100
    description: "Standardized score for Need for Achievement trait (optional)."
  week_number:
    type: integer
    minimum: 1
    description: "Sequential week number starting from 1."
  weekly_adherence_flag:
    type: integer
    enum: [0, 1]
    description: "Binary flag: 1 if user had >= 1 activity event in the week."
  is_censored:
    type: boolean
    description: "True if the user did not drop out by the end of the study period."
  last_active_date:
    type: string
    format: date
    description: "Date of the last recorded activity (for censoring)."
  observation_end:
    type: string
    format: date
    description: "End date of the observation window."
required:
  - user_id
  - gamification_status
  - conscientiousness_score
  - week_number
  - weekly_adherence_flag
  - last_active_date
  - observation_end
additionalProperties: false