$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult"
description: "Schema for the statistical analysis output including model coefficients and survival metrics."
type: object
properties:
  model_type:
    type: string
    enum: ["MixedEffectsLogistic", "CoxPH"]
    description: "Type of statistical model fitted."
  fixed_effects:
    type: object
    description: "Dictionary of fixed effect coefficients."
    additionalProperties:
      type: object
      properties:
        coefficient:
          type: number
        p_value:
          type: number
        confidence_interval:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
      required:
        - coefficient
        - p_value
        - confidence_interval
  interaction_terms:
    type: object
    description: "Specific interaction terms (e.g., Gamified * Conscientiousness)."
    additionalProperties:
      type: object
      properties:
        coefficient:
          type: number
        p_value:
          type: number
        adjusted_p_value:
          type: number
          description: "P-value after multiple comparison correction (FDR)."
      required:
        - coefficient
        - p_value
        - adjusted_p_value
  survival_metrics:
    type: object
    description: "Metrics from Kaplan-Meier and Cox analysis."
    properties:
      log_rank_statistic:
        type: number
      log_rank_p_value:
        type: number
      hazard_ratio:
        type: number
      ci_lower:
        type: number
      ci_upper:
        type: number
  robustness:
    type: object
    description: "Bootstrapping results."
    properties:
      n_iterations:
        type: integer
      mean_effect_size:
        type: number
      std_dev:
        type: number
      ci_95_lower:
        type: number
      ci_95_upper:
        type: number
  metadata:
    type: object
    properties:
      sample_size:
        type: integer
      dropout_events:
        type: integer
      cronbach_alpha:
        type: number
      seed:
        type: integer
      power_limitation_note:
        type: string
        description: "Note on statistical power limitations."
required:
  - model_type
  - fixed_effects
  - metadata
additionalProperties: false
