$schema: "http://json-schema.org/draft-07/schema#"
title: "Gamified Habit Tracking Dataset Schema"
description: |
  Schema definition for the longitudinal dataset used in the study of
  gamified habit tracking effects. Defines required columns, types,
  and validation constraints for data ingestion (FR-001a, FR-001b).

type: object
required:
  - properties
  - requiredColumns

properties:
  version:
    type: string
    const: "1.0.0"
  
  requiredColumns:
    type: array
    items:
      type: string
    description: "List of column names that must be present in the dataset."
    
  properties:
    type: object
    description: "Detailed definitions for each column."
    properties:
      User_ID:
        type: object
        description: "Unique identifier for each participant."
        properties:
          type:
            type: string
            const: "string"
          description:
            type: string
            const: "Unique identifier for the user (UUID or anonymized ID)."
          required:
            type: boolean
            const: true
        required:
          - type
          - description
          - required

      Gamified:
        type: object
        description: "Binary indicator of whether the user uses gamified habit tracking apps."
        properties:
          type:
            type: string
            const: "boolean"
          description:
            type: string
            const: "True if the user reported using gamified apps, False otherwise."
          required:
            type: boolean
            const: true
          validation:
            type: object
            properties:
              min_group_size:
                type: integer
                const: 30
                description: "Minimum required count for the False (non-gamified) group (FR-008)."
        required:
          - type
          - description
          - required

      Adherence:
        type: object
        description: "Binary flag indicating adherence to the habit for a specific observation period."
        properties:
          type:
            type: string
            const: "integer"
          description:
            type: string
            const: "Binary flag (1 = adhered, 0 = did not adhere)."
          required:
            type: boolean
            const: true
          validation:
            type: object
            properties:
              allowed_values:
                type: array
                items:
                  type: integer
                const: [0, 1]
        required:
          - type
          - description
          - required

      Date:
        type: object
        description: "Date of the observation."
        properties:
          type:
            type: string
            const: "datetime"
          format:
            type: string
            const: "YYYY-MM-DD"
          description:
            type: string
            const: "Date of the log entry."
          required:
            type: boolean
            const: true
        required:
          - type
          - format
          - description
          - required

      Week_Number:
        type: object
        description: "Sequential week number derived from the date."
        properties:
          type:
            type: string
            const: "integer"
          description:
            type: string
            const: "Sequential week number (1-based)."
          required:
            type: boolean
            const: true
        required:
          - type
          - description
          - required

      Conscientiousness_Score:
        type: object
        description: "Personality trait score for Conscientiousness."
        properties:
          type:
            type: string
            const: "float"
          description:
            type: string
            const: "Continuous score representing Conscientiousness level."
          required:
            type: boolean
            const: true
          validation:
            type: object
            properties:
              min:
                type: number
                const: 0.0
              max:
                type: number
                const: 100.0
        required:
          - type
          - description
          - required

      Need_For_Achievement:
        type: object
        description: "Personality trait score for Need for Achievement."
        properties:
          type:
            type: string
            const: "float"
          description:
            type: string
            const: "Continuous score representing Need for Achievement."
          required:
            type: boolean
            const: true
          validation:
            type: object
            properties:
              min:
                type: number
                const: 0.0
              max:
                type: number
                const: 100.0
        required:
          - type
          - description
          - required

      Event_Type:
        type: object
        description: "Type of behavioral event logged."
        properties:
          type:
            type: string
          description:
            type: string
            const: "Category of the event (e.g., 'log_in', 'task_complete')."
          required:
            type: boolean
            const: true
        required:
          - type
          - description
          - required

additionalProperties: false