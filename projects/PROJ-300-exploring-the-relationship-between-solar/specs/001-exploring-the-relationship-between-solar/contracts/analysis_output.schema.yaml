$schema: http://json-schema.org/draft-07/schema#
title: Analysis Output Schema
description: Schema for the JSON report generated by the solar wind reconnection analysis pipeline.
type: object
properties:
  metadata:
    type: object
    properties:
      start_date:
        type: string
        format: date
        description: "Start date of the analysis interval (YYYY-MM-DD)."
      end_date:
        type: string
        format: date
        description: "End date of the analysis interval (YYYY-MM-DD)."
      l_phys_minutes:
        type: number
        description: "Physics-based propagation lag calculated as 6371 / Vsw_mean."
      optimal_lag_minutes:
        type: integer
        description: "The lag (30-90 min) that maximizes the absolute correlation."
      lag_difference:
        type: number
        description: "Absolute difference between optimal lag and L_phys."
    required:
      - start_date
      - end_date
      - l_phys_minutes
      - optimal_lag_minutes
      - lag_difference
  correlation:
    type: object
    properties:
      pearson_r:
        type: number
        description: "Pearson correlation coefficient at the optimal lag."
      spearman_r:
        type: number
        description: "Spearman rank correlation coefficient at the optimal lag."
      p_value_permutation:
        type: number
        description: "Empirical p-value from the 10,000 iteration permutation test."
      ci_95_lower:
        type: number
        description: "Lower bound of the 95% bootstrap confidence interval."
      ci_95_upper:
        type: number
        description: "Upper bound of the 95% bootstrap confidence interval."
    required:
      - pearson_r
      - spearman_r
      - p_value_permutation
      - ci_95_lower
      - ci_95_upper
  sensitivity:
    type: array
    items:
      type: object
      properties:
        threshold_kms:
          type: integer
          description: "Solar wind speed threshold (400, 500, or 600 km/s)."
        n_samples:
          type: integer
          description: "Number of data points above the threshold."
        pearson_r:
          type: number
          description: "Correlation coefficient for the subset above the threshold."
      required:
        - threshold_kms
        - n_samples
        - pearson_r
  data_quality:
    type: object
    properties:
      total_minutes_analyzed:
        type: integer
        description: "Total duration of the analysis in minutes."
      gaps_detected:
        type: boolean
        description: "True if any gaps > 30 minutes were found."
      warnings:
        type: array
        items:
          type: string
        description: "List of data quality warnings."
    required:
      - total_minutes_analyzed
      - gaps_detected
      - warnings
required:
  - metadata
  - correlation
  - sensitivity
  - data_quality
