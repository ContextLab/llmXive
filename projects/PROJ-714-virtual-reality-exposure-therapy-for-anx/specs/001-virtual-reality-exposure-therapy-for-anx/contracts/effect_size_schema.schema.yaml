$schema: "http://json-schema.org/draft-07/schema#"
title: "Effect Size Schema"
description: "Schema for computed Hedges' g effect sizes."
type: "object"
required:
  - study_id
  - hedges_g
  - se_g
  - ci_lower
  - ci_upper
  - computation_method
properties:
  study_id:
    type: "string"
    description: "Reference to the source study."
  hedges_g:
    type: "number"
    description: "Hedges' g effect size with small-sample correction."
  se_g:
    type: "number"
    description: "Standard error of the effect size."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  computation_method:
    type: "string"
    const: "Hedges_Olkin_1985"
    description: "Method used for computation."
additionalProperties: false
