$schema: "http://json-schema.org/draft-07/schema#"
title: "Meta-Analysis Result Schema"
description: "Schema for aggregated meta-analysis results."
type: object
required:
  - pooled_hedges_g
  - tau_squared
  - i_squared
  - publication_bias_flag
  - estimator_used
properties:
  pooled_hedges_g:
    type: number
    description: "Pooled Hedges' g effect size."
  tau_squared:
    type: number
    description: "Between-study variance (tau-squared)."
  i_squared:
    type: number
    description: "Heterogeneity proportion (I-squared) as a percentage (0-100)."
  egger_test_p:
    type:
      - number
      - "null"
    description: "P-value for Egger's test (null if N < 10)."
  publication_bias_flag:
    type: boolean
    description: "Flag indicating if publication bias is suspected (p < 0.10)."
  trim_fill_adjusted_g:
    type:
      - number
      - "null"
    description: "Trim-and-fill adjusted effect size if bias was detected; null otherwise."
  sensitivity_analysis:
    type: array
    description: "List of leave-one-out analysis results."
    items:
      type: object
      properties:
        excluded_study_id:
          type: string
        new_pooled_g:
          type: number
  sample_size:
    type: integer
    description: "Number of studies included in the analysis."
  estimator_used:
    type: string
    enum:
      - "REML"
      - "DL"
    description: "The estimator used for the random-effects model."
  knap_hartung_applied:
    type: boolean
    description: "Indicates if Knapp-Hartung adjustment was applied to confidence intervals."