$schema: http://json-schema.org/draft-07/schema#
title: Cleaned Diffusion Dataset Schema
description: Schema for data/processed/dataset_cleaned.csv generated by code/02_preprocess.py
type: object
properties:
  structure:
    type: string
    enum: ["BCC"]
    description: Crystal structure, must be BCC
  solute:
    type: string
    enum: ["C"]
    description: Solute element, must be Carbon
  microstructure_controlled:
    type: boolean
    description: Flag indicating if microstructure was controlled
  single_crystal:
    type: boolean
    description: Flag indicating if sample was single crystal
  Fe:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Normalized atomic fraction of Iron
  C:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Normalized atomic fraction of Carbon
  Cr:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Normalized atomic fraction of Chromium (if present)
  Ni:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Normalized atomic fraction of Nickel (if present)
  Mn:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Normalized atomic fraction of Manganese (if present)
  atomic_radius_variance:
    type: number
    minimum: 0.0
    description: Variance of atomic radii of constituent elements
  VEC:
    type: number
    minimum: 0.0
    description: Valence Electron Concentration
  electronegativity_spread:
    type: number
    minimum: 0.0
    description: Standard deviation of electronegativity
  diffusion_coefficient:
    type: number
    minimum: 0.0
    description: Original diffusion coefficient (m^2/s)
  log_diffusion_coefficient:
    type: number
    description: Log10 transformed diffusion coefficient
required:
  - structure
  - solute
  - microstructure_controlled
  - single_crystal
  - Fe
  - C
  - atomic_radius_variance
  - VEC
  - electronegativity_spread
  - log_diffusion_coefficient
