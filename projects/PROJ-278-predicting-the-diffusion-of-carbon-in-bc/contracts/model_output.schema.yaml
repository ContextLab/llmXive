$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: Schema for model_results.json, feature_importance.json, and variance_partition.csv outputs.
type: object
required:
  - model_results
  - feature_importance
  - variance_partition
properties:
  model_results:
    type: object
    description: Metrics for the best model and baseline comparison.
    required:
      - best_model_name
      - r2
      - rmse
      - mae
      - permutation_p_value
      - baseline_r2
      - baseline_rmse
      - baseline_mae
    properties:
      best_model_name:
        type: string
        description: Name of the best performing model (e.g., "RandomForest", "XGBoost").
      r2:
        type: number
        description: R-squared score on the test set.
      rmse:
        type: number
        description: Root Mean Squared Error on the test set.
      mae:
        type: number
        description: Mean Absolute Error on the test set.
      permutation_p_value:
        type: number
        description: P-value from the permutation test comparing ML model vs Elastic Net.
      baseline_r2:
        type: number
        description: R-squared score of the Elastic Net baseline.
      baseline_rmse:
        type: number
        description: RMSE of the Elastic Net baseline.
      baseline_mae:
        type: number
        description: MAE of the Elastic Net baseline.
  feature_importance:
    type: object
    description: Ranked feature importance based on SHAP values.
    required:
      - top_features
      - shap_summary
    properties:
      top_features:
        type: array
        description: List of top features ranked by mean absolute SHAP value.
        items:
          type: object
          properties:
            feature:
              type: string
            mean_abs_shap:
              type: number
      shap_summary:
        type: object
        description: Summary statistics of SHAP values.
        properties:
          mean_shap:
            type: object
            additionalProperties:
              type: number
  variance_partition:
    type: object
    description: Variance partitioning results.
    required:
      - total_variance
      - composition_explainable
      - residual_variance
      - adjusted_r2_upper_bound
    properties:
      total_variance:
        type: number
      composition_explainable:
        type: number
      residual_variance:
        type: number
      adjusted_r2_upper_bound:
        type: number
      residual_description:
        type: string
        description: Explanation of residual variance components.
