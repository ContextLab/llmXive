$schema: http://json-schema.org/draft-07/schema#
title: ViolationConfig
description: >-
  Schema for defining parameters of induced statistical assumption violations
  used in User Story 2 (Bias Mapping).
type: object
required:
  - violation_type
  - magnitude
  - seed
properties:
  violation_type:
    type: string
    enum: [heavy_tailed, ar1_autocorrelation, effect_size_heterogeneity]
    description: Type of violation being induced.
  magnitude:
    type: object
    description: Parameters specific to the violation type.
    properties:
      # For heavy_tailed: contamination rate and degrees of freedom
      contamination_rate:
        type: number
        minimum: 0
        maximum: 1
        description: Proportion of data points replaced by heavy-tailed noise.
      df:
        type: number
        minimum: 1
        description: Degrees of freedom for the t-distribution (lower = heavier tails).
      # For ar1_autocorrelation: AR coefficient
      ar_coefficient:
        type: number
        minimum: -1
        maximum: 1
        description: Autoregressive coefficient for AR(1) process.
      # For effect_size_heterogeneity: mixing ratio and separation
      mixing_ratio:
        type: number
        minimum: 0
        maximum: 1
        description: Proportion of the second sub-population.
      separation_sd:
        type: number
        minimum: 0
        description: Separation distance between sub-population means in standard deviations.
    required: []
    # Note: Required fields depend on violation_type, enforced at application logic
  seed:
    type: integer
    description: Random seed for the perturbation process.
  dataset_id:
    type: string
    description: ID of the dataset this configuration applies to.
  notes:
    type: string
    description: Optional notes about the configuration.
additionalProperties: false
