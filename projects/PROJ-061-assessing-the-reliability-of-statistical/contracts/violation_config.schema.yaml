$schema: http://json-schema.org/draft-07/schema#
title: ViolationConfig
description: Schema for configuration of induced violations in User Story 2.
type: object
required:
  - violation_type
  - parameters
properties:
  violation_type:
    type: string
    enum: [heavy_tailed_noise, ar1_autocorrelation, effect_size_heterogeneity]
    description: Type of assumption violation to induce.
  parameters:
    type: object
    description: Parameters specific to the violation type.
    properties:
      contamination_rate:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: For heavy-tailed noise, the rate of contamination.
      ar_coefficient:
        type: number
        minimum: -1.0
        maximum: 1.0
        description: For AR(1), the autocorrelation coefficient.
      mixing_ratio:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: For heterogeneity, the ratio of the second sub-population.
      separation_distance:
        type: number
        description: For heterogeneity, the separation in standard deviations.
    additionalProperties: true
additionalProperties: false
