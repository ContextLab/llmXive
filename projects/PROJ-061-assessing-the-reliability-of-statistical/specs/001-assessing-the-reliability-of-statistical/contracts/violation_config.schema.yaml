$schema: "http://json-schema.org/draft-07/schema#"
title: "ViolationConfig"
description: "Schema for configuration of induced assumption violations."
type: "object"
required:
  - type
  - parameter
properties:
  type:
    type: "string"
    enum:
      - "heavy_tail"
      - "autocorrelation"
      - "heterogeneity"
    description: "Type of violation to induce."
  parameter:
    type: "number"
    description: "Magnitude parameter (e.g., df for t-dist, AR coefficient)."
  achieved_magnitude:
    type: "number"
    description: "Actual measured magnitude after injection (FR-009)."
  applied:
    type: "boolean"
    description: "Whether the violation was successfully applied to the dataset."
  description:
    type: "string"
    description: "Human-readable description of the violation setup."
