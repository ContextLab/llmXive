$schema: "http://json-schema.org/draft-07/schema#"
title: "NavigationResult"
description: "Schema for a single episode outcome."
type: "object"
properties:
  episode_id:
    type: "integer"
    description: "Episode index within the run."
  run_id:
    type: "string"
    format: "uuid"
    description: "Foreign key to the TrainingRun."
  success:
    type: "boolean"
    description: "Whether the episode was completed successfully."
  path_length:
    type: "number"
    minimum: 0.0
    description: "Length of the path taken by the agent (meters)."
  collision_count:
    type: "integer"
    minimum: 0
    description: "Number of collisions during the episode."
  inference_latency_ms:
    type: "number"
    minimum: 0.0
    description: "Time taken for one inference step (ms)."
  optimal_path_length:
    type: "number"
    minimum: 0.0
    description: "Length of the optimal path (from Dijkstra)."
  path_optimality_ratio:
    type: "number"
    minimum: 0.0
    description: "Ratio of agent path to optimal path."
required:
  - episode_id
  - run_id
  - success
  - path_length
  - collision_count
  - inference_latency_ms
  - optimal_path_length
  - path_optimality_ratio
additionalProperties: false