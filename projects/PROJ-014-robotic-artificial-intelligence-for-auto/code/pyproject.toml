[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "robotic-ai-sensory-fidelity"
version = "0.1.0"
description = "Robotic AI Sensory Fidelity Ablation Study"
requires-python = ">=3.11"
dependencies = [
    "torch==2.0.1+cpu",
    "gymnasium==0.29.1",
    "stable-baselines3==2.1.0",
    "opencv-python==4.8.1.78",
    "scikit-learn==1.3.2",
    "pandas==2.1.4",
    "numpy==1.26.2",
    "pytest>=7.4.0",
    "pytest-timeout>=2.2.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "psutil>=5.9.0"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "PIE", "RET", "SIM"]
ignore = ["E501", "B008"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "venv",
    ".venv",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short --strict-markers"
markers =
    "unit: Unit tests"
    "integration: Integration tests"
    "contract: Contract tests"
    "slow: Slow running tests"
filterwarnings =
    "ignore::DeprecationWarning"
    "ignore::PendingDeprecationWarning"
timeout = 300
asyncio_mode = "auto"