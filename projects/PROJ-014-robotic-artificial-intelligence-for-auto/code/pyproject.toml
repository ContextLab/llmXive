[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "robotic-ai-sensory-fidelity-ablation"
version = "0.1.0"
description = "Robotic AI Sensory Fidelity Ablation Study"
requires-python = ">=3.11"
dependencies = [
    "torch==2.0.1+cpu",
    "gymnasium==0.29.1",
    "stable-baselines3==2.1.0",
    "opencv-python==4.8.1.78",
    "scikit-learn==1.3.2",
    "pandas==2.1.4",
    "numpy==1.26.2",
    "ruff==0.1.6",
    "black==23.11.0",
]

[tool.ruff]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes by default.
select = ["E", "F", "W", "I", "N", "B", "C4", "UP", "ARG", "SIM"]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
    "SIM105", # Use contextlib.suppress() (optional preference)
]

# Allow autofix for all enabled rules (when `--fix` is provided).
fixable = ["ALL"]
unfixable = []

# Exclude a few files/directories from linting.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "code/results",
    "code/data",
]

# Same as the default for `--line-length`.
line-length = 100

# Assume Python 3.11
target-version = "py311"

[tool.ruff.per-file-ignores]
"code/tests/*" = ["ARG001", "S101"] # Allow assert in tests, unused args in fixtures

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | node_modules
  | venv
  | code/results
  | code/data
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
skip = [".git", ".hg", ".mypy_cache", ".tox", ".venv", "build", "dist", "node_modules", "venv", "code/results", "code/data"]