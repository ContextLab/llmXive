$schema: "http://json-schema.org/draft-07/schema#"
title: "GAMM Model Results"
description: "Schema for the output of the Generalized Additive Mixed Model fitting."
type: "object"
properties:
  species_id:
    type: "string"
  grid_cell:
    type: "string"
  model_id:
    type: "string"
    description: "Unique identifier for the model run."
  term:
    type: "string"
    description: "Predictor name (e.g., \"temp_smooth\")."
  estimate:
    type: "float"
    description: "Coefficient or smooth effect estimate."
  p_value:
    type: "float"
 description: "Permutation‑derived p‑value based on [deferred] shuffles."
  fdr_q_value:
    type: "float"
    description: "Benjamini–Hochberg corrected q‑value."
  aic:
    type: "float"
    description: "Axiom Akaike Information Criterion (A2)."
  r_squared:
    type: "float"
    description: "Coefficient of  R  2  ​  “  “  "  "  "  "



