$schema: "http://json-schema.org/draft-07/schema#"
title: "Synthetic Bird Migration and Climate Dataset Schema"
description: "Schema for the synthetic dataset used to validate the pipeline. Matches the structure of eBird and NOAA/PRISM data."
type: "object"
properties:
  migration_records:
    type: "array"
    description: "Array of bird observation records"
    items:
      type: "object"
      properties:
        species:
          type: "string"
          description: "Scientific name of the bird species"
        latitude:
          type: "number"
          description: "Latitude in decimal degrees (WGS84)"
          minimum: -90
          maximum: 90
        longitude:
          type: "number"
          description: "Longitude in decimal degrees (WGS84)"
          minimum: -180
          maximum: 180
        date:
          type: "string"
          format: "date"
          description: "Observation date (YYYY-MM-DD)"
        count:
          type: "integer"
          description: "Number of individuals observed"
          minimum: 1
        checklist_id:
          type: "string"
          description: "Unique checklist identifier"
        grid_cell:
          type: "string"
          description: "Grid cell identifier (lat_lon format)"
      required:
        - species
        - latitude
        - longitude
        - date
        - count
        - checklist_id
        - grid_cell
  climate_records:
    type: "array"
    description: "Array of climate records per grid cell and week"
    items:
      type: "object"
      properties:
        grid_cell:
          type: "string"
          description: "Grid cell identifier (lat_lon format)"
        week:
          type: "integer"
          description: "ISO week number (1-52)"
          minimum: 1
          maximum: 52
        year:
          type: "integer"
          description: "Year of observation"
          minimum: 2020
          maximum: 2024
        mean_temp:
          type: "number"
          description: "Mean temperature in Celsius"
        total_precip:
          type: "number"
          description: "Total precipitation in mm"
        extreme_idx:
          type: "number"
          description: "Extreme weather index (0.0 to 1.0)"
          minimum: 0
          maximum: 1
        imputed:
          type: "boolean"
          description: "True if value was interpolated"
      required:
        - grid_cell
        - week
        - year
        - mean_temp
        - total_precip
        - extreme_idx
        - imputed
required:
  - migration_records
  - climate_records
