[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "bird-migration-analysis"
version = "0.1.0"
description = "Statistical Analysis of Publicly Available Bird Migration Patterns and Climate Change"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "pyarrow>=12.0.0",
    "scipy>=1.10.0",
    "joblib>=1.3.0",
    "pyyaml>=6.0",
    "pytest>=7.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
lint.select = ['E', 'F', 'W', 'I']
lint.ignore = []
