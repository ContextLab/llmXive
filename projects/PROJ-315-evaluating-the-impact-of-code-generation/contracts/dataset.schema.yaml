$schema: http://json-schema.org/draft-07/schema#
title: GitHub PR Dataset Schema
description: >
  Schema defining the required fields for the GitHub PR dataset used in
  evaluating the impact of code generation on code review quality.
  This schema aligns with the data model from specs/001-evaluating-the-impact-of-code-generation.
type: object
required:
  - code_diff
  - review_comments
  - merge_timestamp
  - project_metadata
properties:
  code_diff:
    type: string
    description: >
      The unified diff string representing the code changes in the pull request.
      Contains added and removed lines with +/- prefixes.
    minLength: 1
    examples:
      - |+
        @@ -1,3 +1,4 @@
        def hello():
        -    print("Hello")
        +    # Generated by Copilot
        +    print("Hello World")

  review_comments:
    type: array
    description: >
      List of review comments associated with the pull request.
      Each comment represents a single review interaction.
    items:
      type: object
      required:
        - comment_id
        - author
        - body
        - timestamp
        - path
      properties:
        comment_id:
          type: string
          description: Unique identifier for the review comment.
        author:
          type: string
          description: Username of the comment author.
        body:
          type: string
          description: The text content of the review comment.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the comment was created.
        path:
          type: string
          description: File path where the comment was made (if applicable).
        line_number:
          type: integer
          description: Line number in the file where the comment was made (if applicable).
          minimum: 0
        reply_to:
          type: string
          nullable: true
          description: ID of the comment this is a reply to, if any.

  merge_timestamp:
    type: string
    format: date-time
    description: >
      ISO 8601 timestamp indicating when the pull request was merged into the base branch.
      Null if the PR is still open or was closed without merging.
    examples:
      - "2024-01-15T14:30:00Z"

  project_metadata:
    type: object
    description: Metadata about the repository and pull request context.
    required:
      - repo_name
      - pr_number
      - base_branch
      - head_branch
      - author
      - created_at
    properties:
      repo_name:
        type: string
        description: Full repository name (owner/repo).
        pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"
        examples:
          - "microsoft/vscode"
          - "facebook/react"

      pr_number:
        type: integer
        description: The pull request number within the repository.
        minimum: 1
        examples:
          - 12345

      base_branch:
        type: string
        description: The target branch the PR was merged into.
        examples:
          - "main"
          - "master"
          - "develop"

      head_branch:
        type: string
        description: The source branch the PR was created from.
        examples:
          - "feature/new-component"
          - "bugfix/memory-leak"

      author:
        type: string
        description: Username of the pull request author.
        examples:
          - "octocat"
          - "dependabot[bot]"

      created_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp when the PR was created.

      labels:
        type: array
        description: List of labels applied to the pull request.
        items:
          type: string
        examples:
          - ["bug", "good first issue"]

      is_draft:
        type: boolean
        description: Whether the PR was created as a draft.
        default: false

  # Optional derived fields (may be populated during preprocessing)
  complexity_metrics:
    type: object
    description: Code complexity metrics calculated during preprocessing.
    required:
      - cyclomatic_complexity
      - lines_of_code
    properties:
      cyclomatic_complexity:
        type: number
        description: Cyclomatic complexity score of the changed code.
        minimum: 0
      lines_of_code:
        type: integer
        description: Number of lines of code in the diff (excluding whitespace).
        minimum: 0
      added_lines:
        type: integer
        description: Number of lines added.
        minimum: 0
      removed_lines:
        type: integer
        description: Number of lines removed.
        minimum: 0

  # Classification fields
  classification:
    type: object
    description: Classification results from the keyword matching heuristic.
    required:
      - is_llm_generated
      - keyword_matches
      - match_count
    properties:
      is_llm_generated:
        type: boolean
        description: Whether the PR is classified as LLM-generated based on keywords.
      keyword_matches:
        type: array
        description: List of keywords found in the PR metadata or diff.
        items:
          type: string
      match_count:
        type: integer
        description: Total count of keyword matches found.
        minimum: 0

  # Audit fields
  audit:
    type: object
    description: Human audit results if the PR was selected for manual review.
    properties:
      selected_for_audit:
        type: boolean
        description: Whether this PR was selected for manual audit.
      human_label:
        type: boolean
        nullable: true
        description: Human-verified classification label (null if not audited).
      audit_notes:
        type: string
        nullable: true
        description: Notes from the human auditor.

additionalProperties: true