$schema: http://json-schema.org/draft-07/schema#
title: Statistical Analysis Output Schema
description: >
  Defines the structure of statistical result artifacts generated by the
  analysis pipeline (User Story 2). This schema ensures reproducibility and
  standardization of output files like `data/stats_results.json`.
type: object
required:
  - metadata
  - tests
  - regression
  - power_analysis
  - sensitivity
additionalProperties: false

metadata:
  type: object
  description: Execution context and provenance information.
  required:
    - timestamp
    - seed
    - dataset_hash
    - schema_version
  properties:
    timestamp:
      type: string
      format: date-time
      description: ISO 8601 timestamp of when the analysis was run.
    seed:
      type: integer
      description: The random seed used for this execution (must match config).
    dataset_hash:
      type: string
      description: SHA-256 checksum of the input dataset artifact (from T004).
    schema_version:
      type: string
      description: Version of this output schema (e.g., "1.0.0").
    correction_method:
      type: string
      enum: ["bonferroni", "benjamini_hochberg"]
      description: The multiple comparison correction method used.

tests:
  type: object
  description: Results of Mann-Whitney U tests for all defined metrics.
  additionalProperties:
    type: object
    required:
      - metric_name
      - group_1
      - group_2
      - statistic
      - p_value
      - p_value_corrected
      - significant_at_alpha_005
      - effect_size_cliff_delta
    properties:
      metric_name:
        type: string
        description: Name of the metric being tested (e.g., "comment_count").
      group_1:
        type: string
        description: Label for the first group (e.g., "llm_generated").
      group_2:
        type: string
        description: Label for the second group (e.g., "human_written").
      statistic:
        type: number
        description: The Mann-Whitney U statistic.
      p_value:
        type: number
        description: Raw p-value from the test.
      p_value_corrected:
        type: number
        description: P-value after multiple comparison correction.
      significant_at_alpha_005:
        type: boolean
        description: True if p_value_corrected < 0.05.
      effect_size_cliff_delta:
        type: number
        description: Cliff's Delta effect size (magnitude of difference).

regression:
  type: object
  description: Linear regression results with complexity covariates.
  required:
    - model_summary
    - coefficients
    - diagnostics
  properties:
    model_summary:
      type: object
      properties:
        r_squared:
          type: number
        adj_r_squared:
          type: number
        f_statistic:
          type: number
        f_p_value:
          type: number
    coefficients:
      type: array
      items:
        type: object
        required:
          - feature
          - coefficient
          - std_error
          - t_statistic
          - p_value
        properties:
          feature:
            type: string
          coefficient:
            type: number
          std_error:
            type: number
          t_statistic:
            type: number
          p_value:
            type: number
    diagnostics:
      type: object
      required:
        - vif_scores
        - collinearity_warning
      properties:
        vif_scores:
          type: object
          description: Variance Inflation Factor for each predictor.
          additionalProperties:
            type: number
        collinearity_warning:
          type: boolean
          description: True if any VIF > 5.

power_analysis:
  type: object
  description: Post-hoc power analysis results.
  required:
    - test_type
    - alpha
    - achieved_power
    - effect_size_observed
    - sample_sizes
  properties:
    test_type:
      type: string
      const: "mann_whitney_u"
    alpha:
      type: number
      const: 0.05
    achieved_power:
      type: number
      description: Calculated power of the test given the observed effect size and sample.
    effect_size_observed:
      type: number
      description: Observed effect size (e.g., Cohen's d or Cliff's delta).
    sample_sizes:
      type: object
      required:
        - group_1_n
        - group_2_n
      properties:
        group_1_n:
          type: integer
        group_2_n:
          type: integer
    interpretation:
      type: string
      description: Textual interpretation of the power result (e.g., "Sufficient", "Underpowered").

sensitivity:
  type: object
  description: Results from the keyword threshold sensitivity analysis.
  required:
    - threshold_range
    - results
  properties:
    threshold_range:
      type: array
      items:
        type: integer
      description: List of keyword thresholds swept (e.g., [1, 2, 3, 4, 5]).
    results:
      type: array
      items:
        type: object
        required:
          - threshold
          - group_sizes
          - significant_metrics
        properties:
          threshold:
            type: integer
          group_sizes:
            type: object
            properties:
              llm_generated_n:
                type: integer
              human_written_n:
                type: integer
          significant_metrics:
            type: array
            items:
              type: string
            description: List of metric names that remained significant at this threshold.