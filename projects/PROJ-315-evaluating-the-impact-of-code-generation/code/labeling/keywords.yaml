# LLM-Associated Keywords for Code Classification
# FR-002: Explicit list of keywords used to classify commits as AI-generated
# A commit is classified as LLM-generated if the commit message contains
# at least 2 occurrences of keywords from this list (case-insensitive).

keywords:
  - "copilot"
  - "generated by llm"
  - "ai code"
  - "github copilot"
  - "code generated by"
  - "ai generated"
  - "artificial intelligence"
  - "llm generated"
  - "generated by ai"
  - "copilot suggested"
  - "copilot completed"
  - "copilot accepted"
  - "ai assistance"
  - "machine learning generated"
  - "neural code generation"
  - "code assistant"
  - "ai code generation"
  - "automated code generation"
  - "llm code"
  - "ai-assisted"

# Threshold configuration
# Minimum number of keyword matches required to classify a commit as LLM-generated
classification_threshold: 2

# Case sensitivity configuration
# If true, matching is case-insensitive
case_insensitive: true