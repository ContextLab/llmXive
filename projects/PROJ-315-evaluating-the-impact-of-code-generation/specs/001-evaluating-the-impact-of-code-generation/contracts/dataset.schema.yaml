$schema: "http://json-schema.org/draft-07/schema#"
title: "PR Dataset Schema"
type: "object"
properties:
  pr_id:
    type: "string"
    description: "Unique identifier for the pull request"
  code_diff:
    type: "string"
    description: "Full code diff text for the pull request"
  review_comments:
    type: "array"
    items:
      type: "string"
    description: "List of review comment texts"
  merge_timestamp:
    type: "string"
    format: "date-time"
    description: "Timestamp when the pull request was merged"
  project_metadata:
    type: "object"
    description: "Project metadata including repository name and language"
  code_group:
    type: "string"
    enum:
      - "Keyword-Associated"
      - "Human"
    description: "Classification label based on commit message heuristics (Keyword-Associated vs Human)"
  comment_count:
    type: "integer"
    description: "Number of review comments"
  sentiment_score:
    type: "number"
    description: "Average sentiment score of review comments"
  merge_latency:
    type: "number"
    description: "Time from PR creation to merge in hours"
  cyclomatic_complexity:
    type: "number"
    description: "Average cyclomatic complexity of code files"
  lines_of_code:
    type: "integer"
    description: "Total lines of code in PR"
  classification_accuracy:
    type: "number"
    description: "Estimated accuracy of heuristic classification from manual audit"
required:
  - pr_id
  - code_diff
  - review_comments
  - merge_timestamp
  - project_metadata
  - code_group
  - comment_count
  - sentiment_score
  - merge_latency
  - cyclomatic_complexity
  - lines_of_code
additionalProperties: false