[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cbnrm-effectiveness"
version = "0.1.0"
description = "Evaluating CBNRM vs State-Led Management Effectiveness"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.3",
    "numpy>=1.24.3",
    "statsmodels>=0.14.0",
    "matplotlib>=3.7.2",
    "requests>=2.31.0",
    "pyyaml>=6.0.1",
    "pytest>=7.4.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.setuptools]
packages = ["code"]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["code"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
