[flake8]
max-line-length = 88
extend-ignore = E203, E501, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info
per-file-ignores =
    # Allow unused imports in __init__.py for exposing API
    code/__init__.py: F401
    code/utils/__init__.py: F401

[isort]
profile = black
line_length = 88
skip_gitignore = true
known_first_party = code
default_section = THIRDPARTY

[black]
line-length = 88
target-version = py39
include = \.pyi?$
exclude = |
    (
      __pycache__
      | .git
      | .eggs
      | build
      | dist
    )
