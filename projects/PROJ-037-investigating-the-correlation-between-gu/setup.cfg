[flake8]
# Configuration for flake8 linting
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .venv,
    venv,
    data/,
    docs/
per-file-ignores =
    # Allow unused imports in __init__.py for public API exposure
    code/__init__.py:F401
    code/utils/__init__.py:F401
count = true
statistics = true
show-source = true
max-complexity = 10

[isort]
# Configuration for isort import sorting
profile = black
line_length = 88
known_first_party = code
known_third_party = pandas, numpy, sklearn, scipy, biom, skbio, statsmodels, requests, matplotlib, seaborn, biopython
skip = .git,__pycache__,build,dist,.venv,venv,data,docs

[tool:pytest]
# Configuration for pytest
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short --cov=code --cov-report=term-missing
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning