      UniTok'.
    severity: writing
  - id: ac627bd33465
    text: Resolve the inconsistency in storage efficiency calculations. Section 4.2.2
      claims 1/96 compression based on 64 pixels/code (8x8 downsampling), but Section
      3.2 and Appendix specify maintaining 16x16 downsampling (256 pixels/code). Recalculate
      the compression ratio or clarify the downsampling factor to ensure the efficiency
      claim is mathematically consistent with the architecture.
    severity: science
  - id: 715d4f95b609
    text: Abstract and Introduction claim ViQ ranks 'first among mainstream discrete
      visual autoencoders' for reconstruction quality. However, Table 2 shows UniTok
      achieves superior PSNR (25.32 vs 22.73) and rFID (0.37 vs 0.62). The Results
      section correctly states 'second only to UniTok'. Update Abstract/Intro to align
      with the data.
    severity: writing
  - id: 385f7efe3a23
    text: Figure 1 caption and Introduction claim 'state-of-the-art performance compared
