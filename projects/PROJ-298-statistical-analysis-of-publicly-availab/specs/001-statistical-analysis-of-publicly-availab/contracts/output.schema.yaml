$schema: "http://json-schema.org/draft-07/schema#"
title: "Trend Analysis Output"
description: "Schema for the final trend analysis results including Mann-Kendall test outcomes."
type: object
properties:
  tag:
    type: string
    description: "Normalized tag name."
  trend_slope:
    type: number
    description: "Theil-Sen slope estimator (change per month)."
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: "P-value from the Modified Mann-Kendall test."
  classification:
    type: string
    enum:
      - "Growth"
      - "Decline"
      - "Stable"
      - "Insufficient Data"
    description: "Classification based on p-value and power analysis."
  power:
    type: number
    minimum: 0
    maximum: 1
    description: "Post-hoc power estimate."
  confidence_interval_lower:
    type: number
    description: "Lower bound of 95% CI for slope."
  confidence_interval_upper:
    type: number
    description: "Upper bound of 95% CI for slope."
required:
  - tag
  - trend_slope
  - p_value
  - classification
  - power
additionalProperties: false
