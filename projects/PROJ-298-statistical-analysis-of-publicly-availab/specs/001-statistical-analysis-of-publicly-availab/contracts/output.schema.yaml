$schema: "http://json-schema.org/draft-07/schema#"
title: "Trend Analysis Results"
description: "Schema for the output of the Modified Mann-Kendall test (artifacts/trend_results.json)"
type: "array"
items:
  type: "object"
  properties:
    tag_name:
      type: "string"
    slope:
      type: "number"
      description: "Theil-Sen slope estimator"
    p_value:
      type: "number"
      description: "Benjamini-Hochberg adjusted p-value"
    classification:
      type: "string"
      enum:
        - "Growth"
        - "Decline"
        - "Stable"
        - "Insufficient Power"
    ci_lower:
      type: "number"
      description: "95% Confidence interval lower bound"
    ci_upper:
      type: "number"
      description: "95% Confidence interval upper bound"
    power_status:
      type: "string"
      enum:
        - "Adequate"
        - "Low"
    mdes:
      type: "number"
      description: "Minimum Detectable Effect Size calculated for N=108, alpha=0.05, power=0.8"
  required:
    - tag_name
    - slope
    - p_value
    - classification
    - ci_lower
    - ci_upper
    - power_status
    - mdes
  additionalProperties: false