$schema: http://json-schema.org/draft-07/schema#
title: Monthly Tag Counts Schema
description: >-
  Schema for the aggregated monthly frequency counts of Stack Overflow tags.
  Used to validate the output of the preprocess step.
type: object
properties:
  tag_name:
    type: string
    description: "Normalized tag name (lowercase, trimmed)."
    pattern: "^[a-z0-9-]+$"
  month:
    type: string
    description: "Month in YYYY-MM format."
    pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
  frequency:
    type: integer
    description: "Count of posts with this tag in this month."
    minimum: 0
required:
  - tag_name
  - month
  - frequency
additionalProperties: false