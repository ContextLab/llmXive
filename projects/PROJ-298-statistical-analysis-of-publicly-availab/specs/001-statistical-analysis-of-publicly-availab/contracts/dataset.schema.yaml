$schema: "http://json-schema.org/draft-07/schema#"
title: "Monthly Tag Frequency Dataset"
description: "Schema for the processed monthly tag frequency data used in trend analysis."
type: object
properties:
  tag:
    type: string
    description: "Normalized tag name (lowercase, trimmed)."
  month:
    type: string
    format: date
    description: "Month of the frequency count (YYYY-MM-01)."
  count:
    type: integer
    minimum: 0
    description: "Number of posts with this tag in the given month."
required:
  - tag
  - month
  - count
additionalProperties: false
