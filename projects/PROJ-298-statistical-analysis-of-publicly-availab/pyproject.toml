[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "statistical-analysis-stack-overflow"
version = "0.1.0"
description = "Statistical Analysis of Publicly Available Stack Overflow Question Tags"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "scipy>=1.11.0",
    "statsmodels>=0.14.0",
    "scikit-learn>=1.3.0",
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "pyyaml>=6.0",
    "nbformat>=5.9.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.1.0",
    "black>=23.12.0",
    "isort>=5.13.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.6.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | \.eggs
    | \.ipynb_checkpoints
    | notebooks
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".git", ".hg", ".mypy_cache", ".tox", ".venv", "_build", "buck-out", "build", "dist", ".eggs", ".ipynb_checkpoints", "notebooks"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --strict-markers"
markers = [
    "contract: Contract tests for schema validation",
    "integration: Integration tests for pipelines",
    "unit: Unit tests for individual functions",
]
