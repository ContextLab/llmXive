$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Contract"
description: "Validates the output of a single statistical test (t-test or regression)."
type: "object"
required:
  - "dataset_id"
  - "strategy_id"
  - "test_type"
  - "p_value"
  - "ci_lower"
  - "ci_upper"
  - "effect_size"
properties:
  dataset_id:
    type: "string"
  strategy_id:
    type: "string"
    description: "Identifier for the cleaning strategy applied (e.g., 'outlier_iqr_1.5')."
  test_type:
    type: "string"
    enum:
      - "t_test"
      - "linear_regression"
  p_value:
    type: "number"
    description: "P-value rounded to 3 decimal places."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  effect_size:
    type: "number"
    description: "Cohen's d for t-tests or R-squared for regression."
  sample_size_final:
    type: "integer"
    description: "Number of rows remaining after cleaning."
  is_valid:
    type: "boolean"
    description: "True if p-value is finite and within (0, 1)."
