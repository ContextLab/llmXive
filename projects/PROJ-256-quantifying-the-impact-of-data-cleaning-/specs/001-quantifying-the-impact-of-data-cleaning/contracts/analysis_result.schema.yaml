$schema: http://json-schema.org/draft-07/schema#
title: Analysis Result Schema
description: "Schema for statistical analysis results (p-values, CIs, effect sizes)"
type: object
required:
  - result_id
  - dataset_id
  - strategy_id
  - p_value
  - ci_lower
  - ci_upper
  - effect_size
  - sample_size
properties:
  result_id:
    type: string
    description: "Unique identifier for the result record"
  dataset_id:
    type: string
    description: "Foreign key to the source dataset"
  strategy_id:
    type: string
    description: "Foreign key to the cleaning strategy applied"
  test_type:
    type: string
    description: "Type of statistical test performed"
    enum:
      - "t_test"
      - "linear_regression"
  p_value:
    type: number
    description: "P-value rounded to ≥3 decimal places (0 ≤ p ≤ 1)"
    minimum: 0
    maximum: 1
  ci_lower:
    type: number
    description: "Lower bound of 95% confidence interval"
  ci_upper:
    type: number
    description: "Upper bound of 95% confidence interval"
  effect_size:
    type: number
    description: "Effect size metric (Cohen's d or R²)"
  sample_size:
    type: integer
    description: "Number of observations used in the test"
    minimum: 1
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of analysis execution"
