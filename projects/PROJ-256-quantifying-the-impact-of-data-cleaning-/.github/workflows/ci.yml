name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Linting
        run: |
          # Assuming ruff/black are in requirements or installed here
          # If not strictly in requirements, we assume they are available or install them
          pip install ruff black
          ruff check code/
          black --check code/

      - name: Run Unit Tests
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Run Quickstart Validation (Optional)
        # This step runs the main pipeline to verify artifacts are produced
        # It may take time, so we ensure it's not on a tight loop if not needed for every PR
        run: |
          # Only run full pipeline if specific flag or on main branch to save time in PRs
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "Running full pipeline validation on main branch..."
            python code/run_quickstart_validation.py
          else
            echo "Skipping full pipeline validation on PR (run manually or on main)"
          fi

# Note: This workflow is CPU-only. No GPU/CUDA dependencies are installed or required.
# All statistical libraries (scipy, statsmodels, scikit-learn) run natively on CPU.