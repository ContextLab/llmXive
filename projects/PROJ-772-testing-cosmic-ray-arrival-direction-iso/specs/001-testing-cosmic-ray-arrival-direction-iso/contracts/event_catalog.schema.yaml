$schema: "http://json-schema.org/draft-07/schema#"
title: "EventCatalog"
description: "Schema for the pre-processed UHECR event catalog (E > 50 EeV)."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      source:
        type: "string"
        description: "Source of the data (e.g., 'auger_ta_combined')."
      energy_threshold:
        type: "number"
        description: "Energy threshold in EeV."
      nside:
        type: "integer"
        description: "HEALPix Nside resolution used."
      event_count:
        type: "integer"
        description: "Total number of events in the catalog."
    required:
      - source
      - energy_threshold
      - nside
      - event_count
  events:
    type: "array"
    description: "List of cosmic ray events."
    items:
      type: "object"
      properties:
        event_id:
          type: "string"
          description: "Unique identifier for the event."
        energy:
          type: "number"
          description: "Energy in EeV."
          minimum: 50.0
        ra:
          type: "number"
          description: "Right Ascension in degrees [0, 360)."
          minimum: 0.0
          maximum: 360.0
        dec:
          type: "number"
          description: "Declination in degrees [-90, 90]."
          minimum: -90.0
          maximum: 90.0
        detector:
          type: "string"
          enum:
            - "auger"
            - "ta"
      required:
        - event_id
        - energy
        - ra
        - dec
        - detector
    minItems: 1
required:
  - metadata
  - events