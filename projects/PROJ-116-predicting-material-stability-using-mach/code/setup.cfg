[metadata]
name = material-stability-pipeline
version = 0.1.0
description = Pipeline for predicting material stability using ML and DFT
author = llmXive Team
python_requires = >=3.11

[options]
packages = find:
install_requires =
    pymatgen
    scikit-learn
    pandas
    numpy
    matplotlib
    seaborn
    requests
    datasets
    shap

[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude = .git,__pycache__,build,dist,.eggs

[isort]
profile = black
line_length = 100
