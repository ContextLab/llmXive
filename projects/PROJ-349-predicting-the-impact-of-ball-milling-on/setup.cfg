[metadata]
name = predict-ball-milling-psd
version = 0.1.0
description = Predicting the impact of ball milling on particle size distribution
author = llmXive Research Team
license = MIT
python_requires = >=3.11

[options]
packages = find:
install_requires =
    pandas>=2.0.0,<3.0.0
    numpy>=1.24.0,<2.0.0
    pyarrow>=12.0.0,<15.0.0
    scikit-learn>=1.3.0,<2.0.0
    statsmodels>=0.14.0,<1.0.0
    matplotlib>=3.7.0,<4.0.0
    seaborn>=0.12.0,<1.0.0
    requests>=2.31.0,<3.0.0
    tqdm>=4.65.0,<5.0.0
    pdfminer.six>=20231228,<20240000

[options.packages.find]
where = src
