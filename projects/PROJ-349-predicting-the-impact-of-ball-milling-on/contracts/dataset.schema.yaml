schema_version: "1.0"
dataset_name: "ball_milling_psd"
description: "Schema for ball milling experimental data including PSD metrics"
fields:
  - name: experiment_id
    type: string
    required: true
    description: "Unique identifier for the experiment"
  - name: source
    type: string
    required: true
    description: "Source of the data (e.g., Materials Project, NIST, arXiv)"
  - name: material_type
    type: string
    required: true
    description: "Type of material being milled"
  - name: milling_speed
    type: float
    required: true
    description: "Milling speed in RPM"
  - name: milling_time
    type: float
    required: true
    description: "Milling duration in hours"
  - name: ball_to_powder_ratio
    type: float
    required: true
    description: "Ratio of ball mass to powder mass"
  - name: youngs_modulus
    type: float
    required: false
    description: "Young's modulus of the material in GPa"
  - name: density
    type: float
    required: false
    description: "Density of the material in g/cm³"
  - name: d10
    type: float
    required: true
    description: "10th percentile of particle size distribution in microns"
  - name: d50
    type: float
    required: true
    description: "50th percentile (median) of particle size distribution in microns"
  - name: d90
    type: float
    required: true
    description: "90th percentile of particle size distribution in microns"
  - name: process_duration
    type: float
    required: false
    description: "Total process duration in hours"
constraints:
  min_rows: 150
  nulls_allowed:
    - youngs_modulus
    - density
    - process_duration