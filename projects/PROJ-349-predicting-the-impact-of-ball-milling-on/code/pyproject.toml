[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ball-milling-psd-pipeline"
version = "0.1.0"
description = "Predicting the impact of ball milling on particle size distribution"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "requests>=2.31.0",
    "tqdm>=4.65.0",
    "pyarrow>=14.0.0",
    "pyyaml>=6.0.0",
    "pdfminer.six>=20231228",
    "pytest>=7.4.0"
]

[project.optional-dependencies]
dev = [
    "flake8>=6.1.0",
    "black>=23.0.0",
    "isort>=5.12.0"
]

[tool.setuptools.packages.find]
where = ["."]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88
