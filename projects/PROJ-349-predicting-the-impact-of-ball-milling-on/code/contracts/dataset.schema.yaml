$schema: http://json-schema.org/draft-07/schema#
title: Ball Milling Dataset Schema
description: >
  Schema for the ball milling experimental data used to predict particle size distribution.
  Includes features for milling parameters, material properties, and target PSD metrics.
type: object
required:
  - experiment_id
  - source
  - material_type
  - milling_speed
  - milling_time
  - ball_to_powder_ratio
  - youngs_modulus
  - density
  - d10
  - d50
  - d90
  - process_duration

properties:
  experiment_id:
    type: string
    description: Unique identifier for the experiment
    minLength: 1

  source:
    type: string
    description: Source of the data (e.g., 'Materials Project', 'NIST', 'arXiv')
    minLength: 1

  material_type:
    type: string
    description: Type of material being milled (e.g., 'metal', 'ceramic', 'polymer')
    minLength: 1

  milling_speed:
    type: number
    description: Milling speed in RPM
    minimum: 0

  milling_time:
    type: number
    description: Milling duration in minutes
    minimum: 0

  ball_to_powder_ratio:
    type: number
    description: Ratio of ball mass to powder mass
    minimum: 0

  youngs_modulus:
    type: number
    description: Young's modulus of the material in GPa
    minimum: 0

  density:
    type: number
    description: Density of the material in g/cm³
    minimum: 0

  d10:
    type: number
    description: Particle size at 10% cumulative distribution in microns
    minimum: 0

  d50:
    type: number
    description: Median particle size (50% cumulative distribution) in microns
    minimum: 0

  d90:
    type: number
    description: Particle size at 90% cumulative distribution in microns
    minimum: 0

  process_duration:
    type: number
    description: Total process duration including setup and milling in minutes
    minimum: 0

additionalProperties: false
