[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-ball-milling"
version = "0.1.0"
description = "Predicting the Impact of Ball Milling on Particle Size Distribution"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "statsmodels",
    "matplotlib",
    "seaborn",
    "requests",
    "tqdm",
    "pyarrow",
    "pdfminer.six",
    "pyyaml",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.0",
    "black>=23.0",
    "isort>=5.12",
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pre-commit>=3.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src", "code", "tests"]
skip = [".git", "__pycache__", "build", "dist", ".eggs", "*.egg-info", ".pytest_cache", "venv", ".venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"