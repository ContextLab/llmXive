$schema: "http://json-schema.org/draft-07/schema#"
title: "Aligned Dataset Schema"
description: "Schema for the merged muon flux and effective temperature dataset."
type: "object"
properties:
  date:
    type: "string"
    format: "date"
    description: "Date of the observation in YYYY-MM-DD format."
  muon_count:
    type: "number"
    description: "Daily aggregated muon count from IceCube."
  t_eff_value:
    type: "number"
    description: "Calculated Effective Temperature in Kelvin."
  season_flag:
    type: "string"
    enum: ["Summer", "Winter", "Spring", "Autumn"]
    description: "Season classification based on the date."
  exclusion_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if the row is invalid, otherwise null."
  pre_whitened_residual_muon:
    type: ["number", "null"]
    description: "Residual from AR(1) model for muon count."
  pre_whitened_residual_teff:
    type: ["number", "null"]
    description: "Residual from AR(1) model for T_eff."
required:
  - "date"
  - "muon_count"
  - "t_eff_value"
  - "season_flag"
additionalProperties: false