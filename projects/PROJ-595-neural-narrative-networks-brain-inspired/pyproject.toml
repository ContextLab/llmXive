[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neural-narrative-networks"
version = "0.1.0"
description = "Brain-inspired neural narrative networks for cognitive control research"
requires-python = ">=3.11"

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W"]
ignore = []

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
