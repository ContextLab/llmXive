[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-planbench-xl"
version = "0.1.0"
description = "Extending PlanBench-XL: Evaluating Long-Horizon Planning of LLM Tool-Use Agents"
requires-python = ">=3.9"
dependencies = [
    "datasets==2.14.0",
    "transformers==4.35.0",
    "torch==2.1.0",
    "scikit-learn==1.3.0",
    "pandas==2.1.0",
    "pytest==7.4.0",
    "requests==2.31.0",
    "flake8==6.1.0",
    "black==23.11.0",
    "isort==5.12.0",
    "pytest-cov==4.1.0"
]

[tool.black]
line-length = 100
target-version = ['py39', 'py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_glob = [
    "data/*",
    "venv/*",
    "__pycache__/*"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.flake8]
max-line-length = 100
extend-ignore = "E203, E501"
exclude = [
    ".git",
    "__pycache__",
    "data",
    "venv",
    "build",
    "dist"
]
per-file-ignores = [
    "__init__.py:F401"
]
