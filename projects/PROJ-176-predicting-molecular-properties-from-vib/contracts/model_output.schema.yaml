%YAML 1.2
---
$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: >
  Schema for predictions generated by the 1-D CNN model.
  Contains predicted values and associated metadata.
type: object
required:
  - metadata
  - predictions
properties:
  metadata:
    type: object
    required:
      - model_checkpoint
      - model_architecture
      - inference_timestamp
      - device
    properties:
      model_checkpoint:
        type: string
        description: Path or hash of the model checkpoint used
      model_architecture:
        type: string
        description: Description of the model architecture (e.g., "1D-CNN-3heads")
      inference_timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of inference
      device:
        type: string
        enum:
          - cpu
          - cuda
        description: Device used for inference
      input_dataset_hash:
        type: string
        description: SHA-256 hash of the input dataset
  predictions:
    type: array
    description: List of prediction records
    items:
      type: object
      required:
        - inchi_key
        - predicted_values
        - true_values
      properties:
        inchi_key:
          type: string
          description: Molecular identifier
        predicted_values:
          type: object
          required:
            - dipole_moment
            - polarizability
            - homo_lumo_gap
          properties:
            dipole_moment:
              type: number
            polarizability:
              type: number
            homo_lumo_gap:
              type: number
        true_values:
          type: object
          required:
            - dipole_moment
            - polarizability
            - homo_lumo_gap
          properties:
            dipole_moment:
              type: number
            polarizability:
              type: number
            homo_lumo_gap:
              type: number
        errors:
          type: object
          properties:
            dipole_moment:
              type: number
            polarizability:
              type: number
            homo_lumo_gap:
              type: number
