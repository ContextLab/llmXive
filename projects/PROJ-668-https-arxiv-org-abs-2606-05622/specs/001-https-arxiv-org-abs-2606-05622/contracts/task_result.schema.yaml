$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationResult"
description: "Schema for the output artifact of a single AdaPlanBench task execution."
type: object
properties:
  task_id:
    type: string
    description: "Unique identifier for the task instance."
  initial_plan:
    type: string
    description: "The first plan generated by the agent."
  feedback_history:
    type: array
    description: "Chronological list of feedback messages from the environment."
    items:
      type: object
      properties:
        step_number:
          type: integer
          description: "The step number in the planning loop."
        feedback_message:
          type: string
          description: "The specific constraint violation message."
        timestamp:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of the feedback."
      required:
        - step_number
        - feedback_message
        - timestamp
  final_plan:
    type: string
    description: "The final plan generated (success or failure)."
  success_status:
    type: boolean
    description: "True if the final plan satisfied all constraints."
  constraints_encountered:
    type: integer
    description: "Count of unique constraints triggered during the run."
    minimum: 0
  execution_time_ms:
    type: integer
    description: "Total time taken for the task in milliseconds."
    minimum: 0
  error_message:
    type: string
    description: "Error details if the task failed due to system error."
    nullable: true
required:
  - task_id
  - initial_plan
  - feedback_history
  - final_plan
  - success_status
  - constraints_encountered
  - execution_time_ms
additionalProperties: false