$schema: "http://json-schema.org/draft-07/schema#"
title: "SDAR Evaluation Log Schema"
description: "Schema for the evaluation log generated by the SDAR reproduction pipeline."
type: "object"
required:
  - "run_id"
  - "start_time"
  - "end_time"
  - "config"
  - "tasks"
  - "summary"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the evaluation run."
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the start of the run."
  end_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the end of the run."
  config:
    type: "object"
    required:
      - "num_tasks"
      - "task_timeout"
      - "fixed_task_ids"
    properties:
      num_tasks:
        type: "integer"
        minimum: 1
        description: "Number of evaluation tasks."
      task_timeout:
        type: "integer"
        minimum: 1
        description: "Timeout in seconds per task."
      fixed_task_ids:
        type: "array"
        description: "List of hardcoded task IDs used for all seeds to ensure paired test validity."
        items:
          type: "string"
  tasks:
    type: "array"
    minItems: 5
    description: "List of task evaluation results."
    items:
      type: "object"
      required:
        - "task_id"
        - "task_type"
        - "status"
        - "steps_taken"
        - "reward"
        - "error_message"
      properties:
        task_id:
          type: "string"
          description: "Unique task identifier."
        task_type:
          type: "string"
          description: "Type of ALFWorld task (e.g., 'pick_and_place')."
        status:
          type: "string"
          enum:
            - "success"
            - "failure"
            - "timeout"
          description: "Outcome of the task."
        steps_taken:
          type: "integer"
          description: "Number of steps taken to complete or fail the task."
        reward:
          type: "number"
          description: "Reward received (1.0 for success, 0.0 otherwise)."
        error_message:
          type:
            - "string"
            - "null"
          description: "Error message if the task failed or timed out."
  summary:
    type: "object"
    required:
      - "total_tasks"
      - "successful_tasks"
      - "failed_tasks"
      - "success_rate"
      - "avg_steps"
    properties:
      total_tasks:
        type: "integer"
        description: "Total number of tasks attempted."
      successful_tasks:
        type: "integer"
        description: "Number of successfully completed tasks."
      failed_tasks:
        type: "integer"
        description: "Number of failed tasks."
      success_rate:
        type: "number"
        minimum: 0.0
        maximum: 1.0
        description: "Calculated success rate (successful_tasks / total_tasks)."
      avg_steps:
        type: "number"
        description: "Average number of steps taken across all tasks."