$schema: "http://json-schema.org/draft-07/schema#"
title: "SDAR Training Log Schema"
description: "Schema for the training log generated by the SDAR reproduction pipeline."
type: "object"
required:
  - "run_id"
  - "start_time"
  - "end_time"
  - "config"
  - "steps"
  - "summary"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the training run."
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the start of the run."
  end_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the end of the run."
  config:
    type: "object"
    required:
      - "num_steps"
      - "batch_size"
      - "device"
      - "model_name"
    properties:
      num_steps:
        type: "integer"
        minimum: 1
        description: "Number of training steps executed."
      batch_size:
        type: "integer"
        minimum: 1
        description: "Batch size used for training."
      device:
        type: "string"
        pattern: "^cpu$"
        description: "Target device. Must be 'cpu' for this reproduction."
      model_name:
        type: "string"
        description: "Name of the model used (e.g., 'distilbert-base-uncased')."
  steps:
    type: "array"
    minItems: 5
    description: "List of training step logs."
    items:
      type: "object"
      required:
        - "step"
        - "sdar_gate_loss"
        - "rl_loss"
        - "total_loss"
        - "timestamp"
        - "gate_activation"
        - "teacher_update"
      properties:
        step:
          type: "integer"
          description: "Step number."
        sdar_gate_loss:
          type: "number"
          description: "Loss value for the SDAR gate mechanism."
        rl_loss:
          type: "number"
          description: "Loss value for the RL component."
        total_loss:
          type: "number"
          description: "Total combined loss."
        gate_activation:
          type: "boolean"
          description: "Whether the gate chose the distillation path for this step."
        teacher_update:
          type: "boolean"
          description: "Whether a teacher update occurred at this step."
        timestamp:
          type: "string"
          format: "date-time"
          description: "Timestamp of the step log."
  summary:
    type: "object"
    required:
      - "final_avg_sdar_gate_loss"
      - "final_avg_rl_loss"
      - "gate_activation_rate"
      - "teacher_update_count"
      - "status"
    properties:
      final_avg_sdar_gate_loss:
        type: "number"
        description: "Average SDAR gate loss over all steps."
      final_avg_rl_loss:
        type: "number"
        description: "Average RL loss over all steps."
      gate_activation_rate:
        type: "number"
        minimum: 0.0
        maximum: 1.0
        description: "Percentage of steps where the gate activated (distillation path chosen)."
      teacher_update_count:
        type: "integer"
        description: "Total number of teacher updates performed."
      status:
        type: "string"
        enum:
          - "completed"
          - "failed"
        description: "Final status of the training run."