$schema: "http://json-schema.org/draft-07/schema#"
title: "SDAR Reproduction Data Schema"
description: "Schema for the parsed SDAR reproduction results (sdar_results.csv)"
type: "object"
properties:
  seed:
    type: "integer"
    description: "Random seed used for the experiment (0-4)"
  method:
    type: "string"
    enum: ["SDAR", "PPO"]
    description: "The algorithm used: SDAR or PPO baseline"
  final_success_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Success rate across evaluated tasks (0.0 to 1.0)"
  avg_gate_loss:
    type: ["number", "null"]
    description: "Average SDAR gate loss (KL divergence). Null for PPO."
  avg_rl_loss:
    type: "number"
    description: "Average Reinforcement Learning loss"
  total_steps:
    type: "integer"
    minimum: 1
    description: "Total number of training steps executed"
  gate_activation_rate:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Percentage of steps where the gate activated (distillation path chosen)."
required:
  - seed
  - method
  - final_success_rate
  - avg_rl_loss
  - total_steps
  - gate_activation_rate
additionalProperties: false