$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Analysis Report Schema"
description: "Schema for the statistical analysis output (statistical_analysis.json)"
type: "object"
properties:
  test_type:
    type: "string"
    enum: ["paired_t_test", "wilcoxon_signed_rank"]
    description: "The statistical test performed"
  sdar_mean:
    type: "number"
    description: "Mean success rate for SDAR across seeds"
  ppo_mean:
    type: "number"
    description: "Mean success rate for PPO across seeds"
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "P-value from the statistical test"
  significant:
    type: "boolean"
    description: "True if p_value < 0.05"
  n_seeds:
    type: "integer"
    minimum: 1
    description: "Number of random seeds used"
  note:
    type: "string"
    description: "Additional context, e.g., 'Diagnostic only; low power due to N=5 and 1000 steps'"
required:
  - test_type
  - sdar_mean
  - ppo_mean
  - p_value
  - significant
  - n_seeds
  - note
additionalProperties: false