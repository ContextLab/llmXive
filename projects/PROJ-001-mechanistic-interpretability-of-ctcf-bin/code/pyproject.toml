[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-ctcf-bin"
version = "0.1.0"
description = "Mechanistic Interpretability of CTCF Binding-Site Selection"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "torch>=2.0.0",
    "biopython>=1.81",
    "pyyaml>=6.0",
    "huggingface_hub>=0.16.0",
    "datasets>=2.14.0",
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.1.0",
    "black>=23.7.0",
    "isort>=5.12.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | docs
    | tests
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["data", "models", "interpret", "setup_env", "setup_linting"]
skip = [".git", ".tox", ".venv", "data", "docs", "tests", "build", "dist"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]

[tool.setuptools.packages.find]
where = ["code"]
include = ["data*", "models*", "interpret*"]
exclude = ["tests*"]