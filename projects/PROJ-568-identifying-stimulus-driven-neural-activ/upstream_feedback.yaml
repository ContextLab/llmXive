    severity: writing
  - id: 24b56697ed89
    text: Add explicit statement about IRB approval and informed consent procedures
      for all cited intracranial EEG datasets. This survey references data from 53
      patients (n=5023 electrodes); readers need assurance ethical standards were
      met.
    severity: science
  - id: 1e81764f785d
    text: Include discussion of data privacy and de-identification procedures used
      in the referenced studies. Patient electrode locations and neural recordings
      could potentially be re-identified without proper safeguards.
    severity: science
  - id: 6546bb3d33c8
    text: Address dual-use considerations for brain activity decoding methods discussed
      (e.g., neural decoding, stimulus reconstruction). These techniques could have
      applications beyond cognitive neuroscience.
    severity: science
  - id: 486bfd9dd1ba
    text: The manuscript is a methodological survey without primary empirical data.
      Consequently, the scientific evidence lens cannot evaluate internal sample sizes
      or controls. Please explicitly clarify in the introduction that this chapter
      reviews external evidence rather than presenting new experimental results, and
      discuss the limitations of the cited literature's evidence strength (e.g., sample
      sizes in referenced iEEG studies).
    severity: science
  - id: 28a68b6585cd
    text: Section 2.1.2 (RSA) omits discussion of multiple-comparisons correction
      for searchlight analyses. Without FWE or FDR control, reported spatial patterns
      may reflect false positives.
    severity: writing
  - id: 5b59ba34b623
    text: Section 2.1.1 (GLMs) describes the model form but lacks details on link
      function selection, error distribution assumptions, or residual diagnostics
      required for valid inference.
    severity: writing
  - id: c202c8d04032
    text: Section 2.2.2 (Gaussian processes) mentions spatial blurring but does not
      address kernel selection, hyperparameter optimization, or cross-validation procedures
      essential for reproducibility.
    severity: writing
  - id: 47b1bd8f2681
    text: Section 2.2.3 (ISC/ISFC) describes correlation computation but does not
      specify null models or permutation testing procedures to establish statistical
      significance against noise.
    severity: writing
