[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-170"
version = "0.1.0"
description = "Predicting Catalytic Activity from Electronic Structure and Reaction Path Features"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "xgboost>=1.7.0",
    "shap>=0.42.0",
    "requests>=2.28.0",
    "pyyaml>=6.0",
    "rdkit>=2023.3.1",
    "huggingface_hub>=0.14.0",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
  | outputs
  | state
)/
'''

[tool.ruff]
# Inherit settings from .ruff.toml for consistency, 
# but enforce line length here if needed for CI
line-length = 88
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
