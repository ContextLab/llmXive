$schema: http://json-schema.org/draft-07/schema#
title: "GenerationResult Schema"
description: "Schema for the output of the LLM and its execution status."
type: object
required:
  - task_id
  - condition
  - generated_code
  - execution_status
  - error_type
  - execution_time_ms
  - timeout_triggered
properties:
  task_id:
    type: string
    description: "Foreign key to the EvaluationTask."
  condition:
    type: string
    description: "Condition of the run."
    enum:
      - "blind"
      - "guided"
  generated_code:
    type: string
    description: "The code generated by the model."
  execution_status:
    type: string
    description: "Result of the sandbox execution."
    enum:
      - "Pass"
      - "Fail"
  error_type:
    type: string
    description: "Categorized error type."
    enum:
      - "None"
      - "Syntax Error"
      - "Library Misuse"
      - "Runtime Error"
      - "Logic Transfer Failure"
  execution_time_ms:
    type: number
    description: "Duration of sandbox execution in milliseconds."
  timeout_triggered:
    type: boolean
    description: "True if the execution timed out."
additionalProperties: false
