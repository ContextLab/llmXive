$schema: "http://json-schema.org/draft-07/schema#"
title: "Generation Result Schema"
description: "Schema for the output of the LLM inference and execution."
type: object
properties:
  task_id:
    type: string
    description: "Reference to the task."
  condition:
    type: string
    enum:
      - blind
      - guided
    description: "Experimental condition."
  generated_code:
    type: string
    description: "The code generated by the model."
  execution_status:
    type: string
    enum:
      - Pass
      - Fail
    description: "Result of running the test suite."
  error_type:
    type: string
    enum:
      - None
      - Syntax
      - Library
      - Runtime
      - Logic Drift
    description: "Categorization of failure."
  invariant_test_results:
    type: object
    description: "Pass/Fail status for each invariant test."
    additionalProperties:
      type: boolean
  latency_seconds:
    type: number
    description: "Time taken for generation and execution."
required:
  - task_id
  - condition
  - generated_code
  - execution_status
  - error_type