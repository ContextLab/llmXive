$schema: http://json-schema.org/draft-07/schema#
title: "EvaluationTask Schema"
description: "Schema for a single evaluation task in the Multi-LCB study."
type: object
required:
  - id
  - problem_statement
  - target_language
  - difficulty
  - topic
  - python_solution
  - test_cases
  - blind_fail_count
  - selected
properties:
  id:
    type: string
    description: "Unique identifier for the task."
  problem_statement:
    type: string
    description: "Text of the problem description."
  target_language:
    type: string
    description: "Target language for code generation (e.g., 'rust', 'kotlin')."
    enum:
      - "rust"
      - "kotlin"
      - "go"
      - "python"
  difficulty:
    type: string
    description: "Difficulty level of the task."
    enum:
      - "Easy"
      - "Medium"
      - "Hard"
  topic:
    type: string
    description: "Algorithmic topic of the task."
  python_solution:
    type: string
    description: "Ground-truth Python solution code."
  test_cases:
    type: array
    description: "List of test cases (input, expected_output)."
    items:
      type: object
      required:
        - input
        - expected_output
      properties:
        input:
          type: string
        expected_output:
          type: string
  blind_fail_count:
    type: integer
    minimum: 0
    maximum: 3
    description: "Number of times the blind run failed (0-3)."
  selected:
    type: boolean
    description: "True if the task passed the stochasticity filter."
additionalProperties: false