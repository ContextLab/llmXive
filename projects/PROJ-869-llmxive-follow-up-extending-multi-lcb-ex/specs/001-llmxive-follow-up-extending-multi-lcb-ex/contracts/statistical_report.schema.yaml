$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalReport"
description: "Aggregates the final results of the study."
type: "object"
properties:
  total_tasks:
    type: "integer"
    description: "Number of tasks in the set."
  blind_pass_rate:
    type: "number"
    description: "Pass@1 for the Blind condition."
  guided_pass_rate:
    type: "number"
    description: "Pass@1 for the Guided condition."
  improvement:
    type: "number"
    description: "Difference between guided and blind pass rates."
  p_value:
    type: "number"
    description: "Result from McNemar's test."
  significant:
    type: "boolean"
    description: "True if p < 0.05."
  error_distribution:
    type: "object"
    description: "Count of each error type in the Guided condition."
    properties:
      Syntax:
        type: "integer"
      Library:
        type: "integer"
      Runtime:
        type: "integer"
      "Logic Transfer":
        type: "integer"
    required:
      - "Syntax"
      - "Library"
      - "Runtime"
      - "Logic Transfer"
required:
  - "total_tasks"
  - "blind_pass_rate"
  - "guided_pass_rate"
  - "improvement"
  - "p_value"
  - "significant"
  - "error_distribution"
additionalProperties: false
