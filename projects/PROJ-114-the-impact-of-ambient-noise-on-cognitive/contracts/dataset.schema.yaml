$schema: http://json-schema.org/draft-07/schema#
title: Ambient Noise Cognitive Flexibility Dataset
description: Schema for the raw and processed data of the ambient noise study.

definitions:
  Participant:
    type: object
    required:
      - participant_id
      - age
      - gender
      - device_id
    properties:
      participant_id:
        type: string
        description: Unique identifier for the participant.
      age:
        type: integer
        minimum: 18
        maximum: 100
      gender:
        type: string
        enum: ["Male", "Female", "Non-binary", "Prefer not to say", "Other"]
      device_id:
        type: string
        description: Identifier for the recording device used.
      recruitment_date:
        type: string
        format: date-time
    additionalProperties: false

  NoiseLog:
    type: object
    required:
      - participant_id
      - timestamp
      - db_level
    properties:
      participant_id:
        type: string
      timestamp:
        type: string
        format: date-time
      db_level:
        type: number
        description: Noise level in decibels.
      calibration_status:
        type: string
        enum: ["OK", "WARN", "ERROR"]
      error_margin:
        type: number
        description: Calibration error margin in dB.
    additionalProperties: false

  TaskPerformance:
    type: object
    required:
      - participant_id
      - session_id
      - reaction_time
      - error_count
    properties:
      participant_id:
        type: string
      session_id:
        type: string
      reaction_time:
        type: number
        description: Reaction time in milliseconds.
      error_count:
        type: integer
        minimum: 0
      noise_category:
        type: string
        enum: ["Low", "Moderate", "High"]
    additionalProperties: false

allOf:
  - $ref: '#/definitions/Participant'
  - $ref: '#/definitions/NoiseLog'
  - $ref: '#/definitions/TaskPerformance'
# Note: This schema defines the individual record structures.
# The actual data files (JSONL/CSV) will contain lists of these objects.
# For JSONL, each line is one of these objects.
# For CSV, the headers must match the properties.

# To validate a file containing a list of records, the root schema would be:
# type: array
# items:
#   oneOf:
#     - $ref: '#/definitions/Participant'
#     - $ref: '#/definitions/NoiseLog'
#     - $ref: '#/definitions/TaskPerformance'

# However, since we load by entity type, we validate each list against its specific definition.
