$schema: "http://json-schema.org/draft-07/schema#"
title: "Molecule Dataset Schema"
description: "Schema for the cleaned, scaffold-split dataset used in training and evaluation."
type: "object"
properties:
  molecules:
    type: "array"
    description: "List of molecule records."
    items:
      type: "object"
      required:
        - "smiles"
        - "lambda_max"
        - "scaffold_id"
        - "mol_id"
      properties:
        smiles:
          type: "string"
          description: "Canonical SMILES string. Must be parsable by RDKit."
        lambda_max:
          type: "number"
          description: "Maximum excitation wavelength in nanometers (nm)."
        scaffold_id:
          type: "string"
          description: "Bemis-Murcko scaffold identifier for splitting."
        mol_id:
          type: "string"
          description: "Unique hash identifier for the molecule."
        is_valid:
          type: "boolean"
          description: "True if SMILES was successfully parsed."
      additionalProperties: false
additionalProperties: false
