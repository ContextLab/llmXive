[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predicting-molecular-excitation-wavelengths"
version = "0.1.0"
description = "Predicting Molecular Excitation Wavelengths from SMILES with Graph Neural Networks"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "rdkit==2023.9.5",
    "torch==2.1.0+cpu",
    "torch-geometric==2.4.0",
    "pandas==2.1.0",
    "scikit-learn==1.3.0",
    "numpy==1.24.0",
    "pyyaml==6.0.1",
    "pytest==7.4.0",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | .eggs
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"