$schema: "http://json-schema.org/draft-07/schema#"
title: "AnalysisResult"
description: "Schema for statistical analysis output."
type: "object"
properties:
  analysis_id:
    type: "string"
    description: "Unique identifier for the analysis run."
  model_type:
    type: "string"
    description: "Type of model used (e.g., GLMM_Binomial_Interaction)."
  interaction_f_stat:
    type: "number"
    description: "F-statistic (or Chi-square) for the interaction term."
  interaction_p_value:
    type: "number"
    description: "P-value for the interaction term."
  bleu_threshold:
    type: "number"
    description: "BLEU threshold used for sensitivity analysis (null for primary)."
  participant_pass_rate:
    type: "number"
    description: "Percentage of participants passing quality filters (0-100)."
  limitations_statement:
    type: "string"
    description: "Programmatic acknowledgement of BLEU limitation and other caveats."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of analysis."
required:
  - "analysis_id"
  - "model_type"
  - "interaction_f_stat"
  - "interaction_p_value"
  - "participant_pass_rate"
  - "limitations_statement"
  - "timestamp"
additionalProperties: false