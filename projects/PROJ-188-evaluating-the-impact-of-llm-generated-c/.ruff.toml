# Standalone ruff config for CLI usage
extend = "code/pyproject.toml"
line-length = 88
target-version = "py311"
include = ["code/**/*.py", "tests/**/*.py"]
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]
[lint]
select = ["E4", "E7", "E9", "F", "I"]
ignore = []
