[project]
name = "PROJ-188-evaluating-the-impact-of-llm-generated-c"
version = "0.1.0"
description = "Evaluating the Impact of LLM-Generated Code Explanations on Comprehension"
requires-python = ">=3.11"
dependencies = [
    "transformers==4.36.0",
    "torch==2.1.0+cpu",
    "scikit-learn==1.3.0",
    "statsmodels==0.14.0",
    "sacrebleu==2.3.0",
    "datasets==2.14.0",
    "pandas==2.1.0",
    "numpy==1.24.0",
    "pyyaml==6.0.1"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.isort]
known-first-party = ["code"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
