[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-188"
version = "0.1.0"
description = "Evaluating the Impact of LLM-Generated Code Explanations on Comprehension"
requires-python = ">=3.11"
dependencies = [
    "transformers==4.36.0",
    "torch==2.1.0+cpu",
    "scikit-learn==1.3.0",
    "statsmodels==0.14.0",
    "sacrebleu==2.3.0",
    "datasets==2.14.0",
    "pandas==2.1.0",
    "numpy==1.24.0",
    "pyyaml==6.0.1",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"
