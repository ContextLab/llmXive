$schema: "http://json-schema.org/draft-07/schema#"
title: "MoleculeRecord"
description: "Schema for the entropy-enriched molecule dataset."
type: "object"
properties:
  smiles:
    type: "string"
    description: "Canonical SMILES string of the molecule."
  atom_entropy:
    type: "number"
    description: "Shannon entropy of the atom degree distribution."
    minimum: 0
  bond_entropy:
    type: "number"
    description: "Shannon entropy of the bond degree distribution."
    minimum: 0
  molecular_weight:
    type: "number"
    description: "Calculated molecular weight."
    minimum: 0
  atom_count:
    type: "integer"
    description: "Number of non-hydrogen atoms."
    minimum: 1
  logS:
    type: "number"
    description: "Experimental aqueous solubility (log mol/L). Can be null."
    nullable: true
  logP:
    type: "number"
    description: "Experimental octanol-water partition coefficient. Can be null."
    nullable: true
required:
  - "smiles"
  - "atom_entropy"
  - "bond_entropy"
  - "molecular_weight"
  - "atom_count"
additionalProperties: false