$schema: http://json-schema.org/draft-07/schema#
title: Intern-Atlas Extended Dataset Schema
description: |
  Schema for the processed features dataset derived from Intern-Atlas and retraction databases.
  This dataset contains topological features and retraction labels for methods published between 2010-2018.
type: object
required:
  - metadata
  - columns
properties:
  metadata:
    type: object
    properties:
      source:
        type: string
        const: "Intern-Atlas + Retraction Watch"
      extraction_date:
        type: string
        format: date-time
      year_range:
        type: object
        properties:
          start:
            type: integer
            const: 2010
          end:
            type: integer
            const: 2018
        required:
          - start
          - end
      edge_types_used:
        type: array
        items:
          type: string
          enum: ["improves", "replaces", "extends"]
      label_mapping:
        type: object
        properties:
          robust:
            type: integer
            const: 0
          fragile:
            type: integer
            const: 1
          retraction_only:
            type: integer
            const: 2
        required:
          - robust
          - fragile
          - retraction_only
    required:
      - source
      - extraction_date
      - year_range
      - edge_types_used
      - label_mapping
  columns:
    type: array
    description: |
      Ordered list of columns in the resulting CSV.
      Must include at least the core identifier, features, and label columns.
    minItems: 10
    items:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        dtype:
          type: string
          enum: ["string", "integer", "float", "boolean"]
      required:
        - name
        - dtype
    allOf:
      - contains:
          const: "doi"
      - contains:
          const: "bottleneck_resolution_ratio"
      - contains:
          const: "branching_entropy"
      - contains:
          const: "retraction_status"
      - contains:
          const: "retraction_status_binary"