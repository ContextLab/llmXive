$schema: http://json-schema.org/draft-07/schema#
title: TopologicalFeatures Dataset Schema
description: Schema for the processed dataset containing topological features and retraction labels.
type: object
properties:
  paper_id:
    type: string
    description: Unique identifier for the paper (DOI or internal ID).
  bottleneck_resolution_ratio:
    type: number
    description: Ratio of 'improves'/'replaces' edges to total outgoing edges.
    minimum: 0.0
    maximum: 1.0
  branching_entropy:
    type: number
    description: Shannon entropy of downstream method types.
    minimum: 0.0
  citation_count:
    type: integer
    description: Total number of citations.
    minimum: 0
  publication_year:
    type: integer
    description: Year of publication.
    minimum: 2010
    maximum: 2018
  retraction_status:
    type: integer
    description: 0 (Robust), 1 (Fragile), 2 (Retraction-Only).
    enum:
      - 0
      - 1
      - 2
  field_of_study:
    type: string
    description: Subject area of the paper.
  venue:
    type: string
    description: Journal or conference name.
  matching_method:
    type: string
    description: Method used for matching (DOI or Levenshtein).
    enum:
      - "DOI"
      - "Levenshtein"
  is_synthetic:
    type: boolean
    description: True if the data was generated by the Synthetic Fallback Protocol.
required:
  - paper_id
  - bottleneck_resolution_ratio
  - branching_entropy
  - citation_count
  - publication_year
  - retraction_status
  - field_of_study
  - venue
  - matching_method
  - is_synthetic