$schema: http://json-schema.org/draft-07/schema#
title: Feature Dataset Schema
description: Schema for the processed feature dataset used in model training.
type: object
properties:
  paper_id:
    type: string
    description: Unique identifier for the paper (DOI or internal ID).
  title:
    type: string
    description: Full title of the paper.
  year:
    type: integer
    minimum: 2010
    maximum: 2018
    description: Publication year.
  bottleneck_resolution_ratio:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Ratio of bottleneck-resolving edges to total outgoing edges.
  branching_entropy:
    type: number
    minimum: 0.0
    description: Shannon entropy of downstream method types.
  citation_count:
    type: integer
    minimum: 0
    description: Total incoming citations.
  label:
    type: integer
    enum:
      - 0
      - 1
      - 2
    description: "0: Robust, 1: Fragile (methodological error), 2: Retraction-Only (fraud)."
  field_of_study:
    type: string
    description: Domain classification.
  publication_venue:
    type: string
    description: Journal or conference name.
required:
  - paper_id
  - year
  - bottleneck_resolution_ratio
  - branching_entropy
  - citation_count
  - label
additionalProperties: false