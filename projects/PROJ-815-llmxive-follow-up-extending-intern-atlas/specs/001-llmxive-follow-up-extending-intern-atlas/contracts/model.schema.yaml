$schema: http://json-schema.org/draft-07/schema#
title: Model Results Schema
description: Schema for the output of the model training and validation phase.
type: object
properties:
  model_type:
    type: string
    enum:
      - Topological
      - Baseline
    description: Type of model trained.
  auc_roc:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Area Under the ROC Curve.
  precision:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Precision score.
  recall:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Recall score.
  f1_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: F1 score.
  stability_flag:
    type: boolean
    description: True if VIF > 5 or MI > 0.1.
  vif_value:
    type: number
    description: Variance Inflation Factor for predictors.
  mi_value:
    type: number
    description: Mutual Information between predictors.
  threshold_sweep:
    type: object
    description: FPR and FNR for cutoffs {0.3, 0.5, 0.7}.
    properties:
      "0.3":
        type: object
        properties:
          fpr: { type: number }
          fnr: { type: number }
        required: [fpr, fnr]
      "0.5":
        type: object
        properties:
          fpr: { type: number }
          fnr: { type: number }
        required: [fpr, fnr]
      "0.7":
        type: object
        properties:
          fpr: { type: number }
          fnr: { type: number }
        required: [fpr, fnr]
    required: ["0.3", "0.5", "0.7"]
  permutation_test:
    type: object
    description: Results of the permutation test (n=100).
    properties:
      observed_auc: { type: number }
      mean_permuted_auc: { type: number }
      std_permuted_auc: { type: number }
      significant: { type: boolean }
    required: [observed_auc, mean_permuted_auc, std_permuted_auc, significant]
required:
  - model_type
  - auc_roc
  - stability_flag
  - threshold_sweep
  - permutation_test
additionalProperties: false