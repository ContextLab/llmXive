$schema: "http://json-schema.org/draft-07/schema#"
title: "SyntheticDataset"
description: "Schema for a single generated synthetic dataset with MNAR missingness. Defines the structure of data/raw/*.csv."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (e.g., seed_42_beta_0.5)."
  seed:
    type: "integer"
    description: "Random seed used for generation."
  n_samples:
    type: "integer"
    description: "Number of samples in the dataset."
  tau_true:
    type: "number"
    description: "Ground-truth Average Treatment Effect (ATE) defined in the SCM."
  beta:
    type: "number"
    description: "MNAR parameter controlling the strength of missingness dependence on Y."
  alpha:
    type: "number"
    description: "Intercept used in the MNAR logistic model (tuned to achieve target missingness rate)."
  missingness_rate:
    type: "number"
    description: "Proportion of missing values in the outcome variable Y."
  correlation_M_Y:
    type: "number"
    description: "Spearman correlation between missingness indicator M and unobserved Y."
  vif_max:
    type: "number"
    description: "Maximum Variance Inflation Factor for confounders."
  data_file_path:
    type: "string"
    description: "Relative path to the CSV file containing the data."
required:
  - run_id
  - seed
  - n_samples
  - tau_true
  - beta
  - alpha
  - missingness_rate
  - correlation_M_Y
  - vif_max
  - data_file_path
additionalProperties: false
