$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Summary Schema"
description: "Schema for data/results/simulation_summary.csv. This file is the Single Source of Truth for all analysis and figures."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the simulation run."
  seed:
    type: "integer"
    description: "Random seed used for reproducibility."
  sample_size:
    type: "integer"
    description: "Number of samples in the synthetic dataset."
  ground_truth_ate:
    type: "number"
    description: "Theoretical ATE defined in the SCM (e.g., 0.5)."
  mnar_beta:
    type: "number"
    description: "The MNAR parameter controlling missingness strength."
  missingness_rate:
    type: "number"
    description: "Proportion of missing values in the outcome variable."
  imputation_method:
    type: "string"
    enum:
      - "Mean"
      - "KNN"
      - "MICE"
    description: "The imputation method applied."
  estimator_type:
    type: "string"
    enum:
      - "IPW"
      - "PSM"
    description: "The causal estimation method used."
  estimated_ate:
    type: "number"
    description: "The estimated Average Treatment Effect."
  standard_error:
    type: "number"
    description: "Standard error of the estimated ATE."
  bias:
    type: "number"
    description: "Absolute bias: |estimated_ate - ground_truth_ate|."
  rmse:
    type: "number"
    description: "Root Mean Squared Error of the estimate."
  coverage:
    type: "integer"
    description: "Binary indicator (0 or 1) if the true ATE falls within the 95% CI."
  convergence_status:
    type: "string"
    enum:
      - "success"
      - "failed"
      - "warning"
    description: "Status of the imputation/estimation process."
  vif_max:
    type: "number"
    description: "Maximum Variance Inflation Factor for confounders in this run."
required:
  - run_id
  - seed
  - sample_size
  - ground_truth_ate
  - mnar_beta
  - missingness_rate
  - imputation_method
  - estimator_type
  - estimated_ate
  - standard_error
  - bias
  - rmse
  - coverage
  - convergence_status
  - vif_max
additionalProperties: false
