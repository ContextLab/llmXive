$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Summary Schema"
description: "Schema for the aggregated results of the imputation impact simulation study. Defines the structure of data/results/simulation_summary.csv. This is the Single Source of Truth (SSoT) for all aggregated results."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the simulation run."
  beta_mnar:
    type: "number"
    description: "Theoretical ATE defined in the SCM, regenerated via regenerate_ground_truth(seed, beta)."
  mnar_beta:
    type: "number"
    description: "The MNAR parameter controlling missingness strength."
  mnar_alpha:
    type: "number"
    description: "The intercept parameter in the MNAR logistic model, regenerated via regenerate_ground_truth(seed, beta)."
  missingness_rate:
    type: "number"
    description: "Proportion of missing values in the outcome variable."
  imputation_method:
    type: "string"
    enum:
      - "Mean"
      - "KNN"
      - "MICE"
    description: "The imputation method applied."
  estimator:
    type: "string"
    enum:
      - "ipw"
      - "psm"
    description: "The causal estimation method used."
  estimated_ate:
    type: "number"
    description: "The estimated Average Treatment Effect."
  standard_error:
    type: "number"
    description: "Standard error of the estimated ATE."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  bias:
    type: "number"
    description: "Absolute bias: |estimated_ate - true_ate|."
  rmse:
    type: "number"
    description: "Root Mean Squared Error of the estimate."
  coverage:
    type: "integer"
    enum:
      - 0
      - 1
    description: "Binary indicator (1 if ground_truth_ate falls within [ci_lower, ci_upper], 0 otherwise)."
  convergence_status:
    type: "string"
    enum:
      - "success"
      - "failed"
      - "warning"
    description: "Status of the imputation/estimation process."
  vif_max:
    type: "number"
    description: "Maximum Variance Inflation Factor for confounders in this run. Runs with VIF > 10 are flagged."
required:
  - run_id
  - seed
  - sample_size
  - ground_truth_ate
  - mnar_beta
  - mnar_alpha
  - missingness_rate
  - imputation_method
  - estimator
  - estimated_ate
  - standard_error
  - ci_lower
  - ci_upper
  - bias
  - rmse
  - ci_lower
  - ci_upper
  - coverage
  - convergence_status
  - vif_max
additionalProperties: false