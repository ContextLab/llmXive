$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Summary Schema"
description: "Schema for the aggregated results of the imputation impact simulation study. Defines the structure of data/results/simulation_summary.csv. This is the Single Source of Truth (SSoT) for all aggregated results."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the simulation run."
  beta_mnar:
    type: "number"
    description: "The MNAR parameter value for this run (e.g., 0.0, 0.2, 0.5)."
  true_ate:
    type: "number"
    description: "The ground-truth Average Treatment Effect defined in the generative model."
  imputation_method:
    type: "string"
    enum:
      - "mean"
      - "knn"
      - "mice"
    description: "The imputation method used."
  estimator_type:
    type: "string"
    enum:
      - "ipw"
      - "psm"
    description: "The causal estimation method used."
  estimated_ate:
    type: "number"
    description: "The estimated ATE from the imputed data."
  bias:
    type: "number"
    description: "Absolute bias: |estimated_ate - true_ate|."
  rmse:
    type: "number"
    description: "Root Mean Squared Error."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  coverage:
    type: "boolean"
    description: "True if the CI contains the true_ate."
  interaction_flag:
    type: "boolean"
    description: "True if the relative bias difference between IPW and PSM exceeds 10%."
required:
  - run_id
  - beta_mnar
  - true_ate
  - imputation_method
  - estimator_type
  - estimated_ate
  - bias
  - rmse
  - ci_lower
  - ci_upper
  - coverage
  - interaction_flag
additionalProperties: false
