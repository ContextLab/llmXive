$schema: "http://json-schema.org/draft-07/schema#"
title: "CausalEstimate"
description: "Schema for a single causal effect estimate."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Reference to the parent SyntheticDataset run_id."
  method:
    type: "string"
    description: "Imputation method used."
    enum:
      - "mean"
      - "knn"
      - "mice"
  estimator:
    type: "string"
    description: "Causal estimation method."
    enum:
      - "ipw"
      - "psm"
  ate_est:
    type: "number"
    description: "Estimated Average Treatment Effect."
  se:
    type: "number"
    description: "Standard error of the estimate."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  bias:
    type: "number"
    description: "Absolute bias: |ate_est - tau_true|."
  covered:
    type: "boolean"
    description: "True if tau_true is within [ci_lower, ci_upper]."
  tau_true:
    type: "number"
    description: "Ground-truth ATE for this run (for reference)."
required:
  - run_id
  - method
  - estimator
  - ate_est
  - se
  - ci_lower
  - ci_upper
  - bias
  - covered
  - tau_true
additionalProperties: false