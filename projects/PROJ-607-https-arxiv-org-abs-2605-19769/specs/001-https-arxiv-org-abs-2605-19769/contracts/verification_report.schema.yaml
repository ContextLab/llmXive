$schema: "http://json-schema.org/draft-07/schema#"
title: "Verification Report"
description: "Schema for the batch verification report generated by run_eval.py."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      timestamp:
        type: "string"
        format: "date-time"
        description: "Time of execution."
      agent_name:
        type: "string"
        description: "Name of the agent used."
      verifier_name:
        type: "string"
        description: "Name of the verifier used."
  results:
    type: "array"
    description: "List of task execution results."
    items:
      type: "object"
      properties:
        task_id:
          type: "string"
          description: "Unique identifier for the task."
        status:
          type: "string"
          enum:
            - "success"
            - "failed"
            - "skipped"
          description: "Execution status."
        verifier_verdict:
          type: "string"
          enum:
            - "pass"
            - "fail"
          description: "Verdict from the hard-coded verifier."
        failure_reason:
          type: "string"
          description: "Reason for failure if status is 'failed'."
        artifact_path:
          type: "string"
          description: "Path to the generated artifact."
      required:
        - task_id
        - status
        - verifier_verdict
required:
  - metadata
  - results
additionalProperties: false