$schema: "http://json-schema.org/draft-07/schema#"
title: "OpenComputer Task Definition"
description: "Schema for a single task definition in the OpenComputer reproduction pipeline."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  app_name:
    type: "string"
    description: "Name of the application used (e.g., 'audacity', 'gimp')."
  expected_outcome:
    type: "string"
    description: "Description of the expected result (e.g., 'WAV file exported')."
  env_manifest:
    type: "object"
    description: "Docker environment requirements."
    properties:
      base_image:
        type: "string"
        description: "Docker image to use."
      required_packages:
        type: "array"
        items:
          type: "string"
        description: "List of packages to install."
  steps:
    type: "array"
    description: "Sequence of steps the agent must perform."
    items:
      type: "object"
      properties:
        action:
          type: "string"
          description: "Action to perform."
        parameters:
          type: "object"
          description: "Parameters for the action."
required:
  - task_id
  - app_name
  - expected_outcome
  - env_manifest
additionalProperties: false