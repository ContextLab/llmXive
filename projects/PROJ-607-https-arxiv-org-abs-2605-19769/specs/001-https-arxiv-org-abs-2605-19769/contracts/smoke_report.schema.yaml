$schema: "http://json-schema.org/draft-07/schema#"
title: "Smoke Test Report"
description: "Schema for the single-task smoke test report."
type: "object"
properties:
  task_id:
    type: "string"
    description: "ID of the task run in the smoke test."
  status:
    type: "string"
    enum:
      - "success"
      - "partial_success"
      - "failed"
      - "build_failed"
    description: "Overall status of the smoke test."
  error_log:
    type: "string"
    description: "Error log if status is 'failed' or 'build_failed'."
  execution_time_seconds:
    type: "number"
    description: "Time taken to execute the task."
  container_id:
    type: "string"
    description: "ID of the Docker container used."
required:
  - task_id
  - status
additionalProperties: false