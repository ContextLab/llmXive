[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "atmos-gravity-correlation"
version = "0.1.0"
description = "Analysis of Atmospheric River and Gravity Anomaly Correlation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scipy",
    "statsmodels",
    "requests",
    "matplotlib",
    "seaborn",
    "pyyaml"
]

[project.optional-dependencies]
dev = [
    "flake8",
    "black",
    "pytest",
    "pytest-cov"
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = [
    "tests"
]
python_files = [
    "test_*.py"
]
addopts = "-v --tb=short"

[tool.setuptools]
packages = ["."]
package-dir = {"" = "."}