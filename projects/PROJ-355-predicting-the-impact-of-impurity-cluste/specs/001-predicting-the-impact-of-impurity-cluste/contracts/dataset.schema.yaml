$schema: http://json-schema.org/draft-07/schema#
title: "Training Dataset Schema"
description: "Schema for the aggregated training dataset containing clustering descriptors and segregation energies."
type: object
properties:
  sample_id:
    type: string
    description: "Unique identifier for the sample."
  bulk_id:
    type: string
    description: "Reference to the OQMD/MP bulk configuration ID."
  gb_id:
    type: string
    description: "Unique identifier for the grain boundary structure."
  alloy_system:
    type: string
    description: "Alloy family (e.g., 'Fe-Cr')."
  impurity_species:
    type: string
    description: "Element symbol of the impurity."
  rdf_peak_value:
    type: number
    description: "Peak value of the radial distribution function at the interface."
  pair_corr_value:
    type: number
    description: "Pair correlation statistic at the interface."
  voronoi_count:
    type: integer
    description: "Voronoi neighbor count for the impurity at the interface."
  principal_component_1:
    type: number
    description: "First principal component of descriptors (PCA-transformed)."
  principal_component_2:
    type: number
    description: "Second principal component of descriptors (PCA-transformed)."
  principal_component_3:
    type: number
    description: "Third principal component of descriptors (PCA-transformed)."
  local_lattice_strain:
    type: number
    description: "Trace of the strain tensor (covariate)."
  atomic_radius:
    type: number
    description: "Atomic radius of impurity (covariate)."
  electronegativity:
    type: number
    description: "Electronegativity of impurity (covariate)."
  segregation_energy_eV:
    type: number
    description: "Simulated segregation energy in eV (Leave-One-Out)."
  vif_rdf:
    type: number
    description: "Variance Inflation Factor for the RDF feature."
  vif_pair:
    type: number
    description: "Variance Inflation Factor for the pair correlation feature."
  vif_voronoi:
    type: number
    description: "Variance Inflation Factor for the Voronoi count feature."
  descriptive_framing:
    type: string
    description: "Pre-formatted text explaining joint relationships if VIF >= 10."
required:
  - sample_id
  - bulk_id
  - gb_id
  - alloy_system
  - impurity_species
  - rdf_peak_value
  - pair_corr_value
  - voronoi_count
  - principal_component_1
  - principal_component_2
  - principal_component_3
  - local_lattice_strain
  - atomic_radius
  - electronegativity
  - segregation_energy_eV
  - vif_rdf
  - vif_pair
  - vif_voronoi
  - descriptive_framing
additionalProperties: false