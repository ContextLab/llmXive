[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-355-impurity-clustering"
version = "0.1.0"
description = "Predicting the Impact of Impurity Clustering on Grain Boundary Segregation"
requires-python = ">=3.9"
dependencies = [
    "pymatgen==2024.1.1",
    "scikit-learn==1.4.0",
    "numpy==1.26.0",
    "pandas==2.1.0",
    "ase==3.23.0",
    "statsmodels==0.14.1",
    "requests==2.31.0",
    "jsonschema==4.20.0",
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # Allow assertions in tests

[tool.ruff.isort]
known-first-party = ["code", "tests"]
force-sort-within-sections = true
