# Standalone Black configuration
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | code/__pycache__
)/
'''
force-exclude = '''
/(
    \.git
)/
'''
