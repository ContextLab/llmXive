$schema: "http://json-schema.org/draft-07/schema#"
title: "ABIDE Dataset Metadata Schema"
description: "Schema for the verified ABIDE parquet dataset metadata."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique participant identifier."
  diagnosis:
    type: "string"
    description: "Diagnosis label. Allowed values: 'ASD', 'Control'."
    enum:
      - "ASD"
      - "Control"
  age:
    type: "number"
    description: "Age of the participant in years."
  sex:
    type: "string"
    description: "Sex of the participant."
    enum:
      - "M"
      - "F"
  raw_nifti_path:
    type: "string"
    description: "Path or URL to the raw NIfTI file."
  site:
    type: "string"
    description: "Data collection site."
required:
  - participant_id
  - diagnosis
  - raw_nifti_path
