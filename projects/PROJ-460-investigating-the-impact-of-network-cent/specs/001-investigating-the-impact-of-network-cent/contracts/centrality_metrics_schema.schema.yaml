$schema: "http://json-schema.org/draft-07/schema#"
title: "Centrality Metrics Output Schema"
description: "Schema for computed centrality metrics per participant and ROI."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique participant identifier."
  roi_index:
    type: "integer"
    description: "Index of the brain region (0-399)."
  metric_type:
    type: "string"
    description: "Type of centrality metric."
    enum:
      - "degree"
      - "betweenness"
      - "eigenvector"
  value:
    type: "number"
    description: "Computed centrality value."
  threshold_used:
    type: "number"
    description: "Correlation threshold used for graph construction (e.g., 0.10)."
required:
  - participant_id
  - roi_index
  - metric_type
  - value
  - threshold_used
