$schema: "http://json-schema.org/draft-07/schema#"
title: "Classification Results Schema"
description: "Schema for logistic regression classification metrics."
type: object
properties:
  fold:
    type: integer
    minimum: 1
    maximum: 5
    description: "Cross-validation fold number."
  accuracy:
    type: number
    minimum: 0
    maximum: 1
    description: "Classification accuracy."
  auc:
    type: number
    minimum: 0
    maximum: 1
    description: "Area Under the Curve."
  confusion_matrix:
    type: array
    items:
      type: integer
    minItems: 4
    maxItems: 4
    description: "[TN, FP, FN, TP] counts."
  sensitivity:
    type: number
    minimum: 0
    maximum: 1
    description: "Sensitivity (Recall) for ASD class."
  specificity:
    type: number
    minimum: 0
    maximum: 1
    description: "Specificity for Control class."
  baseline_accuracy:
    type: number
    description: "Baseline accuracy for comparison (computed, not hardcoded)."
  is_significant_vs_baseline:
    type: boolean
    description: "True if accuracy significantly exceeds baseline."
required:
  - fold
  - accuracy
  - auc
  - confusion_matrix
  - sensitivity
  - specificity
  - baseline_accuracy
  - is_significant_vs_baseline
additionalProperties: false