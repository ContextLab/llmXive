$schema: http://json-schema.org/draft-07/schema#
title: Group Comparison Stats Schema
description: Schema for statistical comparison results between ASD and Control groups.
type: object
properties:
  roi_index:
    type: integer
    minimum: 0
    maximum: 399
    description: Index of the brain region.
  metric_type:
    type: string
    enum:
      - degree
      - betweenness
      - eigenvector
    description: Type of centrality metric tested.
  mean_asd:
    type: number
    description: Mean centrality value for ASD group.
  mean_control:
    type: number
    description: Mean centrality value for Control group.
  t_statistic:
    type: number
    description: T-statistic from two-sample t-test.
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: Raw p-value.
  q_value:
    type: number
    minimum: 0
    maximum: 1
    description: FDR-corrected q-value.
  significant:
    type: boolean
    description: True if q_value < 0.05.
  effect_size_cohen_d:
    type: number
    description: Cohen's d effect size.
required:
  - roi_index
  - metric_type
  - mean_asd
  - mean_control
  - t_statistic
  - p_value
  - q_value
  - significant
  - effect_size_cohen_d
additionalProperties: false