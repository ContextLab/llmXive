$schema: "http://json-schema.org/draft-07/schema#"
title: "VideoSample"
description: "Schema for a single generated video sample with physics metadata."
type: "object"
properties:
  video_id:
    type: "string"
    description: "Unique identifier for the video file."
  prompt:
    type: "string"
    description: "The text prompt used for generation."
  file_path:
    type: "string"
    description: "Relative path to the MP4 file in data/raw/."
  physics_score:
    type: "number"
    description: "Composite physics consistency score (0.0 to 1.0)."
  continuity_score:
    type: "number"
    description: "Score for trajectory continuity (0.0 to 1.0)."
  contact_score:
    type: "number"
    description: "Score for contact conservation (0.0 to 1.0)."
  pass_status:
    type: "string"
    enum: ["pass", "fail"]
    description: "Whether the video passed the physics filter."
  generation_timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 801 timestamp of generation."
required:
  - video_id
  - prompt
  - file_path
  - physics_score
  - continuity_score
  - contact_score
  - pass_status
  - generation_timestamp
additionalProperties: false