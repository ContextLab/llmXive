$schema: "http://json-schema.org/draft-07/schema#"
title: "BenchmarkResult"
description: "Schema for evaluation results on R-Bench and PAI-Bench."
type: "object"
properties:
  model_id:
    type: "string"
    description: "Identifier of the trained model."
  benchmark_name:
    type: "string"
    enum: ["R-Bench", "PAI-Bench"]
    description: "Name of the benchmark."
  score:
    type: "number"
    description: "Physical consistency score."
  n_samples:
    type: "integer"
    description: "Number of samples evaluated."
  p_value:
    type: "number"
    description: "P-value from statistical comparison against baseline."
  comparison_baseline:
    type: "string"
    description: "Name of the baseline model used for comparison."
  is_comparable:
    type: "boolean"
    description: "True if gap ≤ 15% and p-value ≥ 0.05 (or corrected threshold)."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 801 timestamp of evaluation."
  evaluation_engine:
    type: "string"
    enum: ["MuJoCo"]
    description: "Physics engine used for evaluation (must be MuJoCo to avoid circularity)."
  test_type:
    type: "string"
    enum: ["t-test", "mann-whitney-u"]
    description: "Statistical test used."
  test_statistic:
    type: "number"
    description: "The calculated test statistic (t or U)."
required:
  - model_id
  - benchmark_name
  - score
  - n_samples
  - p_value
  - comparison_baseline
  - is_comparable
  - timestamp
  - evaluation_engine
  - test_type
  - test_statistic
additionalProperties: false