# Data Contract for Statistical Analysis Results
# Validated against code/analysis/stats.py output
# Used by utils.schema_validator for runtime validation
$schema: "http://json-schema.org/draft-07/schema#"
title: StatisticalResult
type: object
required:
  - connection_id
  - t_stat
  - p_value
  - q_value
  - effect_size
  - ci_lower
  - ci_upper
  - n_musicians
  - n_non_musicians
properties:
  connection_id:
    type: string
    description: "Reference to the specific edge being tested"
  t_stat:
    type: number
    description: "Welch's t-statistic value"
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: "Raw p-value from the t-test"
  q_value:
    type: number
    minimum: 0
    maximum: 1
    description: "FDR (Benjamini-Hochberg) corrected q-value"
  effect_size:
    type: number
    description: "Cohen's d effect size"
  ci_lower:
    type: number
    description: "Lower bound of 95% Confidence Interval for effect size"
  ci_upper:
    type: number
    description: "Upper bound of 95% Confidence Interval for effect size"
  n_musicians:
    type: integer
    minimum: 1
    description: "Sample size of musician group"
  n_non_musicians:
    type: integer
    minimum: 1
    description: "Sample size of non-musician group"
additionalProperties: false