$schema: http://json-schema.org/draft-07/schema#
title: Statistical Result Data Contract
description: |
  Schema for statistical comparison results between groups.
  Validates against the project's data model for StatisticalResult entities.
type: object
required:
  - connection_id
  - t_stat
  - p_value
  - q_value
  - effect_size
  - ci_lower
  - ci_upper
properties:
  connection_id:
    type: string
    description: Unique identifier for the connection pair
    pattern: "^[a-zA-Z0-9_]+_[a-zA-Z0-9_]+$"
  t_stat:
    type: number
    description: Welch's t-test statistic
  p_value:
    type: number
    description: Raw p-value from the test
    minimum: 0
    maximum: 1
  q_value:
    type: number
    description: FDR-corrected q-value (Benjamini-Hochberg)
    minimum: 0
    maximum: 1
  effect_size:
    type: number
    description: Cohen's d effect size
  ci_lower:
    type: number
    description: Lower bound of 95% confidence interval
  ci_upper:
    type: number
    description: Upper bound of 95% confidence interval
  component_id:
    type: string
    description: (Optional) NBS component ID if part of a significant network
  component_size:
    type: integer
    description: (Optional) Size of the NBS component in edges
additionalProperties: false