$schema: http://json-schema.org/draft-07/schema#
title: Subject
description: Schema for a single subject record in the musical training study.
type: object
required:
  - subject_id
  - group
  - years_of_training
  - age
  - sex
  - motion_score
  - ses_score
properties:
  subject_id:
    type: string
    pattern: "^[A-Z0-9_-]+$"
    description: Unique identifier for the subject.
  group:
    type: string
    enum:
      - musician
      - non_musician
    description: Group assignment based on musical training.
  years_of_training:
    type: number
    minimum: 0
    description: Total years of formal musical training.
  age:
    type: integer
    minimum: 0
    maximum: 120
    description: Age of the subject in years.
  sex:
    type: string
    enum:
      - M
      - F
    description: Biological sex of the subject.
  motion_score:
    type: number
    minimum: 0
    description: Framewise displacement or similar motion metric.
  ses_score:
    type: number
    minimum: 0
    maximum: 100
    description: Socioeconomic status score.
additionalProperties: false