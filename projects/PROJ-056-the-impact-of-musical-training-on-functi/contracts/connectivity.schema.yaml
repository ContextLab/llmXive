# Data Contract for Functional Connectivity Results
# Validated against code/data/models.py ConnectivityMatrix class
# Used by utils.schema_validator for runtime validation
$schema: "http://json-schema.org/draft-07/schema#"
title: ConnectivityRecord
type: object
required:
  - subject_id
  - connection_id
  - correlation
  - z_score
  - region_a
  - region_b
properties:
  subject_id:
    type: string
    pattern: "^[A-Z]{2}[0-9]{6}$"
    description: "Reference to the subject record"
  connection_id:
    type: string
    pattern: "^[A-Z]{2}[0-9]{6}_ROI[A-Z0-9]+_ROI[A-Z0-9]+$"
    description: "Unique identifier for the edge (e.g., AB123456_ROIA_ROIB)"
  correlation:
    type: number
    minimum: -1
    maximum: 1
    description: "Pearson correlation coefficient between ROI time series"
  z_score:
    type: number
    description: "Fisher Z-transformed correlation value"
  region_a:
    type: string
    description: "Name of the first ROI (Atlas label)"
  region_b:
    type: string
    description: "Name of the second ROI (Atlas label)"
  atlas:
    type: string
    enum:
      - AAL
      - Schaefer
    description: "Atlas used for parcellation"
additionalProperties: false
