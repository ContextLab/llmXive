[project]
name = "proj-056-musical-training-connectivity"
version = "0.1.0"
description = "Impact of Musical Training on Functional Connectivity in Adolescent Brains"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.1.0",
    "numpy==1.26.0",
    "scikit-learn==1.3.0",
    "scipy==1.11.0",
    "nibabel==5.2.0",
    "networkx==3.2.0",
    "matplotlib==3.8.0",
    "seaborn==0.13.0",
    "pyyaml==6.0.1",
    "statsmodels==0.14.0",
    "ruff==0.1.6",
    "black==23.11.0",
]

[tool.ruff]
select = ["E", "F", "W", "I"]
ignore = []
line-length = 88
target-version = "py311"

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]