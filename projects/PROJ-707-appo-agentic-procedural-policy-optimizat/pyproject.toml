[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive"
version = "0.1.0"
description = "Agentic Procedural Policy Optimization Research Pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "transformers>=4.35.0",
    "datasets>=2.14.0",
    "trl>=0.7.0",
    "scipy>=1.11.0",
    "pandas>=2.0.0",
    "llama-cpp-python>=0.2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.4.0",
]

[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'

[tool.ruff]
# Inherits configuration from ruff.toml but ensures CLI works if config is missing there
line-length = 120
target-version = "py311"
select = [
    "E", "W", "F", "I", "C90", "UP", "N", "SIM", "PERF", "RUF"
]
ignore = []

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["F841"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"