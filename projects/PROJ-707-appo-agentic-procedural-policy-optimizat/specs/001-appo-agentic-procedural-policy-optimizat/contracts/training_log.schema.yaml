$schema: "http://json-schema.org/draft-07/schema#"
title: "APPO Training Run Log Schema"
description: "Schema for a single training run log file."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique UUID for the run."
  variant:
    type: "string"
    enum: ["No-Score", "Score-Default", "Score-Ablation"]
  seed:
    type: "integer"
  benchmark:
    type: "string"
  config:
    type: "object"
    properties:
      epsilon:
        type: "number"
      epsilon_prime:
        type: "number"
      beta_weight:
        type: "number"
  metrics:
    type: "object"
    properties:
      steps_to_threshold:
        type: ["integer", "null"]
        description: "Steps to reach 80% threshold, or null if not reached."
      threshold_value:
        type: "number"
      final_success_rate:
        type: "number"
      mean_tool_calls:
        type: "number"
  status:
    type: "string"
    enum: ["completed", "threshold-not-reached", "oom", "error"]
  timestamps:
    type: "object"
    properties:
      start_time:
        type: "string"
        format: "date-time"
      end_time:
        type: "string"
        format: "date-time"
required:
  - run_id
  - variant
  - seed
  - benchmark
  - metrics
  - status