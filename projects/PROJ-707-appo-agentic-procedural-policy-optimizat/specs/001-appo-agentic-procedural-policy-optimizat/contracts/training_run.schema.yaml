$schema: "http://json-schema.org/draft-07/schema#"
title: "TrainingRun Schema"
description: "Schema for a single training run result in APPO project. Includes model hash for reproducibility."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (UUID)."
  config_id:
    type: "string"
    description: "Configuration identifier (e.g., 'baseline', 'default')."
    enum:
      - "baseline"
      - "default"
      - "ablation"
  seed:
    type: "integer"
    description: "Random seed used for reproducibility."
  benchmark:
    type: "string"
    description: "Benchmark dataset used."
    enum:
      - "MATH"
      # HotpotQA and WebShop excluded due to lack of verified URLs
  model_name:
    type: "string"
    description: "Model name and quantization format (e.g., 'llama-3.1-8b-q4_k_m')."
  model_hash:
    type: "string"
    description: "SHA256 hash of the model file for exact reproducibility (Constitution Principle I)."
  max_steps:
    type: "integer"
 description: "Maximum steps allowed for this run ([deferred])."
  steps_executed:
    type: "integer"
    description: "Actual number of steps executed."
  final_success_rate:
    type: "number"
    description: "Final success rate achieved (0.0 to 1.0)."
    minimum: 0.0
    maximum: 1.0
  steps_to_threshold:
    oneOf:
      - type: "number"
 description: "Number of steps to reach [deferred] success rate (interpolated)."
      - type: "string"
        description: "Censored if threshold not reached."
        const: "Censored"
  mean_tool_calls:
    type: "number"
    description: "Average tool calls per episode at threshold."
  collinearity_r:
    type: "number"
    description: "Pearson correlation between entropy and value."
    minimum: -1.0
    maximum: 1.0
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of run completion."
required:
  - run_id
  - config_id
  - seed
  - benchmark
  - model_name
  - model_hash
  - steps_executed
  - final_success_rate
  - steps_to_threshold
  - timestamp