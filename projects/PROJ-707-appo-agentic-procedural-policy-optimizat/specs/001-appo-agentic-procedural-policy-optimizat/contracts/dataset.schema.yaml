$schema: "http://json-schema.org/draft-07/schema#"
title: "APPO Dataset Schema"
description: "Schema for verified datasets used in the APPO project (MATH, Tool-Calling)."
type: "object"
properties:
  dataset_name:
    type: "string"
    description: "Name of the dataset (e.g., 'MATH', 'ToolCalling')."
  source_url:
    type: "string"
    description: "Verified URL from the prompt's # Verified datasets block."
    pattern: "^https://huggingface.co/"
  format:
    type: "string"
    enum: ["parquet", "jsonl", "csv"]
  split:
    type: "string"
    description: "Data split used (e.g., 'train', 'test')."
  sample_size:
    type: "integer"
    description: "Number of samples used in this run (for sampling)."
  checksum:
    type: "string"
    description: "SHA256 checksum of the raw file."
required:
  - dataset_name
  - source_url
  - format
  - split