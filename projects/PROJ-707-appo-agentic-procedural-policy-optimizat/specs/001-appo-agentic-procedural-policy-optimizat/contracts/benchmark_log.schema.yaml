$schema: "http://json-schema.org/draft-07/schema#"
title: "BenchmarkLog Schema"
description: "Schema for per-episode logs in APPO project."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Reference to the parent training run."
  episode_id:
    type: "integer"
    description: "Episode index within the run."
  success:
    type: "boolean"
    description: "Whether the episode was successful."
  tool_calls_count:
    type: "integer"
    description: "Number of tool calls made in this episode."
    minimum: 0
  steps_in_episode:
    type: "integer"
    description: "Number of steps taken in this episode."
    minimum: 1
  final_score:
    type: "number"
    description: "Final score for the episode."
required:
  - run_id
  - episode_id
  - success
  - tool_calls_count
  - steps_in_episode
