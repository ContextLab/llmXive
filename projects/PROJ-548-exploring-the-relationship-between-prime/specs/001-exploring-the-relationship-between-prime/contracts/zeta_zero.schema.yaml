$schema: "http://json-schema.org/draft-07/schema#"
title: "ZetaZero Schema"
description: "Schema for non-trivial zeta zero data and spacings."
type: object
properties:
  index:
    type: integer
    description: "The index n of the zero."
  imaginary_part:
    type: number
    description: "The imaginary part gamma_n of the zero."
  spacing:
    type: number
    description: "The spacing to the next zero gamma_{n+1} - gamma_n."
  normalized_spacing:
    type: number
    description: "The spacing normalized by the mean spacing at gamma_n."
    minimum: 0
required:
  - index
  - imaginary_part
  - spacing
  - normalized_spacing
additionalProperties: false
