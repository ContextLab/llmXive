[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-prime-gaps"
version = "0.1.0"
description = "Exploring the relationship between prime gaps and the Riemann Hypothesis"
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "scipy",
    "pandas",
    "pyyaml",
    "requests",
    "pytest",
    "ruff>=0.1.0",
    "black>=23.0.0"
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Explicitly point to the ruff.toml for lint rules if needed, 
# or define inline here for simplicity in pyproject.toml
# We rely on the separate ruff.toml for detailed rule selection
src = ["src", "tests", "setup_structure.py"]
line-length = 88
target-version = "py39"
extend-exclude = [
    "__pycache__",
    ".venv",
    "venv",
    "env"
]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501"] # Handled by black

[tool.ruff.lint.isort]
known-first-party = ["src", "tests", "setup_structure"]
force-sort-within-sections = true
lines-after-imports = 2
