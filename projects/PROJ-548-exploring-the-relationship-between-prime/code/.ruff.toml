# Ruff configuration for PROJ-548
# Linting rules to ensure code quality and consistency

[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and isort (`I`)
select = ["E", "F", "I", "W", "N", "UP", "B", "C4", "SIM"]
ignore = []

# Allow autofix for all enabled rules (if `--fix` is provided)
fixable = ["ALL"]
unfixable = []

# Exclude a few files/directories from linting
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "data/raw",
    "data/processed",
    "data/results",
    "results",
    "state",
]

# Same as `--force-exclude`
force-exclude = true

# Line length configuration (matching Black default)
line-length = 88

# Target Python version (matching project requirements)
target-version = "py311"

[lint.per-file-ignores]
# Ignore specific rules in test files if needed
"tests/*" = ["S101"]  # Allow assert in tests

[lint.isort]
# Configuration for import sorting to match Black
known-first-party = ["src", "tests", "setup_structure"]
force-sort-within-sections = true
lines-after-imports = 2