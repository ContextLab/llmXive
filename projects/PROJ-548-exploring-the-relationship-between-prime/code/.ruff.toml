# Ruff configuration for llmXive-prime-gaps
# This file is deprecated in favor of pyproject.toml but kept for IDE compatibility
# Main configuration is in pyproject.toml [tool.ruff]

target-version = "py311"
line-length = 88

select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "B",
]

ignore = [
    "E501",
    "B008",
    "C901",
]

[isort]
known-first-party = ["src"]
force-sort-within-sections = true