# Ruff configuration for llmXive project
# Enforces strict code quality and style consistency

[lint]
# Enable pycodestyle (E), Pyflakes (F), and isort (I) rules
select = ["E", "F", "I", "W", "N", "UP", "B", "C4", "SIM"]

# Ignore specific rules if necessary (e.g., line too long handled by formatter)
ignore = ["E501"]

[lint.isort]
# Configuration for import sorting
known-first-party = ["src", "tests", "setup_structure"]
force-sort-within-sections = true
lines-after-imports = 2

[format]
# Configuration for Black-compatible formatting
quote-style = "double"
indent-style = "space"
line-ending = "auto"
