repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
        args: ["--config", "code/black.toml"]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: ["--config", "code/ruff.toml", "--fix"]
      - id: ruff-format
        args: ["--config", "code/black.toml"]