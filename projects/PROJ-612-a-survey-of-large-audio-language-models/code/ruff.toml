[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "E741"]
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"tests/*" = ["S101", "N802"]
"code/load_audio.py" = ["B007"]

[format]
line-length = 100
indent-width = 4
quote-style = "double"
skip-magic-trailing-comma = false
