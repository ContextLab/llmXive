$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Output Schema"
type: "object"
properties:
  correlation_coefficient:
    type: "number"
    description: "Spearman's rank correlation coefficient."
  interpretation:
    type: "string"
    description: "Descriptive statement of direction and strength."
  rank_order_description:
    type: "string"
    description: "Explicit rank order of domains (e.g., 'Env < Music < Speech')."
  sensitivity_stable:
    type: "boolean"
    description: "True if the trend holds across rank permutations of the proxy."
  framing:
    type: "string"
    enum:
      - "associational"
    description: "Must be 'associational' as per FR-011."
  sample_size:
    type: "integer"
    description: "Number of data points (domains) used (N=3)."
  limitations:
    type: "string"
    description: "Statement acknowledging N=3 and lack of statistical significance."
required:
  - "correlation_coefficient"
  - "interpretation"
  - "rank_order_description"
  - "sensitivity_stable"
  - "framing"
  - "sample_size"
  - "limitations"
additionalProperties: false
description: "Schema for the correlation analysis report. Note: No p_value or CI fields as N=3 is statistically invalid."