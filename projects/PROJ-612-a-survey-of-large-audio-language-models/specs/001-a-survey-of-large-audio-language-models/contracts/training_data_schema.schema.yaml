$schema: "http://json-schema.org/draft-07/schema#"
title: "Training Data Estimate Schema"
type: "object"
properties:
  model_name:
    type: "string"
    description: "Name of the LALM model."
  domain:
    type: "string"
    enum:
      - "speech"
      - "music"
      - "environmental"
    description: "The domain for which the training data is estimated."
  volume_estimate:
    oneOf:
      - type: "number"
      - type: "string"
    description: "Estimated volume (hours or tokens) or relative proxy (e.g., 'High')."
  proxy_type:
    type: "string"
    enum:
      - "hours"
      - "tokens"
      - "ordinal"
    description: "Type of proxy used if exact hours are unavailable."
  source_citation:
    type: "string"
    description: "URL or paper title of the source for this estimate."
  uncertainty:
    type: "string"
    enum:
      - "high"
      - "medium"
      - "low"
    description: "Level of uncertainty in the estimate."
required:
  - "model_name"
  - "domain"
  - "volume_estimate"
  - "proxy_type"
  - "source_citation"
  - "uncertainty"
additionalProperties: false
description: "Schema for the training data volume estimates."