[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-genomic-significance"
version = "0.1.0"
description = "Assessing the Reliability of Statistical Significance in Openly Available Genomic Datasets"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "matplotlib",
    "seaborn",
    "pyyaml",
    "requests",
    "tqdm",
    "statsmodels",
    "scipy"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
  | figures
  | artifacts
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = ["data", "figures", "artifacts", ".venv", "venv", "env"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
