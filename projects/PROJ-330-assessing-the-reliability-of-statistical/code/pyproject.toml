[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src"]
known_third_party = ["pandas", "numpy", "scikit-learn", "matplotlib", "seaborn", "pyyaml", "requests", "tqdm", "statsmodels"]
