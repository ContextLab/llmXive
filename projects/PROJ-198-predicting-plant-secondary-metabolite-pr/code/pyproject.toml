[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-metabolite"
version = "0.1.0"
description = "Predicting Plant Secondary Metabolite Profiles from Genomic Data"
requires-python = ">=3.9"
dependencies = [
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "biopython>=1.81",
    "requests>=2.31.0",
    "pyyaml>=6.0.1",
    "dendropy>=4.5.2",
    "statsmodels>=0.14.0",
    "pymc3>=3.11.0",
    "tqdm>=4.65.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
]

[tool.black]
line-length = 88
target-version = ['py39']

[tool.ruff]
line-length = 88
target-version = "py39"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"
