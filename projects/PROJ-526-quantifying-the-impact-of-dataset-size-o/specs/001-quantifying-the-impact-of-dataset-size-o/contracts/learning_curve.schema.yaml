$schema: "http://json-schema.org/draft-07/schema#"
title: "LearningCurveSchema"
description: "Schema for individual learning curve data points."
type: object
properties:
  property_name:
    type: string
    description: "Name of the target property."
  sample_size:
    type: integer
    minimum: 1
    description: "Number of training samples used."
  mae:
    type: number
    minimum: 0
    description: "Mean Absolute Error on the test set."
  random_seed:
    type: integer
    description: "Random seed used for this training run."
  run_id:
    type: string
    description: "Unique identifier for the run."
required:
  - property_name
  - sample_size
  - mae
  - random_seed
  - run_id
additionalProperties: false
