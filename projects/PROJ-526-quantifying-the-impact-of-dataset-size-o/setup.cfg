[flake8]
max-line-length = 100
ignore = E501,W503
max-complexity = 15
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    data,
    state,
    docs,
    *.egg-info,
    build,
    dist

[black]
line-length = 100
skip-string-normalization = false

[isort]
profile = black
line_length = 100
known_first_party = code,utils,models
known_third_party = pandas,numpy,sklearn,pymatgen,matminer,requests,huggingface_hub