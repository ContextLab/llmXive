[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gut-microbiome-cognitive"
version = "0.1.0"
description = "Investigating the correlation between gut microbiome and cognitive function"
requires-python = ">=3.10"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.2.0",
    "statsmodels>=0.14.0",
    "seaborn>=0.12.0",
    "matplotlib>=3.7.0",
    "pyarrow>=12.0.0",
    "requests>=2.31.0",
    "zCompositions>=1.0.0",
    "huggingface_hub>=0.16.0",
    "black>=23.0.0",
    "ruff>=0.0.290",
    "pytest>=7.0.0",
]

[tool.black]
line-length = 88
target-version = ['py310']
skip-string-normalization = false
exclude = '''
(
  \\.git
  | \\.hg
  | \\.mypy_cache
  | \\.tox
  | \\.venv
  | _build
  | buck-out
  | build
  | dist
  | __pycache__
  | data
  | results
)
'''

[tool.ruff]
line-length = 88
target-version = "py310"
select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "B",
    "UP",
    "N",
]
ignore = [
    "E501",
    "B008",
    "C901",
]
exclude = [
    ".git",
    ".mypy_cache",
    ".tox",
    ".venv",
    "data",
    "results",
    "__pycache__",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]