# Ruff configuration for llmXive project
# Extends default rules with project-specific settings

[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and isort (`I`)
select = ["E", "F", "I", "W", "D", "UP"]
ignore = [
  "E501",  # Line too long (handled by black)
  "D100",  # Missing docstring in public module
  "D104",  # Missing docstring in public package
  "D203",  # 1 blank line required before class docstring (conflicts with D211)
  "D213",  # Multi-line docstring summary should start at the second line (conflicts with D212)
]

[lint.isort]
# Use a single line for imports
lines-after-imports = 2
known-first-party = ["config", "data_gap_report", "evaluate", "features", "ingest", "main", "map", "train", "setup_project"]

[format]
# Configure formatting to match Black
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
