[tool.ruff]
# Target Python version
target-version = "py311"

# Line length configuration
line-length = 88

# Exclude common directories
extend-exclude = [
    "__pycache__",
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    "data",
    "venv",
    ".venv",
    "build",
    "dist"
]

[tool.ruff.lint]
# Select specific rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]

# Ignore specific rules if needed
ignore = [
    "E501", # line too long (handled by formatter)
    "B904", # raise-without-from-inside-except (optional)
]

[tool.ruff.lint.isort]
known-first-party = ["setup_project", "config", "ingest", "features", "train", "evaluate", "map", "main", "data_gap_report"]

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Respect magic trailing commas
skip-magic-trailing-comma = false

# Unix line endings
line-ending = "lf"
