[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-coral-bleaching"
version = "0.1.0"
description = "Predicting Coral Bleaching Susceptibility from Environmental Data"
requires-python = ">=3.11"
dependencies = [
    "xgboost>=2.0.0",
    "scikit-learn>=1.4.0",
    "pandas>=2.2.0",
    "geopandas>=0.14.0",
    "rasterio>=1.3.9",
    "numpy>=1.26.0",
    "requests>=2.31.0",
    "pyyaml>=6.0.1",
    "ruff>=0.3.0",
    "black>=24.3.0",
]

[tool.ruff]
# Point to the ruff config in code/ if needed, or inherit defaults
# Since we put .ruff.toml in code/, we can run ruff from there
# This section is for global overrides if any

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''
