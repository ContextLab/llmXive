[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501", # line-too-long (handled by black)
    "C901", # too-complex (allow higher complexity for analysis logic)
]

[lint.isort]
known-first-party = ["models", "utils", "config", "data_ingestion", "resampling", "analysis", "visualization", "calibration"]
force-sort-within-sections = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
