$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for the CSV results containing Moran's I statistics and power estimates."
type: "object"
properties:
  rows:
    type: "array"
    description: "List of results for each resolution level."
    items:
      type: "object"
      properties:
        resolution_m:
          type: "integer"
          description: "Resolution in meters."
        observed_morans_i:
          type: "number"
          description: "Observed Moran's I statistic."
        p_value:
          type: "number"
          description: "P-value from permutation test."
        n_permutations:
          type: "integer"
          description: "Number of permutations used for H0."
        n_simulations:
          type: "integer"
          description: "Number of simulations used for H1."
        power_estimate:
          type: "number"
          description: "Estimated statistical power (0.0 to 1.0)."
        is_below_threshold:
          type: "boolean"
          description: "True if power < 0.80."
      required:
        - resolution_m
        - observed_morans_i
        - p_value
        - power_estimate
        - is_below_threshold
required:
  - rows
