$schema: http://json-schema.org/draft-07/schema#
title: AnalysisResult
description: >
  Schema for the output of the correlation and regression analysis
  between gut microbiome diversity metrics and cognitive flexibility.
  This artifact serves as the contract for data produced by T020-T023.
type: object
required:
  - analysis_metadata
  - correlations
  - regression_results
  - beta_diversity_results
additionalProperties: false

properties:
  analysis_metadata:
    type: object
    description: Metadata regarding the execution of the analysis.
    required:
      - timestamp
      - version
      - cohort_id
      - n_participants
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the analysis was run.
      version:
        type: string
        description: Version of the analysis pipeline used.
      cohort_id:
        type: string
        description: Identifier for the filtered cohort used (e.g., 'age_ge_65_complete').
      n_participants:
        type: integer
        minimum: 0
        description: Number of participants included in the final analysis.
      parameters:
        type: object
        description: Key parameters used during the analysis.
        properties:
          correlation_method:
            type: string
            enum: [pearson, spearman]
            description: The correlation method used.
          fdr_method:
            type: string
            description: The method used for False Discovery Rate correction.
          alpha:
            type: number
            description: Significance level (e.g., 0.05).

  correlations:
    type: array
    description: >
      List of correlation results between Alpha Diversity metrics and Cognitive Scores.
      Each entry represents one metric tested against the cognitive score.
    items:
      type: object
      required:
        - metric_name
        - correlation_coefficient
        - p_value
        - adjusted_p_value
        - confidence_interval
        - n
      properties:
        metric_name:
          type: string
          description: Name of the diversity metric (e.g., 'Shannon', 'Simpson', 'Chao1').
        correlation_coefficient:
          type: number
          description: The Pearson or Spearman correlation coefficient (r or rho).
        p_value:
          type: number
          minimum: 0
          maximum: 1
          description: Raw p-value for the correlation test.
        adjusted_p_value:
          type: number
          minimum: 0
          maximum: 1
          description: P-value adjusted for multiple comparisons (e.g., Benjamini-Hochberg).
        confidence_interval:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
          description: Lower and upper bounds of the confidence interval for the coefficient.
        n:
          type: integer
          minimum: 0
          description: Number of observations used for this specific test.
        method_used:
          type: string
          enum: [pearson, spearman]
          description: The specific statistical test used for this result.

  regression_results:
    type: array
    description: >
      Results from Linear Regression models: Cognitive Score ~ Diversity Metric + Covariates.
      Includes coefficients, standard errors, t-statistics, and p-values.
    items:
      type: object
      required:
        - model_name
        - target_variable
        - predictors
        - coefficients
        - r_squared
        - f_statistic
        - f_p_value
      properties:
        model_name:
          type: string
          description: Identifier for the model (e.g., 'Cognitive ~ Shannon + Age + Sex').
        target_variable:
          type: string
          description: Name of the dependent variable (e.g., 'CognitiveFlexibilityScore').
        predictors:
          type: array
          items:
            type: string
          description: List of independent variables included in the model.
        coefficients:
          type: array
          description: Detailed statistics for each predictor.
          items:
            type: object
            required:
              - name
              - estimate
              - std_error
              - t_value
              - p_value
              - adjusted_p_value
              - confidence_interval
            properties:
              name:
                type: string
                description: Name of the predictor.
              estimate:
                type: number
                description: Regression coefficient (beta).
              std_error:
                type: number
                description: Standard error of the estimate.
              t_value:
                type: number
                description: T-statistic.
              p_value:
                type: number
                minimum: 0
                maximum: 1
                description: Raw p-value.
              adjusted_p_value:
                type: number
                minimum: 0
                maximum: 1
                description: P-value adjusted for multiple comparisons (if applicable).
              confidence_interval:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: number
                description: 95% Confidence Interval [lower, upper].
        r_squared:
          type: number
          minimum: 0
          maximum: 1
          description: R-squared value of the model.
        f_statistic:
          type: number
          description: F-statistic for the overall model.
        f_p_value:
          type: number
          minimum: 0
          maximum: 1
          description: P-value for the F-statistic.

  beta_diversity_results:
    type: object
    description: Results from PERMANOVA analysis on Beta Diversity matrices.
    required:
      - distance_metric
      - cognitive_score_variable
      - r_squared
      - f_statistic
      - p_value
      - permutations
    properties:
      distance_metric:
        type: string
        description: The distance metric used (e.g., 'bray_curtis', 'unweighted_unifrac').
      cognitive_score_variable:
        type: string
        description: The continuous variable used as the predictor.
      r_squared:
        type: number
        minimum: 0
        maximum: 1
        description: R-squared (effect size) from PERMANOVA.
      f_statistic:
        type: number
        description: Pseudo-F statistic.
      p_value:
        type: number
        minimum: 0
        maximum: 1
        description: Permutation p-value.
      permutations:
        type: integer
        minimum: 1
        description: Number of permutations performed.