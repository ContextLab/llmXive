title: Configuration Schema
description: Schema for the distribution shift detection pipeline configuration.
type: object
properties:
  seed:
    type: integer
    description: Random seed for reproducibility.
    default: 42
  permutations:
    type: integer
    description: Number of permutations for MMD test.
    default: 1000
    minimum: 1
  window_size:
    type: integer
    description: Size of the sliding window in weeks.
    default: 12
    minimum: 2
  stride:
    type: integer
    description: Stride for the sliding window.
    default: 1
    minimum: 1
  alpha:
    type: number
    description: Significance level for hypothesis testing.
    default: 0.01
    minimum: 0.0
    maximum: 1.0
required:
  - seed
  - permutations
  - window_size
  - stride
  - alpha
additionalProperties: false
