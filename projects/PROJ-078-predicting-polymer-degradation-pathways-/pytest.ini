[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add markers for integration and slow tests
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow to run (deselect with '-m "not slow"')

# Configure verbosity
addopts = 
    -v
    --strict-markers
    --tb=short
    
# Ignore specific warnings during tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:rdkit.*

# Set timeout for tests if necessary (requires pytest-timeout plugin)
# timeout = 300
