[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "statistical-analysis-recipe-data"
version = "0.1.0"
description = "Statistical Analysis of Publicly Available Recipe Data for Ingredient Substitution Prediction"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "pyarrow",
    "statsmodels",
    "pymc",
    "scipy",
    "requests",
    "tqdm",
    "huggingface_hub"
]

[tool.setuptools.packages.find]
where = ["code"]
include = ["code*"]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# This section corresponds to T033a requirements
select = ["E4", "E7", "E9", "F"]
ignore = []
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist"
]