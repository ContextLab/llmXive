[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-code-complexity"
version = "0.1.0"
description = "Evaluating the impact of code complexity on LLM code understanding"
requires-python = ">=3.9"
dependencies = [
    "radon",
    "transformers",
    "torch",
    "datasets",
    "pandas",
    "scikit-learn",
    "statsmodels",
    "nltk",
    "evaluate",
    "scipy",
    "patsy",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]
exclude = [
    ".git",
    ".tox",
    ".venv",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # Allow asserts in tests

[tool.ruff.isort]
known-first-party = ["utils"]
force-sort-within-sections = true
