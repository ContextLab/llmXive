$schema: "http://json-schema.org/draft-07/schema#"
title: "InferenceResult"
description: "Schema for a single LLM inference result entry"
type: "object"
required:
  - "result_id"
  - "snippet_id"
  - "task_type"
  - "model_output"
  - "execution_status"
  - "is_valid_response"
properties:
  result_id:
    type: "string"
    description: "Unique identifier for the inference result"
  snippet_id:
    type: "string"
    description: "Foreign key referencing the source code snippet"
  task_type:
    type: "string"
    enum:
      - "summarization"
      - "bug_detection"
      - "code_completion"
    description: "The specific task executed"
  model_output:
    type: "string"
    description: "Raw text generated by the LLM"
  reasoning:
    type: "string"
    nullable: true
    description: "Optional reasoning string provided by the model"
  execution_status:
    type: "string"
    enum:
      - "success"
      - "failed"
      - "timeout"
      - "error"
      - "context_exceeded"
    description: "Status of the execution or validation"
  is_valid_response:
    type: "boolean"
    description: "True if the response is non-empty and not an error (used for SC-005)"
  metadata:
    type: "object"
    description: "Additional metadata such as token count or latency"
    properties:
      tokens_generated:
        type: "integer"
      latency_ms:
        type: "number"
    additionalProperties: true