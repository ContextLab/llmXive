$schema: "http://json-schema.org/draft-07/schema#"
title: "Visualization Configuration Schema"
description: "Schema for validating visualization configuration parameters."
type: "object"
properties:
  plot_type:
    type: "string"
    enum:
      - "bar_plot"
      - "spm_overlay"
    description: "Type of visualization to generate."
  roi_names:
    type: "array"
    description: "List of ROI names to include in the plot."
    items:
      type: "string"
  event_types:
    type: "array"
    description: "List of event types to include."
    items:
      type: "string"
      enum:
        - "anticipation"
        - "receipt"
  error_bar_type:
    type: "string"
    enum:
      - "sem"
      - "std"
      - "ci"
    description: "Type of error bar (default: sem)."
  p_value_annotation:
    type: "boolean"
    description: "Whether to annotate p-values on the plot."
  significance_threshold:
    type: "number"
    description: "Threshold for significance annotation (default: 0.05)."
  output_format:
    type: "string"
    enum:
      - "png"
      - "svg"
      - "pdf"
    description: "Output file format."
required:
  - "plot_type"
  - "roi_names"
  - "event_types"
  - "output_format"
