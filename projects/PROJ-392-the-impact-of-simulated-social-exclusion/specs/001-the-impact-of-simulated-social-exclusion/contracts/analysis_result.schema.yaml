$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for validating group-level statistical analysis results."
type: "object"
properties:
  roi_name:
    type: "string"
    description: "Name of the Region of Interest (e.g., 'ventral_striatum')."
  event_type:
    type: "string"
    enum:
      - "anticipation"
      - "receipt"
    description: "Type of reward event."
  group_comparison:
    type: "string"
    description: "Comparison being made (e.g., 'excluded_vs_included')."
  t_statistic:
    type: "number"
    description: "T-statistic from the two-sample t-test."
  p_value_uncorrected:
    type: "number"
    description: "Uncorrected p-value."
  p_value_fwe:
    type: "number"
    description: "FWE-corrected p-value (Small Volume Correction)."
  cohen_d:
    type: "number"
    description: "Cohen's d effect size."
  cluster_coordinates:
    type: "array"
    description: "MNI coordinates of the peak cluster (x, y, z)."
    items:
      type: "number"
    minItems: 3
    maxItems: 3
  sample_sizes:
    type: "object"
    description: "Number of participants in each group."
    properties:
      excluded:
        type: "integer"
      included:
        type: "integer"
    required:
      - "excluded"
      - "included"
  power_limitation_flag:
    type: "boolean"
    description: "True if sample size <20 per group."
  interpretation_framing:
    type: "string"
    enum:
      - "associational"
      - "causal"
    description: "Framing of the result (must be 'associational' for cross-dataset, 'causal' for within-task)."
  framing_check:
    type: "string"
    enum:
      - "pass"
      - "fail"
    description: "Result of the automated causal verb scan (SC-005)."
required:
  - "roi_name"
  - "event_type"
  - "t_statistic"
  - "p_value_fwe"
  - "cohen_d"
  - "sample_sizes"
  - "interpretation_framing"
  - "framing_check"
