$schema: "http://json-schema.org/draft-07/schema#"
title: "BenchmarkResult"
description: "Schema for a single benchmark evaluation result."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task from the dataset."
  score:
    type: "number"
    description: "Numerical score assigned by the judger."
  pass:
    type: "boolean"
    description: "Whether the task passed the evaluation criteria."
  judger_log:
    type: "string"
    description: "Raw output from the judger script."
  status:
    type: "string"
    enum:
      - "COMPLETED"
      - "TIMEOUT_EXCEEDED"
      - "OOM_ERROR"
      - "ERROR"
    description: "Execution status of the trajectory."
  error_message:
    type: "string"
    nullable: true
    description: "Error message if status is not COMPLETED."
required:
  - task_id
  - score
  - pass
  - status
additionalProperties: false
