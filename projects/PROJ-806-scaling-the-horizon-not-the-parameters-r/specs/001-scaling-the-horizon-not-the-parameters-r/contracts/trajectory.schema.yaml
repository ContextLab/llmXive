$schema: "http://json-schema.org/draft-07/schema#"
title: "Trajectory"
description: "Schema for a single generation attempt."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier from the dataset."
  input_prompt:
    type: "string"
    description: "The prompt sent to the model."
  generated_text:
    type: "string"
    description: "The model's output."
  token_count:
    type: "integer"
    description: "Total tokens generated."
  status:
    type: "string"
    enum:
      - "COMPLETED"
      - "TIMEOUT_EXCEEDED"
      - "OOM_ERROR"
      - "ERROR"
    description: "Execution status."
  error_message:
    type: "string"
    nullable: true
    description: "Error message if status is not COMPLETED."
required:
  - task_id
  - input_prompt
  - generated_text
  - token_count
  - status
additionalProperties: false
