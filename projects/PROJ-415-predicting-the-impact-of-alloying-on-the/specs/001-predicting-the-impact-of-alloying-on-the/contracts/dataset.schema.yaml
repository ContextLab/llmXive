$schema: "http://json-schema.org/draft-07/schema#"
title: "FCC Self-Diffusion Dataset Schema"
description: "Schema for the curated FCC self-diffusion dataset used in the alloying impact study."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the record."
  host_element:
    type: "string"
    description: "Symbol of the host metal (e.g., 'Ni')."
  solute_element:
    type: "string"
    description: "Symbol of the solute metal (e.g., 'Cr')."
  crystal_structure:
    type: "string"
    description: "Crystal structure of the host."
    enum:
      - "FCC"
  diffusion_mode:
    type: "string"
    description: "Type of diffusion."
    enum:
      - "self"
  activation_energy_eV:
    type: "number"
    description: "Activation energy in eV."
    minimum: 0
  solute_concentration_at_pct:
    type: "number"
    description: "Solute concentration in atomic percent."
    minimum: 0
  solute_radius_pm:
    type: "number"
    description: "Atomic radius of solute in picometers."
    minimum: 0
  host_radius_pm:
    type: "number"
    description: "Atomic radius of host in picometers."
    minimum: 0
  size_mismatch:
    type: "number"
    description: "Calculated size mismatch: (solute_r - host_r) / host_r."
  source_url:
    type: "string"
    description: "URL of the original data source."
required:
  - id
  - host_element
  - solute_element
  - crystal_structure
  - diffusion_mode
  - activation_energy_eV
  - solute_concentration_at_pct
  - solute_radius_pm
  - host_radius_pm
  - size_mismatch
additionalProperties: false
