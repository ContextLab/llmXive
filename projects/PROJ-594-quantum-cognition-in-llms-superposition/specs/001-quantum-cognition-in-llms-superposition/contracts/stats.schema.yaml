$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Test Output Schema"
type: "object"
properties:
  test_type:
    type: "string"
    description: "Type of statistical test: 'paired_t_test'."
  p_value:
    type: "number"
    description: "p-value from paired t-test."
  t_statistic:
    type: "number"
    description: "t-statistic from paired t-test."
  cohen_d:
    type: "number"
    description: "Cohen's d effect size."
  significance:
    type: "boolean"
    description: "True if p-value < 0.05 (statistically significant)."
  runs_count:
    type: "integer"
    description: "Number of paired runs (must be ≥ 5)."
required:
  - test_type
  - p_value
  - t_statistic
  - cohen_d
  - significance
  - runs_count
additionalProperties: false
