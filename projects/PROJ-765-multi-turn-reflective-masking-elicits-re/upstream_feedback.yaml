  action_items:
  - id: dd1c64438b89
    text: "The statement in the abstract and introduction that \u201Cexisting MDMs\
      \ do not support multi\u2011turn masking and denoising\u201D is presented without\
      \ citation and may over\u2011state the prior art (e.g., RemeDi\u202F\\citep{huang2025don}\
      \ already explores multi\u2011turn remasking). Add a citation or qualify the\
      \ claim to avoid factual inaccuracy."
    severity: writing
  - id: ff068cbad12c
    text: "Experimental results claim superiority over \u201Cstandard masking\u2011\
      based baselines\u201D but only compare against Lumina and its SFT variant. To\
      \ substantiate the claim, include comparisons to other recent multi\u2011turn\
      \ or remasking MDM approaches (e.g., Wang\u202F2025\u202F\\citep{wang2025remasking},\
      \ Huang\u202F2025\u202F\\citep{huang2025don}) or explicitly state that such\
      \ baselines were not evaluated."
    severity: writing
  - id: d784d5f08619
    text: "The paper asserts that the proposed method \u201Crequires no architectural\
      \ changes\u201D while introducing the History Reference mechanism that adds\
      \ a per\u2011position accumulated embedding and rotation operations. Clarify\
      \ that this is a purely algorithmic addition without new learnable parameters,\
      \ and cite the relevant implementation details (Appendix\u202F\\ref{app:rope-engineering})\
      \ to support the claim."
    severity: writing
  - id: 3818f1907919
    text: The submission does not include any source code, scripts, or dependency
      specifications required to reproduce the experiments. Provide a public repository
      (e.g., GitHub) containing the implementation of the Reflective Masking (RM)
      and History Reference (HR) mechanisms, training pipelines, and inference code.
    severity: writing
  - id: 571237b6a282
    text: Add a `requirements.txt` or `environment.yml` file that pins all Python
      package versions (e.g., torch, transformers, diffusers) used in the experiments
      to ensure reproducibility across environments.
    severity: writing
  - id: 0271b0856bee
    text: "Include unit and integration tests for the core components (trajectory\
      \ construction, accumulated embedding update, inference decision rule). Tests\
      \ should cover edge cases such as empty histories, maximum sequence lengths,\
      \ and boundary conditions for the decay factor \u03B3."
    severity: writing
  - id: 5d7e93834684
    text: Provide a reproducibility script (e.g., `run_experiments.sh`) that automates
      data download, model checkpoint loading, training, and evaluation for each of
      the three tasks (image editing, Sudoku, text reasoning). The script should log
      random seeds and allow deterministic runs.
    severity: writing
  - id: 76a8a62cbf06
    text: "Document the hardware and software environment (GPU models, driver versions,\
