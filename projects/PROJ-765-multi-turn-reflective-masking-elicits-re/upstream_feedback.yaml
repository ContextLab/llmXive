  - id: ee2773bbe603
    text: "The paper states that no architectural changes are required, yet it introduces\
      \ History Reference (HR) and History Embedding Rotation (HER), which add a per\u2011\
      position accumulated embedding and modify the model\u2019s input. This contradicts\
      \ the \u201Cno architectural changes\u201D claim. Clarify whether HR/HER are\
      \ considered architectural changes and adjust the claim accordingly."
    severity: writing
  - id: 1e5bdb457750
    text: "Eq.\u202F1\u2019s inference rule re\u2011masks a token whenever p(MASK)\
      \ > p(current token). The manuscript does not discuss that this can trigger\
      \ re\u2011masking for correct but uncertain tokens, potentially causing loops.\
      \ Explain how the rule avoids such spurious revisions or add a confidence safeguard."
    severity: science
  - id: b17e6c8fc5ac
    text: "Temper the claim that Reflective Masking is a \u201Cfundamental primitive\u201D\
