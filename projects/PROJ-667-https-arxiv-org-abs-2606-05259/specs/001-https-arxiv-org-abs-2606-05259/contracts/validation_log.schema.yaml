$schema: "http://json-schema.org/draft-07/schema#"
title: "Validation Log Schema"
description: "Schema for the training/evaluation validation log."
type: "object"
properties:
  status:
    type: "string"
    description: "Execution status."
    enum:
      - "SUCCESS"
      - "FAILURE"
      - "DATA_ONLY"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the run."
  steps_executed:
    type: "integer"
    description: "Number of training steps completed."
    minimum: 0
  model_loaded:
    type: "boolean"
    description: "Whether the model loaded successfully."
  data_loaded:
    type: "boolean"
    description: "Whether the data loader yielded at least one batch."
  error_message:
    type: "string"
    description: "Error details if status is FAILURE."
  logs:
    type: "array"
    description: "List of log lines from the execution."
    items:
      type: "string"
    minItems: 2
required:
  - status
  - timestamp
  - steps_executed
  - model_loaded
  - data_loaded
  - logs
additionalProperties: false