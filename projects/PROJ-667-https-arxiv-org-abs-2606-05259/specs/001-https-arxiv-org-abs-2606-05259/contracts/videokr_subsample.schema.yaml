$schema: "http://json-schema.org/draft-07/schema#"
title: "VideoKR Subsample Dataset Schema"
description: "Schema for the subsampled VideoKR dataset used in CPU-only validation."
type: "object"
properties:
  video_path:
    type: "string"
    description: "Path to the video file."
    minLength: 1
  question:
    type: "string"
    description: "The question associated with the video."
    minLength: 1
  answer:
    type: "string"
    description: "The ground truth answer."
    minLength: 1
  rationale:
    type: "string"
    description: "The reasoning trace (optional)."
  source:
    type: "string"
    description: "Identifier for the source dataset."
    const: "VideoKR"
  sample_id:
    type: "integer"
    description: "Unique identifier for the subsampled example."
    minimum: 0
    maximum: 99
  video_tensor_shape:
    type: "string"
    description: "Shape of the synthetic video tensor (if synthetic data is used)."
    pattern: "^\\(\\d+, \\d+, \\d+, \\d+\\)$"
required:
  - video_path
  - question
  - answer
  - source
  - sample_id
additionalProperties: false