$schema: "http://json-schema.org/draft-07/schema#"
title: "User-Track Pair Dataset Schema"
description: "Schema for the aggregated analysis dataset at the User-Track Pair level. Matches FR-001 (adolescent_exposure_ratio) and FR-004 (User-Track Pair)."
type: "object"
properties:
  user_id:
    type: "string"
    description: "Unique identifier for the user."
  track_id:
    type: "string"
    description: "Unique identifier for the track."
  mean_vividness:
    type: "number"
    description: "Average vividness rating for the user-track pair."
    minimum: 1.0
    maximum: 7.0
  mean_valence:
    type: "number"
    description: "Average valence rating for the user-track pair."
  adolescent_exposure_ratio:
    type: "number"
    description: "Raw ratio of listens during adolescence (birth year to birth year + 15) to total listens. (FR-001)."
  log_odds_preference:
    type: "number"
    description: "Log-odds of adolescent preference (Valid Metric)."
  popularity:
    type: "number"
    description: "Overall popularity score of the track."
  n_cues:
    type: "integer"
    description: "Number of memory cues matched for this pair."
    minimum: 1
  total_listens:
    type: "integer"
    description: "Total number of listens for this user-track pair."
    minimum: 3
  birth_year:
    type:
      - "integer"
      - "null"
    description: "User's birth year. May be null."
  global_exposure_proxy:
    type:
      - "number"
      - "null"
    description: "Global exposure metric if birth_year is missing (FR-008). Used for descriptive analysis only."
  is_excluded_from_primary:
    type: "boolean"
    description: "True if user has missing birth year and is excluded from primary LMM."
  is_simulated:
    type: "boolean"
    description: "True if data is generated for prototype validation."
required:
  - user_id
  - track_id
  - mean_vividness
  - adolescent_exposure_ratio
  - popularity
  - n_cues
  - total_listens
  - match_threshold
additionalProperties: false