$schema: "http://json-schema.org/draft-07/schema#"
title: "Regression Output Schema"
description: "Schema for the LMM regression summary output."
type: "object"
properties:
  term:
    type: "string"
    description: "Name of the model term (e.g., 'residualized_exposure' or 'log_odds_preference')."
  estimate:
    type: "number"
    description: "Estimated coefficient value."
  std_err:
    type: "number"
    description: "Standard error of the estimates."
  z_value:
    type: "number"
    description: "Z-statistic."
  p_value:
    type: "number"
    description: "P-value for the term."
  vif:
    type: "number"
    description: "Variance Inflation Factor."
  metric_used:
    type: "string"
    description: "Indicator of which metric was used ('spec_metric' or 'valid_metric')."
required:
  - term
  - estimate
  - std_err
  - z_value
  - p_value
  - metric_used
additionalProperties: false