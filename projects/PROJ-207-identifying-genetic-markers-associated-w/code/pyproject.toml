[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-gwas-pipeline"
version = "0.1.0"
description = "GWAS Pipeline for Honeybee Colony Collapse Disorder"
requires-python = ">=3.11"
dependencies = [
    "plink2",
    "freebayes",
    "bwa",
    "scikit-learn",
    "pandas",
    "numpy",
    "statsmodels",
    "dwgsim",
    "pyyaml",
    "requests",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "pre-commit",
    "pytest",
]

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"code/utils/checksum_verify.py" = ["E402"]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]