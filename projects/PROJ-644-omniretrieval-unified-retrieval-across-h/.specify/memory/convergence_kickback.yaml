- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: methodology-4ae36c87
  location: research.md:Statistical & Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'The plan explicitly states ''Causal Inference: Not applicable'' and frames
    the work as ''System Validation'' (pass/fail). However, the spec title ''Reproduce
    & validate: OmniRetrieval'' and the use of standard benchmarks (BEIR, Spider,
    LC-QuAD) imply an intent to validate the *performance* claims of the original
    paper (e.g., accuracy, F1, execution correctness). A binary ''does it run?'' test
    cannot validate a retrieval system''s effectiveness. The methodology conflates
    ''operational integrity'' with ''scientific validation''.'
- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: methodology-0002e73c
