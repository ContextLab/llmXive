- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: scientific_soundness-be81231b
  location: 'plan.md:Phase 3: Validation & Testing'
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan validates 'Dispatch Correctness' (SC-002) via 'manual inspection
    of execution logs' (spec.md:SC-002). This is a subjective, non-reproducible validation
    method for a core architectural claim. A scientific validation of a routing system
    requires an automated, deterministic oracle (e.g., asserting that a query labeled
    'SQL' in the dataset metadata *must* trigger the SQL engine, and asserting failure
    if it does not). Manual inspection cannot be automated in CI and introduces observer
    bias.
- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: scientific_soundness-5cd631f4
  location: research.md:Statistical & Methodological Rigor
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan explicitly states 'No external LLM API keys (mock/local only)' and
    uses a 'mock LLM client' (spec.md:US-1). However, the 'OmniRetrieval' paper likely
    claims performance improvements derived from a unified generation/retrieval loop.
    Validating the *system's operational integrity* (does it run?) is distinct from
    validating the *paper's scientific claims* (does it work better?). The plan conflates
    these, risking a 'null result' where the system runs perfectly but fails to reproduce
    the paper's actual performance claims because the core generative component is
    mocked or replaced with a lightweight model (MiniLM) that lacks the necessary
    reasoning capabilities.
- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: scientific_soundness-3c2a9ab3
  location: research.md:Model & Engine Strategy
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: The plan uses `all-MiniLM-L6-v2` for the Text Retrieval Engine. This is a
    bi-encoder trained for semantic similarity, not a generative model capable of
    complex reasoning or multi-hop retrieval often required in heterogeneous benchmarks.
    If the 'OmniRetrieval' framework relies on a generative component to unify the
    retrieval logic (as implied by 'Unified Retrieval'), replacing it with a static
    bi-encoder fundamentally alters the system architecture being tested, making the
    validation of the 'unified' claim invalid.
