- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: methodology-2f06e555
  location: research.md:Statistical & Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: The sample size (50 queries per dataset) is justified for 'system validation'
    but is statistically insufficient to validate the *performance* claims of a retrieval
    system on heterogeneous benchmarks. If the goal is to claim the system 'works'
    for retrieval, the methodology must define a metric (e.g., Execution Accuracy
    for SQL, nDCG for Text) and a threshold, not just 'zero crashes'.
- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: data_resources-5cad6d85
  location: 'research.md:Dataset Strategy

    '
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The plan cites `datasets.load_dataset('lc-quad')` as the primary source for
    the SPARQL benchmark. The standard LC-QuAD benchmark (1000+ queries) is typically
    hosted as `lc-quad` or `lc-quad-2` on HuggingFace, but the specific dataset ID
    `lc-quad` often points to a deprecated or incomplete version, or requires a specific
    split (e.g., `lc-quad-2`). More critically, the plan assumes the dataset contains
    `gold_sparql` and `graph_path` fields directly accessible via the loader. LC-QuAD
    datasets on HF often require post-processing to extract the RDF graph files (Turtle/N-Triples)
    from the dataset's metadata or separate download links, which contradicts the
    'streaming' and 'CPU-only' constraints if the full graph must be materialized.
    The plan must verify the exact HF dataset ID and confirm the `graph_path` field
    is directly available or define the extraction logic to avoid runtime failures.
- artifact: projects/PROJ-644-omniretrieval-unified-retrieval-across-h/specs/001-omniretrieval-unified-retrieval-across-h/plan.md
  id: data_resources-ab485506
  location: 'research.md:Dataset Strategy

    '
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The plan relies on `datasets.load_dataset('spider')` for the SQL engine. The
    Spider dataset on HuggingFace is a complex multi-file dataset (train, dev, test,
    databases). The plan assumes a simple loader exists that provides `db_id` and
    `gold_sql` alongside the database files. However, the Spider dataset on HF often
    requires manual handling of the database zip files and schema mapping. The plan's
    assumption that `datasets.load_dataset('spider')` will directly yield `db_path`
    (path to SQLite) is likely incorrect; the loader usually returns the schema and
    queries, requiring the user to download and unzip the database files separately.
    This gap in the data loading strategy risks violating the 'graceful degradation'
    and 'no external dependencies' constraints if the database files are not automatically
    fetched and unpacked.
