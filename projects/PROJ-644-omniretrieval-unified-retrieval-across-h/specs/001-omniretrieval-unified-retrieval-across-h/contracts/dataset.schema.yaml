$schema: "http://json-schema.org/draft-07/schema#"
title: "OmniRetrieval Dataset Input Schema"
description: "Schema for validating input dataset entries from BEIR, Spider, and LC-QuAD."
type: "object"
properties:
  query_id:
    type: "string"
    description: "Unique identifier for the query."
  source_type:
    type: "string"
    enum:
      - "TEXT"
      - "SQL"
      - "SPARQL"
    description: "Type of data source."
  query_text:
    type: "string"
    description: "The natural language query string."
  gold_label:
    type: "string"
    nullable: true
    description: "The ground truth answer or query (SQL/SPARQL)."
  metadata:
    type: "object"
    description: "Additional metadata (e.g., db_id, corpus_id)."
    properties:
      db_id:
        type: "string"
        nullable: true
      corpus_id:
        type: "string"
        nullable: true
required:
  - query_id
  - source_type
  - query_text
additionalProperties: true
