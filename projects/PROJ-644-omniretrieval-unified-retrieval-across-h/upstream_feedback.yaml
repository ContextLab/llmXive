    severity: science
  - id: 5c11321cbc97
    text: Dataset versions not specified for reproducibility. Section 5.1 lists 13
      datasets (Spider, BIRD, BEIR, etc.) but does not state version numbers or commit
      hashes. Add version identifiers for each dataset to enable exact replication.
    severity: writing
  - id: 9ae36fde2c0c
    text: External endpoint URLs lack versioning. Appendix A references Wikidata SPARQL
      endpoint (query.wikidata.org/sparql) and Neo4j demo endpoint without version
      tags. These are mutable; archive snapshots or versioned endpoints should be
      cited.
    severity: writing
  - id: 98f7c5aa1dbc
    text: Dataset licenses not itemized. Appendix A states "use each under its respective
      license" but does not enumerate licenses per dataset. Add a table mapping each
      of the 13 datasets to its specific license for compliance verification.
    severity: writing
  - id: 771fd70675a0
    text: Missing-data handling not discussed. The benchmark spans 309 knowledge bases
      with heterogeneous schemas, but no protocol for missing values, incomplete triples,
      or empty query results is described. Clarify how such cases are treated in metrics.
    severity: science
  - id: 8884ed8a69f4
    text: In figures/cross_backbone_selector.tex, the figure* environment contains
      three distinct elements (two figures and a table) with separate \\captionof
      commands. This fragments the figure's semantic identity and confuses PDF accessibility
      tools. Consolidate into a single figure with subcaptions or split into separate
      figure environments.
    severity: writing
  - id: 66c66b05a8bf
    text: In figures/cross_backbone_selector.tex, the table uses \\resizebox{\\linewidth}{!}{...}
      to fit a 0.315\\linewidth minipage. This risks distorting aspect ratios and
      rendering text illegibly small at print scale. Use font size adjustments (e.g.,
      \\small) or \\tabularx instead.
    severity: writing
  - id: 96afa7b3d28c
    text: In figures/qwen_scaling.tex, the right minipage width is set to 0.28\\linewidth.
      This leaves insufficient space for the embedded plot (qwen_diversity_fig.pdf)
      to display axis labels and legends legibly. Increase width to at least 0.35\\linewidth
      or reduce the left plot's width.
    severity: writing
  - id: 8c0fb38c8c7b
    text: In figures/prompts/*.tex, the promptbox uses \\footnotesize for code content.
      In a two-column print layout, this may be too small for readers to parse the
      prompt structure. Consider \\scriptsize for the box frame but \\normalsize for
      the verbatim content, or ensure the box height does not exceed 3-4 lines.
    severity: writing
  - id: 3844287e820f
    text: The claim that unified-representation methods have a 'fundamental limit'
      is based on a constrained baseline that is not comparable to full-scale unified
      methods. The paper acknowledges this setup is 'non-comparable' (Table 2) yet
      draws general conclusions. Either remove this claim or provide a fair comparison.
    severity: science
  - id: 77a36298681a
    text: The 'Retrieval Accuracy' metric macro-averages NDCG@10 (ranking quality,
      continuous) with Execution Match (binary correctness). These measure fundamentally
      different aspects of retrieval. The paper should clarify this distinction or
      use separate metrics for each paradigm.
    severity: science
  - id: 5d34e256a3fd
    text: The claim that evidence selection 'recovers' semantically equivalent answers
      from alternative KBs relies on the LLM-as-a-Judge accepting alternative KBs
      as correct. This is a design choice for the judge metric, not a general retrieval
      property. Clarify this distinction to avoid conflating metric definition with
      task objective.
    severity: writing
  - id: 237efcf6018e
    text: Tone down the claim that source selection identifies correct KBs with 'high
      accuracy' (Introduction) to reflect the ~66% average performance reported in
      Table 1.
    severity: writing
  - id: 28b627734478
    text: Add a limitation regarding the context-window constraints of the source-selection
      step when scaling beyond 309 KBs, currently missing from Section 7.
    severity: writing
  - id: 5a10634aff4d
    text: Clarify that the benchmark is skewed toward Search (7/13 datasets) and discuss
      how this affects the 'Unified' performance claim.
    severity: writing
