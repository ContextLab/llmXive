# Configuration for Molecular Reactivity Prediction Pipeline
# Project: PROJ-442-predicting-molecular-reactivity-using-ma

# General settings
general:
  project_name: "Molecular Reactivity Prediction"
  version: "1.0.0"
  seed: 42

# Data Ingestion Settings
data:
  source_url: "https://zenodo.org/record/3969375"
  input_format: "jsonl"
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  min_samples_per_class: 1000

# Reaction Templates (SMARTS patterns) for US1
# Used by src/utils/chemistry.py for deterministic template matching
reaction_templates:
  # SN1 Reaction: Dissociative mechanism involving a carbocation intermediate.
  # Pattern: Cleavage of a C-O bond where the carbon becomes positively charged
  # and the leaving group departs.
  # Note: This pattern matches the transformation of an ether/alcohol to a carbocation + leaving group.
  SN1:
    description: "SN1 reaction template (dissociative)"
    smarts: "[C:1]([O:2])>>[C:1]+[O:2]-"
    # Alternative more general pattern for heterolytic cleavage if the specific one is too strict:
    # "[C:1]([O:2])>>[C:1]+.[O:2]-"

  # SN2 Reaction: Concerted backside attack mechanism.
  # Pattern: Nucleophilic substitution where the bond forms as the bond breaks.
  # Note: The example in the prompt "[C:1]([O:2])>>[C:1]=[O:2]" actually represents oxidation (alcohol to carbonyl).
  # A true SN2 pattern requires a nucleophile (Nu) attacking a carbon with a leaving group (LG).
  # We will define a pattern representing a generic backside attack on an alkyl halide/ether.
  # Pattern: [Nu:1]-[C:2]-[LG:3] >> [Nu:1]-[C:2]-[LG:3] (transition state) or product [Nu:1]-[C:2] + [LG:3]
  # To strictly follow the prompt's intent of "backside attack logic" while using a valid SMIRKS for classification:
  # We define a pattern that captures the substitution event.
  SN2:
    description: "SN2 reaction template (concerted backside attack)"
    # Generic SN2: Nucleophile attacking Carbon, Leaving Group departing.
    # Using a simplified representation of the transformation [Nu]-C-[LG] -> [Nu]-C + [LG]
    smarts: "[#7,#8,#9,#15,#16,#17:1]-[C:2]-[Cl,Br,I,OTs:3]>>[#7,#8,#9,#15,#16,#17:1]-[C:2].[Cl,Br,I,OTs:3]"
    # If the dataset specifically uses the oxidation-like notation provided in the prompt as a proxy for SN2
    # (which is chemically inaccurate but might be a dataset quirk), we could include it, but we stick to
    # chemically valid SMARTS for SN2 here.
    # Fallback to a pattern matching the prompt's specific string if the dataset is synthetic/fake:
    # "[C:1]([O:2])>>[C:1]=[O:2]" (This is actually oxidation, but included below as a comment if strictly required by legacy data)

  # Diels-Alder Reaction: [4+2] cycloaddition.
  # Pattern: Diene (4 pi electrons) + Dienophile (2 pi electrons) -> Cyclohexene ring.
  # Standard SMARTS for Diels-Alder:
  # Diene: C=C-C=C, Dienophile: C=C (often with EWG)
  Diels-Alder:
    description: "Diels-Alder reaction template ([4+2] cycloaddition)"
    # Matches the formation of a cyclohexene ring from a diene and a dienophile
    smarts: "[C:1]=[C:2].[C:3]=[C:4]>>[C:1]1[C:3][C:4][C:2]1"
    # More specific pattern often used in literature:
    # "[C:1]=[C:2][C:3]=[C:4].[C:5]=[C:6]>>[C:1]1[C:5][C:6][C:4][C:3][C:2]1"

# Model Training Settings
model:
  algorithm: "xgboost"
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  validation_strategy: "LOSO" # Leave-One-Scaffold-Out
  n_splits: 5
  max_runtime_seconds: 1800 # 30 minutes

# Evaluation Settings
evaluation:
  metrics:
    - "spearman_correlation"
    - "rmse"
    - "mae"
  permutation_test:
    enabled: true
    n_iterations: 1000
    p_value_threshold: 0.01

# Logging Settings
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/pipeline.log"
  max_bytes: 10485760
  backup_count: 5