name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Linter
        run: |
          ruff check code/ tests/

      - name: Run Black Check
        run: |
          black --check code/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests
        run: |
          pytest tests/unit/ -v --cov=code --cov-report=xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Integration Tests
        run: |
          pytest tests/integration/ -v

  cpu-only-runner-check:
    runs-on: ubuntu-latest
    needs: [lint-and-format]
    steps:
      - uses: actions/checkout@v4

      - name: Verify CPU-only compatibility
        run: |
          # This job ensures the pipeline runs on standard CPU runners
          # with multiple vCPUs and sufficient RAM (2+ GB free)
          echo "Running on ${{ runner.os }} with ${{ runner.arch }} architecture"
          echo "CPU Count: $(nproc)"
          echo "Memory Info:"
          free -h
          
          # Basic sanity check that core modules import without GPU dependencies
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "from utils.logging import get_logger; print('Logging module OK')"
          python -c "from scheduler.curriculum_scheduler import CurriculumScheduler; print('Scheduler module OK')"