[project]
name = "llmXive"
version = "0.1.0"
description = "State-Guided Curriculum for MobileGym"
requires-python = ">=3.10"
dependencies = []

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
)/
'''