[project]
name = "llmxive-follow-up-extending-mobilegym-a"
version = "0.1.0"
description = "State-Guided Curriculum for MobileGym"
requires-python = ">=3.10"
dependencies = [
    "mobilegym @ git+https://github.com/llmXive/mobilegym.git@main",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.ruff]
# Ruff configuration is in .ruff.toml