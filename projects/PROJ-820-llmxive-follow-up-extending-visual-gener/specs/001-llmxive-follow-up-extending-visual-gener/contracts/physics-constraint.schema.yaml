$schema: "http://json-schema.org/draft-07/schema#"
title: "PhysicsConstraint"
description: "Machine-readable physics constraints generated by pymunk for a scene. Used as 2D ground truth for instruction adherence."
type: "object"
required:
  - "scene_id"
  - "constraints"
  - "validity"
properties:
  scene_id:
    type: "string"
    description: "Unique identifier for the scene."
  constraints:
    type: "object"
    description: "Physics rules derived from simulation."
    required:
      - "bounding_boxes"
      - "collision_rules"
    properties:
      bounding_boxes:
        type: "array"
        description: "List of object bounding boxes."
        items:
          type: "object"
          required:
            - "object_id"
            - "x"
            - "y"
            - "width"
            - "height"
          properties:
            object_id:
              type: "string"
              description: "Identifier for the object."
            x:
              type: "number"
              description: "X coordinate of top-left corner."
            y:
              type: "number"
              description: "Y coordinate of top-left corner."
            width:
              type: "number"
              description: "Width of the bounding box."
            height:
              type: "number"
              description: "Height of the bounding box."
      collision_rules:
        type: "array"
        description: "List of collision constraints (e.g., 'above', 'no-intersection')."
        items:
          type: "object"
          required:
            - "rule_type"
            - "objects"
          properties:
            rule_type:
              type: "string"
              description: "Type of rule (e.g., 'above', 'no-intersection')."
            objects:
              type: "array"
              description: "List of object IDs involved in the rule."
              items:
                type: "string"
  validity:
    type: "boolean"
    description: "True if constraints are logically consistent."
  contradiction_detected:
    type: "boolean"
    description: "True if logical contradictions were found."
  natural_language_descriptor:
    type: "string"
    description: "Human-readable string describing the constraints (for prompt engineering)."