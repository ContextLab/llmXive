$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationResult"
description: "Result of geometric consistency evaluation for a generated image. Measures 2D alignment with pymunk projections."
type: "object"
required:
  - "image_id"
  - "prompt_id"
  - "group"
  - "violation_flag"
  - "violation_type"
properties:
  image_id:
    type: "string"
    description: "Unique identifier for the generated image."
  prompt_id:
    type: "string"
    description: "Identifier of the prompt used."
  group:
    type: "string"
    enum:
      - "baseline"
      - "experimental"
      - "control"
    description: "Experimental group assignment."
  detected_objects:
    type: "array"
    description: "Objects detected by YOLOv8n."
    items:
      type: "object"
      required:
        - "object_id"
        - "confidence"
        - "bbox"
      properties:
        object_id:
          type: "string"
          description: "Detected object ID."
        confidence:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Detection confidence score."
        bbox:
          type: "array"
          description: "Bounding box [x, y, width, height]."
          items:
            type: "number"
          minItems: 4
          maxItems: 4
  violation_flag:
    type: "boolean"
    description: "True if the image violates the 2D projection constraints."
  violation_type:
    type: "string"
    enum:
      - "floating"
      - "interpenetration"
      - "none"
      - "detection_failure"
    description: "Type of violation detected."
  confidence_score:
    type: "number"
    description: "Average confidence of detected objects."
  error_message:
    type: "string"
    description: "Error message if evaluation failed."