# Dataset Schema Definitions for Avian Vocal Complexity Project
# This file defines the expected structure of all generated CSV datasets.

noise_mapped:
  description: "Intermediate dataset mapping bird recordings to OSM-derived noise levels."
  columns:
    record_id:
      type: string
      nullable: false
      description: "Unique identifier for the recording."
    species_id:
      type: string
      nullable: false
      description: "Xeno-canto species code."
    location_lat:
      type: float
      nullable: false
      description: "Latitude of the recording location."
    location_lon:
      type: float
      nullable: false
      description: "Longitude of the recording location."
    land_use:
      type: string
      nullable: false
      description: "OSM land-use classification (e.g., urban, rural, wild)."
    noise_level_db:
      type: float
      nullable: false
      description: "Estimated ambient noise level in dB(A)."
    source_url:
      type: string
      nullable: true
      description: "Original Xeno-canto URL."

vocal_metrics:
  description: "Extracted vocal complexity metrics for each recording."
  columns:
    record_id:
      type: string
      nullable: false
      description: "Unique identifier for the recording."
    species_id:
      type: string
      nullable: false
      description: "Xeno-canto species code."
    syllable_count:
      type: integer
      nullable: false
      description: "Number of detected syllables."
    duration_sec:
      type: float
      nullable: false
      description: "Total duration of the recording in seconds."
    bandwidth_hz:
      type: float
      nullable: false
      description: "Frequency bandwidth (high - low) in Hz."
    spectral_entropy:
      type: float
      nullable: false
      description: "Spectral entropy of the vocalization."
    snr_db:
      type: float
      nullable: false
      description: "Signal-to-Noise Ratio in dB."

final_dataset:
  description: "Final processed dataset combining noise mapping and vocal metrics."
  columns:
    record_id:
      type: string
      nullable: false
    species_id:
      type: string
      nullable: false
    location_lat:
      type: float
      nullable: false
    location_lon:
      type: float
      nullable: false
    land_use:
      type: string
      nullable: false
    noise_level_db:
      type: float
      nullable: false
    syllable_count:
      type: integer
      nullable: false
    duration_sec:
      type: float
      nullable: false
    bandwidth_hz:
      type: float
      nullable: false
    spectral_entropy:
      type: float
      nullable: false
    snr_db:
      type: float
      nullable: false
    complexity_score:
      type: float
      nullable: false
      description: "Aggregated complexity metric (normalized)."
