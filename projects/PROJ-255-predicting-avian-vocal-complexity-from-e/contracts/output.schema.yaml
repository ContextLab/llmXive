# Model Output Schema Definitions
# This file defines the expected structure of model result outputs.

model_results:
  description: "Results from the Linear Mixed-Effects modeling."
  columns:
    metric:
      type: string
      nullable: false
      description: "The complexity metric name (e.g., syllable_count)."
    predictor:
      type: string
      nullable: false
      description: "The predictor variable (noise_level_db)."
    estimate:
      type: float
      nullable: false
      description: "Model coefficient estimate."
    std_error:
      type: float
      nullable: false
      description: "Standard error of the estimate."
    t_value:
      type: float
      nullable: false
      description: "T-statistic."
    p_value:
      type: float
      nullable: false
      description: "Raw p-value."
    p_value_fdr:
      type: float
      nullable: false
      description: "FDR-corrected p-value."
    r_squared_marginal:
      type: float
      nullable: true
      description: "Marginal R-squared."
    r_squared_conditional:
      type: float
      nullable: true
      description: "Conditional R-squared."

loso_results:
  description: "Leave-One-Species-Out cross-validation results."
  columns:
    left_out_species:
      type: string
      nullable: false
      description: "Species ID excluded in this fold."
    r_squared:
      type: float
      nullable: false
      description: "R-squared on the held-out species."
    rmse:
      type: float
      nullable: false
      description: "Root Mean Squared Error."

power_analysis:
  description: "Power analysis report (stored as JSON/Markdown, but schema for structure)."
  fields:
    sample_size:
      type: integer
      description: "Number of species analyzed."
    effect_size:
      type: float
      description: "Minimum detectable effect size."
    power:
      type: float
      description: "Statistical power achieved."
    alpha:
      type: float
      description: "Significance level."

sensitivity_summary:
  description: "Summary of sensitivity analysis across SNR thresholds."
  columns:
    threshold:
      type: float
      nullable: false
      description: "SNR threshold used."
    sample_size:
      type: integer
      nullable: false
      description: "Number of records retained."
    correlation_r:
      type: float
      nullable: false
      description: "Pearson correlation coefficient."
    variation_percent:
      type: float
      nullable: false
      description: "Percentage variation from baseline."
