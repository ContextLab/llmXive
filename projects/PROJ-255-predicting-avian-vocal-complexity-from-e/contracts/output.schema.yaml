$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: >-
  Defines the schema for model results generated by the avian vocal complexity
  analysis pipeline. This schema validates outputs from Linear Mixed-Effects models,
  correlation analyses, and sensitivity assessments.
type: object
required:
  - metadata
  - model_results
  - correlation_analysis
  - sensitivity_analysis
  - diagnostics

properties:
  metadata:
    type: object
    description: Execution context and versioning information
    required:
      - pipeline_version
      - timestamp
      - data_source_hash
      - model_type
    properties:
      pipeline_version:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description: Semantic version of the pipeline execution
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of model execution
      data_source_hash:
        type: string
        minLength: 64
        maxLength: 64
        description: SHA-256 hash of the input dataset (final_dataset.csv)
      model_type:
        type: string
        const: "LinearMixedEffects"
        description: Type of statistical model used
      software_versions:
        type: object
        properties:
          python:
            type: string
          statsmodels:
            type: string
          numpy:
            type: string
          pandas:
            type: string

  model_results:
    type: object
    description: Primary regression coefficients and statistics from LME model
    required:
      - fixed_effects
      - random_effects
      - model_fit
    properties:
      fixed_effects:
        type: array
        description: Fixed effect coefficients (noise_level, intercept)
        items:
          type: object
          required:
            - term
            - coefficient
            - std_error
            - t_value
            - p_value
            - p_value_fdr_corrected
          properties:
            term:
              type: string
              description: Name of the predictor variable
            coefficient:
              type: number
              description: Estimated regression coefficient
            std_error:
              type: number
              description: Standard error of the coefficient
            t_value:
              type: number
              description: T-statistic
            p_value:
              type: number
              minimum: 0
              maximum: 1
              description: Raw p-value
            p_value_fdr_corrected:
              type: number
              minimum: 0
              maximum: 1
              description: Benjamini-Hochberg FDR corrected p-value
      random_effects:
        type: object
        description: Variance components for random effects
        required:
          - species
          - location
        properties:
          species:
            type: object
            required:
              - variance
              - std_dev
            properties:
              variance:
                type: number
                minimum: 0
              std_dev:
                type: number
                minimum: 0
          location:
            type: object
            required:
              - variance
              - std_dev
            properties:
              variance:
                type: number
                minimum: 0
              std_dev:
                type: number
                minimum: 0
          residual:
            type: number
            minimum: 0
            description: Residual variance
      model_fit:
        type: object
        description: Global model fit statistics
        required:
          - log_likelihood
          - aic
          - bic
          - r_squared_marginal
          - r_squared_conditional
        properties:
          log_likelihood:
            type: number
          aic:
            type: number
          bic:
            type: number
          r_squared_marginal:
            type: number
            minimum: 0
            maximum: 1
            description: Variance explained by fixed effects only
          r_squared_conditional:
            type: number
            minimum: 0
            maximum: 1
            description: Variance explained by fixed and random effects

  correlation_analysis:
    type: object
    description: Pearson correlation between noise level and vocal complexity
    required:
      - correlation_coefficient
      - confidence_interval
      - p_value
      - sample_size
    properties:
      correlation_coefficient:
        type: number
        minimum: -1
        maximum: 1
        description: Pearson's r
      confidence_interval:
        type: object
        required:
          - lower
          - upper
          - level
        properties:
          lower:
            type: number
          upper:
            type: number
          level:
            type: number
            description: Confidence level (e.g., 0.95)
      p_value:
        type: number
        minimum: 0
        maximum: 1
      sample_size:
        type: integer
        minimum: 1

  sensitivity_analysis:
    type: object
    description: Results from SNR threshold sensitivity analysis
    required:
      - thresholds_tested
      - stability_metric
      - results_by_threshold
    properties:
      thresholds_tested:
        type: array
        items:
          type: number
        description: List of SNR thresholds (dB) evaluated
      stability_metric:
        type: object
        required:
          - max_variation_percent
          - passes_threshold
        properties:
          max_variation_percent:
            type: number
            description: Maximum variation in effect size across thresholds
          passes_threshold:
            type: boolean
            description: True if variation <= 10% (SC-005)
      results_by_threshold:
        type: array
        items:
          type: object
          required:
            - threshold_db
            - sample_size
            - correlation_r
            - effect_size
          properties:
            threshold_db:
              type: number
            sample_size:
              type: integer
            correlation_r:
              type: number
            effect_size:
              type: number
            false_positive_estimate:
              type: number

  diagnostics:
    type: object
    description: Model validation and diagnostic information
    required:
      - residual_normality
      - homoscedasticity
      - outliers_detected
      - convergence_status
    properties:
      residual_normality:
        type: object
        required:
          - test_name
          - statistic
          - p_value
        properties:
          test_name:
            type: string
            enum: ["Shapiro-Wilk", "Anderson-Darling", "Jarque-Bera"]
          statistic:
            type: number
          p_value:
            type: number
      homoscedasticity:
        type: object
        required:
          - test_name
          - statistic
          - p_value
        properties:
          test_name:
            type: string
          statistic:
            type: number
          p_value:
            type: number
      outliers_detected:
        type: integer
        minimum: 0
        description: Count of outliers identified (e.g., Cook's distance > 1)
      convergence_status:
        type: string
        enum: ["converged", "max_iterations_reached", "singular_fit", "failed"]
        description: Model convergence status

  generated_files:
    type: array
    description: List of files generated by this analysis run
    items:
      type: object
      required:
        - path
        - type
        - hash
      properties:
        path:
          type: string
        type:
          type: string
          enum: ["csv", "png", "json", "md"]
        hash:
          type: string
          minLength: 64
          maxLength: 64