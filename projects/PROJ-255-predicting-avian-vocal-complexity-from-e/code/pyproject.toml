[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-avian-vocal-complexity"
version = "0.1.0"
description = "Predicting Avian Vocal Complexity from Environmental Noise Levels"
requires-python = ">=3.9"
dependencies = [
    "librosa==0.10.1",
    "statsmodels==0.14.0",
    "osmnx==1.8.0",
    "pandas==2.1.0",
    "scikit-learn==1.3.0",
    "matplotlib==3.8.0",
    "seaborn==0.13.0",
    "requests==2.31.0",
    "geopy==2.4.0",
    "pytest==7.4.0",
    "black==23.12.1",
    "ruff==0.1.9",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
# Same as Black
line-length = 88
target-version = "py39"

# Exclude a few common directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Assume Python 3.9
[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

# Allow autofix for all enabled rules (when `--fix` is provided)
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = [
    "code/tests",
]
pythonpath = [
    "code",
]