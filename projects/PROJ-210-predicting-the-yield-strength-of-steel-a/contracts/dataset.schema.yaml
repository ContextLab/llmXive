# Dataset Schema for Steel Yield Strength Prediction
# This schema defines the required structure for the processed dataset
# used in User Story 1 (Data Ingestion and Preprocessing).

required_columns:
  - yield_strength_mpa
  - carbon_pct
  - manganese_pct
  - chromium_pct
  - nickel_pct
  - molybdenum_pct
  - heat_treatment_temp_c
  - cooling_rate_c_per_min
  - holding_time_min
  - heat_treatment_type
  - c_mn_ratio
  - cr_ni_ratio
  - cooling_rate_x_holding_time
  - c_x_cooling_rate
  - orthogonalized_cx_cr
  - orthogonalized_cx_ni

target_column: yield_strength_mpa

column_types:
  yield_strength_mpa: numeric
  carbon_pct: numeric
  manganese_pct: numeric
  chromium_pct: numeric
  nickel_pct: numeric
  molybdenum_pct: numeric
  heat_treatment_temp_c: numeric
  cooling_rate_c_per_min: numeric
  holding_time_min: numeric
  heat_treatment_type: string
  c_mn_ratio: numeric
  cr_ni_ratio: numeric
  cooling_rate_x_holding_time: numeric
  c_x_cooling_rate: numeric
  orthogonalized_cx_cr: numeric
  orthogonalized_cx_ni: numeric

interaction_columns:
  - c_mn_ratio
  - cr_ni_ratio
  - cooling_rate_x_holding_time
  - c_x_cooling_rate
  - orthogonalized_cx_cr
  - orthogonalized_cx_ni

description: |
  This schema ensures that the ingestion pipeline produces a dataset with
  all necessary composition, thermal, and derived features for model training.
  It validates that no null values exist in the target variable and that
  derived features (ratios, interactions, orthogonalized interactions) are present.