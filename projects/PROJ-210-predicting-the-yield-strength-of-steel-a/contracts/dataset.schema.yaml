title: Steel Yield Strength Dataset Schema
description: Schema for the processed steel yield strength dataset used in the prediction pipeline.
type: object
required:
  - composition
  - thermal_parameters
  - derived_features
  - target
properties:
  composition:
    type: object
    description: Elemental composition percentages.
    required:
      - Carbon
      - Manganese
      - Chromium
      - Nickel
    properties:
      Carbon:
        type: number
        minimum: 0
        maximum: 100
      Manganese:
        type: number
        minimum: 0
        maximum: 100
      Chromium:
        type: number
        minimum: 0
        maximum: 100
      Nickel:
        type: number
        minimum: 0
        maximum: 100
      Silicon:
        type: number
        minimum: 0
        maximum: 100
      Molybdenum:
        type: number
        minimum: 0
        maximum: 100
      Vanadium:
        type: number
        minimum: 0
        maximum: 100
      Copper:
        type: number
        minimum: 0
        maximum: 100
  thermal_parameters:
    type: object
    description: Heat treatment parameters.
    required:
      - austenitizing_temperature
      - holding_time
      - cooling_rate
    properties:
      austenitizing_temperature:
        type: number
        description: Temperature in Celsius.
      holding_time:
        type: number
        description: Time in minutes.
      cooling_rate:
        type: number
        description: Cooling rate in degrees per second.
      heat_treatment_type:
        type: string
        enum:
          - quench_and_temper
          - normalize
          - anneal
          - stress_relief
  derived_features:
    type: object
    description: Engineered features including ratios and interactions.
    properties:
      C_Mn_ratio:
        type: number
      Cr_Ni_ratio:
        type: number
      cooling_rate_holding_time_interaction:
        type: number
      C_cooling_rate_interaction:
        type: number
      C_Mn_ratio_orthogonalized:
        type: number
      Cr_Ni_ratio_orthogonalized:
        type: number
      cooling_rate_holding_time_interaction_orthogonalized:
        type: number
      C_cooling_rate_interaction_orthogonalized:
        type: number
  target:
    type: object
    description: Target variable.
    required:
      - yield_strength
    properties:
      yield_strength:
        type: number
        description: Yield strength in MPa.
        minimum: 0
additionalProperties: false
