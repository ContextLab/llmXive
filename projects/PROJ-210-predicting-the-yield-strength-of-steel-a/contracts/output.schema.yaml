$schema: "http://json-schema.org/draft-07/schema#"
title: Sensitivity Report Schema
description: Schema for the sensitivity analysis report generated by src/models/sensitivity.py
type: object
required:
  - thresholds
  - results
  - justification
properties:
  thresholds:
    type: array
    description: List of thresholds tested
    items:
      type: number
    minItems: 3
    maxItems: 3
  results:
    type: object
    description: Results for each threshold
    additionalProperties:
      type: object
      required:
        - feature_count
        - selected_features
        - stability_metrics
        - is_stable
      properties:
        feature_count:
          type: integer
          description: Number of features selected at this threshold
          minimum: 0
        selected_features:
          type: array
          description: List of selected feature names
          items:
            type: string
        stability_metrics:
          type: object
          required:
            - jaccard_index
            - spearman_correlation
            - kuncheva_index
          properties:
            jaccard_index:
              type: number
              description: Jaccard index for feature selection stability
              minimum: 0.0
              maximum: 1.0
            spearman_correlation:
              type: number
              description: Spearman rank correlation
              minimum: -1.0
              maximum: 1.0
            kuncheva_index:
              type: number
              description: Kuncheva index for cluster stability
              minimum: -1.0
              maximum: 1.0
        is_stable:
          type: boolean
          description: Whether the selection is stable (Jaccard >= 0.8)
  justification:
    type: object
    required:
      - threshold_source
      - references
    properties:
      threshold_source:
        type: string
        description: Source of the threshold values (e.g., "Community standard", "Literature")
      references:
        type: array
        description: List of references justifying the thresholds
        items:
          type: object
          required:
            - author
            - year
            - title
          properties:
            author:
              type: string
            year:
              type: integer
            title:
              type: string
            doi:
              type: string
            url:
              type: string
additionalProperties: false