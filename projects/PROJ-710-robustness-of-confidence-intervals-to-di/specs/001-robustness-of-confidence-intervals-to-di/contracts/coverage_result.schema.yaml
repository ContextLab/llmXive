$schema: "http://json-schema.org/draft-07/schema#"
title: "Coverage Result"
description: "Schema for a single Monte Carlo replication result (Outer Loop). Note: bootstrap_replication is NOT included as the unit of analysis is the replication, not the bootstrap iteration."
type: object
properties:
  result_id:
    type: string
    description: "Unique identifier for the result."
  dataset_name:
    type: string
    description: "Name of the dataset."
  epsilon:
    type: number
    description: "Privacy budget used."
    minimum: 0
  noise_type:
    type: string
    enum:
      - "Laplace"
      - "Gaussian"
    description: "Type of noise applied."
  statistic_type:
    type: string
    enum:
      - "Mean"
      - "Regression"
    description: "Type of statistic calculated."
  adjustment_method:
    type: string
    enum:
      - "None"
      - "BiasCorrected"
      - "VarianceInflated"
    description: "Method used for adjustment."
  true_parameter:
    type: number
    description: "The fixed ground truth parameter value."
  ci_lower:
    type: number
    description: "Lower bound of the confidence interval."
  ci_upper:
    type: number
    description: "Upper bound of the confidence interval."
  covered:
    type: integer
    enum:
      - 0
      - 1
    description: "Whether the CI covers the true parameter."
  seed:
    type: integer
    description: "Random seed used for this replication."
required:
  - result_id
  - dataset_name
  - epsilon
  - noise_type
  - statistic_type
  - adjustment_method
  - true_parameter
  - ci_lower
  - ci_upper
  - covered
  - seed
additionalProperties: false