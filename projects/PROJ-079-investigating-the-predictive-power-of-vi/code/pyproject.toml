[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-predictive-immune"
version = "0.1.0"
description = "Predictive Modeling of Host Immune Response from Viral Sequence Features"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "biopython",
    "pandas",
    "scikit-learn",
    "rpy2",
    "statsmodels",
    "seaborn",
    "matplotlib",
    "requests",
    "numpy",
    "scipy",
    "pyyaml",
    "tqdm",
    "pybedtools",
    "python-dotenv",
    "pydantic",
    "pytest",
    "black",
    "flake8",
    "hdi"
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
    "*.egg-info"
]
per-file-ignores = [
    "__init__.py:F401"
]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true