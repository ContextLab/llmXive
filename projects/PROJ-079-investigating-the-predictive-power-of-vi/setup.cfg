[flake8]
max-line-length = 120
exclude = .git,__pycache__,venv,.venv
ignore = E203, E266, W503
per-file-ignores =
    tests/*:S101

[black]
line-length = 120
target-version = py39
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''
