$schema: http://json-schema.org/draft-07/schema#
title: Correlation Results Schema
description: Schema for the JSON output containing statistical results.
type: object
properties:
  analysis_metadata:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
      atlas_type:
        type: string
      n_subjects:
        type: integer
      power_warning:
        type: boolean
        description: "True if N < 30."
      collinearity_warning:
        type: boolean
        description: "True if VIF > 5."
      data_gap_halted:
        type: boolean
        description: "True if the pipeline halted due to missing data."
      data_source:
        type: string
        description: "Source of the entrainment data (e.g., 'real', 'synthetic')."
    required:
      - timestamp
      - atlas_type
      - n_subjects
      - power_warning
      - collinearity_warning
      - data_gap_halted
      - data_source
  results:
    type: array
    items:
      type: object
      properties:
        metric_name:
          type: string
          enum:
            - "clustering_coefficient"
            - "characteristic_path_length"
        correlation_coefficient:
          type: number
          description: "Univariate Spearman r."
        partial_correlation_coefficient:
          type: number
          description: "Partial correlation r controlling for the other metric."
        raw_p_value:
          type: number
        adjusted_p_value:
          type: number
        is_significant:
          type: boolean
          description: "True only if p_adj < 0.05."
      required:
        - metric_name
        - correlation_coefficient
        - partial_correlation_coefficient
        - raw_p_value
        - adjusted_p_value
        - is_significant
    description: "List of results for each topology metric. Empty if data_gap_halted is true."
required:
  - analysis_metadata
  - results
additionalProperties: false