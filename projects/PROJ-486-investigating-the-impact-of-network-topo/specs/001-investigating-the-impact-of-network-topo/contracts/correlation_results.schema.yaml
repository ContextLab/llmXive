$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Results Schema"
type: "object"
properties:
  model_id:
    type: "string"
    description: "Unique ID for the model run"
  predictor:
    type: "string"
    enum: ["Clustering_Coefficient", "Characteristic_Path_Length"]
    description: "Predictor variable name"
  coefficient:
    type: "number"
    description: "Standardized regression coefficient (or orthogonalized coefficient if VIF > 5)"
  p_value:
    type: "number"
    description: "Raw p-value (or p-value for orthogonalized predictor)"
  adjusted_p_value:
    type: "number"
    description: "Holm-Bonferroni corrected p-value"
  is_significant:
    type: "boolean"
    description: "True if adjusted_p_value < 0.05"
  vif:
    type: "number"
    description: "Variance Inflation Factor"
  collinearity_warning:
    type: "boolean"
    description: "True if VIF > 5 (Orthogonalization applied)"
  power_warning:
    type: "boolean"
    description: "True if N < 30"
  r_squared:
    type: "number"
    description: "Model R-squared (joint if collinearity warning)"
  effect_size_r:
    type: "number"
    description: "Pearson/Spearman correlation coefficient (r) between predictor and outcome"
  method_note:
    type: "string"
    description: "Optional note about method used (e.g., 'Orthogonalized' if VIF > 5)"
required:
  - "model_id"
  - "predictor"
  - "coefficient"
  - "p_value"
  - "adjusted_p_value"
  - "is_significant"
  - "vif"
  - "collinearity_warning"
  - "power_warning"
  - "r_squared"
  - "effect_size_r"
additionalProperties: false