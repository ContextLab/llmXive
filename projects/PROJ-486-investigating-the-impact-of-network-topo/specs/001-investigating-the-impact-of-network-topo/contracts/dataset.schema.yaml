$schema: "http://json-schema.org/draft-07/schema#"
title: "Input Dataset Schema"
description: "Schema for the input CSV/Parquet containing subject IDs and entrainment metrics."
type: object
properties:
  subject_id:
    type: string
    description: "Unique identifier for the subject."
  entrainment_metric:
    type: number
    description: "Numeric value representing neural entrainment strength."
required:
  - subject_id
  - entrainment_metric
additionalProperties: true
