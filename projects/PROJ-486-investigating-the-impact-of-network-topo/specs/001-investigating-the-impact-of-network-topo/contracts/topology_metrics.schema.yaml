$schema: "http://json-schema.org/draft-07/schema#"
title: "Topology Metrics Schema"
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the subject"
  atlas_type:
    type: "string"
    enum: ["Schaefer", "AAL", "Power"]
    description: "Parcellation scheme used"
  clustering_coefficient:
    type: "number"
    description: "Clustering coefficient value (0.0 to 1.0)"
  characteristic_path_length:
    type: "number"
    description: "Characteristic path length value"
  is_zero_variance:
    type: "boolean"
    description: "Flag if the metric has zero variance across the sample"
  data_source:
    type: "string"
    enum: ["Real", "Simulated"]
    description: "Source of the data"
required:
  - "subject_id"
  - "atlas_type"
  - "clustering_coefficient"
  - "characteristic_path_length"
  - "is_zero_variance"
  - "data_source"
additionalProperties: false