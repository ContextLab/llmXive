$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
description: "Schema for the final analysis results CSV containing topology metrics, regression statistics, and warnings."
type: object
properties:
  subject_id:
    type: string
    description: "Unique identifier for the subject."
  atlas_type:
    type: string
    enum:
      - "Schaefer"
      - "AAL"
      - "Power"
    description: "Parcellation scheme used."
  clustering_coefficient:
    type: number
    description: "Weighted clustering coefficient."
  characteristic_path_length:
    type: number
    description: "Characteristic path length."
  entrainment_strength:
    type: number
    description: "Entrainment metric value."
  source:
    type: string
    enum:
      - "Real"
      - "Simulated"
    description: "Data source type."
  model_r_squared:
    type: number
    description: "R-squared value of the Multiple Linear Regression model."
  beta_clustering:
    type: number
    description: "Standardized coefficient for clustering coefficient."
  beta_path_length:
    type: number
    description: "Standardized coefficient for path length."
  vif_clustering:
    type: number
    description: "Variance Inflation Factor for clustering coefficient."
  vif_path_length:
    type: number
    description: "Variance Inflation Factor for path length."
  p_value_raw_clustering:
    type: number
    description: "Raw p-value for clustering coefficient."
  p_value_adj_clustering:
    type: number
    description: "Holm-Bonferroni adjusted p-value for clustering coefficient."
  p_value_raw_path_length:
    type: number
    description: "Raw p-value for path length."
  p_value_adj_path_length:
    type: number
    description: "Holm-Bonferroni adjusted p-value for path length."
  collinearity_warning:
    type: boolean
    description: "True if VIF > 5 for any predictor."
  power_warning:
    type: boolean
    description: "True if N < 30."
  status:
    type: string
    enum:
      - "OK"
      - "Non-informative"
      - "Simulated"
    description: "Status of the analysis for this row."
required:
  - subject_id
  - atlas_type
  - clustering_coefficient
  - characteristic_path_length
  - entrainment_strength
  - source
  - model_r_squared
  - collinearity_warning
  - power_warning
  - status
additionalProperties: false
