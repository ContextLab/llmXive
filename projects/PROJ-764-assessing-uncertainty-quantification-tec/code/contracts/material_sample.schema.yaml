$schema: http://json-schema.org/draft-07/schema#
title: Material Sample
description: Schema for material sample data used in the OQMD dataset.
type: object
required:
  - sample_id
  - formula
  - elements
  - crystal_system
  - space_group
  - formation_energy
properties:
  sample_id:
    type: string
    description: Unique identifier for the material sample.
  formula:
    type: string
    description: Chemical formula of the material (e.g., "Fe2O3").
  elements:
    type: array
    items:
      type: string
    description: List of constituent elements.
  crystal_system:
    type: string
    enum:
      - cubic
      - tetragonal
      - orthorhombic
      - monoclinic
      - triclinic
      - hexagonal
      - rhombohedral
    description: Crystal system of the material.
  space_group:
    type: integer
    description: Space group number (1-230).
  formation_energy:
    type: number
    description: Formation energy in eV/atom.
  structure_id:
    type: string
    description: Optional external structure identifier.
  metadata:
    type: object
    description: Additional metadata fields.
    additionalProperties: true
