$schema: "http://json-schema.org/draft-07/schema#"
title: "Aggregated Analysis Dataset Schema"
description: "Schema for the aggregated analysis dataset containing vulnerability counts and metadata (Unit of Analysis = Task)."
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task."
  benchmark_name:
    type: "string"
    enum: ["HumanEval", "MBPP"]
    description: "Benchmark dataset used for the task."
  source_type:
    type: "string"
    enum: ["LLM", "Human"]
    description: "Origin of the code sample (LLM = Aggregated)."
  model_name:
    type: "string"
    description: "Name of the model (if LLM) or 'Human'."
  lines_of_code:
    type: "number"
    description: "Mean number of lines of code for the group."
  vulnerability_count:
    type: "number"
    description: "Mean count of vulnerabilities detected (raw)."
  sample_count:
    type: "integer"
    description: "Number of samples aggregated (for LLM)."
  is_valid:
    type: "boolean"
    description: "Whether the task had at least one valid sample."
  content_hash:
    type: "string"
    description: "SHA-256 hash of the aggregated content."
required:
  - task_id
  - benchmark_name
  - source_type
  - model_name
  - lines_of_code
  - vulnerability_count
  - sample_count
  - is_valid
  - content_hash
additionalProperties: false
