[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-code-vuln-density"
version = "0.1.0"
description = "Evaluating the Impact of Code Generation Models on Code Vulnerability Density"
requires-python = ">=3.11"
dependencies = [
    "transformers",
    "datasets",
    "bandit",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "matplotlib",
    "seaborn",
    "pyyaml",
    "pingouin"
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "pytest",
    "pytest-cov"
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]
extend-exclude = [
    "__pycache__",
    ".venv",
    "data",
    "results",
    "state"
]

[tool.ruff.per-file-ignores]
"code/__init__.py" = ["F401"]
"code/main.py" = ["B008"]

[tool.ruff.isort]
known-first-party = ["config", "download", "generate", "analyze", "stats", "main", "state_utils", "setup_project"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests"
]