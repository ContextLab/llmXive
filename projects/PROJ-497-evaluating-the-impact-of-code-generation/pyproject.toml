[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-eval-code-vuln-density"
version = "0.1.0"
description = "Evaluating the Impact of Code Generation Models on Code Vulnerability Density"
requires-python = ">=3.11"
dependencies = [
    "transformers==4.36.2",
    "datasets==2.14.6",
    "bandit==1.7.5",
    "scikit-learn==1.3.2",
    "statsmodels==0.14.0",
    "pandas==2.1.3",
    "matplotlib==3.8.2",
    "seaborn==0.13.0",
    "pyyaml==6.0.1",
    "pingouin==0.5.3",
]

[project.optional-dependencies]
dev = [
    "pytest==7.4.3",
    "ruff==0.1.6",
    "black==23.11.0",
]

[tool.setuptools]
packages = ["code"]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
