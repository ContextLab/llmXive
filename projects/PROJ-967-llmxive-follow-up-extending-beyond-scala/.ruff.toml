# Ruff Configuration for llmXive Follow-up Project
# Pinned configuration to satisfy Constitution Principle I (Reproducibility)

target-version = "py311"
line-length = 100

[lint]
# Enable all recommended rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
    "RUF",# Ruff-specific rules
]

ignore = [
    "E501", # Line too long (handled by line-length above)
    "B008", # Do not perform function call in argument defaults (common in CLI args)
]

# Exclude generated or external directories
exclude = [
    ".git",
    "__pycache__",
    ".eggs",
    "*.egg-info",
    "build",
    "dist",
    "venv",
    ".venv",
]

[lint.isort]
known-first-party = ["code", "tests"]
force-sort-within-sections = true

[lint.per-file-ignores]
# Allow unused imports in __init__.py files
"__init__.py" = ["F401"]

# Allow print statements in scripts (debugging)
"code/*.py" = ["T201"]
