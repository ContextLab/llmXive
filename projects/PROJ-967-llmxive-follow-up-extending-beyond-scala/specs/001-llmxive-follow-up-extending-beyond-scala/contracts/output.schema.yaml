$schema: http://json-schema.org/draft-07/schema#
title: Analysis Results Schema
description: Schema for the final output metrics from the Random Forest analysis.
type: object
required:
  - r2_score
  - mae
  - p_value
  - n_samples
  - timestamp
properties:
  r2_score:
    type: number
    description: "Coefficient of determination from 5-fold cross-validation."
  mae:
    type: number
    description: "Mean Absolute Error from 5-fold cross-validation."
  p_value:
    type: number
    description: "P-value from the permutation test."
    minimum: 0
    maximum: 1
  cv_std:
    type: number
    description: "Standard deviation of R² across folds."
  feature_importance:
    type: object
    description: "Map of feature names to their importance scores (after PCA)."
    additionalProperties:
      type: number
  n_samples:
    type: integer
    description: "Number of samples used in the training set."
    minimum: 1
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the execution."
  config:
    type: object
    description: "Configuration used for the run."
    properties:
      n_estimators:
        type: integer
      random_state:
        type: integer
      cv_folds:
        type: integer
      default: 5