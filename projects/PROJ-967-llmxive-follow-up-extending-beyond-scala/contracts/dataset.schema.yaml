# Dataset Schema Contract for Z-Reward
# This file defines the expected structure of the ingested dataset.

required_columns:
  - prompt
  - image_path
  - teacher_logits
  - student_scalar
  - human_annotations
  - primary_dimension

column_types:
  prompt: str
  image_path: str
  teacher_logits: list[float]
  student_scalar: float
  human_annotations: dict[str, float]
  primary_dimension: str

rubric_dimensions:
  - Alignment
  - Realism
  - Aesthetics
  - Plausibility

description: >
  The Z-Reward dataset schema. 
  teacher_logits: A list of 4 floats representing the teacher model's scores for the 4 rubric dimensions.
  student_scalar: A single float representing the student model's scalar output.
  human_annotations: A dictionary mapping dimension names to human-annotated scores.
  primary_dimension: The dimension used for calculating fidelity loss (MAE).
