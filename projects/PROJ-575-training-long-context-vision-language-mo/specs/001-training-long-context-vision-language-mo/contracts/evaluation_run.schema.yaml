$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationRun"
description: "Schema for a single evaluation run metadata and configuration."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (UUID)."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the run."
  sample_size:
    type: "integer"
    description: "Number of samples evaluated in this run."
    minimum: 1
  context_lengths:
    type: "array"
    description: "List of context lengths tested."
    items:
      type: "integer"
      minimum: 1
  model_baseline:
    type: "string"
    description: "Name of the baseline model used."
  model_target:
    type: "string"
    description: "Name of the target model used."
  hardware_config:
    type: "string"
    description: "Description of the hardware environment."
  quantization_level:
    type: "string"
    description: "Quantization level used (e.g., 4-bit, float16)."
required:
  - run_id
  - timestamp
  - sample_size
  - context_lengths
  - model_baseline
  - model_target
  - hardware_config
  - quantization_level
additionalProperties: false