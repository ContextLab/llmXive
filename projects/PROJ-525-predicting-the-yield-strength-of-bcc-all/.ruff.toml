# Ruff configuration for PROJ-525
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults (common in dataclasses)
]

[lint.per-file-ignores]
"code/__init__.py" = ["F401"]
"tests/*" = ["S101"]  # Allow assertions in tests

[lint.isort]
known-first-party = ["config", "utils", "00_fetch_uncertainty", "01_download", "02_engineer"]
