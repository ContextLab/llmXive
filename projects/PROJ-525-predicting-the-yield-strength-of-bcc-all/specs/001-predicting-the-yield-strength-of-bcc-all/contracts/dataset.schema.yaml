$schema: "http://json-schema.org/draft-07/schema#"
title: "Filtered BCC Alloy Dataset Schema"
description: "Schema for the cleaned, BCC-filtered, and normalized alloy dataset."
type: object
properties:
  metadata:
    type: object
    properties:
      source_doi:
        type: string
        description: "DOI of the source dataset (e.g., 10.1038/s41597-020-00768-9)"
      filter_applied:
        type: string
        description: "Filter criteria (e.g., 'BCC phase only, yield_strength > 0')"
      normalization_method:
        type: string
        description: "Method used to normalize compositions (e.g., 'sum_to_1.0')"
      n_samples:
        type: integer
        description: "Number of valid entries after filtering"
    required:
      - source_doi
      - filter_applied
      - n_samples
  records:
    type: array
    items:
      type: object
      properties:
        system_id:
          type: string
          description: "Unique identifier for the alloy"
        elemental_composition:
          type: object
          description: "Map of element symbol to atomic fraction"
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
        yield_strength:
          type: number
          description: "Yield strength in MPa"
          minimum: 0
        crystal_structure:
          type: string
          description: "Crystal structure (must be 'BCC')"
          enum:
            - "BCC"
            - "Body-Centered Cubic"
        is_bcc:
          type: boolean
          description: "Explicit flag for BCC phase"
          const: true
        sum_check:
          type: number
          description: "Sum of elemental compositions (must be 1.0)"
          const: 1.0
      required:
        - system_id
        - elemental_composition
        - yield_strength
        - crystal_structure
        - is_bcc
        - sum_check
required:
  - metadata
  - records
additionalProperties: false
