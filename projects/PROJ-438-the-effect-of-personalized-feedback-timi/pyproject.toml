[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-438-feedback-timing"
version = "0.1.0"
description = "Analysis of the effect of personalized feedback timing on skill acquisition"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "statsmodels",
    "pyyaml",
    "requests",
    "tqdm",
    "scipy",
    "pytest",
    "flake8",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | \.eggs
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
