$schema: "http://json-schema.org/draft-07/schema#"
title: "ResearchClawBench Score Artifact"
description: "Schema for results/<task_id>_score.json"
type: object
properties:
  task_id:
    type: string
  agent_id:
    type: string
    description: "Identifier of the agent used (e.g., 'mock')"
  score:
    type: number
    description: "Final calculated score (0-100)"
  breakdown:
    type: array
    description: "Score per criterion"
    items:
      type: object
      properties:
        criterion_id:
          type: string
        weight:
          type: number
        achieved:
          type: number
        status:
          type: string
          enum: ["passed", "failed", "partial"]
      required:
        - criterion_id
        - weight
        - achieved
        - status
  execution_time:
    type: number
    description: "Wall-clock time in seconds"
  status:
    type: string
    enum: ["success", "failed"]
  error_message:
    type: string
    description: "Present only if status is 'failed'"
required:
  - task_id
  - agent_id
  - score
  - breakdown
  - execution_time
  - status
additionalProperties: false