$schema: "http://json-schema.org/draft-07/schema#"
title: "PhytoplanktonSample"
description: "Schema for a single aligned phytoplankton measurement point."
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier (UUID)."
  latitude:
    type: "number"
    description: "Latitude in degrees."
  longitude:
    type: "number"
    description: "Longitude in degrees."
  timestamp:
    type: "string"
    description: "ISO8601 string (YYYY-MM)."
  chlorophyll_a:
    type: "number"
    description: "Chlorophyll-a concentration in mg/m³."
  temperature:
    type: "number"
    description: "Sea surface temperature in °C."
  salinity:
    type: "number"
    description: "Salinity in PSU."
  nutrients:
    type: "object"
    description: "Nutrient concentrations."
    properties:
      nitrate:
        type: "number"
      phosphate:
        type: "number"
    required:
      - nitrate
      - phosphate
  basin:
    type: "string"
    description: "Ocean basin identifier."
  quality_flag:
    type: "string"
    enum:
      - "valid"
      - "interpolated"
      - "excluded"
    description: "Data quality status."
  image_patch_path:
    type: "string"
    description: "Path to the real satellite patch file (32x32 or native)."
required:
  - sample_id
  - latitude
  - longitude
  - timestamp
  - chlorophyll_a
  - temperature
  - salinity
  - nutrients
  - basin
  - quality_flag
  - image_patch_path