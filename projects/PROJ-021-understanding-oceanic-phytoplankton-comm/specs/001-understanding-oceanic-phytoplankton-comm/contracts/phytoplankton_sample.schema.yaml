$schema: http://json-schema.org/draft-07/schema#
$id: https://llmxive.org/schemas/phytoplankton_sample.schema.yaml
title: Phytoplankton Sample Schema
description: |
  Schema for individual phytoplankton observation samples.
  Represents a single spatiotemporal data point containing in-situ measurements
  and associated environmental variables.
type: object
required:
  - sample_id
  - timestamp
  - latitude
  - longitude
  - basin_id
  - chl_a
  - sst
  - salinity
properties:
  sample_id:
    type: string
    description: Unique identifier for the sample
    pattern: "^[A-Z]{2}\\d{8}-[A-Z0-9]{6}$"
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the observation
  latitude:
    type: number
    minimum: -90
    maximum: 90
    description: Latitude in decimal degrees (WGS84)
  longitude:
    type: number
    minimum: -180
    maximum: 180
    description: Longitude in decimal degrees (WGS84)
  basin_id:
    type: string
    description: Ocean basin identifier (e.g., PACIFIC, ATLANTIC, INDIAN)
    enum:
      - PACIFIC
      - ATLANTIC
      - INDIAN
      - ARCTIC
      - SOUTHERN
      - MEDITERRANEAN
  chl_a:
    type: number
    minimum: 0
    description: Chlorophyll-a concentration in mg/m^3
  sst:
    type: number
    description: Sea Surface Temperature in degrees Celsius
  salinity:
    type: number
    minimum: 0
    maximum: 45
    description: Salinity in PSU (Practical Salinity Units)
  depth:
    type: number
    minimum: 0
    description: Sampling depth in meters (optional)
  data_source:
    type: string
    description: Source of the measurement (e.g., SeaBASS, MODIS, Reanalysis)
  quality_flag:
    type: string
    enum:
      - GOOD
      - QUESTIONABLE
      - BAD
      - UNKNOWN
    description: Data quality flag
  uncertainty:
    type: number
    minimum: 0
    description: Estimated measurement uncertainty
additionalProperties: false
