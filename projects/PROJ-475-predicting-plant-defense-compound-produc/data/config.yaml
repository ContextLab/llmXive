hyperparameters:
  lasso_alpha: 0.1
  max_iter: 10000
  ridge_alpha: 1.0
  tol: 0.0001
paths:
  figures_dir: figures
  processed_data_dir: data/processed
  raw_data_dir: data/raw
  schema_dir: data/schema
  state_dir: state
seeds:
  global_seed: 42
  train_test_split_seed: 123
thresholds:
  disk_space_buffer: 1.5
  missingness_threshold: 0.2
  retention_threshold: 0.8
  vif_instability_threshold: 10.0
  vif_threshold: 5.0
verified_urls:
  compound: https://chembank.broadinstitute.org/
  env: https://worldclim.org/data/
  genomic: https://ftp.ncbi.nlm.nih.gov/sra/
