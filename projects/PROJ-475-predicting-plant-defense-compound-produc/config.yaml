# Project Configuration for PROJ-475
# This file defines paths, seeds, and verified URLs.

paths:
  raw_data: data/raw
  processed_data: data/processed
  figures: figures
  state: state

seeds:
  default: 42
  genomic: 42
  environmental: 43
  compound: 44

# Verified URLs for data ingestion.
# If a URL is present here, the ingestion script will attempt to fetch from it.
# If it fails or is null, the script falls back to mock data (per FR-001).
verified_urls:
  genomic: null
  env: null
  compound: null

hyperparameters:
  model:
    alpha: 0.1
    max_iter: 1000
  cv:
    n_folds: 5
    min_samples: 30
