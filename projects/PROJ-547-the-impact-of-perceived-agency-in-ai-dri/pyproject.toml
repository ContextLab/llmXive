[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-agency-cbt"
version = "0.1.0"
description = "Research pipeline for analyzing the impact of perceived agency in AI-driven CBT on treatment adherence."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "llmXive Research Team"}
]
dependencies = [
    "spaCy>=3.6",
    "nltk>=3.8",
    "pandas>=2.0",
    "statsmodels>=0.14",
    "scikit-learn>=1.3",
    "pyyaml>=6.0",
    "matplotlib>=3.8",
    "tqdm>=4.66",
    "jsonschema>=4.0",
    "scipy>=1.10",
    "numpy>=1.24",
    "psutil>=5.9"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
    "pre-commit>=3.0"
]

[project.scripts]
download-datasets = "data_acquisition.download_datasets:main"
validate-metadata = "data_acquisition.validate_metadata:main"
ingest-transcripts = "agency_scoring.ingest_transcripts:main"
compute-agency-scores = "agency_scoring.compute_scores:main"
extract-adherence-metrics = "adherence_extraction.extract_metrics:main"
merge-datasets = "analysis.merge_datasets:main"
run-regression = "analysis.run_regression:main"
validate-agency-metrics = "validation.generate_report:main"

[tool.setuptools.packages.find]
where = ["code"]
include = ["*"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "I"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
