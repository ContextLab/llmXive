[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agency-cbt-pipeline"
version = "0.1.0"
description = "Automated science pipeline for studying perceived agency in AI-driven CBT."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "llmXive Research Team", email = "research@llmxive.org"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "spaCy>=3.6",
    "NLTK>=3.8",
    "pandas>=2.0",
    "statsmodels>=0.14",
    "scikit-learn>=1.3",
    "pyyaml>=6.0",
    "matplotlib>=3.8",
    "tqdm>=4.66",
    "numpy>=1.24",
    "scipy>=1.11",
    "psutil>=5.9",
    "jsonschema>=4.17",
    "reportlab>=4.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0",
    "pre-commit>=3.0",
    "pytest>=7.0",
    "mypy>=1.0",
]

[project.scripts]
download-datasets = "data_acquisition.download_datasets:main"
validate-metadata = "data_acquisition.validate_metadata:main"
ingest-transcripts = "agency_scoring.ingest_transcripts:main"
compute-agency-scores = "agency_scoring.compute_scores:main"
extract-metrics = "adherence_extraction.extract_metrics:main"
run-regression = "analysis.run_regression:main"
validate-agency = "validation.check_thresholds:main"
run-benchmark = "benchmark.run_benchmark:main"

[tool.setuptools.packages.find]
where = ["code"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.json", "*.csv", "*.pdf"]

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "I"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
ignore_missing_imports = true
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"
