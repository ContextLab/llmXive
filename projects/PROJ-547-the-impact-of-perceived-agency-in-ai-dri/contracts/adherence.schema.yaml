$schema: "http://json-schema.org/draft-07/schema#"
title: AdherenceMetrics
type: object
required:
  - user_id
  - session_start
  - session_end
  - session_completed
  - self_reported_engagement
properties:
  user_id:
    type: string
    description: Unique identifier for the user.
  session_start:
    type: string
    format: date-time
    description: ISO 8601 timestamp of session start.
  session_end:
    type: string
    format: date-time
    description: ISO 8601 timestamp of session end.
  session_completed:
    type: boolean
    description: Indicator whether the session was completed.
  self_reported_engagement:
    type: number
    description: Self‑reported engagement score (e.g., 0‑100 scale).
additionalProperties: false