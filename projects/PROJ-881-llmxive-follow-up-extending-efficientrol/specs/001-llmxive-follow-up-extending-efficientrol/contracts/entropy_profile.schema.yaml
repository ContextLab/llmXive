$schema: "http://json-schema.org/draft-07/schema#"
title: "EntropyProfile"
description: "Schema for intermediate layer entropy extraction (US-2)"
type: "object"
properties:
  sequence_id:
    type: "string"
    description: "Foreign key to TokenSequence"
  token_index:
    type: "integer"
    description: "Position of the token in the sequence"
  token_id:
    type: "integer"
    description: "Vocabulary ID of the token"
  entropy_values:
    type: "array"
    items:
      type: "number"
      minimum: 0
    description: "Shannon entropy values for each transformer layer"
  is_valid:
    type: "integer"
    enum: [0, 1]
    description: "Validity flag for this token (derived from external ground truth)"
required:
  - sequence_id
  - token_index
  - token_id
  - entropy_values
  - is_valid