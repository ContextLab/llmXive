[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Entropy-Guided Validity Prediction in RL Rollouts"
requires-python = ">=3.9"
dependencies = [
    "transformers",
    "torch",
    "datasets",
    "scikit-learn",
    "pandas",
    "numpy",
    "h5py",
    "pytest",
    "statsmodels",
    "psutil",
    "huggingface_hub"
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black"
]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
]
exclude = [
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
]

[tool.ruff.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true
combine-as-imports = true
