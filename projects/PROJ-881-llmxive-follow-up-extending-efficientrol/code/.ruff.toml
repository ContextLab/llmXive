# Ruff configuration for llmXive Follow-up
# This file extends or overrides settings from pyproject.toml if needed,
# but primarily serves as the entry point for ruff check/format.

extend = "pyproject.toml"

[lint]
# Enable specific rule sets
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # Pyflakes
    "I", # isort
    "B", # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
    "N", # pep8-naming
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
]

# Ignore specific rules that conflict with project style or are noisy
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function call in argument defaults (common in fastapi/pytest)
    "ARG001", # Unused function argument (sometimes valid in protocols)
    "ARG002", # Unused method argument
]

# Per-file ignores
[lint.per-file-ignores]
"tests/*" = ["ARG", "S101"] # Allow asserts in tests, ignore unused args in fixtures
"src/*/main.py" = ["T201"] # Allow print in main entry points

[format]
# Format settings matching Black
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
