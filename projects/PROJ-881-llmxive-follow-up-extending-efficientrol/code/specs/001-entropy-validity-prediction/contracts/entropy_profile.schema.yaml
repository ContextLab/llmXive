$schema: "http://json-schema.org/draft-07/schema#"
title: EntropyProfile
description: |
  Schema for an EntropyProfile record.
  Contains metadata about a generated sequence and layer-wise entropy values
  for every token position, merged with ground truth validity labels.
type: object
required:
  - sequence_id
  - dataset_source
  - prompt
  - generated_tokens
  - validity_label
  - entropy_layers
properties:
  sequence_id:
    type: string
    description: Unique identifier for the sequence (from generation output)
  dataset_source:
    type: string
    description: Source dataset name (e.g., 'gsm8k', 'minigrid')
  prompt:
    type: string
    description: The input prompt used for generation
  generated_tokens:
    type: array
    items:
      type: string
    description: List of token strings generated by the model
  validity_label:
    type: object
    required:
      - is_valid
      - reason
    properties:
      is_valid:
        type: boolean
        description: Ground truth validity flag (True if matches solution)
      reason:
        type: string
        description: Explanation for the validity label (e.g., 'match', 'ambiguous')
  entropy_layers:
    type: array
    description: |
      List of entropy vectors, one per transformer layer.
      Each inner array corresponds to a layer and contains entropy values
      for each token position in the generated sequence.
      Length of inner array MUST equal len(generated_tokens).
    items:
      type: array
      items:
        type: number
        minimum: 0.0
        description: Shannon entropy value for a specific token in a specific layer
  metadata:
    type: object
    description: Optional metadata (model name, temperature, etc.)
    additionalProperties: true
additionalProperties: true
