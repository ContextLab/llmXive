$schema: http://json-schema.org/draft-07/schema#
title: Output Schema for Plant Disease Resistance Prediction Pipeline
description: |
  Defines the structure for model evaluation metrics and SHAP analysis results
  generated by the modeling pipeline. Ensures consistent output formats for
  downstream reporting and validation.
definitions:
  MetricEntry:
    type: object
    properties:
      name:
        type: string
        description: Name of the metric (e.g., 'balanced_accuracy', 'roc_auc')
      value:
        type: number
        description: The calculated metric value
      std_dev:
        type: number
        nullable: true
        description: Standard deviation if calculated across folds
      confidence_interval:
        type: object
        nullable: true
        properties:
          lower:
            type: number
          upper:
            type: number
        description: 95% Confidence interval [lower, upper]
    required:
      - name
      - value

  PermutationTestResult:
    type: object
    properties:
      observed_score:
        type: number
        description: The actual model score on the hold-out set
      p_value:
        type: number
        description: Fraction of permuted scores >= observed score
      null_distribution_mean:
        type: number
        description: Mean of the null distribution from permutations
      null_distribution_std:
        type: number
        description: Standard deviation of the null distribution
      n_permutations:
        type: integer
        description: Number of permutations performed
    required:
      - observed_score
      - p_value
      - n_permutations

  ShapFeatureImportance:
    type: object
    properties:
      metabolite_id:
        type: string
        description: Unique identifier for the metabolite (e.g., InChIKey or ID)
      mean_abs_shap:
        type: number
        description: Mean absolute SHAP value (feature importance)
      shap_values_sample:
        type: array
        items:
          type: number
        description: Sample of raw SHAP values for visualization/debugging
      direction:
        type: string
        enum: [positive, negative, mixed]
        description: Overall direction of impact on the target class
    required:
      - metabolite_id
      - mean_abs_shap

  PathwayMapping:
    type: object
    properties:
      metabolite_id:
        type: string
      pathway_id:
        type: string
        description: e.g., KEGG ID (e.g., 'ko00010') or MetaCyc ID
      pathway_name:
        type: string
      database_source:
        type: string
        enum: [KEGG, MetaCyc, Reactome]
    required:
      - metabolite_id
      - pathway_id
      - pathway_name
      - database_source

type: object
properties:
  metrics:
    type: object
    description: Container for all model evaluation metrics
    properties:
      hold_out_metrics:
        type: array
        items:
          $ref: '#/definitions/MetricEntry'
        description: Metrics calculated on the independent hold-out set
      cv_metrics:
        type: array
        items:
          $ref: '#/definitions/MetricEntry'
        description: Aggregated metrics from cross-validation folds
      permutation_test:
        $ref: '#/definitions/PermutationTestResult'
        description: Results of the permutation significance test
      sensitivity_analysis:
        type: object
        properties:
          cutoffs_tested:
            type: array
            items:
              type: number
            description: List of decision thresholds swept
          false_positive_rates:
            type: array
            items:
              type: number
          false_negative_rates:
            type: array
            items:
              type: number
        description: Results of the sensitivity analysis over decision cutoffs
    required:
      - hold_out_metrics
      - permutation_test

  shap_analysis:
    type: object
    description: Container for SHAP-based interpretability results
    properties:
      top_features:
        type: array
        items:
          $ref: '#/definitions/ShapFeatureImportance'
        description: Top N metabolites ranked by mean absolute SHAP value
      summary_stats:
        type: object
        properties:
          n_features_analyzed:
            type: integer
          mean_shap_magnitude:
            type: number
        description: Aggregate statistics for the SHAP analysis
      pathway_mappings:
        type: array
        items:
          $ref: '#/definitions/PathwayMapping'
        description: Mapping of top features to biological pathways
    required:
      - top_features
      - summary_stats

  metadata:
    type: object
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation
      model_version:
        type: string
        description: Version string or hash of the model configuration
      seed:
        type: integer
        description: Random seed used for reproducibility
      dataset_info:
        type: object
        properties:
          n_samples:
            type: integer
          n_features:
            type: integer
          n_studies:
            type: integer
        description: Summary of the input data used for this run
    required:
      - generated_at
      - seed

required:
  - metrics
  - shap_analysis
  - metadata