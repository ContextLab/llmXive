$schema: http://json-schema.org/draft-07/schema#
title: Model Output Artifacts Schema
description: |
  Defines the structure for model evaluation metrics and SHAP analysis results
  generated by the plant disease resistance prediction pipeline.
type: object
properties:
  metrics:
    $ref: '#/definitions/Metrics'
  shap_analysis:
    $ref: '#/definitions/SHAPAnalysis'
  metadata:
    $ref: '#/definitions/Metadata'

definitions:
  Metadata:
    type: object
    description: "Execution and data provenance metadata"
    properties:
      timestamp:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of model execution"
      version:
        type: string
        description: "Pipeline version string"
      data_source:
        type: string
        description: "Identifier for the source dataset (e.g., Metabolomics Workbench Study IDs)"
      model_type:
        type: string
        description: "Type of model trained (e.g., RandomForest)"
      hyperparameters:
        type: object
        description: "Dictionary of final hyperparameters used"
        additionalProperties: true
      hold_out_fraction:
        type: number
        description: "Fraction of data held out for final evaluation"
      random_state:
        type: integer
        description: "Random seed used for reproducibility"

  Metrics:
    type: object
    description: "Primary model performance metrics on the hold-out set"
    required:
      - balanced_accuracy
      - roc_auc
      - precision
      - recall
      - f1_score
      - confusion_matrix
      - permutation_test_results
    properties:
      balanced_accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Balanced accuracy score (average of recall obtained on each class)"
      roc_auc:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Area Under the Receiver Operating Characteristic Curve"
      precision:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Precision score (positive predictive value)"
      recall:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "Recall score (sensitivity)"
      f1_score:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: "F1 score (harmonic mean of precision and recall)"
      confusion_matrix:
        type: object
        description: "Confusion matrix counts"
        properties:
          tn:
            type: integer
            description: "True Negatives"
          fp:
            type: integer
            description: "False Positives"
          fn:
            type: integer
            description: "False Negatives"
          tp:
            type: integer
            description: "True Positives"
      permutation_test_results:
        type: object
        description: "Results from permutation testing for statistical significance"
        required:
          - p_value
          - observed_score
          - null_distribution_mean
          - null_distribution_std
          - num_permutations
        properties:
          p_value:
            type: number
            description: "Empirical p-value from permutation test"
          observed_score:
            type: number
            description: "Performance score of the actual trained model"
          null_distribution_mean:
            type: number
            description: "Mean of the null distribution generated by permutations"
          null_distribution_std:
            type: number
            description: "Standard deviation of the null distribution"
          num_permutations:
            type: integer
            description: "Number of permutations performed"
      sensitivity_analysis:
        type: object
        description: "Results from sensitivity analysis on decision cutoffs"
        properties:
          cutoffs_tested:
            type: array
            items:
              type: number
            description: "List of decision cutoffs tested"
          fp_rates:
            type: array
            items:
              type: number
            description: "False positive rates corresponding to each cutoff"
          fn_rates:
            type: array
            items:
              type: number
            description: "False negative rates corresponding to each cutoff"

  SHAPAnalysis:
    type: object
    description: "SHAP (SHapley Additive exPlanations) analysis results"
    required:
      - top_features
      - feature_importance_summary
    properties:
      top_features:
        type: array
        description: "List of top N most important features by mean absolute SHAP value"
        items:
          type: object
          required:
            - feature_name
            - mean_abs_shap_value
            - shap_values_summary
          properties:
            feature_name:
              type: string
              description: "Name or InChIKey of the metabolite"
            mean_abs_shap_value:
              type: number
              description: "Mean absolute SHAP value indicating global importance"
            shap_values_summary:
              type: object
              description: "Summary statistics of SHAP values for this feature"
              properties:
                mean:
                  type: number
                std:
                  type: number
                min:
                  type: number
                max:
                  type: number
      feature_importance_summary:
        type: object
        description: "Summary of feature importances (optional alternative to SHAP if SHAP not computed)"
        additionalProperties:
          type: number
      pathway_mapping:
        type: array
        description: "Optional mapping of top features to biological pathways"
        items:
          type: object
          properties:
            feature_name:
              type: string
            pathway_id:
              type: string
            pathway_name:
              type: string
            source:
              type: string
              enum: [KEGG, MetaCyc]
      correlation_adjusted:
        type: object
        description: "Correlation analysis of top features with resistance labels (FDR corrected)"
        properties:
          correlations:
            type: array
            items:
              type: object
              properties:
                feature_name:
                  type: string
                correlation_coefficient:
                  type: number
                p_value:
                  type: number
                adjusted_p_value:
                  type: number
                  description: "Benjamini-Hochberg FDR adjusted p-value"
      collinearity_flags:
        type: array
        description: "List of features flagged for high collinearity (VIF > 5)"
        items:
          type: object
          properties:
            feature_name:
              type: string
            vif_score:
              type: number
        description: "Mandatory per FR-012"
required:
  - metrics
  - shap_analysis
  - metadata