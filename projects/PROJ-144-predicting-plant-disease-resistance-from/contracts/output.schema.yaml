$schema: http://json-schema.org/draft-07/schema#
title: Output Schema
definitions:
  metrics:
    type: object
    properties:
      balanced_accuracy:
        type: number
      roc_auc:
        type: number
      precision_recall:
        type: number
      permutation_p_value:
        type: number
  shap_analysis:
    type: object
    properties:
      top_features:
        type: array
        items:
          type: object
          properties:
            feature:
              type: string
            shap_value:
              type: number
