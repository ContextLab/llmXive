$schema: http://json-schema.org/draft-07/schema#
title: Metabolomics Data Schema
definitions:
  MetaboliteProfile:
    type: object
    properties:
      sample_id:
        type: string
      metabolite_id:
        type: string
      intensity:
        type: number
      inchi_key:
        type: string
    required:
      - sample_id
      - metabolite_id
      - intensity
  ResistanceLabel:
    type: object
    properties:
      sample_id:
        type: string
      resistance_class:
        type: string
        enum: ["Resistant", "Susceptible", "Intermediate"]
      batch_id:
        type: string
      study_id:
        type: string
    required:
      - sample_id
      - resistance_class
