[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info,
    venv,
    .venv,
    env
per-file-ignores =
    # Ignore unused imports in __init__.py files
    */__init__.py:F401
    # Ignore missing docstrings in tests
    tests/*:D100,D101,D102,D103,D104
max-complexity = 10

[isort]
profile = black
line_length = 88
known_first_party = code
known_third_party = pandas,numpy,scikit-learn,statsmodels,shap,biopython,requests,pytest,yaml
skip = venv,.venv,env,build,dist
