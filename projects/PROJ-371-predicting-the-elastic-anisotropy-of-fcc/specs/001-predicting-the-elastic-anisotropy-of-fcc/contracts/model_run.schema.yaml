$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelRun Schema"
description: "Schema for the output of a single model training execution."
type: "object"
properties:
  run_id:
    type: "string"
    description: "UUID for the specific training run."
  model_type:
    type: "string"
    enum:
      - "random_forest"
      - "gradient_boosting"
      - "linear"
    description: "Type of regression model used."
  hyperparameters:
    type: "object"
    description: "JSON object containing the hyperparameters used."
  r2:
    type: "number"
    description: "Coefficient of determination (R-squared)."
  mae:
    type: "number"
    description: "Mean Absolute Error."
  rmse:
    type: "number"
    description: "Root Mean Squared Error."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the run."
  outlier_threshold:
    type: "number"
    description: "Standard deviation threshold used for outlier removal in this run."
required:
  - run_id
  - model_type
  - hyperparameters
  - r2
  - mae
  - rmse
  - timestamp
  - outlier_threshold
additionalProperties: false
