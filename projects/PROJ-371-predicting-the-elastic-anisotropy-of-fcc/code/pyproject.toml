[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "elastic-anisotropy-prediction"
version = "0.1.0"
description = "Predicting the elastic anisotropy of FCC metals from composition"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "llmXive Team", email = "team@llmxive.example"}
]
dependencies = [
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "mendeleev>=0.16.0",
    "requests>=2.31.0",
    "pyyaml>=6.0",
    "matplotlib>=3.7.0",
    "python-dotenv>=1.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.5.0",
    "tomlkit>=0.12.0",
]

[project.scripts]
run-pipeline = "src.cli.run_pipeline:main"

[tool.setuptools.packages.find]
where = ["code"]
include = ["src*", "tests*"]

[tool.ruff]
# Inline configuration for Ruff (fallback to .ruff.toml if present)
target-version = "py39"
line-length = 88
exclude = [
    "__pycache__",
    ".git",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "data",
    "output",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "RUF"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.black]
# Black configuration
line-length = 88
target-version = ["py39"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
    | output
)/
'''

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["code/src"]
omit = [
    "code/tests/*",
    "code/setup_project.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
