[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "elastic-anisotropy-fcc"
version = "0.1.0"
description = "Predicting the Elastic Anisotropy of FCC Metals from Composition"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "scikit-learn",
    "mendeleev",
    "requests",
    "pyyaml",
    "matplotlib",
    "python-dotenv",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "pytest",
    "tomlkit",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "tests*"]

# Black Configuration
[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

# Ruff Configuration
[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # Line too long (black handles this)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"] # Unused imports in __init__ are fine

[tool.ruff.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short"
