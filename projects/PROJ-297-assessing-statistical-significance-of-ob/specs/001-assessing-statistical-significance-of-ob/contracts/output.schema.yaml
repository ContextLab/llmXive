$schema: "http://json-schema.org/draft-07/schema#"
title: "Significance Result Schema"
description: "Schema for the output CSV containing significance results for each dataset-statistic pair."
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Identifier of the dataset (e.g., 'wine', 'abalone')."
  statistic_name:
    type: "string"
    description: "Name of the network statistic (e.g., 'mean_abs_corr', 'density', 'max_corr', 'clustering')."
  threshold:
    type: "number"
    description: "Correlation threshold used for edge definition (e.g., 0.3)."
  observed_value:
    type: "number"
    description: "The observed value of the statistic in the original data."
  p_value:
    type: "number"
    description: "Raw empirical p-value calculated as (count + 1) / (N + 1)."
  q_value:
    type: "number"
    description: "Benjamini-Yekutieli adjusted p-value (q-value)."
  is_significant:
    type: "boolean"
    description: "True if q_value < 0.05."
required:
  - dataset_id
  - statistic_name
  - threshold
  - observed_value
  - p_value
  - q_value
  - is_significant
additionalProperties: false