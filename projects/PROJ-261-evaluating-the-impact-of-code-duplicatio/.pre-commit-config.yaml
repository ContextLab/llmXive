repos:
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black"]
  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        additional_dependencies:
          - flake8-bugbear
        language_version: python3
# Optional: you can add more hooks (e.g., mypy, pylint) as needed. This configuration
# ensures that black formats code, isort sorts imports, and flake8 checks for style
# and common errors on all Python files in the repository. The hooks will be run
# automatically when `pre-commit run --all-files` is executed.