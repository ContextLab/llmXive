type: object
description: Schema for correlation analysis results between duplication and model metrics.
properties:
  metric_x:
    type: string
    description: Name of the first metric (e.g., clone_density).
  metric_y:
    type: string
    description: Name of the second metric (e.g., perplexity).
  correlation_coefficient:
    type: number
    description: Spearman rank correlation coefficient.
  p_value:
    type: number
    description: Two‑tailed p‑value associated with the correlation.
required:
  - metric_x
  - metric_y
  - correlation_coefficient
  - p_value
