$schema: "http://json-schema.org/draft-07/schema#"
title: Correlation Results Schema
type: object
properties:
  metric_x:
    type: string
    description: Name of the first metric (e.g., clone_density).
  metric_y:
    type: string
    description: Name of the second metric (e.g., perplexity or pass@1_accuracy).
  spearman_coefficient:
    type: number
    description: Spearman rank correlation coefficient between the two metrics.
  p_value:
    type: number
    description: Two‑tailed p‑value associated with the correlation.
required:
  - metric_x
  - metric_y
  - spearman_coefficient
  - p_value
additionalProperties: false
