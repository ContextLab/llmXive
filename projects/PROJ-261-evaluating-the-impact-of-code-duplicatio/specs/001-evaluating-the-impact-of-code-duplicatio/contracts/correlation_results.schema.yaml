type: object
description: Schema for correlation analysis results linking duplication and model metrics.
properties:
  metric_x:
    type: string
    description: Name of the first metric (e.g., clone_density).
  metric_y:
    type: string
    description: Name of the second metric (e.g., perplexity).
  spearman_coefficient:
    type: number
    description: Spearman rank correlation coefficient between the two metrics.
  p_value:
    type: number
    description: Two‑tailed p‑value for the Spearman correlation.
required:
  - metric_x
  - metric_y
  - spearman_coefficient
  - p_value
