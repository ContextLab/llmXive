$schema: "http://json-schema.org/draft-07/schema#"
title: Correlation Results Schema
description: Schema for the statistical correlation results between duplication density and model metrics.
type: object
properties:
  metric_name:
    type: string
    description: Name of the metric pair being correlated (e.g., "clone_density_vs_perplexity").
  spearman_coefficient:
    type: number
    description: Spearman rank correlation coefficient.
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: Two‑tailed p‑value for the correlation.
  sample_size:
    type: integer
    minimum: 1
    description: Number of data points used in the correlation analysis.
required:
  - metric_name
  - spearman_coefficient
  - p_value
  - sample_size
additionalProperties: true
