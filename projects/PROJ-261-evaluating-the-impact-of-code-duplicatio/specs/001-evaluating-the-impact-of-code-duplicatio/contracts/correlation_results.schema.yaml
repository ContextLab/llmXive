$schema: "http://json-schema.org/draft-07/schema#"
title: Correlation Results Schema
description: Schema for the statistical correlation analysis output.
type: object
properties:
  metric:
    type: string
    description: Name of the metric pair being correlated (e.g., "clone_density_vs_perplexity").
  spearman_coefficient:
    type: number
    description: Spearman rank correlation coefficient (‑1.0 to 1.0).
  p_value:
    type: number
    description: Two‑tailed p‑value associated with the correlation.
  n:
    type: integer
    description: Number of observations used in the correlation.
required:
  - metric
  - spearman_coefficient
  - p_value
  - n
additionalProperties: false
