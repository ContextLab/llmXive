$schema: "http://json-schema.org/draft-07/schema#"
type: object
description: "Schema for statistical correlation results"
properties:
  metric_pair:
    type: string
    pattern: "^[a-zA-Z_]+,[a-zA-Z_]+$"
    description: "Pair of metrics being correlated"
  spearman_coefficient:
    type: number
    minimum: -1
    maximum: 1
    description: "Spearman's rank correlation coefficient"
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: "Statistical significance"
  sample_size:
    type: integer
    minimum: 1
    description: "Number of data points in correlation"
  significance:
    type: boolean
    description: "Whether p < 0.05"
required:
  - metric_pair
  - spearman_coefficient
  - p_value
  - sample_size
  - significance
additionalProperties: false
