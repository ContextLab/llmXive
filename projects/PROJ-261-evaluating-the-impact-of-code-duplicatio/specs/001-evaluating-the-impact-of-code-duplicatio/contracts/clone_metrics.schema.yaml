type: object
description: Schema for clone metrics generated per source file.
properties:
  file_path:
    type: string
    description: Relative path to the source code file.
  clone_density:
    type: number
    description: Proportion of code that participates in clones (0.0 – 1.0).
  total_clones:
    type: integer
    description: Number of distinct clone groups detected in the file.
required:
  - file_path
  - clone_density
  - total_clones
