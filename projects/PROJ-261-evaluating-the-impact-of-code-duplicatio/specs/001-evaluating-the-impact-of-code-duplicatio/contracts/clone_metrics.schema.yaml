# Schema for clone metrics per source file
$schema: "http://json-schema.org/draft-07/schema#"
title: CloneMetrics
description: Metrics describing code clone density for a single source file.
type: object
properties:
  file_path:
    type: string
    description: Relative path to the source file within the dataset.
  clone_density:
    type: number
    description: Ratio of cloned AST nodes to total AST nodes (0.0 – 1.0).
  total_nodes:
    type: integer
    description: Total number of AST nodes examined.
  clone_nodes:
    type: integer
    description: Number of AST nodes that belong to clones.
  timestamp:
    type: string
    format: date-time
    description: When the metric was computed.
required:
  - file_path
  - clone_density
  - total_nodes
  - clone_nodes
additionalProperties: false
