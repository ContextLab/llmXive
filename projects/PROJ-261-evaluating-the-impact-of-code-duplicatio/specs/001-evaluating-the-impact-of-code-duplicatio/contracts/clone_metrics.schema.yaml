# Schema for clone metrics CSV files
$schema: "http://json-schema.org/draft-07/schema#"
title: CloneMetrics
description: |
  Schema describing the structure of the clone metrics output produced by the
  AST clone detection step. Each row corresponds to a single source file.
type: object
description: Schema for clone metrics produced by the AST cloner.
properties:
  file_path:
    type: string
    description: Relative path of the source file within the dataset.
  clone_density:
    type: number
    description: Ratio of duplicated AST nodes to total AST nodes (0‑1).
  total_clones:
    type: integer
    description: Number of clone instances detected in the file.
  type1_clones:
    type: integer
    description: Number of Type‑1 (exact) clones.
  type2_clones:
    type: integer
    description: Number of Type‑2 (parameterised) clones.
required:
  - file_path
  - clone_density
  - total_clones
additionalProperties: false
