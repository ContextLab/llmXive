$schema: "http://json-schema.org/draft-07/schema#"
title: Clone Metrics Schema
description: Schema for the CSV/JSON output that records clone‑density metrics per source file.
type: object
properties:
  file_path:
    type: string
    description: Relative path to the source file that was analysed.
  total_nodes:
    type: integer
    minimum: 0
    description: Total number of AST nodes (functions + classes) examined in the file.
  clone_nodes:
    type: integer
    minimum: 0
    description: Number of AST nodes that were identified as clones.
  clone_density:
    type: number
    minimum: 0
    maximum: 1
    description: Ratio of clone_nodes to total_nodes (value between 0 and 1).
  hash:
    type: string
    description: Optional hash of the file contents for provenance tracking.
required:
  - file_path
  - total_nodes
  - clone_nodes
  - clone_density
additionalProperties: true
