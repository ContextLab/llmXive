$schema: "http://json-schema.org/draft-07/schema#"
title: Clone Metrics Schema
type: object
properties:
  file_path:
    type: string
    description: Path to the source file that was analysed.
  clone_density:
    type: number
    description: Ratio of cloned lines to total lines in the file.
  type1_clones:
    type: integer
    description: Count of Type‑1 (exact) clones detected.
  type2_clones:
    type: integer
    description: Count of Type‑2 (parameterised) clones detected.
required:
  - file_path
  - clone_density
additionalProperties: false
