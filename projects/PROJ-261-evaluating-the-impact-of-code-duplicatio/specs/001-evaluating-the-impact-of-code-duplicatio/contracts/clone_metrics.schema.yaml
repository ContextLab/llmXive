type: object
description: Schema for clone metrics produced by the AST cloner.
properties:
  file_path:
    type: string
    description: Relative path to the source file that was analyzed.
  clone_density:
    type: number
    description: Ratio of cloned lines to total lines in the file (0.0 – 1.0).
  total_clones:
    type: integer
    description: Total number of clone instances detected in the file.
  type1_clones:
    type: integer
    description: Number of Type‑1 (exact‑copy) clones.
  type2_clones:
    type: integer
    description: Number of Type‑2 (parameterized) clones.
required:
  - file_path
  - clone_density
