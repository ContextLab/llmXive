type: object
description: Schema for model inference metrics per file.
properties:
  model_name:
    type: string
    description: Identifier of the language model used.
  perplexity:
    type: number
    description: Per‑token perplexity score for the file.
  token_count:
    type: integer
    description: Number of tokens processed for the file.
required:
  - model_name
  - perplexity
  - token_count
