# Schema for perplexity_scores.csv
# Defines the structure of model perplexity metrics computed by model_metrics.py
$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  file_path:
    type: string
    description: "Relative path to the Python source file"
    minLength: 1
  segment_id:
    type: integer
    description: "Unique identifier matching clone_metrics segment_id"
    minimum: 0
  perplexity:
    type: number
    description: "Token-level perplexity score (must be finite, non-NaN)"
    minimum: 0.0
  token_count:
    type: integer
    description: "Number of tokens in the segment"
    minimum: 1
  model_name:
    type: string
    description: "HuggingFace model identifier used"
    minLength: 1
  quantization_bits:
    type: integer
    description: "Quantization level (8 for 8-bit)"
    enum: [4, 8]
  validation_status:
    type: string
    description: "Validation result for perplexity value"
    enum: ["valid", "nan_detected", "inf_detected", "error"]
  timestamp:
    type: string
    description: "ISO 8601 timestamp of computation"
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
  memory_peak_mb:
    type: number
    description: "Peak memory usage during inference in MB"
    minimum: 0.0
required:
  - file_path
  - segment_id
  - perplexity
  - token_count
  - model_name
  - quantization_bits
  - validation_status
  - timestamp
additionalProperties: false
