# Schema for model perplexity metrics per source file
$schema: "http://json-schema.org/draft-07/schema#"
title: ModelMetrics
description: Per‑token perplexity scores produced by the language model.
type: object
properties:
  file_path:
    type: string
    description: Relative path to the source file.
  perplexity:
    type: number
    description: Per‑token perplexity (higher indicates lower likelihood).
  token_count:
    type: integer
    description: Number of tokens evaluated.
  timestamp:
    type: string
    format: date-time
    description: When the perplexity was computed.
required:
  - file_path
  - perplexity
  - token_count
additionalProperties: false
