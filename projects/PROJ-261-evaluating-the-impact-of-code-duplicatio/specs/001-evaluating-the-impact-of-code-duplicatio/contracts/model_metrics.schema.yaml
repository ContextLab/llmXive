type: object
description: Schema for model‑level metrics such as perplexity and semantic distance.
properties:
  file_path:
    type: string
    description: Relative path to the source file that was evaluated.
  perplexity:
    type: number
    description: Token‑level perplexity score computed by the language model.
  semantic_distance:
    type: number
    description: Embedding‑based semantic distance metric (e.g., cosine distance).
required:
  - file_path
  - perplexity
