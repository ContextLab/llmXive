$schema: "http://json-schema.org/draft-07/schema#"
title: Model Metrics Schema
type: object
properties:
  file_path:
    type: string
    description: Path to the source file for which perplexity was computed.
  perplexity:
    type: number
    description: Token‑level perplexity score produced by the language model.
required:
  - file_path
  - perplexity
additionalProperties: false
