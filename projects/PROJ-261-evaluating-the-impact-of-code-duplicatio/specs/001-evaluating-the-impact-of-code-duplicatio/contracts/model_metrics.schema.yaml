$schema: "http://json-schema.org/draft-07/schema#"
title: Model Metrics Schema
description: Schema for per‑file model‑level metrics such as perplexity.
type: object
properties:
  file_path:
    type: string
    description: Relative path to the source file that was evaluated.
  perplexity:
    type: number
    minimum: 0
    description: Per‑token perplexity score produced by the language model.
  max_perplexity:
    type: number
    minimum: 0
    description: Maximum perplexity observed in the file (if computed per‑segment).
  mean_perplexity:
    type: number
    minimum: 0
    description: Mean perplexity across all evaluated segments.
  hash:
    type: string
    description: Optional hash of the file contents for provenance tracking.
required:
  - file_path
  - perplexity
additionalProperties: true
