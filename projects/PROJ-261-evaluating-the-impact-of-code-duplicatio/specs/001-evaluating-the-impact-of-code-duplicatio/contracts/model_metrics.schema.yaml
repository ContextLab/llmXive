$schema: "http://json-schema.org/draft-07/schema#"
title: Model Metrics Schema
description: Schema for rows in the perplexity_scores.csv output.
type: object
properties:
  file_path:
    type: string
    description: Path to the source file evaluated by the language model.
  perplexity:
    type: number
    description: Token‑level perplexity score produced by the model.
  model_name:
    type: string
    description: Identifier of the model used for inference.
required:
  - file_path
  - perplexity
