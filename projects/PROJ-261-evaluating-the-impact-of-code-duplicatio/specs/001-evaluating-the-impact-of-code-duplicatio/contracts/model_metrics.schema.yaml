$schema: "http://json-schema.org/draft-07/schema#"
title: ModelMetrics
description: Schema for per‑file language‑model perplexity scores.
type: object
properties:
  file_path:
    type: string
    description: Relative path to the source file inside the dataset.
  perplexity:
    type: number
    minimum: 0
    description: Token‑level perplexity computed by the language model.
required:
  - file_path
  - perplexity
additionalProperties: false
