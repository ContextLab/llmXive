# Schema for model metrics CSV files
$schema: "http://json-schema.org/draft-07/schema#"
title: ModelMetrics
description: |
  Schema describing the per‑file model‑level metrics produced after running
  the language model on the code corpus.
type: object
description: Schema for model‑level metrics such as perplexity and semantic distance.
properties:
  file_path:
    type: string
    description: Relative path of the source file evaluated.
  perplexity:
    type: number
    description: Token‑level perplexity score produced by the model.
  semantic_distance:
    type: number
    description: Cosine distance between code embeddings (optional, may be null).
required:
  - file_path
  - perplexity
additionalProperties: false
