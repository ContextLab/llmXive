$schema: "http://json-schema.org/draft-07/schema#"
title: Pipeline Configuration Schema
description: Schema describing the top‑level configuration parameters for the entire analysis pipeline.
type: object
properties:
  clone_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds used in sensitivity analysis.
  random_seed:
    type: integer
    description: Global random seed for reproducibility.
  memory_limit_mb:
    type: integer
    minimum: 0
    description: Maximum memory (in MB) the pipeline may consume.
  max_runtime_seconds:
    type: integer
    minimum: 0
    description: Upper bound on total runtime for the pipeline.
  min_valid_segments:
    type: integer
    minimum: 0
    description: Minimum number of code segments required for a valid run.
  correlation_method:
    type: string
    enum: [spearman, pearson]
    description: Statistical method used for correlation analysis.
  significance_threshold:
    type: number
    minimum: 0
    maximum: 1
    description: p‑value threshold for statistical significance.
  figure_format:
    type: string
    enum: [png, pdf, svg]
    description: Output format for generated figures.
  figure_dpi:
    type: integer
    minimum: 1
    description: DPI resolution for raster figures.
  checksum_algorithm:
    type: string
    description: Algorithm name used for artifact checksum computation (e.g., "sha256").
  dataset_name:
    type: string
    description: Identifier of the dataset to download (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace model identifier used for perplexity computation.
  quantization_bits:
    type: integer
    description: Number of bits for 8‑bit quantization (e.g., 8).
  streaming_enabled:
    type: boolean
    description: Whether dataset streaming mode is enabled.
  pii_scan_enabled:
    type: boolean
    description: Whether the PII scanning step should be executed.
required:
  - clone_thresholds
  - random_seed
  - memory_limit_mb
  - max_runtime_seconds
  - min_valid_segments
  - correlation_method
  - significance_threshold
  - figure_format
  - figure_dpi
  - checksum_algorithm
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled
additionalProperties: true