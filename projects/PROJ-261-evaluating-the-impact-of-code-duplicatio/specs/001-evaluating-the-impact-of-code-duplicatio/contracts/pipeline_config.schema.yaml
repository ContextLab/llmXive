# Schema for the overall pipeline configuration
$schema: "http://json-schema.org/draft-07/schema#"
title: PipelineConfig
description: Configuration parameters that drive the end‑to‑end pipeline.
type: object
properties:
  random_seed:
    type: integer
    description: Seed for all pseudo‑random operations to ensure reproducibility.
  memory_limit_mb:
    type: integer
    description: Maximum memory (in megabytes) the pipeline may consume.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total execution time.
  dataset_name:
    type: string
    description: Identifier of the dataset to download (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace model identifier (e.g., "Salesforce/codegen-350M-mono").
  quantization_bits:
    type: integer
    description: Bit‑width for 8‑bit quantization (commonly 8).
  streaming_enabled:
    type: boolean
    description: Whether to stream the dataset instead of downloading it entirely.
  pii_scan_enabled:
    type: boolean
    description: Flag to enable/disable PII scanning of downloaded files.
  clone_density_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds to evaluate in sensitivity analysis.
  figure_format:
    type: string
    enum: ["png", "pdf"]
    description: Desired output format for generated figures.
  figure_dpi:
    type: integer
    description: DPI resolution for raster figures.
  checksum_algorithm:
    type: string
    description: Hash algorithm used for artifact checksum (e.g., "sha256").
required:
  - random_seed
  - memory_limit_mb
  - max_runtime_seconds
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled
  - clone_density_thresholds
  - figure_format
  - figure_dpi
  - checksum_algorithm
additionalProperties: false