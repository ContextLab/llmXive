# Schema for the pipeline configuration file
$schema: "http://json-schema.org/draft-07/schema#"
title: PipelineConfig
description: |
  Top‑level configuration used by the pipeline. It aggregates settings for data
  loading, clone detection thresholds, model inference, and analysis parameters.
type: object
description: Schema for the overall pipeline configuration.
properties:
  dataset_name:
    type: string
    description: Identifier of the code corpus (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace model identifier for perplexity computation.
  quantization_bits:
    type: integer
    description: Number of bits for 8‑bit quantisation (typically 8).
  streaming_enabled:
    type: boolean
    description: Whether the dataset should be streamed.
  pii_scan_enabled:
    type: boolean
    description: Toggle for the PII scanning step.
  clone_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds (e.g., [0.7, 0.8, 0.9]).
  random_seed:
    type: integer
    description: Seed for all stochastic processes.
  memory_limit_mb:
    type: integer
    description: Maximum memory allowed for model inference.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total pipeline runtime.
  significance_threshold:
    type: number
    description: p‑value threshold for statistical significance.
  figure_format:
    type: string
    enum: ["png", "pdf"]
    description: Desired output format for visualizations.
  figure_dpi:
    type: integer
    description: DPI resolution for generated figures.
required:
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - clone_thresholds
  - random_seed
  - memory_limit_mb
  - max_runtime_seconds
  - significance_threshold
  - figure_format
  - figure_dpi
additionalProperties: false