# Schema for pipeline configuration validation
# Defines the structure of config.py exported parameters
$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  random_seed:
    type: integer
    description: "Random seed for reproducibility"
    minimum: 0
  clone_thresholds:
    type: array
    description: "List of clone detection thresholds"
    items:
      type: number
      minimum: 0.0
      maximum: 1.0
    minItems: 1
  memory_limit_mb:
    type: integer
    description: "Maximum memory limit in MB (SC-002)"
    minimum: 1024
  max_runtime_seconds:
    type: integer
    description: "Maximum runtime in seconds (SC-001: 24 hours = 86400)"
    minimum: 60
  min_valid_segments:
    type: integer
    description: "Minimum valid segments required (SC-003: 1000)"
    minimum: 100
  correlation_method:
    type: string
    description: "Statistical correlation method"
    enum: ["spearman", "pearson", "kendall"]
  significance_threshold:
    type: number
    description: "P-value significance threshold"
    minimum: 0.001
    maximum: 0.1
  figure_format:
    type: string
    description: "Output format for figures"
    enum: ["png", "pdf", "both"]
  figure_dpi:
    type: integer
    description: "DPI for figure output"
    minimum: 72
    maximum: 600
  checksum_algorithm:
    type: string
    description: "Algorithm for checksum computation"
    enum: ["sha256", "md5"]
  dataset_name:
    type: string
    description: "HuggingFace dataset identifier"
    minLength: 1
  model_name:
    type: string
    description: "HuggingFace model identifier"
    minLength: 1
  quantization_bits:
    type: integer
    description: "Model quantization level"
    enum: [4, 8]
  streaming_enabled:
    type: boolean
    description: "Whether to use streaming mode for dataset"
  pii_scan_enabled:
    type: boolean
    description: "Whether to enable PII scanning"
  version:
    type: string
    description: "Pipeline configuration version"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  created_at:
    type: string
    description: "ISO 8601 timestamp of configuration creation"
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
required:
  - random_seed
  - clone_thresholds
  - memory_limit_mb
  - max_runtime_seconds
  - min_valid_segments
  - correlation_method
  - significance_threshold
  - figure_format
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled
  - version
  - created_at
additionalProperties: false
