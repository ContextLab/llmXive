$schema: "http://json-schema.org/draft-07/schema#"
title: Pipeline Configuration Schema
type: object
properties:
  clone_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds used in sensitivity analysis.
  random_seed:
    type: integer
    description: Global random seed for reproducibility.
  memory_limit_mb:
    type: integer
    description: Maximum memory (in MB) allowed for the pipeline.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total runtime in seconds.
  min_valid_segments:
    type: integer
    description: Minimum number of code segments required for a valid analysis.
  correlation_method:
    type: string
    description: Method used for correlation (e.g., "spearman").
  significance_threshold:
    type: number
    description: p‑value threshold for statistical significance.
  figure_format:
    type: string
    description: File format for generated figures (e.g., "png", "pdf").
  figure_dpi:
    type: integer
    description: DPI resolution for saved figures.
  checksum_algorithm:
    type: string
    description: Algorithm used for artifact checksum computation (e.g., "sha256").
  dataset_name:
    type: string
    description: Identifier of the source code dataset (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace model identifier used for perplexity computation.
  quantization_bits:
    type: integer
    description: Number of bits for model quantization (e.g., 8).
  streaming_enabled:
    type: boolean
    description: Whether dataset streaming mode is enabled.
  pii_scan_enabled:
    type: boolean
    description: Flag to enable/disable PII scanning of raw data.
required:
  - clone_thresholds
  - random_seed
  - memory_limit_mb
  - max_runtime_seconds
  - min_valid_segments
  - correlation_method
  - significance_threshold
  - figure_format
  - figure_dpi
  - checksum_algorithm
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled
additionalProperties: false