type: object
description: Schema for the overall pipeline configuration.
properties:
  random_seed:
    type: integer
    description: Seed for all random number generators to ensure reproducibility.
  clone_threshold:
    type: number
    description: Minimum similarity threshold for considering two code fragments as clones.
  model_name:
    type: string
    description: Identifier of the language model used for perplexity computation.
  data_path:
    type: string
    description: Root directory where raw and processed data reside.
  output_dir:
    type: string
    description: Directory where pipeline outputs (CSV files, figures) are stored.
required:
  - random_seed
  - clone_threshold
  - model_name
  - data_path
  - output_dir