type: object
description: Schema for the overall pipeline configuration.
properties:
  clone_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds used in sensitivity analysis.
  random_seed:
    type: integer
    description: Global random seed for reproducibility.
  memory_limit_mb:
    type: integer
    description: Maximum memory (in MB) allowed for model inference.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total pipeline runtime.
  dataset_name:
    type: string
    description: Identifier of the source code dataset (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace identifier of the language model to evaluate.
  quantization_bits:
    type: integer
    description: Number of bits used for 8‑bit quantization.
  streaming_enabled:
    type: boolean
    description: Whether dataset streaming mode is enabled.
  pii_scan_enabled:
    type: boolean
    description: Flag to enable or disable PII scanning.
required:
  - clone_thresholds
  - random_seed
  - memory_limit_mb
  - max_runtime_seconds
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled