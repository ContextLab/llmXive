$schema: "http://json-schema.org/draft-07/schema#"
title: Pipeline Configuration Schema
description: Schema describing the configuration parameters for the entire pipeline.
type: object
properties:
  random_seed:
    type: integer
    description: Global random seed for reproducibility.
  memory_limit_mb:
    type: integer
    description: Maximum memory (in megabytes) the pipeline may consume.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total runtime for the pipeline.
  clone_thresholds:
    type: array
    description: List of clone‑density thresholds used in sensitivity analysis.
    items:
      type: number
  dataset_name:
    type: string
    description: Identifier of the code corpus dataset (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: Identifier of the language model used for perplexity computation.
  quantization_bits:
    type: integer
    description: Number of bits for 8‑bit quantization (e.g., 8).
  streaming_enabled:
    type: boolean
    description: Whether dataset streaming mode is enabled.
  pii_scan_enabled:
    type: boolean
    description: Whether PII scanning is performed on the data.
required: []