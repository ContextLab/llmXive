type: object
properties:
  random_seed:
    type: integer
    description: Global random seed for reproducibility.
  clone_thresholds:
    type: array
    items:
      type: number
    description: List of clone‑density thresholds used in sensitivity analysis.
  memory_limit_mb:
    type: integer
    description: Maximum memory (in megabytes) the pipeline may use.
  max_runtime_seconds:
    type: integer
    description: Upper bound on total runtime for the pipeline.
  dataset_name:
    type: string
    description: Identifier of the source code dataset (e.g., "codeparrot/github-code").
  model_name:
    type: string
    description: HuggingFace identifier of the language model used for perplexity.
  quantization_bits:
    type: integer
    description: Number of bits for model quantization (e.g., 8).
  streaming_enabled:
    type: boolean
    description: Whether dataset streaming mode is enabled.
  pii_scan_enabled:
    type: boolean
    description: Whether PII scanning is performed on the dataset.
required:
  - random_seed
  - clone_thresholds
  - memory_limit_mb
  - max_runtime_seconds
  - dataset_name
  - model_name
  - quantization_bits
  - streaming_enabled
  - pii_scan_enabled
additionalProperties: false