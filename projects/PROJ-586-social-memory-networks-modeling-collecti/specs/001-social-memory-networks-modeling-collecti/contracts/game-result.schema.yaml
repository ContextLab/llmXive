$schema: "http://json-schema.org/draft-07/schema#"
title: "Game Result Schema"
description: "Schema for validating game result CSV rows (results_full.csv, results_limited.csv)"
type: "object"
properties:
  game_id:
    type: "string"
    description: "Unique game identifier"
  specialization_index:
    type: "number"
    description: "Distribution-based specialization metric; theoretical max is log₂(N_agents), e.g., ~2.81 for N=7; max 3.0 set for practical validation"
    minimum: 0
    maximum: 3.0
  retrieval_efficiency:
    type: "number"
    description: "Proportion of successful retrievals vs. baseline"
    minimum: 0
    maximum: 1
  context_condition:
    type: "string"
    description: "Context window condition"
    enum:
      - "full"
      - "limited"
  agent_count:
    type: "integer"
    description: "Number of agents in this game"
    minimum: 2
  token_threshold:
    type: "integer"
    description: "Context window size in tokens"
    enum:
      - 128
      - 256
      - 512
  game_success:
    type: "boolean"
    description: "Whether the game completed without errors"
required:
  - game_id
  - specialization_index
  - retrieval_efficiency
  - context_condition
  - agent_count
  - token_threshold
  - game_success
additionalProperties: false