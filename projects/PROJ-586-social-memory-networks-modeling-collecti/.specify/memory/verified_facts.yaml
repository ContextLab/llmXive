'|float32 precision':
  quote: This gives from 6 to 9 significant decimal digits precision. If a decimal
    string with at most 6 significant digits is converted to the IEEE 754 single-precision
    format, giving a normal number, and then converted back to a decimal string with
    the same number of digits, the final result should match the original string.
    If an IEEE 754 single-precision number is converted to a decimal string with at
    least 9 significant digits, and then converted back to single-precision representation,
    the final result must match the original number.
  source_id: Single-precision floating-point format
  url: https://en.wikipedia.org/wiki/Single-precision_floating-point_format
  value: 6 to 9 significant decimal digits
