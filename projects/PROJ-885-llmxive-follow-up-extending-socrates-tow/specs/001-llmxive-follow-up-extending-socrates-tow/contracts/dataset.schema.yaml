$schema: "http://json-schema.org/draft-07/schema#"
title: "ConflictTrajectory"
description: "Schema for a single conflict trajectory generated by the SoCRATES pipeline."
type: "object"
required:
  - "trajectory_id"
  - "dialogue"
  - "metadata"
  - "ideal_resolution"
properties:
  trajectory_id:
    type: "string"
    description: "Unique identifier for the trajectory (UUID)."
  dialogue:
    type: "array"
    description: "List of turns in the conflict dialogue."
    items:
      type: "object"
      required:
        - "speaker"
        - "text"
      properties:
        speaker:
          type: "string"
          description: "Identifier for the speaker (e.g., 'Party A', 'Party B')."
        text:
          type: "string"
          description: "The content of the turn."
  metadata:
    type: "object"
    required:
      - "emotional_reactivity"
      - "cultural_identity"
      - "conflict_type"
    properties:
      emotional_reactivity:
        type: "number"
        minimum: 0.0
        maximum: 10.0
        description: "Score representing the emotional intensity of the conflict (0-10)."
      cultural_identity:
        type: "array"
        items:
          type: "string"
        description: "List of cultural identity tags for the participants."
      conflict_type:
        type: "string"
        description: "Category of the conflict (e.g., 'resource', 'value', 'relationship')."
  ideal_resolution:
    type: "string"
    description: "The ground truth ideal resolution for the conflict."