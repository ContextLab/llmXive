[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line-too-long (handled by black)
    "B008", # do-not-perform-argument-default-lookup-in-function-definition (common in data classes)
]

[lint.isort]
known-first-party = ["utils", "models", "01_download_data", "02_prepare_receptors", "03_dock_enantiomers", "04_md_refinement", "interaction_fingerprint", "06_statistical_analysis"]
force-single-line = true
lines-after-imports = 2

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
