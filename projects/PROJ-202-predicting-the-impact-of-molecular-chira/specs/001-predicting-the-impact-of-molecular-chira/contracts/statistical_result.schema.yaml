$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Result Schema"
type: "object"
properties:
  test_type:
    type: "string"
    description: "Type of statistical test (Wilcoxon, Spearman, FDR-corrected, Bayesian)"
  p_value:
    type: "number"
    description: "Raw or adjusted p-value"
  effect_size:
    type: "number"
    description: "Effect size (Cohen's d, ρ, or Posterior Mean)"
  ci_lower:
    type: ["number", "null"]
    description: "Lower bound of 95% confidence interval"
  ci_upper:
    type: ["number", "null"]
    description: "Upper bound of 95% confidence interval"
  corrected:
    type: "boolean"
    description: "True if FDR correction was applied"
  covariates_included:
    type: "boolean"
    description: "True if MW/LogP were included as covariates"
  success_metric:
    type: "boolean"
    description: "True if |ρ| > 0.3"
required:
  - test_type
  - p_value
  - effect_size
  - corrected
  - covariates_included
  - success_metric
additionalProperties: false
