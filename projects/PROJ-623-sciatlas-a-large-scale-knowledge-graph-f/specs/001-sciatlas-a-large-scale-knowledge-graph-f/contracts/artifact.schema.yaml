$schema: "http://json-schema.org/draft-07/schema#"
title: "ReproductionArtifact"
description: "Schema for the final output file generated by the SciAtlas reproduction pipeline."
type: "object"
required:
  - "run_id"
  - "query"
  - "records"
  - "status"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run."
  query:
    $ref: "#/definitions/SearchQuery"
  records:
    type: "array"
    items:
      $ref: "#/definitions/PaperRecord"
    description: "List of retrieved paper records."
  status:
    type: "string"
    enum:
      - "success"
      - "partial"
      - "failed"
      - "data_unavailable"
    description: "Execution status."
  log_path:
    type: "string"
    description: "Path to the reproduction_log.txt file."
  validation_results:
    type: "object"
    description: "Summary of validation checks."
  data_source:
    type: "string"
    description: "Indicates the source used (openalex, semantic_scholar, mock)."
definitions:
  SearchQuery:
    type: "object"
    required:
      - "query_string"
      - "limit"
    properties:
      query_string:
        type: "string"
        description: "The user-defined search query."
      limit:
        type: "integer"
        description: "Maximum number of results to retrieve."
      filters:
        type: "object"
        description: "Optional filters."
  PaperRecord:
    type: "object"
    required:
      - "title"
      - "abstract"
      - "source_id"
    properties:
      title:
        type: "string"
        minLength: 5
      abstract:
        type: "string"
        minLength: 20
      authors:
        type: "array"
        items:
          type: "string"
      year:
        type: "integer"
      source_id:
        type: "string"
      entities:
        type: "array"
        items:
          type: "string"
      experimental_evidence:
        type: "boolean"
      doi:
        type: "string"
      arxiv_id:
        type: "string"
    additionalProperties: false
additionalProperties: false