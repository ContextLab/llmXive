  - id: 5c32029b886c
    text: Abstract and Conclusion claim SciAtlas 'can serve as an effective cognitive
      map to empower the full loop'. However, 'Limitations and Future Work' admits
      only 'running examples... qualitative analysis level'. This creates a logical
      gap between the strength of the conclusion and the provided evidence. Revise
      claims to reflect the qualitative nature of the evaluation.
    severity: writing
  - id: a0fe6017fd72
    text: Abstract and Conclusion state '12 categories of relational edges'. Appendix
      Table 2 (`tab:relationships`) lists only 11 types (missing `PUBLISH_IN`). Ensure
      schema documentation is internally consistent across Abstract, Statistics, and
      Appendix.
    severity: writing
  - id: 0568fd775dc4
    text: Temper the claim 'empower the full loop of automated scientific research'
      in the Abstract and Conclusion. Section 6 admits evaluation is 'qualitative
      analysis level' with no quantitative benchmarks for idea generation or trend
      prediction.
    severity: science
  - id: 647ad3f80eed
    text: Clarify the term 'deterministic association discovery' in the Abstract.
      The pipeline uses LLMs for keyword extraction and reranking (Sec 3.1), which
      are non-deterministic, contradicting the 'deterministic' claim.
    severity: writing
  - id: ccb7e12b195e
    text: Provide comparative evidence or soften the claim 'significantly reducing
      reasoning costs' in the Abstract. No compute/cost analysis is provided to substantiate
      the 2-minute retrieval vs. LLM deep research comparison.
    severity: science
  - id: 652b1bdd22c0
    text: Add a dedicated Ethics Statement addressing Dual-Use Research of Concern
      (DURC) risks in automated idea generation.
    severity: writing
  - id: e75abc363d7b
    text: Discuss potential biases in the OpenAlex data source and their impact on
      scientific equity and fairness.
    severity: writing
  - id: 02a7ad623066
    text: Clarify privacy implications of aggregating 109M author profiles and define
      usage policies/ToS.
    severity: writing
  - id: 7bc421291007
    text: 'Quantitative retrieval benchmarks missing: No Recall@K, MRR, or NDCG scores
      provided against baselines (e.g., BM25, dense retrieval) to validate topological
      reasoning claims.'
    severity: science
  - id: 87eda2b0fdca
    text: 'Cost reduction claim unsupported: The claim of ''significantly reducing
      reasoning costs'' lacks empirical latency or token-count comparison data against
      LLM-based deep research frameworks.'
    severity: science
  - id: 274c478044b8
    text: 'Ablation study needed: Hyperparameters (lambda values, restart probability
      alpha) are set to defaults without sensitivity analysis to prove robustness.'
    severity: science
  - id: 87cdfaff31d3
    text: The abstract and introduction claim the system 'significantly reduces reasoning
      costs' and achieves 'high-relevance results', but no statistical evidence (e.g.,
      mean latency with standard deviation, retrieval metrics like NDCG/MRR with confidence
      intervals) is provided to support these claims. Quantitative benchmarks with
      statistical significance testing against baselines are required.
    severity: science
  - id: e55a98542d12
    text: Section 3 (Future Work) admits the current evaluation is 'qualitative',
      contradicting the empirical claims made in the Abstract. The manuscript must
      either remove unsupported statistical language (e.g., 'significantly') or provide
      the missing quantitative analysis with appropriate statistical tests (e.g.,
      t-tests, ANOVA) to validate performance differences.
    severity: science
