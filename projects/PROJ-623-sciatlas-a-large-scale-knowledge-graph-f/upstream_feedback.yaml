  - id: 9f9f8b484368
    text: No code artifacts (implementation files, test suites, dependency manifests)
      are provided in this submission. The paper mentions a GitHub repo (github.com/zjunlp/SciAtlas)
      but the actual code cannot be evaluated for modularity, test coverage, or reproducibility.
    severity: writing
  - id: 3f55179c17d2
    text: The paper describes a Neo4j-based KG system with Python-based keyword extraction
      (Qwen3-30B-A3B), embedding generation (bge-large-en-v1.5), and retrieval algorithms.
      A code quality review requires access to the actual implementation to assess
      dependency hygiene, test coverage, and reproducibility from scratch.
    severity: writing
  - id: 031b4126e439
    text: Section 5.2 (Construction) describes data pipelines but provides no code
      snippets, configuration files, or deployment scripts. For reproducibility assessment,
      include Dockerfile, requirements.txt, or conda environment specification in
      the artifact package.
    severity: writing
  - id: 5c74e890e83e
    text: Explicitly state the license for the derived SciAtlas KG and construction
      code, as OpenAlex data licensing does not automatically apply to derived works
      without clarification.
    severity: science
  - id: 3653173a5ac4
    text: Specify the exact OpenAlex snapshot date or version used for the 43M paper
      dataset to ensure reproducibility and allow for version control of the knowledge
      graph.
    severity: science
  - id: 4acff4a49a5c
    text: Clarify the current availability of the KG construction code; 'We will open'
      suggests it is not yet released, hindering reproducibility of the data pipeline.
    severity: writing
