[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-proj-285"
version = "0.1.0"
description = "Assessing the Impact of Data Filtering on Gravitational Lens Detection Rates"
requires-python = ">=3.9"
dependencies = [
    "pandas",
    "astropy",
    "scipy",
    "matplotlib",
    "numpy",
    "statsmodels",
    "requests",
    "pyyaml",
    "datasets",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
