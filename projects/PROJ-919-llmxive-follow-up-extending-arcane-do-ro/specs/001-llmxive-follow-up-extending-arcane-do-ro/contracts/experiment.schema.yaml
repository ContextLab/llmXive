$schema: "http://json-schema.org/draft-07/schema#"
title: "Experiment Result Schema"
description: "Schema for a single trial result in the character consistency experiment."
type: object
required:
  - trial_id
  - probe_id
  - condition
  - model_response
  - rule_score
  - execution_time_ms
  - status
properties:
  trial_id:
    type: string
    description: "Unique identifier for the trial."
  probe_id:
    type: string
    description: "Reference to the probe used."
  condition:
    type: string
    enum:
      - "coarse"
      - "fine"
      - "hybrid"
    description: "The prompting condition used."
  model_response:
    type: string
    description: "The text generated by the target model."
  judge_score:
    type: ["integer", "null"]
    minimum: 1
    maximum: 5
    description: "Consistency score from the Judge model (1-5). Null if missing/timeout."
  rule_score:
    type: integer
    minimum: 1
    maximum: 5
    description: "Consistency score from the rule-based metric (sentiment/coherence)."
  execution_time_ms:
    type: integer
    description: "Time taken for generation in milliseconds."
  error:
    type: ["string", "null"]
    description: "Error message if generation failed, or null."
  status:
    type: string
    enum:
      - "success"
      - "timeout"
    description: "Status of the trial."
additionalProperties: false