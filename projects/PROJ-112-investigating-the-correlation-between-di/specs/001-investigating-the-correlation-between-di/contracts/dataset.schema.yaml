$schema: "http://json-schema.org/draft-07/schema#"
title: "Harmonized Dataset Schema"
description: "Schema for the merged, filtered, and harmonized dataset output."
type: object
properties:
  sample_id:
    type: string
    description: "Unique sample identifier (SHA256(cohort + original_id))."
  cohort:
    type: string
    enum:
      - "AGP"
      - "UKBB"
    description: "Source cohort."
  fiber_intake_g_day:
    type: number
    minimum: 0.0
    maximum: 200.0
    description: "Self-reported dietary fiber intake in grams per day."
  read_depth:
    type: integer
    minimum: 5000
    description: "Total sequencing reads."
  age:
    type: number
    description: "Age in years."
  bmi:
    type: number
    description: "Body Mass Index."
  antibiotic_use:
    type: boolean
    description: "Recent antibiotic use."
  sex:
    type: string
    description: "Sex of the participant."
  batch:
    type: string
    description: "Sequencing batch ID."
  taxon_abundances:
    type: object
    description: "Map of taxon IDs to raw counts."
    additionalProperties:
      type: integer
      minimum: 0
required:
  - sample_id
  - cohort
  - fiber_intake_g_day
  - read_depth
  - taxon_abundances
additionalProperties: false
