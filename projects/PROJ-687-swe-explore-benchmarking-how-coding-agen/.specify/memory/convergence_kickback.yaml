  id: methodology-7e1d2f88
  location: plan.md:Statistical Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan proposes a paired t-test or Wilcoxon signed-rank test on N=10 instances
    to assess significance of the 'tiering' effect. With N=10, statistical power is
    extremely low to detect the specific effect size (0.05 difference) claimed in
    SC-004. A non-significant result (p > 0.05) would be inconclusive (Type II error)
    rather than evidence of no difference, undermining the validation goal. The plan
    must explicitly acknowledge this power limitation or increase the sample size
    if feasible within the 6h constraint.
- artifact: projects/PROJ-687-swe-explore-benchmarking-how-coding-agen/specs/001-swe-explore-benchmarking-how-coding-agen/plan.md
  id: methodology-04f20404
  location: plan.md:Statistical Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'The plan states: ''Claims will be framed as associational... as this is an
    observational benchmark.'' However, the spec (US-3, SC-004) requires reproducing
    the paper''s claim of ''tiering'' (implying a causal or at least robust predictive
    superiority of agents over classical methods). If the benchmark is purely observational
    on existing issues, confounding variables (e.g., issue complexity, repository
    size) could explain the performance difference. The plan lacks a design to control
    for these confounds (e.g., stratified sampling, matching, or regression adjustment)
    to isolate the ''explorer type'' effect.'
- artifact: projects/PROJ-687-swe-explore-benchmarking-how-coding-agen/specs/001-swe-explore-benchmarking-how-coding-agen/plan.md
  id: methodology-6705e30e
  location: research.md:Metric Calculation
  reviewer: methodology
  round: 1
  severity: methodology
  text: The 'Context-Efficiency' metric is defined as 'Relevant lines found / Total
    tokens in context'. The plan approximates 'Total tokens' using a standard tokenizer
    (e.g., tiktoken) on the *returned* context. However, the paper's definition likely
    refers to the *budget* or *cost* incurred to retrieve that context. If the explorer
    retrieves a large, irrelevant context to find one line, the metric should penalize
    it. The current definition (lines found / tokens used) might not capture the 'efficiency'
    of the *retrieval process* if the denominator is just the output size rather than
    the search cost. The plan needs to clarify if 'tokens used' includes the search
    overhead or just the final payload.
