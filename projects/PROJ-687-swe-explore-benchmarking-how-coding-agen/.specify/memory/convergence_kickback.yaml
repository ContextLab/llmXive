- artifact: projects/PROJ-687-swe-explore-benchmarking-how-coding-agen/specs/001-swe-explore-benchmarking-how-coding-agen/plan.md
  id: scientific_soundness-2de13ec2
  location: plan.md:Statistical Rigor
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: "The plan defines 'Ranking Score' as '1/Position of first relevant line' (research.md)\
    \ but sets Success Criterion SC-004 to require a '\u2265 0.05 difference in Ranking\
    \ Score' between explorers. This metric is highly discrete (values: 1.0, 0.5,\
    \ 0.33, 0.25...). On a subset of 10 instances, the mean difference between two\
    \ explorers is unlikely to resolve to a stable 0.05 threshold unless the performance\
    \ gap is massive. The plan treats this discrete, sparse metric as a continuous\
    \ variable suitable for a t-test/Wilcoxon test to detect a small effect size (0.05),\
    \ which is statistically unsound for N=10. The validation target (detecting a\
    \ 0.05 gap) is not empirically feasible with the chosen metric granularity and\
    \ sample size."
- artifact: projects/PROJ-687-swe-explore-benchmarking-how-coding-agen/specs/001-swe-explore-benchmarking-how-coding-agen/plan.md
  id: scientific_soundness-a8a3b2b7
  location: research.md:Metric Calculation
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan defines 'Context-Efficiency' as 'Relevant lines found / Total tokens
    in context'. This creates a circular validation risk if the 'Total tokens in context'
    is derived from the *same* ranked list being evaluated. If the explorer returns
    a list, and the metric divides the 'hits' in that list by the 'tokens' of that
    *same* list, the metric is a self-referential ratio of the output, not an independent
    measure of efficiency against a ground truth. The ground truth (relevant lines)
    is independent, but the denominator (tokens) is a function of the predictor's
    output size. While not strictly tautological, it conflates 'precision' with 'efficiency'
    in a way that may bias the comparison if one explorer returns longer lists than
    the other, regardless of relevance. The plan must clarify if the denominator is
    a fixed budget or the actual output size; if the latter, the metric rewards shorter
    lists regardless of content quality, potentially invalidating the 'tiering' claim.
- artifact: projects/PROJ-687-swe-explore-benchmarking-how-coding-agen/specs/001-swe-explore-benchmarking-how-coding-agen/plan.md
  id: scientific_soundness-72816093
  location: plan.md:Statistical Rigor
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: "The plan proposes a 'Paired t-test or Wilcoxon signed-rank test' on N=10\
    \ instances to validate the paper's 'tiering' claim. In information retrieval\
    \ and benchmarking, N=10 is statistically underpowered to detect anything but\
    \ the most extreme effects, especially with the discrete nature of the 'Ranking\
    \ Score' metric. The plan acknowledges 'low power' but proceeds to set a specific\
    \ success criterion (SC-004: \u2265 0.05 difference) that implies a high-confidence\
    \ detection. This is a methodological mismatch: the statistical test cannot reliably\
    \ validate the specific quantitative claim (0.05 difference) with the proposed\
    \ sample size. The validation strategy should be qualitative (e.g., 'BM25 > Rule-Based\
    \ in X out of 10 cases') rather than relying on a p-value or a specific mean difference\
    \ threshold."
