$schema: http://json-schema.org/draft-07/schema#
title: MetricsReportSchema
description: Schema for the calculated metrics report for a single instance
type: object
required:
  - instance_id
  - explorer_name
  - metrics
  - status
properties:
  instance_id:
    type: string
    description: Unique identifier for the benchmark instance
  explorer_name:
    type: string
    description: Name of the explorer used
  metrics:
    type: object
    required:
      - coverage
      - ranking_score
      - context_efficiency
    properties:
      coverage:
        type: number
        nullable: true
        minimum: 0.0
        maximum: 1.0
        description: Ratio of relevant lines found. null if ground truth is empty.
      ranking_score:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Score based on the position of the first relevant line.
      context_efficiency:
        type: number
        minimum: 0.0
        description: "Relevant lines found per FIXED token budget (e.g., 500 tokens)."
  status:
    type: string
    enum:
      - success
      - skipped
      - failed
      - timeout
    description: Execution status
  error_message:
    type: string
    nullable: true
    description: Error details if status is 'failed' or 'timeout'
additionalProperties: false
