version: "1.0"
description: >-
  Expected schema for Adult and CPS datasets used in calibration drift analysis.
  Defines columns and their expected data types (int, str, float).
datasets:
  - name: "Adult"
    source: "UCI Machine Learning Repository"
    columns:
      - name: "age"
        type: "int"
        description: "Continuous variable for age"
      - name: "workclass"
        type: "str"
        description: "Employment sector (e.g., Private, Self-emp-not-inc)"
      - name: "education"
        type: "str"
        description: "Highest level of education achieved"
      - name: "occupation"
        type: "str"
        description: "General category of job"
      - name: "relationship"
        type: "str"
        description: "Relationship status within household"
      - name: "race"
        type: "str"
        description: "Racial group"
      - name: "sex"
        type: "str"
        description: "Gender"
      - name: "capital-gain"
        type: "int"
        description: "Capital gains amount"
      - name: "capital-loss"
        type: "int"
        description: "Capital losses amount"
      - name: "hours-per-week"
        type: "int"
        description: "Average hours worked per week"
      - name: "native-country"
        type: "str"
        description: "Country of origin"
      - name: "income"
        type: "str"
        description: "Target variable (>50K or <=50K)"
  - name: "CPS"
    source: "IPUMS Current Population Survey"
    columns:
      - name: "age"
        type: "int"
        description: "Continuous variable for age"
      - name: "workclass"
        type: "str"
        description: "Employment sector"
      - name: "education"
        type: "str"
        description: "Highest level of education achieved"
      - name: "occupation"
        type: "str"
        description: "General category of job"
      - name: "relationship"
        type: "str"
        description: "Relationship status within household"
      - name: "race"
        type: "str"
        description: "Racial group"
      - name: "sex"
        type: "str"
        description: "Gender"
      - name: "capital-gain"
        type: "int"
        description: "Capital gains amount"
      - name: "capital-loss"
        type: "int"
        description: "Capital losses amount"
      - name: "hours-per-week"
        type: "int"
        description: "Average hours worked per week"
      - name: "native-country"
        type: "str"
        description: "Country of origin"
      - name: "income"
        type: "str"
        description: "Target variable (>50K or <=50K)"
validation_rules:
  - rule: "non_null"
    columns: ["age", "workclass", "education", "occupation", "relationship", "race", "sex", "income"]
  - rule: "positive_range"
    columns: ["age", "hours-per-week"]
    min: 0