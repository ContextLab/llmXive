$schema: http://json-schema.org/draft-07/schema#
title: Dataset Schema
description: Schema for the raw and processed calcium imaging dataset.
type: object
properties:
  metadata:
    type: object
    properties:
      source:
        type: string
      acquisition_date:
        type: string
        format: date-time
      animal_id:
        type: string
      session_id:
        type: string
  data:
    type: object
    properties:
      roi_traces:
        type: array
        items:
          type: array
          items:
            type: number
      timestamps:
        type: array
        items:
          type: number
      behavioral_metadata:
        type: object
    required:
      - roi_traces
      - timestamps
required:
  - metadata
  - data
