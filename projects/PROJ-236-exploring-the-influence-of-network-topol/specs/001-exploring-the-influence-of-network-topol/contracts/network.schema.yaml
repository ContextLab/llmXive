$schema: "http://json-schema.org/draft-07/schema#"
title: "NetworkRealization"
description: "Schema for a single atomic connectivity network realization."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique UUID for the realization."
  topology_type:
    type: "string"
    enum:
      - "small_world"
      - "scale_free"
      - "random"
    description: "Type of network generation algorithm used."
  node_count:
    type: "integer"
    description: "Number of nodes in the graph."
  edge_count:
    type: "integer"
    description: "Number of edges in the graph."
  cutoff_factor:
    type: "number"
    description: "Distance cutoff multiplier relative to nearest-neighbor distance."
  seed:
    type: "integer"
    description: "Random seed used for generation."
  composition:
    type: "object"
    description: "Chemical composition of the realization (e.g., Si/Ge ratio)."
    additionalProperties:
      type: "number"
  metrics:
    type: "object"
    description: "Topological metrics calculated for the graph."
    properties:
      clustering_coeff:
        type: "number"
        description: "Average clustering coefficient."
      avg_path_length:
        type: "number"
        description: "Average shortest path length."
      degree_variance:
        type: "number"
        description: "Variance of the degree distribution."
      spectral_gap:
        type: "number"
        description: "Spectral gap of the Laplacian matrix."
      betweenness_centrality_mean:
        type: "number"
        description: "Mean betweenness centrality."
  is_valid:
    type: "boolean"
    description: "Whether the graph is connected."
  exclusion_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if is_valid is false."
required:
  - "id"
  - "topology_type"
  - "node_count"
  - "edge_count"
  - "cutoff_factor"
  - "seed"
  - "composition"
  - "metrics"
  - "is_valid"
additionalProperties: false
