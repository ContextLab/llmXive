$schema: "http://json-schema.org/draft-07/schema#"
title: "NetworkRealization"
description: "Schema for a single atomic connectivity network realization. Includes generation metadata as top-level keys."
type: "object"
properties:
  id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the realization"
  topology_type:
    type: "string"
    enum:
      - "small_world"
      - "scale_free"
      - "random"
    description: "Type of network topology generated"
  n_nodes:
    type: "integer"
    minimum: 10
    description: "Number of nodes in the network (N <= 100)"
  n_edges:
    type: "integer"
    minimum: 0
    description: "Number of edges in the network"
  cutoff_factor:
    type: "number"
    minimum: 1.0
    maximum: 2.0
    description: "Distance cutoff multiplier relative to nearest-neighbor distance"
  seed:
    type: "integer"
    description: "Random seed used for generation"
  algorithm:
    type: "string"
    description: "Algorithm used (e.g., Watts-Strogatz, Barabasi-Albert)"
  composition:
    type: "object"
    description: "Chemical composition of the realization (e.g., Si/Ge ratio)."
    additionalProperties:
      type: "number"
  is_connected:
    type: "boolean"
    description: "Whether the graph is fully connected"
  metrics:
    type: "object"
    description: "Topological metrics calculated for this network"
    properties:
      clustering_coefficient:
        type: "number"
        description: "Average clustering coefficient"
      average_path_length:
        type: "number"
        description: "Average shortest path length"
      degree_variance:
        type: "number"
        description: "Variance of the degree distribution"
      spectral_gap:
        type: "number"
        description: "Second smallest eigenvalue of the Laplacian"
      betweenness_centrality_mean:
        type: "number"
        description: "Mean betweenness centrality"
    required:
      - "clustering_coefficient"
      - "average_path_length"
      - "degree_variance"
      - "spectral_gap"
      - "betweenness_centrality_mean"
required:
  - "id"
  - "topology_type"
  - "n_nodes"
  - "n_edges"
  - "cutoff_factor"
  - "seed"
  - "algorithm"
  - "composition"
  - "is_connected"
  - "metrics"
additionalProperties: false