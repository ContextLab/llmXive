$schema: "http://json-schema.org/draft-07/schema#"
title: "TransportResult"
description: "Schema for thermal conductivity calculation results"
type: "object"
properties:
  network_id:
    type: "string"
    format: "uuid"
    description: "Reference to the NetworkRealization ID"
  conductivity:
    type: "number"
    description: "Effective thermal conductivity (W/mK)"
    exclusiveMinimum: 0
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "failed_retry"
      - "failed_max"
    description: "Status of the solver convergence"
  solver_runtime:
    type: "number"
    minimum: 0
    description: "Time taken to solve in seconds"
  regime_detected:
    type: "string"
    enum:
      - "diffusive"
      - "ballistic"
      - "mixed"
    description: "Detected transport regime"
  method_switched:
    type: "boolean"
    description: "True if method was switched (e.g., to NEMD)"
required:
  - "network_id"
  - "conductivity"
  - "convergence_status"
  - "solver_runtime"
  - "regime_detected"
  - "method_switched"
additionalProperties: false