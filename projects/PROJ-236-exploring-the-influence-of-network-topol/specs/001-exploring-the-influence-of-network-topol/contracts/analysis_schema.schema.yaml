$schema: "http://json-schema.org/draft-07/schema#"
title: "CorrelationAnalysis"
description: "Schema for statistical correlation analysis results"
type: "object"
properties:
  metric_name:
    type: "string"
    description: "Name of the topological metric analyzed"
  topology_type:
    type: "string"
    enum:
      - "small_world"
      - "scale_free"
      - "random"
    description: "Topology type for this analysis"
  correlation_coefficient:
    type: "number"
    description: "Pearson correlation coefficient (r)"
  p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Raw p-value from regression"
  p_value_corrected:
    type: "number"
    minimum: 0
    maximum: 1
    description: "P-value after FDR correction"
  ci_lower:
    type: "number"
    description: "Lower bound of 95% bootstrap confidence interval"
  ci_upper:
    type: "number"
    description: "Upper bound of 95% bootstrap confidence interval"
  ci_width:
    type: "number"
    description: "Width of the 95% bootstrap confidence interval"
  r_squared:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Coefficient of determination for the linear fit"
  power_law_r_squared:
    type: "number"
    minimum: 0
    maximum: 1
    description: "R-squared for the power-law fit between disorder and conductivity"
  power_law_exponent:
    type: "number"
    description: "Exponent of the power-law fit"
  ci_width_target_met:
    type: "boolean"
    description: "True if ci_width <= 0.2"
required:
  - "metric_name"
  - "topology_type"
  - "correlation_coefficient"
  - "p_value"
  - "p_value_corrected"
  - "ci_lower"
  - "ci_upper"
  - "ci_width"
  - "r_squared"
  - "power_law_r_squared"
  - "power_law_exponent"
  - "ci_width_target_met"
additionalProperties: false
