$schema: "http://json-schema.org/draft-07/schema#"
title: "CorrelationAnalysis"
description: "Schema for statistical correlation analysis results"
type: "object"
properties:
  metric_name:
    type: "string"
    description: "Name of the topological metric analyzed"
  topology_type:
    type: "string"
    enum:
      - "small_world"
      - "scale_free"
      - "random"
    description: "Topology type for this analysis"
  correlation_coefficient:
    type: "number"
    description: "Pearson correlation coefficient (r)"
  p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Raw p-value from regression"
  p_value_corrected:
    type: "number"
    minimum: 0
    maximum: 1
    description: "P-value after FDR correction"
  ci_lower:
    type: "number"
    description: "Lower bound of 95% bootstrap confidence interval"
  ci_upper:
    type: "number"
    description: "Upper bound of 95% bootstrap confidence interval"
  r_squared:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Coefficient of determination for the fit"
required:
  - "metric_name"
  - "topology_type"
  - "correlation_coefficient"
  - "p_value"
  - "p_value_corrected"
  - "ci_lower"
  - "ci_upper"
  - "r_squared"
additionalProperties: false
