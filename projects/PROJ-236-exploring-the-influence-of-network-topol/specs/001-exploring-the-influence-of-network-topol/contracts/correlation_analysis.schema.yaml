$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Analysis Result"
description: "Schema for statistical correlation results between network metrics and thermal conductivity."
type: "object"
properties:
  metric_name:
    type: "string"
    description: "Name of the topological metric analyzed."
  correlation_coeff:
    type: "number"
    description: "Pearson correlation coefficient (r)."
  p_value:
    type: "number"
    description: "Raw p-value from the hypothesis test."
  p_value_corrected:
    type: "number"
    description: "P-value after Bonferroni or FDR correction."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% bootstrap confidence interval (2.5th percentile)."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% bootstrap confidence interval (97.5th percentile)."
  r_squared:
    type: "number"
    description: "R-squared value of the power-law fit."
  bootstrap_iterations:
    type: "integer"
    description: "Number of bootstrap iterations performed (must be >= 1000)."
  sample_size:
    type: "integer"
    description: "Number of network realizations included in the analysis."
required:
  - metric_name
  - correlation_coeff
  - p_value
  - p_value_corrected
  - ci_lower
  - ci_upper
  - r_squared
  - bootstrap_iterations
  - sample_size
additionalProperties: false
