$schema: "http://json-schema.org/draft-07/schema#"
title: "TransportResult"
description: "Schema for the calculated thermal conductivity of a network realization."
type: "object"
properties:
  realization_id:
    type: "string"
    description: "Foreign key to NetworkRealization.id."
  thermal_conductivity:
    type: "number"
    description: "Effective thermal conductivity in W/m·K."
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "failed"
      - "timeout"
    description: "Status of the transport calculation."
  force_constant_method:
    type: "string"
    description: "Method used to derive force constants (e.g., 'bond_distance_approx')."
  runtime_seconds:
    type: "number"
    description: "Time taken for the calculation in seconds."
required:
  - "realization_id"
  - "thermal_conductivity"
  - "convergence_status"
  - "force_constant_method"
  - "runtime_seconds"
additionalProperties: false