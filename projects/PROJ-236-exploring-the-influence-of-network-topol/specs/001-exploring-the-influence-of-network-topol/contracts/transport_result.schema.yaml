$schema: "http://json-schema.org/draft-07/schema#"
title: "TransportResult"
description: "Schema for the thermal conductivity calculation result."
type: "object"
required:
  - "realization_id"
  - "thermal_conductivity"
  - "convergence_status"
properties:
  realization_id:
    type: "string"
    description: "UUID of the associated network realization."
  method:
    type: "string"
    enum:
      - "Green-Kubo"
      - "Fallback_Scipy"
    description: "Method used for transport calculation."
  thermal_conductivity:
    type: "number"
    description: "Effective thermal conductivity in W/mK."
  error_estimate:
    type: "number"
    minimum: 0.0
    description: "Estimated error of the calculation."
  convergence_status:
    type: "string"
    enum:
      - "Converged"
      - "Failed_Retry_Exhausted"
      - "Failed_Singular"
    description: "Status of the solver convergence."
  simulation_time_seconds:
    type: "number"
    minimum: 0.0
  force_constant_source:
    type: "string"
    enum:
      - "EAM"
      - "Ab-Initio"
    description: "Source of the force constants used."
  regime_flag:
    type: "string"
    enum:
      - "Diffusive"
      - "Ballistic_Flagged"
    description: "Indicates the dominant transport regime."
additionalProperties: false
