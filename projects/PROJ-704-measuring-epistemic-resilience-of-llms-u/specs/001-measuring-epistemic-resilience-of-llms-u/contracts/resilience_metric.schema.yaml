$schema: "http://json-schema.org/draft-07/schema#"
title: ResilienceMetric
description: "Schema for aggregated resilience metrics and statistical test results."
type: object
required:
  - model_name
  - strategy
  - clean_accuracy
  - mislead_accuracy
  - resilience_score
  - sample_size
  - fw_controlled
properties:
  model_name:
    type: string
    description: "Name of the LLM model (e.g., Llama-2-7B)."
  strategy:
    type: string
    description: "Prompting strategy used (Baseline, CoT, Self-Critique)."
  clean_accuracy:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy on clean questions."
  mislead_accuracy:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy on mislead questions."
  resilience_score:
    type: number
    description: "Calculated resilience score (1 - (clean-mislead)/clean). If clean=0, score=0."
  accuracy_drop:
    type: number
    description: "Difference in accuracy (clean - mislead), used for Kruskal-Wallis."
  mcnemar_statistic:
    type: ["number", "null"]
    description: "McNemar's test statistic (if applicable)."
  mcnemar_p_value:
    type: ["number", "null"]
    description: "Raw p-value from McNemar's test."
  mcnemar_p_adjusted:
    type: ["number", "null"]
    description: "Bonferroni-corrected p-value."
  kruskal_h_statistic:
    type: ["number", "null"]
    description: "Kruskal-Wallis H statistic (if applicable)."
  kruskal_p_value:
    type: ["number", "null"]
    description: "Kruskal-Wallis p-value (if applicable)."
  sample_size:
    type: integer
    minimum: 1
    description: "Number of items in the sample."
  fw_controlled:
    type: boolean
    description: "True if Family-Wise Error Rate is controlled (all adjusted p-values < 0.05)."
  items_excluded_clean_zero:
    type: integer
    description: "Number of items excluded from statistical tests due to clean accuracy = 0."
additionalProperties: false