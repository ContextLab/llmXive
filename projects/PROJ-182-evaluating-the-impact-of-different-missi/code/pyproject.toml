[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-rd-missingness"
version = "0.1.0"
description = "Evaluating the Impact of Different Missing Data Mechanisms on Regression Discontinuity Designs"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "seaborn>=0.12.0",
    "matplotlib>=3.7.0",
    "pyyaml>=6.0",
    "pytest>=7.0.0",
    "jsonschema>=4.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["code/src", "code/tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code/src"]
