$schema: "http://json-schema.org/draft-07/schema#"
title: "AggregatedMetric"
description: "Summary statistics across multiple replications."
type: "object"
properties:
  mechanism:
    type: "string"
    enum: ["MCAR", "MAR", "MNAR"]
    description: "Missingness mechanism."
  missing_rate:
    type: "number"
    description: "Missingness rate."
  estimator:
    type: "string"
    enum: ["Naive", "MI", "IPW", "Selection"]
    description: "Estimation method."
  mean_bias:
    type: "number"
    description: "Mean of (estimate - true_effect)."
  rmse:
    type: "number"
    description: "Root Mean Squared Error."
  coverage_rate:
    type: "number"
    description: "Empirical 95% CI coverage rate (0.0 to 1.0)."
  convergence_rate:
    type: "number"
    description: "Proportion of replications that converged (for Selection)."
  n_replications:
    type: "integer"
    description: "Number of replications included in the aggregate."
required:
  - mechanism
  - missing_rate
  - estimator
  - mean_bias
  - rmse
  - coverage_rate
  - convergence_rate
  - n_replications
