$schema: http://json-schema.org/draft-07/schema#
title: SimulationConfig
description: Configuration for the RD simulation study parameters.
type: object
required:
  - sample_size
  - true_effect
  - seed
  - exclusion_restriction
properties:
  sample_size:
    type: integer
    description: Number of observations to generate.
    minimum: 1
  true_effect:
    type: number
    description: The ground truth treatment effect (tau).
  seed:
    type: integer
    description: Random seed for reproducibility.
  exclusion_restriction:
    type: number
    description: The coefficient for the exclusion restriction variable Z* in the outcome equation.
  noise_sigma:
    type: number
    description: Standard deviation of the error term epsilon.
    default: 1.0
    minimum: 0
  beta0:
    type: number
    description: Intercept of the outcome equation.
    default: 0.0
  beta1:
    type: number
    description: Slope coefficient for the running variable X.
    default: 1.0
  beta2:
    type: number
    description: Slope coefficient for the covariate Z.
    default: 0.5
additionalProperties: false
