$schema: http://json-schema.org/draft-07/schema#
title: AggregatedMetric
description: Aggregated performance metrics across Monte Carlo replications.
type: object
required:
  - bias
  - rmse
  - coverage
  - mechanism
  - rate
  - estimator_name
  - n_replications
properties:
  bias:
    type: number
    description: Mean bias across replications (mean(est - true_effect)).
  rmse:
    type: number
    description: Root Mean Squared Error across replications.
  coverage:
    type: number
    description: Empirical coverage rate of confidence intervals (0 to 1).
  mechanism:
    type: string
    description: Missingness mechanism.
    enum:
      - MCAR
      - MAR
      - MNAR
  rate:
    type: number
    description: Missingness rate.
  estimator_name:
    type: string
    description: Name of the estimator.
  n_replications:
    type: integer
    description: Number of Monte Carlo replications aggregated.
    minimum: 1
  nominal_coverage:
    type: number
    description: The nominal confidence level used (e.g., 0.95).
    default: 0.95
additionalProperties: false