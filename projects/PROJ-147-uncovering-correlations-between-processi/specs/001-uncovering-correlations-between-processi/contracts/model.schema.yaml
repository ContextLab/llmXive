$schema: "http://json-schema.org/draft-07/schema#"
title: "TrainedModel Schema"
description: "Schema for serialized model artifact (FR-004, FR-005)"
type: object
properties:
  model_id:
    type: string
    description: "Unique identifier for the model"
  model_file:
    type: string
    description: "Path to serialized model file"
  hyperparameters:
    type: object
    description: "Model hyperparameters"
    properties:
      n_estimators:
        type: integer
        description: "Number of trees in the forest"
        minimum: 10
      max_depth:
        type: ["integer", "null"]
        description: "Maximum depth of the tree"
      min_samples_split:
        type: integer
        description: "Minimum samples required to split a node"
        minimum: 2
      min_samples_leaf:
        type: integer
        description: "Minimum samples required at a leaf node"
        minimum: 1
    required:
      - n_estimators
  training_checksum:
    type: string
    description: "SHA256 of training data"
    pattern: "^[a-f0-9]{64}$"
  validation_metrics:
    type: object
    description: "Validation metrics per coefficient"
    properties:
      odf_100:
        type: object
        properties:
          r_squared:
            type: number
            description: "R² score for {100} coefficient"
          mae:
            type: number
            description: "Mean absolute error"
          rmse:
            type: number
            description: "Root mean square error"
      odf_110:
        type: object
        properties:
          r_squared:
            type: number
          mae:
            type: number
          rmse:
            type: number
      odf_111:
        type: object
        properties:
          r_squared:
            type: number
          mae:
            type: number
          rmse:
            type: number
    required:
      - odf_100
      - odf_110
      - odf_111
  per_family_metrics:
    type: object
    description: "Validation metrics per alloy family (FR-009)"
    additionalProperties:
      type: object
      properties:
        r_squared:
          type: number
        mae:
          type: number
        rmse:
          type: number
      required:
        - r_squared
        - mae
        - rmse
  feature_importance:
    type: array
    description: "Permutation importance ranking"
    items:
      type: object
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
        rank:
          type: integer
      required:
        - feature_name
        - importance_score
        - rank
  group_importance:
    type: array
    description: "Grouped permutation importance (raw + derived)"
    items:
      type: object
      properties:
        group_name:
          type: string
        importance_score:
          type: number
        rank:
          type: integer
      required:
        - group_name
        - importance_score
        - rank
  data_source_type:
    type: string
    description: "Type of data used for training (Real or Synthetic) per SC-004"
    enum:
      - "Real"
      - "Synthetic"
  missing_confounds:
    type: array
    description: "List of missing confounding variables (FR-012)"
    items:
      type: string
  created_at:
    type: string
    description: "ISO timestamp of model creation"
    format: date-time
required:
  - model_id
  - model_file
  - hyperparameters
  - training_checksum
  - validation_metrics
  - data_source_type
  - created_at
additionalProperties: false
