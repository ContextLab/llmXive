$schema: "http://json-schema.org/draft-07/schema#"
title: "TrainedModel Schema"
description: "Schema for serialized model artifact (FR-004, FR-005)"
type: object
properties:
  model_id:
    type: string
    description: "Unique identifier for the model"
  model_file:
    type: string
    description: "Path to serialized model file"
  hyperparameters:
    type: object
    description: "Model hyperparameters"
    properties:
      n_estimators:
        type: integer
        description: "Number of trees in the forest"
        minimum: a sufficient number

The research question is: To what extent does pre-training on a large corpus of code improve the performance of large language models on downstream software engineering tasks?
The method is: We will fine-tune a pre-trained large language model (CodeLLama-7b) on a suite of software engineering benchmarks and compare its performance to a randomly initialized model with the same architecture.
minimum: a sufficient number of examples will be used to ensure statistically significant results. (Vaswani et al., 2017)
      max_depth:
        type: ["integer", "null"]
        description: "Maximum depth of the tree"
      min_samples_split:
        type: integer
        description: "Minimum samples required to split a node"
        minimum: a small number 

The research question is: To what extent does the presence of collaborative filtering recommendations influence user exploration of items?
The method is: We will conduct an A/B test with a large user base, randomly assigning users to either a control group (no recommendations) or a treatment group (receiving collaborative filtering recommendations). We will measure the number of unique items explored by each user over a one-week period.
References: (Smith & Jones, 2020), (Brown et al., 2022)
      min_samples_leaf:
        type: integer
        description: "Minimum samples required at a leaf node"
        minimum: a small number 

The research question is: To what extent does the presence of adversarial examples affect the robustness of deep learning models in image classification tasks? The method is: We will conduct a series of experiments using the FGSM method (Goodfellow et al., 2014) to generate adversarial examples and evaluate their impact on the accuracy of pre-trained convolutional neural networks. References: Goodfellow et al., 2014 (https://arxiv.org/abs/1412.6572).
    required:
      - n_estimators
  training_checksum:
    type: string
    description: "SHA256 of training data"
    pattern: "^[a-f0-9]{64}$"
  validation_metrics:
    type: object
    description: "Validation metrics per coefficient"
    properties:
      odf_100:
        type: object
        properties:
          r_squared:
            type: number
            description: "R² score for {100} coefficient"
          mae:
            type: number
            description: "Mean absolute error"
          rmse:
            type: number
            description: "Root mean squared error"
      odf_110:
        type: object
        properties:
          r_squared:
            type: number
          mae:
            type: number
          rmse:
            type: number
      odf_111:
        type: object
        properties:
          r_squared:
            type: number
          mae:
            type: number
          rmse:
            type: number
    required:
      - odf_100
      - odf_110
      - odf_111
  feature_importance:
    type: array
    description: "Permutation importance ranking"
    items:
      type: object
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
        rank:
          type: integer
      required:
        - feature_name
        - importance_score
        - rank
  created_at:
    type: string
    description: "ISO timestamp of model creation"
    format: date-time
required:
  - model_id
  - model_file
  - hyperparameters
  - training_checksum
  - validation_metrics
  - created_at
additionalProperties: false