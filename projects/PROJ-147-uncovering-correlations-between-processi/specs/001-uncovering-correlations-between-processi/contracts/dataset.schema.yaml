$schema: "http://json-schema.org/draft-07/schema#"
title: "ProcessingRecord Schema"
description: "Schema for a single rolling experiment record, including processing parameters and optional raw diffraction file path."
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the sample."
  alloy_id:
    type: "string"
    description: "Identifier linking to the AlloyFamily."
  rolling_speed:
    type: "number"
    description: "Rolling speed in meters per second (m/s)."
  temperature:
    type: "number"
    description: "Rolling temperature in degrees Celsius (°C)."
  reduction_ratio:
    type: "number"
    description: "Reduction ratio as a percentage (%)."
  composition_vector:
    type: "array"
    items:
      type: "number"
    description: "Normalized elemental composition vector."
  prior_history:
    type: "string"
    description: "Prior processing history (e.g., 'annealed', 'cold-worked')."
  raw_diffraction_file:
    type: "string"
    description: "Path to the raw ODF or pole-figure file."
  source:
    type: "string"
    description: "Data source (e.g., 'OMDB', 'synthetic')."
required:
  - sample_id
  - alloy_id
  - rolling_speed
  - temperature
  - reduction_ratio
  - composition_vector
  - prior_history
  - source
additionalProperties: false
