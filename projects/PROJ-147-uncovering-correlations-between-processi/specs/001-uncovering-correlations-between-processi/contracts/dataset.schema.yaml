$schema: "http://json-schema.org/draft-07/schema#"
title: "ProcessingRecordSchema"
description: "Schema for a single processing record including parameters and texture descriptors."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the record."
  alloy_id:
    type: "string"
    description: "Alloy identifier (e.g., Al-6061)."
  rolling_speed:
    type: "number"
    description: "Rolling speed in m/s."
    minimum: 0.0
  temperature:
    type: "number"
    description: "Rolling temperature in °C."
  reduction_ratio:
    type: "number"
    description: "Reduction ratio in percentage (0-100)."
    minimum: 0.0
    maximum: 100.0
  odf_100:
    type: "number"
    description: "ODF intensity for {100} plane in MRD."
    minimum: 0.0
  odf_110:
    type: "number"
    description: "ODF intensity for {110} plane in MRD."
    minimum: 0.0
  odf_111:
    type: "number"
    description: "ODF intensity for {111} plane in MRD."
    minimum: 0.0
  source:
    type: "string"
    enum:
      - "real"
      - "synthetic"
    description: "Origin of the data."
required:
  - id
  - alloy_id
  - rolling_speed
  - temperature
  - reduction_ratio
  - odf_100
  - odf_110
  - odf_111
  - source
