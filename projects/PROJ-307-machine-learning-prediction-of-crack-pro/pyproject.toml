[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crack-propagation-ml"
version = "0.1.0"
description = "Machine Learning Prediction of Crack Propagation Rates in Metals"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.3.0",
    "xgboost>=2.0.0",
    "optuna>=3.4.0",
    "pandas>=2.0.0",
    "ruptures>=1.1.8",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "pyyaml>=6.0",
    "jsonschema>=4.0.0",
    "requests>=2.31.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Inherit settings from code/.ruff.toml if we wanted a unified config,
# but for this project we keep the config file in the root for simplicity
# or point to the specific file if running from root.
# Here we define root-level defaults that match code/.ruff.toml
line-length = 88
target-version = "py311"
select = [
    "E", "W", "F", "I", "C", "B", "UP"
]
ignore = ["E501"]

[tool.ruff.isort]
known-first-party = ["config", "data", "models", "utils", "analysis", "logging_config", "main"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
