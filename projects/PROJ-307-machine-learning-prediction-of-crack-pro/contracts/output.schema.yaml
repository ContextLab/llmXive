$schema: http://json-schema.org/draft-07/schema#
title: Crack Propagation ML Output Schema
description: >
  Defines the expected structure for all model outputs, metrics, and
  generated artifacts (plots) for the Machine Learning Prediction of
  Crack Propagation Rates in Metals project.
type: object
required:
  - metadata
  - baseline_metrics
  - augmented_metrics
  - model_artifacts
  - plots
properties:
  metadata:
    type: object
    description: Run-level metadata
    required:
      - timestamp
      - config_version
      - data_source_checksums
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of the run
      config_version:
        type: string
        description: Version hash or identifier of the config used
      data_source_checksums:
        type: object
        description: Checksums for input data files (NASA, NIST)
        additionalProperties:
          type: string
          description: SHA256 checksum string

  baseline_metrics:
    type: object
    description: Metrics for the Paris Law baseline model (Log-Log Linear Regression)
    required:
      - r2_score
      - p_value
      - slope
      - intercept
      - null_model_r2
    properties:
      r2_score:
        type: number
        description: R-squared value of the baseline model
      p_value:
        type: number
        description: P-value from the permutation test against the null model
      slope:
        type: number
        description: Slope coefficient (m in Paris Law)
      intercept:
        type: number
        description: Intercept coefficient (log C in Paris Law)
      null_model_r2:
        type: number
        description: R-squared of the intercept-only null model (should be ~0)
      permutation_p_value:
        type: number
        description: P-value from the permutation test for slope significance

  augmented_metrics:
    type: object
    description: Metrics for the augmented ensemble models (RF, XGBoost)
    required:
      - rf_r2_cv_mean
      - rf_r2_cv_std
      - xgb_r2_cv_mean
      - xgb_r2_cv_std
      - delta_r2
      - permutation_p_value
    properties:
      rf_r2_cv_mean:
        type: number
        description: Mean R-squared for Random Forest (k-fold CV)
      rf_r2_cv_std:
        type: number
        description: Std deviation of R-squared for Random Forest
      xgb_r2_cv_mean:
        type: number
        description: Mean R-squared for XGBoost (k-fold CV)
      xgb_r2_cv_std:
        type: number
        description: Std deviation of R-squared for XGBoost
      delta_r2:
        type: number
        description: Difference in R-squared (Augmented - Baseline)
      permutation_p_value:
        type: number
        description: P-value from permutation test comparing Baseline vs Augmented
      feature_importance:
        type: array
        description: Top features by importance
        items:
          type: object
          properties:
            feature:
              type: string
            importance:
              type: number

  model_artifacts:
    type: object
    description: Paths to serialized model files
    required:
      - baseline_model_path
      - rf_model_path
      - xgb_model_path
    properties:
      baseline_model_path:
        type: string
        description: Relative path to the pickled baseline model (e.g., data/models/baseline.pkl)
      rf_model_path:
        type: string
        description: Relative path to the pickled Random Forest model
      xgb_model_path:
        type: string
        description: Relative path to the pickled XGBoost model
      preprocessor_path:
        type: string
        description: Relative path to the fitted preprocessor (scaler/encoder)

  plots:
    type: object
    description: Paths to generated visualization artifacts
    required:
      - pdp_delta_k
      - log_log_scatter
      - regime_map
    properties:
      pdp_delta_k:
        type: string
        description: Path to Partial Dependence Plot for Delta K (figures/pdp_delta_k.png)
      log_log_scatter:
        type: string
        description: Path to Log-Log scatter plot with regression line (figures/log_log_scatter.png)
      regime_map:
        type: string
        description: Path to Regime identification map (figures/regime_map.png)
      feature_importance_bar:
        type: string
        description: Path to Feature importance bar chart (figures/feature_importance.png)

  sensitivity_report:
    type: object
    description: Summary of sensitivity analysis for regime stability
    properties:
      stable_regimes:
        type: boolean
        description: Whether regime boundaries remained stable under parameter sweep
      parameter_sweep_summary:
        type: object
        description: Details of the sweep performed
        properties:
          parameters_swept:
            type: array
            items:
              type: string
          stability_metric:
            type: number
            description: Quantitative measure of stability (e.g., Jaccard index of regime overlaps)