$schema: http://json-schema.org/draft-07/schema#
title: Crack Propagation ML Output Schema
description: |
  Defines the expected format for model evaluation metrics, regime analysis results,
  and plot metadata produced by the pipeline. Used for validation of artifacts
  generated by code/main.py and analysis modules.
type: object
required:
  - metrics
  - baseline_results
  - augmented_results
  - regime_analysis
  - plots
properties:
  metrics:
    type: object
    description: Global execution metrics
    required:
      - timestamp
      - dataset_rows
      - dataset_columns
      - duration_seconds
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of execution
      dataset_rows:
        type: integer
        minimum: 0
        description: Number of rows in the cleaned dataset
      dataset_columns:
        type: integer
        minimum: 0
        description: Number of features in the cleaned dataset
      duration_seconds:
        type: number
        minimum: 0
        description: Total pipeline execution time in seconds

  baseline_results:
    type: object
    description: Results from the Paris Law (Linear Regression) baseline model
    required:
      - r2_score
      - p_value
      - slope
      - intercept
      - permutation_test_passed
    properties:
      r2_score:
        type: number
        description: R-squared score of the log-log linear regression
      p_value:
        type: number
        minimum: 0
        maximum: 1
        description: P-value from the permutation test for slope significance
      slope:
        type: number
        description: Slope coefficient (m in Paris Law: da/dN = C * DeltaK^m)
      intercept:
        type: number
        description: Intercept coefficient (log(C))
      permutation_test_passed:
        type: boolean
        description: True if p_value < 0.05, indicating significant linear relationship

  augmented_results:
    type: object
    description: Results from the augmented tree-based ensemble models
    required:
      - best_model_type
      - r2_score
      - cv_scores
      - delta_r2
      - permutation_p_value
      - top_features
    properties:
      best_model_type:
        type: string
        enum:
          - random_forest
          - xgboost
        description: Type of the best performing augmented model
      r2_score:
        type: number
        description: R-squared score on the test set
      cv_scores:
        type: array
        items:
          type: number
        description: R-squared scores from k-fold cross-validation
      delta_r2:
        type: number
        description: Improvement in R2 over the baseline model (augmented_r2 - baseline_r2)
      permutation_p_value:
        type: number
        minimum: 0
        maximum: 1
        description: P-value from permutation test comparing baseline vs augmented
      top_features:
        type: array
        items:
          type: object
          required:
            - feature_name
            - importance
          properties:
            feature_name:
              type: string
            importance:
              type: number
        description: Top 3 features by importance score

  regime_analysis:
    type: object
    description: Results from the change-point detection and regime analysis
    required:
      - change_points
      - regimes
      - regime_metrics
    properties:
      change_points:
        type: array
        items:
          type: number
        description: Delta K values where regime changes occur
      regimes:
        type: array
        items:
          type: object
          required:
            - name
            - min_delta_k
            - max_delta_k
          properties:
            name:
              type: string
              enum:
                - low_delta_k
                - mid_delta_k
                - high_delta_k
            min_delta_k:
              type: number
            max_delta_k:
              type: number
        description: Identified regimes based on Delta K
      regime_metrics:
        type: object
        additionalProperties:
          type: object
          required:
            - local_r2
            - dominant_feature
          properties:
            local_r2:
              type: number
            dominant_feature:
              type: string
        description: Metrics calculated within each regime

  plots:
    type: array
    description: Metadata for generated visualization files
    items:
      type: object
      required:
        - filename
        - title
        - type
        - path
      properties:
        filename:
          type: string
        title:
          type: string
        type:
          type: string
          enum:
            - pdp
            - regime_map
            - residual_plot
            - feature_importance
        path:
          type: string
          description: Relative path from project root (e.g., figures/pdp_delta_k.png)