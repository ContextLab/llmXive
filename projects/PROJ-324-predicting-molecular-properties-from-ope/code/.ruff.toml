# Ruff configuration file
# This file is an alternative to pyproject.toml configuration
# If both exist, ruff prefers pyproject.toml, but this is provided for clarity

line-length = 88
target-version = "py310"

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]
ignore = ["E501"]

[lint.pydocstyle]
convention = "google"
