# Ruff configuration file
# This file is redundant with pyproject.toml [tool.ruff] section
# but provided for IDE compatibility and explicit linting configuration.

target-version = "py310"
line-length = 88
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
    "data",
    "figures",
]

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "C",
    "B",
]
ignore = [
    "E501",
    "B008",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
