# Ruff configuration file
# This file mirrors settings from pyproject.toml for IDE compatibility

target-version = "py310"
line-length = 100

select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
]

ignore = [
    "E501",
]

exclude = [
    ".git",
    "__pycache__",
    "data",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
]
