[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-324-predicting-molecular-properties"
version = "0.1.0"
description = "Predicting molecular properties from Open Babel fingerprints with Random Forests"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rdkit",
    "scikit-learn",
    "shap",
    "pandas",
    "numpy",
    "datasets",
    "requests",
    "pubchempy",
    "matplotlib",
    "openpyxl",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
)/
'''

[tool.ruff]
# Inherits from code/.ruff.toml if run from root, or can be defined here
line-length = 88
target-version = "py310"
src = ["code", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
