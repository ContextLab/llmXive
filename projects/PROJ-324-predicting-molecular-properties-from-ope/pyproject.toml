[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "molecular-properties-pipeline"
version = "0.1.0"
description = "Predicting Molecular Properties from Open Babel Fingerprints with Random Forests"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rdkit",
    "scikit-learn",
    "shap",
    "pandas",
    "numpy",
    "datasets",
    "requests",
    "obabel-wrapper",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.0.0",
]

[tool.ruff]
# Target Python version
target-version = "py310"

# Line length configuration
line-length = 100

# Enable specific linting rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

# Ignore specific rules if needed
ignore = [
    "E501", # Line too long (handled by black)
]

# Exclude directories
exclude = [
    ".git",
    "__pycache__",
    "data",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
]

[tool.black]
# Line length configuration
line-length = 100
target-version = ['py310']

# Exclude directories
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
