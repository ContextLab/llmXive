$schema: "http://json-schema.org/draft-07/schema#"
title: "Fingerprint Schema"
description: "Schema for intermediate fingerprint data"
type: object
properties:
  smiles:
    type: string
    description: "Isomeric SMILES string"
  maccs:
    type: array
    items:
      type: integer
      enum: [0, 1]
    description: "MACCS fingerprint (166 bits)"
    minItems: 166
    maxItems: 166
  ecfp4:
    type: array
    items:
      type: integer
      enum: [0, 1]
    description: "ECFP4 fingerprint (1024 bits)"
    minItems: 1024
    maxItems: 1024
  fp2:
    type: array
    items:
      type: integer
      enum: [0, 1]
    description: "FP2 fingerprint (1024 bits)"
    minItems: 1024
    maxItems: 1024
required:
  - smiles
  - maccs
  - ecfp4
  - fp2
