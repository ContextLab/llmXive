$schema: "http://json-schema.org/draft-07/schema#"
title: "Output Schema"
description: "Schema for prediction and analysis output"
type: object
properties:
  cid:
    type: integer
    description: "PubChem Compound ID"
  smiles:
    type: string
    description: "Isomeric SMILES string"
  target:
    type: number
    description: "Experimental value (LogP, Solubility, BP)"
  baseline_pred:
    type: number
    description: "Crippen prediction"
  rf_pred:
    type: number
    description: "Random Forest prediction"
  baseline_error:
    type: number
    description: "Absolute error (baseline)"
  rf_error:
    type: number
    description: "Absolute error (RF)"
  shap_values:
    type: array
    items:
      type: number
    description: "SHAP values for each fingerprint bit"
  shap_interaction:
    type: array
    items:
      type: array
      items:
        type: number
    description: "SHAP interaction values"
required:
  - cid
  - smiles
  - target
  - baseline_pred
  - rf_pred
  - baseline_error
  - rf_error
