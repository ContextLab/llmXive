$schema: http://json-schema.org/draft-07/schema#
title: Validation Report Schema
description: Schema for the validation report
type: object
required:
  - dataset_info
  - model_info
  - statistical_tests
  - recommendations
properties:
  dataset_info:
    type: object
    required:
      - total_samples
      - train_samples
      - test_samples
      - features_used
    properties:
      total_samples:
        type: integer
      train_samples:
        type: integer
      test_samples:
        type: integer
      features_used:
        type: array
        items:
          type: string
  model_info:
    type: object
    required:
      - model_type
      - parameters
      - architecture
    properties:
      model_type:
        type: string
      parameters:
        type: integer
      architecture:
        type: string
  statistical_tests:
    type: object
    required:
      - shapiro_wilk
      - permutation_test
      - vif_analysis
    properties:
      shapiro_wilk:
        type: object
        required:
          - statistic
          - p_value
        properties:
          statistic:
            type: number
          p_value:
            type: number
      permutation_test:
        type: object
        required:
          - p_value
          - n_shuffles
        properties:
          p_value:
            type: number
          n_shuffles:
            type: integer
      vif_analysis:
        type: array
        items:
          type: object
          required:
            - feature
            - vif
          properties:
            feature:
              type: string
            vif:
              type: number
  recommendations:
    type: array
    items:
      type: string
additionalProperties: false
