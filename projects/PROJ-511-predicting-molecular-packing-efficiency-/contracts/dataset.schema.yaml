$schema: http://json-schema.org/draft-07/schema#
title: Molecular Packing Dataset Schema
description: Schema for the molecular packing efficiency dataset
type: object
required:
  - smiles
  - pc
  - cape
  - h_bond_count
  - aromatic_ring_count
  - confounders
properties:
  smiles:
    type: string
    description: SMILES representation of the molecule
    pattern: "^[A-Za-z0-9@%+\\-\\[\\]\\(\\)\\/=#\\~]+$"
  pc:
    type: number
    description: Raw Packing Coefficient (diagnostic)
    minimum: 0
    maximum: 1
  cape:
    type: number
    description: Corrected Accessible Packing Efficiency (target)
    minimum: 0
    maximum: 1
  h_bond_count:
    type: integer
    description: Total hydrogen bond count (donors + acceptors)
    minimum: 0
  aromatic_ring_count:
    type: integer
    description: Number of aromatic rings in the molecule
    minimum: 0
  confounders:
    type: object
    description: Thermodynamic and experimental confounders
    required:
      - temperature
      - solvent_present
    properties:
      temperature:
        type: number
        description: Temperature in Kelvin
      solvent_present:
        type: boolean
        description: Whether solvent molecules are present
      pressure:
        type: number
        description: Pressure in atm (optional)
      crystal_system:
        type: string
        description: Crystal system (e.g., monoclinic, orthorhombic)
      space_group:
        type: string
        description: Space group notation
      unit_cell_a:
        type: number
        description: Unit cell parameter a in Angstroms
      unit_cell_b:
        type: number
        description: Unit cell parameter b in Angstroms
      unit_cell_c:
        type: number
        description: Unit cell parameter c in Angstroms
      unit_cell_alpha:
        type: number
        description: Unit cell angle alpha in degrees
      unit_cell_beta:
        type: number
        description: Unit cell angle beta in degrees
      unit_cell_gamma:
        type: number
        description: Unit cell angle gamma in degrees
additionalProperties: false
