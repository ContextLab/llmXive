$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: Schema for model training and evaluation outputs
type: object
required:
  - model_path
  - metrics
  - validation_report
properties:
  model_path:
    type: string
    description: Path to the saved model file
  metrics:
    type: object
    required:
      - mae
      - pearson_r
      - spearman_rho
    properties:
      mae:
        type: number
        description: Mean Absolute Error
      pearson_r:
        type: number
        description: Pearson correlation coefficient
      spearman_rho:
        type: number
        description: Spearman rank correlation coefficient
      r_squared:
        type: number
        description: R-squared value
      shapiro_wilk_p:
        type: number
        description: Shapiro-Wilk test p-value for residual normality
      permutation_p:
        type: number
        description: Permutation test p-value
  validation_report:
    type: string
    description: Path to the validation report file
additionalProperties: false
