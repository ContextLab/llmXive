$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Checkpoint Schema"
type: "object"
properties:
  architecture:
    type: "string"
    description: "Description of the model architecture (e.g., '2-layer MLP')"
  num_params:
    type: "integer"
    maximum: 100000
    description: "Total number of trainable parameters"
  frozen_transformer:
    type: "boolean"
    description: "Whether the SMILES transformer is frozen"
  input_dim:
    type: "integer"
    description: "Input feature dimension"
  hidden_dims:
    type: "array"
    items:
      type: "integer"
    description: "Hidden layer dimensions"
  output_dim:
    type: "integer"
    description: "Output dimension (should be 1)"
  training_seed:
    type: "integer"
    description: "Random seed used for training"
required:
  - architecture
  - num_params
  - frozen_transformer
  - input_dim
  - hidden_dims
  - output_dim
  - training_seed
additionalProperties: false
