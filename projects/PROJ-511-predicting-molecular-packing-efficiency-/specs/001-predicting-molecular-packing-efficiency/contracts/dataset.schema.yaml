$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Processed Crystal Dataset"
type: object
required:
  - cod_id
  - smiles
  - smiles_source
  - unit_cell_volume
  - packing_coefficient
  - cape
properties:
  cod_id:
    type: string
    description: "COD entry identifier (e.g., '1234567')."
  smiles:
    type: string
    pattern: "^[A-Za-z0-9@%\\[\\]()+\\-\\.]+$"
    description: "Canonical SMILES string for the molecule."
  smiles_source:
    type: string
    enum: ["extracted","generated"]
    description: "Whether SMILES was extracted from CIF metadata or generated by RDKit."
  unit_cell_volume:
    type: number
    minimum: 0
    description: "Unit‑cell volume (Å³) as reported in the CIF."
  packing_coefficient:
    type: number
    minimum: 0
    maximum: 1
    description: "Raw packing coefficient (unit‑cell volume divided by sum of atomic vdW volumes)."
  cape:
    type: number
    description: "Composition‑adjusted packing efficiency (CAPE)."