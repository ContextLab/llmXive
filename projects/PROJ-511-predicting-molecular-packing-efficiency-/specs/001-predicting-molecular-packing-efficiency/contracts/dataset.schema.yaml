$schema: "http://json-schema.org/draft-07/schema#"
title: "Curated Packing Dataset"
description: "CSV file containing SMILES strings and packing coefficients derived from COD entries."
type: "object"
properties:
  cod_id:
    type: "string"
    pattern: "^COD_\\d+$"
    description: "Unique COD identifier."
  smiles:
    type: "string"
    description: "Canonical SMILES generated by RDKit."
  unit_cell_volume:
    type: "number"
    minimum: 0.0
    description: "Unit‑cell volume in Å³."
  vdw_volume_sum:
    type: "number"
    minimum: 0.0
    description: "Sum of atomic van der Waals volumes (Å³)."
  packing_coefficient:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Packing coefficient = unit_cell_volume / vdw_volume_sum."
  fingerprint:
    type: "array"
    items:
      type: "number"
    minItems: 768
    maxItems: 768
    description: "Fixed‑length fingerprint vector from the frozen SMILES‑Transformer."
  provenance:
    type: "object"
    required: [source_url, timestamp]
    properties:
      source_url:
        type: "string"
        format: "uri"
        description: "URL of the original COD entry."
      timestamp:
        type: "string"
        format: "date-time"
        description: "ISO‑8601 timestamp of processing."
required:
  - cod_id
  - smiles
  - unit_cell_volume
  - vdw_volume_sum
  - packing_coefficient
  - fingerprint
  - provenance
additionalProperties: false