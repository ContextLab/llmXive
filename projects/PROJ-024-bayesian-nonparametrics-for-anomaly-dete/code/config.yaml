# Project Configuration
# Only hyperparameters, seeds, and base paths.
# Derived statistics are stored in state/projects/PROJ-024-bayesian-nonparametrics-for-anomaly-dete.yaml

# Hyperparameters
hyperparameters:
  window_size: 50
  stride: 1
  anomaly_threshold: 0.05
  dp_gmm:
    max_components: 10
    concentration_prior: 1.0
    convergence_threshold: 0.01
    max_iterations: 500
  arima:
    order: [1, 1, 1]
  gmm_fixed:
    components: [3, 5, 10]

# Seeds
seeds:
  global_seed: 42
  simulation_seed: 123

# Base Paths
paths:
  data_raw: "data/raw"
  data_processed: "data/processed/results"
  figures: "figures"
  logs: "logs"
  state: "state"