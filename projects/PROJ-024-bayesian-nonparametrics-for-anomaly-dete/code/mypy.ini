[mypy]
# Strict mode configuration for type checking
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_equality = True
strict_optional = True
show_error_codes = True
show_column_numbers = True
follow_imports = normal
follow_imports_for_stubs = True
ignore_missing_imports = False

# Per-module overrides for third-party libraries
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-pymc.*]
ignore_missing_imports = True

[mypy-ardv.*]
ignore_missing_imports = True

[mypy-ucimlrepo.*]
ignore_missing_imports = True

[mypy-datasets.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-plotly.graph_objects]
ignore_missing_imports = True

[mypy-tensorflow.*]
ignore_missing_imports = True

[mypy-keras.*]
ignore_missing_imports = True

# Project source code - strict checking
[mypy-code.*]
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
warn_return_any = True
warn_unused_ignores = True

# Test files - less strict for fixtures
[mypy-code.tests.*]
disallow_untyped_defs = False
check_untyped_defs = True
warn_return_any = False

# Scripts - moderate strictness
[mypy-code.scripts.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = False

# Baseline models
[mypy-code.baselines.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

# Evaluation modules
[mypy-code.evaluation.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

# Models
[mypy-code.models.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

# Utils
[mypy-code.utils.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

# Data modules
[mypy-code.data.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True

# Services
[mypy-code.services.*]
disallow_untyped_defs = True
check_untyped_defs = True
warn_return_any = True
