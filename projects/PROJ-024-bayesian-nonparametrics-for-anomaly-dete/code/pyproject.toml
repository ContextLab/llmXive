[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bayesian-nonparametrics-anomaly-detection"
version = "0.1.0"
description = "Bayesian Nonparametrics for Anomaly Detection in Time Series"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "pandas>=2.0.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "pymc>=5.9.0",
    "arviz>=0.15.0",
    "scikit-learn>=1.2.0",
    "torch>=2.0.0",
    "tensorflow>=2.12.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "pytest>=7.3.0",
    "pytest-cov>=4.1.0",
    "pre-commit>=3.3.0",
    "bandit>=1.7.0",
]

[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["models", "data", "baselines", "evaluation", "utils", "services", "scripts"]
skip = [".git", ".tox", ".venv", "build", "dist"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
strict = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "contract: Contract tests",
]

[tool.pytest-cov]
source = ["src", "models", "data", "baselines", "evaluation", "utils", "services"]
omit = ["tests/*", "scripts/*"]
fail_under = 80
