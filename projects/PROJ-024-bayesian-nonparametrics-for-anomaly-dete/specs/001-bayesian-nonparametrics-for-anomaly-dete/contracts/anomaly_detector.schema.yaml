$schema: "http://json-schema.org/draft-07/schema#"
title: "Anomaly Detector Configuration"
type: object
properties:
  random_seed:
    type: integer
    description: "Random seed for reproducibility"
  window_size:
    type: integer
    minimum: 10
    default: 30
    description: "Size of the sliding window"
  stride:
    type: integer
    minimum: 1
    default: 1
    description: "Stride for sliding window"
  advi_max_iter:
    type: integer
    minimum: 100
    default: 500
    description: "Maximum iterations for ADVI"
  advi_convergence_delta:
    type: number
    minimum: 0.0
    default: 0.01
    description: "Convergence threshold for ELBO delta"
  anomaly_thresholds:
    type: array
    items:
      type: number
      minimum: 0.0
      maximum: 1.0
    description: "Thresholds for sensitivity analysis (e.g., [0.01, 0.05, 0.1])"
  data_path:
    type: string
    description: "Path to the data directory"
  use_synthetic:
    type: boolean
    default: true
    description: "Whether to use synthetic data generator"
required:
  - random_seed
  - window_size
  - stride
  - advi_max_iter
  - advi_convergence_delta
  - anomaly_thresholds
  - data_path
additionalProperties: false
