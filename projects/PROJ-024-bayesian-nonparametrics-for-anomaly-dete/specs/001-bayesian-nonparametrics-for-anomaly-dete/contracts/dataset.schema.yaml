$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset"
type: object
required:
  - series_id
  - values
properties:
  series_id:
    type: string
  values:
    type: array
    items:
      type: number
    minItems: 1000
  timestamp:
    type: array
    items:
      type: string
      format: date-time
