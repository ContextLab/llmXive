$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
type: object
properties:
  metadata:
    type: object
    properties:
      source_url:
        type: string
        description: "Verified URL from # Verified datasets block"
      checksum:
        type: string
        description: "SHA256 checksum of raw file"
      rows:
        type: integer
        minimum: 1000
        description: "Number of observations (must be >= 1000)"
      columns:
        type: array
        items:
          type: string
        description: "Column names"
    required:
      - source_url
      - checksum
      - rows
      - columns
  data:
    type: array
    items:
      type: object
      properties:
        timestamp:
          type: integer
          description: "Synthetic or real timestamp"
        value:
          type: number
          description: "Normalized univariate value"
        is_anomaly:
          type: boolean
          description: "Ground truth label (if available)"
      required:
        - timestamp
        - value
required:
  - metadata
  - data
description: "Schema for input datasets. Enforces minimum row count and verified source."
