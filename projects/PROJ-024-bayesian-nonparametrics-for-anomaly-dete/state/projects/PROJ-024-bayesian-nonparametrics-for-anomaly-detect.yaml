# Threshold calibration results from ThresholdCalibratorService
# This documents the anomaly score threshold used for binary classification
# =============================================================================
decision_boundary:
  calibrator_version: "1.0.0"
  calibration_method: "percentile_adaptive"
  calibration_timestamp: 2024-01-14T16:45:00Z
  calibration_dataset: "synthetic_validation_v1"
  calibration_observations: 50000
  calibration_anomaly_rate: 0.05  # 5% injected anomalies per synthetic generation

  # Primary threshold (95th percentile of normal scores)
  threshold_value: 0.847
  threshold_percentile: 95.0

  # Adaptive boundary parameters (for streaming updates)
  adaptive_params:
    window_size: 1000  # Number of observations for rolling percentile
    update_frequency: 100  # Update threshold every N observations
    min_normal_samples: 500  # Minimum normal samples before updating
    max_threshold_drift: 0.1  # Maximum allowed threshold change per update

  # Score distribution statistics at calibration time
  score_distribution:
    normal_scores:
      mean: 0.234
      std: 0.089
      min: 0.001
      max: 0.523
      percentile_95: 0.398
      percentile_99: 0.467

    anomaly_scores:
      mean: 0.892
      std: 0.067
      min: 0.623
      max: 0.998
      percentile_5: 0.778
      percentile_1: 0.823

  # Validation metrics at calibration threshold
  validation_metrics:
    precision: 0.912
    recall: 0.887
    f1_score: 0.899
    false_positive_rate: 0.048
    true_positive_rate: 0.887
    auc_roc: 0.943
    auc_pr: 0.921

  # Uncertainty bounds (per US3 acceptance scenario 2)
  uncertainty_bounds:
    lower_bound: 0.812  # threshold - 2*std
    upper_bound: 0.882  # threshold + 2*std
    confidence_level: 0.95

