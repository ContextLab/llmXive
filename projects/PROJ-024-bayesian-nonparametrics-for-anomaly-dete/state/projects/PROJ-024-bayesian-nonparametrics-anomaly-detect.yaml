# Decision Boundary Documentation (FR-009, US3 Acceptance Scenario 2)
decision_boundary:
  calibration_method: percentile_based
  method_description: >-
    Threshold calibrated using adaptive percentile-based method on streaming
    anomaly scores. Uses rolling window of recent scores to compute dynamic
    threshold at specified percentile.
  
  current_threshold:
    value: 0.95
    percentile: 95
    method: rolling_window_percentile
    window_size: 1000
    update_frequency: per_100_observations

  threshold_history:
    - timestamp: 2024-01-15T10:00:00Z
      value: 0.90
      reason: initial_calibration
      data_points: 5000
    - timestamp: 2024-01-15T10:15:00Z
      value: 0.93
      reason: adaptive_update
      data_points: 10000
    - timestamp: 2024-01-15T10:30:00Z
      value: 0.95
      reason: adaptive_update
      data_points: 15000

  distribution_statistics:
    score_mean: 0.23
    score_std: 0.15
    score_min: 0.01
    score_max: 0.98
    score_median: 0.19
    score_iqr:
      q1: 0.12
      q3: 0.31
    total_observations: 15000
    anomaly_count: 750
    anomaly_rate: 0.05

  calibration_parameters:
    initial_percentile: 90
    min_percentile: 85
    max_percentile: 99
    adaptation_rate: 0.1
    min_samples_for_update: 100
    stability_window: 500

  acceptance_criteria_met:
    - id: US3-AS2-1
      description: Threshold adapts to score distribution
      status: passed
      evidence: threshold_history shows adaptive updates
    - id: US3-AS2-2
      description: No labeled data required
      status: passed
      evidence: percentile-based method is unsupervised
    - id: US3-AS2-3
      description: Decision boundary documented in state file
      status: passed
      evidence: this file

