name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  CI: true

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install ruff black mypy

      - name: Run ruff linting
        run: |
          ruff check code/
        continue-on-error: true

      - name: Check black formatting
        run: |
          black --check code/
        continue-on-error: true

      - name: Run mypy type checking
        run: |
          mypy code/ --config-file code/mypy.ini
        continue-on-error: true

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - test_dp_gmm_schema.py
          - test_metrics_schema.py
          - test_threshold_calibrator_schema.py
          - test_anomaly_detector_schema.py
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-cov

      - name: Run contract test
        run: |
          pytest code/tests/contract/${{ matrix.test-file }} -v --tb=short
        timeout-minutes: 10
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest code/tests/unit/ -v --cov=code/src --cov-report=xml --cov-report=term-missing
        timeout-minutes: 15

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-unit-tests
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - test_streaming_update.py
          - test_baseline_comparison.py
          - test_threshold_calibration.py
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt
          pip install pytest pytest-cov

      - name: Run integration test
        run: |
          pytest code/tests/integration/${{ matrix.test-file }} -v --tb=short
        timeout-minutes: 25
        continue-on-error: true

  baseline-evaluation:
    name: Baseline Evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run baseline comparison script
        run: |
          python code/scripts/compare_performance.py
        timeout-minutes: 25
        continue-on-error: true

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: data/processed/results/
          retention-days: 7
        if: always()

  constitution-check:
    name: Constitution Principles Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run constitution check
        run: |
          python code/scripts/run_constitution_check.py
        timeout-minutes: 10
        continue-on-error: true

  parallel-safety-check:
    name: Parallel Safety Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run parallel safety check
        run: |
          python code/scripts/verify_parallel_safety.py
        timeout-minutes: 8
        continue-on-error: true

  dependency-order-check:
    name: Dependency Order Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run dependency order check
        run: |
          python code/scripts/verify_dependency_order.py
        timeout-minutes: 8
        continue-on-error: true

  config-compliance-check:
    name: Config Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run config compliance check
        run: |
          python code/scripts/verify_config_compliance.py
        timeout-minutes: 8
        continue-on-error: true

  # Retry job wrapper with exponential backoff
  retry-wrapper:
    name: Retry Wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [contract-tests, unit-tests, integration-tests, baseline-evaluation, constitution-check, parallel-safety-check, dependency-order-check, config-compliance-check]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - job-name: contract-tests
            max-retries: 3
          - job-name: unit-tests
            max-retries: 3
          - job-name: integration-tests
            max-retries: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install retry dependencies
        run: |
          python -m pip install --upgrade pip
          pip install retry

      - name: Run retry logic for ${{ matrix.job-name }}
        id: retry-step
        run: |
          MAX_RETRIES=${{ matrix.max-retries }}
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES for ${{ matrix.job-name }}"
            
            if [ "${{ matrix.job-name }}" = "contract-tests" ]; then
              python -m pytest code/tests/contract/ -v --tb=short || EXIT_CODE=$?
            elif [ "${{ matrix.job-name }}" = "unit-tests" ]; then
              python -m pytest code/tests/unit/ -v --tb=short || EXIT_CODE=$?
            elif [ "${{ matrix.job-name }}" = "integration-tests" ]; then
              python -m pytest code/tests/integration/ -v --tb=short || EXIT_CODE=$?
            fi
            
            if [ "${EXIT_CODE:-0}" -eq 0 ]; then
              SUCCESS=true
              echo "Job ${{ matrix.job-name }} succeeded on attempt $((RETRY_COUNT + 1))"
              break
            else
              echo "Job ${{ matrix.job-name }} failed on attempt $((RETRY_COUNT + 1))"
              RETRY_COUNT=$((RETRY_COUNT + 1))
              
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                # Exponential backoff: 2^RETRY_COUNT seconds
                BACKOFF=$((2 ** RETRY_COUNT))
                echo "Backing off for $BACKOFF seconds before retry..."
                sleep $BACKOFF
              fi
            fi
            
            unset EXIT_CODE
          done
          
          if [ "$SUCCESS" = true ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        timeout-minutes: 30

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [retry-wrapper]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Generate pipeline summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Tests | ${{ needs.contract-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline Evaluation | ${{ needs.baseline-evaluation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Constitution Check | ${{ needs.constitution-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Parallel Safety Check | ${{ needs.parallel-safety-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Order Check | ${{ needs.dependency-order-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Config Compliance Check | ${{ needs.config-compliance-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Retry Logic" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exponential backoff retry logic is enabled for all test jobs:" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: Up to 3 retries with 2^N second backoff" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: Up to 3 retries with 2^N second backoff" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: Up to 2 retries with 2^N second backoff" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Timeout Handling" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All jobs have individual timeout limits to prevent runaway processes:" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: 10 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: 15 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: 20 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: 30 minutes" >> $GITHUB_STEP_SUMMARY
          echo "- Baseline Evaluation: 30 minutes" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            logs/
            data/processed/results/
          retention-days: 7
        if: always()
