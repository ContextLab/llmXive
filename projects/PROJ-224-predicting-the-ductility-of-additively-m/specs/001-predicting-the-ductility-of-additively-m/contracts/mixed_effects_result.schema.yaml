$schema: http://json-schema.org/draft-07/schema#
title: MixedEffectsResult
description: Schema for the output of the Linear Mixed-Effects model analysis.
type: object
required:
  - model_type
  - fixed_effects
  - random_effects
  - partial_r_squared
  - likelihood_ratio_test
  - vif_check
  - feature_set
properties:
  model_type:
    type: string
    description: "Type of model used (e.g., LinearMixedLM)."
  feature_set:
    type: string
    description: "Feature set used: 'Components' or 'EnergyDensity'."
  fixed_effects:
    type: array
    description: "List of fixed effect coefficients and statistics."
    items:
      type: object
      required:
        - term
        - coefficient
        - std_error
        - p_value
        - ci_lower
        - ci_upper
      properties:
        term:
          type: string
          description: "Name of the predictor variable."
        coefficient:
          type: number
          description: "Standardized coefficient value."
        std_error:
          type: number
          description: "Standard error of the coefficient."
        p_value:
          type: number
          description: "P-value for the coefficient."
        ci_lower:
          type: number
          description: "Lower bound of 95% confidence interval."
        ci_upper:
          type: number
          description: "Upper bound of 95% confidence interval."
  random_effects:
    type: object
    description: "Variance components for random effects."
    properties:
      alloy_family_variance:
        type: number
        description: "Variance of the random intercept for alloy families."
      residual_variance:
        type: number
        description: "Residual variance."
  partial_r_squared:
    type: number
    description: "Partial R-squared value for the fixed effects."
  likelihood_ratio_test:
    type: object
    description: "Results of the likelihood ratio test against null model."
    properties:
      statistic:
        type: number
        description: "Chi-squared statistic."
      p_value:
        type: number
        description: "P-value of the test."
  vif_check:
    type: object
    description: "Variance Inflation Factor check results."
    properties:
      max_vif:
        type: number
        description: "Maximum VIF observed."
      dropped_terms:
        type: array
        description: "List of terms dropped due to high VIF."
        items:
          type: string
additionalProperties: false
