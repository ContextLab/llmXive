$schema: http://json-schema.org/draft-07/schema#
title: BuildRecord
description: Schema for a single additive manufacturing build record.
type: object
required:
  - record_id
  - laser_power_W
  - scan_speed_mm_per_s
  - hatch_spacing_um
  - layer_thickness_um
  - energy_density_J_per_mm3
  - ductility_percent
  - alloy_family
properties:
  record_id:
    type: string
    description: "Unique identifier for the build record."
  laser_power_W:
    type: number
    description: "Laser power in Watts."
  scan_speed_mm_per_s:
    type: number
    description: "Scan speed in millimeters per second."
  hatch_spacing_um:
    type: number
    description: "Hatch spacing in micrometers."
  layer_thickness_um:
    type: number
    description: "Layer thickness in micrometers."
  energy_density_J_per_mm3:
    type: number
    description: "Volumetric energy density in Joules per cubic millimeter. Calculated as P/(v*h*t)."
  ductility_percent:
    type: number
    description: "Measured ductility as a percentage."
  alloy_family:
    type: string
    description: "Name of the alloy family (e.g., Inconel 718)."
  has_Cr:
    type: boolean
    description: "Flag indicating presence of Chromium (derived from alloy_family)."
  has_Al:
    type: boolean
    description: "Flag indicating presence of Aluminum (derived from alloy_family)."
  has_Ti:
    type: boolean
    description: "Flag indicating presence of Titanium (derived from alloy_family)."
  source_paper:
    type: string
    description: "Source paper DOI or identifier for provenance."
additionalProperties: false
