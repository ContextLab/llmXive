name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify CPU-only (No CUDA dependencies)
      run: |
        echo "Checking for CUDA-related packages in requirements.txt..."
        if grep -iE "cuda|torch.*cu|tensorflow.*gpu|cupy" requirements.txt; then
          echo "Error: CUDA-related packages detected in requirements.txt. This project must run on CPU-only hardware."
          exit 1
        else
          echo "Success: No CUDA-related packages found. Project is CPU-only compliant."
        fi

    - name: Run Linting
      run: |
        black --check .
        flake8 .

    - name: Run Tests
      run: |
        pytest tests/ -v

    - name: Run Simulation (Smoke Test)
      run: |
        python code/run_simulation_baseline.py --icc 0.0 --iterations 5 --seed 42
        python code/run_simulation_robust.py --icc 0.0 --iterations 5 --seed 42