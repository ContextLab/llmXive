name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for CUDA dependencies
        run: |
          echo "Checking requirements.txt for CUDA-related packages..."
          if grep -iE "(torch-cuda|tensorflow-gpu|cupy|cuda)" requirements.txt; then
            echo "ERROR: Found CUDA-related packages in requirements.txt. This project must run on CPU-only hardware."
            exit 1
          else
            echo "No CUDA dependencies found. Proceeding..."
          fi

      - name: Run linters
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

      - name: Run tests
        run: |
          pytest tests/ -v

      - name: Verify project structure
        run: |
          if [ ! -d "code" ] || [ ! -d "tests" ] || [ ! -d "data/raw" ] || [ ! -d "data/derived" ]; then
            echo "ERROR: Required directories missing."
            exit 1
          fi
          echo "Project structure verified."