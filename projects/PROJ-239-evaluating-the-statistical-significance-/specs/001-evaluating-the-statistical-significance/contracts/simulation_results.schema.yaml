$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Results Schema"
description: "Defines the structure of the aggregated simulation output."
type: "object"
properties:
  icc_level:
    type: "number"
    description: "The ICC level for this result row."
  alpha:
    type: "number"
    description: "The alpha level for this result row."
  method:
    type: "string"
    enum:
      - "standard_t"
      - "cluster_robust"
      - "block_permutation"
    description: "The statistical method used."
  empirical_type1_error:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "The proportion of rejections of H0."
  ci_lower:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Upper bound of the 95% confidence interval."
  n_iterations:
    type: "integer"
    minimum: 1
    description: "Number of iterations used to calculate the error rate."
required:
  - icc_level
  - alpha
  - method
  - empirical_type1_error
  - ci_lower
  - ci_upper
  - n_iterations
additionalProperties: false
