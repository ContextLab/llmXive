[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-239-evaluating-the-statistical-significance"
version = "0.1.0"
description = "Evaluating Statistical Significance of A/B Tests with Non-Independent Observations"
requires-python = ">=3.11"
dependencies = [
    "numpy==1.26.0",
    "scipy==1.12.0",
    "statsmodels==0.14.1",
    "pandas==2.2.0",
    "pytest==7.4.0",
    "ucimlrepo"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short"