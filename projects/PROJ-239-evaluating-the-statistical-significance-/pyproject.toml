[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-ab-test-significance"
version = "0.1.0"
description = "Evaluating statistical significance of A/B tests with non-independent observations"
requires-python = ">=3.11"
dependencies = [
    "numpy==1.26.0",
    "scipy==1.12.0",
    "statsmodels==0.14.1",
    "pandas==2.2.0",
    "pytest==7.4.0",
]

[project.optional-dependencies]
dev = [
    "black==24.2.0",
    "flake8==7.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"