[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending APPO: Agentic Procedural Policy Optimization"
requires-python = ">=3.9"
dependencies = [
    "transformers>=4.35.0",
    "datasets>=2.14.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "statsmodels>=0.14.0",
    "accelerate>=0.24.0",
    "pytest>=7.4.0",
    "pytest-timeout>=2.2.0",
    "memory_profiler>=0.61.0",
    "tqdm>=4.66.0"
]

[tool.black]
line-length = 100
target-version = ['py39']

[tool.ruff]
line-length = 100
target-version = "py39"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "ARG"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
timeout = 300
addopts = "-v --tb=short"