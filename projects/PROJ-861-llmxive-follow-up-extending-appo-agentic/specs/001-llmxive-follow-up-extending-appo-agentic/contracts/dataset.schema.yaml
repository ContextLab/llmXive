$schema: "http://json-schema.org/draft-07/schema#"
title: "ReasoningTrace Dataset Schema"
type: object
description: "Schema for the processed reasoning trace data including static and dynamic scores."
properties:
  trace_id:
    type: string
    description: "Unique identifier for the trace (UUID)."
  dataset:
    type: string
    description: "Source dataset name (e.g., 'gsm8k', 'math')."
    enum:
      - "gsm8k"
      - "math"
  question:
    type: string
    description: "The problem text."
  ground_truth:
    type: string
    description: "The correct answer."
  reasoning_steps:
    type: array
    items:
      type: string
    description: "List of intermediate reasoning steps (semantic steps)."
  static_scores:
    type: array
    items:
      type: number
    description: "KL divergence scores for each semantic step index."
  dynamic_scores:
    type: array
    items:
      type: number
    description: "APPO Advantage values (A(s,a)) for each semantic step index."
  status:
    type: string
    description: "Processing status."
    enum:
      - "completed"
      - "dropped_timeout"
      - "dropped_failure"
required:
  - trace_id
  - dataset
  - question
  - ground_truth
  - reasoning_steps
  - static_scores
  - dynamic_scores
  - status
additionalProperties: false
