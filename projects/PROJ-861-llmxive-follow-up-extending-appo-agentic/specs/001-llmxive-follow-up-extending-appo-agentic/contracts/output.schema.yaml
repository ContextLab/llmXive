$schema: http://json-schema.org/draft-07/schema#
title: "Correlation Result Schema"
description: "Schema for the aggregated statistical results from the analysis."
type: object
properties:
  run_id:
    type: string
    description: "Unique identifier for the correlation run (seed)."
  pearson_r:
    type: number
    description: "Pearson correlation coefficient."
  spearman_rho:
    type: number
    description: "Spearman rank correlation coefficient."
  p_value:
    type: number
    description: "P-value from the permutation test."
  iterations:
    type: integer
    description: "Number of permutation iterations performed."
  status:
    type: string
    description: "Status of the run (complete, timeout, inconclusive)."
    enum:
      - "complete"
      - "timeout"
      - "inconclusive"
  residual_summary:
    type: object
    description: "Summary of residuals by reasoning pattern."
    properties:
      arithmetic:
        type: object
        properties:
          mean_residual:
            type: number
          count:
            type: integer
      algebra:
        type: object
        properties:
          mean_residual:
            type: number
          count:
            type: integer
      geometry:
        type: object
        properties:
          mean_residual:
            type: number
          count:
            type: integer
      other:
        type: object
        properties:
          mean_residual:
            type: number
          count:
            type: integer
    required:
      - arithmetic
      - algebra
      - geometry
      - other
required:
  - run_id
  - pearson_r
  - spearman_rho
  - p_value
  - iterations
  - status
  - residual_summary
additionalProperties: false
