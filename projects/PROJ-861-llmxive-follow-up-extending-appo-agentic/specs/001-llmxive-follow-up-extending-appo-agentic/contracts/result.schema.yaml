$schema: "http://json-schema.org/draft-07/schema#"
title: "CorrelationResult Schema"
type: object
description: "Schema for the final correlation analysis results."
properties:
  pearson_r:
    type: number
    description: "Pearson correlation coefficient."
  spearman_rho:
    type: number
    description: "Spearman rank correlation coefficient."
  p_value:
    type: number
    description: "P-value from permutation test."
  n_pairs:
    type: integer
    description: "Number of aligned score pairs."
  residuals:
    type: array
    items:
      type: number
    description: "List of residuals (static - dynamic)."
  ljung_box_p:
    type: number
    description: "P-value from Ljung-Box test on residuals."
  threshold_met:
    type: boolean
    description: "True if pearson_r > 0.7 and p_value < 0.05."
required:
  - pearson_r
  - spearman_rho
  - p_value
  - n_pairs
  - residuals
  - ljung_box_p
  - threshold_met
additionalProperties: false
