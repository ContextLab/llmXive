$schema: "http://json-schema.org/draft-07/schema#"
title: "Correlation Result Schema"
description: "Schema for aggregated correlation results from a single run."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (e.g., 'run_seed_42')."
  seed:
    type: "integer"
    description: "Random seed used for the permutation test."
  pearson_r:
    type: "number"
    description: "Pearson correlation coefficient (reference)."
  spearman_rho:
    type: "number"
    description: "Spearman rank correlation coefficient (reference)."
  lmm_fixed_effect:
    type: "number"
    description: "Fixed effect coefficient for static score in LMM."
  lmm_p_value:
    type: "number"
    description: "P-value for the fixed effect in LMM."
  p_value:
    type: "number"
    description: "P-value from the permutation test (task-level)."
  is_significant:
    type: "boolean"
    description: "True if p_value < 0.05."
  is_inconclusive:
    type: "boolean"
    description: "True if timeout triggered before completion."
  iterations_completed:
    type: "integer"
    description: "Number of permutation iterations actually run."
  timestamp:
    type: "string"
    format: "date-time"
    description: "Timestamp of the run."
required:
  - run_id
  - seed
  - pearson_r
  - spearman_rho
  - lmm_fixed_effect
  - lmm_p_value
  - p_value
  - is_significant
  - is_inconclusive
  - iterations_completed
  - timestamp
additionalProperties: false