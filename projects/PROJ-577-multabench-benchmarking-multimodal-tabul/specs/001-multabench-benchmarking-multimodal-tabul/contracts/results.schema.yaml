$schema: "http://json-schema.org/draft-07/schema#"
title: "MulTaBench Results Schema"
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Unique identifier of the dataset (e.g., 'BIN_TEXT_FAKE_JOB_POSTING')"
  model_id:
    type: "string"
    description: "Identifier of the model (e.g., 'lgbm', 'tabpfnv2')"
  config:
    type: "string"
    enum:
      - "frozen"
      - "tuned"
    description: "Configuration type for the model"
  metric_name:
    type: "string"
    description: "Name of the metric (e.g., 'accuracy', 'auc', 'mse')"
  metric_value:
    type: "number"
    description: "Value of the metric"
    minimum: 0
    maximum: 1000
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the run"
required:
  - dataset_id
  - model_id
  - config
  - metric_name
  - metric_value
  - timestamp
additionalProperties: false
description: "Schema for the results CSV file generated by the MulTaBench benchmark."
