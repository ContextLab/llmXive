[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hubble-isotropy-analysis"
version = "0.1.0"
description = "Testing Hubble Constant Isotropy using Pantheon Supernova Sample"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pandas==2.2.0",
    "numpy==1.26.0",
    "scipy==1.12.0",
    "astropy==6.0.0",
    "healpy==1.16.5",
    "scikit-learn==1.4.0",
    "matplotlib==3.8.0",
    "pecvel==1.2.0",
    "pymc==5.9.0",
    "ruff==0.3.0",
    "black==24.3.0",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
# Inherits from ruff.toml if present, but here for completeness in pyproject
target-version = "py310"
line-length = 88
select = ["E", "F", "I", "W"]
ignore = []

[tool.ruff.isort]
known-first-party = ["src", "code"]
