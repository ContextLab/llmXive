# Configuration for Metallic Glass Tg Prediction Pipeline
# This file contains non-secret parameters (seeds, limits, paths)

zenodo:
  # DOIs are typically loaded from .env for security, but defaults provided here
  primary_doi: "10.5281/zenodo.10043838"
  fallback_doi: "10.5281/zenodo.11023456"

training:
  random_seed: 42
  cv_folds: 5
  max_grid_search_combos: 10
  # Model parameters can be overridden here
  model_type: "GradientBoostingRegressor"

limits:
  max_runtime_hours: 6
  max_ram_gb: 7
  max_cpu_time_seconds: 21600

paths:
  # Relative to project root
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "artifacts/models"
  metrics: "artifacts/metrics"
  reports: "artifacts/reports"
