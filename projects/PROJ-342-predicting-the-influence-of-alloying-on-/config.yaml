# Project Configuration
# Defines reproducible seeds, resource limits, and model hyperparameters.
# This file is committed to version control to ensure reproducibility.

# Random Seed for all stochastic processes (numpy, sklearn, etc.)
random_seed: 42

# Resource Limits (FR-005)
# Maximum runtime and memory usage allowed for the pipeline
resource_limits:
  max_time_hours: 6
  max_memory_gb: 7

# Model Hyperparameters (Defaults, can be overridden by training scripts)
model_params:
  gradient_boosting:
    n_estimators: 100
    max_depth: 4
    learning_rate: 0.1
    min_samples_split: 5
    min_samples_leaf: 2
  grid_search:
    max_combinations: 10

# Analysis Parameters
analysis:
  fdr_alpha: 0.05
  vif_threshold: 5.0
  bootstrap_resamples: 1000
