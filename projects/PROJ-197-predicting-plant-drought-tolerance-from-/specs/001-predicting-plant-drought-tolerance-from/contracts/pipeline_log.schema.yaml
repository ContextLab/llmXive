$schema: "http://json-schema.org/draft-07/schema#"
title: "DataPipelineLog"
description: "Schema for the structured log of the data ingestion process."
type: "object"
properties:
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the log entry."
  source_url:
    type: "string"
    description: "URL of the dataset source."
  status:
    type: "string"
    description: "Status of the operation."
    enum:
      - success
      - partial
      - failed
  imputed_count:
    type: "integer"
    description: "Number of values imputed."
  excluded_species:
    type: "array"
    description: "List of species names excluded due to missing data."
    items:
      type: "string"
required:
  - timestamp
  - source_url
  - status
  - imputed_count
  - excluded_species
additionalProperties: false