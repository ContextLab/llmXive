$schema: "http://json-schema.org/draft-07/schema#"
title: "EEG_Epoch_Schema"
description: "Schema for preprocessed EEG epochs (30s stable or 60s transition)."
type: "object"
properties:
  epoch_id:
    type: "string"
    description: "Unique identifier for the epoch."
  subject_id:
    type: "string"
    description: "Subject identifier from Sleep-EDF."
  start_time:
    type: "number"
    description: "Start time in seconds from the beginning of the recording."
  duration:
    type: "integer"
    description: "Duration of the epoch in seconds (30 or 60)."
  label:
    type: "integer"
    description: "Sleep stage label (0=Wake, 1=N1, 2=N2, 3=N3, 4=REM)."
  is_transition:
    type: "boolean"
    description: "True if this epoch is centered on a stage change."
  eeg_data:
    type: "array"
    items:
      type: "number"
    description: "Filtered and normalized EEG signal samples."
  metadata:
    type: "object"
    description: "Additional metadata (interpolation flags, filter params)."
    properties:
      interpolated:
        type: "boolean"
        description: "Whether linear interpolation was applied."
      notch_applied:
        type: "boolean"
        description: "Whether 50/60 Hz notch filter was applied."
required:
  - epoch_id
  - subject_id
  - start_time
  - duration
  - label
  - is_transition
  - eeg_data
  - metadata
