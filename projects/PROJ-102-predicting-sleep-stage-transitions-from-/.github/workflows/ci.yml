name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        # Ensure pytest is available
        pip install pytest pytest-cov

    - name: Run contract tests
      run: |
        pytest tests/contract/ -v --tb=short

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --tb=short

    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short || echo "Integration tests skipped or failed"

    - name: Run reference validator (if exists)
      run: |
        if [ -f scripts/validate_references.py ]; then
          python scripts/validate_references.py
        elif [ -f src/utils/validator.py ]; then
          python -m src.utils.validator
        else
          echo "No reference validator script found, skipping."
        fi

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
