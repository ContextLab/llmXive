# Configuration for Lorentz Violation Analysis Pipeline
# Generated for PROJ-201

paths:
  raw: "data/raw"
  processed: "data/processed"
  results: "data/results"
  simulations: "data/simulations"

seeds:
  random: 42
  numpy: 42

constants:
  sme_coefficient: 0.0
