[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-lorentz-violation"
version = "0.1.0"
description = "Testing Lorentz Violation with Publicly Available CMB Data"
requires-python = ">=3.11"
dependencies = [
    "healpy==1.16.2",
    "numpy==1.24.0",
    "scipy==1.10.0",
    "emcee==3.1.3",
    "requests==2.31.0",
    "astropy==5.2.0",
    "pyyaml==6.0.1",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"