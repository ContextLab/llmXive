$schema: "http://json-schema.org/draft-07/schema#"
title: "Merged Filtered Stellar and Exoplanet Dataset Schema"
description: |
  Schema for the output of the data ingestion pipeline (User Story 1).
  This file defines the structure of `data/processed/merged_filtered.csv`.
  Contains merged data from MAST TESS Stellar Flare Catalog and NASA Exoplanet Archive,
  filtered for M-dwarfs with >= 10 flare events.
type: object
properties:
  star_id:
    description: "Unique identifier for the host star (from TESS/MAST)."
    type: integer
  flare_count:
    description: "Total number of flare events detected for this star."
    type: integer
    minimum: 10
  radius:
    description: "Stellar radius in solar units (R_sun)."
    type: number
    format: float
    minimum: 0
  mass:
    description: "Stellar mass in solar units (M_sun)."
    type: number
    format: float
    minimum: 0
  semi_major_axis:
    description: "Planetary semi-major axis in astronomical units (AU)."
    type: number
    format: float
    minimum: 0
  density:
    description: "Stellar density in g/cm^3 or relative to solar density."
    type: number
    format: float
    minimum: 0
  age:
    description: "System age in Gyr. May be imputed with DEFAULT_M_DWARF_AGE if missing."
    type: number
    format: float
    minimum: 0
required:
  - star_id
  - flare_count
  - radius
  - mass
  - semi_major_axis
  - density
  - age
additionalProperties: false
examples:
  - star_id: 12345
    flare_count: 15
    radius: 0.45
    mass: 0.42
    semi_major_axis: 0.05
    density: 5.2
    age: 3.5