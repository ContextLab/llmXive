$schema: http://json-schema.org/draft-07/schema#
title: Correlation Results Schema
description: >
  Schema for the output of the statistical analysis phase (User Story 3).
  Defines the structure of `data/results/correlation_results.json`.
  Contains partial Spearman rank correlation statistics and sensitivity analysis data.
type: object
required:
  - partial_correlation
  - sensitivity_analysis
  - metadata
properties:
  partial_correlation:
    type: object
    description: >
      Results of the partial Spearman rank correlation between
      cumulative_xuv_flux and retention_fraction, controlling for
      stellar_mass and semi_major_axis.
    required:
      - rho_partial
      - p_value
      - n_samples
      - method
    properties:
      rho_partial:
        type: number
        description: The partial Spearman rank correlation coefficient (ρ).
        minimum: -1.0
        maximum: 1.0
      p_value:
        type: number
        description: The p-value associated with the correlation coefficient.
        minimum: 0.0
        maximum: 1.0
      n_samples:
        type: integer
        description: Number of samples (systems) included in the analysis.
        minimum: 1
      method:
        type: string
        description: The statistical method used.
        const: "partial_spearman_rank"
      confidence_interval:
        type: object
        description: Optional 95% confidence interval for rho_partial.
        properties:
          lower:
            type: number
          upper:
            type: number
  sensitivity_analysis:
    type: object
    description: >
      Results of the sensitivity analysis performed by varying the
      initial atmospheric mass baseline (M_atm_initial).
    required:
      - baselines
      - correlations
      - variation
    properties:
      baselines:
        type: array
        description: List of M_atm_initial baseline values tested.
        items:
          type: number
      correlations:
        type: array
        description: List of rho_partial values corresponding to each baseline.
        items:
          type: number
      variation:
        type: object
        description: Statistical summary of the variation in correlation coefficients.
        required:
          - range
          - std_dev
        properties:
          range:
            type: object
            properties:
              min:
                type: number
              max:
                type: number
          std_dev:
            type: number
            description: Standard deviation of the correlation coefficients across baselines.
  metadata:
    type: object
    description: Metadata about the analysis run.
    required:
      - input_file
      - timestamp
      - version
    properties:
      input_file:
        type: string
        description: Path to the input data file used (e.g., data/processed/derived_physics.csv).
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the analysis was run.
      version:
        type: string
        description: Version of the analysis script.
      controls:
        type: array
        description: List of variables controlled for in the partial correlation.
        items:
          type: string
        const:
          - "mass"
          - "semi_major_axis"