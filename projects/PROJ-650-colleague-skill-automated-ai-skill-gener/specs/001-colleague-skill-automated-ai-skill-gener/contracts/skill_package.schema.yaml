$schema: "http://json-schema.org/draft-07/schema#"
title: "Skill Package Schema"
description: "Schema for validating the generated Skill Package (meta.json). This is the Single Source of Truth."
type: "object"
required:
  - "skill_id"
  - "version"
  - "source"
properties:
  skill_id:
    type: "string"
    description: "Unique identifier for the skill package"
  version:
    type: "string"
    description: "Semantic version of the skill package (e.g., '1.0.0')"
  source:
    type: "string"
    description: "Reference to the input dataset (e.g., 'example_tianyi')"
  created_at:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of creation"
  distillation_method:
    type: "string"
    description: "Method used for distillation (e.g., 'template-based extraction')"
  capabilities:
    type: "array"
    description: "List of capabilities defined in the skill"
    items:
      type: "object"
      required:
        - "name"
        - "description"
      properties:
        name:
          type: "string"
        description:
          type: "string"
  bounded_behaviors:
    type: "array"
    description: "List of bounded behaviors defined in the skill"
    items:
      type: "object"
      required:
        - "rule"
        - "context"
      properties:
        rule:
          type: "string"
        context:
          type: "string"
additionalProperties: false