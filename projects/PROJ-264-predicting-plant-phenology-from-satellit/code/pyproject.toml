[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-phenology"
version = "0.1.0"
description = "Predicting plant phenology from satellite imagery and climate data"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.0.3",
    "numpy==1.24.3",
    "xgboost==1.7.6",
    "lightgbm==4.0.0",
    "scikit-learn==1.3.0",
    "geopandas==0.13.2",
    "earthengine-api==0.1.374",
    "requests==2.31.0",
    "pyyaml==6.0.1",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.per-file-ignores]
"code/tests/*" = ["E501"]
"code/src/data/ingestion.py" = ["E501"]
