[metadata]
name = predicting-plant-phenology
version = 0.1.0

[options]
packages = find:
python_requires = >=3.11
install_requires =
    pandas>=2.1.4
    numpy>=1.26.2
    xgboost>=2.0.2
    lightgbm>=4.1.0
    scikit-learn>=1.3.2
    geopandas>=0.14.1
    earthengine-api>=1.1.0
    requests>=2.31.0
    pyyaml>=6.0.1

[options.packages.find]
where = .
include = src*, tests*, scripts*

[ruff]
line-length = 88

[black]
line-length = 88
