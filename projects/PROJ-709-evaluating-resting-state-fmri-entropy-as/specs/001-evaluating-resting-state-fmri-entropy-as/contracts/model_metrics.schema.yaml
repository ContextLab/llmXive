$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Metrics Schema"
description: "Schema for the model_metrics.json file containing performance metrics and statistical validation results."
type: "object"
properties:
  model_type:
    type: "string"
    description: "Type of model (entropy, connectivity, combined)."
    enum: ["entropy", "connectivity", "combined"]
  metric_type:
    type: "string"
    description: "Type of metric (pearson_r for regression, auc for classification)."
    enum: ["pearson_r", "auc"]
  mean_value:
    type: "number"
    description: "Mean cross-validated performance metric."
  std_value:
    type: "number"
    description: "Standard deviation of the metric."
  p_value_permutation:
    type: "number"
    description: "Empirical p-value from 1,000 permutations."
    minimum: 0.0
    maximum: 1.0
  fdr_significant_parcels:
    type: "array"
    description: "List of parcel indices significant after FDR correction."
    items:
      type: "integer"
      minimum: 1
      maximum: 200
  sensitivity_analysis:
    type: "object"
    description: "Results of the sensitivity analysis for parameter r."
    properties:
      r_015:
        type: "number"
      r_020:
        type: "number"
      r_025:
        type: "number"
    required:
      - r_015
      - r_020
      - r_025
required:
  - model_type
  - metric_type
  - mean_value
  - std_value
  - p_value_permutation
additionalProperties: false