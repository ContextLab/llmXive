$schema: "http://json-schema.org/draft-07/schema#"
title: "Entropy Features Schema"
description: "Schema for the subject_entropy_features.csv file containing parcel-wise Sample Entropy values."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the subject."
  parcel_01:
    type: "number"
    description: "Sample Entropy for parcel 1."
    minimum: 0.0
    maximum: 2.0
  parcel_02:
    type: "number"
    description: "Sample Entropy for parcel 2."
    minimum: 0.0
    maximum: 2.0
  parcel_200:
    type: "number"
    description: "Sample Entropy for parcel 200."
    minimum: 0.0
    maximum: 2.0
  diagnosis:
    type: "string"
    description: "Diagnostic label (ADHD or Control)."
    enum: ["ADHD", "Control"]
  adhd_rs_score:
    type: "number"
    description: "Total ADHD-RS score (may be null if missing)."
    minimum: 0.0
  mean_fd:
    type: "number"
    description: "Mean Framewise Displacement."
    minimum: 0.0
  exclusion_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if applicable."
required:
  - subject_id
  - parcel_01
  - parcel_200
  - diagnosis
additionalProperties: false