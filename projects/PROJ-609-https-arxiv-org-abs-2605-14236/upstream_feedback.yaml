  - id: 30a132bd3414
    text: Table 2 (BEIR) compares methods at different converged budgets (e.g., BubbleSort@941
      calls vs. Mohajer@345 calls). To support the claim 'active rankers reach NDCG@10
      comparable to QuickSort with fewer calls', please clarify if this is a fixed-budget
      comparison or an efficiency trade-off. A fixed-budget comparison on BEIR would
      strengthen the evidence.
    severity: science
  - id: 370f5dac4859
    text: TREC DL datasets contain only ~50 queries per year. While bootstrapping
      is used, the statistical power for generalization is limited. Please discuss
      this limitation regarding the robustness of the significance tests (p < 0.05)
      in the main text or limitations section.
    severity: science
