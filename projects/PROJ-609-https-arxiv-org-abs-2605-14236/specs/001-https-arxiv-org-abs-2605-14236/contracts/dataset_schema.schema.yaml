$schema: "http://json-schema.org/draft-07/schema#"
title: "BEIR Dataset Input Schema"
description: "Schema for input data from BEIR datasets (Queries and Documents)"
type: "object"
properties:
  queries:
    type: "array"
    items:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Unique query identifier"
        text:
          type: "string"
          description: "Query text content"
        dataset:
          type: "string"
          description: "Source dataset name (e.g., 'dbpedia-entity')"
      required:
        - id
        - text
        - dataset
  documents:
    type: "array"
    items:
      type: "object"
      properties:
        id:
          type: "string"
          description: "Unique document identifier"
        text:
          type: "string"
          description: "Document text content"
        score:
          type: "number"
          description: "Initial BM25 retrieval score"
        dataset:
          type: "string"
          description: "Source dataset name"
      required:
        - id
        - text
        - score
        - dataset
  qrels:
    type: "array"
    items:
      type: "object"
      properties:
        query_id:
          type: "string"
        document_id:
          type: "string"
        relevance:
          type: "integer"
          description: "Relevance label (0, 1, 2, etc.)"
      required:
        - query_id
        - document_id
        - relevance
required:
  - queries
  - documents
  - qrels
additionalProperties: false
