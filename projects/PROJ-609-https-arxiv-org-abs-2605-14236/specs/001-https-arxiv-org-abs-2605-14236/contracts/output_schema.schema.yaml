$schema: "http://json-schema.org/draft-07/schema#"
title: "Reranking Experiment Output Schema"
description: "Schema for the summary.csv and experiment result files"
type: "object"
properties:
  dataset:
    type: "string"
    description: "Name of the dataset used (e.g., 'dbpedia-entity')"
  model:
    type: "string"
    description: "Model used for reranking (e.g., 'flan-t5-large')"
  budget:
    type: "integer"
    description: "Maximum number of LLM calls allowed"
  ndcg_at_10:
    type: "number"
    description: "NDCG@10 score achieved"
    minimum: 0.0
    maximum: 1.0
  calls_used:
    type: "integer"
    description: "Actual number of LLM calls made"
  seed:
    type: "integer"
    description: "Random seed used for reproducibility"
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the run"
    format: "date-time"
  oracle_type:
    type: "string"
    enum:
      - "ActiveLearner"
      - "ClassicSort"
      - "RandomizedOracle"
      - "BidirectionalOracle"
    description: "Type of oracle used"
required:
  - dataset
  - model
  - budget
  - ndcg_at_10
  - calls_used
  - seed
  - oracle_type
additionalProperties: false
