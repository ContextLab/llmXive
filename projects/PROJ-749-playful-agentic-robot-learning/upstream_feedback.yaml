      2) and describe steps taken to avoid recording personally identifiable information."
    severity: writing
  - id: 90b641578925
    text: "Reference relevant robot safety standards (e.g., ISO\u202F10218, ISO\u202F\
      15066) and explain how the system complies or plans to comply with them."
    severity: writing
  - id: 6a1446dd88a2
    text: "Provide statistical significance testing (e.g., confidence intervals, hypothesis\
      \ tests, or bootstrapped variance) for all reported success\u2011rate improvements\
      \ (LIBERO\u2011PRO, MolmoSpaces, RoboSuite, and real\u2011world). The current\
      \ tables only show point estimates, making it unclear whether the gains are\
      \ robust."
    severity: science
  - id: ccade87f3cab
    text: "Report the number of random seeds or environment initializations used per\
      \ task beyond the fixed trial counts (e.g., are the 10 initializations per LIBERO\u2011\
      PRO task drawn from a single seed set?). Include variance across seeds to assess\
      \ reproducibility."
    severity: science
  - id: 22f9c2bbd403
    text: "Clarify the total token/computational budget allocated to the play phase\
      \ versus test\u2011time inference, and justify that the observed gains are not\
      \ merely due to increased compute (address the compute\u2011matched comparison\
      \ more rigorously)."
    severity: science
  - id: 9feaccd134bd
    text: Include ablations that control for potential confounds such as the effect
      of longer retry budgets, different LLM models, or variations in the curiosity
      reward formulation. This will help rule out alternative explanations for the
      performance boost.
    severity: science
  - id: d4addd3f457d
    text: "For the real\u2011world evaluation (80 trials total), perform statistical\
      \ analysis (e.g., binomial confidence intervals) and discuss whether the observed\
      \ 8.8\u202Fpp gain is statistically meaningful given the small sample size."
    severity: science
  - id: 4dc04e575271
    text: "Provide confidence intervals (e.g., 95% Wilson intervals) for all reported\
      \ success rates in Tables\u202F1,\u202F2,\u202F3,\u202F4,\u202F5, and the real\u2011\
      world results. This will quantify the uncertainty given the finite number of\
      \ trials."
    severity: science
  - id: 527346ff5233
    text: "Conduct hypothesis tests (e.g., paired t\u2011tests or non\u2011parametric\
      \ Wilcoxon signed\u2011rank tests) to assess whether the observed improvements\
      \ of\u202FRATs over baselines are statistically significant. Report p\u2011\
      values and effect sizes."
    severity: science
  - id: 27849d74db86
    text: "Address multiple\u2011comparison issues: you compare several methods across\
      \ multiple task splits (object, goal, spatial) and environments. Apply a correction\
      \ such as Bonferroni or Holm\u2011\u0160id\xE1k, or use a hierarchical mixed\u2011\
      effects model to control the family\u2011wise error rate."
    severity: science
  - id: b78f541927d1
    text: "Report variance measures (standard deviation or standard error) for each\
      \ mean success rate, especially for the smaller real\u2011world sample (40 trials\
      \ per task). This helps readers gauge the stability of the results."
    severity: science
  - id: 625e36194e5b
    text: Include details on random seed handling and any stochasticity in the LLM
