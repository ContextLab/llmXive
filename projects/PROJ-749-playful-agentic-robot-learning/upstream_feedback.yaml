    severity: writing
  - id: 600e1933f2ec
    text: "Ensure that all technical symbols (e.g., \u2194, \u2192) are accompanied\
      \ by a plain\u2011English description for readers unfamiliar with mathematical\
      \ notation."
    severity: writing
  - id: 354a231afdba
    text: "The manuscript overstates the generality of the reported gains. Claims\
      \ such as \u201Cplay\u2011learned skills improve downstream performance both\
      \ within the full RATs system and as a plug\u2011and\u2011play addition to other\
      \ inference\u2011time Code\u2011as\u2011Policy methods\u201D are not supported\
      \ by extensive cross\u2011domain or cross\u2011embodiment evaluations; only\
      \ a handful of RoboSuite tasks and two real\u2011world tasks were tested."
    severity: science
  - id: 9a09b7923af9
    text: "The reported real\u2011world improvements (\u22488\u20139\u202Fpp) are\
      \ based on very limited experiments (2 tasks, 40 trials each) and lack statistical\
      \ significance analysis. The paper should temper statements like \u201Cplay\u2011\
      learned code skills can be reused on real hardware for simple manipulation tasks\u201D\
      \ or provide broader real\u2011world validation."
    severity: science
  - id: 44ed13ee5986
    text: "The comparison to a compute\u2011matched CaP\u2011Agent0 baseline (Table\u202F\
      9) shows that most of the performance boost comes from the learned skill library\
      \ rather than the extra compute during play. The claim that \u201Cwithout finetuning\
      \ the underlying model\u201D the system achieves large gains is therefore misleading\
      \ and should be qualified."
    severity: writing
  - id: d9b1d9a05313
    text: "Cross\u2011embodiment transfer (e.g., two\u2011arm lifting) is demonstrated\
      \ on a single RoboSuite task with a modest success increase. The paper should\
      \ avoid broad statements about cross\u2011embodiment applicability until more\
      \ diverse multi\u2011arm or different robot platforms are evaluated."
    severity: science
  - id: 7a7b9ff39bd9
    text: "The abstract and conclusion present percentage\u2011point improvements\
      \ (20.6\u202Fpp, 17.0\u202Fpp) as if they are universally significant, but the\
      \ baselines (e.g., CaP\u2011Agent0) are relatively weak and the evaluation budget\
      \ (10 trials per task) is small. The authors should contextualize these gains\
      \ and discuss variability."
    severity: writing
  - id: b64a3a873c79
    text: "Add an explicit safety analysis section (e.g., \xA76) describing hardware\
      \ limits, emergency\u2011stop mechanisms, and how the system prevents unsafe\
      \ motions during both play and test phases."
    severity: science
  - id: 2acae33385f2
    text: "Introduce safety constraints into the Code\u2011as\u2011Policy generation\
      \ pipeline (Section\u202F3\u202FMethod, lines\u202F45\u201170) to filter out\
      \ commands that could exceed joint limits, cause collisions, or apply excessive\
      \ forces."
    severity: science
  - id: 47887ce81bc9
    text: "Discuss dual\u2011use implications of publishing a reusable skill library\
