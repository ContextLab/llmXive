$schema: "http://json-schema.org/draft-07/schema#"
title: "ErrorMetric"
description: "Schema for model performance metrics and statistical validation results."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the independent run."
  bit_depth:
    type: "integer"
    enum: [4, 8, 12, 16]
    description: "Quantization bit depth used."
  noise_std:
    type: "number"
    description: "Standard deviation of injected Gaussian noise."
  horizon:
    type: "integer"
    enum: [100, 250, 500]
    description: "Prediction horizon in time steps."
  mse:
    type: "number"
    description: "Mean Squared Error between predicted and clean ground truth."
  cumulative_error_rate:
    type: "number"
    description: "MSE growth rate per time step."
  entropy_score:
    type: "number"
    description: "Entropy of the quantized distribution (validation metric)."
  ram_peak_mb:
    type: "number"
    description: "Peak RAM usage in MB."
  latency_per_step_ms:
    type: "number"
    description: "Inference latency per step in milliseconds."
  is_untrained:
    type: "boolean"
    description: "True if model was trained from scratch due to missing weights."
required:
  - run_id
  - bit_depth
  - noise_std
  - horizon
  - mse
  - cumulative_error_rate
  - entropy_score
  - ram_peak_mb
  - latency_per_step_ms
  - is_untrained
additionalProperties: false