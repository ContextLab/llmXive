$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalResult"
description: "Schema for aggregated statistical analysis results."
type: "object"
properties:
  comparison:
    type: "string"
    description: "Description of the comparison (e.g., '4-bit vs Continuous')."
  test_method:
    type: "string"
    enum: ["paired_t_test", "wilcoxon_signed_rank"]
    description: "Statistical test used."
  p_value:
    type: "number"
    description: "P-value from the test."
  significant:
    type: "boolean"
    description: "True if p < 0.05."
  mean_mse_discrete:
    type: "number"
    description: "Mean MSE for the discrete modality."
  mean_mse_baseline:
    type: "number"
    description: "Mean MSE for the continuous baseline."
  stability_threshold:
    type: "integer"
    description: "Identified bit-depth threshold for stability."
  variance_equal:
    type: "boolean"
    description: "Result of Levene's test for equal variance."
required:
  - "comparison"
  - "test_method"
  - "p_value"
  - "significant"
  - "mean_mse_discrete"
  - "mean_mse_baseline"
  - "stability_threshold"
  - "variance_equal"