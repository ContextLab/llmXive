name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f code/requirements.txt ]; then
          pip install -r code/requirements.txt
        else
          echo "Warning: code/requirements.txt not found. Installing core dependencies."
          pip install pandas numpy scipy matplotlib seaborn pyyaml statsmodels pytest
        fi

    - name: Run linter (ruff)
      run: |
        pip install ruff
        ruff check code/
      continue-on-error: true

    - name: Run tests with memory and time constraints
      run: |
        # Set timeout for the entire test run (3600 seconds = 1 hour)
        timeout 3600 pytest tests/ -v --tb=short --cov=code --cov-report=xml --cov-fail-under=0 || \
        { echo "Tests failed or timed out"; exit 1; }

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  validate-results:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r code/requirements.txt

    - name: Validate success criteria
      run: |
        python code/validation.py --validate-all
      env:
        PYTHONPATH: .:code
      # This step will fail if validation_status.json does not exist or contains FAILs
      # The script is expected to exit with code 1 if any success criterion fails.