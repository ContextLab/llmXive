$schema: "http://json-schema.org/draft-07/schema#"
title: "DelayRecord"
description: "Schema for a single cleaned flight delay record."
type: "object"
properties:
  flight_id:
    type: "string"
    description: "Unique identifier for the flight."
  total_delay_minutes:
    type: "number"
    minimum: 0
    description: "Total delay in minutes (ArrDelay + DepDelay)."
  carrier:
    type: "string"
    description: "IATA carrier code."
  origin:
    type: "string"
    description: "Origin airport code."
  destination:
    type: "string"
    description: "Destination airport code."
  is_anomaly:
    type: "boolean"
    description: "True if delay exceeds 1440 minutes."
required:
  - flight_id
  - total_delay_minutes
  - carrier
  - origin
  - destination
  - is_anomaly
