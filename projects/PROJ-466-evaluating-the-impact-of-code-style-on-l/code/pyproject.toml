[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-eval-code-style"
version = "0.1.0"
description = "Evaluating the Impact of Code Style on LLM Code Generation Diversity"
requires-python = ">=3.11"
dependencies = [
    "transformers>=4.40.0",
    "torch-cpu>=2.2.0",
    "datasets>=2.18.0",
    "networkx>=3.2.1",
    "scipy>=1.12.0",
    "pandas>=2.2.1",
    "pytest>=8.1.1",
    "pyyaml>=6.0.1"
]

[project.optional-dependencies]
dev = [
    "ruff>=0.3.5",
    "black>=24.3.0"
]

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "C901", # too complex
    "B008", # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"code/generation/generator.py" = ["B028"] # stacklevel for warnings
"tests/*" = ["S101"] # assert statements in tests

[tool.ruff.isort]
known-first-party = ["config", "generation", "analysis", "utils"]
force-single-line = true

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:transformers.*",
    "ignore::UserWarning:torch.*"
]