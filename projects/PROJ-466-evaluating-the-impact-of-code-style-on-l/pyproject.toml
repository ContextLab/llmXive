[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-code-style-eval"
version = "0.1.0"
description = "Evaluating the Impact of Code Style on LLM Code Generation Diversity"
requires-python = ">=3.11"
dependencies = [
    "transformers>=4.40.0",
    "torch>=2.2.0",
    "datasets>=2.18.0",
    "networkx>=3.2.1",
    "scipy>=1.12.0",
    "pandas>=2.2.1",
    "pytest>=8.1.1",
    "pyyaml>=6.0.1",
    "black>=24.3.0",
    "ruff>=0.3.5",
]

[project.optional-dependencies]
dev = [
    "pytest-cov>=4.1.0",
    "mypy>=1.9.0",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.isort]
known-first-party = ["config", "generation", "analysis", "utils"]
force-single-line = true
order-by-type = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.setuptools.packages.find]
where = ["code"]