[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantifying-te-impact"
version = "0.1.0"
description = "Quantifying the Impact of Transposable Element Activity on Gene Expression Variation in Drosophila"
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "scikit-learn",
    "statsmodels",
    "numpy",
    "scipy",
    "requests",
    "biopython",
    "pyyaml",
    "lxml",
    "matplotlib",
    "shapely"
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pre-commit>=3.0.0",
    "pytest>=7.0.0"
]

[tool.ruff]
line-length = 88
target-version = "py38"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in data gen)
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # assert allowed in tests

[tool.black]
line-length = 88
target-version = ["py38", "py39", "py310", "py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.setuptools]
packages = ["code", "tests"]
package-dir = {"" = "."}
