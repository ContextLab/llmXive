$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Run Output Schema"
description: "Schema for the results of the Random Forest training and evaluation"
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique UUID for the model run"
  model_type:
    type: "string"
    description: "Type of model used"
    enum: ["RandomForest"]
  potential_bin:
    type: "string"
    description: "Potential range bin"
    enum: ["low", "high"]
  r2_score:
    type: "number"
    description: "Coefficient of determination"
  mae:
    type: "number"
    description: "Mean Absolute Error"
  feature_importance:
    type: "object"
    description: "Map of feature names to importance scores"
    additionalProperties:
      type: "number"
  sensitivity_thresholds:
    type: "array"
    description: "List of thresholds tested for sensitivity"
    items:
      type: "number"
    minItems: 3
  top_3_features:
    type: "array"
    description: "List of top 3 feature names by importance"
    items:
      type: "string"
    minItems: 3
required:
  - run_id
  - model_type
  - potential_bin
  - r2_score
  - mae
  - feature_importance
  - top_3_features
additionalProperties: false
