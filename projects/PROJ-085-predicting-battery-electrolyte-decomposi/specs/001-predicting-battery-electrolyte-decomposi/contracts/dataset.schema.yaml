$schema: "http://json-schema.org/draft-07/schema#"
title: "Electrolyte Decomposition Dataset Schema"
description: "Schema for the processed feature matrix and target variables. Note: band_gap is included for logging but excluded from model input to prevent collinearity."
type: "object"
properties:
  dft_id:
    type: "string"
    description: "Unique identifier for the DFT entry"
  smiles:
    type: "string"
    description: "SMILES string of the molecule"
  potential_v:
    type: "number"
    description: "Applied electrochemical potential in Volts"
    enum: [0.0, 2.0, 4.0]
  homo:
    type: "number"
    description: "HOMO energy in eV"
  lumo:
    type: "number"
    description: "LUMO energy in eV"
  band_gap:
    type: "number"
    description: "Band gap in eV (LUMO - HOMO). Present for logging, excluded from model input."
    minimum: 0.0
  max_bond_length:
    type: "number"
    description: "Maximum bond length in Angstroms"
  min_bond_length:
    type: "number"
    description: "Minimum bond length in Angstroms"
  mean_bond_angle:
    type: "number"
    description: "Mean bond angle in degrees"
  max_dihedral:
    type: "number"
    description: "Maximum dihedral angle in degrees"
  decomposition_energy:
    type: "number"
    description: "Calculated decomposition energy in eV"
  n_electrons:
    type: "integer"
    description: "Number of electrons transferred"
  is_outlier:
    type: "boolean"
    description: "Flag for metallic behavior or invalid geometry"
required:
  - dft_id
  - smiles
  - potential_v
  - homo
  - lumo
  - band_gap
  - decomposition_energy
  - n_electrons
additionalProperties: false