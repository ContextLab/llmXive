'|constant faraday mol':
  quote: "The NIST scientists devised a method to compensate for silver lost from\
    \ the anode by mechanical causes, and conducted an isotope analysis of the silver\
    \ used to determine its atomic weight. Their value for the conventional Faraday\
    \ constant was F90 = 96485.39(13) C/mol, which corresponds to a value for the\
    \ Avogadro constant of 6.0221449(78)\xD71023 mol\u22121: both values have a relative\
    \ standard uncertainty of 1.3\xD710\u22126."
  source_id: Dalton (unit)
  url: https://en.wikipedia.org/wiki/Dalton_(unit)
  value: 96485.39(13)
