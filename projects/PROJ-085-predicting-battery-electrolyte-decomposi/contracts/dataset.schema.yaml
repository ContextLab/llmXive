$schema: http://json-schema.org/draft-07/schema#
title: Electrolyte Dataset Schema
description: Schema for ingested DFT electrolyte data
type: object
required:
  - molecule_id
  - potential_v
  - reactants
  - products
  - n_electrons
  - energy_products
  - energy_reactants
properties:
  molecule_id:
    type: string
    description: Unique identifier for the molecule
  potential_v:
    type: number
    description: Applied potential in Volts
  reactants:
    type: array
    items:
      type: string
    description: List of reactant species
  products:
    type: array
    items:
      type: string
    description: List of product species
  n_electrons:
    type: integer
    description: Number of electrons transferred
  energy_products:
    type: number
    description: Total energy of products in eV
  energy_reactants:
    type: number
    description: Total energy of reactants in eV
