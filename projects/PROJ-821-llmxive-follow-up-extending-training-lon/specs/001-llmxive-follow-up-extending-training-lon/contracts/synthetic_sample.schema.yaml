$schema: "http://json-schema.org/draft-07/schema#"
title: "SyntheticSample"
description: "Schema for a single synthetic long-context sample with variable visual density (Dual-Arm)."
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the sample (UUID)."
  arm_type:
    type: "string"
    description: "Experimental arm: A (Constant Text) or B (Constant Total)."
    enum:
      - "A"
      - "B"
  text_token_count:
    type: "integer"
    description: "Number of text tokens in the context."
    minimum: 100000
    maximum: 300000
  image_count:
    type: "integer"
    description: "Number of images in the context."
    minimum: 0
    maximum: 20
  visual_token_count:
    type: "integer"
    description: "Total visual tokens derived from images."
    minimum: 0
  total_token_count:
    type: "integer"
    description: "Total tokens (Text + Visual)."
    minimum: 100000
    maximum: 300000
  needle_location:
    type: "integer"
    description: "Token index where the needle is inserted."
    minimum: 0
  needle_value:
    type: "string"
    description: "The unique value of the needle token."
  text_content:
    type: "string"
    description: "The full text content of the sample."
  image_paths:
    type: "array"
    description: "List of paths or URLs to images."
    items:
      type: "string"
    minItems: 0
  difficulty_score:
    type: "number"
    description: "Hardness score of the needle retrieval task."
    minimum: 0.0
    maximum: 1.0
required:
  - sample_id
  - arm_type
  - text_token_count
  - image_count
  - visual_token_count
  - total_token_count
  - needle_location
  - needle_value
  - text_content
  - image_paths
  - difficulty_score
additionalProperties: false