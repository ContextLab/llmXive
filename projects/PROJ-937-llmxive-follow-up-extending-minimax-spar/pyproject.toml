[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up-extending-minimax-spar"
version = "0.1.0"
description = "llmXive follow-up: extending MiniMax Sparse Attention"
requires-python = ">=3.11"
dependencies = [
    "transformers",
    "torch",
    "datasets",
    "scipy",
    "pandas",
    "numpy",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest-cov",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.tox
    | __pycache__
    | build
    | dist
    | data
    | results
)/
'''

[tool.ruff]
# Inherit settings from code/ruff.toml if needed, 
# but typically we keep ruff config in the project root or a dedicated file.
# This section serves as a fallback or override for project-wide settings.
extend = "code/ruff.toml"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-v --tb=short"
