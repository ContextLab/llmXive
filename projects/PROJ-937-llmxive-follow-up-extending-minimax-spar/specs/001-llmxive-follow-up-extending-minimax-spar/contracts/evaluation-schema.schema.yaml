$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Report Schema"
description: "Schema for the final benchmark report generated by the llmXive sparse attention experiment."
type: "object"
properties:
  experiment_id:
    type: "string"
    description: "Unique identifier for the experiment run."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the run."
  config:
    type: "object"
    properties:
      model:
        type: "string"
        description: "Name of the model used (e.g., MiniMax-M3)."
      device:
        type: "string"
        enum: ["cpu"]
        description: "Target device. Must be 'cpu' for this project."
      context_window:
        type: "integer"
        description: "Context window size in tokens."
      heuristics:
        type: "array"
        items:
          type: "string"
          enum: ["entropy", "gradient", "recency"]
        description: "List of heuristics evaluated."
      thresholds:
        type: "array"
        items:
          type: "number"
        description: "List of thresholds tested."
      baseline_type:
        type: "string"
        enum: ["dense_attention"]
        description: "Type of baseline used. Must be 'dense_attention'."
    required:
      - model
      - device
      - context_window
      - heuristics
      - thresholds
      - baseline_type
  results:
    type: "array"
    description: "List of per-task evaluation results."
    items:
      type: "object"
      properties:
        task_id:
          type: "string"
          description: "Unique ID of the RULER task."
        heuristic:
          type: "string"
          enum: ["entropy", "gradient", "recency"]
        threshold:
          type: "number"
        metrics:
          type: "object"
          properties:
            exact_match:
              type: "number"
              description: "Exact Match score (0.0 to 1.0)."
            f1:
              type: "number"
              description: "F1 score (0.0 to 1.0)."
            perplexity:
              type: "number"
              description: "Average perplexity."
            selected_blocks_count:
              type: "integer"
              description: "Number of blocks selected."
            execution_time_ms:
              type: "integer"
              description: "Execution time in milliseconds."
            false_positive_rate:
              type: "number"
              description: "False Positive Rate calculated against ground truth."
          required:
            - exact_match
            - f1
            - perplexity
            - selected_blocks_count
            - execution_time_ms
            - false_positive_rate
        baseline_metrics:
          type: "object"
          properties:
            f1:
              type: "number"
            perplexity:
              type: "number"
          required:
            - f1
            - perplexity
      required:
        - task_id
        - heuristic
        - threshold
        - metrics
        - baseline_metrics
  statistics:
    type: "object"
    properties:
      paired_t_test:
        type: "object"
        properties:
          statistic:
            type: "number"
          p_value:
            type: "number"
          significant:
            type: "boolean"
            description: "True if p_value < 0.05."
          correction:
            type: "string"
            enum: ["holm_bonferroni"]
            description: "Multiple comparison correction method."
        required:
          - statistic
          - p_value
          - significant
          - correction
      wilcoxon_test:
        type: "object"
        properties:
          statistic:
            type: "number"
          p_value:
            type: "number"
          significant:
            type: "boolean"
        required:
          - statistic
          - p_value
          - significant
      sensitivity_analysis:
        type: "array"
        items:
          type: "object"
          properties:
            threshold:
              type: "number"
            mean_f1:
              type: "number"
            false_positive_rate:
              type: "number"
          required:
            - threshold
            - mean_f1
            - false_positive_rate
    required:
      - paired_t_test
      - wilcoxon_test
      - sensitivity_analysis
required:
  - experiment_id
  - timestamp
  - config
  - results
  - statistics