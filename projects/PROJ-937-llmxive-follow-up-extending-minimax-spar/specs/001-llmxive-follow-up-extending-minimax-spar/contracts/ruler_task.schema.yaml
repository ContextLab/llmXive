$schema: "http://json-schema.org/draft-07/schema#"
title: "RulerTask"
description: "Schema for a single RULER benchmark task with block alignment."
type: "object"
required:
  - task_id
  - task_type
  - context_length
  - context_text
  - needle_text
  - needle_position
  - query
  - expected_answer
  - block_size
  - blocks
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task (e.g., 'NIAH-128k-1')."
  task_type:
    type: "string"
    enum:
      - "NeedleInAHaystack"
      - "MultiHop"
    description: "Type of RULER task."
  context_length:
    type: "integer"
    minimum: 0
    description: "Total number of tokens in the context."
  context_text:
    type: "string"
    description: "The full context string (haystack)."
  needle_text:
    type: "string"
    description: "The hidden 'needle' string to retrieve."
  needle_position:
    type: "integer"
    minimum: 0
    description: "Token index where the needle starts."
  query:
    type: "string"
    description: "The question asked about the context."
  expected_answer:
    type: "string"
    description: "Ground truth answer for EM/F1 calculation."
  block_size:
    type: "integer"
    minimum: 1
    description: "Fixed block size used for chunking (e.g., 512)."
  blocks:
    type: "array"
    items:
      type: "string"
    description: "List of block strings derived from context_text. Must align with block_size."