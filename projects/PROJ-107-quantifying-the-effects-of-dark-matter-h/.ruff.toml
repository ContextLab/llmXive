# Ruff configuration for linting
line-length = 100
target-version = "py311"

select = [
  "E",  # pycodestyle errors
  "F",  # Pyflakes
  "W",  # pycodestyle warnings
  "I",  # isort
  "N",  # pep8-naming
  "UP", # pyupgrade
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "SIM",# flake8-simplify
]

ignore = [
  "E501", # Line too long (handled by black)
]
