[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "C901", # Too complex
]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
]

[lint.isort]
known-first-party = ["code"]
force-single-line = false
lines-after-imports = 2
