$schema: "http://json-schema.org/draft-07/schema#"
title: "M4 Dataset Schema"
description: "Schema for the processed M4 time series data"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the time series"
  frequency:
    type: "integer"
    description: "Seasonal frequency (e.g., 12 for monthly)"
  seasonality:
    type: "string"
    enum: ["Yes", "No"]
    description: "Binary indicator of seasonality"
  observations:
    type: "array"
    items:
      type: "number"
    description: "Historical observations"
  train_split:
    type: "integer"
    description: "Index where training data ends"
  test_split:
    type: "integer"
    description: "Index where test data begins"
  trend_strength:
    type: "number"
    description: "Variance ratio of trend component to total variance"
  trend_category:
    type: "string"
    enum: ["High", "Low"]
    description: "Classification based on trend strength threshold"
required:
  - id
  - frequency
  - seasonality
  - observations
  - train_split
  - test_split
  - trend_strength
  - trend_category
additionalProperties: false
