$schema: "http://json-schema.org/draft-07/schema#"
title: "Calibration Metric Schema"
description: "Schema for aggregated calibration metrics"
type: "object"
properties:
  model_name:
    type: "string"
    enum: ["ARIMA", "ETS", "Prophet", "LightGBM"]
    description: "Name of the forecasting model"
  horizon:
    type: "integer"
    minimum: 1
    maximum: 12
    description: "Forecast horizon"
  nominal_coverage_80:
    type: "number"
    const: 0.80
    description: "Nominal coverage level for 80% interval"
  empirical_coverage_80:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Empirical coverage rate for 80% interval"
  deviation_80:
    type: "number"
    description: "Absolute deviation from nominal coverage"
  nominal_coverage_95:
    type: "number"
    const: 0.95
    description: "Nominal coverage level for 95% interval"
  empirical_coverage_95:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Empirical coverage rate for 95% interval"
  deviation_95:
    type: "number"
    description: "Absolute deviation from nominal coverage"
  subgroup_seasonality:
    type: "string"
    enum: ["Yes", "No", "All"]
    description: "Seasonality subgroup"
  subgroup_trend:
    type: "string"
    enum: ["High", "Low", "All"]
    description: "Trend strength subgroup"
  n_series:
    type: "integer"
    minimum: 1
    description: "Number of series in the subgroup"
  p_value_raw:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Raw p-value from statistical test"
  p_value_fdr:
    type: "number"
    minimum: 0
    maximum: 1
    description: "FDR-corrected p-value"
required:
  - model_name
  - horizon
  - nominal_coverage_80
  - empirical_coverage_80
  - deviation_80
  - nominal_coverage_95
  - empirical_coverage_95
  - deviation_95
  - subgroup_seasonality
  - subgroup_trend
  - n_series
  - p_value_raw
  - p_value_fdr
additionalProperties: false
