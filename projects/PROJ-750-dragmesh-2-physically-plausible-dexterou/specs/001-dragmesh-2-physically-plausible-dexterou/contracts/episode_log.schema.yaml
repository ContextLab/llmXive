$schema: "http://json-schema.org/draft-07/schema#"
title: "Episode Log Schema"
description: "Schema for a single interaction episode log in DragMesh-2 reproduction."
type: "object"
required:
  - "episode_id"
  - "start_time"
  - "damping_value"
  - "success"
  - "steps"
properties:
  episode_id:
    type: "string"
    description: "Unique identifier for the episode."
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of episode start."
  damping_value:
    type: "number"
    description: "The damping coefficient used for this episode."
  success:
    type: "boolean"
    description: "Whether the task was completed successfully."
  steps:
    type: "array"
    items:
      type: "object"
      required:
        - "t"
        - "state"
        - "action"
        - "reward"
        - "forces"
      properties:
        t:
          type: "number"
          description: "Time step."
        state:
          type: "object"
          description: "State vector (positions, velocities)."
        action:
          type: "array"
          items:
            type: "number"
          description: "Action vector applied."
        reward:
          type: "number"
          description: "Reward received at this step."
        forces:
          type: "object"
          required:
            - "normal"
            - "friction"
            - "gravity"
          properties:
            normal:
              type: "array"
              items:
                type: "number"
              description: "Normal force vector [x, y, z]."
            friction:
              type: "array"
              items:
                type: "number"
              description: "Frictional force vector [x, y, z]."
            gravity:
              type: "array"
              items:
                type: "number"
              description: "Gravity force vector [x, y, z]."
        reset_reason:
          type: ["string", "null"]
          description: "Reason for reset if applicable."