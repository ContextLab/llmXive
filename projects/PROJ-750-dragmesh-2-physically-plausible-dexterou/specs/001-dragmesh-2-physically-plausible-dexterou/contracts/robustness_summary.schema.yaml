$schema: "http://json-schema.org/draft-07/schema#"
title: "Robustness Summary Schema"
description: "Schema for the CSV summary of robustness evaluation across damping levels. Includes 95% confidence intervals."
type: "object"
required:
  - "damping_value"
  - "method"
  - "success_rate"
  - "mean_reward"
  - "std_reward"
  - "n_episodes"
  - "ci_lower"
  - "ci_upper"
properties:
  damping_value:
    type: "number"
    description: "The damping coefficient value."
  method:
    type: "string"
    enum:
      - "PICA"
      - "Baseline"
    description: "The method being evaluated."
  success_rate:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Proportion of successful episodes."
  mean_reward:
    type: "number"
    description: "Average reward per episode."
  std_reward:
    type: "number"
    description: "Standard deviation of reward."
  n_episodes:
    type: "integer"
    minimum: 1
    description: "Number of episodes run."
  ci_lower:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Lower bound of 95% Wilson score confidence interval."
  ci_upper:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Upper bound of 95% Wilson score confidence interval."