$schema: "http://json-schema.org/draft-07/schema#"
title: "Work-Energy Trace Schema"
description: "Schema for the CSV trace of work-energy consistency (Feynman Reviewer). Includes all energy terms for a complete balance check."
type: "object"
required:
  - "t"
  - "F_normal_mag"
  - "F_friction_mag"
  - "F_gravity_mag"
  - "v_finger"
  - "v_object"
  - "damping_torque"
  - "work_finger"
  - "delta_ke"
  - "delta_pe"
  - "work_dissipation"
  - "energy_balance_error"
properties:
  t:
    type: "number"
    description: "Timestamp in seconds."
  F_normal_mag:
    type: "number"
    description: "Magnitude of normal force in Newtons."
  F_friction_mag:
    type: "number"
    description: "Magnitude of friction force in Newtons."
  F_gravity_mag:
    type: "number"
    description: "Magnitude of gravity force in Newtons."
  v_finger:
    type: "array"
    items:
      type: "number"
    minItems: 3
    maxItems: 3
    description: "Finger tip velocity vector [vx, vy, vz]."
  v_object:
    type: "array"
    items:
      type: "number"
    minItems: 3
    maxItems: 3
    description: "Object contact point velocity vector [vx, vy, vz]."
  damping_torque:
    type: "number"
    description: "Joint damping torque in Newton-meters."
  work_finger:
    type: "number"
    description: "Cumulative work done by the finger in Joules."
  delta_ke:
    type: "number"
    description: "Change in kinetic energy since previous step."
  delta_pe:
    type: "number"
    description: "Change in potential energy since previous step."
  work_dissipation:
    type: "number"
    description: "Work lost to friction and damping since previous step."
  energy_balance_error:
    type: "number"
    description: "Difference between work_finger and (delta_ke + delta_pe + work_dissipation). Should be near zero."