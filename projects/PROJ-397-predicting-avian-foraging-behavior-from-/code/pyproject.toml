[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predicting-avian-foraging-behavior"
version = "0.1.0"
description = "Predicting avian foraging guilds from public eBird data and land cover maps"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "numpy",
    "scikit-learn",
    "geopandas",
    "rasterio",
    "requests",
    "matplotlib",
    "seaborn",
    "pyyaml",
    "jupyter",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Same as Black.
line-length = 88
target-version = "py311"

# Assume UTF-8
force-exclude = true

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B006", # mutable default arguments
    "B007", # unused loop variables
]

[tool.ruff.lint.isort]
known-first-party = ["setup_directories", "verify_python_version"]
force-sort-within-sections = true