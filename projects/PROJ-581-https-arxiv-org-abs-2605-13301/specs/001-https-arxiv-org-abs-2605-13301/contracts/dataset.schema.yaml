$schema: "http://json-schema.org/draft-07/schema#"
title: "Olympiad Problem Dataset Schema"
description: "Schema for the input Olympiad problem files (imo25.jsonl, usamo2026.jsonl)"
type: "object"
properties:
  problem_id:
    type: "string"
    description: "Unique identifier for the problem (e.g., 'IMO-2025-P1')"
  problem_text:
    type: "string"
    description: "The full text of the mathematical problem"
  ground_truth:
    type: "string"
    description: "The expected answer or solution key"
  difficulty_level:
    type: "string"
    enum: ["Easy", "Medium", "Hard"]
    description: "Optional difficulty tag"
required:
  - "problem_id"
  - "problem_text"
  - "ground_truth"
additionalProperties: false