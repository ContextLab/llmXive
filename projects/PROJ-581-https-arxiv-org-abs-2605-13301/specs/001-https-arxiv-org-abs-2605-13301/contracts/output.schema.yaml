$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Result Schema"
description: "Schema for the output of the evaluation pipeline (evaluation_results.json)"
type: "object"
properties:
  problem_id:
    type: "string"
    description: "Reference to the input problem"
  is_correct:
    type: "boolean"
    description: "Whether the generated answer matches the ground truth"
  reason:
    type: "string"
    description: "Explanation for pass/fail (e.g., 'Answer mismatch', 'Timeout')"
  confidence_score:
    type: "number"
    description: "Optional confidence score from the verifier"
  timestamp:
    type: "string"
    format: "date-time"
    description: "Time of evaluation"
  status:
    type: "string"
    enum: ["SUCCESS", "TIMEOUT", "ERROR", "SKIPPED"]
    description: "Status of the generation"
required:
  - "problem_id"
  - "is_correct"
  - "reason"
  - "status"
additionalProperties: false