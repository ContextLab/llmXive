  - id: 9d88f7314189
    text: The claim that iLLaDA-Base is "slightly stronger" than Qwen2.5 7B (63.9
      vs 63.3 avg) lacks statistical significance testing. A 0.6 point difference
      is likely noise. Rephrase to "comparable" unless significance is proven.
    severity: writing
  - id: 26b2f8846a93
    text: Attributing the large instruct gap (e.g., MATH 56.7 vs 75.5) "largely" to
      missing RL is unsupported. The paper lacks ablations isolating SFT data quality
      or strategy from RL effects. This causal claim is speculative.
    severity: science
  - id: 591475ea1116
    text: The conclusion that bidirectional diffusion is the key driver over scale
      is an overreach. iLLaDA uses 12T tokens vs LLaDA's 2.3T, but no controlled comparison
      isolates architecture from scale against a similarly scaled AR model.
    severity: science
  - id: 4d46ca039373
    text: The paper states the SFT corpus contains 25B tokens but lacks a Data Statement
      detailing the sources, filtering criteria, and potential inclusion of personally
      identifiable information (PII) or copyrighted material. Add a section in the
      Appendix or main text describing data provenance and privacy safeguards to comply
      with standard AI ethics guidelines.
    severity: writing
  - id: 191649c45eac
    text: The authors acknowledge 'repetitive reasoning loops' in the Appendix (lines
      430-435) but do not discuss the potential for the model to generate harmful
      content (e.g., self-harm instructions, hate speech) during these loops or in
      general open-ended generation. A brief discussion on safety alignment gaps and
      mitigation strategies for harmful outputs is required.
    severity: writing
  - id: 565b6efc06d1
    text: The model weights are released on GitHub (Abstract, line 24). The paper
      must explicitly confirm that the release includes a safety evaluation report
      or that the model has undergone red-teaming to identify and mitigate dual-use
      risks before public distribution.
    severity: writing
  - id: ff383a6efd8c
    text: 'The paper presents compelling empirical results for iLLaDA, an 8B masked
      diffusion language model, but the scientific evidence supporting its central
      claims requires strengthening in three key areas: statistical rigor, experimental
      controls, and effect size interpretation. First, the claim that iLLaDA-Base
      "is slightly stronger on average" than Qwen2.5 7B (63.9 vs 63.3 in Tab. 1) lacks
      statistical validation. With no reported standard errors, confidence intervals,
      or results from multiple random'
    severity: writing
  - id: 3a224bfc6333
    text: The paper reports benchmark scores (e.g., Tab. 1, Tab. 2) as single point
      estimates without standard errors, confidence intervals, or variance metrics.
      Given the stochastic nature of diffusion sampling and benchmark evaluation,
      statistical significance of the reported improvements (e.g., +21.6 on BBH) cannot
      be assessed. Please report results over multiple seeds or provide confidence
      intervals.
    severity: science
  - id: 6b97e8bbdca0
    text: The ablation study on SFT duration (Fig. 3) shows performance trends but
      lacks statistical validation. The claim that performance 'generally improves'
      needs to be supported by statistical tests (e.g., paired t-tests or bootstrap
      confidence intervals) to rule out random fluctuation, especially given the small
      number of data points (epochs) plotted.
    severity: science
  - id: 0be9c92ea5fc
    text: The comparison of scoring rules in Tab. 3 (Likelihood vs. Confidence) presents
