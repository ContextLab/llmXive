$schema: "http://json-schema.org/draft-07/schema#"
title: "FutureScenario"
description: "Schema for generated planning outputs combining episodic memories with current state."
type: "object"
properties:
  scenario_id:
    type: "string"
    description: "Unique identifier."
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}$"
  task_id:
    type: "string"
    description: "Reference to PlanningTask."
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-4[a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}$"
  generated_plan:
    type: "array"
    description: "Sequence of generated actions."
    items:
      type: "string"
    minItems: 1
  episodic_references:
    type: "array"
    description: "IDs of retrieved episodes used."
    items:
      type: "string"
  counterfactual_details:
    type: "array"
    description: "Details marked as counterfactual/uncertain."
    items:
      type: "object"
      properties:
        detail_id:
          type: "string"
        text:
          type: "string"
        is_known:
          type: "boolean"
          description: "True if verifiable against ground truth."
        confidence:
          type: "number"
          minimum: 0.0
          maximum: 1.0
      required:
        - detail_id
        - text
        - is_known
        - confidence
      additionalProperties: false
  confidence_scores:
    type: "object"
    description: "Confidence map for each step."
    additionalProperties:
      type: "number"
      minimum: 0.0
      maximum: 1.0
  coherence_score:
    type: "number"
    description: "Human rating (1-5)."
    minimum: 1.0
    maximum: 5.0
required:
  - scenario_id
  - task_id
  - generated_plan
  - confidence_scores
additionalProperties: false
