$schema: "http://json-schema.org/draft-07/schema#"
title: "SpinConfigurationDataset"
description: "Schema for the preprocessed spin configuration dataset used in VAE training."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      model_type:
        type: "string"
        enum:
          - "Heisenberg"
          - "XY"
        description: "Type of spin model used."
      lattice_size:
        type: "integer"
        description: "Lattice dimension L (e.g., 16, 24)."
      temperature_range:
        type: "object"
        properties:
          min:
            type: "number"
            description: "Minimum temperature T."
          max:
            type: "number"
            description: "Maximum temperature T."
        required:
          - min
          - max
      checksum:
        type: "string"
        description: "SHA-256 checksum of the raw data file."
    required:
      - model_type
      - lattice_size
      - temperature_range
      - checksum
  data:
    type: "array"
    description: "Array of spin configurations."
    items:
      type: "object"
      properties:
        spins:
          type: "array"
          description: "Flattened array of shape [3, L, L] representing unit vectors."
          items:
            type: "number"
          minItems: 0
          maxItems: 1728 # 3 * 24 * 24 (max L=24)
        temperature:
          type: "number"
          description: "Temperature of this configuration."
        split:
          type: "string"
          enum:
            - "train"
            - "validation"
          description: "Dataset split assignment."
      required:
        - spins
        - temperature
        - split
required:
  - metadata
  - data
additionalProperties: false