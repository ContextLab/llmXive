$schema: http://json-schema.org/draft-07/schema#
title: Processed Spin Configuration Dataset
description: |
  Schema defining the structure, types, and constraints for the processed
  spin configuration dataset used for unsupervised learning in the
  Isotropic Systems Phase Transition project.
  
  This dataset is the output of `code/preprocessing.py` (Task T005).
type: object
required:
  - metadata
  - data
properties:
  metadata:
    type: object
    description: Global dataset metadata and provenance information.
    required:
      - version
      - generated_by
      - generation_timestamp
      - source_models
      - lattice_sizes
      - temperature_range
      - total_samples
      - normalization_method
    properties:
      version:
        type: string
        pattern: '^\\d+\\.\\d+\\.\\d+$'
        description: Semantic version of the dataset schema (e.g., "1.0.0").
      generated_by:
        type: string
        const: "code/preprocessing.py"
        description: The script that generated this dataset.
      generation_timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of dataset generation.
      source_models:
        type: array
        items:
          type: string
          enum:
            - "J1-J2 Heisenberg"
            - "XY"
        description: List of physical models included in this dataset.
      lattice_sizes:
        type: array
        items:
          type: integer
          minimum: 1
        description: List of lattice sizes (L) included (e.g., [16, 24]).
      temperature_range:
        type: object
        required:
          - min
          - max
        properties:
          min:
            type: number
            minimum: 0.0
          max:
            type: number
            minimum: 0.0
        description: The range of temperatures covered by the dataset.
      total_samples:
        type: integer
        minimum: 1
        description: Total number of spin configurations in the dataset.
      normalization_method:
        type: string
        const: "unit_length"
        description: The normalization method applied to spin vectors.
      seed:
        type: integer
        description: Random seed used for generation (if applicable).
      checksum:
        type: string
        pattern: '^[a-fA-F0-9]{64}$'
        description: SHA-256 checksum of the data payload for integrity verification.
  data:
    type: array
    description: List of spin configuration records.
    items:
      type: object
      required:
        - config_id
        - model_type
        - lattice_size
        - temperature
        - spins
        - split
      properties:
        config_id:
          type: string
          pattern: '^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$'
          description: Unique UUID for the configuration.
        model_type:
          type: string
          enum:
            - "J1-J2 Heisenberg"
            - "XY"
          description: The physical model this configuration belongs to.
        lattice_size:
          type: integer
          minimum: 1
          description: The lattice size L (e.g., 16 or 24).
        temperature:
          type: number
          minimum: 0.0
          description: The temperature T at which this configuration was sampled.
        spins:
          type: array
          description: |
            Spin vector data. Shape: [3, L, L] for Heisenberg (3 components),
            or [2, L, L] for XY (2 components). Values are normalized to unit length.
            Stored as a flat list of floats for JSON compatibility, or as nested arrays.
          items:
            type: number
          minItems: 2  # Minimum for XY (2*L*L)
        split:
          type: string
          enum:
            - "train"
            - "validation"
            - "test"
          description: The dataset split assignment.
        sampling_index:
          type: integer
          minimum: 0
          description: The index in the original Monte Carlo chain (for autocorrelation analysis).
        thinning_factor:
          type: integer
          minimum: 1
          description: The factor by which the chain was thinned (>= 2 * tau_int).
additionalProperties: false