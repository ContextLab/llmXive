$schema: http://json-schema.org/draft-07/schema#
title: Spin Configuration Schema
description: |
  Defines the structure, data types, and constraints for raw and processed 
  spin configurations generated by the Monte Carlo simulation pipeline 
  (T004) and preprocessed by the data pipeline (T005).
  
  This schema ensures consistency across the J1-J2 Heisenberg and XY models,
  supporting lattice sizes L=16 and L=24, and temperature ranges T=0.1-3.0.
  
  It enforces the normalization constraints (unit length) and dimensional 
  requirements (batch, channels, height, width) required for downstream 
  VAE training (US2) and latent analysis (US3).
type: object
required:
  - metadata
  - data
  - statistics
properties:
  metadata:
    type: object
    description: Contextual information about the simulation run.
    required:
      - model_type
      - lattice_size
      - temperature
      - coupling_constants
      - seed
      - timestamp
      - version
    properties:
      model_type:
        type: string
        description: The physical model used for generation.
        enum:
          - J1-J2 Heisenberg
          - XY
      lattice_size:
        type: integer
        description: The linear dimension L of the L x L lattice.
        minimum: 1
        enum:
          - 16
          - 24
      temperature:
        type: number
        description: The simulation temperature T in reduced units.
        minimum: 0.0
        maximum: 10.0
      coupling_constants:
        type: object
        description: Coupling parameters specific to the model.
        properties:
          J1:
            type: number
            description: Nearest-neighbor coupling strength.
          J2:
            type: number
            description: Next-nearest-neighbor coupling strength.
            minimum: 0.0
        required:
          - J1
      seed:
        type: integer
        description: The random seed used for reproducibility.
        minimum: 0
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of data generation.
      version:
        type: string
        description: Schema version or pipeline version identifier.
        pattern: '^\d+\.\d+\.\d+$'
  data:
    type: object
    description: The actual spin configuration tensor.
    required:
      - shape
      - dtype
      - values
    properties:
      shape:
        type: array
        description: Dimensions of the data array [batch, channels, L, L].
        items:
          type: integer
          minimum: 1
        minItems: 4
        maxItems: 4
      dtype:
        type: string
        description: Data type of the values.
        enum:
          - float32
          - float64
      values:
        type: array
        description: Flattened or nested representation of spin vectors.
        items:
          type: number
        minItems: 1
  statistics:
    type: object
    description: Precomputed statistics for validation.
    required:
      - total_norm
      - mean_magnetization
      - is_normalized
    properties:
      total_norm:
        type: number
        description: Sum of squared norms of all spin vectors.
        minimum: 0.0
      mean_magnetization:
        type: number
        description: Average magnetization magnitude of the configuration.
        minimum: 0.0
        maximum: 1.0
      is_normalized:
        type: boolean
        description: Flag indicating if all spin vectors are unit length.
        const: true
additionalProperties: false
examples:
  - metadata:
      model_type: "J1-J2 Heisenberg"
      lattice_size: 16
      temperature: 2.5
      coupling_constants:
        J1: 1.0
        J2: 0.5
      seed: 42
      timestamp: "2023-10-27T10:00:00Z"
      version: "1.0.0"
    data:
      shape: [1000, 3, 16, 16]
      dtype: "float32"
      values: []
    statistics:
      total_norm: 1000.0
      mean_magnetization: 0.12
      is_normalized: true