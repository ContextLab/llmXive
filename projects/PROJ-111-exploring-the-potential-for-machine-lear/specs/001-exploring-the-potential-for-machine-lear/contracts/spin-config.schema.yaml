$schema: http://json-schema.org/draft-07/schema#
title: SpinConfiguration
description: Schema for raw and preprocessed spin configuration data.
type: object
properties:
  metadata:
    type: object
    properties:
      model_type:
        type: string
        enum: ["Heisenberg", "XY"]
      lattice_size:
        type: integer
        minimum: 1
      temperature:
        type: number
        minimum: 0.0
      seed:
        type: integer
    required:
      - model_type
      - lattice_size
      - temperature
      - seed
  data:
    type: object
    properties:
      shape:
        type: array
        items:
          type: integer
        description: "Expected shape [channels, L, L] or [batch, channels, L, L]"
      dtype:
        type: string
        const: "float32"
      checksum:
        type: string
        description: "SHA256 checksum of the binary data"
    required:
      - shape
      - dtype
      - checksum
required:
  - metadata
  - data
additionalProperties: false
