$schema: http://json-schema.org/draft-07/schema#
title: Model Checkpoint Schema
description: |
  Defines the structure, types, and constraints for saved model checkpoints
  in the llmXive phase transition detection pipeline. This schema ensures
  reproducibility and validity of model states saved during training.
type: object
required:
  - checkpoint_id
  - model_type
  - model_config
  - training_state
  - performance_metrics
  - data_checksums
  - timestamp
  - git_commit_hash
additionalProperties: false
properties:
  checkpoint_id:
    type: string
    description: Unique identifier for this checkpoint (UUID or hash)
    pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
  model_type:
    type: string
    description: Type of model architecture used
    enum:
      - VAE
      - CNN
      - Transformer
    default: VAE
  model_config:
    type: object
    description: Configuration parameters used to instantiate the model
    required:
      - input_shape
      - latent_dim
      - encoder_layers
      - decoder_layers
      - hidden_dim
    additionalProperties: true
    properties:
      input_shape:
        type: array
        description: Shape of input data (batch, channels, height, width)
        items:
          type: integer
        minItems: 4
        maxItems: 4
      latent_dim:
        type: integer
        description: Dimensionality of the latent space
        minimum: 1
        default: 10
      encoder_layers:
        type: array
        description: List of encoder layer configurations
        items:
          type: object
          additionalProperties: true
      decoder_layers:
        type: array
        description: List of decoder layer configurations
        items:
          type: object
          additionalProperties: true
      hidden_dim:
        type: integer
        description: Hidden dimension size for intermediate layers
        minimum: 1
  training_state:
    type: object
    description: Current state of the training process
    required:
      - epoch
      - global_step
      - optimizer_state
      - loss_history
    additionalProperties: false
    properties:
      epoch:
        type: integer
        description: Current epoch number (0-indexed)
        minimum: 0
      global_step:
        type: integer
        description: Total number of training steps performed
        minimum: 0
      optimizer_state:
        type: object
        description: Serialized optimizer state dictionary
        additionalProperties: true
      loss_history:
        type: array
        description: List of loss values per epoch
        items:
          type: number
        minItems: 1
      learning_rate:
        type: number
        description: Current learning rate
        minimum: 0
        exclusiveMinimum: true
  performance_metrics:
    type: object
    description: Key performance indicators at the time of saving
    required:
      - reconstruction_loss
      - kl_divergence
      - total_loss
      - val_loss
    additionalProperties: true
    properties:
      reconstruction_loss:
        type: number
        description: Mean reconstruction loss (MSE)
        minimum: 0
      kl_divergence:
        type: number
        description: Mean KL divergence term
        minimum: 0
      total_loss:
        type: number
        description: Total VAE loss (reconstruction + KL)
        minimum: 0
      val_loss:
        type: number
        description: Validation loss at this checkpoint
        minimum: 0
      best_val_loss:
        type: number
        description: Best validation loss achieved so far
        minimum: 0
      epoch_best_val:
        type: integer
        description: Epoch number where best validation loss was achieved
        minimum: 0
  data_checksums:
    type: object
    description: Checksums of data used for training to ensure reproducibility
    required:
      - raw_data_hash
      - processed_data_hash
    additionalProperties: false
    properties:
      raw_data_hash:
        type: string
        description: SHA-256 checksum of raw input data
        pattern: "^[a-f0-9]{64}$"
      processed_data_hash:
        type: string
        description: SHA-256 checksum of processed input data
        pattern: "^[a-f0-9]{64}$"
  timestamp:
    type: string
    description: ISO 8601 timestamp of when the checkpoint was saved
    format: date-time
  git_commit_hash:
    type: string
    description: Git commit hash of the code version used to generate this checkpoint
    pattern: "^[a-f0-9]{40}$"
  hardware_info:
    type: object
    description: Hardware information for reproducibility
    additionalProperties: true
    properties:
      device:
        type: string
        description: Device used for training (e.g., cpu, cuda:0)
      device_count:
        type: integer
        description: Number of devices used
        minimum: 1
      pytorch_version:
        type: string
        description: PyTorch version string
      python_version:
        type: string
        description: Python version string
  file_metadata:
    type: object
    description: Metadata about the checkpoint file itself
    additionalProperties: false
    properties:
      file_size_bytes:
        type: integer
        description: Size of the checkpoint file in bytes
        minimum: 0
      file_path:
        type: string
        description: Relative path to the checkpoint file from project root
      checksum_sha256:
        type: string
        description: SHA-256 checksum of the checkpoint file
        pattern: "^[a-f0-9]{64}$"
  notes:
    type: string
    description: Optional human-readable notes about this checkpoint
    maxLength: 1000