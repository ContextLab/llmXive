$schema: http://json-schema.org/draft-07/schema#
title: Latent Output Schema
description: >
  Defines the structure, types, and constraints for latent representations
  generated by the VAE encoder for spin configurations. This schema is used
  to validate the output of the encoding process before analysis.
type: object
required:
  - metadata
  - latent_means
  - latent_log_variances
  - temperatures
  - lattice_sizes
  - model_info
properties:
  metadata:
    type: object
    description: Global metadata about the latent output generation.
    required:
      - generated_at
      - encoding_model_path
      - input_dataset_path
      - total_samples
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the encoding was performed.
      encoding_model_path:
        type: string
        description: Relative path to the VAE model checkpoint used for encoding.
      input_dataset_path:
        type: string
        description: Relative path to the processed input dataset.
      total_samples:
        type: integer
        minimum: 1
        description: Total number of spin configurations encoded.

  latent_means:
    type: array
    description: >
      Array of latent mean vectors (mu) for each sample.
      Shape: [N, latent_dim] where N is total_samples and latent_dim is 10.
    items:
      type: array
      items:
        type: number
        format: float
      minItems: 10
      maxItems: 10
      description: A single latent mean vector of dimension 10.
    minItems: 1
    description: List of latent mean vectors for all samples.

  latent_log_variances:
    type: array
    description: >
      Array of latent log-variance vectors (log_var) for each sample.
      Shape: [N, latent_dim] where N is total_samples and latent_dim is 10.
    items:
      type: array
      items:
        type: number
        format: float
      minItems: 10
      maxItems: 10
      description: A single latent log-variance vector of dimension 10.
    minItems: 1
    description: List of latent log-variance vectors for all samples.

  temperatures:
    type: array
    description: >
      Temperature value associated with each sample in the latent_means/log_variances arrays.
      Must have the same length as latent_means.
    items:
      type: number
      format: float
      minimum: 0.0
    minItems: 1
    description: List of temperature values corresponding to each sample.

  lattice_sizes:
    type: array
    description: >
      Lattice size (L) associated with each sample.
      Must have the same length as latent_means.
      Expected values: 16 or 24.
    items:
      type: integer
      enum:
        - 16
        - 24
    minItems: 1
    description: List of lattice sizes corresponding to each sample.

  model_info:
    type: object
    description: Information about the VAE model architecture and state.
    required:
      - latent_dimension
      - encoder_type
      - decoder_type
    properties:
      latent_dimension:
        type: integer
        const: 10
        description: Dimensionality of the latent space.
      encoder_type:
        type: string
        description: Type of encoder used (e.g., "ConvVAE").
      decoder_type:
        type: string
        description: Type of decoder used (e.g., "DeconvVAE").
      checkpoint_hash:
        type: string
        description: SHA-256 hash of the model checkpoint file used.
        minLength: 64
        maxLength: 64

  statistics:
    type: object
    description: >
      Optional aggregate statistics computed over the latent space per temperature bin.
      Used for quick validation without re-processing raw arrays.
    properties:
      per_temperature_variance:
        type: array
        description: Total variance (sum of variances across latent dims) for each temperature bin.
        items:
          type: object
          required:
            - temperature
            - total_variance
            - sample_count
          properties:
            temperature:
              type: number
              format: float
            total_variance:
              type: number
              format: float
              minimum: 0.0
            sample_count:
              type: integer
              minimum: 1
      global_mean_norm:
        type: number
        format: float
        minimum: 0.0
        description: Global mean of the L2 norm of latent means.

additionalProperties: false