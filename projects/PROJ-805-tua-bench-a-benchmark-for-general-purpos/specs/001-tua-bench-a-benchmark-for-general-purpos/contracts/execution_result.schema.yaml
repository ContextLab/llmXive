$schema: "http://json-schema.org/draft-07/schema#"
title: "ExecutionResult"
type: "object"
properties:
  task_id:
    type: "string"
    description: "Unique identifier for the task (e.g., '000-count-nuclei')"
  family:
    type: "string"
    description: "Task family category (e.g., 'file-manipulation')"
  status:
    type: "string"
    enum:
      - "pass"
      - "fail"
      - "timeout"
      - "oom"
      - "error"
    description: "Final execution status"
  execution_time_seconds:
    type: "number"
    description: "Time taken to execute the task in seconds"
  error_message:
    type: ["string", "null"]
    description: "Detailed error message if status is not 'pass' (e.g., 'File Missing', 'Value Mismatch', 'Timeout', 'OOM', 'Network Timeout')"
  verification_score:
    type: ["number", "null"]
    description: "Score from verification script (0.0 or 1.0)"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of execution"
required:
  - task_id
  - family
  - status
  - execution_time_seconds
  - timestamp
additionalProperties: false