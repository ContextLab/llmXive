  reviewer: spec_coverage
  round: 1
  severity: requirement
  text: FR-007 requires logging specific failure reasons (e.g., 'File Missing', 'Value
    Mismatch') to stderr. The plan.md and data-model.md define 'error_message' in
    ExecutionResult but do not explicitly mandate the parsing of the verification
    script's output to extract these specific semantic reasons. The plan assumes the
    orchestrator can generate these specific strings without defining the logic to
    parse them from the vendored `verify.py` output, risking a silent failure to meet
    the 'specific reason' requirement.
