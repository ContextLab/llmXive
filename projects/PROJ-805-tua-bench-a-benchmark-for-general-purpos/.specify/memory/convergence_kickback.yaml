- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: methodology-0be0d74d
  location: research.md:Statistical & Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan explicitly states the subset selection (~5-10 tasks) is a 'feasibility
    compromise, not a statistical sampling method' and that the success rate is a
    'proxy' for the full suite. This methodology cannot support the spec's claim (US-3,
    SC-005) to 'confirm the reproduction matches the published findings' regarding
    the benchmark's overall success rate. A non-representative convenience sample
    cannot validate a population-level metric; the approach conflates 'pipeline feasibility'
    with 'benchmark validity'.
- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: methodology-326fa112
  location: plan.md:Summary
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan aims to 'compare execution metrics against the paper's claims' using
    a subset of 5-10 tasks. If the paper claims a specific success rate (e.g., 85%)
    for the full 120-task suite, a 5-task subset lacks the statistical power to detect
    deviations from that claim with any confidence, rendering the comparison methodologically
    unsound for validation purposes.
- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: methodology-66ab418e
  location: research.md:Dataset Strategy
  reviewer: methodology
  round: 1
  severity: writing
  text: The plan excludes 'live-web' tasks to ensure reproducibility. While valid
    for CI stability, the methodology must explicitly define how this exclusion impacts
    the validity of the reproduction claim. If the paper's success rate includes these
    tasks, the reproduction is comparing a filtered subset against an unfiltered claim,
    introducing a selection bias that invalidates the direct comparison.
