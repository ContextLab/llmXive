- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: scientific_soundness-dd98bd1c
  location: plan.md:Technical Context
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: 'The plan defines validation as ''comparing execution metrics against the
    paper''s claims'' but fails to define the ground-truth for the ''success rate''
    metric. If the plan validates the benchmark''s *own* scoring logic (verify.py)
    against the benchmark''s *own* reference outputs, the result is tautological:
    the score will always be 1.0 by definition. To scientifically validate the benchmark,
    the plan must specify an independent ground-truth (e.g., human-annotated solutions
    or a separate oracle) to measure the *accuracy* of the automated scoring, not
    just its *consistency*.'
- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: scientific_soundness-f7656d57
  location: research.md:Statistical & Methodological Rigor
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan treats the 'success rate' of the subset as a proxy for the full suite
    without addressing selection bias. Selecting tasks based on 'feasibility' (CPU-bound,
    no network) creates a non-representative sample. If the paper's claimed success
    rate includes network-dependent tasks that are now excluded, the validation will
    be comparing apples to oranges. The plan must explicitly state that the validation
    target is 'feasibility of execution' rather than 'reproduction of the paper's
    success rate metric' to avoid a category error.
- artifact: projects/PROJ-805-tua-bench-a-benchmark-for-general-purpos/specs/001-tua-bench-a-benchmark-for-general-purpos/plan.md
  id: scientific_soundness-c124aa90
  location: spec.md:Success Criteria SC-002
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: "SC-002 requires '\u2265 95% accuracy' on control cases (known pass/fail inputs)\
    \ to validate the scoring protocol. However, the 'known pass' input is the reference\
    \ solution itself. Running the verifier against the reference solution is a unit\
    \ test of the verifier's logic, not a validation of the benchmark's scientific\
    \ validity. This is a circular validation: 'The verifier works because it returns\
    \ 1.0 on the input it was designed to accept.' The plan needs an independent oracle\
    \ or human verification step to break this circle."
