# Dataset Schema for Plant Drought Tolerance Study
# Defines the structure and validation rules for input datasets

$schema: "http://json-schema.org/draft-07/schema#"
title: "Plant Drought Tolerance Dataset Schema"
type: "object"
required:
  - species
  - traits
properties:
  species:
    type: "array"
    items:
      type: "object"
      required:
        - species_id
        - species_name
      properties:
        species_id:
          type: "string"
          pattern: "^[a-zA-Z0-9_-]+$"
        species_name:
          type: "string"
          minLength: 1
  traits:
    type: "array"
    items:
      type: "object"
      required:
        - trait_name
        - trait_type
      properties:
        trait_name:
          type: "string"
        trait_type:
          type: "string"
          enum:
            - "rsa_metric"
            - "physiological"
            - "environmental"
        values:
          type: "array"
          items:
            type: "number"
            minimum: 0
additionalProperties: false
