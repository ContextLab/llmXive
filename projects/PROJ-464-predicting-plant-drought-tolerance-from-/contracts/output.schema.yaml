# Output Schema for Plant Drought Tolerance Prediction Project
# Defines the structure and validation rules for all generated outputs
# Corresponds to T007: Base data validation schema checks

version: "1.0.0"
description: "Schema for validating output files generated by the pipeline"

outputs:
  - name: "power_analysis_report"
    type: "yaml"
    path: "state/power_analysis_report.yaml"
    description: "Power analysis results and sample size requirements"
    structure:
      - key: "effect_size"
        type: "float"
        required: true
        validation:
          - check: "positive"
      - key: "alpha"
        type: "float"
        required: true
        validation:
          - check: "between"
          - min: 0.0
          - max: 1.0
      - key: "power"
        type: "float"
        required: true
        validation:
          - check: "between"
          - min: 0.0
          - max: 1.0
      - key: "predictors"
        type: "integer"
        required: true
        validation:
          - check: "positive"
      - key: "required_sample_size"
        type: "integer"
        required: true
        validation:
          - check: "positive"
      - key: "available_species"
        type: "integer"
        required: true
        validation:
          - check: "non_negative"
      - key: "status"
        type: "string"
        required: true
        allowed_values: ["sufficient", "insufficient", "error"]
      - key: "message"
        type: "string"
        required: false

  - name: "model_results"
    type: "csv"
    path: "data/derived/model_results.csv"
    description: "Statistical model results with coefficients and metrics"
    columns:
      - name: "model_type"
        type: "string"
        required: true
      - name: "predictor"
        type: "string"
        required: true
      - name: "coefficient"
        type: "float"
        required: true
      - name: "std_error"
        type: "float"
        required: true
      - name: "p_value"
        type: "float"
        required: true
      - name: "r_squared"
        type: "float"
        required: true
      - name: "adj_p_value"
        type: "float"
        required: false
    validation:
      - check: "no_null_coefficients"
        message: "All coefficients must be present"
      - check: "valid_p_values"
        message: "P-values must be between 0 and 1"
      - check: "valid_r_squared"
        message: "R² must be between 0 and 1"

  - name: "sensitivity_sweep_results"
    type: "csv"
    path: "data/derived/sensitivity_sweep_results.csv"
    description: "Results of threshold sensitivity analysis"
    columns:
      - name: "threshold"
        type: "float"
        required: true
        validation:
          - check: "between"
          - min: 0.0
          - max: 1.0
      - name: "accuracy"
        type: "float"
        required: true
      - name: "precision"
        type: "float"
        required: true
      - name: "recall"
        type: "float"
        required: true
      - name: "f1_score"
        type: "float"
        required: true
      - name: "false_positive_rate"
        type: "float"
        required: true
      - name: "false_negative_rate"
        type: "float"
        required: true
    validation:
      - check: "no_null_metrics"
        message: "All metrics must be present for each threshold"
      - check: "valid_probabilities"
        columns: ["accuracy", "precision", "recall", "f1_score", "false_positive_rate", "false_negative_rate"]
        message: "All metric values must be between 0 and 1"

  - name: "vif_compliance_check"
    type: "yaml"
    path: "state/vif_compliance_check.yaml"
    description: "Variance Inflation Factor compliance status"
    structure:
      - key: "vif_threshold"
        type: "float"
        required: true
        default: 5.0
      - key: "max_vif_observed"
        type: "float"
        required: true
      - key: "variables_flagged"
        type: "list"
        required: true
      - key: "compliance_status"
        type: "string"
        required: true
        allowed_values: ["compliant", "non_compliant", "warning"]
      - key: "suppression_applied"
        type: "boolean"
        required: true
      - key: "message"
        type: "string"
        required: false

  - name: "proxy_detection"
    type: "yaml"
    path: "state/proxy_detection.yaml"
    description: "Detection status of independent tolerance proxies"
    structure:
      - key: "has_proxy"
        type: "boolean"
        required: true
      - key: "proxy_variable"
        type: "string"
        required: false
      - key: "classification_skipped"
        type: "boolean"
        required: true
      - key: "reason"
        type: "string"
        required: false

  - name: "sensitivity_report"
    type: "markdown"
    path: "data/derived/sensitivity_report.md"
    description: "Human-readable sensitivity analysis report"
    validation:
      - check: "file_exists"
        message: "Sensitivity report must be generated"
      - check: "contains_threshold_info"
        message: "Report must include threshold justification"

  - name: "classification_status"
    type: "markdown"
    path: "data/derived/classification_status.md"
    description: "Status of classification model training"
    validation:
      - check: "file_exists"
        message: "Classification status file must be generated"
      - check: "contains_reasoning"
        message: "File must explain why classification was built or skipped"

  - name: "figures"
    type: "directory"
    path: "results/figures"
    description: "Generated visualization figures"
    validation:
      - check: "directory_exists"
        message: "Figures directory must exist"
      - check: "contains_expected_plots"
        expected_files:
          - "sensitivity_curve.png"
        message: "Required plots must be generated when applicable"

metadata:
  schema_version: "1.0.0"
  created_for: "PROJ-464-predicting-plant-drought-tolerance-from"
  task_id: "T007"
  validation_library: "pydantic"