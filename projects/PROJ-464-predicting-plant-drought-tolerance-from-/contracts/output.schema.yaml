# Output Schema for Plant Drought Tolerance Study
# Defines the structure and validation rules for output files

$schema: "http://json-schema.org/draft-07/schema#"
title: "Plant Drought Tolerance Output Schema"
type: "object"
required:
  - results
properties:
  results:
    type: "array"
    items:
      type: "object"
      required:
        - model_type
        - metric_name
        - metric_value
      properties:
        model_type:
          type: "string"
          enum:
            - "OLS"
            - "Ridge"
            - "Lasso"
            - "RandomForest"
            - "PGLS"
        metric_name:
          type: "string"
        metric_value:
          type: "number"
        confidence_interval:
          type: "object"
          properties:
            lower:
              type: "number"
            upper:
              type: "number"
        p_value:
          type: "number"
          minimum: 0
          maximum: 1
additionalProperties: false