$schema: "http://json-schema.org/draft-07/schema#"
title: "RSA Metrics Schema"
description: "Schema for extracted Root System Architecture metrics."
type: "object"
properties:
  image_id:
    type: "string"
    description: "Unique identifier for the root image."
  file_path:
    type: "string"
    description: "Path to the raw image file."
  species_name:
    type: "string"
    description: "Scientific name of the plant species."
  source_dataset:
    type: "string"
    enum:
      - "MGB3"
      - "NPPN"
    description: "Source dataset name."
  depth_px:
    type: "number"
    description: "Root depth in pixels."
    minimum: 0
  branching_density:
    type: "number"
    description: "Number of branches per unit length."
    minimum: 0
  surface_area_px:
    type: "number"
    description: "Surface area in pixels."
    minimum: 0
  total_length_px:
    type: "number"
    description: "Total root length in pixels."
    minimum: 0
  extraction_status:
    type: "string"
    enum:
      - "success"
      - "failed"
    description: "Status of the extraction process."
required:
  - image_id
  - file_path
  - species_name
  - source_dataset
  - depth_px
  - branching_density
  - surface_area_px
  - total_length_px
  - extraction_status
