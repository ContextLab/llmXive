[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predicting-solubility-in-mixed-solvents"
version = "0.1.0"
description = "Machine learning pipeline for predicting solubility in mixed solvents"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "scikit-learn",
    "xgboost",
    "rdkit",
    "solv",
    "shap",
    "psutil",
    "pyyaml",
    "pytest",
    "flake8",
]

[tool.setuptools]
packages = ["code", "code.utils"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.isort]
profile = "black"
line_length = 88