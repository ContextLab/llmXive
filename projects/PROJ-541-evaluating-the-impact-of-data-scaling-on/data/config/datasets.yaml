# Dataset Configuration for Real-World Validation (US4)
# This file lists verified datasets from UCI and OpenML to be used in the pipeline.
# Format: ID, Source, Expected Size (approximate rows), Description

datasets:
  - id: "uciml/iris"
    source: "UCI Machine Learning Repository"
    expected_size: 150
    description: "Classic iris flower classification dataset with 4 features."
    type: "classification"
    
  - id: "uciml/wine"
    source: "UCI Machine Learning Repository"
    expected_size: 178
    description: "Chemical analysis of wines grown in the same region of Italy."
    type: "classification"
    
