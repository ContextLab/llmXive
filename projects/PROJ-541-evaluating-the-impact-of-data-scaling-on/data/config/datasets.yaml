    source: "UCI Machine Learning Repository"
    expected_size: 699
    description: "Breast cancer diagnosis data with benign/malignant labels."
    type: "classification"
    
  - id: "uciml/heart-statlog"
    source: "UCI Machine Learning Repository"
    expected_size: 270
    description: "Heart disease diagnosis data from the Statlog project."
    type: "classification"
    
  - id: "uciml/ionosphere"
