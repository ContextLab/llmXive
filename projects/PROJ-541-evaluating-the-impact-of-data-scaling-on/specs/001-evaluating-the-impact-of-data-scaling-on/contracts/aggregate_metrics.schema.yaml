$schema: "http://json-schema.org/draft-07/schema#"
title: "AggregateMetrics"
description: "Summary statistics for a simulation configuration."
type: "object"
properties:
  config_id:
    type: "string"
    description: "Foreign key to SimulationConfig."
  total_iterations:
    type: "integer"
    minimum: 1
    description: "Total number of iterations run."
  rejected_count:
    type: "integer"
    minimum: 0
    description: "Number of times null hypothesis was rejected."
  empirical_error_rate:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Proportion of rejections."
  confidence_interval_lower:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Lower bound of 95% CI."
  confidence_interval_upper:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Upper bound of 95% CI."
  nominal_alpha:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Target alpha level."
  deviation:
    type: "number"
    description: "Difference between empirical and nominal error rate."
required:
  - config_id
  - total_iterations
  - rejected_count
  - empirical_error_rate
  - confidence_interval_lower
  - confidence_interval_upper
  - nominal_alpha
  - deviation
additionalProperties: false
