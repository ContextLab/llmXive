$schema: "http://json-schema.org/draft-07/schema#"
title: "MeasurementRecord"
description: "Schema for a single cognitive or affective measurement record."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique record identifier."
  participant_id:
    type: "string"
    pattern: "^P\\d{3}$"
    description: "Pseudonymous participant ID."
  phase:
    type: "string"
    enum:
      - "baseline"
      - "post"
    description: "Study phase."
  metric_type:
    type: "string"
    enum:
      - "SART"
      - "Ospan"
      - "PSS-10"
      - "PANAS-PA"
      - "PANAS-NA"
    description: "Type of metric recorded."
  value:
    type: "number"
    description: "Raw score value."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the measurement."
  quality_flag:
    type: "string"
    enum:
      - "valid"
      - "low_attention"
      - "missing"
    description: "Data quality flag."
required:
  - "id"
  - "participant_id"
  - "phase"
  - "metric_type"
  - "value"
  - "timestamp"
  - "quality_flag"
additionalProperties: false