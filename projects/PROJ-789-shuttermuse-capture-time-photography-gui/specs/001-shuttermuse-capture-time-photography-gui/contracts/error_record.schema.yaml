$schema: "http://json-schema.org/draft-07/schema#"
title: "Error Record Schema"
description: "Schema for a single error record linking an image sample, model output, and error category."
type: "object"
properties:
  record_id:
    type: "string"
    description: "Unique identifier for the error record."
  sample_id:
    type: "string"
    description: "Foreign key to the Image Sample."
  model_name:
    type: "string"
    description: "Name of the MLLM used (LLaVA-1.6, Qwen-VL, GPT-4V)."
    enum:
      - "LLaVA-1.6"
      - "Qwen-VL"
      - "GPT-4V"
  error_category:
    type: "string"
    description: "Categorized error type."
    enum:
      - "Hallucinated Object"
      - "Incorrect Rule Application"
      - "Missing Advice"
      - "Correct"
      - "Parsing Failure"
      - "Potential Reasoning Error"
  confidence_score:
    type: "number"
    description: "Confidence score of the inference or categorization (0.0 to 1.0)."
    minimum: 0.0
    maximum: 1.0
  reasoning_flag:
    type: "boolean"
    description: "True if the error is identified as reasoning‑based (via counterfactual analysis)."
  prompt_type:
    type: "string"
    description: "Type of prompt ? ? ?"
    enum:
      - "Standard"
      - "Counterfactual"
required:
  "record_id"
  "sample_id"
  "model_name"
  "error_category"
  "reasoning_flag"
additionalProperties: false