$schema: http://json-schema.org/draft-07/schema#
title: Evaluation Result Schema
description: >
  Schema for the output of a single code generation evaluation run.
  Captures the generated code, execution status, metrics, and resource usage.
type: object
required:
  - task_id
  - strategy
  - seed
  - sample_index
  - status
  - generated_code
properties:
  task_id:
    type: integer
    description: The MBPP task ID being evaluated.
  strategy:
    type: string
    enum:
      - zero-shot
      - few-shot
      - chain-of-thought
    description: The prompting strategy used for generation.
  seed:
    type: integer
    description: The random seed used for reproducibility.
  sample_index:
    type: integer
    minimum: 0
    description: Index of the sample within the k=10 generation set (0-9).
  status:
    type: string
    enum:
      - success
      - failed
      - timeout
      - parse_error
      - runtime_error
      - sandbox_error
    description: Outcome of the code execution.
  generated_code:
    type: string
    description: The full code string generated by the model.
  execution_time_ms:
    type: ["number", "null"]
    description: Time taken to execute the code in milliseconds. Null if execution did not complete.
  memory_peak_mb:
    type: ["number", "null"]
    description: Peak memory usage during execution in MB. Null if unavailable.
  error_message:
    type: ["string", "null"]
    description: Error message if the status is not 'success'.
  test_results:
    type: ["array", "null"]
    description: List of individual test outcomes if execution reached the testing phase.
    items:
      type: object
      required:
        - test_index
        - passed
      properties:
        test_index:
          type: integer
        passed:
          type: boolean
        error:
          type: ["string", "null"]
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the evaluation occurred.
  prompt_tokens:
    type: ["integer", "null"]
    description: Number of tokens in the input prompt.
  completion_tokens:
    type: ["integer", "null"]
    description: Number of tokens in the generated completion.
additionalProperties: false