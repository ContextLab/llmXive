$schema: "http://json-schema.org/draft-07/schema#"
title: "EmbFilter Reproduction Report Schema"
type: object
required:
  - run_id
  - model_name
  - dataset_name
  - sample_size
  - baseline_score
  - filtered_score
  - delta
  - methodology_note
  - parameters
  - timestamp
properties:
  run_id:
    type: string
    description: "Unique identifier for the execution run."
  model_name:
    type: string
    description: "Name of the LLM used for embeddings."
  dataset_name:
    type: string
    description: "Name of the benchmark dataset used."
  sample_size:
    type: integer
    description: "Number of samples processed."
    minimum: 1
  baseline_score:
    type: number
    description: "Spearman correlation of baseline embeddings."
  filtered_score:
    type: number
    description: "Spearman correlation of filtered embeddings."
  delta:
    type: number
    description: "Difference (filtered_score - baseline_score)."
  improvement_claimed:
    type: boolean
    description: "True if the filtered score meets the improvement criteria."
  methodology_note:
    type: string
    description: "Explicit statement of 'Associational Analysis' to prevent causal claims."
    pattern: "Associational|Observational"
  parameters:
    type: object
    description: "Log of frequency threshold and other hyperparameters."
    properties:
      freq_threshold:
        type: number
        description: "The frequency threshold used for filtering."
      dim_reduction:
        type: integer
        description: "Target dimensionality if reduced."
    required:
      - freq_threshold
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the run."
additionalProperties: false
description: "Schema for the JSON report generated by the EmbFilter reproduction pipeline."
