  action_items:
  - id: 3b151a9a66b3
    text: The proof in Appendix Section 8 incorrectly states that the projection matrix
      V_tau V_tau^T is identity. This is mathematically false when dimensionality
      reduction is applied (V_tau is a subset of columns). While Equation 1 holds,
      the justification misrepresents the transformation as an isometry on the full
      space. Correct the text to accurately describe the projection property.
    severity: writing
