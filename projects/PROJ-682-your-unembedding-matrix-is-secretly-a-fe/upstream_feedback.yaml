    text: The mathematical proof in Appendix sec:proof incorrectly claims V_tau *
      V_tau^T is the identity matrix. For dimensionality reduction (k < d), this is
      a projection matrix, not identity. This invalidates the claim that the transformation
      preserves the original norm.
