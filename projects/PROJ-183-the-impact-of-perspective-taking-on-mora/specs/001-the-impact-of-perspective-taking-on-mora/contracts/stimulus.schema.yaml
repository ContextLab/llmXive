$schema: "http://json-schema.org/draft-07/schema#"
title: "Stimulus Schema"
description: "Schema for a single experimental stimulus (post + instruction)."
type: "object"
required:
  - stimulus_id
  - post_text
  - topic
  - instruction_type
  - instruction_text
properties:
  stimulus_id:
    type: "string"
    description: "Unique identifier for the stimulus."
    pattern: "^S-[0-9]{3}$"
  post_text:
    type: "string"
    description: "The original Twitter post text."
    minLength: 1
  topic:
    type: "string"
    description: "The topic category of the post."
    enum:
      - "climate"
      - "immigration"
  vader_sentiment:
    type: "number"
    description: "Automated sentiment score from VADER."
    minimum: -1.0
    maximum: 1.0
    nullable: true
  intensity_bin:
    type: "string"
    description: "Stratification bin based on sentiment."
    enum:
      - "moderate"
      - "high"
  instruction_type:
    type: "string"
    description: "Type of experimental instruction."
    enum:
      - "perspective_taking"
      - "control"
  instruction_text:
    type: "string"
    description: "The full text of the instruction prompt."
    minLength: 1
  created_at:
    type: "string"
    format: "date-time"
    description: "Timestamp of stimulus creation."