$schema: "http://json-schema.org/draft-07/schema#"
title: "Stimuli Schema"
description: "Schema for generated vignette stimuli and their validation metrics."
type: "object"
properties:
  stimulus_id:
    type: "string"
    description: "Unique identifier for the stimulus variant."
  framing:
    type: "string"
    enum:
      - "partner"
      - "tool"
    description: "The narrative framing condition."
  text_content:
    type: "string"
    description: "The full text of the vignette."
  readability_score:
    type: "number"
    description: "Flesch-Kincaid Grade Level score."
  sentiment_score:
    type: "number"
    description: "VADER Compound sentiment score."
required:
  - stimulus_id
  - framing
  - text_content
  - readability_score
  - sentiment_score
additionalProperties: false
