name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Resource constraints as per SC-005 (approx 7GB RAM limit enforced via runner selection)
    # CPU-only execution is default for ubuntu-latest runners without GPU hardware
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found"
            exit 1
          fi

      - name: Run Linting
        run: |
          flake8 code/ --max-line-length=120 --ignore=E501,W503
          # Optional: black --check code/

      - name: Run Unit Tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run Extraction Pipeline (Sample)
        run: |
          python code/main.py extract --sample
          if [ ! -f data/processed/perspective_features.json ]; then
            echo "Error: Extraction did not produce expected output"
            exit 1
          fi

      - name: Verify Data Artifacts
        run: |
          python code/utils.py check-artifact data/processed/perspective_features.json

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Upload Code Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14