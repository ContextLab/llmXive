$schema: "http://json-schema.org/draft-07/schema#"
title: "Failure Trajectory Schema"
description: "Schema for ALFWorld failure trajectories with ground-truth validation (Independent Samples)"
type: "object"
properties:
  trajectory_id:
    type: "string"
    description: "Unique identifier (UUID v4)"
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
  task_id:
    type: "string"
    description: "ALFWorld task identifier"
    examples:
      - "pick_and_place_simple-1"
  failure_step:
    type: "integer"
    description: "Step number where failure occurred"
    minimum: 0
  action_log:
    type: "array"
    description: "List of agent actions up to failure"
    items:
      type: "string"
  failure_description:
    type: "string"
    description: "Human-readable failure summary"
    minLength: 1
  ground_truth_root_cause:
    type: "string"
    description: "Raw simulator state transition log (independent of agent text)"
    minLength: 1
  condition:
    type: "string"
    description: "Experimental condition"
    enum:
      - "baseline"
      - "degraded"
      - "intervention"
  retrieval_relevance_score:
    type: "number"
    description: "Semantic similarity score (0.0–1.0) between retrieved task and ground-truth log"
    minimum: 0.0
    maximum: 1.0
  task_completed:
    type: "boolean"
    description: "True if re-executed task succeeded"
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp"
    format: "date-time"
  seed:
    type: "integer"
    description: "Random seed used for generation"
required:
  - trajectory_id
  - task_id
  - failure_step
  - action_log
  - failure_description
  - ground_truth_root_cause
  - condition
  - retrieval_relevance_score
  - task_completed
  - timestamp
  - seed
additionalProperties: false