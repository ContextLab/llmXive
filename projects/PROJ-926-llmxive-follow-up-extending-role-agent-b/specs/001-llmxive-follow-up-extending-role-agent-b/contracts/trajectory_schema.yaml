# Trajectory Output Schema Specification
# Used by tests/contract/test_trajectory_schema.py to validate generator output
type: object
required:
  - id
  - failure_step
  - ground_truth_id
  - action_log
  - failure_description
  - condition
  - timestamp
properties:
  id:
    type: string
    description: Unique UUID for the trajectory
    format: uuid
  failure_step:
    type: integer
    description: The step index where the failure occurred (0-indexed)
    minimum: 0
  ground_truth_id:
    type: string
    description: Reference ID to the ground truth transition log
    minLength: 1
  action_log:
    type: array
    description: List of actions taken by the agent
    items:
      type: object
      required:
        - step
        - action
        - observation
      properties:
        step:
          type: integer
        action:
          type: string
        observation:
          type: string
  failure_description:
    type: string
    description: Human-readable description of why the trajectory failed
    minLength: 1
  condition:
    type: string
    enum:
      - baseline
      - degraded
      - intervention
    description: The experimental condition under which this trajectory was generated
  timestamp:
    type: string
    description: ISO 8601 timestamp of generation
    format: date-time
additionalProperties: false
