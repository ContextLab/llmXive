[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up-extending-role-agent-b"
version = "0.1.0"
description = "Automated science pipeline for Role-Agent bootstrapping via Dual-Role Evolution"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "transformers==4.35.0",
    "torch==2.1.0",
    "scipy==1.11.0",
    "datasets==2.14.0",
    "alfworld==1.1.0",
    "pandas==2.1.0",
    "pytest==7.4.0",
    "ruff==0.1.0",
    "black==23.0.0"
]

[project.optional-dependencies]
dev = [
    "pytest-cov",
    "pytest-mock"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Same as Black.
line-length = 88
indent-width = 4
target-version = "py39"

# Assume Python 3.9
[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
# Also include isort (I) and flake8-bugbear (B)
select = ["E4", "E7", "E9", "F", "I", "B", "C90"]
ignore = []

# Allow fix for all enabled rules (when `--fix`) is provided, except for these.
fixable = ["ALL"]
unfixable = []

# Exclude a few files.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --strict-markers"
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "contract: Contract tests"
]