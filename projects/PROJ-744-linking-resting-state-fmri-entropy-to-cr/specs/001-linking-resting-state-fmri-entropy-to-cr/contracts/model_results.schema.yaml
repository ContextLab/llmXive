$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Results Schema"
description: "Schema for the model_results.csv output file generated by the pipeline."
type: "object"
properties:
  network_name:
    type: "string"
    description: "Name of the network tested."
  predictor:
    type: "string"
    description: "Name of the predictor variable (e.g., 'entropy')."
  coefficient:
    type: "number"
    description: "Fitted coefficient for the predictor."
  std_error:
    type: "number"
    description: "Robust standard error of the coefficient."
  t_stat:
    type: "number"
    description: "T-statistic."
  p_value:
    type: "number"
    description: "Unadjusted p-value."
  p_value_fdr:
    type: "number"
    description: "Benjamini-Hochberg FDR-adjusted p-value."
  r_parameter:
    type: "number"
    description: "Tolerance parameter used for this run."
  covariates:
    type: "string"
    description: "JSON string containing covariate coefficients."
  n_subjects:
    type: "integer"
    description: "Number of subjects included in the model."
  runtime_seconds:
    type: "number"
    description: "Runtime of the model fitting step."
  peak_ram_mb:
    type: "number"
    description: "Peak RAM usage during model fitting."
required:
  - "network_name"
  - "predictor"
  - "coefficient"
  - "std_error"
  - "t_stat"
  - "p_value"
  - "p_value_fdr"
  - "r_parameter"
  - "n_subjects"
  - "runtime_seconds"
  - "peak_ram_mb"
additionalProperties: false
