$schema: "http://json-schema.org/draft-07/schema#"
title: "Entropy Output Schema"
description: "Schema for the entropy_metrics.csv output file generated by the pipeline."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the subject."
  parcel_id:
    type: "string"
    description: "Identifier for the specific HCP atlas parcel."
  network_name:
    type: "string"
    description: "Name of the canonical network (e.g., DMN, FPN, CON) or 'Global'."
  global_mean_entropy:
    type: "number"
    description: "Mean entropy across all parcels for this subject."
  network_avg_entropy:
    type: "number"
    description: "Average entropy for the specific network."
  auc_entropy:
    type: "number"
    description: "Area Under the Curve of the entropy vs. scale profile."
  r_parameter:
    type: "number"
    description: "Tolerance parameter used (e.g., 0.2)."
  scale_range:
    type: "string"
    description: "Range of scales used (e.g., '1-20')."
  status:
    type: "string"
    enum:
      - "valid"
      - "invalid"
      - "excluded"
    description: "Data quality status."
  invalid_parcels_pct:
    type: "number"
    description: "Percentage of parcels with NaN values."
required:
  - "subject_id"
  - "parcel_id"
  - "network_name"
  - "global_mean_entropy"
  - "network_avg_entropy"
  - "auc_entropy"
  - "r_parameter"
  - "status"
  - "invalid_parcels_pct"
additionalProperties: false
