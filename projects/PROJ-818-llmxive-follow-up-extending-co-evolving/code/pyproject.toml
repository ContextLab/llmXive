[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up-extending-co-evolving"
version = "0.1.0"
description = "Co-Evolving Policy Distillation Research Pipeline"
requires-python = ">=3.11"
dependencies = [
    "sympy>=1.12",
    "networkx>=3.2",
    "numpy>=1.26",
    "scipy>=1.12",
    "pytest>=8.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.3.0",
    "black>=24.0",
    "pre-commit>=3.6",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
