$schema: "http://json-schema.org/draft-07/schema#"
title: "Agent State Schema"
description: "Schema for tracking agent state during evolutionary training."
type: object
properties:
  agent_id:
    type: string
    description: "Unique identifier for the agent instance."
  condition:
    type: string
    enum: ["sequential", "mixed", "coevolving"]
    description: "The training strategy used."
  generation:
    type: integer
    description: "Current generation number."
  current_rule_set:
    type: array
    items:
      type: string
    description: "List of rule IDs currently held by the agent."
  fitness_score:
    type: number
    description: "Current fitness score (accuracy on training set)."
  rule_evaluations_count:
    type: integer
    description: "Cumulative count of rule evaluations performed."
  exchange_log:
    type: array
    items:
      type: object
      properties:
        generation:
          type: integer
        partner_agent_id:
          type: string
        rules_exchanged:
          type: array
          items:
            type: string
    description: "Log of rule exchanges (only for coevolving condition)."
required:
  - agent_id
  - condition
  - generation
  - current_rule_set
  - fitness_score
  - rule_evaluations_count
