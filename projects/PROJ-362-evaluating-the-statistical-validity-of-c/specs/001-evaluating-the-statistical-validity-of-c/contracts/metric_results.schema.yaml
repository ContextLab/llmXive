$schema: "http://json-schema.org/draft-07/schema#"
title: "Metric Results Schema"
description: "Schema for all CSV/JSON artifacts produced by the ranking‑metric statistical validity pipeline."
type: object
properties:
  metric_scores:
    type: array
    description: "Rows of metric scores for original and permuted label sets."
    items:
      type: object
      required: [query_id, metric, score, is_original]
      properties:
        query_id:
          type: string
          description: "TREC query identifier."
        metric:
          type: string
          enum: ["NDCG@10", "MAP"]
          description: "Metric name."
        score:
          type: number
          description: "Metric value (higher is better)."
        is_original:
          type: boolean
          description: "True for the original ranking, false for a permutation."
        perm_id:
          type: integer
          minimum: 0
          description: "Permutation index; null when is_original is true."
  pvalues:
    type: array
    description: "Normalized p-values per query-metric (raw and global aggregated)."
    items:
      type: object
      required: [query_id, metric, p_value, p_global, p_adj, significant]
      properties:
        query_id:
          type: string
        metric:
          type: string
          enum: ["NDCG@10", "MAP"]
        p_value:
          type: number
          minimum: 0
          maximum: 1
          description: "Rank‑based permutation p‑value for this query."
        p_global:
          type: number
          minimum: 0
          maximum: 1
          description: "Fisher-aggregated global p-value for this metric."
        p_adj:
          type: number
          minimum: 0
          maximum: 1
          description: "Bonferroni-corrected global p-value."
        significant:
          type: boolean
          description: "True if p_adj < 0.025."
  summary:
    type: array
    description: "Denormalized summary view for the paper (includes global flags repeated per query)."
    items:
      type: object
      required: [query_id, metric, p_value, p_global, p_adj, significant]
      properties:
        query_id:
          type: string
        metric:
          type: string
          enum: ["NDCG@10", "MAP"]
        p_value:
          type: number
        p_global:
          type: number
        p_adj:
          type: number
        significant:
          type: boolean
  mdes:
    type: object
    description: "Minimum Detectable Effect Size estimate."
    required: [metric, mdes, ci_lower, ci_upper, power]
    properties:
      metric:
        type: string
        enum: ["NDCG@10", "MAP"]
      mdes:
        type: number
        description: "Estimated MDES."
      ci_lower:
        type: number
        description: "Lower bound of the 95 % confidence interval."
      ci_upper:
        type: number
        description: "Upper bound of the 95 % confidence interval."
      power:
        type: number
        minimum: 0
        maximum: 1
        description: "Achieved statistical power at the reported MDES."
  sensitivity:
    type: array
    description: "Results of the α‑sweep sensitivity analysis."
    items:
      type: object
      required: [metric, alpha_low, alpha_high, changed_queries]
      properties:
        metric:
          type: string
          enum: ["NDCG@10", "MAP"]
        alpha_low:
          type: number
          minimum: 0
          maximum: 1
        alpha_high:
          type: number
          minimum: 0
          maximum: 1
        changed_queries:
          type: integer
          minimum: 0
          description: "Number of queries whose significance status differs between the two α levels."
required: [metric_scores, pvalues, summary, mdes, sensitivity]