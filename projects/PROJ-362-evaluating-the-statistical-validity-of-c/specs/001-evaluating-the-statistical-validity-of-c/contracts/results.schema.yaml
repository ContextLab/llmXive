$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for final statistical analysis output"
type: "object"
properties:
  query_id:
    type: "integer"
    description: "Query identifier"
  metric_name:
    type: "string"
    description: "Name of the metric evaluated"
    enum:
      - "NDCG@10"
      - "MAP"
  observed_score:
    type: "number"
    description: "Metric score from the original ranking"
    minimum: 0
  p_value_raw:
    type: "number"
    description: "Uncorrected permutation p-value"
    minimum: 0
    maximum: 1
  p_value_corrected:
    type: "number"
    description: "Benjamini-Hochberg corrected p-value"
    minimum: 0
    maximum: 1
  is_significant:
    type: "boolean"
    description: "Whether the result is significant after correction"
  mdes:
    type: "number"
    description: "Minimum Detectable Effect Size (Delta Metric Score)"
    minimum: 0
  power:
    type: "number"
    description: "Estimated statistical power"
    minimum: 0
    maximum: 1
  noise_sigma:
    type: "number"
    description: "Noise magnitude (sigma) used to derive MDES"
    minimum: 0
required:
  - query_id
  - metric_name
  - observed_score
  - p_value_raw
  - p_value_corrected
  - is_significant
  - mdes
  - power
  - noise_sigma
additionalProperties: false
