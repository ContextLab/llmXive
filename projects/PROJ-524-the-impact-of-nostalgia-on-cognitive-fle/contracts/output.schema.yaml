$schema: "http://json-schema.org/draft-07/schema#"
title: "Output Schema for Statistical Analysis Results"
description: "Schema defining the structure for statistical reports, sensitivity analysis, and final outputs."
type: object
properties:
  statistical_report:
    type: object
    description: "Results from Welch's t-test and effect size calculations"
    properties:
      analysis_timestamp:
        type: string
        format: date-time
      dataset_info:
        type: object
        properties:
          n_nostalgia:
            type: integer
          n_control:
            type: integer
          n_total:
            type: integer
          mmse_filter_applied:
            type: boolean
      comparisons:
        type: array
        items:
          type: object
          properties:
            metric:
              type: string
              enum:
                - perseverative_errors
                - categories_completed
            test_type:
              type: string
              const: "Welch's t-test"
            t_statistic:
              type: number
            degrees_of_freedom:
              type: number
            p_value:
              type: number
            p_value_corrected:
              type: number
              description: "Bonferroni corrected p-value"
            effect_size:
              type: object
              properties:
                cohens_d:
                  type: number
                ci_95_lower:
                  type: number
                ci_95_upper:
                  type: number
            significance:
              type: boolean
      power_analysis:
        type: object
        properties:
          observed_power:
            type: number
          minimum_detectable_effect_size:
            type: number
            description: "MDES at alpha=0.05, power=0.80"
          alpha_level:
            type: number
            const: 0.05
          target_power:
            type: number
            const: 0.80
  sensitivity_report:
    type: object
    description: "Results from sensitivity analysis across thresholds"
    properties:
      thresholds_tested:
        type: array
        items:
          type: number
        description: "List of alpha thresholds tested (e.g., 0.01, 0.05, 0.1)"
      results_by_metric:
        type: object
        properties:
          perseverative_errors:
            type: array
            items:
              type: object
              properties:
                threshold:
                  type: number
                is_significant:
                  type: boolean
                p_value:
                  type: number
          categories_completed:
            type: array
            items:
              type: object
              properties:
                threshold:
                  type: number
                is_significant:
                  type: boolean
                p_value:
                  type: number
      robustness_flags:
        type: object
        properties:
          sensitive_to_threshold:
            type: boolean
            description: "True if p-value is borderline (≈ 0.05)"
          mmse_impact:
            type: string
            description: "Description of impact when MMSE filter is applied"
  citations:
    type: object
    description: "Verification status of source citations"
    properties:
      source_study:
        type: object
        properties:
          doi:
            type: string
          title_overlap_score:
            type: number
            description: "Overlap score with primary source"
          validated:
            type: boolean
          stimuli_verified:
            type: boolean
            description: "Verification of stimuli content from source"
  final_report:
    type: object
    description: "Aggregated summary for paper generation"
    properties:
      conclusion:
        type: string
      validity_status:
        type: string
        enum:
          - validated
          - partial
          - simulation_only
      limitations:
        type: array
        items:
          type: string
required:
  - statistical_report
  - sensitivity_report
  - final_report
