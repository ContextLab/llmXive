[lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # Pyflakes
  "I",  # isort
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
]
ignore = [
  "E501", # line too long (handled by black)
]
fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["code"]

[format]
line-length = 88
indent-style = "space"
quote-style = "double"
