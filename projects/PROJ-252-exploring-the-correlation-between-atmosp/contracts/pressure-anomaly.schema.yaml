# Schema for Pressure Anomaly Data (T008/T009)
# Required fields as per spec: timestamp, pressure_anomaly, lat, lon, event_id
type: object
required:
  - timestamp
  - pressure_anomaly
  - lat
  - lon
  - event_id
properties:
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the measurement
  pressure_anomaly:
    type: number
    description: Pressure anomaly value (hPa or similar unit)
  lat:
    type: number
    description: Latitude in degrees
  lon:
    type: number
    description: Longitude in degrees
  event_id:
    type: string
    description: Associated earthquake event ID
additionalProperties: true
