$schema: "http://json-schema.org/draft-07/schema#"
title: "Pressure Anomaly Schema"
description: "Schema for pressure anomaly data"
type: "object"
properties:
  event_id:
    type: "string"
    description: "Unique identifier linking to the earthquake event"
  pressure_value:
    type: "number"
    description: "Observed pressure value"
  anomaly_value:
    type: "number"
    description: "Calculated pressure anomaly"
  window_type:
    type: "string"
    enum:
      - "event"
      - "control"
    description: "Type of window (event or control)"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the observation"
required:
  - event_id
  - pressure_value
  - anomaly_value
  - window_type
  - timestamp