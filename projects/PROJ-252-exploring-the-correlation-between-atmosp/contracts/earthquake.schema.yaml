# Schema for Earthquake Data (T008/T009)
# Required fields as per spec: magnitude, depth, lat, lon, timestamp
type: object
required:
  - magnitude
  - depth
  - lat
  - lon
  - timestamp
  - event_id
properties:
  magnitude:
    type: number
    description: Earthquake magnitude (e.g., Mw)
  depth:
    type: number
    description: Depth in kilometers
  lat:
    type: number
    description: Latitude in degrees
  lon:
    type: number
    description: Longitude in degrees
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the event
  event_id:
    type: string
    description: Unique USGS event identifier
additionalProperties: true
