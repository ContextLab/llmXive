$schema: http://json-schema.org/draft-07/schema#
title: Artifact Manifest Schema
description: Schema for validating the list of artifacts generated by the Code as Agent Harness execution.
type: object
properties:
  artifacts:
    type: array
    description: List of generated files from the submodule execution.
    items:
      type: object
      properties:
        path:
          type: string
          description: Relative path of the artifact within the output directory.
        size_bytes:
          type: integer
          description: Size of the file in bytes. Must be > 0.
          minimum: 1
        type:
          type: string
          description: File extension type (e.g., json, png, log).
          enum:
            - json
            - yaml
            - png
            - jpg
            - log
            - txt
            - csv
        checksum:
          type: string
          description: MD5 checksum of the file content.
      required:
        - path
        - size_bytes
        - type
        - checksum
    minItems: 1
required:
  - artifacts
additionalProperties: false
