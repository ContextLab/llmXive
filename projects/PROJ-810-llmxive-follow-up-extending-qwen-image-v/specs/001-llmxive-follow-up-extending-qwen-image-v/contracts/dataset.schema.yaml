$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the processed dataset containing latent vectors and region annotations."
type: "object"
properties:
  records:
    type: "array"
    items:
      type: "object"
      properties:
        image_id:
          type: "string"
          description: "Unique identifier for the source image."
        region_id:
          type: "string"
          description: "Unique identifier for the region."
        modality:
          type: "string"
          enum:
            - "text"
            - "image"
          description: "Ground truth modality label."
        bbox:
          type: "array"
          items:
            type: "integer"
          minItems: 4
          maxItems: 4
          description: "Bounding box coordinates [x_min, y_min, x_max, y_max]."
        latent_vector:
          type: "array"
          items:
            type: "number"
          description: "High-dimensional latent representation."
        crop_path:
          type: "string"
          description: "Relative path to the cropped image file."
      required:
        - image_id
        - region_id
        - modality
        - bbox
        - latent_vector
required:
  - records