$schema: "http://json-schema.org/draft-07/schema#"
title: "OmniDoc Dataset Schema"
description: "Schema for the raw OmniDoc-1 dataset parquet file"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the document"
  image_bytes:
    type: "string"
    format: "base64"
    description: "Base64 encoded image data"
  annotations:
    type: "array"
    description: "List of region annotations"
    items:
      type: "object"
      properties:
        bbox:
          type: "array"
          items:
            type: "number"
          minItems: 4
          maxItems: 4
          description: "Bounding box [x_min, y_min, x_max, y_max]"
        modality:
          type: "string"
          enum: ["text", "image", "mixed", "unknown"]
          description: "Modality of the region"
        confidence:
          type: "number"
          minimum: 0.0
          maximum: 1.0
          description: "Confidence score for the modality label"
      required: ["bbox", "modality"]
  metadata:
    type: "object"
    description: "Additional metadata"
required: ["id", "image_bytes", "annotations"]
additionalProperties: false