$schema: "http://json-schema.org/draft-07/schema#"
title: "Latent Vector Metadata Schema"
description: "Schema for metadata associated with latent vectors, including timing and source info."
type: "object"
properties:
  vector_id:
    type: "string"
    description: "Unique identifier for the latent vector."
  source_region:
    type: "object"
    properties:
      image_id:
        type: "string"
      region_id:
        type: "string"
    required:
      - image_id
      - region_id
  encoding_time_ms:
    type: "number"
    minimum: 0
    description: "Time taken to encode the region in milliseconds."
  model_version:
    type: "string"
    description: "Version of the VAE model used."
  device:
    type: "string"
    enum:
      - "cpu"
    description: "Device used for encoding."
required:
  - vector_id
  - source_region
  - encoding_time_ms
  - model_version
  - device