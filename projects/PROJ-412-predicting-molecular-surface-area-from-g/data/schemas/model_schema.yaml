%YAML 1.2
---
# Schema for Model Output (T038 / T018)
# Defines the expected structure for model comparison reports and evaluation artifacts.
# Used by tests/contract/test_model_output.py for validation.

type: object
required:
  - model_type
  - metrics
  - hyperparameters
  - timestamp
  - dataset_checksum
properties:
  model_type:
    type: string
    description: The type of model (e.g., "GCN", "RandomForest")
    enum:
      - GCN
      - RandomForest
  metrics:
    type: object
    required:
      - mae
      - rmse
      - r2
    properties:
      mae:
        type: number
        description: Mean Absolute Error in Angstroms squared
      rmse:
        type: number
        description: Root Mean Squared Error in Angstroms squared
      r2:
        type: number
        description: Coefficient of determination (R-squared)
      comparison:
        type: object
        description: Optional statistical comparison metrics (used in joint reports)
        properties:
          p_value:
            type: number
            description: P-value from paired t-test
          cohen_d:
            type: number
            description: Effect size (Cohen's d)
          corrected_p_value:
            type: number
            description: Bonferroni or FDR corrected p-value
  hyperparameters:
    type: object
    description: Dictionary of model hyperparameters used
    additionalProperties: true
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the model was evaluated
  dataset_checksum:
    type: string
    description: SHA256 checksum of the processed dataset used for training/evaluation
  split_info:
    type: object
    description: Information about the train/test split
    properties:
      train_size:
        type: integer
      test_size:
        type: integer
      split_seed:
        type: integer
additionalProperties: false
