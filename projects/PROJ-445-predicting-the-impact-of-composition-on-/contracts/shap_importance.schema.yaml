$schema: http://json-schema.org/draft-07/schema#
title: SHAP Importance Schema
description: >
  Schema for SHAP feature importance analysis artifacts.
  Defines the structure for mean absolute SHAP values, rankings,
  and statistical significance tests comparing feature groups.
  Used for the Glass Transition Temperature prediction pipeline.
type: object
required:
  - schema_version
  - generated_at
  - model_type
  - feature_importance
  - group_comparison
properties:
  schema_version:
    type: string
    description: Version of this schema definition
    const: "1.0.0"
  
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of artifact generation
  
  model_type:
    type: string
    description: Type of model analyzed (e.g., "GradientBoostingRegressor")
  
  sample_count:
    type: integer
    minimum: 1
    description: Number of samples used for SHAP analysis
  
  feature_importance:
    type: array
    description: Ranked list of features by mean absolute SHAP value
    items:
      type: object
      required:
        - rank
        - feature_name
        - mean_abs_shap_value
        - std_shap_value
      properties:
        rank:
          type: integer
          minimum: 1
          description: Rank order (1 = most important)
        feature_name:
          type: string
          description: Name of the compositional descriptor
        mean_abs_shap_value:
          type: number
          description: Mean absolute SHAP value for this feature
        std_shap_value:
          type: number
          description: Standard deviation of SHAP values
        positive_shap_mean:
          type: number
          description: Mean of positive SHAP values
        negative_shap_mean:
          type: number
          description: Mean of negative SHAP values
  
  group_comparison:
    type: object
    description: Statistical comparison between feature groups
    required:
      - chemical_heterogeneity_vs_mcn
    properties:
      chemical_heterogeneity_vs_mcn:
        type: object
        description: Comparison of chemical heterogeneity features vs Mean Coordination Number
        required:
          - heterogeneity_mean_abs_shap
          - mcn_mean_abs_shap
          - difference
          - ci_lower
          - ci_upper
          - is_significant
          - p_value
          - correction_method
        properties:
          heterogeneity_mean_abs_shap:
            type: number
            description: Mean absolute SHAP value for chemical heterogeneity group
          mcn_mean_abs_shap:
            type: number
            description: Mean absolute SHAP value for Mean Coordination Number
          difference:
            type: number
            description: Difference (Heterogeneity - MCN)
          ci_lower:
            type: number
            description: Lower bound of 95% bootstrapped confidence interval
          ci_upper:
            type: number
            description: Upper bound of 95% bootstrapped confidence interval
          is_significant:
            type: boolean
            description: Whether the difference is statistically significant
          p_value:
            type: number
            description: Adjusted p-value
          correction_method:
            type: string
            description: Multiple comparison correction method used (e.g., "holm-bonferroni")
          bootstraps:
            type: integer
            description: Number of bootstrap iterations performed
  
  metadata:
    type: object
    properties:
      shap_explainer_type:
        type: string
        description: Type of SHAP explainer used (e.g., "TreeExplainer")
      seed:
        type: integer
        description: Random seed used for reproducibility
      computation_time_seconds:
        type: number
        description: Time taken to compute SHAP values