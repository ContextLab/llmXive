$schema: http://json-schema.org/draft-07/schema#
title: Chalcogenide Glass Composition Sample Schema
description: >
  JSON Schema for validating chalcogenide glass composition datasets.
  Defines the required structure for samples including composition strings,
  target variable (Tg), and computed compositional descriptors.
type: object
required:
  - composition
  - Tg
  - mean_coordination_number
  - electronegativity_variance
  - atomic_radius_variance
  - chemical_family
properties:
  composition:
    type: string
    description: >
      Chemical formula string representing the glass composition.
      Expected format: Element1x1Element2x2... (e.g., "Ge20Se80").
    pattern: "^[A-Z][a-z]?[0-9.]*[A-Z][a-z]?[0-9.]*$"
  Tg:
    type: number
    description: >
      Glass transition temperature in Kelvin.
      Must be a positive float value.
    minimum: 0
  mean_coordination_number:
    type: number
    description: >
      Mean coordination number (MCN) computed from the composition.
      Calculated as the weighted average of coordination numbers of constituent elements.
    minimum: 0
  electronegativity_variance:
    type: number
    description: >
      Variance of electronegativity values across the composition.
      Measures chemical heterogeneity.
    minimum: 0
  atomic_radius_variance:
    type: number
    description: >
      Variance of atomic radii across the composition.
      Measures structural heterogeneity.
    minimum: 0
  chemical_family:
    type: string
    description: >
      Classification of the glass composition into a chemical family.
      Used for stratified splitting and LOFO cross-validation.
      Examples: "Ge-Se", "As-Se", "Sb-Se", "Ge-As-Se", "Other".
    enum:
      - "Ge-Se"
      - "As-Se"
      - "Sb-Se"
      - "Ge-As-Se"
      - "Ge-Sb-Se"
      - "As-Sb-Se"
      - "Other"
  sample_id:
    type: string
    description: >
      Unique identifier for the sample.
      Optional but recommended for tracking.
    pattern: "^[A-Za-z0-9_-]+$"
  source:
    type: string
    description: >
      Source of the data point (e.g., literature reference, database name).
    minLength: 1
  notes:
    type: string
    description: >
      Optional notes or comments about the sample.
additionalProperties: false