$schema: http://json-schema.org/draft-07/schema#
title: SHAP Report Schema
description: >
  JSON Schema defining the structure of the SHAP analysis report artifact
  generated for the chalcogenide glass transition temperature prediction project.
  This report includes feature importance rankings, confidence intervals,
  and transferability metrics.
type: object
required:
  - report_metadata
  - feature_importance
  - shap_statistics
  - confidence_intervals
  - transferability_analysis
  - power_analysis
  - causal_disclaimer
properties:
  report_metadata:
    type: object
    description: Metadata about the report generation
    required:
      - generated_at
      - model_type
      - dataset_version
      - shap_method
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of report generation
      model_type:
        type: string
        description: Type of model analyzed (e.g., GradientBoosting)
      dataset_version:
        type: string
        description: Version or hash of the dataset used
      shap_method:
        type: string
        description: SHAP explainer method used (e.g., TreeExplainer)
      sample_count:
        type: integer
        minimum: 0
        description: Number of samples used for SHAP calculation

  feature_importance:
    type: object
    description: Ranked list of features by mean absolute SHAP value
    required:
      - rankings
      - top_features
    properties:
      rankings:
        type: array
        description: List of features sorted by importance (descending)
        items:
          type: object
          required:
            - rank
            - feature_name
            - mean_abs_shap_value
          properties:
            rank:
              type: integer
              minimum: 1
            feature_name:
              type: string
            mean_abs_shap_value:
              type: number
              format: float
            std_abs_shap_value:
              type: number
              format: float
      top_features:
        type: array
        description: Top 5 most important features
        items:
          type: string

  shap_statistics:
    type: object
    description: Statistical summary of SHAP values per feature
    additionalProperties:
      type: object
      properties:
        mean_shap:
          type: number
          format: float
        std_shap:
          type: number
          format: float
        median_shap:
          type: number
          format: float
        min_shap:
          type: number
          format: float
        max_shap:
          type: number
          format: float
        positive_count:
          type: integer
        negative_count:
          type: integer

  confidence_intervals:
    type: object
    description: 95% bootstrapped confidence intervals for SHAP value differences
    required:
      - comparison_type
      - ci_lower
      - ci_upper
      - is_significant
      - correction_method
    properties:
      comparison_type:
        type: string
        description: Description of the comparison (e.g., Heterogeneity vs MCN)
      ci_lower:
        type: number
        format: float
        description: Lower bound of the 95% CI
      ci_upper:
        type: number
        format: float
        description: Upper bound of the 95% CI
      is_significant:
        type: boolean
        description: Whether the difference is statistically significant
      p_value:
        type: number
        format: float
        description: Adjusted p-value if applicable
      correction_method:
        type: string
        description: Method used for multiple comparison correction (e.g., Holm-Bonferroni)

  transferability_analysis:
    type: object
    description: Cross-family transferability test results (LOFO analysis)
    required:
      - methodology
      - results
    properties:
      methodology:
        type: string
        description: Description of the LOFO methodology used
      results:
        type: array
        description: Results for each held-out family
        items:
          type: object
          required:
            - held_out_family
            - test_r2
            - test_rmse
            - feature_importance_shift
          properties:
            held_out_family:
              type: string
            test_r2:
              type: number
              format: float
            test_rmse:
              type: number
              format: float
            feature_importance_shift:
              type: object
              description: Changes in feature importance rankings
              additionalProperties:
                type: object
                properties:
                  original_rank:
                    type: integer
                  new_rank:
                    type: integer
                  shift_magnitude:
                    type: integer

  power_analysis:
    type: object
    description: Power analysis results from preprocessing
    required:
      - power_value
      - power_limitation_message
    properties:
      power_value:
        type: number
        format: float
        minimum: 0
        maximum: 1
        description: Calculated statistical power
      power_limitation_message:
        type: string
        description: Message indicating if power is insufficient

  causal_disclaimer:
    type: string
    description: Explicit disclaimer stating the analysis is associational, not causal
    minLength: 1

  generated_files:
    type: array
    description: List of files generated as part of this report
    items:
      type: string
      description: Relative path to generated artifact