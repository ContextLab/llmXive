$schema: http://json-schema.org/draft-07/schema#
title: SHAP Report Schema
description: >
  Schema for the SHAP analysis report artifact generated by the chalcogenide
  glass transition temperature prediction pipeline. This document contains
  feature importance rankings, statistical confidence intervals, and
  transferability metrics.
type: object
required:
  - metadata
  - feature_importance
  - statistical_analysis
  - transferability_analysis
  - disclaimers
properties:
  metadata:
    type: object
    description: Metadata about the report generation
    required:
      - generated_at
      - model_type
      - dataset_version
      - shap_method
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of report generation
      model_type:
        type: string
        description: Type of model analyzed (e.g., 'GradientBoostingRegressor')
      dataset_version:
        type: string
        description: Version or hash of the dataset used
      shap_method:
        type: string
        description: SHAP explainer method used (e.g., 'TreeExplainer')
      sample_count:
        type: integer
        description: Number of samples used for SHAP analysis (may be subsampled)
      power_analysis_message:
        type: string
        description: >
          Message extracted from state/power_analysis.json regarding
          Minimum Detectable Effect Size limitations.

  feature_importance:
    type: object
    description: Ranked list of features by mean absolute SHAP value
    required:
      - ranked_features
      - chemical_heterogeneity_summary
      - mean_coordination_summary
    properties:
      ranked_features:
        type: array
        description: List of features sorted by mean absolute SHAP value (descending)
        items:
          type: object
          required:
            - feature_name
            - mean_abs_shap
            - shap_std
          properties:
            feature_name:
              type: string
              description: Name of the compositional descriptor
            mean_abs_shap:
              type: number
              description: Mean absolute SHAP value
            shap_std:
              type: number
              description: Standard deviation of SHAP values
            rank:
              type: integer
              description: Rank in the importance list (1-based)

      chemical_heterogeneity_summary:
        type: object
        description: Aggregated statistics for chemical heterogeneity features
        required:
          - feature_names
          - mean_abs_shap
        properties:
          feature_names:
            type: array
            items:
              type: string
            description: List of features classified as chemical heterogeneity descriptors
          mean_abs_shap:
            type: number
            description: Mean absolute SHAP value aggregated across these features

      mean_coordination_summary:
        type: object
        description: Statistics for the Mean Coordination Number feature
        required:
          - feature_name
          - mean_abs_shap
        properties:
          feature_name:
            type: string
            description: Name of the MCN feature
          mean_abs_shap:
            type: number
            description: Mean absolute SHAP value for MCN

  statistical_analysis:
    type: object
    description: Statistical comparison of feature contributions
    required:
      - shap_difference_ci
      - significance_test
    properties:
      shap_difference_ci:
        type: object
        description: >
          95% bootstrapped confidence interval for the difference in mean
          absolute SHAP values between chemical heterogeneity and mean coordination number.
        required:
          - ci_lower
          - ci_upper
          - is_significant
          - correction_method
        properties:
          ci_lower:
            type: number
            description: Lower bound of the 95% confidence interval
          ci_upper:
            type: number
            description: Upper bound of the 95% confidence interval
          is_significant:
            type: boolean
            description: Whether the difference is statistically significant (CI does not include 0)
          correction_method:
            type: string
            description: >
              Method used for family-wise error rate control (e.g., 'Bonferroni', 'Holm-Bonferroni')
          n_bootstraps:
            type: integer
            description: Number of bootstrap iterations performed

      significance_test:
        type: object
        description: Results of hypothesis testing on feature contributions
        properties:
          p_value:
            type: number
            description: Adjusted p-value after multiple comparison correction
          null_hypothesis:
            type: string
            description: Statement of the null hypothesis tested

  transferability_analysis:
    type: object
    description: Cross-family transferability metrics (LOFO analysis)
    required:
      - lofo_results
    properties:
      lofo_results:
        type: array
        description: >
          Performance metrics for models trained on N-1 chemical families
          and tested on the held-out family.
        items:
          type: object
          required:
            - held_out_family
            - test_rmse
            - test_r2
            - feature_importance_shift
          properties:
            held_out_family:
              type: string
              description: Name of the chemical family held out for testing
            test_rmse:
              type: number
              description: RMSE on the held-out family
            test_r2:
              type: number
              description: R² score on the held-out family
            feature_importance_shift:
              type: object
              description: >
                Comparison of feature importance rankings between the
                full model and the N-1 model for the held-out family.
              properties:
                top_feature_stability:
                  type: boolean
                  description: Whether the top feature remained the same
                rank_correlation:
                  type: number
                  description: Spearman rank correlation of feature importances

  disclaimers:
    type: object
    description: Required legal and scientific disclaimers
    required:
      - causal_disclaimer
      - power_limitation_note
    properties:
      causal_disclaimer:
        type: string
        description: >
          Explicit text stating that the analysis is associational, not causal.
          Must match content from artifacts/causal_disclaimer.txt.
      power_limitation_note:
        type: string
        description: >
          Note regarding statistical power limitations extracted from
          state/power_analysis.json if applicable.
additionalProperties: false
