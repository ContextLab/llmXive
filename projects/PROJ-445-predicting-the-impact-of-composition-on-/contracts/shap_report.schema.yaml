$schema: http://json-schema.org/draft-07/schema#
title: SHAP Report Schema
description: >
  JSON Schema for the SHAP analysis report generated by the chalcogenide glass
  transition temperature prediction pipeline. This report quantifies feature
  contributions, provides confidence intervals, and assesses cross-family
  transferability.
type: object
required:
  - report_metadata
  - feature_importance
  - shap_statistics
  - confidence_intervals
  - transferability_analysis
  - power_analysis
  - causal_disclaimer
properties:
  report_metadata:
    type: object
    description: Metadata about the report generation.
    required:
      - generated_at
      - pipeline_version
      - dataset_checksum
      - model_type
    properties:
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of report generation.
      pipeline_version:
        type: string
        description: Version of the pipeline that generated this report.
      dataset_checksum:
        type: string
        description: SHA-256 hash of the input dataset used for analysis.
      model_type:
        type: string
        enum:
          - GradientBoostingRegressor
          - RandomForestRegressor
          - LinearRegression
        description: Type of model used for SHAP analysis.

  feature_importance:
    type: object
    description: Ranked list of features by mean absolute SHAP value.
    required:
      - ranking
    properties:
      ranking:
        type: array
        description: List of features sorted by importance (descending).
        items:
          type: object
          required:
            - feature_name
            - mean_abs_shap
            - rank
          properties:
            feature_name:
              type: string
              description: Name of the feature.
            mean_abs_shap:
              type: number
              description: Mean absolute SHAP value.
            rank:
              type: integer
              description: Rank position (1-based).

  shap_statistics:
    type: object
    description: Detailed SHAP statistics for key feature groups.
    required:
      - chemical_heterogeneity
      - mean_coordination
    properties:
      chemical_heterogeneity:
        type: object
        description: Statistics for chemical heterogeneity descriptors.
        required:
          - mean_abs_shap
          - std_abs_shap
          - feature_count
        properties:
          mean_abs_shap:
            type: number
          std_abs_shap:
            type: number
          feature_count:
            type: integer
      mean_coordination:
        type: object
        description: Statistics for mean coordination number.
        required:
          - mean_abs_shap
          - std_abs_shap
        properties:
          mean_abs_shap:
            type: number
          std_abs_shap:
            type: number

  confidence_intervals:
    type: object
    description: 95% bootstrapped confidence intervals for SHAP differences.
    required:
      - difference_ci
      - is_significant
      - correction_method
    properties:
      difference_ci:
        type: object
        description: Confidence interval for the difference in SHAP values.
        required:
          - ci_lower
          - ci_upper
        properties:
          ci_lower:
            type: number
            description: Lower bound of the 95% CI.
          ci_upper:
            type: number
            description: Upper bound of the 95% CI.
      is_significant:
        type: boolean
        description: Whether the difference is statistically significant (CI does not include 0).
      correction_method:
        type: string
        enum:
          - Bonferroni
          - Holm-Bonferroni
          - None
        description: Multiple comparison correction method used.

  transferability_analysis:
    type: object
    description: Results of the Leave-One-Family-Out (LOFO) transferability test.
    required:
      - lofo_models_trained
      - transferability_scores
      - feature_importance_drift
    properties:
      lofo_models_trained:
        type: integer
        description: Number of LOFO models trained.
      transferability_scores:
        type: array
        description: List of transferability metrics for each held-out family.
        items:
          type: object
          required:
            - held_out_family
            - test_r2
            - test_rmse
          properties:
            held_out_family:
              type: string
            test_r2:
              type: number
            test_rmse:
              type: number
      feature_importance_drift:
        type: number
        description: Average change in feature importance ranking across LOFO models.

  power_analysis:
    type: object
    description: Power analysis results included in the report.
    required:
      - power
      - power_limitation_message
    properties:
      power:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Calculated statistical power.
      power_limitation_message:
        type: string
        description: Message indicating power limitations if power < 0.80.

  causal_disclaimer:
    type: string
    description: >
      Explicit disclaimer stating that the analysis is associational, not causal.
      This text must be included verbatim as per FR-008.
    minLength: 10