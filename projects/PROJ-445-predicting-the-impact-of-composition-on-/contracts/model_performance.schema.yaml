$schema: http://json-schema.org/draft-07/schema#
title: Model Performance Metrics Schema
description: >
  Schema for the model performance metrics artifact (performance_metrics.json).
  Contains RMSE, R², collinearity diagnostics (VIF), power analysis results,
  SHAP-based confidence intervals, and transferability flags as per plan.md specifications.
type: object
required:
  - rmse
  - r_squared
  - vif
  - power_analysis
  - shap_ci
  - transferability
additionalProperties: true
properties:
  rmse:
    type: number
    description: Root Mean Squared Error on the held-out test set.
    minimum: 0
  r_squared:
    type: number
    description: Coefficient of determination (R²) on the held-out test set.
  vif:
    type: object
    description: Variance Inflation Factors for compositional descriptors.
    required:
      - values
      - max_vif
      - mitigation_strategy
    properties:
      values:
        type: object
        description: Map of feature name to VIF value.
        additionalProperties:
          type: number
          minimum: 1
      max_vif:
        type: number
        description: Maximum VIF observed across all features.
      mitigation_strategy:
        type: string
        description: Strategy applied if VIF >= 5 (e.g., 'residualization' or 'none').
        enum:
          - residualization
          - none
          - pca
          - regularization
  power_analysis:
    type: object
    description: Minimum Detectable Effect Size (MDES) and power analysis results.
    required:
      - power
      - mdes
    properties:
      power:
        type: number
        description: Statistical power of the test (typically 0.80 threshold).
        minimum: 0
        maximum: 1
      mdes:
        type: number
        description: Minimum Detectable Effect Size.
      power_limitation_message:
        type: string
        description: >
          Optional message if power < 0.80. Example:
          "Power Limitation: Insufficient power to detect small effects".
  shap_ci:
    type: object
    description: 95% bootstrapped confidence intervals for SHAP value differences.
    required:
      - ci_lower
      - ci_upper
      - is_significant
      - correction_method
    properties:
      ci_lower:
        type: number
        description: Lower bound of the 95% CI for the difference in mean absolute SHAP values.
      ci_upper:
        type: number
        description: Upper bound of the 95% CI for the difference in mean absolute SHAP values.
      is_significant:
        type: boolean
        description: Whether the CI excludes zero (indicating significance).
      correction_method:
        type: string
        description: Multiple comparison correction method applied (e.g., 'bonferroni', 'holm').
        enum:
          - bonferroni
          - holm-bonferroni
          - none
  transferability:
    type: object
    description: Cross-family transferability metrics (LOFO analysis).
    required:
      - families_tested
      - average_drop_in_r2
      - worst_case_drop_in_r2
    properties:
      families_tested:
        type: array
        items:
          type: string
        description: List of chemical families used as held-out test sets.
      average_drop_in_r2:
        type: number
        description: Average decrease in R² when testing on held-out families.
      worst_case_drop_in_r2:
        type: number
        description: Maximum decrease in R² observed in any LOFO fold.
  collinearity_mitigation:
    type: string
    description: >
      Explicit key for collinearity mitigation strategy as per SC-007.
      Value should be 'residualization' if VIF >= 5 triggered mitigation.
      enum:
        - residualization
        - none
        - pca
        - regularization