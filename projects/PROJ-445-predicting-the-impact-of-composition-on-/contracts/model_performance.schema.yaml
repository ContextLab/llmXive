$schema: http://json-schema.org/draft-07/schema#
title: Model Performance Metrics Schema
description: |
  Schema for the model performance metrics artifact (artifacts/performance_metrics.json).
  Defines the structure for RMSE, R², MDES, VIF, Confidence Intervals, and Transferability metrics.
  Per SC-006, SC-007, SC-009.
type: object
required:
  - rmse_linear
  - rmse_gradient_boosting
  - r2_linear
  - r2_gradient_boosting
  - vif_scores
  - collinearity_mitigation
  - shap_ci
  - transferability
properties:
  rmse_linear:
    type: number
    description: Root Mean Squared Error for the Linear Regression baseline.
  rmse_gradient_boosting:
    type: number
    description: Root Mean Squared Error for the Gradient Boosting Regressor.
  r2_linear:
    type: number
    description: R-squared (coefficient of determination) for the Linear Regression baseline.
  r2_gradient_boosting:
    type: number
    description: R-squared (coefficient of determination) for the Gradient Boosting Regressor.
  mdes:
    type: object
    description: Minimum Detectable Effect Size from power analysis.
    properties:
      power:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Estimated statistical power.
      power_limitation_message:
        type: string
        description: Warning message if power < 0.80.
    required:
      - power
  vif_scores:
    type: object
    description: Variance Inflation Factors for each compositional descriptor.
    additionalProperties:
      type: number
    description: |
      Key-value pairs where key is the feature name and value is the VIF score.
      Used to detect multicollinearity.
  collinearity_mitigation:
    type: string
    enum:
      - none
      - residualization
    description: |
      Strategy applied to mitigate collinearity if VIF >= 5.
      Per SC-007, if VIF >= 5, this MUST be 'residualization'.
  shap_ci:
    type: object
    description: 95% Bootstrapped Confidence Intervals for SHAP value differences.
    properties:
      ci_lower:
        type: number
        description: Lower bound of the 95% CI.
      ci_upper:
        type: number
        description: Upper bound of the 95% CI.
      is_significant:
        type: boolean
        description: True if the CI does not include zero (statistically significant difference).
      correction_method:
        type: string
        description: Multiple comparison correction method used (e.g., 'bonferroni', 'holm').
    required:
      - ci_lower
      - ci_upper
      - is_significant
  transferability:
    type: object
    description: Cross-Family Transferability metrics (LOFO analysis).
    properties:
      avg_rmse_lofo:
        type: number
        description: Average RMSE across all N-1 family LOFO models.
      max_rmse_lofo:
        type: number
        description: Maximum RMSE observed in any single LOFO fold.
      min_rmse_lofo:
        type: number
        description: Minimum RMSE observed in any single LOFO fold.
      feature_importance_stability:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Correlation or stability score of feature importance rankings across LOFO models.
    required:
      - avg_rmse_lofo
      - max_rmse_lofo
      - min_rmse_lofo
      - feature_importance_stability
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the metrics were generated.
  model_version:
    type: string
    description: Version identifier of the trained models.
additionalProperties: false