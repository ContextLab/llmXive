[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chalcogenide-tg-prediction"
version = "0.1.0"
description = "Predicting the Impact of Composition on the Glass Transition Temperature of Chalcogenide Glasses"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "scikit-learn",
    "shap",
    "mendeleev",
    "requests",
    "numpy",
    "pytest",
    "statsmodels",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.isort]
profile = "black"
line_length = 88
