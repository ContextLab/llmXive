$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: Schema for Random Forest model performance metrics
type: object
properties:
  model_id:
    type: string
    description: "Unique identifier for the model (e.g., 'conductivity_rf')"
  target_property:
    type: string
    enum: ["conductivity", "youngs_modulus", "fracture_energy"]
    description: "The property being predicted"
  performance:
    type: object
    properties:
      r2_train:
        type: number
      r2_test:
        type: number
      mape_test:
        type: number
      cv_r2_std:
        type: number
        description: "Standard deviation of R^2 across 5 folds"
    required:
      - r2_train
      - r2_test
      - mape_test
      - cv_r2_std
  feature_importance:
    type: array
    items:
      type: object
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
        p_value:
          type: number
        fdr_adjusted_p:
          type: number
        is_significant:
          type: boolean
          description: "True if p-value < FDR threshold"
      required:
        - feature_name
        - importance_score
        - p_value
        - fdr_adjusted_p
        - is_significant
  collinearity_flags:
    type: array
    items:
      type: object
      properties:
        feature_pair:
          type: array
          items:
            type: string
        vif:
          type: number
        action:
          type: string
          enum: ["excluded_lower_importance", "retained"]
      required:
        - feature_pair
        - vif
        - action
required:
  - model_id
  - target_property
  - performance
  - feature_importance
  - collinearity_flags
additionalProperties: false