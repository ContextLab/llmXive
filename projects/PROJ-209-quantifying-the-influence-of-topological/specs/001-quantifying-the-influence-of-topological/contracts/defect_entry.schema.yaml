$schema: http://json-schema.org/draft-07/schema#
title: DefectEntry Schema
description: Schema for defect entry records (real or synthetic)
type: object
properties:
  defect_id:
    type: string
    description: "Unique identifier for the defect entry"
  material:
    type: string
    enum: ["graphene", "MoS2"]
    description: "The base material"
  defect_type:
    type: string
    enum: ["dislocation", "grain_boundary", "vacancy", "substitution"]
    description: "Type of topological defect"
  defect_density:
    type: number
    minimum: 0.0
    maximum: 0.1
    description: "Fraction of atoms affected by the defect"
  geometric_descriptors:
    type: object
    properties:
      tilt_angle:
        type: number
        description: "Grain boundary tilt angle in degrees"
      width:
        type: number
        description: "Width of the defect region"
    required:
      - tilt_angle
  conductivity:
    type: number
    minimum: 0.0
    description: "Electronic conductivity (S/m)"
  youngs_modulus:
    type: number
    minimum: 0.0
    description: "Young's modulus (GPa)"
  fracture_energy:
    type: number
    minimum: 0.0
    description: "Fracture energy (J/m^2)"
  data_source:
    type: string
    enum: ["real", "synthetic"]
    description: "Origin of the data. MUST be 'synthetic' for generated data."
required:
  - defect_id
  - material
  - defect_type
  - defect_density
  - conductivity
  - youngs_modulus
  - fracture_energy
  - data_source
additionalProperties: false