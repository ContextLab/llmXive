$schema: "http://json-schema.org/draft-07/schema#"
title: "ProcessedData"
description: "Schema for the final processed feature matrix used for modeling."
type: "object"
properties:
  feature_matrix:
    type: "array"
    items:
      type: "object"
      properties:
        defect_id:
          type: "string"
        defect_type_dislocation:
          type: "integer"
          enum: [0, 1]
        defect_type_grain_boundary:
          type: "integer"
          enum: [0, 1]
        defect_type_vacancy:
          type: "integer"
          enum: [0, 1]
        defect_type_substitution:
          type: "integer"
          enum: [0, 1]
        defect_density:
          type: "number"
        tilt_angle:
          type: "number"
        target_conductivity:
          type: "number"
          description: "Normalized conductivity change (Δσ/σ₀)."
        target_youngs_modulus:
          type: "number"
          description: "Normalized Young's modulus change (ΔE/E₀)."
        target_fracture_strength:
          type: "number"
          description: "Normalized fracture strength change (Δσ_f/σ_f₀)."
      required:
        - defect_id
        - defect_type_dislocation
        - defect_type_grain_boundary
        - defect_type_vacancy
        - defect_type_substitution
        - defect_density
        - tilt_angle
        - target_conductivity
        - target_youngs_modulus
        - target_fracture_strength
  metadata:
    type: "object"
    properties:
      total_entries:
        type: "integer"
      excluded_entries:
        type: "integer"
        description: "Count of entries filtered out (e.g., density <= 0)."
      missing_flags_count:
        type: "object"
        description: "Count of entries with specific missing flags."
      collinearity_method:
        type: "string"
        description: "Method used to handle collinearity."
    required:
      - total_entries
      - excluded_entries
      - collinearity_method
  required:
    - feature_matrix
    - metadata
additionalProperties: false