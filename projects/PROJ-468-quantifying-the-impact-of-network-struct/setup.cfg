[metadata]
name = quantifying-network-impact
version = 0.1.0
author = llmXive Research Team
description = Quantifying the Impact of Network Structure on Energy Dissipation
long_description = file: README.md
long_description_content_type = text/markdown

[options]
packages = find:
python_requires = >=3.11
install_requires =
    numpy>=1.24.0
    pandas>=2.0.0
    networkx>=3.1.0
    scipy>=1.10.0
    scikit-learn>=1.3.0
    matplotlib>=3.7.0
    seaborn>=0.12.0

[options.packages.find]
where = .
exclude =
    tests*
    data*
    results*
    docs*
