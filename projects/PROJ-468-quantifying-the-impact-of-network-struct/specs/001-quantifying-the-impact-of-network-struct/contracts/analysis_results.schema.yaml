$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for the output of the analysis phase (FR-004 to FR-010). Contains statistical summaries."
type: object
properties:
  correlation_analysis:
    type: object
    properties:
      coordination_dissipation:
        type: object
        properties:
          pearson_r:
            type: number
          pearson_p:
            type: number
          spearman_r:
            type: number
          spearman_p:
            type: number
      clustering_dissipation:
        type: object
        properties:
          pearson_r:
            type: number
          pearson_p:
            type: number
          spearman_r:
            type: number
          spearman_p:
            type: number
      heterogeneity_dissipation:
        type: object
        properties:
          pearson_r:
            type: number
          pearson_p:
            type: number
          spearman_r:
            type: number
          spearman_p:
            type: number
  regression_analysis:
    type: object
    properties:
      model_type:
        type: string
        enum:
          - "GLS_AR1"
          - "Newey-West"
          - "Quantile_Median"
          - "Quantile_90"
      coefficients:
        type: object
        description: "Map of predictor name to coefficient estimate. MUST include 'driving_amplitude' as a control variable."
      standard_errors:
        type: object
        description: "Map of predictor name to corrected standard error."
      adjusted_r_squared:
        type: number
      p_values:
        type: object
        description: "Map of predictor name to p-value."
      stationarity_check:
        type: object
        properties:
          adf_statistic:
            type: number
          adf_p_value:
            type: number
          is_stationary:
            type: boolean
      segments:
        type: array
        description: "Results for each segment if non-stationary data was split."
        items:
          type: object
          properties:
            segment_id:
              type: integer
            adjusted_r_squared:
              type: number
            p_values:
              type: object
      robustness_checks:
        type: object
        properties:
          gam_nonlinearity_p:
            type: number
            description: "P-value for GAM non-linearity check."
          ks_normality_p:
            type: number
            description: "P-value for Kolmogorov-Smirnov normality test."
          quantile_regression_coefficients:
            type: object
            description: "Coefficients from Quantile Regression (median/90th)."
  validation:
    type: object
    properties:
      anova_slope_test:
        type: object
        properties:
          f_statistic:
            type: number
          p_value:
            type: number
          is_consistent:
            type: boolean
            description: "True if p > 0.05 (slopes not significantly different). Used for SC-003."
      data_validity_status:
        type: string
        enum:
          - "CODE_VALIDATED"
          - "SCIENTIFIC_VALIDATED"
          - "PENDING_REAL_DATA"
        description: "Explicit status of the data source validity."
required:
  - correlation_analysis
  - regression_analysis
  - validation