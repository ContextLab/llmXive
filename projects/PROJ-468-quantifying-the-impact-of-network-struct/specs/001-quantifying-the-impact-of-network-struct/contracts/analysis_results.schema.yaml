$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for the final JSON output containing statistical results and diagnostics."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the analysis."
  correlations:
    type: "array"
    description: "List of correlation results for each metric."
    items:
      type: "object"
      properties:
        metric:
          type: "string"
          enum: ["mean_coordination", "clustering_coeff", "force_heterogeneity"]
        method:
          type: "string"
          enum: ["pearson", "spearman"]
        coefficient:
          type: "number"
        p_value:
          type: "number"
          minimum: 0
          maximum: 1
        significant:
          type: "boolean"
          description: "True if p_value < 0.01."
      required:
        - "metric"
        - "method"
        - "coefficient"
        - "p_value"
        - "significant"
  regression:
    type: "object"
    description: "Results of the GLS/Newey-West regression. Note: force_heterogeneity is excluded from this model."
    properties:
      model_type:
        type: "string"
        enum: ["GLS", "Newey-West"]
      coefficients:
        type: "object"
        properties:
          intercept:
            type: "number"
          mean_coordination:
            type: "number"
          clustering_coeff:
            type: "number"
          driving_amplitude:
            type: "number"
          interaction_amplitude_coordination:
            type: "number"
        required:
          - "intercept"
          - "mean_coordination"
          - "clustering_coeff"
          - "driving_amplitude"
          - "interaction_amplitude_coordination"
      std_errors:
        type: "object"
        additionalProperties:
          type: "number"
      p_values:
        type: "object"
        additionalProperties:
          type: "number"
      adj_r_squared:
        type: "number"
      vif_scores:
        type: "object"
        additionalProperties:
          type: "number"
    required:
      - "model_type"
      - "coefficients"
      - "adj_r_squared"
  validation:
    type: "object"
    description: "Cross-dataset validation results."
    properties:
      anova_p_value:
        type: "number"
        minimum: 0
        maximum: 1
      generalizable:
        type: "boolean"
        description: "True if anova_p_value > 0.05."
      slope_consistency:
        type: "string"
        enum: ["Generalizable across amplitudes", "Non-generalizable"]
    required:
      - "anova_p_value"
      - "generalizable"
      - "slope_consistency"
  diagnostics:
    type: "object"
    description: "System performance and data quality diagnostics."
    properties:
      steady_state_windows:
        type: "integer"
      total_timesteps:
        type: "integer"
      memory_peak_gb:
        type: "number"
      runtime_seconds:
        type: "number"
      runtime_status:
        type: "string"
        enum: ["PASS", "FAIL", "TRUNCATED"]
        description: "Indicates compliance with SC-005 (runtime limit)."
    required:
      - "steady_state_windows"
      - "total_timesteps"
      - "memory_peak_gb"
      - "runtime_seconds"
      - "runtime_status"
required:
  - "run_id"
  - "timestamp"
  - "correlations"
  - "regression"
  - "validation"
  - "diagnostics"