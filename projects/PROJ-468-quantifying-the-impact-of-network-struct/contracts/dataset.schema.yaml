%YAML 1.2
---
title: "Processed Granular Material Metrics Dataset Schema"
description: "Schema for the per-timestep metrics CSV generated by the extraction pipeline (US1)."
version: "1.0.0"
source: "code/extract.py"
output_path: "data/processed/metrics.csv"

format:
  type: csv
  delimiter: ","
  header: true

columns:
  - name: timestep
    type: integer
    description: "Simulation timestep index"
    nullable: false
    constraints:
      - >= 0

  - name: coordination_number
    type: float
    description: "Average number of contacts per particle (Z)"
    nullable: false
    constraints:
      - >= 0

  - name: clustering_coefficient
    type: float
    description: "Average local clustering coefficient of the contact network"
    nullable: true
    constraints:
      - between: [0.0, 1.0]
    notes: "Set to 0.0 if network is disconnected (<50% contacts missing)"

  - name: force_heterogeneity
    type: float
    description: "Coefficient of Variation (CV) of contact force magnitudes"
    nullable: true
    constraints:
      - >= 0
    notes: "Set to 0.0 if forces are missing/imputed; UNRELIABLE flag if <50% missing"

  - name: dissipation
    type: float
    description: "Total energy dissipated (Work_Input - (ΔKE + ΔPE))"
    nullable: false

  - name: work_input
    type: float
    description: "Total work input from driving boundaries"
    nullable: false

  - name: normalized_dissipation_rate
    type: float
    description: "Dissipation normalized by Work_Input (Dissipation / Work_Input)"
    nullable: true
    notes: "NaN if Work_Input <= 0"

  - name: data_quality_flag
    type: string
    description: "Quality indicator for the row"
    allowed_values:
      - "OK"
      - "UNRELIABLE"
      - "DISCONNECTED"
    default: "OK"

metadata:
  description: "Optional header metadata extracted from simulation logs (driving amplitude, friction)"
  keys:
    - driving_amplitude
    - friction_coefficient
    - particle_density

constraints:
  - "Rows with data_quality_flag == 'DISCONNECTED' are excluded from statistical analysis"
  - "Rows with data_quality_flag == 'UNRELIABLE' are flagged but included in analysis"
  - "Missing force values (<50%) are imputed as 0.0"
