%YAML 1.2
---
title: "Analysis Results Schema"
description: "Schema for statistical analysis outputs generated by the pipeline (US2 & US3)."
version: "1.0.0"
source: "code/analyze.py"

outputs:
  - file: "results/regression_summary.json"
    description: "Summary of regression coefficients, p-values, and diagnostic flags"
    format: json
    structure:
      - name: model_type
        type: string
        description: "Type of regression model used (e.g., 'GLS', 'OLS')"
      - name: predictors
        type: array
        item_type: string
        description: "List of predictor variables used"
      - name: coefficients
        type: object
        description: "Map of predictor name to coefficient value"
      - name: p_values
        type: object
        description: "Map of predictor name to p-value"
      - name: r_squared
        type: float
        description: "Coefficient of determination"
      - name: collinearity_flag
        type: string
        allowed_values:
          - "LOW"
          - "HIGH"
        description: "Flag if VIF > 5 for any predictor"
      - name: slope_consistency_text
        type: string
        description: "Result of ANOVA slope consistency check (from results/anova_test.csv)"

  - file: "results/regression_segments.csv"
    description: "Aggregated metrics from segmented time-series analysis (if non-stationary)"
    format: csv
    columns:
      - name: window_id
        type: integer
      - name: start_timestep
        type: integer
      - name: end_timestep
        type: integer
      - name: slope
        type: float
      - name: intercept
        type: float
      - name: p_value
        type: float
      - name: r_squared
        type: float

  - file: "results/anova_test.csv"
    description: "ANOVA test results for slope consistency across datasets"
    format: csv
    columns:
      - name: comparison
        type: string
        description: "Description of the comparison (e.g., 'Dataset_A vs Dataset_B')"
      - name: f_statistic
        type: float
      - name: p_value
        type: float
      - name: result
        type: string
        allowed_values:
          - "Significant"
          - "Non-significant"

  - file: "results/sensitivity_analysis.csv"
    description: "Results of sensitivity analysis varying subsampling fractions"
    format: csv
    columns:
      - name: subsample_fraction
        type: float
      - name: slope_coefficient
        type: float
      - name: slope_variance
        type: float
      - name: p_value
        type: float

  - file: "figures/*.png"
    description: "Publication-ready plots"
    formats:
      - scatter_plot
      - correlation_heatmap
      - residual_distribution
      - time_series
    notes: "All figures must include labels, legends, and be high-resolution (300dpi+)"

constraints:
  - "All p-values must be calculated with autocorrelation correction (Newey-West or GLS)"
  - "Non-stationary data must be segmented before regression"
  - "ANCOVA/ANOVA must be used for multi-dataset validation"