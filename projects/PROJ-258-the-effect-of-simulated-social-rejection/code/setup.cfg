[tool:pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --tb=short

[coverage:run]
source = code
branch = True
omit =
    */tests/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
