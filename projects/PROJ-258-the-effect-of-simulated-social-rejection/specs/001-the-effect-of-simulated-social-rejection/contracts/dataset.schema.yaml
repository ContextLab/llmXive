$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the raw and preprocessed dataset records."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique anonymized participant identifier."
  task:
    type: "string"
    description: "Task name (e.g., 'cyberball')."
    enum:
      - "cyberball"
  condition:
    type: "string"
    description: "Experimental condition."
    enum:
      - "rejection"
      - "control"
  reaction_time:
    type: "number"
    description: "Reaction time in milliseconds."
    minimum: 0
  mood_rating:
    type: "number"
    description: "Self-reported mood rating."
    minimum: 1
    maximum: 7
  is_outlier:
    type: "boolean"
    description: "Flag indicating if the record was flagged as an outlier."
required:
  - "participant_id"
  - "condition"
  - "reaction_time"
  - "mood_rating"
additionalProperties: false
