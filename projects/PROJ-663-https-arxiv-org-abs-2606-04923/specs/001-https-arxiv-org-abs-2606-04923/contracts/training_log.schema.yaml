$schema: "http://json-schema.org/draft-07/schema#"
title: "Training Log Entry"
description: "Schema for a single line in the CHERRL training log (JSONL)."
type: "object"
properties:
  step:
    type: "integer"
    description: "The training step index."
    minimum: 0
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the log entry."
    format: "date-time"
  prompt:
    type: "string"
    description: "The input prompt sent to the agent."
  completion:
    type: "string"
    description: "The agent's generated response."
  judge_score:
    type: "number"
    description: "The raw score assigned by the Judge model (biased)."
  ground_truth_quality:
    type: "number"
    description: "The score based on independent ground-truth quality (unbiased)."
  bias_triggered:
    type: "boolean"
    description: "Whether the bias trigger was detected in the completion."
  trigger_tokens:
    type: "array"
    description: "The specific tokens that triggered the bias."
    items:
      type: "string"
required:
  - step
  - timestamp
  - prompt
  - completion
  - judge_score
  - ground_truth_quality
  - bias_triggered
  - trigger_tokens
additionalProperties: false