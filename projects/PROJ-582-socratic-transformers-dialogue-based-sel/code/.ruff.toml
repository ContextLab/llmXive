# Ruff configuration file (legacy format for compatibility, prefer pyproject.toml)
# This file is kept for tools that look for .ruff.toml specifically.
# Primary configuration is in pyproject.toml under [tool.ruff].

line-length = 100
target-version = "py39"

[lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501", "B008", "C901"]

[lint.isort]
known-first-party = ["src"]
force-sort-within-sections = true
combine-as-imports = true
