[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "socratic-transformers-dialogue-based-sel"
version = "0.1.0"
description = "Dialogue-Based Self-Teaching Through Adversarial Questioning"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "transformers",
    "peft",
    "bitsandbytes",
    "datasets",
    "scikit-learn",
    "pandas",
    "pytest",
    "ruff",
    "black",
]

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
]
exclude = [
    ".git",
    "__pycache__",
    ".eggs",
    "*.egg-info",
    "build",
    "dist",
]

[tool.ruff.isort]
known-first-party = ["src", "tests"]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''
