# Ruff configuration for Socratic Transformers project
# Extends settings from pyproject.toml but allows for specific overrides if needed
# Currently mirrors pyproject.toml for consistency

[lint]
select = ["E4", "E7", "E9", "F", "I", "N", "W"]
ignore = []
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
