[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "socratic-transformers"
version = "0.1.0"
description = "Dialogue-Based Self-Teaching Through Adversarial Questioning"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "transformers>=4.40.0",
    "peft>=0.10.0",
    "bitsandbytes>=0.42.0",
    "datasets>=2.18.0",
    "scikit-learn>=1.4.0",
    "pandas>=2.2.0",
    "pytest>=8.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.3.0",
    "black>=24.3.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*", "tests*"]

[tool.ruff]
line-length = 88
target-version = "py310"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in tests)
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # Allow assert in tests

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
