$schema: "http://json-schema.org/draft-07/schema#"
title: "Plant VOC Prediction Dataset Schema"
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the experimental sample"
  treatment:
    type: "string"
    description: "Experimental treatment condition (e.g., drought, herbivory)"
  time_point:
    type: "integer"
    description: "Time in hours since treatment initiation"
  tissue:
    type: "string"
    description: "Plant tissue type (e.g., leaf, root)"
  temperature:
    type: "number"
    description: "Ambient temperature in Celsius"
    minimum: 0
  light_intensity:
    type: "number"
    description: "Light intensity in µmol m⁻² s⁻¹"
    minimum: 0
  co2_level:
    type: "number"
    description: "CO2 concentration in ppm"
    minimum: 0
  replicate_count:
    type: "integer"
    description: "Number of biological replicates for this condition"
    minimum: 1
  genes:
    type: "object"
    description: "Dictionary of gene_id to TPM value"
    additionalProperties:
      type: "number"
      minimum: 0
  vocs:
    type: "object"
    description: "Dictionary of voc_id to concentration value"
    additionalProperties:
      type: "number"
      minimum: 0
required:
  - sample_id
  - treatment
  - time_point
  - tissue
  - temperature
  - light_intensity
  - co2_level
  - replicate_count
  - genes
  - vocs
additionalProperties: false
