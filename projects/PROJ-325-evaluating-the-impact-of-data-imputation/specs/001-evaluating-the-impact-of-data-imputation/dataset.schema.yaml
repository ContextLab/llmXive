$schema: http://json-schema.org/draft-07/schema#
title: Survey Dataset Schema
description: >
  Schema for raw and processed survey datasets used in the imputation analysis pipeline.
  Includes design variables (weights, strata, PSU) and data variables.
type: object
required:
  - metadata
  - data
properties:
  metadata:
    type: object
    required:
      - source
      - dataset_id
      - created_at
      - record_count
      - variable_count
      - missingness_summary
    properties:
      source:
        type: string
        description: "Name of the data source (e.g., GSS 2018, ACS 2020)"
      dataset_id:
        type: string
        description: "Unique identifier for this dataset version"
      created_at:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of dataset creation"
      record_count:
        type: integer
        minimum: 0
        description: "Total number of rows in the dataset"
      variable_count:
        type: integer
        minimum: 0
        description: "Total number of columns in the dataset"
      missingness_summary:
        type: object
        description: "Per-variable missingness statistics"
        additionalProperties:
          type: object
          properties:
            missing_count:
              type: integer
            missing_ratio:
              type: number
              minimum: 0
              maximum: 1
            mechanism:
              type: string
              enum: [MCAR, MAR, MNAR, unknown]
              description: "Inferred or assumed missingness mechanism"
  data:
    type: array
    description: "Array of records (rows). Each record is an object with column names as keys."
    items:
      type: object
      additionalProperties: true
    minItems: 1
examples:
  - metadata:
      source: "GSS 2018"
      dataset_id: "gss_2018_subset_v1"
      created_at: "2023-10-27T10:00:00Z"
      record_count: 1000
      variable_count: 15
      missingness_summary:
        age:
          missing_count: 5
          missing_ratio: 0.005
          mechanism: MCAR
    data:
      - caseid: 1
        year: 2018
        age: 35
        weight: 1.2
        psu: 101
        strata: 5
      - caseid: 2
        year: 2018
        age: null
        weight: 0.9
        psu: 101
        strata: 5
