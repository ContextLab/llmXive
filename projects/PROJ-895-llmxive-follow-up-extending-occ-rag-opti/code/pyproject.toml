[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-occ-rag-opti"
version = "0.1.0"
description = "Optimal Cognitive Core for Faithful Question Answering"
requires-python = ">=3.11"
dependencies = [
    "torch",
    "transformers",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets"
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]