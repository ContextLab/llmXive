$schema: http://json-schema.org/draft-07/schema#
title: Latent Vector Schema
description: >
  Schema for extracted hidden state vectors (baseline and perturbed).
  Represents the "thought" token embedding.
type: object
required:
  - pair_id
  - sigma
  - vector
  - dimension
  - is_normalized
properties:
  pair_id:
    type: string
    description: Foreign key linking to the dataset entry.
  sigma:
    type: number
    description: >
      The noise magnitude used for this vector.
      0.0 indicates baseline (no noise).
  vector:
    type: array
    items:
      type: number
    description: >
      The flattened L2-normalized hidden state vector.
      Length must match model hidden dimension.
  dimension:
    type: integer
    minimum: 1
    description: The dimensionality of the vector (e.g., 4096 for Llama-7B).
  is_normalized:
    type: boolean
    description: Must be true. Vectors are L2-normalized before storage.
  extraction_step:
    type: string
    description: >
      The specific step in the pipeline that generated this vector.
      Values: 'baseline', 'perturbed'
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of extraction.
additionalProperties: false
