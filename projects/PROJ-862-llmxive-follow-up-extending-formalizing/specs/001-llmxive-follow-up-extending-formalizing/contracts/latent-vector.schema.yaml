$schema: http://json-schema.org/draft-07/schema#
title: Latent Vector Schema
description: Schema for extracted hidden state vectors (baseline and perturbed).
type: object
required:
  - pair_id
  - sigma
  - vector
  - is_baseline
  - task_type
properties:
  pair_id:
    type: integer
    description: Foreign key linking to the dataset schema.
  sigma:
    type: number
    description: The noise standard deviation used for perturbation (0.0 for baseline).
  vector:
    type: array
    items:
      type: number
      format: float
    description: The L2-normalized hidden state vector (float32).
  vector_shape:
    type: integer
    description: Dimensionality of the vector (should match model hidden size).
  is_baseline:
    type: boolean
    description: True if this vector is from the unperturbed baseline extraction.
  task_type:
    type: string
    description: The task type for grouping analysis.
  extraction_step:
    type: integer
    description: The layer or step index if multi-layer extraction is performed.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of extraction.
