$schema: http://json-schema.org/draft-07/schema#
title: Statistical Result Schema
description: Schema for the output of the separability analysis and hypothesis testing.
type: object
required:
  - task_type
  - test_type
  - p_value
  - corrected_p_value
  - significant
  - sample_size
  - validity_collapse_point
properties:
  task_type:
    type: string
    description: The task type this result applies to.
  test_type:
    type: string
    enum: [paired_ttest, wilcoxon_signed_rank]
    description: The statistical test performed.
  baseline_stats:
    type: object
    properties:
      mean:
        type: number
      std:
        type: number
      n:
        type: integer
  perturbed_stats:
    type: object
    properties:
      mean:
        type: number
      std:
        type: number
      n:
        type: integer
  p_value:
    type: number
    description: Raw p-value from the test.
  corrected_p_value:
    type: number
    description: P-value after family-wise error correction (Bonferroni/Holm).
  significant:
    type: boolean
    description: True if corrected_p_value < 0.05.
  sample_size:
    type: integer
    description: Number of pairs used in the test.
  validity_collapse_point:
    type: object
    description: The sigma value where validity rate dropped below 10%.
    properties:
      sigma:
        type: number
      pass_rate:
        type: number
  trade_off_curve:
    type: array
    items:
      type: object
      properties:
        sigma:
          type: number
        pass_rate:
          type: number
        separability_metric:
          type: number
    description: List of (sigma, pass_rate, metric) points for the trade-off analysis.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of analysis.
