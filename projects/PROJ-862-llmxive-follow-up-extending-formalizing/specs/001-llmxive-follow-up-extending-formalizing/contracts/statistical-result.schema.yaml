$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Result Schema"
description: "Schema for the final statistical analysis results."
type: "object"
properties:
  task_type:
    type: "string"
    description: "The task category being analyzed."
  sigma:
    type: "number"
    description: "The noise magnitude tested."
  n_valid:
    type: "integer"
    description: "Number of pairs passing validity checks."
  mean_similarity_baseline:
    type: "number"
    description: "Mean cosine similarity for baseline pairs."
  mean_similarity_perturbed:
    type: "number"
    description: "Mean cosine similarity for perturbed pairs."
  difference:
    type: "number"
    description: "Mean difference (perturbed - baseline)."
  test_type:
    type: "string"
    enum:
      - "t-test"
      - "wilcoxon"
    description: "Statistical test used."
  p_value:
    type: "number"
    description: "Raw p-value."
  p_value_corrected:
    type: "number"
    description: "P-value after family-wise error correction."
  effect_size:
    type: "number"
    description: "Effect size (Cohen's d or rank-biserial)."
  significance:
    type: "string"
    enum:
      - "significant"
      - "not_significant"
    description: "Final significance flag."
required:
  - task_type
  - sigma
  - n_valid
  - mean_similarity_baseline
  - mean_similarity_perturbed
  - difference
  - test_type
  - p_value
  - p_value_corrected
  - effect_size
  - significance
additionalProperties: false
