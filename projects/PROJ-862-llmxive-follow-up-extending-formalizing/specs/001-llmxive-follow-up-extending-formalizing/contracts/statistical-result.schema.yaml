%YAML 1.2
---
$schema: http://json-schema.org/draft-07/schema#
title: Statistical Analysis Result Schema
description: |
  Schema for the output of the statistical separability analysis.
  Contains hypothesis test results and sensitivity reports.
type: object
required:
  - analysis_id
  - test_type
  - p_value
  - corrected_p_value
  - significance_level
  - conclusion
  - sample_sizes
properties:
  analysis_id:
    type: string
    description: Unique identifier for this analysis run.
  task_type:
    type: string
    description: The specific task type analyzed.
  test_type:
    type: string
    description: The statistical test used (e.g., 'paired_t_test', 'wilcoxon_signed_rank').
    enum:
      - paired_t_test
      - wilcoxon_signed_rank
      - mann_whitney_u
  normality_check:
    type: object
    properties:
      method:
        type: string
        enum: [shapiro_wilk, kolmogorov_smirnov]
      p_value:
        type: number
      is_normal:
        type: boolean
  sample_sizes:
    type: object
    properties:
      baseline_n:
        type: integer
        minimum: 1
      perturbed_n:
        type: integer
        minimum: 1
  test_statistics:
    type: object
    properties:
      statistic:
        type: number
      p_value:
        type: number
  corrected_p_value:
    type: number
    description: P-value after family-wise error rate correction (Bonferroni/Holm).
    minimum: 0
    maximum: 1
  significance_level:
    type: number
    description: The alpha threshold used for significance (e.g., 0.05).
    minimum: 0
    maximum: 1
  conclusion:
    type: string
    description: Human-readable conclusion of the test.
  separability_increase:
    type: boolean
    description: True if the test indicates a significant increase in separability.
  sensitivity_report:
    type: object
    description: Report on validity collapse points and trade-off curves.
    properties:
      validity_collapse_point:
        type: number
        description: The sigma value where validity dropped below threshold.
        nullable: true
      trade_off_curve:
        type: array
        description: List of {sigma, pass_rate} points.
        items:
          type: object
          properties:
            sigma:
              type: number
            pass_rate:
              type: number
  timestamp:
    type: string
    format: date-time
additionalProperties: false
