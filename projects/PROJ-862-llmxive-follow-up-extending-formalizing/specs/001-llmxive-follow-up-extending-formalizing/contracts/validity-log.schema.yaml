$schema: http://json-schema.org/draft-07/schema#
title: Validity Log Schema
description: Schema for logging validity check results (input drift and output validity).
type: object
required:
  - pair_id
  - sigma
  - input_drift_passed
  - output_validity_passed
  - overall_valid
  - input_similarity_score
  - output_f1_score
  - output_perplexity_ratio
  - failure_reason
properties:
  pair_id:
    type: integer
    description: Foreign key linking to the dataset.
  sigma:
    type: number
    description: The noise level applied.
  input_drift_passed:
    type: boolean
    description: True if cosine similarity with baseline input >= 0.95.
  input_similarity_score:
    type: number
    description: The actual cosine similarity score.
  output_validity_passed:
    type: boolean
    description: True if BERTScore F1 >= 0.85 and perplexity ratio <= 2.0.
  output_f1_score:
    type: number
    description: The BERTScore F1 metric.
  output_perplexity_ratio:
    type: number
    description: Ratio of perturbed perplexity to baseline perplexity.
  overall_valid:
    type: boolean
    description: True if both input and output checks passed.
  failure_reason:
    type: string
    enum: [none, input_drift, output_invalid, both]
    description: Reason for failure if overall_valid is False.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of the check.