$schema: http://json-schema.org/draft-07/schema#
title: Reasoning Dataset Schema
description: Schema for the raw and processed reasoning dataset used in the noise injection pipeline.
type: object
required:
  - question
  - expected_answer
  - task_type
  - pair_id
  - thought_token_pos
  - input_ids
properties:
  question:
    type: string
    description: The original question text.
  expected_answer:
    type: string
    description: The ground truth answer for validity checking.
  task_type:
    type: string
    description: Category of the reasoning task (e.g., 'math', 'logic', 'commonsense').
  pair_id:
    type: integer
    description: Unique identifier for the question pair used in contrastive analysis.
  thought_token_pos:
    type: integer
    description: Index of the token representing the 'thought' or reasoning step in the input sequence.
  input_ids:
    type: array
    items:
      type: integer
    description: Tokenized input sequence IDs.
  attention_mask:
    type: array
    items:
      type: integer
    description: Attention mask corresponding to input_ids.
  metadata:
    type: object
    description: Optional metadata fields (source, difficulty, etc.).
