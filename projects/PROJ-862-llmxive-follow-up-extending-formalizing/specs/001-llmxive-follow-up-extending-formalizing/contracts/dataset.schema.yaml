$schema: http://json-schema.org/draft-07/schema#
title: Reasoning Dataset Schema
description: >
  Schema for the input reasoning dataset used in the noise injection pipeline.
  Derived from BigBench subset or equivalent verified source.
type: object
required:
  - question
  - expected_answer
  - task_type
  - pair_id
properties:
  question:
    type: string
    description: The raw question prompt sent to the model.
    minLength: 1
  expected_answer:
    type: string
    description: >
      The ground truth answer used for validity checks (BERTScore).
      Must be present for US2 and US3.
    minLength: 1
  task_type:
    type: string
    description: >
      Classification of the reasoning task (e.g., 'math', 'logic', 'commonsense').
      Used for grouping and PairID assignment.
  pair_id:
    type: string
    description: >
      Unique identifier for the question pair (baseline vs perturbed).
      Assigned during the pairing phase (T013).
      Format: "tasktype-XXXX"
  source_id:
    type: string
    description: Original ID from the source dataset (e.g., BigBench ID).
  metadata:
    type: object
    description: Optional metadata fields (e.g., difficulty, tags).
    additionalProperties: true
additionalProperties: false
