$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Result Schema"
description: "Schema for the JSON report generated by the modeling pipeline."
type: "object"
properties:
  model_type:
    type: "string"
    description: "Type of model run."
    enum:
      - "ridge"
      - "null"
      - "reduced"
  alpha:
    type: "number"
    description: "Regularization parameter alpha."
  fold:
    type: "integer"
    description: "Cross-validation fold index (if applicable)."
  mae:
    type: "number"
    description: "Mean Absolute Error."
  pearson_r:
    type: "number"
    description: "Pearson correlation coefficient."
  r_squared:
    type: "number"
    description: "Coefficient of determination."
  p_value:
    type: "number"
    description: "Empirical p-value (only for final aggregate results)."
  permutation_index:
    type: "integer"
    description: "Index of the permutation (if null model)."
  delta_r2:
    type: "number"
    description: "Difference in R² between Full and Reduced models (for isolation)."
required:
  - model_type
  - alpha
  - mae
  - pearson_r
  - r_squared
additionalProperties: false