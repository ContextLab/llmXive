$schema: "http://json-schema.org/draft-07/schema#"
title: "EVA-Bench Dataset Schema"
description: "Schema for the raw EVA-Bench JSONL dataset entries."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the scenario."
  audio:
    type: "string"
    description: "Relative path to the audio file within the dataset."
  turns:
    type: "array"
    description: "List of turns in the conversation."
    items:
      type: "object"
      properties:
        speaker:
          type: "string"
          enum: ["user", "agent"]
        text:
          type: "string"
          description: "Transcript of the turn."
        start_time:
          type: "number"
          description: "Start time in seconds."
        end_time:
          type: "number"
          description: "End time in seconds."
  ground_truth:
    type: "string"
    description: "Ground truth label or expected outcome."
required:
  - "id"
  - "audio"
  - "turns"
additionalProperties: true
