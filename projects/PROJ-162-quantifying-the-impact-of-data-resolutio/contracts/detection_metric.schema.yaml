$schema: "http://json-schema.org/draft-07/schema#"
title: Detection Metric Aggregation
description: Schema for aggregated detection probability metrics per resolution level.
type: object
required:
  - p_value
  - method
  - detection_probability
  - resolution
  - n_injections
properties:
  p_value:
    type: number
    description: Statistical p-value from the hypothesis test (e.g., Welch's t-test).
    minimum: 0
    maximum: 1
  method:
    type: string
    description: Name of the statistical method used for the test (e.g., "Welch t-test", "Mann-Whitney U").
    enum:
      - "Welch t-test"
      - "Mann-Whitney U"
      - "Jonckheere-Terpstra"
      - "Linear Regression"
  detection_probability:
    type: number
    description: Fraction of injections where re_weighted_snr > 8.
    minimum: 0
    maximum: 1
  resolution:
    type: integer
    description: Sampling frequency in Hz for this aggregated metric.
    minimum: 1
  n_injections:
    type: integer
    description: Total number of injections included in this aggregation.
    minimum: 1
  comparison_resolution:
    type: integer
    description: The resolution level this metric is being compared against (for pairwise tests).
    optional: true
  confidence_interval:
    type: array
    items:
      type: number
    minItems: 2
    maxItems: 2
    description: 95% confidence interval [lower, upper] for the detection probability.
    optional: true
  timestamp:
    type: string
    format: date-time
    description: Timestamp of the analysis run.
    optional: true
additionalProperties: false