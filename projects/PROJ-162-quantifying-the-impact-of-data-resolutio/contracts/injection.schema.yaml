$schema: http://json-schema.org/draft-07/schema#
title: Injection Realization Metadata
description: >
  Schema for injection realization metadata generated during the signal injection process.
  Tracks random seeds, time offsets, noise segment IDs, and resolution parameters
  to ensure reproducibility and enable statistical analysis.
type: object
required:
  - injection_id
  - waveform_id
  - noise_segment_id
  - time_offset
  - sampling_rate
  - seed
  - injection_timestamp
  - parameters
properties:
  injection_id:
    type: string
    description: Unique identifier for this injection realization
    pattern: "^inj_[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
  waveform_id:
    type: string
    description: Reference to the source waveform used for injection
    pattern: "^wf_[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
  noise_segment_id:
    type: string
    description: Identifier for the GWOSC noise segment used
    type: string
  time_offset:
    type: number
    description: Time offset (seconds) within the noise segment where signal was injected
    minimum: 0
  sampling_rate:
    type: integer
    description: Sampling rate of the injected data in Hz
    enum: [4096, 2048, 1024, 512, 256]
  seed:
    type: integer
    description: Random seed used for time offset selection
    minimum: 0
  injection_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp when injection was performed
  parameters:
    type: object
    description: Physical parameters of the injected signal
    required:
      - mass1
      - mass2
      - mass_ratio
      - chirp_mass
      - luminosity_distance
      - redshift
      - phase
      - polarization
    properties:
      mass1:
        type: number
        description: Primary component mass in solar masses
        minimum: 10
        maximum: 50
      mass2:
        type: number
        description: Secondary component mass in solar masses
        minimum: 10
        maximum: 50
      mass_ratio:
        type: number
        description: Mass ratio q = m2/m1 (<= 1)
        minimum: 0
        maximum: 1
      chirp_mass:
        type: number
        description: Chirp mass in solar masses
      luminosity_distance:
        type: number
        description: Luminosity distance in Mpc
        minimum: 100
        maximum: 500
      redshift:
        type: number
        description: Redshift of the source
        minimum: 0
      phase:
        type: number
        description: Coalescence phase in radians
        minimum: 0
        maximum: 6.283185307179586
      polarization:
        type: number
        description: Polarization angle in radians
        minimum: 0
        maximum: 6.283185307179586
  processing_info:
    type: object
    description: Metadata about the injection processing
    required:
      - filter_type
      - filter_order
      - amplitude_correction_applied
    properties:
      filter_type:
        type: string
        enum: ["FIR", "IIR"]
      filter_order:
        type: integer
        minimum: 1
      amplitude_correction_applied:
        type: boolean
        description: Whether amplitude correction for filter response was applied
      downsample_method:
        type: string
        enum: ["decimation", "resampling"]
additionalProperties: false
