$schema: "http://json-schema.org/draft-07/schema#"
title: Injection Result
description: Schema for individual injection results containing SNR metrics and metadata.
type: object
required:
  - resolution
  - snr
  - re_weighted_snr
  - timestamp
  - noise_segment_id
properties:
  resolution:
    type: integer
    description: Sampling frequency of the injection in Hz (e.g., 256, 512, 1024, 2048, 4096).
    minimum: 1
  snr:
    type: number
    description: Matched-filter signal-to-noise ratio (rho).
    minimum: 0
  re_weighted_snr:
    type: number
    description: Re-weighted SNR (rho_hat) accounting for chi-squared consistency.
    minimum: 0
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 formatted timestamp of the injection event.
  noise_segment_id:
    type: string
    description: Unique identifier for the GWOSC noise segment used.
  injection_id:
    type: string
    description: Unique identifier for this specific injection realization.
    optional: true
  waveform_id:
    type: string
    description: Identifier of the source waveform used.
    optional: true
  time_offset:
    type: number
    description: Time offset in seconds where the signal was injected.
    optional: true
additionalProperties: false
