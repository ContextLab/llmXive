$schema: http://json-schema.org/draft-07/schema#
title: Injection Metric
description: Schema for gravitational wave injection metrics.
type: object
required:
  - resolution
  - snr
  - re_weighted_snr
  - timestamp
  - noise_segment_id
properties:
  resolution:
    type: integer
    description: Sampling frequency in Hz (e.g., 4096, 2048, 1024, 512, 256).
    minimum: 64
  snr:
    type: number
    description: Signal-to-Noise Ratio from matched filtering.
    minimum: 0
  re_weighted_snr:
    type: number
    description: Re-weighted SNR ($\hat{\rho}$) accounting for chi-squared.
    minimum: 0
  timestamp:
    type: string
    description: ISO 8601 timestamp of the injection event.
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?Z?$"
  noise_segment_id:
    type: string
    description: Identifier for the noise segment used.
    minLength: 1
additionalProperties: false
