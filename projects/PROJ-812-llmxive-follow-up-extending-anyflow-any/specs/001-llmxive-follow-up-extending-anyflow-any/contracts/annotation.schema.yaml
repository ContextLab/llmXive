$schema: "http://json-schema.org/draft-07/schema#"
title: "Annotation Schema"
description: "Schema for the manual continuity scores (data/processed/annotations.csv)"
type: "object"
properties:
  video_id:
    type: "string"
    description: "Unique identifier for the video clip"
  score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Manual continuity score (0.0=continuous, 1.0=discontinuous)"
  annotator_id:
    type: "string"
    description: "ID of the annotator or 'system' for simulated"
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the annotation"
required:
  - video_id
  - score
  - annotator_id
  - timestamp
additionalProperties: false
