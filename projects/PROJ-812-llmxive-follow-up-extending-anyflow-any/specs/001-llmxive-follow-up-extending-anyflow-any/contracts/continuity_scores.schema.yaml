$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  video_id:
    type: string
    description: "Foreign key to VideoClip"
  score:
    type: number
    description: "Manual continuity score (0.0 to 1.0)"
    minimum: 0.0
    maximum: 1.0
  annotator_id:
    type: string
    description: "Identifier for the human annotator"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of annotation"
required:
  - video_id
  - score
  - annotator_id
  - timestamp
additionalProperties: false
description: "Schema for data/annotations/continuity_scores.csv"
