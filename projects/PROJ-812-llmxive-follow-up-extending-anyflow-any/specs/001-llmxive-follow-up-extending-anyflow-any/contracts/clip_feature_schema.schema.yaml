$schema: "http://json-schema.org/draft-07/schema#"
title: "ClipFeatureSchema"
description: "Schema for the extracted statistical features of a video clip."
type: "object"
properties:
  clip_id:
    type: "string"
    description: "Unique identifier for the video clip."
  source_dataset:
    type: "string"
    description: "Name of the source dataset (e.g., 'kinetics400')."
  optical_flow_variance:
    type: "number"
    description: "Variance of the optical flow magnitude across the clip."
  frame_to_frame_mse:
    type: "number"
    description: "Mean Squared Error between consecutive frames."
  temporal_gradient_sparsity:
    type: "number"
    description: "Ratio of pixels with high temporal gradients."
  status:
    type: "string"
    enum: ["processed", "skipped", "timeout"]
    description: "Processing status of the clip."
  error_message:
    type: ["string", "null"]
    description: "Error message if the clip was skipped or failed."
required:
  - clip_id
  - source_dataset
  - optical_flow_variance
  - frame_to_frame_mse
  - temporal_gradient_sparsity
  - status
additionalProperties: false