$schema: "http://json-schema.org/draft-07/schema#"
title: "ClipFeatureSchema"
description: "Schema for the extracted statistical features of a video clip. Note: Ground truth annotations rely on raw pixel data or independent metrics, NOT optical flow or model-derived features."
type: "object"
properties:
  clip_id:
    type: "string"
    description: "Unique identifier for the video clip."
  source_dataset:
    type: "string"
    description: "Name of the source dataset (e.g., 'kinetics400')."
  status:
    type: "string"
    enum: ["processed", "skipped", "timeout"]
    description: "Processing status of the clip."
  error_message:
    type: ["string", "null"]
    description: "Error message if the clip was skipped or failed."
required:
  - clip_id
  - source_dataset
  - status
additionalProperties: false