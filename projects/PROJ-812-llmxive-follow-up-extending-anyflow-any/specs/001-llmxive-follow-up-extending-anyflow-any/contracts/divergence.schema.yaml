$schema: "http://json-schema.org/draft-07/schema#"
title: "Divergence Metric Schema"
description: "Schema for computed flow-map divergence metrics (data/processed/divergence_metrics.csv)"
type: "object"
properties:
  video_id:
    type: "string"
    description: "Unique identifier for the video clip"
  divergence_score:
    type: "number"
    description: "L2 distance between predicted and Euler-rolled states"
    minimum: 0.0
  euler_steps:
    type: "integer"
    description: "Number of steps used in the Euler rollout (500 or 200)"
  model_version:
    type: "string"
    description: "SHA-256 hash of the ONNX model used"
  inference_time_ms:
    type: "number"
    description: "Time taken for inference in milliseconds"
  status:
    type: "string"
    description: "Status of computation"
    enum: ["success", "failed"]
  error_msg:
    type: "string"
    description: "Error message if status is failed"
    nullable: true
  quantization_mode:
    type: "string"
    description: "Quantization mode used"
    enum: ["float32"]
required:
  - video_id
  - divergence_score
  - euler_steps
  - model_version
  - inference_time_ms
  - status
  - quantization_mode
additionalProperties: false