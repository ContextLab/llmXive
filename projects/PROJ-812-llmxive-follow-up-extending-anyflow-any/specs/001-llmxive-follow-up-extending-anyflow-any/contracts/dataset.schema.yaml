$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the curated video dataset and ground truth annotations."
type: "object"
properties:
  video_id:
    type: "string"
    description: "Unique identifier for the video clip."
  source:
    type: "string"
    description: "Source dataset name (e.g., 'UCF101', 'Kinetics')."
  type:
    type: "string"
    enum:
      - "continuous"
      - "cut"
    description: "Stratification label."
  path:
    type: "string"
    description: "Local file path to the video clip."
  continuity_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Manual ground-truth score (0.0 = continuous, 1.0 = cut)."
  divergence_score:
    type: "number"
    minimum: 0.0
    description: "Computed L2 divergence metric."
  euler_steps:
    type: "integer"
    description: "Number of steps used for the Euler baseline (e.g., 500)."
required:
  - video_id
  - source
  - type
  - path
  - continuity_score
additionalProperties: false
