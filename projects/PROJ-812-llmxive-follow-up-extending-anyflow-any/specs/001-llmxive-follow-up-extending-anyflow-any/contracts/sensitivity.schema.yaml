$schema: "http://json-schema.org/draft-07/schema#"
title: "Sensitivity Report Schema"
description: "Schema for threshold sensitivity analysis (data/processed/sensitivity_report.json)"
type: "object"
properties:
  threshold:
    type: "number"
    description: "Classification threshold value"
  true_positive_rate:
    type: "number"
    description: "Recall (TP / (TP + FN))"
  false_positive_rate:
    type: "number"
    description: "FPR (FP / (FP + TN))"
  accuracy:
    type: "number"
    description: "Overall accuracy"
  binarization_rule:
    type: "string"
    description: "Rule used to binarize continuous scores"
    const: "Score < 0.4 = 0, Score > 0.6 = 1"
required:
  - threshold
  - true_positive_rate
  - false_positive_rate
  - accuracy
  - binarization_rule
additionalProperties: false

