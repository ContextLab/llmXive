[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-decoding-emotional-valence"
version = "0.1.0"
description = "Decoding Emotional Valence from Facial EMG Patterns with Machine Learning"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "scikit-learn",
    "pandas",
    "joblib",
    "shap",
    "requests",
    "scikit-learn-extra",
    "pytest",
    "pytest-cov",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --cov=code --cov-report=term-missing"
