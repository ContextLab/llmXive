# Ruff configuration for llmXive project
# Enforces strict linting rules consistent with scientific code standards

line-length = 88
target-version = "py311"

[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and isort (`I`)
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in ML)
]

[lint.isort]
known-first-party = [
    "code"
]
force-to-top = ["code"]
