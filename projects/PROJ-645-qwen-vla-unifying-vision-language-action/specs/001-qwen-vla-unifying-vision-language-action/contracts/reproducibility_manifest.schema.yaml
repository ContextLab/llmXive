$schema: "http://json-schema.org/draft-07/schema#"
title: ReproducibilityManifest
type: object
required:
  - python_version
  - torch_version
  - dependencies
  - git_commit
  - dataset_checksum
  - dataset_version
  - hyperparameters
  - wall_time_sec
  - peak_ram_gb
properties:
  python_version:
    type: string
  torch_version:
    type: string
  dependencies:
    type: array
    items:
      type: string
  git_commit:
    type: string
    pattern: "^[a-f0-9]{40}$"
  dataset_checksum:
    type: string
    pattern: "^[a-f0-9]{64}$"
  dataset_version:
    type: string
    description: "Exact version identifier of the source dataset."
  hyperparameters:
    type: object
    additionalProperties:
      type: string
  wall_time_sec:
    type: number
    minimum: 0
  peak_ram_gb:
    type: number
    minimum: 0
