$schema: "http://json-schema.org/draft-07/schema#"
title: ModelCheckpoint
type: object
required:
  - size_mb
  - training_config
  - path
  - timestamp
properties:
  size_mb:
    type: number
    minimum: 0.0
  training_config:
    type: object
    required:
      - learning_rate
      - batch_size
      - seeds
      - ratio
      - wall_time_sec
    properties:
      learning_rate:
        type: number
      batch_size:
        type: integer
        minimum: 1
      seeds:
        type: array
        items:
          type: integer
      ratio:
        type: number
        minimum: 0.0
        maximum: 1.0
      wall_time_sec:
        type: number
        minimum: 0
  path:
    type: string
    pattern: "^models/.*\\.pt$"
  timestamp:
    type: string
    format: date-time
