$schema: "http://json-schema.org/draft-07/schema#"
title: EvaluationResult
type: object
required:
  - seed
  - benchmark
  - platform
  - success_rate
  - trajectory_length
  - variance
  - checkpoint_path
properties:
  seed:
    type: integer
  benchmark:
    type: string
    enum: ["LIBERO-Spatial", "LIBERO-Object"]
  platform:
    type: string
    enum: ["Franka", "UR5"]
  success_rate:
    type: number
    minimum: 0
    maximum: 100
  trajectory_length:
    type: number
    minimum: 0
  variance:
    type: number
    minimum: 0
  checkpoint_path:
    type: string
    pattern: "^models/.*\\.pt$"
