$schema: "http://json-schema.org/draft-07/schema#"
title: StatisticalReport
type: object
required:
  - test_name
  - p_value
  - p_value_corrected
  - significant
  - effect_size
  - confidence_interval
  - seed_vectors
properties:
  test_name:
    type: string
    enum: ["wilcoxon_signed_rank", "linear_regression_slope"]
  p_value:
    type: number
    minimum: 0
    maximum: 1
  p_value_corrected:
    type: number
    minimum: 0
    maximum: 1
  significant:
    type: boolean
  effect_size:
    type: number
  confidence_interval:
    type: array
    items:
      type: number
    minItems: 2
    maxItems: 2
  seed_vectors:
    type: array
    items:
      type: number
