[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qwen-vla-unifying-vision-language-action"
version = "0.1.0"
description = "Qwen-VLA Cross-Embodiment Transfer Study"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "torch==2.3.0",
    "transformers",
    "datasets",
    "scipy",
    "psutil",
    "click",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4.0",
    "black>=24.0.0",
]

[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311"]
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
include = ["*.py", "*.pyi"]
exclude = [
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "C",    # flake8-comprehensions
    "B",    # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "B905", # `zip()` without an explicit `strict=` parameter (Python 3.10+ only)
]

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = false
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"] # Allow assertions in tests
"scripts/*" = ["S101"]
