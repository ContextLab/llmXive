$schema: http://json-schema.org/draft-07/schema#
title: Regression Result Schema
description: Schema for the output of the multiple linear regression analysis.
type: object
properties:
  predictor:
    type: string
    description: "Name of the predictor variable"
  coefficient:
    type: number
    description: "Estimated beta coefficient"
  std_error:
    type: number
    description: "Standard error of the coefficient"
  p_value_raw:
    type: number
    description: "Raw p-value from permutation test"
  p_value_adjusted:
    type: number
    description: "Holm-Bonferroni adjusted p-value"
  ci_lower:
    type: number
    description: "Lower bound of 95% confidence interval"
  ci_upper:
    type: number
    description: "Upper bound of 95% confidence interval"
  significant:
    type: boolean
    description: "True if adjusted p-value < 0.05"
required:
  - predictor
  - coefficient
  - std_error
  - p_value_raw
  - p_value_adjusted
  - ci_lower
  - ci_upper
  - significant
additionalProperties: false