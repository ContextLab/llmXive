$schema: http://json-schema.org/draft-07/schema#
title: Baseline Metrics Schema
description: Schema for the baseline network metrics extracted from rs-fMRI data.
type: object
properties:
  participant_id:
    type: string
    description: "Unique participant identifier (e.g., sub-001)"
  global_efficiency:
    type: number
    description: "Global efficiency of the brain network (0.0 to 1.0)"
  modularity:
    type: number
    description: "Modularity Q value of the network partition"
  frontoparietal_strength:
    type: number
    description: "Average edge weight within the frontoparietal network"
  default_mode_strength:
    type: number
    description: "Average edge weight within the default mode network"
  mean_fd:
    type: number
    description: "Mean framewise displacement in mm"
  excluded_motion:
    type: boolean
    description: "True if mean_fd > 3.0 mm"
required:
  - participant_id
  - global_efficiency
  - modularity
  - frontoparietal_strength
  - default_mode_strength
  - mean_fd
  - excluded_motion
additionalProperties: false