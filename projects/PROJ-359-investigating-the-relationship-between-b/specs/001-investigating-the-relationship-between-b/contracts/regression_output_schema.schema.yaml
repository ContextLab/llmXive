$schema: "http://json-schema.org/draft-07/schema#"
title: "Regression Output Schema"
description: "Schema for the model summary CSV containing coefficients and p-values. Validated in Phase 3."
type: "object"
properties:
  predictor:
    type: "string"
    description: "Name of the predictor variable."
  coefficient:
    type: "number"
    description: "Estimated regression coefficient (beta)."
  std_error:
    type: "number"
    description: "Standard error of the coefficient."
  p_value_perm:
    type: "number"
    description: "Permutation-based p-value (0 to 1)."
    minimum: 0
    maximum: 1
  p_value_adjusted:
    type: "number"
    description: "Holm-Bonferroni adjusted p-value."
    minimum: 0
    maximum: 1
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  effect_size:
    type: "number"
    description: "Standardized effect size (Cohen's d or beta)."
required:
  - predictor
  - coefficient
  - std_error
  - p_value_perm
  - p_value_adjusted
  - ci_lower
  - ci_upper
  - effect_size