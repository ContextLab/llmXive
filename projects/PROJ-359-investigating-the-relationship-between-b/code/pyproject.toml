[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-359-brain-network-dynamics"
version = "0.1.0"
description = "Investigating the relationship between brain network dynamics and baseline working memory performance"
requires-python = ">=3.11"
dependencies = [
    "fmriprep==23.1.3",
    "nilearn",
    "networkx",
    "bctpy",
    "scikit-learn",
    "statsmodels",
    "pandas",
    "matplotlib",
    "pyyaml",
    "openneuro-py",
    "requests",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.setuptools]
packages = ["src", "tests"]
package-dir = {"" = "code"}
