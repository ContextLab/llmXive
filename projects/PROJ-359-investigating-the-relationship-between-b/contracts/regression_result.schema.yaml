$schema: http://json-schema.org/draft-07/schema#
title: Regression Result Schema
description: |
  Schema for the final regression result object used for validation
  and visualization generation. Includes model fit statistics and
  predictor details.
type: object
required:
  - model_summary
  - fit_statistics
  - metadata
properties:
  model_summary:
    type: array
    description: Array of predictor results matching regression_output_schema
    items:
      type: object
      required:
        - predictor
        - beta
        - se
        - p_perm
        - p_corrected
        - ci_lower
        - ci_upper
  fit_statistics:
    type: object
    required:
      - r_squared
      - adjusted_r_squared
      - f_statistic
      - p_model
    properties:
      r_squared:
        type: number
      adjusted_r_squared:
        type: number
      f_statistic:
        type: number
      p_model:
        type: number
  metadata:
    type: object
    required:
      - n_observations
      - n_predictors
      - random_seed
    properties:
      n_observations:
        type: integer
        minimum: 0
      n_predictors:
        type: integer
        minimum: 0
      random_seed:
        type: integer
      pipeline_version:
        type: string