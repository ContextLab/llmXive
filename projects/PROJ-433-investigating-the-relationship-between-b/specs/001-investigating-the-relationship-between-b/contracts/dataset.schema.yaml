$schema: "http://json-schema.org/draft-07/schema#"
title: "HCP Dataset Metadata"
description: "Schema for the verified HCP dataset metadata and behavioral scores."
type: object
properties:
  subject_id:
    type: string
    description: "Unique HCP subject identifier (e.g., '100307')."
  dsst_score:
    type: number
    description: "Digit Symbol Substitution Test score. Null if missing."
  age:
    type: integer
    description: "Subject age in years."
  sex:
    type: string
    enum: ["Male", "Female"]
    description: "Biological sex as recorded in HCP."
  motion_fd_mean:
    type: number
    description: "Mean Framewise Displacement (mm). Used for QC."
  excluded:
    type: boolean
    description: "True if subject was excluded due to motion or missing data."
required:
  - subject_id
  - dsst_score
  - excluded
additionalProperties: false