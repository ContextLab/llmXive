$schema: http://json-schema.org/draft-07/schema#
title: General Output Schema
description: |
  Generic schema for aggregated output files, sensitivity reports, and final summaries.
  Used to validate `data/processed/sensitivity_report.json` and similar artifacts.
type: object
required:
  - report_type
  - generated_at
  - version
  - data
properties:
  report_type:
    type: string
    enum:
      - sensitivity_analysis
      - final_report
      - exclusion_log
      - methodology_notes
    description: Type of the generated report
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of report generation
  version:
    type: string
    pattern: '^\d+\.\d+\.\d+$'
    description: Semantic version of the report format
  pipeline_run_id:
    type: string
    description: Unique identifier for the pipeline execution
  data:
    type: object
    description: Flexible payload containing the actual report data
    additionalProperties: true
  summary:
    type: object
    description: High-level summary of findings
    properties:
      total_participants:
        type: integer
      excluded_participants:
        type: integer
      significant_correlations:
        type: integer
      methodology:
        type: string
  metadata:
    type: object
    description: Additional metadata about the run
    properties:
      python_version:
        type: string
      dependencies:
        type: object
        additionalProperties:
          type: string
      config_hash:
        type: string
        description: Hash of the configuration used to generate this report
  validation_status:
    type: string
    enum:
      - VALID
      - INVALID
      - UNKNOWN
    description: Result of schema validation against this file
  warnings:
    type: array
    items:
      type: string
    description: List of warnings generated during report generation