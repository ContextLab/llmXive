$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
description: "Schema for the final correlation results and sensitivity analysis outputs."
type: "object"
properties:
  analysis_metadata:
    type: "object"
    properties:
      dataset_source:
        type: "string"
      participants_included:
        type: "integer"
      participants_excluded:
        type: "integer"
      fdr_threshold:
        type: "number"
        const: 0.05
  correlations:
    type: "array"
    items:
      type: "object"
      properties:
        frequency_band:
          type: "string"
          enum: ["delta", "theta", "alpha", "beta", "gamma"]
        entropy_type:
          type: "string"
          enum: ["sampen", "apen"]
        partial_r:
          type: "number"
        p_value_raw:
          type: "number"
        p_value_fdr:
          type: "number"
        significant:
          type: "boolean"
        vif:
          type: "number"
      required:
        - "frequency_band"
        - "entropy_type"
        - "partial_r"
        - "p_value_raw"
        - "p_value_fdr"
        - "significant"
        - "vif"
  sensitivity_analysis:
    type: "object"
    properties:
      exclusion_scenario:
        type: "string"
        description: "Description of the exclusion criteria applied."
      correlation_change:
        type: "number"
        description: "Difference in partial r compared to main analysis."
      p_value_change:
        type: "number"
        description: "Difference in p-value compared to main analysis."
      cv_threshold:
        type: "number"
        description: "Coefficient of Variation threshold used (0.1)."
      is_unstable:
        type: "boolean"
        description: "True if CV > 0.1."
    required:
      - "exclusion_scenario"
      - "correlation_change"
      - "p_value_change"
      - "cv_threshold"
      - "is_unstable"
required:
  - "analysis_metadata"
  - "correlations"
  - "sensitivity_analysis"
additionalProperties: false