[tool.ruff]
# Target Python version
target-version = "py311"

# Line length for Black compatibility
line-length = 88

# Select specific linting rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

# Ignore specific rules that conflict with project style
ignore = [
    "E501", # line too long (handled by Black)
    "B008", # do not perform function calls in argument defaults
]

# Exclude directories
extend-exclude = [
    "__pycache__",
    ".venv",
    "venv",
    "data",
    "reports",
]

[tool.ruff.per-file-ignores]
# Allow specific patterns in test files
"tests/*" = ["S101"]  # assert allowed in tests

[tool.ruff.isort]
# Configuration to match Black's formatting
known-first-party = ["code"]
force-sort-within-sections = true
lines-after-imports = 2