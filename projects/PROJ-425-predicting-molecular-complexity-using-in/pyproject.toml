[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-molecular-complexity"
version = "0.1.0"
description = "Predicting Molecular Complexity Using Information Theory"
requires-python = ">=3.11"
dependencies = [
    "rdkit>=2023.09.0,<2024.0.0",
    "pandas>=2.1.0,<3.0.0",
    "numpy>=1.24.3,<2.0.0",
    "scipy>=1.11.1,<2.0.0",
    "scikit-learn>=1.3.0,<2.0.0",
    "matplotlib>=3.7.2,<4.0.0",
    "seaborn>=0.12.2,<1.0.0",
    "requests>=2.31.0,<3.0.0",
    "datasets>=2.14.0,<3.0.0",
    "pytest>=7.4.0,<8.0.0",
    "pyarrow>=14.0.0,<15.0.0",
]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "B", "C4"]
ignore = ["E501"] # Line too long (handled by black)

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"