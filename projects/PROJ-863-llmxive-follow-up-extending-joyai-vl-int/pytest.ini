[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    cpu_limit: Limit CPU time and memory usage for a test.
    skip_slow: Skip tests marked as slow in CI environments.
    unit: Unit tests.
    integration: Integration tests.

# Global settings
addopts = 
    -v
    --strict-markers
    --tb=short
    --maxfail=1
    -p no:warnings
    
# Timeout for tests (if pytest-timeout is installed)
timeout = 300

# Ignore specific directories
norecursedirs = 
    .git
    .idea
    build
    dist
    *.egg-info
