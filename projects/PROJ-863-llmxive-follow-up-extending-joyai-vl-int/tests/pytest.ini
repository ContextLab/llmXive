[pytest]
# Pytest configuration for llmXive pipeline
# Enforces CPU-only execution and custom markers

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    cpu_limit: Mark test to run with strict CPU resource limits
    slow: Mark test as slow-running (skipped in CI by default)
    unit: Mark test as a unit test
    integration: Mark test as an integration test

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Addopts for default behavior
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (in seconds)
# Requires pytest-timeout plugin
timeout = 300
timeout_method = signal