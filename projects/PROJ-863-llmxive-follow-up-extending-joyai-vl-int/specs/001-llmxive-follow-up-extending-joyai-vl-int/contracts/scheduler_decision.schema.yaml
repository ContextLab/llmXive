$schema: "http://json-schema.org/draft-07/schema#"
title: "SchedulerDecision"
description: "Schema for the output of the lightweight classifier."
type: "object"
properties:
  frame_id:
    type: "string"
    description: "Links to the SyntheticVideoFrame."
  prediction:
    type: "string"
    enum:
      - "trigger"
      - "suppress"
    description: "Binary decision generated by the classifier."
  probability:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Probability of the 'trigger' decision."
  latency_ms:
    type: "number"
    description: "Inference time in milliseconds."
  ground_truth_label:
    type: "string"
    enum:
      - "critical"
      - "silence"
    description: "Ground truth label for evaluation."
  metric_contribution:
    type: "object"
    properties:
      interruption_reduction:
        type: "boolean"
        description: "True if the prediction successfully suppressed a non-critical event."
      safety_recall:
        type: "boolean"
        description: "True if the prediction correctly triggered on a critical event."
    required:
      - interruption_reduction
      - safety_recall
    description: "Contribution to key metrics."
required:
  - frame_id
  - prediction
  - probability
  - latency_ms
  - ground_truth_label
  - metric_contribution
additionalProperties: false
