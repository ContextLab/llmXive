$schema: "http://json-schema.org/draft-07/schema#"
title: "PipelineLog"
description: "Schema for a single log entry in the JoyAI-VL-Interaction pipeline."
type: "object"
properties:
  log_id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the log entry."
  component:
    type: "string"
    description: "Name of the component (e.g., ASR, Model, TTS)."
  level:
    type: "string"
    enum:
      - "INFO"
      - "WARNING"
      - "ERROR"
    description: "Log severity level."
  message:
    type: "string"
    description: "Log message content."
  context:
    type: "object"
    description: "Additional context (e.g., frame_id, error_code)."
    additionalProperties: true
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the log entry."
required:
  - "log_id"
  - "component"
  - "level"
  - "message"
  - "timestamp"
additionalProperties: false
