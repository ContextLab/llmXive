$schema: "http://json-schema.org/draft-07/schema#"
title: "EnvironmentCheck"
description: "Schema for the environment verification results."
type: "object"
properties:
  check_id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the check."
  cpu_cores:
    type: "integer"
    minimum: 1
    description: "Number of available CPU cores."
  ram_gb:
    type: "number"
    minimum: 0.0
    description: "Available RAM in GB."
  gpu_available:
    type: "boolean"
    description: "Whether a GPU is detected."
  status:
    type: "string"
    enum:
      - "passed"
      - "failed"
    description: "Overall status of the environment check."
  errors:
    type: "array"
    items:
      type: "string"
    description: "List of errors if status is failed."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the check."
required:
  - "check_id"
  - "cpu_cores"
  - "ram_gb"
  - "gpu_available"
  - "status"
  - "timestamp"
additionalProperties: false
