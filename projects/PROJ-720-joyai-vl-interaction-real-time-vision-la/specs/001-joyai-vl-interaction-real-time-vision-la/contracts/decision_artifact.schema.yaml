$schema: "http://json-schema.org/draft-07/schema#"
title: "DecisionArtifact"
description: "Schema for a single decision artifact produced by the JoyAI-VL-Interaction model."
type: "object"
properties:
  decision_id:
    type: "string"
    format: "uuid"
    description: "Unique identifier for the decision."
  clip_id:
    type: "string"
    description: "Identifier of the video clip being processed."
  frame_id:
    type: "integer"
    description: "Frame number within the clip."
  decision_type:
    type: "string"
    enum:
      - "silent"
      - "respond"
      - "delegate"
    description: "The decision made by the model."
  reasoning:
    type: "string"
    description: "Natural language reasoning provided by the model."
  confidence:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Model confidence score (if available)."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the decision."
  model_metadata:
    type: "object"
    description: "Metadata about the model used (for deviation tracking)."
    properties:
      model_name:
        type: "string"
        description: "Name of the model (e.g., LLaVA-1.5-7B)."
      quantization:
        type: "string"
        description: "Quantization level (e.g., 4-bit, 8-bit, none)."
      size:
        type: "string"
        description: "Model size (e.g., 8B, 1.3B)."
    required:
      - "model_name"
      - "size"
  deviation_flag:
    type: "boolean"
    description: "True if a resource-constrained approximation (e.g., 1.3B model) was used instead of the spec's 8B model."
  deviation_reason:
    type: "string"
    description: "Reason for the deviation (e.g., 'OOM on 8B model')."
required:
  - "decision_id"
  - "clip_id"
  - "frame_id"
  - "decision_type"
  - "timestamp"
  - "model_metadata"
  - "deviation_flag"
additionalProperties: false