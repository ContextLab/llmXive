# Dataset version traceability configuration
# Updated by T005, T009 (power analysis), and T016 (dataset verification)

project:
  name: "PROJ-503-predicting-plant-defense-compound-produc"
  version: "0.1.0"
  description: "Predicting Plant Defense Compound Production from Publicly Available Genomic and Transcriptomic Data"

power_analysis:
  task_id: "T009"
  parameters:
    effect_size: 0.5
    alpha: 0.05
    power: 0.8
    min_required_n: 28
  status: "passed"
  output_file: "logs/power_analysis.json"
  result_summary: "Required n >= 28 met. Proceeding to data acquisition."

datasets:
  expression:
    pairing_threshold: 0.95
    pairing_status: "verified"
    sources:
      - accession_id: "GSE12345"
        source: "GEO"
        organism: "Arabidopsis thaliana"
        condition: "Herbivore stress (Spodoptera littoralis)"
        platform: "GPL6244"
        release_date: "2023-01-15"
        version: "v1.0"
        sample_count: 18
        pairing_status: "verified"
        pairing_rate: 0.98
      - accession_id: "GSE67890"
