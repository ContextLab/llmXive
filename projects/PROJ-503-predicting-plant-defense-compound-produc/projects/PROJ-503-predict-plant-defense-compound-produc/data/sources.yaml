# Data Sources Configuration for Plant Defense Compound Prediction
# Generated by T001: Define search criteria
# This file defines the search parameters for acquiring genomic and transcriptomic data
# from public repositories (GEO and Metabolomics Workbench).

sources:
  - name: NCBI Gene Expression Omnibus (GEO)
    type: transcriptomics
    base_url: "https://www.ncbi.nlm.nih.gov/geo/query/acc/search"
    search_criteria:
      organism:
        - "Arabidopsis thaliana"
        - "Solanum lycopersicum"
        - "Solanum tuberosum"
      keywords:
        - "herbivore stress"
        - "insect herbivory"
        - "caterpillar feeding"
        - "aphid infestation"
        - "wounding stress"
        - "jasmonic acid"
        - "defense response"
      filters:
        platform: "GPL"  # Standard platforms
        status: "Public"
        entry_type: "Series"
      min_samples: 28  # Minimum samples required for power analysis
      pairing_target: 0.95  # Target sample-level pairing rate

  - name: Metabolomics Workbench
    type: metabolomics
    base_url: "https://www.metabolomicsworkbench.org/"
    search_criteria:
      keywords:
        - "terpenoid"
        - "alkaloid"
        - "phenylpropanoid"
        - "glucosinolate"
        - "defense metabolite"
        - "plant secondary metabolite"
      study_type: "Plant"
      organism:
        - "Arabidopsis"
        - "Solanum"
      min_samples: 28
      data_level: "Level 2"  # Quantitative data preferred

validation:
  yaml_syntax: "verified"
  created_at: "2023-10-27T12:00:00Z"
  task_id: "T001"
  notes: "Search criteria defined based on US1 requirements. Ready for T002-T004 execution."
