$schema: "http://json-schema.org/draft-07/schema#"
title: "MetaboliteMatrix"
description: "Schema for the metabolite concentration matrix."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      source:
        type: "string"
        description: "Source of the data (Metabolomics Workbench)"
      created_at:
        type: "string"
        format: "date-time"
      transformation:
        type: "string"
        description: "Log transformation applied"
        enum:
          - "log10"
          - "log2"
    required:
      - source
      - created_at
      - transformation
  columns:
    type: "array"
    description: "List of column names (Sample IDs)"
    items:
      type: "string"
      pattern: "^sample_\\d+$"
  data:
    type: "object"
    description: "Key-value pairs where key is metabolite_id and value is a list of concentrations"
    additionalProperties:
      type: "array"
      items:
        type: "number"
        description: "Log-transformed concentration values"
required:
  - metadata
  - columns
  - data
additionalProperties: false
