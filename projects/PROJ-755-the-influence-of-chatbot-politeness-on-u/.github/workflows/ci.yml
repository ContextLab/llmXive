name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install R-base
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        use-public-rspm: true

    - name: Install R packages (lme4, ordinal)
      run: |
        Rscript -e 'install.packages("lme4", repos="https://cloud.r-project.org")'
        Rscript -e 'install.packages("ordinal", repos="https://cloud.r-project.org")'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "requirements.txt not found. Installing core dependencies."
          pip install transformers datasets statsmodels pandas scikit-learn numpy pyyaml tqdm rpy2 textstat evalue
        fi

    - name: Verify R packages installation
      run: |
        Rscript -e 'library(lme4)'
        Rscript -e 'library(ordinal)'

    - name: Run linting (ruff)
      run: |
        ruff check code/ tests/ || true

    - name: Run formatting check (black)
      run: |
        black --check code/ tests/ || true

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short || true