$schema: "http://json-schema.org/draft-07/schema#"
title: "CLMM Model Output Schema"
type: "object"
properties:
  model_id:
    type: "string"
    description: "Unique identifier for the model run"
  model_type:
    type: "string"
    enum:
      - "CLMM"
      - "CLMM_Simplified"
    description: "Type of model fitted"
  fixed_effects:
    type: "array"
    items:
      type: "object"
      properties:
        term:
          type: "string"
          description: "Name of the predictor variable"
        estimate:
          type: "number"
          description: "Coefficient estimate"
        std_error:
          type: "number"
          description: "Standard error of the estimate"
        p_value:
          type: "number"
          description: "Raw p-value"
        p_value_corrected:
          type: "number"
          description: "P-value after multiple comparison correction"
        confidence_interval_lower:
          type: "number"
          description: "Lower bound of 95% CI"
        confidence_interval_upper:
          type: "number"
          description: "Upper bound of 95% CI"
      required:
        - term
        - estimate
        - std_error
        - p_value
        - p_value_corrected
        - confidence_interval_lower
        - confidence_interval_upper
  random_effects:
    type: "object"
    properties:
      user_id_variance:
        type: "number"
        description: "Variance component for user_id random effect"
      residual_variance:
        type: "number"
        description: "Residual variance (if applicable)"
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "failed"
    description: "Convergence status of the model"
  correction_method:
    type: "string"
    enum:
      - "bonferroni"
      - "benjamini_hochberg"
    description: "Method used for multiple comparison correction"
required:
  - model_id
  - model_type
  - fixed_effects
  - random_effects
  - convergence_status
  - correction_method
additionalProperties: false
description: "Schema for the output of the CLMM analysis, including fixed effects, random effects, and correction details."
