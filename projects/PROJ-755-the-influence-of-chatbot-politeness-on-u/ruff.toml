# Ruff configuration for llmXive project
# See: https://docs.astral.sh/ruff/configuration/

[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and isort (`I`) rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in fastapi/pytest)
]

# Assume Python 3.11 target
target-version = "py311"

[lint.per-file-ignores]
# Allow unused imports in __init__.py files for re-exports
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["code", "tests", "data"]
force-sort-within-sections = true

[format]
# Black-compatible formatting settings
quote-style = "double"
indent-style = "space"
line-ending = "auto"