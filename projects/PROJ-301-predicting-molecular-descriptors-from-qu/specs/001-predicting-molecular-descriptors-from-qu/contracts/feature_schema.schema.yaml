$schema: "http://json-schema.org/draft-07/schema#"
title: "Feature Matrix Schema"
description: "Schema for 2D and 3D feature matrices generated for model training."
type: "object"
properties:
  metadata:
    type: "object"
    description: "Metadata about the feature generation process."
    properties:
      representation_type:
        type: "string"
        enum:
          - "2D_morgan"
          - "3D_graph"
        description: "Type of feature representation."
      n_molecules:
        type: "integer"
        description: "Number of molecules in the subset."
      n_features:
        type: "integer"
        description: "Number of features (dimensions)."
      generation_timestamp:
        type: "string"
        format: "date-time"
        description: "ISO 8601 timestamp of feature generation."
    required:
      - representation_type
      - n_molecules
      - n_features
  data:
    type: "object"
    description: "The actual feature data structure."
    properties:
      shape:
        type: "array"
        items:
          type: "integer"
        description: "Shape of the feature matrix [N_molecules, N_features]."
      dtype:
        type: "string"
        description: "Data type of the features (e.g., float32)."
      indices:
        type: "array"
        items:
          type: "string"
        description: "List of molecule IDs corresponding to rows in the matrix."
    required:
      - shape
      - dtype
      - indices
required:
  - metadata
  - data
additionalProperties: false
