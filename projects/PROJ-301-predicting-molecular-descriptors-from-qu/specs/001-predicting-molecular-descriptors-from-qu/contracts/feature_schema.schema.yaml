$schema: "http://json-schema.org/draft-07/schema#"
title: "Feature Set Schema"
description: "Schema for the extracted feature matrices (2D and 3D)."
type: "object"
properties:
  molecule_id:
    type: "string"
    description: "Foreign key to the molecule."
  feature_type:
    type: "string"
    enum:
      - "2D_morgan"
      - "3D_graph"
    description: "Type of feature representation."
  features:
    type: "array"
    description: "Flattened feature vector or serialized graph data."
    items:
      type: "number"
  metadata:
    type: "object"
    description: "Additional metadata (e.g., radius, nBits)."
    properties:
      radius:
        type: "integer"
      nBits:
        type: "integer"
required:
  - molecule_id
  - feature_type
  - features
additionalProperties: false
