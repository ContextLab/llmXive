$schema: "http://json-schema.org/draft-07/schema#"
title: "QM9 Dataset Schema"
description: "Schema for the QM9 dataset subset used in the molecular descriptor prediction pipeline."
type: "object"
properties:
  molecule_id:
    type: "string"
    description: "Unique identifier for the molecule."
  smiles:
    type: "string"
    description: "Canonical SMILES string representing the 2D structure."
  xyz:
    type: "array"
    description: "3D coordinates of atoms in the molecule."
    items:
      type: "array"
      items:
        type: "number"
      minItems: 3
      maxItems: 3
  mu:
    type: "number"
    description: "Dipole moment in Debye."
  homo:
    type: "number"
    description: "HOMO energy in eV."
  lumo:
    type: "number"
    description: "LUMO energy in eV."
  valid:
    type: "boolean"
    description: "Flag indicating if the molecule has valid geometry and labels."
required:
  - molecule_id
  - smiles
  - xyz
  - mu
  - homo
  - lumo
  - valid
additionalProperties: false
