$schema: http://json-schema.org/draft-07/schema#
title: USPTO Reaction Dataset Schema
description: >
  Schema validation contract for the cleaned reaction dataset
  generated by the preprocessing pipeline (T014-T017).
  Ensures data integrity before modeling (US2) and analysis (US3).
type: object
required:
  - metadata
  - columns
  - sample_records
properties:
  metadata:
    type: object
    required:
      - version
      - source
      - generated_at
      - record_count
    properties:
      version:
        type: string
        description: Schema version identifier
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      source:
        type: string
        description: Original data source identifier
        const: "USPTO"
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation
      record_count:
        type: integer
        minimum: 0
        description: Total number of records in the dataset

  columns:
    type: array
    description: >
      Ordered list of columns in the dataset.
      Must match the expected schema for downstream processing.
    items:
      type: object
      required:
        - name
        - dtype
        - description
      properties:
        name:
          type: string
          description: Column name
        dtype:
          type: string
          description: Expected pandas/numpy dtype
          enum:
            - object
            - int64
            - float64
            - bool
        description:
          type: string
          description: Human-readable column description
        nullable:
          type: boolean
          default: false
          description: Whether null values are allowed

  sample_records:
    type: array
    description: >
      List of sample records for validation.
      Used to verify data types and content structure.
    items:
      type: object
      required:
        - reaction_smiles
        - yield_value
        - fingerprint_ecfp4
        - fingerprint_maccs
        - reaction_class
        - scaffold_group
      properties:
        reaction_smiles:
          type: string
          description: Standardized reaction SMILES
          pattern: "^[A-Za-z0-9\\[\\]<>\\.\\-\\+=\\#\\@\\%\\$\\^\\&\\(\\)\\{\\}\\|\\~\\!]+$"
        yield_value:
          type: number
          minimum: 0
          maximum: 100
          description: Reaction yield percentage
        fingerprint_ecfp4:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 1
          minItems: 2048
          maxItems: 2048
          description: ECFP4 fingerprint vector (2048 bits)
        fingerprint_maccs:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 1
          minItems: 167
          maxItems: 167
          description: MACCS keys fingerprint vector (167 bits)
        reaction_class:
          type: string
          description: Reaction class label (e.g., "Amide Coupling", "Suzuki")
        scaffold_group:
          type: string
          description: Murcko scaffold grouping key
        metadata:
          type: object
          description: Additional metadata fields
          properties:
            temperature:
              type: number
            pressure:
              type: number
            solvent:
              type: string
            reagents:
              type: array
              items:
                type: string

examples:
  - metadata:
      version: "1.0.0"
      source: "USPTO"
      generated_at: "2023-10-27T10:00:00Z"
      record_count: 10000
    columns:
      - name: reaction_smiles
        dtype: object
        description: Standardized reaction SMILES
        nullable: false
      - name: yield_value
        dtype: float64
        description: Yield percentage
        nullable: false
      - name: fingerprint_ecfp4
        dtype: object
        description: ECFP4 vector
        nullable: false
      - name: fingerprint_maccs
        dtype: object
        description: MACCS vector
        nullable: false
      - name: reaction_class
        dtype: object
        description: Reaction class
        nullable: false
      - name: scaffold_group
        dtype: object
        description: Scaffold group
        nullable: false
    sample_records:
      - reaction_smiles: "CC(=O)O.C1=CC=CC=C1>>CC(=O)OC1=CC=CC=C1"
        yield_value: 85.5
        fingerprint_ecfp4: [0, 1, 0, ...] # 2048 bits
        fingerprint_maccs: [1, 0, 1, ...] # 167 bits
        reaction_class: "Esterification"
        scaffold_group: "benzene_ring"
        metadata:
          solvent: "DMF"
          reagents: ["Pyridine"]
