# Output Schema Validation Contract
# Defines the expected structure and data types for all pipeline output artifacts
# Used by code/utils/schema_validator.py to validate results before final reporting
#
# This schema covers:
# 1. Model performance metrics (R², RMSE, MAE)
# 2. Per-reaction-class breakdowns
# 3. Feature importance rankings
# 4. Data quality exclusion reports
# 5. Final aggregated report structure
#
# Version: 1.0
# Last Updated: 2024
#

version: "1.0"

# Root object structure for final_report.json
final_report:
  type: object
  required:
    - metadata
    - model_performance
    - per_class_metrics
    - feature_importance
    - data_quality
    - success_criteria_check
  properties:
    metadata:
      type: object
      required:
        - project_id
        - dataset_source
        - timestamp
        - pipeline_version
      properties:
        project_id:
          type: string
          const: "PROJ-084-assessing-the-predictive-power-of-machin"
        dataset_source:
          type: string
          description: "Source DOI or URL of the raw dataset"
        timestamp:
          type: string
          format: date-time
        pipeline_version:
          type: string
        random_seed:
          type: integer
        total_samples:
          type: integer
          minimum: 0
        train_split_ratio:
          type: number
          minimum: 0.0
          maximum: 1.0
        val_split_ratio:
          type: number
          minimum: 0.0
          maximum: 1.0
        test_split_ratio:
          type: number
          minimum: 0.0
          maximum: 1.0
    
    model_performance:
      type: object
      required:
        - random_forest
        - svm
      properties:
        random_forest:
          type: object
          required:
            - r2
            - rmse
            - mae
            - best_params
          properties:
            r2:
              type: number
              description: "R² score on held-out test set"
            rmse:
              type: number
              minimum: 0.0
              description: "Root Mean Squared Error"
            mae:
              type: number
              minimum: 0.0
              description: "Mean Absolute Error"
            best_params:
              type: object
              required:
                - n_estimators
                - max_depth
              properties:
                n_estimators:
                  type: integer
                  minimum: 1
                max_depth:
                  type: integer
                  minimum: 1
                  nullable: true
                min_samples_split:
                  type: integer
                  minimum: 2
                min_samples_leaf:
                  type: integer
                  minimum: 1
                max_features:
                  type: string
                  nullable: true
        svm:
          type: object
          required:
            - r2
            - rmse
            - mae
            - best_params
          properties:
            r2:
              type: number
              description: "R² score on held-out test set"
            rmse:
              type: number
              minimum: 0.0
              description: "Root Mean Squared Error"
            mae:
              type: number
              minimum: 0.0
              description: "Mean Absolute Error"
            best_params:
              type: object
              required:
                - C
                - kernel
              properties:
                C:
                  type: number
                  minimum: 0.0
                kernel:
                  type: string
                  enum: ["linear", "rbf", "poly", "sigmoid"]
                gamma:
                  type: string
                  nullable: true
                epsilon:
                  type: number
                  minimum: 0.0
                  nullable: true
    
    per_class_metrics:
      type: object
      description: "Performance metrics broken down by reaction class"
      additionalProperties:
        type: object
        required:
          - r2
          - rmse
          - mae
          - sample_count
        properties:
          r2:
            type: number
          rmse:
            type: number
            minimum: 0.0
          mae:
            type: number
            minimum: 0.0
          sample_count:
            type: integer
            minimum: 0
    
    feature_importance:
      type: object
      required:
        - top_bits
        - top_substructures
      properties:
        top_bits:
          type: array
          minItems: 10
          items:
            type: object
            required:
              - bit_index
              - importance_score
              - description
            properties:
              bit_index:
                type: integer
                minimum: 0
              importance_score:
                type: number
                minimum: 0.0
              description:
                type: string
        top_substructures:
          type: array
          minItems: 10
          items:
            type: object
            required:
              - smarts_pattern
              - frequency
              - average_importance
              - reaction_center_atoms
            properties:
              smarts_pattern:
                type: string
              frequency:
                type: integer
                minimum: 0
              average_importance:
                type: number
                minimum: 0.0
              reaction_center_atoms:
                type: array
                items:
                  type: integer
                description: "Atom indices involved in the reaction center"
    
    data_quality:
      type: object
      required:
        - total_raw_records
        - excluded_records
        - exclusion_reasons
        - exclusion_fraction
      properties:
        total_raw_records:
          type: integer
          minimum: 0
        excluded_records:
          type: integer
          minimum: 0
        exclusion_fraction:
          type: number
          minimum: 0.0
          maximum: 1.0
        exclusion_reasons:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          description: "Map of reason -> count"
        yield_statistics:
          type: object
          required:
            - mean
            - std
            - min
            - max
          properties:
            mean:
              type: number
            std:
              type: number
              minimum: 0.0
            min:
              type: number
            max:
              type: number
    
    success_criteria_check:
      type: object
      required:
        - sc001_r2_threshold
        - sc001_passed
        - sc002_gap_threshold
        - sc002_passed
        - sc003_substructure_frequency
        - sc003_passed
        - sc005_exclusion_fraction_measured
        - sc005_passed
        - overall_passed
      properties:
        sc001_r2_threshold:
          type: number
          const: 0.40
        sc001_passed:
          type: boolean
        sc002_gap_threshold:
          type: number
          const: 0.10
        sc002_passed:
          type: boolean
        sc003_substructure_frequency:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "Percentage of high-yield reactions in validation set containing top substructures"
        sc003_passed:
          type: boolean
        sc005_exclusion_fraction_measured:
          type: number
          minimum: 0.0
          maximum: 1.0
        sc005_passed:
          type: boolean
        overall_passed:
          type: boolean

# Schema for model artifact files (saved in data/results/best_models/)
model_artifact:
  type: object
  required:
    - model_type
    - model_params
    - feature_names
    - metrics
  properties:
    model_type:
      type: string
      enum: ["RandomForest", "SVM"]
    model_params:
      type: object
    feature_names:
      type: array
      items:
        type: string
    metrics:
      type: object
      required:
        - r2
        - rmse
        - mae
      properties:
        r2:
          type: number
        rmse:
          type: number
          minimum: 0.0
        mae:
          type: number
          minimum: 0.0

# Schema for data quality report (data/results/data_quality_report.json)
data_quality_report:
  type: object
  required:
    - raw_data_path
    - processed_data_path
    - total_raw_records
    - total_processed_records
    - exclusion_log
    - yield_stats
  properties:
    raw_data_path:
      type: string
      format: uri-reference
    processed_data_path:
      type: string
      format: uri-reference
    total_raw_records:
      type: integer
      minimum: 0
    total_processed_records:
      type: integer
      minimum: 0
    exclusion_log:
      type: array
      items:
        type: object
        required:
          - reason
          - count
        properties:
          reason:
            type: string
          count:
            type: integer
            minimum: 0
    yield_stats:
      type: object
      required:
        - mean
        - std
        - min
        - max
      properties:
        mean:
          type: number
        std:
          type: number
          minimum: 0.0
        min:
          type: number
        max:
          type: number

# Schema for validation set (data/processed/validation_set.parquet)
validation_set:
  type: object
  required:
    - columns
    - row_count
  properties:
    columns:
      type: array
      items:
        type: string
      contains:
        - "smiles"
        - "yield"
        - "reaction_class"
        - "ecfp4"
        - "maccs"
        - "scaffold_group"
    row_count:
      type: integer
      minimum: 1

# Schema for split indices (data/processed/split_indices.parquet)
split_indices:
  type: object
  required:
    - columns
    - row_count
  properties:
    columns:
      type: array
      items:
        type: string
      contains:
        - "index"
        - "split"
        - "reaction_class"
        - "scaffold_group"
    row_count:
      type: integer
      minimum: 1
    split:
      type: string
      enum: ["train", "validation", "test"]