$schema: "http://json-schema.org/draft-07/schema#"
title: "Agency Dataset Schema"
description: "Schema for the analysis-ready dataset containing motion features and agency scores."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant (UUID format)."
  latency_ms:
    type: "number"
    description: "Response latency in milliseconds."
    minimum: 0
  smoothness_jerk:
    type: "number"
    description: "Trajectory smoothness metric (jerk-based)."
    minimum: 0
  lead_time_ms:
    type: "number"
    description: "Anticipatory lead time in milliseconds."
    minimum: 0
  agency_score:
    type: "number"
    description: "Aggregated agency score (0-100)."
    minimum: 0
    maximum: 100
  instrument_name:
    type: "string"
    description: "Name of the agency questionnaire instrument."
  validity_flag:
    type: "boolean"
    description: "Whether the instrument meets FR-013 validation criteria."
required:
  - participant_id
  - latency_ms
  - smoothness_jerk
  - agency_score
  - instrument_name
  - validity_flag
additionalProperties: false
