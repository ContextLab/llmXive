type: object
description: |
  Schema for the model_metrics.json output file generated by the
  statistical modeling and hypothesis testing pipeline (User Story 2).
  This file contains OLS/Ridge coefficients, p-values (corrected),
  Random Forest feature importance, and cross-validation metrics.
properties:
  metadata:
    type: object
    description: Provenance and configuration metadata
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of generation
      script_version:
        type: string
        description: Version of the modeling script used
      data_source:
        type: string
        description: Path or identifier of the input dataset
      synthetic_flag:
        type: boolean
        description: True if data is synthetic (per T000 ethics declaration)
    required:
      - timestamp
      - synthetic_flag
  ols_results:
    type: object
    description: Ordinary Least Squares regression results
    properties:
      coefficients:
        type: object
        additionalProperties:
          type: number
        description: Mapping of feature names to unstandardized coefficients
      p_values:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: Raw p-values for each coefficient
      p_values_corrected:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: P-values after Bonferroni or Benjamini-Hochberg correction
      r_squared:
        type: number
        minimum: 0
        maximum: 1
        description: Coefficient of determination
      adj_r_squared:
        type: number
        description: Adjusted R-squared
      rmse:
        type: number
        minimum: 0
        description: Root Mean Squared Error
    required:
      - coefficients
      - p_values
      - p_values_corrected
      - r_squared
      - rmse
  ridge_results:
    type: object
    description: Ridge regression results (robustness check)
    properties:
      coefficients:
        type: object
        additionalProperties:
          type: number
        description: Mapping of feature names to coefficients
      alpha:
        type: number
        minimum: 0
        description: Regularization strength used
      cv_r_squared:
        type: number
        description: Cross-validated R-squared
    required:
      - coefficients
      - alpha
      - cv_r_squared
  random_forest_results:
    type: object
    description: Random Forest model results
    properties:
      feature_importance:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: Normalized feature importance scores
      cv_r_squared:
        type: number
        description: Cross-validated R-squared
      cv_rmse:
        type: number
        minimum: 0
        description: Cross-validated RMSE
      max_depth:
        type: integer
        minimum: 1
        description: Maximum tree depth used
    required:
      - feature_importance
      - cv_r_squared
      - cv_rmse
      - max_depth
  sensitivity_analysis:
    type: object
    description: Summary of sensitivity analysis thresholds
    properties:
      thresholds_tested:
        type: array
        items:
          type: number
        description: List of coefficient magnitude thresholds swept
      significance_rates:
        type: object
        additionalProperties:
          type: number
          minimum: 0
          maximum: 1
        description: Significance rate for each threshold
    required:
      - thresholds_tested
      - significance_rates
  assumptions:
    type: object
    description: Validation of model assumptions
    properties:
      normality_residuals:
        type: boolean
        description: True if residuals passed normality test
      homoscedasticity:
        type: boolean
        description: True if homoscedasticity assumption met
      multicollinearity_vif_max:
        type: number
        description: Maximum VIF value observed (should be < 5)
    required:
      - multicollinearity_vif_max
required:
  - metadata
  - ols_results
  - random_forest_results
  - assumptions