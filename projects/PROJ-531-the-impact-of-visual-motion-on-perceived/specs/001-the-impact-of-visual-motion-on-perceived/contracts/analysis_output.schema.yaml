$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
description: "Schema for the output of statistical modeling and sensitivity analysis."
type: "object"
properties:
  model_type:
    type: "string"
    enum:
      - "ridge_regression"
      - "random_forest"
    description: "Type of model used."
  coefficients:
    type: "object"
    description: "Regression coefficients for each feature (from Ridge Regression)."
    additionalProperties:
      type: "number"
  p_values:
    type: "object"
    description: "P-values for each feature (after correction)."
    additionalProperties:
      type: "number"
      minimum: 0
      maximum: 1
  feature_importance:
    type: "object"
    description: "Feature importance scores (for Random Forest)."
    additionalProperties:
      type: "number"
      minimum: 0
  cross_validation_metrics:
    type: "object"
    description: "Cross-validation performance metrics."
    properties:
      r_squared:
        type: "number"
      rmse:
        type: "number"
  vif_scores:
    type: "object"
    description: "Variance Inflation Factor for each predictor (for reporting only)."
    additionalProperties:
      type: "number"
      minimum: 1
  sensitivity_analysis:
    type: "object"
    description: "Results of noise parameter sweeping."
    properties:
      noise_magnitude:
        type: "array"
        items:
          type: "number"
        description: "Swept noise magnitude levels."
      heteroscedasticity_level:
        type: "array"
        items:
          type: "number"
        description: "Swept heteroscedasticity levels."
      performance_degradation:
        type: "array"
        items:
          type: "object"
          properties:
            noise_level:
              type: "number"
            r_squared:
              type: "number"
            rmse:
              type: "number"
        description: "Model performance at each noise level."
required:
  - model_type
  - p_values
  - vif_scores
additionalProperties: false
