[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults (common in pydantic/config)
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[format]
# This file is primarily for ruff; black settings are in pyproject.toml
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
