$schema: "http://json-schema.org/draft-07/schema#"
title: "AlloyRecord"
description: "Schema for a single aluminum alloy record with compositional and property data."
type: "object"
required:
  - "alloy_id"
  - "source"
  - "poissons_ratio"
  - "youngs_modulus_gpa"
  - "fraction_cu"
  - "fraction_mg"
  - "fraction_si"
  - "fraction_zn"
  - "fraction_mn"
properties:
  alloy_id:
    type: "string"
    description: "Unique identifier for the alloy entry."
  source:
    type: "string"
    description: "Source of the data (Materials Project or NIST)."
    enum:
      - "Materials Project"
      - "NIST"
  poissons_ratio:
    type: "number"
    description: "Poisson's ratio of the alloy."
    minimum: 0
    maximum: 1
  youngs_modulus_gpa:
    type: "number"
    description: "Young's modulus in GPa."
    minimum: 0
  fraction_cu:
    type: "number"
    description: "Atomic fraction of Copper."
    minimum: 0
    maximum: 1
  fraction_mg:
    type: "number"
    description: "Atomic fraction of Magnesium."
    minimum: 0
    maximum: 1
  fraction_si:
    type: "number"
    description: "Atomic fraction of Silicon."
    minimum: 0
    maximum: 1
  fraction_zn:
    type: "number"
    description: "Atomic fraction of Zinc."
    minimum: 0
    maximum: 1
  fraction_mn:
    type: "number"
    description: "Atomic fraction of Manganese."
    minimum: 0
    maximum: 1
  sum_major_elements:
    type: "number"
    description: "Sum of the five major element fractions."
    minimum: 0
    maximum: 1
  is_independent_measurement:
    type: "boolean"
    description: "True if Poisson's ratio is an independent measurement."
