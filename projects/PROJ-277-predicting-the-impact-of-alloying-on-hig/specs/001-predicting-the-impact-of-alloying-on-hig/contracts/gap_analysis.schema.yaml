$schema: "http://json-schema.org/draft-07/schema#"
title: "GapAnalysisReportSchema"
description: "Schema for the comparative gap analysis report."
type: "object"
properties:
  composition_only_rmse:
    type: "number"
    description: "RMSE of the composition-only model."
  augmented_rmse:
    type: ["number", "null"]
    description: "RMSE of the model with microstructural features. Null if inconclusive."
  error_reduction_pct:
    type: ["number", "null"]
    description: "Percentage reduction in RMSE. Null if inconclusive."
  microstructural_sample_count:
    type: "integer"
    description: "Number of samples used in the augmented model."
  sensitive_samples:
    type: "array"
    items:
      type: "string"
    description: "List of sample IDs with high residuals."
  status:
    type: "string"
    enum:
      - "CONCLUSIVE"
      - "INCONCLUSIVE"
    description: "Status of the gap analysis."
  calculated_power:
    type: "number"
    description: "Calculated statistical power for the effect size (even if inconclusive)."
required:
  - composition_only_rmse
  - microstructural_sample_count
  - status
  - calculated_power
additionalProperties: false
