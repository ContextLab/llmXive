- artifact: projects/PROJ-567-anyflow-any-step-video-diffusion-model-w/specs/001-anyflow-any-step-video-diffusion-model-w/plan.md
  id: scientific_soundness-c6a9ea1d
  location: plan.md:Success Metrics & Coverage (SC-004)
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: SC-004 claims to measure 'Reproduction fidelity' by comparing generated VBench
    scores against 'paper baseline values'. However, the plan explicitly restricts
    execution to a 1.3B model (or smallest available) and low resolution/steps (Phase
    0/1), while the paper's baselines are almost certainly derived from the 14B model
    at high resolution. Comparing a 1.3B/low-res output to a 14B/high-res baseline
    is a category error; the result is guaranteed to be negative not due to method
    failure, but due to architectural mismatch. The validation target (paper baseline)
    is not independent of the model scale, which is a primary predictor of the metric.
    This renders the 'fidelity' claim scientifically invalid.
- artifact: projects/PROJ-567-anyflow-any-step-video-diffusion-model-w/specs/001-anyflow-any-step-video-diffusion-model-w/plan.md
  id: scientific_soundness-b45b5186
  location: research.md:Compute Feasibility Analysis
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan assumes a 1.3B model variant exists for 'AnyFlow' (Wan2.1). If the
    paper only releases a 14B model, the 'smallest available' fallback implies running
    a 14B model with extreme quantization or resolution reduction. If the model architecture
    itself (e.g., number of layers) is fixed at 14B, running it on CPU with reduced
    resolution does not change the model's parameter count or the 'flow map' logic
    being tested. The plan conflates 'computational feasibility' with 'scientific
    reproduction'. If the 1.3B model does not exist, the plan fails to reproduce the
    *method* (AnyFlow) and instead reproduces a *downscaled version* of a different
    model, making the comparison to the paper's claims (which assume the full model)
    tautological or meaningless.
