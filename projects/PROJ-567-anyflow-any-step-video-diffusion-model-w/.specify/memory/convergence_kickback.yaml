- artifact: projects/PROJ-567-anyflow-any-step-video-diffusion-model-w/specs/001-anyflow-any-step-video-diffusion-model-w/plan.md
  id: methodology-473e1e9c
  location: research.md:Statistical & Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan admits to dropping VBench metrics if they require GPU. VBench's core
    value is its multi-dimensional quality assessment. If the CPU fallback only measures
    'frame count' or 'brightness' (as suggested in Risk Mitigation), the construct
    validity of 'video quality' is lost. The plan must define a specific, CPU-tractable
    subset of metrics that still meaningfully approximates the paper's claims, rather
    than a generic 'subset'.
- artifact: projects/PROJ-567-anyflow-any-step-video-diffusion-model-w/specs/001-anyflow-any-step-video-diffusion-model-w/plan.md
  id: methodology-27ae96c3
  location: plan.md:Risk Mitigation
  reviewer: methodology
  round: 1
  severity: methodology
  text: The mitigation for 'Inference time > 6 hours' accepts a 'partial reproduction'
    (valid artifact, not full fidelity) as success. This contradicts the research
    goal of 'validating the paper's claims.' If the method cannot be run at the parameters
    required to produce the claimed results, the research question (does this method
    work as claimed?) cannot be answered by this plan.
