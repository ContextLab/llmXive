$schema: "http://json-schema.org/draft-07/schema#"
title: OutputSchema
type: object
description: "Schema for the final evaluation report and artifacts."
properties:
  video_artifact:
    type: object
    description: "Details of the generated video."
    properties:
      path:
        type: string
      file_size_bytes:
        type: integer
        minimum: 1
      frame_count:
        type: integer
        minimum: 10
      duration_seconds:
        type: number
        minimum: 1.0
      is_valid:
        type: boolean
    required:
      - path
      - file_size_bytes
      - frame_count
      - duration_seconds
      - is_valid
  evaluation_report:
    type: object
    description: "CPU-tractable evaluation results (SSIM, Optical Flow)."
    properties:
      metrics:
        type: object
        properties:
          ssim:
            type: number
          optical_flow_magnitude:
            type: number
        required:
          - ssim
          - optical_flow_magnitude
      reference_claims:
        type: object
        additionalProperties:
          type: string
      status:
        type: string
        enum:
          - "PASS"
          - "FAIL"
          - "SKIP"
      notes:
        type: string
    required:
      - metrics
      - status
      - notes
required:
  - video_artifact
  - evaluation_report
additionalProperties: false
