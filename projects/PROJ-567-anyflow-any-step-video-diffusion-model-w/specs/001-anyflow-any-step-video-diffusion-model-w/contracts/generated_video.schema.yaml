$schema: "http://json-schema.org/draft-07/schema#"
title: GeneratedVideo
type: object
properties:
  path:
    type: string
    description: "Path to the generated .mp4 file."
  file_size_bytes:
    type: integer
    description: "Size of the file in bytes."
    minimum: 1
  frame_count:
    type: integer
    description: "Number of frames in the video."
    minimum: 10
  duration_seconds:
    type: number
    description: "Duration of the video in seconds."
    minimum: 1.0
  is_valid:
    type: boolean
    description: "Whether the video passed basic validity checks."
required:
  - path
  - file_size_bytes
  - frame_count
  - duration_seconds
  - is_valid
additionalProperties: false
