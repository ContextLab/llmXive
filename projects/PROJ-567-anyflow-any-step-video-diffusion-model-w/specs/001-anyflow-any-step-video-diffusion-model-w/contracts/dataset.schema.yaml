$schema: "http://json-schema.org/draft-07/schema#"
title: DatasetSchema
type: object
description: "Schema for the input model checkpoint and prompt configuration."
properties:
  model_checkpoint:
    type: string
    description: "Path to the model weights file."
    pattern: "^.+\\.(safetensors|pth)$"
  prompt:
    type: string
    description: "Text prompt for generation."
    minLength: 1
  resolution:
    type: array
    description: "Video resolution [width, height]."
    items:
      type: integer
      minimum: 64
    minItems: 2
    maxItems: 2
  steps:
    type: integer
    description: "Inference steps."
    minimum: 1
    maximum: 100
  device:
    type: string
    description: "Target device."
    enum:
      - "cpu"
required:
  - model_checkpoint
  - prompt
  - resolution
  - steps
  - device
additionalProperties: false
