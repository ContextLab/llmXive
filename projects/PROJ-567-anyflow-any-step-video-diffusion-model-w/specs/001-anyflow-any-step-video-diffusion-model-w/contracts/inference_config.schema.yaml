$schema: "http://json-schema.org/draft-07/schema#"
title: InferenceConfig
type: object
properties:
  prompt:
    type: string
    description: "Text prompt for video generation."
    minLength: 1
    maxLength: 256
  steps:
    type: integer
    description: "Number of diffusion steps."
    minimum: 1
    maximum: 100
  resolution:
    type: array
    description: "Output resolution [width, height]."
    items:
      type: integer
      minimum: 64
    minItems: 2
    maxItems: 2
  device:
    type: string
    description: "Target device for inference."
    enum:
      - "cpu"
  seed:
    type: integer
    description: "Random seed for reproducibility."
    default: 42
required:
  - prompt
  - steps
  - resolution
  - device
additionalProperties: false
