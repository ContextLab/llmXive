[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending Geometric Action Model for Robot Policy Learning"
requires-python = ">=3.11"
dependencies = [
    "pybullet",
    "torch --index-url https://download.pytorch.org/whl/cpu",
    "cvxpy",
    "diffcp",
    "scipy",
    "pandas",
    "numpy",
    "pytest",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
# Same as ruff.toml but for pyproject consistency if needed
line-length = 88
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
