$schema: "http://json-schema.org/draft-07/schema#"
title: "Topology Shift Test Set Schema"
description: "Schema for the synthetic topology-shift test set generated by PyBullet."
type: object
properties:
  topology_id:
    type: string
    description: "Unique UUID for the topology configuration."
  type:
    type: string
    enum:
      - "kinematic_chain"
      - "soft_rope"
      - "cloth"
    description: "Category of the novel topology."
  parameters:
    type: object
    description: "Specific parameters for the topology type."
    properties:
      link_count:
        type: integer
        minimum: 3
        description: "Number of links in the kinematic chain (for kinematic_chain type)."
      joint_type:
        type: string
        enum:
          - "hinge"
          - "slider"
        description: "Type of joint in the chain."
      mesh_density:
        type: integer
        minimum: 10
        description: "Number of vertices in the deformable mesh (for soft types)."
      stiffness:
        type: number
        minimum: 0.0
        description: "Stiffness coefficient for soft materials."
    required: []
  training_overlap:
    type: boolean
    const: false
    description: "Must be false, verified against training set hash."
  checksum:
    type: string
    pattern: "^[a-f0-9]{64}$"
    description: "SHA-256 checksum of the topology definition."
required:
  - topology_id
  - type
  - parameters
  - training_overlap
  - checksum
additionalProperties: false
