name: CI - Geometric Action Model Evaluation

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# FR-004: Multi-core x86_64 runner, no GPU/CUDA
# SC-005: 6-hour total limit enforcement (enforced via timeout-minutes)
# Assumptions: <300s/step solver execution
jobs:
  test-and-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours hard cap (SC-005)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "Warning: requirements.txt not found"
          fi

      - name: Verify CPU-only environment
        run: |
          python -c "import torch; assert not torch.cuda.is_available(), 'GPU detected but task requires CPU-only execution'"
          echo "Environment verified: CPU-only (x86_64)"

      - name: Run Configuration Validation
        run: |
          python code/config.py --validate
        if: always()

      - name: Run Solver Profiling (FR-004: <300s/step verification)
        run: |
          python code/solver_profiler.py
        # Enforces per-step timeout assumption on 2-core equivalent hardware
        # If this exceeds 300s, the step fails immediately
        timeout-minutes: 300 
        if: always()

      - name: Run Baseline Validation
        run: |
          python code/baseline_validator.py
        if: always()

      - name: Run Gradient Verification (FR-003)
        run: |
          python code/gradient_verification.py
        if: always()

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: |
            data/results/
            logs/
          retention-days: 7

      - name: Fail on Timeout
        # This step ensures that if any previous step hangs indefinitely,
        # the workflow fails cleanly rather than waiting forever.
        run: |
          echo "All timed steps completed successfully."
        if: always()