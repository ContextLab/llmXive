name: CI - Experimental Trial

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  experimental-trial:
    name: Multi-core x86_64 CPU Trial
    runs-on: ubuntu-latest
    
    # Enforce hardware constraints: No GPU/CUDA, Multi-core CPU
    # The runner is standard x86_64 (ubuntu-latest)
    # CUDA is not installed/available by default on these runners
    
    timeout-minutes: 360  # 6 hours maximum (SC-005: 6-hour CI limit)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Generation & Validation (US1)
        # Depends on T009-gen, T009-verify-uniqueness, T009-hash, T009-serialize
        run: |
          python scripts/generate_test_set.py
        env:
          PYTHONHASHSEED: 0  # Ensure deterministic seeding

      - name: Run Symbolic Solver Profiling (US2)
        # Depends on T008a-profile
        run: |
          python scripts/profile_solver.py
        timeout-minutes: 300  # 300s limit per spec assumption check

      - name: Run Inference Pipeline (US2)
        # Depends on T016, T020, T021
        run: |
          python code/inference_pipeline.py
        timeout-minutes: 300

      - name: Run Baseline Comparison (US3)
        # Depends on T022a
        run: |
          python code/baseline_runner.py
        timeout-minutes: 300

      - name: Run Statistical Analysis (US3)
        # Depends on T023, T024, T025, T026, T027
        run: |
          python scripts/run_analysis.py

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: experimental-results
          path: |
            data/generated/
            data/results/
            data/raw/gam_reference_stats.json
            data/raw/drift_threshold_validation.json
          retention-days: 7