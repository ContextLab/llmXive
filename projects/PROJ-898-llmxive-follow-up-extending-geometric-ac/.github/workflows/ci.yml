name: CI - Multi-core x86_64 CPU Only

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# FR-004: Multi-core x86_64 runner, no GPU/CUDA, 6-hour timeout limit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests (CPU Only)
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours (SC-005 hard cap)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/requirements.txt

      - name: Run Linting (Ruff)
        run: |
          ruff check code/

      - name: Run Formatting Check (Black)
        run: |
          black --check code/

      - name: Run Unit Tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run Time Budget Validation (FR-004 / SC-005)
        run: |
          python code/experiment_time_validator.py --validate-budget

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: data/results/*.csv
          if-no-files-found: warn