[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long (black handles this)
    "C901",  # too complex
]

[lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]

[lint.isort]
known-first-party = ["code"]
force-sort-within-sections = true
