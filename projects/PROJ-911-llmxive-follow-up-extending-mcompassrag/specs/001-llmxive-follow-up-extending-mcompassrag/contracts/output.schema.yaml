$schema: "http://json-schema.org/draft-07/schema#"
title: "Retrieval and Analysis Output Schema"
description: "Schema for retrieval metrics and statistical analysis results"
type: object
properties:
  retrieval_metrics:
    type: array
    items:
      type: object
      properties:
        query_id:
          type: string
        recall_at_5_graph:
          type: number
          minimum: 0.0
          maximum: 1.0
        recall_at_10_graph:
          type: number
          minimum: 0.0
          maximum: 1.0
        recall_at_5_neural:
          type: number
          minimum: 0.0
          maximum: 1.0
        recall_at_10_neural:
          type: number
          minimum: 0.0
          maximum: 1.0
        latency_graph:
          type: number
          minimum: 0.0
        latency_neural:
          type: number
          minimum: 0.0
      required:
        - query_id
        - recall_at_5_graph
        - recall_at_10_graph
        - recall_at_5_neural
        - recall_at_10_neural
        - latency_graph
        - latency_neural
  correlation_analysis:
    type: array
    items:
      type: object
      properties:
        metric_name:
          type: string
          description: "Name of the topological metric (e.g., 'modularity')"
        spearman_r:
          type: number
          description: "Spearman correlation coefficient"
        p_value:
          type: number
          minimum: 0.0
          maximum: 1.0
        bonferroni_adjusted_p:
          type: number
          minimum: 0.0
          maximum: 1.0
        significant_at_005:
          type: boolean
          description: "True if adjusted p-value < 0.05"
      required:
        - metric_name
        - spearman_r
        - p_value
        - bonferroni_adjusted_p
        - significant_at_005
  summary:
    type: object
    properties:
      total_queries:
        type: integer
        minimum: 1
      mean_recall_graph:
        type: number
      mean_recall_neural:
        type: number
      latency_reduction_percent:
        type: number
        description: "Percentage reduction in latency for graph method"
    required:
      - total_queries
      - mean_recall_graph
      - mean_recall_neural
      - latency_reduction_percent
required:
  - retrieval_metrics
  - correlation_analysis
  - summary
additionalProperties: false