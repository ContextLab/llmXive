$schema: http://json-schema.org/draft-07/schema#
title: HotpotQA Dataset Sample Schema
description: Schema for the sampled HotpotQA dataset used in the Graph Compass pipeline.
type: object
required:
  - id
  - title
  - text
  - level
properties:
  id:
    type: string
    description: Unique identifier for the document.
  title:
    type: string
    description: Title of the document.
  text:
    type: string
    description: Full text content of the document.
  level:
    type: string
    enum:
      - easy
      - medium
      - hard
    description: Difficulty level of the question associated with the document.
  questions:
    type: array
    description: List of questions associated with the document (optional).
    items:
      type: string
additionalProperties: true
