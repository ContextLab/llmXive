$schema: http://json-schema.org/draft-07/schema#
title: Graph Compass Output Schema
description: Schema for the topological feature outputs generated by the pipeline.
type: object
required:
  - doc_id
  - num_nodes
  - num_edges
  - density
  - average_degree
  - modularity
  - avg_path_length
  - avg_clustering
  - degree_centrality_mean
  - betweenness_centrality_mean
properties:
  doc_id:
    type: string
    description: Unique identifier for the document.
  num_nodes:
    type: integer
    minimum: 0
    description: Number of nodes in the co-occurrence graph.
  num_edges:
    type: integer
    minimum: 0
    description: Number of edges in the co-occurrence graph.
  density:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Graph density.
  average_degree:
    type: number
    minimum: 0.0
    description: Average degree of nodes.
  modularity:
    type: number
    description: Modularity of the graph (0.0 if no communities detected).
  avg_path_length:
    type: number
    description: Average shortest path length (0.0 if graph is disconnected or single node).
  avg_clustering:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Average clustering coefficient.
  degree_centrality_mean:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Mean degree centrality.
  betweenness_centrality_mean:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Mean betweenness centrality.
additionalProperties: true