schema_name: model_output
description: Schema for model output metrics and statistics.
columns:
  - name: model_type
    type: str
    nullable: false
    description: Type of model (e.g., Gaussian GLM, Ridge)
  - name: coefficients
    type: str
    nullable: false
    description: JSON string of model coefficients
  - name: p_values
    type: str
    nullable: false
    description: JSON string of p-values for predictors
  - name: r_squared
    type: float
    nullable: false
    description: R-squared score of the model
  - name: aic
    type: float
    nullable: false
    description: Akaike Information Criterion
  - name: cross_validation_scores
    type: str
    nullable: false
    description: JSON string of cross-validation scores