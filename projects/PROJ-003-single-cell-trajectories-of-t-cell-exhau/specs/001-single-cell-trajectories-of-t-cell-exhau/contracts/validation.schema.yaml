$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Validation Result Schema"
description: "Schema for bootstrap validation and enrichment analysis results."
properties:
  gene_symbol:
    type: "string"
    description: "Symbol of the fork-point gene."
  enrichment_pvalue:
    type: "number"
    description: "P-value for enrichment against therapy response signatures."
  bootstrap_iterations:
    type: "integer"
    description: "Number of bootstrap iterations performed (patient-level)."
  confidence_interval:
    type: "array"
    items:
      type: "number"
    description: "95% confidence interval for the enrichment metric."
  cross_dataset_correlation:
    type: "number"
    description: "Spearman rank correlation across datasets."
  significance_level:
    type: "number"
    description: "Significance threshold (e.g., 0.01 or 0.05)."
  discovery_dataset_ids:
    type: "array"
    items:
      type: "string"
    description: "List of discovery dataset IDs used to derive fork-points."
  validation_dataset_id:
    type: "string"
    description: "Validation dataset ID used for therapy response labels."
required:
  - gene_symbol
  - enrichment_pvalue
  - bootstrap_iterations
  - confidence_interval
  - cross_dataset_correlation
  - significance_level
  - discovery_dataset_ids
  - validation_dataset_id
additionalProperties: false