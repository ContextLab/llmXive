$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
title: "Dataset Schema"
description: "Schema for raw and processed scRNA-seq datasets in the T-cell exhaustion trajectory analysis."
properties:
  dataset_id:
    type: "string"
    description: "Unique identifier for the dataset (e.g., GSE136103)."
  source:
    type: "string"
    description: "Source of the dataset (e.g., GEO, SRA)."
  raw_counts_path:
    type: "string"
    description: "Path to the raw count matrix file."
  metadata_path:
    type: "string"
    description: "Path to the metadata file."
  checksum:
    type: "string"
    description: "SHA256 checksum of the raw data file."
  cell_count:
    type: "integer"
    description: "Number of cells in the dataset."
  gene_count:
    type: "integer"
    description: "Number of genes in the dataset."
  status:
    type: "string"
    enum: ["available", "unavailable", "partial"]
    description: "Availability status of the dataset."
required:
  - dataset_id
  - source
  - raw_counts_path
  - checksum
  - cell_count
  - gene_count
  - status
additionalProperties: false
