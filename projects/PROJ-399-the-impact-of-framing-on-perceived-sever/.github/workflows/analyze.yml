name: Analyze Framing Effects

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Targeting GitHub Actions free tier:
    # - Limited CPU (2 cores typically)
    # - Limited RAM (7GB)
    # - No GPU available

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache R dependencies
        uses: actions/cache@v4
        with:
          path: code/renv/library
          key: ${{ runner.os }}-renv-${{ hashFiles('code/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Install R and dependencies
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          install-r: true

      - name: Install R packages from renv.lock
        run: |
          Rscript -e 'install.packages("renv")'
          Rscript -e 'renv::restore()'
        working-directory: code

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: code

      - name: Run Data Preparation (01_data_prep.R)
        run: |
          Rscript 01_data_prep.R
        working-directory: code
        env:
          R_CONFIG_FILE: config.yaml

      - name: Run Power Analysis (02_power_analysis.R)
        run: |
          Rscript 02_power_analysis.R
        working-directory: code
        env:
          R_CONFIG_FILE: config.yaml

      - name: Run Statistical Analysis (03_analysis.R)
        run: |
          Rscript 03_analysis.R
        working-directory: code
        env:
          R_CONFIG_FILE: config.yaml

      - name: Run Export and Visualization (04_export.R)
        run: |
          Rscript 04_export.R
        working-directory: code
        env:
          R_CONFIG_FILE: config.yaml

      - name: Upload Results Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results
          path: |
            results/
            data/processed/
          retention-days: 30

      - name: Run Tests
        run: |
          Rscript -e 'testthat::test_dir("tests/")'
        working-directory: code