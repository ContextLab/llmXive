$schema: "http://json-schema.org/draft-07/schema#"
title: "Training Log Schema"
description: "Schema for the episode-level training logs (JSON Lines)."
type: "object"
properties:
  episode_id:
    type: "integer"
    description: "Unique integer identifier for the episode."
  seed:
    type: "integer"
    description: "Random seed used for this episode."
  plasticity_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy on current task after 1, 5, 10 steps."
  stability_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy on Meta-Test Buffer (excluded from Calcium history) after training on current task."
  loss:
    type: "number"
    minimum: 0.0
    description: "MAML loss for the episode."
  timestamp:
    type: "string"
    format: "date-time"
    description: "UTC timestamp of the log."
required:
  - episode_id
  - seed
  - plasticity_score
  - stability_score
  - loss
  - timestamp
additionalProperties: false