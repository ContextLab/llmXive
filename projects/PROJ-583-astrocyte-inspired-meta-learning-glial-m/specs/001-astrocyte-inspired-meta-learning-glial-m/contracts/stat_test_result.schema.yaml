$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalTestResult"
description: "Schema for the output of the Permutation Test comparing model performance."
type: "object"
properties:
  test_name:
    type: "string"
    const: "Permutation Test"
    description: "Name of the statistical test performed."
  observed_distance:
    type: "number"
    description: "The observed Euclidean distance between mean vectors of the two groups."
  p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "The p-value resulting from the permutation test."
  significant:
    type: "boolean"
    description: "True if p_value < 0.05, False otherwise."
  permutations:
    type: "integer"
    description: "Number of permutations performed."
  baseline_mean:
    type: "array"
    items:
      type: "number"
    description: "Mean vector [Stability, Plasticity] for the baseline model."
  astrocyte_mean:
    type: "array"
    items:
      type: "number"
    description: "Mean vector [Stability, Plasticity] for the astrocyte model."
  power_note:
    type: "string"
    description: "Optional note regarding statistical power limitations (e.g., n=5)."
required:
  - "test_name"
  - "observed_distance"
  - "p_value"
  - "significant"
  - "permutations"
  - "baseline_mean"
  - "astrocyte_mean"
additionalProperties: false