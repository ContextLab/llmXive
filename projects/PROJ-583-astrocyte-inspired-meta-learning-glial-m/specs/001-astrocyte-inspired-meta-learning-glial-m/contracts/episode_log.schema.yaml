$schema: "http://json-schema.org/draft-07/schema#"
title: "EpisodeLog"
description: "Schema for a single training episode log containing metrics and homeostatic factors."
type: "object"
properties:
  episode_id:
    type: "integer"
    description: "Unique integer identifier for the episode within a run."
  seed:
    type: "integer"
    description: "Random seed used for this run."
  plasticity_score:
    type: "number"
    description: "Accuracy on the current task after 1, 5, and 10 inner-loop steps."
  stability_score:
    type: "number"
    description: "Accuracy on a Meta-Test Buffer of previous tasks (explicitly excluded from Calcium history) after training on the current task."
  homeostatic_factor:
    type: "number"
    description: "The scalar factor h_t applied to the learning rate."
  calcium_concentration:
    type: "number"
    description: "The simulated calcium concentration Ca_t."
  loss:
    type: "number"
    description: "Meta-loss for this episode."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the episode execution."
required:
  - "episode_id"
  - "seed"
  - "plasticity_score"
  - "stability_score"
  - "homeostatic_factor"
  - "calcium_concentration"
  - "loss"
  - "timestamp"
additionalProperties: false