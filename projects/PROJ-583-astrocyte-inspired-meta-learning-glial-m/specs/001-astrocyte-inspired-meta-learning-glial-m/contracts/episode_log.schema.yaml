$schema: "http://json-schema.org/draft-07/schema#"
title: "EpisodeLog"
description: "Schema for a single training episode log containing metrics and homeostatic factors."
type: "object"
properties:
  episode_id:
    type: "integer"
    description: "Unique integer identifier for the episode within a run."
  seed:
    type: "integer"
    description: "Random seed used for this run."
  plasticity_score_1:
    type: "number"
    description: "Accuracy on the current task after 1 inner-loop step."
  plasticity_score_5:
    type: "number"
    description: "Accuracy on the current task after 5 inner-loop steps (primary metric)."
  plasticity_score_10:
    type: "number"
    description: "Accuracy on the current task after 10 inner-loop steps."
  stability_score:
    type: "number"
    description: "Mean accuracy on Meta-Test Buffer (tasks N-1, N-2, N-3) after training on the current task. Buffer is excluded from calcium history to prevent circular validation."
  homeostatic_factor:
    type: "number"
    description: "The scalar factor h_t applied to the learning rate."
  calcium_concentration:
    type: "number"
    description: "The simulated calcium concentration Ca_t (clamped to [0, 1])."
  loss:
    type: "number"
    description: "Meta-loss for this episode."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO8601 timestamp of the episode execution."
required:
  - "episode_id"
  - "seed"
  - "plasticity_score_1"
  - "plasticity_score_5"
  - "plasticity_score_10"
  - "stability_score"
  - "homeostatic_factor"
  - "calcium_concentration"
  - "loss"
  - "timestamp"
additionalProperties: false