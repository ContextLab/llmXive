$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Result Schema"
description: "Schema for the Permutation Test results."
type: "object"
properties:
  test_name:
    type: "string"
    const: "Permutation Test"
    description: "Name of the statistical test."
  observed_distance:
    type: "number"
    description: "Euclidean distance between mean vectors."
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "P-value of the test."
  significant:
    type: "boolean"
    description: "Whether p < 0.05."
  seeds_used:
    type: "integer"
    minimum: 1
    description: "Number of seeds used in the test."
  permutations:
    type: "integer"
    minimum: 1000
    description: "Number of permutations performed."
  baseline_model:
    type: "string"
    const: "MAML"
    description: "Baseline model name."
  experimental_model:
    type: "string"
    const: "Astrocyte-MAML"
    description: "Experimental model name."
  baseline_mean:
    type: "array"
    items:
      type: "number"
    minItems: 2
    maxItems: 2
    description: "Mean vector [Stability, Plasticity] for the baseline model."
  astrocyte_mean:
    type: "array"
    items:
      type: "number"
    minItems: 2
    maxItems: 2
    description: "Mean vector [Stability, Plasticity] for the astrocyte model."
required:
  - test_name
  - observed_distance
  - p_value
  - significant
  - seeds_used
  - permutations
  - baseline_model
  - experimental_model
  - baseline_mean
  - astrocyte_mean
additionalProperties: false