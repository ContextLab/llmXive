- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: scientific_soundness-abe7ca5d
  location: plan.md:Phase 1 & research.md:Section 2
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: 'The plan validates the benchmark by comparing aggregated scores against the
    paper''s values (SC-004, Phase 3) while simultaneously mocking the video generation
    step with ''dummy frames'' or ''solid colors'' (Phase 1, Step 2). This creates
    a circular/invalid validation: the metric scores (dependent variable) are mathematically
    determined by the input video frames (predictor). If the input is mocked/dummy,
    the resulting scores will be trivially low or nonsensical, making a comparison
    to the paper''s real-video scores a comparison of ''dummy vs. real'' rather than
    a validation of the *metric logic*. The plan conflates ''pipeline execution''
    (does the code run?) with ''metric validity'' (does the score reflect reality?).
    To validate the metric logic, one must use real video data (even if pre-computed)
    or a known ground-truth synthetic dataset, not arbitrary dummy data.'
- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: scientific_soundness-c4dcfe94
  location: research.md:Section 3
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan proposes substituting heavy Vision-Language Models (VLMs) with smaller
    CPU-friendly alternatives (e.g., 'distilbert' or 'llava-phi') to calculate 'Adherence'
    and 'Quality' metrics. This violates the independence of the validation target.
    The 'ground truth' or 'paper values' were generated using specific, heavy VLMs.
    Replacing the predictor (the VLM) changes the definition of the metric itself.
    The resulting scores are not measuring the same quantity as the paper's scores;
    they are measuring a different model's interpretation. Comparing these scores
    to the paper's values to claim 'reproducibility' is scientifically unsound because
    the underlying function being evaluated has changed. The plan must either use
    the original models (if feasible) or explicitly state that it is validating a
    *proxy* metric, not reproducing the original benchmark's results.
- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: scientific_soundness-b773a982
  location: plan.md:Phase 3, Step 2
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: "The plan sets a tolerance of '\xB10.05' for comparing aggregated scores against\
    \ paper values. Without a statistical power analysis or an understanding of the\
    \ variance inherent in the metric calculation (especially with mocked data or\
    \ model substitution), this tolerance is arbitrary. If the metric is sensitive\
    \ to minor frame differences (which it should be for video), a 0.05 tolerance\
    \ might be too loose to detect a broken pipeline, or too tight for a valid proxy.\
    \ The methodology lacks a justification for this threshold based on the expected\
    \ noise floor of the metrics."
