  location: plan.md:Phase 2
  reviewer: methodology
  round: 1
  severity: methodology
  text: Plan assumes processing 289 cases in 6 hours on a 2-core CPU runner. If the
    metrics involve optical flow (Farneback) or VLM inference on video frames, this
    is computationally infeasible on CPU within the time limit. The plan lacks a power/scale
