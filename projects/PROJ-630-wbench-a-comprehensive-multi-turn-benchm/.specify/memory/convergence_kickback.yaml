    a 'proxy evaluation' with distinct validity bounds, not a direct reproduction.
- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
