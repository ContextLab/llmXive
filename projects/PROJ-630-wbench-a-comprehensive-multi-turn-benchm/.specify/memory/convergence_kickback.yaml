- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: methodology-7e0599bd
  location: plan.md:Phase 1
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'Plan states: ''Mock the video generation step... or use pre-generated sample
    videos''. If video frames are mocked (e.g., solid colors), metrics relying on
    visual content (Quality, Adherence, Physics) will return deterministic or null
    values, failing to validate the metric logic against the intended construct (video
    world model performance). The plan must specify using *real* video samples from
    the dataset for metric calculation, even if the generation step is skipped.'
- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: methodology-5ea062d4
