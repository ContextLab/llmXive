  reviewer: methodology
  round: 1
  severity: methodology
  text: Plan proposes substituting heavy VLMs with 'smaller CPU-friendly alternatives
    (e.g., distilbert instead of bert-large)'. This changes the measurement instrument
    for 'Quality' and 'Adherence' metrics. Using a different model architecture invalidates
