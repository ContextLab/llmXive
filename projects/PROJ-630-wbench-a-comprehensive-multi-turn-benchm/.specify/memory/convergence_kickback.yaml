- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: data_resources-45c9111c
  location: research.md:2. Dataset Strategy
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The plan cites 'WBench (Parquet)' from HuggingFace as the source for 'interaction_sequence'
    and 'ground_truth' to calculate adherence metrics. However, the WBench dataset
    (meituan-longcat/WBench) is primarily a video generation benchmark containing
    prompts and generated videos, not necessarily structured 'interaction_sequence'
    lists or explicit 'ground_truth' outcome annotations required for the specific
    'setting adherence' and 'interaction adherence' metrics described in the spec.
    If the dataset lacks these specific columns, the plan's assumption that the parquet
    file 'contains the necessary variables' is incorrect, rendering the metric calculation
    logic infeasible without a different data source or a complete redefinition of
    the metrics.
- artifact: projects/PROJ-630-wbench-a-comprehensive-multi-turn-benchm/specs/001-wbench-a-comprehensive-multi-turn-benchm/plan.md
  id: data_resources-a1c92bf8
  location: 'plan.md:Phase 1: Sample Data Execution'
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The plan assumes 'pre-generated sample videos if available in the repo' or
    a 'mock generator' for video data. However, the 'consistency' and 'physics compliance'
    metrics (FR-006) explicitly require analyzing temporal dynamics (optical flow,
    frame differences) of *actual* video content. Mocking video generation with 'solid
    colors or random noise' (as suggested in research.md) will result in zero or nonsensical
    scores for these specific metrics, making it impossible to 'reproduce the paper's
    structure' or validate the benchmark logic as intended. The dataset/resource strategy
    must provide actual video frames, not mocks, for these specific metrics to be
    valid.
