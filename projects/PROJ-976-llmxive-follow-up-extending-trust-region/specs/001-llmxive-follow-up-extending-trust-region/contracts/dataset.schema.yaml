$schema: http://json-schema.org/draft-07/schema#
title: Diversity Profile Feature Matrix Schema
description: |
  Schema for feature matrices generated by code/pipelines/extract_features.py.
  These matrices contain lexical and syntactic metrics derived from teacher outputs
  (Book Corpus and BEIR) to support proxy correlation analysis.
  The schema enforces the structure required by T013-T016 and T019.
type: object
required:
  - metadata
  - features
properties:
  metadata:
    type: object
    description: Information about the dataset and processing run.
    required:
      - source_dataset
      - processing_timestamp
      - feature_version
      - total_records
    properties:
      source_dataset:
        type: string
        description: Name of the source dataset (e.g., 'tr-books-tokenized', 'Tr-beir-formatted').
        enum:
          - tr-books-tokenized
          - Tr-beir-formatted
      processing_timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp when features were extracted.
      feature_version:
        type: string
        description: Version of the feature extraction logic (e.g., '1.0.0').
      total_records:
        type: integer
        minimum: 0
        description: Total number of records processed.
      config_snapshot:
        type: object
        description: Snapshot of hyperparameters used (from code/config.py).
        properties:
          distinct_n:
            type: integer
            description: N value for distinct-n ratio calculation.
          ngram_range:
            type: array
            items:
              type: integer
            description: Range of n-grams for entropy calculation [min, max].
          spacy_model:
            type: string
            description: Name of the spaCy model used for parsing.

  features:
    type: array
    description: List of feature vectors, one per input record.
    items:
      type: object
      required:
        - record_id
        - lexical_metrics
        - syntactic_metrics
      properties:
        record_id:
          type: string
          description: Unique identifier for the source record (e.g., tokenized text ID).
        
        lexical_metrics:
          type: object
          description: Lexical diversity metrics computed by code/metrics/lexical.py.
          required:
            - distinct_4_ratio
            - ngram_entropy
          properties:
            distinct_4_ratio:
              type: number
              format: float
              minimum: 0.0
              maximum: 1.0
              description: Ratio of unique 4-grams to total 4-grams.
            ngram_entropy:
              type: number
              format: float
              minimum: 0.0
              description: Shannon entropy of the n-gram distribution.
            token_count:
              type: integer
              minimum: 0
              description: Total number of tokens in the record.
            unique_token_count:
              type: integer
              minimum: 0
              description: Number of unique tokens in the record.

        syntactic_metrics:
          type: object
          description: Syntactic complexity metrics computed by code/metrics/syntactic.py.
          required:
            - parse_tree_depth_variance
            - parse_tree_depth_mean
          properties:
            parse_tree_depth_variance:
              type: number
              format: float
              minimum: 0.0
              description: Variance of parse tree node depths. NaN if parsing failed.
            parse_tree_depth_mean:
              type: number
              format: float
              minimum: 0.0
              description: Mean parse tree node depth. NaN if parsing failed.
            parse_success_rate:
              type: number
              format: float
              minimum: 0.0
              maximum: 1.0
              description: Fraction of sentences successfully parsed (0.0 to 1.0).
            avg_dependencies:
              type: number
              format: float
              minimum: 0.0
              description: Average number of dependency relations per token.
        
        proxy_target:
          type: object
          description: The proxy target value associated with this record (per T006b).
          nullable: true
          properties:
            type:
              type: string
              enum:
                - text_length
                - relevance_score
              description: Type of proxy target.
            value:
              type: number
              format: float
              description: The numeric value of the proxy target.
            source:
              type: string
              description: Origin of the proxy value (e.g., 'computed', 'dataset_field').

additionalProperties: false