[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-trb-followup"
version = "0.1.0"
description = "Trust-Region Behavior Blending for On-Policy Distillation - Follow-up Study"
requires-python = ">=3.10"
dependencies = [
    "pandas",
    "scikit-learn",
    "spacy",
    "numpy",
    "jsonlines",
    "pyyaml",
    "pytest",
    "datasets",
    "scipy",
]

[tool.black]
line-length = 100
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
# Inherits from .ruff.toml if present, but we define defaults here too for CI
target-version = "py310"
line-length = 100

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]