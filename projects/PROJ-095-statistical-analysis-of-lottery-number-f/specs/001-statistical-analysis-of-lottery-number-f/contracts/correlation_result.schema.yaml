$schema: "http://json-schema.org/draft-07/schema#"
title: "CorrelationResult"
description: "Schema for the statistical correlation analysis results."
type: "object"
properties:
  correlation_coefficient:
    type: "number"
    description: "The Spearman or Pearson correlation coefficient."
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "The p-value of the correlation test."
  confidence_interval_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  confidence_interval_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  ci_width_ratio:
    type: "number"
    description: "Ratio of CI width to absolute effect size (CI_width / |r|). Used for SC-004 validation."
  n_samples:
    type: "integer"
    minimum: 1
    description: "Number of samples used in the calculation."
  control_variable_note:
    type: "string"
    description: "Explicit note about missing Quick Pick control (e.g., \"Quick Pick rate unobservable; no control applied\")."
  bonferroni_corrected_p_value:
    type: ["number", "null"]
    description: "Bonferroni-corrected p-value if multiple comparisons were made."
  outlier_sensitivity_passed:
    type: "boolean"
    description: "Whether the result is robust to outlier exclusion."
  threshold_sensitivity:
    type: "array"
    description: "Results for different birthday clustering thresholds."
    items:
      type: "object"
      properties:
        threshold:
          type: "number"
        correlation_coefficient:
          type: "number"
        p_value:
          type: "number"
required:
  - correlation_coefficient
  - p_value
  - confidence_interval_lower
  - confidence_interval_upper
  - ci_width_ratio
  - n_samples
  - control_variable_note
additionalProperties: false