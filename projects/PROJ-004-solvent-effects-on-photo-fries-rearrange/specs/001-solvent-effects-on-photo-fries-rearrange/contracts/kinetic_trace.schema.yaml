$schema: "http://json-schema.org/draft-07/schema#"
title: "Kinetic Trace Schema"
type: "object"
required:
  - "trace_id"
  - "solvent_id"
  - "replicate_id"
  - "time_ns"
  - "absorbance_mOD"
  - "calibration_id"
  - "status"
properties:
  trace_id:
    type: "string"
    description: "Unique identifier for the trace"
  solvent_id:
    type: "string"
    description: "Foreign key to Solvent Condition"
  replicate_id:
    type: "integer"
    description: "Replicate number (1, 2, 3...)"
  time_ns:
    type: "array"
    items:
      type: "number"
    description: "Time points in nanoseconds"
  absorbance_mOD:
    type: "array"
    items:
      type: "number"
    description: "Absorbance in milli-Optical Density"
  calibration_id:
    type: "string"
    description: "Foreign key to Calibration Record"
  status:
    type: "string"
    enum:
      - "raw"
      - "processed"
      - "flagged"
    description: "Current processing status"
additionalProperties: false
