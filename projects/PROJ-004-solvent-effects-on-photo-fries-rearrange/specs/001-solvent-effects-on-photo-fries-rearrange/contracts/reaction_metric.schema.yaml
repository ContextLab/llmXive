$schema: "http://json-schema.org/draft-07/schema#"
title: "Reaction Metric Schema"
type: "object"
required:
  - "metric_id"
  - "trace_id"
  - "lifetime_ns"
  - "ci_lower_ns"
  - "ci_upper_ns"
  - "r_squared"
properties:
  metric_id:
    type: "string"
    description: "Unique identifier for the metric"
  trace_id:
    type: "string"
    description: "Foreign key to Kinetic Trace"
  lifetime_ns:
    type: "number"
    description: "Extracted lifetime in nanoseconds"
  ci_lower_ns:
    type: "number"
    description: "Lower bound of 95% confidence interval"
  ci_upper_ns:
    type: "number"
    description: "Upper bound of 95% confidence interval"
  r_squared:
    type: "number"
    description: "Goodness of fit (R²)"
additionalProperties: false
