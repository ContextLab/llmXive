$schema: "http://json-schema.org/draft-07/schema#"
title: "SolventEffectsDatasetSchema"
description: "Schema for raw kinetic traces and computed solvation energies."
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      version:
        type: "string"
        description: "Schema version"
      generated_at:
        type: "string"
        format: "date-time"
        description: "ISO-8601 timestamp of generation"
  solvents:
    type: "array"
    items:
      type: "object"
      required:
        - "solvent_id"
        - "dielectric_constant"
        - "temperature"
        - "humidity"
      properties:
        solvent_id:
          type: "string"
          description: "Unique identifier for the solvent"
        dielectric_constant:
          type: "number"
          description: "Dielectric constant (epsilon)"
        temperature:
          type: "number"
          description: "Temperature in Celsius"
        humidity:
          type: "number"
          description: "Relative humidity in percent"
        pressure:
          type: "number"
          description: "Barometric pressure in hPa"
        manufacturer:
          type: "string"
        lot_number:
          type: "string"
        purity:
          type: "number"
          minimum: 0
          maximum: 1
        lookup_match_status:
          type: "string"
          enum:
            - "match"
            - "mismatch"
            - "unverified"
  kinetic_traces:
    type: "array"
    items:
      type: "object"
      required:
        - "trace_id"
        - "solvent_id"
        - "time_ns"
        - "absorbance"
      properties:
        trace_id:
          type: "string"
        solvent_id:
          type: "string"
        wavelength_nm:
          type: "number"
        time_ns:
          type: "array"
          items:
            type: "number"
          description: "Array of time points in nanoseconds"
        absorbance:
          type: "array"
          items:
            type: "number"
          description: "Array of absorbance values"
        calibration_id:
          type: "string"
        status:
          type: "string"
          enum:
            - "valid"
            - "flagged_humidity"
            - "flagged_temp"
            - "failed_fit"
  solvation_energies:
    type: "array"
    items:
      type: "object"
      required:
        - "solv_id"
        - "solvent_id"
        - "delta_g_solv_kcal_mol"
        - "method"
      properties:
        solv_id:
          type: "string"
        solvent_id:
          type: "string"
        delta_g_solv_kcal_mol:
          type: "number"
          description: "Solvation free energy in kcal/mol"
        method:
          type: "string"
          enum:
            - "SMD"
            - "PCM"
            - "Explicit"
        basis_set:
          type: "string"
        functional:
          type: "string"
required:
  - "metadata"
  - "solvents"
  - "kinetic_traces"
  - "solvation_energies"