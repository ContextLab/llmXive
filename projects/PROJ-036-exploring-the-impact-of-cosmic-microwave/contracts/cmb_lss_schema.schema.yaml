$schema: http://json-schema.org/draft-07/schema#
title: CMB-LSS Statistical Output Schema
description: >
  JSON Schema for validating statistical outputs generated by the CMB Anomaly
  vs Large Scale Structure simulation pipeline. This schema ensures all
  diagnostic metrics (KS test, Chi-squared, power spectrum deviations) conform
  to the expected structure for downstream reporting and visualization.
type: object
required:
  - metadata
  - statistics
properties:
  metadata:
    type: object
    description: Run configuration and provenance information
    required:
      - run_id
      - timestamp
      - simulation_config
      - input_data_hashes
    properties:
      run_id:
        type: string
        description: Unique identifier for this simulation run
        pattern: "^run_[0-9a-f]{8}$"
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of run completion
      simulation_config:
        type: object
        required:
          - nbody_resolution
          - box_size_hinv_mpc
          - cosmology_model
        properties:
          nbody_resolution:
            type: integer
            minimum: 1
            description: Number of particles per dimension (e.g., 128, 256)
          box_size_hinv_mpc:
            type: number
            minimum: 10
            maximum: 2000
            description: Simulation box size in h^-1 Mpc
          cosmology_model:
            type: string
            enum:
              - lambdacdm
              - anomaly_modified
            description: Type of cosmological model used
          power_spectrum_source:
            type: string
            description: Source of initial power spectrum (e.g., CAMB, Planck)
      input_data_hashes:
        type: object
        required:
          - ic_file_sha256
          - mask_file_sha256
        properties:
          ic_file_sha256:
            type: string
            pattern: "^[a-f0-9]{64}$"
            description: SHA256 hash of initial conditions file
          mask_file_sha256:
            type: string
            pattern: "^[a-f0-9]{64}$"
            description: SHA256 hash of galactic mask file
          planck_map_sha256:
            type: string
            pattern: "^[a-f0-9]{64}$"
            description: SHA256 hash of source Planck map (optional)
  statistics:
    type: object
    description: Statistical comparison results between anomaly and control runs
    required:
      - power_spectrum
      - void_statistics
      - diagnostic_tests
    properties:
      power_spectrum:
        type: object
        description: Matter power spectrum P(k) comparison
        required:
          - k_values_h_mpc
          - p_k_anomaly
          - p_k_control
          - delta_p_k
          - relative_deviation
        properties:
          k_values_h_mpc:
            type: array
            items:
              type: number
              minimum: 0
            description: Wavenumber bins in h/Mpc
          p_k_anomaly:
            type: array
            items:
              type: number
              minimum: 0
            description: Power spectrum values for anomaly simulation
          p_k_control:
            type: array
            items:
              type: number
              minimum: 0
            description: Power spectrum values for control simulation
          delta_p_k:
            type: array
            items:
              type: number
            description: Absolute difference (anomaly - control)
          relative_deviation:
            type: array
            items:
              type: number
            description: Relative difference (delta / control)
          low_ell_deviation:
            type: object
            description: Specific metrics for low-multipole (ℓ ≤ 30) region
            required:
              - max_deviation_percent
              - mean_deviation_percent
              - deviation_at_l30
            properties:
              max_deviation_percent:
                type: number
              mean_deviation_percent:
                type: number
              deviation_at_l30:
                type: number
      void_statistics:
        type: object
        description: Void size distribution comparison
        required:
          - void_radii_mpch
          - count_anomaly
          - count_control
          - ks_statistic
          - ks_p_value
        properties:
          void_radii_mpch:
            type: array
            items:
              type: number
              minimum: 0
            description: Void radius bins in h^-1 Mpc
          count_anomaly:
            type: array
            items:
              type: integer
              minimum: 0
            description: Void counts in anomaly simulation per bin
          count_control:
            type: array
            items:
              type: integer
              minimum: 0
            description: Void counts in control simulation per bin
          ks_statistic:
            type: number
            minimum: 0
            maximum: 1
            description: Kolmogorov-Smirnov test statistic
          ks_p_value:
            type: number
            minimum: 0
            maximum: 1
            description: KS test p-value (diagnostic metric, not inferential)
          chi_squared:
            type: number
            minimum: 0
            description: Chi-squared statistic for void distribution
          chi_squared_p_value:
            type: number
            minimum: 0
            maximum: 1
            description: Chi-squared p-value (diagnostic metric)
      diagnostic_tests:
        type: object
        description: Aggregate diagnostic metrics
        required:
          - ks_test
          - chi_squared_test
          - benjamini_hochberg
        properties:
          ks_test:
            type: object
            required:
              - statistic
              - p_value
              - corrected_p_value
              - is_significant
            properties:
              statistic:
                type: number
              p_value:
                type: number
              corrected_p_value:
                type: number
              is_significant:
                type: boolean
                description: Significance after Benjamini-Hochberg correction
          chi_squared_test:
            type: object
            required:
              - statistic
              - degrees_of_freedom
              - p_value
              - corrected_p_value
            properties:
              statistic:
                type: number
              degrees_of_freedom:
                type: integer
                minimum: 1
              p_value:
                type: number
              corrected_p_value:
                type: number
          benjamini_hochberg:
            type: object
            required:
              - alpha_threshold
              - num_tests
              - num_rejections
              - critical_values
            properties:
              alpha_threshold:
                type: number
                description: FDR threshold (e.g., 0.05)
              num_tests:
                type: integer
                minimum: 1
              num_rejections:
                type: integer
                minimum: 0
              critical_values:
                type: array
                items:
                  type: number
      classification:
        type: string
        enum:
          - associational
          - diagnostic
        description: Explicit classification of results per SC-002 (N=1 limitation)
        default: diagnostic
  execution_metrics:
    type: object
    description: Performance metrics from simulation execution
    required:
      - wall_clock_time_seconds
      - peak_memory_gb
      - cpu_utilization
    properties:
      wall_clock_time_seconds:
        type: number
        minimum: 0
      peak_memory_gb:
        type: number
        minimum: 0
        maximum: 7.0
        description: Must not exceed 7GB per project constraints
      cpu_utilization:
        type: number
        minimum: 0
        maximum: 100
        description: Average CPU utilization percentage
additionalProperties: false
