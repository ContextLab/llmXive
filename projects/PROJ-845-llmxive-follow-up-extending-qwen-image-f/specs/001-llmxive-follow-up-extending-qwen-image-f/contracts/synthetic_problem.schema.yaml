$schema: http://json-schema.org/draft-07/schema#
title: SyntheticProblem
description: "A logical reasoning instance generated by a rule‑based engine with controlled entropy and structure type."
type: object
properties:
  id:
    type: string
    description: Unique identifier (UUID).
  entropy_level:
    type: string
    enum:
      - high
      - low
      - target
    description: The entropy regime of the problem.
  structure_type:
    type: string
    description: "The logical structure type (e.g., 'modus_ponens', 'arithmetic_chain') for stratified sampling."
  premises:
    type: array
    items:
      type: string
    description: List of logical premises.
  operator:
    type: string
    description: The logical operator or arithmetic function used.
  question:
    type: string
    description: The query to be answered.
  ground_truth:
    type: string
    description: The correct answer.
  entropy_score:
    type: number
    description: Calculated entropy metric for the problem.
  trace_entropy:
    type: number
    description: Entropy of the teacher's CoT trace (if available).
  trace_consistent:
    type: boolean
    description: True if trace entropy matches problem entropy (required by FR‑009).
  is_valid:
    type: boolean
    description: Flag indicating logical consistency.
  set_type:
    type: string
    enum:
      - train
      - test_generalization
    description: Distinguishes training data from the balanced Generalization Set (FR‑008).
  set_name:
    type: string
    description: Optional human‑readable tag (e.g., "high_entropy", "low_entropy", "target_specific", "generalization").
required:
  - id
  - entropy_level
  - structure_type
  - premises
  - question
  - ground_truth
  - entropy_score
  - is_valid
  - set_type
additionalProperties: false