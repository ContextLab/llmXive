$schema: http://json-schema.org/draft-07/schema#
title: DistillationRun
description: Schema for recording the results of a single distillation training run.
type: object
properties:
  run_id:
    type: string
    description: Unique identifier for the training run.
  entropy_subset:
    type: string
    enum: ["High", "Low", "Target"]
    description: The entropy subset used for this training run.
  model_params:
    type: object
    additionalProperties: true
    description: Hyperparameters and configuration used for the student model.
  training_loss_curve:
    type: array
    items:
      type: number
    description: List of loss values recorded per epoch.
  convergence_epoch:
    type: integer
    description: The epoch at which the loss threshold was first met, or max_epochs + 1 if failed.
  final_accuracy:
    type: number
    minimum: 0
    maximum: 1
    description: Final accuracy on the validation set.
  status:
    type: string
    enum: ["success", "failed_non_converge", "failed_resource_limit"]
    description: Outcome status of the run.
  resource_usage:
    type: object
    properties:
      peak_ram_gb:
        type: number
      runtime_seconds:
        type: number
    description: Resource consumption metrics.
required:
  - run_id
  - entropy_subset
  - model_params
  - training_loss_curve
  - convergence_epoch
  - final_accuracy
  - status
  - resource_usage
