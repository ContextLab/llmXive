$schema: http://json-schema.org/draft-07/schema#
title: DistillationRun
description: |
  Schema for a single distillation run record, capturing model parameters,
  training dynamics, and resource usage constraints.
type: object
required:
  - run_id
  - entropy_subset
  - model_params
  - training_loss_curve
  - convergence_epoch
  - final_accuracy
  - status
  - resource_usage
properties:
  run_id:
    type: string
    description: Unique identifier for the distillation run.
  entropy_subset:
    type: string
    enum:
      - high
      - low
      - target
    description: The entropy subset (dataset) used for this run.
  model_params:
    type: object
    description: Configuration parameters used for the student model.
    additionalProperties: true
  training_loss_curve:
    type: array
    items:
      type: number
    description: List of loss values recorded per epoch.
  convergence_epoch:
    type: integer
    minimum: 0
    description: |
      The epoch at which the loss first met the convergence threshold.
      If the model did not converge, this should be max_epochs + 1.
  final_accuracy:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Final accuracy on the validation/test set.
  status:
    type: string
    enum:
      - completed
      - failed_non_converge
      - failed_resource_limit
    description: Outcome status of the run.
  resource_usage:
    type: object
    description: Resource consumption metrics.
    required:
      - peak_ram_gb
      - wall_clock_hours
    properties:
      peak_ram_gb:
        type: number
        minimum: 0.0
      wall_clock_hours:
        type: number
        minimum: 0.0
