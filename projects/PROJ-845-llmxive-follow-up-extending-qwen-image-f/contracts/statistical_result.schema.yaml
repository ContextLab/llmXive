$schema: http://json-schema.org/draft-07/schema#
title: StatisticalResult
description: Schema for storing the results of statistical hypothesis tests.
type: object
properties:
  test_type:
    type: string
    description: Name of the statistical test performed (e.g., 'ANOVA', 't-test').
  statistic:
    type: number
    description: The calculated test statistic (e.g., F-statistic, t-value).
  p_value:
    type: number
    minimum: 0
    maximum: 1
    description: The raw p-value before correction.
  corrected_p_value:
    type: number
    minimum: 0
    maximum: 1
    description: The p-value after applying the correction method.
  conclusion:
    type: string
    description: Human-readable interpretation of the result.
  correction_method:
    type: string
    enum: ["bonferroni", "none", "holm", "hochberg"]
    description: The method used for p-value correction.
required:
  - test_type
  - statistic
  - p_value
  - corrected_p_value
  - conclusion
  - correction_method