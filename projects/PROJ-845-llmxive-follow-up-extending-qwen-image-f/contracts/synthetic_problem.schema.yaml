$schema: http://json-schema.org/draft-07/schema#
title: SyntheticProblem
description: Schema for synthetic logic/arithmetic problem instances used in the dataset.
type: object
properties:
  id:
    type: string
    description: Unique identifier for the problem instance.
  premises:
    type: array
    items:
      type: string
    description: List of premise statements or conditions.
  operators:
    type: array
    items:
      type: string
    description: List of logical or arithmetic operators used in the problem.
  solution:
    type: string
    description: The correct solution or conclusion derived from premises.
  entropy_level:
    type: string
    enum: ["High", "Low", "Target"]
    description: Classification of the problem's entropy level.
  metadata:
    type: object
    additionalProperties: true
    description: Additional metadata such as structure_hash, generation_seed, etc.
required:
  - id
  - premises
  - operators
  - solution
  - entropy_level
  - metadata
