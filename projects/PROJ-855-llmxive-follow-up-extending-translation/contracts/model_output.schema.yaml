$schema: http://json-schema.org/draft-07/schema#
title: Model Output Metrics Report
description: |
  Schema for the metrics report generated by the evaluation pipeline.
  Contains accuracy, p-values from McNemar's test, and associational framing.
type: object
required:
  - model_name
  - dataset_split
  - metrics
  - baselines_comparison
  - associational_framing
properties:
  model_name:
    type: string
    description: Name of the model evaluated (e.g., 'translation_transformer')
  dataset_split:
    type: string
    enum:
      - test_novel_geometries
      - validation
    description: The split used for evaluation
  metrics:
    type: object
    required:
      - accuracy
      - precision
      - recall
      - f1_score
      - confusion_matrix
    properties:
      accuracy:
        type: number
        minimum: 0
        maximum: 1
      precision:
        type: number
        minimum: 0
        maximum: 1
      recall:
        type: number
        minimum: 0
        maximum: 1
      f1_score:
        type: number
        minimum: 0
        maximum: 1
      confusion_matrix:
        type: object
        required:
          - true_positive
          - true_negative
          - false_positive
          - false_negative
        properties:
          true_positive:
            type: integer
          true_negative:
            type: integer
          false_positive:
            type: integer
          false_negative:
            type: integer
  baselines_comparison:
    type: object
    required:
      - geometry_only_baseline
      - shuffled_control
    properties:
      geometry_only_baseline:
        type: object
        required:
          - accuracy
          - mcnemar_p_value
        properties:
          accuracy:
            type: number
            minimum: 0
            maximum: 1
          mcnemar_p_value:
            type: number
            minimum: 0
            maximum: 1
          accuracy_improvement:
            type: number
      shuffled_control:
        type: object
        required:
          - accuracy
          - mcnemar_p_value
        properties:
          accuracy:
            type: number
            minimum: 0
            maximum: 1
          mcnemar_p_value:
            type: number
            minimum: 0
            maximum: 1
          accuracy_improvement:
            type: number
  associational_framing:
    type: string
    description: Explicit statement that results are associational, not causal
    pattern: '(?i)(associational|correlational|no causal claim)'
  sensitivity_analysis:
    type: array
    description: Optional results from threshold sensitivity sweep
    items:
      type: object
      properties:
        threshold_type:
          type: string
        threshold_value:
          type: number
        accuracy_variance:
          type: number
additionalProperties: true