$schema: http://json-schema.org/draft-07/schema#
title: Synthetic Bi-Manual Manipulation Dataset
description: |
  Schema for the raw synthetic episodes generated by PyBullet simulation.
  Contains translation vectors, initial object bounds, and stability labels.
  Explicitly excludes rotation, force, and torque data per FR-001.
type: object
required:
  - columns
  - num_rows
properties:
  columns:
    type: array
    description: List of column definitions present in the parquet file
    items:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          enum:
            - episode_id
            - initial_object_bounds_min_x
            - initial_object_bounds_min_y
            - initial_object_bounds_min_z
            - initial_object_bounds_max_x
            - initial_object_bounds_max_y
            - initial_object_bounds_max_z
            - wrist_left_translation_x
            - wrist_left_translation_y
            - wrist_left_translation_z
            - wrist_right_translation_x
            - wrist_right_translation_y
            - wrist_right_translation_z
            - stability_label
            - geometry_id
        type:
          type: string
          enum:
            - float64
            - int64
            - string
  num_rows:
    type: integer
    minimum: 5000
    description: Total number of episodes in the dataset
  metadata:
    type: object
    properties:
      generated_by:
        type: string
      pybullet_version:
        type: string
      timestamp:
        type: string
        format: date-time
additionalProperties: true
