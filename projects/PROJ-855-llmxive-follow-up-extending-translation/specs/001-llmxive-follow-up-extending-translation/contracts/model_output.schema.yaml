type: object
properties:
  model_id:
    type: string
  predictions:
    type: array
    items:
      type: object
      properties:
        row_id:
          type: integer
        predicted_stability:
          type: integer
          enum: [0, 1]
        confidence:
          type: number
          minimum: 0
          maximum: 1
      required:
        - row_id
        - predicted_stability
        - confidence
  metrics:
    type: object
    properties:
      accuracy:
        type: number
        minimum: 0
        maximum: 1
    required:
      - accuracy
required:
  - model_id
  - predictions
  - metrics
