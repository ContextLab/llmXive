$schema: "http://json-schema.org/draft-07/schema#"
title: "ModelPredictionSchema"
description: "Schema for model evaluation outputs, including baseline comparison and correctness flags."
type: "object"
properties:
  episode_id:
    type: "string"
    description: "Reference to the original episode ID."
  model_pred_prob:
    type: "number"
    description: "Probability of success from the translation-only model."
    minimum: 0.0
    maximum: 1.0
  model_pred_label:
    type: "integer"
    description: "Thresholded prediction (0.5)."
    enum: [0, 1]
  baseline_pred_label:
    type: "integer"
    description: "Prediction from the geometry-only baseline model."
    enum: [0, 1]
  shuffled_pred_label:
    type: "integer"
    description: "Prediction from the shuffled-translation control model."
    enum: [0, 1]
  actual_label:
    type: "integer"
    description: "Ground truth stability label."
    enum: [0, 1]
  correct_model:
    type: "boolean"
    description: "True if model prediction matches actual label."
  correct_baseline:
    type: "boolean"
    description: "True if baseline prediction matches actual label."
  correct_shuffled:
    type: "boolean"
    description: "True if shuffled model prediction matches actual label."
required:
  ["episode_id", "model_pred_prob", "model_pred_label", "baseline_pred_label", "shuffled_pred_label", "actual_label", "correct_model", "correct_baseline", "correct_shuffled"]
additionalProperties: false