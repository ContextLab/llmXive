$schema: "http://json-schema.org/draft-07/schema#"
title: Synthetic Episodes Dataset Schema
description: >
  Schema for the raw synthetic episodes dataset generated by PyBullet simulation.
  Enforces exclusion of rotation and force data per FR-001.
  Used for contract testing and data validation.
type: object
required:
  - properties
  - type
properties:
  type:
    type: string
    const: table
  properties:
    type: object
    required:
      - episode_id
      - translation_vector
      - initial_object_bounds
      - stability_label
      - geometry_id
    properties:
      episode_id:
        type: string
        description: Unique identifier for the episode
      translation_vector:
        type: array
        description: Relative wrist translation vector (x, y, z) in meters
        items:
          type: number
        minItems: 3
        maxItems: 3
      initial_object_bounds:
        type: array
        description: Initial bounding box coordinates [min_x, min_y, min_z, max_x, max_y, max_z]
        items:
          type: number
        minItems: 6
        maxItems: 6
      stability_label:
        type: integer
        description: Binary stability label (1=stable, 0=unstable)
        enum:
          - 0
          - 1
      geometry_id:
        type: string
        description: Identifier for the object geometry used in this episode
      tipping_angle:
        type: number
        description: Maximum tipping angle observed (degrees) - metadata only, not used for label if label is pre-computed
        nullable: true
      slippage_distance:
        type: number
        description: Maximum slippage distance observed (meters) - metadata only
        nullable: true
    additionalProperties: false
additionalProperties: false
examples:
  - type: table
    properties:
      episode_id: "ep_001"
      translation_vector: [0.01, -0.02, 0.005]
      initial_object_bounds: [-0.05, -0.05, 0.0, 0.05, 0.05, 0.1]
      stability_label: 1
      geometry_id: "cube_01"
      tipping_angle: 5.2
      slippage_distance: 0.001
