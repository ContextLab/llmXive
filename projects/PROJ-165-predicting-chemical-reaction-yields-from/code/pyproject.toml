[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-reaction-yield-prediction"
version = "0.1.0"
description = "Predicting Chemical Reaction Yields from Spectroscopic Data with Attention Mechanisms (Pivot: DFT Energy)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "scikit-learn>=1.3.0",
    "rdkit>=2023.3.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "pyyaml>=6.0",
    "pytest>=7.3.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools.packages.find]
where = ["code"]
exclude = ["tests*"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.venv
    | __pycache__
    | data
    | state
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
src = ["code/src", "code/tests"]
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data",
    "state",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in ML)
]

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"
