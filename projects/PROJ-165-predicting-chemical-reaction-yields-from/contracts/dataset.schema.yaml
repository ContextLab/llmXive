schema_version: "1.0.0"
description: >
  Schema for the reaction dataset used in the DFT energy prediction pipeline.
  This schema defines the structure for raw, processed, and split dataset files.
  Note: The target variable is 'normalized_dft_total_molecular_energy' per the project pivot.

dataset:
  type: object
  required:
    - metadata
    - samples

  properties:
    metadata:
      type: object
      required:
        - source
        - timestamp
        - version
        - checksum
        - split_info
      properties:
        source:
          type: string
          description: "Origin of the data (e.g., 'MolSpectra', 'NIST', 'Simulated')"
        timestamp:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of data generation/loading"
        version:
          type: string
          description: "Schema version or dataset version"
        checksum:
          type: string
          description: "SHA256 hash of the dataset file"
        split_info:
          type: object
          description: "Information about the train/val/test split"
          properties:
            train_count:
              type: integer
              minimum: 0
            val_count:
              type: integer
              minimum: 0
            test_count:
              type: integer
              minimum: 0
            scaffold_overlap_check:
              type: boolean
              description: "True if scaffold overlap was verified as zero"

    samples:
      type: array
      description: "List of reaction samples"
      items:
        type: object
        required:
          - sample_id
          - reaction_smiles
          - ir_spectrum
          - raman_spectrum
          - nmr_spectrum
          - reaction_conditions
          - fingerprint
          - target_energy
          - scaffold
        properties:
          sample_id:
            type: string
            description: "Unique identifier for the sample"
          reaction_smiles:
            type: string
            description: "SMILES string of the reaction"
          ir_spectrum:
            type: object
            description: "IR spectrum data"
            properties:
              wavenumbers:
                type: array
                items:
                  type: number
                description: "Wavenumbers in cm^-1"
              intensities:
                type: array
                items:
                  type: number
                description: "Normalized intensities"
          raman_spectrum:
            type: object
            description: "Raman spectrum data"
            properties:
              wavenumbers:
                type: array
                items:
                  type: number
              intensities:
                type: array
                items:
                  type: number
          nmr_spectrum:
            type: object
            description: "NMR spectrum data"
            properties:
              ppm:
                type: array
                items:
                  type: number
                description: "Chemical shifts in ppm"
              intensities:
                type: array
                items:
                  type: number
          reaction_conditions:
            type: object
            description: "Encoded reaction conditions"
            properties:
              solvent:
                type: string
                description: "Solvent identifier (one-hot encoded index or name)"
              catalyst:
                type: string
                description: "Catalyst identifier"
              temperature:
                type: number
                description: "Temperature in Kelvin"
              # Additional condition embeddings may be added here
          fingerprint:
            type: array
            items:
              type: integer
              minimum: 0
              maximum: 1
            description: "ECFP4 fingerprint vector (binary)"
          target_energy:
            type: number
            description: "Normalized DFT total molecular energy (eV or Ha)"
          scaffold:
            type: string
            description: "Molecular scaffold string for splitting logic"
