schema_version: "1.0.0"
description: >
  Schema for model output artifacts, including predictions, metrics, and attention weights.
  This schema ensures consistency in evaluation reports and model checkpoints.

model_output:
  type: object
  required:
    - metadata
    - predictions
    - metrics
    - artifacts

  properties:
    metadata:
      type: object
      required:
        - model_type
        - hyperparameters
        - training_seed
        - timestamp
      properties:
        model_type:
          type: string
          description: "Type of model (e.g., 'AttentionNet', 'BaselineFP')"
        hyperparameters:
          type: object
          description: "Dictionary of hyperparameters used"
        training_seed:
          type: integer
          description: "Random seed used for training"
        timestamp:
          type: string
          format: date-time
          description: "ISO 8601 timestamp of model training completion"
        config_hash:
          type: string
          description: "SHA256 hash of the configuration file"

    predictions:
      type: object
      required:
        - sample_ids
        - true_values
        - predicted_values
        - residuals
      properties:
        sample_ids:
          type: array
          items:
            type: string
          description: "List of sample IDs corresponding to predictions"
        true_values:
          type: array
          items:
            type: number
          description: "Ground truth normalized DFT energies"
        predicted_values:
          type: array
          items:
            type: number
          description: "Model predicted normalized DFT energies"
        residuals:
          type: array
          items:
            type: number
          description: "Difference between true and predicted values"

    metrics:
      type: object
      required:
        - rmse
        - mae
        - r_squared
      properties:
        rmse:
          type: number
          description: "Root Mean Squared Error"
        mae:
          type: number
          description: "Mean Absolute Error"
        r_squared:
          type: number
          description: "Coefficient of determination (R^2)"
        statistical_tests:
          type: object
          description: "Results of statistical tests (e.g., paired t-test)"
          properties:
            t_statistic:
              type: number
            p_value:
              type: number
            significant:
              type: boolean

    artifacts:
      type: object
      description: "Paths or embedded data for additional artifacts"
      properties:
        attention_weights:
          type: object
          description: "Attention weight matrices or paths to them"
          properties:
            shape:
              type: array
              items:
                type: integer
            data_path:
              type: string
              description: "Relative path to the attention weights file"
        confusion_matrix:
          type: string
          description: "Path to confusion matrix image (if applicable)"
        heatmap_paths:
          type: array
          items:
            type: string
          description: "List of paths to attention heatmap images"
        checkpoint_path:
          type: string
          description: "Path to the saved model checkpoint file"
