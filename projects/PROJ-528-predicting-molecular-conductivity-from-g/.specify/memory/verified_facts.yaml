'|aromatic conjugated energy resonance significant system':
  quote: 'Hydrogenation of one mole of double bonds delivers 119.7 kJ (28.6 kcal),
    as can be deduced from the last step, the hydrogenation of cyclohexene. In benzene,
    however, 23.4 kJ (5.6 kcal) are needed to hydrogenate one mole of double bonds.
    The difference, being 143.1 kJ (34.2 kcal), is the empirical resonance energy
    of benzene. Because 1,3-cyclohexadiene also has a small delocalization energy
    (7.6 kJ or 1.8 kcal/mol) the net resonance energy, relative to the localized cyclohexatriene,
    is a bit higher: 151 kJ or 36 kcal/mol.'
  source_id: Resonance (chemistry)
  url: https://en.wikipedia.org/wiki/Resonance_(chemistry)
  value: 36 kcal/mol
