$schema: http://json-schema.org/draft-07/schema#
title: CiteVQA Chunk Schema
description: Schema for a single text chunk extracted from a CiteVQA document.
type: object
required:
  - chunk_id
  - page_id
  - text
  - bounding_box
properties:
  chunk_id:
    type: string
    description: "Unique identifier for the chunk."
  page_id:
    type: string
    description: "Identifier for the source page."
  text:
    type: string
    description: "The extracted text content of the chunk."
  bounding_box:
    type: object
    description: "Coordinates of the chunk on the page."
    required:
      - x_min
      - y_min
      - x_max
      - y_max
    properties:
      x_min:
        type: number
        description: "Minimum x coordinate."
      y_min:
        type: number
        description: "Minimum y coordinate."
      x_max:
        type: number
        description: "Maximum x coordinate."
      y_max:
        type: number
        description: "Maximum y coordinate."
      page_width:
        type: number
        description: "Width of the page in points."
      page_height:
        type: number
        description: "Height of the page in points."
  embedding:
    type: array
    description: "Optional embedding vector for retrieval."
    items:
      type: number
