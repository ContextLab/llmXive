[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-citevqa"
version = "0.1.0"
description = "CiteVQA Follow-up: Extending CiteVQA Benchmarks"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "torch-cpu",
    "transformers",
    "sentence-transformers",
    "pdfplumber",
    "scikit-learn",
    "pandas",
    "pytest",
    "memory-profiler",
    "numpy",
    "matplotlib",
    "ruff",
    "black",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.git
  | \.venv
  | venv
  | __pycache__
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101"] # Allow asserts in tests

[tool.ruff.isort]
known-first-party = ["config", "logging_utils", "main", "metrics", "pilot_eval", "reasoning", "retriever", "setup_directories", "setup_venv", "verify_citevqa_source"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "unit: unit tests",
    "integration: integration tests",
    "contract: contract tests"
]
