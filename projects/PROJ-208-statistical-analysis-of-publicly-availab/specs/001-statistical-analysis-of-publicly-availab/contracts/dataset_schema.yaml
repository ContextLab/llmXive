# Dataset Schema for GitHub Issue Resolution Analysis
# Defines the structure and constraints for the cleaned_issues.csv dataset
# Version: 1.0.0
# Updated to align with dataset.schema.yaml (string IDs, no 'number' field)

name: github_issue_resolution_dataset

fields:
  issue_id:
    type: string
    description: Unique identifier for the GitHub issue (string format)
    required: true

  repo_id:
    type: string
    description: Repository path (owner/repo)
    required: true

  created_at:
    type: string
    description: ISO 8601 timestamp of issue creation
    format: date-time
    required: true

  closed_at:
    type: string
    description: ISO 8601 timestamp of issue closure
    format: date-time
    required: true

  author:
    type: string
    description: GitHub username of the issue author
    required: true

  labels:
    type: string
    description: Comma-separated list of labels
    required: true

  has_pull_request:
    type: boolean
    description: Whether the issue was resolved via a pull request
    required: true

  resolution_time_hours:
    type: float
    description: Time in hours between created_at and closed_at
    minimum: 0
    required: true

  assignee:
    type: string
    description: Assignee username or 'unassigned'
    required: true

  comments_count:
    type: integer
    minimum: 0
    description: Number of comments on the issue
    required: true

  is_outlier:
    type: boolean
    description: True if resolution_time_hours > 720 (30 days)
    required: true

  is_valid:
    type: boolean
    description: True if closed_at >= created_at
    required: true

required:
  - issue_id
  - repo_id
  - created_at
  - closed_at
  - author
  - labels
  - has_pull_request
  - resolution_time_hours
  - assignee
  - comments_count
  - is_outlier
  - is_valid

constraints:
  resolution_time_hours:
    minimum: 0
    description: "Resolution time must be non-negative"
  repo_id:
    pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"
    description: "Must be in owner/repo format"
