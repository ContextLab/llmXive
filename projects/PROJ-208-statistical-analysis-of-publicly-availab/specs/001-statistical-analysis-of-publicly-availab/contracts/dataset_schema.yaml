# Dataset Schema for GitHub Issue Resolution Analysis
# Defines the structure and constraints for the cleaned_issues.csv dataset
version: "1.0.0"
name: github_issue_resolution_dataset

fields:
  issue_id:
    type: integer
    description: Unique identifier for the GitHub issue
    required: true

  repository_id:
    type: integer
    description: Unique identifier for the GitHub repository
    required: true

  repository_name:
    type: string
    description: Repository name in format owner/repo
    pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"
    required: true

  number:
    type: integer
    description: Issue number within the repository
    required: true

  title:
    type: string
    description: Issue title
    required: true

  state:
    type: string
    description: State of the issue (closed)
    enum: ["closed"]
    required: true

  created_at:
    type: string
    description: ISO 8601 timestamp of issue creation
    format: date-time
    required: true

  closed_at:
    type: string
    description: ISO 8601 timestamp of issue closure
    format: date-time
    required: true

  author:
    type: string
    description: GitHub username of the issue author
    required: true

  labels:
    type: string
    description: JSON-encoded list of labels attached to the issue
    required: true

  has_pull_request:
    type: boolean
    description: Whether the issue was resolved via a pull request
    required: true

  resolution_time_hours:
    type: float
    description: Time in hours between created_at and closed_at
    minimum: 0
    required: true

required:
  - issue_id
  - repository_id
  - repository_name
  - number
  - title
  - state
  - created_at
  - closed_at
  - author
  - labels
  - has_pull_request
  - resolution_time_hours

constraints:
  resolution_time_hours:
    minimum: 0
    description: "Resolution time must be non-negative"
  repository_name:
    pattern: "^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$"
    description: "Must be in owner/repo format"