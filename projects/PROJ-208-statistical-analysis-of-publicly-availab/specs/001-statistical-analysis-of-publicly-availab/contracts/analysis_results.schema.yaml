$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for validating statistical test outcomes (data/processed/test_results.json)"
type: "object"
properties:
  test_type:
    type: "string"
    description: "Type of test (e.g., \"kruskal-wallis\", \"mixed-effects\")"
  predictor:
    type: "string"
    description: "Name of predictor variable"
  p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Raw p-value from test"
  effect_size:
    type: "number"
    description: "Effect size metric (e.g., eta-squared, coefficient)"
  ci_lower:
    type: "number"
    description: "Lower bound of confidence interval"
  ci_upper:
    type: "number"
    description: "Upper bound of confidence interval"
  adjusted_p_value:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Holm-Bonferroni adjusted p-value"
  is_significant:
    type: "boolean"
    description: "True if adjusted p < 0.05"
required:
  - test_type
  - predictor
  - p_value
  - effect_size
  - ci_lower
  - ci_upper
  - adjusted_p_value
  - is_significant
additionalProperties: false
