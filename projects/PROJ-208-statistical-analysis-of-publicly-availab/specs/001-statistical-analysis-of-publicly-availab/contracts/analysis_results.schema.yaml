$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Analysis Results"
description: "Schema for hypothesis tests and model outputs"
type: "object"
properties:
  test_type:
    type: "string"
    enum:
      - "Kruskal-Wallis"
      - "ANOVA"
      - "LinearMixedEffects"
      - "LogNormalFit"
      - "WeibullFit"
    description: "Type of statistical test performed"
  predictor:
    type: "string"
    description: "Name of the predictor variable tested"
  p_value:
    type: "number"
    description: "Raw p-value from the test"
  adjusted_p_value:
    type: "number"
    description: "Holm-Bonferroni adjusted p-value"
  effect_size:
    type: "number"
    description: "Effect size metric (e.g., eta-squared, H-statistic)"
  ci_lower:
    type: "number"
    description: "Lower bound of 95% confidence interval"
  ci_upper:
    type: "number"
    description: "Upper bound of 95% confidence interval"
  vif:
    type: "number"
    description: "Variance Inflation Factor (if applicable)"
  cv_mae:
    type: "number"
    description: "Mean Absolute Error from Cross-Validation (10-Fold)"
  cv_r2:
    type: "number"
    description: "R-squared from Cross-Validation (10-Fold)"
  ks_statistic:
    type: "number"
    description: "Kolmogorov-Smirnov statistic for distribution fit"
  aic:
    type: "number"
    description: "Akaike Information Criterion for model fit"
required:
  - test_type
  - predictor
  - p_value
  - adjusted_p_value
  - effect_size
additionalProperties: true