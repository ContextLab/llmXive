$schema: "http://json-schema.org/draft-07/schema#"
title: "Cleaned GitHub Issues Dataset"
description: "Schema for data/processed/cleaned_issues.csv"
type: "object"
properties:
  issue_id:
    type: "string"
    description: "Unique GitHub issue identifier"
  repo_id:
    type: "string"
    description: "Repository path (owner/repo)"
  created_at:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of issue creation"
  closed_at:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of issue closure"
  resolution_time_hours:
    type: "number"
    description: "Time difference in hours (closed_at - created_at)"
    minimum: 0
  labels:
    type: "string"
    description: "Comma-separated list of issue labels"
  assignee:
    type: "string"
    description: "Assignee username or 'unassigned'"
  comments_count:
    type: "integer"
    minimum: 0
    description: "Number of comments on the issue"
  is_outlier:
    type: "boolean"
    description: "True if resolution_time_hours > 720 (30 days)"
  is_valid:
    type: "boolean"
    description: "True if closed_at >= created_at"
required:
  - issue_id
  - repo_id
  - created_at
  - closed_at
  - resolution_time_hours
  - labels
  - assignee
  - comments_count
  - is_outlier
  - is_valid
additionalProperties: false
