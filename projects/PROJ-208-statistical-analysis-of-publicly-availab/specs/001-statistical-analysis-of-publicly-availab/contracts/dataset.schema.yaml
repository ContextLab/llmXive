$schema: "http://json-schema.org/draft-07/schema#"
title: "GitHub Issue Dataset Schema"
description: "Schema for validating the cleaned GitHub issue dataset (data/processed/issues_clean.csv)"
type: "object"
properties:
  issue_id:
    type: "integer"
    description: "Unique issue identifier within repository"
  repository:
    type: "string"
    description: "Repository path (owner/repo)"
  created_at:
    type: "string"
    format: "date-time"
    description: "Issue creation timestamp (ISO 8601)"
  closed_at:
    type: "string"
    format: "date-time"
    description: "Issue closure timestamp (ISO 8601)"
  labels:
    type: "string"
    description: "Comma-separated label names"
  assignee:
    type: ["string", "null"]
    description: "Assignee username or null"
  comments_count:
    type: "integer"
    minimum: 0
    description: "Number of comments on issue"
  resolution_time_hours:
    type: "number"
    minimum: 0
    description: "closed_at - created_at in hours"
  resolution_time_log:
    type: "number"
    description: "Natural log of resolution time"
  is_outlier:
    type: "boolean"
    description: "True if resolution time >30 days **or** >3 standard deviations above the repository mean"
  is_valid:
    type: "boolean"
    description: "True if closed_at >= created_at and no missing timestamps"
required:
  - issue_id
  - repository
  - created_at
  - closed_at
  - labels
  - comments_count
  - resolution_time_hours
  - resolution_time_log
  - is_outlier
  - is_valid
additionalProperties: false