$schema: "http://json-schema.org/draft-07/schema#"
title: "Coverage Metrics Schema"
description: "Schema for the primary output artifact: results/coverage_metrics.csv. Supports synthetic data metrics only (real-world analysis is blocked)."
type: "object"
properties:
  phi_level:
    type: "number"
    description: "The autoregressive coefficient phi (0.0 to 0.9)."
  condition:
    type: "string"
    description: "The condition of the data (ordered or shuffled)"
    enum:
      - "ordered"
      - "shuffled"
  coverage_probability:
    type: "number"
    description: "Empirical coverage probability (0.0 to 1.0)."
    minimum: 0.0
    maximum: 1.0
  ci_width_mean:
    type: "number"
    description: "Mean CI width for this batch."
  n_trials:
    type: "integer"
    description: "Number of simulation trials"
    minimum: 1
  mcnemar_p_value:
    type: "number"
    description: "P-value from McNemar's test (paired binary outcomes)"
    minimum: 0.0
    maximum: 1.0
  mcnemar_statistic:
    type: "number"
    description: "McNemar's test statistic"
  significance:
    type: "boolean"
    description: "True if p-value < 0.05 (after Bonferroni correction)"
required:
  - phi_level
  - condition
  - n_trials
  - mcnemar_p_value
  - mcnemar_statistic
  - significance
additionalProperties: false