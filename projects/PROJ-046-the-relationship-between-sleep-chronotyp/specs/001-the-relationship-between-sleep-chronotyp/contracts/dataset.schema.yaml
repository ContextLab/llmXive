$schema: "http://json-schema.org/draft-07/schema#"
title: "ParticipantRecord"
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant."
  MEQ_score:
    type: "integer"
    description: "Morningness-Eveningness Questionnaire score."
    minimum: 16
    maximum: 86
  chronotype:
    type: "string"
    enum:
      - "morning"
      - "intermediate"
      - "evening"
      - "NA"
    description: "Derived chronotype label based on MEQ_score."
  MFQ_care:
    type: "number"
    description: "Moral Foundations Questionnaire: Care subscale score."
    minimum: 0
    maximum: 40
  MFQ_fairness:
    type: "number"
    description: "Moral Foundations Questionnaire: Fairness subscale score."
    minimum: 0
    maximum: 40
  MFQ_loyalty:
    type: "number"
    description: "Moral Foundations Questionnaire: Loyalty subscale score."
    minimum: 0
    maximum: 40
  MFQ_authority:
    type: "number"
    description: "Moral Foundations Questionnaire: Authority subscale score."
    minimum: 0
    maximum: 40
  MFQ_sanctity:
    type: "number"
    description: "Moral Foundations Questionnaire: Sanctity subscale score."
    minimum: 0
    maximum: 40
  PSQI:
    type: "number"
    description: "Pittsburgh Sleep Quality Index score."
    minimum: 0
    maximum: 21
  acute_sleepiness:
    type: "number"
    description: "Acute sleepiness score."
    minimum: 0
    maximum: 10
  age:
    type: "integer"
    description: "Age in years."
    minimum: 0
  sex:
    type: "string"
    enum:
      - "male"
      - "female"
      - "other"
    description: "Sex of the participant."
  exclusion_reason:
    type: ["string", "null"]
    description: "Reason for exclusion if applicable."
required:
  - participant_id
  - MEQ_score
  - chronotype
  - MFQ_care
  - MFQ_fairness
  - MFQ_loyalty
  - MFQ_authority
  - MFQ_sanctity
  - PSQI
  - acute_sleepiness
  - age
  - sex
additionalProperties: false
