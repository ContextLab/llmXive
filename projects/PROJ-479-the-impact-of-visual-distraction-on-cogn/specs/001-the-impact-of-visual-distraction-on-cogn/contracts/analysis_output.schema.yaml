# Analysis Output Schema Definition
# Defines the structure for results/statistics/statistics.json and related files

required_keys:
  - correlations
  - regression
  - vif_scores
  - holm_bonferroni
  - metadata

key_definitions:
  correlations:
    type: list
    required_keys:
      - predictor
      - outcome
      - r_value
      - p_value
      - method

  regression:
    type: object
    required_keys:
      - coefficients
      - r_squared
      - p_values

  vif_scores:
    type: object
    required_keys:
      - edge_density
      - color_entropy
      - object_count

  holm_bonferroni:
    type: object
    required_keys:
      - corrected_p_values
      - method

  metadata:
    type: object
    required_keys:
      - version
      - timestamp
      - software_versions

# CSV specific definitions for analysis outputs
csv_validation:
  multiplicity_table:
    required_columns:
      - test_name
      - raw_p
      - adjusted_p
      - metric_pair

  binning_results:
    required_columns:
      - binning_strategy
      - predictor
      - outcome
      - pearson_r
      - p_value
