# Dataset Schema Definition
# Defines the structure and requirements for data/processed/merged_data.csv
# and data/processed/final_analysis_data.csv

required_columns:
  - participant_id
  - reaction_time
  - accuracy
  - visual_complexity
  - edge_density
  - color_entropy
  - object_count
  - workspace_type
  - lighting_condition

columns:
  participant_id:
    type: string
    description: Unique identifier for the participant
    required: true

  reaction_time:
    type: float
    description: Reaction time in milliseconds
    required: true
    min_value: 0.0

  accuracy:
    type: float
    description: Accuracy as a decimal (0.0 to 1.0)
    required: true
    min_value: 0.0
    max_value: 1.0

  visual_complexity:
    type: float
    description: Composite visual complexity score
    required: true

  edge_density:
    type: float
    description: Normalized edge density (0.0 to 1.0)
    required: true
    min_value: 0.0
    max_value: 1.0

  color_entropy:
    type: float
    description: Color entropy of the workspace image
    required: true

  object_count:
    type: float
    description: Number of objects detected in the image
    required: true
    allow_null: true # NaN is allowed if detection fails

  workspace_type:
    type: string
    description: Type of workspace (e.g., home, office)
    required: true

  lighting_condition:
    type: string
    description: Lighting condition (e.g., natural, artificial)
    required: true

strict_columns: false # Allow additional columns if needed for analysis
