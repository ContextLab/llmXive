# Dataset Schema for Gut Microbiome - Sleep Architecture Study
# Defines required predictors (taxa) and outcomes (sleep metrics)

predictors:
  description: "Gut microbiome taxa abundance (relative or absolute counts)"
  type: "numeric"
  required:
    - "Bacteroides"
    - "Faecalibacterium"
    - "Akkermansia"
    - "Lactobacillus"
    - "Bifidobacterium"
    - "Prevotella"
    - "Ruminococcus"
    - "Clostridium"
  optional:
    - "Escherichia"
    - "Streptococcus"

outcomes:
  description: "Sleep architecture metrics derived from polysomnography"
  type: "numeric"
  required:
    - "SWS duration"
    - "REM duration"
    - "Sleep onset latency"
    - "Wake after sleep onset"
    - "Total sleep time"
    - "Sleep efficiency"
  optional:
    - "N1 duration"
    - "N2 duration"
    - "N3 duration"

metadata:
  required:
    - "subject_id"
    - "age"
    - "sex"
  description: "Participant demographic information"

version: "1.0.0"
last_updated: "2023-10-27"