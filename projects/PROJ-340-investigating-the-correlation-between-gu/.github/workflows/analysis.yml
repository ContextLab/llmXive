name: Analysis Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  analyze-cpu:
    name: Analysis (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours limit
    outputs:
      gpu_required: ${{ steps.gpu_check.outputs.required }}
      error_message: ${{ steps.gpu_check.outputs.message }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analysis Pipeline
        id: run_pipeline
        continue-on-error: true
        run: |
          set -o pipefail
          python code/main.py --real-data 2>&1 | tee pipeline_output.log
          # Check for specific GPU error in logs to trigger re-run logic
          if grep -q "GPURequiredError" pipeline_output.log; then
            echo "GPU_REQUIRED=true" >> $GITHUB_OUTPUT
            echo "GPU_ERROR_DETECTED=true" >> $GITHUB_OUTPUT
          else
            echo "GPU_REQUIRED=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture Error Details
        id: gpu_check
        if: steps.run_pipeline.outcome == 'failure' || steps.run_pipeline.outputs.gpu_error_detected == 'true'
        run: |
          # Extract the specific error message if available
          if [ -f "pipeline_output.log" ]; then
            ERROR_MSG=$(grep -A 5 "GPURequiredError" pipeline_output.log | head -n 1)
            echo "required=true" >> $GITHUB_OUTPUT
            echo "message=${ERROR_MSG}" >> $GITHUB_OUTPUT
          else
            echo "required=true" >> $GITHUB_OUTPUT
            echo "message=GPURequiredError detected in logs" >> $GITHUB_OUTPUT
          fi

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpu-pipeline-logs
          path: pipeline_output.log

  analyze-gpu:
    name: Analysis (GPU Offload)
    needs: analyze-cpu
    if: needs.analyze-cpu.outputs.gpu_required == 'true'
    runs-on: kaggle-gpu
    timeout-minutes: 360 # 6 hours limit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure GPU-specific packages are available if needed
          pip install torch --index-url https://download.pytorch.org/whl/cu118

      - name: Run Analysis Pipeline on GPU
        run: |
          echo "Re-running analysis on GPU runner due to GPURequiredError from CPU runner."
          python code/main.py --real-data

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: gpu-pipeline-results
          path: data/

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-pipeline-logs
          path: data/logs/