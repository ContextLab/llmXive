$schema: "http://json-schema.org/draft-07/schema#"
title: "PlanetRecord"
description: "Represents a single exoplanet observation from the Kepler DR25 catalog."
type: "object"
properties:
  planet_id:
    type: "string"
    description: "Unique Kepler identifier (e.g., 'Kepler-1234.01')"
  radius:
    type: "number"
    description: "Planet radius in Earth radii (R_earth)"
    minimum: 0
  radius_uncertainty:
    type: "number"
    description: "Uncertainty in radius (R_earth)"
    minimum: 0
  period:
    type: "number"
    description: "Orbital period in days"
    minimum: 0
  period_uncertainty:
    type: "number"
    description: "Uncertainty in period (days)"
    minimum: 0
  stellar_radius:
    type: "number"
    description: "Stellar radius in Solar radii (R_sun)"
    minimum: 0
  stellar_mass:
    type: "number"
    description: "Stellar mass in Solar masses (M_sun)"
    minimum: 0
  stellar_temp:
    type: "number"
    description: "Stellar effective temperature (K)"
    minimum: 0
    maximum: 1
  confirmed:
    type: "boolean"
    description: "Whether the planet is confirmed"
required:
  - "planet_id"
  - "radius"
  - "radius_uncertainty"
  - "period"
  - "period_uncertainty"
  - "stellar_radius"
  - "stellar_mass"
  - "stellar_temp"
  - "confirmed"
additionalProperties: false
