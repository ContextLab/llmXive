$schema: "http://json-schema.org/draft-07/schema#"
title: "Gap Analysis Final Results"
description: "Schema for the final output of the gap analysis pipeline."
type: object
properties:
  measured_slope:
    type: number
    description: "Slope of log(gap_radius) vs log(period)."
  slope_uncertainty:
    type: number
    description: "Standard error of the measured slope."
  posterior_photoevaporation:
    type: number
    description: "Monte Carlo p-value vs photoevaporation model (Owen & Wu)."
  p_value_core_powered:
    type: number
    description: "Monte Carlo p-value vs core-powered mass loss model (Ginzburg et al.)."
  synthetic_validation_status:
    type: string
    enum:
      - "PASS"
      - "FAIL"
    description: "Status of Synthetic Validation (method accuracy on ground truth data)."
  stability_status:
    type: string
    enum:
      - "PASS"
      - "FAIL"
    description: "Status of Stability Check (GMM vs KDE on synthetic data, threshold R_earth)."
  vif_max:
    type: number
    description: "Maximum Variance Inflation Factor among predictors."
  bin_results:
    type: array
    description: "Results for each period bin."
    items:
      type: object
      properties:
        bin_id:
          type: integer
        bin_center_log_period:
          type: number
        weighted_mean_log_period:
          type: number
        planet_count:
          type: integer
        gap_location:
          type: number
          nullable: true
        gap_uncertainty:
          type: number
        gap_location_variance:
          type: number
        is_unresolved:
          type: boolean
        synthetic_validation_status:
          type: string
        bimodality_weight:
          type: number
        low_count:
          type: boolean
        peak_separation:
          type: number
        peak_separation_met:
          type: boolean
      required:
        - bin_id
        - bin_center_log_period
        - weighted_mean_log_period
        - planet_count
        - gap_location
        - gap_uncertainty
        - gap_location_variance
        - is_unresolved
        - synthetic_validation_status
        - bimodality_weight
        - low_count
        - peak_separation
        - peak_separation_met
required:
  - measured_slope
  - slope_uncertainty
  - posterior_photoevaporation
  - posterior_core_powered
  - synthetic_validation_status
  - stability_status
  - vif_max
  - bin_results
additionalProperties: false