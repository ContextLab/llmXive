$schema: http://json-schema.org/draft-07/schema#
title: GapAnalysisResult
description: Schema for the final output of the gap analysis.
type: object
properties:
  measured_slope:
    type: number
    description: "Slope of gap radius vs log(period)."
  slope_uncertainty:
    type: number
    description: "95% confidence interval half-width for the slope."
  p_value_photoevaporation:
    type: number
    description: "P-value for consistency with photoevaporation theory."
  p_value_core_powered:
    type: number
    description: "P-value for consistency with core-powered mass loss theory."
  validation_status:
    type: string
    enum:
      - passed
      - failed
    description: "Status of BCPD validation."
  sensitivity_status:
    type: string
    enum:
      - consistent
      - inconsistent
    description: "Comparison status between SNMM and GMM results."
required:
  - measured_slope
  - slope_uncertainty
  - p_value_photoevaporation
  - p_value_core_powered
  - validation_status
  - sensitivity_status
additionalProperties: false
