$schema: http://json-schema.org/draft-07/schema#
title: GapAnalysisResult
description: Schema for the final output of the gap analysis pipeline.
type: object
required:
  - measured_slope
  - slope_uncertainty
  - posterior_photoevaporation
  - posterior_core_powered
  - validation_status
  - sensitivity_status
  - run_timestamp
  - power_analysis_status
  - theoretical_dist_photoevaporation
  - theoretical_dist_core_powered
  - run_duration_seconds
properties:
  measured_slope:
    type: number
    description: "Slope of gap radius vs log(period)"
  slope_uncertainty:
    type: number
    description: "95% CI of the slope"
    minimum: 0
  posterior_photoevaporation:
    type: number
    description: "Posterior probability vs photoevaporation theory (Monte Carlo)"
    minimum: 0
    maximum: 1
  posterior_core_powered:
    type: number
    description: "Posterior probability vs core-powered mass loss theory (Monte Carlo)"
    minimum: 0
    maximum: 1
  validation_status:
    type: string
    description: "Status of Synthetic Ground Truth validation"
    enum:
      - "valid"
      - "unresolved"
      - "sensitivity_warning"
  sensitivity_status:
    type: string
    description: "Stability of GMM vs SNMM results"
    enum:
      - "stable"
      - "unstable"
  run_timestamp:
    type: string
    description: "ISO 8601 timestamp of execution"
    format: date-time
  power_analysis_status:
    type: string
    description: "Result of the power analysis on the effective N"
    enum:
      - "sufficient"
      - "insufficient"
      - "inconclusive"
  theoretical_dist_photoevaporation:
    type: array
    description: "Sampled theoretical slope distribution for photoevaporation."
    items:
      type: number
  theoretical_dist_core_powered:
    type: array
    description: "Sampled theoretical slope distribution for core-powered mass loss."
    items:
      type: number
  internal_consistency_status:
    type: string
    description: "Status of KDE vs GMM internal consistency check."
    enum:
      - "pass"
      - "fail"
  run_duration_seconds:
    type: number
    description: "Total runtime in seconds (for SC-005 validation)."
    minimum: 0
additionalProperties: false