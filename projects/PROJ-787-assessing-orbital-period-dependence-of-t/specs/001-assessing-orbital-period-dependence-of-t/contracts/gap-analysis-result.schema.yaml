$schema: http://json-schema.org/draft-07/schema#
title: GapAnalysisResult
description: Schema for the final output of the gap analysis pipeline.
type: object
required:
  - measured_slope
  - slope_uncertainty
  - p_value_photoevaporation
  - p_value_core_powered
  - validation_status
  - sensitivity_status
  - run_timestamp
  - power_analysis_status
properties:
  measured_slope:
    type: number
    description: "Slope of gap radius vs log(period)"
  slope_uncertainty:
    type: number
    description: "95% CI of the slope"
    minimum: 0
  p_value_photoevaporation:
    type: number
    description: "LRT p-value vs photoevaporation theory"
    minimum: 0
    maximum: 1
  p_value_core_powered:
    type: number
    description: "LRT p-value vs core-powered mass loss theory"
    minimum: 0
    maximum: 1
  validation_status:
    type: string
    description: "Status of BCPD validation"
    enum:
      - "valid"
      - "unresolved"
      - "sensitivity_warning"
  sensitivity_status:
    type: string
    description: "Stability of GMM vs SNMM results"
    enum:
      - "stable"
      - "unstable"
  run_timestamp:
    type: string
    description: "ISO 8601 timestamp of execution"
    format: date-time
  power_analysis_status:
    type: string
    description: "Result of the power analysis on the effective N"
    enum:
      - "sufficient"
      - "insufficient"
      - "inconclusive"
additionalProperties: false