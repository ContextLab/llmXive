$schema: "http://json-schema.org/draft-07/schema#"
title: "GapAnalysisResult"
description: "The final output of the analysis."
type: "object"
properties:
  measured_slope:
    type: "number"
    description: "Slope of log(R_gap) vs log(P)"
  slope_uncertainty:
    type: "number"
    description: "95% CI for the slope"
  p_value_photoevaporation:
    type: "number"
    description: "Z-test p-value vs Owen & Wu model"
    minimum: 0
    maximum: 1
  p_value_core_powered:
    type: "number"
    description: "Z-test p-value vs Ginzburg et al. model"
    minimum: 0
    maximum: 1
  validation_status:
    type: "string"
    description: "PASS if KDE gap within GMM CI, else FAIL"
    enum:
      - "PASS"
      - "FAIL"
  sensitivity_status:
    type: "string"
    description: "PASS if synthetic test recovers ground truth"
    enum:
      - "PASS"
      - "FAIL"
required:
  - "measured_slope"
  - "slope_uncertainty"
  - "p_value_photoevaporation"
  - "p_value_core_powered"
  - "validation_status"
  - "sensitivity_status"
additionalProperties: false
