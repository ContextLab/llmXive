$schema: "http://json-schema.org/draft-07/schema#"
title: "PeriodBin"
description: "Schema for a binned interval of orbital periods with gap estimates."
type: "object"
properties:
  bin_id:
    type: "string"
    description: "Identifier for the bin (e.g., 'bin_0.7-0.8')."
  bin_center_log_period:
    type: "number"
    description: "Center of the bin in log space."
  weighted_mean_log_period:
    type: "number"
    description: "Weighted mean of periods in the bin."
  planet_count:
    type: "integer"
    description: "Number of planets in the bin."
  gap_location:
    type: "number"
    description: "Estimated gap radius in R_earth."
  gap_uncertainty:
    type: "number"
    description: "95% CI half-width from bootstrap."
  status:
    type: "string"
    enum:
      - "valid"
      - "unresolved"
      - "merged"
    description: "Status of the bin analysis."
required:
  - bin_id
  - bin_center_log_period
  - weighted_mean_log_period
  - planet_count
  - gap_location
  - gap_uncertainty
  - status
additionalProperties: false