$schema: "http://json-schema.org/draft-07/schema#"
title: "PeriodBin"
description: "Schema for a single period bin with derived gap metrics."
type: object
properties:
  bin_id:
    type: integer
    description: "Sequential index of the period bin."
  bin_center_log_period:
    type: number
    description: "Center of the log-period bin."
  weighted_mean_log_period:
    type: number
    description: "Weighted mean log period of planets in the bin."
  planet_count:
    type: integer
    description: "Number of planets in the bin."
    minimum: 30
  gap_location:
    type: number
    description: "Estimated gap radius in Earth radii (R_earth)."
  gap_uncertainty:
    type: number
    description: "Half-width of the 95% confidence interval from bootstrap."
    minimum: 0
  regression_weight:
    type: number
    description: "Inverse variance of the gap location estimate (1/sigma^2). Used for weighted regression."
    minimum: 0
  peak_separation:
    type: number
    description: "Separation between GMM peaks in R_earth. Must be >= 0.1."
    minimum: 0.1
  validation_status:
    type: string
    description: "Status of the GMM/KDE internal consistency check."
    enum:
      - "PASS"
      - "FAIL"
      - "UNRESOLVED"
  kde_gap_location:
    type: number
    description: "Gap location estimated via KDE validation."
  kde_gap_uncertainty:
    type: number
    description: "Uncertainty of the KDE gap estimate."
    minimum: 0
  status:
    type: string
    enum:
      - "valid"
      - "unresolved"
      - "merged"
    description: "Status of the bin analysis."
required:
  - bin_id
  - bin_center_log_period
  - weighted_mean_log_period
  - planet_count
  - gap_location
  - gap_uncertainty
  - regression_weight
  - peak_separation
  - validation_status
  - kde_gap_location
  - kde_gap_uncertainty
  - status
additionalProperties: false