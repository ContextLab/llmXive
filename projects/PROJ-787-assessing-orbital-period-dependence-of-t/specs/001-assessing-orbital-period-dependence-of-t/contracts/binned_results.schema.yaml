$schema: "http://json-schema.org/draft-07/schema#"
title: "BinnedResults"
description: "Schema for a single period bin with derived gap metrics."
type: object
properties:
  bin_id:
    type: integer
    description: "Sequential index of the period bin."
  bin_center_log_period:
    type: number
    description: "Center of the log-period bin."
  weighted_mean_log_period:
    type: number
    description: "Weighted mean log period of planets in the bin."
  bin_center_variance:
    type: number
    description: "Variance of log(period) within the bin (X-axis error)."
    minimum: 0
  planet_count:
    type: integer
    description: "Number of planets in the bin."
    minimum: 0
  gap_location:
    type: number
    description: "Estimated gap radius in Earth radii (R_earth)."
    nullable: true
  gap_uncertainty:
    type: number
    description: "Half-width of the 95% confidence interval from bootstrap."
    minimum: 0
  gap_location_variance:
    type: number
    description: "Variance of the gap location from bootstrap."
    minimum: 0
  inverse_gap_variance:
    type: number
    description: "Inverse variance of gap location (weight for regression)."
    minimum: 0
  validation_status:
    type: string
    description: "Status of the GMM/KDE internal consistency check."
    enum:
      - "PASS"
      - "FAIL"
      - "UNRESOLVED"
  kde_gap_location:
    type: number
    description: "Gap location estimated via KDE validation."
    nullable: true
  kde_gap_uncertainty:
    type: number
    description: "Uncertainty of the KDE gap estimate."
    minimum: 0
  kde_bandwidth:
    type: number
    description: "Adaptive bandwidth used for KDE."
  kde_cumulative_data_path:
    type: string
    description: "Path to the cumulative distribution data used for KDE validation."
  kde_validation_method:
    type: string
    description: "Method used for KDE (e.g., 'cumulative')."
  is_unimodal:
    type: boolean
    description: "Flag if BIC diff < 10."
  bimodality_weight:
    type: number
    description: "Weight for regression (0 if unimodal)."
    minimum: 0
    maximum: 1
  low_count:
    type: boolean
    description: "Flag if planet_count < 30."
  peak_separation:
    type: number
    description: "Separation between GMM peaks."
  peak_separation_met:
    type: boolean
    description: "True if separation >= 0.1 R_earth."
required:
  - bin_id
  - bin_center_log_period
  - weighted_mean_log_period
  - bin_center_variance
  - planet_count
  - gap_location
  - gap_uncertainty
  - gap_location_variance
  - inverse_gap_variance
  - validation_status
  - kde_gap_location
  - kde_gap_uncertainty
  - kde_bandwidth
  - kde_cumulative_data_path
  - kde_validation_method
  - is_unimodal
  - bimodality_weight
  - low_count
  - peak_separation
  - peak_separation_met
additionalProperties: false