$schema: "http://json-schema.org/draft-07/schema#"
title: "Memory Measurements Schema"
description: "Schema for the memory_measurements.csv file generated by the profiling harness."
type: "object"
properties:
  measurement_id:
    type: "string"
    description: "Unique UUID for the measurement run."
  solution_id:
    type: "string"
    description: "Composite key: problem_id + source_type."
  run_number:
    type: "integer"
    minimum: 1
    maximum: 3
    description: "Which of the 3 runs this is."
  peak_memory_bytes:
    type: "integer"
    description: "Peak memory usage in bytes. Capped at 7 GB limit."
  steady_state_bytes:
    type: "integer"
 description: "Median memory of the final [deferred] of execution steps."
  execution_time_ms:
    type: "integer"
    description: "Duration of execution in milliseconds."
  status:
    type: "string"
    enum:
      - "SUCCESS"
      - "TIMEOUT"
      - "OOM"
      - "SYNTAX_ERROR"
    description: "Execution status."
  iqr_peak:
    type: "number"
    description: "Interquartile Range of peak memory across runs (for stability check)."
required:
  - measurement_id
  - solution_id
  - run_number
  - peak_memory_bytes
  - steady_state_bytes
  - execution_time_ms
  - status
  - iqr_peak
additionalProperties: false