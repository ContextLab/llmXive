[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-memory-impact"
version = "0.1.0"
description = "Evaluating the impact of LLM-generated code on memory usage"
requires-python = ">=3.11"
dependencies = [
    "transformers==4.40.0",
    "datasets==2.19.0",
    "memory-profiler==0.61.0",
    "psutil==5.9.8",
    "scikit-learn==1.4.2",
    "statsmodels==0.14.2",
    "lifelines==0.29.0",
    "pandas==2.2.2",
    "numpy==1.26.4",
    "networkx==3.3",
    "black==24.4.2",
    "ruff==0.4.4",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.isort]
known-first-party = ["code", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"