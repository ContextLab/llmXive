    text: Add sub-figure labels (a, b, c) to grouped appendix figures.
    severity: writing
  - id: df499ee257ad
    text: Define acronyms TSDF, SE(3), SO(3), and LPIPS at first use in the main text
      to ensure accessibility for non-specialist readers.
    severity: writing
  - id: c599385ccc89
    text: Replace dense jargon terms like 'post-hoc', 'gauge ambiguity', and 'latent
      variable' with plainer alternatives (e.g., 'subsequent', 'coordinate ambiguity',
      'internal representation').
    severity: writing
  - id: 1c17a6309010
    text: Section 3.4 claims 'trivial' mesh extraction without post-processing, yet
      describes discarding low-opacity triangles, correcting winding order, and merging
      duplicate vertices. These ARE post-processing steps. Clarify whether 'no post-processing'
      means 'no per-scene optimization' or truly no processing, to avoid logical tension
      between abstract claims and method description.
    severity: writing
  - id: 789932f5a020
    text: Appendix Table 6 shows TriSplat has -3.21 PSNR degradation from primitive
      to mesh rendering. If rendering primitives ARE the exported mesh (core claim),
      why does degradation exist? Either explain the source of this gap (e.g., opacity
      thresholding, vertex merging artifacts) or clarify what 'no information loss'
      means quantitatively.
    severity: writing
  - id: 5de6c512bb3f
    text: Training objective Eq. 11 includes L_normal that directly supervises against
      monocular teacher normals throughout training, not just during bootstrap phase.
      This creates logical tension with Section 3.2's claim that the model 'relies
      entirely on its own geometry' after release phase. Clarify whether teacher supervision
      persists and how this affects the self-contained geometry claim.
    severity: science
  - id: b578d806b863
    text: Simulation demonstrations (Appendix 6) show qualitative physics results
      (ball drop, locomotion) but provide no quantitative metrics on collision accuracy,
      surface normal consistency for contact, or simulation stability. For a 'simulation-ready'
      claim, this evidence is insufficient to support the causal link between mesh
      quality and downstream physics utility.
    severity: science
  - id: d0af52db9622
    text: Abstract claims 'without any post-processing' (line 45) but Sec 3.4 describes
      vertex merging and winding correction. This is post-processing; temper the claim
      to 'minimal post-processing'.
    severity: writing
  - id: ddbc5dab6ad7
    text: Simulation readiness is asserted via visual demos (Appendix 5.5) but lacks
      quantitative physics benchmarks (e.g., collision stability, manifoldness). Add
      limitations regarding watertightness requirements.
    severity: science
  - id: a0a7d8d9a788
    text: Zero-shot simulation claims (ScanNet) rely on depth/normal metrics (Table
      4) not simulation metrics. Clarify that simulation readiness on ScanNet is unverified
      beyond geometric proxies.
    severity: science
  - id: 37fccf840fd2
    text: Add a statement in Section 4.1 (Datasets) confirming adherence to dataset
      licenses and privacy protocols, specifically regarding face blurring or consent
      for YouTube-sourced RealEstate10K data.
    severity: writing
  - id: 618e4632f8f7
    text: Include a brief discussion on potential dual-use risks (e.g., unauthorized
      mapping of private infrastructure) and responsible use guidelines in the Conclusion
      or an Ethics Statement.
    severity: writing
  - id: 3be20a063835
    text: Provide quantitative metrics for simulation utility (e.g., collision detection
      success rate, grasp success) to substantiate the 'simulation-ready' central
      claim, as current evidence in Appendix 6 is purely qualitative.
    severity: science
  - id: c694d97310e5
    text: "Report mean \xB1 standard deviation for all quantitative metrics in Tables\
      \ 1-4 to assess result stability across scene samples."
    severity: science
  - id: 58aacf9b38ec
    text: Conduct formal hypothesis testing (e.g., paired t-tests) comparing TriSplat
      against baselines to validate claims of "consistent outperformance."
    severity: science
  - id: 3ed67aa4ae20
    text: Include per-scene variance or confidence intervals for the zero-shot ScanNet
      evaluation (Table 3) to demonstrate generalization stability.
    severity: science
