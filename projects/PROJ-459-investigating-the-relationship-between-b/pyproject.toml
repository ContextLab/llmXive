[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-brain-music"
version = "0.1.0"
description = "Investigating the Relationship Between Brain Network Dynamics and Musical Genre Preference"
requires-python = ">=3.11"
dependencies = [
    "nilearn==0.10.1",
    "networkx==3.2.1",
    "scikit-learn==1.3.2",
    "pandas==2.1.4",
    "numpy==1.26.2",
    "scipy==1.11.4",
    "pyyaml==6.0.1",
    "pytest==7.4.3",
    "statsmodels==0.14.0",
    "nibabel==5.2.0"
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
