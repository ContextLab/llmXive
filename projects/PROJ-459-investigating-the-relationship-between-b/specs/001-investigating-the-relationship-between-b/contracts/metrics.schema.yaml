$schema: http://json-schema.org/draft-07/schema#
title: NetworkMetricsSchema
description: Schema for the aggregated static and dynamic network metrics per subject.
type: object
properties:
  subject_id:
    type: string
    description: "Unique identifier for the subject (e.g., sub-001)."
  network_type:
    type: string
    description: "Network definition (e.g., 'DMN', 'Auditory', 'Salience', 'Global')."
    enum:
      - DMN
      - Auditory
      - Salience
      - Global
  metric_name:
    type: string
    description: "Name of the metric (e.g., 'global_efficiency', 'modularity_Q')."
    enum:
      - global_efficiency
      - modularity_Q
      - within_module_degree
      - dynamic_reconfiguration_rate
  value:
    type: number
    description: "Computed metric value."
    minimum: -1
    maximum: 1
  window_size:
    type: integer
    description: "Window size in TRs (only for dynamic metrics). Null for static."
    nullable: true
  subject_exclusion_reason:
    type: string
    description: "Reason for exclusion if applicable (e.g., 'FD > 0.5mm', 'Underpowered')."
    nullable: true
  mean_fd:
    type: number
    description: "Mean Framewise Displacement for the subject (used as covariate)."
    minimum: 0
required:
  - subject_id
  - network_type
  - metric_name
  - value
  - mean_fd
additionalProperties: false