$schema: "http://json-schema.org/draft-07/schema#"
title: "Reddit Comment Dataset Schema"
description: "Schema for the anonymized, classified, and scored Reddit comment dataset used in the priming study."
type: object
properties:
  comment_id:
    type: string
    description: "Unique identifier for the comment."
  thread_id:
    type: string
    description: "Unique identifier for the parent thread."
  user_id:
    type: string
    description: "SHA-256 hash of the original author (anonymized)."
  subreddit:
    type: string
    description: "Name of the subreddit (e.g., 'AskReddit')."
  thread_type:
    type: string
    enum:
      - "Prime"
      - "Control"
    description: "Classification based on title keywords."
  body:
    type: string
    description: "The text content of the comment."
  prosocial_action_count:
    type: integer
    minimum: 0
    description: "Count of prosocial action verbs in the comment."
  neg_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "VADER negative sentiment component (0-1)."
  compound:
    type: number
    description: "VADER compound sentiment score."
  thread_age:
    type: number
    description: "Age of the thread in hours (relative)."
  comment_count:
    type: integer
    minimum: 0
    description: "Total number of comments in the thread."
required:
  - comment_id
  - thread_id
  - user_id
  - subreddit
  - thread_type
  - body
  - prosocial_action_count
  - neg_score
  - compound
  - thread_age
  - comment_count
additionalProperties: false
