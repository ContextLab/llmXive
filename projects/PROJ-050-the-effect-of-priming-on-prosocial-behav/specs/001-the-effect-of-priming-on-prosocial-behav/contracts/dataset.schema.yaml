$schema: "http://json-schema.org/draft-07/schema#"
title: "Anonymized Comment Dataset Schema"
type: "object"
properties:
  comment_id:
    type: "string"
    description: "Unique identifier for the comment."
  thread_id:
    type: "string"
    description: "Unique identifier for the thread."
  user_id:
    type: "string"
    description: "SHA-256 hash of the original username."
    pattern: "^[a-f0-9]{64}$"
  thread_type:
    type: "string"
    enum:
      - "Prime"
      - "Control"
    description: "Classification based on title keywords."
  subreddit:
    type: "string"
    description: "Subreddit name."
  thread_age:
    type: "number"
    minimum: 0
    description: "Age of the thread in days."
  body:
    type: "string"
    description: "Comment text content."
  prosocial_action_count:
    type: "integer"
    minimum: 0
    description: "Count of prosocial action verbs."
  neg_score:
    type: "number"
    minimum: 0
    maximum: 1
    description: "VADER negative sentiment component."
  compound:
    type: "number"
    minimum: -1
    maximum: 1
    description: "VADER compound sentiment score."
  pos:
    type: "number"
    minimum: 0
    maximum: 1
    description: "VADER positive sentiment score."
  neu:
    type: "number"
    minimum: 0
    maximum: 1
    description: "VADER neutral sentiment score."
required:
  - comment_id
  - thread_id
  - user_id
  - thread_type
  - subreddit
  - thread_age
  - body
  - prosocial_action_count
  - neg_score
additionalProperties: false