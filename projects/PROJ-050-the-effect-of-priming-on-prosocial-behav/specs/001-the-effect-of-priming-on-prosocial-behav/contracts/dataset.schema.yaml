$schema: "http://json-schema.org/draft-07/schema#"
title: "Anonymized Dataset Schema"
description: "Schema for the anonymized comment dataset after ingestion and classification."
type: object
properties:
  comment_id:
    type: string
    description: "Unique comment identifier (hash)."
  thread_id:
    type: string
    description: "Hashed thread identifier."
  user_id:
    type: string
    description: "SHA-256 hash of the username."
  thread_age:
    type: number
    description: "Age of the thread in days."
    minimum: 0
  subreddit:
    type: string
    description: "Source subreddit name."
  body:
    type: string
    description: "Comment text content."
  thread_type:
    type: "string"
    enum:
      - "Prime"
      - "Control"
    description: "Classification based on title priming."
  negation_excluded:
    type: boolean
    description: "True if title had keyword but failed negation rule."
  comment_count:
    type: integer
    description: "Total number of comments in the thread."
    minimum: 1
required:
  - comment_id
  - thread_id
  - user_id
  - thread_age
  - subreddit
  - body
  - thread_type
  - negation_excluded
  - comment_count

