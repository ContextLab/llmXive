$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
type: "object"
properties:
  model_formula:
    type: "string"
    description: "The GLMM formula used."
  prime_coefficient:
    type: "number"
    description: "Effect size of the Prime group."
  prime_p_value:
    type: "number"
    description: "P-value for the Prime effect."
  prime_ci_lower:
    type: "number"
    description: "Lower bound of the 95% CI."
  prime_ci_upper:
    type: "number"
    description: "Upper bound of the 95% CI."
  control_vars:
    type: "object"
    description: "Coefficients for control variables."
    properties:
      thread_age:
        type: "number"
      comment_count:
        type: "number"
      topic_pc1:
        type: "number"
      topic_pc2:
        type: "number"
      topic_pc3:
        type: "number"
      subreddit:
        type: "object"
        description: "Coefficients for subreddit fixed effects."
  random_effects:
    type: "object"
    description: "Variance components."
    properties:
      thread_id:
        type: "number"
      user_id:
        type: "number"
  sensitivity_results:
    type: "array"
    description: "Results from sensitivity analysis."
    items:
      type: "object"
  power_analysis:
    type: "object"
    description: "Power analysis results."
    properties:
      power:
        type: "number"
      effect_size:
        type: "number"
      sample_size:
        type: "integer"
  model_family:
    type: "string"
    description: "Distribution family used (e.g., 'Negative Binomial')."
  topic_control_method:
    type: "string"
    description: "Description of the embedding/PCA method used for topic control."
required:
  - model_formula
  - prime_coefficient
  - prime_p_value
  - prime_ci_lower
  - prime_ci_upper
  - control_vars
  - random_effects
  - sensitivity_results
  - power_analysis
  - model_family
  - topic_control_method
additionalProperties: false