$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for the JSON output of the Linear Mixed-Effects Model analysis."
type: object
properties:
  model_summary:
    type: object
    properties:
      p_value:
        type: number
        description: "P-value for the fixed effect of 'thread_type' (Prime vs Control)."
      coefficient:
        type: number
        description: "Coefficient for the 'Prime' indicator variable."
      std_error:
        type: number
        description: "Standard error of the coefficient."
      confidence_interval:
        type: array
        items:
          type: number
        minItems: 2
        maxItems: 2
        description: "95% Confidence Interval [lower, upper]."
      significant:
        type: boolean
        description: "True if p < 0.05."
    required:
      - p_value
      - coefficient
      - std_error
      - confidence_interval
      - significant
  sensitivity_analysis:
    type: object
    properties:
      p_0_01:
        type: number
        description: "Significance status at p < 0.01."
      p_0_05:
        type: number
        description: "Significance status at p < 0.05."
      p_0_10:
        type: number
        description: "Significance status at p < 0.10."
    required:
      - p_0_01
      - p_0_05
      - p_0_10
  validation:
    type: object
    properties:
      kappa_score:
        type: number
        description: "Cohen's Kappa score from human validation."
      passed:
        type: boolean
        description: "True if kappa >= 0.7."
    required:
      - kappa_score
      - passed
  metadata:
    type: object
    properties:
      sample_size:
        type: integer
        description: "Total number of comments analyzed."
      prime_count:
        type: integer
        description: "Number of Prime threads."
      control_count:
        type: integer
        description: "Number of Control threads."
      runtime_seconds:
        type: number
        description: "Total pipeline runtime in seconds."
    required:
      - sample_size
      - prime_count
      - control_count
      - runtime_seconds
required:
  - model_summary
  - sensitivity_analysis
  - validation
  - metadata
additionalProperties: false
