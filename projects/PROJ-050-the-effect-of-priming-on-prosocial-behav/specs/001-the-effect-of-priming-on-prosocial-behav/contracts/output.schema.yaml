$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
description: "Schema for the final statistical report JSON."
type: object
properties:
  primary_model:
    type: object
    properties:
      thread_type_Prime:
        type: object
        properties:
          coef:
            type: number
          std_err:
            type: number
          p_value:
            type: number
            minimum: 0
            maximum: 1
          conf_int:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
        required:
          - coef
          - std_err
          - p_value
          - conf_int
      singular_fit_fallback:
        type: boolean
        description: "True if user_id random effect was dropped."
    required:
      - thread_type_Prime
      - singular_fit_fallback
  sensitivity_analysis:
    type: object
    properties:
      bootstrap_p_values:
        type: array
        items:
          type: number
        description: "P-values from 1,000 bootstrap resamples."
      control_drop_p_values:
        type: object
        description: "P-values when dropping each control variable."
      random_effect_variants:
        type: object
        description: "P-values for alternative random effect structures."
    required:
      - bootstrap_p_values
  power_analysis:
    type: object
    properties:
      effect_size_d:
        type: number
      sample_size:
        type: integer
      power:
        type: number
        minimum: 0
        maximum: 1
      warning:
        type: string
        description: "Warning message if power < 80%."
    required:
      - effect_size_d
      - sample_size
      - power
  validation:
    type: object
    properties:
      cohen_kappa:
        type: number
        minimum: 0
        maximum: 1
      raters_count:
        type: integer
        minimum: 3
      neg_score_pearson_r:
        type: number
        minimum: -1
        maximum: 1
        description: "Pearson correlation between neg_score and VADER native neg."
    required:
      - cohen_kappa
      - raters_count
      - neg_score_pearson_r
required:
  - primary_model
  - sensitivity_analysis
  - power_analysis
  - validation

