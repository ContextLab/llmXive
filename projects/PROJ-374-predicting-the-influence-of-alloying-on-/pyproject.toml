[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-seebeck-alloying"
version = "0.1.0"
description = "Predicting the Influence of Alloying on the Seebeck Coefficient Using Public Data"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "llmXive Research Team"}
]
keywords = ["thermoelectric", "seebeck", "machine-learning", "materials-science", "alloying"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "pandas",
    "scikit-learn",
    "mendeleev",
    "matplotlib",
    "requests",
    "pyyaml",
    "numpy",
    "pytest",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "pytest-cov",
]

[project.urls]
Repository = "https://github.com/llmxive/proj-374-seebeck-alloying"
Documentation = "https://github.com/llmxive/proj-374-seebeck-alloying#readme"

[tool.setuptools.packages.find]
where = ["code"]
include = ["code*", "code.utils*"]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py39"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.setuptools]
packages = ["code", "code.utils"]