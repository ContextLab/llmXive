# Visualization Schema Contract
# Defines the VisualizationOutput entity for publication-ready visualizations
# Task: T006 - Create visualization schema contract
# Version: 1.0.0
# Date: 2024-01-15
#
# This schema validates visualization outputs generated by the pipeline
# and ensures consistency across all exported figures.

$schema: http://json-schema.org/draft-07/schema#
title: VisualizationOutput
description: Schema for visualization output metadata and configuration
type: object
required:
  - plot_type
  - stratification_variable
  - interaction_lines
  - file_path
  - generated_at
  - analysis_reference
properties:
  plot_type:
    type: string
    description: Type of visualization generated
    enum:
      - boxplot
      - interaction_plot
      - bar_chart
      - scatter_plot
      - histogram
    minLength: 1
    maxLength: 50
  stratification_variable:
    type: string
    description: Variable used for data stratification in the visualization
    enum:
      - experience_level
      - tool_usage
      - project_type
      - task_complexity
      - team_size
    minLength: 1
    maxLength: 50
  interaction_lines:
    type: boolean
    description: Whether interaction lines are drawn connecting group means
  file_path:
    type: string
    description: Relative path to the generated visualization file
    pattern: "^figures/.*\\.(png|pdf|svg|jpg)$"
    minLength: 1
    maxLength: 500
  generated_at:
    type: string
    description: ISO 8601 timestamp when visualization was generated
    format: date-time
  analysis_reference:
    type: string
    description: Reference to the analysis result this visualization is based on
    minLength: 1
    maxLength: 200
  metadata:
    type: object
    description: Additional metadata for the visualization
    properties:
      width:
        type: integer
        minimum: 100
        maximum: 5000
        description: Image width in pixels
      height:
        type: integer
        minimum: 100
        maximum: 5000
        description: Image height in pixels
      dpi:
        type: integer
        minimum: 72
        maximum: 600
        description: Image resolution in dots per inch
      format:
        type: string
        enum:
          - png
          - pdf
          - svg
          - jpg
        description: Output file format
      title:
        type: string
        maxLength: 200
        description: Visualization title
      caption:
        type: string
        maxLength: 500
        description: Visualization caption/description
      x_label:
        type: string
        maxLength: 100
        description: X-axis label
      y_label:
        type: string
        maxLength: 100
        description: Y-axis label
      legend_position:
        type: string
        enum:
          - best
          - upper_right
          - upper_left
          - lower_left
          - lower_right
          - center_left
          - center_right
          - upper
          - lower
          - center
        description: Legend position in the plot
      color_scheme:
        type: string
        enum:
          - default
          - grayscale
          - viridis
          - plasma
          - inferno
          - magma
          - cividis
        description: Color scheme used in the visualization
    additionalProperties: false
  validation:
    type: object
    description: Validation status for the visualization
    properties:
      schema_valid:
        type: boolean
        description: Whether the visualization metadata passes schema validation
      file_exists:
        type: boolean
        description: Whether the output file exists at the specified path
      file_size_bytes:
        type: integer
        minimum: 0
        description: Size of the output file in bytes
      checksum:
        type: string
        pattern: "^[a-f0-9]{64}$"
        description: SHA-256 checksum of the output file
      validation_timestamp:
        type: string
        format: date-time
        description: When validation was performed
    additionalProperties: false
additionalProperties: false