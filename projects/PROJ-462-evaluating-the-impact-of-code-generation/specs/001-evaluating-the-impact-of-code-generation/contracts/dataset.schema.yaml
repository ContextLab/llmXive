# Dataset Schema Contract for Code Generation Impact Analysis
# Entity: DatasetRecord
# This schema defines the required structure for all developer productivity datasets
# used in the llmXive automated science pipeline (Project PROJ-462)
#
# Version: 1.0.0
# Last Updated: 2024
#
# Usage: This schema is used by the Reference-Validator Agent (T049) to verify
# that ingested datasets contain all required variables before analysis begins.

$schema: "http://yaml.org/yaml/1.2"
entity: DatasetRecord
version: "1.0.0"

fields:
  tool_usage:
    type: string
    description: "Identifier for the code generation tool used (e.g., 'copilot', 'codex', 'none')"
    required: true
    enum:
      - copilot
      - codex
      - cursor
      - codeium
      - tabnine
      - none
      - other
    validation_rules:
      - non_empty: true
      - lowercase: true
      - no_whitespace: true

  task_time:
    type: number
    description: "Time taken to complete the task in minutes"
    required: true
    validation_rules:
      - minimum: 0
      - maximum: 1440
      - finite: true
    unit: minutes

  defect_rate:
    type: number
    description: "Rate of defects per 100 lines of code"
    required: true
    validation_rules:
      - minimum: 0
      - maximum: 100
      - finite: true
    unit: defects_per_100_lines

  experience_years:
    type: number
    description: "Years of professional development experience"
    required: true
    validation_rules:
      - minimum: 0
      - maximum: 50
      - finite: true
    unit: years
    stratification_thresholds:
      novice: "< 2"
      intermediate: "2 - 5"
      expert: "> 5"

  task_complexity:
    type: string
    description: "Categorical measure of task complexity"
    required: true
    enum:
      - low
      - medium
      - high
      - critical
    validation_rules:
      - non_empty: true
      - lowercase: true

  project_type:
    type: string
    description: "Type of project being developed"
    required: true
    enum:
      - web_application
      - mobile_application
      - api_service
      - data_pipeline
      - machine_learning
      - infrastructure
      - other
    validation_rules:
      - non_empty: true
      - lowercase: true

  team_size:
    type: integer
    description: "Number of developers on the team"
    required: true
    validation_rules:
      - minimum: 1
      - maximum: 100
      - integer: true

metadata:
  source:
    type: string
    description: "Original source of the dataset (URL or publication)"
    required: true
    validation_rules:
      - non_empty: true

  dataset_name:
    type: string
    description: "Name of the dataset"
    required: true
    validation_rules:
      - non_empty: true

  checksum_sha256:
    type: string
    description: "SHA-256 checksum for dataset integrity verification"
    required: true
    validation_rules:
      - format: sha256
      - length: 64

  citation_verified:
    type: boolean
    description: "Whether the dataset citation has been verified by Reference-Validator Agent"
    required: true
    default: false

  ingestion_timestamp:
    type: string
    description: "ISO 8601 timestamp of dataset ingestion"
    required: false
    format: date-time

constraints:
  missing_data_threshold: 0.20
    description: "Maximum acceptable percentage of missing values per field (20%)"

  min_observations_per_stratum: 30
    description: "Minimum observations required for statistical validity per experience stratum"

  required_for_analysis:
    - tool_usage
    - task_time
    - defect_rate
    - experience_years

validation_order:
  - checksum_verification
  - url_accessibility
  - required_fields_present
  - type_validation
  - range_validation
  - missing_data_check
  - citation_verification

references:
  data_model: "specs/001-code-generation-performance-outcomes/data-model.md"
  constitution_principle: "II"
    description: "Reference-Validator Agent must verify all external citations before ingestion"

notes:
  - "This schema is enforced by the Reference-Validator Agent (code/validate/citations.py)"
  - "Datasets failing validation halt the pipeline before Phase 1 data ingestion"
  - "All fields marked required: true must be present in every record"
  - "Experience stratification thresholds defined in code/analysis/experience.py (T008b)"