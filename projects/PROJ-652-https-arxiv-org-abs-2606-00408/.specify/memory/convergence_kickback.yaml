- artifact: projects/PROJ-652-https-arxiv-org-abs-2606-00408/specs/001-https-arxiv-org-abs-2606-00408/tasks.md
  id: constraint_preservation-c95f2240
  location: tasks.md:Phase 4, T020
  reviewer: constraint_preservation
  round: 1
  severity: requirement
  text: T020 implements a 'basic' regime_analyzer to aggregate results into RegimeDataPoint
    objects. SC-001 requires verifying a 'non-monotonic trend' (inverted-U). The plan
    explicitly states that with only two models (TinyLlama, Phi-2), a non-monotonic
    trend is empirically impossible to verify (requires 3+ points). T020 does not
    include logic to handle this impossibility or to explicitly flag the 'non-monotonic'
    check as 'Skipped/Inconclusive' in the output. This creates a semantic gap where
    the task attempts to implement a validation (trend verification) that the plan
    admits is impossible, potentially leading to a false positive or a crash if the
    code expects 3+ points. The task must be updated to explicitly handle the 'insufficient
    data points for trend verification' case.
