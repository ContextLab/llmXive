    text: Clarify the definition of 'middle observations' in the masking mechanism
      (Eq 2 vs Section 6.1). The paper masks 'earlier' observations (turns 1 to t-K),
      which includes both 'first' and 'middle' trajectory pages. However, Section
      6.1 claims masking targets 'neglected middle observations' while Fig 3 notes
      agents re-open 'first pages'. This creates ambiguity about whether 'first' pages
      are also masked and how this relates to the 'Collapse' regime.
    severity: writing
  - id: 60db9f39f199
    text: Align the qualitative description in Figure 1 caption ('CM adds little')
      with the quantitative data in Section 5 ('+6.2 to +6.6 pts'). A 6-point gain
      is substantial relative to the baseline, and 'little' may understate the 'plateau'
      regime's benefit compared to the 'Middle' regime (+11.7 pts).
    severity: writing
  - id: 9b31075ba683
    text: Ensure the 'Signal-to-Noise Ratio bottleneck' claim (Section 6.2) is clearly
      linked to the 'Regime Map' (Section 5). The text states SNR optimization is
      the bottleneck, yet masking (an SNR optimizer) fails in the Saturated regime.
      Clarify that SNR optimization is beneficial *only* when the model's filtering
      capacity is insufficient (Middle regime), rather than being a universal bottleneck.
    severity: science
  - id: 68a5033a63ca
    text: Section 5.2.1 claims masking works 'mechanistically' due to attention dynamics.
      Evidence is limited to 3 model settings (4B-35B). Soften to 'correlates with'
      or 'suggests' to avoid over-extrapolation to 284B models.
    severity: science
  - id: 6b1a1bc0229e
    text: Section 6 reports precise gains (e.g., +11.7 pts) without error bars or
      significance tests. Add confidence intervals to prevent over-stating precision
