$schema: "http://json-schema.org/draft-07/schema#"
title: "RegimeDataPoint"
description: "Schema for a single data point in the regime map"
type: "object"
required:
  - model_capacity_proxy
  - model_parameter_count
  - retriever_strength
  - accuracy_baseline
  - accuracy_masked
  - accuracy_gain
  - tokens_saved_avg
  - turns_added_avg
properties:
  model_capacity_proxy:
    type: "string"
    description: "Proxy for model capacity (e.g., 'TinyLlama-1.1B', 'Phi-2-2.7B'). This is an independent variable (model ID), not derived from run parameters."
  model_parameter_count:
    type: "number"
    description: "Quantitative parameter count in Billions (e.g., 1.1, 2.7) for the x-axis of the Regime Map."
  retriever_strength:
    type: "string"
    enum:
      - "weak"
      - "strong"
    description: "Strength of the retriever used"
  accuracy_baseline:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy without masking"
  accuracy_masked:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy with masking"
  accuracy_gain:
    type: "number"
    description: "Calculated gain (masked - baseline)"
  tokens_saved_avg:
    type: "number"
    description: "Average tokens saved per task"
  turns_added_avg:
    type: "number"
    description: "Average turns added per task"