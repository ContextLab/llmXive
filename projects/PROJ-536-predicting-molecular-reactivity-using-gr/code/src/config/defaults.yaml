# Project Configuration for Predicting Molecular Reactivity (PROJ-536)
# This file defines all mutable parameters for the pipeline.
# Values here are defaults and can be overridden via CLI or environment variables.

# ---------------------------------------------------------------------------
# 1. Reproducibility (Seeds)
# ---------------------------------------------------------------------------
seeds:
  random_seed: 42
  numpy_seed: 42
  torch_seed: 42
  deterministic_mode: true  # Enforces deterministic behavior in PyTorch (may impact performance)

# ---------------------------------------------------------------------------
# 2. Paths (Relative to project root)
# ---------------------------------------------------------------------------
paths:
  root_dir: "."
  data_dir: "data"
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  model_dir: "models"
  results_dir: "results"
  logs_dir: "logs"
  figures_dir: "figures"
  contracts_dir: "specs/001-predicting-molecular-reactivity-using-gr/contracts"
  
  # Specific artifact paths
  uspto_raw_file: "data/raw/uspto_subset.csv"
  parsed_graphs_file: "data/processed/parsed_graphs.parquet"
  train_split_file: "data/processed/train_split.parquet"
  val_split_file: "data/processed/val_split.parquet"
  test_split_file: "data/processed/test_split.parquet"
  final_metrics_file: "results/metrics.json"
  comparison_report_file: "results/comparison_report.json"
  explainability_output_file: "results/explainability.csv"
  uncertainty_output_file: "results/uncertainty_intervals.csv"

# ---------------------------------------------------------------------------
# 3. Data Processing Parameters
# ---------------------------------------------------------------------------
data_processing:
  # SMILES Parsing
  max_smiles_length: 1024
  invalid_smiles_action: "log_and_skip"  # Options: log_and_skip, raise_error
  
  # Feature Extraction
  atom_features:
    - atomic_num
    - chiral_tag
    - num_hydrogens
    - degree
    - formal_charge
    - aromaticity
  bond_features:
    - bond_type
    - conjugation
    - stereo
    - in_ring

  # Split Strategy (Scaffold Split per FR-008)
  split_strategy: "scaffold"  # Options: scaffold, random, time
  scaffold_method: "murcko"   # Options: murcko, bruns
  
  # Split Ratios
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  
  # Data Validity Threshold
  min_validity_percentage: 95.0

# ---------------------------------------------------------------------------
# 4. Model Hyperparameters (MPNN)
# ---------------------------------------------------------------------------
model:
  type: "mpnn"
  architecture: "cpu_optimized"
  
  # Architecture
  num_layers: 3
  hidden_dim: 256
  output_dim: 1  # Regression target (yield)
  dropout_rate: 0.1
  activation: "relu"
  
  # Message Passing
  message_passing_steps: 3
  aggregator: "sum"  # Options: sum, mean, max
  
  # Parameters Limit
  max_parameters: 1000000  # <1M params constraint

# ---------------------------------------------------------------------------
# 5. Training Configuration
# ---------------------------------------------------------------------------
training:
  device: "cpu"  # Force CPU as per SC-004
  batch_size: 32
  num_epochs: 200
  learning_rate: 0.001
  weight_decay: 0.0001
  loss_function: "mse"
  
  # Early Stopping
  early_stopping: true
  patience: 5
  min_delta: 0.0001
  
  # Optimization
  optimizer: "adam"
  scheduler: "reduce_lr_on_plateau"
  scheduler_factor: 0.5
  scheduler_patience: 10
  
  # Cross-Validation
  k_folds: 5
  shuffle_folds: true

# ---------------------------------------------------------------------------
# 6. Baseline Models (User Story 2)
# ---------------------------------------------------------------------------
baselines:
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    fingerprint_radius: 2
    fingerprint_length: 2048
    
  linear_regression:
    fit_intercept: true
    normalize: false
    
  # Significance Testing
  significance_test:
    method: "paired_t_test"  # Options: paired_t_test, wilcoxon
    alpha: 0.05
    practical_significance_threshold: 0.10  # R² delta threshold

# ---------------------------------------------------------------------------
# 7. Explainability & Uncertainty (User Story 3)
# ---------------------------------------------------------------------------
explainability:
  method: "gnnexplainer"
  num_top_motifs: 10
  node_mask_type: "object"
  edge_mask_type: "object"
  
uncertainty:
  method: "jackknife_plus"
  calibration_ratio: 0.1
  confidence_level: 0.90  # 90% prediction intervals

# ---------------------------------------------------------------------------
# 8. Logging & Reporting
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_to_file: true
  log_to_console: true
  file_max_bytes: 10485760  # 10MB
  backup_count: 3

# ---------------------------------------------------------------------------
# 9. CI & Validation
# ---------------------------------------------------------------------------
ci:
  max_runtime_seconds: 21600  # 6 hours
  required_metrics:
    - "mae"
    - "rmse"
    - "r2"
  checksum_algorithm: "sha256"
