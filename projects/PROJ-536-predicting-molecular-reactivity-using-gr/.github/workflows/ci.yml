name: CI - Linting and Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint with Ruff and Black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.1.0 black==23.0.0

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run Black
        run: |
          black --check --line-length 88 .

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          pytest code/tests/unit/ -v

      - name: Verify Runtime Limit (SC-004)
        # Placeholder for T038: Implement automated CI runtime check
        # This step would measure total pipeline runtime and fail if > 6 hours
        run: |
          echo "Runtime check placeholder: Ensure total pipeline < 6 hours"
