name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# SC-004: Enforce strict runtime limit (< 6 hours)
timeout-minutes: 360

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure test runners are available
          pip install pytest pytest-cov

      - name: Run Unit Tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

      - name: Run Integration Tests
        run: |
          python -m pytest tests/integration/ -v --tb=short

      - name: Validate Quickstart Pipeline
        run: |
          # Execute the quickstart script with validation flag
          # This ensures the full pipeline runs within the time budget
          python -m src.analysis.quickstart --validate
        env:
          # Ensure CPU-only execution to match CI environment constraints
          TORCH_USE_CPU_ONLY: "1"

      - name: Upload Test Results (if any)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml