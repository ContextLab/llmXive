# Schema for ReactionRecord
# Defines the structure of a single reaction entry in the USPTO dataset
# Used for validation in src/data/download.py and src/data/parse.py
$schema: http://json-schema.org/draft-07/schema#
title: ReactionRecord
description: A record representing a chemical reaction with reactants, product, and yield information.
type: object
required:
  - reactants_smiles
  - product_smiles
  - yield
  - reaction_class
properties:
  reactants_smiles:
    type: string
    description: >-
      Canonical SMILES string representing the reactants.
      Multiple reactants are separated by '.' (dot).
      Example: "CCO.O=C(O)C" (Ethanol + Acetic Acid)
    minLength: 1
    pattern: '^[A-Za-z0-9@#$%&*()+=\[\]{}|\\/\-~<>^!]+$'
  product_smiles:
    type: string
    description: >-
      Canonical SMILES string representing the product.
      Example: "CC(=O)OCC" (Ethyl Acetate)
    minLength: 1
    pattern: '^[A-Za-z0-9@#$%&*()+=\[\]{}|\\/\-~<>^!]+$'
  yield:
    type: number
    description: >-
      The reaction yield as a percentage (0.0 to 100.0).
      Must be a finite number.
    minimum: 0.0
    maximum: 100.0
  reaction_class:
    type: string
    description: >-
      The classification of the reaction (e.g., 'esterification', 'SN2', 'Suzuki').
      Used for stratification or filtering if required.
    minLength: 1
  reaction_id:
    type: string
    description: >-
      Optional unique identifier for the reaction record.
    minLength: 1
  timestamp:
    type: string
    format: date-time
    description: >-
      Optional timestamp of when the record was processed or extracted.
additionalProperties: false
