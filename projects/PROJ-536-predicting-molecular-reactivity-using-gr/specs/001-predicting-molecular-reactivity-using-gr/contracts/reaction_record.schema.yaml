$schema: http://json-schema.org/draft-07/schema#
title: ReactionRecord
description: >
  Schema for a single chemical reaction record used in the molecular
  reactivity prediction pipeline.
type: object
required:
  - reactants_smiles
  - product_smiles
  - yield
properties:
  reactants_smiles:
    type: string
    description: >
      SMILES string(s) representing the reactant molecules.
      Multiple reactants may be separated by a '.' (dot) character.
    pattern: "^[A-Za-z0-9@\\-\\.\\[\\]\\(\\)\\/=\\+#%]+$"
    minLength: 1
  product_smiles:
    type: string
    description: >
      SMILES string representing the product molecule.
    pattern: "^[A-Za-z0-9@\\-\\.\\[\\]\\(\\)\\/=\\+#%]+$"
    minLength: 1
  yield:
    type: number
    description: >
      Experimental yield of the reaction, expressed as a percentage (0.0 to 100.0).
      Must be a valid float.
    minimum: 0.0
    maximum: 100.0
  reaction_class:
    type: string
    description: >
      Optional classification of the reaction type (e.g., 'Suzuki', 'Amine Coupling').
      May be null if not available.
    nullable: true
  reaction_id:
    type: string
    description: >
      Unique identifier for the reaction record.
    nullable: true
  metadata:
    type: object
    description: >
      Optional dictionary for additional metadata (source, date, etc.).
    nullable: true
additionalProperties: false
