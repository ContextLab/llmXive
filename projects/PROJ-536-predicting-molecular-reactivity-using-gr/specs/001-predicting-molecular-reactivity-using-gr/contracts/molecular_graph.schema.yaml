# Schema for MolecularGraph
# Defines the structure of a molecular graph derived from SMILES
# Used for validation in src/data/parse.py
$schema: http://json-schema.org/draft-07/schema#
title: MolecularGraph
description: A graph representation of a molecule with atoms, bonds, and features.
type: object
required:
  - atoms
  - bonds
  - features
properties:
  atoms:
    type: array
    description: >-
      List of atom nodes in the graph.
      Each atom is an object with an index and atomic number.
    items:
      type: object
      required:
        - index
        - atomic_number
      properties:
        index:
          type: integer
          description: Unique index of the atom in the graph (0-based).
          minimum: 0
        atomic_number:
          type: integer
          description: Atomic number of the element (e.g., 6 for Carbon).
          minimum: 1
        charge:
          type: integer
          description: Formal charge of the atom.
          default: 0
        is_aromatic:
          type: boolean
          description: Whether the atom is part of an aromatic system.
          default: false
  bonds:
    type: array
    description: >-
      List of bond edges in the graph.
      Each bond connects two atoms and has a type.
    items:
      type: object
      required:
        - source
        - target
        - bond_type
      properties:
        source:
          type: integer
          description: Index of the source atom.
          minimum: 0
        target:
          type: integer
          description: Index of the target atom.
          minimum: 0
        bond_type:
          type: integer
          description: >-
            Type of bond: 1 (single), 2 (double), 3 (triple), 4 (aromatic).
          enum: [1, 2, 3, 4]
        is_conjugated:
          type: boolean
          description: Whether the bond is conjugated.
          default: false
  features:
    type: object
    description: >-
      Global features or feature matrices associated with the graph.
      Used for model input.
    properties:
      atom_features:
        type: array
        description: >-
          Matrix of atom features (N_atoms x N_features).
          Features typically include: atomic number, degree, hybridization, etc.
        items:
          type: array
          items:
            type: number
      bond_features:
        type: array
        description: >-
          Matrix of bond features (N_bonds x N_features).
        items:
          type: array
          items:
            type: number
      molecular_weight:
        type: number
        description: Calculated molecular weight of the molecule.
      logP:
        type: number
        description: Calculated partition coefficient (logP).
      tpsa:
        type: number
        description: Topological Polar Surface Area.
    required:
      - atom_features
      - bond_features
additionalProperties: false