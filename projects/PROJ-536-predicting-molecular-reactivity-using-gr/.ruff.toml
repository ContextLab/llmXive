line-length = 88
indent-width = 4
target-version = "py311"

[lint]
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "W",  # pycodestyle warnings
    "I",  # isort
    "N",  # pep8-naming
    "UP", # pyupgrade
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501", # line too long (handled by black)
    "N806", # variable in function should be lowercase (allowing uppercase for constants)
]

[lint.isort]
known-first-party = ["src", "tests", "scripts", "setup_directories"]
force-single-line = false
lines-between-types = 0
lines-after-imports = 2

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
