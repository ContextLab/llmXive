# Dataset Schema for GDELT and Google Trends Data
# Used to validate input data files before processing

type: object
required:
  - date
  - source
  - value

properties:
  date:
    type: string
    constraints:
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      min_length: 10
      max_length: 10
    description: "Date in YYYY-MM-DD format"

  source:
    type: string
    constraints:
      enum:
        - gdelt
        - google_trends
    description: "Data source identifier"

  value:
    type: number
    constraints:
      min: 0
    description: "Numeric value (event count or search interest)"

  metric:
    type: string
    description: "Metric name (optional)"

  region:
    type: string
    description: "Geographic region (optional)"

  keyword:
    type: string
    description: "Search keyword (for Google Trends data)"
