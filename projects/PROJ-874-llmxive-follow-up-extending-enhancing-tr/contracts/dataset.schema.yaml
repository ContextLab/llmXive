$schema: http://json-schema.org/draft-07/schema#
title: Dataset Manifest Schema
description: >
  Schema for validating the manifest of downloaded datasets (NarrLV, VBench).
  Ensures file integrity and structure before generation begins.
type: object
required:
  - dataset_name
  - version
  - download_timestamp
  - files
  - checksums
properties:
  dataset_name:
    type: string
    description: Name of the dataset (e.g., 'NarrLV', 'VBench')
    enum:
      - NarrLV
      - VBench
  version:
    type: string
    description: Version string of the dataset (e.g., '1.0.0')
  download_timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the dataset was downloaded.
  source_url:
    type: string
    format: uri
    description: The HuggingFace or external URL source.
  files:
    type: array
    description: List of files included in the download.
    items:
      type: object
      required:
        - relative_path
        - size_bytes
        - file_type
      properties:
        relative_path:
          type: string
          description: Path relative to the dataset root.
        size_bytes:
          type: integer
          minimum: 0
          description: File size in bytes.
        file_type:
          type: string
          enum:
            - video
            - json
            - csv
            - text
            - directory
  checksums:
    type: object
    description: Map of relative_path to SHA256 hash.
    additionalProperties:
      type: string
      pattern: '^[a-f0-9]{64}$'
  status:
    type: string
    enum:
      - verified
      - pending
      - corrupted
    default: pending
    description: Current integrity status of the dataset.
additionalProperties: false
