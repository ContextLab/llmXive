$schema: "http://json-schema.org/draft-07/schema#"
title: "Posterior Distribution Output Schema"
description: "Schema for the posterior distribution output from the bilby inference pipeline."
type: "object"
properties:
  event_id:
    type: "string"
    description: "Identifier of the gravitational wave event (e.g., GW150914)."
  resolution_config:
    type: "object"
    properties:
      sampling_rate:
        type: "integer"
        description: "Sampling rate in Hz (e.g., 4096, 2048, 1024)."
      bit_depth:
        type: "integer"
        description: "Bit depth of the quantized data (e.g., 32, 16)."
    required:
      - sampling_rate
      - bit_depth
  parameters:
    type: "array"
    items:
      type: "string"
    description: "List of parameter names included in the posterior samples."
  samples_count:
    type: "integer"
    description: "Total number of posterior samples generated."
  credible_intervals:
    type: "object"
    additionalProperties:
      type: "array"
      items:
        type: "number"
      minItems: 2
      maxItems: 2
      description: "Tuple of [lower, upper] bounds for the 90% credible interval."
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "inconclusive"
    description: "Status of the nested sampling run."
  dlogz:
    type: "number"
    description: "Change in log evidence (dlogz) at convergence."
required:
  - event_id
  - resolution_config
  - parameters
  - samples_count
  - convergence_status
  - dlogz
additionalProperties: false