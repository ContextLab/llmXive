$schema: "http://json-schema.org/draft-07/schema#"
title: "Bias Metric Output Schema"
description: "Schema for the bias and divergence metrics calculated from posterior distributions."
type: "object"
properties:
  event_id:
    type: "string"
    description: "Identifier of the gravitational wave event."
  resolution_config:
    type: "object"
    properties:
      sampling_rate:
        type: "integer"
      bit_depth:
        type: "integer"
    required:
      - sampling_rate
      - bit_depth
  hellinger_distance:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Hellinger distance between the downsampled posterior and the baseline."
  mass_bias_percentage:
    type: "number"
    description: "Percentage bias in the estimated mass parameter."
  spin_bias_percentage:
    type: "number"
    description: "Percentage bias in the estimated spin parameter."
  exceeds_threshold:
    type: "boolean"
    description: "True if the bias exceeds the catalog-reported 90% confidence interval."
  catalog_uncertainty_90:
    type: "number"
    description: "The catalog-reported 90% confidence interval width used for comparison."
  truth_source:
    type: "string"
    description: "Source of truth used for bias calculation (e.g., 'catalog', 'injected')."
required:
  - event_id
  - resolution_config
  - hellinger_distance
  - mass_bias_percentage
  - spin_bias_percentage
  - exceeds_threshold
  - catalog_uncertainty_90
  - truth_source
additionalProperties: false