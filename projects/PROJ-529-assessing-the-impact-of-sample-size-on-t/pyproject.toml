[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-sample-size-meta"
version = "0.1.0"
description = "Assessing the Impact of Sample Size on Meta-Analytic Reliability"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scipy>=1.11.0",
    "statsmodels>=0.14.0",
    "pygam>=0.9.0",
    "scikit-learn>=1.3.0",
    "requests>=2.31.0",
    "tqdm>=4.65.0",
    "pyyaml>=6.0.0",
    "pydantic>=2.0.0",
    "pyarrow>=12.0.0"
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "I", "W"]
ignore = []
