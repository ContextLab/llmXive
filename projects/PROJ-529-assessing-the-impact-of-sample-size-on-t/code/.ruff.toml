# Ruff configuration for llmXive project
# Aligns with Black formatting and standard Python best practices

[lint]
# Enable Pyflakes (E), pycodestyle (W), isort (I), and pep8-naming (N)
select = ["E", "W", "F", "I", "N", "UP"]
ignore = [
    "E501",  # Line too long (handled by Black)
    "N806",  # Variable in function should be lowercase (sometimes needed for math)
]

# Assume Python 3.11
target-version = "py311"

[lint.isort]
known-first-party = ["code"]
force-single-line = false
lines-after-imports = 2

[format]
# Ruff formatter settings (compatible with Black)
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
