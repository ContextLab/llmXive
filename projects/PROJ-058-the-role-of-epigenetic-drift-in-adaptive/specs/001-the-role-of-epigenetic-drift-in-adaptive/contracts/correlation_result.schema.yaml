$schema: http://json-schema.org/draft-07/schema#
title: CorrelationResult Schema
description: Schema for the statistical results of the correlation analysis.
type: object
properties:
  analysis_id:
    type: string
    description: "Unique UUID for the analysis run."
  rho:
    type: number
    description: "Spearman's rank correlation coefficient."
  p_value_theoretical:
    type: number
    description: "Theoretical p-value from Spearman test."
  p_value_empirical:
    type: number
    description: "Empirical p-value from 10,000 permutation iterations."
  sample_size:
    type: integer
    minimum: 1
    description: "Number of genes included in the analysis."
  condition:
    type: string
    enum:
      - "fluctuating"
      - "constant"
    description: "Environmental condition subset analyzed."
  stressor_type:
    type: string
    description: "Specific stressor type (e.g., temperature, nutrient) if available."
  threshold_generations:
    type: integer
    enum:
      - 3
      - 4
      - 5
    description: "Minimum generation threshold used for this result."
  temporal_resolution_flag:
    type: string
    enum:
      - "sufficient"
      - "insufficient"
    description: "Flag indicating if temporal resolution was sufficient for analysis."
  associational_only:
    type: boolean
    const: true
    description: "Always true. This study is observational and cannot establish causality."
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of the analysis."
required:
  - analysis_id
  - rho
  - p_value_theoretical
  - p_value_empirical
  - sample_size
  - condition
  - threshold_generations
  - temporal_resolution_flag
  - associational_only
  - timestamp
additionalProperties: false
