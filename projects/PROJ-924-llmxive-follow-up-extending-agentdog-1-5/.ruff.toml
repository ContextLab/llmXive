# Ruff Configuration for llmXive Project
# Linter rules and settings
[lint]
# Enable pycodestyle (`E`), Pyflakes (`F`), and isort (`I`)
select = ["E", "F", "I", "W", "N", "UP", "B", "C4", "ARG", "SIM"]
ignore = ["E501", "F403", "F405"] # Ignore line-too-long (handled by black), and wildcard import warnings for dynamic loading

# Allow autofix for all enabled rules (if `--fix` is provided)
fixable = ["ALL"]
unfixable = []

# Exclude a few files/folders
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Same as Black
line-length = 88

# Assume Python 3.11
target-version = "py311"

# Per-file ignores (optional)
[lint.per-file-ignores]
"tests/*" = ["S101"] # Allow assert in tests
