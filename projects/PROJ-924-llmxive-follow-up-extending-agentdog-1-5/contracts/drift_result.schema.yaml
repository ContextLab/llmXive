# Schema for Drift Scoring Results
# This schema validates the output of drift_scoring.py
type: object
required:
  - log_id
  - drift_score
  - review_flag
properties:
  log_id:
    type: string
    description: Unique identifier for the log entry
    pattern: "^log_[0-9]+$"
  drift_score:
    type: number
    minimum: 0.0
    maximum: 2.0
    description: Cosine distance to nearest taxonomy centroid (0=identical, 2=opposite)
  review_flag:
    type: boolean
    description: True if log requires human review (e.g., empty log or high drift)
additionalProperties: false
