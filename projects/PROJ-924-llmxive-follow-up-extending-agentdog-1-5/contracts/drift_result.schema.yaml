$schema: http://json-schema.org/draft-07/schema#
title: Drift Result
description: Schema for the output of the drift scoring pipeline.
type: object
required:
  - log_id
  - drift_score
  - review_flag
properties:
  log_id:
    type: string
    description: Unique identifier for the log entry.
  drift_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Cosine distance score between the log embedding and the taxonomy centroid. 1.0 indicates maximum drift (novelty).
  review_flag:
    type: boolean
    description: Flag indicating if the log requires human review (e.g., true for empty logs or high drift).
additionalProperties: false
