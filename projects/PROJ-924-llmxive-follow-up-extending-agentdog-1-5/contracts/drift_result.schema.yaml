$schema: http://json-schema.org/draft-07/schema#
title: Drift Result Schema
description: Schema for the output of the drift scoring pipeline (drift_scoring.py).
type: object
required:
  - log_id
  - drift_score
  - review_flag
properties:
  log_id:
    type: string
    description: Unique identifier for the log entry.
    minLength: 1
  drift_score:
    type: number
    description: Cosine distance between the log embedding and the nearest taxonomy centroid.
    minimum: 0.0
    maximum: 2.0
  review_flag:
    type: boolean
    description: Indicates if the log requires human review (e.g., empty log or high drift).
additionalProperties: false
