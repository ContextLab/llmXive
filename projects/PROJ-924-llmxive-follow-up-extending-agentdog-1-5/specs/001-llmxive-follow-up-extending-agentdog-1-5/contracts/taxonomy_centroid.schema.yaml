$schema: "http://json-schema.org/draft-07/schema#"
title: "TaxonomyCentroid"
description: "Schema for the fixed vector embedding of a risk category in the AgentDoG 1.5 taxonomy."
type: "object"
properties:
  category_id:
    type: "string"
    description: "Unique identifier for the category (e.g., 'P1-Prompt-Injection')."
    minLength: 1
  category_name:
    type: "string"
    description: "Human-readable name of the risk category."
    minLength: 1
  definition:
    type: "string"
    description: "Original text definition from the taxonomy."
    minLength: 1
  embedding_vector:
    type: "array"
    description: "384-dimensional float vector (normalized)."
    items:
      type: "number"
    minItems: 384
    maxItems: 384
  source_version:
    type: "string"
    description: "Version of the taxonomy source used."
    minLength: 1
required:
  - category_id
  - category_name
  - definition
  - embedding_vector
  - source_version
additionalProperties: false