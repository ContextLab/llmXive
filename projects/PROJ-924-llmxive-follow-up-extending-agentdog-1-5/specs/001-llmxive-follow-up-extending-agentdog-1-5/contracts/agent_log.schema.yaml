$schema: "http://json-schema.org/draft-07/schema#"
title: "AgentLog"
description: "Schema for an input interaction log to be analyzed for drift."
type: "object"
properties:
  log_id:
    type: "string"
    description: "Unique identifier for the log (UUID or hash)."
    minLength: 1
  text:
    type: "string"
    description: "The raw text content of the interaction."
    minLength: 1
    maxLength: 10000
  source:
    type: "string"
    description: "Origin of the log (e.g., 'synthetic', 'production')."
    nullable: true
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the log."
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?(Z|[+-][0-9]{2}:[0-9]{2})?$"
    nullable: true
  is_empty:
    type: "boolean"
    description: "Flag if text is empty or whitespace."
required:
  - log_id
  - text
  - is_empty
additionalProperties: false