[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-agentdog-1-5"
version = "0.1.0"
description = "Zero-Shot Drift Detection for AgentDoG 1.5"
requires-python = ">=3.11"
dependencies = [
    "sentence-transformers",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets",
    "jsonschema",
    "statsmodels",
    "pytest",
    "transformers",
    "accelerate",
    "scipy",
    "ruff",
    "black",
]

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]
