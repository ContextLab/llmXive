[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-agentdog"
version = "1.5.0"
description = "llmXive Follow-up: Extending AgentDoG 1.5 with Zero-Shot Drift Detection"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "llmXive Team"}
]
dependencies = [
    "sentence-transformers",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets",
    "jsonschema",
    "statsmodels",
    "pytest",
    "transformers",
    "accelerate",
    "ruff",
    "black"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.nox
    | \.pants.d
    | \.pytype
    | \.ruff_cache
    | \.svn
    | \.tox
    | \.venv
    | __pypackages__
    | _build
    | buck-out
    | build
    | dist
    | node_modules
    | venv
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning"
]

[tool.ruff]
# Ruff is configured in .ruff.toml, but we ensure the path is recognized here if needed
# or we can duplicate settings if the project prefers a single file.
# Per task requirement, we use .ruff.toml for lint rules, but pyproject.toml for project metadata.
# This section is kept minimal to avoid conflict with .ruff.toml.
line-length = 88
target-version = "py311"