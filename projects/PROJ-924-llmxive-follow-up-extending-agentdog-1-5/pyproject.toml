[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-drift-detection"
version = "0.1.0"
description = "Zero-shot drift detection for LLM safety logs"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "llmXive Team"}
]
dependencies = [
    "sentence-transformers",
    "scikit-learn",
    "pandas",
    "numpy",
    "datasets",
    "jsonschema",
    "statsmodels",
    "pytest",
    "transformers",
    "accelerate",
    "openai",
    "ruff",
    "black"
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.eggs
    | \.git
    | \.mypy_cache
    | \.venv
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "unit: unit tests",
    "integration: integration tests",
]

[tool.ruff]
# Explicitly point to the .ruff.toml if needed, though usually auto-discovered.
# The configuration is primarily in .ruff.toml, but this ensures pyproject.toml
# acts as the entry point for tool discovery.
extend = ".ruff.toml"