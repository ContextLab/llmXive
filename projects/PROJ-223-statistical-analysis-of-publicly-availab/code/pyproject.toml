[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "traffic-accident-analysis"
version = "0.1.0"
description = "Statistical analysis of publicly available traffic accident data"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.1.0",
    "numpy==1.26.0",
    "scikit-learn==1.3.0",
    "statsmodels==0.14.0",
    "matplotlib==3.8.0",
    "seaborn==0.13.0",
    "requests==2.31.0",
    "pyyaml==6.0.1",
    "scipy==1.11.0",
    "ruff==0.1.6",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
]
exclude = [
    ".eggs",
    ".git",
    ".mypy_cache",
    ".venv",
    "_build",
    "build",
    "dist",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.isort]
known-first-party = ["code"]
force-sort-within-sections = true