'|rate success':
  quote: The Delta rocket family was a versatile range of American rocket-powered
    expendable launch systems that provided space launch capability in the United
    States from 1960 to 2024. Japan also launched license-built derivatives (N-I,
    N-II, and H-I) from 1975 to 1992. More than 300 Delta rockets were launched with
    a 95% success rate.  The series was phased out in favor of the Vulcan Centaur,
    with the Delta IV Heavy rocket's last launch occurring on April 9, 2024.
  source_id: Delta (rocket family)
