$schema: "http://json-schema.org/draft-07/schema#"
title: "Synthetic Cohort Schema"
description: "Schema for the synthetic cohort dataset generated by propensity score matching."
type: "object"
properties:
  synthetic_id:
    type: "string"
    description: "Unique identifier for the synthetic unit."
  source_dataset:
    type: "string"
    enum:
      - "GSS_2022"
      - "CYBERBULLYING_2021"
    description: "Original dataset source of the record."
  age:
    type: "integer"
    description: "Age of the respondent."
  gender:
    type: "string"
    description: "Gender category."
  education:
    type: "integer"
    description: "Years of education or education level code."
  income:
    type: "integer"
    description: "Income bracket code."
  social_support_score:
    type: "number"
    description: "Standardized score for perceived social support."
  harassment_exposure:
    type: "number"
    description: "Binary (0/1) or continuous severity score for harassment."
  depression_score:
    type: "number"
    description: "Total CES-D score."
  anxiety_score:
    type: "number"
    description: "Total GAD-7 score."
  ptsd_score:
    type: ["number", "null"]
    description: "Total PCL-5 score, or null if unavailable."
  platform_type:
    type: ["string", "null"]
    description: "Platform type (e.g., Twitter, Reddit) or null if not applicable."
  weight:
    type: "number"
    description: "Propensity score weight."
required:
  - "synthetic_id"
  - "source_dataset"
  - "age"
  - "gender"
  - "education"
  - "social_support_score"
  - "harassment_exposure"
  - "depression_score"
  - "anxiety_score"
  - "weight"
additionalProperties: false
