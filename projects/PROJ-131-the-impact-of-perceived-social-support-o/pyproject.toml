[project]
name = "social-support-resilience"
version = "0.1.0"
description = "Impact of Perceived Social Support on Resilience to Online Harassment"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "statsmodels>=0.14.0",
    "scipy>=1.11.0",
    "pyyaml>=6.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\\.pyi?$'
exclude = '''
/(
    \\.git
    | __pycache__
    | build
    | dist
    | venv
    | \\.venv
)/
'''