# Schema for Agent Logs (Baseline and Iterative)
# Used for validation and pairing in statistical analysis
type: object
required:
  - issue_id
  - run_type
  - query_count
  - retrieved_context_ids
  - coverage_score
  - timestamp
properties:
  issue_id:
    type: string
    description: Unique identifier for the issue (e.g., "swe-bench-123" or "synthetic-456")
  run_type:
    type: string
    enum: [baseline, iterative]
    description: Type of agent execution
  query_count:
    type: integer
    minimum: 1
    description: Total number of queries executed
  retrieved_context_ids:
    type: array
    items:
      type: string
    description: List of file/line IDs retrieved during execution
  coverage_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: Fraction of ground truth lines retrieved (0.0 to 1.0)
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of execution completion
  error_signal:
    type: string
    nullable: true
    description: Any error signal encountered (e.g., syntax error, timeout)
  metadata:
    type: object
    description: Additional metadata (e.g., mutation parameters for synthetic issues)
    properties:
      original_code_hash:
        type: string
      mutation_type:
        type: string
        nullable: true
      synthetic_issue:
        type: boolean
