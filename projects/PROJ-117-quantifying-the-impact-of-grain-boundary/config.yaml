# Configuration for Grain Boundary Diffusivity Analysis
# Generated by T030 and extended by T022

thresholds:
  r2:
    # The R² threshold for model acceptance
    value: 0.70
    # Justification for the threshold (Citation)
    # This field is required by T022 to load into the final report.
    citation: "Fundamentals and Catalytic Applications of CeO₂-Based Materials, 2016"
    # Sensitivity sweep range
    sweep_range:
      - 0.70
      - 0.75
      - 0.80

# Additional project settings
data:
  raw_dir: data/raw
  processed_dir: data/processed
  metadata_file: data/metadata.yaml

model:
  best_params_path: models/best_params.json
  best_model_path: models/best_model.json

artifacts:
  reports_dir: artifacts/reports
  figures_dir: artifacts/figures
