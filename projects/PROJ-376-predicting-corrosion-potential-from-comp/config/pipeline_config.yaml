# Pipeline Configuration for Corrosion Potential Prediction
# Generated by T008: Environment Configuration Management
# All paths are relative to the project root

random_seeds:
  global_seed: 42
  train_test_split_seed: 42
  model_training_seed: 42
  permutation_test_seed: 42

file_paths:
  # Data directories
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  log_dir: "data/logs"
  state_dir: "state"
  figures_dir: "figures"
  interpretability_dir: "data/processed/interpretability"

  # Output files
  processed_dataset_path: "data/processed/corrosion_dataset.parquet"
  split_indices_path: "data/processed/split_indices.json"
  model_results_path: "data/processed/model_results.json"
  split_validation_path: "data/logs/split_validation.json"
  diagnostics_path: "data/logs/diagnostics"
  count_report_path: "data/logs/diagnostics/count_report.txt"
  pipeline_log_path: "data/logs/pipeline.log"

  # Configuration files
  astm_tolerance_config: "config/astm_g59_tolerance.yaml"
  verified_datasets_config: "config/verified_datasets.yaml"

data_sources:
  nist_database:
    name: "NIST-IR-8200"
    description: "NIST Corrosion Database"
    required: true

processing:
  min_records_threshold: 500
  min_alloy_designations: 10
  k_folds: 5
  outlier_detection_method: "iqr"
  iqr_multiplier: 1.5

model_training:
  random_forest:
    n_estimators: 100
    max_depth: 10
    random_state: 42
    n_jobs: -1

  gradient_boosting:
    n_estimators: 100
    max_depth: 5
    learning_rate: 0.1
    random_state: 42
    n_jobs: -1

validation:
  enable_strict_validation: true
  check_nulls: true
  check_schema: true
  check_leakage: true
