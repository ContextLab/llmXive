# Processed Dataset Schema Contract
# Defines the structure of the cleaned, encoded, and validated dataset
# stored in data/processed/corrosion_dataset.parquet.
#
# Used by: code/data/preprocess.py (output validation)
# Consumed by: code/data/split.py, code/models/train.py
#
# This schema represents the "Golden Dataset" used for all downstream
# modeling and evaluation tasks.

schema_version: "1.0.0"
source: "Processed NIST-IR-8200"
format: "parquet"
encoding: "utf-8"

columns:
  # Primary Keys / Identifiers
  - name: "record_id"
    type: "string"
    nullable: false
    description: "Unique UUID for the record"
  - name: "alloy_designation_id"
    type: "string"
    nullable: false
    description: "Normalized alloy designation for GroupKFold grouping"

  # Feature Columns: Alloy Composition (Encoded)
  - name: "cr_weight_fraction"
    type: "float64"
    nullable: false
    description: "Chromium weight fraction (0.0 - 1.0)"
  - name: "ni_weight_fraction"
    type: "float64"
    nullable: false
    description: "Nickel weight fraction (0.0 - 1.0)"
  - name: "mo_weight_fraction"
    type: "float64"
    nullable: false
    description: "Molybdenum weight fraction (0.0 - 1.0)"
  - name: "fe_weight_fraction"
    type: "float64"
    nullable: false
    description: "Iron weight fraction (0.0 - 1.0)"
  - name: "total_alloying_elements"
    type: "float64"
    nullable: false
    description: "Sum of defined alloying elements (should be ~1.0)"

  # Feature Columns: Environment (Encoded)
  - name: "solution_ph"
    type: "float64"
    nullable: false
    description: "pH value"
  - name: "solution_temp_c"
    type: "float64"
    nullable: false
    description: "Temperature in Celsius"
  - name: "solution_type_encoded"
    type: "int64"
    nullable: false
    description: "Label encoded solution type"
  - name: "concentration_m"
    type: "float64"
    nullable: true
    description: "Molar concentration (may be null if not provided)"

  # Target Column
  - name: "corrosion_potential_mv"
    type: "float64"
    nullable: false
    description: "Target variable: Corrosion potential in mV"

  # Metadata Columns
  - name: "source_record_id"
    type: "string"
    nullable: true
    description: "Original ID from NIST dataset for traceability"
  - name: "processing_timestamp"
    type: "datetime64[ns]"
    nullable: false
    description: "Timestamp of processing"

constraints:
  # Integrity constraints for the processed dataset
  min_records: 500
  min_unique_alloys: 10 # Required for GroupKFold (k=5)
  null_policy:
    critical_features: ["solution_ph", "solution_temp_c", "cr_weight_fraction", "corrosion_potential_mv"]
    action: "drop" # Rows with nulls in critical features must be dropped

statistical_expectations:
  # Expected ranges to detect data drift or corruption
  - field: "solution_ph"
    expected_range: [0.0, 14.0]
    outlier_threshold: 3.0 # Standard deviations
  - field: "solution_temp_c"
    expected_range: [0.0, 100.0]
  - field: "corrosion_potential_mv"
    expected_range: [-2000.0, 2000.0]

validation_rules:
  - rule: "no_nulls_critical"
    fields: ["solution_ph", "solution_temp_c", "corrosion_potential_mv", "alloy_designation_id"]
    error: "SchemaMismatchError"
  - rule: "alloy_diversity"
    min_unique_groups: 10
    group_column: "alloy_designation_id"
    error: "DataInsufficientError"
  - rule: "composition_sum"
    columns: ["cr_weight_fraction", "ni_weight_fraction", "mo_weight_fraction", "fe_weight_fraction"]
    sum_tolerance: 0.05
    error: "SchemaMismatchError"

metadata:
  generated_by: "code/data/preprocess.py"
  depends_on: "contracts/ingest.schema.yaml"
  last_updated: "2023-10-27"
  referenced_spec: "specs/001-predict-corrosion-potential/spec.md"
  referenced_plan: "plan.md"