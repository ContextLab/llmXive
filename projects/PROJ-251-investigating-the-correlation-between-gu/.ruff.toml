# Ruff configuration for llmXive project

# Target Python version
target-version = "py311"

# Line length for linting checks (Black default is 88, but we can align or differ)
line-length = 88

[lint]
# Select specific rules
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function call in argument defaults (common in data science for defaults)
]

# Per-file ignores if necessary
[lint.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in __init__

[lint.isort]
known-first-party = ["code"]