  quote: The Bengal Files is the third and final installment in Agnihotri's The Files
    Trilogy based on modern Indian history, following The Tashkent Files (2019) and
    The Kashmir Files (2022). With a runtime of 204 minutes, it is one of the longest
    Indian films and was released on 5 September 2025. The film received criticism
    over its distortion of history, and was commercially unsuccessful.
