  - id: d7605e1e5191
    text: 'In Section ''Simulation Results'' (040-exp.tex), the text claims ICWM improves
      OOD success rate by 13.0% over Multi-View BC. However, Table ''tab: unseen''
      (appendix.tex) shows MV Avg=19.8% and ICWM Avg=25.0%, a 5.2% absolute difference.
      This numerical inconsistency undermines the conclusion that the data supports
      the stated claim. Please align the text with the table data or clarify the metric
      used.'
    severity: science
  - id: 2115db5e0481
    text: 'The paper makes strong claims about generalization and system identification
      that are not fully supported by the provided data. Specifically, Section 4.2
      claims a 9.5% improvement over Explicit Configuration (EXP), but Table tab:
      unseen in the Appendix shows an average absolute improvement of only ~3% (33.75%
      vs 30.8% average). While this may represent a 9.5% *relative* improvement, the
      phrasing "improving the OOD success rate by 9.5%" is ambiguous and risks misleading
      readers into expecting a l'
