$schema: "http://json-schema.org/draft-07/schema#"
title: Model Output Schema
description: "Schema for the saved model artifacts and metrics."
type: object
properties:
  model_type:
    type: string
    description: "Type of model (e.g., 'LogisticRegression', 'RandomForest')."
    enum:
      - "LogisticRegression"
      - "RandomForest"
  antibiotic_class:
    type: string
    description: "The antibiotic class this model predicts."
  auc_roc:
    type: number
    description: "Area Under the ROC Curve on the test set."
    minimum: 0.0
    maximum: 1.0
  p_value:
    type: number
    description: "P-value from the PGLS residual permutation test."
    minimum: 0.0
    maximum: 1.0
  feature_importance:
    type: array
    description: "Top features contributing to the prediction."
    items:
      type: object
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
      required:
        - feature_name
        - importance_score
  timestamp:
    type: string
    description: "ISO 8601 timestamp of model training."
    format: date-time
  cv_method:
    type: string
    description: "Cross-validation method used."
    enum:
      - "Phylogenetically-Blocked"
required:
  - model_type
  - antibiotic_class
  - auc_roc
  - p_value
  - feature_importance
  - timestamp
  - cv_method
additionalProperties: false