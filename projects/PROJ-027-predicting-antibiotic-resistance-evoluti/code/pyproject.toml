[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "antibiotic-resistance-evolution"
version = "0.1.0"
description = "Predicting antibiotic resistance evolution from genomic sequences"
requires-python = ">=3.11"
dependencies = [
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "biopython>=1.81",
    "requests>=2.31.0",
    "pyyaml>=6.0",
    "dendropy>=4.6.0",
    "statsmodels>=0.14.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.4.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.setuptools.package-dir]
"" = "code"

[project.optional-dependencies]
dev = ["ruff", "black", "pytest"]

[tool.ruff]
line-length = 88
select = ["E", "F", "W", "I"]
ignore = []

[tool.black]
line-length = 88
target-version = ['py311']
