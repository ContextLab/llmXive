$schema: "http://json-schema.org/draft-07/schema#"
title: "InferenceOutputSchema"
description: "Schema for the generated video artifact metadata and validation results. Includes quantitative CLIP proxy scores to replace subjective assessment."
type: object
properties:
  file_path:
    type: string
    description: "Path to the generated video file."
    pattern: ".*\\.(mp4|gif)$"
  format:
    type: string
    enum:
      - "mp4"
      - "gif"
    description: "File format of the output."
  duration_seconds:
    type: number
    minimum: 2.0
    description: "Duration of the video in seconds. Must be at least 2 seconds."
  resolution:
    type: object
    properties:
      width:
        type: integer
        minimum: 256
        description: "Video width in pixels."
      height:
        type: integer
        minimum: 256
        description: "Video height in pixels."
    required:
      - width
      - height
  file_size_bytes:
    type: integer
    minimum: 0
    description: "File size in bytes."
  is_playable:
    type: boolean
    description: "True if the video file is not corrupt and can be played."
  fidelity_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Cosine similarity score from CPU-optimized CLIP proxy (0.0 to 1.0). Replaces subjective assessment."
  motion_score:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Motion quality score derived from frame variance (0.0 to 1.0)."
  subject_present:
    type: boolean
    description: "True if fidelity_score exceeds the threshold (e.g., > 0.5)."
  constraint_attribution:
    type: string
    enum:
      - "HARDWARE_LIMIT"
      - "MODEL_INCOMPATIBLE"
      - "NONE"
    description: "If fidelity_score is low, this field indicates whether the cause is hardware (frame count) or model incompatibility."
  validation_status:
    type: string
    enum:
      - "PASS"
      - "FAIL"
    description: "Overall validation status."
required:
  - file_path
  - format
  - duration_seconds
  - resolution
  - file_size_bytes
  - is_playable
  - fidelity_score
  - motion_score
  - subject_present
  - constraint_attribution
  - validation_status
additionalProperties: false