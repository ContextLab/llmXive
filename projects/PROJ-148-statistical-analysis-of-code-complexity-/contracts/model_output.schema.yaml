$schema: http://json-schema.org/draft-07/schema#
title: Model Output Contract Schema
description: >
  Defines the required structure and data types for all model output artifacts
  generated by the Statistical Analysis of Code Complexity pipeline (US2, US3).
  This schema ensures consistency across primary model, alternative model, and
  evaluation reports.
type: object
required:
  - metadata
  - model_type
  - features
  - performance_metrics
  - coefficients_or_importance
  - predictions_summary
properties:
  metadata:
    type: object
    description: Run-level metadata for reproducibility
    required:
      - timestamp
      - random_seed
      - pipeline_version
      - train_test_split_ratio
    properties:
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of model execution
      random_seed:
        type: integer
        description: Random seed used for training
      pipeline_version:
        type: string
        description: Git commit hash or version tag of the pipeline
      train_test_split_ratio:
        type: string
        description: Proportion used for train/test split (e.g., "0.7/0.3")
      data_checksum:
        type: string
        description: SHA-256 checksum of the input dataset used
  model_type:
    type: string
    enum:
      - LogisticRegression_L1
      - RandomForest
    description: Type of model trained
  features:
    type: array
    description: List of features used in the model
    items:
      type: string
    minItems: 1
  performance_metrics:
    type: object
    description: Key performance indicators on the test set
    required:
      - roc_auc
      - pr_auc
      - accuracy
      - f1_score
      - confusion_matrix
    properties:
      roc_auc:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Area Under the Receiver Operating Characteristic Curve
      pr_auc:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Area Under the Precision-Recall Curve
      accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
      f1_score:
        type: number
        minimum: 0.0
        maximum: 1.0
      confusion_matrix:
        type: array
        description: [[TN, FP], [FN, TP]]
        items:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
        minItems: 2
        maxItems: 2
      baseline_roc_auc:
        type: number
        description: Baseline ROC-AUC (e.g., 0.5 for random)
        minimum: 0.0
        maximum: 1.0
      fdr_corrected:
        type: boolean
        description: Whether Benjamini-Hochberg correction was applied
      fdr_value:
        type: number
        description: Final False Discovery Rate after correction
        minimum: 0.0
        maximum: 1.0
  coefficients_or_importance:
    type: object
    description: Model parameters (coefficients for LR, feature importances for RF)
    required:
      - feature_names
      - values
    properties:
      feature_names:
        type: array
        items:
          type: string
      values:
        type: array
        items:
          type: number
        description: Coefficients (LR) or Importances (RF) corresponding to feature_names
      ranks:
        type: array
        items:
          type: integer
        description: Rank of each feature by importance (1 = most important)
      spearman_correlation:
        type: number
        description: Spearman rank correlation between primary and alternative models
        minimum: -1.0
        maximum: 1.0
  predictions_summary:
    type: object
    description: Summary of predictions on the test set
    required:
      - total_samples
      - positive_predictions
      - negative_predictions
      - probability_threshold
    properties:
      total_samples:
        type: integer
        minimum: 0
      positive_predictions:
        type: integer
        minimum: 0
      negative_predictions:
        type: integer
        minimum: 0
      probability_threshold:
        type: number
        description: Threshold used for binary classification (default 0.5)
        minimum: 0.0
        maximum: 1.0
      mean_probability:
        type: number
        description: Mean predicted probability across test set
        minimum: 0.0
        maximum: 1.0
  thresholds:
    type: array
    description: Derived practical thresholds for developers
    items:
      type: object
      required:
        - metric_name
        - threshold_value
        - predicted_probability
      properties:
        metric_name:
          type: string
        threshold_value:
          type: number
        predicted_probability:
          type: number
          minimum: 0.0
          maximum: 1.0
  partial_dependence_plots:
    type: array
    description: Metadata for generated PDPs
    items:
      type: object
      required:
        - feature_name
        - file_path
      properties:
        feature_name:
          type: string
        file_path:
          type: string
          description: Relative path to the saved PNG file
        range:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
          description: [min, max] range of the feature used for PDP