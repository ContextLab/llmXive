$schema: "http://json-schema.org/draft-07/schema#"
title: Model Output Contract
description: |
  JSON‑Schema definition for the serialized output of a trained predictive
  model.  All model‑training pipelines in this project must produce a JSON
  (or YAML) file that conforms to this contract before it is persisted under
  `data/model/`.
type: object
additionalProperties: false
required:
  - model_name
  - model_version
  - training_timestamp
  - metrics
  - feature_importances
properties:
  model_name:
    type: string
    description: Human‑readable identifier for the model (e.g., "logistic_regression").
  model_version:
    type: string
    description: Version string following semantic versioning (e.g., "1.0.0").
  training_timestamp:
    type: string
    format: date-time
    description: ISO‑8601 timestamp of when the model was trained.
  metrics:
    type: object
    description: Evaluation metrics computed on the held‑out test set.
    additionalProperties: false
    required:
      - roc_auc
      - pr_auc
    properties:
      roc_auc:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Area under the ROC curve.
      pr_auc:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Area under the Precision‑Recall curve.
      accuracy:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: Overall classification accuracy (optional).
      f1_score:
        type: number
        minimum: 0.0
        maximum: 1.0
        description: F1‑score (optional).
  feature_importances:
    type: array
    description: Ranked list of features with their importance scores.
    items:
      type: object
      additionalProperties: false
      required:
        - feature
        - importance
      properties:
        feature:
          type: string
          description: Name of the feature/metric.
        importance:
          type: number
          description: Relative importance (e.g., coefficient magnitude or Gini importance).
  predictions_path:
    type: string
    format: uri
    description: Path (file‑URI) to the predictions file generated for the test split.
  hyperparameters:
    type: object
    description: Hyper‑parameter settings used during training (optional).
    additionalProperties:
      type: string
  notes:
    type: string
    description: Free‑form notes or remarks about the training run (optional).