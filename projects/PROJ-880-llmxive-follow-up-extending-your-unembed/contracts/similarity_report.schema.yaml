$schema: http://json-schema.org/draft-07/schema#
title: Similarity Report
description: Schema for the output of the SVD and similarity pipeline (User Story 1).
type: object
required:
  - pairs
properties:
  pairs:
    type: array
    description: List of model pair comparisons.
    items:
      type: object
      required:
        - model_a
        - model_b
        - cosine_similarity
      properties:
        model_a:
          type: string
          description: Name of the first model (e.g., 'llama-3', 'mistral').
        model_b:
          type: string
          description: Name of the second model.
        cosine_similarity:
          type: number
          format: float
          description: Cosine similarity between the top-k singular vector subspaces.
          minimum: -1.0
          maximum: 1.0
  metadata:
    type: object
    description: Optional metadata about the run.
    properties:
      k:
        type: integer
        description: Number of singular vectors used.
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of the run.
additionalProperties: true
