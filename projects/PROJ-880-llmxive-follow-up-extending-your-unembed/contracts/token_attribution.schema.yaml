$schema: http://json-schema.org/draft-07/schema#
title: TokenAttributionReport
description: >
  Schema for the token attribution report generated by User Story 2.
  Contains ranked tokens per language based on projection onto the edge spectrum subspace.
type: object
required:
  - metadata
  - results
properties:
  metadata:
    type: object
    required:
      - model
      - language
      - k_subspace
      - timestamp
      - frequency_source
    properties:
      model:
        type: string
        description: Name of the model used (e.g., 'Llama-3', 'Mistral', 'BLOOM')
      language:
        type: string
        description: Language code of the frequency distribution (e.g., 'en', 'fr', 'zh')
      k_subspace:
        type: integer
        description: Number of singular vectors used for the edge spectrum subspace
      timestamp:
        type: string
        format: date-time
        description: ISO 8601 timestamp of when the report was generated
      frequency_source:
        type: string
        description: Source of the frequency distribution data (e.g., 'CommonCrawl', 'RedPajama')
      config_path:
        type: string
        description: Relative path to the configuration file used
  results:
    type: array
    description: List of top-ranked tokens and their projection scores
    items:
      type: object
      required:
        - token
        - token_id
        - projection_score
        - frequency
      properties:
        token:
          type: string
          description: The decoded token string
        token_id:
          type: integer
          description: The integer ID of the token in the model's vocabulary
        projection_score:
          type: number
          format: float
          description: The scalar projection score of the token onto the edge spectrum subspace
        frequency:
          type: number
          format: float
          description: The normalized frequency of the token in the source distribution
        rank:
          type: integer
          description: The rank of the token in the sorted list (1-based)
additionalProperties: false
