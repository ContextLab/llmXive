$schema: http://json-schema.org/draft-07/schema#
title: Permutation Result Schema
description: >
  Schema for the output of the statistical significance test (User Story 3).
  Contains the observed statistic, null distribution statistics, p-value, and
  the significance flag.
type: object
required:
  - task_id
  - model_pair
  - observed_similarity
  - null_distribution
  - p_value
  - is_significant
  - significance_level
  - n_permutations
  - timestamp
properties:
  task_id:
    type: string
    const: "T026"
    description: ID of the task that generated this result.
  model_pair:
    type: string
    description: Identifier for the pair of models compared (e.g., "llama3-bloom").
  observed_similarity:
    type: number
    format: float
    description: The cosine similarity score observed in the real data.
  null_distribution:
    type: object
    description: Statistics derived from the model-seed null distribution.
    required:
      - mean
      - std
      - min
      - max
      - values
    properties:
      mean:
        type: number
        format: float
      std:
        type: number
        format: float
      min:
        type: number
        format: float
      max:
        type: number
        format: float
      values:
        type: array
        items:
          type: number
          format: float
        description: The raw values of the null distribution generated by permutation.
  p_value:
    type: number
    format: float
    minimum: 0
    maximum: 1
    description: The calculated p-value from the permutation test.
  is_significant:
    type: boolean
    description: True if p_value < significance_level.
  significance_level:
    type: number
    format: float
    description: The alpha threshold used (default 0.05).
  n_permutations:
    type: integer
    minimum: 1
    description: The number of permutations performed.
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the test was run.
  notes:
    type: string
    description: Optional notes regarding the test execution or data conditions.
