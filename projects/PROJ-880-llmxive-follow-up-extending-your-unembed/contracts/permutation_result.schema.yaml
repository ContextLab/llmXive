$schema: http://json-schema.org/draft-07/schema#
title: Permutation Result
description: Results of the statistical permutation test for cross-lingual shift.
type: object
required:
  - p_value
  - is_significant
  - null_distribution_stats
properties:
  p_value:
    type: number
    format: float
    description: Calculated p-value from the permutation test
  is_significant:
    type: boolean
    description: Whether the result is statistically significant at alpha=0.05
  null_distribution_stats:
    type: object
    required:
      - mean
      - std
      - count
    properties:
      mean:
        type: number
        format: float
      std:
        type: number
        format: float
      count:
        type: integer
        minimum: 1
  observed_similarity:
    type: number
    format: float
    description: The observed similarity score being tested
additionalProperties: false
