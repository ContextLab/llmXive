[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Follow-up research: Extending 'Your UnEmbedding Matrix is Secretly a Feature Lens for Text Embeddings'"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "torch==2.1.0",
    "transformers==4.36.0",
    "numpy==1.24.3",
    "scipy==1.11.4",
    "pandas==2.1.4",
    "huggingface_hub==0.20.3",
    "datasets==2.16.1",
]

[project.optional-dependencies]
dev = [
    "flake8>=6.1.0",
    "black>=23.12.0",
    "isort>=5.13.0",
    "pytest>=7.4.0",
    "mypy>=1.8.0",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["config", "data_loader", "model_analyzer", "statistical_test", "token_attribution", "overlap_calculator", "statistical_analyzer", "validate_citations", "benchmark_runner", "main"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
