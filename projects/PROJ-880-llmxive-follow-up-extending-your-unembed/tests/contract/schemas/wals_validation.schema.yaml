# Schema for wals_validation output
# Used by: wals_validation.json

type: object
required:
  - features
  - correlations
  - metadata
additionalProperties: false

properties:
  features:
    type: array
    description: List of WALS features analyzed
    items:
      type: object
      required:
        - code
        - name
        - description
      additionalProperties: false
      properties:
        code:
          type: string
          description: WALS feature code
        name:
          type: string
          description: Feature name
        description:
          type: string
          description: Feature description

  correlations:
    type: array
    description: Spearman correlation results
    items:
      type: object
      required:
        - feature_code
        - correlation
        - p_value
        - significant
      additionalProperties: false
      properties:
        feature_code:
          type: string
        correlation:
          type: number
          minimum: -1
          maximum: 1
        p_value:
          type: number
          minimum: 0
          maximum: 1
        significant:
          type: boolean

  metadata:
    type: object
    required:
      - correlation_method
      - alpha
      - timestamp
    additionalProperties: false
    properties:
      correlation_method:
        type: string
        enum:
          - spearman
          - kendall
          - pearson
      alpha:
        type: number
        minimum: 0
        maximum: 1
        description: Significance threshold
      timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        description: ISO 8601 timestamp
      data_availability:
        type: string
        enum:
          - available
          - unavailable
        description: Whether WALS data was available