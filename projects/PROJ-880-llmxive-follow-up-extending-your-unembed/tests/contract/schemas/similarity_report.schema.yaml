# Schema for similarity_report outputs
# Used by: similarity_matrix.json, anisotropy_deviation.json

type: object
required:
  - models
  - similarities
  - metadata
additionalProperties: false

properties:
  models:
    type: array
    description: List of model identifiers compared
    minItems: 2
    items:
      type: string
      pattern: "^[a-zA-Z0-9_-]+$"

  similarities:
    type: array
    description: Pairwise similarity scores between model subspaces
    items:
      type: object
      required:
        - model_a
        - model_b
        - cosine_similarity
      additionalProperties: false
      properties:
        model_a:
          type: string
          description: First model identifier
        model_b:
          type: string
          description: Second model identifier
        cosine_similarity:
          type: number
          minimum: 0
          maximum: 1
          description: Cosine similarity between subspaces

  anisotropy:
    type: object
    description: Anisotropy deviation analysis (optional)
    required:
      - observed_similarity
      - null_threshold
      - deviation
      - confidence_interval
    additionalProperties: false
    properties:
      observed_similarity:
        type: number
        minimum: 0
        maximum: 1
      null_threshold:
        type: number
        minimum: 0
        maximum: 1
      deviation:
        type: number
      confidence_interval:
        type: object
        required:
          - lower
          - upper
          - level
        additionalProperties: false
        properties:
          lower:
            type: number
          upper:
            type: number
          level:
            type: number
            minimum: 0
            maximum: 1

  metadata:
    type: object
    required:
      - k
      - n_bootstrap
      - models_compared
      - timestamp
    additionalProperties: false
    properties:
      k:
        type: integer
        minimum: 1
        description: Number of singular vectors used
      n_bootstrap:
        type: integer
        minimum: 1
        description: Number of bootstrap iterations
      models_compared:
        type: array
        items:
          type: string
      timestamp:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        description: ISO 8601 timestamp
      hardware:
        type: object
        additionalProperties: false
        properties:
          cpu:
            type: string
          ram_gb:
            type: number
