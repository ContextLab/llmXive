$schema: "http://json-schema.org/draft-07/schema#"
title: "StatisticalResults"
description: "Schema for the output of the statistical analysis step."
type: object
properties:
  test_name:
    type: string
    description: "Name of the statistical test used (e.g., 'overlap_analysis', 't_test')."
  p_value:
    type: number
    description: "P-value of the test."
    minimum: 0
    maximum: 1
  statistic:
    type: number
    description: "Test statistic value."
  effect_size:
    type: number
    description: "Effect size (Cohen's d or rank-biserial correlation)."
  significance:
    type: string
    description: "Label indicating statistical significance ('significant' or 'not significant')."
    enum:
      - "significant"
      - "not significant"
  normality_test:
    type: object
    description: "Results of the normality test on the differences."
    properties:
      shapiro_wilk_p_value:
        type: number
        description: "P-value from the Shapiro-Wilk test."
        minimum: 0
        maximum: 1
      test_used:
        type: string
        description: "The statistical test selected based on normality (e.g., 'overlap_analysis', 't_test')."
    required:
      - shapiro_wilk_p_value
      - test_used
  robustness_check:
    type: object
    description: "Results from the DistilGPT-2 robustness check."
    properties:
      direction_consistent:
        type: boolean
        description: "True if the direction of effect is the same as the primary model."
      p_value_distil:
        type: number
        description: "P-value for the DistilGPT-2 analysis."
    required:
      - direction_consistent
      - p_value_distil
  sensitivity_analysis:
    type: array
    description: "Results for different power draw assumptions."
    items:
      type: object
      properties:
        power_draw_w:
          type: integer
        human_co2_per_loc:
          type: number
        difference_from_llm:
          type: number
        stability_status:
          type: string
          description: "Whether the conclusion holds for this power draw."
          enum:
            - "stable"
            - "unstable"
      required:
        - power_draw_w
        - human_co2_per_loc
        - difference_from_llm
        - stability_status
  ci_mean_diff:
    type: object
    description: "95% Confidence Interval for the mean difference in CO2/LOC."
    properties:
      lower:
        type: number
      upper:
        type: number
    required:
      - lower
      - upper
required:
  - test_name
  - p_value
  - statistic
  - effect_size
  - significance
  - normality_test
  - robustness_check
  - sensitivity_analysis
  - ci_mean_diff
additionalProperties: false