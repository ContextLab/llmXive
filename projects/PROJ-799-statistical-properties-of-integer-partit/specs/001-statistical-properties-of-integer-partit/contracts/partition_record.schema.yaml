$schema: "http://json-schema.org/draft-07/schema#"
title: "PartitionRecord"
description: "Schema for the raw partition data generated by generate_partitions.py"
type: "object"
properties:
  n:
    type: "integer"
    description: "The integer n being partitioned"
    minimum: 1
  count:
    type: "integer"
    description: "Exact count of partitions into distinct primes p_P(n)"
    minimum: 0
  asymptotic:
    type: "number"
    description: "Theoretical asymptotic prediction Q_as(n) (leading-order Roth & Szekeres term)"
    minimum: 0
  log_residual:
    type: "number"
    description: "Log-residual R(n) = log(count) - log(asymptotic)"
    nullable: true
    description: "Null if count is 0 or asymptotic is non-positive"
required:
  - n
  - count
  - asymptotic
  - log_residual
additionalProperties: false