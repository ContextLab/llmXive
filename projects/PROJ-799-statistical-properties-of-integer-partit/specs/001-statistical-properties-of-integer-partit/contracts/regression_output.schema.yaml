$schema: "http://json-schema.org/draft-07/schema#"
title: "RegressionOutput"
description: "Schema for the statistical model results"
type: "object"
properties:
  coefficients:
    type: "object"
    description: "Map of feature names to regression coefficients (or smooth term stats)"
    additionalProperties:
      type: "number"
  p_values:
    type: "object"
    description: "Map of feature names to uncorrected p-values"
    additionalProperties:
      type: "number"
      minimum: 0
      maximum: 1
  adjusted_p_values:
    type: "object"
    description: "Map of feature names to Bonferroni-corrected p-values"
    additionalProperties:
      type: "number"
      minimum: 0
      maximum: 1
  r_squared:
    type: "number"
    description: "R-squared value of the model"
    minimum: 0
    maximum: 1
  mse_cv:
    type: "number"
    description: "Mean Squared Error from 10-fold cross-validation"
    minimum: 0
  model_type:
    type: "string"
    description: "Type of model used (e.g., 'GAM')"
  vif_scores:
    type: "object"
    description: "Map of feature names to Variance Inflation Factor scores"
    additionalProperties:
      type: "number"
      minimum: 1
required:
  - coefficients
  - p_values
  - adjusted_p_values
  - r_squared
  - mse_cv
  - model_type
  - vif_scores
additionalProperties: false