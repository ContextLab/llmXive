[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proj-799-statistical-properties"
version = "0.1.0"
description = "Statistical Properties of Integer Partitions Into Distinct Prime Summands"
readme = "../README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "scikit-learn",
    "statsmodels",
    "matplotlib",
    "pandas",
    "pygam",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".git", "__pycache__", "build", "dist"]

[tool.pytest.ini_options]
testpaths = ["../tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
