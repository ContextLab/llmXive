$schema: "http://json-schema.org/draft-07/schema#"
title: "Alpha Power Metric Schema"
description: "Schema for alpha-band power values extracted from EEG electrodes."
type: "object"
properties:
  subject_id:
    type: "string"
    description: "Unique identifier for the participant."
  electrode:
    type: "string"
    description: "Electrode name (e.g., F3, F4, Fz, P3, P4, Pz)."
    enum: ["F3", "F4", "Fz", "P3", "P4", "Pz"]
  condition:
    type: "string"
    description: "Experimental condition (e.g., load_3, load_4)."
  power_value:
    type: "number"
    description: "Computed power in the 8-12 Hz band (µV²/Hz)."
  frequency_band:
    type: "string"
    description: "Frequency band identifier."
    const: "alpha_8_12"
required:
  - subject_id
  - electrode
  - condition
  - power_value
  - frequency_band
additionalProperties: false
