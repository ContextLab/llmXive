$schema: "http://json-schema.org/draft-07/schema#"
title: "PerformanceMetric"
description: "Schema for a benchmark evaluation result at a specific step."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Foreign key to the training run."
  step_count:
    type: "integer"
    description: "PPO step count at which evaluation occurred."
  benchmark_name:
    type: "string"
    enum: ["lambada_openai", "truthful_qa", "mmlu"]
    description: "Name of the benchmark suite."
  accuracy:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Accuracy score for the benchmark."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of evaluation."
required:
  - run_id
  - step_count
  - benchmark_name
  - accuracy
  - timestamp
additionalProperties: false
