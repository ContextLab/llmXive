$schema: "http://json-schema.org/draft-07/schema#"
title: "PromptBufferMetadata"
description: "Schema for versioned prompt dataset metadata."
type: "object"
properties:
  buffer_id:
    type: "string"
    description: "Unique identifier for the buffer version."
  size:
    type: "integer"
    enum: [0, 10000, 50000, 200000]
    description: "Number of examples in the buffer."
  source_dataset:
    type: "string"
    description: "Canonical source of the dataset (e.g., 'OpenAssistant/oasst1')."
  checksum:
    type: "string"
    description: "SHA-256 checksum of the buffer content."
  creation_date:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of buffer creation."
  sample_method:
    type: "string"
    enum: ["random", "stratified"]
    description: "Method used to sample the buffer."
required:
  - buffer_id
  - size
  - source_dataset
  - checksum
  - creation_date
  - sample_method
additionalProperties: false
