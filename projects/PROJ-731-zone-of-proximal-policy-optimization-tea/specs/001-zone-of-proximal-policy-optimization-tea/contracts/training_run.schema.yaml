$schema: "http://json-schema.org/draft-07/schema#"
title: "TrainingRun"
description: "Schema for a single PPO training run log entry."
type: "object"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the run (e.g., 'run_001_seed_42_10k')."
  prompt_size:
    type: "integer"
    enum: [0, 10000, 50000, 200000]
    description: "Number of teacher demonstration examples used."
  seed:
    type: "integer"
    description: "Random seed used for reproducibility."
  start_time:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of run start."
  end_time:
    type: ["string", "null"]
    format: "date-time"
    description: "ISO 8601 timestamp of run end, or null if interrupted."
  status:
    type: "string"
    enum: ["completed", "interrupted", "error"]
    description: "Final status of the training run."
  memory_fallback_triggered:
    type: "boolean"
    description: "True if the system sampled the prompt buffer due to memory constraints."
  kl_adaptations:
    type: "integer"
    description: "Number of times learning rate was reduced due to high KL divergence."
required:
  - run_id
  - prompt_size
  - seed
  - start_time
  - status
  - memory_fallback_triggered
  - kl_adaptations
additionalProperties: false
