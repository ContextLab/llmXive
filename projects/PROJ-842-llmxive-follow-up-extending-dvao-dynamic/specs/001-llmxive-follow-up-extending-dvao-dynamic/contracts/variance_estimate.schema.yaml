$schema: "http://json-schema.org/draft-07/schema#"
title: VarianceEstimate
description: Schema for variance estimation results from the Moving-Window Heuristic.
type: object
required:
  - metric_id
  - objective_index
  - heuristic_variance
  - theoretical_variance
  - ratio
  - window_size
properties:
  metric_id:
    type: string
    description: "Unique identifier for the metric instance."
  objective_index:
    type: integer
    description: "Index of the objective (0 to N-1)."
  heuristic_variance:
    type: number
    description: "Variance estimated using the moving window."
  theoretical_variance:
    type: number
    description: "Variance from full-batch or theoretical formula."
  ratio:
    type: number
    description: "Ratio of heuristic to theoretical variance. Target: 1.0."
    minimum: 0.0
  window_size:
    type: integer
    description: "Number of steps used in the window (k)."
    minimum: 1
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of calculation."
additionalProperties: false
