$schema: "http://json-schema.org/draft-07/schema#"
title: "Inference Output Schema"
description: "Schema for the output of run_inference.py (sample_predictions.jsonl)"
type: "object"
properties:
  sample_id:
    type: "string"
    description: "Unique identifier for the audio sample."
  audio_path:
    type: "string"
    description: "Path or URL to the source audio file."
  transcription:
    type: "string"
    description: "The text generated by the ASR model."
  inference_time_ms:
    type: "integer"
    description: "Time taken for inference in milliseconds."
  benchmark:
    type: "string"
    description: "Name of the benchmark dataset (e.g., VOiCES, NOIZEUS)."
required:
  - sample_id
  - audio_path
  - transcription
additionalProperties: true
