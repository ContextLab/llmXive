$schema: "http://json-schema.org/draft-07/schema#"
title: "Input Dataset Schema"
description: "Schema for the input JSONL/Parquet dataset (AudioSample)"
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the sample."
  audio_path:
    type: "string"
    description: "Path or URL to the audio file. REQUIRED."
  ground_truth:
    type: "string"
    description: "Reference transcription text. REQUIRED."
  distortion_type:
    type: "string"
    description: "Type of acoustic distortion applied."
  benchmark:
    type: "string"
    description: "Source benchmark name."
required:
  - audio_path
  - ground_truth
additionalProperties: true
