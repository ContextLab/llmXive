# Environment Configuration for PROJ-124
# This file centralizes all environment-dependent settings

# Random seed for reproducibility across all random operations
random_seed: 42

# Dataset download URLs
dataset_urls:
  gfa_dataset: "https://huggingface.co/datasets/materials-project/gfa-experimental/resolve/main/gfa_dataset.csv"
  # Add other dataset URLs as needed

# Path configurations (relative to project root)
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  state: "state"
  output: "output"
  config: "code/config"
  figures: "figures"
  docs: "docs"

# Feature flags for experimental toggles
features:
  enable_heteroscedasticity_correction: true
  enable_domain_applicability: true
  novelty_check_enabled: true
  use_weighted_loss: true
  enable_shap_analysis: true

# System limits and thresholds
limits:
  max_candidates: 10
  bootstrap_models: 10
  pca_variance_retention: 0.95
  max_iterations: 1000
  min_samples_per_leaf: 5

# Model training parameters
model_params:
  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5

# Data validation thresholds
validation:
  composition_tolerance: 0.01
  max_null_ratio: 0.05
  min_row_count: 10
