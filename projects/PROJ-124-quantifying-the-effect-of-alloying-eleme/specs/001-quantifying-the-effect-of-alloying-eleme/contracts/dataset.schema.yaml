$schema: "http://json-schema.org/draft-07/schema#"
title: "Processed Dataset Schema"
description: "Schema for the feature-engineered dataset used in model training."
type: "object"
properties:
  composition:
    type: "string"
    description: "Original composition string (e.g., Zr50Cu40Al10)"
  log10_Rc:
    type: "number"
    description: "Log-transformed critical cooling rate"
  atomic_radius_mean:
    type: "number"
    description: "Weighted mean of atomic radii"
  atomic_radius_var:
    type: "number"
    description: "Variance of atomic radii"
  electronegativity_mean:
    type: "number"
    description: "Weighted mean of electronegativity"
  electronegativity_var:
    type: "number"
    description: "Variance of electronegativity"
  VEC_avg:
    type: "number"
    description: "Weighted mean of valence electrons"
  VEC_raw:
    type: "number"
    description: "Sum of valence electrons"
  pairwise_size_mismatch:
    type: "number"
    description: "Pairwise size mismatch descriptor"
required:
  - composition
  - log10_Rc
  - atomic_radius_mean
  - atomic_radius_var
  - electronegativity_mean
  - electronegativity_var
  - VEC_avg
  - VEC_raw
  - pairwise_size_mismatch
additionalProperties: true