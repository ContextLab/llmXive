[tool.black]
line-length = 88
target-version = ["py311"]
skip-string-normalization = false
exclude = '/(\.git|\.venv|venv|build|dist)/'

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "N",
    "ARG",
    "SIM",
    "RUF"
]
ignore = [
    "E501",
    "B008",
    "SIM105"
]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist"
]
[tool.ruff.per-file-ignores]
__init__.py = ["F401", "F403"]
tests/* = ["ARG001"]