[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-gfa-pipeline"
version = "0.1.0"
description = "Quantifying the Effect of Alloying Elements on the Glass-Forming Ability of Metallic Glasses"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pymatgen",
    "scikit-learn",
    "pandas",
    "numpy",
    "shap",
    "statsmodels",
    "scipy",
    "ruff",
    "black",
    "pyyaml",
    "tomli",
]

[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "C", "B"]
ignore = ["E501", "B008"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
