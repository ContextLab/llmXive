# Ruff configuration generated by code/config/linting.py
target-version = "py311"
line-length = 88
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "N",
    "ARG",
    "SIM",
    "RUF"
]
ignore = [
    "E501",
    "B008",
    "SIM105"
]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist"
]
[per-file-ignores]
__init__.py = ["F401", "F403"]
tests/* = ["ARG001"]
[isort]
known-first-party = ["config", "data", "utils", "models", "setup_project_structure"]
force-single-line = false
[mccabe]
max-complexity = 15
