$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
properties:
  variant_id:
    type: "string"
    description: "Unique identifier for the variant"
  scenario_id:
    type: "string"
    description: "Foreign key to the Scenario"
  salience_level:
    type: "string"
    enum: ["Low", "Medium", "High"]
    description: "Categorical value for salience level"
  manipulated_text:
    type: "string"
    description: "The text with typographic manipulation applied"
  semantic_similarity:
    type: "number"
    description: "Sentence-BERT cosine similarity between original and manipulated text"
  manipulation_valid:
    type: "boolean"
    description: "Boolean indicating if the manipulation was successful (similarity >= 0.95)"
required:
  - variant_id
  - scenario_id
  - salience_level
  - manipulated_text
  - semantic_similarity
  - manipulation_valid
additionalProperties: false