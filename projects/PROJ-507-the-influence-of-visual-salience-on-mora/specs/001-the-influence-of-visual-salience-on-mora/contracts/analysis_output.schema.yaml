$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Output Schema"
description: "Schema for Linear Mixed-Effects Model (LMM) analysis results."
type: "object"
properties:
  analysis_id:
    type: "string"
    description: "Unique identifier for the analysis run."
  model_type:
    type: "string"
    enum:
      - "Linear_Mixed_Effects_Model"
    description: "Type of statistical model used."
  fixed_effects:
    type: "object"
    description: "Dictionary of fixed effect coefficients."
    additionalProperties:
      type: "number"
  random_effects_variance:
    type: "object"
    description: "Dictionary of random effect variances."
    additionalProperties:
      type: "number"
  p_value:
    type: "number"
    description: "Raw p-value for the main effect of salience."
    minimum: 0
    maximum: 1
  p_value_corrected:
    type: "number"
    description: "Bonferroni-corrected p-value."
    minimum: 0
    maximum: 1
  effect_size:
    type: "number"
    description: "Marginal or Conditional R-squared."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "warning"
      - "failed"
    description: "Convergence status of the model."
required:
  - analysis_id
  - model_type
  - fixed_effects
  - random_effects_variance
  - p_value
  - p_value_corrected
  - effect_size
  - ci_lower
  - ci_upper
  - convergence_status
additionalProperties: false