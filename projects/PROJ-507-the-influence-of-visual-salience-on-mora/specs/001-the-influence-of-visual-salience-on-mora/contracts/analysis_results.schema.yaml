$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for statistical analysis outputs (LMM) - Typographic Salience Study"
type: "object"
properties:
  model_type:
    type: "string"
    enum:
      - "Linear_Mixed_Effects_Model"
    description: "Type of model used."
  fixed_effects:
    type: "object"
    description: "Fixed effect coefficients."
    additionalProperties:
      type: "number"
  random_effects_variance:
    type: "object"
    description: "Random effect variances."
    additionalProperties:
      type: "number"
  p_value:
    type: "number"
    description: "Raw p-value for salience effect."
    minimum: 0
    maximum: 1
  p_value_corrected:
    type: "number"
    description: "Bonferroni-corrected p-value."
    minimum: 0
    maximum: 1
  effect_size:
    type: "object"
    properties:
      marginal_r_squared:
        type: "number"
        description: "Marginal R² (variance explained by fixed effects)."
      conditional_r_squared:
        type: "number"
        description: "Conditional R² (variance explained by fixed + random effects)."
      ci_95_lower:
        type: "number"
      ci_95_upper:
        type: "number"
    required:
      - "marginal_r_squared"
      - "conditional_r_squared"
      - "ci_95_lower"
      - "ci_95_upper"
  post_hoc_tests:
    type: "array"
    items:
      type: "object"
      properties:
        comparison:
          type: "string"
        t_statistic:
          type: "number"
        p_value_uncorrected:
          type: "number"
        p_value_bonferroni:
          type: "number"
      required:
        - "comparison"
        - "t_statistic"
        - "p_value_uncorrected"
        - "p_value_bonferroni"
  exclusion_rate:
    type: "number"
    minimum: 0
    maximum: 1
  sample_size:
    type: "integer"
    minimum: 1
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "warning"
      - "failed"
  power_analysis:
    type: "object"
    properties:
      observed_power:
        type: "number"
      power_flag:
        type: "boolean"
        description: "True if observed_power < 0.80."
      precision_check:
        type: "object"
        properties:
          ci_width:
            type: "number"
          threshold:
            type: "number"
            description: "Pre-registered threshold (0.3)."
          flag:
            type: "boolean"
            description: "True if ci_width > threshold."
        required:
          - "ci_width"
          - "threshold"
          - "flag"
    required:
      - "observed_power"
      - "power_flag"
      - "precision_check"
required:
  - "model_type"
  - "fixed_effects"
  - "random_effects_variance"
  - "p_value"
  - "p_value_corrected"
  - "effect_size"
  - "post_hoc_tests"
  - "exclusion_rate"
  - "sample_size"
  - "convergence_status"
  - "power_analysis"
additionalProperties: false