$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Schema"
description: "Schema for statistical analysis outputs (LMM)"
type: "object"
properties:
  model_type:
    type: "string"
    enum:
      - "Linear_Mixed_Effects_Model"
    description: "Type of model used."
  fixed_effects:
    type: "object"
    description: "Fixed effect coefficients."
    additionalProperties:
      type: "number"
  random_effects_variance:
    type: "object"
    description: "Random effect variances."
    additionalProperties:
      type: "number"
  p_value:
    type: "number"
    description: "Raw p-value for salience effect."
  p_value_corrected:
    type: "number"
    description: "Bonferroni-corrected p-value."
  effect_size:
    type: "object"
    properties:
      marginal_r_squared:
        type: "number"
        description: "Marginal R² (variance explained by fixed effects)."
      conditional_r_squared:
        type: "number"
        description: "Conditional R² (variance explained by fixed + random effects)."
      ci_95_lower:
        type: "number"
      ci_95_upper:
        type: "number"
    required:
      - "marginal_r_squared"
      - "conditional_r_squared"
      - "ci_95_lower"
      - "ci_95_upper"
  post_hoc_tests:
    type: "array"
    items:
      type: "object"
      properties:
        comparison:
          type: "string"
        t_statistic:
          type: "number"
        p_value_uncorrected:
          type: "number"
        p_value_bonferroni:
          type: "number"
      required:
        - "comparison"
        - "t_statistic"
        - "p_value_uncorrected"
        - "p_value_bonferroni"
  exclusion_rate:
    type: "number"
    minimum: 0
    maximum: 1
  sample_size:
    type: "integer"
    minimum: 1
  convergence_status:
    type: "string"
    enum:
      - "converged"
      - "warning"
      - "failed"
  power_analysis:
    type: "object"
    properties:
      observed_power:
        type: "number"
      power_flag:
        type: "boolean"
        description: "True if observed_power < 0.80."
      precision_check:
        type: "object"
        properties:
          ci_width:
            type: "number"
          threshold:
            type: "number"
            description: "Pre-registered threshold (0.3)."
          flag:
            type: "boolean"
            description: "True if ci_width > threshold."
        required:
          - "ci_width"
          - "threshold"
          - "flag"
    required:
      - "observed_power"
      - "power_flag"
      - "precision_check"
required:
  - "model_type"
  - "fixed_effects"
  - "random_effects_variance"
  - "p_value"
  - "p_value_corrected"
  - "effect_size"
  - "post_hoc_tests"
  - "exclusion_rate"
  - "sample_size"
  - "convergence_status"
  - "power_analysis"
additionalProperties: false
examples:
  - model_type: "Linear_Mixed_Effects_Model"
    fixed_effects:
      intercept: 3.5
      salience_medium: 0.8
      salience_high: 1.2
    random_effects_variance:
      participant: 0.5
      scenario: 0.2
    p_value: 0.001
    p_value_corrected: 0.003
    effect_size:
      marginal_r_squared: 0.15
      conditional_r_squared: 0.45
      ci_95_lower: 0.08
      ci_95_upper: 0.22
    post_hoc_tests:
      - comparison: "low vs medium"
        t_statistic: 2.5
        p_value_uncorrected: 0.015
        p_value_bonferroni: 0.045
      - comparison: "medium vs high"
        t_statistic: 3.2
        p_value_uncorrected: 0.002
        p_value_bonferroni: 0.006
    exclusion_rate: 0.05
    sample_size: 190
    convergence_status: "converged"
    power_analysis:
      observed_power: 0.85
      power_flag: false
      precision_check:
        ci_width: 0.14
        threshold: 0.3
        flag: false