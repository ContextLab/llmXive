$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant"
  start_time:
    type: "string"
    format: "date-time"
    description: "Timestamp of survey start"
  end_time:
    type: "string"
    format: "date-time"
    description: "Timestamp of survey end"
  total_responses:
    type: "integer"
    description: "Number of responses provided"
  exclusion_flag:
    type: "boolean"
    description: "Boolean indicating if the participant was excluded"
  exclusion_reason:
    type: "string"
    description: "String describing the reason for exclusion (if applicable)"
required:
  - participant_id
  - start_time
  - end_time
  - total_responses
  - exclusion_flag
additionalProperties: false
