$schema: "http://json-schema.org/draft-07/schema#"
title: "Stimulus Variant Schema"
description: "Schema for validated stimulus variants with salience manipulation"
type: "object"
properties:
  variant_id:
    type: "string"
    description: "Unique identifier for the stimulus variant"
  scenario_id:
    type: "string"
    description: "Foreign key to the parent scenario"
  salience_level:
    type: string
    enum:
      - "low"
      - "medium"
      - "high"
    description: "Salience manipulation level"
  manipulated_image_path:
    type: "string"
    description: "Relative path to the manipulated image file"
  semantic_similarity:
    type: "number"
    minimum: 0
    maximum: 1
    description: "CLIP cosine similarity between original and manipulated image"
  ssim_score:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Structural Similarity Index Score for non-target regions"
  is_valid:
    type: "boolean"
    description: "True if semantic_similarity >= 0.95 AND ssim_score >= 0.90"
  contrast_change:
    type: "number"
    description: "Pixel-level contrast change percentage"
required:
  - "variant_id"
  - "scenario_id"
  - "salience_level"
  - "manipulated_image_path"
  - "semantic_similarity"
  - "ssim_score"
  - "is_valid"
  - "contrast_change"
additionalProperties: false
examples:
  - variant_id: "STIM-001-M"
    scenario_id: "SCEN-001"
    salience_level: "medium"
    manipulated_image_path: "data/processed/stimuli/SCEN-001-medium.png"
    semantic_similarity: 0.97
    ssim_score: 0.95
    is_valid: true
    contrast_change: 20.5