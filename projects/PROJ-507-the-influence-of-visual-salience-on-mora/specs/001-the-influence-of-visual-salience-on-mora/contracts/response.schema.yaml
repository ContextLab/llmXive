$schema: "http://json-schema.org/draft-07/schema#"
type: "object"
properties:
  response_id:
    type: "string"
    description: "Unique identifier for the response"
  participant_id:
    type: "string"
    description: "Foreign key to the Participant"
  variant_id:
    type: "string"
    description: "Foreign key to the Stimulus Variant"
  blame_rating:
    type: "integer"
    minimum: 1
    maximum: 7
    description: "Integer value (1-7 Likert scale)"
  timestamp:
    type: "string"
    format: "date-time"
    description: "Timestamp of the response"
  salience_level:
    type: "string"
    enum: ["Low", "Medium", "High"]
    description: "Categorical value for salience level"
required:
  - response_id
  - participant_id
  - variant_id
  - blame_rating
  - timestamp
  - salience_level
additionalProperties: false
