$schema: http://json-schema.org/draft-07/schema#
title: Response Schema
description: Defines the structure of a single participant response.
type: object
properties:
  response_id:
    type: string
    description: "Unique identifier for the response."
  participant_id:
    type: string
    description: "Unique identifier for the participant."
  stimulus_id:
    type: string
    description: "Identifier of the stimulus presented."
  blame_rating:
    type: integer
    minimum: 1
    maximum: 7
    description: "Blame rating on a 1-7 Likert scale."
  timestamp:
    type: string
    format: date-time
    description: "Timestamp of the response."
required:
  - response_id
  - participant_id
  - stimulus_id
  - blame_rating
  - timestamp
additionalProperties: false
