$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for the output of the Repeated-Measures ANOVA."
type: "object"
properties:
  analysis_id:
    type: "string"
    description: "Unique identifier for the analysis run."
  model_type:
    type: "string"
    enum:
      - "Repeated_Measures_ANOVA"
    description: "Type of statistical model used."
  f_statistic:
    type: "number"
    description: "F-statistic for the main effect of salience."
  p_value:
    type: "number"
    description: "Raw p-value for the main effect of salience."
  p_value_corrected:
    type: "number"
    description: "Bonferroni-corrected p-value."
  effect_size:
    type: "number"
    description: "Partial eta-squared."
  ci_lower:
    type: "number"
    description: "Lower bound of the 95% confidence interval."
  ci_upper:
    type: "number"
    description: "Upper bound of the 95% confidence interval."
  sphericity_violated:
    type: "boolean"
    description: "Whether Mauchly's test indicated a violation of sphericity."
  correction_applied:
    type: "string"
    enum:
      - "none"
      - "greenhouse-geisser"
      - "huynh-feldt"
    description: "The correction applied if sphericity was violated."
required:
  - "analysis_id"
  - "model_type"
  - "f_statistic"
  - "p_value"
  - "p_value_corrected"
  - "effect_size"
  - "ci_lower"
  - "ci_upper"
  - "convergence_status"
additionalProperties: false