%YAML 1.2
---
# Schema for tool validation logs
# Generated for PROJ-089: Investigating the Correlation Between Code Churn and Technical Debt

name: tool_validation_schema
version: 1.0.0
description: >
  Logs the availability, version, and validation status of external tools
  (Radon, Semgrep, PyDriller) used in the pipeline.

file: data/logs/tool_validation_log.csv

fields:
  - name: tool_name
    type: string
    description: Name of the tool being validated
    nullable: false
    enum:
      - Radon
      - Semgrep
      - PyDriller
      - GitHub API
    example: "Radon"

  - name: version
    type: string
    description: Version of the tool detected or installed
    nullable: false
    example: "2.0.0"

  - name: is_available
    type: boolean
    description: Whether the tool is available and executable
    nullable: false
    example: true

  - name: validation_status
    type: string
    description: >
      Validation status based on SC-005 criteria:
      - 'Cited': Matches 'Kitchenham et al. 2009' or 'Meneely et al. 2009' in literature.
      - 'Popular': Has >5,000 GitHub stars (for tools without direct citation).
      - 'Failed': Does not meet criteria.
      - 'Skipped': Validation not performed.
    enum:
      - Cited
      - Popular
      - Failed
      - Skipped
    nullable: false
    example: "Popular"

  - name: citation_reference
    type: string
    description: Citation string if applicable, otherwise null.
    nullable: true
    example: "Meneely et al. 2009"

  - name: star_count
    type: integer
    description: GitHub star count if checked, otherwise null.
    nullable: true
    example: 12500

  - name: validation_timestamp
    type: string
    description: ISO 8601 timestamp of the validation check.
    nullable: false
    format: date-time
    example: "2023-10-27T10:00:00Z"

  - name: error_message
    type: string
    description: Error message if validation failed or tool unavailable.
    nullable: true
    example: "Command 'radon' not found"

constraints:
  - description: "Every run must log at least one entry per required tool."
    tools_required:
      - Radon
      - Semgrep
      - PyDriller

output_path: "data/logs/tool_validation_log.csv"