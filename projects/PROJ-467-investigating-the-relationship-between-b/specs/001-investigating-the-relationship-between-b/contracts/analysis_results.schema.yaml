$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Results Record"
type: object
required:
  - metric_name
  - r_value
  - p_value
  - p_adj
  - vif_flagged
  - sensitivity
  - power_estimate
  - ci_deferred
  - citation_doi
  - analysis_timestamp
properties:
  metric_name:
    type: string
    description: "Name of the network metric (e.g., modularity_q)."
    enum: ["modularity_q", "segregation_index", "mean_connectivity", "dynamic_variance", "flexibility"]
  r_value:
    type: number
    description: "Partial Pearson correlation coefficient with tactile score (covariates adjusted)."
  p_value:
    type: number
    description: "Two‑tailed p‑value before correction."
    minimum: 0
    maximum: 1
  p_adj:
    type: number
    description: "Adjusted p‑value after FDR correction (q ≤ 0.05)."
    minimum: 0
    maximum: 1
  vif_flagged:
    type: boolean
    description: "True if VIF > 5.0 for this metric."
  sensitivity:
    type: object
    description: "Correlation values across sparsity threshold sweeps."
    additionalProperties:
      type: number
  power_estimate:
    type: number
    description: "Statistical power estimate (0–1) from CorrelationPower."
    minimum: 0
    maximum: 1
  ci_deferred:
    type: boolean
    description: "True if confidence intervals are deferred due to low power."
  citation_doi:
    type: string
    description: "DOI or URL of the validated tactile discrimination instrument."
  analysis_timestamp:
    type: string
    format: date-time
    description: "ISO‑8601 timestamp of when the analysis was performed."
definitions:
  network_metric:
    type: object
    required:
      - subject_id
      - modularity_q
      - segregation_index
      - mean_connectivity
      - dynamic_variance
      - flexibility
      - vif_modularity
      - vif_segregation
      - vif_mean_conn
      - vif_dynamic
      - vif_flexibility
      - matrix_path
      - metadata_path
    properties:
      subject_id:
        type: string
        description: "Links to raw_subject."
      modularity_q:
        type: number
        minimum: 0
        maximum: 1
      segregation_index:
        type: number
        minimum: 0
      mean_connectivity:
        type: number
        minimum: 0
      dynamic_variance:
        type: number
        minimum: 0
      flexibility:
        type: number
        minimum: 0
      vif_modularity:
        type: number
        minimum: 1
      vif_segregation:
        type: number
        minimum: 1
      vif_mean_conn:
        type: number
        minimum: 1
      vif_dynamic:
        type: number
        minimum: 1
      vif_flexibility:
        type: number
        minimum: 1
      matrix_path:
        type: string
        description: "Path to the static connectivity matrix (.npy)."
      metadata_path:
        type: string
        description: "Path to JSON file with derivation parameters."