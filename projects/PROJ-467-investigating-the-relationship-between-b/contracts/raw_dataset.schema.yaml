$schema: http://json-schema.org/draft-07/schema#
title: Raw Dataset Schema
description: >
  Schema for validating the raw dataset structure loaded from the HCP Young Adult
  (or alternative) dataset. Ensures presence of required fMRI metadata and tactile
  discrimination measures per FR-007 and data-model.md.
type: object
required:
  - subject_id
  - tactile_score
  - age
  - sex
  - mean_fd
  - scanner_id
  - fmri_data_path
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject.
  tactile_score:
    type: number
    description: >
      Standardized tactile discrimination score (e.g., 2-point discrimination
      threshold in mm, normalized). Must not be NaN.
    minimum: 0
  age:
    type: integer
    description: Age of the subject in years.
    minimum: 18
    maximum: 100
  sex:
    type: string
    enum: ["M", "F", "Male", "Female", "Other"]
    description: Biological sex or gender as recorded in the dataset.
  mean_fd:
    type: number
    description: Mean Framewise Displacement (motion metric).
    minimum: 0
  scanner_id:
    type: string
    description: Identifier for the scanner used (e.g., "HCP_3T").
  fmri_data_path:
    type: string
    description: Relative or absolute path to the preprocessed fMRI NIfTI file.
  acquisition_time:
    type: string
    format: date-time
    description: Timestamp of the fMRI acquisition.
  notes:
    type: string
    description: Optional notes regarding data quality or exclusions.
additionalProperties: true
