$schema: http://json-schema.org/draft-07/schema#
title: Network Metric Schema
description: >
  Schema for validating computed network metrics (static and dynamic) derived
  from fMRI time series using the Schaefer-200 atlas.
type: object
required:
  - subject_id
  - modularity_q
  - segregation_index
  - flexibility
  - timestamp
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject, matching raw_dataset.subject_id.
  modularity_q:
    type: number
    description: >
      Louvain modularity Q value (static). Range typically [0, 1].
    minimum: 0
    maximum: 1
  segregation_index:
    type: number
    description: Global segregation index derived from the static network.
  flexibility:
    type: number
    description: >
      Average flexibility metric across nodes (dynamic). Represents the number
      of community changes per node across sliding windows.
    minimum: 0
  dynamic_modularity_series:
    type: array
    items:
      type: number
    description: >
      Time-series of modularity Q values for each sliding window (optional,
      if dynamic analysis is performed).
  window_length_sec:
    type: integer
    description: Length of the sliding window in seconds.
  step_size_sec:
    type: integer
    description: Step size between windows in seconds.
  atlas:
    type: string
    description: Atlas used for ROI extraction (e.g., "Schaefer-200").
  timestamp:
    type: string
    format: date-time
    description: Timestamp of the metric computation.
  parameters:
    type: object
    description: Dictionary of parameters used for computation (threshold, etc.).
    properties:
      correlation_threshold:
        type: number
        minimum: 0
        maximum: 1
      method:
        type: string
        enum: ["pearson", "spearman"]
additionalProperties: true