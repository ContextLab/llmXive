[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "brainnet"
version = "0.1.0"
description = "Investigating the relationship between brain network dynamics and tactile discrimination"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "nilearn>=0.10.0",
    "networkx>=3.0.0",
    "scikit-learn>=1.2.0",
    "statsmodels>=0.14.0",
    "pingouin>=0.5.0",
    "datasets>=2.14.0",
    "pytest>=7.0.0",
    "jsonschema>=4.0.0",
    "numba>=0.57.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0"
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "isort>=5.12.0"
]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v"
