[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "brainnet"
version = "0.1.0"
description = "Investigating the Relationship Between Brain Network Dynamics and Individual Differences in Tactile Discrimination"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "nilearn>=0.10.2",
    "networkx>=3.2.1",
    "scikit-learn>=1.3.2",
    "statsmodels>=0.14.1",
    "pingouin>=0.5.4",
    "datasets>=2.14.0",
    "jsonschema>=4.19.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "ruff>=0.1.6",
    "black>=23.11.0",
    "isort>=5.12.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["brainnet*"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
