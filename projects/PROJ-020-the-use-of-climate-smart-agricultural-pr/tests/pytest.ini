[pytest]
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# CPU-only execution settings
# Addopts:
#   -v: Verbose output
#   -rs: Show summary of skipped tests
#   --tb=short: Short traceback format
#   --strict-markers: Raise errors for unknown markers
addopts = 
    -v 
    -rs 
    --tb=short 
    --strict-markers
    --maxfail=1
    -n auto

# Timeout settings to prevent hanging tests in CI
# timeout = 600

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    contract: marks tests as contract tests
    cpu_only: marks tests that must run on CPU only (default)
