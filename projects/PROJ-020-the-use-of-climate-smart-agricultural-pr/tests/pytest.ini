[pytest]
# Pytest configuration for llmXive CSA Food Security project
# Enforces CPU-only execution and headless plotting

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Ignore specific directories
norecursedirs = .* build dist venv .venv env .git

# Addopts:
# -v: Verbose output
# -ra: Show extra test summary info
# -x: Stop running tests after the first failure
# --tb=short: Short traceback format
# --strict-markers: Raise errors for unknown markers
# -p no:warnings: Suppress warnings to keep output clean (optional)
# --cov=code: Enable coverage reporting for the code directory (optional, requires pytest-cov)
addopts = -v -ra -x --tb=short --strict-markers -p no:warnings

# Markers
# We define markers here to ensure they are recognized.
# cpu_only: Explicitly marks a test as intended for CPU execution.
markers =
    cpu_only: marks test as CPU-only (deselect with '-m "not cpu_only"')
    slow: marks test as slow (deselect with '-m "not slow"')
    integration: marks test as an integration test
    unit: marks test as a unit test
    contract: marks test as a contract test

# Filter warnings to reduce noise
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*numpy.ufunc size changed.*:RuntimeWarning
