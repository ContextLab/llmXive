$schema: http://json-schema.org/draft-07/schema#
title: Model Output Schema
description: Schema for the statistical model results, mediation analysis, and robustness checks.
type: object
required:
  - model_id
  - coefficients
  - p_values
  - p_values_corrected
  - vif_scores
  - robustness_metrics
properties:
  model_id:
    type: string
    format: uuid
    description: "Unique identifier for the model run"
  model_type:
    type: string
    enum:
      - Fixed-Effects Regression
    description: "Type of model fitted"
  coefficients:
    type: object
    description: "Standardized coefficient estimates"
    additionalProperties:
      type: number
  std_errors:
    type: object
    description: "Standard errors for coefficients"
    additionalProperties:
      type: number
  p_values:
    type: object
    description: "Raw p-values"
    additionalProperties:
      type: number
      minimum: 0
      maximum: 1
  p_values_corrected:
    type: object
    description: "Bonferroni corrected p-values"
    additionalProperties:
      type: number
      minimum: 0
      maximum: 1
  vif_scores:
    type: object
    description: "Variance Inflation Factors for predictors"
    additionalProperties:
      type: number
      minimum: 1
  fixed_effects:
    type: object
    description: "Fixed effect coefficients for Country Dummies"
    properties:
      KEN:
        type: number
      IND:
        type: number
      VNM:
        type: number
  robustness_metrics:
    type: object
    description: "Results from robustness checks"
    properties:
      leave_one_country_out_variance:
        type: number
        description: "Variance estimate from leave-one-country-out"
      sensitivity_threshold_variance:
        type: number
        description: "Variance in significance rates across CSA thresholds (0.2-0.8)"
  warnings:
    type: array
    items:
      type: string
    description: "List of warnings (e.g., VIF > 5.0, missing data)"
  provenance:
    type: object
    description: "Mapping of derived variables to raw data sources"
    properties:
      data_source:
        type: string
      sample_size:
        type: integer
      random_seed:
        type: integer