$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Dataset Schema"
type: "object"
properties:
  household_id:
    type: "string"
    description: "Unique household identifier from LSMS"
  country:
    type: "string"
    description: "ISO 3 country code (e.g., 'KEN', 'IND', 'VNM')"
  year:
    type: "integer"
    description: "Survey year"
  hdds:
    type: "number"
    description: "Household Dietary Diversity Score"
  csa_index:
    type: "number"
    description: "CSA adoption index (0.0 to 1.0, including agricultural practices, digital, and finance access)"
  temp_anomaly:
    type: "number"
    description: "Temperature anomaly in °C"
  precip_anomaly:
    type: "number"
    description: "Precipitation anomaly in mm"
  digital_access:
    type: "number"
    description: "Digital access indicator (binary/ordinal)"
  finance_access:
    type: "number"
    description: "Finance access indicator (binary/ordinal)"
  interaction_digital:
    type: "number"
    description: "Interaction term (csa_index * digital_access)"
  interaction_finance:
    type: "number"
    description: "Interaction term (csa_index * finance_access)"
  provenance_id:
    type: "string"
    description: "Mapping to raw survey response IDs (or composite key household_id + variable_name)"
required:
  - "household_id"
  - "country"
  - "year"
  - "hdds"
  - "csa_index"
  - "temp_anomaly"
  - "precip_anomaly"
  - "digital_access"
  - "finance_access"
  - "interaction_digital"
  - "interaction_finance"
  - "provenance_id"
additionalProperties: false