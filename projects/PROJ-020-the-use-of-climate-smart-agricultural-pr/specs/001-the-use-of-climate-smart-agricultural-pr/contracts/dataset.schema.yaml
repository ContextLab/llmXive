$schema: "http://json-schema.org/draft-07/schema#"
title: "CSA Food Security Analysis Dataset Schema"
description: |
  Base schema for the merged, cleaned, and sampled dataset used in the
  analysis of Climate-Smart Agricultural (CSA) practices and food security.
  Derived from LSMS (household/survey), FAOSTAT (national indicators), and
  NASA POWER (climate) sources.
type: object
required:
  - metadata
  - columns
  - primary_keys
  - constraints
properties:
  metadata:
    type: object
    properties:
      version:
        type: string
        description: Schema version (e.g., "1.0.0")
      source_datasets:
        type: array
        items:
          type: string
        description: List of source dataset identifiers (e.g., "LSMS-KEN-2021", "FAOSTAT", "NASA-POWER")
      generated_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of schema generation
      target_countries:
        type: array
        items:
          type: string
        description: ISO 3166-1 alpha-3 country codes included (e.g., ["KEN", "IND", "VNM"])
      target_years:
        type: array
        items:
          type: integer
        description: Range of survey years included
    required:
      - version
      - source_datasets
      - generated_at
      - target_countries
      - target_years

  columns:
    type: array
    description: List of column definitions in the final dataset
    items:
      type: object
      required:
        - name
        - dtype
        - description
        - source
      properties:
        name:
          type: string
          description: Column name in the final dataset
        dtype:
          type: string
          enum:
            - int64
            - float64
            - object
            - bool
            - datetime64[ns]
          description: Pandas-compatible data type
        nullable:
          type: boolean
          default: false
          description: Whether the column allows missing values
        description:
          type: string
          description: Human-readable description of the variable
        source:
          type: object
          properties:
            dataset:
              type: string
              description: Source dataset name (e.g., "LSMS", "FAOSTAT", "NASA-POWER")
            original_field:
              type: string
              description: Original field name in the source dataset
            transformation:
              type: string
              description: Description of any transformation applied (e.g., "mean of growing season", "log10")
          required:
            - dataset
            - original_field
        categories:
          type: array
          items:
            type: string
          description: List of valid categories for categorical columns (optional)

  primary_keys:
    type: array
    items:
      type: string
    description: List of column names that form the composite primary key
    default:
      - country_code
      - year
      - household_id

  constraints:
    type: object
    properties:
      unique_combinations:
        type: array
        items:
          type: array
          items:
            type: string
        description: List of column sets that must be unique (e.g., ["country_code", "year", "household_id"])
      value_ranges:
        type: array
        items:
          type: object
          properties:
            column:
              type: string
            min:
              type: number
            max:
              type: number
            unit:
              type: string
        description: Valid value ranges for numeric columns
      required_fields:
        type: array
        items:
          type: string
        description: Columns that must not be null after imputation
      derived_variables:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            formula:
              type: string
            description:
              type: string
        description: List of variables derived from other columns (e.g., CSA Index)

# Example Column Definitions (to be populated by clean.py)
# These represent the expected structure after T015-T017 processing:
example_columns:
  - name: country_code
    dtype: object
    description: ISO 3166-1 alpha-3 country code
    source:
      dataset: LSMS
      original_field: country_code
    nullable: false
  - name: year
    dtype: int64
    description: Survey year
    source:
      dataset: LSMS
      original_field: survey_year
    nullable: false
  - name: household_id
    dtype: object
    description: Unique household identifier within country-year
    source:
      dataset: LSMS
      original_field: sample_id
    nullable: false
  - name: latitude
    dtype: float64
    description: Household latitude (WGS84)
    source:
      dataset: LSMS
      original_field: geo_latitude
    nullable: true
  - name: longitude
    dtype: float64
    description: Household longitude (WGS84)
    source:
      dataset: LSMS
      original_field: geo_longitude
    nullable: true
  - name: csa_index
    dtype: float64
    description: Weighted composite CSA adoption score (0.0 to 1.0)
    source:
      dataset: Derived
      original_field: N/A
      transformation: "Weighted sum of conservation_tillage, crop_diversity, irrigation_efficiency"
    nullable: true
  - name: food_security_score
    dtype: float64
    description: Standardized food security outcome metric
    source:
      dataset: LSMS
      original_field: hhs_foodscore
    nullable: true
  - name: climate_precipitation
    dtype: float64
    description: Average precipitation (mm) during growing season (3 months prior to harvest)
    source:
      dataset: NASA-POWER
      original_field: PRECTOT
      transformation: "Mean over growing season window"
    nullable: true
  - name: climate_temperature
    dtype: float64
    description: Average temperature (°C) during growing season
    source:
      dataset: NASA-POWER
      original_field: TEMP
      transformation: "Mean over growing season window"
    nullable: true
  - name: digital_access
    dtype: float64
    description: Digital technology access index (moderator)
    source:
      dataset: LSMS
      original_field: digital_idx
    nullable: true
  - name: finance_access
    dtype: float64
    description: Financial access index (moderator)
    source:
      dataset: LSMS
      original_field: finance_idx
    nullable: true
  - name: faostat_yield
    dtype: float64
    description: National crop yield (tonnes/ha) from FAOSTAT
    source:
      dataset: FAOSTAT
      original_field: Yield
      transformation: "Mapped to country-year"
    nullable: true