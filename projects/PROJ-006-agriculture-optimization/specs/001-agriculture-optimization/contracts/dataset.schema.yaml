$schema: "http://json-schema.org/draft-07/schema#"
title: "CSA Dataset Schema"
description: "Schema for validating input datasets in climate-smart agriculture pipeline"
type: "object"
properties:
  household:
    type: "object"
    required:
      - "household_id"
      - "pilot_id"
      - "household_size"
    properties:
      household_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
        description: "Unique household identifier (UUID format)"
      pilot_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
        description: "Foreign key reference to pilot_region"
      latitude:
        type: "number"
        minimum: -90
        maximum: 90
        description: "Geographic latitude coordinate"
      longitude:
        type: "number"
        minimum: -180
        maximum: 180
        description: "Geographic longitude coordinate"
      household_size:
        type: "integer"
        minimum: 1
        description: "Number of household members"
      income_level:
        type: "string"
        enum:
          - "low"
          - "medium"
          - "high"
        description: "Household income bracket"
      farmer_experience_years:
        type: "integer"
        minimum: 0
        description: "Years of farming experience"
      irrigation_access:
        type: "string"
        enum:
          - "none"
          - "rainfed"
          - "irrigated"
        description: "Irrigation access type"
      market_distance_km:
        type: "number"
        minimum: 0
        description: "Distance to nearest market in kilometers"
  survey_response:
    type: "object"
    required:
      - "response_id"
      - "household_id"
      - "survey_date"
    properties:
      response_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      household_id:
        type: "string"
        description: "Foreign key reference to household"
      survey_date:
        type: "string"
        format: "date"
        description: "Date of survey administration"
      food_security_index_id:
        type: "string"
        description: "Foreign key reference to food_security_index_components"
      survey_version:
        type: "string"
        description: "Survey instrument version"
  farm_plot:
    type: "object"
    required:
      - "plot_id"
      - "household_id"
      - "area_hectares"
    properties:
      plot_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      household_id:
        type: "string"
        description: "Foreign key reference to household"
      area_hectares:
        type: "number"
        exclusiveMinimum: 0
        description: "Farm plot size in hectares"
      soil_type:
        type: "string"
        description: "Soil classification"
      elevation_meters:
        type: "integer"
        description: "Elevation above sea level"
  climate_observation:
    type: "object"
    required:
      - "observation_id"
      - "pilot_id"
      - "observation_date"
    properties:
      observation_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      pilot_id:
        type: "string"
        description: "Foreign key reference to pilot_region"
      observation_date:
        type: "string"
        format: "date"
      temperature_celsius:
        type: "number"
        description: "Mean daily temperature"
      precipitation_mm:
        type: "number"
        minimum: 0
        description: "Daily rainfall in millimeters"
      drought_index:
        type: "number"
        minimum: 0
        maximum: 10
        description: "Drought severity index (0-10 scale)"
  csa_practice:
    type: "object"
    required:
      - "practice_id"
      - "plot_id"
      - "practice_type"
    properties:
      practice_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      plot_id:
        type: "string"
        description: "Foreign key reference to farm_plot"
      practice_type:
        type: "string"
        description: "Type of climate-smart practice"
      adoption_date:
        type: "string"
        format: "date"
        description: "Date of practice adoption"
  yield_measurement:
    type: "object"
    required:
      - "measurement_id"
      - "plot_id"
      - "measurement_date"
      - "yield_kg_per_hectare"
      - "measurement_method"
    properties:
      measurement_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      plot_id:
        type: "string"
        description: "Foreign key reference to farm_plot"
      measurement_date:
        type: "string"
        format: "date"
      growing_season:
        type: "string"
        description: "Season identifier"
      yield_kg_per_hectare:
        type: "number"
        exclusiveMinimum: 0
        description: "Yield in kg per hectare"
      crop_type:
        type: "string"
        description: "Crop variety"
      measurement_method:
        type: "string"
        enum:
          - "self_report"
          - "actual_measurement"
          - "remote_sensing"
        description: "Method used to obtain yield measurement"
  remote_sensing:
    type: "object"
    required:
      - "imagery_id"
      - "capture_date"
    properties:
      imagery_id:
        type: "string"
        pattern: "^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$"
      plot_id:
        type: "string"
        description: "Optional foreign key to farm_plot"
      capture_date:
        type: "string"
        format: "date"
      ndvi_value:
        type: "number"
        minimum: -1
        maximum: 1
        description: "Normalized Difference Vegetation Index"
      land_cover_class:
        type: "string"
        description: "Land cover classification"
required:
  - "household"
  - "survey_response"
  - "farm_plot"
  - "climate_observation"
  - "csa_practice"
  - "yield_measurement"
additionalProperties: false