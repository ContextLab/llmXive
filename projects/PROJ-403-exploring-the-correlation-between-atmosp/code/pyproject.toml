[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-atmospheric-river-analysis"
version = "0.1.0"
description = "Exploring the Correlation Between Atmospheric River Frequency and Global Geopotential Height Variability"
requires-python = ">=3.11"
dependencies = [
    "xarray>=2023.9.0",
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "scipy>=1.11.0",
    "statsmodels>=0.14.0",
    "matplotlib>=3.8.0",
    "cartopy>=0.22.0",
    "netCDF4>=1.6.5",
    "cftime>=1.6.2",
    "dask[complete]>=2023.9.0",
    "h5netcdf>=0.14.0",
    "requests>=2.31.0",
    "tqdm>=4.66.0",
    "nitime>=0.10.0",
    "pytest>=7.4.0",
    "pytest-cov",
    "cdsapi>=0.7.0",
    "pyyaml>=6.0",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.ruff]
line-length = 88
target-version = "py311"
select = ["E", "F", "W", "I"]
ignore = []

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
addopts = "-v --cov=src --cov-report=term-missing"
