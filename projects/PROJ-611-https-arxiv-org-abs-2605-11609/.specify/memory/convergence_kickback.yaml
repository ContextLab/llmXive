- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: methodology-6f050e36
  location: research.md:Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'The plan explicitly states: ''With only 50 samples and 1-100 steps, this
    is not a statistical power study... We cannot claim improvement in the statistical
    sense.'' However, the spec (FR-005) and plan (Summary) claim the output will ''verify
    the core AntiSD mechanism'' and ''contrast observed behavior with the paper''s
    claims'' regarding performance gains (e.g., ''2-10x fewer steps''). A single-step
    or 100-step run on 50 samples cannot validate a claim about convergence speed
    or accuracy improvement over a baseline. The methodology (functional check) does
    not support the intended conclusion (performance validation).'
- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: methodology-504d7248
  location: research.md:Dataset Strategy
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan notes GSM8k lacks explicit 'reasoning traces' and proposes to 'treat
    the answer as the trace or generate a dummy trace.' The AntiSD mechanism relies
    on 'Pointwise Mutual Information' and 'divergence' between student and teacher
    outputs. If the 'reasoning trace' is a dummy string or the answer is just a final
    number, the entropy and divergence calculations will be mathematically invalid
    or meaningless, failing to measure the intended construct of 'reasoning quality'.
- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: methodology-ad647c79
  location: plan.md:Technical Context
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan proposes using a 'small/quantized model' (e.g., TinyLlama) as a fallback
    if the target model exceeds RAM. The AntiSD mechanism is highly sensitive to model
    capacity and the specific architecture of the teacher/student pair. Substituting
    the paper's specified model (likely 4B/8B) with a 1B model changes the underlying
    hypothesis being tested. The plan does not address how this substitution affects
    the validity of the 'AntiSD' claim, which may not hold for smaller models.
- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: data_resources-a6073711
  location: research.md:Dataset Strategy
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The plan cites 'NO verified source found' for the CPU-Safe Model and proposes
    a fallback strategy to 'TinyLlama' or 'Qwen-1.8B' without a specific, verified
    URL or accession ID. The upstream dataset resolver guarantees URL reachability
    for *cited* datasets; a plan that admits it has no verified source for a critical
    resource (the model weights) fails the 'Datasets are real' constraint. The plan
    must identify a specific, accessible model repository (e.g., a specific HuggingFace
    model ID with a verified URL) before execution, rather than assuming one exists
    or will be found at runtime.
- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: data_resources-57147b3a
  location: research.md:Dataset Strategy
  reviewer: data_resources
  round: 1
  severity: methodology
  text: The GSM8k citation points to a specific parquet file URL (`.../test-00000-of-00001.parquet`).
    While the URL may reach, the plan assumes this single file contains the necessary
    'reasoning trace' or 'Chain-of-Thought' data. GSM8k's standard `test` split typically
    contains only `question` and `answer` (final solution), lacking the explicit step-by-step
    reasoning traces required by the AntiSD mechanism (which relies on divergence
    between student and teacher traces). If the dataset lacks the required modality
    (reasoning traces), the dataset is inappropriate for the research question regardless
    of URL reachability. The plan must verify the specific GSM8k variant (e.g., `gsm8k-cot`
    or a specific processed version) that actually contains the trace data, or explicitly
    state how traces will be synthesized if the raw dataset lacks them.
