- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: plan_consistency-48ffa61d
  location: plan.md:Project Structure
  reviewer: plan_consistency
  round: 1
  severity: writing
  text: The 'Project Structure' lists `scripts/install_vllm_sglang_mcore.sh` as a
    modified script for CPU-only. However, the 'Technical Context' states 'No CUDA/GPU'
    and 'No model weights > 2GB'. The script name implies dependencies on vLLM, SGLang,
    and MCore which are typically GPU-accelerated frameworks. The plan does not explain
    how these specific heavy dependencies are 'replaced or bypassed' to run on CPU
    without crashing, creating a potential conflict with FR-001 (CPU Env) and the
    'Compute Feasibility' principle. The plan asserts they are replaced but does not
    detail the replacement mechanism (e.g., 'using standard transformers instead of
    vLLM').
- artifact: projects/PROJ-611-https-arxiv-org-abs-2605-11609/specs/001-https-arxiv-org-abs-2605-11609/plan.md
  id: plan_consistency-daddd845
  location: plan.md:Constitution Check
  reviewer: plan_consistency
  round: 1
  severity: writing
  text: Principle 4 (Dataset Fit) mentions a 'fallback to a smaller quantized model'
    as per 'Assumption'. However, the 'Assumptions' section in `spec.md` (which the
    plan claims to address) does not explicitly mandate a 'quantized' model, only
    a 'small, CPU-tractable model'. The plan introduces the specific term 'quantized'
