$schema: "http://json-schema.org/draft-07/schema#"
title: "Preprocessed GSM8k-cot Dataset Schema"
description: "Schema for the sample GSM8k-cot-v1.0 subset used in the AntiSD validation loop. Contains explicit Chain-of-Thought traces. Aborts if 'reasoning_trace' is missing."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the sample."
  prompt:
    type: "string"
    description: "The math question text."
  solution:
    type: "string"
    description: "The final answer."
  reasoning_trace:
    type: "string"
    description: "Chain-of-Thought steps derived from the 'cot' field. Must be non-empty."
required:
  - id
  - prompt
  - solution
  - reasoning_trace
additionalProperties: false