# Ruff configuration for PROJ-332
line-length = 88
target-version = "py311"

[lint]
# Enforce specific rules required by the project
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
]
ignore = [
    "E501", # Line too long (handled by black)
]

# Specific rule enforcement requested in T003b
# E402: module level import not at top of file (enforced)
# F401: imported but unused (enforced)
# W293: blank line contains whitespace (enforced)
extend-select = [
    "E402",
    "F401",
    "W293",
]

[lint.isort]
force-single-line = false
lines-after-imports = 2

[lint.per-file-ignores]
"tests/*" = ["F401"]
