$schema: "http://json-schema.org/draft-07/schema#"
title: "Simulation Result Schema"
description: "Schema defining the structure of the simulation results CSV output."
type: object
properties:
  seed:
    type: integer
    description: "Random seed used for the simulation generation."
  N:
    type: integer
    description: "Number of nodes in the generated network."
  p:
    type: number
    format: float
    description: "Connection probability used in the network generation."
  avg_degree:
    type: number
    format: float
    description: "Average degree of the generated network."
  conductivity:
    type: number
    format: float
    description: "Calculated effective thermal conductivity in W/(m·K)."
  percolation_flag:
    type: boolean
    description: "True if the network is percolated (connected component covers >= 80% of nodes), False otherwise."
  scaling_factor:
    type: number
    format: float
    description: "Scaling factor applied during size-correction (Fuchs-Sondheimer) or other normalization steps."
required:
  - seed
  - N
  - p
  - avg_degree
  - conductivity
  - percolation_flag
  - scaling_factor
additionalProperties: false
csv_columns:
  - seed
  - N
  - p
  - avg_degree
  - conductivity
  - percolation_flag
  - scaling_factor