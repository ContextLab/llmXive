$schema: http://json-schema.org/draft-07/schema#
title: StatisticalReport
description: Schema for the final statistical analysis report generated by the pipeline.
type: object
properties:
  report_id:
    type: string
    description: "Unique identifier for this report instance."
  test_type:
    type: string
    description: "Type of statistical test performed (e.g., ancova, t_test, correlation, regression)."
    enum:
      - ancova
      - t_test
      - correlation
      - regression
  test_statistic:
    type: number
    description: "The primary test statistic value (F-statistic or t-statistic)."
  p_value:
    type: number
    description: "The p-value of the test."
  effect_size:
    type: number
    description: "The calculated effect size (e.g., Cohen's d, eta-squared)."
  confidence_interval_lower:
    type: number
    description: "Lower bound of the 95% confidence interval."
  confidence_interval_upper:
    type: number
    description: "Upper bound of the 95% confidence interval."
  covariate_coefficients:
    type: object
    description: "Coefficients for control variables in the model."
    additionalProperties:
      type: number
  correction_applied:
    type: string
    description: "Method used for multiple comparison correction (e.g., bonferroni, tukey_hsd)."
  power_estimate:
    type:
      - number
      - "null"
    description: "Estimated statistical power of the test (achieved power, not post-hoc)."
  r_squared:
    type:
      - number
      - "null"
    description: "R-squared value for regression analysis (SC-004)."
  conclusion:
    type: string
    description: "Text summary of the finding (e.g., 'Significant difference found', 'No statistically significant difference')."
required:
  - report_id
  - test_type
  - test_statistic
  - p_value
  - effect_size
  - confidence_interval_lower
  - confidence_interval_upper
  - correction_applied
  - conclusion
additionalProperties: false