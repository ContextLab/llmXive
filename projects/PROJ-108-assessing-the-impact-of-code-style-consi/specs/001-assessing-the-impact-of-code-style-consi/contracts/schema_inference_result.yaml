$schema: http://json-schema.org/draft-07/schema#
title: InferenceResult
description: Schema for the output of an LLM inference run on a code sample.
type: object
properties:
  sample_id:
    type: string
    description: "Reference to the source CodeSample file_path."
  model_version:
    type: string
    description: "Identifier of the model used (e.g., starcoder-1b)."
  generated_summary:
    type:
      - string
      - "null"
    description: "The generated text summary (max 64 tokens)."
  predicted_bug_line:
    type:
      - integer
      - "null"
    description: "The predicted line number of the bug (null if not applicable)."
  inference_time_ms:
    type:
      - number
      - "null"
    description: "Time taken for inference in milliseconds."
  status:
    type: string
    description: "Status of the inference run."
    enum:
      - success
      - timeout
      - oom
      - error
required:
  - sample_id
  - model_version
  - status
additionalProperties: false
