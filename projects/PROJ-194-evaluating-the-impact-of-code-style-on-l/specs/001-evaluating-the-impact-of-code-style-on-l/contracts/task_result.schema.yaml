$schema: "http://json-schema.org/draft-07/schema#"
title: "Task Result Schema"
description: "Schema for LLM task execution results stored in data/derived/results/"
type: object
properties:
  result_id:
    type: string
    description: "Unique identifier for the result"
  variant_id:
    type: string
    description: "Reference to the style variant"
  task_type:
    type: string
    enum:
      - "completion"
      - "bug_detection"
      - "summarization"
    description: "The specific LLM task executed"
  input_prompt:
    type: string
    description: "The prompt sent to the LLM"
  generated_output:
    type: string
    description: "The text generated by the LLM"
  ground_truth:
    type: string
    description: "The reference output for metric calculation"
  metrics:
    type: object
    properties:
      exact_match:
        type: number
        minimum: 0
        maximum: 1
        description: "Exact match score (0 or 1)"
      codebleu:
        type: number
        minimum: 0
        maximum: 1
        description: "CodeBLEU score"
      precision:
        type: number
        minimum: 0
        maximum: 1
        description: "Precision for bug detection"
      recall:
        type: number
        minimum: 0
        maximum: 1
        description: "Recall for bug detection"
      f1:
        type: number
        minimum: 0
        maximum: 1
        description: "F1 score for bug detection"
      rouge_l:
        type: number
        minimum: 0
        maximum: 1
        description: "ROUGE-L score for summarization"
      bleu:
        type: number
        minimum: 0
        maximum: 1
        description: "BLEU score for summarization"
    required:
      - exact_match
      - codebleu
      - precision
      - recall
      - f1
      - rouge_l
      - bleu
  status:
    type: string
    enum:
      - "success"
      - "timeout"
      - "error"
    description: "Execution status"
  mutation_type:
    type: string
    description: "Specific mutation type for bug detection (e.g., 'variable_swap')"
required:
  - result_id
  - variant_id
  - task_type
  - generated_output
  - ground_truth
  - metrics
  - status
additionalProperties: false
