$schema: "http://json-schema.org/draft-07/schema#"
title: "Statistical Result Schema"
description: "Schema for the output of the mixed-effects model analysis."
type: "object"
properties:
  factor:
    type: "string"
    description: "Name of the style factor."
  estimate:
    type: "number"
    description: "Coefficient estimate."
  std_error:
    type: "number"
    description: "Standard error."
  t_value:
    type: "number"
    description: "t-statistic or z-statistic."
  p_value:
    type: "number"
    description: "p-value."
  p_value_corrected:
    type: "number"
    description: "Bonferroni-corrected p-value."
  effect_size:
    type: "number"
    description: "Effect size (eta-squared or odds ratio)."
  model_type:
    type: "string"
    description: "Type of model used (e.g., GLMM-Binomial, LMM-Gaussian)."
  covariate_token_count:
    type: "boolean"
    description: "True if token_count was included as a covariate in the model."
required:
  - factor
  - estimate
  - std_error
  - t_value
  - p_value
  - p_value_corrected
  - effect_size
  - model_type
  - covariate_token_count
additionalProperties: false