$schema: "http://json-schema.org/draft-07/schema#"
title: AnalysisOutput
description: Schema for the final aggregated analysis report and summary tables.
type: object
required:
  - report_id
  - generated_at
  - summary_statistics
  - semantic_opacity_analysis
  - correlation_analysis
  - files_generated
properties:
  report_id:
    type: string
    description: Unique identifier for the final report.
  generated_at:
    type: string
    format: date-time
    description: Timestamp of report generation.
  summary_statistics:
    type: object
    description: High-level summary of the study results.
    properties:
      total_functions:
        type: integer
      total_variants:
        type: integer
      total_tasks_executed:
        type: integer
      overall_success_rate:
        type: number
  semantic_opacity_analysis:
    type: object
    description: Specific comparison results for the "Semantic Opacity" condition vs baseline.
    properties:
      opacity_group_mean:
        type: number
      baseline_group_mean:
        type: number
      difference:
        type: number
      p_value:
        type: number
      is_significant:
        type: boolean
  correlation_analysis:
    type: object
    description: Analysis of token count vs performance drop.
    properties:
      correlation_coefficient:
        type: number
      p_value:
        type: number
      description:
        type: string
  files_generated:
    type: array
    description: List of output files produced by this analysis.
    items:
      type: object
      properties:
        path:
          type: string
        type:
          type: string
          enum: ["pdf", "csv", "json"]
        size_bytes:
          type: integer