[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-eval-code-style"
version = "0.1.0"
description = "Evaluating the Impact of Code Style on LLM Code Understanding and Generation"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "datasets",
    "transformers",
    "scikit-learn",
    "statsmodels",
    "black",
    "rouge-score",
    "codebleu",
    "pytest",
    "ruff",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
    "pytest-cov",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]

[tool.ruff]
# Target Python version
target-version = "py39"

# Line length matching Black's default
line-length = 88

# Exclude directories
exclude = [
    ".git",
    ".tox",
    "__pycache__",
    "data",
    "results",
    "build",
    "dist",
]

[tool.ruff.lint]
# Select specific rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
]

# Ignore specific rules if necessary
ignore = [
    "E501", # Line too long (handled by formatter)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
]

[tool.ruff.lint.isort]
known-first-party = ["code"]

[tool.ruff.format]
# Use double quotes like Black
quote-style = "double"
# Indent with spaces like Black
indent-style = "space"
# Skip magic trailing comma like Black (default)
skip-magic-trailing-comma = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
    "*_test.py",
]
python_functions = [
    "test_*",
]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Marks tests as slow",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["code"]
branch = true
omit = [
    "tests/*",
    "*/__init__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]