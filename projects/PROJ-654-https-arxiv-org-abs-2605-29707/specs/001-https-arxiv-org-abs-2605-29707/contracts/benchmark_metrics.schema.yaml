$schema: http://json-schema.org/draft-07/schema#
title: Benchmark Metrics Schema
description: Schema for the raw metrics output from the Domino benchmark execution (aggregated over n=10 runs).
type: object
required:
  - model_name
  - draft_model_name
  - target_model_name
  - hardware
  - baseline_latency_ms
  - domino_latency_ms
  - speedup_ratio
  - acceptance_rate
  - total_tokens
  - prompt_count
  - run_count
  - timestamp
  - status
properties:
  model_name:
    type: string
    description: "Name of the target model used (e.g., 'Qwen2-1.8B')"
  draft_model_name:
    type: string
    description: "Name of the draft model used (e.g., 'Qwen2-0.5B')"
  target_model_name:
    type: string
    description: "Name of the target model used (e.g., 'Qwen2-1.8B')"
  hardware:
    type: object
    required:
      - cpu_cores
      - ram_gb
    properties:
      cpu_cores:
        type: integer
        description: "Number of CPU cores available"
      ram_gb:
        type: number
        description: "Total RAM in GB"
  baseline_latency_ms:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean baseline latency (ms)"
        minimum: 0
      std:
        type: number
        description: "Standard deviation of baseline latency (ms)"
      min:
        type: number
        description: "Minimum baseline latency (ms)"
      max:
        type: number
        description: "Maximum baseline latency (ms)"
  domino_latency_ms:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean Domino latency (ms)"
        minimum: 0
      std:
        type: number
        description: "Standard deviation of Domino latency (ms)"
      min:
        type: number
        description: "Minimum Domino latency (ms)"
      max:
        type: number
        description: "Maximum Domino latency (ms)"
  tokens_per_second_baseline:
    type: object
    properties:
      mean:
        type: number
        description: "Mean baseline throughput (tokens/sec)"
      std:
        type: number
        description: "Standard deviation of baseline throughput"
  tokens_per_second_domino:
    type: object
    properties:
      mean:
        type: number
        description: "Mean Domino throughput (tokens/sec)"
      std:
        type: number
        description: "Standard deviation of Domino throughput"
  speedup_ratio:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean speedup (baseline_latency / domino_latency)"
      std:
        type: number
        description: "Standard deviation of speedup"
      min:
        type: number
        description: "Minimum speedup"
      max:
        type: number
        description: "Maximum speedup"
  acceptance_rate:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean acceptance rate (fraction of draft tokens accepted)"
        minimum: 0
        maximum: 1
      std:
        type: number
        description: "Standard deviation of acceptance rate"
      min:
        type: number
        description: "Minimum acceptance rate"
      max:
        type: number
        description: "Maximum acceptance rate"
  total_tokens:
    type: integer
    description: "Total number of tokens generated"
    minimum: 0
  prompt_count:
    type: integer
    description: "Number of prompts processed"
    minimum: 1
  run_count:
    type: integer
    description: "Number of independent runs (n=10)"
    minimum: 1
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the run"
  status:
    type: string
    enum:
      - success
      - failed
    description: "Execution status"
  error_message:
    type: string
    description: "Error details if status is failed"
    default: ""
additionalProperties: false