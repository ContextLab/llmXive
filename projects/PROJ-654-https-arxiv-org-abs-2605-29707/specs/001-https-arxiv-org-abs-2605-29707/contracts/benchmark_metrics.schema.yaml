$schema: http://json-schema.org/draft-07/schema#
title: Benchmark Metrics Artifact
description: "Structured output from the Domino benchmark run, containing latency and speedup metrics."
type: object
required:
  - run_id
  - timestamp
  - environment
  - peak_memory_mb
  - baseline
  - domino
  - speedup_ratio
  - per_prompt_speedup
  - aggregated
  - status
properties:
  run_id:
    type: string
    description: "Unique identifier for the benchmark run."
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of the run."
  environment:
    type: object
    required:
      - torch_version
      - transformers_version
      - python_version
    properties:
      torch_version:
        type: string
        description: "Version of PyTorch used."
      transformers_version:
        type: string
        description: "Version of Transformers used."
      python_version:
        type: string
        description: "Version of Python used."
  peak_memory_mb:
    type: number
    minimum: 0
    description: "Peak RAM usage in MB during the run."
  baseline:
    type: object
    required:
      - total_latency_seconds
      - tokens_per_second
      - total_tokens
    properties:
      total_latency_seconds:
        type: number
        description: "Total latency for the baseline run."
      tokens_per_second:
        type: number
        description: "Tokens per second for the baseline run."
      total_tokens:
        type: integer
        description: "Total tokens generated."
  domino:
    type: object
    required:
      - total_latency_seconds
      - tokens_per_second
      - total_tokens
    properties:
      total_latency_seconds:
        type: number
        description: "Total latency for the Domino run."
      tokens_per_second:
        type: number
        description: "Tokens per second for the Domino run."
      total_tokens:
        type: integer
        description: "Total tokens generated."
  speedup_ratio:
    type: number
    description: "Calculated speedup ratio (Baseline Latency / Domino Latency) - Mean of all runs."
  per_prompt_speedup:
    type: array
    items:
      type: number
    description: "Speedup ratio for each individual prompt."
  aggregated:
    type: object
    required:
      - mean
      - std
      - min
      - max
      - ci_95
    properties:
      mean:
        type: number
      std:
        type: number
      min:
        type: number
      max:
        type: number
      ci_95:
        type: array
        items:
          type: number
        description: "95% Confidence Interval [lower, upper]."
  status:
    type: string
    enum:
      - success
      - timeout
      - oom
    description: "Status of the benchmark run."