$schema: http://json-schema.org/draft-07/schema#
title: Benchmark Metrics Schema
description: Schema for the aggregated metrics output from the Domino benchmark (mean over n runs).
type: object
required:
  - model_name
  - draft_model_name
  - baseline_latency_ms
  - domino_latency_ms
  - speedup_ratio
  - acceptance_rate
  - total_tokens
  - prompt_count
  - run_count
  - peak_ram_gb
  - library_versions
  - timestamp
  - status
properties:
  model_name:
    type: string
    description: "Name of the target model used (e.g., 'Qwen2-1.8B')"
  draft_model_name:
    type: string
    description: "Name of the draft model used (e.g., 'Qwen2-0.5B')"
  baseline_latency_ms:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean baseline latency (ms)"
        minimum: 0
      std:
        type: number
        description: "Standard deviation of baseline latency (ms)"
      min:
        type: number
        description: "Minimum baseline latency (ms)"
        minimum: 0
      max:
        type: number
        description: "Maximum baseline latency (ms)"
        minimum: 0
  domino_latency_ms:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean Domino latency (ms)"
        minimum: 0
      std:
        type: number
        description: "Standard deviation of Domino latency (ms)"
        minimum: 0
      min:
        type: number
        description: "Minimum Domino latency (ms)"
        minimum: 0
      max:
        type: number
        description: "Maximum Domino latency (ms)"
        minimum: 0
  tokens_per_second_baseline:
    type: object
    properties:
      mean:
        type: number
        description: "Mean baseline throughput (tokens/sec)"
      std:
        type: number
        description: "Standard deviation of baseline throughput"
  tokens_per_second_domino:
    type: object
    properties:
      mean:
        type: number
        description: "Mean Domino throughput (tokens/sec)"
      std:
        type: number
        description: "Standard deviation of Domino throughput"
  speedup_ratio:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean speedup (baseline_latency / domino_latency)"
        minimum: 0
      std:
        type: number
        description: "Standard deviation of speedup"
        minimum: 0
      min:
        type: number
        description: "Minimum speedup"
        minimum: 0
      max:
        type: number
        description: "Maximum speedup"
        minimum: 0
  acceptance_rate:
    type: object
    required:
      - mean
      - std
      - min
      - max
    properties:
      mean:
        type: number
        description: "Mean acceptance rate (fraction of draft tokens accepted)"
        minimum: 0
        maximum: 1
      std:
        type: number
        description: "Standard deviation of acceptance rate"
        minimum: 0
        maximum: 1
      min:
        type: number
        description: "Minimum acceptance rate"
        minimum: 0
        maximum: 1
      max:
        type: number
        description: "Maximum acceptance rate"
        minimum: 0
        maximum: 1
  total_tokens:
    type: integer
    description: "Total number of tokens generated across all runs"
    minimum: 0
  prompt_count:
    type: integer
    description: "Number of distinct prompts processed per run"
    minimum: 1
  run_count:
    type: integer
    description: "Number of independent runs aggregated"
    minimum: 1
  peak_ram_gb:
    type: number
    description: "Peak resident set size observed during the benchmark (GB)"
    minimum: 0
    maximum: 6.5
  library_versions:
    type: object
    required:
      - torch
      - transformers
      - accelerate
    properties:
      torch:
        type: string
        minLength: 1
        description: "Torch version string, e.g., '2.2.2+cpu'"
      transformers:
        type: string
        minLength: 1
        description: "Transformers version string"
      accelerate:
        type: string
        minLength: 1
        description: "Accelerate version string"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of aggregation"
  status:
    type: string
    enum:
      - success
      - failed
    description: "Overall aggregation status"
additionalProperties: false