$schema: http://json-schema.org/draft-07/schema#
title: Raw Benchmark Metrics
description: "Schema for the raw JSON output generated by the Domino benchmark script per run."
type: object
required:
  - model_name
  - draft_model_name
  - total_latency
  - tokens_generated
  - tokens_per_second
  - speedup_ratio
  - hardware_context
  - timestamp
properties:
  model_name:
    type: string
    description: "Name of the target model used (e.g., Qwen2-0.5B)"
  draft_model_name:
    type: string
    description: "Name of the draft model used (e.g., Qwen2-1.0B)"
  total_latency:
    type: number
    minimum: 0
    description: "Total time taken for the benchmark run in seconds"
  tokens_generated:
    type: integer
    minimum: 1
    description: "Total number of tokens generated"
  tokens_per_second:
    type: number
    minimum: 0
    description: "Inference throughput in tokens per second"
  baseline_latency:
    type: number
    minimum: 0
    description: "Total latency of the baseline autoregressive run in seconds"
  domino_latency:
    type: number
    minimum: 0
    description: "Total latency of the Domino speculative decoding run in seconds"
  speedup_ratio:
    type: number
    minimum: 0
    description: "Calculated speedup ratio (baseline_latency / domino_latency)"
  hardware_context:
    type: string
    description: "Description of the hardware environment (e.g., '2 vCPU, 7GB RAM')"
  timestamp:
    type: string
    format: date-time
    description: "ISO8601 timestamp of the run"