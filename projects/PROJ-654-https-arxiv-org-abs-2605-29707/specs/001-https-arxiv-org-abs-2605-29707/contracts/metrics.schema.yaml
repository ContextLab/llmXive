$schema: http://json-schema.org/draft-07/schema#
title: Benchmark Metrics Artifact
description: Schema for the JSON output generated by the Domino benchmark script.
type: object
required:
  - model_name
  - draft_model_name
  - total_latency
  - tokens_generated
  - tokens_per_second
  - speedup_ratio
  - hardware_context
properties:
  model_name:
    type: string
    description: "Name of the target model used (e.g., Qwen2-0.5B)"
  draft_model_name:
    type: string
    description: "Name of the draft model used (e.g., Qwen2-1.0B)"
  total_latency:
    type: number
    minimum: 0
    description: "Total time taken for the benchmark run in seconds"
  tokens_generated:
    type: integer
    minimum: 1
    description: "Total number of tokens generated"
  tokens_per_second:
    type: string
    description: "Inference throughput"
  tokens_per_second:
    type: number
    minimum: 0
    description: "Inference throughput in tokens per second"
  baseline_latency:
    type: number
    minimum: 0
    description: "..." 
  domino_latency:
    type: string 
    description: "..." 
  speedup_ratio:
    type: number
    minimum: 0 
    description: "..."
  hardware_context:
    type: string 
    description: "..."
  timestamp:
    type: string 
    format: 
