$schema: http://json-schema.org/draft-07/schema#
title: Validation Report
description: "Schema for the validation report comparing observed speedup to the paper's reference claim."
type: object
required:
  - run_id
  - paper_claim_speedup
  - observed_speedup
  - tolerance_percent
  - deviation_percent
  - valid_algorithmic_speedup
  - notes
properties:
  run_id:
    type: string
    description: "Unique identifier for the benchmark run."
  paper_claim_speedup:
    type: number
    description: "Reference speedup claim from the paper (5.49)."
  observed_speedup:
    type: number
    description: "Observed mean speedup from the benchmark."
  tolerance_percent:
    type: number
    description: "Tolerance threshold percentage (20)."
  deviation_percent:
    type: number
    description: "Percentage deviation from the reference claim."
  valid_algorithmic_speedup:
    type: boolean
    description: "True if observed speedup > 1.0 (Domino is faster than baseline)."
  notes:
    type: string
    description: "Contextual notes (e.g., hardware differences, model substitution)."