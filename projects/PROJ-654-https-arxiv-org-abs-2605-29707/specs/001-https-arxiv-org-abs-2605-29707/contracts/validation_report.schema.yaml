$schema: http://json-schema.org/draft-07/schema#
title: Validation Report Schema
description: Schema for the comparison report between reproduced metrics and paper claims.
type: object
required:
  - feature_id
  - paper_claim_speedup
  - reproduced_speedup_mean
  - acceptance_rate_mean
  - hardware_context
  - model_substitution
  - pass_status
  - tolerance_note
  - spec_conflict_flag
properties:
  feature_id:
    type: string
    description: "Feature branch identifier"
    const: "001-reproduce-domino-speculative-decoding"
  paper_claim_speedup:
    type: number
    description: "Speedup claimed in the paper (GPU)"
    const: 5.49
  reproduced_speedup_mean:
    type: number
    description: "Mean speedup observed in this run"
    minimum: 0
  reproduced_speedup_std:
    type: number
    description: "Standard deviation of speedup"
  acceptance_rate_mean:
    type: number
    description: "Mean acceptance rate"
    minimum: 0
    maximum: 1
  hardware_context:
    type: string
    description: "Description of the hardware used"
    const: "2 vCPU, 7GB RAM"
  model_substitution:
    type: string
    description: "Explanation of model substitution (e.g., Qwen3 -> Qwen2-1.8B)"
  pass_status:
    type: string
    enum:
      - PASS
      - FAIL
    description: "Overall validation status (based on mechanism, not GPU claim)"
  statistical_significance:
    type: string
    description: "Statistical significance of the speedup (e.g., 'p < 0.05')"
  tolerance_note:
    type: string
    description: "Note explaining any deviation from the paper claim due to hardware differences"
  spec_conflict_flag:
    type: boolean
    description: "True if FR-007/SC-003 were executed but flagged as methodologically invalid"
additionalProperties: false