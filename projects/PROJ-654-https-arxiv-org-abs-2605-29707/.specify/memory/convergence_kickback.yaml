- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: scientific_soundness-5a4369da
  location: plan.md:Summary
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan validates the paper's '5.49x speedup' claim by comparing it against
    a reproduced metric on a fundamentally different hardware regime (2 vCPU vs. unspecified
    GPU). Speedup in speculative decoding is a non-linear function of hardware latency
    characteristics (memory bandwidth vs. compute). A direct comparison of magnitude
    (5.49x vs. X.x) is scientifically invalid; the plan treats a hardware-dependent
    constant as a universal invariant. The validation target (paper claim) is not
    independent of the hardware predictor, making the 'Pass/Fail' logic (FR-007) tautological
    or meaningless.
- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: scientific_soundness-91115ae0
  location: research.md:Statistical & Methodological Rigor
  reviewer: scientific_soundness
  round: 1
  severity: science
  text: The plan proposes calculating Speedup = Baseline_Latency / Domino_Latency
    and comparing it to the paper's claim. However, on CPU, the overhead of the 'draft'
    model (which requires its own memory bandwidth and compute) often negates the
    benefits of speculative decoding seen on GPU. The plan assumes a positive speedup
    (>1.0) is guaranteed if the algorithm works, but this is an empirical hypothesis,
    not a definition. If the result is <1.0, the plan flags it as 'Failed to Reproduce',
    but this conflates 'algorithm failure' with 'hardware regime failure'. The validation
    metric does not isolate the algorithm's efficacy from the hardware's inability
    to parallelize the draft/target steps efficiently.
- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: scientific_soundness-7a611d6c
  location: contracts/validation_report.schema.yaml
  reviewer: scientific_soundness
  round: 1
  severity: methodology
  text: The schema defines `paper_claim_speedup` as a constant (5.49) and `reproduced_speedup_mean`
    as a variable to be compared against it. This enforces a direct numerical comparison
    that is methodologically unsound for cross-hardware benchmarking. The schema should
    instead define a 'relative efficiency' metric or a 'break-even analysis' rather
    than a direct pass/fail against a GPU-specific constant.
