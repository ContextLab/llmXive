- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: methodology-eb18d1ec
  location: plan.md:Summary
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'The plan proposes validating the paper''s ''5.49x speedup'' claim by comparing
    CPU results against a GPU-based paper claim. This is a construct validity failure:
    the metric ''speedup'' is hardware-dependent. A direct comparison (even with a
    ''hardware context'' note) cannot validate the algorithm''s efficacy as claimed
    in the paper, as the baseline and Domino overheads scale differently on CPU vs.
    GPU. The success criterion ''Speedup > 1.0x'' is insufficient to validate the
    specific ''Domino'' algorithm claims which rely on GPU parallelism.'
- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: methodology-594cfeea
  location: research.md:Statistical & Methodological Rigor
  reviewer: methodology
  round: 1
  severity: methodology
  text: The plan proposes a single benchmark run (n=1) or a small sample (n=10-20
    prompts) to calculate a mean speedup. This lacks statistical power to detect the
    effect size or distinguish algorithmic speedup from noise, especially on CPU where
    variance is high. A single run cannot establish a 'baseline' for comparison against
    the paper's aggregated results. The methodology requires a proper experimental
    design with multiple independent runs and statistical significance testing (e.g.,
    t-test or confidence intervals) to support any claim of 'reproduction'.
- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: methodology-c6f1fe2f
  location: research.md:Handling Hardware Differences
  reviewer: methodology
  round: 1
  severity: methodology
  text: 'The plan states: ''Relative speedup (Domino vs Baseline) should remain positive
    if the draft model is efficient''. This is an unverified assumption. Speculative
    decoding overhead (synchronization, memory bandwidth) often dominates on CPU,
    potentially resulting in speedup < 1.0 even if the algorithm is sound. The plan
    does not account for the possibility that the ''Domino'' algorithm is fundamentally
    unsuited for CPU execution, which would invalidate the ''reproduction'' goal if
    the only metric is ''speedup > 1.0''.'
- artifact: projects/PROJ-654-https-arxiv-org-abs-2605-29707/specs/001-https-arxiv-org-abs-2605-29707/plan.md
  id: methodology-aef1f044
  location: contracts/validation_report.schema.yaml
  reviewer: methodology
  round: 1
  severity: methodology
  text: The validation report schema includes a 'pass_status' based on a 20% tolerance
    of the paper's 5.49x claim. This is methodologically unsound for a CPU run. The
    schema should not define a 'Pass' condition based on matching a GPU-derived number.
    The 'Pass' condition should be redefined to validate the *mechanism* (e.g., 'Domino
    latency < Baseline latency' with statistical significance) rather than the *magnitude*
    of the speedup.
