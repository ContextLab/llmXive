[lint]
select = [
  "E",  # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",  # Pyflakes
  "I",  # isort
  "B",  # flake8-bugbear
  "C4", # flake8-comprehensions
  "UP", # pyupgrade
]
ignore = [
  "E501", # line-too-long (handled by black)
  "B008", # do-not-perform-function-call-in-argument-default-value (common in pytest fixtures)
]

[lint.isort]
known-first-party = ["src", "tests", "setup_project"]
force-sort-within-sections = true

[format]
line-length = 88
indent-style = "space"
quote-style = "double"
