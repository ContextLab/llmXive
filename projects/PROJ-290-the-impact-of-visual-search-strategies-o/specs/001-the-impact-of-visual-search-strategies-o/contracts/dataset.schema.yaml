$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
type: "object"
properties:
  gaze_coordinates:
    type: "array"
    items:
      type: "array"
      items:
        type: "number"
    description: "Gaze coordinates as [x, y] pairs."
  response_times:
    type: "array"
    items:
      type: "number"
    description: "Response times in milliseconds."
  emotion_labels:
    type: "array"
    items:
      type: "string"
    description: "Emotion labels for each trial."
  roi_annotations:
    type: "object"
    description: "Region of Interest annotations for eye and mouth. If missing, Generic ROI Fallback (3x3 grid) is applied."
required:
  - "gaze_coordinates"
  - "response_times"
  - "emotion_labels"
additionalProperties: false