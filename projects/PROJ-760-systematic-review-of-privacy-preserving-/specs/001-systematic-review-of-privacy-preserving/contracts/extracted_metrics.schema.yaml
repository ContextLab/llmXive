$schema: "http://json-schema.org/draft-07/schema#"
title: "Extracted Metrics Schema"
description: "Schema for the final extracted metrics dataset used in meta-analysis."
type: "object"
properties:
  doi:
    type: "string"
    description: "Digital Object Identifier of the study."
  arxiv_id:
    type: ["string", "null"]
    description: "arXiv ID if DOI is not available."
  title:
    type: "string"
    description: "Title of the paper."
  year:
    type: "integer"
    minimum: 2018
    maximum: 2024
    description: "Publication year."
  mechanism:
    type: "string"
    enum: ["DP", "SecureAgg", "FHE", "Hybrid"]
    description: "Privacy mechanism category."
  epsilon:
    type: ["number", "null"]
    description: "Privacy budget (epsilon) for DP studies. Required for accuracy analysis."
  model_params:
    type: ["integer", "null"]
    description: "Number of model parameters. Used as a covariate for computational cost."
  dataset_size:
    type: ["integer", "null"]
    description: "Size of the dataset used. Used as a covariate for computational cost."
  local_epochs_per_round:
    type: ["integer", "null"]
    description: "Number of local epochs per global round. Critical for convergence normalization."
  metric_type:
    type: "string"
    enum: ["communication_overhead", "convergence_speed", "accuracy_loss", "computational_cost"]
    description: "Type of performance metric."
  value:
    type: "number"
    description: "Normalized metric value."
  unit:
    type: "string"
    enum: ["bytes", "rounds", "%", "ratio"]
    description: "Standardized unit of the metric."
  sd:
    type: ["number", "null"]
    description: "Standard Deviation (nullable)."
  se:
    type: ["number", "null"]
    description: "Standard Error (nullable)."
  n_samples:
    type: ["integer", "null"]
    description: "Sample size of the experiment."
  raw_value:
    type: "string"
    description: "Original value as it appeared in the PDF."
  raw_unit:
    type: "string"
    description: "Original unit as it appeared in the PDF."
  source_header:
    type: "string"
    description: "Original table header for mapping validation."
required:
  - doi
  - year
  - mechanism
  - metric_type
  - value
  - unit
additionalProperties: false
