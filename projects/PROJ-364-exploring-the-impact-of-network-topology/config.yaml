# Project Configuration for Network Topology Heat Dissipation Study
# Generated by T002 initialization

project:
  name: "llmxive-network-topology"
  version: "0.1.0"
  python_version: "3.11"

# Data Processing Parameters
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  results_dir: "results"
  state_dir: "state"
  checksum_manifest: "checksums.json"

# Analysis Parameters
analysis:
  threshold_nm: 2.0
  seed: 42
  statistical_override: false
  bootstrap_iterations: 1000
  confidence_level: 0.95
  p_value_correction: "bonferroni"

# Material Constants (defaults, can be overridden by specific material configs)
materials:
  graphene:
    lattice_constant: 0.246  # nm
    R_lattice: 1.0           # Arbitrary units for reference
  mos2:
    lattice_constant: 0.316  # nm
    R_lattice: 1.5

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_data_ingestion: "logs/data_ingestion.log"
  file_statistical: "logs/statistical.log"

# Execution Flags
execution:
  is_synthetic: false
  fail_on_missing_data: true
  max_ram_gb: 7.0
