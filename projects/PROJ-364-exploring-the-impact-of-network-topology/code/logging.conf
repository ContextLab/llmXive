[loggers]
keys=root

[handlers]
keys=fileHandler

[formatters]
keys=standardFormatter

[logger_root]
level=INFO
handlers=fileHandler

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=standardFormatter
args=('logs/pipeline.log', 'a')

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=