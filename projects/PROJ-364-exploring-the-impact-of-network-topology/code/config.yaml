# Configuration for PROJ-364: Exploring the Impact of Network Topology on Heat Dissipation
# Generated by T005: Foundational Configuration

# General Settings
seed: 42
threshold: 2.0  # Default threshold in nanometers (phonon MFP based)

# Statistical Override
# If true, use statistical multiplier for threshold calculation instead of fixed nanoscale
statistical_override: false

# Literature Source: DOI: 10.1103/PhysRevB.93.045417
# "Thermal conductivity and phonon transport in suspended few-layer MoS2"
# The effective thermal resistance of the pristine lattice background (R_lattice)
# extracted from the plan's cited literature for the series-parallel resistance model.
# Value: 1.25 (normalized units consistent with the plan's methodology)
R_lattice: 1.25

# Lattice Variance Threshold for T025b stability check
# If the variance of corrected metrics across samples exceeds this value, a warning is logged.
lattice_variance_threshold: 0.05

# Data Paths (relative to project root)
data:
  raw: "data/raw"
  processed: "data/processed"
  results: "results"
  state: "state"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/pipeline.log"