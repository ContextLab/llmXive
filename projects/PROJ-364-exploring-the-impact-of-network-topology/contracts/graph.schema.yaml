$schema: "http://json-schema.org/draft-07/schema#"
title: TopologyGraph
description: Schema for network topology objects representing defect interactions in 2D materials.
type: object
required:
  - sample_id
  - material_type
  - nodes
  - edges
  - metrics
  - metadata
properties:
  sample_id:
    type: string
    description: Unique identifier for the sample.
  material_type:
    type: string
    description: Material name (e.g., 'graphene', 'MoS2').
    enum:
      - graphene
      - MoS2
      - hBN
      - other
  threshold_nm:
    type: number
    description: Distance threshold used for edge creation (in nm).
  nodes:
    type: array
    description: List of node objects representing defects.
    items:
      type: object
      required:
        - id
        - x
        - y
      properties:
        id:
          type: integer
          description: Unique node identifier.
        x:
          type: number
          description: X coordinate in nm.
        y:
          type: number
          description: Y coordinate in nm.
        thermal_conductivity:
          type: number
          nullable: true
          description: Local thermal conductivity if available.
  edges:
    type: array
    description: List of edge objects representing proximity connections.
    items:
      type: object
      required:
        - source
        - target
        - distance_nm
      properties:
        source:
          type: integer
          description: Source node ID.
        target:
          type: integer
          description: Target node ID.
        distance_nm:
          type: number
          description: Euclidean distance between nodes in nm.
  metrics:
    type: object
    description: Calculated topological metrics.
    required:
      - node_count
      - edge_count
      - density
      - average_degree
    properties:
      node_count:
        type: integer
        description: Total number of nodes.
      edge_count:
        type: integer
        description: Total number of edges.
      density:
        type: number
        description: Graph density (0.0 to 1.0).
      average_degree:
        type: number
        description: Average degree of nodes.
      global_clustering_coefficient:
        type: number
        nullable: true
        description: Global clustering coefficient.
      average_path_length:
        type: number
        nullable: true
        description: Average shortest path length on LCC. Null if disconnected or zero defects.
      is_connected:
        type: boolean
        description: True if the graph is fully connected.
      lcc_fraction:
        type: number
        description: Fraction of nodes in the Largest Connected Component.
      percolation_threshold:
        type: number
        nullable: true
        description: Critical distance d_c where LCC fraction exceeds threshold.
      degree_distribution:
        type: object
        description: Histogram of degrees (key: degree, value: count).
        additionalProperties:
          type: integer
      zero_defect_flag:
        type: boolean
        description: True if no defects were detected (perfect crystal).
  metadata:
    type: object
    description: Additional metadata about the graph construction.
    required:
      - created_at
      - source_file
      - checksum
    properties:
      created_at:
        type: string
        format: date-time
        description: ISO 8601 timestamp of creation.
      source_file:
        type: string
        description: Path to the source data file.
      checksum:
        type: string
        description: SHA-256 checksum of the source data.
      lattice_correction_applied:
        type: boolean
        description: Whether lattice correction was applied to metrics.
      r_lattice_nm:
        type: number
        nullable: true
        description: Lattice constant used for correction (nm).
additionalProperties: false
