[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-network-topology"
version = "0.1.0"
description = "Exploring the impact of network topology on heat dissipation in 2D materials"
requires-python = ">=3.11"
dependencies = [
    "networkx>=3.2",
    "pandas>=2.2",
    "numpy>=1.26",
    "scipy>=1.12",
    "scikit-learn>=1.4",
    "matplotlib>=3.8",
    "seaborn>=0.13",
    "pyyaml>=6.0",
    "jsonschema>=4.22",
]

[tool.setuptools.packages.find]
where = ["code"]
include = ["src*", "scripts*"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src", "scripts", "tests"]
known_third_party = ["networkx", "pandas", "numpy", "scipy", "sklearn", "matplotlib", "seaborn", "yaml", "jsonschema"]

[tool.pytest.ini_options]
testpaths = ["code/tests"]
pythonpath = ["code"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true
strict_optional = true