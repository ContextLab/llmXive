$schema: "http://json-schema.org/draft-07/schema#"
title: "Standardized Dataset Schema"
description: "Schema for the standardized prosocial behavior dataset after ingestion and cleaning."
type: "object"
properties:
  condition:
    type: "integer"
    description: "Experimental condition: 0=Included, 1=Excluded."
    minimum: 0
    maximum: 1
  prosocial_amount:
    type: "number"
    description: "Monetary amount donated or allocated. Structural zeros (0) are preserved. NaN handled per imputation rules."
    minimum: 0
  randomized:
    type: "boolean"
    description: "Flag indicating if the study used random assignment."
  outcome_type:
    type: "string"
    description: "Type of outcome variable."
    enum:
      - "continuous"
      - "binary"
  dataset_id:
    type: "string"
    description: "Unique identifier for the source dataset."
required:
  - condition
  - prosocial_amount
  - randomized
  - outcome_type
  - dataset_id
additionalProperties: false
