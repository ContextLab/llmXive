$schema: "http://json-schema.org/draft-07/schema#"
title: "Analysis Result Schema"
description: "Schema for the output of the Zero-Inflated Gamma or Logistic regression model, including Average Marginal Effects."
type: "object"
properties:
  dataset_id:
    type: "string"
    description: "Reference to the source dataset."
  pool_type:
    type: "string"
    description: "Analysis pool: Causal or Associational."
    enum:
      - "Causal"
      - "Associational"
  model_type:
    type: "string"
    description: "Model used for analysis."
    enum:
      - "ZIG"
      - "Hurdle"
      - "Logistic"
  # Marginal Effects (Primary Meta-Analysis Metric)
  expected_donation_included:
    type: "number"
    description: "Expected donation amount for the Included condition (E[Y|X=0])."
  expected_donation_excluded:
    type: "number"
    description: "Expected donation amount for the Excluded condition (E[Y|X=1])."
  ame_total_effect:
    type: "number"
    description: "Average Marginal Effect: Difference in expected donation (Excluded - Included)."
  ame_se:
    type: "number"
    description: "Standard error of the AME."
  ame_p:
    type: "number"
    description: "P-value for the AME."
  ame_ci_lower:
    type: "number"
    description: "Lower bound of 95% CI for AME."
  ame_ci_upper:
    type: "number"
    description: "Upper bound of 95% CI for AME."
  # Component Diagnostics (Internal Use)
  zero_inflation_coeff:
    type: "number"
    description: "Log-odds coefficient for the zero-inflation component. Null if Logistic model."
    nullable: true
  zero_inflation_se:
    type: "number"
    description: "Standard error for zero-inflation coefficient."
    nullable: true
  positive_amount_coeff:
    type: "number"
    description: "Log-scale coefficient for the positive component. Null if Logistic model."
    nullable: true
  positive_amount_se:
    type: "number"
    description: "Standard error for positive amount coefficient."
    nullable: true
  # Robustness Metrics
  e_value:
    type: "number"
    description: "E-value for the Associational Pool (robustness to unmeasured confounding). Null for Causal Pool."
    nullable: true
  is_bias_adjusted:
    type: "boolean"
    description: "True if Trim-and-Fill or similar correction was applied."
  adjusted_ame:
    type: "number"
    description: "AME after small-sample bias correction."
    nullable: true
required:
  - dataset_id
  - pool_type
  - model_type
  - expected_donation_included
  - expected_donation_excluded
  - ame_total_effect
  - ame_se
  - ame_p
  - ame_ci_lower
  - ame_ci_upper
  - is_bias_adjusted
additionalProperties: false