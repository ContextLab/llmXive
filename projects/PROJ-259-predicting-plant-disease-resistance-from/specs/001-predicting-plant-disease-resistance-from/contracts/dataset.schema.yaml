$schema: "http://json-schema.org/draft-07/schema#"
title: "Plant Multi-Omics Dataset Schema"
description: "Schema for validated input and processed multi-omics data (including synthetic data)"
type: "object"
properties:
  metadata:
    type: "object"
    properties:
      species:
        type: "string"
        description: "Plant species name (e.g., 'Arabidopsis thaliana') or 'SIMULATED'"
      pathogen:
        type: "string"
        description: "Pathogen name or 'SIMULATED'"
      accession_numbers:
        type: "array"
        items:
          type: "string"
        description: "List of NCBI SRA or MetaboLights accession numbers, or 'SIMULATED'"
      sample_count:
        type: "integer"
        minimum: 100
        description: "Total number of paired samples (must be >= 100)"
      data_source:
        type: "string"
        enum: ["real", "simulated"]
        description: "Indicates whether data is real or synthetic"
  snp_matrix:
    type: "object"
    properties:
      shape:
        type: "array"
        items:
          type: "integer"
        minItems: 2
        maxItems: 2
        description: "[n_samples, n_variants]"
      dtype:
        type: "string"
        enum: ["int8", "int16", "float32"]
        description: "Data type (0, 1, 2 for genotypes)"
    required:
      - shape
      - dtype
  metabolite_matrix:
    type: "object"
    properties:
      shape:
        type: "array"
        items:
          type: "integer"
        minItems: 2
        maxItems: 2
        description: "[n_samples, n_metabolites]"
      dtype:
        type: "string"
        enum: ["float32", "float64"]
        description: "Normalized intensity values"
    required:
      - shape
      - dtype
  phenotype:
    type: "object"
    properties:
      type:
        type: "string"
        enum: ["continuous", "categorical"]
        description: "Type of resistance measurement"
      values:
        type: "array"
        items:
          oneOf:
            - type: "number"
            - type: "string"
        description: "Resistance scores or labels"
    required:
      - type
      - values
required:
  - metadata
  - snp_matrix
  - metabolite_matrix
  - phenotype