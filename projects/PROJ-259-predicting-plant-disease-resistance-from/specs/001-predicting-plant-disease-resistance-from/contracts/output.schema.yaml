$schema: "http://json-schema.org/draft-07/schema#"
title: "Pipeline Output Schema"
description: "Schema for model metrics and feature selection results"
type: "object"
properties:
  performance_metrics:
    type: "object"
    properties:
      cv_accuracy:
        type: "number"
        minimum: 0.0
        maximum: 1.0
        description: "Cross-validated accuracy or R²"
      baseline_accuracy:
        type: "number"
        description: "Null model baseline performance"
      permutation_p_value:
        type: "number"
        minimum: 0.0
        maximum: 1.0
        description: "P-value from permutation testing (n=1000)"
      confidence_interval:
        type: "object"
        properties:
          lower:
            type: "number"
          upper:
            type: "number"
        required:
          - lower
          - upper
      data_source:
        type: "string"
        enum: ["real", "simulated"]
        description: "Indicates whether metrics are from real or simulated data"
    required:
      - cv_accuracy
      - permutation_p_value
      - data_source
  feature_selection:
    type: "object"
    properties:
      top_snps:
        type: "array"
        items:
          type: "object"
          properties:
            id:
              type: "string"
            p_value:
              type: "number"
            effect_size:
              type: "number"
            selection_frequency:
              type: "number"
              description: "Frequency across thresholds {0.01, 0.05, 0.1}"
          required:
            - id
            - p_value
            - effect_size
      top_metabolites:
        type: "array"
        items:
          type: "object"
          properties:
            id:
              type: "string"
            p_value:
              type: "number"
            effect_size:
              type: "number"
            selection_frequency:
              type: "number"
          required:
            - id
            - p_value
            - effect_size
    required:
      - top_snps
      - top_metabolites
  diagnostics:
    type: "object"
    properties:
      max_vif:
        type: "number"
        description: "Maximum Variance Inflation Factor among selected features"
      collinearity_flag:
        type: "boolean"
        description: "True if any feature has VIF > 5"
    required:
      - max_vif
      - collinearity_flag
required:
  - performance_metrics
  - feature_selection
  - diagnostics