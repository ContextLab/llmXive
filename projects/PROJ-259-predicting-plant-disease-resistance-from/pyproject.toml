[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-disease"
version = "0.1.0"
description = "Predicting plant disease resistance from multi-omics data"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.0.3",
    "numpy==1.24.3",
    "scikit-learn==1.3.0",
    "statsmodels==0.14.0",
    "pyyaml==6.0.1",
    "requests==2.31.0",
]

[project.optional-dependencies]
dev = [
    "flake8==6.1.0",
    "black==23.7.0",
    "isort==5.12.0",
    "pytest==7.4.0",
    "pytest-cov==4.1.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["config", "utils", "data", "analysis"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tool.setuptools]
packages = ["code", "code.utils", "code.data", "code.analysis"]