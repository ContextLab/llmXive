[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-plant-disease"
version = "0.1.0"
description = "Predicting plant disease resistance from multi-omics data"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.0.3",
    "numpy==1.24.3",
    "scikit-learn==1.3.0",
    "statsmodels==0.14.0",
    "pyyaml==6.0.1",
    "requests==2.31.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | data
  | artifacts
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["code", "tests"]
known_third_party = ["pandas", "numpy", "sklearn", "statsmodels", "yaml", "requests"]
skip = ["data", "artifacts", "venv", ".venv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
