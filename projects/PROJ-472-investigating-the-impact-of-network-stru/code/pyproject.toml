[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-network-avalanche"
version = "0.1.0"
description = "Investigating the Impact of Network Structure on Neural Avalanche Dynamics"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "networkx>=3.1",
    "mne>=1.5.0",
    "powerlaw>=1.5",
    "bctpy>=0.6",
    "python-dotenv>=1.0.0",
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.venv
    | venv
    | __pycache__
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # Pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long (black handles this)
    "B008", # do not perform function calls in argument defaults (common in dataclasses)
    "C901", # too complex (handled by separate complexity check if needed)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in init files for API exposure

[tool.ruff.isort]
known-first-party = ["config", "data", "analysis", "utils"]
force-single-line = false
lines-between-types = 0

[tool.setuptools.packages.find]
where = ["."]
include = ["code*"]
