[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-compiler-opt-bench"
version = "0.1.0"
description = "Benchmark suite for investigating compiler optimization impact on LLM inference latency"
requires-python = ">=3.9"
dependencies = [
    "numpy",
    "scipy",
    "matplotlib",
    "pyyaml",
    "pytest",
    "pandas",
    "pandas-stubs"
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
(
    /(
        \.git
      | \.hg
      | \.mypy_cache
      | \.tox
      | \.venv
      | _build
      | buck-out
      | build
      | dist
    )/
)
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["benchmarks", "kernels", "analysis", "utils"]

[tool.flake8]
max-line-length = 88
extend-ignore = E203, W503