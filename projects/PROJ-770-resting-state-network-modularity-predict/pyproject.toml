[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "resting-state-network-modularity-predict"
version = "0.1.0"
description = "Investigating the link between resting-state network modularity and social network size"
requires-python = ">=3.11"
dependencies = [
    "nilearn",
    "scikit-learn",
    "python-louvain",
    "statsmodels",
    "nibabel",
    "pandas",
    "numpy",
    "matplotlib",
    "seaborn",
]
optional-dependencies.dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "mypy>=1.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.ruff]
# Inherit settings from .ruff.toml but allow project-specific overrides here if needed
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "ANN", "S", "BLE", "A", "C4", "DTZ", "T10", "ISC", "ICN", "PIE", "Q", "RSE", "RET", "SIM", "TID", "ARG", "PTH", "ERA", "PD", "PL"]
ignore = [
  "ANN101",
  "ANN102",
  "S101",
  "E501",
  "W191",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "S"]
"code/download_data.py" = ["S310"]

[tool.ruff.lint.isort]
known-first-party = ["code"]
force-sort-within-sections = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --cov=code --cov-report=term-missing"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
