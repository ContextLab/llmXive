# Project Configuration
# Generated by T049 pilot analysis for sensitivity thresholds

# Sensitivity Analysis Parameters (Determined by T049 Pilot)
sensitivity_masking_proportions:
  - 0.05
  - 0.10
  - 0.15
p_value_shift_threshold: 0.01

# Data Sources
fred_api_key: "${FRED_API_KEY}"
gdelt_dataset: "gdelt-2.0"
nber_source_url: "https://www.nber.org/research/business-cycle-dating"

# Model Parameters
adf_lag_method: "auto"
johansen_test_type: "trace"
mbb_block_length: 1  # 1 month for monthly data
mbb_iterations: 1000

# Thresholds
missing_data_threshold: 0.05
confidence_threshold: 0.7
min_sample_size: 100
vif_threshold: 33
ci_width_threshold_ratio: 0.20