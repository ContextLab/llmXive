$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Results"
description: "Schema for statistical test outputs (Granger, ADF, Johansen)."
type: "object"
properties:
  test_type:
    type: "string"
    enum:
      - "Granger"
      - "ADF"
      - "Johansen"
      - "VAR"
    description: "Type of statistical test performed."
  variable_pair:
    type: "string"
    description: "Description of the relationship tested, e.g., 'Sentiment_Pos -> GDP'."
  lag_order:
    type: "integer"
    minimum: 1
    description: "Optimal lag order selected."
  statistic:
    type: "number"
    description: "Test statistic value (F-stat, ADF stat, etc.)."
  p_value:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "P-value of the test."
  is_significant:
    type: "boolean"
    description: "True if p-value < 0.05 (after correction)."
  method:
    type: "string"
    description: "Method used (VAR, VECM, etc.)."
  stationary:
    type: "boolean"
    description: "Result of stationarity test."
required:
  - test_type
  - variable_pair
  - p_value
  - is_significant
additionalProperties: false