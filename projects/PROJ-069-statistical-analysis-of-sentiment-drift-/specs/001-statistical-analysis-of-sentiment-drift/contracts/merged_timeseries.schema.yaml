$schema: "http://json-schema.org/draft-07/schema#"
title: "Merged Monthly Timeseries Schema"
description: "Schema for the aligned monthly time‑series data used in Granger causality analysis."
type: "object"
properties:
  date:
    type: "string"
    pattern: "^[0-9]{4}-(0[1-9]|1[0-2])$"
    description: "Monthly timestamp (YYYY-MM)."
  sentiment_positive:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Ratio of positive sentiment predictions."
  sentiment_negative:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Ratio of negative sentiment predictions."
  sentiment_neutral:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Ratio of neutral sentiment predictions."
  sentiment_confidence:
    type: "number"
    minimum: 0
    maximum: 1
    description: "Average prediction confidence for the month."
  sentiment_n:
    type: "integer"
    minimum: 0
    description: "Number of items aggregated in this month."
  sentiment_low_confidence:
    type: "boolean"
    description: "True if sentiment_confidence < 0.7 or sample size is insufficient."
  gdp_growth:
    type: "number"
    description: "Monthly GDP growth rate."
  unemployment_rate:
    type: "number"
    minimum: 0
    maximum: 100
    description: "Monthly unemployment rate percentage."
  consumer_confidence:
    type: "number"
    description: "Monthly Consumer Confidence Index."
  is_recession:
    type: "boolean"
    description: "True if date falls within NBER recession dates."
  missing_rate:
    type: "number"
    minimum: 0
    maximum: 0.05
    description: "Proportion of imputed values for this row (≤ 5 %)."
  gdp_missing:
    type: "boolean"
    description: "True if the GDP value was interpolated."
  unemployment_missing:
    type: "boolean"
    description: "True if the unemployment rate was interpolated."
required:
  - date
  - sentiment_positive
  - sentiment_negative
  - sentiment_neutral
  - sentiment_confidence
  - sentiment_n
  - sentiment_low_confidence
  - gdp_growth
  - unemployment_rate
  - consumer_confidence
  - is_recession
  - missing_rate
  - gdp_missing
  - unemployment_missing
additionalProperties: false