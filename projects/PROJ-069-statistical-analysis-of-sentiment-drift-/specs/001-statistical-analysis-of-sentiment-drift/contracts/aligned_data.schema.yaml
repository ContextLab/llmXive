$schema: "http://json-schema.org/draft-07/schema#"
title: "Aligned Quarterly Time Series"
description: "Schema for the merged quarterly dataset containing sentiment and macroeconomic indicators."
type: "object"
properties:
  quarter:
    type: "string"
    pattern: "^[0-9]{4}-Q[1-4]$"
    description: "ISO 8601 Quarter identifier."
  sentiment_positive:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Mean ratio of positive sentiment."
  sentiment_negative:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Mean ratio of negative sentiment."
  sentiment_neutral:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Mean ratio of neutral sentiment."
  sentiment_confidence:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Mean confidence of the sentiment model predictions."
  sentiment_n:
    type: "integer"
    minimum: 0
    description: "Number of items aggregated in this quarter."
  sentiment_low_confidence:
    type: "boolean"
    description: "True if sample size or confidence is below threshold."
  gdp_growth:
    type: "number"
    description: "Quarterly GDP growth rate in percent."
  unemployment_rate:
    type: "number"
    description: "Quarterly average unemployment rate in percent."
  gdp_missing:
    type: "boolean"
    description: "True if the GDP value was interpolated."
  unemployment_missing:
    type: "boolean"
    description: "True if the unemployment rate was interpolated."
required:
  - quarter
  - sentiment_positive
  - sentiment_negative
  - sentiment_neutral
  - sentiment_confidence
  - sentiment_n
  - sentiment_low_confidence
  - gdp_growth
  - unemployment_rate
  - gdp_missing
  - unemployment_missing
additionalProperties: false
