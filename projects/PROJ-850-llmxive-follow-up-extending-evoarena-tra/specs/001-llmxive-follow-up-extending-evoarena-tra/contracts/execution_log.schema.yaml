$schema: "http://json-schema.org/draft-07/schema#"
title: "EvoMem Execution Log Schema"
description: "Schema for the execution logs generated by the agent pipeline. Validates the structure of data used for statistical analysis."
type: "object"
required:
  - "run_id"
  - "task_id"
  - "agent_variant"
  - "step"
  - "retrieved_patches"
  - "context_tokens"
  - "inference_time_ms"
  - "command_executed"
  - "success"
  - "hallucination_detected"
properties:
  run_id:
    type: "string"
    description: "Unique identifier for the execution run."
  task_id:
    type: "string"
    description: "Reference to the task instance."
  agent_variant:
    type: "string"
    enum:
      - "EvoMem-All"
      - "EvoMem-Conflict"
    description: "The specific agent variant used."
  step:
    type: "integer"
    minimum: 1
    description: "The step number within the task execution."
  retrieved_patches:
    type: "array"
    items:
      type: "string"
    description: "List of patch IDs retrieved for this step."
  context_tokens:
    type: "integer"
    minimum: 0
    description: "Total number of tokens in the context window."
  inference_time_ms:
    type: "number"
    minimum: 0
    description: "Time taken for inference in milliseconds."
  command_executed:
    type: "string"
    description: "The actual terminal command executed."
  success:
    type: "boolean"
    description: "Whether the command matched the ground truth."
  hallucination_detected:
    type: "boolean"
    description: "Whether a hallucination was detected."
  hallucination_reason:
    type: "string"
    enum:
      - "wrong_command"
      - "state_mismatch"
      - "command_execution_failure"
      - "none"
    description: "Reason for hallucination if detected."
  confidence_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Confidence score of the conflict detector (only for EvoMem-Conflict)."
    default: null
  normalized_ground_truth_similarity:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "String similarity score between agent state and normalized ground truth."
  additional_metadata:
    type: "object"
    description: "Optional additional data."
    additionalProperties: true