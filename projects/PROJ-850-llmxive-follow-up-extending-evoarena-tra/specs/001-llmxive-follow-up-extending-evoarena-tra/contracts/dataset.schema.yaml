$schema: http://json-schema.org/draft-07/schema#
title: Memory Patch Schema
description: Schema for a single memory patch record.
type: object
properties:
  id:
    type: string
    description: "Unique identifier (UUID)"
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp"
  content:
    type: string
    description: "The state description or command content"
  source:
    type: string
    description: "Origin of the patch"
  is_conflict:
    type: boolean
    description: "Flag set by the heuristic"
  confidence:
    type: number
    minimum: 0.0
    maximum: 1.0
    description: "Probability of conflict"
required:
  - id
  - timestamp
  - content
  - source
  - is_conflict
  - confidence
additionalProperties: false
