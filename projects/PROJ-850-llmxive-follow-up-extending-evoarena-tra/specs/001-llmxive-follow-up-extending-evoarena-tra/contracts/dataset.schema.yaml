$schema: "http://json-schema.org/draft-07/schema#"
title: "Memory Patch Schema"
type: "object"
properties:
  patch_id:
    type: "string"
    description: "Unique identifier for the memory patch."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of the patch creation."
  content:
    type: "string"
    description: "Text content of the patch."
  source:
    type: "string"
    description: "Instruction or command that generated the patch."
  conflict_flag:
    type: "boolean"
    description: "True if the patch is flagged as a semantic contradiction."
required:
  - patch_id
  - timestamp
  - content
  - source
  - conflict_flag