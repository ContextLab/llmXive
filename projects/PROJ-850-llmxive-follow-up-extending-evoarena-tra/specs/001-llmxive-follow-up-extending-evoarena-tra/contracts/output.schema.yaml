$schema: http://json-schema.org/draft-07/schema#
title: Execution Log Schema
description: Schema for agent execution logs.
type: object
properties:
  run_id:
    type: string
    description: "UUID for the run"
  task_id:
    type: string
    description: "FK to TaskInstance"
  agent_variant:
    type: string
    enum:
      - EvoMem-All
      - EvoMem-Conflict
    description: "Agent variant name"
  retrieved_patches_count:
    type: integer
    minimum: 0
    description: "Number of patches retrieved"
  context_tokens:
    type: integer
    minimum: 0
    description: "Total context tokens used"
  inference_time:
    type: number
    minimum: 0
    description: "Inference time in seconds"
  success_status:
    type: boolean
    description: "Task success status"
  retrieved_patches:
    type: array
    items:
      type: string
    description: "List of retrieved patch IDs"
required:
  - run_id
  - task_id
  - agent_variant
  - retrieved_patches_count
  - context_tokens
  - inference_time
  - success_status
  - retrieved_patches
additionalProperties: false