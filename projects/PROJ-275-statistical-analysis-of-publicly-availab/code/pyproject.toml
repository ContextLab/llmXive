[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-statistical-analysis"
version = "0.1.0"
description = "Statistical Analysis of Publicly Available Movie Review Sentiment and Box Office Revenue"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas==2.0.3",
    "numpy==1.24.3",
    "scikit-learn==1.3.0",
    "nltk==3.8.1",
    "scipy==1.11.1",
    "statsmodels==0.14.0",
    "fuzzywuzzy==0.18.0",
    "pytest==7.4.0",
]

[project.optional-dependencies]
dev = [
    "flake8==6.1.0",
    "black==23.7.0",
    "isort==5.12.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip_gitignore = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
