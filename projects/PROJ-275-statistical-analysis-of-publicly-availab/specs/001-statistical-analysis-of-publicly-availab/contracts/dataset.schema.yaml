$schema: http://json-schema.org/draft-07/schema#
title: Merged Movie Dataset Schema
description: |
  Schema for the unified, time-aligned dataset resulting from the
  ingestion and preprocessing of TMDB 5000 and IMDb Reviews.
  Includes static revenue anchors and weekly sentiment scores.
type: object
required:
  - columns
  - row_count
  - generated_at
properties:
  columns:
    type: array
    description: List of column definitions present in the dataset.
    items:
      type: object
      required:
        - name
        - dtype
        - nullable
      properties:
        name:
          type: string
          description: Column name.
        dtype:
          type: string
          description: Data type (e.g., 'object', 'int64', 'float64', 'datetime64[ns]').
        nullable:
          type: boolean
          description: Whether the column allows null values.
        description:
          type: string
          description: Human-readable description of the column.
    minItems: 6
  row_count:
    type: integer
    description: Total number of rows in the dataset.
    minimum: 500
  generated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp of when the dataset was generated.
  metadata:
    type: object
    description: Optional metadata about the dataset version and source.
    properties:
      source_datasets:
        type: array
        items:
          type: string
      preprocessing_steps:
        type: array
        items:
          type: string
