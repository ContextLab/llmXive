$schema: "http://json-schema.org/draft-07/schema#"
title: "Execution Log Schema"
description: "Schema for raw execution logs generated by EvoArena evaluation scripts. Used for FR-005 validation."
type: "object"
required:
  - "chain_id"
  - "agent_type"
  - "timestamp"
  - "status"
  - "results"
properties:
  chain_id:
    type: "string"
    description: "Unique identifier for the task chain."
  agent_type:
    type: "string"
    enum: ["baseline", "evomem"]
    description: "Type of agent executed."
  timestamp:
    type: "string"
    format: "date-time"
    description: "ISO 8601 timestamp of execution."
  status:
    type: "string"
    enum: ["success", "partial", "failed"]
    description: "Overall execution status."
  results:
    type: "array"
    description: "List of task results within the chain."
    items:
      type: "object"
      required:
        - "task_id"
        - "outcome"
      properties:
        task_id:
          type: "string"
        outcome:
          type: "string"
          enum: ["correct", "incorrect", "timeout", "error"]
        execution_time_ms:
          type: "integer"
          description: "Time taken for this task in milliseconds."
  memory_patches:
    type: "array"
    description: "List of memory patches generated (only for EvoMem)."
    items:
      type: "object"
      properties:
        patch_id:
          type: "string"
        content:
          type: "string"
        timestamp:
          type: "string"
          format: "date-time"
  errors:
    type: "array"
    description: "List of error messages if status is not 'success'."
    items:
      type: "string"
