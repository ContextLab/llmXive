$schema: "http://json-schema.org/draft-07/schema#"
title: "Memory Patch Schema"
description: "Schema for individual memory patches generated by the EvoMem agent. Used for FR-005 validation."
type: "object"
required:
  - "patch_id"
  - "chain_id"
  - "timestamp"
  - "update_type"
  - "content"
properties:
  patch_id:
    type: "string"
    description: "Unique identifier for the patch."
  chain_id:
    type: "string"
    description: "Reference to the chain this patch belongs to."
  timestamp:
    type: "string"
    format: "date-time"
    description: "When the patch was generated."
  update_type:
    type: "string"
    enum: ["new_fact", "correction", "deletion", "context_update"]
    description: "Type of memory update."
  content:
    type: "string"
    description: "The actual content of the memory update."
  source_task_id:
    type: "string"
    description: "The task that triggered this patch."
  confidence_score:
    type: "number"
    minimum: 0.0
    maximum: 1.0
    description: "Optional confidence score if applicable."
