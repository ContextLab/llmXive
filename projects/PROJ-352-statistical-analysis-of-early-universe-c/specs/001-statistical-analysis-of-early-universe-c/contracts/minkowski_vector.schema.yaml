$schema: "http://json-schema.org/draft-07/schema#"
title: "Minkowski Functional Vector"
description: "Schema for individual Minkowski Functional computation results (used in mf_vectors.csv or intermediate JSON)"
type: "object"
required:
  - "map_id"
  - "threshold"
  - "area"
  - "perimeter"
  - "genus"
  - "timestamp"
properties:
  map_id:
    type: "string"
    description: "Unique identifier for the map (e.g., 'observed', 'sim_001')."
  threshold:
    type: "number"
    description: "Threshold level in units of standard deviation (σ)."
  area:
    type: "number"
    description: "Area functional (V0): Fraction of sky above threshold."
  perimeter:
    type: "number"
    description: "Perimeter functional (V1): Normalized length of the boundary."
  genus:
    type: "number"
    description: "Genus functional (V2): Euler characteristic (holes - islands)."
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the computation."
    format: "date-time"
  precision:
    type: "number"
    description: "Numerical precision of the computation (target: ≥6 decimal places)."
    default: 0.000001
