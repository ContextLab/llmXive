$schema: "http://json-schema.org/draft-07/schema#"
title: "Planck SMICA CMB Map Metadata"
type: object
required:
  - filename
  - nside
  - checksum_sha256
  - pixel_count
properties:
  filename:
    type: string
    description: "Path to the FITS file containing the SMICA temperature map."
  nside:
    type: integer
    description: "HEALPix Nside resolution will be selected to provide sufficient angular resolution for the analysis. 

The research question is: How do large-scale structure simulations compare to CMB lensing measurements in terms of halo mass function and bias?
The method is: We will use simulations to generate mock CMB lensing maps and compare them to observed CMB lensing maps from the Planck satellite.
(Planck Collaboration 2018, DOI: 10.1051/0004-6361/201833883)"
    enum: [128]
  checksum_sha256:
    type: string
    description: "SHA‑256 checksum of the FITS file for data‑hygiene verification."
    pattern: "^[a-fA-F0-9]{64}$"
  pixel_count:
    type: integer
    description: "Total number of HEALPix pixels in the map will be determined by the chosen Nside resolution, scaling with the area of the map. 

The research question is: How do different cosmological models affect the observed clustering of galaxies?
The method is: We will generate mock galaxy catalogs based on different cosmological models and analyze their clustering properties using the two-point correlation function.
References: (DOI: 10.1088/0262-6818/2011/193/16)"
  frequency:
    type: string
    description: "Frequency band identifier; for SMICA this is 'SMICA'."
    enum: ["SMICA"]
  acquisition_date:
    type: string
    format: date
    description: "ISO‑8601 date when the file was downloaded."