$schema: "http://json-schema.org/draft-07/schema#"
title: "CMB Map and Minkowski Functional Result"
description: "Schema for the final statistical results output (output/results.json)"
type: "object"
required:
  - "p_value"
  - "g_mu_upper_bound"
  - "degrees_of_freedom"
  - "model_used"
  - "covariance_matrix"
properties:
  p_value:
    type: "number"
    description: "P-value from the likelihood ratio test comparing Gaussian vs. Gaussian+String models."
    minimum: 0
    maximum: 1
  g_mu_upper_bound:
    type: "number"
    description: "95% confidence upper bound on the cosmic string tension Gμ."
    minimum: 0
  degrees_of_freedom:
    type: "integer"
    description: "Degrees of freedom for the chi-squared approximation of the LRT."
    minimum: 1
  model_used:
    type: "string"
    description: "The statistical model used for inference."
    enum:
      - "Gaussian"
      - "Gaussian + Cosmic String"
  covariance_matrix:
    type: "array"
    description: "3x3 sample covariance matrix of the three Minkowski Functionals (Area, Perimeter, Genus)."
    items:
      type: "array"
      items:
        type: "number"
      minItems: 3
      maxItems: 3
    minItems: 3
    maxItems: 3
  status:
    type: "string"
    description: "Execution status of the pipeline."
    enum:
      - "completed"
      - "failed"
      - "timeout"
  metadata:
    type: "object"
    description: "Additional metadata about the run."
    properties:
      nside:
        type: "integer"
        description: "HEALPix resolution parameter used."
      n_simulations:
        type: "integer"
        description: "Number of Gaussian simulations generated."
      beam_fwhm_arcmin:
        type: "number"
        description: "Full Width at Half Maximum of the applied beam."
      noise_variance:
        type: "number"
        description: "Variance of the added instrumental noise in μK²."
