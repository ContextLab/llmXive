$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the raw dataset rows from the verified Pick-a-Pic source."
type: "object"
properties:
  id:
    type: "string"
    description: "Unique identifier for the caption record."
  text:
    type: "string"
    description: "The raw caption text."
  image_id:
    type: "string"
    description: "The associated image ID."
  clip_score:
    type: "number"
    description: "Pre-computed CLIP score for the image-caption pair."
  preference_score:
    type:
      - "number"
      - "null"
    description: "Human preference score (0.0 to 1.0). Can be null."
required:
  - "id"
  - "text"
  - "clip_score"
  - "preference_score"
additionalProperties: true