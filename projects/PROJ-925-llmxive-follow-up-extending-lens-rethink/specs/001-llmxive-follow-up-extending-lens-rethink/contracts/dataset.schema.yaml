$schema: "http://json-schema.org/draft-07/schema#"
title: "CaptionRecord Schema"
description: "Schema for the intermediate caption record containing raw text and computed scores. Source: Pick-a-Pic."
type: "object"
properties:
  caption_id:
    type: "string"
    description: "Unique identifier for the caption."
  image_id:
    type: "string"
    description: "Identifier for the associated image."
  caption_text:
    type: "string"
    description: "The raw text content of the caption."
  clip_score:
    type: "number"
    description: "CLIP similarity score (0.0 to 1.0)."
  human_rating:
    type: "number"
    description: "Human rating derived from Pick-a-Pic preference pairs (0.0 to 1.0)."
  source_dataset:
    type: "string"
    description: "Name of the source dataset (e.g., 'pick-a-pic')."
required:
  - caption_id
  - image_id
  - caption_text
  - clip_score
  - human_rating
  - source_dataset
additionalProperties: false