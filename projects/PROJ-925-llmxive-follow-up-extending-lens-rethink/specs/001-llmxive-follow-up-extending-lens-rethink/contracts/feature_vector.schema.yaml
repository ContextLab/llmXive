$schema: "http://json-schema.org/draft-07/schema#"
title: LinguisticFeatureVector
description: Schema for the linguistic feature vector extracted from captions.
type: object
properties:
  semantic_entropy:
    type: number
    description: Semantic entropy calculated as ln(perplexity).
    minimum: 0
  syntactic_depth:
    type: integer
    description: Maximum depth of the syntactic dependency tree.
    minimum: 0
  noun_phrase_density:
    type: number
    description: Ratio of noun phrases to total tokens.
    minimum: 0.0
    maximum: 1.0
  token_diversity:
    type: number
    description: Type-token ratio (unique tokens / total tokens).
    minimum: 0.0
    maximum: 1.0
required:
  - semantic_entropy
  - syntactic_depth
  - noun_phrase_density
  - token_diversity
additionalProperties: false
