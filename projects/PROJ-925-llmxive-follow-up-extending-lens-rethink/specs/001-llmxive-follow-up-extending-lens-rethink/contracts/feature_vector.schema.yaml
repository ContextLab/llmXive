$schema: "http://json-schema.org/draft-07/schema#"
title: "Feature Vector Schema"
description: "Schema for the extracted linguistic features."
type: "object"
properties:
  id:
    type: "string"
    description: "Foreign key to the original record."
  textual_perplexity:
    type: "number"
    description: "Natural log of perplexity (ln(perplexity)). Proxy for linguistic uncertainty."
  syntactic_depth:
    type: "integer"
    description: "Maximum depth of the dependency parse tree."
  noun_phrase_density:
    type: "number"
    description: "Ratio of noun phrases to total tokens."
  token_diversity:
    type: "number"
    description: "Type-Token Ratio (TTR)."
  caption_length:
    type: "integer"
    description: "Number of tokens in the caption (used as confounder)."
  status:
    type: "string"
    enum:
      - "valid"
      - "failed"
    description: "Processing status."
required:
  - "id"
  - "textual_perplexity"
  - "syntactic_depth"
  - "noun_phrase_density"
  - "token_diversity"
  - "caption_length"
  - "status"
additionalProperties: false