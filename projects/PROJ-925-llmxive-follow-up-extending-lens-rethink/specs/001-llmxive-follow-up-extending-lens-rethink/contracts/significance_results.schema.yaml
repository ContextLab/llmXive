$schema: "http://json-schema.org/draft-07/schema#"
title: "Significance Results Schema"
description: "Schema for the stability metrics and significance test results."
type: "object"
properties:
  feature_name:
    type: "string"
    description: "Name of the linguistic feature."
  mean_rank:
    type: "number"
    description: "Mean rank of the feature across 5 random seeds."
  std_rank:
    type: "number"
    description: "Standard deviation of the rank."
  p_value:
    type: "number"
    description: "P-value from the permutation test (1,000 iterations)."
  is_significant:
    type: "boolean"
    description: "True if p-value < 0.05 after Benjamini-Hochberg correction."
required:
  - "feature_name"
  - "mean_rank"
  - "std_rank"
  - "p_value"
  - "is_significant"
additionalProperties: false