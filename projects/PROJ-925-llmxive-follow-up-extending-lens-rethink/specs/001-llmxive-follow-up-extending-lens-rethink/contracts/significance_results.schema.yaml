$schema: http://json-schema.org/draft-07/schema#
title: Significance and Stability Results
description: >
  Schema for the aggregated results of the XGBoost training,
  permutation importance, and sensitivity analysis.
type: object
required:
  - run_id
  - model_metrics
  - feature_importance
  - stability_metrics
properties:
  run_id:
    type: string
    description: Unique identifier for the training run.
  model_metrics:
    type: object
    properties:
      mean_r2:
        type: number
      mean_mse:
        type: number
      pearson_correlation:
        type: number
    required:
      - mean_r2
      - mean_mse
  feature_importance:
    type: array
    description: List of features ranked by importance.
    items:
      type: object
      required:
        - feature_name
        - importance_score
        - rank
      properties:
        feature_name:
          type: string
        importance_score:
          type: number
        rank:
          type: integer
        p_value:
          type: number
        is_significant:
          type: boolean
  stability_metrics:
    type: object
    description: >
      Aggregated stability metrics across multiple seeds.
      Keys are feature names, values are stats.
    additionalProperties:
      type: object
      required:
        - mean_rank
        - std_dev
      properties:
        mean_rank:
          type: number
        std_dev:
          type: number
  configuration:
    type: object
    description: Snapshot of the configuration used for this run.
    properties:
      seeds_used:
        type: array
        items:
          type: integer
      n_folds:
        type: integer
      alpha_fdr:
        type: number