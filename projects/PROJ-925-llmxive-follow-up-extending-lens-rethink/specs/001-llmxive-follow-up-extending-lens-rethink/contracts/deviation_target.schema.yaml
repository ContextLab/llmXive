$schema: "http://json-schema.org/draft-07/schema#"
title: "Deviation Target Schema"
description: "Schema for the derived target variable (raw difference)."
type: "object"
properties:
  id:
    type: "string"
    description: "Foreign key to the original record."
  deviation_score:
    type: "number"
    description: "Absolute difference between raw CLIP and Human Rating."
  clip_score:
    type: "number"
    description: "Raw CLIP score."
  human_rating:
    type: "number"
    description: "Raw Human rating."
required:
  - "id"
  - "deviation_score"
  - "clip_score"
  - "human_rating"
additionalProperties: false