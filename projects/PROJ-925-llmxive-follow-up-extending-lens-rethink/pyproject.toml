[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-follow-up"
version = "0.1.0"
description = "Extending Lens: Rethinking Training Efficiency for Foundational Text-to-Image Mo"
requires-python = ">=3.11"
dependencies = [
    "xgboost",
    "scikit-learn",
    "transformers",
    "spacy",
    "datasets",
    "pandas",
    "numpy",
    "torch",
    "pydantic",
    "jsonschema",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "black",
    "pytest",
]

[tool.ruff]
# Target Python 3.11
target-version = "py311"
# Line length consistent with Black
line-length = 88
# Select specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501", # Line too long (handled by Black)
    "B008", # Do not perform function calls in argument defaults (common in Pydantic/FastAPI)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"] # Allow unused imports in __init__.py for exposing API

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning"
]
