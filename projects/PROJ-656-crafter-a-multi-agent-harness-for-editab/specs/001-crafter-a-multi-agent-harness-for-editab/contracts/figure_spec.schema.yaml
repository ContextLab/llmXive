$schema: "http://json-schema.org/draft-07/schema#"
title: "FigureSpec"
description: "Structured representation of a figure's components derived from text input."
type: "object"
properties:
  prompt:
    type: "string"
    description: "The original text prompt describing the figure."
  figure_type:
    type: "string"
    description: "The type of figure (e.g., bar_chart, line_plot)."
    enum:
      - "bar_chart"
      - "line_plot"
      - "scatter"
      - "pie_chart"
  axes:
    type: "object"
    description: "Definitions for x and y axes."
    properties:
      x_label:
        type: "string"
        description: "Label for the x-axis."
      y_label:
        type: "string"
        description: "Label for the y-axis."
    required:
      - "x_label"
      - "y_label"
  data_points:
    type: "array"
    description: "List of data points to be plotted."
    items:
      type: "object"
      properties:
        x:
          type: "number"
        y:
          type: "number"
        label:
          type: "string"
      required:
        - "x"
        - "y"
required:
  - "prompt"
  - "figure_type"
  - "axes"
additionalProperties: false
