[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "embodied-curriculum-learning"
version = "0.1.0"
description = "Statistical analysis pipeline for embodied curriculum learning research"
requires-python = ">=3.10"
dependencies = [
    "pandas",
    "scipy",
    "statsmodels",
    "numpy",
    "pyyaml",
]

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'

[tool.ruff]
# Inherits configuration from ruff.toml for linting rules
# This file primarily handles Black configuration and project metadata
line-length = 88
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests"
]

[tool.setuptools.packages.find]
where = ["code"]