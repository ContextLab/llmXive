$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  features_csv:
    type: object
    description: "Schema for features.csv generated by feature engineering"
    required:
      - "cascade_id"
      - "user_pre_cascade_degree"
      - "user_pre_cascade_clustering"
      - "betweenness_context"
      - "activity_level_proxy"
    properties:
      cascade_id:
        type: string
        description: "Unique identifier for the cascade"
      user_pre_cascade_degree:
        type: number
        description: "Mean node degree in user's pre-cascade historical network"
      user_pre_cascade_clustering:
        type: number
        description: "Average clustering coefficient in user's pre-cascade network"
      betweenness_context:
        type: number
        description: "Mean betweenness centrality in broader network context"
      activity_level_proxy:
        type: number
        description: "Computed user activity level proxy score"
      platform_id:
        type: string
        description: "Optional platform identifier for multi-platform analyses"
  posterior_summary_csv:
    type: object
    description: "Schema for posterior_summary.csv containing model coefficients"
    required:
      - "parameter"
      - "mean"
      - "sd"
      - "q2.5"
      - "q97.5"
      - "prob_nonzero"
    properties:
      parameter:
        type: string
        description: "Name of the model parameter"
      mean:
        type: number
        description: "Posterior mean"
      sd:
        type: number
        description: "Posterior standard deviation"
      q2.5:
        type: number
 description: "[deferred] quantile"
      q97.5:
        type: number
 description: "[deferred] quantile"
      prob_nonzero:
        type: number
        description: "Posterior probability of non-zero effect (required for SC-001)"
  manifest_json:
    type: object
    description: "Schema for manifest.json containing reproducibility info"
    required:
      - "software_versions"
      - "random_seeds"
      - "data_hashes"
    properties:
      software_versions:
        type: object
        description: "Pinned package versions"
      random_seeds:
        type: array
        description: "List of seeds used"
        items:
          type: integer
      data_hashes:
        type: object
        description: "SHA256 hashes of input files"
required:
  - "features_csv"
  - "posterior_summary_csv"
  - "manifest_json"