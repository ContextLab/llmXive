$schema: "http://json-schema.org/draft-07/schema#"
title: Network Metric Output Schema
description: Schema for validating data/results/network_metrics.csv generated by User Story 1.
type: object
required:
  - subject_id
  - age
  - global_efficiency
  - local_efficiency
  - characteristic_path_length
  - clustering_coefficient
  - modularity
  - signal_quality_flag
  - trace_id
properties:
  subject_id:
    type: string
    description: Unique identifier for the subject.
  age:
    type: integer
    description: Age of the subject in years.
  global_efficiency:
    type: number
    format: float
    description: Global network efficiency (1 / characteristic_path_length).
  local_efficiency:
    type: number
    format: float
    description: Local network efficiency (1 / characteristic_path_length of neighbors).
  characteristic_path_length:
    type: number
    format: float
    description: Average shortest path length in the network.
  clustering_coefficient:
    type: number
    format: float
    description: Average clustering coefficient of the network.
  modularity:
    type: number
    format: float
    description: Modularity score of the network partition.
  signal_quality_flag:
    type: string
    enum:
      - "High Signal Quality"
      - "Low Signal Quality"
    description: Flag indicating signal quality based on SNR threshold (10dB).
  trace_id:
    type: string
    description: SHA-256 hash of source data and code for reproducibility.
additionalProperties: false
