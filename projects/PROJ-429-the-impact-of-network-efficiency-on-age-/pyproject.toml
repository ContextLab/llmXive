[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llmXive-network-efficiency-aging"
version = "0.1.0"
description = "Impact of Network Efficiency on Age-Related Changes in Resting-State EEG"
requires-python = ">=3.11"
dependencies = [
    "mne>=1.6.0",
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "scipy>=1.11.0",
    "networkx>=3.1.0",
    "statsmodels>=0.14.0",
    "pywavelets>=1.4.0",
    "pyphysio>=0.2.0",
    "h5py>=3.9.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
