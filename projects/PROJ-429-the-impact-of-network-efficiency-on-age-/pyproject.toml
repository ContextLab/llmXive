[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-network-efficiency-aging"
version = "0.1.0"
description = "Impact of Network Efficiency on Age-Related Changes in Resting-State EEG"
requires-python = ">=3.11"
dependencies = [
    "mne",
    "networkx",
    "scipy",
    "pandas",
    "statsmodels",
    "pywavelets",
    "ruff",
    "black",
]

[tool.setuptools.packages.find]
where = ["code"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    "data/raw",
    "data/processed",
    "data/results",
    "state",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
