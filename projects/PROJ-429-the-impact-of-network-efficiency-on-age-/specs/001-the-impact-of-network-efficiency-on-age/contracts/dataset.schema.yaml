$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for the processed participant dataset containing demographics and signal quality flags."
type: "object"
properties:
  participant_id:
    type: "string"
    description: "Unique identifier for the participant."
  age:
    type: "integer"
    minimum: 18
    description: "Age of the participant in years."
  sex:
    type: "string"
    enum: ["M", "F", "Other"]
    description: "Biological sex of the participant."
  education_years:
    type: "integer"
    minimum: 0
    description: "Years of formal education."
  cognitive_score:
    type: ["number", "null"]
    description: "MMSE or MoCA score. Null if missing or invalid."
  signal_quality_flag:
    type: "string"
    enum: ["Valid", "Low SNR", "Excessive Artifact", "Excluded"]
    description: "Quality flag based on SNR and artifact rejection rate."
  data_source:
    type: "string"
    description: "URL of the source dataset."
required:
  - participant_id
  - age
  - sex
  - education_years
  - signal_quality_flag
additionalProperties: false
