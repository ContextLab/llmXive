[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cognitive-mechanisms-moral-judgments"
version = "0.1.0"
description = "Automated science pipeline for cognitive mechanisms underlying intuitive moral judgments"
requires-python = ">=3.11"
dependencies = [
    "pymc>=5.0.0",
    "pandas",
    "numpy",
    "scikit-learn",
    "pyyaml",
    "requests",
    "seaborn",
    "statsmodels",
]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
addopts = "-v"
