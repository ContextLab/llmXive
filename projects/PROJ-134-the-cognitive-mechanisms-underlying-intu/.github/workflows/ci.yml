name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black

      - name: Lint with ruff
        run: |
          ruff check code/

      - name: Check formatting with black
        run: |
          black --check code/

  run-pipeline:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Ingestion (Simulation Mode)
        run: |
          python code/data/simulation.py
          python code/data/ingest.py

      - name: Run Preprocessing
        run: |
          python code/data/preprocess.py

      - name: Run Bayesian Model
        run: |
          python code/models/bayesian.py

      - name: Run Model Comparison
        run: |
          python code/analysis/model_comparison.py

      - name: Run Validation
        run: |
          python code/analysis/validation.py

      - name: Generate Report
        run: |
          python code/reports/generate_report.py

      - name: Verify Artifacts
        run: |
          python code/quickstart_validation.py

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests
        run: |
          pytest code/tests/ -v --cov=code --cov-report=xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella