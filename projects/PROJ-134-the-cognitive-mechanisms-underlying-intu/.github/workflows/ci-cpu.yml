name: CPU-Only CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run Linting (Ruff)
      run: |
        pip install ruff
        ruff check code/

    - name: Run Formatting Check (Black)
      run: |
        pip install black
        black --check code/

    - name: Run Unit Tests
      run: |
        pytest code/tests/ -v --cov=code --cov-report=xml

    - name: Upload Coverage
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Verify Directory Structure
      run: |
        test -d data/raw
        test -d data/processed
        test -d data/logs
        test -d state
        test -d code
        test -d tests
        test -d reports

    - name: Run Pipeline Validation (Simulation Mode)
      run: |
        # Ensure simulation runs on CPU only
        export PYTORCH_CUDA_ALLOC_CONF=garbage_collection_threshold:0.8
        python code/data/simulation_mfq.py || echo "Simulation script not yet implemented"
        python code/data/simulation_stories.py || echo "Simulation script not yet implemented"