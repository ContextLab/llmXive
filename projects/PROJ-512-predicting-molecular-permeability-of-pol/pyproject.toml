[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-polymer-permeability"
version = "0.1.0"
description = "Predicting Molecular Permeability of Polymers via Graph Neural Networks"
requires-python = ">=3.11"
dependencies = [
    "ruff>=0.4.0",
    "black>=24.0.0",
]

[tool.ruff]
# Target Python version
target-version = "py311"
# Line length
line-length = 88
# Exclude common directories
exclude = [
    ".git",
    ".tox",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

[tool.ruff.lint]
# Enable specific rule sets
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in dataclasses)
]

[tool.ruff.lint.isort]
known-first-party = ["data", "models", "evaluation"]

[tool.black]
# Target version
target-version = ['py311']
# Line length
line-length = 88
# Exclude
exclude = '''
/(
    \.git
  | \.tox
  | __pycache__
  | build
  | dist
  | \.eggs
)/
'''
# Required for consistency with ruff
force-exclude = true

[tool.setuptools]
packages = ["code", "tests"]
package-dir = {"" = "projects/PROJ-512-predicting-molecular-permeability-of-pol"}
