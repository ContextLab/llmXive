[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "predicting-molecular-permeability-of-polymers"
version = "0.1.0"
description = "Predicting Molecular Permeability of Polymers via Graph Neural Networks"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "llmXive Research Team", email = "research@llmxive.org"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.26.0",
    "pandas>=2.1.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.11.0",
    "torch>=2.1.0",
    "torch-geometric>=2.4.0",
    "rdkit>=2023.9.0",
    "h5py>=3.10.0",
    "datasets>=2.14.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "memory-profiler>=0.61.0",
    "mypy>=1.7.0",
]

[tool.setuptools.packages.find]
where = ["projects/PROJ-512-predicting-molecular-permeability-of-pol/code"]
include = ["data*", "models*", "evaluation*", "main*"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
    | data/raw
    | data/processed
    | models
    | evaluation/results
)/
'''

[tool.pytest.ini_options]
testpaths = ["projects/PROJ-512-predicting-molecular-permeability-of-pol/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:rdkit.*",
    "ignore::DeprecationWarning:torch.*",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = false

[tool.ruff]
# Ruff configuration is now in .ruff.toml for separation of concerns
# This file serves as the primary project configuration
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Delegate to .ruff.toml
extend-select = ["ALL"]