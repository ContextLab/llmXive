# Ruff configuration for PROJ-512
# Target Python 3.11
target-version = "py311"

# Line length configuration
line-length = 100

# Select rules: E (Error), F (Pyflakes), W (Warning), I (isort)
select = ["E", "F", "W", "I"]

# Ignore specific rules if necessary (none currently)
ignore = []

# Allow unused variables for testing purposes if needed
# dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Exclude directories
exclude = [
    ".git",
    ".tox",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

# Per-file ignores if needed
# [per-file-ignores]
# "tests/*" = ["S101"]

# Formatting options
# [format]
# quote-style = "double"
# indent-style = "space"
