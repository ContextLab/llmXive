$schema: "http://json-schema.org/draft-07/schema#"
title: "PermeabilityDatasetSchema"
description: "Schema for the processed polymer dataset used in training and evaluation."
type: object
properties:
  metadata:
    type: object
    properties:
      source:
        type: string
        description: "Source of the data (e.g., 'PubChem_SMILES', 'Mock_Target')."
      generated_at:
        type: string
        format: date-time
        description: "ISO 8601 timestamp of data generation."
      total_records:
        type: integer
        minimum: 0
        description: "Total number of polymer records in the dataset."
    required:
      - source
      - generated_at
      - total_records
  records:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the record."
        smiles:
          type: string
          description: "Canonical SMILES string of the polymer."
        molecular_weight:
          type: number
          description: "Molecular weight in Daltons."
        scaffold_id:
          type: string
          description: "Hash of the Murcko scaffold for splitting."
        log_permeability:
          type: number
          description: "Log10 of the permeability coefficient (Barrer)."
        split:
          type: string
          enum: ["train", "val", "test"]
          description: "Dataset split assignment."
        node_features:
          type: array
          items:
            type: object
            properties:
              atom_type:
                type: string
              hybridization:
                type: string
            required:
              - atom_type
              - hybridization
        edge_features:
          type: array
          items:
            type: object
            properties:
              bond_type:
                type: string
              stereo:
                type: string
            required:
              - bond_type
      required:
        - id
        - smiles
        - molecular_weight
        - scaffold_id
        - log_permeability
        - split
    description: "List of polymer records with features and split assignment."
required:
  - metadata
  - records
additionalProperties: false
