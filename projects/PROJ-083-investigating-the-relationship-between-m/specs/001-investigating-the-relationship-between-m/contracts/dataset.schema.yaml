$schema: "http://json-schema.org/draft-07/schema#"
title: ReactionRecordSchema
description: "Schema for the filtered EAS reaction dataset."
type: object
properties:
  reaction_id:
    type: string
    description: "Unique identifier for the reaction."
  reactant_smiles:
    type: string
    description: "SMILES string of the reactant."
  product_smiles:
    type: string
    description: "SMILES string of the product."
  eas_confirmed:
    type: boolean
    description: "Whether the reaction is an Electrophilic Aromatic Substitution."
  selectivity_target:
    type: integer
    description: "Theoretical Regioisomer Count (derived from reactant symmetry)."
  topology_valid:
    type: boolean
    description: "Whether topological descriptors were successfully calculated."
required:
  - reaction_id
  - reactant_smiles
  - product_smiles
  - eas_confirmed
  - selectivity_target
  - topology_valid
additionalProperties: false