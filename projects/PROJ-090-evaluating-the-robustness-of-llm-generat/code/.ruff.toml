[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line-too-long (handled by black)
    "B008", # do-not-perform-argument-calls-in-default-argument-values (needed for some type hints)
]

[lint.isort]
known-first-party = ["config", "utils", "data", "model", "analysis"]
force-sort-within-sections = true

[lint.per-file-ignores]
"code/data/download_humaneval.py" = ["E402"]
"code/model/inference.py" = ["E402"]
"tests/*" = ["F401", "E501"]
