$schema: "http://json-schema.org/draft-07/schema#"
title: "ExecutionResult"
description: "Schema for the outcome of model inference and code execution."
type: "object"
properties:
  result_id:
    type: "string"
    description: "Unique identifier for the execution result."
  variant_id:
    type: "string"
    description: "Foreign key referencing the PromptVariant ID."
  generated_code:
    type: "string"
    description: "The code output generated by the LLM."
  execution_status:
    type: "string"
    description: "Final status of the execution."
    enum:
      - "pass"
      - "fail"
      - "timeout"
      - "oom"
      - "error"
  error_type:
    type: "string"
    description: "Classification of the error if status is not 'pass'."
    enum:
      - "syntax"
      - "logic"
      - "hallucination"
      - "timeout"
      - "none"
  generation_time_ms:
    type: "integer"
    description: "Time taken to generate the code in milliseconds."
  execution_time_ms:
    type: "integer"
    description: "Time taken to execute the tests in milliseconds."
  seed:
    type: "integer"
    description: "Random seed used for the generation (fixed at 42)."
  temperature:
    type: "number"
    description: "Temperature used for the generation (fixed at 0.0)."
required:
  - result_id
  - variant_id
  - generated_code
  - execution_status
  - error_type
  - generation_time_ms
  - execution_time_ms
  - seed
  - temperature