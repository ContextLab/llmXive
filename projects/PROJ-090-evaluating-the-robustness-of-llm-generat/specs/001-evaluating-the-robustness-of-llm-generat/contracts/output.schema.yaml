$schema: "http://json-schema.org/draft-07/schema#"
title: "Inference and Execution Results Schema"
description: "Schema for inference results and execution outcomes"
type: "object"
properties:
  generation_id:
    type: "string"
    description: "Unique identifier for the generation"
  prompt_id:
    type: "string"
    description: "Foreign key to the prompt"
  task_id:
    type: "string"
    description: "Foreign key to the task"
  perturbation_type:
    type: "string"
    enum:
      - "original"
      - "synonym"
      - "typo"
      - "rephrase"
    description: "Type of perturbation applied"
  generated_code:
    type: "string"
    description: "Code generated by the model"
  generation_time_ms:
    type: "integer"
    description: "Time taken for generation in milliseconds"
  timeout:
    type: "boolean"
    description: "True if generation exceeded 30s timeout"
  oom:
    type: "boolean"
    description: "True if out-of-memory error occurred"
  pass:
    type: "boolean"
    description: "True if all unit tests passed"
  error_type:
    type: "string"
    enum:
      - "none"
      - "syntax"
      - "logic"
      - "hallucination"
      - "timeout"
      - "OOM"
    description: "Classification of failure type"
  test_output:
    type: "string"
    description: "Raw output from test execution"
  execution_time_ms:
    type: "integer"
    description: "Time taken for test execution in milliseconds"
  temperature:
    type: "number"
    description: "Temperature used for generation (fixed at 0.0)."
required:
  - generation_id
  - prompt_id
  - task_id
  - perturbation_type
  - generated_code
  - pass
  - error_type
  - temperature
additionalProperties: false