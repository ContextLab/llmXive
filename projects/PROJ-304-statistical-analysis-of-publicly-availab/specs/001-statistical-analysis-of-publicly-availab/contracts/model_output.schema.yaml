$schema: http://json-schema.org/draft-07/schema#
title: "ModelFit Output Schema"
description: "Schema for the output of OLS, Spatial Lag, and Spatial Error models."
type: object
properties:
  model_type:
    type: string
    enum:
      - "OLS"
      - "Spatial_Lag"
      - "Spatial_Error"
    description: "Type of model fitted."
  coefficients:
    type: object
    description: "Map of predictor names to coefficient values."
    additionalProperties:
      type: number
  std_errors:
    type: object
    description: "Map of predictor names to robust standard errors (Conley/Cluster-Robust)."
    additionalProperties:
      type: number
  p_values:
    type: object
    description: "Map of predictor names to BH-FDR corrected p-values."
    additionalProperties:
      type: number
  r_squared:
    type: number
    description: "Coefficient of determination (R²)."
  aic:
    type: number
    description: "Akaike Information Criterion."
  moran_i_residual:
    type: number
    description: "Moran's I statistic for model residuals."
  moran_i_pval:
    type: number
    description: "P-value for Moran's I test."
  spatial_param:
    type: number
    description: "Spatial autoregressive parameter (λ or ρ)."
required:
  - model_type
  - coefficients
  - std_errors
  - p_values
  - r_squared
  - aic
  - moran_i_residual
  - moran_i_pval
  - spatial_param
additionalProperties: false