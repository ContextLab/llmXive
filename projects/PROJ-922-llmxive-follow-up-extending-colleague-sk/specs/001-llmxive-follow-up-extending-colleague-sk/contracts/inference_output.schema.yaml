$schema: http://json-schema.org/draft-07/schema#
title: InferenceOutput
description: Schema for raw model output.
type: object
required:
  - run_id
  - profile_id
  - task_id
  - condition
  - output_text
  - status
  - latency_ms
properties:
  run_id:
    type: string
    description: "Unique run identifier"
  profile_id:
    type: string
    description: "Reference to ExpertProfile"
  task_id:
    type: string
    description: "Reference to TaskScenario"
  condition:
    type: string
    enum:
      - Monolithic
      - Separated
      - Generic
    description: "Prompt condition"
  output_text:
    type: string
    description: "Generated text"
  status:
    type: string
    enum:
      - success
      - timeout
      - error
      - oom
    description: "Execution status"
  latency_ms:
    type: number
    description: "Time taken in milliseconds"
additionalProperties: false
