$schema: http://json-schema.org/draft-07/schema#
title: ExpertProfile
description: Schema for an expert profile with decoupled capability and behavior tracks.
type: object
required:
  - profile_id
  - domain
  - capability_track
  - behavior_track
  - seed
properties:
  profile_id:
    type: string
    description: "Unique identifier (UUID)"
  domain:
    type: string
    description: "Domain of expertise (e.g., Python Developer)"
  capability_track:
    type: array
    items:
      type: string
    description: "List of rules/heuristics"
  behavior_track:
    type: array
    items:
      type: string
    description: "List of style definitions"
  seed:
    type: integer
    description: "Random seed used for generation"
additionalProperties: false
