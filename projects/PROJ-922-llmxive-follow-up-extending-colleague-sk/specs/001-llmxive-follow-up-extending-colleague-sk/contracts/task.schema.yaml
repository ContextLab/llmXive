$schema: "http://json-schema.org/draft-07/schema#"
title: "Task Scenario"
description: "Schema for a generated task scenario with ground truth and hallucination traps."
type: "object"
required:
  - "id"
  - "domain"
  - "difficulty"
  - "prompt"
  - "context"
  - "ground_truth_rules"
  - "hallucination_traps"
  - "created_at"
  - "checksum"
properties:
  id:
    type: "string"
    description: "Unique UUID for the task."
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  domain:
    type: "string"
    description: "Domain of the task."
    enum:
      - "coding"
      - "math"
      - "logic"
      - "creative"
      - "factual"
  difficulty:
    type: "string"
    description: "Difficulty level."
    enum:
      - "easy"
      - "medium"
      - "hard"
  prompt:
    type: "string"
    description: "The user input prompt."
  context:
    type: "string"
    description: "Ground-truth context, facts, or code snippets."
  ground_truth_rules:
    type: "array"
    description: "Rules the output must satisfy."
    items:
      type: "string"
  hallucination_traps:
    type: "array"
    description: "Facts NOT in context that might be hallucinated."
    items:
      type: "string"
  created_at:
    type: "string"
    description: "ISO 8601 timestamp of creation."
    format: "date-time"
  checksum:
    type: "string"
    description: "SHA-256 checksum of the task content."
    pattern: "^[a-f0-9]{64}$"
