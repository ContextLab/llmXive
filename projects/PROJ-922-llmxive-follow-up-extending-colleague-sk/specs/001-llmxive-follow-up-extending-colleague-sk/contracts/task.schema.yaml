$schema: http://json-schema.org/draft-07/schema#
title: TaskScenario
description: Schema for a task scenario with ground truth.
type: object
required:
  - task_id
  - domain
  - prompt
  - context_trace
  - validation_rules
  - exclusion_flag
properties:
  task_id:
    type: string
    description: "Unique identifier"
  domain:
    type: string
    description: "Task domain"
  prompt:
    type: string
    description: "The user prompt"
  context_trace:
    type: array
    items:
      type: string
    description: "Ground-truth facts"
  validation_rules:
    type: array
    items:
      type: string
    description: "Rules for Heuristic Adherence"
  exclusion_flag:
    type: boolean
    description: "True if context is ambiguous"
additionalProperties: false
