$schema: http://json-schema.org/draft-07/schema#
title: Dataset Configuration Schema
description: Schema for validating dataset configuration files in microbial community succession studies.
type: object
required:
  - version
  - description
  - datasets
properties:
  version:
    type: string
    pattern: ^\d+\.\d+\.\d+$
    description: Semantic version of the configuration format.
  description:
    type: string
    minLength: 1
    description: Human-readable description of the configuration.
  datasets:
    type: array
    minItems: 1
    description: List of dataset configurations.
    items:
      type: object
      required:
        - id
        - source
        - description
        - metadata
      properties:
        id:
          type: string
          minLength: 1
          description: Unique identifier for the dataset (e.g., SRA accession or Zenodo DOI).
        source:
          type: string
          enum:
            - ncbi_sra
            - zenodo
            - figshare
            - dryad
          description: Source repository of the dataset.
        description:
          type: string
          minLength: 1
          description: Brief description of the dataset.
        metadata:
          type: object
          required:
            - wetland_type
            - nutrient_removal
            - target_nutrients
            - sampling_stages
            - location
            - study_period
          properties:
            wetland_type:
              type: string
              enum:
                - constructed
                - natural
                - mixed
              description: Type of wetland ecosystem.
            nutrient_removal:
              type: boolean
              description: Whether the study includes nutrient removal metrics.
            target_nutrients:
              type: array
              minItems: 1
              items:
                type: string
                enum:
                  - nitrogen
                  - phosphorus
                  - carbon
                  - sulfur
                  - potassium
                  - magnesium
              description: List of target nutrients being studied.
            sampling_stages:
              type: array
              minItems: 1
              items:
                type: string
              description: List of succession stages sampled (e.g., early, mid, mature).
            location:
              type: string
              minLength: 1
              description: Geographic location of the study.
            study_period:
              type: string
              pattern: ^\d+_months$|^\d+_years$
              description: Duration of the study (e.g., "24_months", "2_years").
      additionalProperties: false
additionalProperties: false
