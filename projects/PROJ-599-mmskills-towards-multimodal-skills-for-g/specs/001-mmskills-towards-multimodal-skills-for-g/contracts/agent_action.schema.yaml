$schema: "http://json-schema.org/draft-07/schema#"
title: "MMSkills Agent Action Schema"
description: "Schema for the structured action output from the agent"
type: "object"
properties:
  action:
    type: "string"
    description: "The action type (e.g., 'click', 'type')"
  coordinate:
    type: "array"
    description: "The coordinate for the action (x, y)"
    items:
      type: "integer"
    minItems: 2
    maxItems: 2
  step_id:
    type: "integer"
    description: "The step ID associated with the action"
  timestamp:
    type: "string"
    description: "ISO 8601 timestamp of the action"
    format: "date-time"
required:
  - "action"
  - "coordinate"
  - "step_id"
  - "timestamp"
additionalProperties: false
