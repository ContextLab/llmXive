access_python: "import networkx as nx\n\ndef load_graphs():\n    graphs = [\n    \
  \    (\"karate_club\", nx.karate_club_graph()),\n        (\"les_miserables\", nx.les_miserables_graph()),\n\
  \        (\"davis_southern_women\", nx.davis_southern_women_graph()),\n        (\"\
  florentine_families\", nx.florentine_families_graph()),\n        (\"caveman\", nx.caveman_graph(2,\
  \ 3)),\n    ]\n    records = []\n    for i, (name, G) in enumerate(graphs):\n  \
  \      rec = {\n            \"graph_id\": i,\n            \"graph_name\": name,\n\
  \            \"node_count\": G.number_of_nodes(),\n            \"edge_count\": G.number_of_edges(),\n\
  \            \"adjacency\": nx.to_dict_of_dicts(G),\n            \"is_connected\"\
  : nx.is_connected(G) if G.number_of_nodes() > 0 else False,\n        }\n       \
  \ records.append(rec)\n    return records\n\nrecords = load_graphs()\nprint(f\"\
  RECORDS={len(records)}\")\nprint(\"FIELDS=\" + \",\".join(records[0].keys()))"
