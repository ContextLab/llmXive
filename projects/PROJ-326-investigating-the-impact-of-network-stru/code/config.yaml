# Global Configuration for Network Topology Energy Transfer Project
# This file serves as the immutable source of truth for seeds and targets (FR-007)

# Global Random Seeds
global_seed: 42
seed_generation: 1001
seed_simulation: 1002
seed_analysis: 1003

# Simulation Parameters
simulation:
  target_graph_count: 1000
  min_nodes: 10
  max_nodes: 100
  edge_probability_er: 0.1
  rewiring_probability_sw: 0.1
  avg_degree_sf: 3
  simulation_timeout_seconds: 300
  max_retries: 10

# Topology Targets
topology:
  er:
    target_clustering: 0.1
    target_degree: 5.0
  sw:
    target_clustering: 0.5
    target_path_length: 2.0
  sf:
    target_power_law_r2: 0.95

# Analysis Parameters
analysis:
  clustering_thresholds: [0.1, 0.3, 0.5, 0.7]
  regression_models: ["linear", "polynomial"]
  anova_correction: "benjamini_hochberg"

# Paths
paths:
  data_raw: "data/raw"
  data_analysis: "data/analysis"
  figures: "figures"
  logs: "data"
