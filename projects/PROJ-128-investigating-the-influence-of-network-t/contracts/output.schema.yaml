# Schema for pipeline output artifacts
# Defines the structure of CSVs and JSON logs produced by the pipeline
$schema: http://json-schema.org/draft-07/schema#
title: Pipeline Output Schema
description: Schema for structural metrics, dynamic metrics, and correlation results

definitions:
  structural_metric_record:
    type: object
    required:
      - subject_id
      - global_efficiency
      - average_clustering
      - modularity
      - sparsity
    properties:
      subject_id:
        type: string
      global_efficiency:
        type: number
        minimum: 0
        maximum: 1
      average_clustering:
        type: number
        minimum: 0
        maximum: 1
      modularity:
        type: number
      sparsity:
        type: number
        minimum: 0
        maximum: 1
      processing_status:
        type: string
        enum: [success, excluded]
      exclusion_reason:
        type: ["string", "null"]

  dynamic_metric_record:
    type: object
    required:
      - subject_id
      - number_of_states
      - mean_dwell_time
      - visited_states
    properties:
      subject_id:
        type: string
      number_of_states:
        type: integer
        minimum: 1
      mean_dwell_time:
        type: number
        minimum: 0
      visited_states:
        type: array
        items:
          type: integer
      processing_status:
        type: string
        enum: [success, excluded]
      exclusion_reason:
        type: ["string", "null"]

  correlation_result_record:
    type: object
    required:
      - metric_pair
      - correlation_type
      - r_value
      - p_value
      - fdr_corrected_p
      - is_significant
    properties:
      metric_pair:
        type: string
        description: "e.g., 'global_efficiency_vs_mean_dwell_time'"
      correlation_type:
        type: string
        enum: [pearson, spearman]
      r_value:
        type: number
      p_value:
        type: number
        minimum: 0
        maximum: 1
      fdr_corrected_p:
        type: number
        minimum: 0
        maximum: 1
      is_significant:
        type: boolean
      sensitivity_20tr_diff:
        type: ["number", "null"]
        description: Absolute difference in r-value if 20TR sensitivity was run

  exclusion_log_entry:
    type: object
    required:
      - subject_id
      - reason
      - timestamp
    properties:
      subject_id:
        type: string
      reason:
        type: string
      timestamp:
        type: string
        format: date-time
      details:
        type: ["object", "null"]

# Root definitions for specific output files
structural_metrics_csv:
  type: array
  items:
    $ref: '#/definitions/structural_metric_record'

dynamic_metrics_csv:
  type: array
  items:
    $ref: '#/definitions/dynamic_metric_record'

correlation_results_csv:
  type: array
  items:
    $ref: '#/definitions/correlation_result_record'

exclusion_log_json:
  type: object
  required:
    - run_id
    - excluded_subjects
  properties:
    run_id:
      type: string
    timestamp:
      type: string
      format: date-time
    excluded_subjects:
      type: array
      items:
        $ref: '#/definitions/exclusion_log_entry'
