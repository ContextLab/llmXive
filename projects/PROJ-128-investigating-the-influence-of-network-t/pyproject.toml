[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-brain-topology"
version = "0.1.0"
description = "Investigating the Influence of Network Topology on Spontaneous Brain Activity Patterns"
requires-python = ">=3.9"
dependencies = [
    "nilearn",
    "networkx",
    "scikit-learn",
    "pandas",
    "numpy",
    "statsmodels",
    "scipy",
    "pyyaml",
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["analysis", "preprocess", "reports", "config", "main"]

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
]
per-file-ignores = [
    "__init__.py:F401",
]

[tool.pylint.MASTER]
ignore = ["tests", ".venv", "build", "dist"]
load-plugins = ["pylint.extensions.docparams"]

[tool.pylint.MESSAGES_CONTROL]
disable = [
    "C0111",  # missing-docstring (allow for brevity in scripts)
    "R0903",  # too-few-public-methods
    "W0511",  # fixme
]
