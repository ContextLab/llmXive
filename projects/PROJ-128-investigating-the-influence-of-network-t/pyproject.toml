[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-brain-topology"
version = "0.1.0"
description = "Investigating the influence of network topology on spontaneous brain activity patterns"
requires-python = ">=3.9"
dependencies = [
    "nilearn",
    "networkx",
    "scikit-learn",
    "pandas",
    "numpy",
    "statsmodels",
    "scipy",
    "pyyaml",
    "black",
    "flake8",
    "pylint",
    "pre-commit"
]

[tool.black]
line-length = 88
target-version = ['py39', 'py310', 'py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503"]
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv"
]
per-file-ignores = []
max-complexity = 15

[tool.pylint.'MESSAGES CONTROL']
max-line-length = 88
disable = [
    "C0114",  # missing-module-docstring
    "C0115",  # missing-class-docstring
    "C0116",  # missing-function-docstring
    "R0903",  # too-few-public-methods
    "R0913",  # too-many-arguments
    "R0914",  # too-many-locals
    "W0511"   # fixme
]

[tool.pylint.FORMAT]
max-line-length = 88

[tool.pylint.DESIGN]
max-args = 10
max-locals = 20
