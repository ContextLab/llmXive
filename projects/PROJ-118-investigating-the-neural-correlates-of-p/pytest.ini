[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests (no external dependencies, fast)
    integration: Integration tests (requires data pipelines)
filterwarnings =
    ignore::DeprecationWarning:mne.*
    ignore::UserWarning:numpy.*
timeout = 300
timeout_method = thread