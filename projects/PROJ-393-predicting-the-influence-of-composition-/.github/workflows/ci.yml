name: CPU-Only CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel in-progress runs on new commits to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Resource constraints for CPU-only CI
    timeout-minutes: 45
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install test dependencies if separate
          pip install pytest pytest-cov

      - name: Display Python and system info
        run: |
          python --version
          pip --version
          free -h
          nproc

      - name: Run linting (ruff)
        run: |
          # Assuming ruff is in requirements.txt as per T002/T003
          ruff check code/ || true

      - name: Run formatting check (black)
        run: |
          # Assuming black is in requirements.txt as per T002/T003
          black --check code/ || true

      - name: Run unit tests
        run: |
          pytest code/tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          pytest code/tests/integration/ -v --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs-${{ matrix.python-version }}
          path: |
            code/tests/
            *.log
          retention-days: 5