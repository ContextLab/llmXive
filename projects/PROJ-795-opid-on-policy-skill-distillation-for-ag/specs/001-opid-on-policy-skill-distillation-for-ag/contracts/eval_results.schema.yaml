$schema: "http://json-schema.org/draft-07/schema#"
title: "Evaluation Results"
description: "Schema for aggregated evaluation results across tasks."
type: object
properties:
  task_name:
    type: string
    description: "Name of the ALFWorld task."
  total_episodes:
    type: integer
    description: "Total number of episodes run."
  success_count:
    type: integer
    description: "Number of successful episodes."
  success_rate:
    type: number
    minimum: 0
    maximum: 1
    description: "Success rate (success_count / total_episodes)."
  avg_steps:
    type: number
    description: "Average number of steps per episode."
  skill_distribution:
    type: object
    properties:
      episode_skills:
        type: integer
        description: "Count of steps using episode-level skills."
      step_skills:
        type: integer
        description: "Count of steps using step-level skills."
    required:
      - episode_skills
      - step_skills
required:
  - task_name
  - total_episodes
  - success_count
  - success_rate
  - avg_steps
  - skill_distribution
additionalProperties: false