# Dataset Schema Definition
# Used for validating raw, processed, and external datasets.
# Matches the columns required by the pipeline and T035a/T035.

type: object
properties:
  material_id:
    type: string
    description: Unique identifier for the adsorbent material
  adsorbate:
    type: string
    description: Name of the adsorbate gas (e.g., Kr, Xe, N2)
  isotherm_type:
    type: string
    description: IUPAC isotherm type (e.g., Type I, Type IV)
  surface_area:
    type: number
    description: BET surface area in m2/g
  pore_volume:
    type: number
    description: Total pore volume in cm3/g
  polarizability:
    type: number
    description: Molecular polarizability in Angstrom^3
  kinetic_diameter:
    type: number
    description: Kinetic diameter in Angstrom
  lj_energy_param:
    type: number
    description: Lennard-Jones energy parameter (epsilon/kB) in Kelvin
  quadrupole_moment:
    type: number
    description: Quadrupole moment in Debye/Angstrom^2
  langmuir_capacity:
    type: number
    description: Langmuir capacity (saturation uptake) in mmol/g
  henry_constant:
    type: number
    description: Henry's law constant in mmol/g/bar
  temperature:
    type: number
    description: Temperature in Kelvin
  pressure:
    type: number
    description: Pressure in bar
required:
  - material_id
  - adsorbate
  - isotherm_type
  - surface_area
  - pore_volume
  - polarizability
  - kinetic_diameter
  - lj_energy_param
  - langmuir_capacity
  - henry_constant
  - temperature
  - pressure