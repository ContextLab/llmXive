[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "llmxive-researchclaw-follow-up"
version = "0.1.0"
description = "llmXive follow-up: extending ResearchClawBench"
requires-python = ">=3.11"
dependencies = [
    "pandas",
    "scipy",
    "pytest",
    "pyyaml",
    "jsonschema",
    "datasets",
    "tqdm",
    "numpy",
    "statsmodels",
    "requests"
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "pytest-cov",
    "mypy"
]

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501", # Line too long (handled by black)
    "B008", # Do not perform function call in argument defaults (common in fastapi/pytest)
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  \.eggs
  | \.git
  | \.mypy_cache
  | \.venv
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["code/tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"