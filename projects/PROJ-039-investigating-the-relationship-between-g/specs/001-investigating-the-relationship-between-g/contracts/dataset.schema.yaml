$schema: "http://json-schema.org/draft-07/schema#"
title: "Dataset Schema"
description: "Schema for input dataset files (microbiome_features.csv, eeg_features.csv)"
type: "object"
properties:
  microbiome_features:
    type: "array"
    items:
      type: "object"
      properties:
        subject_id:
          type: "string"
          description: "Unique identifier for the subject"
        age:
          type: "integer"
          description: "Age in years"
        sex:
          type: "string"
          description: "Biological sex (e.g., 'M', 'F')"
        bmi:
          type: "number"
          description: "Body Mass Index (kg/m²)"
        diet_category:
          type: "string"
          description: "Diet category (e.g., 'vegetarian', 'omnivore')"
        genus_abundances:
          type: "object"
          additionalProperties:
            type: "number"
            description: "Relative abundance for each genus"
      required:
        - subject_id
        - age
        - sex
        - genus_abundances
      additionalProperties: false
  eeg_features:
    type: "array"
    items:
      type: "object"
      properties:
        subject_id:
          type: "string"
          description: "Unique identifier for the subject"
        age:
          type: "integer"
          description: "Age in years"
        sex:
          type: "string"
          description: "Biological sex (e.g., 'M', 'F')"
        bmi:
          type: "number"
          description: "Body Mass Index (kg/m²)"
        diet_category:
          type: "string"
          description: "Diet category (e.g., 'vegetarian', 'omnivore')"
        alpha_power:
          type: "number"
          description: "Mean alpha power (μV²/Hz)"
        n_epochs:
          type: "integer"
          description: "Number of valid epochs"
      required:
        - subject_id
        - age
        - sex
        - alpha_power
      additionalProperties: false
required:
  - microbiome_features
  - eeg_features
additionalProperties: false