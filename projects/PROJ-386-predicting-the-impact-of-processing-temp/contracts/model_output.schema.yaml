# Model Output Schema for Predicting the Impact of Processing Temperature on Grain Size
# This schema defines the structure of all model artifacts and reports generated by the pipeline.
# Used for validation of outputs from baseline.py, non_linear.py, sensitivity.py, and confounder.py.

type: object
required:
  - model_type
  - model_params
  - metrics
  - timestamp
  - version

properties:
  model_type:
    type: string
    description: The type of model (e.g., "LinearRegression", "RandomForestRegressor")
    enum:
      - "LinearRegression"
      - "RandomForestRegressor"
      - "GradientBoostingRegressor"
      - "SVMRegressor"

  model_params:
    type: object
    description: The hyperparameters used for training the model
    additionalProperties: true

  metrics:
    type: object
    required:
      - r2
      - mae
      - rmse
      - train_size
      - val_size
      - test_size
    properties:
      r2:
        type: number
        description: Coefficient of determination (R²)
      mae:
        type: number
        description: Mean Absolute Error
      rmse:
        type: number
        description: Root Mean Squared Error
      train_size:
        type: integer
        description: Number of samples in training set
      val_size:
        type: integer
        description: Number of samples in validation set
      test_size:
        type: integer
        description: Number of samples in test set
      delta_r2:
        type: number
        description: Difference in R² compared to baseline (only for non-linear models)
        required: false

  coefficients:
    type: array
    description: Model coefficients (for linear models) or feature importances (for tree-based models)
    items:
      type: object
      required:
        - feature
        - value
      properties:
        feature:
          type: string
          description: Feature name
        value:
          type: number
          description: Coefficient value or importance score

  sensitivity_analysis:
    type: object
    description: Results from sensitivity analysis (for non-linear models)
    required: false
    properties:
      thresholds:
        type: array
        items:
          type: number
        description: Thresholds used for feature importance filtering
      stability_score:
        type: number
        description: Stability score of top-5 features across thresholds (0.0-1.0)
      top_features:
        type: array
        items:
          type: string
        description: List of top-5 most stable features

  confounder_analysis:
    type: object
    description: Results from confounder analysis
    required: false
    properties:
      proxy_variables_found:
        type: boolean
        description: Whether proxy variables (e.g., strain rate, cooling rate) were detected
      comparative_r2:
        type: number
        description: R² when excluding proxy variables (if applicable)
        required: false
      status:
        type: string
        enum:
          - "N/A"
          - "No proxies found"
          - "Proxies found, analysis complete"
          - "Proxies found, analysis incomplete"
      report:
        type: string
        description: Human-readable summary of confounder analysis

  collinearity_report:
    type: object
    description: Collinearity detection and framing results
    required: false
    properties:
      high_correlation_pairs:
        type: array
        items:
          type: object
          required:
            - feature1
            - feature2
            - correlation
          properties:
            feature1:
              type: string
            feature2:
              type: string
            correlation:
              type: number
        description: Pairs with |r| > 0.8
      chemical_couplings:
        type: array
        items:
          type: string
        description: Chemical couplings identified (e.g., "Mg/Si")
      non_chemical_collinearity:
        type: array
        items:
          type: string
        description: Non-chemical collinearity identified

  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp of model generation

  version:
    type: string
    description: Pipeline version that generated this output
    pattern: '^\d+\.\d+\.\d+$'

  data_hash:
    type: string
    description: SHA-256 hash of the input dataset used for training
    pattern: '^[a-f0-9]{64}$'
    required: false

  notes:
    type: string
    description: Additional notes or warnings (e.g., timeout fallback used)
    required: false
