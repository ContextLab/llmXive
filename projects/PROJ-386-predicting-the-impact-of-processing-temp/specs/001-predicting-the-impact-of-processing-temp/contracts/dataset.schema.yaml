$schema: "http://json-schema.org/draft-07/schema#"
title: "AlloySample Dataset Schema"
description: "Schema for the processed dataset containing rolling temperature, composition, and grain size."
type: object
properties:
  sample_id:
    type: string
    description: "Unique identifier for the sample."
  alloy_series:
    type: string
    description: "Alloy series classification (e.g., '1xxx', '6xxx')."
    pattern: "^[0-9]xxx$"
  temperature:
    type: number
    description: "Rolling temperature in degrees Celsius."
    minimum: 0
  grain_size:
    type: number
    description: "Measured grain size in micrometers."
    minimum: 0
  mg_wt:
    type: number
    description: "Magnesium weight percentage."
    minimum: 0
    maximum: 100
  si_wt:
    type: number
    description: "Silicon weight percentage."
    minimum: 0
    maximum: 100
  cu_wt:
    type: number
    description: "Copper weight percentage."
    minimum: 0
    maximum: 100
  zn_wt:
    type: number
    description: "Zinc weight percentage."
    minimum: 0
    maximum: 100
  other_wt:
    type: number
    description: "Sum of other alloying elements."
    minimum: 0
    maximum: 100
  source:
    type: string
    description: "Original dataset source."
  temp_mg_int:
    type: number
    description: "Interaction term: Temperature * Mg."
  temp_si_int:
    type: number
    description: "Interaction term: Temperature * Si."
  temp_cu_int:
    type: number
    description: "Interaction term: Temperature * Cu."
  temp_zn_int:
    type: number
    description: "Interaction term: Temperature * Zn."
  residual_grain_size:
    type: number
    description: "Residual of grain size after regressing against alloy series and composition."
required:
  - sample_id
  - temperature
  - grain_size
  - alloy_series
additionalProperties: false