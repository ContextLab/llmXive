$schema: "http://json-schema.org/draft-07/schema#"
title: "Model Artifact Schema"
description: "Schema for the output of the modeling pipeline, including metrics and diagnostics."
type: object
properties:
  model_type:
    type: string
    enum:
      - "LinearRegression"
      - "RandomForest"
    description: "Type of model trained."
  hyperparams:
    type: object
    description: "Hyperparameters used for training."
    additionalProperties: true
  metrics:
    type: object
    properties:
      r2:
        type: number
        description: "R-squared score on the test set."
      mae:
        type: number
        description: "Mean Absolute Error."
      rmse:
        type: number
        description: "Root Mean Squared Error."
    required:
      - r2
      - mae
      - rmse
  feature_importance:
    type: object
    description: "Map of feature names to importance scores or coefficients."
    additionalProperties:
      type: number
  collinearity_flags:
    type: array
    items:
      type: object
      properties:
        feature_pair:
          type: array
          items:
            type: string
          description: "Pair of features with high correlation."
        correlation:
          type: number
          description: "Correlation coefficient (> 0.8)."
      required:
        - feature_pair
        - correlation
    description: "List of flagged collinear pairs."
  sensitivity_analysis:
    type: object
    properties:
      thresholds_swept:
        type: array
        items:
          type: number
        description: "List of thresholds tested (e.g., [0.01, 0.05, 0.1])."
      top_5_stability:
        type: number
        description: "Percentage of top-5 terms stable across sweeps."
      significant_terms:
        type: array
        items:
          type: string
        description: "List of significant interaction terms."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of the training run."
  seed:
    type: integer
    description: "Random seed used."
  fallback_triggered:
    type: boolean
    description: "True if the grid search timed out and fallback params were used."
  confounder_notes:
    type: string
    description: "Notes on unmeasured confounders and the residualization approach used."
required:
  - model_type
  - metrics
  - timestamp
  - seed
additionalProperties: false