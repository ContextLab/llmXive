[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "materials-uq-pipeline"
version = "0.1.0"
description = "Assessing Uncertainty Quantification Techniques for Materials Property Predictions"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Research Team", email = "research@example.com"}
]
dependencies = [
    "numpy>=1.24.3",
    "pandas>=2.0.3",
    "scipy>=1.11.4",
    "scikit-learn>=1.3.2",
    "torch>=2.1.0",
    "xgboost>=2.0.3",
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "pyyaml>=6.0.1",
    "python-dotenv>=1.0.0",
    "matminer>=0.9.3",
    "pymatgen>=2023.9.25",
    "mendeleev>=0.15.0",
    "conformal>=0.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.5",
    "black>=23.11.0",
]

[tool.setuptools]
packages = ["code", "code.models", "code.metrics", "code.stats", "code.utils", "tests", "tests.unit", "tests.integration"]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]  # Allow unused imports in __init__.py files

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
