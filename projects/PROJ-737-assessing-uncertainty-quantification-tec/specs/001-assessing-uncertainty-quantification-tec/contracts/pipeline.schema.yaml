$schema: "http://json-schema.org/draft-07/schema#"
title: "PipelineExecutionSchema"
description: "Schema for the pipeline execution log and status."
type: object
properties:
  run_id:
    type: string
    description: "Unique identifier for the run"
  timestamp:
    type: string
    format: date-time
    description: "Execution timestamp"
  status:
    type: string
    enum:
      - "success"
      - "partial_success"
      - "failed"
    description: "Overall pipeline status"
  steps:
    type: array
    items:
      type: object
      properties:
        step_name:
          type: string
        status:
          type: string
          enum:
            - "passed"
            - "skipped"
            - "failed"
        duration_seconds:
          type: number
        error_message:
          type: string
          description: "Error details if failed"
      required:
        - step_name
        - status
  memory_peak_mb:
    type: number
    description: "Peak memory usage in MB"
  total_duration_seconds:
    type: number
    description: "Total runtime in seconds"
required:
  - run_id
  - timestamp
  - status
  - steps
  - memory_peak_mb
  - total_duration_seconds
