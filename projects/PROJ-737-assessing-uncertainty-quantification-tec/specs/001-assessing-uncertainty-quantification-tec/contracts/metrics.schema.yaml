$schema: "http://json-schema.org/draft-07/schema#"
title: "EvaluationMetricSchema"
description: "Schema for the evaluation metrics output (Calibration Error, Sharpness)."
type: object
properties:
  dataset_id:
    type: string
    description: "Foreign key to the dataset."
  method_id:
    type: string
    enum:
      - "gpr"
      - "mc_dropout"
      - "deep_ensemble"
      - "conformal"
    description: "UQ method identifier."
  metric_type:
    type: string
    enum:
      - "calibration_error"
      - "sharpness"
      - "coverage_error"
    description: "Type of metric calculated."
  value:
    type: number
    description: "Calculated scalar value."
  nominal_coverage:
    type: number
    minimum: 0
    maximum: 1
    description: "Target coverage level (e.g., 0.95)."
  timestamp:
    type: string
    format: date-time
    description: "ISO 8601 timestamp."
required:
  - dataset_id
  - method_id
  - metric_type
  - value
  - timestamp
additionalProperties: false
