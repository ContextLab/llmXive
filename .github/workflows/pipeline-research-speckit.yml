name: Pipeline — Research Spec Kit (specify/clarify/plan/tasks)
on:
  schedule:
    - cron: '30 */4 * * *'   # every 4 hours, offset 30min
  workflow_dispatch:
permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write
  issues: write
concurrency:
  group: pipeline-research-speckit
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    # A single spec/plan/tasks convergence on the slow qwen reasoning model can
    # take ~80 min (panel identify + revise + re-review across the cap); the old
    # 35-min cap timeout-CANCELLED the run mid-convergence (~27% of recent runs),
    # losing the work so the gate never completed — the bottleneck behind the
    # specified/planned pile-up. 120 min fits one slow convergence with headroom;
    # LLMXIVE_RUN_WALL_BUDGET_S=2400 (40 min) breaks the multi-step loop early so a
    # final long step + commit always land before this timeout (a clean exit, not
    # a cancel). Fast convergences still batch several per run within the budget.
    timeout-minutes: 120
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      LLMXIVE_RUN_WALL_BUDGET_S: "2400"
      # Guarded paid fallback (claude-haiku) for when ALL free models flap;
      # globally hard-capped by the daily ~$2 credit budget (backends/credits.py).
      LLMXIVE_PAID_OPT_IN: "1"
      LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
      # Paid escalation ladder (after the free tiers) for the execution/convergence fix-loop
      LLMXIVE_EXECUTION_PAID_TIERS: "anthropic.claude-haiku-4-5-20251001,anthropic.claude-sonnet-4-6,anthropic.claude-opus-4-6"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      - run: python -m llmxive preflight
      # Load-balanced: the scheduler advances the most over-target stages,
      # draining the speckit chain (validated -> project_initialized -> ... ->
      # tasked) toward an equal per-stage population. No per-stage filter.
      - name: Balanced advance pass
        run: python -m llmxive run --max-tasks 16
      - run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Commit + push
        id: commit
        run: |
          bash scripts/ci/commit-and-push.sh "pipeline(speckit): 4h tick"

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes (to
        # prevent infinite cron loops); workflow_dispatch invoked from another
        # workflow DOES fire regardless. Without this, pages.yml never
        # redeploys after a cron tick even though we touched web/data/.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
