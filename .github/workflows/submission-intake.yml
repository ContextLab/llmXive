name: Submission Intake

# Hourly: triage open `human-submission` GitHub issues from the public website
# (feedback / new-paper) — route / create-project / file-paper / acknowledge,
# then comment + close. A per-submission failure never fails the run; a
# precondition failure does. Entry point: `python -m llmxive submissions process`.
# (No untrusted github.event.* inputs are interpolated into run: steps — the
# issue contents are read by the Python entry point via the GitHub API, never
# echoed into a shell.)

on:
  schedule:
    - cron: "0 * * * *"     # hourly, at :00
  workflow_dispatch: {}       # for the one-time manual exercise + ad-hoc runs

permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write             # commit staged-PDF moves / inbox cleanup
  issues: write               # comment on + close human-submission issues

concurrency:
  group: submission-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Process open human-submission issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
        run: python -m llmxive submissions process
      - name: Regenerate web data
        # Submission-intake creates new projects; the website's project lists
        # are driven by web/data/projects.json. Without regenerating it,
        # newly-created projects (e.g. papers filed by the HF daily-papers
        # cron) won't appear in the paper-pipeline lane until the next
        # full pipeline run. Other pipeline workflows already do this.
        run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Push file moves if any
        id: commit
        # No [skip ci] — touching web/data/projects.json must trigger
        # pages.yml so newly-filed papers actually appear on the site.
        #
        # Race-resilient pattern (mirrors paper-compile.yml): a failed
        # `git pull --rebase` leaves the worktree mid-rebase, breaking the
        # next iteration. We must `git rebase --abort` between tries, and
        # we regenerate `web/data/projects.json` AFTER each successful
        # pull so the JSON reflects merged state (eliminates the most
        # common conflict source).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Quick check: did intake produce any changes at all?
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Reset the cached add — we'll commit-after-rebase per attempt.
          git reset
          for i in 1 2 3 4 5; do
            # Pull latest main BEFORE committing. Stash so our intake-
            # produced files (state/*, projects/*, inbox moves, json)
            # survive the pull cleanly.
            git stash push --include-untracked -m "intake-work" 2>/dev/null || true
            if ! git pull --rebase --autostash origin main; then
              echo "pull/rebase failed on attempt $i; aborting + retrying"
              git rebase --abort 2>/dev/null || true
              git stash pop 2>/dev/null || true
              sleep $((5 * i))
              continue
            fi
            git stash pop 2>/dev/null || true
            # Regenerate web data AFTER the pull so it reflects merged
            # state (eliminates the projects.json conflict source).
            python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
            git add -A
            if git diff --cached --quiet; then
              echo "no changes after rebase (someone else processed these)"
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git commit -m "submission-intake: process submissions"
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push attempt $i failed (race?); resetting commit + retrying"
            git reset --soft HEAD~1
            sleep $((5 * i))
          done
          echo "push failed after 5 attempts" >&2
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes, so
        # pages.yml's `push` trigger silently no-ops for bot commits.
        # workflow_dispatch invoked from a workflow DOES fire — use it.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
