name: Submission Intake

# Hourly: triage open `human-submission` GitHub issues from the public website
# (feedback / new-paper) — route / create-project / file-paper / acknowledge,
# then comment + close. A per-submission failure never fails the run; a
# precondition failure does. Entry point: `python -m llmxive submissions process`.
# (No untrusted github.event.* inputs are interpolated into run: steps — the
# issue contents are read by the Python entry point via the GitHub API, never
# echoed into a shell.)

on:
  schedule:
    - cron: "0 * * * *"     # hourly, at :00
  workflow_dispatch: {}       # for the one-time manual exercise + ad-hoc runs

permissions:
  contents: write             # commit staged-PDF moves / inbox cleanup
  issues: write               # comment on + close human-submission issues

concurrency:
  group: submission-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Process open human-submission issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
        run: python -m llmxive submissions process
      - name: Regenerate web data
        # Submission-intake creates new projects; the website's project lists
        # are driven by web/data/projects.json. Without regenerating it,
        # newly-created projects (e.g. papers filed by the HF daily-papers
        # cron) won't appear in the paper-pipeline lane until the next
        # full pipeline run. Other pipeline workflows already do this.
        run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Push file moves if any
        # No [skip ci] — touching web/data/projects.json must trigger
        # pages.yml so newly-filed papers actually appear on the site.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "submission-intake: process submissions"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed; retrying..." >&2
            sleep $((5 * i))
          done
          exit 1
