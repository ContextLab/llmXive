name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'projects/**/paper/pdf/**.pdf'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync web/ -> docs/
        run: |
          rm -rf docs
          cp -R web docs
          touch docs/.nojekyll

      - name: Mirror paper PDFs into docs/ for same-origin inline rendering
        # raw.githubusercontent.com serves PDFs with Content-Disposition:
        # attachment + X-Frame-Options: deny so browsers refuse to render
        # them inline. GitHub Pages serves PDFs from the same origin with a
        # proper Content-Type: application/pdf, so we mirror every paper PDF
        # under docs/papers/<project_id>/<filename>.pdf for the paper modal
        # to embed.
        run: |
          set -euo pipefail
          mkdir -p docs/papers
          # File paths are entirely under our control here (repo-checked-out
          # paths only). No untrusted input is interpolated into the shell.
          while IFS= read -r src; do
            proj=$(echo "$src" | awk -F/ '{print $2}')
            name=$(basename "$src")
            mkdir -p "docs/papers/$proj"
            cp "$src" "docs/papers/$proj/$name"
          done < <(find projects -path 'projects/*/paper/pdf/*.pdf' -type f)

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "deploy: sync web/ -> docs/ for GitHub Pages [skip ci]"
            # The ~10 cron workflows commit to main constantly, so a bare push
            # races and is rejected non-fast-forward (the dominant Deploy Pages
            # failure). Rebase-retry: this commit only touches docs/ (regenerated
            # wholesale from web/), so rebasing onto sibling non-docs commits is
            # conflict-free. Check the push exit code DIRECTLY (never through a
            # pipe, which would mask a rejection) and fail honestly if it can't
            # land after retries.
            pushed=0
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then pushed=1; break; fi
              echo "push rejected (main advanced) — fetch+rebase, attempt $attempt"
              git fetch origin main
              if ! git rebase origin/main; then
                git rebase --abort || true
                sleep $((attempt * 3))
              fi
            done
            if [ "$pushed" != "1" ]; then
              echo "::error::deploy: failed to push docs after 5 rebase-retry attempts (main moving too fast)"
              exit 1
            fi
          fi
