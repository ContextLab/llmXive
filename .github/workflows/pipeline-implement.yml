name: Pipeline — Implement
on:
  schedule:
    # Every 4h — the implement lane is the in_progress -> research_complete
    # drain, and it was throttled to 3x/day while its feeder (research-speckit,
    # every 4h) filled in_progress 6x/day, so projects piled up at in_progress.
    # Match the feeder cadence so the drain keeps up. Safe: cancel-in-progress
    # is false (queued, never cancelled) and runs finish well under the 120-min
    # timeout (the run_analysis deadline is capped at the wall budget), so a 4h
    # gap never overlaps.
    - cron: '45 */4 * * *'   # every 4 hours
  workflow_dispatch:
    inputs:
      stage:
        description: "Optional stage to target (e.g. in_progress). Blank = load-balanced over all stages."
        required: false
        default: ""
      project:
        description: "Optional single project id to target (e.g. PROJ-262-...). Blank = scheduler picks."
        required: false
        default: ""
      max_tasks:
        description: "Scheduler ticks this run (each implement tick batches many tasks)."
        required: false
        default: "10"
permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write
  issues: write
concurrency:
  group: pipeline-implement
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    # The implement lane runs the project's ACTUAL execution code (analysis +
    # gate), the longest single step in the pipeline — yet it used to carry the
    # SHORTEST cap (35→50 min) and NO wall budget, so it timed-out-CANCELLED
    # (3 of 4 recent runs), losing the analyzed -> in_progress -> research_complete
    # work and starving the projects closest to done. Match the other
    # convergence lanes (#64): 120 min fits one long execute step;
    # LLMXIVE_RUN_WALL_BUDGET_S=2400 (40 min) breaks the multi-tick loop early so
    # a final long step + commit always land before the timeout (clean exit, not
    # a cancel that discards the run-log + state).
    timeout-minutes: 120
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      LLMXIVE_RUN_WALL_BUDGET_S: "2400"
      # Guarded paid fallback (claude-haiku) for when ALL free models flap;
      # globally hard-capped by the daily ~$2 credit budget (backends/credits.py).
      LLMXIVE_PAID_OPT_IN: "1"
      LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # GPU-offload lane (issue #367): GPU-bound projects that fail on this free
      # CPU-only runner are dispatched to Kaggle's free GPU instead of grinding.
      # KAGGLE_API_TOKEN is the verbatim kaggle.json the Kaggle site issues
      # ({"username":...,"key":...}); offload._ensure_kaggle_auth parses it and
      # writes ~/.kaggle/kaggle.json for the CLI. GATED-ON-SECRETS — when the
      # secret is unset, offload.is_available() is False and the lane runs
      # EXACTLY as before. (KAGGLE_USERNAME/KAGGLE_KEY are also honored if set.)
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      # GPU-offload lane (issue #367): the Kaggle CLI. Inert unless
      # KAGGLE_USERNAME/KAGGLE_KEY secrets are set (offload.is_available()).
      - run: pip install kaggle
      - run: python -m llmxive preflight
      # Load-balanced by default: scheduler picks the most over-target stages
      # (incl. in_progress execute-and-gate). A manual run may pass `stage` to
      # focus an advance pass (e.g. validate in_progress batching) — scheduled
      # runs leave it blank and stay fully load-balanced.
      - name: Advance pass
        run: |
          ARGS=(run --max-tasks "${MAX_TASKS:-10}")
          if [ -n "${STAGE}" ]; then ARGS+=(--stage "${STAGE}"); fi
          if [ -n "${PROJECT}" ]; then ARGS+=(--project "${PROJECT}"); fi
          echo "llmxive ${ARGS[*]}"
          python -m llmxive "${ARGS[@]}"
        env:
          STAGE: ${{ github.event.inputs.stage }}
          PROJECT: ${{ github.event.inputs.project }}
          MAX_TASKS: ${{ github.event.inputs.max_tasks }}
      - run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Commit + push
        id: commit
        run: |
          bash scripts/ci/commit-and-push.sh "pipeline(implement): 8h tick"

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes (to
        # prevent infinite cron loops); workflow_dispatch invoked from another
        # workflow DOES fire regardless. Without this, pages.yml never
        # redeploys after a cron tick even though we touched web/data/.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
