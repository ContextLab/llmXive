name: Pipeline — Reviews (research + paper)
on:
  schedule:
    - cron: '0 */16 * * *'   # every 16 hours
  workflow_dispatch:
permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write
  issues: write
concurrency:
  group: pipeline-review
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    # A research_review / paper_review convergence runs an 8-12 lens panel across
    # the 3-round cap on the slow qwen model — it can exceed the old 60-min cap and
    # time out mid-review (cancelled, work lost → the paper_review pile-up).
    # 150 min fits one slow review; LLMXIVE_RUN_WALL_BUDGET_S=2400 (40 min) breaks
    # the loop early so a final long review + commit land before this timeout.
    timeout-minutes: 150
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      LLMXIVE_RUN_WALL_BUDGET_S: "2400"
      # Guarded paid fallback (claude-haiku) for when ALL free models flap;
      # globally hard-capped by the daily ~$2 credit budget (backends/credits.py).
      LLMXIVE_PAID_OPT_IN: "1"
      LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      # The review-convergence lane also runs PAPER-track revision implementers,
      # which recompile the manuscript (lualatex). Without TeX the compile would
      # be deferred (graceful degradation) and paper_complete could never be
      # decided here; install TeX so paper reviews fully compile + verify.
      - name: Install TeX Live (shared SSoT package set)
        run: bash scripts/ci/install-texlive.sh
      - run: pip install -e ".[dev]"
      - run: python -m llmxive preflight
      # Load-balanced: the scheduler advances whichever stages are most over
      # their equal-share target (incl. research_review / paper_review review
      # convergence). No per-stage filter — balancing decides where work goes.
      - name: Balanced advance pass
        run: python -m llmxive run --max-tasks 24
      - run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Commit + push
        id: commit
        run: |
          bash scripts/ci/commit-and-push.sh "pipeline(review): 16h tick"

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes (to
        # prevent infinite cron loops); workflow_dispatch invoked from another
        # workflow DOES fire regardless. Without this, pages.yml never
        # redeploys after a cron tick even though we touched web/data/.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
