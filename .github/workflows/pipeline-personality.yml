name: Pipeline — Personality (simulated public-figure personas)

# 30-minute rotation through agents/prompts/personalities/ per spec 008.
# Per FR-016 the workflow concurrency group serializes runs so two
# personalities cannot contribute at the same instant. Per FR-019 the
# cadence lives ONLY in this file's `schedule.cron` value — to change it,
# edit this file. The workflow uses NO untrusted GitHub event inputs;
# all run-step content is static.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write
  issues: write

concurrency:
  group: pipeline-personality
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Preflight
        run: python -m llmxive preflight

      - name: Run one personality tick
        run: python -m llmxive run --agent personality --max-tasks 1

      - name: Regenerate web data
        # Every other pipeline does this; personality was the only outlier,
        # so contributions never reached the activity page (web/js/app.js
        # reads recent_activity from projects.json, which is rebuilt from
        # state/run-log/**/*.jsonl by web_data.py _recent_activity).
        # Committing web/data/ also satisfies the pages.yml path filter
        # (web/**) so Pages redeploys after every cron tick.
        run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"

      - name: Commit state + run-log + web data
        id: commit
        run: |
          bash scripts/ci/commit-and-push.sh "pipeline(personality): 30m tick"

      - name: Trigger Pages deploy
        # GitHub deliberately suppresses workflow triggers for pushes made with
        # GITHUB_TOKEN (to prevent infinite cron loops), so pages.yml's `push`
        # trigger never fires for our bot commits. workflow_dispatch invoked
        # from another workflow DOES fire regardless of token provenance.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
