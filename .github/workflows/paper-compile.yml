name: Paper Compile

# Compiles project papers to PDF in the llmXive house style. Runs:
#   - every 30 minutes (in case a paper was added without triggering paths)
#   - on push to any project's paper/source/ or to the llmxive.cls style
#
# Strategy (per scripts/compile_paper.py):
#   1. Restyle the original arXiv source into a wrapper that loads llmxive.cls
#   2. Compile with lualatex (3 passes + bibtex when applicable)
#   3. On failure, fall back to fetching the canonical arXiv PDF so the
#      paper modal always has SOMETHING to show.
#
# Per-paper failures never fail the workflow; the next tick retries them.
# Security: workflow_dispatch inputs are untrusted; surfaced to the shell
# via env: vars (never interpolated directly into run: steps) and validated
# by Python's argparse before reaching any subprocess.

on:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches: [main]
    paths:
      - 'projects/**/paper/source/**'
      - 'papers/.style/**'
      - 'scripts/compile_paper.py'
      - 'scripts/restyle_arxiv_paper.py'
      - '.github/workflows/paper-compile.yml'
  workflow_dispatch:
    inputs:
      project:
        description: "Restrict to one PROJ-NNN-... dir (empty = --all)"
        required: false
        default: ""
      max:
        description: "Cap on --all (default: 20)"
        required: false
        default: "20"

permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write

concurrency:
  group: paper-compile
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install TeX Live (shared SSoT package set)
        run: bash scripts/ci/install-texlive.sh
      - name: Install llmxive package
        run: pip install -e .
      - name: Compile papers
        env:
          INPUT_PROJECT: ${{ github.event.inputs.project }}
          INPUT_MAX: ${{ github.event.inputs.max }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PROJECT:-}" ]; then
            python3 scripts/compile_paper.py "projects/${INPUT_PROJECT}"
          else
            MAX="${INPUT_MAX:-20}"
            python3 scripts/compile_paper.py --all --max "$MAX"
          fi
      - name: Build missing Reviewed-Preprint PDFs
        # Safety net: finalize_reviewed_preprint now builds these PDFs inline
        # (reprocess.yml installs TeX Live), but this sweep still backfills any
        # that slipped through (e.g. a build that failed mid-drain, or preprints
        # created before the inline build landed). --max 30 keeps it ahead of the
        # drain rate so no PDF-less backlog accumulates in the dashboard tab.
        run: python3 scripts/build_missing_preprint_pdfs.py --max 30

      - name: Audit restyled papers (non-failing)
        # Flip paper_status `restyled_unaudited` -> `audited` (spec 010 / 023
        # FR-023). The deterministic PDF audit (`llmxive pdf-pipeline audit`)
        # calls record_audit_result, but NO other workflow ever invoked it, so
        # restyled papers were stranded at `restyled_unaudited`. Audit each
        # canonical restyled main PDF here, right after compile, so the updated
        # state/paper_status/*.json + state/audit/pdf/*.json get committed below.
        #
        # SAFE in CI: the audit never moves or deletes a PDF — the only file
        # mutation is on a render CRASH, where it COPIES the PDF into a
        # quarantine dir (audit.py ~L263, shutil.copy2). Per-paper failures never
        # fail the sweep (the CLI exits 1 on defects — swallowed by set +e), and
        # the loop is bounded to 200 papers/tick.
        run: |
          set +e
          n=0
          for pdf in projects/PROJ-*/paper/pdf/main-llmxive.pdf; do
            [ -f "$pdf" ] || continue
            if [ "$n" -ge 200 ]; then break; fi
            python3 -m llmxive pdf-pipeline audit "$pdf"
            n=$((n + 1))
          done
          echo "[paper-compile] audited $n restyled paper PDF(s)"
          exit 0

      - name: Commit + push
        id: commit
        # Robust concurrent-safe commit+push (scripts/ci/commit-and-push.sh):
        # rebases this tick onto the latest main resolving the routine
        # regenerated-file conflict (web/data/projects.json) toward this tick,
        # never leaves a conflicted tree, and FAILS LOUD instead of masking.
        run: |
          bash scripts/ci/commit-and-push.sh "paper-compile: produce/refresh paper PDFs"

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes, so
        # pages.yml's `push` trigger never fires for bot commits. Explicit
        # workflow_dispatch DOES fire regardless of token provenance.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
