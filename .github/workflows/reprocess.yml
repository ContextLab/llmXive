name: Pipeline — Reprocess ingested code papers (autonomous drain)

# Spec 024 + Reviewed-Preprints ethics change (2026-07-01): externally-ingested
# papers are NEVER modified. Each tick this SINGLE job (a) migrates a few
# stranded external papers paper_review -> paper_ingested and (b) drains
# paper_ingested via `run --stage`, whose PAPER_INGESTED handler now runs
# finalize_reviewed_preprint: mark the paper a terminal Reviewed Preprint
# (original bytes + byline preserved), auto-review it once with the LLM panel
# (incl. the vision figure reviewer — needs poppler below), and spawn a SEPARATE
# citing llmXive follow-up project. Kept a SINGLE serialized job so the
# commit-and-push rebase never races itself; the themed preprint PDFs are built
# by the Paper Compile workflow's sweep (this runner has no TeX Live).

on:
  schedule:
    - cron: '7,27,47 * * * *'   # every 20 min, offset from advance.yml's */15
  workflow_dispatch:
    inputs:
      migrate_limit:
        description: "Code papers to migrate -> paper_ingested per tick."
        required: false
        default: "5"
      drain_tasks:
        description: "paper_ingested papers to reprocess per tick (wall-budget capped)."
        required: false
        default: "3"

permissions:
  contents: write
  issues: write

# Serialize: never two reprocess jobs at once (submodule / .gitmodules safety).
concurrency:
  group: reprocess-drain
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      # Back-filling a code paper (speckit chain + code_adapter) is longer than a
      # normal advance tick; give the run loop room to finish 1-2 papers per tick.
      LLMXIVE_RUN_WALL_BUDGET_S: "5400"
      LLMXIVE_PAID_OPT_IN: "1"
      LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
      LLMXIVE_EXECUTION_PAID_TIERS: "anthropic.claude-haiku-4-5-20251001,anthropic.claude-sonnet-4-6,anthropic.claude-opus-4-6"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e ".[dev]"
      # poppler-utils: pdf2image's system dep — the Reviewed-Preprint VISION
      # figure reviewer renders each figure PDF to PNG; without poppler the
      # figure lens silently skips in CI (reviews lose the figure critique).
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
      # GPU-offload lane (#367): pin the working Kaggle combo — a bare
      # `pip install kaggle` pulls kagglesdk 0.1.32 whose wheel drops
      # `competitions.legacy`, breaking `import kaggle` (offload then no-ops).
      - run: pip install "kaggle==2.2.3" "kagglesdk==0.1.31"
      - run: python -m llmxive preflight
      - name: Migrate a batch of code papers -> paper_ingested
        env:
          MIGRATE_LIMIT: ${{ github.event.inputs.migrate_limit || '5' }}
        run: |
          python -c "import os, re; from llmxive.paper_reprocess.migrate import migrate_unprocessed_external_papers as M; n = int(re.sub(r'\D', '', os.environ.get('MIGRATE_LIMIT','') ) or '5'); print('migrated', len(M(kind='code', limit=n)))"
      - name: Drain paper_ingested (auto-review -> Reviewed Preprint + citing follow-up)
        env:
          DRAIN_TASKS: ${{ github.event.inputs.drain_tasks || '3' }}
        run: |
          TASKS="$(printf '%s' "${DRAIN_TASKS:-3}" | tr -cd '0-9')"
          python -m llmxive run --stage paper_ingested --max-tasks "${TASKS:-3}"
      - name: Commit + push
        run: |
          bash scripts/ci/commit-and-push.sh "reprocess(code): drain tick"
