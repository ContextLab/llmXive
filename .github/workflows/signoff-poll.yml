name: Publication Sign-off Poll
# Spec 023 / US5 (FR-019..021): the ONE sanctioned human gate. This lane
# opens the maintainer-vote issue for every gate-ready paper, parses
# reactions/comments, executes decisions (idempotent DOI mint + posted, or
# rejection routed into the revision loop), and posts reminders. Projects
# parked at the gate consume ZERO scheduler capacity — this lane owns the
# stage. Uses no untrusted input in run: steps (vote PARSING happens in
# Python via the GitHub API, never shell-interpolated).
on:
  schedule:
    - cron: '25 */2 * * *'   # every 2 hours, offset 25min
  workflow_dispatch:
permissions:
  actions: write
  contents: write
  issues: write
concurrency:
  group: signoff-poll
  cancel-in-progress: false
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
      ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - name: Install TeX (publisher final compile)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q texlive-luatex texlive-latex-extra texlive-fonts-recommended latexmk
      - run: pip install -e ".[dev]"
      - name: Poll sign-off issues
        run: python -m llmxive project signoff-poll
      - run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Commit + push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ projects/ web/data/ specs/ || true
          if git diff --cached --quiet; then echo "no changes"; echo "pushed=false" >> "$GITHUB_OUTPUT"; else

            git commit -m "pipeline(signoff): vote-poll tick"

            for i in 1 2 3 4 5; do

              git pull --rebase origin main && git push && break

              echo "push attempt $i failed; retrying..." >&2

              sleep $((5 * i))

            done
            echo "pushed=true" >> $GITHUB_OUTPUT

          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
