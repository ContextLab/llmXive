name: Pipeline — Paper Write (figures/stats/text)
on:
  schedule:
    - cron: '50 */8 * * *'   # every 8 hours
  workflow_dispatch:
permissions:
  actions: write             # workflow_dispatch to pages.yml
  contents: write
  issues: write
concurrency:
  group: pipeline-paper-write
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
      # Guarded paid fallback (claude-haiku) for when ALL free models flap;
      # globally hard-capped by the daily ~$2 credit budget (backends/credits.py).
      LLMXIVE_PAID_OPT_IN: "1"
      LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
      # Paid escalation ladder (after the free tiers) for the execution/convergence fix-loop
      LLMXIVE_EXECUTION_PAID_TIERS: "anthropic.claude-haiku-4-5-20251001,anthropic.claude-sonnet-4-6,anthropic.claude-opus-4-6"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: main }
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - name: Install TeX Live (shared SSoT package set)
        run: bash scripts/ci/install-texlive.sh
      - run: pip install -e ".[dev]"
      - run: python -m llmxive preflight
      - name: Balanced advance pass
        run: python -m llmxive run --max-tasks 8
      - run: python -c "from llmxive.agents.status_reporter import regenerate_web_data; from pathlib import Path; regenerate_web_data(repo_root=Path('.'))"
      - name: Commit + push
        id: commit
        run: |
          bash scripts/ci/commit-and-push.sh "pipeline(paper-write): 8h tick"

      - name: Trigger Pages deploy
        # GitHub suppresses workflow triggers from GITHUB_TOKEN pushes (to
        # prevent infinite cron loops); workflow_dispatch invoked from another
        # workflow DOES fire regardless. Without this, pages.yml never
        # redeploys after a cron tick even though we touched web/data/.
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
