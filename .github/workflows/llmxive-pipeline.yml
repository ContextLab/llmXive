name: llmXive Pipeline

on:
  schedule:
    # FR-001 default cadence: every 3 hours.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    # FR-002: optional inputs to scope a manual run to a project and/or stage.
    inputs:
      project_id:
        description: "Restrict run to this project ID (e.g. PROJ-001-foo)."
        required: false
        type: string
      stage:
        # FR-002: `--stage` filters projects by their CURRENT pipeline Stage (a
        # project STATE), which is what the CLI's `_Stage(value)` accepts — NOT a
        # step/agent name. The old dropdown listed step names (brainstorm,
        # speckit_implement, …) that are NOT Stage values, so picking any of them
        # made `python -m llmxive run --stage <name>` hard-fail with exit 2. Use a
        # free-text Stage value instead; an invalid value now prints the full list.
        description: >-
          Restrict the run to projects currently at this pipeline Stage (a project
          STATE, e.g. in_progress, research_review, research_complete, paper_review,
          paper_drafting_init — NOT a step name). Leave blank to let the scheduler
          choose. An invalid value lists every accepted Stage.
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

# Serialize all runs of this workflow on a branch (cron + manual dispatch) so two
# runs never advance the same project / race on the shared git state. A new run
# QUEUES behind the in-flight one (we never cancel mid-stage — that would strand a
# project's partial artifacts); GitHub keeps at most one pending run per group.
concurrency:
  group: llmxive-pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # Public repo → unlimited Action minutes. The plan stage (planner lit-search +
    # plan convergence panel) can run well past 60 min; a short cap would time it
    # out every cron and the project would never advance. Give slow stages room
    # (well under GitHub's 6 h hard ceiling). A run still EXITS as soon as
    # `--max-tasks` is satisfied — this is only a safety cap, not a target.
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: pip install -e .
      - name: Preflight (FR-024 fail-fast preconditions)
        env:
          DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
          DARTMOUTH_API_KEY: ${{ secrets.DARTMOUTH_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python -m llmxive preflight
      - name: Run pipeline (stub until US1)
        env:
          DARTMOUTH_CHAT_API_KEY: ${{ secrets.DARTMOUTH_CHAT_API_KEY }}
          DARTMOUTH_API_KEY: ${{ secrets.DARTMOUTH_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPU-offload lane (issue #367): the execution gate runs HERE (the
          # speckit_implement lane), so the Kaggle creds MUST be present or the
          # offload is inert and GPU-bound external papers fall back to a
          # (doomed) CPU run that the fabrication gate then blocks. advance.yml
          # already passes this; the main pipeline lane did NOT, which is why no
          # GPU paper ever offloaded — it fabricated a CPU proxy instead.
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          PROJECT_ID: ${{ github.event.inputs.project_id }}
          STAGE: ${{ github.event.inputs.stage }}
          # Allow the guarded paid fallback (claude-haiku-4.5) when ALL free
          # models flap — gpt-oss has been hanging and qwen/gemma can too. The
          # credit guard in backends/credits.py caps spend at the budget fraction
          # of the daily 2000-credit (~$2/day) allowance and renews daily, so this
          # stays within the maintainer-sanctioned $2/day and Constitution IV
          # (free-first: free models are still tried first; paid is last resort).
          LLMXIVE_PAID_OPT_IN: "1"
          LLMXIVE_PAID_BUDGET_FRACTION: "0.9"
          # Paid escalation ladder (after the free tiers) for the execution/convergence fix-loop
          LLMXIVE_EXECUTION_PAID_TIERS: "anthropic.claude-haiku-4-5-20251001,anthropic.claude-sonnet-4-6,anthropic.claude-opus-4-6"
        run: |
          ARGS=(run --max-tasks 5)
          if [[ -n "${PROJECT_ID:-}" ]]; then ARGS+=(--project "$PROJECT_ID"); fi
          if [[ -n "${STAGE:-}" ]]; then ARGS+=(--stage "$STAGE"); fi
          python -m llmxive "${ARGS[@]}"
      - name: Update escalation digest (spec 023 / FR-017)
        # Aggregates open exhaustion-evidence escalation records into ONE
        # digest issue (no per-project pings). Best-effort: a digest
        # failure never fails the pipeline tick.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "from llmxive.state.escalations import update_digest; update_digest()" || true
      - name: Persist pipeline progress
        # Commit + push whatever the pipeline produced (advanced stage, new
        # artifacts, run-log telemetry) back to the branch this run checked out,
        # so progress survives the ephemeral runner. always(): even a transient
        # endpoint failure leaves the project parked at its stage (no partial
        # artifacts — the stage guards unlink those) and we still keep the
        # run-log. [skip ci] on the message avoids retriggering the pipeline.
        #
        # main is a HIGH-TRAFFIC branch (personality every 30m, pages deploy,
        # submission-intake all push concurrently), so a plain push loses the
        # race during this multi-minute run. Mirror the proven
        # pipeline-personality pattern: pull --rebase + push in a 5x retry loop.
        if: always()
        run: |
          bash scripts/ci/commit-and-push.sh "chore(pipeline): persist run progress [skip ci]"
