      data quality. The literature gap analysis section (triggered by Semantic
      Scholar 429 — D5) provides a defensible justification for the project's
      novelty: no published work quantifies the relationship between structural
      clone density and downstream model metrics. Methodology uses public
      `codeparrot/github-code` corpus with `codegen-350M-mono` in 8-bit
      quantization on CPU — fits inside the GHA 7GB / 6h envelope.

