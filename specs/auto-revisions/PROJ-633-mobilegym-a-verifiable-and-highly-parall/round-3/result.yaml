- id: aca854dd336b
  text: The Sim-to-Real transfer claim (95.1% retained gain) is based on a filtered
    subset (59 tasks) that excludes 8 tasks deemed 'unreproducible' on real devices.
    This selection bias risks overstating the generalizability of the transfer rate.
    Please clarify the subset selection criteria and discuss how excluding unreproducible
    tasks affects the validity of the 95.1% figure as a benchmark-wide metric.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: b344cdcf2446
  text: The Abstract claims MobileGym enables capabilities 'previously out of reach'.
    AndroidWorld and similar emulators do support online RL, albeit at higher cost.
    This phrasing overstates the novelty. Consider revising to 'more scalable' or
    'cost-effective' to accurately reflect the contribution relative to existing emulator-based
    RL.
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: b4021bbc39b9
  text: The paper claims to cover 'everyday mobile use' with 12 everyday apps, but
    admits the backend logic is synthetic (Section 2.1). This limitation should be
    more prominently stated in the Abstract and Introduction to avoid overclaiming
    the realism of the 'everyday' claim, as synthetic backends may not capture real-world
    logic drift.
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: f8e437da3876
  text: "The Benchmark Datasheet (\xA71) claims interaction patterns are 'derived\
    \ from 50,000+ real user sessions.' Please clarify the source of this data, whether\
    \ consent was obtained, and if IRB approval was granted. If synthetic, rephrase\
    \ to avoid implying real user data usage."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: e70bd1f6792b
  text: The title page lists 'llmXive-implementer-v1.0' as a reviser/author. This
    requires explicit disclosure of AI contribution per current authorship guidelines
    (e.g., CRediT taxonomy) to ensure transparency and accountability.
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 0c20bb7e57e4
  text: Add a dedicated 'Safety and Ethics' section discussing dual-use risks (e.g.,
    automated fraud, spam) of agents trained on MobileGym, and outline mitigation
    strategies for releasing the platform and trained models.
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 9190001143f2
  text: "In \xA7\ref{sec:exp:sim2real}, simulation results are 4-seed averages while\
    \ real-device results are pass@1. This statistical asymmetry inflates confidence\
    \ in the '95.1% retained gain' metric. Please clarify this limitation or provide\
    \ variance estimates for real-device runs."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 7ba09d3bf2f3
  text: The 59-task signal subset for Sim-to-Real is selected based on simulation
    performance (Uplift/Stable-pass/Mid). This selection bias risks overestimating
    general transferability. Discuss this effect more prominently in the main text,
    not just Appendix E.1.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 8d5d26c8abcd
  text: "GRPO training uses only 10 steps (\xA7\ref{app:exp-config}). A learning curve\
    \ or justification for this short horizon is needed to rule out overfitting or\
    \ initialization artifacts as the source of the +12.8 pt gain."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 2572145bd96d
  text: "The manuscript reports success rates (SR) and progress rates (PR) for multiple\
    \ models but provides only point estimates and standard deviations from a small\
    \ number of trials (4 for open\u2011source models, 1 for proprietary models).\
    \ Add appropriate statistical significance testing (e.g., paired t\u2011tests\
    \ or non\u2011parametric tests) to support claims of superiority, and report confidence\
    \ intervals for all key metrics."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: df1ed371a98b
  text: "Multiple models and multiple difficulty strata are compared simultaneously,\
    \ which raises a multiple\u2011comparisons problem. Apply a correction method\
    \ (e.g., Bonferroni, Holm\u2011\u0160id\xE1k, or false discovery rate) and disclose\
    \ adjusted p\u2011values or confidence intervals."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 819dd9eb4276
  text: "The variance estimates (\xB1 values) are presented without indicating the\
    \ number of runs or the underlying distribution assumptions. Clarify the exact\
    \ number of random seeds per model, provide the raw per\u2011seed results in an\
    \ appendix, and justify the use of mean\u202F\xB1\u202FSD versus median or other\
    \ robust statistics."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 0b4c6fa81de9
  text: "For the Sim\u2011to\u2011Real transfer experiment, the gain is reported as\
    \ a percentage point increase (e.g., +12.8\u202Fpt) without a statistical test\
    \ of whether this uplift is significant given the small sample (59 tasks). Perform\
    \ a hypothesis test (e.g., McNemar\u2019s test for paired binary outcomes) and\
    \ report the corresponding p\u2011value and confidence interval."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: e7aac553b92b
  text: "The paper mixes heterogeneous evaluation protocols (AnswerSheet extra budget,\
    \ different step budgets per task) but does not assess whether these protocol\
    \ differences bias the reported metrics. Conduct an ablation or sensitivity analysis\
    \ to quantify the impact of the extra 15\u2011step budget on SR/PR."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 463831a334d2
  text: "The unexpected side\u2011effects (USE) metric is presented as a simple percentage\
    \ without any statistical assessment of its reliability across runs. Provide inter\u2011\
    run reliability statistics (e.g., Cohen\u2019s \u03BA) or confidence intervals\
    \ to demonstrate stability."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 689c6ede2461
  text: "The high\u2011risk subset results are shown as raw percentages without any\
    \ statistical comparison to the full set. Include statistical tests to determine\
    \ whether performance on high\u2011risk tasks differs significantly from overall\
    \ performance."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 97638d8cc2bf
  text: "The VLM\u2011judge error analysis reports counts but does not assess whether\
    \ the error rate differs between base and trained models beyond descriptive numbers.\
    \ Apply a proportion test (e.g., chi\u2011square or Fisher\u2019s exact test)\
    \ and report significance."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
- id: 3995b909297d
  text: "Overall, the manuscript lacks a pre\u2011registered analysis plan or power\
    \ analysis to justify the chosen number of tasks, trials, and models. Add a brief\
    \ discussion of statistical power or justify why the current sample sizes are\
    \ sufficient."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-633-mobilegym-a-verifiable-and-highly-parall/paper/source/
  location: ''
