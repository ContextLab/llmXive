- id: ff5f9bf01f73
  text: The paper lacks statistical significance testing for the reported performance
    gains. With only 150 training steps and single-run reporting (no seeds mentioned),
    claims of 'consistent improvements' (e.g., +9.3 on ALFWorld) are not robust. Provide
    standard deviations over multiple seeds or confidence intervals to rule out variance-driven
    results.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: ff8539b152b2
  text: 'The ''analyzer'' (GLM-5.2) used for skill extraction is a proprietary, closed-source
    model not available for independent verification. This introduces a ''black box''
    confounder: the gains may stem from the analyzer''s specific reasoning biases
    rather than the OPID mechanism. Reproduce skill extraction with an open-source,
    reproducible model or provide the exact prompt and analyzer outputs for all trajectories.'
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: 8f895bc5790e
  text: The ablation study on 'Critical-First Skill Routing' (Table 2) shows a +6.8
    point gain, but the 'w/o Routing' baseline (77.5) is not clearly defined. Does
    it use random routing, uniform averaging, or always episode-level? The experimental
    design must explicitly define the counterfactual to validate the routing hypothesis.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: 04986e5c0287
  text: Sample efficiency claims (Fig 3) rely on a single curve without error bars.
    The claim that OPID 'surpasses full-data GRPO' at 80% data (78.9 vs 75.0) is highly
    sensitive to random initialization and data sampling. Provide a learning curve
    with multiple seeds to confirm this non-monotonic behavior is not an artifact
    of a lucky seed.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: ac1662c10b2e
  text: "The paper reports point estimates (e.g., 84.3 vs 75.0) without confidence\
    \ intervals, standard errors, or p-values. Given the stochastic nature of RL training\
    \ and the small number of reported runs (implied by single values), statistical\
    \ significance cannot be established. Re-run experiments with multiple seeds (n>=5)\
    \ and report mean \xB1 std dev or 95% CIs for all main results in Table 1 and\
    \ ablation studies."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: 2573cb5ccb30
  text: The sample efficiency analysis (Figure 4, Table in Appendix) compares OPID
    and GRPO at different data fractions (20%-100%) but lacks statistical testing
    for the interaction effect. The claim that OPID 'surpasses' GRPO at 80% data (78.9
    vs 75.0) is not supported by a significance test (e.g., paired t-test or bootstrap)
    across seeds. Provide statistical validation for these comparative claims.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: 4c55da985c93
  text: "The critical-first routing ablation (Table 3) shows a +6.8 point gain. However,\
    \ the mechanism for identifying 'critical timesteps' ($\\mathcal{C}_\tau$) relies\
    \ on an LLM analyzer. The paper does not report the variance or error rate of\
    \ this analyzer, nor does it perform a sensitivity analysis on the routing threshold.\
    \ Without quantifying the noise in the routing signal, the statistical attribution\
    \ of the gain to the routing mechanism is confounded."
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
  location: ''
- id: ec189653c605
  text: The theoretical analysis in Appendix A (Proposition 1) assumes 'common-support'
    and 'perfect detection' for the routing regret bound. The empirical section does
    not verify these assumptions. Specifically, the distribution of the skill advantage
    $A^{skill}$ is not analyzed for normality or outliers, which is required to justify
    the use of mean-based comparisons in the main results. Include a distributional
    analysis of the advantage signals.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-795-opid-on-policy-skill-distillation-for-ag/paper/source/
