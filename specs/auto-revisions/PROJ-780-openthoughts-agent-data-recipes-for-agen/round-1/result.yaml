- id: f3ee0a1da8fe
  text: The 'Broader Impacts' section (Section 6) is insufficiently detailed regarding
    dual-use risks. Agentic models capable of autonomous code execution and tool use
    pose significant safety risks (e.g., automated vulnerability exploitation, unauthorized
    system access). The paper must expand on specific mitigation strategies, such
    as sandboxing protocols, human-in-the-loop requirements, and refusal mechanisms
    for harmful tasks.
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-780-openthoughts-agent-data-recipes-for-agen/paper/source/
  location: ''
- id: 257a154745fd
  text: The paper mentions using 'LLM-based task filters' and 'GPT-5' for data curation
    (Section 4.4, Table 4). There is no discussion of the potential for these filters
    to introduce bias or inadvertently filter out valid but complex edge cases, nor
    is there an assessment of the safety of the generated synthetic data (e.g., ensuring
    synthetic tasks do not encode harmful instructions).
  severity: writing
  engine_severity: writing
  reviewer: paper_reviewer
  artifact: projects/PROJ-780-openthoughts-agent-data-recipes-for-agen/paper/source/
  location: ''
- id: 0408a2c4d529
  text: The claim of 'compute-controlled comparisons' for scaling curves (Fig 1) is
    not fully supported. While Table 2 (Appendix) shows a token-matched filter ablation,
    the main scaling curves (Fig 1, Fig 2) compare models trained for different epochs
    (5 vs 7) and with different gradient clipping norms (Table SFT_hp_per_scale_32b).
    This introduces a confounding variable (training duration/steps) that must be
    explicitly addressed or the claim qualified.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-780-openthoughts-agent-data-recipes-for-agen/paper/source/
  location: ''
- id: 7eece42a54f0
  text: The RL section reports a 7.6 pp performance range across sources (Table 4),
    but the run-to-run reproducibility table (Table 6) shows variance of ~1.6-2.0
    pp. The paper claims gains 'exceed this variance' but does not provide statistical
    significance tests (e.g., t-tests or confidence intervals) for the differences
    between the top source (pymethods2test) and the runner-up (r2egym), which are
    separated by only ~4 pp.
  severity: science
  engine_severity: science
  reviewer: paper_reviewer
  artifact: projects/PROJ-780-openthoughts-agent-data-recipes-for-agen/paper/source/
  location: ''
